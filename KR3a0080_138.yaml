body:
  text: 大學衍義補卷一百三十八明丘濬撰治國平天下之要嚴武備遏盜之機下宋太祖淳化四年青城民王小波作亂初蜀亡其府庫之積悉輸汴京自後任事者於常賦外更置博買務禁商賈不得私市布帛蜀地土狹民稠耕稼不足以給由是兼并者益糴賤販貴以規利青城民王小波因聚衆為亂且曰吾疾貧富不均今為汝均之貧者争附遂攻青城掠彭山殺縣令旁邑響應王小波中流矢死其黨推小波妻弟李順為帥冦掠州縣衆至數十萬僭稱大蜀王詔以張詠知益州得便宜從事時宦官王繼恩及上官正等總兵討賊漸有成功頓師不進専務飲博剽掠餘冦匿山谷恃險結集勢復張大州縣多陷詠至以言激正等勉其親行仍盛為供具餞之酒酣舉爵属軍校曰爾曹蒙國厚恩無以塞責此行當直抵冦壘平蕩醜類若老師曠日即此地還為爾死所矣由是決行深入大致克捷時冦掠之際民多脇從詠移文諭以恩信使各歸田里且曰前日李順脇民為賊今日吾化賊為民不亦可乎真宗咸平元年廣武叛卒劉旴嘯聚數千輩逐都巡檢使畧漢蜀邛州咸平三年益州戍卒作亂奉王均為帥均僭號大蜀改元化順陷漢州吕中曰李順之黨方息而劉旴興劉旴之徒方平而王均起何蜀人之好亂邪葢蜀民勇悍又狃於僭偽之久故易誘以亂耳然安李順之黨者張詠也平劉旴之亂者亦張詠也代以牛冕則王均反牧守其可非其人乎張詠使蜀者再真宗曰得卿治蜀無西顧憂此為蜀擇詠非為詠擇蜀也臣按蘇洵嘗擬為張方平之言謂民無常性惟上所待人皆曰蜀人多變於是待之以待盜賊之意而繩之以繩盜賊之法重足屏息之民而以碪斧令於是民始忍以其父母所仰頼之身而棄於盜賊故每每大亂夫約之以禮驅之以法惟蜀人為易至於急之而生變雖齊魯亦然吾以齊魯待蜀人而蜀人亦自以齊魯之人待其身洵之言雖若假設然亦實有此理也蓋秉彞好徳之性好善惡惡之心人人有之誰肯甘於為非為惡哉由乎上之人不以人理待之彼習知其然故亦自棄其身於非人理之地而不自惜耳嗚呼為人上者寄斯民於守牧烏可専委柱後惠文冠峩峩武弁者哉仁宗慶厯中貝州宣毅卒王則據城反則涿州人初以嵗飢流至貝州自賣為人牧羊後𨽻宣毅軍為小校貝冀俗尚妖幻相與習五龍滴淚等經及諸圖讖書言釋迦佛衰謝彌勒佛當出世則之與母訣也嘗刺福字於背以為記妖人因妄傳則字隠起爭信事之州吏張巒卜吉主其謀黨與連徳齊諸州約以正旦㫁澶州浮梁作亂㑹其黨潘方淨以書謁北京留守賈昌朝事覺被執故不待期冬至日知州張得一方與官属謁天慶觀則率其徒刼庫兵執得一囚之殺通判董元亨等則僭稱東平郡王建國曰安陽事聞以文彦博為河北宣慰使平之臣按盜賊之竊發往往以妖術惑衆伏讀律文有曰凡師巫假降邪神書符呪水扶鸞禱聖自號端公太保師婆及妄稱彌勒佛白蓮社明尊敎白雲宗等㑹一應左道亂正之術或隠藏圖像燒香集衆夜聚曉散佯修善事扇惑民人為首者絞為從者流其法可謂嚴矣聖祖制法之初其為慮一何逺也然欲禁絶其源當自京師首善地始宜勅廵城御史及兵馬司官凡京城内外有假鬼神降神書符以救病報事為民者即令街方火甲具名報官究治驅遣之其當禁治而不禁治與容而為之者治以重罪及通行天下凡人家有収蓄異書者皆許赴官受直三月之後不首者他人首發重罪之是亦治朝遏亂之一術也歐陽脩言近日盜賊縱横若不早圖恐貽後悔臣計方今禦盜者不過四事一曰州郡置兵為備二曰選捕盜之官三曰明賞罰之法四曰去冗官用良吏以撫疲民使不起為盜臣按除盜之法最不可緩緩則賊勢日大徒侣日多往往貽他日之悔脩之四事其去冗官用良吏以撫疲民其首務也得一良吏如龔遂之治渤海虞詡之治朝歌盜不難除矣富弼言于仁宗曰訪得多有兇險之徒始初讀書即欲應舉及其長立所學不成雖稍能文不近舉業仕進無路心常怏怏頗讀史傳粗知興亡以至討尋兵書習學武藝因此張大胸膽遂生權謀每遇災祥便有竊議自負所圖甚大蔑視州縣既不應舉又不别營進身往往晦名詭姓潛跡遁形乃與其徒密相結扇此輩散在民間實多縱無成謀亦能始禍要在得而縻之使所謀不成乞命臣寮可委者多方採訪如有此等之人作草澤遺逸薦于朝廷随其所能量加恩命蘇軾言于仁宗曰夫惟忠孝禮義之士雖不得志不失為君子若徳不足而才有餘者困于無門則無所不至矣臣願特為京東西河北河東陜西五路别開仕進之門古者不専以文詞取人故得士為多王者之用人如江河江河所趣百川赴焉蛟龍生之及其去而之他則魚鼈無所還其體而鯢鰍為之制願採唐之舊使五路監司郡守共選士人其人才心力有足過人而不能從事於科舉者薦其材使得出仕比任子而不以流外限其所至朝廷察其尤異者擢用數人則豪傑英偉之士漸出於此塗而姦猾之黨可得而籠取也軾又代淮南轉運使李琮言于神宗曰揚雄有言御失其道則天下狙詐咸作敵而班固亦論劇孟郭解之流皆有絶異之姿而惜其不入於道徳茍放縱於末流是知人言善惡本無常性若御得其道則向之姦猾盡是忠良故許子將謂曹操曰子治世之能臣亂世之姦雄使韓彭不遇漢高與盜賊何異臣竊嘗為朝廷計以為窮其黨而去之不如因其材而用之何者其黨不可勝去而其材自有可用昔漢武帝嘗遣繡衣直指督捕盜賊所至以軍興從事斬二千石以下可謂急矣而盜賊不為少衰者其黨固不可盡也朝廷因其材而用之則盜賊自消而豪傑之士可得而使請以唐事明之自天寳以後河北諸鎮相繼為亂雖憲宗英武亦不能平觀其主帥皆卒伍庸才而能於六七十年間與朝廷相抗者徒以好亂樂禍之人背公死黨之士相與出而輔之也臣願陛下精選青鄆兩帥京東西職司及徐沂兖單濰密淄齊魯濮知州諭以此意使隂求部内豪猾之士或家富而多權謀或通知術數而曉兵或家富而好施如此之類皆召而勸奬使以告捕自效籍其姓名以聞於朝所獲盜賊量輕重酬賞若獲真盜大姦隨即録用若只是尋常刼賊即累其人數酬以一官使此輩歆艶其利以為進身之資但能㧞擢數人則一路自然競勸貢舉之外别設此科則向之遺才皆為我用縱有姦雄嘯聚亦是無徒秦觀曰自古盜之所以興皆出於仍嵗水旱賦斂横出徭役數發故愚民為盜弄兵於山海險阻之間以為假息之計所可深慮者其間有豪俊而已何則人之豪俊猶馬之有驥犬之有盧雖上觀下獲一日千里而縱蹄􅐅之變亦可畏也昔周亞夫得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為也天下騷動大將得之隠如一敵國云唐縱朱克融北還盧龍未幾軍亂遂復失河朔夫孟克融皆匹夫耳而得失去就之間繫吳楚之成敗為河朔之存亡以此言之盜賊之間而有豪俊豈不為可深慮也哉臣以為銷亡大盜之術莫大乎籠取天下之豪俊天下豪俊為我籠取則彼卒材鼠輩雖有千百為羣不足以置齒牙之間矣國家取人之制其選高者惟制䇿進士夫豪俊之士固有文武縱横之間無不可者椎魯少文獨可以任之大事者使天下豪傑皆文武縱横之才二科足以取之若有椎魯少文之人則不可得而取之矣是制䇿進士所得之外不能無遺材也臣按富蘇二臣所見畧同葢盜賊竊發古今代有彼其紛紛攘攘之徒為人所刼制者心無定志為利而動既可以誘脇而來亦可以哄嚇而去無足慮者所慮者粗知文義識古今者爾其言足以動衆智足以設謀其縱横詭秘機畧變幻尤易以惑世而欺人此等之人茍非有以平時收拾之使其有所顧藉而不肯為非即不幸一旦有事則彼在中國則為盜賊主謀彼出外境則為夷狄效力其為禍害有非旦夕可已者仰惟祖宗用人於科目嵗貢之外别有賢良方正才識兼茂經明行脩諸科下至富户老人亦在所用之列葢以天下之大人材有能有不能故以此待之使其咸盡所用而無遺也近日用事者乃盡去之而顓顓用科貢二途甚非祖宗意也臣愚願復舊制諸科以收拾天下遺才又勅有司凡士子有不習舉業者有他才能藝術可稱皆許薦聞随所能而試之量授一職其大江以北人才樸魯固有心解而口不能言口言而手不能書者其中有知邊情諸武事及膂力技能過人者亦許以名聞量用以為都司衛所幕官或補任或添注或於武職中試職其中才能出衆者果有顯效則不次用之以為將帥以為方面異日為國立功名攘夷狄亦未必不賴其用也夫然則天下之有才者皆有用而無出位之思國家之所用者無遺才而無意外之慮黄巢必不販私鹽張榮必不為阡能草書檄樊若水必不量江面張元吳昊必不為夏人之用黄師宓必不主儂氏之謀徐伯祥必不引交人以入冦也富弼言于神宗曰今來累有羣賊白日入城開軍資甲仗等庫刼取衣甲物帛散與賊黨州中兵士不滿三十人州官散走賊徒恣行刼殺殊無畏憚官司勢不能制禦夫小冦聚集尚如此凌侮此後更有大盜殺官吏據州城盡取官私財物召募徒衆必且將至千萬人以與朝廷相抗賊徒大刼財物散施無涯則貧民樂随矣恣行刼殺使人震恐則大小脇從矣朝廷賞必有限罰必有條不得如賊之使人樂随而脅從也若諸處觀望姦雄相應而起賊滿天下則大事去矣秦末隋末唐末皆由此而亂臣夙夜思慮實為寒心趙瞻言于英宗曰伏見羣盜殺害輔郡之官吏繫囚叛起京畿之獄此皆前古禍亂之萌朝廷腹心之慮為最急務而政府惟不過發闗移為督責之狀州郡亦不過備游徼為期㑹之迹而已文書一報但用習常茍求按問未有為國家窮淵藪積姦之原塞萬一不測之計也又曰昔用一郡守則盜賊屏息今聨官數十員而不能禁者何哉葢昔之責人以實效而今之官司取空文也今盜一發符牒四走則曰吾有文書下一路矣帥府則曰吾有文書下郡矣按具則吾無責也郡則曰吾有文書下廵邏令尉矣闗白即吾無責也令尉則曰吾有文書下坊里保伍矣期㑹即吾無責也此其由來得非自朝廷之守空文邪臣按大盜之起必刼刑獄必掠公庫必殺官吏自古禍亂之起皆始于此馴而至于其極四海塗炭宗社丘墟皆起于一州一縣之積也有國家者思患而豫防之豈容緩哉昔羣盜剽刼淮南將過高郵知軍鼂仲約度不能禦令富民出金帛具牛酒使人迎勞且厚遣之盜悦徑去不為盜事聞富弼欲誅仲約范仲淹欲宥之臣竊以為弼之欲誅法也仲淹之欲宥情也請酌之情法之中使高郵有城池士卒而仲約不禦之而使之越過其境固有罪矣若無城郭可為屏蔽無士卒可以拒敵而又無鄰境可以救援與其徒手以受害不若以計而援之不猶愈於坐致一郡之生靈之失其所乎此其失在於朝廷不在於州郡州郡之罪在未事之先而不在臨事之際夫受人牛羊為之牧而不為之閑校使為盜所竊則牧者不能無罪也責其不能為閑校之罪則可今盜來而彼能以計却之使牛羊不失而坐以失牛羊之罪則過矣臣謂州郡之罪在未事之先而不在臨事之際者此也雖然城池之不設兵卒之無額豈但州郡之罪哉而朝廷之上廟堂之尊亦當分其責焉臣請自今以後凡天下府州縣無城池當要害處即議與築城置軍其不可置軍處則令廵撫方面及守令計議或用民力或用官錢賃工以次第為之就用附郭市民免其雜差編為丁壯夫甲量為額數守之其餘州縣地狹而民少不可為城守者亦量與丁夫為守凡其所有倉庫錢糧甲仗俱寄郡庫犯罪重囚俱監郡獄有城池處如此則凡有官司皆有城守民有依附之所軍有禦備之具異時為冦所攻刼罪有所歸而彼亦無辭矣是雖一州一縣之事積而累之天下之大宗社之安未必不由此也為國家逺慮者所宜深致意焉蘇軾言于神宗曰臣前任密州建言自古河北與中原離合常係社稷存亡而東京之地所以漕輸河北缾竭則罍恥唇亡則齒寒而其民喜為盜賊為患最甚因為陛下畫所以待賊之䇿及移守徐州覽山川之形勢察其風俗之所上而考之於載籍然後又知徐州為南北之襟要而京東諸郡安危所係也臣觀其地三面被山獨其西平川數百里西走梁宋使楚人開闗而延敵材官騶發突騎雲從真若屋上建瓴水也地宜粟麥一熟而飽數嵗其城三面阻水樓堞之下以汴泗為池獨其南可通車馬而戲馬臺在焉其高十仞廣袤百歩若用武之世屯千人其上聚櫑木砲石戰守之具以為城相表裏而積三年糧於城中雖用十萬人不易取也其民皆長大膽力絶人喜為剽掠小不適意則有飛揚䟦扈之心非止為盜而已漢高祖沛人也項羽宿遷人也劉裕彭城人也朱全忠碭山人也皆在今徐州百里間其人以此自負凶桀之氣積以成俗魏太武以三十萬人攻彭城不能下而王智興以卒伍庸才恣雎於徐朝廷亦不能討豈非以其地形便利人卒勇悍故邪臣按彭城乃天下南北之要衝其形勢風俗物産蘇軾言盡之矣雖然漢唐都闗中此地在當時為逺郡宋都汴梁此地在當時為陪輔其在今日則在南北兩京之間運道所必經之地凡今天下十三藩其九藩皆由兹以北上南出數百里則為帝鄉興王之地祖宗陵寢所在闗係非但漢唐宋時比也臣於京輔屯兵條下請於此處立為大鎮命大將一員統領江淮上班官軍於此守鎮一以守䕶漕運一以屏蔽皇陵而於一方之盜賊亦藉是以鎮遏之則兩京有通融之勢萬里無隔絶之患而宗社之安如磐石之固矣徽宗宣和二年建徳軍青溪民方臘世居縣堨村托左道以惑衆縣境幇源諸峒山谷幽險臘有漆園造作局屢酷取之臘怨而未敢發時朱勔領應奉局于蘇花石之擾比屋致怨臘因民不忍隂聚貧乏游手之徒以誅勔為名起作亂自號聖公建年號置官吏將帥凡破六州五十二縣戕平民二百萬凡得官吏必㫁臠肢體探其肺腸或熬以膏油叢鏑亂射備盡楚毒以償怨心警奏至京師方聚兵以圖北伐王黼匿不以聞於是兇焰日熾附者益衆東南大震帝得疏始大驚乃罷北伐之議而以童貫為宣撫使譚正為兩浙制置使率禁旅及秦晉蕃漢兵十五萬討之貫至吳見民困花石之擾衆言賊不亟平坐此耳貫即承詔罷之吳民大悦臣按盜賊之起非假衆力不能以獨為也然人各一心心各一見而一旦欲使之同捐生以赴死夫豈易哉葢必有以激其怒而遂其欲不如此則怒不可解不如此則欲不得遂此其所以捐生以赴死而求其生於死之中將以泄其不平之氣而成其大欲之志也方臘之反見官吏即殺之備極慘毒蓋平日受其害欲報復之無由今故甘心焉夫官吏恣己私以害民而受其慘毒固其所也然亦有承上意循衆例心實有所不忍不得已而逭一時之責以為之者其罪亦當有所分哉柳宗元有言勢不同而理同嗚呼可不省哉可不念哉元順帝至正六年兩淮鹽運使宋文瓚言江隂通泰為江之門户而鎮江真州次之國初設萬户府以鎮其地今戍將非人致賊艦往來無常集慶花山賊凡三十六人官軍萬數不能進討反為所敗後竟假手鹽徒雖能成功豈不貽笑逺近宜亟選智勇以圖後功臣按自古盜賊為民害者莫如鹽徒蓋厚利所在人之所趨不顧死生者也惟其利重所以能致人死命彼盡命以致死而我用有生路之人以禦之此所以我衆雖多而不能制其少也此事闗係甚大夫國家之於鹽課葢衆利之中一利耳其利之有無皆不係於國之重輕其害之有無而國之治亂安危實繫焉是故逺而有唐一代之禍莫大於黄巢近而前元一代之禍莫大於張士誠巢與士誠皆鹽徒也為國家逺慮者尚預思有以消弭之毋蹈昔人之覆轍而使之至於無可奈何八年台州民方國珍為亂聚衆海上冦温州十一年命江浙左丞博囉特穆爾討之十二年復叛殺台布哈尋命納琳討之十三年從特哷特穆爾請授國珍以徽州路治中不受命十六年國珍復降以為海道漕運萬户未幾以為江浙行省叅政臣按先正有言元之失天下招安之説誤之也何則人君所以立國者以其有紀綱也所以振紀綱者以其有賞罰也賞必加於善刑必施諸惡使天下之人知所勸懲焉則治本立矣方國珍者當天下無事之時一旦敢為亂首以為天下先為元人計宜痛誅𠞰之以懲夫民之不逞者可也乃聽人言行招安之䇿不徒不加之以罪而又授之以官是以賞善之具以勸惡也由是羣不逞之徒紛然相倣效相誘脅事幸成或得以為王為伯不成亦不失州縣之官用是盜賊蜂起而元因是亡矣雖然豈但元哉宋人有詩云仕途捷徑無過賊將相竒謀只是招則其來逺矣然則國家不得已而當此時有此冦何以處之乎弭禍亂者必折其萌國家無事之時齊民無故首興禍亂要必合天下之力以攻之遏絶其萌使毋致於蔓衍決不可用招安之䇿也萬一不得已而用焉必播告之曰除首惡某一名不赦外自首名外其同黨有能自首及縛其人來者皆宥其罪量加以賞焉使一世之人皆知朝廷嚴首亂之誅的然不輕恕則禍亂之原塞矣元末盜賊蜂起有司不能制及發丁夫開河民心益愁怨思亂欒城人韓山童倡言天下大亂彌勒佛下生河南及江淮愚民翕然信之其黨劉福通等同起兵以紅巾為號既而山童就擒福通遂破潁州據朱臯攻羅山等縣陷汝寜光息等府州衆至十萬臣按承平之時國家有所征行戍守恒患士卒消耗軍伍空缺稍欲編民為兵恐其嗟怨或生他變不獨本兵者不敢主此議而建議者亦不敢啓此言夫何盜賊一起旬月之間即成千萬是何公為之甚難而私為之乃易易如此哉必有其故矣明明在上穆穆布列者請試思之以上論遏盜之機下臣按自古論盜賊者多矣惟宋秦觀之言最為切中機要謹備録之以為後世之鑑觀之言曰治平之世内無大臣擅權之患外無諸侯不服之憂其所事乎兵者敵國盜賊而已敵國之害士大夫講之詳論之熟矣至於盜賊之變則未嘗有言之者夫豈智之不及哉其意以為不足恤也天下之禍常生於不足恤昔秦既稱帝以為六國已亡海内無復足慮為秦患者獨匈奴耳於是使䝉恬北築長城却匈奴七百餘里而陳勝吳廣之亂乃起於行伍阡陌之間由此言之盜賊未嘗無也夫平盜賊與馭敵國之術異何則敵國之兵甲馬如雲矢石如雨牛羊槖駞轉輸不絶其人便習而整其器犀利而精故方其犯邊也利速戰以折其氣盜賊則不然險阻是憑鈔奪是資亡命是聚勝則烏合非有法制相縻敗則獸遯非有恩信相結然揭竿持梃郡縣之卒或不能制者人人有必死之心而已故方其羣起而速戰以折其氣勿迫以攜其心葢非速戰以折其氣則緩而勢縱非勿迫以攜其心則急而變生今夫虎之為物嘯則風生怒則百獸震恐其氣暴悍可殺而不可辱故捕虎之術必先設機穽旁置網罟撞以利㦸射以强弓鳴金鼔而乗之不旋踵而無虎矣至蛇與鼠則不然雖其毒足以害人而非有風生之勇其貪足以蠧物而非有震恐百獸之威然不可以驟而取者以其急則入於窟穴而已故捕蛇鼠之術必環其窟穴而伺之薫以艾注以水彼將無所得食而出焉則尺棰可以致其命夷狄者虎也盜賊者蛇鼠也虎不可以艾薫而水注蛇鼠不可以弓射而㦸撞故曰平盜賊與馭敵國之術異也雖然盜賊者平之非難絶之為難平而不絶其弊有二不可不知也葢招降與窮治是已夫患莫大於招降莫深於窮治凡盜賊之起必有梟桀而難制者追討之官素無竒畧不知計之所弭則往往招其渠帥而降之彼姦惡之民見其負罪者未必死也則曰與其俛首下氣以甘飢寒之辱孰若剽攘攻刼而不失爵位之榮由是言之是乃誘民以為亂也故曰患莫大於招降凡盜賊之首既已伏其辜矣而刀筆之吏不能長慮却顧簡節而疎目則往往窮支黨而治之迫脅之民見彼汚者必不免也則將曰與其嬰錮金木束手而就斃孰若逃遯山海脱身而求生由是言之是驅民以為亂也故曰禍莫深於窮治且王者所以感服天下者惠與威也仁及有罪則傷惠戮及不辜則損威威惠兩失而欲天下心畏而力服堯舜所不能也夏書曰殲厥渠魁脅從罔治舊染汚俗咸與維新葢渠魁盡殺而罔赦則足以奪姦雄之氣脅從汚染不治而許其自新則足以安反側之心夫如是天下之人孰肯捨生之塗而投必死之地哉嗚呼自古建平盜已亂之䇿莫有過於秦觀之論者其論三篇後篇即蘇軾代李琮所草之疏也國家為治誠能輕徭薄賦省刑戢吏遇有水旱即與賑濟自無盜賊之生發矣不幸而有焉方其初起未成之時即速與剪除不容少緩若其氣勢既成必須委曲計慮不可有輕之之心臣自出仕以來嘗三見反冦矣其初也皆以官軍輕之反為所敗資以器械甲兵其勢遂張大殆其後也復調官軍懲前日之敗往往持重堅守彼遂墮吾計中一舉而滅之此已然之明效也何則葢盜賊之初起也所以扇惑乎平民鼓動其惡黨者皆曰朝廷之政令不行衛所之官軍素怯城池之守備不固輙與之尅期曰某日攻某城又某日攻某城不旬月而吾之事成矣既而至期皆不應焉則衆見彼言之無驗謀之無效而知其事之決無成自然解體而散矣由是觀之秦觀所謂平盜賊與馭敵國之術異驗於臣之所見尤信大學衍義補卷一百三十八
