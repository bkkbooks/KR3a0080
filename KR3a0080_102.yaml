body:
  text: 大學衍義補卷一百二明丘濬撰治國平天下之要慎刑憲定律令之制上舜典曰象以典刑孔穎逹曰易云象也者像此者也又曰天垂象聖人則之是象為倣法故為法也依法用其常刑用之使不越法朱熹曰畫象而示民以墨劓剕宫大辟五等肉刑之常法也或問象以典刑如何為象曰此正言法象如懸象魏之象臣按吕刑曰蚩尤惟始作亂延及于平民罔不冦賊惟作五虐之刑則肉刑在蚩尤之世已有之非起自虞世也夏作禹刑湯制官刑儆于有位蔡沈曰官刑官府之刑也周禮正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日凡十日而斂之鄭𤣥曰象魏闕也魯災季桓子御公立于象魏之外命藏象魏曰舊章不可忘王昭禹曰刑雖先王原情以定罪因事以制刑亦當因時而為之變通量時而有輕重正月之吉布刑于邦國都鄙為是故也蓋先王之法若江河貴乎易避而難犯若匿為物而愚不識其陷於罪又從而刑之不㡬於罔民乎其使民觀象者亦使知所避而已臣按成周刑典之設旣布于邦國都鄙又縣之象魏惟恐民之不知而誤犯也夫設法令以待天下固將使民易避而難犯顧乃深藏於理官法家自典正職掌之官猶不能徧知其所有洞曉其所謂況愚夫細民哉閭閻之下望朝廷之禁憲如九地之於九天莫測其意嚮之所在及陷乎罪從而刑之是罔民也豈聖王同民出治之意乎是以周禮六官俱於正月之吉各布其典于象魏以示萬民其所示者有善有惡使之知所好惡惟刑典則示之以所禁使不犯焉士師之職掌國之五禁之法以左右助也刑罰一曰宫王宫禁二曰官官府禁三曰國城中禁四曰野郊野禁五曰軍軍旅禁皆以木鐸狥之于朝書而縣于門閭巷門曰閭鄭𤣥曰古之禁書亡矣今宫門有符籍官府有無故擅入城門野有田律軍有囂讙夜行之制賈公彦曰凡設五刑者刑期于無刑於刑外豫設禁禁民使其不犯於刑是左右助刑罰無使罪麗于民也臣按三代未有律之名而所謂禁者即是豫為法禁以制之於未然雖無律之名而律之意已具於此矣違乎禁則入於刑入於刑則犯於法犯於法則加以罰焉然非狥之以木鐸書之於門閭則蚩蚩蠢蠢之民何以知其為禁而不犯哉故以木鐸狥之於朝使之内有所聞以書而懸於門閭使之外有所見聞見於耳目之間警省於心思之内知所禁忌而不犯刑法所謂五禁之法左右乎刑罰豈不然哉以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于會同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙呉澂曰先後猶左右也以言折之曰誓若湯誓之類以言告之曰誥若康誥之類止使勿為曰禁察其有犯曰糾表而懸之曰憲以五戒左右其刑罰則無犯法之民矣臣按以五戒先後刑罰即唐宋之律而有名例職制敇令格式之意也蓋禁止使勿為施於未然之前戒敇其怠忽施於事為之際先之則引而導之使無進而麗於罰後之則柅而止之使無退而麗於刑聖人之心見於母之一言其慈愛過於父母其覆載同於天地掌士之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰撟邦令六曰為邦盜七曰為邦朋八曰為邦誣鄭衆曰八成者行事有八篇若今時決事比呉澂曰汋讀如斟酌之酌謂刺探邦之機密而泄於外者賊謂潜謀隂結將為逆亂者諜謂敵國行間覘伺虚實者令謂故恃傲狠以干號令者撟讀如矯詐之矯謂詐為符璽以行號令者盜謂竊取國之寳藏者朋謂私黨相阿使亂政者誣謂誣罔造妖以惑衆者臣按先儒謂官府之八成則其經治之成法也士師之八成則其正亂之成法也先王之時齊八政以防淫一道徳以同俗患夫姦人之為禍於邦家也且八成之法使士師掌之使其知有犯於此者必刑之而無赦制治於未亂保邦於未危所以防其芽蘖者豈不豫哉司刑掌五刑之法以麗附也萬民之罪墨墨刻顙而涅之罪五百劓割其鼻罪五百宫丈夫割勢女子幽閉罪五百刖截其足罪五百殺死也罪五百若司㓂斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重臣按五刑之名始見於虞書然未有其目也著其目始於此司刑所掌者以五刑之法麗民之罪司冦斷獄弊訟則詔之處其所應否或輕或重咸聽其所附麗焉司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之鄭𤣥曰此六約者諸侯以下至於民皆有焉劑謂劵書也呉澂曰約言語之約束也治者理其相抵冒上下之差也神約謂命祀郊社羣望及祖宗也民約謂征稅遷移及仇讎旣和之類也功約謂王功國功之屬爵賞所及也器約謂禮樂吉凶車服所得用也摯約謂玉帛禽鳥相與往來也臣按有約以結其信有劑以固其約謂之約劑則約而有其劑也司約掌邦國及萬民之約劑凡有六焉是六者朝廷皆為之約劑付司約掌之而屬於秋官焉先為之約劑使人知所守而有不如其約者則考其劵書以治之亦猶後世之格式也禁殺戮官名掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之鄭𤣥曰掌殺戮者禁民不得相殺戮司猶察此四者告於司冦罪之也斬殺戮謂吏民相斬相殺相戮者傷人見血見血乃為傷人耳呉澂曰攘獄謂罪人之刼獄者遏訟止遏民訟也臣按人君為生民之主必使之相安養以全其生彼其相斬相殺相戮及傷人見血而不以告則必殺傷人者之强衆而被殺傷者之寡弱也與夫獄已具而攘奪之訟將興而遏止之則民之情將鬱而不伸下之惡將長而益熾國之法將格而不行茍不設官以掌之使有如是者則以告之於其長則民寡弱者含寃而莫訴强衆者稔惡而不悛氣久鬱則無聊力不敵則捨死而亂由是生矣禁暴氏掌禁庶民之亂暴力正者矯誣犯禁者作言語而不信者以告而誅之鄭𤣥曰民之好為侵陵稱詐謾誕此三者亦刑所禁也力正者以力强得正也呉澂曰禁止也亂謂悖於人倫暴謂敢作威怒力正謂脅衆從己以邪為正也矯誣謂矯曲為直誣善為惡以冒犯禁也臣按成周之世未有律令之書凡秋官司冦所設之官屬所掌之刑禁凡所當禁約施行者即後世法律之條件也說者謂秋官自禁殺戮至脩閭氏八官皆㡬防盜賊姦軌者較之今律斬殺戮即今之人命律攘獄即今之刼囚律遏訟即今之告狀不受律姑舉一二餘可以類推矣兹不備載云吕刑曰墨罰之屬千劓罰之屬千剕刖足也罰之屬五百宫罰之屬三百大辟死刑之罰其屬二百五刑之屬三千上下比罪無僣亂辭勿用不行惟察惟法其審克之蔡沈曰三千總計之也周禮司刑所掌五刑之屬二千五百刑雖増舊然輕罪比舊為多而重罪比舊為減也比附也罪無正律則以上下刑而比附其罪也亂辭辭之不可聽者不行舊有是法而今不行者戒其無差誤於僣亂之辭弗用今所不行之法惟詳明法意而審克之也吕祖謙曰墨劓所増皆輕刑宮所損二百大辟所損三百皆重刑也剕無増損居輕重之間者也輕罪則多於前重罪則損於舊觀其目則哀矜之意固可見觀其凡則文勝俗弊亦可推矣陳大猷曰三千者法之正條載之刑書者也刑如律比如例法有限情無窮三千之屬衆矣猶不能盡天下之情罪以此知人情無窮而法不可獨任也旣無正律復僣亂而無定辭將安所據依乎且又有此例昔嘗有之而今不可行者矣必無差亂其辭而妄比附勿用今不可行之法而强比附如漢長安賈人與渾邪王市者罪當死凡五百餘人汲黯曰愚民安所知市賈長安中而文吏以為闌出財物如邊闗乎此類乃以不可行者比附也臣按先儒謂三千已定之法載之刑書者也天下之情無窮刑書所載有限不可以有限之法而盡無窮之情又在用法者斟酌損益之古者任人不任法法所載者任法法不載者參以人上下比罪是也以其罪而比附之上刑則見其重以其罪而比附之下刑則見其輕故於輕重之間裁酌之然必以辭為主辭若僣亂情與罪不相合是不可行者也當勿用其不可行之法惟當察其情求之法二者合而後允當乎人情法意是乃可行者也在審克之而已是說雖以解經然而萬世之下律文所不該載者比附之法莫切於此所謂察之情求之法比之上刑不重比之下刑不輕而參酌於輕重之間必允當乎人情法意可謂得審克之意矣春秋左氏傳昭公六年鄭人鑄刑書鑄刑書於鼎以為國之常法叔向使詒遺也子產書曰昔先王議事以制不為刑辟懼民之有爭心也民知有辟則不忌於上竝有爭心以徴於書而儌幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國制參辟鑄刑書將以靖民不亦難乎民知爭端矣將棄禮而徵於書錐刀之末將盡爭之亂獄滋豐賄賂竝行終子之世鄭其敗乎肸聞之國將亡必多制其此之謂乎杜預曰權移於法故民不畏上因危文以生爭緣儌幸以成其巧偽孔穎逹曰刑不可知威不可測則民畏上也今制法以定之勒鼎以示之民知在上者不敢越法以罪已又不能曲法以施恩則權柄移於法矣且法之設文有限民之犯罪無窮自然有危疑之理以生其與上爭罪之心緣儌幸以成其巧偽將有實罪而獲免者也夏商之末至有以私亂公以貨枉法其事不可復治乃逺取創業聖王當時所斷之獄因其故事制為定法至周之衰亦為刑書謂之九刑三辟謂禹刑湯刑九刑也辟罪也三者皆叔世所為不起於始盛之世為其文是制參辟勒於鼎是鑄刑書也子產亦采取上世之法斷獄善者制為法也今鑄鼎示民民知爭罪之本在於刑書將棄禮而取徵驗於書則雖刀錐微細之事亦將盡爭辨以求儌幸如此則紛亂之獄訟愈益豐盛或以賄賂文致人罪或以賄賂幸脫刑辟鄭國必有禍敗也昭公二十九年晉鑄刑鼎著范宣子所為刑書焉仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也今棄是度也而為刑鼎民在鼎矣孔穎逹曰范宣子制作刑書施於晉國自使朝廷承用未嘗宣示下民今荀寅謂宣子之書可為國法故鑄鼎而銘之以示百姓猶如鄭鑄刑鼎仲尼譏之其意與叔向譏子產同又曰子產鑄刑書而叔向責之趙鞅鑄刑鼎而仲尼譏之如此則刑之輕重不可使民知也而李悝作法蕭何造律頒於天下懸示兆民秦漢以來莫之能革不可一日無也蓋古者分地建國作邑命家諸侯則奕世相承大夫亦子孫不絶皆知國為吾土衆實我民自有愛吝之心不生殘賊之意故得設法以待刑臨事而議罪不須預以告民故仲尼叔向所以譏其鑄刑書也秦漢以來天下為一長吏以時遷代其民非復已有懦弱則為殿負强猛則為稱職且疆域闊逺戸口滋多大郡境餘千里上縣數以萬計豪横者陵蹈邦邑桀徤者雄張閭里酷吏專任刑誅或乃肆情好殺違衆用己至有積骸滿穽流血丹野若復信其殺伐任其縱舍必將喜怒變常愛憎改度不得不作法以齊之宣衆以令之所犯當條則斷之以律疑不能決則讞之上府故得萬民以察天下以治聖人制法非不善也古不可施於今今人所作非能聖也足以周於用所謂觀民設教遭時制宜謂此道也臣按鄭晉鑄刑書蓋以其前世所用以斷獄者之法比而鑄於器以示民於久逺也考周官司寇建三典正月之吉縣于象魏使萬民觀之浹旬而斂夫國之常刑而又歲歲布之于邦國都鄙何哉刑雖有常亦當量時而為之輕重然恐民之不知其所以然也故旣布其制又懸其象所以曉天下之人使其知朝廷原情以定罪因事以制刑其故如是也皆知所畏避而不敢犯焉非謂刑之輕重不可使人知也先儒謂詳左氏所載夫子之說第令守晉國舊法以為范宣子所為非善耳非謂聖王制法不可使人知也或曰鄭晉二國所謂刑書皆先世所有臨時處置者固已載於方策至是子産范鞅始鑄於器則為一定之制無復古人酌量之制故仲尼叔向譏之非謂刑書不可有特謂不可鑄耳後世以律令鋟於木以頒行天下其亦鑄之之意歟但是時未有律之名而謂之書耳魏文侯時李悝著法經六篇一盜法二賊法三囚法四捕法五雜法六具法臣按刑法之著為書始于此成周之時雖有禁法著于周官然皆官守之事分繋於其所職掌未有成書也然五刑之目其屬各有多少五等之刑各以類而相從焉著之篇章分其事類以為詮次則於此乎始焉漢高祖初入咸陽與民約法三章殺人者死傷人及盜抵罪餘悉除去秦苛法後以三章之法不足以禦姦遂令蕭何攟摭秦法定律令除參夷連坐之法増部主見知之條於李悝所造六篇益事律擅興廐庫三篇合為九篇叔孫通益律所不及傍章十八篇臣按律之名始見於此春秋之時子產所鑄者謂之刑書戰國之世李悝所著者謂之法經未以律為名也禮記雖有加地進律之文析言破律之誅解者謂進律為爵命之等破律雖以去律言然王制漢文帝時博士刺經所作固已出蕭何之後也律之言昉於虞書蓋度量衡受法於律積黍以盈無錙銖爽凡度之長短衡之輕重量之多寡莫不於此取正律以著法所以裁制羣情斷定諸罪亦猶六律正度量衡也故制刑之書以律名焉文帝元年詔曰法者治之正所以禁暴而衛善人也今犯法者已論而使無罪之父母妻子同產坐之及為收帑子也朕甚弗取其議除收帑諸相坐律令臣按虞廷罰不及嗣周室罪人不孥秦法一人有罪并坐其室家仁暴之心旣殊國祚所以有長短之異也文帝即位之初即除去秦人之苛刑漢祚之延㡬於三代未必不基於斯十三年下令曰蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三而姦不止其咎安在非乃朕徳薄而敎不明歟吾甚自愧故夫訓道不純而愚民陷焉詩曰愷悌君子民之父母今人有過教未施而刑已加焉或欲改行為善而道亡無因繇至朕甚憐之夫刑至斷支體刻肌膚終身不息生也何其刑之痛而不徳也豈為民父母之意其除肉刑有以易之及令罪人各以輕重不亡逃有年而免其不亡逃者滿其年數免為庶人具為令馬端臨曰古者五刑皆肉刑也孝文詔謂今有肉刑三而姦不止註謂黥劓斬趾三者遂以髠鉗代黥笞三百代劓笞五百代斬趾獨不及宫刑至景帝元年詔言孝文皇帝除宫刑出美人重絶人之世也則知文帝并宫刑除之至景帝中元年赦徒作陽陵者死罪欲腐者許之而武帝時李延年司馬遷張安世況賀皆坐腐刑則是因景帝中元年之後宫刑復用而以施之死罪之情輕者不常用也臣按後世以笞箠為刑始此夫三代以前所謂肉刑者墨劓剕宫大辟也至漢初僅有三焉黥劓斬趾而已文帝感淳于公少女緹縈之言始下詔除之遂以髠鉗代黥笞三百代劓笞五百代斬趾自是以來天下之人犯法者始免斷支體刻肌膚百世之下人得以全其身不絶其類者文帝之徳太矣以上論定律令之制上大學衍義補卷一百二
