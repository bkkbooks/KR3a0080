body:
  text: 大學衍義補卷一百十五明丘濬撰治國平天下之要嚴武備總論威武之道中曲禮曰班朝治軍涖官行法非禮威嚴不行吳澄曰班次朝儀各有位次整治軍伍各有部分臨涖官府各有職掌三者皆有法惟其有禮是以有威嚴而其法行臣按先儒謂威則人不敢犯嚴則人不敢違所以致其威嚴者禮而已矣是以朝廷之儀官府之治雖皆不可以無禮而于軍伍之法尤當以威嚴為尚然徒尚威嚴而不本于禮則所謂威者矯亢之容嚴者暴戾之氣也春狄隱公二年十有二月鄭人伐衛胡安國曰鄭人伐衛討滑之亂也凡兵聲罪致討曰伐潜師掠境曰侵兩兵相接曰戰繯其城邑曰圍造其國都曰入徙其朝市曰遷毁其宗廟社稷曰滅詭道而勝之曰敗悉虜而俘之曰取輕行而掩之曰襲已去而躡之曰追聚兵而守之曰戍以弱假强而能左右之曰以皆志其事實以明輕重征伐天子之大權今鄭無王命雖有言可執亦王法所禁况于修怨乎臣按征伐天子之大權非王命而自行是亂也春狄書鄭人伐衛入春秋以來列國興兵此其始也胡氏因其書伐推而詳之其用兵之名凡十有三曰伐曰侵曰戰曰圍曰入曰遷曰滅曰敗曰取曰襲曰追曰戍曰以以見用兵之事其事類名稱有不一如此者興師以討人之罪者必先審其大小逺近彊弱虛實以定其名然後隨其勢因其機而决其謀則收其萬全之效矣襄公十有一年春王正月作三軍胡安國曰三軍魯之舊也古者大國三軍次國二軍小國一軍魯矦封于曲阜地方數百里天下莫彊焉及僖公時能復周公之宇而史克作頌其詩曰公車千乘又曰公徒三萬故知三軍魯國之舊爾然車而謂之公車則臣下無私乘也徒而謂之公徒則臣下無私民也若有侵伐諸卿更帥以出事畢則將歸于朝車復于甸甲散于丘卒還于邑將皆公家之臣兵皆公家之衆不相繫也文宣以來政在私門廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣是以謂之作春秋書之以見昭公失國定公無正而兵權不可去公室有天下國家者之所宜鑒也臣按胡氏謂兵權不可去公室有天下國家宜以魯為鑒魯一國也尚不可失兵權而况天下之大者乎昭公十有一年夏四月楚子虔誘蔡矦般殺之於申楚公子棄疾帥師圍蔡胡安國曰楚子在申召蔡侯伏甲執而殺之楚子貶而稱名何也世子般殺其君諸侯與通會盟十有三年矣是中國變為夷狄而莫之覺也楚子若以大義倡天下奉詞致討執般于蔡討其弒父與君之罪而在宫在官者咸無赦焉殘其身瀦其宫室謀于蔡衆置君而去雖古之征暴亂者不越此矣又何惡乎今虔本心欲圖其國不為討賊舉也而又挾欺毁信重幣甘言詐誘其君執而殺之肆行無道貪得一時流毒于後棄疾以是殺戎蠻商鞅以是紿魏將秦人以是劫懷王傾危成俗天下大亂劉項之際死者十九聖人深惡楚虔而名之也其慮逺矣後世誅討亂臣者或畏其彊或幸其弱不以大義興師至用詭謀詐力僥幸勝之若事之捷反側皆懼茍其不捷適足長亂如代宗之圖思明憲宗之紿王辨昧于春秋垂戒之旨矣臣按春秋書此以見人君欲興師以除姦亂必審機宜時勢以伺間待時仗大義正言以聲罪致討而不用詭謀詐力以僥幸取勝胡氏所謂後世誅討亂臣者不以大義興師至用詭謀詐力僥幸勝之若事之捷反側皆懼茍其不捷適足長亂此數語者可以為世之人君誅亂臣安仄側者之鑑戒榖梁傳曰善為國者不師善師者不陳與陳同善陳者不戰善戰者不死善死者不亡范寧曰導之以德齊之以禮鄰國望我歡若親戚何師之為師衆素嚴不須耀軍列陳上兵伐謀何乃至陳軍陳嚴整敵望而畏之莫敢戰投兵勝地避實攻虛故無死者民盡其命無奔背散亡見危授命義存君親雖沒猶存也臣按古之聖王制治于未亂保邦于未危為國一以德禮而不専恃于兵未嘗無兵也而不用之於師旅雖用師旅之衆而不布於行陳雖有行陳之法而不施于戰鬬戰鬬有其備遇敵可以不死然卒不戰也死亡以其道雖死可以不亡然卒不死也說者以一言為一事而各援古人之事以實之臣不取焉左氏傳隱公十一年公㑹齊侯鄭伯伐許君子謂鄭莊公於是乎有禮禮經國家定社稷序人民利後嗣者也許無刑法也而伐之服而舍之度德而處之量力而行之相時而動無纍後人可謂知禮矣臣按鄭莊公㑹齊魯伐許既入許莊公命許大夫奉許叔君子謂其得伐叛討二存亡繼絶之禮所謂無刑而伐之服而舍之度德而處之量力而行之之三數言者誠得聖人制事待人之要而所謂相時而動無纍後人者其為慮周而謀逺尤可為世法者也息侯伐鄭鄭伯與戰于竟息師大敗而還君子是以知息之將亡也不度德不量力不親親鄭息同姓之國不徴辭不察有罪犯五不韙是也而以伐人其喪師也不亦宜乎隱公十一年杜預曰不徴辭謂言語相恨當明徴其辭以審曲直不宜輕鬬臣按韙之為言是也人之興師以伐人者皆見他人有不是之處耳反求諸已吾所行者亦有不是否乎茍有犯于不是者則亟止焉所謂是者理而已矣順理為是逆理為非如此是惟不動衆動則合天道是惟不伐人伐乃奉天討桓公十一年鬬廉曰師克在和不在衆臣按所謂和者即孟子地利不如人和之和莊公十年齊師伐我公將戰曹劌請見其鄉人曰肉食者謂在位者謀之又何間猶與也焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢専也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之臣按曹劌對魯莊公之言既得用兵之本復得用兵之法所謂小惠之未偏小信之未孚皆不可以戰惟察獄以其情是為盡心之忠如是而後可戰可謂得戰之本矣若夫三鼓則氣竭懼其有伏必其轍亂旗靡然後逐之可謂得戰之法矣其答鄉人之問而謂肉食者鄙不能逺謀是誠天下後世之通患也噫食人之祿而不能謀人之事其人固可鄙矣所以用其人而不知其人之可鄙者不亦可鄙之甚哉二十七年晉侯將伐虢士蒍曰不可虢公驕若驟得勝於我必棄其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也虢弗畜也亟戰將飢孔頴達曰禮樂慈愛謂國君教民民間有此四者畜聚此事然後可與人戰故云戰所畜也士蒍既言其目更以其義覆之禮尚謙讓讓事謂禮也樂以和親樂和謂樂也慈謂愛之深也愛親謂慈也愛極然後哀喪謂愛也民間有此四事然後可用以戰臣按春秋去古未逺故其論戰恆以民心為本後世則論敵情而已矣僖公十有九年宋人圍曹子魚言於宋公曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動林堯叟曰因壘而降壘石壘也言不增兵但因舊壘而崇自服臣按必德無闕而後可以伐人世主有欲興師以伐人者盍姑內自省曰吾之德有闕否乎若猶有闕方當修省之不暇幸人之不我伐也何可以伐人乎哉二十有二年宋公及楚人戰于泓宋人既成列楚人未既濟司馬請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列蘇軾曰古人有言圖王不成其弊猶足以霸襄公行王者之師猶足以當桓文之師一戰之餘救死扶傷不暇此獨妄庸耳齊桓晉文得管仲子犯以興襄公有一子魚不能用豈可同日而語哉自古失道之君如是者多矣死而論定未有如襄公之欺於後世者也吕祖謙曰說者以宋襄之敗為古道之纍是猶瞶者之誤評宫角遂欲并廢大樂豈不過甚矣哉或者又謂宋襄無帝王之德而欲效帝王之兵所以致敗亦非也使帝王之世人皆服其德則固不待於用兵矣德不能服是以有兵則兵者生于人之所不服也彼既不服矣豨縱豕突亦何所不至我乃欲從容揖遜以待之適遺之禽耳吾恐帝王之師不如是之拙也古之誓師曰殄殱乃讎曰取彼凶殘凛然未嘗有毫髮貸其所寬者惟弗迓克奔而已奔而歸我是以弗擊茍推鋒而與之爭一旦之命胡為而縱之哉是縱降者帝王之兵縱敵者宋襄之兵也烏可置之一域耶臣按宋襄公之敗公羊謂君子大其不鼓不成列臨大事而不忘大禮有君而無臣以為雖文王之戰亦不過此其言雖過然襄公之戰未必全非也但泥古而不通變是以取敗耳是故善學聖人者當師其心其心謂何仁義而已矣若其已然之迹不必拘拘然以步驟之也宣公四年公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮杜預曰責公不以禮治之而用伐臣按左氏論征伐率以禮為言可見惟禮可以已亂茍伐人之國而不以禮則是以亂平亂也十有二年晉師救鄭荀林父將中軍聞鄭既及楚平桓子即荀林父欲還曰無及于鄭而勦勞也民焉用之楚歸而動謂動兵伐鄭不後未為後時隨武子曰善會聞用師觀釁罪也而動德刑政事典禮不易不可敵也不為是征楚軍討鄭怒其二而哀其卑叛而伐之服而舍之德刑成矣伐叛刑也柔服德也二者立矣又曰德立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也孔頴達曰既言觀釁而動更說無釁之事德刑政事典禮此六事行之不變易者不可與之敵也聖王制征伐者為有罪者耳不為是六事不易行征伐也臣按此舉六事之目下文歷說楚不易六事以充之然是六者德刑其大者也德立刑行政成事時典從禮順六者為治之要也為國而有六者不可變易則在我者有不可敵之具而在人者無以敵我矣晉荀林父帥師及楚子戰于邲晉師敗績潘黨曰君指楚莊王盍築武軍築軍營以章武功而收晉尸以為京觀積尸封土其上臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武夫武禁暴武之一德戢兵二保大三定功四安民五和衆六豐財七者也故使子孫無忘其章著之篇章使子孫不忘今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無德而强爭諸侯何以和衆利人之幾危也而安人之亂以為已榮何以豐財武有七德我無一焉何以示子孫十二年臣按武有七德楚子之言必有所本蓋古語也使凡天下之興兵動衆者皆必本于禁暴戢兵保大定功安民和衆豐財焉非此七者不舉則天下之人惟恐上之不用武師旅所至民望之真如大旱之得雲霓矣成公十三年劉子曰國之大事在祀與戎祀有執膰戎有受脹臣按祀所以交神明戎所以衛國家此二者國之大事也十有六年楚子救鄭子反入見申叔時曰師其何如對曰德刑詳與祥同義禮信戰之器也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正用利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我蒸民莫匪爾極是以神降之福時無災害民生敦厚也龎大也和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚內棄其民謂不施惠而外絶其好謂不建利瀆齊盟謂不祀神而食話言謂不守物姦時以動謂不順時而疲民以逞民不知信進退罪也人恤所底至也其誰致死孔頴達曰叔時此對首尾相成先舉六名云戰之器也言有此六事乃可戰若器用然也臣按春秋之時先王禮義之澤猶存故論兵者猶知以德義為言後世則舍德義而惟論兵甲士馬之多寡强弱其戰則同而所以為戰則不同也此無他其器異也其器既異故其用亦各不同范文子曰唯聖人能外內無患自非聖人外寧必有內憂盍釋楚以為外懼乎十六年臣按范文子此言即孟子出則無敵國外患者國恆亡之意也蓋中人之性有所警斯有所懼有所懼斯能自省知所以省則不敢縱肆而國可保矣襄公二十七年宋左師請賞公與之邑子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生則滅所以亡也天生五材謂金木水火土民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興亂人以廢廢興存亡昏明之術皆兵之由也而子求去之不亦誣乎林堯叟曰宋向戌以弭兵之功欲宋君加以厚賞宋君欲賞之邑以示子罕子罕謂凡諸侯之與小國晉楚所以用兵而威服之有所畏懼而後大小上下慈愛而和順慈愛和順而後國家賴以安靖以聽大國之政令此其所以常安存也無威則驕縱易生驕縱則禍亂必至禍亂則滅亡隨之此小大所以至滅亡也天生金木水火土之五材天下之民並舉而用之五者不可闕一兵是五材之金豈可去哉古人設兵其來已久所以威服不遵軌法之徒而昭明國家文德之盛湯武弔民伐罪以兵威而興桀紂身弒國亡以兵威而廢蓋明君善于用兵則以之而興以之而存術之善也昏主不善用兵則以之而廢以之而亡術之不善也所以然者皆由用兵而致而向戌求去兵以安諸候不亦誣罔之甚乎臣按國有六典而不可無兵猶天有五材而不可以無金也蓋立國有文必有武施治有賞必有罰徒有文而無武則威不立而國勢弱有賞而無罰則法不行而人心縱昭公十一年楚子城陳蔡不羮地名使棄疾為蔡公王問于申無宇對曰擇子莫如父擇臣莫如君鄭莊公城櫟而置子元焉使昭公不立齊桓公城榖而置管仲焉至于今賴之臣聞五大不在邉五細不在庭親不在外羇不在內今棄疾在外鄭丹在內君其少戒王曰國有大臣何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子游在莊十二年齊渠丘實殺無知在莊九年衛蒲戚實出獻公在襄四年若由是觀之則害於國末大必折尾大不掉君所知也杜預曰五大言五官之長専盛過節則不可居邉細弱不勝任亦不可居朝廷孔頴達曰宋殺子游齊殺無知乃是賴大邑以討篡賊而謂之害于國者以其能専廢置則是國害天子之建諸侯欲令蕃屏王室諸侯之有城邑欲令指揮從已不得使下邑制國都故大城為國害也末大必折以樹木喻也尾大不掉以畜獸喻也臣按末大必折尾大不掉此二喻實為切要人君之治國必居重馭輕必以大制小則上下之勢順小大之分定如心之使臂臂之使指非獨上安其位而下之人亦不敢萌非望拒成命矣考之楚語有曰公制城邑若體牲焉有首領股肱以至于拇指毛脉大能掉小故變而不勤夫邉境者國之尾也譬之于牛馬處暑之既至虻䗸之既多而不掉其尾臣懼之此譬尤為詳盡謀人國而慮及逺者尚其圖之哀公元年吳師在陳楚大夫皆懼曰闔廬惟能用其民以敗我于柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇器不彤鏤宫室不觀臺榭也舟車不飾衣服財用擇不取費不尚細靡在國天有葘厲親巡其孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乘與焉勤恤其民而與之勞逸是以民不罷勞死知不曠棄也吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讎而用之日新夫先自敗也已安能敗我臣按楚子西之料吳也不料其地土之廣狹車徒之多寡士卒之强弱甲兵之利鈍惟以君之所修所為者以占其勝負焉然則有國家者所以彊兵之要孰有先于修為者哉治兵者次之七年季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保于城城保于德失二德者危將焉保臣按景伯言民保于城城保于德所謂德者信與仁而已國有大小皆能潔矩而以忠恕為心所惡於下毋以事上所惡于上毋以使下又安有爭鬬侵奪之患哉國語穆王將征犬戎祭公謀父諌曰不可先王耀明也德不觀示也兵夫兵戢聚也而時動動則威觀則玩黷也玩則無震懼也先王之于民也茂勉也正其德而厚其性阜大也其財求不鄣擁也而利其器兵甲也用耒耜之屬明利害之鄉方也以文修之使務利而避害懷德而畏威故能保世以滋大武王昭前之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡于民庶民弗忍欣戴武王以致戎兵也于商牧牧野是先王非務武也勤恤民隱痛也而除其害也先王之訓也有不祭則修意修志意以自責有不祀則修言號令有不享則修文典法有不貢則修名尊卑職貢之名號有不王則修德文德序成謂上五者次序也而有不至則修刑於是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又不至則又增修於德無勤民于逺是以近無不聽逺無不服犬戎氏以其職來王天子曰豫必以不享征之且觀之兵其乃無廢先王之訓乎王襄王至自鄭以陽樊賜晉文公陽人不服晉侯圍之倉葛曰武不可覿見也文不可匿隱也覿武無烈匿文不昭胡安國曰古者覿文匿武修其訓典序成而不至于是乎有攻伐之兵臣按此先王惟耀德而不觀兵有不服者必先布威讓之令陳文告之辭而又不至焉亦惟增修其德而已不勤兵于逺也所以然者豈非文不可覿武不可匿不當尚武隱文乎衛靈公問陳軍師行伍之列於孔子孔子對曰爼豆禮器之事則嘗聞之矣軍旅之事未之學也尹焞曰衛靈公無道之君也復有志于戰伐之事故答以未學而去之張栻曰春秋之時諸國以强弱為勝負軍旅之事宜在所先而爼豆之事宜若不急者矣曽不知國之所以為國者以夫天叙天秩者實維持之也為國者志存乎典禮則孝順和睦之風興叶力一心尊君親上其彊孰禦焉不然三綱淪廢人有離心國誰與立軍旅雖精果何所用哉爼豆之于禮教猶陳之于軍旅實理之所寓而教之所由興也使靈公而有志乎爼豆之間則推而達之必有不可已也黃幹曰夫子對靈公以軍旅之事未之學答孔文子以甲兵之事未之聞及觀夾谷之會則以兵加萊人而齊侯懼費人之亂則命將士以伐之而費人北又嘗曰我戰則克夫子豈有未學未聞者哉特以軍旅之事非所以為訓耳臣按文武非二道益之贊堯曰乃武乃文孔子道全德備固無所不能亦豈有不知也哉而曰未學蓋以戰國之世相尚以武而不尚文列國君臣知有軍旅而不知有爼豆况其所謂武者以權謀譎詐相尚窮兵耗財而毒及于生民輕敵寡謀而禍延其宗社故因衛君之問陳而答之以未學蓋不待學亦不屑學也孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出朱熹曰先王之制諸侯不得變禮樂專征伐張栻曰禮樂征伐天子之事也天下有道則禮樂征伐自天子出矣蓋天子得其道則權綱在已而在下莫敢干之也所謂自天子出者天子亦豈敢以已意可專而以私意加于其間哉亦曰奉天理而已矣此之謂得其道若上失其道則綱維解紐而諸侯得以竊乘之禮樂征伐將専行而莫顧矣臣按先儒謂先王之時五禮六樂掌之宗伯九伐之法掌之司馬禮樂征伐之權在上而下莫敢干也周室之衰夷王下堂而見諸侯而魯之三家以雍徹而八佾舞于季氏之庭其禮樂之權已失是以列國紛爭干戈日以相尋訖無寧嵗天下無道至是極矣聖人言此以示訓于萬世使居人上者恆以道自居謹身正法必使權綱在已而威福不至于下移則禮樂征伐咸自已出而為有道之世矣以上總論威武之道中大學衍義補卷一百十五
