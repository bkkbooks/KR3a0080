body:
  text: 大學衍義補卷八十二明丘濬撰治國平天下之要崇教化廣教化以變俗周書君陳篇王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寬而有制從容以和吕祖謙曰周公之訓大矣猶欲𢎞之者繼前人之政茍止以持循因襲為心其所成必降前人數等惟奮然開拓期以光大前業然後僅能不替蓋造始之與繼成其力量不同也和中之時大體固當寬茍無制則流蕩放肆安能從容以和乎馴擾調娛於品制之中游息化養於範圍之內斯其所以和也蔡沈曰君陳何至依勢以為威倚法以侵削者然勢我所有也法我所用也喜怒豫奪毫髮不於人而於己是私意也非公理也安得不作威以削乎君陳之世當寬和之世也然寬不可一於寬必寬而有其制和不可一於和必從容以和之臣按先儒謂周公遷殷頑民於下都周公親自監之周公既沒成王命君陳代周公此其䇿命之辭夫周公之毖殷頑民而君陳繼其後民習之頑獷者至是稍馴擾矣故成王戒其無以法制以行刻削之政尚存寬典以布和厚之仁庶幾其從吾之化以變其舊俗也又曰爾無忿疾于頑無求備于一夫必有忍其乃有濟有容德乃大簡厥修亦簡其或不修進厥良以率其或不良蔡沈曰無忿疾人之所未化無求備人之所不能忍言事容言德侯甫曰無忿疾于頑有忍者也無求備于一夫有容者也王安石曰修謂其職業良謂其行義職業有修與不修當簡而别之則人勸功進行義之良者以率其不良則人勵行臣按民之為民有修者亦有不修者有良者亦有不良者修者簡别之不使與不修者混不修者亦簡别之不使與修者雜既簡别之如此然後於中冀其能修而至於良善者進用之而不良者知所愧慕亦必修飭而至於良善是進厥良所以率其不良者也先儒謂頑不率教者不可忿疾之率教者亦當奬拔之然不可以求備必有忍至德乃大即無忿疾于頑之意簡厥修至率其或不良即無求備之意此數言者雖成王為君陳治殷民而言是誠萬世人君命官化民之要道也畢命王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既歷三紀十二年曰紀世父子曰世變風移四方無虞豫一人以寧蔡沈曰畢公代周公為太師也文王武王布大德于天下用能受殷之命言得之之難也周公左右文武成王安定國家謹毖頑民遷于洛邑密近王室用化其教既歷三紀世已變而風始移今四方無可虞度之事而豫一人以寧言化之之難也臣按以周公之元聖輔佐文武之聖成王之賢而一殷民在京邑之近而又繼之以君陳以和其中歷三十六年之久世已變矣而後其風始移焉由是觀之民之難化可知矣然殷民在洛邑密邇王室其無虞度之事而曰四方者蓋一肢有疾而渾身為之不寧一處有事而四方為之騷擾人君以一人之身而居四方之中四方之中茍一處之有事而四方咸為之劻勷矣民既不寧君身安得寧乎此古之明君必擇賢臣而付以保釐之任國之賢臣必體君心而盡其謹毖之心有由然也又曰政貴有恆辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉我聞曰世祿之家鮮克由禮以蕩陵德實悖天道敝化奢麗萬世同流兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜誇將由惡終雖收放心間之惟艱蔡沈曰對暫之謂恆對常之謂異趣完具而己之謂體衆體所㑹之謂要政事純一辭令簡實深戒作聰明趨浮末好異之事古人論世祿之家逸樂豢養其能由禮者鮮矣既不由禮則心無所制肆其驕蕩陵蔑有德悖亂天道敝壞風化奢侈美麗萬世同一流也康王將言殷士怙侈滅義之惡故先取古人論世族者發之吕祖謙曰殷士慿藉光寵助發其私欲者有自來矣私欲公義相為消長故怙侈必至滅義義滅則無復羞惡之端徒以服飾之美誇之於人而身之不美則莫之恥也流而不返驕淫矜誇百邪並見將以惡終矣洛邑之遷式化厥訓雖已收其放心而其所以防間其邪者猶甚難也臣按先儒有言人之心莫難收於己放之時尤莫難間於既收之後茍其根尚在雖一時之所收斂將觸事而發此間之所以為難也由是以觀則殷人之病根已在膏肓矣欲去其根有非法令之所能禁遏必推原其病根之所以生而求其對病之藥以蕩滌之調攝之保養之然後其根可以拔去而永無萌蘖之生矣所謂對病之藥在有恆之政體要之辭而所以調攝之者則在復其所弗克由之禮焉若夫保養其天和之妙劑則下文所謂惟德惟義是已又曰資資財也富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥德允修蔡沈曰言殷士不可不訓之也資富而能訓則心不遷於外物而可全其性命之正也然訓非外立教條也惟德惟義而己德者心之理義者理之宜也德義人所同有也惟德義以為訓是乃天下之大訓然訓非可以己私言也當稽古以為之說蓋善無證則民不從不由古以為訓于何以為訓乎又曰是時四方無虞矣蕞爾殷民化訓三紀之餘亦何足慮而康王拳拳以邦之安危惟繫於此其不茍於小成者如此文武周公之澤其深長也宜哉不剛所以保之不柔所以釐之不剛不柔其德信乎其修矣陳經曰禮義生於富足既富以養其身又訓以養其心全正性所以順正命此所以永年也所謂能訓豈外人心天理而他有所謂訓哉德者人心之所得義者人心之所宜根于人心之所同然此之謂大訓古訓所載亦惟德義而已即人心之所同然而證之古所已然非德義之外有古訓也畢公之化本諸同然而民易從參諸己然而民易信間之之道孰過於此君陳尚有辟以止辟三細不宥之說此篇雖歷數商俗之不美然惟務區别以生其愧教訓以導其善無片言及於刑蓋純以德化而刑措不用信矣吕祖謙曰始皇以安危繫於胸奴而急之以剛德宗以安危繫於藩鎮而緩之以柔皆以致亂臣按畢命一篇可見周家以仁厚立國而慮患之逺愛民之深其制事也既得寬猛之宜而其處民也又得剛柔之中所以使其民得以順其性命之正而全其義理之天向之驕蕩悖亂者皆克由禮心之放者既間義之滅者復存惡不終于惡而復全其本初之善矣所以然者一由其以古訓而為訓也是知化民變俗之良法要道莫先於古訓古人往矣而其訓戒之辭則具載於經籍之中是以善於為治者知古訓為出治之大本化民之大機設小學以古訓而啓其蒙開大學以古訓而明其論頒布經書俾其讀誦設立師儒為之講解責任守令為之提督無一處而不立古人之學無一人而不讀古人之書無一家而不行古人之禮如此則普天之下雖三家之市八口之家五尺之童皆知德義可尊禮教可尚夫然而姦頑之不化習俗之不美治道之不隆盛運祚之不靈長萬無此理也鄭子産為政於鄭都鄙有章上下有服田有封洫廬井有伍人之忠儉者從而與之泰侈者因而斃之一年豎子不戲狎斑白不提挈童子不犂畔二年市不豫價三年門不夜閉道不拾遺四年田器不歸五年士無尺籍喪期不令而治輿人誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之臣按子産為政而為其民殖田疇誨子弟可謂教養兼舉矣漢文帝時賈誼上疏曰夫移風易俗使天下回心而鄉與嚮同道類非俗吏之所能為也俗吏之所務在於刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之豈如今定經制令君君臣臣上下有差父子六親各得其宜此業一定世世常安而後有所持循矣若夫經制不定是猶度江河亡無同維楫維以繫船楫以制船中流而遇風波船必覆矣臣按為治而不定經制是猶度江河而無維楫船而無維楫則船必覆國而無經制則國必亂經者百世之常道制者一時之成法有常道以為持循之本有成法以為持循之具是則為治之大體非通儒者不能知也俗吏何足知此哉武帝時嚴安上書曰今天下人民用財侈靡車馬衣裘宫室皆競修飾調五聲使有節族雜五色使有文章重五味方丈於前以觀欲天下觀示之使其慕欲也彼民之情見美則願之是教民以侈也臣願為民制度以防其淫使貧富不相耀以和其心心既和平則盜賊消刑罰少隂陽和風雨時五榖蕃熟民不天厲也臣按人民所以侈靡者多見於車馬衣裘宫室飲食四者誠能立為制度凡所乘之車馬所居之宫室所服之衣裘所用之飲食皆有階級等第上得以兼下下不得以僭上使官民上下得於見聞者熟則其存於心志者定心志既定則有餘者不敢恣為於己不及者不敢慕欲於人衆心安定家給人足而教化行矣文翁為蜀郡守仁愛好教化見蜀地僻陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有才者親自飭厲遣詣京師受業博士數嵗皆成就還歸文翁以為右職又修起學宫於成都市中招下縣子弟為學官弟子為除更繇髙者以補郡縣吏次為孝弟力田吏民榮之數年爭欲為學官弟子富人至出錢以求之繇是大化蜀郡學者比齊魯焉臣按天下之風俗未必皆美也人君之教化未必皆及也蓋輿圖之廣廣谷大川異制民生其間異俗人君一人不能一一躬歷之而其所為條教又未必皆能一一如其俗是以有賴於承流宣化之吏隨其地因其俗以倡率教導之若文翁之治蜀者是己是故人君之治莫大於崇教化欲崇教化莫先於學古訓欲民之學古訓則在乎立學校焉學校既立有師儒以為之指教有經書以為之準則俾知善之當為惡之不當為欣然以從翕然以化皆革其舊染之俗而興禮義之風此誠人君治平之本而良二千石之任也韓延夀為潁川大守潁川多豪彊難治延夀欲教以禮讓恐百姓不從乃歷召郡中長老為向鄉里所信者數千人設酒具食親與相對接以禮意人人問以謡俗民所疾苦為陳和睦親愛銷除怨咎之路長老皆以為便因與議定嫁娶喪祭儀品略依古禮不得過法又令文學校官諸生皮辨執爼豆為吏民行喪祭嫁娶禮百姓遵用其教後入守左馮翊恩信周遍二十四縣莫敢以詞訟自言者臣按延夀與民議定嫁娶喪祭儀品略依古禮不得過法此誠得化民之本原蓋民之所以貧窘而流於邪淫其原皆出於昏嫁喪祭之無其制婚嫁喪祭民生之不能無者民間一遇昏嫁喪祭富者傾資以為觀美貧者質貸以相企效流俗之相尚邪說之眩惑遂至破産而流於荒淫邪誕之域因而起爭訟致禍亂者亦或有之漢之時異端之教猶未甚熾今去其時千年矣世變愈下而佛道二教大為斯民之蠧惑非明古禮以正人心息邪說則民財愈匱而民性愈蕩矣幸而有朱氏家禮一書簡易可行乞敕有司凡民間有冠昏喪祭一依此禮以行有不行者以違制論其守令上計課以教民行古禮為最此無可書雖有他最亦不在升舉之列如此則禮教行而民俗美化民成俗之教莫大於此黃霸為潁川太守為條教置父老師帥伍長班行之於民間勸以為善防姦之意霸力行教化而後誅罰務在成就全安長吏凡治道去其泰甚者爾以外寬內明得吏民心治為天下第一天子下詔稱揚曰潁川太守霸宣布詔令百姓鄉化孝子弟弟貞婦順孫日以衆多田者讓畔道不拾遺養視鰥寡贍助貧窮獄或八年亡重罪囚吏民鄉于教化興於行誼可謂賢人君子矣書不云乎股肱良哉其賜爵關內侯黃金百斤秩中二千石而潁川孝弟有行義民三老力田皆以差賜爵及帛後數月徴霸為太子太傅遷御史大夫臣按人君欲其政教之行於天下非得循良之臣承流而宣化於下其勢不能以遍及也漢宣帝垂意於治數下恩澤詔書吏不奉宣霸為選擇良吏分部宣布詔令令民咸知上意然後為條教班行民間民知太守之條教皆承天子之意故易於信從及其教化既行天子聞之又日詔以稱揚之首曰宣布詔令百姓嚮化而歷數其政績之美且賜爵及金并推及其郡民之賢者嗚呼漢去三代未逺其君之求治臣之為治皆有古遺意後世則惟以簿書財賦為急未聞有及教化者矣雖有其言亦無其實為吏者固不暇於教化萬有一焉不罹於文法幸矣况望增秩賜金徴入朝以為顯官哉後世有志於教化之君其尚以宣帝為法有志於教化之吏其尚以黃霸為法卓茂為密令勞心諄諄視民如子舉善而教口無惡言吏人親愛而不忍欺之人有言亭長受其米肉遺者茂問之知其自以恩意遺之非從其求謂之曰人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚故饋遺此乃人道所以相親况吏與民乎吏顧不當乘威力彊請求耳凡人之生羣居雜處故有經紀禮義以相交接亭長素善吏嵗時遺之禮也人曰茍如此律何故禁之茂曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝汝何所措其手足乎一門之內小者可論大者可殺也且歸念之於是人納其訓吏懷其恩數年教化大行道不拾遺臣按卓茂所謂律設大法禮順人情專以禮教民而不以法治真古所謂循良之吏使天下郡縣皆得若人而治之而知所緩急輕重則天下日底於治平矣魯恭為中牟令專以德化為理不任刑罰邑人許伯等爭田纍守令不能决恭為平理曲直皆退而自責輟耕相讓臣按教化之所以不行者以利心勝而義心微也民間之訟多起於財産兄弟以之而相䦧骨肉以之而相殘皆自此始也為守令者茍能為民分理而使之均平則詞訟不興人和而俗厚矣教化其有不行也哉秦彭遷山陽太守以禮訓人不任刑罰崇好儒雅敦明庠序每春秋饗射輒修升降揖遜之儀乃為人設四誡以定六親長幼之禮有遵奉教化者擢為鄉三老常以八月致酒肉以勸勉之吏有過咎罷遣而己不加恥辱百姓懷愛莫有欺犯後轉潁川太守肅宗巡幸再幸潁川輒賞賜恩寵甚厚許荆為桂陽太守郡濵南州風俗脆薄不識學義荆為設喪紀昏姻制度使知禮禁嘗行春到耒陽縣民有蔣均者兄弟爭財互相言訟荆對之歎曰吾荷國重任而教化不行咎在太守乃顧使吏上書陳狀乞詣廷尉均兄弟感悟各求受罪在任十二年父老稱歌徴拜諫議大夫臣按荆以郡民兄弟相爭訟為教化不行而任咎於己且至上書言狀乞詣廷尉然非其平昔設為喪紀昏姻制度使民知禮禁而遽然而為此舉則是矯激好名非真實也君子所不貴仇覽為遂亭長勸人生業為制科令至於果菜為限雞豕有數農事既畢乃令子弟羣居還就黌學其以輕游恣者皆役以田桑嚴設科罰躬助喪事賑恤窮寡朞年稱大化覽初到亭人有陳元者獨與母居而母詣覽告元不孝覽驚曰吾近日過元舍廬落整頓耕耘以時此非惡人當是教化未至耳母守寡養孤苦身投老奈何肆忿於一朝欲致子以不義乎母聞感悔涕泣而去覽乃親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子臣按仇覽一亭長耳視今鄉老里長之役而乃能以教化化民為事况受天子千里百里之寄者乎使普天之下大而一郡次而一邑下而至於閭里之間凡為民之長者皆能以教化為務天下有不平治者哉吳祐遷膠東相政惟仁簡以身率物民有相爭訴者輒閉閣自責然後科行所訟以道譬之或身到閭里重相和解自是爭訟省息吏民不欺任延為九真太守駱越之民無嫁娶禮法延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸祿以賑助之同時娶者二千餘人是嵗風雨順節穀稼豐衍吏民為立祠後拜武威太守首除暴害吏民纍息即造立學宫自掾吏子孫皆令詣學受業復其徭役章句既通悉顯拔榮進之郡遂有儒雅之士齊蘇瓊為南清河太守有百姓乙普明兄弟爭田積年不斷各相援據乃至百人瓊召普明兄弟諭之曰天下難得者兄弟易求者田地假令得田地失兄弟心如何因而下淚諸證人莫不灑泣普明兄弟叩頭乞外更思分異十年遂同住後魏封回為安州刺史山民願朴父子賔旅同寢一室回下車勸令别處其俗遂改臣按今所謂中州之域漸染山民之俗其為治化之纍大矣請痛禁之清河王勵為楚州刺史城北有伍子胥廟其俗敬鬼祈禱者必以牛酒至破産業勵嘆曰子胥賢者豈宜損百姓乃告諭所部自此遂止臣按鬼神無處無之民之祀神雖其俗尚之失然亦足以見鬼神之理自然感通之妙但不可破資産以備牲牢耳宜為明禁惟許以雞鶩羔豚有以牛祭者罪坐其師巫蓋民愚而惑茍有疾厄必事祈禱雖冒禁犯罪不顧也惟禁其惑誘之人則自然止息隋梁彥光為相州刺史時人情險詖妄起風謡彥光欲革其弊用秩俸招致山東大儒每鄉立學非聖哲之業不得教授常以季月召集親臨䇿試有勤學異等聰明有聞者升堂設饌其餘並坐廊下有好爭訟惰業無成者坐之庭中設以草具及大比當舉行賔貢之禮祖送郊外資以財物於是人皆勸勵風俗大改唐髙士廉為益州長史蜀土俗薄畏鬼而惡疾父母病危殆不躬扶持杖頭掛食遙以哺之兄弟異財罕通假借士廉隨力勸誘有不悛者親率官吏詣門勸諭由是一里翕然多為孝弟兼命儒生講論墳典勉勵後進教化復興韓愈為潮州刺史下牒請置鄉校云孔子曰道之以政齊之以刑民免而無恥不如以德禮為先而輔以政刑也欲用德禮未有不由學校師弟子者此州學廢日久進士明經百十年間不聞有業成貢于王庭試於有司者人吏目不識鄉飲酒之禮耳未嘗聞鹿鳴之歌忠孝之行不勸亦縣之恥也夫十室之邑必有忠信今此州戶萬有餘豈無庶民者耶刺史縣令不躬為之師里閭後生無所從學爾趙德秀才沉雅專靜頗通經有文章能知先王之道論說且排異端而宗孔氏可以為師矣請攝海陽縣尉為衙推官專勾當州學以督生徒興愷悌之風刺史出己俸百千以為舉本收其贏餘以給學生厨饌自此潮人日趣文學立祠祀之至今常袞為福建觀察使設立鄉校使學者作為文章親加講導與為客主均禮觀游宴饗與焉由是風俗一變嵗得貢士甚盛後袞卒閩人以袞配享于學宫宋韓琦知并州河東俗雜羌夷用火葬琦為買田封表刻石著令使得葬於其中人遂以焚尸為恥臣按自古中國無焚尸之俗至佛氏自西域入中國始有之為人子者乃忍其親之體魄付之烈焰不孝之罪莫大焉琦為郡獨能禁之今此風猶存民習成俗非嚴刑痛禁之不能止請著為令有犯禁者以毁傷父母律問罪并坐其舉火之人是亦崇孝道美風俗之一端陳襄為仙居令民不知教襄於正嵗耆老來賀作文一篇曰為吾民者父義母慈兄友弟恭子孝夫婦有恩男女有别子弟有學鄉閭有禮貧窮患難親戚相救昏姻死喪鄰保相助無墮農業無作盜賊無學賭博無好爭訟無以惡陵善無以富吞貧行者讓路耕者讓畔班白者不負戴於道路則為禮義之俗矣使門人讀於庭且諭之曰吾秩滿即去爾有子弟亟遣就學於是耆老相語感德嘆嗟翕然從之學者興起程皓為晋城令民以事至邑者必告之以孝弟忠信度鄉村逺近為保伍使之力役相助患難相恤孤㷀殘廢者責之親黨使無失所行旅出其途者疾病皆有所養諸鄉皆有校暇時親召父老與之語兒童所讀書為正其句讀教者不善則為易置俗始甚野不知為學乃擇子弟之秀者聚而教之鄉民為社㑹為立科條旌别善惡使有勸有恥在縣三嵗民愛之如父母臣按程皓在晋城僅三年耳而其德教有如此者使之久於其任必大有所成就今守令以九年為滿朝廷茍責之以成效其間必有超出倫類而能以明道之德教為治者治平之基端在于此朱熹知漳州以習俗未知禮采古喪葬嫁娶之儀揭以示之命父老解說以教子弟土俗崇信釋氏男女聚僧廬為傳經㑹女不嫁者為庵舍以居熹悉禁之臣按朱熹在漳州首以禮教化俗今其所著家禮我太宗皇帝已表章頒布天下請命有司舉行并命提學憲臣督視有不奉行者問以違制之罪如此則禮教興行而異端不待禁革自然廢息余仲寬宰劍之順昌時閩俗生子多者至三四子則後皆不舉為其資産不足以贍也若女則不待三往往溺之建劍尤甚仲寬乃作戒殺子文召諸鄉父老為人信服者列坐廡下以俸置醪醴親酌飲之出其文使歸勸其鄉人無得殺子嵗月間活者以千計轉運判官曹輔上其事朝廷嘉之就改仲寬一官仍令再任復為立法推行一路臣按溺子之俗至今浙東為甚請自今有除為浙東守令者考滿上課必書云自到任之後民並無溺子者如有不實坐降一級如此則民間舉子必多戶口日增是亦仁政之大端也以上廣教化以變俗臣按治者君也所以為治者民也推君之治而致之民者吏也治道有二曰政曰教政以法令行之也易教以道義行之也難教之本雖在於人君正身齊家以為感化之機然地非一方而遐外者未易以遍逹人非一類而踈逺者未易以遽及是故明君在上知教化為治道之急務則必設學校明禮義立條教以曉諭而引導之使之皆囿於道義之中而為淳厚之俗而又必擇守令之人布吾之政教丁寧告誡使其知朝廷意嚮所在而其為政必以教化為先變不美之俗以為美化不良之人以為良使人人皆善良家家皆和順由家而邑由邑而郡民風士習如出一律則天下之大治平之基實自此而積纍也大學衍義補卷八十二
