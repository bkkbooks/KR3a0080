body:
  text: 大學衍義補卷二十四明丘濬撰治國平天下之要制國用經制之義下漢賈山作至言曰昔者周蓋千八百國以九州之民養千八百國之君用民之力嵗不過三日什一而藉君有餘財民有餘力而頌聲作秦始皇以千八百國之民自養力罷讀曰疲不能勝其役財盡不能勝其求一君之身耳所以自養者馳騁弋獵之虞天下弗能供也臣按天以天下之民之力之財奉一人以為君非私之也將賴之以治之教之養之也為人君者受天下之奉乃殫其力竭其財以自養其一身而不恤民焉豈天立君之意哉秦始皇以千八百國之民自養而為馳騁田獵之娛至於力罷財盡而不能供違天甚矣雖欲不亡得乎賈誼言於文帝曰管子曰倉廪實而知禮節民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之饑一女不織或受之寒生之有時而用之無度則物力必屈盡也古之治天下至纎細也至悉故其蓄積足恃今悖本而趨末食者甚衆生之者甚少而靡音靡散也之者甚多天下財産何得不蹶傾竭也漢之為漢幾四十年矣公私之積猶可哀痛言無儲積失時不雨民且狼顧嵗惡不入請賣爵子賣爵級及子即不幸有方二三千里之旱國胡以相恤卒然邊境有急數十百萬之衆國胡以餽之夫積貯者天下之大命也茍粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附逺何招而不至今驅民而歸之農皆著與著同於本使天下各食其力末技遊食之民轉而緣南畝則畜積足而人樂其所矣臣按賈誼告文帝大要言為國以足民為本而欲民之足必先足國國之所以足者蓄積足恃也國家粟多而財有餘則蓄積足以恃矣是以水旱不足虞軍旅不足憂守固而戰勝懷敵而附逺所為無不成矣所以然者莫急於驅末技游食之民而歸之南畝以務農使天下無不耕之夫不織之女耳夫然則人樂其所而知禮節矣文帝感其言躬耕以勸百姓節儉以為天下先卒致海內富庶黎民醇厚幾致刑措三代以下稱恭儉寬仁之君必歸焉有以也夫漢制大司農卿一人掌諸錢穀金帛諸貨幣郡國四時上月旦見錢穀簿其逋缺也未畢各具别之邊郡諸官請調度者皆為報給損多益寡取相給足丞一一人主帑藏少府卿一人掌中服御諸物衣服寶貨珍膳之屬凡山澤陂池之稅名曰禁錢皆屬焉後漢始以屬司農水衡都尉主上林苑後漢省之并其職於少府臣按毋將隆言於哀帝曰國家武備繕治造作皆度大司農錢大司農錢自乘輿不以給共音貢養共養勞賜一出少府蓋不以本藏給末用不以民力供浮費别公私示正路也應劭注漢書謂縣官公作當仰司農今出水衡錢以為異政田是觀之在大司農者國家之公用也在少府水衡者人主之私蓄也公用所儲乃田賦之常數非軍國之需則不用私蓄所具乃山澤之餘利雖燕好之私亦可用焉其制雖異於周然出入之際有所分别不至混用而泛費有國家者誠循漢此制以財用之司分為內外二府外府貯常賦所入如秋糧夏稅及折糧銀鈔絹帛之屬以待軍國之用嵗終計其用度之餘别為貯處以備水旱兵火不測之需內府則貯凡天下坑冶贓罰門攤之屬以待宫室衣車賜豫燕好之費嵗終則計其有餘者别儲以備他年之不足及外府或有不給則以濟之夫外府有不足則可取之於內內府則常為撙節使不至於不足雖有不足亦不可取之於外何則軍國之需決不可無奉養之具可以有可以無故也九重之上誠念財賦雖聚而易散有所私奉必權其輕重緩急而用舍之每留􅑿餘以備匱乏斷不可以軍國之儲以為私奉之用昔人有言恭儉賢主常捐內帑以濟軍國之用故民裕而其國昌淫侈僻王至靡外府以供耳目之娛故財匱而其民怨伏惟聖明裁擇漢髙祖時張蒼為計相唐制度支郎中掌天下租賦物産豐約之宜道涂之利嵗計所出而支調之德宗時以吏部尚書劉晏判度支宋沿五代之制置三司使以總國計號曰計省位亞執政目為計相恩數與參樞同臣按大學以用人理財為平天下之要道前代稱輔弼之臣曰宰相㑹計之臣曰計相同以相稱一以用人一以理財皆所以相佐其君以平治天下者也自漢初有計相唐戶部屬有度支其後以大臣判之宋有三司使皆是計相之職本朝罷宰相而以戶部掌天下戶口田土錢糧然散屬諸司兼釐衆務事多端而職不專臣請如古計相制於戶部卿佐之外添設尚書一員專總國計凡內外倉庫之儲逺近漕挽之宜咸在所司稽嵗計之出入審物産之豐約權貨幣之輕重斂散支調通融幹轉一切付之久其任而責成功凡國家有所用度悉倚辦之仍行天下有司月終申物價之貴賤嵗杪報年穀之登耗俾其豫知㑹本部卿佐定議以聞而為之備隋文帝開皇十二年有司上言庫倉皆滿帝乃詔曰既富而教方知廉恥寧積於人無藏府庫乃蠲河北河東今年田租三分減一兵減半功調全免煬帝即位戶口益多府庫盈溢其後征伐巡遊不息百姓怨叛以至於亡臣按馬端臨謂古今稱國計之富者莫如隋然考之史傳未見其有以為富國之術也隋承周後凡周人酒𣙜鹽鐵市征之類一切罷之所仰止賦稅而已然自開皇三年以來屢減田租給復百姓其於賦稅甚濶略也然帝即位之初即建新都平江左營繕征伐未嘗廢也史稱帝於賞賜有功並無所愛賞平陳功費帛三百萬又未嘗嗇於用財也史求其所以致殷富而不可得則以為帝躬履儉約六宫服浣濯之衣乘輿供御有故敝者隨令補用非燕饗不過一肉有司常以布袋貯乾薑薑袋進香以為費用大加譴責夫然後知大易所謂節以制度不傷財不害民孟子所謂賢君必恭儉禮下取於民有制者信利國之良規而非迂濶之談也彼談孔孟而行管商者乃曰茍善理財雖以天下自奉不為過而其黨遂倡為豐亨豫大惟王不會之說飾六藝文姦言以誤人國家嗚呼文帝以儉約致富庶煬帝以奢侈致亂亡其明效大驗彰彰若是王安石乃敢肆為異說以欺世主誤天下其萬世之罪人歟有天下國家者尚其鑒兹唐制戶部掌天下土地人民錢榖之政貢賦之差其屬有四一曰戶掌戶口土田賦役貢獻蠲免優復之事以租庸調斂其物以九等定天下之戶二曰度支掌天下租賦物産豐約之宜水陸道涂之利嵗計所出而支調之三曰金掌天下庫藏出納權衡度量之數四曰倉掌天下軍儲出納租稅祿糧倉廪之事以義倉常平倉備凶年平榖價歐陽修曰古之善治其國而愛養斯民者必立經常簡易之法使上愛物以養其下下勉力以事其上上足而下不困暴君庸主縱其佚欲而茍且之吏從之變制合時以取寵於其上故用於上者無節而取於下者無限民竭其力而不能供由是上愈不足而下愈困則財利之說興而聚斂之臣用唐之始時授人以口分世業田而取之以租庸調之法其用之也有節蓄兵以府衛之制故兵雖多而無所損設官有常員之數故官不濫而易祿及其弊也兵冗官濫為之大蠧臣按自古國家其初立法未嘗不善而其末流之弊皆生於子孫輕變祖宗之成法歐陽修謂古之善治其國而愛養斯民者必立為經常簡易之法所謂經常簡易四言者深有得於古先哲王立法之至意也蓋經常則有所持循而無變易之煩簡易則易以施為而無紛擾之亂以此立法則民熟於耳目而吏不能以為姦不幸行之久而弊生其間不能無有窒礙難行之處則隨時為之委曲就其闕而補之舉其滯而振之要不失祖宗立法之初意所謂經常簡易者焉決不可輕有改革也有唐一代可鑒也巳制兵以府衛設官有常員其後乃以兵冗官濫而為國大蠧何也子孫不能守祖宗經常簡易之法故也雖然兵冗官濫二者豈但為有唐之蠧哉凡國家之所以貧乏府庫空虛而多取厚斂於民以馴致於財盡民離而宗社淪亡者皆生於此二蠧也為人子孫而為其祖宗守宗社者於常額之外添注一官於列屯之外多簽一軍則思曰吾祖宗以來所未有也吾今增之得無不可乎非有關於治道民生决然不可無者不敢輕加也毋謂天下之大四海之富而一二人之費於我何加損焉嗚呼千萬人之積其原起於一人自古國家之禍患何嘗不起於細微哉李翺作平賦書謂人皆知重斂之為可以得財而不知輕斂之得財愈多也何也重斂則人貧人貧則流者不歸而天下之人不來由是土地雖大有荒而不耕者雖耕之而地力有所遺人日益困財日益匱雖欲誅暴逆而威四夷徒有其心豈可得耶故輕斂則人樂其生人樂其生則居者不流而流者日來則土地無荒桑柘日繁盡力耕之地有餘利人日益富兵日益彊人歸之如父母雖欲驅而去之其可得邪是故善為政者百姓各自保而親其君上雖欲危亡弗可得也臣按李翺作平賦書蓋憫當時之賦不平也賦之所以不平者蓋以其制民産者無法斂民財者無藝也既無制民之産之法而斂之又不以其道則民貧矣民貧則君安能獨富哉其所謂人皆知重斂之可以得財而不知輕斂之得財愈多其言尤為警切唐故事天下財賦歸左藏而太府以時上其數尚書比部核其出入第五琦為度支鹽鐵使請皆歸大盈庫供天子給賜主以中官自是天下之財為人君私藏有司不得程其多少楊炎言於德宗曰財賦邦國大本生人之喉命天下治亂輕重繫焉先朝權制以中人領其職五尺宦豎操邦之柄豐儉盈虛雖大臣不得而知無以計天下利害臣請出之以歸有司從之乃詔嵗中裁取以入大盈庫度支具數先聞臣按周禮以太宰司徒掌國家財用蓋以大臣以道佐君得以相可否辨是非而為上之人所嚴憚故人君有非義之取非禮之用不急之為非徒不敢擅取而私用之抑且為之中止而潛銷者有焉茍以中人主之則上之人平日相與䙝狎私昵凡不可語人者皆可與之謀而為之矣况彼小人無深識逺慮委曲奉承上人之不暇且人微言輕又安敢逆上意哉德宗為君楊炎為相無可取者惟此一事差强人意范祖禹謂炎知為相之體德宗知為國之務後世所當取法者也德宗患宫中用度不足李泌言天子不私求財請嵗供宫中錢百萬緡願勿受貢獻及罷宣索從之及元友直運淮南錢帛二十萬至泌悉輸之大盈庫然上猶頻有宣索仍敇諸道勿使宰相知泌聞之惆悵而不敢言司馬光曰王者以天下為家天下之財皆其有也乃或更為私藏此匹夫之鄙志也然多財者奢欲之所自來也李泌欲弭德宗之欲而豐其私財財豐則欲滋矣財不稱欲能無求乎是猶啓其門而禁其出也胡宏曰四方貢職各有定制王者為天下主財奉禮義以養天下無非王者之財也不可有公私之異臣按德宗宣索於諸道而敇其勿使宰相知李泌知德宗非禮誅求而惆悵不敢言胥失之矣然德宗之失是猶知所畏而泌之失則是為人臣而不忠也泌盍因其不欲人知一㸃明處而盡言之安知德宗之不見聽歟如此非徒得大易納約自牖之意而於所謂旡咎善補過者亦有之矣憲宗元和二年李吉甫撰元和國計簿上之總計天下方鎮四十八州府二百九十五縣千四百五十三除鳯翔等十五道不申戶口外每嵗賦稅倚辦惟在浙東西等八道四十九州一百四十四萬戶比天寶稅戶四分減三天下兵仰給縣官者八十三萬餘人比天寶三分增一大率二戶資一兵其水旱所傷非時調發不在此數蘇轍曰唐李吉甫始簿録元和國計為成書丁謂等因之為景德皇祐治平熙寧四書網羅一時出納之計首尾八十餘年本末相授有司得以居今而知昔參酌同異因時施宜此前人作書之本意也臣按自唐李吉甫為元和國計録丁謂因之為景德㑹計録其後林特作於祥符田况作於皇祐蔡襄作於治平韓絳作於熙寧蘇轍作於元祐元祐所會計者其别有五一曰收支二曰民賦三曰課入四曰儲運五曰經費所以總括天下財賦出入之數而周知其有無多寡以為豐殺增減者也使今之知昔而後日之知今以嵗計定國用實有賴於斯焉臣願敇掌財計之臣通將洪武永樂以來凡天下秋糧夏稅戶口鹽鈔及商稅門攤茶鹽抽分坑冶之類租額年課每嵗起運存留及供給邊方數目一一開具仍查歷年以來內府親藩及文武官吏衛所旗軍并內外在官食糧人數與夫每嵗祭祀修造供給等費洪武永樂宣德正統天順成化至於今日每朝通以一年嵗計出入最多者為凖要見彼時文官若干武官若干內官若干凡支俸幾何京軍若干外軍若干邊軍若干凡食糧幾何其年經常之費若干雜泛之費若干總計其數凡有幾何運若干於兩京留若干於州郡備若干於邊方一年之內所出之數比所入之數或有餘或不足或適均稱依唐人之國計宋人之㑹計每朝為一卷通為一書以備參考萬幾餘暇時經御覽使國計大綱瞭然在目如或一嵗之入不足以支一嵗之出則推移有無截補長短省不急之用量入為出則國計不虧而嵗用有餘矣五代唐莊宗同光四年以倉儲不足敇河南尹豫借夏秋稅民不聊生臣按橫斂厚征治天下之大蠧也然橫斂厚征之法之行民雖怨咨愁蹙然猶歸咎上人之用非其人取非其道幸其一旦更之尚可以為生也惟豫借之令一行示天下以國儲之虛嵗計之竭天下之人譁然謂天下不復可為而生其泮渙離散之心者未必不自此也譬則富室之居鄉落也平時貧民資其儲蓄而賴以舉貸一旦反假借於鄰家其家之寥落可知矣唐莊宗亂世之君不得已而為此猶為非策况國家府庫未至於匱絶而遽為此舉可乎宋太祖以軍旅饑饉當預為之備不可臨事厚斂於人始於講武殿置封椿庫嘗欲積縑帛二百萬易胡人首太宗置景福殿庫𨽻內藏庫㨂納諸州上供物謂左右曰此蓋慮司計之臣不能約節異時用度有闕復賦率於民耳朕終不以此自供嗜好也神宗更景福殿庫名自製詩以揭之曰五季失國玁狁孔熾藝祖肇邦思有懲艾爰設內府基以募士曽孫志之敢忘厥志臣按宋朝三帝積財於內庫皆非以為己私也蓋儲之於內以防外之泛用一遇有軍旅饑饉則以資之使不至於臨時厚斂以害民焉世主尚鑒於兹毋錯認在庫之物以為己物輕取而妄用則天下生民不勝幸甚史臣曰有宋自中世以後內牽於繁文外撓於彊敵供億既多調度不繼勢不得已徵求於民謀國者處乎其間又多伐異而黨同易動而輕變殊不知大國之制用如巨商之理財不求近效而貴逺利宋臣於一事之行初議不審行之未幾即區區然較其失得尋議廢格後之所議未有以愈於前其後數人者又復訾之如前使上之為君者莫之適從下之為民者無自信守因革紛紜是非貿亂而事弊日益以甚矣世謂儒者議論多於事功若宋人之言食貨大率然也臣按天下之事利害嘗相半無全利全害之理擇其利多害少者為之斯可矣史臣論宋人議論多於事功切中當時之弊宋人於一切政務皆然而於食貨一事為甚我祖宗自立國以來凡取於民者有定制有成法有常額世世遵守不敢有所紛更加減踰百年於兹矣其間雖不能無偏滯不舉之處然惟許其隨時補救以振舉之使害去而利存要之不失祖宗之舊也伏惟明主鑒宋人之失而恪守祖宗成憲以為子孫千萬年無窮之計蘇轍曰國之財賦非天不生非地不養非民不長取之有法收之有時止於是矣而宗室官吏之衆可以禮法節也祖宗之世世之始事掌秩者俟闕則補否則循資而已不妄授也仁宗末年任子之法自宰相以下無不減損英宗之初三載考績增以四嵗神宗之始宗室袒免之外不復推恩袒免之內以試出仕此四事者使今世欲為之將以為逆人心違舊法不可言也而况於行之乎雖然祖宗行之不疑當世亦莫之非何者事勢既極不變則敗衆人之所共知也今朝廷履至極之勢獨持之而不敢議臣實疑之誠自今日而議之因其勢循其理微為之節文使見在者無損而來者有限今雖未見其利要之十年之後事有間矣賈誼言諸侯之變以謂失今不治必為痼疾今臣亦云臣按蘇轍雖為宋朝而言然揆之於今事勢實有類之者蓋今日為國家大費者親藩宗室世襲武臣額外文職是也今日之勢雖不至於宋朝之既極然用轍之言因其勢循其理以其漸微為之節使見在者無損而將來者有限則賈誼所謂失今不治之痼疾他日必無也此國家之大計轍於章末有云茍能裁之天下之幸臣於是亦云陳傅良曰唐代宗時劉晏掌江淮鹽鐵之權嵗入六百餘萬緡是時租賦之所入不過千二百萬而江南之利實居其半憲宗時作元和國計録天下二十三道而十五道不申戶口而嵗租賦所倚辦者八道皆東南也曰浙江東西路曰淮南曰湖南曰嶽鄂曰宣歙曰江南曰福建故韓愈有言曰當今賦出天下而江南居十九臣按東南財賦之淵藪也自唐宋以來國計咸仰於是其在今日尤為切要重地韓愈謂賦出天下而江南居十九以今觀之浙東西又居江南十九而蘇松常嘉湖五郡又居兩浙十九也考洪武中據諸司職掌天下夏稅秋糧以石計者總二千九百四十三萬餘而浙江布政司二百七十五萬二千餘蘇州府二百八十萬九千餘松江府一百二十萬九千餘常州府五十五萬二千餘是此一藩三府之地其民租比天下為重其糧額比天下為多今國家都燕嵗漕江南米四百餘萬石以實京師而此五郡者幾居江西湖廣南直𨽻之半自宣德正統以來每擇任有心計重臣巡撫其地以司其嵗入蓋以此地朝廷國計所資故也竊以蘇州一府計之以凖其餘蘇州一府七縣其墾田九萬六千五百六頃而居天下八百四十九萬六千餘頃田數之中而出二百八十萬九千石稅糧於天下二千九百四十餘萬石嵗額之內其科徴之重民力之竭可知也巳諺有之曰蘇松熟天下足伏願明主一視同仁念此五郡財賦所出國計所賴凡百科率悉從寬省又必擇任巡撫大臣假以便宜之權任其從宜經制而不拘以文法必使上無虧於國計下不殫於民力一方得安則四方咸賴之以上經制之義臣按國家經制之義在乎征斂有其藝儲蓄有其具費用有其經而已然古今之制度不同而歷代之取豫用舍不一判之則或始末相穿約之則又彼此參錯故臣既總論理財之道於前又列貢賦之常於後於此特總此三者為一而謂之曰經制之義以示天下後世使知為國者取之民而藏之官出之官而散之天下必合乎天道之公人為之義而後取之收之用之茍為不然或出於人欲之私揆之於義而不合則是利而非義矣利之為利居義之下害之上進一等則為義經制得其宜則有無窮之福退一等則為害經制失其宜則有無窮之禍後世之明君碩輔尚明其所以取舍斂散乎哉以上經制之義下大學衍義補卷二十四
