body:
  text: 大學衍義補卷十一明丘濬撰治國平天下之要正百官嚴考課之法舜典三載考績三考黜陟幽明庶績咸熈蔡沈曰考核實也三考九載也九載則人之賢否事之得失可見於是陟其明而黜其幽賞罰明信人人力於事功此所以庶績咸熈也臣按此萬世考課之祖夫三年者天道一變之節也至於九年則三變矣天道至於三變則人事定矣盖人之立心行事未必皆有恒也鋭於前者或退於後勤於始者或怠於終今日如此而明日未必皆如此此事則然而他事則未必然暫則可以眩惑乎人乆則未有不敗露者也為政於三年六年不變固可見其槩矣安知其後何如哉必至於九年之乆而不變則終不變矣於是從而黜陟之聖人立法緩而詳詳而盡真可以為萬世法也豈但使一世之庶績咸熈而已哉萬世用之而萬世咸熈矣帝世立此法以來後世多不能遵用或以一年為一考或以三十月為一考或以六期為斷或以三年為斷未有若我朝本帝世考績之法以為一代之法百世相承者也周官六年五服一朝又六年十二年也王乃時廵考制度於四岳諸侯各朝於方岳大明黜陟蔡沈曰五服侯甸男采衛也六年一朝㑹京師十二年王一廵狩時廵者猶舜之四仲廵狩也考制度者猶舜之協時月正日同律度量衡等事也諸侯各朝方岳者猶舜之肆覲東后也大明黜陟者猶舜之黜陟幽明也疏數異時繁簡異制帝王之治因時損益者可見矣臣按今制三年方面及府州縣官一朝覲即此六年五服一朝之制也但周有廵狩之制而諸侯朝以六年而今則三年一朝耳來朝之臣各以其所治須知之事造冊以獻於朝廷是考制度之餘意也政績舉者有賞擢之典否則廢黜焉是亦大明黜陟也斯制也一見於虞書後千載餘復見於周官周至於今日幾三千年矣僅再見焉漢唐宋皆無之嗚呼此聖祖制治保邦所以卓冠乎百王也歟周禮太宰嵗終則令百官府各正其治受其㑹大計也聽其致事聽其事來至者之功状而詔王奏白於王廢置有功者置之進其爵無功者廢之退其爵三嵗則大計羣吏之治而誅賞之臣按周禮月終則有月要旬終則有日成則是日月皆有考也至於一嵗之終則有嵗㑹則是一嵗有考也於是嵗終大計則聽其所致之事詔王行廢置之法然猶各計其所治之當廢當置者而未行誅賞也至於三年之乆則大計羣吏之治相與比較而行誅賞之法焉其考以日也宰夫受之考以月也小宰受之考以嵗也大宰受之每嵗而詔于王至於三嵗則誅其幽而賞其明此三代盛時考核嚴而㑹計當上下相維體統不紊也其以此歟小司徒嵗終則考其屬官之治成治事之計而誅賞令羣吏正要㑹而致事小司冦嵗終乃命其屬入㑹㑹計之狀乃致事謂致事與王臣按先儒謂成周六卿先考其屬官而後倡牧伯牧伯從而考諸侯考課既備然後上之天子故周官六卿每嵗則詔王計羣吏之治而誅賞之西漢課郡國守相而丞相九卿則雜考郡國之計書至天子則受丞相之要漢去古未逺故猶有古意今制内外諸司各自考其官屬然後達於吏部吏部定其殿最聞於朝廷以行黜陟亦是此意漢法以六條察二千石嵗終奏事舉殿最漢郡守辟除令長得自課第刺史得課郡國守相而丞相御史得雜考郡國之計書天子則受丞相之要臣按漢考課之法史所不載惟嵗竟丞相課其殿最奏行賞罰見於丙吉傳尹翁歸為扶風盗賊課常為三輔最韓延夀為東郡太守斷獄大減為天下最陳萬年鄭昌皆以守相髙第入為右扶風義縱朱博皆以縣令髙第入為長安令散見於各人之傳由是以觀其一代考課之典必有成法可知矣武帝時董仲舒對䇿曰古所謂功者以任官稱職為差非謂積日累久也故小材雖累日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然累日以取貴積久以致官是以亷恥貿亂賢不肖渾淆未得其真胡寅曰後世治不及古者其大有三人君之取士用人任官不師先王也取士莫善於鄉舉里選莫不善於程其詞章也用人莫善於因人任職莫不善於用非其所長也任官莫善於久居不徙莫不善於轉易無方也莫善焉者古皆行之莫不善焉者後世皆蹈之自漢魏以來董子所謂是者蔑不復舉所謂不是者附益増損以為典常亷恥道喪愚不肖居人上為斯民病豈有量哉必也畧法先王盡蠲宿弊明君賢相斷而行之其庶幾乎徧得賢才森布中外致君堯舜而措俗成康乎臣按仲舒所謂積日累久以為功是即周官司士以久奠食者也然司士詔王必先之以徳詔爵以功詔禄以能詔事而後及於以久奠食焉後世累日以取貴積久以致官則不復考其徳功與能惟以日月先後為斷是則古人所以詔王者有三而今世僅用其一也以是用人任官而欲其亷恥不貿亂賢不肖不渾淆難矣然則天下之大官職之多奚啻千萬不斷以嵗月而欲一一别其稱否其道何繇曰立為考校之法就積日累久之中而分徳功與能之目常才則循夫一定之資異才則有不次之擢如董子之䇿小才雖累日不離於小官賢才雖未久不害為輔佐則人知所興起莫不竭力盡知務治其業以赴功而亷恥不至貿亂賢不肖不至於渾淆而國家之政務無不脩舉矣宣帝始親政事自丞相以下各奉職奏事敷奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜二千石有治理效輙以璽書勉勵公卿闕則選諸所表以次用之又詔令郡國嵗上繫囚以掠笞若瘐死者所坐各縣爵里丞相御史課殿最以聞黄龍元年詔曰上計簿具文而已務為欺謾以避其課三公不以為意朕将何任御史察計簿疑非實者按之使真偽毋相亂臣按漢宣帝綜核名實之主也故於考課之法特嚴考試功能有治理效輙以璽書勉勵選用所表郡國上繫囚有笞掠瘐死者又詔丞相御史課殿最然猶恐其上計簿具文欺謾又使御史按之使其毋以偽亂真噫善有賞惡有罰而又命御史按之恐其具文宣帝如此綜核而在當時王成猶以偽増户口受賞人偽之難防也如此况漫不加意者乎本朝在京官考滿吏部既考之而都察院又覈其實在外則州若府及藩司既考而又考之於憲司是亦漢人命御史察其非實毋使真偽相亂之意東漢之制太尉掌四方兵事功課嵗盡即奏其殿最而行賞罰司徒掌人民事功課嵗盡則奏其殿最而行賞罰司空掌水土事功課嵗盡則奏其殿最而行賞罰臣按此東漢考課之事所謂太尉司徒司空者漢世之三公也各於嵗盡而奏其殿最以行其賞罰則失於太驟非復有虞三載一考之制矣漢制州牧奏二千石長吏不任位者事皆下三公三公遣掾吏按驗然後黜退光武時用明察不復委任三府而權歸刺舉之吏朱浮上疏曰陛下不用舊典信刺舉之官黜鼎輔之任至於有所敷奏便加退免覆案不闗三府罪譴不蒙澄察陛下以使者為腹心使者以從事為耳目是謂尚書之平决於百石之吏故羣下苛刻各自為能兼以私情容長増愛故有罪者心不厭服無咎者坐被空文非所以經盛衰貽後王也臣按考課之法先委之長吏然後以達大臣必須按驗得失然後上聞以憑黜陟則吏之臧否咸當其實而人知所勸懲也茍惟長吏之言是信固不可而不信之亦不可此為治所以貴乎得人而綜核名實而信賞必罰也仰惟本朝三年一朝覲天下布政按察諸司府州縣官吏各齎須知文冊來朝六部都察院行查其所行事件有未完報者當廷劾奏之以行黜陟近嵗為因選調積滯設法以疏通之輙憑廵按御史開具掲帖以進退天下官僚不復稽其實蹟録其罪状立為老疾罷軟貪暴素行不謹等名以黜退之殊非祖宗初意按舊制官員考滿給由到部考得平常及不稱職者亦皆復任必待九年之乆三考之終然後黜䧏焉其有縁事䧏職除名亦許其伸理雖當臨刑亦必覆奏其愛惜人才而不輕棄絶之如此可謂仁之至義之盡矣彼哉何人立為此等名目其所謂素行不謹者尤為無謂則是不復容人改過遷善凡經書所謂改過不吝過則勿憚改皆非矣夫人自㓜至壯自壯至老其所存所行安能事事盡善而無過舉哉不仕則已一履外任稍為人所憎疾則雖有顔閔之行有所不免矣竊觀漢時長吏不任位者三公遣掾吏案驗然後黜退其後不任三府而權歸刺舉之吏朱浮謂有罪者心不厭服無咎者坐被空文意當時長吏雖心不厭服然猶有罪可名雖被空文然猶有文可考今則加以空名如死後節惠之諡受此曖昧不明之惡聲以至於沒齒齎恨况貪者未必暴暴者未必貪老疾未必老疾罷軟未必罷軟素行不謹不知何所指名又何以厭服其心哉宋韓億為執政每見天下諸路攟拾官吏小過輙不懌曰天下太平聖主之心雖草木昆蟲皆欲使之得所仕者大則望為公卿次亦望為侍從下亦望為京朝官奈何錮之於聖世嗚呼禁錮人於聖世固非太平美事然使天下失職之人布滿郡縣亦豈朝廷之福哉伊尹曰一夫不獲時予之辜當道君子尚慎思之晉武帝時杜預承詔為黜陟之課其畧曰古者設官分職以頒爵禄𢎞宣六典以詳考察然猶倚明哲之輔疇咨博訪敷奏以言及至末代疑諸心而信耳目疑耳目而信簡書簡書愈煩官方愈偽法令滋彰巧飾彌多今莫若委任達官各考所統在官一年以後每嵗言優者一人為上第劣者一人為下第因計偕以名聞如此六載王者總集採按其六嵗處優舉者超用之六嵗處劣舉者奏免之其優多劣少者敘用之劣多優少者左遷之臣按杜預此注亦是以六年為滿考非復有虞之制也然每嵗達官各考所統六年而後黜陟之其法亦善盖明著奏牘以上聞視彼後世暗加詢訪而無案牘可稽得於風聞而無實蹟可驗者固為優也唐考功之法考功郎中員外郎各一人掌文武百官功過善惡之考法凡百司之長嵗較其屬功過差以九等大合衆而讀之流内之官敘以四善一曰徳義有聞二曰清慎明著三曰公平可稱四曰恪勤匪懈自近侍至于鎮防有二十七最一曰獻可替否拾遺補闕為近侍之最二曰銓衡人物擢進才良為選司之最三曰揚清激濁褒貶必當為考較之最四曰禮制儀式動合經典為禮官之最五曰音律克諧不失節奏為樂官之最六曰决斷不滯予奪合理為判事之最七曰部統有方警備無失為宿衛之最八曰兵士調習戎装充備為督領之最九曰推鞫得情處斷平允為法官之最十曰讐較精審明於利害為較正之最十一曰承㫖敷奏吐納明敏為宣納之最十二曰訓導有方生徒充業為學官之最十三曰賞罰嚴明攻戰必勝為軍将之最十四曰禮義徳行肅清所部為政教之最十五曰詳禄典正詞理兼舉為文史之最十六曰訪察精審彈舉必當為紏正之最十七曰明於勘覆稽失無隠為勾簡之最十八曰職事脩理供承彊濟為監掌之最十九曰功課皆充丁匠無怨為役使之最二十曰耕耨以時收穫成課為屯官之最二十一曰謹於盖藏明於出納為倉庫之最二十二曰推歩盈虚究理精宻為厯官之最二十三曰占候醫卜效驗多著為方術之最二十四曰簡察有方行旅無壅為關津之最二十五曰市廛弗擾姦濫不行為市司之最二十六曰牧養肥碩蕃息滋多為牧官之最二十七曰邊境清肅城隍脩理為鎮防之最一最四善為上上一最三善為上中一最二善為上下無最而有二善為中上無最而有一善為中中職事粗理善最不聞為中下愛憎任情處斷乖理為下上背公向私職務廢闕為下中居官諂詐貪濁有状為下下此所謂九等也凡定考皆集於尚書省唱第然後奏臣按唐考課之法凡百司之長嵗較其屬功過差以九等則是以每嵗而考之亦非有虞三載三考之制然以後世考課之法較之猶有可取者焉以其詳於善而畧於最也盖善以著其徳行最以著其才術以善與最相為乘除分為九等以考中外官上者加階其次進禄其下奪禄又在下解任亦庶幾古人黜陟之微意也歟宋初循舊制文武常叅官各以曹務閒劇為目限考滿即遷太祖謂非循名責實之道罷嵗月敘遷之制置審官院考課中外職事受代京朝官引對磨勘非有勞績不許進秩其後立法文臣五年武臣七年無贓私罪始得遷秩其七階選人謂從政郎宣教郎文林郎通直郎承直郎承議郎奉議郎則考第資序無過犯或有勞績者逓遷謂之循資凡考第之法内外選人周一嵗為一考欠日不得成考三考未替更周一嵗書為第四考己書之績不得重計其後又立審官院考課院凡常調選人流内銓主之奏舉及歴任有私累者考課院主之臣按宋考課之法其初立法文臣五年武臣七年其後考第之法以一年為一考皆非有虞考績之法然既有吏部又有審官院考課院則失之重復又非成周六典之制司馬光告於其君仁宗曰自古得賢之盛莫若唐虞之際然稷降播種益主山林垂為共工龍作納言契敷五教臯陶明刑伯夷典禮后䕫典樂皆各守一官終身不易今以羣臣之才固非八人之比乃使之遍居八人之官逺者三年近者數月輙以易去如此而望職事之脩功業之成不可得也設有勤恪之臣悉心致力以治其職羣情未洽績效未著在上者疑之同列者嫉之在下者怨之當是時朝廷或以衆言而罰之則勤恪者無不解體矣姦邪之臣衒奇以譁衆養交以市譽居官未久聲聞四達蓄患積弊以遺後人當是時朝廷或以衆言而賞之則姦邪者無不争進矣所以然者其失在於國家采名不采實誅文不誅意夫以名行賞則天下飾名以求功以文行賞則天下巧文以逃罪矣臣按光所謂采名不采實誅文不誅意二言者切中後世考課之弊人君用人誠能專而久則人人得以盡其才究其用而人所毁譽之言久亦自定於是因其名而責其實就其文以求其意則用舎當而賞罰公矣司馬光曰為治之要莫先用人而知人聖人所難也故求之毁譽則愛憎競進而善惡混淆考之功狀則巧詐横生而真偽相冒要其本在至公至明而已人主詢諸人而决諸已使各長官自考其屬而宰相總之天子定其賞罰則何勞煩之有又曰考績之法唐虞所為當世之官居位久而受任專立法寛而責成逺故鯀之治水九載弗成然後治其罪禹之治水九州攸同然後賞其功非但效米鹽之課責旦夕之效也臣按本朝以百官考課之法屬之吏部内外官皆以三年為一考六年再考九年通考始行黜陟之典是則有虞之制也官滿者則造為牌冊備書其在任行事功績屬官則先考於其長書其最目轉送御史考核焉亦書其最目至是考功稽其功状書其殿最凡有三等一曰稱二曰平常三曰不稱既書之引奏取㫖令復職六年再考亦如之九年通考乃通計前二考之所書者以定其升䧏之等其立法之簡而要詳而盡漢唐以來所未有也其以御史考核即漢宣命御史考殿最也書以考語即唐人第其善最也稽其牌冊引以奏對即宋人之引對磨勘也以一人之制而兼各代之所長而又本於有虞三考黜陟幽明之意豈非萬世之良法歟以上嚴考課之法臣按吏部職任之大者莫大於銓選考課銓選是以日月計其資格之淺深而因以試用考課是以日月驗其職業之脩廢而因以升降其初入仕也以資格而髙下其職其既滿考也以考課而升䧏其官自古求賢審官之法不外乎此二途而已誠能擇吏部之卿佐俾自擇其屬秉銓衡者量才於資格之中覈功過者抜才於考課之外惟公惟明不偏不黨則國家有得人之效事妥民安而制治保邦之本立矣正百官崇推薦之道易泰初九拔茅茹茅根之相連者以其彚類也征吉程頥曰君子之進必與其朋類相牽援如茅之根然抜其一則牽連而起矣君子之進必以其類不唯志在相先樂於與善實乃相賴以濟故君子小人未有能獨立不賴朋友之助者也自古君子得位則天下之賢萃於朝廷同志協力以成天下之泰小人在位則不肖者並進然後其黨勝而天下否矣盖各從其類也臣按進一君子則衆君子進進一小人則衆小人進此泰之初九所以有抜茅茹以其彚之象也夫致泰之道亦多端矣而作易聖人必以是而繫於一卦之初者以見人君欲財成輔相天地以左右乎生民者非得衆君子以為之佐不可以成泰功也此致治者所以必慎於用人專於委任以致夫泰治而又崇推薦之道以保其泰於悠乆焉周官曰推賢讓能庶官乃和不和政厖舉能其官惟爾之能稱匪其人惟爾不任王安石曰道二義利而已推賢讓能所以為義大臣出於義則莫不出於義此庶官所以不争而和蔽賢害能所以為利大臣出於利則莫不出於利此庶官所以争而不和庶官不和則政必雜亂而不理矣稱亦舉也所舉之人能脩其官是亦爾之所能舉非其人是亦爾不勝任古者大臣以人事君其責如此臣按有虞之朝命禹為百揆而禹則遜之稷契臯陶命垂為共工而垂則遜之殳斨伯與益之遜於朱虎熊羆伯夷遜於䕫龍噫君以其人為賢能而用之而其人不自賢不自能而推之賢讓之能其相與和穆也如此此百官和於朝而庶績所以咸熈也歟成王仰惟唐虞建官之意而時若之而以推賢讓能望其臣盖欲其效虞廷之九官濟濟相讓也而又戒之曰舉能其官惟爾之能稱匪其人惟爾不任其切望之也深矣春秋穀梁傳曰學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也臣按此言則為臣者見賢而不舉為君者其臣舉賢而不能用鈞為有失左傳襄公三年祁奚請老晉侯問嗣焉稱解狐其讐也将立之而卒又問焉對曰午也可祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可職之子伯華於是使祁午為中軍尉羊舌赤佐之君子謂祁奚於是能舉善矣稱其讐不為諂立其子不為比舉其偏不為黨解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫唯善故能舉其類詩云維其有之是以似之祁奚有焉臣按他書有曰祁奚為大夫請老晉君問孰可使嗣對曰解狐可君曰非子之讐乎對曰君問可非問讐也又問孰可以為國尉對曰午也可君曰非子之子乎對曰君問可非問子也君子謂祁奚外舉不避仇讐内舉不避親戚可謂至公矣其言比左氏尤為明白至其所謂公之一言真誡人臣舉賢輔君之要道也解狐與荆伯抑為怨簡子問於狐曰孰可以為上黨守對曰荆伯抑可簡子曰非子之讐乎對曰臣聞忠臣舉賢不避仇讐其廢也不阿親近簡子曰善遂以荆伯抑為守臣按先儒有言凡人避嫌者皆内不足也又曰恩讐分明非有徳者之言况人臣事君莫大於薦賢為國茍以親仇之故而有所避就焉則其人可知矣論語仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舎諸朱熹曰賢有徳者才有能者舉而用之則有司皆得其人而政益脩矣程頥曰人各親其親然後不獨親其親仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舎諸便見仲弓與聖人用心之大小推此義則一心可以興邦一心可以喪邦只在公私之間爾臣按聖人言雖至近上下皆通孔子此言雖為仲弓為宰而發然推而廣之使人君之治天下在朝之臣各舉其所知之賢才則人人所知者皆舉而用之而天下之賢才無遺者矣孟子曰言無實不祥不祥之實蔽賢者當之張栻曰天生斯賢以為人也蔽賢之人妨賢病國不祥孰甚焉臣按天生賢才以為君用人能引而進之其為祥也大矣媢疾之人蔽之而不容其進非但不祥於其身國而不幸有斯人豈非大不祥哉漢詔有云蔽賢䝉顯戮以是不祥之人投諸豺虎有北可也荀卿曰下臣事君以貨中臣事君以身上臣事君以人臣按或人問報國孰為大曰薦賢為大盖竭一身之智力其效少竭衆人之智力其效多由是以觀則人臣之所以事其君者其髙下可知矣漢武帝詔曰朕深詔執事興亷舉孝庶幾成風紹休聖緒夫十室之邑必有忠信今或至闔郡不薦一人是化不下究而積行之君子壅於上聞也且進賢受上賞蔽賢䝉顯戮古之道也其議不舉者罪有司奏不舉孝不奉詔當以不敬論不察亷不勝任也當免臣按未用之賢其進與否在公卿大夫之見任者後世立法因其所舉賢否而坐其舉主則有矣未有以賢之不進而誅其見任者以責其必進者也漢去古未逺故其詔令之頒猶有古意存焉魏明帝時士人多務進趨亷遜道缺劉寔著崇讓論以矯之其畧曰古者聖王之化天下所以貴讓者欲其出賢才息争競也夫人情莫不皆欲已之賢故勸令讓賢以自明故讓道興賢能之人不求而自至矣至公之舉自立矣百官具任為百官之副亦具矣一官缺擇衆官所讓最多者而用之審之道也在朝之士相讓於上下皆化之推賢讓能之風從此生矣夫在官之人其中賢明者亦多矣豈皆不知讓賢為貴耶直以時皆不讓習以成俗故不為耳臣按唐宋舉官自代之制盖本寔之此論非獨可以見其人材用之實亦足以崇推讓之風焉唐狄仁傑薦張柬之姚元崇桓彦範敬暉等數十人率為名臣或謂仁傑曰天下桃李悉在公門仁傑曰薦賢為國非為私也張説喜推籍後進善用人之長多引天下知名士以佐佑王化粉澤典章成一王法始知進賢院嘗薦張九齡可備顧問説卒上思其言召為秘書少監集賢院學士臣按為大臣者皆能如狄仁傑張説之薦賢其為國家治道之助多矣李克曰達觀其所舉二臣之所舉如此則其人之賢可知也已崔祐甫為相薦舉惟其人不自疑畏推至公以行徳宗嘗謂之曰人言卿所用多渉親故何也對曰臣為陛下擇百官不敢不詳慎茍平生未之識何以諳其才行而用之司馬光曰用人者無親疎新故之殊惟賢不肖之察其人未必賢也以親故而取之固非公也茍賢矣以親故而舎之亦非公也天下之賢非一人所能盡若必待素識而用之所遺亦多必也舉之以衆取之以公而己不置毫髮之私於其間則無遺才曠官之病矣文宗時中書門下奏請京兆河南尹及天下刺史各於本府本道常選人中擇堪為縣令司録録事參軍人具課績才能聞薦如刺史所舉併兩人得上下考者就加爵秩在任年考已深者優與進改如犯贓至一百貫已下者舉主量削階秩一百貫已上者移守僻逺小郡臣按人之難知而節之易變者莫如利今日不取安保其他日之皆不取哉此事不取安保其他事之皆不取哉人固難保矣而所以坐人罪者又未必皆得其實此連坐舉主之法名雖美而實未易行也五代周世宗令翰林學士兩省舉令録除官之日仍署舉者姓名若貪穢敗官並當連坐胡寅曰保任天下之至難也夫中人以上不萬一焉中人固不易得矣中人以下滔滔是也迫禍難處困窮臨勢利怵交黨此改行易守之㑹也中人者一出一入焉忍與不忍敢與不敢相權於中未至於甚忍而不敢之心勝怵迫甚矣不忍而敢之心决此人情之大常物理之必至也誠知其人今不為是安知其他日渝與不渝也而况其下者乎故連坐之法似美而實弊似美故其初激昻實弊故其終廢格若曰吾姑嚴為之防爾則姦人窺之其弊益甚然則奈何曰人君惟典學明道識拔真賢以為輔相則有成材之具得人之方如儲木於山育魚於淵惟君所取此非一日之力也立法保任茍給目前䇿之下也臣按胡寅所謂人君典學明道識抜真賢以為輔相則有成材之具得人之方此推本反己之論宋太宗雍熈二年令翰林學士兩省御史臺尚書省官各於京官幕職州縣中舉可升朝者一人端拱三年令宰相以下至御史中丞各舉朝官一人為轉運使臣按宋朝内外官皆責令在廷大臣舉薦不顓顓用選法也端拱四年令内外官所保舉人有變節踰濫者舉主自首原其罪臣按舉主連坐之法行之乆矣而此又立舉主自首原罪之比盖以所舉之人事未彰露即許首原既已彰露必坐以連坐之罪此法茍行則所舉及受舉之人咸知懼矣真宗詔每年終翰林學士以下常叅官並同舉外任京朝官三班使臣幕職州縣官各一人明言治行堪何任使或自已諳委或衆共推稱至令閤門御史臺計㑹催促如年終無舉官状即奏聞當行責罰臣按宋朝人君切於舉賢如此可以為後世法真宗復舉官自代之制常參官及節度觀察防禦使刺史少尹畿赤令并七品以上清望官授訖三日内上表讓一人以自代在内者於閤門投下在外者附驛以聞其表付中書門下每官闕則以見舉多者量而授之臣按此舉官自代之制誠能舉而行之吏兵二部各立簿籍二編次所讓表状一以進内一以留司據此以為銓用升擢之資其於進用賢才不為無益司馬光言於其君哲宗曰人之才性各有所能知人之難聖賢所重若專引知識則嫌於挾私難服衆心若止循資序則官非其人何以致治莫若使在位達官人舉所知然後克協至公野無遺賢矣欲乞以十科取士一曰行義純固可為師表科如韓嵩之薦韓休二曰節操方正可備獻納科如李嶠之薦李邕三曰智勇過人可備将帥科如謝安之薦謝𤣥四曰公正聰明可備監司科如匡衡之薦孔光五曰經術精通可備講讀科如蕭望之之薦薛廣徳六曰學問該博可備顧問科如張説之薦張九齡七曰文章典麗可備著述科如魏元忠之薦吳兢八曰善聽獄訟盡公得實科如袁盎之薦張釋之九曰善治財賦公私俱便科如李祐之薦李巽十曰練習法令能斷請讞科如丙吉之薦于定國應職事官自尚書以下每嵗於十科中舉三人中書省鈔録舉主及所舉官姓名嵗終不舉及人數不足按勅施行或遇在京及外方有事執政各隨所舉之科選差臣按天下人才不拘拘於此十科况其各科之中所當用者亦有多寡不同臣愚以為當如蘇洵所云書曰載采采舉人者當明著其迹曰某人亷吏也嘗有某事知其亷某人能吏也嘗有某事知其能雖不必有非常之功而皆有可舉之状其特曰亷能而己者不聽如此則取人之路廣當道者量其才器而用之庶乎其得人矣英宗時詔中外臣僚於文資官内不以職位髙下舉行實素著官政尤異可備升擢任使之人又於諸司使以下至三班使臣内舉其堪充将領及行陳任使之人司馬光言臣始聞之不勝慶抃既而議者皆言數年之前亦有此詔所舉甚衆未聞朝廷曽有所陞擢今茲盖亦脩故事飾虚名而已非有求賢之實也若果如此誠有何益乞将今來臣僚所舉之人隨其資敘各置一簿編其姓名留之禁中其副本䧏付所司遇文武官員有闕應係上件差遣者並乞於所舉官簿内資叙人中親加選擇㸃定臣按光所言數年前亦有此詔而今之所行亦是脩故事飾虚名而已此切中後世詔令之弊非但求賢一事然也所謂置簿禁中一説尤為切要但欲遇闕親為㸃定似乎未善臣愚以為必須待所司各擬以聞然後據此簿考其當否以㸃定之如此則人君於一世之人才皆有所據以知其人亦可因所舉之得失以知其人之賢否蘇軾曰天下之吏不可以人人而知也故使長吏舉之又恐其舉之以私而不得其人也故使長吏任之他日有敗事則以連坐其過惡重者其罪均且夫人之難知自堯舜病之矣今日為善而明日為惡猶不可保况於十數年之後其㓜者已壯其壯者已老而猶執其一時之言使同被其罪不已過乎天下之人仕而未得志也莫不勉彊為善以求舉惟其既以致官而無憂是故蕩然無所不至方其在州縣之中長吏親見其亷謹勤幹之節則其勢不可以不舉又安知其終身之所為哉一縣之長察一縣之屬一郡之長察一郡之屬職司者察其屬郡者也此三者其屬無幾耳其貪其亷其寛猛其能與不能不可謂不知也今其屬官有罪而其長不即以聞他日有以告者則其長不過為失察其去官者又以不坐夫職司察其屬郡郡縣各察其屬此非人之所不能而罰之甚輕又曰今之世所以重發贓吏者何也夫吏之貪者其始必詐亷以求舉舉者皆王公貴人其下者亦卿大夫之列以身任之居官莫不愛其同類等夷之人故其樹根牢固而不可動盖以連坐者多故也如盗賊質刼良民以求茍免為法之弊至於如此亦可變矣如臣之䇿以職司守令之罪罪舉官以舉官之罪罪職司守令今使舉官與所舉之罪均縱又加之舉官亦無如之何終不能知終身之亷者而後舉特推之於幸不幸而已茍以其罪罪職司守令彼其勢誠有以督察之臣按蘇軾此言盖以職司守令於其屬有可督察之勢而欲以舉官之罪罪之夫職司守令在其人今日之己任則為其屬其屬有罪而不察固有罪矣若夫舉官前日之所舉而今日有罪彼又何預哉臣愚以為宜令舉主於初舉之時明具保任連坐之状若其所舉之人有不如所舉許其於事情未露之前具實發覺之則原其繆舉之罰如此則舉人者有所恃而敢於薦揚受舉者有所畏而不敢改節矣以上崇推薦之道大學衍義補卷十一
