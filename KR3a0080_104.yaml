body:
  text: 大學衍義補卷一百四明丘濬撰治國平天下之要慎刑憲制刑獄之具易䝉初六發䝉利用刑人用說吐活反桎梏以往吝程頤曰發下民之䝉當明刑禁以示之使之知畏然後從而教導之自古聖王為治設刑罰以齊其衆明教化以善其俗刑罰立而後教化行雖聖人尚徳而不尚刑未嘗偏廢也臣按桎梏刑具也六經言刑具始於䝉之初六坎上六繋用徽索三股曰徽纆兩股曰纆寘于叢棘三歲不得凶程頤曰上六以隂柔而居險之極其陷之深者也以其陷之深取牢獄為喻如繫縛之以徽纆囚寘於叢棘之中隂柔而陷之深其不能出矣臣按坎為刑獄荀九家易坎為叢棘傳曰叢棘如今之棘寺䝉坎二卦聖人作易皆取象於刑獄是知聖人為治不能以不用刑此蓋天地自然之理本諸隂陽合諸爻象非人為之私也雖若不得已而為之而為之亦自不容已蓋人生不能無欲欲勝而理微敎之而不從而不繼之以刑則人欲肆矣聖人作易以扶陽抑隂而取象於刑獄豈無意哉噬嗑初九屨校滅趾无咎程頤曰九居初最在下无位者也下民之象為受刑之人當用刑之始罪小而刑輕校木械也其過小故屨之於足以滅傷其趾人有小過校而滅其趾則當懲懼不敢進於惡矣上九何去聲校滅耳凶程頤曰上過乎尊位无位者也故為受刑者居卦之終是其間大噬之極也繫辭所謂惡積而不可掩罪大而不可解者也故何校而滅其耳凶可知矣何負也謂在頸也丘富國曰初上无位為受刑之人初過小而在下為用獄之始故以屨校滅趾為象上惡極而怙終為用獄之終故以何校滅耳為象臣按易之作以道隂陽而於天下之事無不備刑之用非為政之先務而易之於刑屢屢言之非徒言其理而刑之具亦無不有焉䝉之初六以桎梏言械其手足者也坎之上六以徽纆言繫縛其身者也噬嗑之初與上以校言械其頸與足者也是知天下之物人世之用無一不出於隂陽之理非但十三卦之制器尚象也舜典曰鞭作官刑扑作教刑孔穎逹曰刑用鞭久矣周禮條狼氏誓大夫曰敢不闗鞭五百左傳有鞭徒人費圉人犖子玉使鞭七人衛侯鞭師曹三百治官事之刑有不治者鞭之量狀加之未必有數也夏楚二物可以扑撻重者鞭之輕者撻之益稷曰撻以記之蔡沈曰撻扑也即扑作教刑者蓋懲之使記而不忘也臣按後世笞刑蓋始于此學記曰夏楚二物收其威也鄭𤣥曰夏稻也楚刑也周禮大司冦以圜土聚教罷民凡害人者寘置也之圜土而施職事焉以明刑恥之其能改者反于中國不齒三年其不能改而出圜土者殺鄭𤣥曰圜土獄城也聚罷民其中困苦以教之為善也民不愍作勞有似於罷害人謂其邪惡已有過失麗於法者以其不故犯法寘之圜土繫教之庶其困悔而能改也施職事以所能役使之明刑書其罪惡於大方版著於背反於中國謂舍之還於故鄕里也司圜職曰上罪三年而舍中罪二年而舍下罪一年而舍不齒者謂不得以年次列於平民出謂逃亡也臣按鄭氏謂圜土獄城也牢獄之見于經典者始此夫古之置獄所以聚罷憋之人而敎之夜則禁之以困苦其心晝則役之以困苦其身使之因患以思往咎而生善念也非若後世置獄恐人之逸而禁錮之比也圜土而為大司冦所親掌則亦今世刑部自置獄焉掌囚主拘繋刑殺者掌守盜賊凡囚者上罪梏拲音拱而桎中罪桎梏下罪梏王之同族拲自爵者桎以待弊猶幽也罪鄭𤣥曰凡囚者謂非盜賊自以他罪拘者也拲者兩手共一木也桎梏者兩手各一木也在手曰梏在足曰桎中罪不拲手足各一木耳下罪又去桎王同族及命士以上雖有上罪或拲或桎而已賈公彦曰五刑之人三木之囚重者三木俱著次者二下者一王之同族及有爵禄重罪亦著一而已以其尊之故也臣按三木者拲桎梏也重囚兼用其三輕者惟一桎而已兹三者之木皆加於手足者也易所謂何上聲校則木之在頸者故謂之何焉夫刑獄之具加諸囚者恐其亡逸也校以滅其耳使其無所聽聞梏以繫其手使其不能執持桎以繫其足使其不能行履先王豈故為是以苦夫人哉懲夫已犯者所以戒夫未犯者而使之不再犯也漢髙后四年絳侯周勃有罪逮詣廷尉詔獄臣按詔獄之名始于此然其獄猶屬之廷尉則典其獄者猶刑官也其後乃有上林詔獄則是置獄于苑囿中若盧詔獄則是置獄于少府之屬不復典于刑官矣夫人君奉天討以誅有罪乃承天意以安生人非一己之私也有罪者當與衆棄之國人皆曰可殺然後殺焉何至别為詔獄以繫罪人哉後世因之往往於法獄之外别為詔獄加罪人以非法之刑非天討之公矣亦豈所謂與衆棄之者哉漢景帝中六年定箠令丞相劉舍御史大夫衛綰請笞者箠長五尺其本大一寸竹也末薄半寸皆平其節當笞者笞臀毋得更人謂行杖者不得更易人也畢一罪乃更人自是笞者得全如淳曰當笞者笞臀然則先時笞背也臣按後世用竹為刑具始此蓋虞時所用以為扑者夏楚也景帝於即位之初即減笞法然其數猶多或笞未畢而人已死矣至是又下詔減三百為二百二百為一百因是定箠令而用二臣之請更笞背為笞臀自是笞者得全嗚呼自廢肉刑之後易刀鋸以竹箠所以全人之身也景帝定為令凡笞所用之質所制之度所行之人所施之處皆詳悉具著以示天下後世以此為防後世猶有巧為之具倍為之度用所不可用之人施所不當施之處其慘固有甚於肉刑者此在仁聖之朝所當禁革是亦不忍之政之一端也章帝元和元年詔曰律云掠問也者唯得榜擊也笞立立謂立而考訊之又令丙箠長短有數自往者大獄以來掠考多酷鉆鑚之屬慘苦無極念其痛毒怵然動心書云鞭作官刑豈云若此宜及秋冬理獄明為其禁臣按章帝居安富尊榮之地而慮念及于狴犴之苦且云念其毒痛怵然動心仁人之言也獻帝建安中議者欲復肉刑孔融議曰古者淳厖善否不别吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壞亂政撓其俗法害其人故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝涉之脛天下謂為無道夫九牧之地千八百君若各刑一人是天下常有千八百紂也末俗休和弗可得已且被刑之人慮不念生人在思死類多趨惡莫復歸正夙沙亂齊伊類禍宋趙髙英布為世大患不能止人遂為非也適足絶人還為善耳雖忠如鬻拳信如卞和智如孫臏寃如巷伯才如史遷逹如子政一離刀鋸没世不齒是太甲之思庸穆公之霸秦南睢之骨立衛武之初筵魏尚之守邊無所復施也漢開改惡之路凡為此也故明徳之君逺度深惟棄短就長不茍革其政者也朝廷善其言臣按自文帝廢肉刑至是蓋三百年一旦欲復之難矣孔融之議專為惜人是即所謂雖欲改過自新其道亡繇者也肉刑有五宮居其一乃其中尤慘者也四刑止毒其身宮刑乃絶其世人之有生承傳禪續其來有非一世而一旦絶之於其身豈非人生大慘哉自漢文帝廢肉刑後有議欲復之者仁人君子必痛止之夫於人之有罪者尚不忍戕其生絶其世乃有一種悖天無親之徒自宫其身以求進以祖宗百世之脉雲仍萬世之傳而易一身之富寵歲月如流人生㡬何胡不思之甚邪愚民無知而自落陷穽上之人亦恬然視之而不加禁止何哉兹亦斁彞倫敗風化感傷和氣之一端有國者所當嚴為之禁而罪其主使用力之人是亦不忍人之政之大者也唐制囚二十日一訊三訊而止數不過二百凡杖皆長三尺五寸削去節目訊杖大頭徑三分二釐常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分有半死罪絞而加紐官品勲階第七者鎻禁之輕罪及十歲以下八十以上者廢疾侏儒皆頌音鬆繋以待斷宋太祖定折杖之制凡流刑四加役流脊杖二十配役三年流三千里脊杖二十二千五百里脊杖十八二千里脊杖十七竝配役一年凡徒刑五徒三年脊杖二十徒二年半脊杖十八二年脊杖十七一年半脊杖十五一年脊杖十三凡杖刑五杖一百臀杖二十九十臀杖十八八十臀杖十七七十臀杖十五六十臀杖十三凡笞刑五笞五十臀杖十下四十三十臀杖八下二十臀杖七下常行官杖長三尺五寸大頭闊不過二寸厚及小頭徑不得過九分徒流笞通用常行杖徒罪決而不役臣按唐虞三代以來俱用肉刑至漢文帝始廢肉刑用笞其原蓋權輿虞刑之鞭扑也除死罪外自墨劓以下率以笞代之然未為笞令所箠之具無常物所箠之處無定在景帝定箠令箠之制始用竹受箠之處專在臀魏晉南北朝其君臣仁暴不同其俗尚厚薄不一其所用刑各有不同隋文帝始定為今之五刑凡前代考訊之具若大棒束杖車輻鞵底之類盡除不用唐宋因之制為刑具各有等第本朝於大明律卷首作為横圖以紀獄具笞大頭徑二分七釐小頭徑一分七釐訊杖大頭徑四分五釐小頭徑三分五釐以上皆以荆為之長俱三尺五寸枷以乾木為之長五尺五寸頭闊一尺五寸死罪重二十五斤徒流杖以下有差杻長一尺六寸厚一寸鐵索長一丈鐐重二斤凡為笞杖皆削去節目用官降較板較勘如式然後用之不許用筋膠諸物裝釘應決者用小頭臀受其大小厚薄視唐略等比宋則尤為輕焉祖宗好生之仁雖為惡之罪人惟恐或有所傷而為之薄刑也如此是以仁恩厚徳浹于民心百年于兹近年以來乃有等酷虐之吏恣為刑具如夾棍腦篐烙鐵之類名數不一非獨有以違祖宗之法實有以傷天地之和伏乞聖明申明舊制凡内外有因襲承用者悉令棄毁然禁之必自内始敢有仍前故用即以所製者加之庶使太祖皇帝慎罰之意恤刑之仁所以著于律文者萬世之下恒如一日所以恢皇仁於九有綿國祚於萬年者端在於斯宋之詔獄本以糾大姦慝故其事不常見初羣臣犯法體大者多下御史臺獄小則開封府大理寺鞫治焉神宗以來凡一時承詔置推者謂之制勘院事出中書則曰推勘院獄已乃罷自熙寧二年命都官郎中沈衡鞫知杭州祖無擇于秀州内侍乗驛追逮自是詔獄屢興南渡後秦檜屢興大獄以中異已者名曰詔獄實非詔旨也臣按天討有罪五刑五用刑人於市與衆棄之天下之法當出于一帝王之心無偏無黨犯于有司當付有司治之宋人於常獄之外而又有詔獄以糾大姦慝其後遂使權臣假之以中傷異己者一時内外臣民知有權臣而不知有天子㡬至於潜移國祚嗚呼國家常制自有掌刑之官原設之獄罪無大小皆有所司又何用别開旁門使權歸于一人禍及于百姓哉然是時猶必經中書事已即休而猶未至于專設一司任一人而又付之以訪緝之權也嗚呼此弊端之最大者尚幸操得其柄用得其人而未至於大肆然聖王立法常為中制此等之事有之不若無也元制五刑之目凡七下至五十七謂之笞刑凡六十七至一百七謂之杖刑其徒法年數杖數相附麗為加減鹽徒盜賊旣決而又鐐之流則南人遷於遼陽迤北之地北人遷於南方湖廣之鄉死刑則有斬而無絞惡逆之極者又有凌遲處死之法焉臣按自隋唐以來除去前代慘刻之刑死罪惟有斬絞二者至元人又加之以凌遲處死之法焉所謂凌遲處死即前代所謂咼也前代雖於法外有用之者然不著於刑書著於刑書始於元焉其笞杖毎十數必加以七者其初本欲減以輕刑也其後承誤反以為加焉大徳間王約上言國朝之制笞杖十減為七今杖一百者宜止九十七又不當加十也則其立法之始意可見矣本朝之制凡受罪者有大誥減一等事與之同而意與之異然彼但減杖數爾我聖祖之意蓋憫夫臣民之受罪者不知天理之不可違王法之不可犯故罹于刑憲而不自知也俾其因天書之一帙減罪名之一等咸知所感發而益加懲創不至于再犯也所謂仁人之言其利溥信乎其然哉然歴歲旣久名存實亡殊失聖祖垂訓仁民之意乞勑内庭繕寫重刋頒行天下凡法司有犯罪者俱要親寫一本送官收貯無者加一等如聖誥所諭法司積之旣多給與兩監監生俾其熟讀以為鑑戒是亦因刑弼教之一也以上制刑獄之具大學衍義補卷一百四
