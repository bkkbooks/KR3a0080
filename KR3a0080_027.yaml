body:
  text: 大學衍義補卷二十七明丘濬撰治國平天下之要制國用銅楮之幣下玄宗開元二十二年秋倣漢文不禁私鑄勑百僚詳議可否録事參軍劉秩議曰管子謂刀布為下幣先王以守財物以御人事而平天下若捨之任人則上無以御下下無以事上夫物賤則傷農錢賤則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕繇乎物多多則作法收之使少少則重重則作法布之使輕輕重之本必繇乎是奈何而假之人又曰鑄錢不雜以鉛鐵則無利雜以鉛鐵則惡不重禁不足以懲息塞其私鑄之路人猶冒死以犯之況啓其源乎是設陷穽而誘之入也臣按利之在天下固不可禁亦不可不禁漢文帝放鑄而海內富庶唐髙宗私鑄者抵死鄰保從坐亦不聞其大治何也利之為利處義之下害之上利以為人則上和於義而利在其中利以為己則下流於害而未必得利是故聖人之制事無往而不以義惟義是主擇其有利於人者而定為中制使天下之人皆蒙其利而不罹其害焉天地間為利之途轍孔多錢也者寓利之器昔人所謂貧可使富賤可使貴死可使生之具神通之物也上之人茍以利天下為心必操切之使不至於旁落上焉者不至為劉濞以滅家下焉者不至為鄧通以亡身則利權常在上得其贏餘以減田租省力役又由是以賑貧窮惠鰥寡使天下之人養生喪死皆無憾是則人君操利之權資以行義使天下之人不罹其害而獲其利也易曰利者義之和豈不信然所謂操之之權奈何劉秩曰物賤則傷農錢賤則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕繇乎物多多則作法收之使少少則重重則作法布之使輕輕重之本必繇乎是是也憲宗元和中勑禁私貯見錢不許過五千貫臣按昔人有言買田者志於吞併故必須上之人立法以限其頃畝蓄錢者志於流通初不煩上之人立法以教其懋遷也憲宗徒以錢重物輕之故立畜錢之限不亦甚乎五代周世宗以久不鑄錢民多銷錢為器皿及佛像乃立監鑄錢凡民間銅器佛像皆毁以鑄錢世宗謂侍臣曰佛以善道化人茍志於善斯奉佛矣彼銅像者豈所謂佛乎且吾聞佛志在利人雖頭目猶捨以布施若朕身可以濟民亦非所惜也臣按世宗毁佛像以鑄錢毅然不惑可謂剛明之主宋初錢文曰宋元通寶太平興國後又鑄太平通寶自後改元必更鑄以年號為文臣按鑄錢以年號為文始於劉宋孝建宋自開寶每更一號必鑄一錢故每帝皆有數種錢最多者仁宗也在位四十二年九改年號而鑄十種錢嗚呼鑄銅以為錢國固享其利矣然銅炭於何所出工作以何人用不免取之於民民得無受其害乎矧供給官吏監督匠役鎔液耗損造作違式輦運致遠吏民因之而得罪破家者何所不有繇是觀之則是以古人利民者害民民未見其利而先受其害已我聖祖未建極之前即創大中通寶既登基之後又鑄洪武通寶暨太宗鑄永樂通寶宣宗鑄宣德通寶百年之間僅此四種錢自時厥後未聞有所鑄造然未見民用之乏國用之虧也宋自王安石為政始罷銅禁姦民日銷錢為器邊關海舶不復譏錢之出國用日耗胡寅曰鑄錢為器其利十倍錢所以權百貨平低昻其鑄之也不計費不謀息今而銷之可不禁乎雖然銷而為器錢雖毁而器存焉若夫散而四出舟遷車轉入於他國歸於蠻夷關防不嚴法製隳壞真錢日少偽錢日多以不資之價靡有限之財雖萬物為銅隂陽為炭亦且不給矣臣按劉秩有言鑄錢之用不贍者在乎銅貴銅貴之繇在於採用者衆矣夫銅以為兵則不如鐵以為器則不如漆禁之無害官禁之則銅無所用銅無所用則銅益賤銅賤則錢之用給矣夫銅不布下則盜鑄者無因而鑄無因而鑄則公錢不破公錢不破則人不犯死刑錢又日增永為利矣是一舉而四美兼也宋朝鑄錢比前代為多天下置監鑄錢總二十六處計其最多之年歲課至五百四十九萬貫韶州永通一監歲造八十萬貫他可知矣大抵國計仰給於此所以當時銅禁最嚴銷錢為器者有罪漏錢出界者扺死惟其禁銅之嚴所以致銅之多銅多則賤賤則易致鼓鑄雖煩而民不致於甚困王安石一變其法而國用日耗為政者烏可輕變成法哉以上言錢周禮小宰以官府之八成經邦治四曰八成中此其四也聽稱責以傅别臣按傅别謂劵書也稱謂代之以物責謂責其所償此乃後世契券文約之始特民間私相以為符驗耳非以交易也然用券書以通貨物之有無與後世交會楮鈔其用雖不同而其以空文質實貨其原蓋兆于是矣漢武帝元狩四年有司言縣官用度大空而富商大賈財或絫萬金不佐國家之急請更錢造幣以贍用而摧浮淫并兼之徒乃以白鹿皮方尺緣以藻繢為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行臣按後世楮幣肇端於此然其用皮為幣用之以薦璧以朝覲聘享爾非以此為用也其制雖與後世楮鈔不同然不用金銀銅錫為幣而以他物代之則權輿于此也唐憲宗時令商賈至京師委錢諸路進奏院及諸軍諸使富家以輕裝趨四方合券乃取之號飛錢臣按此楮法所繇起也然委錢而合券以取而錢與券猶是二物非若今之鈔即以鈔為錢而用之也宋太祖時許商人入錢左藏庫以諸州錢給之而商旅先經三司投牒乃輸於庫所繇司計一緡私刻錢二十尋制便錢務臣按此即唐人飛錢之法此法今世亦可行之但恐奉行者於民之給受有停滯之幣於錢之出入有減換之弊耳真宗時張詠鎮蜀患蜀人鐵錢重不便貿易設質劑之法一交一緡以三年為一界而換之六十五年為二十二界謂之交子富民十六戶主之其後富民人資稍衰不能償所負爭訟數起寇瑊守蜀乞禁交子轉運使薛田張若谷議廢交子則貿易不便請官為置務禁民私造詔從其請置益州交子務吕祖謙曰益州置交子此一時舉偏救弊之政亦非錢布經久可行之制交子行於蜀則可於他利害大段不同何故蜀用鐵錢行旅齎持不便交子之法出於民之所自為託之於官所以可行今則銅錢稍輕行旅非不可以挾持欲行楮幣銅錢却便楮券不便昔者之便今日之不便臣按自古之幣皆以金若銅未有用他物者用楮為幣始于此且楮之造始于漢三代以來未有也其初用之以代木簡竹册以書字唐王璵乃用為假錢焚以事神噫孰知至是真以代銅錢而為行使之幣哉作俑者寇瑊而成之者薛田張若谷以無用之物易有用之物遂使蔡倫之智與太公之法並行於天下後世噫可歎也哉天聖中界以百二十五萬六千三百四十緡為額至神宗時改交子務為錢引務臣按交子每三年一換謂之界更換之際新舊相易上下相關不免勞擾我朝鈔法一定而不更可謂便矣神宗朝皮公弼言交子之法以方寸之紙飛錢致逺然不積錢以為本亦不能以空文行臣按宋朝交會皆是用官錢為本至金元之鈔始取料於民不復以錢為本矣髙宗紹興三十年戶部侍郎錢端禮被旨造會子內外流轉其合發官錢並許兑會子輸左藏庫臣按宋朝交子至是更名會子不特此也又謂之錢引又謂之關子又謂之關會其實一而已矣考夫唐之飛錢合券特以通商賈之厚齎貿易者蓋執券以取錢而非以券為錢也宋自真宗以後蜀始有交子髙宗以後東南始有會子而始直以紙為錢矣髙宗論交子之弊曰如沈該稱提之説但官中常有百萬緍遇交子減價自買之即無弊矣戴埴曰錢與楮猶權衡也有輕重則有低昻分毫之力不與焉蓋錢與楮皆本無用可以貿有用之物則人用之使如古所謂粟易械器械器易粟有無可以相易則何貧於錢如古所謂治田百畝歲用千五百之類小大粗足則何資於楮自物貨難於阜通於是假圜法以流轉故言錢則曰平凖所以見有是錢必有是物而後可凖平也錢多易得則物價貴踊此漢唐以後議論也自商賈憚於般挈於是利交子之兑換故言楮則曰稱提所以見有是楮必有是錢以稱提之也楮多易得則金錢貴重此宋紹興以後議論也平凖稱提皆以權衡取義而低昻有在於重輕明矣陸贄謂錢多則輕必作法以斂之趙開謂楮多則輕必用錢以收之今日病在楮多不在錢少如欲錢與楮俱多則物益重矣且未有楮之時諸物皆賤楮愈多則物愈貴計以實錢猶增一倍蓋古貿通有無止錢耳錢難得則以物售錢而錢重錢易得則以錢售物而錢輕復添楮以佐錢則為貿通之用者愈多而物愈貴古人惟重本政榖粟桑麻及諸食用物本也錢末也楮又末之末柳宗元言平衡曰增之銖兩則俯反是則仰此稱提大術也臣按稱提之説猶所謂平凖也平凖以幣權貨之低昻而稱提則以錢權楮之通塞今世鈔法遇有不行亦可凖此稱提之法出內帑錢以收之則流行矣紹興末年會子行未有兩淮湖廣之分乾道初戶部侍郎林安宅乞别給會子印付淮南州軍行使不得越至他路馬端臨曰置會子之初意非即以會為錢蓋以茶鹽鈔引之屬視之今中鹽猶有倉鈔而暫以權錢耳然鈔引則所直者重而會子則止于一貫下至三百二百鈔引只令商人憑以取茶鹽必須分路會子則公私買賣支給無往而不用且自一貫造至二百則是明以代見錢矣又況以尺楮而代數斤之銅齎輕用重千里之逺數萬之緍一夫之力尅日可到則何必川自川淮自淮湖自湖而使後來或廢或用號令反覆民聽疑惑哉臣按宋朝會子始有川引其後又有淮會湖會嗚呼交會之設以虛易實以假博真固非聖人以至誠治天下之意而況又拘其地以限之惟欲足吾用不復顧義之可否與民之有無三代以前無此事也金循宋四川交子法置交鈔自一貫至十貫五等謂之大鈔自一百至七百五等謂之小鈔以七年為限納舊易新其後罷七年釐革之限字有昏者方換之交鈔之制外為闌作花紋其上衡書貫例左書號右書料其外篆書曰偽造者斬告捕者賞衡闌下書中都交鈔庫準尚書戶部文移及納錢换鈔納鈔换錢等官司四圍畫龍鶴為飾臣按楮幣在唐謂之券在宋謂之交會而鈔之名則始於此今世鈔式蓋權輿於兹云考宋之交會南渡後取紙於徽池猶是别用紙為之而印文書字於其上金元之鈔則是以桑皮就造為鈔而印以字紋也元世祖始造交鈔以絲為本每銀五十兩易絲鈔一千兩諸物之直並從絲例其後又造中統元寶鈔以十計者四等以百計者三等以貫計者二等每一貫同交鈔一兩兩貫同白銀一兩元寶交鈔行之既久物重鈔輕臣按元交鈔之制銀五十兩易鈔千兩是銀一兩直鈔二十兩也中統元寶鈔兩貫同白銀一兩其所直銀亦與交鈔同焉至正十年詔曰世祖頒行中統交鈔以錢為文厥後造至元寶鈔以一當五名曰子母相權而錢實未用歷歲滋久鈔法偏虛物價騰踊民用匱乏其以中統交鈔一貫文省權銅錢一千文準至元寶鈔一貫仍鑄至正通寶錢與歷代銅錢並用以實鈔法十一年又鑄至正通寶錢印造交鈔令民間通用行之未久物價騰踊價逾十倍既而海內大亂京師料鈔十錠易斗粟不可得臣按天生物以養人付利權于人君俾權其輕重以便利天下之人非用之以為一人之私奉也人君不能權其輕重致物貨之偏廢固已失上天付畀之意矣況設為隂謀濳奪之術以無用之物而致有用之財以為私利哉甚非天意矣自宋人為交會而金元承之以為鈔所謂鈔者所費之直不過三五錢而以售人千錢之物嗚呼世間之物雖生於天地然皆必資以人力而後能成其用其體有大小精粗其功力有淺深其價有多少直而至于千錢其體非大則精必非一日之功所成也乃以方尺之楮直三五錢者而售之可不可乎下之人有以計取人如是者上之人不能禁之固已失上之職矣況上之人自為之哉民初受其欺繼而畏其威不得已而黽勉從之行之既久天定人勝終莫之行非徒不得千錢之息併與其所費三五錢之本而失之且因之以失人心虧國用而致亂亡之禍如元人者可鑒也已然則鈔法終不可行哉曰何不可行執其可行不可行之兩端而用其中斯可行矣何者上古之世以珠玉為上幣黃金為中幣刀布為下幣中古之世周立圜法亦兼以黃金布帛二者為言雖以王莽亦作金銀龜貝錢布之品後世專用銅楮二者為幣而不凖以金銀是以用之者無權而行之既久不能以無弊故其立法之始未嘗不善然皆以不善終之古今一律也本朝制銅錢寶鈔相兼行使百年于兹未之改也然行之既久意外弊生錢之弊在於偽鈔之弊在於多革偽錢之策臣既陳於前矣所以通行鈔法者臣請稽古三幣之法以銀為上幣鈔為中幣錢為下幣以中下二幣為公私通用之具而一凖上幣以權之焉蓋自國初以來有銀禁恐其或閡錢鈔也而錢之用不出於閩廣宣德正統以後錢始用于西北自天順成化以來鈔之用益微矣必欲如寶鈔屬鏹之形每一貫準錢一千銀一兩以復初製之舊非用嚴刑不可也然嚴刑非世所宜有夫以法治民之形可行於一時不若以理服民之心可施於悠久也蓋本天之理制事之義以為民之利因時立法隨時以處中聖賢制事之權也竊以為今日制用之法莫若以銀與錢鈔相權而行每銀一分易錢十文新製之鈔每貫易錢十文四角完全未中折者每貫易錢五文中折者三文昏爛而有一貫字者一文通詔天下以為定制而嚴立擅自加減之罪雖物生有豐歉貨直有貴賤而銀與錢鈔交易之數一定而永不易行之百世通之萬方如此則官籍可稽而無那移之弊民志不惑而無欺紿之患商出途賈居市皆無折閲之虧矣既定此制之後錢多則出鈔以收錢鈔多則出錢以收鈔銀之用非十兩以上禁不許以交易銀之成色以火試白者為凖寶鈔銅錢通行上下而一權之以銀足國便民之法蓋亦庶幾焉臣愚私見如此蓋因其可行不可行之兩端量度以取中而取裁於上非敢自以為是而輒變成法也可行與否請詢之衆論而斷以聖心以上銅楮之幣下大學衍義補卷二十七
