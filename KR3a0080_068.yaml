body:
  text: 大學衍義補卷六十八明丘濬撰治國平天下之要崇教化設學校以立教上易頤之彖曰天地養萬物聖人養賢以及萬民程頤曰聖人極言頤之道天地之道則養育萬物養育萬物之道正而已矣聖人則養賢才與之共天位使之食天祿俾施澤于天下養賢以及萬民也臣按頤之義養也天地養萬物而人乃萬物中之一物聖人則萬人中之一人也天地養萬物而人與聖人皆在天地所養之中聖人于人之中乃其首出者也體天地養物之仁以養乎人然天下之大億兆之衆必欲人人養育之非獨力之不能給而亦勢之所不能及也是以于衆人之中擇其賢者而養之使其推吾所以體天地養物之心以養乎人人釐之以其職散之以其民裂之以其地付之以吾一視之仁注之于其心而寄之于其目而使之代吾之視一以仁之也然非養之以廩食則彼不暇而為非養之以義理則彼不知所為故必豫有養之而後用之也然養之之義以貞正為道茍養之不以正如戰國之田文養士至三千餘人東都之延熹大學諸生至三萬餘人適足以起亂果何益哉蓋頤之道養正則吉養而不正其凶必矣舜典帝曰夔命汝典樂教胄子直而溫寬而栗莊敬也剛而無與毋同虐簡而無與毋同傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和朱熹曰胄長也自天子至卿大夫之適子也凡人直者必不足于溫故欲其溫寬者必不足于栗故欲其栗所以慮其偏而輔翼之也剛者必至于虐故欲其無虐簡者必至于傲故欲其無傲所以防其過而戒禁之也教胄子者欲其如此而其所以教之之具則又專在于樂如周禮大司樂掌成均之法以教國子弟而孔子亦曰興于詩成于樂蓋所以蕩滌邪穢斟酌飽滿動蕩血脈流通精神養其中和之德而救其氣質之偏者也臣按舜既命契為司徒敷五教而又于命伯夷典禮之後命夔典樂教胄子蓋司徒之所敷者布其教于天下典樂之所教者專其教于國學也胄子者天子之元子衆子與公卿大夫元士之適子皆將有天下國家之責者不可無豫教之法然所以教之者在因其資質而輔翼防範之使皆適其中而無或偏焉然化之以其形不若化之以其聲于是專命典樂之官以司教導之任蓋興起之于比興賦詠之間調和之于聲音節奏之外血脈于是乎動蕩精神于是乎流通邪穢于是乎滌蕩查滓于是乎消融真積力久自然和順于道德有莫知其所以然者矣向也氣質之美者于是而益美偏者于是而不偏他日承天而踐祚君國而子民修政而立事皆得成德全才之人而用之矣帝世以樂教人之意如此後世不復知此意學校之設其知以禮為教也固鮮矣况樂乎方其受教之初也不知禮樂為何物及其臨用之際一視禮樂為虛文而欲人才之復古治道之隆盛難矣大雅棫朴詩曰倬大也彼雲漢天河為章文章于天周王壽考遐與何同不作人朱熹曰雲漢天河也在箕斗二星之間其長竟天文王九十七乃終故言壽考作人謂變化鼓舞之也曹居貞曰作者鼓舞振動之意商之末世士氣卑弱甚矣非鼓舞奮動之烏能自奮而有成哉旱麓詩曰鳶飛戾天魚躍于淵豈弟君子遐不作人朱熹曰鳶之飛則戾于天矣魚之躍則出于淵矣豈弟君子而何不作人乎言其必作人也思齊詩曰肆成人冠以上為成人有德小子童子有造為也古之人無斁譽名也髦俊也斯士朱熹曰古之人指文王也言文王之德見于事者如此故一時人材皆得其所成就蓋由其德純而不已故令此士皆有譽于天下而成其俊乂之美也吕祖謙曰聖人流澤萬世者無有大于作人所以續天地生生之大德也故此詩以是終焉文王之無斁夫子之誨人不倦其心一也臣按學校之設所以明倫兼育養也蓋倫理之在人人人有之而不能人人盡其道聖人于是選其少俊者聚之學宫而教之俾講明其道而真知其所以然與其所當然而決然不疑焉則異日用之以理天下之務治天下之人為臣則忠為子則孝臨事則不茍避見義則必勇為平居則犯顔敢諫臨難則仗義死節而思以其身當天下之重任世道之責其基本于是乎積纍其機括由是乎轉移也理固貴乎講明而氣尤在乎振作要必上之人久于其道凱以強教之而張之當其機弟以説安之而弛之適其會鼓而舞之振而作之使之有感發興起之心歡欣交通之志則其得之于天浩然剛大者塞乎天地之間而不餒矣然非有以作其氣于平日安能得其用于異日哉詩稱文王之世濟濟多士而國家以寧者蓋有以獲乎作人之效也靈臺詩曰於論倫也鼓鍾於樂辟璧通雍澤也朱熹曰辟雍天子之學大射行禮之處也水旋丘如璧以節觀者故曰辟雍臣按先儒謂靈臺一詩辟雍之教寓焉臺池鳥獸鍾鼓之樂樂之形也其樂也外辟雍教化道義之樂樂之本也其樂也內可見先王盛時本樂以為教所以鼓舞作興乎賢才者隨所在而有也文王有聲曰鎬京辟雍自西自東自南自北無思不服皇王蒸蒸君也哉張載曰靈臺辟雍文王之學也鎬京辟雍武王之學也至此始為天子之學矣朱熹曰鎬京武王所營也此言武王徙居鎬京講學行禮而天下自服也臣按辟雍之學自文王已有之至武王有天下始專以為天子之學焉詩序子矜刺學校廢也亂世則學校不修焉臣按治世未有不修學校者學校之廢必見于末季之世小雅菁菁者莪樂育材也君子能長育人材則天下喜樂之矣臣按此二詩朱熹集傳皆以其序説為非及觀所作白鹿洞賦有曰廣青矜之疑問又曰樂菁莪之長育則又用序説蓋以此二詩為學校而作自漢以來則然矣雖其詩中所言與序説若不類者然序謂亂世則學校廢治世則樂育賢才可見世道之治亂係乎人材之有無人材之有無由乎學校之興廢也然則修學宫育賢才使青青子襟有喜樂之心無佻達之失豈非王政之大務歟魯頌泮水頌僖公能修泮宫也頌凡八章首章曰思發語辭樂泮水泮宫之水薄采其芹水菜魯侯戾至也止言觀其旗其旗笩笩飛揚也鸞聲噦噦和也無小無大從公于邁朱熹曰諸侯之學鄉射之宫謂之泮宫其東西南方有水形如半璧以其半于辟雍故曰泮水而宫亦以名也此飲泮宫而頌禱之詞項安世曰古之為泮宫者其條理不見于經而有詩在焉首三章則言其君相之相與樂此而已自四章以下乃其學法自敬其德而至于明其德明其德而至于廣其心廣其心而至于固其謀終焉此則學之本也自威儀孝弟之自修而達于師旅獄訟之講習自師旅獄訟之講習而極于車馬器械之精能此則學之事也自烈祖之鑒其誠而至于多士之化其德自多士之化其德而至于遠夷之服其道此則學之功也臣按泮宫之作不書于春秋説者多以為疑而朱熹以為頌禱之辭蓋春秋常事不書學校之修乃有國之常事故也然因此詩以考見古人學校之條理雖曰頌禱之辭然亦可見三代盛時學校之事其關係有如項氏所推究者後世設學乃顓顓以為教讀學生之所其于讀書作課之外一無所事雖謂之名存實亡不為過矣周禮大宰以九兩繫邦國之民三曰師以賢得民四曰儒以道得民八曰友以任相任以事得民大司徒以本俗六安萬民四曰聨師儒五曰聨朋友葉時曰以大宰繫邦國之九兩參之以司徒安萬民之六俗而皆以師儒行乎其中誠以九兩無師儒之繫則無以淑人心六俗無師儒之聨則無以厚民俗師者所以宗主名教者也儒者所以扶持名教者也師道不立則天下無善人儒道不立則天下無正學雖有土地富貴治利族任何所恃以相繫雖有宫室墳墓兄弟朋友何所恃以相聨甚矣天下一日不可無師儒之功也臣按天下不可一日無師儒之功國家不可一日弛學校之教本儒以設教立師以明道會友以講學所以繫邦國者在是所以安萬民者在是母徒視以為虛文茍應故事以為不急之務師氏以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長居虎門之左以教國子弟凡國之貴遊子弟學焉貴謂有職守在學者遊謂無職守不在學者朱熹曰三德以教國子一曰至德二曰敏德三曰孝德至德云者誠意正心端本清源之事而道則天人性命之理事物當然之則修身齊家治國平天下之術也敏德云者強志力行畜德廣業之事而行則理之所當為日可見之迹也孝德云者尊祖愛親不忘其所由生之事而知逆惡則以得於己者篤實深固有以真知彼之逆惡而自不忍為者也凡此三者雖曰各以其材器之高下資質之所宜而教之然亦未有專務其一而可以為成人者也是以列而言之以見其相須為用而不可偏廢之意先王之教所以本末相資精粗兩盡而不可倚于一偏也既曰三德矣而又教以三行者一曰孝行二曰友行三曰順行蓋德也者得于心而無所勉者也行則其所行之法而已不本之以其德則無所自得而行不能以自修不實之以其行則無所持循而德不能以自進是以既教之以三德而必以三行繼之則雖其至末至粗亦無不盡而德之修也不自覺矣臣按成周盛時設為師氏以教國子所以教之之法曰德曰行而已非但以教公卿大夫元士之適子凡國之貴遊子弟無不與焉德者行之本原行者德之實迹有德以為之本隨事而著其行在父母則親之在賢良則尊之在師長則事之凡若此者無非以充其孝德而已既有孝德則知順善之可為而逆惡之不可為強志力行以求至乎至極之地也教國子而使之竭力親親以盡其孝而又尊賢良事師長以友以順焉則德之得于心者極其至而道之原于天者于是乎生矣此成周學校所養之譽髦所以成人有德而得全才之用也歟保氏養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭御同五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容朱申曰古之為教德行道藝而已師氏教國子以德行故保氏養以道而教以六藝焉五禮吉凶軍賔嘉也六樂雲門大韶大咸大夏大濩大武也五射白矢參連剡注襄尺井儀也五馭鳴和鸞逐水曲過君表舞交衢逐禽左也六書象形會意轉注處事假借諧聲也九數方田粟米差分少廣商功均輸嬴朒方程勾股吳澄曰師道之教訓保保其身體養國子以道者以師氏之德行審喻之而後教之以六藝六儀也祭祀之容穆穆皇皇賔客之容嚴恪矜莊朝廷之容濟濟翔翔喪紀之容纍纍顛顛軍旅之容暨暨詻詻車馬之容匪匪翼翼德行裏也藝儀表也養之以道而表裏俱善而保氏之教成矣臣按保氏以六藝教國子而朱熹大學序謂人生八嵗則教之以禮樂射御書數之文何也蓋六藝之事非八嵗之童所能者特使之知其名物耳故謂之文必至十有五嵗入大學然後教之以其事焉大司樂掌成均之法以治建國之學政而合國之子弟焉以樂德教國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武鄭玄曰成均五帝學也周人立此學之宫賈公彥曰建立也周人以成均之法式以立國之學政而合聚國之子弟將以此教之吕祖謙曰成均五帝之學以五帝之學政建國之學政合國之子弟而教之自舜命夔典樂教胄子以此知五帝之教政無不自樂始所以舜命以典樂必兼教胄子之事成周之樂皆以掌樂之官司之古人惟陶冶之功最深動蕩鼓舞優遊浹洽使自得之自舜與周皆以典樂之官兼教導之事五帝成均之法雖不可見觀舜命夔典樂教胄子一章大略可見漢太常典樂而兼教育之任亦此意吳澄曰教之切要者樂也而德者樂之本語者樂之則舞者樂之效樂德而曰中和祗庸孝友者中者德之理和者德之容祗為德之敬庸為德之常孝與友者德之施樂語而曰興道諷誦言語者興者因物而發也道者道達人情也諷謂諷諫微言以寓意也誦謂誦書舉古訓以告之也言者自言心之所藴也語者因問而答之也樂舞而備六代者樂莫盛于六代言其舞之善則其聲音之善可知也蓋樂所以節夫舞也雲門大卷黃帝樂也言其德如雲之出又能聚也大咸堯樂咸言其德之遍及池言其潤澤也大㲈舜樂也言其德能紹堯也大夏禹樂也言其德能大中國也大濩湯樂也言其能以寬治民而救護之也武武王樂也言其能成武功也臣按成均者五帝之樂周人備前代之樂而大司樂所掌之法即五帝之法也五帝者顓頊高辛帝嚳堯舜也彼三帝者其教法無可考舜紹堯治而命后夔典樂以教胄子所謂直而溫以至八音克諧者即其法也二帝之法如此安知其非承三帝之餘烈哉先儒謂古人教人惟陶冶之功最深是以五帝三王之世學校之中士之所得于心者無非樂之德出于口者無非樂之語動其容者無非樂之舞自幼以至于長由中以達于外皆此物也非僻之心無自而入中和之德所以易成自成周之學政不傳後世所以教人者不過章句訓詁而已作無益之文習非禮之禮人才日卑風俗日下其以此歟大胥掌學士之版籍也以待致諸子春入學舍采菜同合舞秋頒學合聲吳澄曰胥有才智之稱學士謂卿大夫學舞者致謂按此版籍以致其來也古者士見于師以菜為贄菜蘋蘩之屬也合舞謂等其進退使應節奏也頒學者頒其才藝之所稱合聲亦謂等其曲折使應節奏也小胥掌學士之徵令而比之觥罰爵其不敬者巡舞列而撻撲罰其怠慢者吳澄曰學士即大胥在版之國子也蓋學士之未至者徵之使來學至者令之使有為比則較其能否觥者罰爵也撻者撲罰也臣按學校之政有不帥教者輕則觥之罰之以酒也重則撻之罰之以撲也蓋人之資稟不同性情亦異中人以上固有不待教而自循于理者若夫中人以下之資化之而不從示之而不聽故先王制為教刑以愧恥之雖帝世以德化民有不免焉虞書所謂撲作教刑是已而學記亦曰夏楚二物收其威也是則教之有刑其來尚矣上論設學校以立教上大學衍義補卷六十八
