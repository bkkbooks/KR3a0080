body:
  text: 大學衍義補卷一百四十五明丘濬撰治國平天下之要馭外蕃慎德懷逺之道舜典咨十有二牧養民之官曰食哉惟時柔寬而撫之逺能擾而習之邇惇厚也德允信也元仁厚之人而難拒絶也任人包藏凶惡之人蠻夷率服朱熹曰凡此五者處之各得其宜則不特中國順治雖蠻夷之國亦相率而服從矣孫覺曰夫以堯舜之時聖賢相會宜有長䇿成算以厭伏四夷然其言專以難任人為本蓋任人處內則主聽眩主聽眩則任使不明忠邪雜進雖有知勇安所施任人放逺則智者竭其智勇者獻其力夫如是則何蠻夷之足慮哉大禹謨益曰無怠無荒四夷來王朱熹曰九州之外世一見曰王帝於是以上文八者朝夕戒懼無怠於心無荒於事則治道益隆四夷之逺莫不歸往矣臣按上文所謂警戒無虞罔失法度罔游于逸罔淫于樂任賢不二去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從己之欲是即無怠無荒之實也夫人君警戒於宫闈之中朝廷之上京邑國都之內何預於四夷哉然而一念不謹萬事為之廢弛一言有失四方為之傳播是故自古鎮服外國之道不在於邊鄙而在於朝廷雖以舜大聖人而伯益猶以怠荒為戒良以一人無怠荒之失則四夷有歸往之誠外無邊患則內有善治而吾君享安富尊榮之樂矣吁伯益所事者舜也而猶切切警戒如此後世人主無帝舜萬分一乃欲生事四夷而為其臣者不敢輒出一言諫正或者又從而從臾之其臣可謂不忠矣而其君亦豈智者哉三旬苖民逆命益贊佐也于禹曰惟德動天無逺弗届至也滿招損謙受益時乃天道至諴感神矧兹有苗禹拜昌言盛德之言曰俞班還也師振整也旅帝乃誕大也敷文德文命德教舞干盾也羽于兩階賔主之階七旬有苖格至也朱熹曰三旬三十日也以師臨之閲月苗民猶不聽服也是時益蓋從禹出征以苖負固恃强未可威服故贊佐於禹以為惟德可以動天其感通之妙無逺不致蓋欲禹還兵而增修其德也滿損謙益即易所謂天道虧盈而益謙也誠感物曰諴益又推極至誠之道以為神明亦且感格而况於苗民乎言班師七旬而有苖來格也史臣以禹班師而歸弛其威武專尚德教干羽之舞雍容不迫有苖之至適當其時故作史者因即其實以形容有虞之德陳櫟曰益之贊禹謂天道之逺而德可動神明之幽而誠可感苗亦人耳豈有德之盛誠之至而不可動者當不煩兵而自服也臣按益之贊禹所謂滿招損謙受益時乃天道者若就戰伐言之小國若能制節謹度不敢縱逸則必得大國賔禮之益不然負其强固侮慢自賢則大國必有所不堪者而謀動干戈所損大矣大國若能包含遍覆嘉善而矜不能必得小國賔貢之益不然恃其衆大非禮侵陵則小國必有所不堪者而肆其蜂蠆之毒豈得無損哉若是者即易所謂虧盈而益謙者乃天之道也上之人體天道以字小下之人奉天道以事大則上下各得其所而兵戈不興矣旅獒惟克商遂通道于九夷八蠻西旅西方蠻夷國名底貢厥獒犬高四尺大保召公奭也乃作旅􅋙用訓于王曰嗚呼明王慎德四夷咸賔服無有逺邇畢獻方物方土所生之物蔡沈曰九夷八蠻多之稱也武王克商之後威德廣被九州之外蠻夷戎狄莫不梯山航海而至曰通道云者蓋蠻夷來王則道路自通非武王有意於開四夷斥大境土臣按德而謂之慎者蓋必兢兢業業不敢有須臾放肆者也慎德而必歸之明王者蓋人心虛靈不昧乃能知所謹彼昏迷蔽塞者烏知所慎哉德昏而不謹則雖宫禁之中左右使令之人或有以致其怨京輦之下百官庶姓之衆或有以激其怒况四海之外九夷八蠻之逺而能得其來賔哉是故人君之德不可以不明既明矣而尤不可以不慎也故明明德於天下者當何如而用功大學曰欲誠其意者先致其知魯頌曰翩彼飛梟惡聲之鳥集于泮林食我桑黮桑實懷我好音憬覺悟也彼淮夷來獻其琛寶也元大也龜尺二寸象齒大賂遺也南金曹居貞曰傳曰桑黮甘甜鴟梟革響是知梟食桑黮則其音變而美也泮林有黮梟來食之歸我好音則淮夷被泮宫之化其有不革靣而柔服者哉臣按泮水之詩說者以為魯侯與羣臣燕飲泮宫而作所謂淮夷之服蓋無此事詩人頌禱願望耳雖然學校者修崇教化之地也教化修則義理明義理明則人心固人心固則士氣作士氣作則彼蠢然冥頑者亦將惕然感動幡然歸順矣交址之南有越裳國周公居攝三年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠逺山川岨深音使不通故重譯而朝成王以歸周公公曰德不加焉則君子不饗其質政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耉曰久矣天之無烈風雷雨意者中國有聖人乎有則盍往朝之周公乃歸之王臣按越裳重譯來朝可見周之德及乎人而其所以朝者則曰久矣天之無烈風雷雨可見周之德格乎天矣國語穆王將征犬戎祭公謀父諫曰先王之訓也有刑不祭伐不祀征不享讓譴責不貢告以文辭告曉之不王於是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又不至則又增修於德無勤民於逺是以近無不聼逺無不服今自大畢伯士戎之二君之終也犬戎氏以其職來王天子曰豫必以不享征之且觀示也之兵其無乃廢先王之訓而王幾危也頓敗也乎吾聞夫犬戎樹惇言其立性淳朴能帥舊德而守終純固純専固守而身不移其有以禦我矣王不聼遂征之得四白狼四白鹿以歸自是荒服者不至臣按穆王征犬戎無故興萬里之師所費不知幾何而所得者僅四狼四鹿而已嗚呼損億兆之財棄千萬人之命所得不償所失而又使荒服之君由此而輕我中國不復朝貢則併其先世以來保世之具而失之其所損又不但財而已論語子曰蓋均無貧和無寡安無傾夫如是故逺人不服則修文德以來之既來之則安之朱熹曰均謂各得其分安謂上下相安內治修然後逺人服有不服則修文德以來之亦不當勤兵於逺臣按所謂文德者德即虞書惟德動天之德文即禹貢揆文教之文也文德與武功對所謂文德之修即內治之有條理者是也漢光武建武二十七年北胸奴求和親不許臧宫馬武上疏曰虜今人畜度死旱蝗赤地疲困乏力不當中國一郡萬里死命縣平聲在陛下豈宜固守文德而隳其事乎今命將臨塞厚縣平聲購賞諭告高句驪烏桓鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此胸奴之滅不過數年詔報曰黃石公記曰柔能制剛弱能制强柔者德也剛者賊也弱者仁之助也强者怨之歸也故曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀逺者勞而無功舍逺謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣德者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲逺事邊外乎孔子曰吾恐季氏之憂不在顓臾且北狄尚强而屯田警備傳聞之事恆多失實誠能舉天下之半以滅大寇豈非至願茍非其時不如息人自是諸將莫敢言兵事者戴溪曰光武啓中興之運悼斯民之塗炭親拯救而撫摩之初遣馮異入關戒以征伐非必屠城要在還定安集之耳復遣岑彭擊蜀告以每一發兵髮動皓白常欲置隗囂公孫述於度外自隴蜀平後非警急未嘗復言軍旅務休息羣黎而鞏固漢業其肯遵高祖顛沛之畏塗蹈武帝虛耗之覆轍而舍近謀逺爭勝負於夷狄乎故二將抗章比伐詔引黃石公剛强柔弱之說而報之帝王之道然也臣按光武此詔所謂有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀逺者勞而無功舍逺謀近者逸而有終又曰務廣地者荒務廣德者强有其有者安貪人之有者殘與夫人不自保而欲逺事邊外傳聞之事恆多失實凡此皆藥石之格言無間古今皆所同然也後世人主有欲勤兵於逺者尚其鑒諸以上慎德懷逺之道譯言賔待之禮周禮懷方氏掌來逺方之民致方貢致逺物而送逆之逹之以節治其委積館舍飲食鄭𤣥曰懷來也逺方之民四夷之民也諭德延譽以來之王昭禹曰致方貢則逺方所貢之物若西旅底貢厥獒是也致逺物則致逺方所獻之物所謂無有逺邇畢獻方物是也逺方之有貢猶六服之貢則世一見各以其所貢之寶為摯是也逺方有所獻之物猶六服諸侯之獻國珍是也送逆之送往而逆來以為之禮也逹之以節逹民以旌節逹貢物以璽節也治其委積所以備其用也治其館舍所以安其居也治其飲食所以順其嗜好也臣按成周設官以待外夷之來朝貢者逹之以節則其往來關津道路之間無有留難淹滯之阻即今給驛劵也治其委積館舍飲食則其日用居止餼廩芻秣而無飢寒困乏之憂即今之館驛廩給及有司餽送是也凡若此者皆所以懷逺人也名官而謂之懷方氏豈無意也象胥掌蠻夷閩貉戎狄之國使謂蕃國之使掌傳王之言而諭說焉以和親之若以時入賔則協其禮與其辭言傳之凡其出入送逆之禮節幣帛辭令而賔相之鄭𤣥曰通外國之言者曰象胥凡其出入送逆之禮節幣帛辭令而擯相之從來至去皆為相而詔侑其禮儀也朱申曰八蠻四夷七閩九貉五戎六狄之國遣使來朝貢不曉中國言語故象胥傳王言而開諭解說之如此則逺人之心和而不乖親而不疏也若蕃國之君世一見之其禮不同於中國象胥則教之使協於禮其言不通於中國則傳其言辭出則送之入則逆之禮節以相接幣帛以致享辭令以相與接賔曰擯贊禮曰相臣按外國之人其拜揖進退拜伏之禮不同於中國象胥掌教之以中國之儀用協於禮也夫上有所言則象胥為之傳導而開諭曉說之然後從而譯其言以達之于上焉今制鴻臚寺設通事官即周之象胥也大行人九州之外謂之蕃國世一見各以其所貴寶為摯鄭𤣥曰九州之外蕃服也無朝貢之歲父死子立及嗣王即位乃一來耳各以其所貴寶為摯則蕃國之君無執玉瑞矣所貴者若犬戎獻白狼白鹿是也禮記中國夷戎五方之民皆有性也不可推移五方之民言語不通嗜欲不同逹其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯鄭𤣥曰五方之民性不可推移地氣使之然也方慤曰以言語之不通也則必達其志以嗜欲之不同也則必通其欲必欲達其志通其欲非寄象鞮譯則不可故先王設官以掌之寄言能寓風俗之異於此象言能倣象風俗之異於彼鞮則欲别其服飾之異譯則欲辨其言語之異周官通謂之象胥而世俗通謂之譯也臣按譯言之官自古有之然惟譯其言語而已也彼時外夷猶未有字書自佛教入中國始有天竺字其後回回女直䝉古緬甸其國人之黠慧者各因其國俗而自為一種字書其來朝貢及其陳說辨訴求索各用其國書必加翻譯然後知其意嚮之所在唐宋以來雖有潤文譯經使之銜然惟以譯佛書而已我文皇帝始設為八館曰西天曰韃韃曰回回曰女直曰高昌曰西蕃曰緬甸曰百夷初以舉人為之其就禮部試則以蕃書譯其所作經義稍通者得聮名于進士榜授以文學之職而譯書如故其後又擇俊民俾專其業藝成會六部大臣試之通者冠帶又三年授以官蓋重其選也蓋此一事似緩而實急似輕而實重一旦外夷有事上書來言其情使人人皆不知其所謂或知之而未盡則我所以應之者豈不至相矛盾哉非惟失逺情而或至啓邊釁者亦有之矣我文皇帝專設官以司之其慮逺哉明堂位九夷之國東門之外西靣北上八蠻之國南門之外北靣東上六戎之國西門之外東靣南上五狄之國北門之外南靣東上九采之國應門之外北靣東上四塞世告至孔頴達曰按職方云四夷八蠻七閩九貉五戎六狄爾雅云九夷八狄七戎六蠻謂之四海數不同者文異爾九州之外夷狄為四方蕃塞每世一至或新王即位及其君嗣立皆來朝也陸佃曰九采之國所謂要服荒服歟四塞即九夷八蠻六戎五狄也陳澔曰夷蠻戎狄各從其方之門而以右為尊獨南靣東上者不然方氏以為南靣疑於君故與北靣者同其上也四塞九州之外夷狄也臣按此古者蕃國君長來朝入門立班之制中庸孔子曰凡為天下國家有九經其八曰柔遠人也又曰柔逺人則四方歸之送往迎來嘉善而矜不能所以柔逺人也朱熹曰往則為之授節以送之來則豐其委積以迎之又曰逺人來至去時有節以授之過所在為照如漢之出入關者用繻唐謂之給過所者是也臣按周禮秋官環人所掌送逆邦國之通賔客以路節達諸四方送逆及疆是則為之授節以送之也地官遺人所掌邦之委積以待賔客野鄙之委積以待羇旅十里有廬廬有飲食三十里有宿宿有委五十里有市市有候館候館有積是則豐其委積以迎之也舊注以柔逺人為蕃國朱注始以為無忘賔旅蓋以九經之次列於懷諸侯之上以逺先近非其序也竊意成周盛時環人遺人之所掌在於道路之間非特為中國設也則雖夷狄之經行者亦為之送迎焉况九經之名其八者各有所指而此通謂之人意者凡逺去其家鄉而出於道途以朝京闕者皆給之歟漢志典客秦官掌歸義蠻夷景帝更名大行令武帝更名大鴻臚屬官有行人譯官臣按此秦漢以來設官主掌蠻夷之始所謂大行令即周禮行人之職譯官即王制所謂寄譯之類也考史昭帝用蘇武為典屬國亦掌夷狄之官而百官表不載臣以為漢大鴻臚即今鴻臚寺卿譯官即今通事之職典屬國其今御前通事之武臣歟宣帝時胸奴呼韓邪單于欵五原塞願朝三年正月詔有司議其儀丞相御史曰單于朝賀宜如諸侯王位次在下蕭望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國讓而不臣此則羇縻之誼謙亨之福也書曰戎狄荒服言其來服荒忽無常如使胸奴後嗣卒有鳥竄鼠伏闕於朝享不為畔臣萬世之長䇿也天子采之詔曰胸奴單于稱北藩朝正朔其以客禮待之令單于位在諸侯王上謁贊稱臣而不名荀悅曰春秋之義王者無外欲一于天下也戎狄道里遼逺人迹介絶故正朔不及禮教不加非尊之也詩曰自彼氐羌莫敢不來王故要荒之君必奉王貢若不供職則有辭讓號令加焉非敵國之謂也望之之議僣度失序以亂天常非禮也臣按胡安國謂荀氏為此說其知內外之㫖明於馭戎之道唐志主客郎中掌諸蕃朝見之事殊俗入貢者始至之州給牒覆其人數謂之邊牒蕃州都督刺史視品給以衣冠袴褶初至及辭設會參曰設食臣按外夷而來朝給以衣冠宴食自古皆然然唐志但謂之會而不以宴名蓋不備燕享之禮也然惟主之以禮部之屬而未嘗專命大臣後世乃或有用武將待之者臣竊以為非宜蓋禮儀非武臣所宜預將乃吾國之爪牙止可使敵聞其名不可使敵識其靣設或有貌不掦如裴度者中雖有智彼惡知之哉或因此而藐我將相關係亦不小也吁武將且不可况內侍乎昔童貫初使遼也遼人以為宋無人因此以占宋人失政而啓其輕蔑之心此前代之明鑒也鴻臚寺領典客司儀二署凡四夷君長以蕃望高下為簿朝見辨其等位諸蕃封命則執冊而往凡獻物皆各執以見駝馬則陳于朝堂不足進者州縣留之其屬有典客署令掌四夷歸化朝貢酋渠首領朝見者給廩食病則遣醫給湯藥喪則給以所須還蕃賜物則佐其受領教拜謝之節臣按唐人之待蕃夷之朝貢者既有宴賜資給其不幸而病及喪者亦有給賜焉宋設鴻臚寺掌四夷朝貢宴勞給賜送迎之事凡四夷君長使價朝見辨其等位以賔禮待之授以館舍而頒其見辭賜豫宴設之式戒有司先期辦具有貢物則具其數報四方館引見以進諸蕃封冊即行其禮命臣按唐宋俱有諸蕃封冊之禮四夷君長來朝先遣使迎勞於候館次日奉見于乾元殿設黃麾仗及宫懸大樂典儀設君長位於懸南道西北阿又設其諸官位於後所司引其國君服其國服至明德門外通事舍人引就位皇帝服通天冠絳紗袍即御位典儀贊拜國君拜稽首侍中承制降勞皆再拜稽首復位次引其國諸官以次入就位拜如儀其賜宴與受諸國使表及幣皆有儀具載開寶通禮元豐八年夏使來詔夏國使見辭儀制依嘉祐八年見於皇儀殿門外辭詣垂拱殿凡蕃使見辭同日者先夏國次高麗次交址次海外蕃客次蠻夷臣按采人外夷朝見皆于别殿不在常朝之所其同日辭見者亦有次第蓋朝廷之於外夷不能無厚薄同時待之而各異其禮固非一視同仁之道亦恐因此而啓其忿忿不平之心也唐太宗貞觀四年高昌王麴文泰入朝西域諸國皆因文泰請朝上令文泰使人迎之魏徴諌曰昔光武不聼西域送侍子置都護以為不以蠻夷勞中國前者文泰之來緣道供億甚苦若諸國皆來將不勝其弊姑聼其商賈往來與邊民交市則可矣儻以賔客遇之非中國之利也時所使人已行上遽止之臣按人君行事當務實不可徇虛名蠻夷慕義而朝固是美事然其中亦有貪中國貨物而假以朝貢為名者不可不知也所以待之者要在得其輕重之宜既不為所欺紿而又不失其禮可也宋哲宗元祐中學士院言諸蕃初入貢者請令安撫鈐轄轉運等司體問其國所在逺近大小與見今入貢何國為比保明聞奏庶待遇之禮不致失當臣按諸蕃初入貢者前此未有體例因其所言而制為禮節欺無失矣漢武帝元狩二年胸奴渾邪休屠王帥衆來降漢發車二萬乘迎之縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令右內史汲黯曰長安令無罪獨斬臣黯民乃肯出馬且胸奴畔其主而降漢漢徐以縣次傳之何至令天下騷動罷敝中國之人乎上默然及渾邪王至賈人與市者坐當死五百餘人黯請間曰夫胸奴攻當路塞絶和親中國興兵誅之死傷者不可勝計而費以巨萬百數臣愚以陛下得胡人皆以為奴婢以賜從軍死事者家今反虛府庫賞賜發良民侍飬譬若奉驕子愚民安知市買長安中物而文吏繩以為闌出財物於邊關乎陛下縱不得胸奴之資以謝天下又以微文殺無知者五百餘人是所謂庇其葉而傷其枝者臣竊為陛下不取也臣按此以外夷來降罷敝中國雖與朝貢者不同然後世外夷入貢經過郡縣為生民擾害亦往往有類此者汲黯論胸奴來降謂庇其葉而傷其枝臣竊以為外夷朝貢而不為之節制則是慕虛名而受實害也况後世人心不古非獨中國為然而外夷尤甚彼其所以梯山航海而來者慕華向義之心固不能無然亦多有貪中國之貨物而欲以轉貨他國以取厚利者此亦不可不知也今宜為之制隨其地逺近立定年限亦如宋朝立回賜于闐國信分物法所遣使雖多止一加賜又命于闐國使以表章至則間嵗聼一入貢餘令於熙秦州貿易及元豐著令西南五姓蕃每年許一貢期限不及者不許如此則朝廷既得懷柔外夷之道而我之百姓亦不至罷敝於道路矣宋哲宗元祐中禮部尚書蘇軾言高麗人每次入貢朝廷及淮浙兩路賜豫餽送燕勞之費約十餘萬貫而修飾亭館騷動行市調發人船之費不在焉除官吏得少餽遺外了無絲毫之利所得貢獻皆是玩好無用之物而所費皆是帑廩之實民之膏血也今來直牒國子監收買諸般文字內有䇿府元龜歷代史及敕式國子監知其不便申禀都省下禮部看詳謹按漢書東平王來朝上疏求諸子及太史公書當時大臣以為諸子書或反經術非聖人或明鬼神信物怪太史公書有戰國縱橫權譎之謀漢興之初謀臣竒䇿天官災異地形厄塞皆不宜在諸侯王不可與詔從之臣竊以為東平王骨肉至親特以備位藩臣猶不得賜而况海外之裔夷乎臣聞河北𣙜場禁出文書其法甚嚴徒以契丹故也今高麗與契丹何異臣按今四夷之好書籍者惟安南與朝鮮朝鮮恭順朝廷歲時覲聘禮節無失所經過郡縣無多而貨買止於京師安南入貢雖疏然經行道路幾至萬里沿途隨處得以市買且宋朝書籍版本俱在國子監今書籍處處有之請自今外夷有來朝貢者非有㫖不得與交易而於書籍一事尤宜嚴禁彼欲得之許具數以聞下翰林院看詳可否然後與之大學衍義補卷一百四十五
