body:
  text: 大學衍義補卷六十二明丘濬撰治國平天下之要秩祭祀內外羣祀之禮舜典遍周也于羣神孔安國曰羣神謂丘陵墳衍古之聖賢皆祭之孔頴達曰遍于羣神則神無不遍周禮大司樂云凡六樂者一變而致川澤之示同祇再變而致山林之示三變而致丘陵之示四變而致墳衍之示鄭玄曰積石曰山竹木曰林注瀆曰川水鍾曰澤土髙曰丘大阜曰陵水崖曰墳下平曰衍古之聖賢祭法所云在祀典者黃帝顓頊句龍之類皆祭之也詩周頌時邁篇曰懷來也柔安也百神及河喬嶽允信也王維后朱熹曰懷柔百神以至于河之深廣嶽之崇髙而莫不感格則是信乎周王之為天下君矣臣按人君有天下之大則凡在天之下者昭昭之際則有人冥冥之中則有神明而為人無一人之不得其所幽而為神無一神之不受其職是在人君懷而來之柔而安之不以幽明人鬼而有間則信乎有以當上帝之命而為神人之主矣不然人怨神怒而失其所以為君之道矣人君所以懷柔之道奈何吁有民人焉則有德以懷柔之有社稷焉則有禮以懷柔之周禮大宗伯以貍沈祭山林川澤以疈辜祭四方百物吳澄曰貍沈者山林之祭其牲玉埋之川澤之祭其牲玉沈之疈辜者披牲胸中疈􅣭之曰辜臣按大宗伯既以血祭祭五嶽又以貍沈祭山林川澤蓋五嶽名山乃次祀而山林川澤能興雲雨見怪物者其羣小祀歟孔氏以之解舜典羣神有所自也司服王祭羣小祀則玄冕鄭玄曰羣小祀山林川澤墳衍四方百物之屬禮記禮器一獻質又曰一獻孰鄭玄曰祭羣小祀最卑但一獻而已其禮質略祭法四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡無也其地則不祭鄭玄曰四方謂山林川谷丘陵之神也祭山林丘陵于壇川谷于坎每方各為坎為壇怪物雲氣非常見者也有天下謂天子也百者假成數也孔頴逹曰四坎壇四方各為一坎一壇山林川谷丘陵能出雲為風雨見怪物此四坎壇所祭之神也天子祭天地四方言百神舉其全數諸侯不得祭天地若山林川澤在其封內而益民者則得祭之如魯之泰山晉之河楚之江漢是也封內無此山川則不得祭臣按祭法謂山林川谷能出雲為風雨曰神則是合山川雲風雨而為一也可見山川者雲風雨之體而雲風雨者山川之用也本朝合風雲雷雨與五嶽四鎮四瀆四海同一壇總名之曰山川壇殆有合于祭法所謂神歟夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之孔頴逹曰法施於民若神農后土帝嚳與堯及黃帝顓頊與契之屬以死勤事舜及鯀冥是也以勞定國禹是也禦大災捍大患湯及文武是也陳祥道曰法施於民民功曰庸也以死勤事以勞定國事功曰勞也禦天之大災捍人之大患治功曰烈也堯之道至於無能名舜之道至於無為而其所以見祀者止於賞均刑法以義終勤衆事而野死烈者道德之迹迹者祀典之所可載而其為道非祀典之所可盡也臣按祭法言聖王制祭祀之禮其常典所當祀者有五焉其下文復歷敘自古君臣有道功庸者以實之凡十有四人為君者八人為臣者六人後世廟祀前代帝王而以其功臣從享者其原蓋出于此本朝洪武初建帝王廟於南京雞鳴山之陽以祀三皇五帝三王漢高祖光武唐太宗宋太祖元世祖所祀者止及一統之世創業之君其與前代泛及無統者異矣又詔以歷代名臣從祀帝王廟乃以風后力牧臯陶夔龍伯夷伯益伊尹傅説周公旦召公奭太公望方叔召虎張良蕭何曹參陳平周勃鄧禹馮異諸葛亮房玄齡杜如晦李靖郭子儀李晟曹彬潘美韓世忠嶽飛張浚穆呼哩博勒呼博勒珠齊拉衮巴延凡三十有七人是皆前代之君臣同德始終一心者然其中或有不祀其君而祀其臣者蓋惟取其純德巨功位列而通祀之非若前代隨其君而各以其臣配其食也臣愚竊以為昔者建都南京歷代帝王廟因在於彼今郊廟既立於此則帝王廟亦當從之而北焉議禮之事非臣下所當及者謹述所見如此或者謂元世祖無功於中國而其臣穆呼哩輩亦皆為中國害者不祀亦可及夫日月星辰民所瞻仰也山林川谷丘陵民所取財用也非此族也不在祀典陳澔曰族類也祀典祭祀之典臣按祀典之大者其在天者則為民之所瞻仰其在地者則為民之所取財用其在人者則為有德有功於民而除去民之災患者也凡此等類則典禮之所祀非此等類則在所廢焉漢高祖二年或言周興而邑立后稷之祠至今血食天下於是制詔天下立靈星祠常以歲時祀以牛臣按后稷祠而謂之靈星者以稷配靈星也又按漢舊儀修復周家舊祀后稷常以八月祭以太牢為民祈農報功隋制祀先代王公帝堯於平陽以契配帝舜於河東咎繇配夏禹於安邑伯益配商湯於汾隂伊尹配文王武王於灃渭之郊周公召公配漢高祖於長陵蕭何配臣按秦始皇南巡望祀舜於九嶷上會稽祭禹北魏文成東巡歷橋山祀黃帝然皆因所至而祀也未有常典魏孝文太和始詔祀堯舜禹及周公然惟用清酌尹祭而已脯曰尹祭至隋始定為常祀祀用太牢而唐因之唐天寶六載敕三皇五帝創物垂範宜有欽崇三皇伏羲以勾芒配神農以祝融配黃帝以風后力牧配五帝少昊以蓐收配顓頊以玄冥配髙辛以稷契配唐堯以羲仲羲叔配虞舜以夔龍配其擇日置廟樂用宫懸牲用少牢以春秋致享臣按此祀三皇之始前此堯舜各祭於所都之地今乃併三皇立廟焉七載又詔置廟祀三皇以前帝王天皇氏地皇氏人皇氏有巢氏燧人氏臣按此祀三皇以前帝王之始然皇莫大於伏羲神農黃帝帝莫盛於少昊顓頊高辛堯舜王莫備於禹湯文武經史所紀者僅此而已三皇以前世涉洪荒事屬茫昧有陵墓者命有司守之不立廟祀可也代宗永泰二年詔道州舜廟宜蠲近廟佃户充掃除臣按玄宗時嘗令歷代帝王廟每所差側近人四户有闕續填其後有勑廢之至是代宗從道州刺史元結請而有此舉宋太祖建隆二年詔先代帝王陵寢宜令所屬州府遣近戶守視其冢墓有隳毁者亦加修葺乾德元年又詔曰歷代帝王國有常享著於甲令可舉而行五代亂離率多廢墜其高辛廟堯廟舜廟夏禹廟商湯廟周文王廟武王廟漢高祖長陵宜令有司每三年一享嚴禁樵採後又命祀漢光武及唐太宗廟四年又詔太昊女媧炎帝黃帝顓頊高辛唐堯虞舜夏禹成湯周文武漢髙祖世祖唐髙祖太宗十有六帝各給守陵五户長史春秋奉祀商太戊武丁周成康漢文宣魏太祖晉武帝後周太祖隋高祖十帝各給三户歲一享秦始皇漢景武明章魏文帝後魏孝文唐玄肅憲宣梁太祖後唐莊宗明宗晉高祖十五帝各給二户三年一祭周桓王靈王景王威烈王漢元成哀平和殤安順沖質獻魏明髙貴鄉公陳留王晉惠懷愍西魏文帝東魏孝靜唐高宗中宗睿宗德宗順宗穆宗敬宗文宗武宗懿宗僖宗昭宗梁少帝後唐末帝三十八帝止禁樵採臣按宋太祖次序歷代帝王給守陵户命有司致享可謂忠厚之至矣但其所品第者亦有未盡善者焉其第一等十六帝給民五户第二等十帝給民三户第三等十五帝給民二户皆令有司歲祀第四等惟禁樵採無陵户無祭祀其第一等皆創業之君無可議者其第二等曹操以篡得國未嘗即帝位也而亦列於成康漢文之間朱溫篡弒其君無復人理而亦得預於景武玄憲之列則似無别矣至於北朝五代之陵墓皆禁樵採而於南朝獨遺者是時吳蜀未平也嗚呼宋祖此舉雖若為崇奉帝王而設然其品第之間亦寓抑揚之意後世人主鑒之亦知所以自勉矣我朝於帝王陵廟既命有司歲時修葺又於三年一次出祝文香帛遣太常寺樂舞生齎往所在命有司致祭其所祀者伏羲媧皇神農軒轅少昊顓頊高辛堯帝舜帝夏禹商湯商中宗高宗周文王武王成王康王漢高祖文帝景帝武帝宣帝光武魏文帝唐高祖太宗憲宗宣宗周世宗宋太祖太宗真宗仁宗孝宗理宗元世祖凡三十六帝是皆盛德之主有功於生民者也是皆出於我聖祖之所選定可謂公且嚴矣其視前代之所取舍豈不大有徑庭哉以上歷代帝王之祀唐玄宗天寶七載詔歷代忠臣義士孝婦烈女史籍所載德行彌高者所在宜置祠宇量事致祭臣按後世祭忠臣義士孝婦烈女始於此所謂忠臣者十有六人商傅説箕子微子比干齊管夷吾晏嬰晉羊舌叔向魯季孫行父鄭東里子産燕樂毅趙藺相如楚屈原漢霍光蕭望之丙吉諸葛亮也義士者八人殷伯夷叔齊周泰伯吳季札魏段干木齊魯仲連楚申包胥漢紀信也孝婦者七人周太薑太妊太姒魯大夫妻敬薑鄒孟軻母漢陳宣孝婦曹世叔妻大家也烈女者十有四人周宣王齊薑衛太子共薑楚莊王樊姬楚昭王女宋共伯姬梁宣高行齊杞梁妻趙趙括母漢班婕妤馮昭儀王陵母張湯母嚴延年母淳于緹縈也以上並令郡縣長官隨其所在立為祠宇春秋二時擇日致祭宋太祖開寶三年詔前代功臣烈士宜令有司詳其勳業優劣以聞有司言齊孫臏晏嬰晉公孫杵臼燕樂毅漢曹參陳平韓信周亞夫衛青霍去病霍光蜀則先主關羽張飛諸葛亮唐房玄齡長孫無忌魏徵李靖李績尉遲敬德渾瑊段秀實等皆勳德高邁為當時之官晉趙簡子齊孟嘗君趙趙奢漢丙吉唐高士廉唐儉岑文本馬周為之次南燕慕容德唐裴寂元稹又其次詔孫臏等各置守冡三户趙簡子等各兩户悉蠲其役慕容德等禁樵採臣按宋有司所品第前代功臣烈士為三等皆據其有冡墓存者爾歷代勳德之名固不止此然其所品第者乃一人之見非萬世公論也真宗大中祥符元年詔曰周文公旦制禮作樂垂之千載祠宇未設闕孰甚焉可追封文憲王於曲阜縣建廟春秋委本州長史致祭臣按自唐以前並祀周公而以孔子配自後專祀孔子而周公無廟誠闕典也後世宜為建廟於魯地一視孔子有司歲祀用釋奠儀但不通祀於天下庶於報祀之典為稱神宗元豐三年詔前代百辟卿士載於祀典者皆不名元豐六年太常寺言請自今諸神祠加封無爵號者賜廟額已賜額者加封爵初封侯再封公次封王先有爵位者從其本號婦人之神封夫人再封妃其封號者初二字再加四字如此則錫命馭神恩禮有序從之臣按前代鬼神皆有封號贈諡至本朝始詔革天下神封其詔略曰忠臣烈士雖可加以封號亦惟當時為宜夫禮所以明神人正名分不可以僣差今命依古定制凡歷代忠臣烈士亦皆當時初封以為實號後世溢美之稱皆與革去庶幾神人之際名正言順於理為當用稱朕以禮祀神之意嗚呼聖祖此詔一洗千古之繆可以為萬世法矣以上忠臣烈士之祭漢成帝時匡衡奏罷五畤及陳寶祠復條奏長安厨官給祠郡國侯神方士使者所祠凡六百八十三所其二百八所應禮可奉祠如故其餘四百七十五所不應禮請皆罷奏可明年匡衡坐事免衆庶多言不當變動祭祀者天子異之以問劉向對曰家人謂庶人之家尚不欲絶種祠繼嗣所傅祭者况於國乎楊時曰人情狃於禍福而易動鬼神隱於無形而難知以易動之情稽難知之理而欲正百年之繆宜乎其難矣以劉向之賢猶溺於習見况餘人乎胡寅曰帝王無妄祭無僥福然則凡載於秩典者其皆有功德垂世如祭法所謂法施於民以死勤事以勞定國能禦大災能捍大患及上古君臣之聖賢者歟非此族也則非所事矣漢興禮廢之後先王祭法既不傳自秦以來乃多淫祀至武帝用方士言而尤盛焉皆無所經見率意建立逮於季世凡七百餘祀一歲萬七千祠其不度可知矣匡衡請罷之是也然稽泉臺之議不必毁撤姑存而勿舉可也劉向資氣精忠漢賢大夫豈谷永所敢望然學少不純頗信異端鴻寶祕書其所舊習今茲種祠之論謂皆有感應而後營之者何考之未詳歟是皆山呼巨迹之類以欺武帝者豈當據以為實也善乎谷永之言曰明天地之性而知萬物之情則不可惑以神怪罔以非類以永諂邪而能及此向反不及焉尺有所短寸有所長其果然矣章帝元和二年詔曰山川百神應祀者未盡其議增修羣祀宜享祀者魏文帝黃初五年詔曰先王制禮所以昭孝事祖大則郊社其次宗廟三辰五行名山大川非此族也不在祀典叔世衰亂崇使巫史至乃宫殿之內户牖之間無不沃酬甚矣其惑也自今其敢設非禮之祭巫祝之言皆以執左道論著於令宋哲宗紹聖六年禮部侍郎黃裳請詔天下州軍籍所在祠廟略敘本末如圖經命曰某州祀典從之臣按天下之神祠多矣有一方專祀者又有天下通祀者專祀者則俾有司考求其所以為神之故有何功烈有何靈驗始於何代詳著其姓氏爵位及歷代有無封號其通祀者惟於所生及遊宦之地詳其始末其他處則著其建置祠宇歲月及在此靈應之迹命祠部輯為一書以備稽考徽宗致和元年詔開封府一應神祠不在祀典者毁之乃毁一千三十八區仍禁軍民擅立神祠臣按徽宗之世崇尚神怪之事顧於神祠乃加毁壞其時雖非而所行則是也朱熹謂後世有箇生的神道人心邪向他他便盛如狄仁傑只留泰伯伍子胥廟壞了許多廟其鬼亦不能為害這是他見得無這物事了上蔡云可者欲人致生之故其鬼神不可者欲人致死之故其鬼不神可見鬼神不能自神所以神不神由人心之向背也高宗建炎以後凡郊赦皆云歷代聖帝明王忠臣烈士有功於民載在祀典者命所在有司祭之臣按有天下者祭百神非獨郊廟之尊山川之顯在所當禮凡前代之所舉者有其舉之則莫敢廢也山川土地之神則有神而無人如唐之曲江宋之夷門山之類忠臣烈士之神則有人而後為神如唐之睢陽廟宋之崔府君之類我國家初建都於金陵其山川社稷之外前代之忠臣烈士有所謂蔣忠烈卞忠貞曹武惠劉忠肅衛國忠肅諸廟皆敕命有司建置歲時致祭者也又有所謂功臣廟以祀中山王徐達開平王常遇春岐陽王李文忠寧河王鄧愈東甌王湯和黔寧王沐英與夫馮國用耿再成丁德興張德勝吳禎康茂才茅成胡大海趙德勝華高俞通海吳良曹良臣吳復孫興祖十五人者皆開國之元勳大臣有功於國者也此外所謂真武廟壽亭侯廟五顯天妃之類皆前代所有者亦不廢焉臣竊以謂古今時世不同而人物不能以不異人物既異則其鬼神之情狀在古今者亦或不能以皆同也雖然情狀雖或不同而感通之理則未嘗不一朱熹曰天子祭天地諸侯祭山川大夫祭五祀皆是自家精神抵當得他過方能感召得他來如諸侯祭天地大夫祭山川便沒意思了又曰神不歆非類民不祀非族只為這氣不相關如天子祭天地諸侯祭山川大夫祭五祀雖不是我祖宗然天子者天地之主諸侯者山川之主大夫者五祀之主我主得他便是他氣總統在我身上如此便有相關處嗟乎有天下者祭百神則天子者乃百神之主也既為之主則其氣類與之相關矣夫然則凡在天下之天神地祗人鬼何者而非天子之所主乎以上論內外羣祀之禮大學衍義補卷六十二
