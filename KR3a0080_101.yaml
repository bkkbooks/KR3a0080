body:
  text: 大學衍義補卷一百一明丘濬撰治國平天下之要慎刑憲總論制刑之義下吕刑伯夷降典折民惟刑蔡沈曰典禮也伯夷降天地人之三禮以折民之邪妄蘇軾曰失禮則入刑禮刑一物也呉澂曰自上教下曰降伯夷教民以禮民入於禮而不入於刑折絶斯民入刑之路也臣按虞廷九官伯夷作秩宗典禮臯陶作士師掌刑而此則云伯夷折民惟刑蔡沈謂捨臯陶而言伯夷探本之論也蓋禮與刑二者出此則入彼立典於此而示民以禮節之所當然而又象刑於彼而示民以法禁之所必然所當然者祀典之常制所必然者有司之成法降下其典於民使其知必如此則為合於禮不如此則為犯於刑啓其善端遏其邪念折而轉之使不入於刑而入於禮焉所以然者蓋以禍亂之興多起於民之干犯禮典民神雜揉妖誕肆興則人心不正而禍亂作矣伯夷作秩宗降下祀天神享人鬼祭地祗之三典播告之脩著為格令使夫蚩蚩蠢蠢之民皆知人各有所當祭之鬼神非此族也不在祀典祭非祭者有禁犯禁者輕則有罰重則有誅是以各安其分而不敢瀆齊盟行僣禮舉滛祀習妖術由是常道明而人心正所以不犯于有司是則伯夷所降之典其禮儀等級雖非一端而折絶斯民之邪心妄念惟在於刑焉耳所謂折民惟刑意或在此歟又按班固漢書刑法志引此言折作悊下文即繼之以言制禮以止刑解者謂悊知也言伯夷降下禮法以道人人習知禮然後用其刑也其言亦有理士制百姓于刑之中以教秪徳蔡沈曰舜命臯陶為士制百姓于刑辟之中所以檢其心而教以秪徳也呉棫曰臯陶不與三后之列遂使後世以刑官為輕後漢楊賜拜廷尉自以代非法家言曰三后成功惟殷于民臯陶不與蓋吝之也是後世非獨人臣以刑官為輕人君亦以為輕矣觀舜之稱臯陶曰刑期于無刑民協于中時乃功又曰俾予從欲以治四方風動惟乃之休其所繫乃如此是可輕哉臣按吕刑雖周穆王所作然必有所傳授非虚言也夫伯夷禮官也所降者典而折民惟刑臯陶刑官也所制者刑而教民秪徳可見有虞為治專以禮教為主而刑辟特以輔其所不及焉耳禮典之降而折以刑所以遏其邪妄之念而止刑辟於未然刑罰之制而教以徳所以啓其秪敬之心而制刑辟於已然禮教刑辟之相為用如此帝世之制所以本末兼舉而民協于中自不犯於有司也歟穆穆在上明明在下灼于四方罔不惟徳之勤故乃明于刑之中率乂于民棐彛蔡沈曰穆穆者和敬之容也明明者精白之容也灼于四方者穆穆明明輝光發越而四逹也君臣之徳昭明如是故民皆觀感動盪為善而不能自已也如是而猶有未化者故士師明于刑之中使無過不及之差率乂于民輔其常性所謂刑罰之精華也吕祖謙曰當時承蚩尤之弊妖誕怪神深溺人心重黎絶地天通固區别其大分矣然蠱惑之久未易遽勝伯夷復降天地人之祀典使知天地之性鬼神之徳森然各有明法向之蠱惑消蕩不留所謂折民于刑也自不知本者觀之平水播穀若所急而降典可緩抑不知人心不正胥為禽夷雖有土安得而居有粟安得而食伯夷降典先其本也自伯夷之典迄臯陶之刑制度文為之具也自穆穆在上至率乂于民棐彛精神心術之運也茍無其本則前數者不過卜祝工役農圃胥史之事耳臣按虞廷君臣其徳存於中其容著於外天下之人瞻而望之見其明白顯著在上者灼然而明在下者曉然而喻無有回䕶掩蔽之私幽深隱僻之事是以當世之民耳聞而心孚目擊而意契固無有不化者而無待於刑罰之加然聖人之心則自以為吾之君臣固勤矣然吾民之生生無窮安能皆保如今日乎故命士師明於刑之中制為一定之制以曉天下之人如是則為太過如是則為不及必如是而後為無過不及而中矣所以然者率乂于民輔其常性使其常循乎矩度之中而不出乎防範之外而天然自有之中本然不易之性常全而不失矣天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三徳一人有慶兆民賴之其寧惟永蔡沈曰刑獄非所恃以為治也天以是整齊亂民使我為一日之用而已非終即康誥大罪非終之謂言過之當宥者惟終即康誥小罪惟終之謂言故之當辟者非終惟終皆非我得輕重惟在夫人所犯耳爾當敬逆天命以承我一人畏威古通用威辟之也休宥之也我雖以為辟爾惟勿辟我雖以為宥爾惟勿宥惟敬乎五刑之用以成剛柔正直之徳則君慶於上民賴於下而安寧之福其永久而不替矣臣按刑天討也天以是而齊亂民不得已而為一日之用爾非常用以為治之具也人君奉天道以出治所以為治者徳也刑非所先也民有不齊者不得已而用刑以治之姑以為一日齊民之用也所以為治者不顓顓在是也典獄之官必當敬逆天之命以奉承乎君過之當宥者則承天之命以宥之不當宥者君雖宥之不宥也過之當辟者則奉天之命以辟之不當辟者君雖辟之不辟也所以然者守君之法所以奉君也順天之理所以敬天也奉君之法而不奉君之意則是能敬迎天命矣所以敬迎天命者敬五刑以成三徳而已矣敬五刑以為一日之用成三徳以立萬世之則刑用而即已徳立而無窮所以為國家之慶者容有旣乎兆民以之而永賴國祚由是而延長三代有道之長用此道也秦人恃刑罰以為一世之用卒之流毒海内二世即亡豈非永鑒哉王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及蔡沈曰有民社者皆在所告也夫刑凶器也而謂之祥者刑期無刑民協于中其祥莫大焉及逮也漢世詔獄所逮有至數萬人者審度其所當逮者而後可逮之也曰何曰非問答以發其意以明三者之決不可不盡心也呉徵曰刑而曰祥刑蓋慈良惻怛詳審謹重主之以不忍行之以不得已所以謂之祥也在今日欲安百姓何者當擇非人乎何者當敬非刑乎何者當揆度非及乎人謂用刑之人及謂刑之所加猶罰及爾身之及臣按叅錯訊鞫極天下之至勞者莫若獄割斷箠擊極天下之至慘者莫若刑是乃不祥之器也而古人謂之祥刑者蓋除去不善以安夫善使天下之不善者有所畏而全其命天下之善者有所恃而安其身其為器也固若不祥而其意則至善大祥之所在也茍用人而不擇用刑而不敬逮人而妄及非辜其為不祥之器也宜哉蘇軾謂罪非已造為人所累曰及秦漢間謂之逮獄吏以不遺支黨為忠以多逮廣繫為利漢大獄有逮萬人者國之安危運祚長短咸寄於此噫漢獄之逮最多者皆在末造之世使當髙文光武明章之世得張釋之于定國輩為廷尉無此也穆王設為三問而三答之其要尤在於擇人得其人必能敬刑能敬刑則不妄逮矣輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要蔡沈曰罰之輕重亦皆有權權者進退推移以求其輕重之宜也刑罰世輕世重者周官刑新國用輕典刑亂國用重典刑平國用中典隨世而為輕重者也輕重諸罰有權者權一人之輕重也刑罰世輕世重者權一世之輕重也惟齊非齊者法之權也有倫有要者法之經也言刑罰雖惟權變是適而齊之以不齊焉至其倫要所在蓋有截然而不可紊者矣臣按先儒謂情之輕重世之治亂不同則刑罰之用當異而欲為一法以齊之則其齊也不齊以不齊齊之則齊矣惟齊非齊以不齊齊之之謂也先後有序謂之倫衆體所會謂之要所謂法之經也經一定而不可紊權則因時而制宜穆王年雖耄荒而其訓刑也猶守文武之法惓惓然猶有唐虞之遺意此夫子所以取之也王曰嗚呼嗣孫嗣世子孫今往何監視也非徳于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉善也師衆也監于兹祥刑蔡沈曰此詔來世也言今往何所監視非用刑成徳而能全民所受之中者乎下文哲人即所當監者五極五刑也明哲之人用刑而有無窮之譽盖由五刑咸得其中所以有慶也諸侯受天子良民善衆當監視于此祥刑吕祖謙曰中者吕刑之綱領也苗民罔是中者也臯陶明是中者也穆王之告司政典獄勉是中者也末章訓迪自中之外亦無他說焉今爾何所當監豈非徳於民之中乎用刑者有意干譽欲以徳名而不足以為徳所以為徳者必於民之中而後可也夏僎曰民受天地之中以生未嘗不善其陷於罪惡非其本然也故民曰嘉師刑雖主於刑人然刑姦宄所以扶善良雖曰不祥乃所以為祥也故刑曰祥刑嘗為之說曰民之犯刑無非惡也而謂之嘉師刑本不祥之器也而謂之祥刑能以惡為嘉以不祥為祥而後知用刑之道矣臣按帝王之道莫大於中中也者在心則不偏不倚在事則無過不及帝王傳授心法以此為傳道之要以此為出治之則書始於虞書允執厥中大舜以之而傳道書終於周書咸中有慶穆王以之而訓刑聖人之心不偏不倚而施之事為者無過不及非獨徳禮樂政為然而施於刑者亦然蓋民不幸犯于有司所以罪之者皆彼所自取也吾固無容心於其間不偏於此亦不倚於彼一惟其情實焉旣得其情則權其罪之輕重而施以其刑其刑上下不惟無太過且無不及焉夫是之謂中夫是之謂祥刑周禮乃立秋官司冦使帥其屬而掌邦禁以佐王刑邦國鄭𤣥曰秋官司冦者象秋所立之官冦害也先王之治先之以徳禮而輔之以刑政故司冦掌刑而屬於秋官秋者天氣肅殺而刑以義為主也刑官司至於冦則刑官之事無不舉矣臣按小宰言秋官其屬六十掌邦刑而此言掌邦禁蓋禁者戒之於未然刑者治之於已然先王之心惟恐民愚而誤入於刑罰故豫為明示法禁使知有如是之罪必陷如是之刑有如是之惡必麗如是之辟明威立義俾知不迷防微遏萌逆折其始必不得已而後刑之禁之所以為仁刑之所以為義禁之不已猶有犯焉於是乎以義斷仁焉此其所以立民極也歟大司冦之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典林之竒曰司冦刑新國用輕典者以其舊染汙習不可遽正姑以教之宜以柔克之義也刑平國用中典者以其已安已治旣富旣庶陶冶被服莫不卞治則教化已眀習俗已成宜以正直之義也刑亂國用重典者以其頑昏暴悖不可訓化則殱渠魁滅彊梗宜以剛克之義也書曰惟敬五刑以成三徳其此之謂乎臣按典者常也民失其常則為權時之制本三徳以趣時分三典以興治使之復其常焉聖人於此何容心哉伏惟我聖祖作條訓以示子孫有曰朕自起兵至今四十餘年人情善惡真偽無不歴涉其中姦頑刁詐之徒特令法外加刑使人知所警懼不敢輕易犯法然此特權時處置頓挫姦頑非守成之君所常用以後子孫做皇帝時止守律與大誥竝不許用黥刺剕劓閹割之刑敢有請用此刑者將犯人凌遲全家處死由是觀之可見聖祖以重刑待前元盖非得已也文子文孫當承平之時守祖宗之訓一用平典以安兆民敷仁恩於四海延國祚於萬年臣不勝至願以五刑糾察也萬民一曰野刑上功農功也糾力勤力也二曰軍刑上命謂將命糾守謂不失部伍三曰鄕刑上徳謂六徳糾孝謂善事父母四曰官刑上能謂能其事糾職謂脩具職五曰國刑上愿慤慎也糾暴暴當作恭不恭者當糾也劉彜曰刑者不得已而用之豈聖人所樂哉故力不懋則財不生而野荒民散矣是野刑不可已也亂不除則民不安而民散國離矣是軍刑不可已也孝不盡則忠不純而家破國微矣是鄕刑不可已也職不舉則治不成而政衰俗薄矣是官刑不可已也禮不行則中不建而若弱臣强矣是國刑不可已也天地四時者六官之序聖人體其序而化成天下之道也野軍鄉官國者五刑之序聖人不得已而即其序以措萬民於中和之道也臣按先儒謂以五刑糾萬民者建六典以為民極也是故六卿各職於其官而建之使必行於天下行之使必範於後世者大司㓂正其刑典也是故野刑不立則事功不成功之所以成者役民以作事咸赴力以致其力也野刑之用專以糾不致力之人則凡國家之溝涂隄防城邑樹藝野無不闢而功無不成矣則是冬官所建之事典待刑而立也軍刑不立則軍令不行令之所以行者設民以立政咸用命以死守也軍刑之用專以糾不死守之人凡國家師旅茇舎校閲征戍軍無不振而命無不用矣則是夏官所建之政典待刑而立也孝不盡則徳不純設為鄕刑以糾不孝之人則民皆上徳而無不孝之子凡司徒八刑所糾者孝友睦婣任恤之行備矣是教典資於刑也職不舉則能不見設為官刑以糾不職之人則吏皆上能而無不治之職凡冢宰百官所建者官聫府史胥徒之職舉矣是治典有資於刑也禮典之建所以和邦國也國必有禮禮之所行以愿慤為上而不恭則不足以為禮矣設為國刑專糾夫不恭之人使之皆愿慤為上焉是禮典有資於刑也由是觀之則刑之為刑雖屬於秋官而五官不得不治焉葢治也教也政也禮也事也聖人治天下之具也然所以致其功之立而化之成舎刑以糾之安能保其終不怠而久不廢哉大戴禮刑罰者御人之銜勒也吏者轡也刑者筴也天子御者内史太史左史手也古者以法為銜勒以刑為筴以人為手而御天下公家不畜刑人大夫不飬士遇之途不與之言屏諸四方唯其所之不及以政不欲生之故也臣按古者待刑人其嚴如此非故絶之也欲人知所懲而不敢為惡也絶其所已然以懲其所未然所絶者少而所全者衆聖人大公至仁之心也禮記凡制斷也五刑必即天倫天理也郵與尤同責也罰麗於事陳澔曰天之理至公而無私斷獄者體而用之亦至公而無私凡有罪責而當誅罰者必使罰與事相附麗則至公無私而刑當其罪矣凡聽五刑之訟必原父子之親立君臣之義以權之意論輕重之序慎測淺深之量以别之悉其聰明致其忠愛以盡之方慤曰父子之親本乎情故曰原君臣之義錯諸事故曰立親主於愛一於愛則刑有所不忍加義主於敬一於敬則刑有所不敢及一皆如是豈足以為法之經哉其或於親有所原於義有所立者特徒法之權而已故曰以權之也陳澔曰父子君臣人倫之重者故特舉以言之亦承上文天倫之意所犯雖同而有輕重淺深之殊者不可槩議也故別之所謂權也明視聰聽而察之於詞色之間忠愛惻怛而體之於言意之表庶可以盡得其情也陳櫟曰後世之民犯刑多上失其道之所致未必皆其民之罪刑獄固在得其情而不可喜得其情欲得其情固在於悉其聰明哀矜勿喜尤在於致其忠愛歟臣按刑法之制所以弼教而教之本在乎天倫而天倫之重者父子君臣也父子主仁君臣主義一切輕重之罪淺深之情皆主於父子之仁君臣之義必原其本然之心必立其當然之義意而論之慎以測之序有先後而必循其次量有大小而不過其劑所以分而別之者用以合其權度也旣别之而又盡之盡之則理無遺矣不徒盡之而又成之成之則獄斯備矣君子之盡心於刑如此天下豈有寃民哉彜倫又豈有或斁哉凡作刑罰輕無赦刑者侀也侀者成也一成而不可變故君子盡心焉鄭𤣥曰侀是刑體馬睎孟曰此言立法制刑之意雖輕無赦所以使人難犯也惟其當刑必刑輕且不赦而況於重者乎故君子不容不盡心焉蓋刑之所以為刑者猶人之有侀也一辭不具不足以為刑一體不備不足以為成人辭之所成則刑有所加而不可變故君子盡心焉君子無所不盡其心至於用刑則尤慎焉者也臣按先儒謂無赦則民不至於犯罪盡心則吏不至於濫刑有無赦之法以禁於未然之前有盡心之吏以應於已然之後此民所以畏法而親上也子曰五刑之屬三千而罪莫大於不孝要君者無上非聖人者無法非孝者無親此大亂之道也臣按刑以弼教教之大者倫理也人君者生民之主聖人者道徳之主父母者生身之主親為一家之主孝其親則人道以立君為一世之主忠其君則治道以成聖人為萬世之主尊聖人則世教以明先王制為刑法以弼世教世教之大在此三者人人孝其親忠其君尊夫聖人則天下大治矣否則大亂之道焉然是三者其根本起於一家家積而國國積而世故尤嚴於不孝之罪以為天下事無有不起於近而後及於逺始於微而後至於著也故律文著不孝之罪而所謂要君非聖人者則略焉非略之也不可言也著其可言者以示微意萬一有是獄焉準此以權度之也子曰禮樂不興則刑罰不中刑罰不中則民無所措手足范祖禹曰事得其序之謂禮物得其和之謂樂事不成則無序而不和故禮樂不興禮樂不興則施之政事皆失其道故刑罰不中金履祥曰事有條理則有禮樂事得其序則為禮事得其和則為樂事旣不成則何以能有禮樂無禮則無序而施之也乖繆無樂則無和而行之也忿戾乖繆忿戾則刑罰安能中理刑罰不中理則民難於避就臣按禮樂刑政其致一也必有禮樂以為刑政之本則政事之行刑罰之施皆本乎自然之理以立為當然之制使民知所避而不敢違是以民生日用之間心志有所主耳目有所加舉動云為有所制是以不犯於有司有犯焉者然後施之以刑罰茍為不然蚩蚩蠢蠢之民一舉手一動足皆罹於憲網之中而不知所以為生者矣民不知所以為生則求所以為生之路求之不得則捨死以求禍亂之作往往以此秦隋之亡其明驗也孟子曰以生道殺民雖死不怨殺者程頤曰以生道殺民謂本欲生之也除害去惡之類是也葢不得已而為其所當為則雖咈民之欲而民不怨其不然者反是朱熹曰彼有惡罪當死吾求所以生之者而不得然後殺之以安其衆而厲其餘此以生道殺之也亦何怨之有張栻曰以生道殺民雖死不怨殺者先王明刑法以示民本欲使之知所趨避是乃生之之道也而氏有不幸而陷於法則不得已而加辟焉固將以遏止其流也是亦生道而已又况哀矜忠厚之意薰然存乎其間其為生意未嘗有間斷也若後世嚴刑重法固不足道而其得情而喜與夫有果於疾惡之意一毫之萌亦為失所謂生道者矣臣按天地之大徳曰生人得天地之徳以為生莫不好生聖人體天地之徳以為生人之主故其徳亦惟在於好生也惟其好人之生故其存心治政莫不以生人為本人見其徳教之施恩澤之布以為生人也而不知其刑罰之加兵戈之舉亦皆所以為生人焉耳葢死之所以生之也茍非其人實有害於生人決不忍致之於死地死一人所以生千萬人也是故無益於生人必不輕致人於死荀子曰世俗之為說以為治古者無肉刑有象刑墨黥之屬菲屨赭衣而不純菲草屨也純緣也衣不加緣以恥之也是不然矣以為治古則人莫觸罪耶豈獨無肉刑哉亦不待象刑矣為人或觸罪戻而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉凡制刑之本將以禁暴惡惡且懲其末也殺人者不及傷人者不刑是惠暴而寛惡也故象刑非生於治古竝起於亂今也夫征暴誅悖治之威也殺人者死傷人者刑百王之所同也未有知其所由來者也故治其刑重亂則刑輕犯治之罪固重犯亂之罪固輕也書曰刑罰世重此之謂也洪邁曰虞書象刑惟明象者法也漢文帝詔始云虞之時畫衣冠異章服以為戮而民弗犯武帝詔云唐虞畫象而民不犯白虎通云畫象者其衣服象五刑也犯墨者䝉巾犯劓者赭其衣犯髕者以墨其髕犯宮者屝屝草履也大辟者布衣無領臣按虞書云象以典刑即繼以流宥五刑及鞭作官刑扑作教刑若如畫衣冠之說象以典刑為之象設可也若夫流與鞭扑若何而為之制耶意者當時有犯者其人在可議可矜之辟偶為此制耳不然古無此制而好事者見後世之刑慘刻矯其枉而為此言歟漢刑法志曰漢道至盛歴世二百餘載考自昭宣元成哀平六世之間斷獄殊死率歲千餘口而一人古人有言曰滿堂而飲酒有一人鄉向隅而悲泣則一堂皆為之不樂王者之於天下譬猶一堂之上也故一人不得其平為之悽愴於心今郡國被刑而死者歲以萬數天下獄二千餘所其寃死者多少相覆獄不減一人此和氣所以未洽者也原獄刑所以蕃若此者禮教不立刑法不眀民多貧窮豪桀務私姦不輒得獄犴不平之所致也書曰伯夷降典悊民惟刑言制禮以止刑猶隄之防溢水也今隄防陵遲禮制未立死刑過制生刑易犯饑寒竝至窮斯濫溢豪桀擅私為之囊槖姦有所隱則狃而寖廣此刑之所以蕃也孔子曰古之知法者能省刑本也今之知法者不失有罪末矣又曰今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪今之獄吏上下相驅以刻為明深者獲公名平者多患害諺曰鬻棺者欲歲之疫非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶此矣臣按班固此言非獨漢世治獄之失後世之獄類此亦多矣所謂伯夷降典悊民惟刑言制禮以止刑猶隄之防溢水深得帝王為治禮刑先後之序其間向隅悲泣之喻鬻棺利死之譬皆痛切人情深中事理人主萬幾之暇以其言與前書所載路溫舒之疏竝觀寧能不惕然於心乎其所謂今之聽獄者求所以殺之古之聽獄者求所以生之請合而言之曰聽獄者當於殺之中而求其生求其生而不可得然後殺之有可生之路則請以讞焉罪疑從輕可也不疑然後殺之如是則獄無不得之情世無寃死之鬼矣光武建武十四年羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦軌不勝宜増科禁以防其源詔下公卿杜林奏曰古之明王深識逺慮動居其厚不防侈辟周之五刑不過三千大漢初興詳覽失得破矩為圜斲雕為樸蠲除苛政更立疏網海内歡欣人懐寛徳及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之類集以成贓小事無妨於義以為大戮故國無㢘士家無全行至於法不能禁令不能止上下相遁為敝彌深臣愚以為宜如舊制帝從之臣按卓茂有云律說大法禮順人情葢人之所以異於禽獸者以其有恩情之契禮俗之交也若一切繩之以法凡歲時交饋皆以為贓尋常舉動皆坐以罪鳥獸不可與同羣而人之與人曷以相聚處而禮義何自而興哉杜林之議所謂集以為贓及小事無妨於義以為大戮非惟漢世後世亦有此弊乞定為明制饋送之贓不許集計其小事無妨於義者雖若於法不應然於大義無害者亦不以為罪如此則刑辟不多而動居於厚矣以上總論制刑之義下大學衍義補卷一百一
