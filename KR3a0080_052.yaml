body:
  text: 大學衍義補卷五十二明丘濬撰治國平天下之要明禮樂家鄉之禮曲禮曰君子將營宫室宗廟為先臣按古者宗廟大夫三士二庶人祭於寢然今世大夫士無世官不得立廟宜如家禮立為祠堂凡家造祭器為先鄭玄曰家造謂大夫始造家事也無田祿者不設祭器有田祿者先為祭服君子雖貧不粥祭器雖寒不衣祭服為宫室不斬於丘木孔穎達曰有田祿得造祭器必先為祭服後為祭器緣人形參差衣服有大小不可假借故宜先造而祭器之品量其制同故可暫假故營之在後吕大臨曰孟子云惟士無田則亦不祭牲殺器皿衣服皆不備故也不祭則薦而已與庶人同故不設祭器也有田祿則牲殺器皿衣服皆不可不備祭器所以事其先粥之則無以祭無以祭則不孝也祭服所以接鬼神衣之則褻褻則不敬也丘木所以庇其宅兆為宫室而斬之是慢其先而濟吾私亦不敬也支子不祭祭必告於宗子鄭玄曰支子庶子也祖禰廟在嫡子之家庶子不敢輒祭若宗子有疾不堪當祭則庶子代攝可也猶必告於宗子然後敢祭程頤曰古所謂支子不祭者惟使宗子立廟主之而已支子雖不祭至於齋戒致其誠意則與祭者不異可與則以身執事不可與則以物助但不别立廟為位行事而已後世如欲立宗子當從此義雖不祭情亦可安若不立宗子徒欲廢祭適足以長惰慢之志不若使之祭猶愈於己也朱熹曰兄弟異居廟初不異只合兄祭而弟與執事或以物助之為宜而相去逺者則兄家立主弟不立主只於祭時旋設位以紙榜標記逐位祭畢焚之似亦得禮之變臣按古者宗法行故支子無自祭之禮今世人家兄弟多有析居及出逺宦者不能皆合祭於宗子也乞敕禮官定制凡人家庶子只許祭其所曽經事者如逮事曽祖或祖則許祀之不逮事者惟得祭禰其宗子之家父祖分産之時必須以一分為祭需原不曽有者衆共補之兄弟析居者不許自祀其父遇有告祀薦新之類皆就長兄家行禮如此是亦敦本厚俗之一端王制曰庶人祭於寢大夫士宗廟之祭有田則祭無田則薦鄭玄曰有田者既祭又薦新何休曰有牲曰祭無牲曰薦陳祥道曰祭以致禮而有常月薦以致孝而無常時祭必卜日而薦新不擇日周諝曰無田則薦言牲器衣服不備不敢以祭也臣按古之仕者有祭田今世非世家貴而好禮者無祭田茍有祿食及有財産者皆當隨時致祭不可拘田之有無蓋祭薦之禮子孫所以報本而反始後世禮教不行人家往往厚於奉養而薄於薦祭乞敕禮官申明禮制凡有祿食及財産充足之家力足以備禮者有廢祖宗歲時薦祭者許族長責問其故有不服者俾以聞官貧而不能具者不在此限庶幾薄俗知所以追逺之禮亦有以使民俗之歸厚也庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈陳澔曰注云祭以首時薦以仲月首時者四時之孟月也少儀曰未嘗不食新祭義曰忌日必哀稱諱如見親方慤曰忌日哀有終身之喪也稱諱如見親聞名心瞿也程頤曰家必有廟廟必有主月朔必薦新時祭用仲月冬至祭始祖立春祭先祖季秋祭禰忌日遷主祭於正寢凡事死之禮當厚於奉生者臣按程子謂冬至祭始祖立春祭先祖朱子既立為二祭載於家禮時祭之後其門人楊復乃謂朱子初年亦嘗行之後覺其似僭不敢祭然冬至之祭不祭可也而立春之祭似亦可行今擬人家同居止四代者不行亦可其有合族以居纍世共爨者生者同居而食死者異處而祭恐乖易萃合人心於孝享之義惟宜行立春一祭或問俗節之祭如何朱熹曰韓魏公處得好謂之節祠殺於正祭臣按家禮俗節則獻以時食注云如清明寒食端午中元重陽之類朱熹曰祭儀以墓祭節祠為不可然先正皆言墓祭不害義理又節物所尚古人未有故止於時祭今人將節隨俗燕飲各以其物祖考生存之日蓋嘗用之今子孫不廢此而能恝然於祖宗乎劉璋曰人死之後葬形於原野之中與世隔絶孝子追慕之心何有限極當寒暑變移之際益用增感是宜省謁墳墓以寓時思之敬凡祭祀品味亦稱人家貧富不貴豐腆貴在修潔罄極誠慤而已臣按禮經無墓祭之文然自漢明帝時有上陵禮自時厥後遂以成俗栁宗元謂近世禮重拜掃每遇寒食田野道路士女遍滿皂𨽻庸丐皆得上父母丘墓馬醫夏畦之鬼無不受子孫追養者唐人亦有詩墳上無新土此中白骨應無主之句是寒食墓祭吾祖宗父母其生時固已行之於其祖宗父母而為祖宗之後父母之嗣者乃舍其丘隴而嵗不一展省棄其留骨而時不一奠薦乃諉之曰墓祭非古也可乎文公家禮附墓祭於時祭忌日之後可謂順人之情得禮之意矣朱熹曰籩豆簠簋之器乃古人所用故當時祭享皆用之今以燕器代祭器常饌代俎肉楮錢代幣帛是亦以平生所用是謂從宜也臣按人子之事親當事死如事生事亡如事存吾之祖考平日所用之器皿如此所被之衣服如此及其死亡也而又别為器與服以事之豈不駭其見聞哉古人生用几筵俎豆則死亦用几筵俎豆以事之今人之生所用者卓椅杯盤死所用者亦當以卓椅杯盤是即朱子所謂從宜者也正不必泥於古一惟稱家之有無隨俗之所尚惟誠惟孝起敬起慕雖不能一一如古人行禮之度數而古人行禮之心則固常存也儀禮曰士病禱五祀王制曰大夫祭五祀月令春月其祀户夏月其祀竈秋月其祀門冬月其祀行行謂道路往來之處季夏之月其祀中霤室中土神也臣按古者大夫祀五祀士立二祀庶人立一祀或立霤竈或立户夫竈者人家飲食所需而中霤之祭即土神也本朝禁淫祀惟許祭竈然土地之神朱子文集中有祭土地文則人家亦可通祀若夫士庶征行逺方出入之際亦可準古人祖祭以祀門或户以上人家祭祀之禮喪服小記曰别子為祖别子者謂諸侯適子之弟别於正適也為祖者别與後世為始祖也繼别為宗謂别子之適長子繼别子與族人為百世不遷之宗也繼禰者為小宗謂别子之次子以其長子繼已為小宗而其同父兄弟宗之也有百世不遷之宗有五世則遷之宗程頤曰宗子繼别為宗言别則非一人也如别子五人五人各為大宗所謂兄弟宗之者謂别子之子繼禰之兄弟宗其小宗子也臣按大宗則一大宗宗其繼别子者是也是為大宗小宗則四有繼禰之小宗則同父兄弟宗之有繼祖之小宗則同堂兄弟宗之有繼曽祖之小宗則再從兄弟宗之有繼髙祖之小宗則三從兄弟宗之至於四從則親屬盡絶所謂五世則遷者也是謂小宗禮經别子法是乃三代封建諸侯之制而為諸侯庶子設也與今人家不相合今以人家始遷及初有封爵仕宦起家者為始祖以準古之别子又以其繼世之長子準古之繼别者世世相繼以為大宗統族人主始祖立春之祭及墓祭其餘以次遞分為繼髙祖繼曽祖繼祖繼禰小宗程頤曰宗子無法則朝廷無世臣又曰立宗非朝廷之所禁但患人自不能行之張載曰宗子無法則朝廷無世臣且如公卿一日崛起於貧賤之中以至公相宗法不立既死遂族散其家不傳宗法若立人人各知來處朝廷大有所益蓋公卿各保其家忠義豈有不立忠義既立朝廷之本豈有不固今驟得富貴者止能為三四十年之計造宅一區及其所有既死則衆子分裂未幾蕩盡則家不存如此則家且不能保安能保國家陳埴曰宗法為諸侯之庶子設恐其後流派寖多姓氏紛錯易至淆亂故於源頭有大宗以統之則人同知尊祖分派處有小宗以統之則人各知敬禰臣按欲行宗子之法必自世胄始今世文臣無世襲法惟勳戚及武臣世世相承以有爵祿此法斷然可行若夫見任文臣及仕宦人家子孫與夫鄉里稱為大族巨姓自謂為士大夫者朝廷宜立定制俾其家各為譜系孰為始遷於此者孰為始有封爵者推其正嫡一人以為大宗又就其中分别某與某同髙祖推其一人最長者為繼髙祖小宗某與某同曽祖推其一人為繼曽祖小宗某與某同祖某與某同禰各推最長者一人以為小宗其分析疏逺者雖不能合於一處然其所以聚會於一處綴列於譜牒者則粲然而明白也若夫軍官襲替故事明具宗支圖亦俾其明白開具如五宗之法若其正支絶嗣而以旁支入繼者既襲之後即將其名繫於所後正支之下以承大宗而以其次弟承所生父母以為小宗如此雖不能盡如三代之制亦禮廢羊存之意陳淳曰神不歆非類民不祀非族古人繼嗣大宗無子則以族人之子續之取其一氣脈相為感通可以嗣續無間此亦至正大公之舉而聖人所不諱也後世理義不明人家以無嗣為諱不肯顯立同宗之子多是濳養異姓之兒陽若有繼隂已絶矣蓋自春秋鄫子取莒公子為後故聖人書曰莒人滅鄫非莒人滅之也以異姓主祭祀滅亡之道也黃潤玉鄞人曰古者諸侯之别子之子孫嫡派為大宗庶子為小宗小宗絶不為立後惟大宗絶則以支子立後蓋大宗是尊者之統不可絶也今制大宗絶立後小宗絶不立後庶民不知朝廷之制凡庶子絶皆令過繼只是爭取財産耳臣按黃潤玊謂大宗絶立後小宗絶不立後為今制然觀宋儒陳淳謂古人繼嗣大宗無子則以族人之子續之而不及小宗則是我朝親藩初封未有繼别之子而國絶則不為立繼蓋古禮也親藩且然况庶民乎然則今庶民無子者往往援律令以爭承繼非歟謹按聖祖得國之初著大明令與天下約法有云凡無子許令同宗昭穆相當之姪承繼先儘同父周親次及大功小功緦麻如無方許擇立逺房及同姓為嗣若立嗣之後却生親子其家産並許與元立均分並不許乞養異姓為嗣以亂宗族立同姓者亦不得尊卑失序以亂宗族其後天下既定又命官定律有立嫡子違法條云若養同宗之人為子所養父母無子而捨去者杖一百發付所養父母收管若有親生子及本生父母無子欲還者聽若立嗣雖係同宗而尊卑失序者其子歸宗改立應繼之人其遺棄小兒年三歲以下雖異姓仍聽收養即從其姓切詳律令之文所謂立嗣之後却生親子并所養父母無子而捨去及若有親生子等辭皆謂其人生前立嗣也無有死後追立之文聖祖之意蓋以興滅繼絶必前代帝王功臣賢人之後不可絶其嗣使其不血食也先王制禮不下庶人庶人之家若其生前自立繼嗣及將昭穆相應之人自幼鞠養從其自便然又恐其前既立繼而後又有子或所養之人而中道背棄及有尊卑失序者故立為律令以禁戒之也令如漢髙祖入關之約法律乃令蕭何所次者也斷此獄者當以律文為正若夫其人既死之後有來告爭承繼者其意非是欲承其宗無非利其財産而已若其人係軍匠籍官府雖脅之使繼彼肯從哉春秋推見至隱而誅人之意請自今以後其人若係前代名人之後或在今朝曽有大名顯宦者以宗法為主先求繼禰小宗次繼祖之宗次繼曽祖之宗又次繼髙祖之宗此四宗者俱無人然後及疏房逺族及同姓之人若其人生前或養同宗之子雖其世系比諸近派稍逺然昭穆若不失序亦不必更求之他所以然者以其於所養之人有鞠育之恩氣雖不純而心已相孚故也凡有為人後者除大宗外其餘必有父在承父之命方許出繼已孤之子不許所以不許者為人後者為之子為人之子則視其人行第稱其所生或為伯或為叔不承父命而輒稱己父母為伯叔可乎是貪利而忘親也如此則傳序既明而爭訟亦息矣以上宗法及無子立後以上家鄉之禮中大學衍義補卷五十二
