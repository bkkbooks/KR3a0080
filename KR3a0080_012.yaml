body:
  text: 大學衍義補卷十二明丘濬撰治國平天下之要正百官戒濫用之失易解六三負且乘致寇至貞吝大傳曰負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣程頥曰六三隂柔居下之上處非其位猶小人宜在下以負荷而且乘車非其據也必致寇奪之至雖使所為得正亦可鄙吝也小人而竊盛位雖勉為正事而氣質卑下本非在上之物終可吝也臣按人品有君子小人之别而其所事亦有君子小人之異人君用人當隨其人品而使之各事其事則君子小人各止其所而無有非所據而據者矣非惟君子小人各安其心而天下之人亦莫不安之矣上下相安而無暴慢之失君子而乘君子之器小人而任小人之事凡居尊貴之位者皆世所謂君子也凡任卑賤之事者皆世所謂小人也上不慢而下不暴則孰敢萌非分之望也哉鼎九四鼎折足覆公餗鼎實也其形渥赧汗也凶形渥本義以為刑剭謂重刑也子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也程頥曰大臣之位任天下之事者也天下之事豈一人所能獨任必當求天下之賢智與之叶力得其人則天下之治可不勞而致也用非其人則敗國家之事貽天下之患隂柔小人不可用者也而用之其不勝任而敗事猶鼎之折足也鼎折足則傾覆公上之餗餗鼎實也居大臣之位當天下之任而所用非人至於覆敗不勝其任可羞愧之甚也朱震曰位欲當德謀欲量知任欲稱力三者各得其實則利用而安身小人志在於得而已以人之國僥幸萬一鮮不及禍自古一敗塗地殺身不足以塞其責者本於不知義而已臣按先儒有言古之人君必量力度德而後授之官古之人臣亦必量力度德而後居其任雖百工胥吏且猶不可况大臣乎為君不明於所擇為臣不審於自擇必至於亡身危主誤國亂天下皆由於不勝其任之故也雖然人臣不審於自擇一身一家之禍爾人君不明於所擇則其禍豈止一人一家哉上以覆祖宗千萬年之基業下以戕生靈千萬人之身命嗚呼人君之任用大臣焉可不量其德詢其知度其力而輕授之尊位與之大謀委之大任哉書說命曰官不及私昵惟其能爵罔及惡德惟其賢吕祖謙曰官爵及私惡非憲天聰明矣臣按天下治亂在乎庶官用人惟其賢能則事得其理人稱其官而天下於是乎治矣官不用能茍己所私昵者亦任之以官爵不論德而人有惡德者亦畀之以爵不復計其人之稱是官與否其德之稱是爵與否則庶事隳而名器濫矣天下豈有不亂者哉詩曹風候人篇曰彼候人道路送迎賓客之官兮何揭也戈與祋殳也彼其音記之子三百赤芾冕服之鞸三命赤芾維鵜小鳥也在梁不濡其翼彼其之子不稱其服朱熹曰此刺其君逺君子而近小人之詞言彼候人而何戈與祋者宜也彼其之子而三百赤芾何哉陳澔曰鵜鶘常入水中食魚今乃在魚梁之上竊人之魚以自食未嘗濡濕其翼如小人居髙位以竊祿而不稱其服也臣按人品有髙下爵位有崇卑人品之下者居卑位而執賤役人品之髙者居尊位而任大政宜也顧乃使卑賤之人衣尊貴之服居清要之任豈得為稱哉論語哀公問曰何為則民服孔子對曰舉直錯捨置也諸枉則民服舉枉錯諸直則民不服程頥曰舉錯得義則民心服謝良佐曰好直而惡枉天下之至情也順之則服逆之則去必然之理也然或無道以照之則以直為枉以枉為直者多矣是以君子大居敬而貴窮理也臣按人君任賢退不肖所舉用者皆正直之士所舍置者皆枉曲之人則凡布為紀綱施為政事者咸順乎人情而不拂其性而民無有不心服者矣苟為不然於其枉者則舉用之而於其直者反舍置焉是謂好人之所惡惡人之所好非但不足以服人心將由是而馴致於禍亂也不難矣漢文帝問上林尉諸禽獸簿尉不能對虎圈嗇夫從旁代尉對甚悉詔張釋之拜嗇夫為上林令釋之前曰陛下以周勃張相如何如人也上曰長者釋之曰此兩人言事曽不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭亟疾苛察相髙其敝徒文具而無實不聞其過陵遲至於土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風而靡爭為口辨而無其實夫下之化上疾如影響舉錯不可不審也帝曰善就車召使參乘徐行問秦之敝拜公車令臣按古人論郭之所以亡以其善善而不能用惡惡而不能去文帝一聞釋之之言即不用嗇夫不徒善釋之之言而又引之以同車用為公車令可謂惡惡而能去善善而能用矣且釋之欲言嗇夫之辨給先引周張之謹訥其易所謂納約自牖者夫臣於是非但見文帝聽言之易用人之謹而又且見漢世去古未逺而其君臣相與之無間也後世人君於其臣有事固未嘗問問或不敢答况敢於未言之先而設問以啓之乎文帝嘗夢欲上天不能有一黃頭郎推上天顧見其衣尻帶後穿覺而之漸臺以夢中隂目求推者郎見鄧通其衣後穿夢中所見也召問其名姓姓鄧名通鄧猶登也於是賞賜通官至上大夫臣按髙宗夢帝賚傅說蓋其精誠感通之極也後世人主無古帝王正心之學好賢之誠而欲效其所為安知非其心神昏惑瞀亂而邪氣得以乘間入之耶文帝為漢令主而以夢用鄧通輕信寤寐恍忽之見附㑹音訓偶合之文其為盛德纍也大矣武帝時方士欒大敢為大言處之不疑見上言曰臣常往來海上見安期羡門之屬曰黃金可成而河决可塞不死之藥可得仙人可致也乃拜大為五利將軍既而入海求其師上使人隨驗無所見而大妄言見其師方又多不售謂所言之方無驗坐誣罔腰斬尹起莘曰武帝於方士始雖為其所罔及所言不驗則亦往往取而戮之如文成少翁之類皆在所不赦是又帝之明斷也臣按將軍之號所以封拜武臣者乃以施之矯誣誕妄之人則夫被堅執鋭者安得不解體哉然五利之名非常秩也特為之立此名耳且猶不可况以公卿大夫顯然之秩位而加之此輩哉尹氏謂武帝能誅欒大輩為明斷臣竊以為斷則斷矣未明也蓋明足以燭理則不惑與其明斷之於後又曷若明斷之於先哉雖然其視諸未用則信之而不疑既用而無驗心悟其非猶為之隱忍而遮護之惟恐人知焉者則亦有間矣噫此武帝所以為武也歟武帝欲侯寵姬李氏乃拜其兄廣利為二師將軍發數萬人往伐宛期至二師城取善馬故以為號司馬光曰武帝欲侯寵姬而使廣利將意以為非有功不侯不欲負髙帝之約也然軍旅大事國之安危民之死生繫焉茍為不擇賢愚而授之欲僥幸咫尺之功藉以為名而私其所愛蓋有見於封國無見於置將謂之能守先帝之約過矣臣按國家列爵以待有功之臣因其有是功而報授之以是爵也武帝欲侯寵姬之兄乃使之立功以取侯爵是豈帝王列爵賞功之初意哉光武即位議選大司空而赤伏符曰王梁主衛作𤣥武帝以野王衛之所徙𤣥武水神之名司空水土之官於是擢梁為大司空又欲以䜟文用孫咸行大司馬衆不說乃己臣按符䜟之書不出於唐虞三代而起於哀平之世皆虛僞之徒要世取資者所為也光武尊之比聖凡事取决焉其拜三公三人而二人取諸符䜟逮衆情觖望才減其一而王梁尋坐罪廢纎書果安在哉先儒謂光武以英睿剛明之主親見王莽尚奇怪而躬自蹈之其為盛德之纍亦豈小哉順帝初聽中官得以養子襲爵御史張綱上書曰竊尋文明二帝德化尤盛中官常侍不過兩人近幸賞賜裁滿數金惜費重民故家給人足而頃者以來無功小人皆有官爵非所以愛民重器承天順道也胡寅曰茅土之封所以待功勳建賢德而加諸刀鋸之賤似續之任所以繼先祖傳後來而責諸不父之家且殘無罪之人息生生之道耗蠧財用崇長禍階一舉而六失併焉有天下國家者可不深思而痛革之哉臣按古者以閹人給事內庭以其無男女之欲子孫之纍故也今既宫之而又使之得以養子襲其爵又何若勿絶其世而只用士人哉我聖祖於內臣别立官稱而與外諸司不同其慮一何深且逺哉靈帝時市賈小民有相聚為宣陵孝子者數十人詔皆除太子舍人帝好文學自造皇羲篇五十章引諸生能為文賦者並待制鴻都門下後諸為尺牘及工書鳥篆者皆加引召遂至數十人樂松等多引無行趣藝之徒置其間喜陳閭里小事帝甚說之待以不次之位蔡雍上封事曰古者取士必使諸侯嵗貢孝武之世郡舉孝亷又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已夫書畫辭賦才之小者匡國治政未有其能陛下游意篇章聊代博奕非以為教化取士之本而諸生競利作者鼎沸連偶俗語有類俳優或竊成文虛冒名氏皆見拜擢難復收改但不可復使治民及在州郡昔孝宣㑹諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之宣陵孝子虛僞小人本非骨肉羣聚山陵假名稱孝義無所依至有姦軌之人通容其中太子官屬宜搜選令德豈有但取丘墓凶醜之人其為不祥莫大焉宜遣歸田里以明詐僞臣按人君好尚不可不謹一有所偏嗜而為小人所窺伺彼欲竊吾之爵祿以為終身富貴之資凡有可乘之間無所不至矣人主惟窮理居敬灼有一定之見確有一定之守不為外物所動異說所遷則小人無所乘其隙矣靈帝初開西邸賣官二千石二千萬四百石四百萬其以德次應選者半之或三分之一令長隨縣豐約有賈富者先入貧者到官倍輸又私令左右賣公卿公千萬卿五百萬臣按秦漢以來有納粟補官之令然多為邉計及嵗荒爾非以為己私也夫尊為天子富有四海之內尺地莫非其有一民莫非其臣凡在黎氓者孰非天子之所有藏在民家者孰非國家之所儲奚必斂於府庫之中然後為己富哉彼桑𢎞羊王安石之徒競商賈刀錐之利將以富國君子以之為盜臣史書昭然在人耳目千萬世如一日焉可不畏哉可不念哉晉惠帝時論誅楊駿功侯者千八十一人傅咸曰無功而受賞莫不樂國有禍禍起當復有大功也人而樂禍其有極乎臣按國家不幸有事臣之有功而當受爵賞者必須考驗當否而為之等第况無功而可一例升賞乎夫有功而必升賞則人得以夤緣作弊而懷僥幸之心後世有欲按功行賞者不可不思傅咸之言也唐髙祖以舞胡安叱奴為散騎侍郎李綱諌曰古者樂工不與士齒雖賢如豫野師襄皆終身繼世不昜其業今天下新定建義功臣行賞未遍髙才碩學猶滯草萊非所以垂模後世也太宗時御史馬周上疏曰王長通白明達本樂工輿皂雜類韋槃提斛斯正本無他才獨解調馬雖術踰等夷可厚賜金帛以富其家今超授髙爵與政外廷朝㑹鳴玉曵履臣竊恥之若朝命不可追改尚宜不使在列與士大夫為伍帝善其言除周侍御史臣按李綱馬周皆謂雜流出身者不可鳴玉曵組與士大夫為伍於廊廟之間所以尊朝廷重士類也其言當矣但周謂朝命不可追改是教人主遂非也如理不可即速改之無使其為聖政之纍何善如之太宗不徒善周言而又進其官其視乃考之於舞胡謂業已授之不可追改不亦遼哉中宗時置員外官自京師及諸州凡二千餘人宦官超遷七品以上員外官者又將千人魏元忠為相袁楚客以書責之略曰主上新復厥命當進君子退小人以興大化豈可安其榮寵循默而已今有司選賢皆以貨取勢求廣置員外官傷財害民俳優小人盜竊品秩左道之人熒惑主聽竊盜祿位寵進官者殆滿千人臣按袁楚客責魏元忠之十失其五為任官雖曰一時之失然衰亂之世其進用人才所為貸取勢求員外廣置而及於倡優工藝之流僧道方術之輩往往皆然嗚呼此豈盛世所宜有哉又中宗時始用斜封墨敕除官安樂長寧公主上官媫妤皆依勢用事請謁受賕降墨敕除官斜封付中書時人謂之斜封官其員外同正試攝簡較判知官凡數千人左拾遺辛替否上疏曰古之建官員不必備故士有完行家有亷節朝廷有餘俸百姓有餘食今陛下百倍行賞十倍增官使府庫空竭流品混淆臣按袁楚客謂廣置員外官傷財害民辛替否謂行賞增官使府庫空竭流品混淆可謂切中濫官妄費之弊夫國家官職有常員嵗計有常數官以治事有一事則有一官俸以給官有一官則有一俸今無故於常員之外增官至數千人增一員之官則增一員之俸盍思漕運之米至京師者費率三四石而致一石農民耕作之勞士卒輦挽之苦官吏徴輸之慘用以供養官吏俾其治事治事所以安民不為過也然常年之儲出入止於此數入者不增出者乃如至數倍焉嵗計何由而充國力安得不屈竭國家之府庫輕朝廷之名器混人才之流品壞祖宗之成憲由是而底於危亡不難也中宗神龍元年除方術人葉靜能為國子祭酒代宗天厯元年以宦官魚朝恩判國子監臣按國子所以教天子之元子衆子公卿大夫元士之適子與凡民之俊秀所以教之者非有道德有學術者不可輕授而唐之二帝乃用術士為祭酒閹宦判國子監豈非顛倒錯亂乎人君奉上天之命踐祖宗之阼固當法天而敬祖烏可以天命有德之爵祖宗輔世之官而授所私昵之人乎是故善為治者人必稱其官官必稱其事凡夫三百六十官皆不可用非其人矧夫師儒之職所以承帝王之道統傳孔孟之正學教國家之賢才者乎睿宗用姚元之宋璟言罷斜封官凡數千人崔涖言於上曰斜封官皆先帝所除元之等建議奪之彰先帝之過為陛下招怨衆口沸騰恐生非常之變太平公主亦以為言上然之乃復叙用栁澤上疏曰斜封官皆因僕妾汲引豈出先帝之意陛下黜之天下稱明一旦收叙何政令之不一也議者皆稱太平公主誑誤陛下積小成大為禍不細胡寅曰彰先帝之惡為陛下招怨姦人之言類如此使遇明君必曰置先帝於過舉豈所以為孝沽美譽於羣小豈所以為君爾以桓靈待我則姦言無自入矣然姚宋秉政而此說得行何也睿宗以六居五使太平陰疑於陽是以至此姚宋若力爭之勢將有激矣然則是乎曰當其時事有大於此者姑忍焉可也臣按孔子謂三年無改於父之道謂其事在可否之間非逆天悖理之甚者也曽子謂不改其父之臣謂其人在有無之間非蠧政害教之尤者也先人有所過誤後人救之使不至於太甚孝莫大焉即史以觀睿宗信崔涖𤣥宗信姚宋元祐用司馬光紹聖用章惇是非得失見矣肅宗時府庫無蓄積朝廷專以官爵賞功諸將出征皆給空名告身聽臨事注名有至開府特進異姓王者諸軍但以職任相統攝不復計官爵髙下及是復以官爵收散卒由是官爵輕而貨重大將軍告身一通才易一醉凡應募入官者一切衣金紫名器之濫至是極焉范祖禹曰宜爵者人君所以馭天下不可以虛名而輕用也君以為貴而加於君子則人貴之矣君以為賤而施於小人則人賤之矣肅宗欲以茍簡成功而濫假名器輕於糞土此亂政之極也唐室不競不亦宜哉臣按自古名器之濫未有如唐肅宗之世者也其源出於府庫無蓄積人主鑑此宜節用愛人求賢審官毋使一旦流弊至於此哉劉子𤣥言於其君曰君不虛授臣不虛受妄受不為忠妄施不為惠今羣臣無功遭過輒遷至都下有車載斗量欋槌碗脫之諺臣按爵祿乃天命有德之具國家所恃以厲世磨鈍而鼓舞天下之人以共成天下之治者也人君慎之重之猶恐天下之人不知所重而輕視之無與我共成天下之治顧乃授之非其人而下及於卑汚茍賤之徒則是人君自棄其所以厲世磨鈍之器也豈不失其所恃乎蓋國家懸爵祿以待一世賢才以之代天工與之治天民所以承天命也非有才德者不可豫無才無德者非獨上之人不可豫之而下之人亦當自揣諸已而不敢虛受也不可豫而豫是䙝天之命不當受而受是不畏天之命䙝天之命與不畏天之命厥罪惟鈞然不畏天之罪止於一身䙝天之命其禍將及於生靈延於宗社可不深念而痛戒之哉𤣥宗美張守圭之功欲以為相張九齡諌曰宰相者代天理物非賞功之官也上曰假以其名而不使任職可乎對曰不可惟名與器不可以假人君之所司也且守圭才破契丹即以為宰相若盡滅奚厥將以何官賞之上乃止臣按人君之用人非但惜我名器亦當為其臣計使其人未老名位已極而官爵不可復加後再有懋功吾將何以賞之哉宋太祖時曹彬平南唐始行許以使相及還語彬曰今方隅尚有未服者汝為使相品位極矣肯復力戰耶更為我取太原因賜錢五十萬若宋祖者可為善用爵賞而能處其臣矣張九齡諫𤣥宗而不以張守圭為相其知此意乎宋太祖時教坊使衛德仁求外官且援同光故事求領郡上曰用伶人為刺史此莊宗失政豈可效之耶宰相擬上州司馬上曰上佐乃士人所處資望甚優亦不可輕授此輩但當於樂部遷轉耳富弼曰古之執伎於上者出鄉不得與士齒太祖不以伶官處士人之列止以太樂令授之在流外之品所謂塞僣濫之源臣按名器所以重者以人不易得也人人可得則人輕之矣是以善為治者以爵賞鼓舞天下之賢俊不徒惜名器又必别品流既惜之又别之得者以為榮不得者亦不敢萌幸心人不敢萌幸心則得者愈榮而名器益重矣宋太祖謂伶人此輩但當於樂部遷轉非但伶人凡諸色雜流皆然仁宗天聖二年待詔王元度纂勒真宗御書得紫服佩魚上曰先朝伎術官無得佩魚所以别士類也又嘉祐三年詔嘗為中書樞密諸司吏人及伎術官出身者毋得任提刑及知州軍臣按宋朝流品之别如此此一代人材所以激厲軒昻遇事奮發而以名節自居磊磊落落以自别於庸流賤胥者蓋由上之人有以甄别起發之也髙宗時王繼先醫療有效欲增創員缺以授其壻用酬其勞給事中王居正封還上曰庶臣之家用醫有效亦酬謝之否耶居正對曰臣庶之家待此輩與朝廷異量功隨力各致陳謝之禮若朝廷則不然繼先之徒以伎術庸流享官榮受俸祿果為何事哉一或失職重則有刑輕則斥逐其應用有效僅能塞責而已金帛之賜固自不少至於無故增創員缺誠為未善臣不願輒起此門上悟曰卿言是也臣按朝廷之用醫亦猶其用百家也用醫而效乃其職爾若其秩滿多著全效則升用之亦猶百僚之課最而進其秩也然又必各隨其品而豫之其勞績固不可以不酬而品流亦不可以不别髙宗一聞居正之言即悟而是之可謂能用善矣後世人主宜法髙宗其毋以朝廷公卿大夫之名爵而加諸異端雜流伎萟工作之徒有勞效者隨本任而加升賞可也以上戒濫用之失大學衍義補卷十二
