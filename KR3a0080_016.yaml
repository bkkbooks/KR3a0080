body:
  text: 大學衍義補卷十六明丘濬撰治國平天下之要固邦本䘏民之患書說命惟事事乃其有備有備無患蔡沈曰惟事其事乃其有備有備故無患也臣按先儒謂簡稼器修稼政事乎農事則農有其備故水旱不能為之害是則水旱之備莫先於事農之事可見矣詩雲漢倬彼雲漢天河也昭回于天回轉也言其光隨天轉也王曰於乎何辜今之人天降喪亂饑饉薦與荐通重也臻至也靡神不舉求廢祀而修之靡愛斯牲圭璧禮神玉既卒盡也寧莫我聽朱熹曰宣王承厲王之烈内有撥亂之志遇烖而懼側身修行欲銷去之天下喜於王化復行百姓見憂故仍叔作此詩以美之言雲漢者夜晴則天河明故述王仰訴於天之詞如此也臣按朝廷政治之最急者莫急於民莫得食天旱則五穀不成五穀不成則民無由得食民無由得食則將趂食於四方茍處處皆然則民不㡬於盡瘁乎是故有志於為民之君見天下之亢旱則豫憂之凡可以感天而致雨者無所不用其情是以雲漢之詩既告於上天又告於祖宗父母又告於百官索祭之禮既無所遺禮神之物或至於盡無所歸咎寧以己身而當其災無所控告惟仰昊天而訴其憂非徒自貶責於一己而又求助於羣臣宣王之憂民之憂如此此其所以遇災不災而卒成中興之業也歟周禮大司徒以荒政救凶之政十有二聚萬民一曰散利散其所積二曰薄征輕租稅三曰緩刑凶年犯法者多緩之恐致變四曰弛力息繇役五曰舍禁舍山林川澤之禁六曰去㡬闗市不㡬察七曰眚禮凡有禮節皆從減省八曰殺哀凡行喪禮皆從降殺九曰蕃樂閉藏樂器十曰多昏不備禮而昏娶十一曰索鬼神求廢祀而修之十二曰除盜賊饑饉盜賊多嚴刑以除之吕祖謙曰聚萬民者札瘥凶荒民皆轉徙之四方故以政聚之散利是發公財之已藏者薄征是減民租之未輸者此兩者荒政之始已藏者散之未輸者薄之荒政之大綱舉矣緩刑謂民迫於飢寒不幸有過失緩其刑辟以哀矜之弛力者平時用民力嵗不過三日今則弛之以休息民力舍禁謂山虞林衡皆舍去其禁恣民取之去㡬謂去闗防之㡬察使百貨流通商賈求市此是救荒之要術眚禮謂凡禮文可省者省之如有幣無牲之類殺哀謂凡喪紀之節一皆減省專理㑹荒政蕃樂謂嵗荒民飢當憂民之憂所以閉藏樂器不作多昏謂凶荒之年殺禮多昏使男女得以相保索鬼神謂靡神不舉並走羣望之類前既説緩刑後又說除盜賊是經權皆舉處不幸民有過固可哀矜至於姦民亦有伺變竊發者凶荒之嵗民心易動一夫呌呼萬夫皆集故以除盜賊終之以止亂之萌大抵周禮六官雖分職然其闗節脈理皆相應且如散利須考大府天府内府凡掌財賦之官如薄征須考九職九賦九貢如緩刑須考司冦士師所掌之刑他莫不然參觀徧考然後可知葉時曰聖人為荒政以聚萬民所以救天時之不常而濟地利人和之不及也蓋天災國家代有嵗凶年穀不登上之人茍不有以賑救之存恤之則老弱轉乎溝壑壯者散而之四方矣民安得而聚哉然此十二政曰弛力曰薄征曰舍禁曰去㡬固皆有以利民而一以散利為先則其闗繫民命尤急也利不散則民不聚雖有眚禮蕃樂殺哀多昏之政未必有實惠及民臣按易曰何以聚人曰財大學曰財散則民聚蓋天立君以治民君必得民然後得以為君是君不可一日無民也然民必有安居托處之地日用飲食之具而後能聚焉人君為治所以使一世之民恒有聚處之樂而無分散之憂者果用何物哉財而已矣然是財也所以耗而費之者固由乎人力然尤莫甚於天災焉是以人君當夫豐穰無事之時而恒為天災流行之思斯民乏絶之慮豫有以蓄積之以為一旦凶荒之備焉此無他恐吾民之散而不可復聚也是以周禮十二荒政而以散利為首鄭氏謂散利者貸種食也蓋予之食以濟一時之飢予之種以為嗣嵗之計聖人憂民之心至矣逺矣既散所有之利而又行薄征以下十一事以濟之此治古之世所以時有豐凶而民無憂患民生所以長聚而君位所以永安者其以此歟遺人遺饋也掌委積之官掌邦之委積少曰委多曰積以待施惠鄉里之委積以恤民之艱阨艱阨謂年穀不熟門闗在國曰門在郊曰闗之委積以養老孤郊里之委積以待賓客四方至者野鄙之委積以待羇旅謂不得去者縣都之委積以待凶荒廩人主藏米之官長掌九穀之數九穀謂黍稷稻粱􅐕苽麻麥豆也以待國之匪頒匪頒謂委人之委積賙賜謂賜予稍食謂祿廩以嵗之上下數邦用上謂豐年下謂歉嵗以知足否量入為出知所用足與不足也以詔穀用以治年之凶豐治之者預為之防也凡萬民之食計數萬人所食食食謂一月之食者人四鬴六斗四升曰鬴上豐年為上也人三鬴每人一月食三鬴中中等不豐不歉之年也也人二鬴每人一月食二鬴下歉年為下也若食不能人二鬴若一月之食一人不句一石二斗八升則令邦移民就穀移民之不足者以就穀有餘之處詔王殺邦用凶年邦用宜從減省臣按周禮十二荒政是國家遇凶荒之時救濟之法也遺人所掌是國家常時收諸委積以待凶荒施惠之法也廩人所掌是國家每嵗計其豐凶以為嗣嵗移就之法也觀此可以見先王之時所以為生靈慮災防患之良法深意矣蓋其未荒也預有以待之將荒也先有以計之既荒也大有以救之此三代之民所以遇災而無患也歟今其遺法故在後世人主誠能師其意而立為三者之法則民之遇凶荒也無飢餓之患流移之苦矣司救凡嵗時有天患謂烖害民病則以節旌節巡國中及郊野而以王命施惠李覯曰司救以王命施惠非直凶荒而後施與也疾疫亦有之矣夫四時之厲或連月不愈或闔門不起丁壯臥於牀蓐則老稚無能為飲食所不給醫藥所不濟至於死者豈天命乎人主所宜動心矣是故凶年非直除減田租彼貨賂之征皆舍之疾疫亦然夫阻饑之人營求衣食固無所不至又將籠其貨賄則何所措手足乎况於疾疫之世安得助天為虐乎人主所宜動心矣臣按疾疫之災多生於凶荒之嵗凡遇荒年宜豫為之防使之不至於飢餓而内傷勞苦而外感積聚而旁染是亦救荒之一助也春秋襄公二十有四年大饑胡安國曰古者救災之政若國凶荒或發廩以賑乏或移粟以通用或徙民以就食或為粥溢以救餓莩或興工作以聚失業之人緩刑舍禁弛力薄征索鬼神除盜賊弛射侯而不燕置廷道而不脩殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大饑蓋所以賑業之者有不備矣故書之以為戒臣按胡氏之言救災之政備矣舉而行之則雖災勿災焉惟民災而上弗䘏此民之所以災歟為人上者其尚體聖人春秋之書法毋坐視民之災而不為先事之防臨事之䘏哉穀梁赤曰五穀不升成也為大饑一穀不升謂之嗛不足貌二穀不升謂之饑三穀不升謂之饉四穀不升謂之康康虚五穀不升謂之大侵侵傷大侵之禮君食不兼味臺榭不塗飾也弛廢也侯射侯廷道廷内道路不除脩也百官布而不制雖布列而不更制作鬼神禱而不祀惟祈禱不祭祀此大侵之禮也臣按君食不兼味以下此即周禮膳夫所謂大荒則不舉者也譬諸父母焉其子不哺而已乃日餘膏梁於心安乎王制三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色飢而食菜則色病然後天子食日舉以樂馬睎孟曰三十年為一世三年耕必有一年之食至三十年之通此人力也凶旱水溢此天變也人力備則可以應天變蓋王者與民同患故雖有凶旱水溢而民無菜色於下然後天子日食舉庶羞備禮而以樂侑之也臣按國之所以為國者以有民也民之所以為民者以有食也耕雖出於民而食則聚於國方無事之時豐稔之嵗民自食其食固無賴於國也不幸而有水旱之災凶荒之嵗民之日食不繼所以繼之者國也國又無蓄焉民將何賴哉民之飢餓至於死且散則國空虚矣其何以為國哉是以國無九年六年之蓄雖非完國然猶足以為國也至於無三年之蓄則國非其國矣國非其國非謂無土地也無食以聚民云爾是以三年耕必餘一年食九年耕必餘三年食以至三十年之久其餘至於十年之多則國無不足之患民有有餘之食一遇凶荒民有所恃而不散有所食而不死而國本安固矣雖然為治者非不欲蓄積以備凶歉也然而一嵗之所出僅足以給一嵗之所費奈何曰數口之家十金之産茍有智慮者尚能營為以度日積聚以備患况有天下之大四海之富者哉玉藻年不順成則天子素服乗素車食無樂又曰年不順成君衣布布衣也搢揷也本士之笏也闗梁不租不收租稅山澤列遮列也守之之義而不賦不收賦稅土功不興大夫不得造車馬臣按古昔帝王遇災必懼凡事皆加減節貶損非獨以憂民之憂蓋亦以畏天之災也故周禮大荒則不舉大札則不舉天地大烖則不舉舉者殺牲盛饌也豈但飲食為然則凡所服之衣所乗之車凡百興作舉皆休息此無他君民之分雖懸絶而實相資以相成也當此凶荒之時吾民嗷嗷然以待哺睊睊然以相視藝業者技無所用營運者貨無所售典質則富户無錢舉貸則上户無力魚蝦螺蚌採取已竭木皮艸根剝掘又盡面無人色形如鬼魅扶老攜幼宛轉以號呼力疾曳衰枵腹以呻吟氣息奄奄朝不保暮其垂於阽危瀕於死亡也如此為人上者何忍獨享其奉哉雖欲享之亦且食不下咽也雖然與其貶損於既荒之餘孰若保養於未荒之先非獨下民不罹其苦而上之人亦無俟於降殺也孟子對鄒穆公曰凶年饑嵗君之民老弱轉乎溝壑壯者散而之四方者㡬千人矣而君之倉廩實府庫充有司莫以告是上慢而殘下也君行仁政斯民親其上死其長矣范祖禹曰書曰民惟邦本本固邦寧有倉廩府庫所以為民也豐年則斂之凶年則散之恤其飢寒救其疾苦是以民親愛其上有危難則赴救之如子弟之衛父兄手足之捍頭目也臣按人君之為治所以延國祚安君位者莫急於為民故凡國家之所以脩營積貯者何者而非為民哉是故豐年則斂之非斂之以為己利也收民之有餘以備他日之不足凶年則散之非散之以為己惠也濟民之不足而發前日之有餘吁民有患君則恤之則夫他日君不幸而有患焉則民將救之惟恐後矣荀鄉曰田野縣鄙者財之本也垣牆也窌窖也倉廩者財之末也百姓時和謂天時和順事業得叙者耕稼得其次序貨之源也等賦謂以差等制賦也府庫者貨之流也故明主必謹養其和節其流開其源而時斟酌焉潢然使天下必有餘而上不憂不足如是則上下俱富交無所藏之是知國計之極也故禹十年水湯七年旱而天下無菜色者十年之後年穀復熟而陳積有餘是無他故焉知本末源流之謂也臣按荀鄉本末源流之説有國家者不可以不知也誠知本之所在則厚之源之所自則開之謹守其末節制其流量入以為出挹彼以注此使下常有餘上無不足禹湯所以遇災而不為患者知此故也魏李悝平糴法中飢則發中熟之所斂大飢則發大熟之所斂而糶之故雖遇飢饉糴不貴而民不散漢耿壽昌請令邊郡築倉以穀賤時則増價而糴以利農穀貴時則減價而糶以利民名曰常平倉臣按耿壽昌常平之法因穀貴賤而増減其價以糶糴之其法非不善也然年之豐歉不常穀之種類不一或連嵗皆歉或此種熟而彼種不收茍其斂散之際非斟酌而上下之其法將有時而不平者矣惟今江北之地地可窖藏雜種五穀宜倣此法於要害處立常平司專差户部屬官往涖其事隨其熟而收其物不必專其地因其時而予之價不必定於官視年豐歉隨時糶糴立倉用壽昌之名斂散行李悝之法庶乎其可也鼂錯言於漢文帝曰聖王在上而民不凍飢者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國亡無同捐瘠者無相棄捐而瘦病者以畜積多而備先具也今海内為一土地人民之衆不減湯禹加以亡天災數年之水旱而畜積未及者何也地有遺利民有餘力生穀之土未盡墾山澤之利未盡出遊食之民未盡歸農也臣按安養斯民之政在開其資財之道開資財有道在墾土田通山澤使地無遺利禁遊民興農業使民無餘力如此則畜積多矣雖有天災數年之水旱而吾所以為之備者具之有素安能為吾民患哉是以古之善為治者恒備於未荒之先救之已患之後者䇿斯下矣隋開皇五年度支尚書長孫平奏令民間每秋家出粟麥一石以下貧富無差輸之當社委社司檢校以備凶年名曰義倉胡寅曰賑飢莫要乎近其人隋義倉取之於民不厚而置倉於當社饑民之得食也其庶矣乎後世義倉之名固在而置倉於州郡一有凶飢無狀有司固不以上聞也良有司敢以聞矣比及報可委吏屬出而施之文移反復給散艱阻監臨胥吏相與侵沒其受惠者大抵城郭之近力能自達之人耳居之逺者安能扶老攜幼數百里以就龠合之廩哉必欲有備無患當以隋氏為法而擇長民之官行劭農之法輔以救荒之政本末具舉民之飢也庶有瘳乎臣按義倉之法其名雖美其實於民無益儲之於當社亦與儲之州縣無以異也何也年之豐歉無常地之燥溼各異官吏之任用不久人品之邪正不同由是觀之所謂義者乃所以為不義本以利民反有以害之也但見其事煩擾長吏姦而已其於賑䘏之實誠無益焉然則如之何而可臣愚竊有一見請將義倉見儲之米歸併於有司之倉俾將所儲者與在倉之米挨陳以支遇有荒年照數量支以出計其道里之費運之當社之間以給散之就量用其中米以為脚費任其事者不必以見任之官散之民者不必以在官之屬所司擇官以委必責以大義委官擇人以用必加以殊禮其事詳見下不必拘拘於所轄專專於所屬如此則庶㡬民受其惠乎唐貞觀二年遣使賑䘏飢民鬻子者出金帛贖還之臣按飢饉之年民多賣子天下皆然而淮以北山之東尤甚嗚呼人之所至愛者子也時日不相見則思之挺刃有所傷則戚之當時和嵗豐之時雖以千金易其一稚彼有延頸受刃而不肯與者一遇凶荒口腹不繼惟恐鬻之而人不售故雖十餘嵗之兒僅易三五日之食亦與之矣此無他知其偕亡而無益也然當此困餓之餘疫厲易至相染過者或不之顧縱有售者亦以飲食失調往往致死是以荒歉之年餓莩盈途死屍塞路有不忍言者矣臣愚竊以為唐太宗贖飢民所賣之子固仁者之心也然待其賣之而後贖彼不售而死者亦多矣莫若遇飢歉之年民有鬻子者官為買之每一男一女費以五緡以上為率量與所賣之人以為養贍之計用其所餘之貲以為調養之費因其舊姓賜以新名𫝊送邊郡編為隊伍給以糧賞配之軍士之家俾其養育死者不許句丁如此既得以全其性命又得以濟其父母内郡不耗邊城充實是於救荒之中而有實邊之效或者若謂國家府庫有限費無所出惟今江南之人有謫戍西北二邊者句丁補伍有如棄市及至戍所多不得用今後遇有荒嵗預借官錢買之待後於江南民户有𨽻戎伍於極邊者願出五百緡以上者除其尺籍出二百緡以上者改𨽻近衛如此則除一軍得百軍移一軍得四十軍隨以所得抵數還官數十年之後邊境之軍日増而南方之伍亦不缺矣或曰因飢募兵古有其事歟曰富弼在青州因濟飢民募軍萬計史可考也代宗時劉晏掌財賦以為户口滋多則賦稅自廣故其理財以愛民為先諸道各置知院官每旬月具州縣豐歉之狀白使司豐則貴糴歉則賤糶或以穀易雜貨供官用及於豐處賣之知院官始見不稔之端先申至某月須如干蠲免某月須如干救助及期晏不俟州縣申請即奏行之應民之急未嘗失時不待其困弊流亡餓殍然後賑之也由是民得安其居業户口蕃息晏始為轉運使時天下現户不過二百萬其季年乃三百餘萬在晏所統則増非所統則不増也其初財賦嵗入不過四百萬緡季年乃千餘萬緡臣按劉晏謂户口滋多則賦稅自廣故其理財以愛民為先上之人誠愛乎民輕徭而薄賦省刑而息兵則民不消耗而户口多矣然户口消耗之由固由乎人亦出乎天而凶荒之嵗為尤甚能如晏使有司每旬月具州縣豐歉之狀貴糴賤糶始見不稔之端先行蠲免救助應民之急不待其困弊流亡餓殍然後賑之如此則人既不為之害天亦不能為之災户口滋多賦税日廣矣由是觀之則國家所以行備荒之政非但為民計蓋為國計也五代周顯德六年淮南飢世宗令以米貸之或曰民貧恐不能償世宗曰民猶子也安有子倒懸而父不為解者安責其必償也胡寅曰稱貸所以惠民亦以病之惠者紓其目前之急也病者責其他日之償也其責償也或嚴其期或徵其耗或取其息或予之以米而使之歸錢或貧無可償而督之不置或胥吏以詭貸而徵諸編民凡此皆民之所甚病也有司以豐取約予為術聚斂之臣以頭㑹箕斂為事大旱而稅不蠲水潦而稅不蠲蝗蝻螟賊而稅不蠲長官督稅不登數則不書課民户納欠不破産則不落籍出於民者尚如此而况貸於公者其責償固不遺餘力矣世宗視民猶子匡救其乏而不責其必償仁人之心王者之政也臣按胡寅此言非但稱貸之弊乃今日義倉之弊也朝廷設立義倉本以為荒歉之備使吾民不至於捐瘠而有司奉行不至方其收也急於取足不復計其美惡及其儲也恐其浥爛不暇待其荒歉所予者不必所食之人所徵者多非所受之輩胡氏所謂其責償也或嚴其期或徵其耗或取其息或予之以米而使之歸錢或貧無可償而督之不置或胥吏以詭貸而徵諸編民此數言者切中今日有司義倉之弊嗚呼官倉之儲本為軍國也因飢嵗以稱貸於民偏方之君猶不責償况以聖明之世儲粟以備荒而謂之義倉者乎宋眞宗大中祥符八年嵗歉民流命侍御史乗𫝊安撫發倉廩出粟及賑貸神宗熈寧二年判汝州富弼言襄鄧汝地曠不耕河北流民至者日衆臣遣官察其無業可復者盡給以田羸疾老弱不任農事者始以粟給之司馬光因遣使賑濟河北流民上言京師之米有限河北之流民無窮莫若擇公正之人為監司使察災傷州縣守宰不勝任者易之各使賑濟本州縣之民則飢民有可生之路豈得復有流移臣按人生莫不戀土非甚不得已不肯舍而之他也茍有可以延性命度朝夕孰肯捐家業棄墳墓扶老攜幼而為流浪之人哉人而至此無聊也甚矣夫有土此有民徒有土而無民亦惡用是土為哉是以知治本者恒於斯民平居完聚之時豫為一旦流離之慮必擇守令必寛賦役必課農桑汲汲然惟民食之為急先水旱而為水旱之備未饑饉而為饑饉之儲此無他恐吾民一旦不幸無食而至於流離也夫蓄積多而備先具則固無患矣若夫不幸蓄積無素雖有蓄積而連嵗荒歉請之官無可發勸之民無可貸乞諸鄰無可應將視其民坐守枵腹以待斃乎無亦聽其隨處趂食以求生也然是時也赤地千里青艸不生市肆無可糴之米旅店無充飢之食民之流者未必至所底止而為塗中之殍多矣然則如之何而可曰國家設若不幸而有連年之水旱量其勢必至饑饉則必豫為之計通行郡縣查考有無蓄積於是量其逺近多寡或移民以就粟或轉粟以就民或髙時估以招商或發官錢以市糴不幸公私乏絶計無所出知民不免於必流則亟達朝廷豫申於㑹府多遣官屬分送流甿縱其所如隨處安揷所至之處請官廋之見儲官為給散不責其償借富民之餘積官為立券估以時直此處不足又聽之他既有底止之所茍足以自存然後校其老壯强弱老而弱者留于所止之處壯而强者量給口糧俾歸故鄉官與之牛具種子趂時耕作以為嗣嵗之計待嵗時可望然後般挈以歸如此則民之流移者有以䕶送之使不至於潰散而失所有以節制之使不至於刼奪以生亂又有以還定安集之使彼之室家已破而復完我之人民已散而復集是雖所以恤民災患亦所以弭國禍亂也臣嘗因是而論之周宣王所以中興者以萬民離散不安其居而能勞來還定安集之也晉惠帝所以分崩離析者以六郡荐饑流民入于漢川者數萬家不能撫恤之而有李特之首亂也然則流民之闗係亦不小哉今天下大勢南北異域江以南地多山澤所生之物無間冬夏且多通舟楫縱有荒歉山澤所生可食者衆而商賈通舟販易為易其大江以北若兩淮若山東若河南亦可通運惟山西陜右之地皆是平原古時運道今皆湮塞雖有河山地氣髙寒物生不多一遇荒嵗所資者艸葉木皮而已所以其民尤易為流徙為今之計莫若設常平倉當豐收之年以官價雜收諸穀各貯一倉嵗出其易爛者以給官軍月糧估以時價折筭與之詳見制國用市糴之令而留其見儲米之耐久者以為蓄積之備又特遣臣僚尋商於入闗之舊路按河船入渭之故道若嵗運常數有餘分江南漕運之餘以助之一遇荒歉舟漕陸輦以往是皆先事之備有備則無患矣蓋此二藩非他處比是乃近邊之地所謂保障繭絲二者皆有賴焉者也尤不可不盡其心仁宗一遇災變則避正殿變服損膳徹樂恐懼脩省見於顔色惻怛哀矜形於詔命災所被之處必發倉廩賑貸或平價以糶不足則轉漕他路粟以給又不足則誘富人入粟秩以官爵災甚則出内帑金帛或鬻僧牒或留嵗漕或免租稅寛逋負休力役罷科率薄闗市之征弛山澤之禁不能自存者官為收養不得其死者官為瘞埋臣按宋仁宗之遇災而䘏民也不徒有惻惻然哀矜之心而實有鑿鑿乎賑䘏之政視彼之徒為虚文付之有司以應故事者異矣萬嵗之後廟號曰仁不亦宜乎慶厯八年河朔大水民流就食京東者不可勝數知青州富弼勸所部民出粟益以官廩擇公私廬舍十萬餘區散處其人以便薪水官吏自前資待缺寄居者皆賦以祿使即民所聚選老弱病瘠者廩之仍書其勞約他日為奏請受賞率五日輒遣人持酒肉飯糗慰藉出於至誠人人為盡力山林陂澤之利可資以生者聽流民擅取死者為大冢葬之明年麥大熟民各以逺近受糧歸凡活五十餘萬人募為兵者萬計臣按古人言救荒無善政非謂蓄積之不先具勸借之無其方也蓋以地有逺近數有多寡人有老幼强弱聚為一處則蒸為疾疫散之各所則難為管理不置簿書則無所稽考不依次序則無以徧及置之則動經旬月序之則緩不及救有㑹集之擾有辨察之煩措置一差皆足致弊此所以無善政也富弼以一青州之守而活河朔五十萬之人非徒活民而又因之得軍由其立法之簡便周盡也所以簡便周盡者豈弼一手一足之勞哉其法之最善者官吏自前資待缺寄居者皆賦以祿使即民所聚選老弱病瘠者廩之也今世州郡無所謂待缺寄居之官吏臣向於義倉條下云任其事者不必見任之官散之民者不必在官之屬是也臣愚欲望朝廷折衷富弼之法立為救荒法式頒布天下州縣凡遇凶荒或散粟或給粥所在官司即行下所屬凡所部之中有致仕閒住及待選依親等項官吏監生與夫僧道耆老醫卜人等凡平日為鄉人所信服者官司皆以名起之待以士大夫之禮喻以朝廷仁民之意給以印信文憑加以公直等名俾其量領官粟各就所在因人散給官不遥制事完之日具數來上其中得宜者量為奬勉作弊者加以官法如此則吏胥不乗機而恣其侵尅飢民得實惠而免於死亡矣熈寧八年夏吳越大旱趙忭知越州前民之未飢為書問屬縣菑所被者㡬鄉民能自食者有㡬當廩於官者㡬人溝防搆築可僦民使治之者㡬所庫錢倉粟可發者㡬何富人可募出粟者㡬家僧道士食之羡粟書於籍者其㡬具存使各書以對而謹其備臣按曾鞏有言菑沴之行治世不能使之無而能為之備民病而後圖之與夫先事而為計者則有間矣不習而有為與夫素得之者則有間矣趙忭在越州備荒之政為世所稱見旱勢之方熾知嵗事之必歉前民未飢已為濟飢之備觀其為書以訪問於其屬者甚詳且悉後世有志於民者誠能以之為法按其條件先事訪問一一知其所以然之故而委曲周盡纎息無遺必得其實當其宜無其弊而後可如此則菑沴之來有其備而無患矣不然待其狼狽潰爛之餘然後救之安能有濟乎曾鞏救菑議曰有司建言請發倉廩與之粟壯者人日二升幼者人日一升今百姓暴露乏食已廢其業矣使之相率日待二升之廩於上則其勢必不暇乎他為一切棄百事而專意於待升合之食是直以餓殍之養養之而已非深思逺慮為百姓長計也以中户計之户為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一户月當受粟五石自今至於麥熟凡十月一户當受粟五十石今被災州郡民户不下二十萬内除有不被災及不仰食於官者去其半猶有十萬户計十萬户十閱月之食當用粟五百萬石而足何以辦此况給受之際有淹速有均否有眞偽有㑹集之擾有辨察之煩凡此又不過使之得旦暮之食耳其於屋廬搆築之費將安取哉為今之䇿下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則今被災州郡為十萬户如一户得粟十石得錢五千下户常産之貲平日未有及此者也彼得錢以完其居得粟以給其食則農得修其畎畝商得治其貨賄一切得復其業而不失其常生之計與專意以待二升之廩於上而勢不暇乎他為豈不逺哉由有司之說則用十月之費為粟五百萬石由今之說則用兩月之費為粟一百萬石况貸之於今而收之於後足以振其艱乏而終無損於儲蓄之實所實費者錢五鉅萬貫而已臣按曾鞏此議所謂賜之錢貸之粟比之有司日逐給粟之說其為利病相去甚逺所謂深思逺慮以為百姓長計者眞誠有之但飢民一户貸之米十石一旦責其如數償之難矣不若因時量力稍有力者償其半無力者併與之或立為次第之限可也孝宗時下朱熹社倉法於諸路初建之崇安縣開耀鄉有社倉一所熹請於府得常平米六百石賑貸夏受粟於倉冬則加息計米以償自後隨年斂散小歉則蠲其息之半大飢則盡蠲之凡十有四年得息米造倉三間及以元數六百石還府以見儲米三千一百石以為社倉不復收息每石止收耗米三升以是一鄉之間雖遇凶年人不缺食後請以其法行之他處臣按朱熹社倉之法固善矣然里社不能皆得人如熹者以主之又不能皆得如劉如愚父子者以為之助熹固自言其數年之間左提右挈上説下教為鄉閭立此無窮之計然則其成此倉也蓋亦不易矣然則其法不可行歟曰熹固言里社不能皆有可任之人欲一聽其所為則懼其計私以害公欲謹其出入則鉤挍靡密上下相遁其害又有甚於官府者矣熹又嘗言於其君曰臣曾摹得蘇軾與林希書説熈寧中荒政之弊費多而無益以救之遲故也其言深切可為後來之鑒臣按蘇軾書云朝廷厚設儲備熈寧中本路截發及别路般來錢米并因大荒放稅及虧却課利蓋累百鉅萬然於救荒初無絲毫之益者救之遲故也嗚呼救之遲之一言豈但熈寧一時救荒之失哉自古及今莫不然也臣常見州郡每有凶荒朝廷未嘗不發倉廩之粟賜内帑之銀以為賑䘏之䇿然往往行之後時緩不及事朝廷有鉅萬之費而飢民無分毫之益其故何哉遲而已矣所以遲者其故何在蓋以有司官吏惟以簿書為急不以生靈為念遇有水旱災傷非甚不得已不肯申達縣上之郡郡上之藩府動經旬月始達朝廷及至行下遣官檢勘動以文法為拘後患為慮因一之詐疑衆皆然惟己之便不人之䘏非民阽於死亡狼戾慘切朝廷無由得知及至發廩之令行齎銀之勑至已無及矣雖或有沾惠者亦無㡬爾臣願聖明行下有司俾定奏災限期則例頒行天下災及八分以上者馳𫝊五分以上者差人二三分以上入逓隨其逺近以為期限緩不及期以致誤事者定其罪名秩滿之日降等叙用如此則藩服監司郡縣守令咸以救濟為念庶㡬無遲緩之失乎隆興中中書門下省言湖南江西旱傷立賞格以勸積粟之家凡出米賑濟係崇尚義風不與進納同臣按鬻爵非國家美事也然用之他則不可用之於救荒則是國家為民無所利之也宋人所謂崇尚義風不與進納同是也臣願遇嵗凶荒民間有積粟者輸以賑濟則定為等第授以官秩自逺而來者并計其路費授官之後給與璽書俾有司加禮優待與見任同雖有過犯亦不追奪如此則平寧之時人爭積粟荒歉之嵗民爭輸粟矣是亦救荒之一䇿也辛棄疾帥湖南賑濟㮄文秖用八字曰刼禾者斬閉糴者配臣按朱熹謂棄疾做兩㮄便亂道蓋欲其兼禁之也蓋荒歉之年民間閉糴固是不仁然當此際米價翔涌正小人射利之時也而必閉之者蓋彼亦自量其家口之衆多恐嗣嵗之不繼耳彼有何罪而配之耶若夫刼禾之舉此盜賊之端禍亂之萌也周人荒政除盜賊正以此耳小人乏食計出無聊謂飢死與殺死等死耳與其飢而死不若殺而死况又未必殺耶聞粟所在羣趨而赴之哀告求貸茍有不從即肆刼奪自諉曰我非盜也迫於飢餓不得已耳嗚呼白晝攫人所有謂之非盜可乎漸不可長彼知其負罪於官因之鳥駭鼠竄竊弄鋤梃以扞遊徼之吏不幸而傷一人焉勢不容己遂至變亂亦或有之臣願明敕有司遇有旱災之嵗勢必至飢窘必先㮄示禁其刼奪諭之不從痛懲首惡以警餘衆決不可行姑息之政此非但救飢荒乃弭禍亂之先務也然則富民閉糴何以處之曰必先諭之以惠鄰次開之以積福許其隨時取直禁人侵其所有民之無力者官與之券許其取息待熟之後官為追償茍積粟之家丁口頗衆亦必為之計筭推其贏餘以濟匱乏若彼僅僅自足亦不可强也然亦嚴為之限凡有所積不肯發者非至豐穰禁不許出糶彼見得利恐其後時自計有餘亦不能以不發矣吕祖謙曰大抵荒政統而論之先王有預備之政上也脩李悝之政次也所在蓄積有可均處使之流通移民移粟又次也咸無焉設糜粥最下也臣按朱熹有言自古國家傾覆之由何嘗不起於盜賊盜賊竊發之患何嘗不起於飢餓吁天災流行國家代有是以先王於民也備之於未荒之前救之於方荒之際而又養之於己荒之餘誠以禮義生於富足一旦飢餓切身吾民無所倚賴或遂至於犯禮越分非獨慮其身之不能存亦慮其心之或以蕩也是以太平無事之時恒為亂離反側之慮豐登有餘之日恒為荒歉不給之憂此無他天生人君以為生民之主必體天心以安民生然後有以保其位也不然方其無事之時吾則資之以為用及其有患之際吾乃棄之而不顧是豈天之意哉亦豈君之道哉是以古昔盛時三年耕餘一年食九年耕餘三年食以三十年通計之則餘十年之食矣今不能盡如古制臣請以在倉之米尖入平出之餘逓年所得之米皆用以為備豫之數嵗杪計用之時量入為出之際不在數中仍留在倉存其名數以待荒年之用又立為定制凡藩臬州縣民間詞訟屬户律者如户婚田土坊塲津渡墟市之類訟而得理者俾量力而出粟爭田者上田一畝三斗中田二斗下田一斗爭婚者上户三十石中户二十石下户十石或四五石之類其無理者亦罰米以贖罪皆貯之倉以備荒政及前此斂民以為賑濟者皆通歸官廩常年則依例挨陳以支荒嵗則别行闗給以散積之嵗月必有贏餘其或不足又須多方設法以措置之隨處通融以補益之使必足而後已一旦遇災有備無患矣大抵備荒之政不過二端曰斂曰散而已有以斂之而積久不散則米粒浥腐而不可食有以散之而一切不斂則倉廩空虚而無以繼守者有破産之患貧者無償官之資有司茍且具文逭責往往未荒而先散及有荒歉所儲已空飢民有慮後患者寧流移而死亡不敢領受甚至官吏憑為姦利給散之際飢者不必予予者不必飢收斂之時償者非所受受者不必償其弊非止一端必欲有利而無弊莫若盡捐予民不責其償之為善然又慮夫氣運不常豐凶莫測徒有散而無斂後將無以為繼宜計所積之多少料民産之有無積茍有餘不責其償可也若或土地之偏隘人民之衆多遇有凶災難於取具賑飢之後豐年取償可分民為三等上户償如其數中户取其半下户盡予之又於户部十三司之外依工部繕工司例别立一司添設官吏專以備荒每年夏六月麥熟秋九月以後百穀收成之候藩府州縣將民間所種有無成熟分數逐件申達十月以後通申一年之數兼計明年食足與否有收者㡬鄉無收者㡬鄉鄉凡㡬户得過者㡬家必須賑給者㡬家官廩之儲多少富家之積有無近邑何倉有米近鄉誰家有積或借官帑以為備或招商賈以通市或請於朝廷有所蠲貸或申於上司有所干請凡百可以為賑濟之備者皆於未荒之先而為先事之慮嵗嵗而襲其常事事而為之制人人而用其心雖有荒旱水溢民無菜色矣若夫臨事而救之之術者臣已於各條之下委曲而各為之措置矣雖然此皆其末也若夫本之所當先者則朱熹所謂為政者當順五行修五事以安百姓若曰賑濟於凶荒之餘縱饒措置得善所惠者鮮終不濟事伏惟仁聖體上天付託之重廣上帝好生之仁常存哀矜惻隠之心𢎞布蠲貸賑䘏之政非獨以䘏民患蓋所以固邦本也天下生靈不勝大幸以上論䘏民之患大學衍義補卷十六
