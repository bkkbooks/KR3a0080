body:
  text: 大學衍義補卷一百十六明丘濬撰治國平天下之要嚴武備總論威武之道梁惠王曰晉國天下莫強焉叟之所知也及寡人之身東敗於齊長子死焉西喪地於秦七百里南辱於楚寡人恥之願比死者一灑之如之何則可孟子對曰地方百里而可以王王如施仁政於民省刑罰薄稅斂深耕易治也耨耘也壯者以暇日修其孝弟忠信入以事其父兄出以事其長上可使制梃杖也以撻秦楚之堅甲利兵矣彼奪其民時使不得耕耨以養其父母父母凍餓兄弟妻子離散彼陷溺其民王往而征之夫誰與王敵故曰仁者無敵王請勿疑朱熹曰百里小國也然能行仁政則天下之民歸之矣省刑罰薄稅斂此二者仁政之大目也君行仁政則民得盡力於農畝而又有暇日以修禮義是以尊君親上而樂於效死也以彼暴虐其民而率吾尊君親上之民往正其罪彼民方怨其上而樂歸于我則誰與我為敵哉仁者無敵蓋古語也百里可王以此而已恐王疑其迂濶故勉使勿疑也孔文子曰惠王之志在于報怨孟子之論在于救民所謂惟天吏則可以伐之蓋孟子之本意臣按惠王之問孟子意欲強兵以報怨孟子乃教之以施仁政于民以為天下莫敵之䇿徐觀其䇿不過使民深耕易耨孝弟忠信則可以制梃而撻秦楚之兵夫車徒之衆兵刃之利不足以當秦楚之強乃欲制梃以撻之豈不大迂濶而不切于事情哉然觀戰國之時其國有六其後皆亡于秦固以秦之強而有堅甲利兵也及秦之亡乃不過起于折竿斬木之匹夫當是時也天下一家萬國一君豈無堅甲利兵哉然而無救于秦之亡由是觀之堅甲利兵雖可以張國威于一時而孝弟忠信終可以結民心於悠久也孰謂孟子之言迂闊哉齊宣王曰寡人有疾寡人好勇對曰王請無好小勇夫撫劍疾視怒目而視曰彼惡敢當我哉此匹夫之勇敵一人者也王請大之詩云王赫怒貌斯怒爰於也整其旅衆也以遏止也徂往也莒密人侵阮徂共之衆以篤厚也周祜福也以對答也于天下此文王之勇也文王一怒而安天下之民書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下遏敢有越厥志一人衡行謂作亂也於天下武王耻之此武王之勇也而武王亦一怒而安天下之民今王亦一怒而安天下之民民惟恐王之不好勇也朱熹曰小勇血氣所為大勇義理所發詩大雅皇矣篇此文王之大勇也書周書泰誓之篇也言武王亦大勇也王若能如文武之為則天下之民望其一怒以除暴亂而拯已于水火之中惟恐王之不好勇耳又曰此章言人君能懲小忿則能恤小事大以交鄰國能養大勇則能除暴救民以安天下張栻曰小勇者血氣之怒也大勇者禮義之怒也血氣之怒不可有禮義之怒不可無知此則可以見性情之正而識天理人欲之分矣臣按怒者七情之一也怒與喜對聖人之情發皆中節其喜也則為慶賞天下莫不仰其澤其怒也則為刑戮天下莫不畏其威密人侵阮徂共二國之人塗炭極矣文王一怒而二國之人得其安商辛橫行于天下天下之人荼毒甚矣武王一怒而天下之人除其害是則當世之民惟恐吾君之不怒也若夫漢武帝之出師塞北隋煬帝之渡海征遼元世祖之興師日本斯民生于元狩太初之間大業至元之世者何不幸而遭其君之怒哉吁文武之怒上怒而下喜三君之怒上怒而下怨後世人君尚知所鑒戒哉齊人伐燕勝之宣王問曰或謂寡人勿取或謂寡人取之以萬乘之國伐萬乘之國五旬而舉之人力不至于此不取必有天殃取之何如孟子對曰取之而燕民悅則取之古之人有行之者武王是也取之而燕民不悅則勿取古之人有行之者文王是也以萬乘之國伐萬乘之國簞食壺漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣朱熹曰按史記燕王噲讓國于其相子之而國大亂齊因伐之燕士卒不戰城門不閉遂大勝燕運轉也言齊若更為暴虐則民將轉而望救于他人矣趙岐曰征伐之道當順民心民心悅則天意得矣齊人伐燕取之諸矦將謀救燕宣王曰諸矦多謀伐寡人者何以待之孟子對曰臣聞七十里為政于天下者湯是也未聞以千里畏人者也書商書仲虺之誥下同曰湯一征自葛始天下信之東面而征西夷怨南面而征北狄怨曰奚為後言何為不先來伐我我民望之若大旱之望雲霓虹也也歸市者不止耕者不變動也誅其君而弔其民若時雨降民大悅書曰徯待也我后君也后來其蘇復生也今燕虐其民王往而征之民以為將拯救也已于水火之中也簞食壺漿以迎王師若殺其父兄係纍縶縛也其子弟毁其宗廟遷其重器寶玉之器如之何其可也天下固畏齊之强也今又倍地并燕而增一倍之地而不行仁政是動天下之兵也王速出令反其旄老人倪小兒止其重器謀于燕衆置君而後去之則猶尚也可及止及其未發而止之也也朱熹曰千里畏人指齊王也一征初征也天下信之信其志在救民不為暴也此言湯之所以七十里而為政于天下也齊之取燕若能如湯之征葛則燕人悅之而齊可為政于天下矣今乃不行仁政而肆為殘虐則無以慰燕民之望而服諸矦之心是以不免乎以千里而畏人也齊人伐燕或問曰勸齊伐燕有諸曰未也沈同問燕可伐與吾應之曰可彼然而伐之也彼如曰孰可以伐之則將應之曰為天吏則可以伐之吕大臨曰奉行天命謂之天吏廢興存亡惟天所命不敢不從若湯武是也臣按燕齊皆列國也燕雖不道齊非天子而擅興師以伐之律之以春秋之法固有不當然者此孟子所以有天吏之說也况燕之與齊地醜德齊無甚相逺然燕之君不當以先君之位而豫諸人而其臣亦不當受其君之位而不辭是時周室微弱不能執九伐之權燕齊接壤而鄰國有變亂為之救正亦不為過然是時燕民無罪而為亂者在子噲子之齊人既勝燕之後即當如孟子所言速出令而返其民之老小置其國之寶器誅其君臣之作亂者然後謀于燕之世臣耆舊别立君而去其于燕之土地人民無所利之如此則是為鄰國定亂非取而有之也齊王雖非天吏然存興滅繼絶之心誅亂安人之意亦庶幾乎湯武之師矣先儒謂湯十一征不是全滅其國取之則是蹊田而奪之牛齊王殺其父兄係纍其子弟毁其宗廟遷其重器則是滅絶其國矣安能逆止諸侯之兵哉此孟子為齊人書為區處取燕之䇿可以為後世用兵定亂之法孟子曰天時不如地利地利不如人和三里之城七里之郭外城環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也城非不髙也池非不深也兵革甲也非不堅利也米粟穀也非不多也委而去之是地利不如人和也故曰域民不以封疆之界固國不以山溪之險威天下不以兵革之利得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之以天下之所順攻親戚之所畔故君子有不戰戰必勝矣朱熹曰天時謂時日支干孤虛旺相之屬也地利險阻城池之固也人和得民心之和也三里七里城郭之小者郭外城環圍也言四面攻圍曠日持久必有值天時之善者委棄也言不得民心民不為守也域界限也言不戰則已戰則必勝張栻曰得道者順乎理而已舉措順理則人心悅服矣先王之所以致人和者在此而極夫多助之效至于天下順之其王也孰能禦之失道則違拂人心心之所暌雖親亦疏也不亦孤且殆哉雖有高城深池誰與為守臣按孟子言天時地利人和三言者萬世用兵之要也然就其中權其輕重而言則天不如地地不如人用兵以爭天下而不得人心之和雖得天時地利猶無得也先儒謂得天下者凡以得民心而已得人心在得道本乎道以得人心則地利之險有人以為之守天時之善有人以為之乘先王之守國家用天下本末具舉如此則固以得道得人心為本而亦不廢天時地利之末也夫用兵者固欲夫三者之兼舉然所以收人心而使之和者又非臨時可致者也則又在乎平日省刑罰薄稅斂教之以孝弟忠信行先王之政以恤其民如此則無敵于天下而為天吏矣則雖地利不固而天時未順亦足以自守矣况兼得天時地利也哉孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也朱熹曰春秋每書諸侯戰伐之事必加譏貶以著其擅興之罪無有以為合于義而許之者但就中彼善于此者則有之如召陵之師之類是也征所以正人也諸侯有罪則天子討而正之此春秋所以無義戰也孟子曰仁人無敵於天下以至仁伐至不仁而何其血之流杵舂杵也朱熹曰武成言武王伐紂紂之前徒倒戈攻于後以北血流漂杵孟子言此則其不可信者然書本意乃謂商人自相殺非謂武王殺之也孟子之設是言懼後世之惑且長不仁之心耳孟子曰有人曰我善為陳我善為戰大罪也國君好仁天下無敵焉南面而征北狄怨東面而征西夷怨曰奚為後我武王之伐殷也革車三百兩虎賁三千人王曰無畏寧爾也非敵百姓也若崩厥角稽首征之為言正也各欲正已也焉用戰朱熹曰制行伍曰陳交兵曰戰民為暴君所虐皆欲仁者來正已之國也張栻曰不志于仁而徒欲以功力取勝則天下孰非吾敵勝與負均為殘民而逆行其許謙曰孟子之時皆尚攻戰能者為賢臣而孟子乃以為大罪蓋國君茍能行仁政以愛其民使之飽暖安佚則下民親戴其上矣其他國之民受虐于君者心必歸于此人既樂歸于我我以親上之民而征虐民之君則其民豈肯與我為敵哉臣按孟子此三章皆明征伐之事一章言春秋之時無義戰之兵二章言武王仁義之師無血流漂杵之事三章言湯武仁義之師必不用我善為戰之人老子曰以道佐人主者不以兵強天下其事好還師之所處荆棘生焉大軍之後必有凶年故善者果而已矣不敢以取強焉果而勿矜果而勿伐果而勿驕果而不得已果而勿强物壯則老是謂非道非道早已林希逸曰兵凶器也我以害人人亦將以害我故曰其事好還用師之地農不得耕則荆棘生焉用兵之後傷天地之和氣則必有凶年之菑臣按人臣之佐君當以道勝天下使天下之臣庶皆出於吾道化之下若不能以道勝而惟以兵強焉則所以佐其君者非其道矣所以然者好勝者必遇其敵吾以兵加人而人亦以兵加我一往一返必然之理也矧兵戈一興農業必廢殺戮既盛天和必傷在地則生荆棘在天則召水旱在人則致疾疫兵雖不可用亦不能不用是以善于用兵者必果焉果者何果決其所行也所以除殘暴戡禍亂不果則民害不除而無有已時如是用兵斯之謂善非用以之取强于天下也用之取强則非善矣然所謂果者若矜伐自驕得已而不已恃強以陵人則不可也必勿矜勿伐勿驕勿强不得已焉恆于果敢之中而存抑謹之意如是則吾之兵不至于過壯而老矣蓋兵直為壯曲為老凡物皆然故曰物壯則老茍用兵而矜伐驕強可以已而不已則必過壯而老矣如此則是不能以道佐主不能以道佐主則有速死之理故曰非道早已又曰夫佳兵者不祥之器物或惡之故有道者不處是以君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬淡為上故不美也若美必樂之樂之者是樂殺人也夫樂殺人者不可得志于天下矣臣按佳之為言美也兵者凶事而以之為佳美是乃世間一種不吉利不祥善之器具也惟其為不祥之器是以其用也在物無不惡之乃人亦或有以為佳美不惡之者無乃反以兵為佳乎哉有道之士心恬淡而志無為惟以道德為樂不以兵戎為佳豈肯處其身於不祥之地而殺人以為樂哉後世人主如以用兵為佳殺人為樂本欲求以得志於天下卒之殞身覆宗者多矣老氏之言所宜深戒又曰以正治國以竒用兵以無事取天下臣按老氏此三言所謂以正治國以無事取天下與聖人之道無以異也以竒用兵說者謂竒為詐術臣竊以為不然蓋所謂竒者若所謂攻其無備出其不意避實擊虛乘機設覆非所謂偏邪不正也又曰善為士者不武善戰者不怒善勝敵者不與善用人者為之下是謂不爭之德是謂用人之力臣按為士者必以文事而武自名非以善士矣戰所以行天討非以泄已怒也以怒為戰非善戰矣與人戰而勝焉非善勝也不與敵戰而敵服斯乃為善勝矣用人而為之下不以已長勝物不以已有陵物則于用人之道善矣若是者皆是不爭之德而能用人之力者也又曰用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵禍莫大於輕敵輕敵幾喪吾寶故抗兵相加哀者勝矣臣按老氏所謂用兵有言謂世人之用兵者有如此言也我不敢先動而惟應人是為不敢為主而為客我之進也固寸步不敢先若其退也雖至於尺亦不計焉行然後能行吾之用兵行而若不行攘者必以臂吾之行兵如人之攘而不用臂遇敵必因仍之吾所因者敵而若無敵執持必以兵吾所執者兵而若無兵若是者蓋以不爭為德也然爭固不可而輕敵亦不可是故行兵之禍輕敵為最大輕敵而匆之不以為哀而反以為喜則吾所以為國之寶幾何而不為所喪乎故兩敵之國抗兵以相加其一自哀者常勝哀者不以用兵為喜恆戚戚然悲念也惟其不喜于用兵其志恆有哀矜之意惟恐或至失誤以喪吾所恃之寶也則寶常為我所有矣寶者何國寶于民也用兵而能哀其亦異乎以兵為佳者矣不以兵為佳而以為哀非不得已不用焉則必不至于敗衄而喪吾之所寶者矣荀子曰觀國之强弱貧富有徴驗上不隆禮則兵弱下不愛民則兵弱已諾不信則兵弱慶賞不漸則兵弱將率與帥同不能則兵弱臣按國之强弱在乎兵就荀子之言而反觀之是故上隆禮則兵强矣下愛民則兵强矣已諾而能信則兵强矣慶賞以其漸則兵强矣將率能其任則兵强矣觀人之國者不必觀乎其卒伍觀是五者有能有不能者則其彊弱可知也已臨武君蓋楚將不知其姓名與孫卿議兵于趙成王前王曰請問兵要對曰上得天時下得地利觀敵之變動後之發先之至此用兵之要術也孫卿曰不然臣所聞古之道凡用兵攻戰之本在乎一民弓矢不調則羿不能以中六徴馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者是乃善用兵也故兵要在乎附民而已臨武君曰不然兵之所貴者勢力也所行者變詐也善用兵者感匆恍匆也悠暗逺視莫之所從出孫吳用之無敵于天下豈必待附民哉孫卿曰不然臣之所道仁人之兵王者之志也君之所貴權謀勢力也所行攻奪變詐者諸侯之事也仁人之兵不可詐也彼可詐者怠慢者也路暴露亶讀為袒露袒謂上下不相覆者也君臣之間滑亂也然有離德也故以桀詐桀猶巧拙有幸焉以桀詐堯譬之以卵投石以指撓攪也沸湯也若赴水火入焉焦沒耳故仁人上下百將一心三軍同力臣之於君也下之於上也若子之事父弟之事兄若手臂之扞頭目而覆胸腹也詐而襲之於先驚而後擊之一也臣按荀卿此言反本之論也所謂兵要在附民民不親附則湯武不能以必勝若權謀勢力以行詐施之于其敵猶有工拙若遇仁義之主民親附而將用命何所用哉陳囂間孫卿子曰先王議兵常以仁義為本仁者愛人義者循理然則又何以兵為凡所為有兵者為爭奪也孫卿曰仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也彼兵者所以禁暴除害也非爭奪也故仁人之兵所存者神所過者化若時雨之降莫不說喜臣按荀卿此言可見帝王之兵非禁暴除害不敢輕舉所以為仁義之師故其所存者神妙而不測所過者化融而無迹此其所以為王道而上下與天地同流固非伯功小小補塞間隙之可比又豈非因小忿爭小利者所可同年語哉三略曰務廣地者荒務廣德者強能有其有者安貪人之有者殘殘滅之政纍世受患造作過制雖成必敗舍已而教人者逆正已而化人者順逆者亂之招順者治之要又曰聖王之用兵非樂之也將以誅暴討亂也夫以義誅不義若決江河而溉爝火臨不測而擠欲墜其克必矣所以優遊恬淡而不進者重傷人物也夫兵者不祥之器天道惡之不得已而用之是天道也夫人之在道若魚之在水得水而生失水而死故君子者常懼而不敢失道臣按三略之書或謂為太公之書然其中所引軍纎及所謂英雄侵盜縣官等語皆非三代以前之言然漢光武嘗引其言以為詔則此書之傳亦已逺矣其中可取者鮮然此數言者庶幾不悖于聖賢之㫖故録之不以人而廢言也司馬法曰殺人安人殺之可也攻其國愛其民攻之可也以戰止戰雖戰可也故仁見親義見說智見恃勇見方信見信內得愛焉所以守也外得威焉所以戰也戰道不違時不歷民病所以愛吾民也不加喪不因凶所以愛夫其民也冬夏不興師所以兼愛民也故國雖大好戰必忘天下雖安忘戰必危先王之治正名治物立國辨職以爵分祿諸侯說懷海外來服獄弭而兵寢聖德之治也其次賢王制禮樂法度乃作五刑興甲兵以討不義禮與法表裏也文與武左右也陳師道曰齊威王使其大夫追論古者司馬兵法附以先齊大司馬田穰苴之說號曰司馬穰苴兵法夫所謂古者司馬兵法國之政典也所謂穰苴兵法太史遷之所論今博士弟子之所誦說者也昔周公作政典司馬守之以佐天子平邦國正百官均萬民故征伐出于天子及上廢其典下失其職而周衰矣故征伐出于諸侯典之用舍興壞係焉遷徒見七國楚漢之戰以詐勝而身固未嘗行道也遂以仁義為虛名而疑三代以文具可謂不學矣謹按傳記所載司馬法之文今書皆無之則亦非齊之全書也然其書曰禮與法表裏文與武左右又曰殺人以安人殺之可也攻其國愛其民攻之可也以戰去戰雖戰可也又曰冬夏不興師所以兼愛民此先王之政何所難哉臣按宋人輯兵法擇其切要者為七書而司馬法比諸家為優其言多可取者而此數言其尤也尉繚子曰凡兵不攻無過之城不殺無罪之人夫殺人之父兄利人之貨財臣妾人之子女此皆盜也故兵者所以誅暴亂禁不義也兵之所加者農不離其田業賈不離其肆宅士夫不離其官府由其武議在于一人故兵不血刃而天下親焉又曰欲生于無度邪生于無禁太上神化其次因物其下在于無奪民時無損民財夫禁必以武而成賞以文而成又曰兵者凶器也爭者逆德也事必有本故王者伐暴亂本仁義焉戰國以立威抗敵相圖而不能廢兵也兵者以武為植以文為種武為表文為裏能勝此二者知勝敗矣文所以視利害辨安危武所以犯強弱力攻守也臣按先儒謂尉繚子雖未能純王政亦可謂窺本統矣而此數言庶幾古人仁義之師可取也至其他篇以殺垂教棄而不用可也史記兵者聖人所以討彊暴平亂世夷險阻救危殆自含血戴角之獸見犯則挍而况于人懷好惡喜怒之氣喜則愛心生怒則毒螫加情性之理也昔黃帝有涿鹿之戰以定火災顓頊有共工之陳以平水害成湯有南巢之伐以殄夏亂遞興遞廢勝者用事所受于天也自是之後名士迭興晉用舅犯而齊用王子子成父吳用孫武申明軍約賞罰必信卒伯諸侯兼列邦土雖不及三代之誥誓然身寵君尊當世顯揚可不謂榮焉豈與世儒暗于大較法也不權輕重猥云德化不當用兵大至窘辱失守小乃侵犯削弱遂執不移等哉故教笞不可廢于家刑罰不可捐于國誅伐不可偃于天下用之有巧拙行之有逆順耳夏桀殷紂手搏豺狼足追駟馬勇非微也百戰克勝諸侯攝伏權非輕也秦二世宿軍無用之地連兵于邉陲力非弱也結怨胸奴絓禍于越勢非寡也及其威盡勢極閭巷之人為敵國咎生窮武之不知足甘得之心不息也臣按司馬遷載此于律書言律而先言兵不言兵之用而言兵之偃首推原兵戎之始而及春秋戰國善戰之士次及桀紂二世之失而以孝文拒陳武之言終焉蓋欲世主偃兵息民綏和通使使民氣歡洽隂陽協和以為造律之本其意善矣但其謂孫武輩申明軍約身寵君尊以為榮則猶戰國之氣習也夫帝王用兵出于不得已以除民害耳豈所以為身榮哉若夫所謂世儒暗于大較不權輕重權之一字誠用兵可否之決也臣以為權于輕重以事言之不若權于是非則以理決之之為得也漢高祖時陸賈時時前說詩書帝罵之曰乃公居馬上而得之安事詩書賈曰居馬上得之寧可以馬上治之乎文武並用長久之道也臣按文武並用長久之道也必古有是言而賈稱之其言僅八字古今為治所以立國本成國治延國祚誠莫外焉承天命以安民生者其可用一而遺一乎陸賈曰天下安注意相天下危注意將將相和調則士豫附天下雖有變權不分臣按陸賈此言雖一時為陳平畫計以謀諸吕然而國家有變未有將相乖異而能安定者此則百世之所同也漢宣帝時魏相上書曰臣聞之救亂誅暴謂之義兵兵義者王敵加於已不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威于敵者謂之驕兵兵驕者滅此五者非但人事乃天道也臣按魏相論用兵之名有五首以臣聞之為言蓋自古有此言而相引之以為宣帝告也後世人主有欲用兵者恆必以其所遇之敵所行之事揆之以五者之名於兹五者果何當歟必合於義而王應而勝然後不得已而興師動衆茍或有類于所謂忿貪驕者則亟止之而不使其淪于敗破滅之地則所行者下順人心上合天道而無敵于天下矣宋歐陽修言于仁宗曰自古王者之治天下雖有憂勤之心而不知致理之要則心愈勞而事愈乖雖有納諌之明而無力行之果斷則言愈多而聽愈惑伏思聖心所甚憂而當今所最闕者不過曰無兵也無將也無財用也無禦戎之䇿也無可任之臣也此五者陛下憂其末而臣謂今皆有之然陛下未得而用之者何哉曰朝廷有三大弊故也何謂三大弊一曰不謹號令二曰不明賞罰三曰不責功實三弊因循於上則萬事廢壞於下臣按歐陽修當仁宗時上此疏其言雖為宋而發然而天下後世威武所以不振治道所以不立者政坐此三者而已誠能謹號令之頒明賞罰之施責功實之效則兵將財用不患其無任用有其臣禦戎有其䇿矣內修外攘百事具舉威武豈有不振也哉韓琦言于仁宗曰今獻䇿陳邉事者不過欲朝廷選擇將帥訓習士卒修利戈甲營葺城隍廣畜資糧以待黠羌之可勝此為安邉捍冦之切務然而凡人之慮皆能及之臣竊以謂此特外憂而已雖漢唐全盛之時豈能使四夷常自竄伏而保不為盜哉若乃綱紀不立忠佞不分賞罰不明號令不信浮費靡節橫賜無常務宴安之逸游縱宫庭之奢靡受女謁之干請容近昵之僥幸此臣所謂內患也且四夷內窺中國必觀釁而後動故外憂之起必始內患臣今為陛下計莫若先治內患以去外憂內患既平外憂自息譬若木之有本末未有本固而枝葉不盛者也臣按為治之大綱曰文與武文事修而武事不備猶天之有陽而無隂地之有柔而無剛人之有仁而無義也是以自古帝王雖以文德為治而所以濟其文而使之久安長治者未嘗不資于武事焉然武之為用不以用之為功而以不用為大故武之為文以止戈為義也是以國家常以武備與文教並行先事而為之備無事而為之防所以遏禍亂于將萌衛治安于長久不待乎臨事而始為之有事而後備之也不然則無及矣臣故歷考經史所載威武之事備載之而舉韓琦先治內患之說終焉昔所謂上䇿莫如自治者也琦謂自治之䇿立紀綱分忠佞明賞罰慎號令節浮費罷橫賜省逸游禁奢靡絶干請抑僥幸能行此數者則內無患矣內既無忠則威武之本立矣雖有外患庸何憂哉已上總論威武之道下大學衍義補卷一百十六
