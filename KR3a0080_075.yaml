body:
  text: 大學衍義補卷七十五明丘濬撰治國平天下之要崇教化本經術以為教上之下孔子曰吾志在春秋臣按此言見於唐玄宗所製孝經序其言本何休公羊傳序序之言則出於緯經孝經鉤命決也孟子曰世衰道微邪説暴行有作臣弒其君者有之子弒其父者有之孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎胡安國曰仲尼作春秋以寓王法惇典庸禮命德討罪其大要皆天子之事也知孔子者謂此書之作遏人欲於橫流存天理於既滅為後世慮至深逺也罪孔子者以謂無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不得肆則戚矣金履祥曰春秋起隱公元年己未之嵗止哀公十四年庚申凡二百四十二年又曰魯舊自有春秋東遷之後書法失周公制作典禮之意善惡是非不明雖弒逆之變亦多不書其實使為臣者不知此義陷於弒逆之罪而不覺為人君者不知此義前後有讒賊而不見故孔子因魯史之舊而修之使是非褒貶昭然可見因此而鑒戒明亂臣賊子懼致治之法可垂萬世故謂之作臣按孔子曰吾志在春秋是則春秋一書誠聖人志向之所在也聖人之志在於尊王然有其德而無其位雖欲尊王將何以行其志哉於是假魯史作春秋以伸吾之志是以一書之中十二公二百四十二年凡所書者無非寓吾尊王之志而後之訓釋者不知聖人之志之所在因一事而為一説非聖人志矣惟孟子受學孔子之孫獨得聖人之志於書法之中而為之言曰春秋天子之事也即此一言解此一書聖人之志昭然明白於天下後世矣諸儒紛紛之説可一洗之又曰昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼張栻曰成春秋而亂臣賊子懼者亂臣賊子之情偽畢見而討絶之法著焉施於萬世皆無所遁其迹故也臣按亂臣賊子之所以懼者以其所行所為悖天子之典禮犯天子之刑憲也孟子曰王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣朱熹曰王者之迹熄謂平王東遷而政教號令不及於天下也詩亡謂黍離降為國風而雅亡也春秋魯史記之名孔子因而筆削之始於魯隱公之元年實平王之四十九年也乘義未詳趙氏以為興於田賦乘馬之事或曰取記載當時行事而名之也檮杌惡獸名古者因以為凶人之號取記惡垂戒之義也春秋者記事者必表年以首事年有四時故錯舉以為所記之名也古者列國皆有史官掌記時事此三者皆其所記册書之名也春秋之時五伯迭興而桓文為盛史史官也竊取者謙辭也公羊傳作其辭則丘有罪焉爾意亦如此蓋言斷之在己所謂筆則筆削則削遊夏不能贊一辭者也尹焞曰言孔子作春秋亦以史之文載當時之事也而其義則定天下之邪正為百王之大法臣按詩以言志春秋以紀事理雖同而體製則異也孟子曰王者之迹熄而詩亡詩亡然後春秋作春秋豈繼詩之具哉而孟子以是為言而解者曰詩亡謂黍離降為國風而雅亡也夫雅者王者燕享會朝之詩春秋所紀者豈其倫哉然謂王者迹熄而詩亡謂之迹則似有所指之處非泛言也臣竊意以為先王盛時諸矦嵗朝于天子考禮正刑以一其德天子於是考之正之而加賞罰焉諸侯既朝之後天子五年一巡守又命太師陳詩以觀民風其君德之善否其國政之得失其民風之美惡見於民俗歌謡之間者皆得以上聞或刺或美天子因之而施黜陟刑賞之典焉至于周衰諸矦不復朝覲天子不復巡守太師不復采詩而民間之美刺不復上聞天子之賞刑不復施於列國矣所謂詩亡也孔子乃假魯史以作春秋因諸侯之行事加以筆削之公而寓天子刑賞之意焉蓋詩列十有一國之風春秋亦紀二十有三國之事詩有美刺春秋有褒貶此春秋之作所以繼於詩亡之後也歟或曰平王四十九年春秋始作然柏舟碩人等詩皆平王以後之作焉得謂之詩亡曰是時詩雖作於民間而不采之以聞於天子有亦如無雖謂之亡可也孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也朱熹曰春秋每書諸矦戰伐之事必加譏貶以著其擅興之罪無有以為合於義而許之者但就中彼善於此則有之如召陵之師之類是也征所以正人也諸矦有罪則天子討而正之此春秋所以無義戰也臣按春秋天子之事也諸侯有罪天子正之義也天子不自征命諸侯征之亦義也以諸侯伐諸侯而不稟命於天子則非義矣此春秋所以作也左氏傳成公十四年君子曰春秋之稱微辭微而顯義顯志記也而晦謂約言以記事事敘而文微婉曲也而成章篇也盡而不汙謂盡其事實無所汙曲懲惡而勸善非聖人誰能修之榖梁傳曰成天下之事業定天下之邪正莫善於春秋莊周曰春秋經世先王之志也議而不辨司馬遷曰余聞之董生周道廢孔子知時之不用道之不行也是非二百四十二年之中以為天下儀表貶諸候討大夫以逹王事而已矣子曰我欲載之空言不如見之於行事之深切著明也春秋上明三王之道下辨人事之經紀别嫌疑明是非定猶與去聲善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之聚散皆在春秋春秋之中弒君三十六亡國五十二諸矦奔走不得保社稷者不可勝數察其所以皆失其本已故易曰差以毫釐謬以千里故臣弒君子弒父非一朝一夕之故其漸久矣有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷篡逆誅死之罪其實皆以善為之而不知其義被之空言不敢辭夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四者天下之大過也以天下大過豫之受而不敢辭故春秋者禮義之大宗也蘇軾曰孔子因魯史記為春秋一斷於禮凡春秋之所褒者禮之所與也其所貶者禮之所否也記曰禮者所以别嫌明微定猶與也而春秋一取斷焉故凡天下之邪正君子之所疑而不能決者皆至於春秋而定非定於春秋定於禮也故太史公曰春秋者禮義之大宗也臣按程頥亦曰禮一失則為夷狄再失則為禽獸聖人恐人之入夷狄也故春秋之法極謹嚴所以謹嚴者華夷之辨尤切切也王通曰春秋之於王道是輕重之權衡曲直之繩墨也舍則無所折衷矣又曰春秋其以天道終乎故止於獲麟韓愈曰春秋謹嚴又曰孔子之作春秋諸矦用夷禮則夷之進於中國則中國之程頥曰春秋之法極謹嚴中國而用夷禮則夷之韓子之言深得其旨周惇頥曰春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死者於前所以懼生者於後也宜乎萬世無窮王祀夫子報德報功之無盡焉程頥曰五經載道之文春秋聖人之用五經之有春秋猶法律之有斷例也律令惟言其法斷例始見法之用又曰五經如藥方春秋如用藥治病聖人之用全在此書春秋一句即一事是非便見於此乃窮理之要又曰春秋傳為案經為斷又曰以傳考經之事迹以經别傳之真偽又曰自伏羲堯舜歷夏商以至于周或文或質因襲損益其變既極其法既詳於是孔子參酌其宜以為百王法度之中制此其所以春秋作也頤作春秋傳序曰夫子作春秋為百王不易之大法後世以史視春秋謂褒善貶惡而已至於經世之大法則不知也春秋大義數十炳如日星乃易見也惟其微辭奧義時措從宜者為難知耳或抑或縱或豫或奪或進或退或微或顯而得乎義理之安文質之中寬猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物而後識化工之神聚衆材而後知作室之用於一事一義而欲窺聖人之用非上智不能也故學春秋者必優遊涵泳默識心通然後能造其微也臣按程頥謂學春秋者必優遊涵泳默識心通然後能造其微杜預序左傳亦曰優而柔之使自休之饜而飫之使自趣之若江海之浸膏澤之潤渙然冰釋怡然理順然後為得二子之言前後相契是誠讀書之法非但春秋也然春秋聖人所親筆者其用意尤深必如此玩味之然後有所得而造其微也張載曰春秋之書在古無有乃仲尼所自作惟孟子為能知之非理明義精殆未可學先儒未及此而治之故其説多鑿臣按公羊榖梁左丘明雖及見孔子而不能盡知孔子所以作經之大意惟孟子以亞聖大賢之資從學孔子之孫得其家傳而知其大指所在張載謂惟孟子為能知之觀其所謂春秋天子之事一言可見其所知非諸儒所及諸儒千言萬語皆不出乎此也邵雍曰春秋皆因事而褒貶非有意於其間故曰春秋盡性之書也又曰春秋為君弱臣強而作故謂之名分之書又曰聖人之經渾然無迹如天道焉春秋録其事而善惡形於其中矣又曰春秋孔子之刑書也功過不相掩五伯者功之首罪之魁也先定五伯之功過而學春秋則大意立矣又曰五伯功過不相掩聖人先褒其功後貶其罪故罪人有功亦必録之楊時曰春秋正是聖人處置事處他經言其理此經言其用理既明則其用不難知也胡宏曰天理人欲莫明辨於春秋聖人教人消人欲復天理莫深於春秋李侗曰春秋一事各是發明一例如觀山水徙步而形勢不同不可拘以一法胡安國曰春秋為誅亂臣賊子而作其法尤嚴於亂賊之黨又曰通於春秋然後能權天下之事又曰春秋之文有事同則詞同者後人因謂之例然有事同而詞異則其例變矣是故正例非聖人莫能立變例非聖人莫能裁正例天地之常經變例古今之通誼惟窮理精義於例中見法法外通例者斯得之矣安國春秋傳序曰古者列國各有史官掌記時事春秋魯史爾仲尼就加筆削乃史外傳心之要典也而孟氏發明宗旨目為天子之事者周道衰微乾綱解紐亂臣賊子接迹當世人欲肆而天理滅矣仲尼天理之所在不以為己任而誰可五典弗惇己所當敘五禮弗庸己所當秩五服弗章己所當命五刑弗用己所當討故曰文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何聖人以天自處斯文之興喪在己而由人乎哉故曰我欲載之空言不如見諸行事之深切著明也空言獨能載其理行事然後見其用是故假魯史以寓王法撥亂世仄之正又曰春秋見諸行事非空言比也公好惡則發乎詩之情酌古今則貫乎書之事興常典則體乎禮之經本忠恕則導乎樂之和著權制則盡乎易之變百王之法度萬世之凖繩皆在此書朱熹曰春秋以形而下者説上那形而上者去又曰春秋皆亂世之事聖人一切裁之以天理又曰周衰王者之賞罰不行於天下諸矦強陵弱衆暴寡是非善惡由是不明人欲肆而天理滅矣夫子因魯史而修春秋是是而非非善善而惡惡誅姦諛於既死發潛德之幽光是故春秋成而亂臣賊子懼又曰春秋大指其可見者誅亂臣討賊子內中國外夷狄貴王賤伯而已未必字字有義也又曰聖人作春秋不過直書其事善惡自見又曰正其誼不謀其利明其道不計其功春秋之大指也又曰春秋本明道正誼之書後人止較齊晉伯業優劣反成謀利大義晦矣又曰左氏曾見國史考事頗精只是不知大義專去小處理會往往不曾講學公穀考事甚疏然義理却精二人乃經生傳得許多説話往往都不曾見國史張栻曰春秋即事而明天理窮理之要也觀其書取其大義數十斷為定論而詳味其抑揚豫奪輕重之宜則有以權萬變矣吳澄曰子朱子云析之有以極其精而不亂然後合之有以盡其大而無餘讀春秋者其亦可以是求之矣臣按孔子刪述六經其五者皆述前代帝王之作因其已成之典籍刪而修之者也惟春秋一經乃聖人親手筆削凡其平生之心術志意皆聚於一書之中學者於五經皆當究心而於此經尤當加意焉是故天不可測矣因其運行而測其妙地不可窺矣因其生物而窺其大聖人之心不可求矣因其迹而求其心因其用而求其體春秋之經聖人之迹而所以權衡二百四十二年之事者其用也即是以求聖人而聖人全體大用於是乎在矣禮記曰經禮三百曲禮三千其致一也朱熹曰經禮三百便是儀禮中士冠禮諸侯冠禮之類此是大節有三百條如始加再加三加又如坐如尸立如齊之類皆是其中小目有三千條臣按經禮謂經常之禮如冠昏喪祭朝覲會同之類曲禮委曲之禮如行禮有進退升降俯仰揖遜之類中庸曰禮儀三百威儀三千朱熹曰禮儀經禮也威儀曲禮也漢志曰帝王質文世有損益至周曲為之防事為之制故曰經禮三百威儀三千及周之衰諸侯將踰越法度惡其害己皆滅去其籍自孔子時而不具至秦大壞漢興髙堂生傳士禮十七篇韓愈曰嘗苦儀禮難讀又其行之於今者蓋寡沿襲不同復之無由考於今誠無所用之然文王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度耶真德秀曰韓子可謂好古矣然以為於今無所用則亦考之未詳也朱熹曰禮書如儀禮尚完備於他書又曰儀禮禮之根本而禮記乃其枝葉又曰儀禮經也禮記傳也又曰儀禮是經禮記是解儀禮且如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記便有昏義以至燕射之禮莫不皆然又曰儀禮雖難讀然倫類若通則其先後彼此展轉參照足以互相發明久之自通貫也臣按朱熹子在跋其書曰儀禮之為書也於竒辭奧指中有精義妙道焉於纎悉曲折中有明辨等級焉不惟欲人之善其生且欲人之善其死不惟致嚴於冠昏朝聘鄉射而尤嚴於喪祭後世徒以其推士禮而逹之天子以為殘闕不可考之書徐而觀之一士也天子之士與諸矦之士不同上大夫與下大夫不同等而上之固有可得而推者矣楊復曰朱子既修家鄉邦國王朝禮以喪祭二禮屬門人黃氏成章十有二卷大哉書乎秦漢而下未有也近世以來儒生習誦知有禮記而不知有儀禮今因其篇目之僅存者為之分章句附傳記使條理明白而易考後之言禮者有所據依不至於棄經而任傳違本而逐末臣按古禮之傳於世也有三儀禮禮記周禮也後世欲復古禮者必自儀禮始然儀禮止有士大夫禮而無有所謂天子禮者必合彼二禮與他書有及於禮者然後成全體焉朱子自輯家鄉邦國王朝禮其餘以付其門人黃幹楊復僅以成書名曰經傳通解然世有欲復古禮者尚有考於斯書以上論儀禮文中子曰先師謂孔子以王道在是也如有用我則執此以往又曰吾視千載已上聖人在上者未有若周公焉其道則一而經制大備後之為政有持循臣按周禮一書經制大備後之為政有所持循王通之言真得其要矣自有此書以來未有能用之者假而用之者王莽也輕而用之者蘇綽也誤而用之者王安石也至於善用之者則未見其人焉通謂執此以往專欲用之竊恐時異勢殊官政事體民情土俗不能皆如古惟精擇其切要者而審行之以此為持循之則則可矣必執其書而一按其制其流極之弊安知其不與三子同歸乎唐太宗曰周禮真聖作也首篇云惟王建國辨方正位體國經野設官分職以為民極誠哉言乎不井田不封建不肉刑而欲行周公之道不可得也唐書曰周禮者周公致太平之書先聖極由衷之典法天地而行教化辨方位而敘人倫其義可以幽贊神明其文可以經緯邦國備物致用其可忽乎臣按王通人臣也執此以往固可見之空言若夫太宗人君也居可致之位有可為之勢又當開國創業之初所謂體國經野設官分職以為民極政是可以有為之時也乃亦付之浩嘆發為空言所謂説而不繹者歟程頥曰必有關雎麟趾之意然後可以行周官之法度朱熹曰程子謂有關雎麟趾之意而後可行周官之法度須是自閨門袵席之微積纍到薰蒸洋溢天下無一民一物不被其化然後可以行周官之法度不然則為王莽矣臣按若程朱二氏言則周官終無可行之時須必正身齊家以為之本則本原其意持循其制參酌其宜以立為一代之法度持守之堅積纍之久然後能薰蒸洋溢於天下使無一人一物不被其化若必待天下薰蒸洋溢然後可行周官之法度竊恐極天地混沌終無可行之期矣頥又曰周禮一書周公致治之大法在其中須知道者觀之可決是非也張載曰周禮是的當之書然其間必有未世增入者如盟詛之類必非周公之意臣按朱熹言周公當時立下此法却不曾行得盡方是箇草本而孫處亦言周公之為周禮亦猶唐之顯慶開元禮也唐人預為之以待他日之用其實未嘗行也惟其未經行故僅述大略俟其臨事而損益之噫臨事損益之一言非但周公作書之本意乃後人用周禮之活法也以周官制度為持循之本而又因時隨事以損益之孰謂周官不可行於後世哉楊時曰周官之書先王經世之務也不可不講朱熹曰周禮乃周家盛時聖賢制作之書又曰周禮一書周公立下許多條貫皆是從廣大心中流出又曰周官編布精密乃周公運用天理爛熟之書熹又曰比閭族黨之法正周公建太平之基本一如棊盤相似枰布定後棊子方有放處此書大綱是要人主正心修身齊家治國平天下使天下之民無不被其澤又推而至於鳥獸草木無一不得其所而已不如是不足以謂之裁成輔相參贊天地熹又言于其君曰竊見周禮天官冡宰一篇乃周公輔導成王垂法後世用意最深切處欲知三代人主正心誠意之學於此考之可見其實臣按朱熹又謂五峰胡氏以周禮為非周公致太平之書謂如天官冢宰却管甚宮閫之事其意只是見後世宰相請託宮閫交結近習以為不可殊不知此正人君治國平天下之本蓋宮中府中宜為一體凡夫人君之供奉用度一一皆關白外朝之大臣則人君固有所憚而不肯為非禮而左右嬖幸之臣亦有所畏忌而不敢以非禮導其上也所以格人君非心之萌而致於無過之地莫切於此謂此為三代人君正心誠意之學豈不信然范祖禹曰天地有四時百官有六職天下萬世備盡於此如網之在綱裘之挈領雖百世不可易也人君如欲稽古以正名茍舍周官未見其可臣按自有周官以來六典之設惟見於我朝前代雖設六部而宰相之官則未嘗廢也呂祖謙曰先王之教天下未始有精粗本末之間也夫朝不混市野不踰國人不侵官后不敢以姦王之權諸矦不敢以僣天子之制公卿大夫不牟商賈之利六卿九牧相屬而聽命於三公彼皆民上也而尺寸法度不敢踰一毫分守不敢易所以習民於尊卑等差階級之中消其逼上無等之心而寓其道德之意是以民服事其上而下無覬覦賤不亢貴卑不踰尊舉一世之人皆安於法度分守之內志慮不易視聽純一易直淳龎而從上之令父詔其子兄授其弟長率其屬何往而非五禮五樂三物十二教哉方位國野設官分職何往而非以為民極哉嘗讀晉之國語每嘆絳之富商韋藩木楗過朝之事以為富商之饒於財使之澤其車而華其服非不足也而必易車服於過朝之際不敢與士大夫混然無别焉民志之定而中道之存成王周公之遺化固隱然在此也臣按周禮一書或以為周公作或以為非或謂文王治岐之制或謂成周理財之書或謂戰國隂謀之書或謂漢儒傳會之説或謂末世瀆亂不經之書或作七論七難以排之朱熹曰後人皆以周禮非聖人書其間細碎處雖可疑其大體直是非聖人做不得又曰謂是周公親筆做成固不可然大綱却是周公意思由是觀之其是與非昭然明白矣夫自三皇五帝以來順風氣之宜因時勢之常制為法度以為民立極一代有一代之制蓋至周公思兼前王監視往代集百聖之大成立一代之定制密察而詳悉曲而當盡而不迂有以通天下之理成天下之務周天下之變此周公作書之旨也然而其制度多與他書所載者有不盡合焉者何也古人有言周禮一書有闕文軍司馬之類有省文遂人匠人之類有互見九等品舉之類有兼官公孤不備數教官無府史胥徒有豫設凡千里封公四封侯八伯十一之類有不常置夏采方相氏之類有舉其大綱者四兩為卒之類有副相副二者自卿至下士各隨才髙下同治此事有常行者垂法象魏之類有不常行者合民詢遷之類國今觀諸經其措置規模不徒於弼亮天地和洽神人而盟詛讐伐凡所以待衰世者無不備也不徒以檢柅君身防絶禍患而米鹽絲枲凡所以任賤役者無不及也使之維持一世則一世之人安維持百世則百世之人安維持千萬世則千萬世之人安詒謀燕翼後世豈無僻王皆賴前哲以免則周公之用心也所謂兼三王監二代盡在於是是書之作於周公與他經不類禮記就於漢儒則王制所説朝聘為文襄時事月令所説官名為戰國間事曾未若周禮之純乎周典也由此言觀之則凡後儒疑周禮細碎者可以灑然矣若夫後世用之而往往取敗者豈是書之過哉不善用之者過也觀夫成周享國八百年之久其末也周之地不大於邾莒一介辨髦蕞然擁虛器而立於強諸侯之上環而顧之皆莫敢萌非分之心獨何所畏哉周公之制有以維持之也此用周禮之明效也彼新莽荆舒假此以濟其私烏可因咽而廢食吳澄曰按周公相成王建六官分六職禮樂政事粲然大備即其設位言之則曰周官即其制作言之則曰周禮周衰諸侯惡其害己滅去其籍秦孝公用商鞅政與周官背馳始皇又惡而焚之漢河間獻王好古學購得周官五篇武帝求遺書上之藏于祕府哀帝時劉歆校理祕書始著于録略然冬官久亡以考工記補之考工記乃前世能識古制者所作先儒皆以為非惟歆獨識之而五官亦復錯雜傳至於今莫敢是正今本尚書以考之周官一篇成王董正治官之全書也執此以考周禮之六官則不全者可坐而判也夫冡宰掌邦治統百官均四海執此以考天官之文則其所載非統百官均四海之事可以知其非冡宰之職也司徒掌邦教敷五典擾兆民執此以考地官之文則其所載非敷五典擾兆民之事可以知其非司徒之事也宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國執此以考春夏二官則凡掌邦禮邦政者皆其職也舍此則非其職司冦掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利執此以考秋冬二官則凡掌邦禁邦土者皆其職也舍此則非其職是故天官之文有雜在他官者如內史司士之類亦有他官之文雜在天官者如甸師世婦之類地官之文有雜在他官者如大司樂諸子之類亦有他官之文雜在地官者如閭師柞氏之類春官之文有雜在他官者如封人大小行人之類亦有他官之文雜在春官者如御史大小胥之類夏官之文有雜在他官者如䘖枚氏司𨽻之類亦有他官之文雜在夏官者如職方氏辨師之類至如掌祭之類吾知其非秋官之文縣師廛人之類吾知其為冬官之文緣文尋意以考之參諸經籍以證之何疑之有臣按自周禮出於漢六官而亡其一世儒以考工記補冬官亡未始有異議者宋淳熙中俞庭椿始著復古編謂司空之篇實雜出於五官之屬且因司空之復而六官之訛誤亦遂可以類考嘉熙間王次點復作周官補遺元泰定中丘葵又參訂二家之説以為成書吳澄作三禮考注首以是言且謂冬官未嘗亡而地官之文實亡也由是以觀則冬官本未嘗亡所亡者冬官首章所謂惟王建國至以為民極二十字及乃立冬官司空至邦國二十字及大司空之職小司空之職二條亦如虞書之舜典實未嘗亡特失其曰若稽古以下二十八字耳雖然自隋唐以來立為六部率以學校屬禮部財賦屬户部行之實亦良便後世有志復古以至太平者師周公之意而不泥其故迹可也以上周禮以上本經術以為教上之下大學衍義補卷七十五
