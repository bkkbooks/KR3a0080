body:
  text: 大學衍義補卷八明丘濬撰治國平天下之要正百官重臺諫之任周禮御史掌邦國都鄙及萬民之治令以贊冢宰春官臣按御史之名始見於此然其所職者乃邦國都鄙之治令以贊冢宰者也漢因秦制而設此官則專以司糾察之任名雖同而其制則異也通典唐杜佑作御史之名周官有之蓋掌贊書而授法令非今任也戰國時亦有御史秦趙澠池之會各命書其事又淳于髠謂齊王曰御史在前則皆記事之職也至秦漢為糾察之任所居之署漢謂之御史府亦謂之御史大夫寺亦謂之憲臺此御史稱臺之始後漢以來謂之御史臺亦謂之蘭臺寺隋及唐皆曰御史臺龍朔二年改為憲臺咸亨元年復舊門北闢主隂殺也故御史為風霜之任彈糾不法百僚震恐官之雄峻莫之比焉臣按御史臺即今都察院是也前代有中書省而御史臺之職專掌糾察不得與之並列我朝罷中書省而以政權分屬六部而都察院之設品級與六部同其權視前代尤重云唐制御史大夫一人中丞二人其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉大事奏裁小事專達凡有彈劾御史以白大夫臣按御史大夫即今左右都御史之職中丞即今左右副僉都御史之職唐有三院今併其三於察院祖宗設都御史六員職專糾劾百司辨明寃枉提督各道凡事之不公不法者皆在所理其屬有十三道各設監察御史曰浙江曰江西曰福建曰湖廣曰山東曰河南曰山西曰陜西曰廣東曰廣西曰四川曰雲南曰貴州分掌其各布政司事其京衛并直𨽻府衛則分𨽻焉御史之職在糾劾百司照刷文卷問擬刑名巡按郡縣是則朝廷耳目之任所以振肅紀綱而防邪革弊者也六部之職各有攸司而都察院惟所見聞不繫職司皆得以糾察焉御史大夫李承嘉嘗召諸御史責曰近日御史言事不咨大夫禮乎御史蕭至忠曰御史人君耳目比肩事主得自彈事不相關白若先白大夫而許彈事如彈大夫不知白誰也臣按今六部官屬皆書其部如吏部屬則曰吏部文選清吏司兵部屬則曰兵部武選清吏司之類是也惟都察院則書其道而不繫於都察院焉是亦唐人之意也武后以法制羣下許諌官御史得以風聞言事胡寅曰武后使諌官御史以風聞言事其興姦慝來讒譛害忠良傷公道之符契乎朝廷者衆正之原是非所仰以決譛訴所望以明毁譽所賴以公人心服與不服一在是焉彼風聞者得於道聽塗説或兩怒溢惡豈皆真實遽然按之以施刑罰其差失多矣既以風聞多不審諦被言者又泯默被罪不得申理而寃結無告傷平明之政亦甚矣臣按後世臺諌風聞言事始此前此未有也有之始自武氏宋人因按以為故事而説者遂以此為委任臺諌之專嗟乎此豈治朝盛德之事哉夫泛論事情風聞可也若乃訐人隂私不究其實而輒加以惡聲是豈忠厚誠實之道哉夫有是實而後可加以是名有是罪而後可施以是刑茍不察其有無虛實一聞人言即形之奏牘置于憲典嗚呼莫須有何以服天下哉我祖宗著為憲綱許御史糾劾百司不公不法事須要明著年月指陳實迹不許虛文泛言搜求細事蓋恐言事者假此以報復私讐中傷善類汙衊正人深合聖人至誠治天下之旨睿宗時侍御史楊孚彈糾不避權貴權貴毁之上曰鷹摶狡兔須急救之不爾必反為所噬御史懲姦慝亦然茍非人主保衛之則亦為姦慝所噬矣臣按睿宗此言可以為世主任用風憲之法肅宗在靈武時武臣崛興無法度大將管崇嗣背闕坐笑語喧縱監察御史李勉劾其不恭帝歎曰吾有李勉朝廷始尊穆宗時夏州節度使李祐拜大金吾違詔進馬侍御史溫造劾之祐曰吾夜入蔡州擒吳元濟未嘗心動今日膽落於溫御史矣臣按御史之設所以為朝廷非為其人也既授之以是職必假之以是權彼持其權以舉厥職則人知所嚴憚而不敢為惡其為朝廷之益大矣唐人有言御史為天子之耳目宸居之堂陛未有耳目聰明堂陛峻正而天子不尊者也天子尊未有姦臣賊子而不滅也姦臣賊子滅矣可以自朝廷至於海隅蕩蕩然何所不理哉觀於此言則知古人設官之意宋制御史入臺滿十旬無章疏者有辱臺之罰臣按宋朝切責御史以舉其職其嚴如此蓋惟恐其不言也上之所以責之於其下者必欲其言如此居是職者雖欲緘默不言不可得矣石介曰君有佚豫失德悖亂亡道荒政咈諌廢忠慢賢御史府得以諌責之相有依違順旨蔽上罔下貪寵忘諌專福作威御史府得以糾繩之將有凶悍不順恃武肆害玩兵棄戰暴刑毒民御史府得以彈劾之君至尊也相與將至貴也且得諌責糾劾之餘可知也曾肇曰御史責人者也將相大臣非其人百官有司失其職天下之有敗法亂紀服讒搜慝者御史皆得以責之然則御史獨無責乎居其位有所不知知之有所不言言之有所不行行之而君子病焉小人幸焉御史之責也臣按宋二臣之言可見御史責任之重且難如此為御史者必如二臣所言然後為能舉其職不然則於是職有愧矣由是觀之則凡其在任之日所以形於言論見之章疏者乃其職分之所當為非好為是以求名也以上臺官周禮保氏掌諌王惡地官臣按官以保為名而職以諌惡為事蓋欲其陳王之過失以保佑王之躬輔之翼之以歸諸道也自周人有是官漢人因之以設諌諍之員其名雖異而制則同也秦始置諌議大夫掌論議無常員漢武帝更置諫大夫光武又以為諌議大夫唐承隋制復置隨宰相入閣宋置諌院唐置左右補闕左右拾遺宋改左右補闕為左右司諌左右拾遺為左右正言臣按諌議大夫補闕拾遺司諌正言皆前代之諌官也我朝革去前代中書省并其所謂諌官者不復置焉惟設六科給事中以掌封駁之政而兼以言責付之秦始置給事中漢因之唐定為四員宋制凡制敇有所不便凖故事封駁臣按給事中自秦以來為加官至宋元豐中始有定職其職專以封駁而已我朝始分為六科科設都給事中左右給事中給事中隨其科事繁簡而設員凡章奏出入咸必經由有所違失抵牾更易紊亂皆得封駁不特此也凡朝政之得失百官之賢佞皆許聨署以聞蓋實兼前代諌議補闕拾遺之職也祖宗設官不以諌諍名官欲人人皆得以盡其言也而又專寓其責於科道吁四海無不可言之人百官無非當言之職又於泛然散處之中而寓隱然專責之意祖宗設官之意深矣求言之意切矣唐太宗貞觀元年制曰自今中書門下及三品以上入閣議事皆命諌官隨之有失輒奏臣按宋王安石言唐太宗之時所謂諌官者與丞相俱進於前故一言之謬一事之失可救之將然不使其命已布於天下然後從而爭之也君不失其所以為君臣不失其所以為臣其亦庶乎其近古也今也上之所欲為丞弼所以言於上皆不得而知也及其命之己出然後從而爭之上聽之而改則是士制命而君聽也不聽之而逐則是臣不得其言而君恥過也臣竊以謂唐宋之制與今不同前代宰相行事諌官無由得知今則六部之事無一不經於六科則雖不必隨大臣入閣議事當其章疏初入之時制敕始出之際則固可以先事而諌矣憲宗謂李綘曰比諌官多朋黨論奏不實皆陷謗訕欲出其尤者若何綘曰此非陛下意必憸人以此熒誤上心自古納諌者昌拒諌者亡夫人臣進言於上豈易哉君尊如天臣卑如地如有雷霆之威彼晝度夜思始欲陳十事俄而去五六及將以聞則又憚而削其半故上達者財十二耳何哉干不測之禍顧身不利耳雖開納奬勵尚恐不至今乃欲譴訶之使直士杜口非社稷利也帝曰非卿言我不知諌之益臣按李絳此言非但以破憸人之謀亦使其君知諌臣之難也如此憲宗聞其言即知諌之為益此其所以為唐令主後世稱治者必宗之歟宋歐陽修曰諌官者天下之得失一時之公議繫焉諌官雖卑與宰相等天子曰是諌官曰非天子曰必行諌官曰必不可行立殿陛之間與天子爭是非者諌官也司馬光曰古者諌無官自公卿大夫至於工商無不得諌者漢興以來始置官以天下之政四海之衆得失利病萃於一官使言之其為任亦重矣臣按今世諌官雖無定職然祖宗設立六科實以言責付之凡內而百司外而藩郡應有封章無有不經由者矧列署內廷侍班殿陛日近清光咫尺天顔上無所於屬下有所分理歐陽修所謂爭是非於殿陛之間今雖無此比至於司馬光所謂天下之政四海之衆得失利病萃於一官則今猶古也然則是職也亦豈易得其人哉必如光所謂擇言事官當以三事為先第一不愛富貴次則重惜名節次則曉知治體必得如是之人以居諌官則上而君德必有所助下而朝政必無所缺矣以上諌官蔡襄告其君仁宗曰任諌非難聽諌為難聽諌非難用諌為難陛下深憂政教未孚賞罰未明羣臣之邪正未分四方之利害未究故增耳目之官以廣言路羣邪惡之必有禦之之説不過曰某人也好名也好進也彰君過也或進此説正是邪人欲蔽天聰不可不察焉臣按自古小人欲蔽人主之聰明恐其耳目之官攻己過發己私不得久安其位者必假此三説以誑惑其君其君不明或信其説以至於屏棄正言疏遠正人以馴致於危亡之地者多矣聽言者盍反思曰彼之言當歟否歟己之過有歟無歟彼之言果當用之而有益於國則其得敢言之名進顯要之位乃所固有者也豈謂好哉己之過果有焉因之而不陷於惡則彼有進忠之益而我有從諌之美乃所謂善補過也豈謂彰哉以是而反求於心則知其言真有益於己雖無益焉亦未必有損也為人上者惟恐其臣之不好名不好進吾不得以聞其過而改之耳尚何咎之有哉蘇軾言於其君神宗曰宋朝自建隆以來未嘗罪一言者縱有薄責旋即超升許以風聞而無官長言及乘輿則天子改容事關廊廟則宰相待罪故仁宗之世議者譏宰相但奉行臺諌風旨而已聖人深意流俗豈知擢用臺諌固未必皆賢所言亦未必皆是然須養其鋭氣而借之重權者豈徒然哉將以折姦臣之萌而救內重之弊也夫姦臣之始以臺諌折之而有餘及其既成以干戈取之而不足今法令嚴密朝廷清明所謂姦臣萬無此理然而養貓以去鼠不以無鼠而養不捕之貓蓄狗以防盜不以無盜而蓄不吠之狗陛下得不上念祖宗設此官之意下為子孫萬世之防朝廷紀綱孰大於此紀綱一廢何事不生孔子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之茍患失之無所不至矣臣始讀此書疑其太過以為鄙夫之患失不過傋位以茍容及觀李斯憂蒙恬之奪其權則立二世以亡秦盧杞憂懷光之數其惡則誤德宗以再亂其心本生於患失其禍乃至於喪邦孔子之言良不為過是以知為國者平居必有亡軀犯顔之士則臨難庶幾有徇義守死之臣若平居尚不能一言則臨難何以責其死節人臣茍皆如此言無不同意無不合更唱迭和何者非賢萬一有小人居其間則人主何緣知覺天下豈不殆哉臣所謂存紀綱者此之謂也臣按蘇軾此言以為朝廷之紀綱專在於臺諌蓋有見之言也有志立紀綱以正朝廷安天下者尚念之哉吕祖謙曰天子以一身之微處法宫之邃百僚之邪正吾躬之得失皆奚自而察之於是設為耳目之官以司風憲之任故一人不必用其聰恃其明舉天下之事無不聞而見之漢宣之時蕭望之遷諌議出補郡守則亦民之師帥非不美也望之上疏且以出諌官以補郡守所謂憂其末而忘其本蓋朝無諍臣則不知過以是知臺諌之選不容少緩臣按臺諌之任非素稟剛正者未易居也然人臣之稟性剛正者恆少間有一二或訥於言辭或短於章疏求其稱是任者蓋甚難也幸而得其人又使不得久居其位而遷之於外此望之所以有憂末忘本之論也雖然為官擇人遷而用之固猶可也不幸而有姦邪小人處乎當道惡其剛正不隱或至發己之隂私假遷除以去之亦或有矣有志於求諌者不可不知以上總論臺諌以上論重臺諌之任大學衍義補卷八
