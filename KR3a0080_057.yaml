body:
  text: 大學衍義補卷五十七明丘濬撰治國平天下之要秩祭祀郊祀天地之禮下詩序昊天有成命郊祀天地也昊天有成命二后受之成王不敢康夙夜基命宥宏深也密靜密也於緝繼續也熙光明也單厥心肆其靖安也之朱熹曰二后文武也成王名誦武王之子也基積纍於下以承藉乎上者也臣按周頌此章序云郊祀天地蘇軾北郊之議援此序以為證朱熹以國語證之謂其為康王以後祀成王之詩無疑且歐陽氏時世論謂此二后者文武也成王者成王也當為康王以後之詩臣考郊廟之詩曰頌者皆一時公卿大夫與太史氏為之於郊祀明堂常祭宗廟時歌之而各有所主如烈文主太王清廟主文王執競主武王之類思文之詩則郊祀后稷以配天也我將之詩則宗祀文王以配上帝也周人之頌至於諸侯助祭巡守朝㑹祭告戒農官賽田事莫不有樂歌而獨於天地闕焉且郊祀后稷以配天宗祀文王以配上帝所以配祭者尚有其詩顧於正祭之天帝獨無美盛德之形容可乎臣竊以為昊天有成命之詩序云郊祀天地未必無所據也但解者以成王為成此王業則未必然爾詩之意蓋謂昊天上帝有此成定之命文王武王實受之成王繼之不敢康寧夙夜積德以承藉文武所受於天之成命者既以深宏而靜密矣於是歎美而言謂承天命以主天祀者宜繼續文武光明之德竭誠致敬單盡其心亦如成王之不敢康寧庶幾安靖天下而保祖宗所受昊天之成命於無窮矣於者歎辭作頌者首言天命繼言三后之德於此又歎美而發其端欲其後人主是祀者不敢廢墜天命以常大報天之意意者此詩實是郊祀之頌成王之世蓋已有之而未及成王康王嗣統新作此頌因祖以及考不然則是康王就舊頌中益以成王不敢康之一語於二后受之之下亦不可知也或曰朱子謂此詩只說昊天不說地設使合祭亦須說及后土考之經典惟祭天之名謂之郊而祭地無其名如虞書之類于上帝周禮之禋祀昊天上帝皆未嘗及后土豈但此詩哉思文后稷克配彼天立我蒸民莫匪爾極朱熹曰此言后稷之德真可配天蓋使我蒸民得以粒食者莫匪其德之至也臣按此郊祀以后稷配天而所奏之樂歌也配祭者既有樂歌而正祭者豈獨無哉若以為有所遺亡則禮莫大於郊祀不應於其最大者獨失之臣不揆愚陋輒取詩序之舊說載昊天有成命詩以補之二詩乃成周祀天之樂歌以上祀天樂章周禮司服王祀昊天上帝則服大裘而冕祀五帝亦如之楊復曰天帝一也以一字言則祀天享帝之類以二字言則格于皇天殷薦上帝之類以四字言則惟皇上帝昊天上帝皇天上帝之類以氣之所主言則隨時隨方而立名如青帝赤帝黃帝白帝黑帝之類其實則一天也至鄭𤣥前並無六天之說𤣥後出乃分為六天又皆以星象名之謂昊天上帝北辰也謂五帝者太微宫五帝座星也又附以緯書如北辰曰曜魄寶之類繆妄不經莫此為甚王肅引經𫝊以排𤣥失併圜丘於郊似矣然又謂五帝非天而用家語之文謂太皥炎帝黃帝五人帝之屬為五帝則非也果以五人帝為五帝則五人帝之前其無司四時者乎鄭則失矣王亦未為得也夫祀天祀五帝皆聖人制禮之條目非如鄭氏分天以為六也天猶性也帝猶心也五帝猶仁義禮智信之心隨感而應者也馬端臨曰舜攝位之初類于上帝禋于六宗望于山川遍于羣神湯伐夏之初用𤣥牡告于上天神后武王伐殷之初告于皇天后土所過名山大川所祀者天與六宗地與山川而已初無祀五帝之文周頌三十有一篇曰郊曰明堂曰柴望曰祈榖曰報祭曰類禡所以告神明之事備矣亦無祀五帝之樂章而祀五帝之說始於周禮先儒各以其意為之訓詁以為五天帝者曰靈威仰赤熛怒白招拒叶光紀含樞紐也以為五人帝者曰太皥炎帝黃帝少皥顓頊也姑以五天帝言之則此五帝者皆天神之貴主五方之事者意其在祀典當與日月六宗並而亞於祀天者也臣按先儒謂以形體而言謂之天以主宰而言謂之帝天與帝一也周禮言祀昊天上帝而後又言祀五帝亦如之所謂昊天上帝者兼天與帝言之蓋以主宰乎天者其神之大者在此也所謂五帝者言帝而不言天蓋隨時隨方而立名其神各主宰乎一方之氣也漢儒不明此義附㑹而為六天之說既有昊天上帝又有天皇大帝又有太一感生帝之類皆非正禮也蓋天無二日民無二王固無二帝之理况六五哉本朝惟於大祀殿祀昊天上帝凡所謂天皇太一五天帝之類一切革去三代以下祀典之正所僅見也惟道家者流承襲前代之舊因仍未革其所奉祀者乃列昊天上帝於其所謂三清之下又塑上帝像與天皇紫微並列至其所為上帝稱號又於昊天之下加以金闕於上帝之上加以玉皇夫金玉之為物滯於形乃世俗之所貴者而非大道之所寓也顧以世俗之所尚者以為上帝之尊稱其䙝瀆甚矣且老聃生於周末死有墓及子孫乃人鬼也而隮之天神之上且不可况上帝乎唐𤣥宗宋徽宗本欲尊天而不知其䙝天也其後流離困厄禍及生民安知非天之所譴耶明聖之主尚其正之不可諉為異教之徒自相崇奉非祀典之所繫也以上論六天五帝詩序我將祀文王於明堂也孝經子曰孝莫大於嚴父尊敬其父嚴父莫大於配天則周公其人也言以父祀天之禮始於周公昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝朱熹曰萬物本乎天人本乎祖故以所出之祖配天地周之后稷生於姜嫄更推不去文武之功起於后稷故配天須以后稷嚴父莫大於配天宗祀文王於明堂以配上帝上帝即天也聚天之神而言之則謂之上帝或問朱熹帝即天天即帝分祭何也曰為壇而祭故謂之天祭於屋下故謂之帝臣按古者聖人之於天尊而逺之故祀於郊而配以祖親而近之故祀於明堂而配以父蓋一歲之間而有二祭既於嵗首一陽初生之月祭天於泰壇而以祖之有功者配祀又於季秋萬寶告成之後祀帝於明堂而以宗之有德者配食郊而曰天所以尊之也尊之則祀之推以其誠故壇而不屋以其形體稱之曰天配天以祖亦所以尊祖也明堂而曰帝所以親之也親之則祀之必備其禮故屋而不壇以其主宰稱之曰帝配帝以父亦所以親父也先儒朱熹引陳氏說謂郊者古禮而明堂者周制也周公以義起之也我聖祖初分祀天地各為之壇其後乃合而祀之共為壇於南郊其上則屋之焉蓋泰壇明堂為一也列聖相承皆以太祖太宗並配其於孝經之義並用以同行吻合而無間是蓋以義起者歟以上論明堂漢武帝元光元年行幸雍郊見五畤後常三歲一郊程頤曰古者一年之間祭天甚多春則因民播種而祈榖夏則恐旱暵而大雩以至秋則明堂冬則圜丘皆人君為民之心也凡人子不可一日不見父母人君不可一嵗不祭天豈有三年一親郊之理臣按三代郊天配祖之禮至於秦無復存者秦襄公始作西畤祠白帝其子孫遂并青黃赤而祠之至漢髙帝又立黑帝祠然未嘗親享也文帝賢君也賈生通儒也生親承文帝宣室鬼神之問而不能引經援古以復三代之制文帝始幸雍郊見五畤又用新垣平言立渭陽五帝廟而親祠之始親祠矣而猶未有定時武帝元光初始定三歲一郊郊之名雖沿於周而其所行之禮所祀之神則用方士之說是則所謂昊天上帝曽不得如其所謂太一五帝而髙帝乃一代創業之太祖曽不得一旦配享於天可慨也夫成帝時雖定南北郊然亦不能盡復三代以來郊祀明堂嚴父配天之禮而哀平之間怵於禍福之說南北郊與甘泉五畤互為罷復卒無定制光武建武二年初制郊兆於雒陽采元始故事為圓壇八陛中為重壇天地位其上其外壇上為五帝位其外為壝重營皆紫有四通道以為門日月在中營內南道日在東月在西北斗在北道之西皆别位不在羣神列中中營四門外營四門中營神五星及中宫宿五官神五嶽之屬皆外營神二十八宿外官星雷公先農風伯雨師四海四瀆名山大川之屬臣按西漢所謂郊祀天地者乃是祀雍五畤及甘泉太一汾隂之類皆出於方士祈福之說而非古人報本反始之意髙惠不親祠文帝一再行武宣以求仙成帝以祈嗣三君者親郊頗多而其他則領之祠官修歲事而已古人所謂郊天配祖之意蓋漠如也光武置郊丘於雒陽以髙帝配祀始稍復古人祀天之制雖其采元始故事合祭天地與周禮司樂不合然而一禮之行凡所謂六宗山川羣神遍在焉蓋亦有取於有虞之類周人之旅祭也歟以上漢朝郊祀之制唐𤣥宗天寶元年二月敇凡所祠享必在躬親其皇地祗宜就南郊合祭是月十八日親享𤣥元皇帝於太清宫十九日親享太廟二十日合祭天地於南郊謂之三大禮楊復曰禮魯人將有事於上帝必先有事於頖宫注謂魯以周公故得郊於上帝先有事於頖宫告后稷也蓋郊事尊祖以配天故先告后稷以將配天之故焉自此以後散齊七日致齊三日齊戒以神明其德將以對越上帝則此古禮然也臣按有事於郊必先告祖以配天享侑之意蓋行祭告之禮非大享也自唐人有事上帝必先親享𤣥元皇帝於太清宫親享太廟然後郊祀宋人因之乃先郊三日奉諡册寶於太廟次日薦享玉清昭應宫景靈宫宿太廟既享赴青城嗚呼郊祀之禮見於經者自虞書類上帝始而尤詳載於周禮禮記此則唐虞三代報本反始之大事也未事之先詣祖廟告祭以配享之故而致齊以致其精明之德然後行事此正禮也其與道家者流本無干涉唐宋之世乃用青詞設素饌親享太清宫玉清昭應宫然後詣郊壇行禮此何謂哉彼方士之云云乃瀆亂不經之邪說也顧以之而間雜於吾聖人報本反始之禮而欲致上帝之居歆而靈貺之饗答難矣宋祖宗皆合祭天地其不合祭者唯元豐六年一郊元祐詔議北郊蘇軾主合祭從之者五人劉安世主分祭從之者四十人蘇軾曰舜之受禪自上帝六宗山川羣神莫不畢告而獨不告地祗武王克商柴上帝望山川而獨略地祗昊天有成命之詩郊祀天地終篇言天而不及地以是知祀上帝則地祗在焉胡宏曰成身莫大於禮禮莫大於祭祭祀之禮所以立吾誠也鬼神之為物非他即吾之誠是已王者繼天而為之子獨主萬化故祭天於郊祭地於社祭名山大川各於其方後世禮學失𫝊故秦禮八神以求仙人是皆不知鬼神之情狀方士家妄作儒者不取也及歷考儒者論祭天地之禮於天則有昊天上帝有五方帝有感生帝夫土不可以二王而天可以有七帝乎於地則或立方澤或立方丘或立北郊是猶家有二主也且子事父母父在為母齊衰期不敢見父者尊無二上故也王者父事天母事地而可崇地以抗天乎王者以父事天立誠而精一其德故兆於南郊掃地而祭者昊天上帝而已天言其氣帝言其性也社祭地所以神地道也名山大川者寶貨財用之所出而四方之所依據朱熹曰禮郊特牲而社稷太牢書用牲于郊牛二及社于新邑此明驗也本朝初分南北郊後復為一周禮亦只說祀昊天上帝不說祀后土故先儒言無北郊祭祀只是祭地臣按胡宏謂聖人言郊必及社郊所以祭天社所以祀地朱熹亦取其說然以臣觀之天蒼然在上合萬國而同此天地塊然在下隨所在而異其土是以天子祭天獨謂之郊諸侯以下不可得而並也蓋以萬國同在一天之下凡天所覆者皆天子有也萬國同戴乎一天以事天子之一人故惟天子獨得祭天自公侯以下有有百里之地者有有七十里五十里之地者有有十里一里之地者位有尊卑地有廣狹五土之神隨在而有莫不有其神亦莫不有其祀天子有天下之地故祀天下五土之神有一國者祀其封內之五土有一家者祀其采地之五土此祭地之名所以無尊卑廣狹一皆謂之社也然天子既有大社而又有地祗者考之禮經地祗無専祀惟大司樂有夏至方丘之說然其指壇壝而言無有一定之名如郊社然也蓋王者大一統而有定居既統祭天下之大祗而又専祀畿內之土祗也歟宋承五代之後屢因郊而肆赦優賞諸軍自后妃以下至文武官皆得䕃補親屬而又賚賜故人主常以為難行而止於三歲一郊或過期不行蘇軾曰古者天子出入儀物不繁兵衛甚簡用財有節惟以齊祭禮樂為政事嵗嵗行禮率以為常自秦漢以來天子儀物日以滋多非復如古之簡易今之所行皆非周禮三年一郊非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得䕃補親屬非周禮也自宰相以下至百官皆有賜賚非周禮也臣按有國者郊祀天地所以修嵗事也嵗事之修必歲嵗行之上以盡報本之誠下以教臣民之敬非因是以為利也自秦漢以來所行者多非禮之禮然禮雖不盡合古而心之誠則未或間也至於宋人乃因大祀之行以為惠下之利每以費用不敷恐人心觖望而作輟焉祀天之誠安在哉我聖祖斷自宸衷郊祀無歲不行凡宋人所謂肆赦䕃補賜賚一切革去顓顓焉惟用心於牲幣之潔䖍齊戒之嚴肅其儀文易行其禮物易備行之餘百年如一日也豈非萬世通行之典哉以上唐宋郊祀之制以上郊祀天地之禮下大學衍義補卷五十七
