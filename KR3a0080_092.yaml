body:
  text: 大學衍義補卷九十二明丘濬撰治國平天下之要備規制厯象之法上易賁之彖曰觀乎天文以察時變程頤曰天文謂日月星辰之錯列寒暑隂陽之代變觀其運行以察四時之遷改也臣按日月星辰象之懸於天者也寒暑隂陽氣之運於天者也日月星辰寒暑隂陽雖若有常也然亦有時而不常雖若齊一也然亦有時而不一故聖人既運其心目之力以察其隨時之變又創為厯象之器以定其變動之時革之象曰澤中有火革君子以治厯明時程頤曰水火相息為革革變也君子觀變革之象推日月星辰之遷易以治厯數明四時之序也夫變易之道事之至大理之至明迹之至著莫如四時觀四時而順變革則天地合其序矣朱熹曰四時之變革之大者又曰澤中有火水能滅火此只是隂盛陽衰火盛則克水水盛則克火此是澤中有火之象便有那四時改革的意思君子觀這象便去治厯明時歐陽修曰革之象曰澤中有火革君子以治厯明時天下之事可革者多矣而聖人必以厯言者蓋事在天下其最易差者莫如厯而不可不修者亦莫如厯臣按治厯明時為治之要務自昔聖帝明王莫不以此為先焉蓋時行於天而有自然之運厯為於人而有已然之法然天之運惟其有常也故一日之間則有晝夜一月之間則有朔望一年之間則有分至然晝不常晝晝革而為夜夜不常夜夜革而為晝以至於朔望分至莫不皆然治厯者隨其常而順其變即厯數以推之順時氣以察之則千歲之曰至可坐而致者皆可以明之矣大傳曰天垂象見吉凶聖人象之胡一桂曰象謂日月星辰循度失度臣按天之道不言而信其於人也有一氣感通之理故其於人君也恆仁愛之而有告戒之道焉然其所以告之者豈諄諄命之哉垂象以示之而已象之循度則有吉之兆象之失度則有凶之形聖人者心與天通目覩乎天所見之象心悟夫天所示之意因天之象而象之非特以之修於身敏德而遷善繇是而形之天下國家使之趨吉而避凶去惡而從善無非因天之象以神道而設教者也書乃命羲和欽若順也昊廣大之意天厯象日月星辰敬授人時朱熹曰羲氏和氏主厯象授時之官厯所以紀數之書象所以觀天之器日陽精一日而繞地一周月隂精一月而與日一會星二十八宿衆星為經金木水火土五星為緯辰以日月所會分周天之度為十二次也人時謂耕穫之候凡民事早晚之所關也臣按先儒謂事之最大最先在推測天道治厯明時萬事莫不本於此蓋為治之道在歲周於上而天道以明統正於下而人紀以立茍天道不明則時序錯亂歲月無紀官府修為失其先後之序田里耕作悖其次第之宜所以帝世之命官必先於羲和而羲和之職掌必先於厯數有厯以紀其數有象以觀其運則日月之運行星辰之次舍運於天者有常行驗於人者有常法則官政民庸無不循其序而得其理天下豈有不治者乎帝曰咨汝羲暨和期三百有六旬有六日以閏月定四時成歲朱熹曰期猶周也歲有十二月月有三十日三百六十者一歲之常數也故日與天會而多五日九百四十分日之二百三十五者為氣盈月與日會而少五日九百四十分日之五百九十二者為朔虛合氣盈朔虛而閏生焉故三歲一閏五歲再閏十有九歲七閏則氣朔分齊是為一章也臣按先儒謂歲無定日閏有定法期閏歲三字為此一節之大要期者一歲之足日也歲者一歲之省日也閏者補三歲之省日湊為三歲之足日也蓋無閏則時不定時不定則歲不成三年不閏則差一月而以正月為二月九年不閏則差三月而以春時為夏時寒暑反易歲序不成矣此治厯之法所以以定閏為先也在璿璣玉衡以齊七政專省德政故厯政修明朱熹曰在察也美珠謂之璿璣機也以璿飾機所以象天體之轉運也衡橫也謂橫簫也以玉為管橫而設之所以窺璣而齊七政之運行猶今之渾天儀也七政日月五星也七者運行於天有遲有速有順有逆猶人君之有政事也舜初攝位首察璣衡以齊七政蓋厯象授時所當先也臣按易曰觀乎天文以察時變日月星辰運行於天所謂天文也然其行也有遲有速有順有逆豈非其變乎然其變之不齊非有器以察之不可得而知也不可得而知則亦不可得而齊也是以帝世有璣衡之設焉以璿為機而用以運轉是之謂璣以玉為管而橫置其中是之謂衡運其機軸而使之轉動窺其簫管而用以測度則天文之齊不齊者可得而知矣是故曰月皆循其軌五星不失其次則吾德政之修於此可見矣日月之或有薄蝕五星之或有變動則吾德政之闕於此可見矣因在器之天而觀在天之天因在天之天而循在人之天則天人合一七政不在天而在人矣洪範四曰協用五紀四五紀一曰歲二曰月三曰日四曰星辰五曰厯數孔頴逹曰五者為天之經紀也蔡沈曰五紀曰協所以合天也歲者序四時也月者定晦朔也日者正纒度也星經星緯星也辰者日月所會十二次也厯數者占步之法所以紀歲月日星辰也唐仲友曰協用五紀所以欽天道而治人事者也人不天不成歲月日時星辰天之所為而人所不能違也天不人不因厯數人之所推而天所不能違也天與人合而五紀可得而用矣故曰協用五紀一寒一暑以為歲春夏秋冬之四時統乎歲者也一盈一虧以為月二十四氣七十二候統乎月者也一晝一夜以為日朝夕晝夜之四時統乎日者也一經一緯以為星辰寒暑之所繇推遷日月之所繇交會也合是四者而推步其數以為厯則聖人之所以治人事也蓋聖人之協用五紀有三義焉步其數以授時觀其文以察變法其序以分職三者備則協用五紀之道盡矣堯典之厯象授時之事也周官之馮相實掌之舜典之璣衡察變之事也周官之保章實掌之洪範之庶徵分職之事也周官之司會實掌之故曰聖人作則以天地為本以隂陽為端以四時為柄以日星為紀五紀之謂也乾坤之策所當卦氣之所直五紀之數該於易矣賁觀天文以察時變革以治厯明時五紀之義易備之矣夫先天而天弗違後天而奉天時惟大人能之則協用五紀豈可忽哉吳澄曰歲自冬至至來歲冬至凡三百六十五日四分日之一日行天一周也以分至啓閉定歲之四時是為一歲之紀月自合朔至來月合朔凡二十九日六辰有竒月與日一會也以晦朔弦望定月之大小是為一月之紀日自日出至來日日出歷十二辰日繞地一匝也以晨昏出沒定晝夜長短是為一日之紀星謂二十八宿衆經星辰謂天之壤因日月所會分經星之度為十二次觀象測候以驗天之體也是為星辰之紀厯謂日月五緯所歷之度數謂一二三四五六七八九十百千萬七政行度各有盈縮疾徐立數推算以步天之用也是為厯數之紀臣按先儒謂五紀即堯典羲和所掌者紀者如綱之有紀天時所以相維者也五者之紀其中四者皆係於天最後一者乃成乎人蓋所謂厯者歲月日星辰所歷者皆於此乎稽所謂數者歲月日星辰所行者皆於此乎算使四時以定而歲無不成晦朔以辨而月無或虧甲乙以審而日無不正經緯以彰而星辰無或紊是厯與數又所以紀歲月日星辰以人而合于天者也謂之曰協用五紀者則天運於上人為於下皆有以合而一之矣詩小雅十月之交其首章曰十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀朱熹曰十月以夏正言之建亥之月也交月日交會謂晦朔之間也厯法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七故日一歲而一周天月二十九日有竒而一周天又逐及於日而與之會一歲凡十二會方會則月光都盡而為晦已會則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣然王者修德行政用賢去姦能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速高下必有參差而不正相合不正相對者所以當食而不食也若國無政不用善使臣子背君父妾婦乘其夫小人陵君子夷狄侵中國則隂盛陽微當食必食雖曰行有常度而實為非常之變矣臣按厯數之作所以紀日月星辰之行也然行有常度其間有差忒無繇知之惟於日月之食驗焉星官紀日月之食分秒不差時刻不忒則知其厯數之紀無不當矣茍書之於厯者如此及仰於天而驗其象則有不如此者則可以知其失職矣今觀朱熹解詩謂王者修德行政用賢去姦能使陽盛足以勝隂隂衰不能侵陽則日月之食雖或當食而月常避日故其遲速高下必有參差而不正相合不正相對者所以當食而不食焉若國無政不用善使臣子背君父妾婦乘其夫小人陵君子夷狄侵中國則隂盛陽微當食必食雖曰行有常度而實為非常之變矣其為説深切著明後世人主所當服膺警省者也然臣於此竊有見焉自古明睿之君正身修德雖無變異而所以兢惕者固未嘗敢有所怠忽也惟中才之主適已自文遇有變異一切委之天數而於日月薄蝕尤慢忽焉諉曰此天數一定之常數於我何預焉未食之前星官固已預奏其期時刻秒忽必具既而頒之天下俾至其日行禮救護一有不應則御史劾之坐以曠職之罪何以見其當食不食哉當食不食安知非推算者之差哉世主所以不信而生其慢忽之心者往往以此臣嘗竊觀日者之推祿命而有取焉推祿命者謂災眚之來人能修德即可變災為祥有國者遇日月之薄蝕亦猶有身者遇祿命之弗順也因天運必然之數盡人道當然之理一遇日食之變則預思所以修德而正事任賢而去姦使臣子不至背君父妾婦不至乘其夫小人不至陵君子夷狄不至侵中國則吾之陽盛而天之陽亦從而盛矣尚何隂盛陽微之足慮乎是則先儒之論欲銷變於未然而臣為此説欲應變於將然銷未然之變非上知不能應將然之變雖中才可勉也程子曰日食有定數聖人於春秋必書者欲人君因此恐懼修省者其此意歟周禮大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中鄭玄曰土圭所以致四時日月之景也凡日景於地十里而差一寸賈公彥曰案土人職云土圭尺有五寸周公欲求土中以營王城故以土圭度日景之法測土之深謂日景長短之深也正日景者夏曰至晝漏半表北得尺五寸景正與土圭等即地中故云正日景以求地中也昔者周公度日景之時置五表五表者於潁川陽城置一表為中表中表南千里又置一表中表北千里又置一表中表東千里又置一表中表西千里又置一表臣按大司徒以土圭之法測土深以正日景專以求地中也而馮相氏致日以辨四時之敘始專以考天象焉大抵天道運行如環無端治厯者茍不即其隂消陽息之際以為立法之始則何從而見其消息之機乎惟於其日晷進退之際而候之則其機將有不可遁者矣候之之法在植表測景以究其氣之始至而用以合其所布之算兩無差異則厯之本立矣夫自周立表於陽城漢人造厯必先定東西立晷儀唐詔太史測天下之晷凡十三處宋測景則於浚儀之嶽臺元人測景之所二十有七舊説表八尺長夏至之景尺有五寸千里而差一寸唐一行已嘗駮議八尺之表表痺景促古今承用未之或革元郭守敬所謂表五倍其舊懸施橫梁每至日中以符竅夾測橫梁之景折取中數又隨所至之處而立表測景考北極出地高下夏至晷景長短晝夜刻數多寡然後用之以推驗其法可謂精密矣馮相氏掌十有二歲十有二月十有二辰十日二十有八星之位辨其敘事以會天位冬夏致日春秋致月以辨四時之序鄭玄曰馮乘也相視也言登高臺以視天文之次序也吳澄曰歲謂歲星所在寅曰攝提格卯曰單閼辰曰執徐巳曰大荒落午曰敦牂未曰協洽申曰涒灘酉曰作噩戌曰掩茂亥曰大淵獻子曰困敦丑曰赤奮若歲星左行於地凡歷十二舍而為一紀則有十二歲之位月謂斗柄所建自正月建寅至十二月建丑凡歷十二朔而為一歲則有十二月之位辰謂日月所會子曰玄枵亥曰娵訾戌曰降婁酉曰大梁申曰實沈未曰鶉首午曰鶉火巳曰鶉尾辰曰壽星卯曰大火寅曰析木丑曰星紀為十二辰之位自甲乙丙丁戊己庚辛壬癸為十日之位東方角亢氐房心尾箕南方井鬼柳星張翼軫西方奎婁胃卯畢觜參北方斗牛女虛危室壁為二十八宿之位蓋天象有定位則人事有定序辨其敘事而會之者如仲春之月平秩東作厥民析則知月之建卯日月會於降婁而為奎婁之次仲夏之月平秩南訛厥民因則知其月之建午日月會於鶉首而為井鬼之次仲秋之月平秩西成厥民夷則知其月之建酉日月會於壽星而為角亢之次仲冬之月平在朔易厥民隩則知其月之建子日月會於星紀而為斗牛之次以至十有二歲十有二月所會天位皆倣乎此冬夏致日春秋致月者蓋冬至日在牽牛景長丈有三尺夏至日在東井景長尺有五寸此長短之極極則氣至冬無愆陽夏無伏隂所以致日春分日在婁月上弦於東井下弦於牽牛秋分日在角月上弦於牽牛下弦於東井此長短之中所以致月然致日必於冬夏致月必於春秋何也天度一月易一位一時易一方推之日月所經正在分至為天度之中分至之氣正則四時之序亦正矣臣按吳氏謂分至之氣正則四時之序亦正時序正於上則人事定於下此為治必先治厯明時也保章氏掌天星以志記也星謂五星辰謂二十八宿為十二次也日月之變動以觀天下之遷謂變動辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二歲之相觀天下之妖祥以五雲之物色也辨吉凶水旱降豐荒之祲象以十有二風察天地之和命乖别之妖祥凡此五物事也者以詔救政訪序事鄭玄曰保守也世守天文之變吳澄曰天星天文星度也步占之法以星為主故曰天星十有二辰經天左旋常度不移不足以見吉凶惟日月五星行乎十二辰之次緯天右轉而日有薄蝕不朔望蝕蝕在朔望暈日旁氣珥形點黑也之變月有虧盈朓晦而月見西方朒朔而月見東方之變五星有贏早出為贏縮晚出為縮圜有圍繞者角生芒角之變故總言日月星辰之變動變動即所謂遷也順則為吉逆則為凶以天象言則為變動以人事言則為遷二者相參辨之矣以上解天星以志日月星辰變動至辨其吉凶星土十二土也合而言之曰九州九州星土之書雖亡所考者十二國之分載諸傳記災祥所應亦皆可證昭十年有星出於嫠女鄭禆竈曰今兹歲在顓頊之墟薑氏任氏實守其地此玄枵為齊之分星而青州之星土也昭三十二年吳伐越晉史墨曰越得歲而吳伐之必受其凶釋者曰歲在星紀此星紀為越之分星而揚州之星土也昭元年鄭子産曰成王滅唐而封弟叔焉故參為晉星實沈為參神此實沈為晉之分星而并州之星土也襄九年晉士弱曰陶唐氏之火正閼伯居商丘相土因之故商主大火此大火為宋之分星而豫州之星土也昭十七年星孛及漢申須曰漢水祥也衛顓頊之墟故為帝丘其星為大水此娵訾為衛之分星而冀州之星土也鄭語周史曰楚重黎之後也黎為高辛氏火正此鶉尾為楚之分星而荆州之星土也爾雅曰析木為之津釋者謂天漢之津梁為燕此析木為燕之分星而幽州之星土也以至周之鶉火秦之鶉首趙之大梁魯之降婁無非以其州之星土而為其國之分星以星土而占災祥其應有可徴矣以上解以星土辨九州之地至以觀妖祥歲星在木則水為相之類五星順度為祥流逆失度為妖襄二十八年歲在星紀而淫於玄枵是謂蛇乘龍梓慎以為宋鄭必飢則言其所屬禆竈以為周楚所惡則言其所衝其歲星乖次之應乎昭三十二年歲在星紀而吳伐越史墨謂不及四十年越其有吳乎以歲星十二年一周存亡之數不過三紀非歲星順次之應乎以類求之則歲星太歲皆可參決妖祥之事以上解十有二歲之相觀天下之妖祥物色也視日旁雲氣之色與視祲十輝同義左氏所謂凡至分啓閉必書雲物占法青為蟲赤為兵荒白為喪黃為豐黑為水既言辨吉凶水旱又言降豐荒之祲象則亦視祲敘降之意蓋水旱之降為荒年荒年之降為豐年其敘如此以上解以五雲至豐荒之祲象十二風者艮為條風從大呂太蔟之律震為明庶風從夾鍾之律巽為清明風從姑洗仲呂之律離為景風從㽔賔之律坤為涼風從林鍾夷則之律兌為閶闔風從南呂之律乾為不周風從無射應鍾之律坎為廣莫風從黃鍾之律傳所謂八風從律是也又法於緹室之中因逐月律管入地之淺深月氣至則葭灰飛以此察天地之和氣然左氏載師曠歌北風又歌南風而知晉楚之勝負妖祥之應可決於此乖則異别則離此天地之不和而為妖祥也故命之使知所趨避以上解以十二風至乖别之妖祥上文五事即救政敘事之所從出也政者國之本詔救政於上則人君知修省之道事者有司之常職訪敘事於下則人臣知戒警之意君臣交修厥德政事舉而天降祥矣以上解凡此五物者以詔救政訪敘事臣按所謂五物者日月星辰之變動也星土辨九州也十有二歲也五雲之物也十有二風也保章氏之職用此五物以測隂陽之和否察天地之逆順上以詔之人君使其因災咎而救其政事之乖别下以訪之臣下使其敘宜事而知其緩急之次第吳氏論之詳矣凡世之星官所推步占驗者皆具于是焉禮記月令孟春之月乃命太史守典奉法司天日月星辰之行宿離不貸忒母失經紀以初為常鄭玄曰經紀謂天文進退度數方慤曰在人之六典八法在天之日月星辰莫不存乎書故以命太史日循星以進退者也月應日以死生者也星者日所舍辰者星所次宿言宿於此離言離於彼日月星辰之宿離有定數不可忒忒則司天者之過矣吳澄曰宿謂所居離謂所麗日月所居所麗在何辰何星之第幾度推算不可差忒毋令失其所躔次之經紀初謂初始常謂不變當依初始以求算厯之法而不改變也臣按太史司天日月星辰之行即堯典所謂厯象日月星辰也厯象有一定之法當夫國家創業之初已為之定制常法然每歲日月星辰之行則不能無變動焉然其變動也或宿或離其躔次亦不甚相逺而不能出始初常法之外是以先王之世每遇歲事更端之初即申命太史考其行之宿離或進或退皆不可失其常而必合於初焉後世惟聽司厯者之所自為而孟春乃命之制不復講矣此亦一闕典也春秋隱公三年春王正月己巳日有食之胡安國曰經書日食三十六去之千有餘歲而精厯算者所能考也其行有常度矣然每食必書示後世治厯明時之法也有常度則災而非異矣每食必書示後世遇災而懼之意也日者衆陽之宗人君之表而有食之災咎象也克謹天戒則雖有其象而無其應弗克畏天災咎之來必矣凡經所書者或妾婦乘其夫或臣子背君父或政權在臣下或夷狄侵中國皆陽微隂盛之證也是故十月之交詩人以刺日有食之春秋必書戒人君不可忽天象也臣按先儒謂日有食之有食之者也太陽君也而被侵食君道所忌也噫天上之日月有以食之則天下之君亦將有以災之者矣是故人君遇此變也則反諸已乃自咎曰吾德毋乃有失歟吾行毋乃有虧歟吾之左右毋乃有竊威柄者歟吾之臣子毋乃有背君父者歟或者盜賊無乃將於此而竊發歟夷狄無乃將於此而侵陵歟有一于此皆思所以反其事而順於道尋其緒而折其萌究其歸而閉其途使之必不至於如此也夫然則其過也人皆仰之如日月之復明矣桓公三年秋七月壬辰朔日有食之既胡安國曰榖梁曰既盡也言日言朔日正朔也言朔不言日食既朔也言日不言朔食晦日也不言日不言朔夜食也日者衆陽之宗人君之象而有食之既則其為變大矣左傳文公元年曰於是閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖杜預曰於厯法閏當在僖公末年誤於今年三月置閏故曰非禮也步厯之始以為術之端首期之日三百六十有六日日月之行又有遲速而必分為十二月舉中氣以正月有餘日則歸之於終積而為閏故言歸餘於終斗建不失其次寒暑不失其常故無疑惑四時得所則事無悖禮孔頴逹曰閏後之月中氣在朔則斗柄月初已指所建之辰閏前之月中氣在晦則斗柄月末方指所建之辰故月之正在於中氣則斗柄常不失其所指之次如是乃得寒暑不失其常臣按古今論置閏之法不出乎此履端於始舉正於中歸餘於終三言六年閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民杜預曰四時漸差則置閏以正之順時命事事不失時則年豐臣按四時漸差則置閏以正之斯言也治厯明時之要閏正則寒暑不失而民知耕藝之候而有有秋之望矣食者民之天民得其食則生養遂而禍亂不作矣生民之道豈外是哉昭公七年晉平公曰何謂六物伯瑕對曰歲時日月星辰是謂也公曰多語寡人辰而莫同何謂辰對曰日月之會是謂辰故以配日孔頴逹曰爾雅釋天云載歲也夏曰歲周曰年李巡曰載一歲莫不覆載也孫琰曰四時一終曰歲取歲星行一次也年取年榖一熟是年歲即年也時謂四時春夏秋冬也日謂十日從甲至癸也月從正月至十二月也星二十八宿也辰謂日月所會一歲十二會從子至亥也配日言辰無常所分在十二以十幹配之明非一所也臣按厯象所推步者不過此六物而已以上厯象之法上大學衍義補卷九十二
