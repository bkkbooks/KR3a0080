body:
  text: 大學衍義補卷一百五十七明丘濬撰治國平天下之要成功化聖神功化之極上之上易乾元亨利貞程頥曰上古聖人始畫八卦三才之道備矣因而重之以盡天下之變故六畫而成卦重乾為乾乾天也天者天之形體乾者天之性情乾健也健而旡息之謂乾夫天專言之則道也天且弗違是也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾乾者萬物之始故為天為陽為父為君元亨利貞謂之四德元者萬物之始亨者萬物之長利者萬物之遂貞者萬物之成唯乾坤有此四德在他卦則隨事而變焉故元專為善大利主於正固亨貞之體各稱其事四德之義廣矣大矣朱熹曰元亨利貞天道之常仁義禮智人性之綱臣按乾之三畫萬世文字之祖元亨利貞四字萬世義理之宗在天則為春夏秋冬在人則為仁義禮智流行於天地間則為元㑹運世彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧程頥曰卦下之辭為彖夫子從而釋之通謂之彖彖者言一卦之義大哉乾元贊乾元始萬物之道大也四德之元猶五常之仁偏言則一事專言則包四者萬物資始乃統天言元也乾元統言天之道也天道始萬物萬物資始於天也雲行雨施品物流形言亨也天道運行生育萬物也大明天道之終始則見卦之六位各以時成卦之初終乃天道終始乘此六爻之時乃天運也以御天謂以當天運乾道變化生育萬物洪纎髙下各以其類各正性命也天所賦為命物所受為性保合太和乃利貞保謂常存合謂常和保合太和是以利且貞也天地之道常久而不已者保合太和也天為萬物之祖王為萬邦之宗乾道首出庶物而萬彚亨君道尊臨天位而四海從王者體天之道則萬國咸寧矣朱熹曰此専以天道明乾義又析元亨利貞為四德以發明之蓋嘗統而論之元者物之始生亨者物之暢茂利則向於實也貞則實之成也實之既成則其根蒂脫落可復種而生矣此四德之所以循環而旡端也然而四者之間生氣流行初無間斷此元之所以包四德而統天也其以聖人而言此孔子之意蓋以此卦為聖人得天位行天道而致太平之占也臣按自古言君德者必曰乾乾即天也乾之所以為乾者以其有元亨利貞之四德也是故人君居天之位必偹乾之德然後足以體天而立極焉必能貫天德於始終時乘六陽以行天道斯為乾德之元亨必能全萬物之性命首出庶物以致太平斯為乾德之利貞文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞程頥曰它卦彖象而已獨乾坤更設文言以發明其義推乾之道施於人事元亨利貞乾之四德在人則元者衆善之首也亨者嘉美之㑹也利者和合之義也貞者幹事之用也朱熹曰元者生物之始天地之德莫先於此故於時為春於人則為仁而衆善之長也亨者生物之通物至於此莫不嘉美故於時為夏於人則為禮而衆美之㑹也利者生物之遂物各得其宜不相妨害故於時為秋於人則為義而得其分之和貞者生物之成實理具偹隨在各足故於時為冬於人則為智而為衆事之幹幹木之身而枝葉所依以立者也以仁為體則旡一物不在所愛之中故足以長人嘉其所㑹則旡不合禮使物各得其所利則義無不和貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹非君子之至健無以行此故曰乾元亨利貞臣按朱熹謂元者善之長以下四句說天德之自然君子體仁足以長人以下四句說人事之當然乾之文言雖通上下而言然其於人君之身尤切乾有四德以元為衆善之首人君必體元之德以君長乎人然後合乾德而盡君道焉有此衆善於身而嘉其所㑹利宜於物正而又固焉故其於禮也旡所悖於義也無所乖於事也有其幹何者而不出於衆善之元乎是則禮也義也事也皆善也而元則為善之長焉夫人必偹衆善之長然後能為衆人之長上體夫天德之元中體夫人心之仁四端萬善皆在乎所體之中萬姓兆民皆在乎所長之下則乾之德不在天而在君矣九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也程頥曰進位乎天位也聖人既得天位則利見在下大德之人與共成天下之事天下固利見夫大德之君也又曰人與聖人類也五以龍德升尊位人之類莫不歸仰况同德乎上應於下下從於上同聲相應同氣相求也流濕就燥從龍從虎皆以氣類故聖人作而萬物皆覩上既見下下亦見上物人也本乎天者如日月星辰本乎地者如蟲獸草木隂陽各從其類人物莫不然也朱熹曰剛健中正以居尊位如以聖人之德居聖人之位故其象如此又曰作起也物猶人也覩釋利見之意也本乎天者謂動物本乎地者謂植物物各從其類聖人人類之首也故興起於上而人皆見之臣按乾之六爻皆以龍為象蓋龍之為物禀至陽之精神靈莫測變化旡窮故以象乾道之變化陽氣之消息焉然是龍也始而潛繼而見躍又進而為飛則當五位則是以聖人之德居天子之位也易之六十四卦凡三百八十四爻皆莫有過於此爻者也是以自古稱頌人君者必曰飛龍九五焉九五之象曰飛龍在天大人造也是言聖人有德有位制禮作樂可以有為此其時也文言曰飛龍在天上治也是言聖人居上臨下得時行道統治萬民此其象也又曰飛龍在天乃位乎天德是言聖人體元長人以天之德居天之位此其事也夫乾之六爻何者而非天德乎而五為天位乃天德之得位者焉然是天德也非一端也天之德即乾之德乾之德即聖人之德故又贊之曰大哉乾乎剛健中正純粹精也朱熹曰剛以體言健兼用言中者其行無過不及正者其立不偏四者乾之德也純者不雜於隂柔粹者不雜於邪惡蓋剛健中正之至極而精者又純粹之至極也由是以觀乾之為德大矣備矣旡以加矣然此七德者人君固當全備而無虧缺然就其中七者而言而此剛健中正四者尤為其要者也又就四者而言則剛健二者尤其要也又就二者而言則剛之為德乃陽之本體乾之大用而於君德尤為至要者焉臣願九五飛天之大人本乎剛以為德有剛以為體則其為用也旡不健矣以剛為體以健為用事之行也必由乎中事之立也必本乎正心心在焉事事而思之極深研幾而必求至乎精義入神之地則七德備乎已而凡所謂元亨利貞之四德修之而為德行發之而為德業何者而非乾德之流行者乎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎程頥曰大人與天地日月四時鬼神合者合乎道也天地者道也鬼神者造化之迹也聖人先於天而天同之後於天而能順天者合於道而已合於道則人與鬼神豈能違也朱熹曰大人即釋爻辭所利見之大人也有是德而當其位乃可以當之人與天地鬼神本無二理特蔽於有我之私是以梏於形體而不能相通大人旡私以道為體㑹何彼此先後之可言哉先天不違謂意之所為默與道契後天奉天謂知理如是奉而行之臣按上天下地而聖人居乎其中日月之代眀四時之錯行鬼神之顯微聖人無一而不與之合焉所謂合者豈區區然以效法比並之哉蓋聖人居天位偹天德心與天通道與天契一念合天何往不濟况地者天之對而日月為天地之精華四時為天地之運動鬼神又天地之功用者哉其大者既合則其他無不合矣天既合矣是以心神運動天人合同視於無形聼於無聲先天之意而有所為非有意於求天之從而天自不能以違我也承天之意與時偕行因其時序之常而制為時措之宜無非以奉乎天而已是則先於天而天不違我後乎天而我不逆天自非聖人德合乎天何以能先後於天而相與之和同也哉然則未至於大人之地而居大人之位者何以致其力哉亦曰公而已矣朱子所謂蔽於有我之私梏於形體而不能相通則非公矣天者公而已聖人無私亦天也此其所以與天合與既公矣又何加焉曰敬既敬矣又何加焉曰勤公以主之敬以持之勤以行之則吾心與天心合而不梏於形體之私而與之相通矣故易之象曰天行健君子以自強不息自強不息勤之謂也觀之彖曰大觀在上順而㢲中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣程頥曰五居尊位以剛陽中正之德為下所觀其德甚大故曰大觀在上下坤而上巽是能順而巽也五居中正以巽順中正之德為觀於天下也為觀之道嚴敬如始盥之時則下民至誠瞻仰而從化也不薦謂不使誠意少散也天道至神故曰神道觀天之運行四時旡所差忒則見其神妙聖人見天道之神體神道以設教故天下莫不服也夫天道至神故運行四時化育萬物旡有差忒至神之道莫可名言唯聖人默契體其妙用設為政教故天下之人涵泳其德而不知其功鼓舞其化而莫測其用自然仰觀而戴服故曰以神道設教而天下服矣臣按易所謂以神道設教而天下服蓋以聖人之政教必體天道之妙用而施之於民亦如天之運行四時旡有差忒神而而莫可名言爾後世虛誕之君諛佞之臣故為怪誕虛幻之事託鬼神以眩惑愚民而謂之曰此聖人以神道設教也乃至假河圖洛書以文其姦嗚呼臣之誕將以求富貴雖欺誑其君而不顧也君之誕將以求福夀雖矯誣天帝而不忌也吁君固不可欺也天其可誣乎賁之彖曰觀乎天文以察時變觀乎人文以化成天下程頥曰天文天之理也人文人之道也天文謂日月星辰之錯列寒暑隂陽之代變觀其運行以察其四時之遷改也人文天理之倫序觀人文以教化天下天下成其禮俗乃聖人用賁之道也胡允曰聖人南靣而立視昏旦之星日月之次以知四時寒暑之變觀君臣父子兄弟夫婦朋友之文則導以禮樂風以詩書彰以車服辨以采章而化成於天下臣按先儒言化謂舊者化新成謂久而成俗夫人君之為治期於化成天下必欲舊染之俗皆變而新已化之俗皆成而久其道何由亦惟用乎人文而已蓋盈天地間皆人也人人皆有彜倫次序尊卑上下親疏逺近等級分明名分整比情意周流燦然文采有可觀者是謂之人文因其人有是文為之品節焉為之制度焉為之威儀焉為之采章焉為之典禮焉為之車服焉為之經籍焉為之聲音文字焉以是而化天下之人則使之皆成夫文明之俗聖人用賁之道如此豈非為治之要道哉恆之彖曰恆亨旡咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣程頥曰恆之道可致亨而無過咎但所恆宜得其正失正則非可恆之道也故曰久於其道其道可恆之正道也天地之所以不已蓋有恆久之道人能恆於可恆之道則合天地之理也天地之理未有不動而能恆者也動則終而復始所以恆而不窮凡天地所生之物雖山嶽之堅厚未有能不變者也故恆非一定之謂也一定則不能恆矣唯隨時變易乃常道也故云利有攸往明理之如是懼人之泥於常也日月得天以下極言常理日月隂陽之精氣耳唯其順天之道往來盈縮故能久照而不已得天順天理也四時隂陽之氣耳往來變化生成萬物亦以得天故長久不已聖人以常久之道行之有常而天下化之以成美俗也觀其所恆謂觀日月之久照四時之久成聖人之道所以能常久之理觀此則天地萬物之情理可見矣天地常久之道天下常久之理非知道者孰能識之朱熹曰恆固能亨且無咎矣然必利於正乃為久於其道不正則久非其道矣天地之道所以長久亦以正而已矣久於其道終也利有攸往始也動靜相生循環之理然必靜為主也臣按為治之道貴乎能恆恆則能久久則可大彼朝令而夕改嵗異而月不同者必不能待夫必世之久而致治具之周備仁恩之洽浹也大傳曰易簡而天下之理得矣天下之理得而成位乎其中矣朱熹曰成位謂成人之位其中謂天地之中至此則體道之極功聖人之能事可以與天地參矣又曰易簡理得是淨淨潔潔旡許多勞擾委曲張子所謂盡人道並立乎天地以成三才則盡人道非聖人不能也臣按乾知大始坤作成物乾以易知坤以簡能是天地之理不外乎易簡而已聖人中立兩間以其一心之易簡而合乎天地之易簡行其所無事而順乎自然之理由一身而一家由一家而一國由一國而之天下凡有所修為舉措莫非易知易從之事可久可大之業而所謂暗昧傾險勞擾繁雜者無有焉如此則與天地同體而天下之理皆得於我矣上焉而天天之理以易下焉而地地之理以簡中焉而人人之理兼天地之簡易而有之然人皆有是理而不能得賢人雖得是理而不能盡得天下之理而盡之者其聖人乎惟其盡得是理所以成位乎天地之中而與天地參而為三與顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德程頥曰運行之迹生育之功顯諸仁也神妙無方變化無迹藏諸用也天地不與聖人同憂天地不宰聖人有心也天地無心而成化聖人有心而無為天地聖人之盛德大業可謂至矣富有溥博也日新旡窮也朱熹曰顯自內而外也仁謂造化之功德之發也藏自外而內也用謂機緘之妙業之本也張子曰富有者大而旡外日新者久而旡窮臣按真德秀謂此章雖言易之理然易也天地也聖人也一而已矣生物旡窮天地之大業也運行不息天地之盛德也功及萬世聖人之大業也終始日新聖人之盛德也吁非富有不可以言大業使凡天地之間有一物之或遺有一處之不到非富有也有而不富謂之非業固不可謂之大業則未也非日新不可以言盛德使凡宇宙之內有一息之或間有一隙之暫已非日新也新而不日謂之非德固不可謂之盛德則未也有志於二帝三王之盛雍熙泰和之治者尚當體有心之聖人而法無心之天地以成其盛德大業也哉以上聖神功化之極上之上大學衍義補卷一百五十七
