body:
  text: 大學衍義補卷二十五明丘濬撰治國平天下之要制國用市糴之令易日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑噬齧也嗑合也物有間者齧而合之也卦名臣按此後世為市之始先儒謂易之十二卦制器尚象始離次益次噬嗑所取者食貨而已食貨者生民之本也民之於食貨有此者無彼蓋以其所居異其處而所食所用者不能以皆有故當日中之時致其人於一處聚其貨於一所所致所聚之處是即所謂市也人各持其所有於市之中而相交相易焉以其所有易其所無各求得其所欲而後退則人無不足之用民用既足則國用有餘也周禮司市市官之長掌市之治治以理之教教以化之政政以正之刑刑以制之量量多寡度度長短禁使勿為令使之為以次叙分地而經市以所居之次為叙分地以掌之以陳肆辨物而平市陳物於市肆使各以類相從大市交易衆多日昃而市朝市朝時而市夕市夕時而市凡治市之貨賄六畜珍異亡者使有物之無者常使之有利者使阜有利益者使之阜盛害者使亡物之害財者賤之使至於亡靡者使微侈靡者抑之使微少葉時曰先王授民以井田足食也制商以市㕓通貨也大宰阜財之職而與農榖並任司徒通財之事而與稼穡同頒誠以食足貨通而後教化可成也是以匠人營國則前朝而後市內宰建國則佐后而立市市者所以通商賈而阜財也胥師市中群胥之長各掌其次之政令而平其貨賄平其價不得擅為高下憲刑禁焉賈師知物價者各掌其次之貨賄之治辨其物而均平之展視也其成物之成者而奠定也其賈使之有常然後令市臣按周官於市肆一事設官如此之詳所以使民懋遷其有無也有者得以售無者得以濟斯民之各遂其所欲是亦王政之一端也泉府泉布委積之府掌以市之征布征布㕓人所斂之五布斂市之不售貨之滯於民用者市貨有積滯不售者則以征布買而收之以其賈買之使民不喪其本物揭而書之逐物表揭而書其價以待不時而買者以待民之乏用買者各從其抵抵音帝本也都鄙從其主國人郊人從其有司主與有司即所謂抵也然後豫之凡賖者祭祀無過旬日喪紀無過三月凡民之貸借用也者與其有司辨而授之以國服為之息國服謂民於國所服之業如農圃之類也民貸物不取其息俾其出力以服國事以代出息也葉適曰泉府之法斂市之不售貨之滯於民用者以其賈買之其賖者祭祀喪紀皆有數而以國服為之息蓋當是時民皆齊民未有特富者也開闔斂散輕重之權一出於上均之田而使之耕築之室而使之居衣食之具無不畢與然而祭祀喪紀猶有所不足上之人不之與則誰與之故賖而貸之使以日數償而以其所服者為息且其事之不售貨之滯於民用者民不足於此而上不斂之則為不仁然則二者之法蓋三代固行之矣今天下之民不齊久矣開闔斂散輕重之權不一出於上而富人大賈分而有之不知其幾千百年也而遽奪之可乎奪之可也疾其自利而欲為國利可乎馬端臨曰泉府一官最為便民滯則官買之民不時而欲買者官則賣之無力者則賖貸與之蓋先王視民如子洞察其隱微而多方濟其缺乏仁政莫尚于此初非專為謀利取息設也王安石不原其立官之本意而勦鄭注國服為息一語行青苗以誤天下可乎臣按泉府之設以泉為名蓋主泉布泉古錢字之官也古者以泉布流通天下之物無非以便民而已泉布出於上貨物生於民民之貨物不能以皆有也欲通其有無必資錢以易物然後無者各有焉然其物之聚也有多有少時之用物也有急有緩少而急於用則通多而不急於用則滯上之人因其滯也則以泉布收之俾其少而通焉所以厚民生也上既收之矣下之人或有所急而需焉則隨其原價而賣之所以濟民之用也然買物必以價彼民之貧者無價以買官則或賖或貸與之賖則取償而不取息貸則按本以計其息所以不取息者應其喪祭之急而必取息者限其浮浪之費也然其取息也則又不以錢而以力焉所謂國服為之息者償本之後以服役公家為息服如國中七十及六十野自六尺及六十有五征之以供服役之服也凡若此者無非以阜民之財濟民之急而上之人無分毫利焉豈若王莽王安石之所為哉王制用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鱉不中殺不粥於市李覯曰理財之道去僞為先民之詐僞蓋其常心矧兹市井飾行儥慝何所不至哉姦僞惡物而可雜亂欺人以取利則人競趨之矣豈惟愚民見欺耶使人妨日廢業以作無用之物人廢業則本不厚矣物無用則國不實矣下去本而上失實禍自此始也臣按市肆所陳雖商賈之事然而風俗之奢儉人情之華實國用之盈縮皆由於斯焉漢武帝元封元年用桑𢎞羊言置均輸官於郡國盡籠天下之貨貴則賣之賤則買之使富商大賈亡所牟大利而物價不得騰躍故抑天下之物名曰平凖桑𢎞羊曰往者郡縣諸侯各以其物貢輸往來煩難物多苦惡不償其費故郡置輸官以相給運而便逺方之貢故曰均輸開委府于京師以籠貨物賤則買貴則賣是以縣官不失實商賈無所牟利故命曰平凖文學曰古之賦稅於人也因其所工不求其拙農人納其穫工女效其職今釋其所有責其所無百姓賤賣貨物以便上求間者郡國或令作布絮吏恣留難與之為市吏之所入非獨濟陶之縑蜀漢之布也亦人間之所為耳行姦賣平農民重苦女工再稅未見輸之均也縣官猥發闔門擅市則萬人並收並收則物騰躍騰躍則商賈牟利自市則吏容姦豪而富商積貨儲物以待其急輕賈姦吏收賤以取責未見凖之平也蓋古之均輸所以齊勞逸而便貢輸非以為利而賈物臣按桑𢎞羊作均輸法以為平凖觀其與賢良文學之士所辨論者大略盡之矣然理之在天下公與私義與利而已矣義則公利則私公則為人而有餘私則自為而不足堂堂朝廷而為商賈貿易之事且曰欲商賈無所牟利噫商賈且不可牟利乃以萬乘之尊而牟商賈之利可乎王莽於長安及五都立五均官馬端臨曰古人立五均以均市價立泉府以收滯貨而時其買賣皆所以便民也所謂國服為息者乃以官物賖貸與民則取其息耳今莽借五均泉府之說令民採山澤者畜牧者紡織者以至醫巫技藝各自占所為而計其息十一分之一以其一為貢則是直攫取之耳周公何嘗有此法乎臣按樂語河間獻王所傳道五均事言天子取諸侯之書以立五均則市無二價四民常均此王莽五均之說所自出也莽借古人良法以罔市利無足道者姑録之以示世戒漢章帝時尚書張林言縣官宜自交址益州上計吏來市珍寶收採其利武帝所謂均輸也詔議之尚書僕射朱暉曰按王制天子不言有無諸侯不言多少食祿之家不與百姓爭利今均輸之法與商販無異非明王所宜行帝不從其後用度益奢臣按均輸之法謂郡國租賦并雇運之直官總取之而為之轉輸於京此非但商賈之事蓋貧民無産者為人傭雇之事也不但非明主所宜行雖鄉里之名為士大夫者亦不宜行也章帝為漢七制主之一而亦為此豈非武帝詒謀之不善哉唐德宗以宦者為宫市使置白望數百人抑買人物以紅紫染故衣敗繒尺寸裂而給之仍索進奉門戶及腳價錢名為宫市其實奪之諫官御史數諫不聽徐州節度使張建封入朝具奏之上頗嘉納以問判度支蘇辨辨希宦者意對曰京師游手萬家無生業仰宫市取給上信之故凡言宫市者皆不聽胡寅曰百姓豪奪縣令得而治之縣令强取郡守得而治之郡守倚法以削按察使得而治之宰相用人讐斂天子得而逐之天子而兼是數者不恤咨怨不畏非議不納諫說則無如何矣匹夫交易價不相直取而有之旁觀不平亷者愧耻富有四海而行同匹夫書之青史千古不泯豈非永監哉臣按萬乘之主而有四海之富乃白奪貧人之物以為食用無以異於盜賊之白日行劫然方其未知也而為左右之人所蒙蔽其責猶有可諉者幸而農夫以驢負柴者毆宦者得以上聞諫官御史又數言之而方鎮來朝者又以言是可以罷之矣夫以衆人所言者皆不信而區區信一人之言謂京師游手萬家仰宫市以取給嗟夫人君聽言當揆之於理吾取物於市而游手何預焉而賴此以給乎盍遣親信不欺者往偵其實則情僞見矣宋太宗太平興國五年詔宫中買物有原不出産處毋得抑配擾民宋初京師有雜買務雜買場以主禁中貿易仁宗謂輔臣曰國朝懲唐宫市之弊置務以京朝官內侍參主之以防侵擾而近歲非所急務一切收市擾人甚矣及申舊令使皆給實直其間內東門市民間物或纍歲不償錢有司請自今宜以見錢售之臣按宫中有所用度或有所闕不能不求之於市肆要之不必設場務專官使過有所用遣亷謹之人齎見錢隨時價兩平交易而不折以他物不限以異時不易以壞幣則官府有實用而小民無怨聲矣真宗大中祥符三年河北轉運使李士衡請令官司預給帛錢俾及時輸送則民獲利而官亦足用從之仍今優與其直臣按宋朝預買紬絹謂之和買絹夫買而謂之和必兩無虧損上下同欲而無抑配之謂也宋朝所謂和買猶是民以乏錢而須賣官以先期而便民其後之弊且至與夏稅並輸而民家營運生生之具悉從折計而為民無窮之害今所謂和買者非止於絹凡宫闈官府有所匱乏一切取之於州郡州郡取之於民然後計其直俾其詣官庫給價償之名曰和買其實非民間所有而欲以出賣者亦是州郡於民常賦之外斂錢收買以應官司之求及其領價之際文移上下展轉伺候動經旬月所得不償所費嗚呼官府所為如此九重之上何由而知其詳哉神宗熙寧二年制置三司條例司始制均輸之法以通天下之貨制為輕重斂散之法使富商大賈不得乘公私之急以擅其權假發運使以錢貨資其用度俾周知財賦有無而移用之得以徙貴就賤用近易逺預知所當供辦者從便變易蓄買以待上令以發運使薛向領其事時議多以為非後迄不能成蘇軾曰均輸立法之初其說尚淺徒言徙貴就賤用近易逺然而廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不明言販賣然既許之變易變易既行而不與商賈爭利未之聞也夫商賈之事曲折難行其買也先期而豫錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今官買是物必先設官置吏簿書廪祿為費已厚非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前商賈之利何緣而得朝廷不知慮此乃捐五百萬緡以豫之此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多矣臣按此桑𢎞羊之故智然𢎞羊自立法而自行之猶有其弊况後世之人不及𢎞羊而又付之庸庸之輩使之奉行乎大抵民自為市則物之良惡錢之多少易以通融凖折取舍官與民為市物必以其良價必有定數又有私心詭計百出其間而欲行之有利而無弊難矣政不若不為之為愈也熙寧五年詔曰天下商旅物貨至京多為兼并之家所困宜出內藏庫錢帛選官於京師置市易務臣按先是草澤魏繼宗上言京師百貨所居市無常價貴賤相傾富能奪貧能與乃可以為天下於是下此詔嗚呼天生衆民有貧有富為天下主者惟省力役薄稅斂平物價使富者安其富貧者不至於貧各安其分止其所得矣乃欲奪富與貧以為天下烏有是理哉奪富之所有以與貧人且猶不可况奪之而歸之於公上哉吁以人君而爭商賈之利可醜之甚也徽宗建中靖國元年尚書省言預買錢多人戶願請比歲例增給詔諸路提舉司假本司剩利錢同漕司來歲市紬絹計綱赴京陳瓘曰預買之息重於常平數倍人皆以為苦何謂願請今復增創雖名濟乏實聚斂之術臣按上之取下有常賦有定制凡於常賦定制之外有所建請必是欲行己私趨時好以希爵祿干恩典者其所以建請者必曰不益賦而國用饒又曰民所願請而非强迫之者又曰其行之上下俱便益而永逺無弊人君聽其言非不美及其施行之際不徒不能如其言而損國課戕民生促國脈以貽後世羞者多矣人主於此不可不察孝宗隆興二年臣僚言熙寧初創立市交易也舶海舟以通貨物舊法抽解有定數而取之不苛納稅寬其期而使之待價懷逺之意實寓焉臣按互市之法自漢通南越始歷代皆行之然置司而以市兼舶為名則始于宋焉蓋前此互市兼通西北至此始專於航海也元因宋制每歲招集舶商於蕃邦博易珠翠香貨等物及次年回帆驗貨抽解然後聽其貨賣其抽分之數細色於二十五分中取一粗色於三十分中取一漏稅者斷沒仍禁金銀銅鐵男女不許溢出本朝市舶司之名雖沿其舊而無抽分之法惟於浙閩廣三處置司以待海外諸蕃之進貢者蓋用以懷柔逺人實無所利其入也臣惟國家富有萬國故無待於海島之利然中國之物自足其用固無待於外夷而外夷所用則不可無中國物也私通溢出之患斷不能絶雖律有明禁但利之所在民不畏死民犯法而罪之罪之而又有犯者乃因之以罪其應禁之官吏如此則吾非徒無其利而又有其害焉臣考大明律於戶律有舶商匿貨之條則是本朝固許人泛海為商不知何時始禁竊以為當如前代互市之法庶幾置司之名與事相稱或者若謂恐其招惹邊患臣請以前代史册考之海上諸蕃自古未有為吾邊冦者且暹羅瓜哇諸番隔越漲海地勢不接非西北戎狄比也惟日本一國號為倭奴人工巧而國貧窘屢為沿海之冦當遵祖訓不與之通儻以臣言為可采乞下有司詳議以聞然後制下濵海去處有欲經販者俾其先期赴舶司告知行下所司審勘果無違礙許其自陳自造舶舟若干料數收販貨物若干種數經行某處等國於何年月回還並不敢私帶違禁物件及回之日不致透漏待其回帆差官封檢抽分之餘方許變賣如此則歲計常賦之外未必不得其助矧今朝廷每歲恆以蕃夷所貢椒木折支京官常俸夫然不擾中國之民而得外邦之助是亦足國用之一端也其視前代算間架經總制錢之類濫取於民者豈不猶賢乎哉以上市齊管仲相桓公通輕重之權曰歲有凶穰故榖有貴賤令有緩急故物有輕重人君不理則畜賈游於市謂賈人多蓄積乘民之不給百倍其本矣以十收百民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重凡輕重斂散之以時即凖平守凖平使萬室之邑必有萬鍾之藏藏鏹千萬六斛四斗為鍾千室之邑必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘耒耜器械鍾餉糧食必取贍焉故大賈畜家不得豪謂輕侮之奪吾民矣又曰國之廣狹壤之肥磽有數終歲食餘有數彼守國者守榖而已矣曰某縣之壤廣若干某縣之壤狹若干則必積委幣委蓄也各於州縣里蓄積錢幣即上文萬室千室所藏者於是縣州里受公錢君下令謂郡縣屬大夫里邑皆籍榖入若干臣按管仲伯者之相也其輔桓公以兵車伯天下而其治國猶知以守榖為急務而通輕重之權為斂散之法歲穰民有餘則輕榖因其輕之之時官為斂糴則輕者重歲凶民不足則重榖因其重之之時官為散糶則重者輕上之人制其輕重之權而因時以斂散使米價常平以便人是雖伯者之政而王道亦在所取也魏文侯相李悝曰糶甚貴傷人人謂士工商甚賤傷農人傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使人無傷而農益勸是故善平糴者必謹觀歲有上中下三熟大熟則上糴三而舍一中熟則糴二下熟糴一使人適足價平則止又見固邦本馬端臨曰古今言糶糴斂散之法始於齊管仲魏李悝管仲之意兼主於富國李悝之意專主於濟民管仲言人君不理則畜賈游於市乘民之不給百倍其本此則桑孔以來所謂理財之道大率皆宗此說然山海天地之藏關市物貨之聚而豪强擅之則取以富國可也至於農人服田力穡之贏餘上之人為制其輕重時其斂散使不以甚貴甚賤為患乃仁者之用心若諉曰國家不取必為兼并者所取遂斂而不復散而資以富國誤矣臣按天生萬物惟榖於人為最急之物而不可一日無者有之則生無之則死是以自古善為治者莫不重榖三代以前世無不耕之民人無不給之家後世田不井授人不皆農耕者少而食者多天下之人食力者什三四而資糴以食者什七八矣農民無逺慮一有收熟視米榖如糞土變榖以為錢又變錢以為服食日用之需曾未幾時隨即罄盡不幸而有荒年則伐桑棗賣子女流離失所草芽木皮無不食者天下之民莫不皆然而淮北山東為甚臣願朝廷舉李悝平糴之法於此二處各立一常平司每司注戶部屬官三員量地大小借與官錢為本每歲親臨所分屬縣驗其所種之榖麥熟幾分粟熟幾分與夫大小豆之類皆定分數申達戶部因種類之豐荒隨時價之多少收糴在官其所收者不分是何米榖逐月驗其地之所收市之所售粟少則發粟麥少則發麥諸榖俱不收然後盡發之若易朽腐者又在臨時斟酌隨處立倉通融般運分散量時取直凡貨物可用者皆售之不必專取銀與錢也其所得貨物可資國用者其數送官其餘聽從隨時變賣以為糴本臣言儻有可采乞下有司計議先行此二處試其可否由是推之天下州郡可行之處仍乞敕諭奉行之臣俾其體李悝立法之心必使農與人兩不傷豐與歉兩俱足其法雖不盡合於古人是亦足以為今日養民足食之一助也漢宣帝時大司農中丞耿壽昌奏言故事歲漕關東榖四百萬斛以給京師宜糴三輔𢎞農河東上黨太原等郡榖足供京師可以省關中漕卒過半又令邊郡皆築倉以榖賤時增其價而糴貴時减價而糶名曰常平倉司馬光曰常平倉乃三代聖王之遺法非獨李悝耿壽昌能為之也榖賤不傷農榖貴不傷民民賴其食而官取其利法之善者無過於此臣按壽昌於宣帝時上言欲糴三輔及𢎞農等四郡榖以足京師可省關中漕卒至明帝時劉般已謂常平外有利民之名而內實侵刻百姓豪右因緣為姦小民不得其平置之不便考壽昌初立法時兼請立法於邊郡臣愚亦竊以為內地行之不能無弊惟用之邊郡為宜非獨可以為豐荒斂散之法亦因之以足邊郡之食寬內郡之民焉請於遼東宣府大同極邊之處各立一常平司不必専設官惟於戶部屬遣官一二員歲往其處涖其事每歲於收成之候不問是何種榖遇其收獲之時即發官錢收糴貯之於倉榖不必一種惟其賤而收之官不必定價隨其時而豫之其可久留者儲之以實邊城其不可久者隨時以給廪食之人凡諸榖一以粟為則如粟直八百豆直四百則支一石者以二石與之他皆准此然後計邊倉之所有豫行應運邊儲州縣俾其依價收錢以輸於邊如此不獨可以足邊郡而亦可以寬內郡矣由是推之則雖關中鹽糧之法亦可以是而漸有更革焉又見經制之義下倉人條唐都關中土地所入不足以供軍國之用歲不登天子常幸東都以就食𤣥宗時有彭果者獻䇿請行和糴於關中自是京師糧廪溢羡𤣥宗不復幸東都馬端臨曰三代以前京畿千里自甸服百里賦納總至於五百里米而五百里之外皆諸侯國不過任土作貢以輸王府而賦稅米粟則未嘗徴之當時宗廟百官有司與後世不殊然賦稅取之千里之內而自足不聞其責餉運於畿外之諸侯糴米粟於畿內之百姓也然則不能量入為出以制國用雖竭天下之力以奉之多為法以取之秪益見其不足耳德宗時宰相陸贄以關中榖賤請和糴可至百餘萬斛一年和糴之數當轉運之二年一斗轉運之資當和糴之五斗減轉運以實邊存轉運以備時貞元四年詔京兆府於時價外加估和糴差清强官先給價直然後收納續令所司自般運載至太原先是京畿和糴多被抑配或物估踰於時價或先斂而後給直追集停擁百姓苦之及聞是詔皆欣忭樂輸憲宗即位之初有司以歲豐熟請畿內和糴當時府縣配戶督限有稽違則迫蹙鞭撻甚於稅賦號為和糴其實害民白居易曰凡曰和糴則官出錢人出榖兩和商量然後交易今則配戶督限蹙迫鞭撻何名和糴今若令有司出錢開場自糴比時價稍有優饒利之誘人人必情願臣按和糴之法始于唐今若效其法遇米榖狼戾之秋遣官齎錢於豐熟之處開場設法自糴比時價稍有優饒如白居易之言是亦足國之一助也但恐任之不得其人一切委之吏胥配戶督限蹙迫鞭撻則利未必得於國而害己先及於民又不若不糴之為愈也宋太宗淳化三年京畿大穰物價甚賤分遣使臣於京城四門置場增價以糴俟歲饑即減價糶與貧民真宗景德元年內出銀三十萬付河北經度貿易軍糧自兵罷後凡邊州積榖可給三歲即止市糴其後連歲登稔乃令河北河東陜西增糴馬端臨曰古之國用食租衣稅而已毋俟於糴也平糴法始於魏李悝然豐則取之於民歉則捐以濟民凡以為民而已軍國之用未嘗仰此歷代因之自唐始以和糴充他用至于宋而糴遂為軍餉邊儲一大事熙豐而後始有結糴熙寧八年劉佐體量川茶因便結糴寄糴元豐二年王子淵因綱舟利害設寄糴以權輕重俵糴熙寧八年設俵散於民均糴政和元年童貫奏行以人戶家業田土均敷博糴熙寧七年以歲用餘糧聽民博買秋成博糴兌糴熙寧九年詔淮南常平司及時兌糴括糴元符元年章楶括索蓄家量存其一等名何其多也推原其故蓋自真宗仁宗以來西北用兵糧儲闕乏遂以茶鹽貨物召商人入中而姦商黠賈遂至低價估貨高價入粟國家急仰軍儲致有此弊後來懲其弊所以只取之民而不復墮商人之計然至於計其家産而均敷之量其蓄積而括索之甚至或不償其直或强敷其數其為民病又有不可勝言者蓋始也官為商所虧終也民又為官所虧其失一也臣按馬氏此言唐以前所謂糴者聚米以賑民宋以後所謂糴者聚米以養兵所以為民者今日宜行之內郡臣向謂置常平司於遼以東淮以北是也所以為兵者今日宜行之邊郡臣向謂置常平司於遼東大同等處是也伏惟堯舜在上不棄芻蕘之言下有司究竟其可否以聞其於國家儲蓄之計未必無助云神宗用王安石立制置三司條例司言諸路常平廣惠倉斂散未得其宜以見在斛斗遇貴量減市價糶遇賤量增市價糴以見錢依陜西青苗錢例取民情願預給令隨稅納斛斗內有願請本色或納時價價貴願納錢者皆許從便其青苗法以錢貸民春散秋斂取二分息蘇轍曰以錢貸民使出息二分出納之際吏緣為姦法不能禁錢入民手雖良民不免非理費用及其納錢雖富民不免違限如此則鞭笞必用州縣多事矣臣按青苗之法謂苗青在田則貸民以錢使之出息也貸與一百文使出息二十文夏料於正月俵散秋料於五月俵散蓋假周禮泉府國服為息之說雖曰不使富民取民倍息其實欲專其利也昔人謂其所以為民害者三曰徴錢也取息也抑配也條例司初請之時曰隨租納斗斛如以價貴願納錢者聽則是未嘗徴錢曰凡以為民公家無利其入則是未嘗取息曰願給者聽則是未嘗抑配及其施行之際實則不然者建請之初姑為此美言以惑上聽而厭衆論耳夫奄有四海之大億兆之衆所以富國之術義無不可而取舉貸出息之利則是萬乘而為匹夫之事也假令不徴錢不抑配有利而無害尚且不可况無利而有害哉神宗用王安石而行此法其流禍至於民離散而國破敗後世英君碩輔宜鍳宋人覆轍尚其以義為利而毋專利以貽害哉以上市糴之令臣按昔人謂市者商賈之事古之帝王其物貨取之任土作貢而有餘未有國家而市物者也糴者民庶之事古之帝王其米粟取之什一所賦而有餘未有國家而糴粟者也市之說昉於周官泉府糴之說昉於李悝平糴然其初立法也皆所以便民方其滯於民用也則官買之糴之及其適於民用也則官賣之糶之蓋懋遷有無曲為貧民之地初未嘗有一毫征利富國之意焉後世則爭商賈之利利民庶之有矣豈古人立法之初意哉臣愚就二者觀之糴之事猶可為蓋以米粟民食所需雖收於官亦是為民若夫市賈之事乘時貴賤以為斂散則是以人君而為商賈之為矣雖曰摧抑商賈居貨待價之謀然貧吾民也富亦吾民也彼之所有孰非吾之所有哉况物貨居之既多則雖甚乏其價自然不至甚貴也哉大學衍義補卷二十五
