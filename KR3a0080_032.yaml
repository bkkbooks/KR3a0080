body:
  text: 大學衍義補卷三十二明丘濬撰治國平天下之要制國用鬻算之失秦始皇四年令百姓納粟一千石拜爵一級臣按此後世納粟拜爵之始嗚呼爵禄者天子治天下之名器所以馭其臣民而富貴之者也上持富貴之柄以馭下之人使其委身盡命以為吾用以成天下之務以通天下之志以阜天下之財上以承天意下以奠民生中以安君之位者也為君者顧乃倒持其柄以授之民而以其所以為貴之器而博其粟于民以為富是非但失其爵以馭貴之柄而併與其禄以馭富之柄失之矣名器之失自秦政始作俑之尤萬世之下咸歸咎焉漢孝文時鼂錯説上曰欲人務農在于貴粟貴粟之道在于使人以粟為賞罰今慕天下入粟縣官得以拜爵得以除罪所補者三一曰主用足二曰民賦少三曰觀農功爵者上之所擅出于口而無窮粟者人之所種生于地而不乏夫得髙爵與免罪人所之甚欲也使天下入粟于邉以受爵免罪不過三年塞下之粟必多矣臣按鼂錯之言有所見于利而無見于義知其為利而不知其為害何也葢為治必立紀綱立紀綱在明賞罰明賞罰在爵與刑今爵可以粟得刑可以粟免則賞罰不明賞罰不明則紀綱不立紀綱不立則國非其國雖有粟吾得而食諸或曰錯之意在貴粟以勸農夫農人勤生而務本無所俟于爵自不犯于刑其貪爵而犯罪者皆民之逐末者也逐末者以財而易粟輸之縣官以得爵免罪恃有爵以凌暴倚無罪以為姦塞下之粟雖多而國中之姦愈肆是則錯之此議專于利而背義利未必得而害己随之富有四海者裕用足邉之䇿豈無它道而必用此哉後漢靈帝開西邸賣官二千石二千萬四百石四百萬于西園立庫以貯之又私令左右賣公卿公千萬卿五百萬臣按自鼂錯建議之後若景帝武帝成帝安帝雖皆賣爵然多以嵗有荒旱邉有警急用度不足不得已而為之至靈帝則賣爵以為私藏書之史册貽譏千古唐肅宗至徳二年御史鄭叔清奏請勅納錢百千與明經出身不識文字者加三十千臣按自秦漢以來賣官已非令典至唐肅宗乃至賣私第焉嗚呼王嘉有言王者代天爵人尤宜謹之葢以位天位也禄天禄也五服之章天所以命有徳非一人所得私也私之不可鬻之可乎𫝊曰維名與器不可以假人記曰論定然後官之任官然後爵之假之以名器固不可論不定而官之爵之尤不可夫設科取士雖非古典而士大夫由是以進身是即古論秀之法必須論定而後官之者也今不論其所業而論其所輸名曰明經而實則輸錢彼粗知文墨者猶之可也而不識文字者亦與焉其取用無藝一至于此哉宋孝宗詔曰鬻爵非古制也理財有道均節財用足矣妄輕官爵以益貨財朕甚不取自令除歉嵗民願入粟賑饑有裕于衆聽取㫖補官其餘一切住罷見在綾紙告身繳赴尚書省毁抹臣按孝宗此詔謂自今除歉嵗民願入粟賑饑聽取㫖補官其餘一切住罷則是非歉嵗不行非民願不强臨時取㫖不為定例今則著為定例不問嵗之歉否不顧民之願否遇有意外興作既知其不可取之常賦又不敢請之内帑首以鬻官為上䇿嗚呼以古人馭世治民之器而為博易錢榖之舉識治體者不為也我祖宗以來最重名器内外官年未七十致仕者不與冠帶犯贓私者除名為民當是之時民以官爵為貴冠帶為榮其所以榮貴之者以有錢不能買故也近世司國計者取具目前而建為納粟賜冠帶之令後又加以散官所幸者尚不至如前代賣見任官耳且國家無甚警急雖少有虧欠然猶未至于甚不得已也乃因有所營造興舉財未匱而逆計之荒未至而豫備之而為此一切不得已之䇿然行之既非其義而守之又不以信方其賣之之時惟恐民之不售也而强與之既與之後而又多方折辱之百計科率之遂使民之視冠帶也如桎梏然寧出粟也而不肯受官噫此等之事非至於甚不得已不可行也盍反思曰今吾于可以己之時而遽行之行之而又失信于人一旦馴致于不得已之地吾又將行何䇿而賣與何人哉小人茍顧目前不為逺慮凡有建請非甚不得已者宜痛裁之萬一至于甚不得已人皆可與也惟犯贓官吏决不可焉何也彼為貪財而失其冠帶上之人又貪其財而與之是則上下交為利矣又何責彼為哉以上鬻官唐𤣥宗天寳未安禄山反楊國忠遣御史崔衆至太原納錢度僧尼道士旬日得百萬緡臣按此後世鬻僧道之始穆宗時李徳裕言初徐徳興為壇泗洲募人為僧以資上福人輸錢三千淮右小民規影徭賦失丁男六十萬不為細變臣按民之為僧何預于君而小人乃以度僧為資上福殊不思天以好生為徳度民為僧是閼絶天地生生之仁豈天所好哉致一人于死地尚足以感傷天地而有以召災矧絶六十萬人之生意其召災又何如哉以是為求福臣不信也宋神宗熈寧元年錢公輔言祠部遇嵗饑河決鬻度牒以佐一時之急自今宫禁恩賜度牒裁減稍去剃度之冗是年因公輔始賣度牒臣按前此雖鬻僧未有牒也賣度牒始于此神宗問王安石曰程顥言不可賣度牒為常平本如何安石曰今度牒所得可置粟凡四十五萬石若㓙年人貨三石則可全十五萬人性命臣按天子以天下為家四海為富佛教未入中國之前民未為僧官未賣度牒未嘗無邉事無荒年未聞其有乏用度者王安石自以孔孟負其學以堯舜待其君乃欲假度僧之法以活民之性命臣不知其何見也熈寧二年賜五百道度牒付陜西宣撫司易見錢糴榖七年又給五百道付河東運司修城髙宗紹興七年有言欲多賣度牒者高宗曰一度牒所得不過三百千一人為僧則一夫不耕其所失豈止一度牒之利若住數年其徒當自少矣臣按佛入中國千有餘年世之英君鉅儒非不欲去之但習俗已成深固盤結終無可去之期唐宋以來有度僧之令至熈寧中始為牒以鬻之宋高宗曰一人為僧則一夫不耕臣竊以為一夫不耕則國家失一人之用非但吾不得其人一身之用而吾之子孫亦併不得其子若孫用焉誠反而思之曰此輩可終去乎若有可去之幾禁而絶之上也若度不能禁與其縱之孰若取其身庸而後度之猶為愈也伏讀律文有曰僧道不給度牒私自簮剃者杖八十若由家長家長當罪住持及受業師私度者與同罪竝還俗臣有愚見請今後有欲為僧道者許與所在官司具告行勘别無違礙量地方逺近俗尚緩急俾出闗給度牒路費錢収貯在官造冊繳部該部為之奏聞給牒發下所司遇祝聖之日行禮畢府州正佐親臨寺觀依其教法當衆簮剃畢然後給牒若有不待給牒擅自簮剃者依律問罪及罪其主令之人其給度也府不過四十人州不過三十人縣不過二十人非闕不補如此則國家雖不得其身力之用而得其傭錢以代其役既得其錢嵗終或解京或留州以為賑濟饑荒惠養孤老及脩造橋梁之用如此則僧道少而人知自重既無所損于其教而彼之得度也免䟦渉之勞道途之費彼亦樂為之矣若此者雖非聖人中正之道然勢至于此無如之何與其任彼所為不若有所節制失之于彼而得之于此猶為彼善于此也以上鬻僧漢武帝元狩四年初算緡錢匿不自占占不悉戍邉一嵗沒入緡錢有能告者以其半畀之臣按此漢以來征榷居貨之始古者闗市之征葢惡其專利就征其税非隱度其所居積之多少而取之也武帝于元光初既算其行者之舟車至是又用公卿言凡居貨者各隱度其財物之多少于啇賈末作率計有緡錢二千者出一算于手力所作者率計有緡錢四千者出一算嗚呼出諸途者既正其齎載之具藏諸家者又算其儲積之物取民之盡一至此哉武帝元光中始算啇車至是又算民􅊑臣按算啇之車已為無名而又算民之車與􅊑凡民不為吏不為三老騎士茍有輕車皆出一算啇賈則倍之􅊑五丈以上出一算嗚呼緡錢之法初為啇賈設也至其後乃算及民之舟車遂使告緡者遍天下則凡民有蓄積者皆為有司所隱度矣不但啇賈末作也嗚呼取民之財而至于如此民何以為生哉以上告緡唐肅宗即位時兩京䧟没民物耗弊乃籍江淮富商右族貲蓄十収其二謂之率貸徳宗時國用不給借富啇錢約罷兵乃償之搜督甚峻民有自經死者臣按唐行率貨及借錢令以萬乗之君而借貨于民已為可醜况又名曰借貨其實奪之又可醜之甚也人君其尚制節謹度毋使國家之貧至于如此史冊書之貽醜萬世哉以上借貨徳宗時軍用不給乃税間架算除陌錢臣按民房屋有税及官用省錢始此所謂税間架者毎屋兩架為間計間税錢除陌錢者凡公私給與及買賣每錢一緡官除五十錢嗚呼為國而啇算至此可謂無策矣此算間架除陌錢宋太祖開寳三年令樸買坊務者収扺當臣按樸買之名始見于此所謂樸買者通計坊務該得税錢總數俾啇先出錢與官買之然後聼其自行取税以為償也元初亦有此法有以銀五十萬兩樸買天下差發者有以銀五萬兩檏買燕京酒課者有以銀一百萬兩樸買天下河泊橋梁渡口者耶律楚材曰此皆姦人欺上㒺下為害甚大咸奏罷之此樸買宋神宗元豐中王安石行新法既鬻坊場河渡又并祠廟鬻之募人承買哲宗元祐中劉摯言坊場舊法買户相承皆有定額請罷實封之法酌取其中定為永額召人承買臣按所謂承買者凡有坊場河渡去處先募人入錢于官承買然後聽其自行収税以償之也墟市之聚集既買之津渡之往來又買之甚至神祠之祭賽亦買之為國牟利之𤨏𤨏至于如此虐民慢神不亦甚哉此言承買宋元祐五年御史中丞傅堯俞言監司以今嵗蠶麥竝熟催督積年逋負百姓必不能用一熟之力了積年之欠且令帶納一料侯秋成更令帶納臣按民間耕蠶一年之収僅足以供一年之賦有所逋負積壓既多有非一熟所能償了堯俞所建帶納之説是誠有司追徴逋負之良法知杭州蘇軾言朝廷恩貸指揮多被有司巧為艱閡故四方皆有黄紙放白紙取之語雖民知其實止怨有司然陛下未嘗峻發徳音戒飭大臣令盡理推行臣按軾他日又言今民荷寛政無他疾苦但為積欠所壓如負千鈞而行免于僵仆則幸矣何暇舉首奮臂以營求于一飽之外哉自祖宗以來每有赦令必曰凡欠官物無侵欺盗用及雖有侵用而本家及伍保人無家業者竝與除放祖宗非不知官物失陷姦民幸免之弊特以民既乏竭無以為生雖加鞭撻終無所得緩之則為姦吏之所蠶食急之則為盗賊之所慿藉故舉而放之則天下悦服雖有水旱盜賊民不思亂此為損虚名而收實利也軾之此言足盡百姓逋負之利害伏望聖明于凡徳音之布凖此以施行天下窮民不勝之幸孝宗時朱熹上封事伏見祖宗舊法凡州縣催理官物已及九分已上謂之破分諸司即行住催版曹亦置不問由是州縣得其贏餘以相補助貧民有所拖欠亦得遷延以待蠲放恩自朝廷惠及閭里此誠不刋之令典也臣按宋朝催理破分之法後世亦可遵行以上追理徽宗宣和末陳亨伯以發運兼經制使利用諸司財計而以經制為名紹興初孟庾提領措置財用又因經制之額増析而為經總制錢臣按葉適言維揚駐蹕國用益困吕頥浩葉夢得實總財事四顧無䇿于是議用陳亨伯所収經制錢者其説以為征啇雖重未有能强之而使販賣酒雖貴未有能强之而使飲若頭子之類特取于州縣之餘而可供猝廹之用夢得士人而其言如此葢辨目前不暇及逺亦不足怪也由是言之則宋所謂經總制錢葢出于不得已而為一時權宜之計當是時也所謂强敵壓境歲有荐食吞噬之謀翠華南廵未知税駕息肩之所兵屯日盛将帥擅命而却敵之功無嵗無之固非計財惜費之時何暇為寛征薄歛之事所惜者和好之後遂因仍用之而不能除以為一時生民之害耳後世人主茍未至猝廹無措之時決不可行此等事光宗時趙汝愚言諸縣措諸月摏錢其間名色類多違法最為細民之害試舉其大者則有曰麴引錢曰納醋錢賣紙錢户長甲帖錢保正牌限錢折納牛皮筋角錢兩訟不勝則有罰錢既勝則令納歡喜錢殊名異目在處非一臣按自古取民之財之多無如宋朝者天下税務酒務無處無之且如成都一府税務二十一處酒務三十五處其歳額皆四十萬以上然此大郡也若夫中郡如鳯翔者税務亦十有五酒務亦二十有五當世之民何以堪哉至於南渡之後又有所謂經縂制錢月樁之類所謂月樁者其取之尤為無謂其間殊名異目皆是于常賦之外經制之餘巧生别計然皆當時權宜不得已而為之事已世殊悉皆革罷惟所謂罰訟者之錢今世藩憲郡邑猶藉此以為攫取之計朝廷雖有明禁視之以為虚文夫家人之為此為公也今世之為此假公以營私也乞峻發徳音著為常憲分文以上皆准以枉法之贓庶幾革官吏貪墨之風厲士夫亷隅之節此經總制月樁錢以上論鬻算之失大學衍義補卷三十二
