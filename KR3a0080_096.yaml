body:
  text: 大學衍義補卷九十六明丘濬撰治國平天下之要備規制寳玉之噐書輯斂也五瑞信也既月乃日覲四岳羣牧班瑞於羣后朱熹曰公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧五等諸侯執之以合符於天子而驗其信否也臣按物質之美而貴者莫如玉故天子而下皆執之盖以至貴之人而執至美之物天子則以是而致敬於天諸侯則用是而盡誠於天子也禹貢揚州厥貢瑤琨梁州厥貢璆雍州厥貢惟球琳琅玕蔡沈曰瑤琨玉石名詩曰何以舟之維玉及瑤琨説文云石之美似玉者取之可以為禮噐璆玉磬也球琳美玉也琅玕石之似珠者爾雅曰西北之美者有崑崙虛之球琳琅玕臣按玉之為物自古中國所在有之觀諸山海經可見矣在堯舜之世已用為圭璧禹貢之時揚梁雍三州所貢已有玉石在戰國時卞和所獻之玉出於荆山漢之時關中之藍田幽州之玉田皆有玉焉是時西域未通於中國也今中國未聞有出玉之處而所用之玉皆自於闐國來於闐之玉有白𤣥緑三種皆出於河亦與古人所謂玉藴石而山輝者異是則中國之玉出於石而必用斲外夷之玉生於水而必用撈也豈古今土地生物有不同歟抑玉乃土石之精粹者其生也有限而取之也有盡耶况古人以玉比德無故不去其身用以為噐用雜佩之類不一而足是以制字者如瓊瑤瑄璟之類踰二百則玉在古多而為用夥可知矣今世閭閻小民有不識玉者何古如彼之多而今如此之少耶由是推之漢之金以斤計而每以萬為言唐則以兩計而比於漢者少而宋又少於唐今日又少於宋無乃數千年之後中國之金殆將與玉同耶為世道逺慮者不可不為之限節也詩鄘風君子偕老曰副祭服首飾笄六珈以玉加於笄為飾臣按先儒謂副祭服之首飾編髮為之笄衡笄也垂於副之兩旁當耳其下以紞懸瑱衡笄以玉為之今之簪也紞織如絛上屬於衡瑱以玉為之以纊縛之而屬於紞懸之當耳似今之珥也衛風淇奥曰充耳琇瑩朱熹曰充耳瑱也琇瑩美石也天子玉瑱諸侯以石鄭風之女曰鷄鳴曰雜佩以贈之朱熹曰雜佩者左右佩玉也上横曰珩下繫三組貫以蠙珠中組之半貫一大珠曰瑀末懸一玉兩端皆鋭曰衝牙兩旁組半各懸一玉長博而方曰琚其末各懸一玉如半璧而内向曰璜又以兩組貫珠上繫珩兩端下交貫於瑀而下繫兩璜行則衝牙觸璜而有聲也齊風之著曰尚之以瓊華乎而尚之以瓊瑩乎而尚之以瓊英乎而朱熹曰瓊華美石似玉者即所以為瑱也瓊瑩瓊英亦皆美石似玉者秦風之渭陽曰何以贈之瓊瑰玉佩孔頴達曰瓊者玉之美名非玉名也瑰者美石之名小雅之采芑曰朱芾斯皇有瑲葱珩朱熹曰瑲玉聲葱蒼色如葱者也珩佩首横玉也禮三命赤芾葱珩斯干曰乃生男子載弄之璋朱熹曰半圭曰璋大東曰鞙鞙長貌佩璲鄭𤣥曰佩璲者以瑞玉為佩大雅之棫樸曰濟濟辟王左右奉璋奉璋峩峩又曰追琢其章金玉其相朱熹曰祭祀之禮王祼以圭瓚諸臣助之亞祼以璋瓚左右奉之其判在内亦有趣向之意峩峩盛壯也追雕也金曰雕玉曰琢旱麓曰瑟縝密貌彼玉瓚黄流在中朱熹曰玉瓚圭瓚也以圭為柄黄金為勺青金為外而朱其中也黄流鬱鬯也釀秬黍為酒築鬱金煮而和之使芬芳條鬯以瓚酌而禮之也韓奕曰韓侯入覲以其介圭朱熹曰介圭封圭執之為贄以合瑞於王也江漢曰釐爾圭瓚秬鬯一卣朱熹曰釐賜卣尊也商頌之長發曰受小球大球鄭𤣥曰小球鎮圭尺有二寸大球大圭三尺也皆天子之所執也臣按以上皆三百篇詩中所言及玉者大抵先王之世所用以為首飾佩服祭器貢贄者皆玉也後世乃舎中國比德之玉而寶逺夷無用之石以為用甚至傾帑藏以易之此何見也周禮天官玉府掌王之金玉玩好共王之服玉佩玉珠玉王齊則共食玉大喪共含玉若合諸侯則共珠槃玉敦凡王之獻金玉受而藏之呉澂曰金玉人所寶者服玉大圭之類佩玉珩璜之類珠玉則琢玉為珠以飾冠冕也食玉所以養至陽之氣含玉所以為死者口實合諸侯謂諸侯會同則為壇三成割牛耳取血以㰱之珠槃所以盛耳玉敦所以盛血臣按玉之為玉古先帝王必以之為服佩之用者以其色有黄白黒蒼之辨其聲有角徵宫羽之應其象有仁義禮樂道德忠信之備春官大宗伯以玉作六瑞以等猶齊等也邦國王執鎮安鎮四方圭公執桓柱也圭侯執信圭伯執躬圭子執榖璧男執蒲璧劉彞曰舜受堯禪執天下之大圭而陟帝位始受天下之朝則輯五瑞既月乃日覲四岳班瑞於羣后是玉作六瑞古已有矣臣按此即舜典所謂輯五瑞者盖自帝世已有之矣先儒謂六瑞之制其形有圭之鋭璧之圓以象天之體用其名有鎮桓信躬榖蒲以别君德之隆殺信躬之名則取諸身而象之也鎮桓榖蒲之名則取諸物而象之也古人制噐莫不各有取象矧此乃天子所以合信於諸侯者乎以玉作六噐以禮天地四方以蒼璧禮天以黄琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方皆有牲幣各放其噐之色呉澂曰禮神者始告神時薦於神坐也薦之在於作樂迎神之後鄭氏云先奏是樂以致其神禮之以玉而祼焉是也蒼璧禮天蒼象天之色圓象天之形黄琮禮地黄象地之色琮八方亦象地其制每角各刻出一寸長六寸厚八寸青圭禮東方圭制上左右各半寸其鋭以象春物初生長九寸厚一寸博三寸禮東方以立春赤璋禮南方半圭曰璋夏者隂陽各居其半故用璋禮南方以立夏白琥禮西方以玉長九寸廣五寸刻狀虎形髙三寸禮西方以立秋𤣥璜禮北方半璧曰璜冬者隂陽亦居其半故用璜禮北方以立冬六玉各象其方色而牲幣又象六玉之色臣按先儒謂玉者純陽之精氣而聖人之至寶也將禮於天地四方而無以歸其誠乃以玉作六噐既象天地四方之色又擬其形以琢之而柴槱禋燎埋瘞之所以答神之降饗也後世惟祀天地有琮璧而於其他之祭則無焉豈非缺典乎天府掌祖廟之守藏與其禁令凡國之玉鎮大寶噐藏焉鄭𤣥曰祖廟始祖之廟其寶物世傳守之若魯寶玉大弓者玉鎮大寶噐玉瑞玉噐之美者王昭禹曰左傳曰諸侯之封皆受明噐於王室以鎮撫其社稷則所謂玉鎮者美玉之可以為鎮者也記曰崇鼎貫鼎大璜封父龜天子之噐也所謂大寶噐者亦類此鄭景望曰大喪大祭則出而陳之胡安定曰告終易代陳列先王所寶非直為美觀也以見傳及其身能全而歸之也夫以一噐一物傳於先王者猶謹如此况神噐之大者乎湯有典寶之作其以祖宗之物所當常寶而無德則失亦不可常乎是義也於周顧命尤詳臣按周禮天府所藏即顧命之所陳者也中庸所謂陳其宗噐即此所謂國之玉鎮大寶噐即書所謂越玉五重也是五重者即先世所傳之重寶曰𢎞璧曰琬琰曰大玉曰夷玉曰天球是之謂五玉𢎞璧大璧也琬琰圭也大玉華山之玉夷玉東夷之玉天球鳴球也是皆國之重鎮大寶而為子孫者所當謹守以為傳世之寶以鎮國家以貽雲仍不可失墜焉者也典瑞掌玉瑞玉噐之藏辨其名名以命之物物以色之與其用事朝日祭祀之時設其服飾繅藉之類王晉揷也大圭朴素無文執鎮圭瑑四鎮之山繅織組為藻藉飾以藉玉五采五色五就一半為一就以朝日春分半日公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇會同於王諸侯相見亦如之瑑刻上圭剡上璋半圭璧璧圓琮半璧繅皆二采一就以覜聘四圭有邸圭出於四旁以祀天旅上帝兩圭有邸出於兩旁以祀地旅四望祼圭有瓚以肆先王以祼賔客圭璧圭其邸為璧以祀日月星辰璋邸射邸托於琮貫而射之以祀山川以造贈賔客土圭以致四時日月封國則以土地珍當為鎮圭以徴守以恤凶荒牙璋瑑為齒牙以起軍旅以治兵守璧羨以起度鄭𤣥曰人執以見曰瑞禮神曰噐臣按先儒謂璧羨以起度者古人之度在樂則起於黄鍾在禮則起於璧羨璧之圓凡九寸以其旁之一寸而羨其上下則横徑八寸而袤十寸以十寸之尺而起度則十尺為丈十丈為引以八寸之尺而起度則八尺為尋倍尋為常使度或不存天下後世因璧羨而可考則王者之五度信矣由是觀之則先王命典瑞之職掌玉瑞玉噐之藏非但備物以為當世之用而又制噐以垂後世之則三代盛時禮樂之用備於上禮樂之化孚於下非但掌之者有其人而製之者亦有其則詩所謂雖無老成人尚有典刑亦此類歟玉人之事鎮圭取鎮安四方之義尺有二寸天子守之命圭九寸謂之桓圭取强直有立之義公守之命圭七寸謂之信伸也圭取尊而不屈之義侯守之命圭七寸謂之躬圭取卑而不伸之義伯守之天子執冒取覆冒之義四寸以朝諸侯天子用全絲色上公用龍侯用瓚伯用將以玉飾其柄繼子男執皮帛天子圭中必與縪同四圭尺有二寸以祀天大圭長三尺杼殺也上終葵椎也首天子服之土圭尺有五寸以致日以土地祼圭尺有二寸有瓚以祀廟琬圭九寸而繅以象徳琰圭九寸判規以除慝以易行璧羨度尺用以起度好璧孔也三寸以為度鄭𤣥曰天子名玉曰冒者言德能覆盖天下也全純色臣按玉人之所造即典瑞之所掌也然其間亦有詳畧多寡同異者互相備也不然其有缺文逸簡歟抑觀成周之世所以為玉瑞玉噐者無非為祭神行禮致四時贈賔客䘏凶荒起軍旅而作後世所以造作者多以為服飾玩好甚者以為戲具求其為禮而作者盖鮮矣夫以古人比德之玉所以事天享帝之具而用以為䙝玩於床第之間其不恭甚矣禮記曲禮玉曰嘉玉陳澔曰無瑕之玉也臣按禮神以玉取其清潔無瑕也玉之為玉或以為璧或以為琮或圭以青或璋以白或赤而為虎形或𤣥而為半璧或兩圭而有邸或四圭而有邸茍有瑕而不純則非全矣故必純而全然後謂之嘉焉嘉者美也然是玉也或焚焉或藏焉考周禮鄭氏註謂禋祀禋煙也為五幣祭祀焚之作煙以報陽也此焚玉之證也天府若當祭祀訖事而藏之此收玉之證也是何也盖用玉於神有禮神者有祀神者禮神者訖事即收祀神者與牲俱燎也若夫郊特牲所謂圭璋則用圭璋以盛鬯用其氣臭而已玉藻天子搢揷也珽方正於天下也諸侯荼前詘後直讓於天子也大夫前詘後詘無所不讓也陳澔曰珽亦笏也即玉人所謂大圭長三尺者是也以其挺然無所詘故謂之珽盖以端方正直之道示天下也荼者舒遲之義前有所畏則其進舒遲諸侯之笏前詘者圓殺其首也後直者下角正方也以其讓於天子故殺其上也大夫上有天子下有己君故笏之下角亦殺而圜示無所不讓也笏天子以球玉諸侯以象大夫以魚須文竹士竹本象可也鄭𤣥曰球美玉也文猶飾也大夫士飾竹以為笏不敢與君竝用純物也孔頴達曰魚須文竹謂以鮫須文飾其竹也士以竹為本質以象牙飾其邉縁可者通許之辭臣按以上圭笏之制惟天子得用玉諸侯則用象大夫士皆用竹但用魚須及象文飾之今制則五品以上用象六品以下皆用槐木簡古之君子必佩玉右徵角左宫羽陳澔曰徵角宮羽以玉聲所中言也徵為事角為民故在右右為動作之方也宮為君羽為物君道宜靜物道宜積故在左左乃無事之方也不言商者或以西方肅殺之音故遺之歟方慤曰徵角為陽宮羽為隂陽主動隂主靜右佩隂也而聲中徵角之動左佩陽也而聲中宮羽之靜何哉盖佩所以為行止之節時止則止時行則行此設備之意也臣按佩之制見於詩雜佩其制有琚瑀珩璜衝牙五者其所以為聲者在兩璜與衝牙相觸撃行動之際鏘然以鳴在右者必中徵角在左者必中宮羽古之玉人所以製造之者必有其度然後能使聲之所中協於角徵宮羽之音其大小厚薄必有等差惜後世之無傳也今制朝祭服皆有制三品以上用玉四品以下藥玉近乃有鑄銅為之者殊失古制盖玉之中商聲者以其有肅殺之聲尚不可用况用金聲乎切宜禁革凡帯必用佩玉惟喪否佩玉有衝牙君子無故玉不去身君子於玉比德焉賈公彦曰所觸之玉其形似牙故曰衝牙聘義夫昔者君子比德於玉焉温潤而澤仁也縝緻也密以栗堅貌知也亷而不劌傷也義也垂之如墜禮也叩之其聲清越猶揚也以長其終詘絶止貌然樂也瑕玉病也不揜瑜玉中美者瑜不揜瑕忠也孚尹旁達信也氣如白虹天也精神見於山川地也珪璋特達德也天下莫不貴者道也賈公彦曰珪璋特達謂行聘之時惟執圭璋特得通達不加飾弊也馬睎孟曰古人用玉皆象其美若鎮圭以召諸侯以恤凶荒用其仁也齊有食玉用其智也牙璋以起軍旅用其義也國君相見以瑞相享以璧用其禮也樂有鳴球服有佩玉用其樂也邦國玉節用其信也琬以結好琰以除慝用其忠也兩圭祀地黄琮禮地用其能達於地也四圭祀天蒼璧禮天用其能達於天也圭璋特達用其能達於德也已聘而還圭璋已朝而班瑞此皆古之為噐而用玉之美者也古之善比君子於玉者曰言念君子温其如玉曰追琢其章金玉其相曰如圭如璧曰有美玉於斯韞匵而藏諸曰玉振終條理曰瑾瑜匿瑕曰如玉如瑩爰變丹青此古人比君子於玉者也臣按玉者天下莫不貴君子之德似之是以君子無故玉不去身右徵角左宮羽於玉比德盖求所以稱夫仁義知禮樂忠信之德而比之於玉也春秋定公八年盜竊寶玉大弓九年得寶玉大弓胡安國曰榖梁子曰寶玉封圭大弓武王之戎弓周公受賜藏之魯或曰夏后氏之璜封父之繁弱也子孫世守㒺敢失墜以昭先祖之德存肅敬之心耳古者告終易代𢎞璧琬琰天球夷玉兑之戈和之弓垂之竹矢莫不陳列非直為美觀也先王所寶傳及其身能全而歸之則可以免矣魯失其政陪臣擅權雖先公分噐猶不能守而盜得竊諸公宮其能國乎故失之書得之書所以譏公與執政之臣見不恭之大也此義行則有天下國家者各知所守之職不敢忽矣臣按人君於先代所藏之重噐手澤之所存心神之所寓有事於宗廟則陳之以示其能守臨終而顧命則列之以見其全歸非細故小事也中庸以此表繼述之能孝周書以此見傳守之不失為人子孫踐祖宗之位守祖宗之業而不能守祖宗之遺物豈得為孝乎唐𤣥宗天寶十載詔曰禮神以玉取其精潔温潤今有司竝用珉自今禮神六噐宗廟奠玉竝用真玉諸祀用珉如玉難得大者寜小其制度以取其真臣按祀神當以誠以偽代真則非誠矣肅宗寶應元年楚州言尼真如恍惚登天見上帝賜以寶玉十三枚云中國有災以此鎮之羣臣賀表范祖禹曰堯命重黎絶地天通盖惡巫覡矯妄而誣天㒺民也後世主昏於上民迷於下黷亂天地無所不有肅宗父子不相信妖由人興故姦偽得以惑之獲寶不一月而二帝崩吉凶之騐亦可覩矣臣按妖人假物以售其姦偽明理之君必不為所惑何也盖寶玉之物皆生於地何由而上於天所以琢磨而雕刻成噐者非人力不能為也天者氣而已矣所能生者渾然之質而不能成竒巧之形以是折之則妖人無所容其偽矣元世祖至元二十二年遣使徃馬八國求竒寶臣按自古中國所謂寶者必可以為禮神之噐必可以為佩服之用必可以為噐用之飾上可以鎮國家下可以詒後𦙍非徒用以為觀翫戲弄而已也元人之所謂寳者則異於是史傳之所不載前代之所無有形不如珠之圓瑩色不如玉之温潤質不如金之從革蓋與砂礫無異焉烏足以為寳哉大學衍義補卷九十六
