body:
  text: 大學衍義補卷一百十九明丘濬撰治國平天下之要嚴武備京輔之屯禹貢五百里甸服蔡沈曰甸服畿內之地也五百里者王城之外四面皆五百里也臣按傳謂王城之外四面皆五百里則是方千里矣漢志周因井田而制軍賦地方一里為井井十為通通十為成成十為終終十為同同十為封封十為畿天子之畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘章氏失其名曰王畿千里近郊五十里逺郊百里郊為鄉六鄉百里通十為同同為百里者十提封九萬井九十萬夫之地除山川城邑之屬三萬六千井地除公田九分之一為五十萬二千夫又以一易再易三易通之三分去一為三十五萬四百夫率三百五十家賦一乘積六鄉為千乘而餘率七家賦一兵積六鄉為七萬五千人此六軍之制也六遂及三等侯國皆如鄉之法畿方千里為千里者十如鄉之除為三百五十萬四千夫賦車千乘卒七十五萬人為六軍者十此通畿之師也大司徒遞而征之十年而役一遍凡三家可任者率十有一人則終身無過一再給公上事蓋先王忠厚之志更勞均逸不欲窮民之力也古者畿內之兵不出所以重內也卒有四方之役即用諸侯入耳或遣上公帥王賦亦不過元戎十乘以先啓行也臣按古者兵出於農天子之兵出於六軍六軍之兵出於六鄉其出而為士卒旅軍師者即其居而為比閭黨旅州鄉者也甸服千里之間其所賦之兵而所出之稅自足以給之無勞逺餫內足以衛王室而外足以鎮壓天下之大四夷之逺非若後世簽軍於逺方則人不土著而易於消耗列軍以長屯則人無别業而難於供億後世有志於三代之盛者壯根本安國家以為千萬世不拔之基者尚有考於斯漢百官表中尉秦官掌徼巡京師武帝更名執金吾易祓曰南軍以衛宫城而乃調之於郡國北軍以護京城而乃調之三輔抑何輕重逺近之不倫歟蓋郡國去京師為甚逺民情無所適莫而緩急為可恃故以之衛宫城三輔距京師為甚邇民情有閭里墳墓族屬之愛而利害必不相棄故以之護京城其防微杜漸之意深矣臣按史謂北軍中尉主之掌京城門內之兵軍而謂之北對南言也南軍衛宫取之郡國北軍衛京取之三輔説者有防微杜漸之意臣竊以為衛京之兵取之近輔極是臣於軍旅之制條已節約漢唐遺意妄為朝廷處置矣若夫衛宫而取郡國之兵恐未為得策夫以疏外之兵無鄉土親屬之顧戀而使之畨上執戟以衛王宫無事則已一有事焉安能保其無外顧之心乎我朝宿衛之兵用世將以統士卒其慮深而逺矣漢百官表左右京輔都尉尉丞兵卒皆屬中尉易祓曰北軍畨上與南軍等南軍衛士調之郡國而北軍兵卒調之左右京輔夫中尉乃天子北軍之統帥而其屬乃左右京輔都尉等其所調亦左右京輔之兵卒何也左即扶風右即馮翊京即京兆謂之三輔三輔之委寄固重於郡國矣而所領兵事則非郡國之比蓋漢太守謂之郡將兼領武事都尉掌佐守典武職在王國則相比郡守中尉比都尉皆掌兵之任若三輔則異是矣夾輔京國錯列畿甸其勢為甚逼則兵權為甚重故都尉尉丞兵卒不屬郡卒而特屬中尉之北軍其畨上亦然何以明之黃霸尹京兆發騎士詣北軍以馬不適士劾乏軍興連貶秩則知左右京輔兵卒皆畨上北軍而屬中尉也臣按此所謂都尉乃京輔之都尉也與主南軍都尉者不同唐初始置軍府以驃騎車騎兩將軍府領之析關中為十二道皆置府三年更以道為軍置將副各一人以督耕戰以車騎府統之六年廢十二軍改驃騎曰統軍車騎曰别將居歲餘十二軍復而軍置將軍一人軍有坊置主一人以檢察戶口勸課農桑太宗更號統軍為折衝都尉别將為果毅都尉總曰折衝府凡天下十道置府六百三十四皆有名號而關內二百六十有一皆以隸諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曹别將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長火備六馱馬凡火具烏布幕鐡馬盂布槽鍤钁鑿碓筐斧鉗鋸皆一甲牀二鎌二隊具火鑽一胸馬繩一首羈足絆皆三人具弓一矢三十胡祿橫刀礪石大觽氊帽氊裝行縢皆一麥飯九斗米二斗皆自備並其介胄戎具藏於庫有所征行則視其入而出給之其畨上宿衛者惟給弓矢橫刀而已凡民年二十為兵六十而免其能騎而射者為越騎其餘為步兵其隸於衛也左右衛皆領六十府諸衛領五十至四十其餘以𨽻東宫六率凡發府兵皆下符契州刺史與折衝勘契乃發若全府發則折衝都尉以下皆行不盡則果毅行少則别將行當給馬者官豫其直市之林駉曰漢之畿兵始為畨上至其後也畨上變為長屯長屯變而逺征而畿兵之制壞矣唐之畿兵始為府衛至其後也府衛變為長從長從變為禁軍而畿兵之制壞矣此漢唐內兵三變之由也臣按三代以下之兵制惟唐府兵最為近古臣既略倣其制一制二具於軍伍之制條下而此復詳其制如此以見京畿之屯莫良於府兵也然一代有一代之制祖宗所行者子孫不可輕改要必不違時王之制不拂斯民之情而又不失古人之意然後議之者無罪而行之者可久而無弊也仰惟國家建國于燕兵強馬健之地誠不以臣卑而愚而棄其言則杜牧所謂天下之大命者端在於此矣况唐人行之至百年而中變而吾之為此乃於百年之後始創行之而凡其平日軍衛之屯守有司之管領一切如舊而於其間減去徭役征科乃民心之所願欲者也伏惟聖明留神審察所以為聖子神孫立萬年不拔之基者未必不在兹焉宋徽宗熙寧四年於京畿四面置輔郡以頴昌為南輔以襄邑縣建名輔州為東輔鄭州為西輔澶州為北輔詔四輔屏翰京師兵力不可偏重可各以二萬人為額臣按自古建都者皆於四近之地立為輔郡所以為京師屏翰也漢以京兆左馮翊右扶風為三輔唐亦以華州同州鳯翔為輔而宋初未遑建立至於徽宗時亦於畿郡立為四輔焉每輔則屯兵二萬人為額我朝建國江南於鳯陽屯重兵凡京師軍皆散於江北滁和等處為屯田雖不名輔而儼然有蕃屏之意太宗皇帝自北平入正大統遂建都於此其初猶以行在為名而立一行部以總之其後遍立五府六部大小衙門如舊制凡京衛之兵皆分其半以來并起江南富民以實之而去其行在之名則是萬萬年不拔之基永定於此矣然而畿甸之間猶未有輔郡蓋有待也臣按漢唐宋之輔郡皆因郡治而立今日之建置則以形勝要害為固蓋漢唐都長安宋都汴梁皆去邉地遼逺非若我朝都燕則自以都城為北邉捍蔽北最近而東次之西又次之而南為最逺焉請如漢唐宋故事立為輔郡以宣府為北輔因其舊而加以蕃守之軍俾守國之北門其東也以永平為輔以守松亭一帶關隘及扼遼在要害其西也以易州為輔或真定以守紫荆一帶關隘其南則以臨清為輔坐鎮閘河而總扼河南山東之衝又自此而南屯兵于徐州以通兩京之咽喉每處屯重兵一二萬量其輕重緩急以多寡其數罷兩直隸河南山東上京操備班軍因近屯守以為京師之屏蔽遇京師有事則調發焉夫自古為國者必固外以蔽內居重以馭輕譬則人之家居必有藩籬墻壁然後堂室堅固內呼而外應若設關捩然有所動於中而四面之機畢應之然後盜之利吾財者不敢輕侵犯焉近年以來起調兩直隸河南山東軍赴京上班操備半年一替方其新班既起而舊班未回城池雖設而隊伍空缺者有之幸而無事則已萬一有不逞之徒乘虛為亂將何以支持之倘立為輔郡因近屯守則軍士遂室家之願而生息日蕃國家省轉輸之勞而調發易集邉方足備禦之具而關隘有守如此則都城鞏固宗社尊安矣萬一臣言可采見之施行其於國計不為無補以上京輔之屯嚴武備郡國之守周制大國三軍次國二軍小國一軍臣按封建以前之國即秦漢以來之郡名制雖異而其實則同一同百里提封萬井除山川沈斥水田濕鹵也城池邑居園囿街路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國臣按周制百乘之家即秦漢以來之一縣千乘之國即秦漢以來之一郡五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧臣按此周人連帥州牧之設蓋以小大相維階級相承所以合其散而統其異也漢唐宋郡國雖皆有兵然散而無統惟本朝制兵府州若縣要害之處皆立衛所而又於總會之處立為都指揮使司以統之焉蓋有得於周人連帥州牧之遺意秦始皇既并天下為三十六郡郡置材官漢興踵秦置材官於郡國易祓曰漢不特置材官而已漢官儀曰髙祖命天下選能引關蹶張材力武猛者以為輕車騎士材官樓船常以秋後講肄課試各有員數平地用車騎山阻用材官水泉用樓船蓋三者之兵各隨其地之所宜也列郡王國侯國三等其兵不殊郡有都尉佐本守典武職甲兵其在王國者則內史比郡守中尉北都尉侯國亦有相秩氏天子令長其郡國之兵必有虎符而後可發臣按昔人謂侯國之兵既屬之郡而王國之兵亦天子所有不可擅用皆所以防微杜漸以尊京師也我朝于親藩皆設護衛然惟給其使令而不許其調遣遇國家有事亦起焉其防微杜漸以尊京師之意同符漢世唐制髙祖武德初始置軍府析關中為十二道以驃騎車騎兩將軍領之太宗貞觀十年更號統軍為折衝都尉别將為果毅校尉諸府總曰折衝府凡天下十道關中道置府一百七十三河南道置府六十二河東道置府百三十九河北道置府十四山東道置府十隴右道置府二十九淮南道置府六江南道置府二劔南道置府十嶺南道置府三十凡置府五百六十四皆有名號臣按此唐朝府兵之制非但京畿有之而天下十道凡州郡莫不皆有也髙宗永徽以後都督帶使持節者始謂之節度使而謂其兵為方鎮臣按節度使之兵原其始起於邉將之屯防者唐天寶以後王室日卑武夫戰卒以功起行陳皆除節度使由是方鎮相望於內地大者連十餘州小者兼三四州方鎮起而唐之威令不復行矣假使唐之君臣恆存髙祖太宗府兵之制而不變豈有是哉史臣謂方鎮之兵始重於外也土地民賦非天子有既其盛也號令征伐非其有又其甚也至無尺地而不能庇其妻子宗族以至亡滅噫後之有天下國家者其毋輕變祖宗之法制而外授人以兵柄以成尾大不掉之患哉宋制軍有禁軍有廂軍有鄉軍國初盡選驍勇部送闕下以補禁衛餘留本城廂軍者諸州之鎮兵也各𨽻其州之本城専以給役內總于侍衛司鄉軍者選自户籍或土民應募在所圑結訓練以為防守之兵臣按宋朝州郡之兵自元豐以後皆升同禁軍兵雖以禁名其實皆非禁旅也凡諸州置馬步軍都指揮使副都指揮使都虞候馬軍步軍亦如之馬步軍諸指揮各有使副每都有軍使副兵馬使都頭副都頭廂軍頭十將將虞候承局押官置都監監押以領之歲時簡練焉下州及軍監但有牢城兵則軍校之職隨宜裁制陳傅良曰自建隆三年以諸郡本城兵供百役或更戍他郡不但以逸民户也所以勞苦其身違離其妻子使習於南北風土之異而不得坐食於本營蓋勞之則易使散之則易養此藝祖神謀也三司禁旅就糧州郡亦不得常坐食於京師自列郡各置禁軍於是嚴差出占破之令而壯城元豐於廂軍內差壯城兵作院各置指揮於是在軍禁旅無就糧者禁軍在城防托而廂軍亦升為禁軍不復戍役矣養兵之費偏天下虜人犯闕無能發一矢者以不守祖宗舊章也開寶八年發渭州平原藩源二縣民治城壕因立為保毅軍弓箭手分鎮戍寨能自置馬者免役逃死以親屬代陳傅良曰此所謂義兵也藝祖有志於民兵矣咸平五年始置營升為禁軍其後寖有點差之令韓琦為相刺陜西義勇司馬光六上疏爭之不聽已而新法行遂罷強壯弓箭手而行保甲海內騷然要之皆以刺配為軍失祖宗本意而非民兵不可復也臣按前代州兵皆無定制或以土民自守或以禁兵出屯或選自户籍或出自召募或因有警而民團結皆是因其土地之宜隨其民俗之便或多或少或廢或置不惟無常制亦無常數惟我國家自平定之初則立為衛所以護衛州縣衛必五所所必千軍而又分藩列閫以總制之而有都衛之設其後也改都衛為都指揮使司文武並用軍民相安百有餘年其視漢唐宋之制可謂大備矣然承平日久兵備不能無弛軍伍不能無缺舊例遇有缺伍衛所差旗軍於其原籍徑行句補其流之弊乃至所句至者反少於所遺之人得不償失於是用言者計每歲分遣御史清句然亦徒有其名無益於事近有建言欲稽御史所句之數以為黜陟然亦徒害平民無益軍政臣嘗考歷代之制皆是草創之初軍伍數少而其末世乃有冗濫之失惟我朝則是先多而後少何也前代之制率因一時而隨事制置惟我聖祖則斟酌古今立為一代之制使子孫百世遵守焉方其初制為軍伍也內地多是抽丁垜集邉方多是有罪謫戍歲月既久姦弊日滋或改換姓名或變亂版籍或潛行析户或自私分居彼此相隱上下相蒙遂至簿卷難清挨究無迹其間丁盡户絶者固亦有之而正戶固在而旁纍他人者亦不能無也為今之計乞敕兵部通行清理凡天下都司衛所俱要造册開具本衛若所原設額數若干見今實在若干缺伍若干不問存亡備細開造具其籍貫及充軍緣由仍行户部行下天下布政司若府州縣亦要造册開具各州縣軍戶若干見在充當者若干挨無名籍者若干彼此照對以見其實在之數其衛所見在食糧者若干缺伍不補者若干兵部類以奏聞會文武大臣集議所缺必設何法然後得軍伍足數以復國初之舊必須不怫民情而致其生怨不為民害而激其生變講明根究至再至三然後見之施行如此則僉論之中必有良法善計不徒然也夫天下之事譬如器用然有新必有舊而壞者又為之新製則其用不窮矣今日之軍伍可謂舊而壞矣失今而不為之製吾恐日甚一日積而至於無餘一旦有事而必欲用之倉卒之際其將噬臍無及矣國家大事莫大於戎國步之安危所係運祚之修短所關誠不可不加之意也彼為具臣者不為逺慮其意只欲茍具目前以貽其責於後人蓋以官非世有故也若夫聖明之主承列聖之鴻業以傳之萬萬世之聖子神孫烏可不為之逺慮哉唐人有言凡此蔡功惟斷乃成彼淮蔡之土宇一州耳固不可無斷矧此丕丕之基萬方之廣億萬年之久其所以軫當寧之深念法乾造之雄斷者又當何如哉臣不勝惓惓仁宗慶厯元年張方平言民之所以懼籍為兵者不唯鋒刃矢石之難且重去其鄉土終身於親愛宗族永相隔絶也今若畨休遞戍終是不離本鄉冀望邉事漸寧即息肩安業昔太宗籍兩河之人以為鄉兵子孫識者亦悼其失業蓋不若因兩河強壯使之捍邉壯者入籍衰者出役不衣庫帛不食廪粟邉不缺戍民不去農何在乎蓄之營堡而後為官軍也又曰強壯弓手各在郡縣未去農業若朝廷用漢代更之術因唐防秋之法入耕出戰遞為防戍則是農不去業兵不乏備不因帑廪之積常得丁壯之人今既籍為正兵處之連營則其衣食財用終身仰給縣官矣臣按民之不願為兵誠有如方平所言者而今世北方之人猶有樂為之者而南方之人解以補伍有如棄市然今天下衛所兵伍已失大半必欲如立國之初簽民為軍必致生變茍因循不已則日甚一日則恐所失者不止大半而已也比年以來遇有警急簽點民丁貼助官軍守備其鄉邑已有成規民之耳目既已慣熟是亦備禦一良法也今後無事之時不須點集倘遇荒歉災變必不得已然後起集必須依舊以民壯為名名之以民則民心不疑不許巧立名稱另外差役逺方調發稍覺無事即便休息決不可失信於民敢有因而科斂差占事已不休者坐以風憲犯贓之罪合于上司及分巡官不為覺察者罪亦如之真宗景德三年鎮戎軍曹璋言有邉民應募為弓弩手者請給以間田蠲其徭役有警參以為正兵而官無資糧戎械之費詔人給田一頃出甲士一人及三頃者出戰馬一匹臣按今州縣軍戶多有丁盡戶絶者其人居宅田産必有承而受之者除生前立契明賣者外行清軍御史會同布政司及府州縣官挨究歸官有願代其役者即給以本軍絶户之田若是邉軍就令以近就近又行尸部通行天下凡沒官田土在二十年以後者不分有無承佃盡數刷出照宋朝之例給民為軍是亦足兵之一䇿也仁宗慶厯二年籍河北強壯揀為義勇盡鈔民丁增廣其數河東亦揀刺如河北法其後議者論義勇為河北伏兵以時講習無待儲廪得古者寓兵於農之意惜其束於列郡遺其大用止以為城守之備誠令守臣分領以時閲習寇至則翔集赴援朝下其議河北帥臣李昭亮等議曰昔唐澤潞留後李抱真籍戶丁男三選其一農隙則分曹角射歲終都試以示賞罰三年皆善射舉部下得徑卒二萬既無廪食府庫益實乃繕甲兵為戰具遂雄視山東是時稱昭義步兵冠於諸軍此則近代之顯效而或者謂民兵秪可城守難備戰陳誠非通論姑令在所點集訓練三二年間武藝稍精漸習行陳遇有警得將如抱真者統馭制其陳隊示以賞罰何戰敵不可哉臣按此前代點集民兵之明效皇祐中京東安撫使富弼言臣頃因河北水災農民流入京東者至十餘萬臣既憫其濵死又防其為盜遂募其伉健者以為廂兵既而選尤壯者得九指揮教以武技已類禁軍今止用廂軍俸廪而得禁軍之用可使效死戰鬭而無驕橫難制之患此當世大利也詔分置青萊災徐沂密淮揚七州臣按此前代因飢荒募民為兵之明效臣謹載其事宜於固邦本恤民之患條下哲宗元祐八年知定州蘇軾言河朔無事軍政少弛將驕卒隋緩急恐不可用即目邉防事勢三五年間必無警急然居安慮危有國之常備事不素講難以應變臣已戒飭本路將吏申嚴賞罰加意拊循輒復用龐籍舊奏團結弓箭社法約束稍加增損别立條目欲乞朝廷立法少賜優異明設賞罰以示勸懲陳傅良曰條約弓箭社如龎籍蘇軾則人情不擾而邉備修矣此今日所當講也臣按龎籍所奏條約之法無可考前此知定州滕甫言河北州縣近山谷處民間各有弓箭社及射獵人習慣便利與夷人無異蓋因其俗而加以束約而為之法也竊惟司馬光於英宗時言太宗之時兵數不及當今十分之一則是國初兵一而今十也今日去太祖時不啻如治平之去建隆開寶也而我之內外兵數不及國初之什三四在宋之人惟恐其多之至於冗而儲蓄不足以供而我今日則惟恐其少而至於弱警急無以為用孝宋之所以多者以其兵無定制可以日增而召募刺配之紛如我之所以少者以其兵有定數不可以加而逃亡死絶之無已况今承平日久百事廢弛譬則人之身中年以後血氣漸衰肢體困憊病雖未至於革而其勢則駸駸將至矣此正居安思危之日思患豫防之時也因事之藝察民之情隨時之宜以綿我國家靈長之祚端有待於今日也先儒有言水未至也而虛為之防水雖不至亦無所害謂水不足憂而不為之防一旦水至則防無所及矣今日天下之事最難處者莫此為難臣日夜思之未得其要故於郡國之守之下既略序漢唐宋之事而備載曹瑋以下數事以為明時告其中或有宜於今者斟酌而用之庶幾有所補云胡安國言于欽宗曰自古及今內外之藝適平則安偏重則危昔東漢季年王室多故劉焉建議以為四方兵冦由刺史威輕宜改置州牧及焉求益郡劉表出襄陽袁紹得冀曹操取兖爭相割據自此不復有王室矣夫五大在邉古人所戒以身使臂於理乃宜欲乞於所置帥司選擇重臣付以都總管之權専治軍旅之事每歲終按察其部內或有警急京城戒嚴即各帥所屬守將逐急應援如此則既有擁衛王室之藝又無尾大不掉之虞臣按安國乞選擇重臣付以在外兵權以統屬郡以輔王室其䇿良是宋孝宗時陳俊卿為相奏請應民家三丁者取其一以為義民授之弓弩教以戰陳農隙之日聚而教之沿江諸郡亦用其法要使大兵屯要害必爭之地待敵至而決戰所有民兵各守其城相為掎角以壯聲勢又言曰國家養兵甚費募兵甚難惟有此䇿可守邉面可壯軍藝而樂因循憚改作之人皆以擾民為辭天下之事欲成其大安能無小擾但守臣得人公心體國者自不至大擾矣臣按既有列屯坐食之兵而又起民丁則是民既出賦稅以養兵矣而又不免其身謂之不擾不可也此等之議非甚不得已切不可用以上論郡國之守大學衍義補卷一百十九
