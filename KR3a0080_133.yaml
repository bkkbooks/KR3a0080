body:
  text: 大學衍義補卷一百三十三明丘濬撰治國平天下之要嚴武備戰陳之法上吕刑王曰若古有訓蚩尤惟始作亂延及于平民罔不㓂賊鴟義姦宄奪攘矯䖍以䲭為義其波煽始大司馬遷曰神農世衰諸侯侵伐蚩尤最强暴黄帝與蚩尤戰于涿鹿之野殺之蔡沈曰言鴻荒之世渾厚敦厖蚩尤始開暴亂之端驅扇熏炙延及平民無不為㓂為賊鴟義者以鴟張䟦扈為義矯䖍者矯詐䖍劉也臣按此後世戰争之始書序武王戎車三百兩虎賁三百人與受戰于牧野作牧誓蔡沈曰戎車馳車也古者馳車一乘則革車一乘馳車戰車革車輜車載器械財貨衣裝者也二車謂之兩三百兩三萬人也陳櫟曰一虎賁必長百人一乘車總用百人以車數合虎賁數蓋三萬人也臣按戎車三百兩虎賁三千人禮記孟子皆有此言古者戰陳士卒必與車乘相麗所謂革車三百兩虎賁三千人自百夫長以上皆乘車非車外又有虎賁之士也詩序六月宣王北伐也元戎十乘以先啓開也行道也戎車既安如輊如軒韓嬰曰車有大戎十乘謂車縵輪馬被甲衡軛之上盡有劔㦸名曰陷軍之車朱熹曰戎戎車也軍之前鋒也輊車之覆而前也軒車之却而後也秦風小戎曰小戎兵車俴淺也收軫也五五束也楘歷録然文章之貌梁輈上曲鈎衡者游環靷環也脅驅亦以皮為之隂揜軌也靷以皮二條為之鋈續消白金以沃灌靷環作環以相接續文茵車中所坐虎皮褥暢長也轂駕我騏騏文馵馬左足白朱熹曰凡車之制廣皆六尺六寸其平地任載者為大車則軫深八尺兵車則軫深四尺四寸故曰小戎臣按六月之元戎天子之車秦風之小戎諸侯之車二車皆所謂兵車用以戰者也周禮巾車車官之長革路輓之以革而漆之龍勒以龍文飾馬勒條讀為條纓五就其樊纓以條絲飾之而為五匝建大白殷之旗名以即戎臣按巾車之職王之五輅曰革路兵車也車僕掌戎路之萃猶副也廣車之萃闕車之萃苹猶屛也車之萃輕車之萃鄭𤣥曰此五者皆兵車所謂五戎也戎路王在軍所乘也廣車横乘之車也闕車所謂布闕之車也苹猶屏也所用對敵自蔽隱之車也輕車所用馳敵致師之車也臣按巾車所掌者五戎之正此所掌者五戎之副也古者車戰之法毎車甲士三人歩卒七十二人二十四人居前左右各二十四人居前者戰左右者挾轅常相更番後又二十五人為一隊去車二十五歩所謂炊家子守衣裝厮養樵汲者也行則以車為衛居則以車為營一車一間又有倅車以備不測焉蓋車戰之法為不可敗之計有倅車以為之副貳萬一或敗不至倉皇無備也考工記車有六等之數車軫輿後横木四尺謂之一等戈柲柄也六尺有六寸既建而迆著戈於車斜倚也崇高也於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋八尺曰尋有四尺崇於人四尺謂之四等㦸常倍尋曰常崇於殳四尺謂之五等酋近也矛常有四尺崇於㦸四尺謂之六等車謂之六等之數鄭𤣥曰此所謂兵車也殳長丈二戈殳㦸矛皆揷車輢之旁也臣按五兵之用逺則弓矢射之近則矛句之句之矣然後殳擊之戈㦸刺之司馬法曰弓矢圍殳矛守戈㦸助凡用兵者皆長以衛短短以救長今此戈殳矛㦸皆置之車旁不言弓矢者乘車之人佩之也左傳隱公九年北戎侵鄭鄭伯禦之患戎師曰彼徒歩兵我車懼其侵軼突也我也公子突曰使勇而無剛者嘗試也冦而速去之君為三覆伏兵也以待之戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝聃鄭大夫逐之衷戎師前後擊之盡殪死也戎師大奔孔頴達曰前後及中三處受敵者前謂第一伏逆其前也後謂祝聃與後伏逐其後也中謂第二伏擊其中也衷戎帥者謂戎師在三伏之中宣公十二年邲之戰欒武子晉大夫曰楚軍之戎分為二廣音曠廣有一卒卒偏之兩右廣初駕數及日中左則受之以至于昏内官序當其夜以待不虞不可謂無備楚子為乘廣三十乘分為左右右廣雞鳴而駕日中而說舍也左則受之日入而説許偃御右廣養由基為右彭名御左廣屈蕩為右十二年杜預曰十五乘為一廣司馬法百人為卒二十五人為兩車十五乘為大偏今廣十五乘亦用舊偏法復以二十五人為承副孔頴達曰右廣雞鳴初駕數及日中則左廣受而代之以至于昏此晝日事也其内官親近上者為次序以當其夜若今宿直遞持更也臣按李靖謂楚子乘廣三十乘廣有一卒卒偏之兩軍行右轅以轅為法故挾轅而戰皆周制也百人曰卒五十人曰兩此是毎車一乘用士百五十人比周制差多爾周一乘歩卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人楚山澤之國車少而人多分為三隊則與周制同矣成公七年楚巫臣使于呉以兩之一卒適呉舍偏兩之一焉與其射御敎吳乘車敎之戰陳敎之叛楚寘其子狐庸焉使為行人於吳陳祥道曰古者之用兵也險野人為主易野車為主則險野非不用車而主於人易野非不用人而主於車車之於戰動則足以衝突止則足以營衛將卒有所芘兵械衣裘有所齎詩曰君子所依小人所腓則車之為利大昔周伐鄭為魚麗之陳先偏後伍伍承彌縫桓邲之戰楚軍之戎分為二廣廣有一卒卒偏之兩楚巫臣使於吳以兩之一卒適吳舍偏兩之一焉考之周禮五伍為兩四兩為卒司馬法二十五人為兩百人為卒卒兩則人也偏則車也杜預十五乘為大偏九乘為小偏其尤大者又有二十五乘之偏則周魚麗之偏二十五乘之偏也楚二廣之偏十五乘之偏也巫臣所舍之偏九乘之偏也先偏後伍伍從其偏也卒偏之兩兩從其偏也先其車足以當敵後其人足以待變則古者戰車之法略可知也昭公元年晉中行穆子敗無終山戎及羣狄于大原崇聚也卒也將戰魏舒曰彼徒我車所遇有阨險也以什更以十人共車必克困諸阨又克請皆卒自我始乃毁車以為行歩陳五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳即兩伍專參偏也以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之李靖曰荀吳用車法爾雖舍車而法在其中一為左角一為右角一為前拒分為三隊此一乘法也千萬乘皆然按曹公新書云攻車七十五人前拒一隊左右角二隊守車一隊炊子十人守裝五人廐養五人樵汲五人大率荀吳之舊法也又觀漢魏之間軍制五車為隊僕射一人十車為師率長一人凡車十乘將吏二人多多倣此以今法參用之則跳盪騎兵也戰鋒隊歩騎相半也騎隊兼車乘而出也臣西討突厥越險數千里此制蓋未敢易蓋古法節制信可重也馬端臨曰兵雖曰凶器然古之以車戰其坐作進退整暇有法未嘗掩人之不備而以奇取勝也故韓厥遇齊侯則奉觴加璧卻至遇楚子則免胄趨風可以死則為子犨之請矢可以無死則為庾公之叩輪所謂殺人之中又有禮焉雖春秋伯國之君臣其志在於争城爭地然於勍敵之人初不迫於險固如此至戎狄之侵中國則雲合鳥散輕進易退於是乎車之雍容不足以當其徒之慓疾遂至捨車而用徒然彼長於徒我長於車捨吾之長技而與之搏是以兵予敵也故必設覆以誘之未陳而薄之然後可以取勝而車戰之法廢矣秦漢以後之用兵其戰勝攻取者大槩皆如鄭之禦戎晉之敗狄耳何嘗有堂堂正正之舉乎臣按車戰之法中國與中國人戰之法也何也彼此皆用車戰而相遇於平原曠野之地故可用堂堂之陳正正之旗若夫中國與夷狄戰其地則險阻也其人則歩與騎也吾之車之布也不成列其動也不能行是坐以待困也幸而不敗可矣而欲用之以克㨗取勝不亦難哉自車法不行之後後世之用車者如衛青李陵之類皆不過用以齎載而已也不然則用以禦虜之衝突未有能用之明明以取勝也且三代之世分為列國故常有疆場之事以中國與中國戰則車固在所用也若夫罷侯置守之後四海一家不幸而盜賊竊發制之於早易與耳所以養兵卒以備征伐者大抵為四夷當用我所長以格之禦之不使入吾境斯可矣所謂車戰之法實無所用之政不必慕復古之名而為此不急之務也或曰用之出境以越險隘攻夷狄車法似不可用若夫用之以守中國之地何不可之有臣謂車戰之法我用而彼亦用之地有不平物有所柅非獨我不可行而彼亦不能行矣如此而用車何不可之有惟我用之而彼不用彼以萬人之衆穿地以為長溝溝之上積以所起之土不日而成則吾之輪有所柅馬有所制而不得行矣漢夏侯嬰破李由軍於雍丘以兵車趣戰疾破之武帝時衛青軍出塞擊匈奴以武剛車自環為營而縱五千騎往當匈奴李陵擊匈奴與單于相值圍陵軍陵居兩山間以大車為營引士出營外為陳連戰馬端臨曰車戰之制漢尚用之然詳考其辭則是以車載糗糧器械止則環以為營耳所謂甲士三人左持弓右持矛中執綏之法已不復存矣晉馬隆擊鮮卑樹機能以衆數萬據險拒之隆以山陿隘乃作偏箱車地廣則為鹿角車營路狹則為木屋施於車上轉戰而前行千餘里殺傷甚衆遂平凉州李靖曰偏箱鹿角兵之大要一則治力一則拒前一則束部伍三者迭相為用斯馬隆得古法深矣臣按古者車制用四馬駕之毎車用甲士三人歩卒七十五人其制太大利於守而不利於戰可以行近而不可以行逺行易地則易而險路則難體製重而轉動為艱一車之費動至千百成造非一二日可具且人皆不用而我用之非獨用之戰陳為難則雖行之大陸通逵亦有所杌􅑾者矣惟晉馬隆所謂偏箱車地廣則用鹿角車營路狹則為木屋施於車上且戰且前所謂鹿角車營者以車為營而人居其中架鎗刀於車上如鹿角然也今其制雖不可考然自古車皆有兩箱而此車獨以偏箱名則其偏為一箱可以意推矣蓋大箱者大車也一箱者小車也惟其車之小故可行於陿隘之地而且戰且前焉臣觀今世有獨輪車民間用以般運者一夫推之而或用一二人以前挽似亦可以為戰具然其制亦為兩箱偏載則傾欹推行頗遲滯臣家嶺南嘗經行海北地其所造小車獨輪無箱若因其制而改以為戰車一可以戰二可以前拒三可以為營四可以衝突五可以載軍裝六可以舁病卒且其費不多千錢以下可具一車中途有損不用匠而可脩逢險阻則舁以行遇急難則棄而去大率一車用卒五人一人推而二人挽二人執兵仗以輔之凡五人者之食具衣裝皆載其中中途有一人病者則以人舁物而以車載人夜則環列以為營可免士卒夜夜立柵挑塹之擾其車之式具於分註乞下有司計議如有可采行下工曹依式製造就令隊伍中二十五人為五車其於成法無有變更其於行軍不為無助其車之式用兩木圍九寸長九尺者為轅轅之首斜彎而起中以受軸為獨輪其輪徑二尺有五寸以板為之而不設輻中為死轂又於施輪處前後五六寸許兩轅上各加一横木前二後三又於後横木近輪處斲為二孔用二小彎木條寘其孔中引而屈之如弓狀䋲縳其端於前横木上有所載則以繩繫於其上又於輪之後兩轅下用木為足與軸等其後横木上施軟蓐以為坐席席之下兩足間施竹箄以盛食器軍中刁斗用畢亦載其中其轅首交合處其高準馬胸取鑄鐡為利器如耕犂様冒于交轅之首臨戰用以當敵之馬胸也去轅首尺許又横施一鐡條長尺三四寸許上列齒以架刀鎗兩轅之旁其前後各為鐡鐶四去稍前繫鐡鎻後係鐡鉤聨車為營之際前鐶相遠則用鎻繫之於鐶後轅緊相挨傍則以鐡鉤搭其鐶彼此相維以為固又於後鐶之次左右各加以一大鐶駐車時用刀或鎗貫鐶中而立焉彼兩軍交鋒之際則列於前以拒馬以代鹿角敵來衝突一夫推之而前四卒各執刀鎗以夾持之趨前以當其馬胸又用木或革為摺疉牌立於車上以蔽推車者大抵其車不用雕飾其不可施斧斲處只用麻䋲縛紫毎車上各具刀斧斲各一及板木繩釘之類以備急用唐大厯中馬燧為河中節度使造戰車冒以狻猊象列㦸於後行以載兵止則為陳或塞險阨以遏奔衝器械無不犀利臣按史馬燧此車即哥舒翰所用以收黄河九曲者也范仲淹亦嘗以此車請造於朝宋眞宗咸平中吳淑上疏請復古車戰之法謂夫人平居猶必謹籓籬固闗鍵以備不虞何況當敵人之戰陳禦突騎之輕慓而無蔽䕶哉夫人之被甲鎧所以蔽䕶其身也而戰之用車亦一乘之甲鎧也夫鱗介之蟲肌肉在内鱗介在外所以自蔽豈可使肌肉居外而鱗介反在内乎夫用車以戰亦一乘之鱗介也故可以行止為營陳賊至則斂兵附車以拒之賊退則乘勝出兵以擊之用奇掩襲見可以進故出藉此為所歸之地入則以此為所居之宅故人心有所依據不懼敵騎之陵突也臣按淑之車制取常用車接其衡􅦫駕以牛布為方陳此但可用之平地而施於險阻恐未易行也其後至和中有郭固車戰法嘉祐中有章詢陳脚兵車治平中有黄懷信萬全車後李綱又上車制圖王大智造霆電擊車然而卒不見於用用者亦未聞有戰勝之效有則史書之矣宋失西北二邊之險而以平原曠野為邊尚未聞以車戰取勝況今日之邊皆臨崇山峻嶺浮沙積石也哉其車之大者決不可用也無輕信人言耗民財費工力以為無益之事李綱言歩不足以勝騎而騎不足以勝車請以車制頒於京東西路使製造而教習之因繪圖進呈其法用綂制官張行中所創兩竿雙輪上載弓弩又設皮籬以捍矢石下設鐡裙以衛人足長兵禦人短兵禦馬傍施鐡索行則歩以為陳止則聨以為營毎車用卒二十有五人四人推竿以運車一人登車以發矢餘執軍器夾車之兩傍毎軍二千五百人以五之一為輜重及衛兵餘當車八十乘即布方陳則四面各二十乘而輜重處其中諸將皆以為可用臣按李綱建此議蓋在金人侵汴之時也所謂京東西路在今山東河南湖北之境蓋此等兵車止可用於平原曠野而邊塞之間險阻之地恐未必皆宜魏勝創為如意戰車上為獸面木牌大槍數十垂氊幕軟牌毎車用二人推轂可蔽五十人行則載輜重器甲止則為營掛搭如城壘人馬不能近遇敵又可以禦箭鏃列陳則如意車在外以旗蔽障弩車當陳門其上置床子弩矢大如斲一矢能射數人發三矢可數百歩砲車在陳中施火石砲亦二百歩兩陳相近則陳間發弓弩箭炮近陳門則刀斧槍手突出交陳則出騎兵兩嚮掩擊㧞陳追襲少却入陳問稍憇進退俱利伺便出擊慮有拒遏預為解脱計臣按兵車乃古者常戰之具閉門造車出門合轍彼此同一其制焉後世則人自為之製隨其時勢用其智巧而創為之不拘拘於古法然善用之者則亦可以取勝魏勝所制之車其制今不可考然大率有三曰如意戰車曰弩車曰砲車今不必盡如其制誠能推求其故而以意消息之合三者以為一製為人推之車數人之力可將者樹牌垂氊列槍駕炮毎兩必須蔽數十人略如勝所製者毎邊城製三五百兩嵗遇農作之時運置田所障蔽官軍俾得耕穫戰以為陳居以為營收穫以為載不為無益以上車法通典黄帝制陳法李靖曰黄帝始立丘井之法因以制兵故井分四道八家處之其形井字開方九焉五為陳法四為間地此所謂數起於五也虛其中大將居之環其四面諸部連繞此所謂終於八也及乎變化制敵紛紛紜紜鬬亂而法不亂渾渾沌沌形圓而勢不散所謂散而成八復而為一也獨孤及曰黄帝受命之始順殺氣以作兵法文昌以命將握機制勝作為陳圖夫八宫之位正則數不愆神不忒故八其陳所以定位也衡抗於外軸布於内風雲附其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢以致用也至若疑兵以固其餘地游車以按其後列弛張則一廣失舉掎角則四奇皆出臣按陳法說者謂其為黄帝所作亦猶世人謂醫書出於軒岐雖未必然而歷代名醫用之以己疾而取效也多矣八陳之作未必是黄帝所作然後世之善用兵者如諸葛亮李靖之徒皆本之以立戰陳或建之為圖或筆之於書可攷也大凡天下事必有定法法不定而能成事者未之有也朱熹曰陳者定也八陳圖中有奇正前面雖未整猝然遇敵次列便已成正軍矣蔡元定曰譬如一十分雄壯之人與一四五分力人厮打雄壯人只有力而四五分人却識相打法對副雄壯之人更不費力只指㸃將去可見八陳之法有以寡敵衆之理觀朱蔡二子之言則陳法與争戰不為無益矣故載之夏官中春教振旅司馬以旗致民立旗期民於其下平列陳如戰之陳中夏教茇舍如振旅之陳中秋敎治兵如振旅之陳臣按司馬中春敎振旅如戰之陳蓋必國之所用以戰者其布列方位彌縫偏伍分合坐作進退疾徐皆有一定之號令方法故於仲春之日敎民以振旅其所演習者一皆如臨戰對敵之時也故曰如戰之陳至於夏之茇舍秋之治兵又一皆如春之振旅焉是故今日之所以教也者即前日之所已用也者敎之於閒暇者此法也用之於臨敵者亦此法也曲禮前有水則載音戴青旌前有塵埃則載鳴鳶䲭屬前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅鄭𤣥曰戴謂舉於旌首以警衆也禮君行師從前驅舉此則士衆知所有所舉各以其類象孔頴達曰王行宜警備善惡必先知之又軍陳卒伍行則並銜枚無諠聲若有非常不能傳道且人衆廣遠難可周徧故前有變異則舉類示之左傳曰前茅慮無是也青旌謂畫為青雀於旌上舉示之軍士望見則知前值水也鳶鳴則風生風生則塵埃起故前有塵埃則畫鴟於旌首而戴之不言旌從可知也雁行列與軍騎相似故前有車騎則畫鴻於旌首而戴之虎威猛兵衆之象若前有兵衆則舉虎皮於竿首摯獸猛而能摯謂虎狼之屬貔貅是一獸亦有威猛若前有猛獸則舉此貔貅皆欲使衆見以為防也臣按史宋曹翰遣五駿騎為斥候授以五色旗人執其一前有林木則舉青旗烟火舉赤旗虜冦舉白旗陂澤舉黑旗丘陵舉黄旗雖不拘拘於古而得古人前茅慮無之意且簡以易知行軍者不可不知也行前朱雀而後𤣥武左青龍而右白虎招搖在上急繕其怒鄭𤣥曰以四獸為軍隊象天也招搖星在北斗杓端主指者急猶堅也繕讀曰勁又畫招搖星於旌旗上以堅勁軍中之威怒孔頴達曰此明軍行象天而作陳法也朱雀𤣥武青龍白虎四方宿名也招搖北斗第七星也北斗居四方宿之中以斗末從十二月建而指之則四方之宿不差軍行法之既張四獸於四方而摽招搖於中上以指正四方故軍旅士卒起居舉動堅勁奮怒象天之行也臣按先儒謂軍之耳目在旗鼓故以朱𤣥青白以别其方色所以用衆也先王之征伐非私怒也致天討而已故隨四方之色繪四方之宿而各寓以其所象而摽北斗於其中以見奉天致討之義進退有度左右有局各司其局鄭𤣥曰度謂伐與歩數局歩分也孔頴達曰左右有局者軍中在左在右各有部分不相濫也各司其局者軍行須監領各有所司部分也臣按進退有度左右有局各司其局凡行軍之法皆不外乎此無度無局則不成軍矣左傳桓公五年王周恆王以諸侯伐鄭鄭伯禦之曼伯為右扼祭仲足為左拒原繁高渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫杜預曰司馬法車戰二十五乘為偏以車居前以伍次之承偏之隙而彌縫其闕漏也五人為伍此蓋魚麗陳法李靖曰按春秋魚麗陳先偏後伍此則車徒無騎謂之左右拒言拒禦而已非取出奇勝也晉荀吳伐狄舍車為行此則騎多為便唯務奇勝非拒禦而已臣按杜氏所謂車戰二十五乘為偏司馬穰苴兵法之文也五人為伍周禮司馬之文也戰陳之法見於經傳者始此桓公八年楚子伐隨隨侯禦之望楚師季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃携矣少師曰不當王非敵也弗從戰于速杞隨師敗績蘇洵曰管仲謂攻堅則瑕者堅攻瑕則堅者瑕嗚呼不從其瑕而攻之天下皆强敵也范蠡曰凡陳之道益左以為牡設右以為牝春秋時楚伐隨季梁敎隨侯攻其右無攻其左以左乃楚王之所在彊兵在焉蓋一陳之間必有牝牡左右要當以吾彊攻其弱爾唐太宗曰吾自興兵習觀行陳形勢毎戰視敵强其左吾亦强吾左弱其右吾亦弱吾右使弱常遇强强常遇弱敵犯吾弱追奔不過數十百歩吾擊敵弱常突出自背反攻之以是必勝後之庸將既不能處其强弱以敗而又曰吾兵有老弱雜其間非舉軍精鋭以故不能勝不知老弱之兵兵家固亦不可無無之是無以耗敵之强兵而全吾之鋭鋒敗可俟矣故智者輕棄吾弱而使敵輕用其强忘其小喪而志於大得夫固要其終而已臣按强弱兵家之常勢勝敗兵家之常事惟在要其終而已矣宣公十有二年為敖為宰擇楚國之令典軍行右轅在軍之右者挾轅為戰備左追蓐在左者追求草蓐為宿備前茅慮無茅明也在前者明為思慮其所無之事中權中軍制權後勁後以勁兵為殿百官象物而動象其物類無妄動也軍政不戒而備杜預曰在軍之右者挾轅為戰備在左者追求草蓐為宿備蓋楚陳以轅為主也慮無如今軍人前有斥候蹹伏皆持以絳及白為幡備慮有無也孔頴達曰茅明也在前者明其為思慮所無之事恐卒有非常當預告軍中兵衆使知而為之備也莊公四年楚武王荆尸授師子焉以伐隨杜預曰尸陳也荆亦楚也更為楚陳兵之法子㦸也楚始於此叅用㦸為陳臣按隨武子所謂荆尸而舉則是荆尸之法創於莊公至宣公時又舉行之也夫楚子以諸侯之國處荆蠻之地其行師有紀律如此士㑹所以謂之能用兵而不可敵也況有天下之大奉天討以行天誅孰能禦之哉昭公二十一年公子城以晉師至救宋與華氏戰于赭丘宋地鄭翩願為鸛其御願為鵝杜預曰鄭翩華氏黨鸛鵝皆陳名臣按楚之陳名魚麗鄭之陳名鸛鵝即物以為名其布置之形狀殆或類之與以上論戰陳之法上大學衍義補卷一百三十三
