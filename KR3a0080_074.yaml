body:
  text: 大學衍義補卷七十四明丘濬撰治國平天下之要崇教化本經術以為教上之中書曰詩言志朱熹曰心之所之謂之志心有所之必形於言故曰詩言志臣按此萬世言詩之始先儒謂自有天地萬物而詩之理已寓嬰兒之嬉笑童子之謳吟皆有詩之情而未動也桴以蕢鼓以土籥以葦皆有詩之用而未文也康衢順則之謡元首股肱之歌皆詩也故曰詩言志至於五子述大禹之戒相與歌詠傷今而思古則變風變雅已備矣詩大序曰詩者志之所之也在心為志發言為詩朱熹曰心之所之謂之志而詩所以言志也臣按先儒謂此一節言詩之自出故正得失動天地感鬼神莫近於詩朱熹曰事有得失詩因其實而諷詠之使人有所創艾興起至其和平怨怒之極又足以逹於隂陽之氣而致災召祥蓋其出於自然而不假人力是以入人深而見功速非他教之所及也先王以是經夫婦成孝敬厚人倫美教化移風俗朱熹曰先王指文武周公成王是指風雅頌之正經常也女正乎內男正乎外夫婦之常也孝者子之所以事父敬者臣之所以事君詩之始作多發於男女之間而逹於父子君臣之際故先王以詩為教使人興於善而戒其失所以道夫婦之常而成父子君臣之道也三綱既正則人倫厚教化美而風俗移矣臣按先儒謂夫婦之經者孝敬之成也蓋天下之道只從夫婦中出而夫婦之道又只從中正中來以此氣象事親則成孝事君則成敬由是而人倫厚教化美風俗移皆出於詩之功用也故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌朱熹曰此一條本出於周禮大師之官蓋三百篇之綱領管轄也風雅頌者聲樂部分之名也風則十五國風雅則大小雅頌則三頌也賦比興則所以製作風雅頌之體也賦者直陳其事比者以彼狀此興者託物興詞蓋衆作雖多而其聲音之節製作之體不外乎此故大師之教國子必使之以是六者三經而三緯之則凡詩之節奏指歸皆將不待講說而直可吟咏以得之矣上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風朱熹曰風者民俗歌謡之詩如物被風而有聲又因其聲以動物也上以風化下者詩之美惡其風皆出於上而被於下也下以風刺上者上之化有不善則在下之人又歌詠其風之所自以譏其上也凡以風刺上者皆不主於政事而主於文詞不以正諌而託意以諫若風之被物彼此無心而能有所動也至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣朱熹曰國異政家殊俗者天子不能統諸侯故國國自為政諸侯不能統大夫故家家自為俗也正變之說經無明文可考故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也朱熹曰情者性之動而禮義者性之德也動而不失其德則以先王之澤入人者深至是而猶有不忘者也然此言亦其大槩有如此者其放逸而不止乎禮義固已多矣是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有大小故有小雅焉有大雅焉頌者美盛德之形容以其成功告於神明者也是謂四始詩之至也朱熹曰形者體而象之之謂小雅皆王政之小事大雅則言王政之大體也頌皆天子所制郊廟之樂歌史記曰關雎之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始所謂四始也詩之所以為詩者至是無餘蘊矣後世雖有作者其孰能加於此乎邵子曰刪詩之後世不復有詩矣蓋謂此也臣按先儒謂詩之作其來逺矣至夫子删詩則無餘蘊後世作者連篇纍牘學之者可以興觀羣怨乎用之者可以正得失動天地厚人倫美教化乎後人讀之者又果可以逹於政而專對乎至於風雲之狀月露之形則固無益於事矣若夫哀淫愁怨導欲增悲則又非徒無益也邵子之言警人深矣嗚呼後之有作者當以三百篇為王而不為無實之虛言雖其體製不皆盡合於古而亦可以得古詩人之意之倣佛矣乎周禮大師教六詩曰風曰賦曰比曰興曰雅曰頌以六德為之本以六律為之音朱熹曰六德中和祗庸孝友六律謂黃鍾至無射六陽律也大呂至應鍾為六隂律與之相間故曰六間又曰六呂其為教之本末猶舜之意也王制曰天子五年一巡守命大師陳詩以觀民風方慤曰詩所以言志風所以從上詩言之哀樂足以見民風之厚薄民風之厚薄足以知上政之得失故命大師陳詩焉子曰詩三百一言以蔽猶蓋也之曰思無邪朱熹曰詩三百十一篇言三百者舉大數也思無邪魯頌駉篇之辭凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得其情性之正而已然其言微婉且或各因一事而發求其直指全體則未有若此之明且盡者故夫子言詩三百篇而惟此一言足以盡蓋其義其示人之意亦深切矣臣按思無邪一言雖足以盡蓋一詩之義然學者須於三百五篇一一各考究其義使無一之不盡然後蔽以此三言以為誦詩三百之要則可以言詩矣茍顓顓然曰吾思無邪而於古人之㫖趣訓詁略不究心而曰吾通經矣可乎哉子夏曰巧笑倩好口輔也兮美目盼目黑白分也兮素粉地以為絢采色畫之飾也兮何謂也子曰繪事後素曰禮後乎子曰起子者商也始可與言詩已矣朱熹曰此逸詩也言人有此倩盼之美質而又加以華采之飾如有素地而加采色也子夏疑其反謂以素為飾故問之繪事繪畫之事也後素後於素也考工記曰繪畫之事後素功謂先以粉地為質而後施五采猶人有美質然後可加文飾禮必以忠信為質猶繪事必以粉素為先起猶發也起子言能起發我之志意謝良佐曰子貢因論學而知詩子夏因論詩而知學故皆可與言詩楊時曰甘受和白受采忠信之人可以學禮茍無其質禮不虛行此繪事後素之說也孔子曰繪事後素而子夏曰禮後乎可謂能繼其志矣非得之言意之表者能之乎商賜可與言詩者以此若夫玩心於章句之末則其為詩也固而已矣所謂起豫則亦相長之義也臣按子貢因論貧富之道而知學問之功子夏則因論詩之繪事後素而知禮後之說二賢者聖人皆謂其始可以言詩先儒謂始字不可輕放過謂如此觸類而長方才可以讀書然聖人於子貢則先呼其名而繼以告諸往而知來者於子夏則先曰起豫而呼其名繼焉蓋此理隱然見於言外因此而可以得彼此理盎然蘊於胸中因彼而有以發此非善學者不能也而用之以學詩尤為親切故聖人於此皆呼其名而致其親切之訓學詩者其尚以二賢為法子曰關雎樂而不淫哀而不傷朱熹曰關雎周南國風詩之首篇也淫者樂之過而失其正者也傷者哀之過而害於和者也關雎之詩言后妃之德宜配君子求之未得則不能無寤寐反側之憂求而得之則宜其有琴瑟鐘鼓之樂蓋其憂雖深而不害於和其樂雖盛而不失其正故夫子稱之如此欲學者玩其辭審其音而有以識其情性之正也臣按先儒謂關雎之詩樂得淑女以配君子至於琴瑟友之鐘鼓樂之所謂樂而不淫也哀窈窕思賢才至於寤寐思服展轉反側所謂哀而不傷也學者玩其辭語審其聲音而原其性情之際則亦有以識其所存所發之正也已子曰吾自衛反魯然後樂正雅頌各得其所朱熹曰魯哀公十一年冬孔子自衛反魯是時周禮在魯然詩樂亦頗殘缺失次孔子周流四方參互考訂以知其說晚知道終不行故歸而正之洪興祖曰王者迹熄而詩亡其存者繆亂失次孔子復得之他國以歸定著為三百五篇於是雅頌各得其所臣按詩有三經風雅頌此言雅頌而不及風者先儒謂列國各有不正之聲廟朝所不奏二南亦用之房中耳故正樂止言雅頌子曰誦詩三百授之以政不逹使於四方不能專對雖多亦奚以為程頥曰須是未讀詩者授以政不逹使不能專對既讀詩便逹於政便能專對始是讀詩又曰窮經將以致用也世之誦詩者果能從政而專對乎然則其所學者章句之末耳此學者之大患也朱熹曰專獨也詩本人情該物理可以驗風俗之盛衰見政治之得失其言溫厚和平長於風諭故誦之者必逹於政而能言也臣按詩與易書春秋禮並為五經其四經皆出自聖賢之制作刪述所以紀載聖君賢相大賢君子之言行事功惟詩之為詩則多里巷田野匹夫匹婦歡悲怨怒之言甚至淫佚悖亂之事亦或有之顧使羈臣賤妾之辭與堯舜禹湯文武周公孔子之格言大訓並列以為經嗚呼夫豈無其故哉蓋以人之生也性情具於中志趣見於外必假言以發之也言以發其心之所蘊志有所抑揚言不能無短長心有所喜怒言不能無悲歡動於心而發之口有自然之理致有自然之音響天機自動天籟自鳴此詩之所以作也詩之作也原於天理之固有出於天趣之自然作之者應口而出聲賦之者隨宜而應用或因之以申吾不容己之情或由之以發吾不可言之意或假之以明吾難顯白之事章不必有定句也句不必有定字也言從而理順聲和而韻協斯得之矣固未有所謂義例也又惡用訓詁為哉昔孔子既刪詩以為經而又時時雅言以教學者有曰誦詩三百授之以政不逹使於四方不能專對雖多亦奚以為又嘗以教其子曰不學詩無以言則是詩之為用可以逹政事備問對資言談可見也今觀三百五篇而律以諸儒之章㫖訓解其間言及於政事之施專對之用言談之助政不多有間有一二剟取而施用之亦自有限不知聖人何故云云也及考之大學中庸孟子之書取凡三書所引詩言觀之而又旁及於禮記中學記樂記表記坊記緇衣等篇與夫左氏春秋劉向說苑韓詩外𫝊諸書一一參考然後知孔門讀詩之法與後世拘於義例而局以訓詁者異焉曾子述孔子之意作大學凡十引詩子思得曾子之傳作中庸凡十二引詩孟子學於子思作書七篇凡十二三引詩究其㫖義多與諸儒所訓解之詩意不全合由是以觀聖門教人讀詩必有所授受而出於義例訓詁之外者三子者相傳必有所自而左氏之所賦漢儒之所說蓋亦非無所因者矣後之學詩者必也本孔曾思孟之所傳據論學庸孟之所引以為誦詩三百之法是故章句以綱之訓詁以紀之諷詠以昌之涵濡以體之察之性情隱微之間審之言行樞機之始本朱子此言以為讀詩之常法詩因於事不遷事以就詩事寓於詩不遷詩以就事不銖銖而析之不寸寸而較之取呂氏此言以為用詩之活法夫如此其於孔門學詩之法其庶矣乎雖然未也子貢因論學而知詩子夏因論詩而知學鳶飛戾天魚躍于淵子思以明上下一理之察旱麓之章㫖果若是乎穆穆文王於緝熙敬止朱子以敬止為無不敬而安所止他日之訓解又何不若是乎是知讀詩之法在隨文以尋意用詩之妙又在斷章而取義也學者誠以是而求諸三百五篇則雅無大小風無正變頌無商周魯茍意㑹於心言契乎理事適其機或施之政事或發於語言或用之出使與凡日用施為之間無往而非詩之用矣固不拘拘於義例訓詁之末也子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名朱熹曰小子弟子也興謂感發志意觀謂考見得失羣謂和而不流怨謂怨而不怒人倫之道詩無不備其緒餘又足以資多識學詩之法此章盡之讀是經者所宜盡心也臣按先儒謂論語之及詩者多矣而惟此章為備學者茍於此盡心焉則有以感發其志意而為善不懈有以考見其得失而於事無惑和而不流以處羣居之常怨而不怒以處人倫之變孝父忠君而於人倫之大者無愧博物洽聞而於一物之小者不遺詩之為益不既多乎其為益之多如此學者所宜盡心也子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正墻面而立也與朱熹曰為猶學也周南召南詩首篇名所言皆修身齊家之事正墻面而立言即其至近之地而一物無所見一步不可行臣按先儒謂詩有二南猶易有乾坤學詩者自此入而修齊治平之道皆自此出此章與誦詩三百小子何莫學夫詩皆明窮經致用之道孟子咸丘䝉問曰詩云普遍也天之下莫非王土率循也土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故說詩者不以文字也害辭語也不以辭害志以意逆迎也志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑獨立之貌遺脫也信斯言也是周無遺民也程頥曰舉一字是文成句是辭張載曰知詩莫如孟子以意逆志讀詩之法也朱熹曰詩小雅北山之篇也作詩者自言天下皆王臣何為獨使我以賢才而勞苦乎非謂天子可臣其父也雲漢大雅篇名也言說詩之法不可以一字而害一句之義不可以一句而害設辭之志當以己意迎取作者之志乃可得之若但以其辭而已則如雲漢所言是周之民真無遺種矣惟以意逆之則知作詩者之志在於憂旱而非真無遺民也又曰意謂己意志謂詩人之志逆迎之也其至否遲速不敢自必而聽於彼也史記曰古詩本三千餘篇孔子去其重取其可施於禮義者三百五篇孔頴逹曰按書𫝊所引之詩見在者多亡逸者少則孔子所録不容十分去九馬遷之言未可信也朱熹曰三百五篇其間亦未必皆可施之禮義者但存其實以為鑒戒耳程頥曰古之人幼而聞歌頌之聲長而識美刺之意故人之學由詩而興後世老師宿儒尚不知詩之義後學豈能興起乎又曰周南召南如乾坤二南之詩蓋聖人取之以為天下國家之法使邦家鄉人皆得歌詠之也有天下國家者未有不自齊家始故先言后妃次言夫人又次言大夫妻而古人有能修之身以化在位者文王是也故繼之以文王之詩又曰學者不可不看詩看詩便使人長一格張載曰置心平易然後可以言詩涵泳從容則忽不自知而自解頥矣又曰求詩者貴平易不要﨑嶇蓋詩人之情性溫厚平易老成其志平易故無艱嶮之言大率所言皆目前事而義理存乎其中以平易求之則思逺以廣愈艱嶮則愈淺近矣謝良佐曰學詩者須先識得六義體面而諷咏以得之又曰君子之於詩非徒誦其言又將以考其情性非徒考其情性又將以考先王之澤蓋法度禮樂雖亡於此猶能併得其深微之意而𫝊之又曰詩須諷詠以得之古詩即今之歌曲今之歌曲往往能使人感動至學詩却不然只為泥章句故也歐陽修曰詩述商周自𤣥鳥生民上陳稷契下訖陳靈千五百年之間旁及列國君臣世次國地山川封域圖牒鳥獸草木蟲魚之名與其風俗方言訓詁盛衰治亂美刺之由無所不載游酢曰學詩者可以感發人之善心如觀天保之詩則君臣之義修矣觀唐棣之詩則兄弟之愛篤矣觀伐木之詩則朋友之交親矣觀關雎鵲巢之風則夫婦之經正矣昔王裒有至性而子弟至於廢講蓼莪則詩之興發善心於此可見矣朱熹曰詩經全體大而天道精微細而人事曲折無不在其中又曰詩之為經所以人事浹於下天道備於上而無一理之不具劉瑾曰通三百篇而論其大義則其喜不至瀆怒不至絶怨不至亂諫不至訐天時日星之大蟲魚草木之微人倫綱常之道風氣土地之宜神祇祖考之祀禮樂刑政之施凡天人相與之理莫不畢備於一經之中也又曰本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止此學詩之大㫖也於是乎章句以綱之訓詁以紀之諷詠以昌之涵濡以體之察之情性隱微之間審之言行樞機之始則修身及家平均天下之道其亦不待他求而得之於此矣問詩何以興朱熹曰讀詩見其不美者令人羞惡見其美者令人興起又曰讀詩之法只是熟讀涵泳自然和氣從胸中流出其妙處不可得而言不待安排布置務自立說也臣按真德秀有言三百篇雖難曉今諸老先生發明其義了然可知如能反覆涵泳真可以感發其性情則所謂興於詩者未嘗不存也臣竊以謂古人教胄子率以樂今世古樂不存而所謂詩者固三代之遺音也學校之中閒居游息之時俾其歌詠三百篇詩雖其節奏無𫝊然即今鄉飲所歌鹿鳴之音調稍諧協之縱不能皆如古人之全然亦可以倣佛其萬一也其於興起感發懲創之道不為無助以上論詩以上本經術以為教上之中大學衍義補卷七十四
