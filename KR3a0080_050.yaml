body:
  text: 大學衍義補卷五十明丘濬撰治國平天下之要明禮樂家鄉之禮上之中內則曰子能食食飯也教以右手能言男唯女俞然也六年六歲也教之數一十百千萬之數與方名東西南北四方七年七歲男女不同席不共食八年八嵗出入門户及即席飲食必後長者行坐皆居長者之後始教之讓後長者便是讓九年九嵗教之數日朔望與十干十二支也十年十嵗出就外傅居謂晝所處宿謂夜所息於外學書謂六書計謂九數禮帥初凡禮皆循其初不許更變朝夕學幼儀學為人少者之儀請肄簡謂書篇數諒謂言語信實請肄者請於長者而習學之顔之推曰教子嬰孩在謹其始子之初生也不可不使之知尊卑長幼之禮若侮詈父母驅擊兄姊父母不加訶禁反笑而奬之彼既不辨好惡遂謂當然及其既長習已成性乃怒而禁之不可復制殘忍悖逆無所不至此蓋父母無深識逺慮不能防微杜漸溺於小慈養成其惡故也方慤曰出入門户欲其行之讓即席欲其坐之讓飲食則欲其食之讓也臣按內則所言教子之法自能食能言始其叙年自六年以至於七十而後止而此所采止於十嵗者陸氏曰十年以後有學無教蓋就外傅以後則其所學者屬於師友而不繫於父兄之家教矣女子十年十嵗也不出不出外門姆女師也教婉謂言語柔順娩謂容貌柔順聽從以順為正執麻枲謂績紡治絲繭謂蠶事織紡織紝繒帛組紃皆是縧薄濶者為組似繩者為紃學女事以共衣服觀於祭祀納酒漿籩竹器豆木器菹菜茹醢肉醬禮相助奠以禮相長者而助其饋奠輔廣曰婉有委曲之意娩有遲緩之意聽從所謂以順為正也婦人之德莫此為盛始於容德中於女工之事終於祭祀之禮婦人之事盡是矣方慤曰不出謂常居閨閣之內也聽則有所受從則無所違皆女德也執麻枲則績事也治絲繭則蠶事也觀於祭祀則欲其習熟是事故也非特觀之而已又且納酒漿籩豆菹醢等物以致其禮相助長者奠之於神焉吳澄曰籩豆菹醢者籩豆其菹醢謂以菹醢實於籩豆也納其酒漿於尊罍實其菹醢於籩豆各有司之者使女子觀之至行禮之時則相長者而助其奠於神位之前也臣按此內則言教女之法曲禮曰幼子常視無誑欺誑童子不衣裘裳立必正方不可斜向不傾聽不得傾頭側聽長者與之提攜則兩手奉長者之手負劍童子在長者旁若負劒然辟偏也咡口旁詔之謂傾頭與語則掩口而對劉彞曰幼子之性純明自天未有外物生其好惡者無所學而不可成也如金之在鎔惟人所範如泥之在鈞惟人所模故視之以誠信則誠信篤於其心矣視之以詐僞則詐僞篤於其心矣模範之初貴得其正則五事之用無不出於誠而適於道也故曰幼子常視毋誑戴溪曰常視毋誑所以養其心也不衣裘裳所以養其體也蓋不開其情僞之端以育其正性不傷其隂陽之和以長其夀命此古之成人所以多有德也夫內外交相養也防其外所以養其中立必正方不傾聽則敬以直內而無傾邪之態矣馬睎孟曰就而攜之則捧其手近而詔之則掩其口而對者皆事長之禮也古之成人有德小子有造者豈一朝一夕之習哉自幼稚而已知夫禮讓矣少而習之壯而行之老而安之古人年彌髙而德彌邵者蓋出於此也玉藻曰童子不裘不帛不屨絇鄭𤣥曰裘帛溫傷壯氣也絇屨頭飾也臣按此古人人家教童子之禮夫古人有胎教方其妊子之時必謹所感心感於物則其子形音肖之故有胎教之禮傳所謂胎教者寢不側坐不邊立不蹕即跛也不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲夜則令瞽誦詩道正事如此則生子形容端正才過人矣古人為教方其子在胞胎之中已謹其所感及其子在孩提之日尤謹其所示禀之於初者純全而無僞養之於幼者端正而無邪所見必正事所聞必正聲所視必正色所言必正理非但男有教而女亦有教非但養其心而又養其身古之人家其豫於教者如此是以他日出而就教於學校服役於官府執事於朝廷無所往而不可古之時人無不成之才官無或廢之職事無不就之功者由此道也非獨男子為然而凡人家之女子在家者無不孝持己者無不貞為人妻則順為人母則慈上至宫闈下至閭巷若貴若賤曰男曰女人人皆有教家家皆有法而天下之平由此其基也春秋榖梁𫝊曰子既生不免乎水火母之罪也羈貫成童不就師傅父之罪也范寧曰羈貫謂交午剪髮為飾成童謂八歲以上張載曰教小兒先要安詳恭敬今世學不講男女從幼便驕惰壞了到長益凶狠只為未嘗為子弟之事則於其親已有物我不肯屈下病根常在又隨所居而長至死只依舊為人子則不能安灑掃應對接朋友則不能下朋友有官長則不能下官長為宰相則不能下天下之賢甚則至於徇私意義理都喪也只為病根不除隨所居所接而長臣按書曰若生子罔不在厥初生禮曰禁於未發之謂豫朱熹亦謂子之初生不可不慎其初所教所謂慎初所教即是豫教於未發之初也蓋以人之初生童孺之時元氣未漓天真未散善性未斫情竇未開當此時而開導之則順而易過此時而防間之則逆而難張載所謂今世學不講男女從幼便驕惰壞了驕惰二字其病根也臣故輯古人教童子之言以示天下後世使有家者知至要莫如教子必豫教於童稚之初有國者知大本在於齊家必致謹於家鄉之禮如此非獨可以除去士庶之病根而人君治平之善根亦於是乎萌蘖矣以上人家教童子之禮曲禮曰男子二十冠而字內則曰男子二十冠始學禮士冠禮曰筮於廟門禰廟也主人戒賓乃宿賔宿以進之厥明謂宿賔之明日夕為期為加冠之期於廟門之外夙興早起設洗承棄水之器直於東榮屋翼也陳服於房中西墉墻也下東領北上主人𤣥端士入廟之服爵韠蔽膝也立於阼階東階下擯者𤣥端負負之北面東孰將冠者采衣童子之服紒結髮在房中南面賔如主人服贊者𤣥端從之立於外門之外主人迎出門左西面再拜賔答拜主人揖贊者與賔揖先入每曲揖至於廟門揖入三揖至於階三讓主人升立於序端西面賔西序東面贊者盥於洗西升立於房中西面南上將冠者出房南面賔揖將冠者將冠者即筵坐贊者坐跪也櫛梳也設纚韜髮之具賔降盥卒升賔筵前坐跪也正纚興降階一等執冠者緇布冠升一等東面授賔賔右手執項冠之後左手執前冠之前進容行而為容儀乃祝祝始加之辭坐跪如初乃冠乃加冠於首興復位冠者興賔揖之適房始加祝曰令月吉日始加元服棄爾幼志順爾成德夀考維祺介爾景福冠者服𤣥端爵韠出房南面賔揖之即筵坐跪賔盥正纚如初降二等受皮辨右執項左執前進祝加之如初興賔揖之適房再加祝曰吉日令辰乃申爾服敬爾威儀淑慎爾德眉夀萬年永受胡遐也福冠者服素積素韠容儀也出房南面賔降三等受爵辨加之服纁裳韎韐其他如皮辨之儀三加祝曰以歲之正以月之令咸加爾服兄弟具在以成厥德黃耉無疆受天之慶筵於户西南面賔揖冠者就筵賔受醴於户東加柶匕之屬面枋柄筵前北面冠者筵西拜受觶賔東面答拜薦脯醢冠者即筵坐跪左執觶右祭脯醢以柶祭醢三興筵末坐啐醴興降筵坐奠觶拜執觶興賔答拜醴辭曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休夀考不忘賔降直西序東面主人降復初位冠者立於西階東南面賔字之冠者對應也字辭曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於假嘏也永受保之曰伯某甫伯叔季惟其所當臣按此古儀禮士冠禮也宋儒朱熹嘗即此儀以為家禮臣已櫽括以為儀節具見本書茲不詳載郊特牲曰適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也冠義曰己冠而字之成人之道也陳澔曰著代顯其為主人之次也酌而無酬酢曰醮客位在户牖之間加禮於有成之人也三加始加緇布冠次加皮辨又次加爵辨也喻其志者使其知廣充志意以稱尊服也此適子之禮若庶子則冠於房户外南面醮亦户外也臣按古禮三加始加緇布緇布之粗不若皮辨之精再加皮辨皮辨之質不若爵辨之文愈加而愈尊後世拘於時服非若古人可以上下通用行禮者因時制宜不必盡拘可也冠義曰古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也葉夢得曰所以為國本者何也蓋冠而成之則責其為子將至於為父子則有臣道也父則有君道也為國之本莫大於是臣按後世筮法不全而為賔之人難得惟擇而用之可也見於母母拜之見於兄弟兄弟拜之成人而與為禮也臣按司馬氏謂此禮今難行但於拜時母起立可也成人之者將責成人禮焉也責成人禮焉者將責為人子為人弟為人臣為人少者之禮行焉將責四者之行於人其禮可不重與吕大臨曰所謂成人者非謂四體膚革異於童稚也必知人倫之備焉親親貴貴長長不失其序之謂備此所以為人子為人弟為人臣為人少之禮行孝弟忠順之行立也冠者禮之始也嘉事之重者也是故古者重冠重冠故行之於廟臣按司馬氏謂今人少家廟但冠於外㕔筓於中堂可也家語孟懿子曰始冠必加緇布之冠何也孔子曰示不忘古也臣按程氏言今行冠禮若制古服而冠冠了又不常服却是僞也必須用今時之服夫古禮始加緇布冠冠畢而敝之亦是常時不用之服豈是僞哉今家禮始加深衣幅巾亦是不忘古之意司馬光曰古者二十而冠所以責成人之禮蓋將責為人子為人弟為人臣為人少者之行於其人故其禮不可以不重也近世以來人情輕薄過十歲而總角者少矣彼責以四者之行豈知之哉往往自幼至長愚騃若一由不知成人之道故也今自十五以上俟其能通孝經論語粗知禮義然後冠之其亦可也臣按此人家男子加冠之禮曲禮曰女子許嫁筓而字內則曰十有五年而筓雜記曰女雖未許嫁年二十而筓禮也婦人執其禮燕則鬈首孔穎達曰燕則鬈首者謂既筓之後尋常在家燕居則復去筓而分髮為鬌紒也此為未許嫁故雖已筓猶為少者處之賀瑒曰十五許嫁而筓則主婦及女賔為筓禮主婦為之著筓而女賔以醴禮之也未許而筓則婦人禮之無女賔不備禮也臣按此人家女子加筓之禮詳見朱氏家禮有女筓者按而行之以上人家冠筓之禮詩序曰摽有梅男女及時也召南之國被文王之化男女得以及時也陳傅良曰男女及時之說聖人之慮天下也血氣既壯難盡自檢情竇既開奚顧禮義故昏欲及時者所以全節行於未破之日學欲及時者所以全智慮於未分之時曲禮曰男女非有行媒謂媒氏往來不相知名謂男女之名非受幣不交交接不親親近故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚其别也取妻不取同姓故買妾不知其姓則卜之鄭𤣥曰見媒往來𫝊昏姻之言乃相知姓名重别有禮乃相纒固戴溪曰上以告之人君幽以告諸鬼神明以質諸鄉黨親戚上下幽明咸與聞之禮莫重於有别知之者衆則其别厚矣內則曰男子三十而有室女子二十而嫁有故二十三年而嫁聘則為妻奔則為妾方慤曰嫁止於二十娶必止於三十者隂以少為美陽以壯為强故也聘言由此而問彼奔言自此而趨彼昏義曰昏禮者將合二姓之好上以事宗廟而下以繼後世也是以昏禮納采納鴈以為采擇之禮問名問女之生母名氏納吉得吉卜而納之納徵又謂之納幣者納幣以為昏姻之證也請期昏姻日期皆主人筵几於廟而拜迎於門外入揖讓而升聽命於廟所以敬慎重正昏禮也吳澄曰昏禮先有行言之媒女家許乃納采謂男家納禮聽女家采擇擇而可乃問女名將以女之名歸而卜其吉與否卜而吉乃報女家曰納吉納吉後納幣而女家受之自此乃請期親迎而成昏也臣按古語云六禮不備貞女不行古人所以敬慎重正於昏禮如此敬則不敢慎則不忽重則必致其隆正則不流於僻所以然者蓋欲以之上奉宗廟下繼後世然亦使其知夫婦之倫乃綱常之大道男不敢忽其婦女不敢狎其夫必相與偕老而不輕相背棄也周禮大司徒以十有二荒政聚萬民十曰多昏劉彝曰夫婦之禮雖不可不謹於始然民有細微貧弱者或困於凶荒必待禮而後昏則男女之失時者多無室家之養聖人傷之寧邦典之或違而不忍失其昏嫁之時也故有荒政多昏之禮所以使之相依以為生而又有以育人民也詩不云乎豈弟君子民之父母茍無子育兆庶之心其能若此哉此則周禮之意也媒氏掌萬民之判因其别而合之凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁凡嫁子娶妻入幣純帛無過五兩丘葵曰昏姻欲致一故用純色之帛五兩十端也富者無過貧者亦可以及禮之中制也臣按成周之世嫁子娶妻純帛無過五兩謂之無過者禁止之辭也蓋慮世之人有以奢侈而踰度者故為之中制如此近世民情浮薄昏娶之際往往論財羔酒之外索取銀錢謂之財禮乃至民間聘定動踰數年而不能備數以至昏姻失時者往往有之朝廷明有定制有司不能舉行宜時申明之使男女之昏嫁各得其時是亦蕃民生厚風俗之一端也榖梁傳曰禮送女父不下堂母不出祭門廟門兄弟不出闕門兩觀父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般囊也盛物以備舅姑之用申之曰謹慎從爾父母之言臣按女婦以順從為德故女子之嫁人父母醮之必欲其從舅姑之言至其諸母不復有戒言惟丁寧致祝欲其從父母之言而已夫古昔盛時女子在家父母既隨時因事而教戒之矣及其適人也則又申戒之焉是以閨門雍穆而家道以成教之有素然也漢王吉上疏曰夫婦人倫大綱夭夀之萌也世俗昏娶太蚤未知為人父母之道而有子是以教化不明而民多夭司馬光曰世俗好於襁褓童幼之時輕許為昏亦有指腹為昏者及其既長或不肖無賴或身有惡疾或家貧凍餒或喪服相仍或從宦逺方遂至棄信負約速獄致訟者多矣臣按司馬光此言非但昏娶不可太蚤而聘定亦不可太蚤朝廷宜定為中制以為禁令是亦可以厚風俗息爭訟匡衡曰妃匹之際生民之始萬福之原昏姻之禮正然後品物遂而天命全司馬光曰古者男子三十而娶女子二十而嫁今令文謂宋朝禁令男子年十三以上並聽昏嫁今為此說所以參古今之道酌禮令之中順天地之理合人情之宜臣按醫經女子二七而天癸至任脈通男子二八而天癸至精氣溢宋朝令文男子十三以上並聽昏嫁臣竊以為十三亦為太早宜定制男女十歲以上方許聘定男必十六女必十四方許嫁娶而男女之年齒亦必略相當男可長於女女不可過長於男自昔浙東有溺女之風男子往往三四十嵗而無妻甚有終身不識女色者遇有嫠居聚徒爭奪告訐成風多致破家川蜀民風男僅數齡即娶倍長之女此皆風俗之不雅者諸如此類皆宜行禁革非獨可止爭訟是乃厚人倫美風化而亦可以蕃生育之性絶淫泆之端以上人家昏娶之禮左𫝊桓公十八年公與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗吕大圭曰古人制禮尺寸不敢踰毫釐不敢越者夫豈强拂人之性情而以繁文末節為尚哉經國家定禍亂而杜未然也泉水載衛女思歸而不可得載馳許穆夫人欲歸唁其兄而義不可夫人之適其國父母在則有歸寧既終則大夫行聘問而已古人制禮也嚴矣違此未有不敗莊公二十七年冬杞伯姬來歸寧也凡諸侯之女歸寧曰來出為夫所出曰來歸孔穎達曰歸寧者女子既嫁有時來歸問父母之寧否父母沒則使卿歸問兄弟也嫁謂之歸而寧謂之來見絶而出則以來歸為辭來而不反也榖梁禮婦人謂嫁曰歸反曰來歸明從外至反謂夫家所遣臣按女子於父母家乃其生身之地根本所自出固不可不歸寧但父母已沒則不可爾然於其兄弟嫂姪之間烏可恝然無情哉室邇則朝去夕歸道逺則遣人問遺是亦禮之近人情者也詩序泉水衛女思歸也嫁於諸侯父母終思歸寧而不得故作是詩以自見也曰毖彼泉水亦流於淇有懷于衛靡日不思孌彼諸姬聊與之謀朱熹曰衛女嫁于諸侯父母終思歸寧而不得故作此詩言毖然之泉水亦流于淇矣我之有懷于衛則亦無日而不思矣是以即諸姬而謀為歸衛之計也朱善曰禮緣人情而為之也夫既曰緣人情而為之則父母其本根也兄弟其同氣也皆人情之不可忘者而何為不可以寧兄弟也曰人情有出於天理之公者有出於人欲之私者聖人制禮將以全夫天理之正而節其人欲之流也據禮女子已嫁而反兄弟不與同席而坐不與同器而食所以厚别也則閨門之內所可與同坐而共食者惟母姑姊妹耳使父母沒而歸寧則誰與同坐誰與共食而孰為之主乎聖人於此寧以義斷恩不以恩掩義故制為父母終不得歸寧之禮所以存天理而遏人欲也以此為防猶有禽獸其行如齊襄魯桓夫人之所為者然後知聖人制禮真可謂萬世無弊者矣臣按女子嫁而歸寧古有是禮然父母終而無姑姊妹在室者不可也若有寡嫂及其人之年五十以上者揆之於人情似亦無害以上女子歸寧之禮以上家鄉之禮上之中大學衍義補卷五十
