body:
  text: 大學衍義補卷九十五明丘濬撰治國平天下之要備規制權量之謹舜典同律度量衡孔頴達曰律者候氣之管而度量衡三者法制皆出於律度有丈尺量有斛斗衡有斤兩皆取法於律蔡沈曰律謂十二律六為律六為呂凡十二管皆徑三分有竒空圍九分而黃鐘之長九寸既以之制樂而節聲音又以之審度而度長短則九十分黃鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引以之審量而量多少則黃鐘之管其容子榖秬黍中者一千二百以為籥而十當作合籥為合十合為升十升為斗十斗為斛以之平衡而權輕重則黃鐘之籥所容千二百黍其重十二銖兩籥則二十四銖為兩十六兩為斤三十斤為鈞四鈞為石此黃鐘所以為萬事根本諸侯之國其有不一者則審而同之也臣按律者候氣之管所以作樂者也而度量衡用以度長短量多寡稱輕重所用與律不同而帝世巡守所至同律而必及於度量衡何哉蓋以度量衡皆受法於律於此審之三者之法制皆與律同斯為同矣誠以是三物者其分寸籥合銖兩皆起於黃鐘而與候氣之律同出於一按律固可以制度量衡而考度量衡亦可以制律此聖人制律而及度量衡之本意也然聖人不徒因律而作樂而用之於郊廟朝廷之上而又頒之於下使天下之人用之以為造作出納交易之則焉其作於上也有常制其頒於下也有定法茍下之所用者與上之所頒者不同則上取於下者當短者或長當少者或多當輕者或重下輸於上者當長者或短當多者或少當重者或輕下虧於民上損於官操執者有增減之弊交易者有欺詐之害監守出納者有侵尅賠償之患其所關係蓋亦不小也是雖唐虞之世民淳俗厚帝王為治尚不之遺而况後世民僞日滋之時乎乞勑所司每正嵗申明舊制自朝廷始先校在官之尺量斗斛權衡使凡收受民間租稅器物不許過則又於凡市場交易之處懸掛則樣以為民式在內京尹及五城兵馬司官在外府州縣官每月一次校勘憲臣出巡所至必令所司具式呈驗公私所用有不如式者坐其所司及所造所用之人是亦王政之一端也五子之歌曰明明我祖禹也萬邦之君有典有則貽遺也厥子孫關通也石和平也鈞王府則有蔡沈曰典則治世之典章法度也百二十斤為石三十斤為鈞鈞與石五權之最重者也關通以見彼此通同無折閲之意和平以見人情兩平無乖爭之意言禹以明明之德君臨天下典則法度所以貽後世者如此至於鈞石之設所以一天下之輕重而立民信者王府亦有之其為子孫後世慮可謂詳且逺矣臣按聖人本律作器以一天下者非止一鈞石也而五子所歌舉大禹所貽之典則止言鈞石而不及其他何哉先儒謂法度之制始於權權與物鈞而生衡衡運生規規圓生矩矩方生繩繩直生準是權衡者又法度之所出也故以鈞石言之嗟夫萬物之輕重取信於權衡五權之輕重歸極於鈞石是雖一器之設而與太宰所掌之六典八則同為祖宗之所敷遺承主器而出治者烏可荒墜先祖之緒哉周禮內宰凡建國佐后立市陳其貨賄出其度量合方氏掌達天下之道路同其數器一其度量大行人王之所以撫邦國諸侯者十有一嵗同度量同數器臣按三代盛時所以制度量以定長短多寡以取信於天下者非但王府則有凡諸侯之國道路之間莫不有焉天子時巡則自用以一侯國之制非時巡之嵗則又設官以一市井道路之制焉是以當是之時一器之設一物之用莫不合於王度而無有異同否則非但不可行且有罪也此天下所以一統也歟典瑞璧羡以起度玉人璧羡度尺好璧孔也三寸以為度鄭𤣥曰羡者不圓之貌蓋廣徑八寸袤八尺以起度蔡元定曰按爾雅肉倍好謂之璧羡延也此璧本圜徑九寸好三寸肉六寸而裁其兩旁各半寸以益上下也其好三寸所以為璧也裁其兩旁以益上下所以為羡也袤十寸廣八寸所以為度尺也以為度者以為長短之度也則周家十寸八寸皆為尺矣陳氏言以十寸之尺起度則十尺為丈十丈為引以八寸之尺起度則八尺為尋倍尋為常王昭禹曰夫度在禮則起於璧羡在樂則起於黃鐘之長先王以為度之不存則禮樂之文熄故作璧羡使天下有考焉臣按班固漢志度之九十分黃鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引孫子算術蠶所吐絲為忽十忽為一絲十絲為一毫十毫為一釐十釐為一分十分為一寸十寸為一尺十尺為一丈則尺固當以十寸為正矧天地之數生於一而成于十十者天地之足數也以是為度以定萬物之長短豈非一定之理中正之道哉璧羡既起十以為丈引又起八以為尋常則非一定矣設欲用八去其十之二是則八也又何用别為之制哉臣愚以為璧羡雖古人之制然宜於古而未必宜於今也請凡今世所用之尺一以人身為則謹考許慎說文寸十分也人手卻一寸動謂之寸口十分為寸則十寸為尺也宜敇有司考定古法凡寸以中人手為準鑄銅為式以頒行天下凡所謂八寸六寸之尺雖古有其制皆不得行焉則用度者有定凖製造者有成法矣或曰人之手有短長體有肥瘠烏可據以為定哉曰自古制度者或以絫黍或以絲忽地之生黍豈皆無大小蠶之吐絲豈皆無粗細何獨致疑於人身哉且身則人人有之隨在而在擬寸以指擬尺以手雖不中不逺矣㮚氏為量改煎煉也金錫則不耗不復減耗不耗然後權之權之然後凖水平之凖之然後量量以黍之量之以為釜容六斗四升深尺內方尺而圜其外其實一釜其臀一寸其實一豆四寸為豆其耳三寸其實一升兩籥為合四合為升重一鈞三十斤其聲中黃鐘之宫槩所以為平而不稅不征其稅其銘曰時是也文文德之君思索思索以求其理允臻其極嘉量既成以觀四國永啓厥後兹器維則王昭禹曰量之為器內方而外圜則天地之象也其臀一寸其耳三寸則隂陽竒耦之義也其重一鈞則權衡之法寓焉其聲中黃鐘則律呂之法寓焉夫黃鐘為律之本而宫為五聲之綱量之所制其本起於黃鐘之籥其成也聲又復中於黃鐘之宫豈非以天下之法於此乎出而五則之法於此乎成歟非特此也宫於五行為土於五常為信則以量為法則之主且以立信於天下也惟其立信於天下故與天下為公平而不敢私焉鄭敬仲曰量之為物其粗則寓於規矩法度之末而其妙極於天下之精微蓋出於時文之思索而歸諸大中至正之道民所取中而芘者也雖童子適市莫之或欺矣出之以內宰掌之以司市一之以合方氏同之以行人凡以觀四國也舜之巡守所以同度量而孔子亦曰謹權量四方之政行焉五子之歌曰明明我祖萬邦之君有典有則貽厥子孫關石和鈞王府則有所謂永啓厥後兹器維則者也臣按先儒謂栗之為義有堅栗難渝之義使四方觀之以為則萬世守之以為法以立天下之信無敢渝焉所以名工謂之㮚氏也夫三代之量以金錫為之外圜而內方以象天地後世則改用木而內外皆方失古意矣古昔先王所以垂典則於子孫以示四方信後世者既有所謂大經大法而於器物之製作又皆各有成法焉然又恐其歲久而易壞也又必鎔煉金錫而鑄為之器權其輕重之劑準其髙下之等既精既堅無餘無缺刻為銘文以為世則置之王府之中以示天下之式以垂後世之範使其是遵是用不敢有所渝易焉以此為防末代乃有以公量收私量貸以暗收人心潛移國祚如齊陳氏者然後知古先哲王於巡守之時必同度量衡於行政之初必審權量非故為是屑屑也其為慮一何逺哉王制古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田即詩言南東其畝也百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分陳澔曰古者八寸為尺以周尺八尺為步則一步有六尺四寸今以周尺六尺四寸為步則一步有五尺一寸二分是今步比古步每步剩出一尺二寸八分以此計之則古者百畝當今東田百五十六畝二十五步一寸六分十分寸之四與此百四十六畝三十步不相應里亦倣此推之臣按孟子言仁政必自經界始所謂經界者治地分田經畫其溝塗封植之界也後世田不井授凡古之溝塗封植之界限盡廢所以經界者不過步其逺近量其廣狹分其界至以計其頃畝之數焉耳然欲計之而無所以經畫之尺度可乎大江以北地多平原廣野若欲步算固亦無難惟江南之地多山林險隘溪澗阻隔乃欲一一經畫之使無遺憾豈非難事哉古人丈量之法書史不載惟王制僅有此文然止言古今尺步畝里之數而不具其丈量之法今世量田用所謂步弓者不知果古法否然傳用非一日未必無所自也是法也施於寬廣平衍之地固無不可惟於地勢傾側紆曲尖邪之處其折量紐算為難小民不人人曉也是以任事之人易於作弊宋南渡初李椿年言經界不正十害首行於平江然後推及於諸郡當時亦以為便惟閩之汀漳泉三郡未及行朱子知漳州言於朝力主行之然竟沮於言者或曰宋人經界之法可行否歟曰何不可之有使天下藩服郡縣皆得人如李椿年朱熹鄭昭叔斯行矣雖然猶未也茍非大臣有定見得君之專以主之於上豈能不搖於羣議而終於必行哉月令仲春之月日夜分則同度量鈞平也衡稱上曰衡石百二十斤角校也斗甬正權稱錘概執以平量者仲秋之月日夜分則同度量平權衡正鈞三十斤石角斗甬鄭𤣥曰因晝夜等而平當平也同角正皆所以平之也吳澄曰衡下但言石於五者之中舉其至重者言也上曰量下又曰斗甬者先總言其器後言其名也權者衡之用概者量之用唯度既不析其名又不言其用者度自用無為之用者也臣按古先聖王凡有施為必順天道是以春秋二仲之月晝夜各五十刻於是乎平等故於此二時審察度量權衡以驗其同異或過而長或過而短或過於多或過於少或過於重或過於輕皆有以正而均之使之皆適於平焉後世事不師古無復順時之政雖有度量權衡之制一頒之後聽民自為無復審察校量之令故有纍數十年而不經意者矣况一歲而再舉乎民僞所以日滋國政所以不平此亦其一事也論語謹權量四方之政行焉饒魯曰謹權量是平其在官之權衡斗斛使無過取於民關石和鈞王府則有固是要通乎官民然民間權量關係尚淺最是官府與民交涉便易得加增取盈今之苗斛皆然當紂之時必是取民過制所以武王於此不容不謹臣按饒魯謂民間權量關係尚淺最是官府與民交涉便易得加增取盈今之苗斛皆然嗚呼豈但一苗斛哉苗斛之弊比其他為多爾凡官府收民貢賦其米麥之類則用斗斛布帛之類則用丈尺金銀之類則用權衡三者之中丈尺為害較淺惟斗斛之取盈積少成多權衡之按抑以重為輕民之受害往往積倍蓰以至於千萬多至破家鬻産以淪於死亡用是人不聊生而禍亂以作武王繼商辛壞亂之後即以謹權量為行仁政之始言權量而不言度非遺之也而所謹尤在於斯焉謂之謹者其必丁寧慎重反覆詳審而不敢輕忽也歟前漢律志度者分寸尺丈引也所以度長短也本起黃鐘之長以子谷秬黍黑色者中不大不小者一黍之廣度之九十分黃鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣夫度者别於分忖為寸蒦音約於尺張於丈信於引引者信天下也職在內官廷尉掌之臣按以上言度五度之義分者可分列也寸者忖也尺者蒦也丈者張也引者信也量者籥合升斗斛也所以量多少也本起於黃鐘之籥用度數審其容因度以生量審其中所容多少以子谷秬黍中者千有二百實其籥以井水凖其概合籥為合十合為升十升為斗十斗為斛而五量嘉善也矣夫量者躍於籥合於合登於升聚於斗角於斛也職在太倉大司農掌之臣按以上言量五量之義籥者躍也躍微動氣而生物也合音閣者合籥之量也升者登也斗者聚也斛者角斗平多少之量也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鐘之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石而五權謹矣始於銖兩於兩明於斤均於鈞終於石臣按以上言權五權之義銖者殊也物絲忽微始至於成著可殊異也兩者兩黃鐘律之重也斤者明也鈞者均也石者大也凡律度量衡用銅者名自名也所以同天下齊風俗也銅為物之至精不為燥溼寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行是以用銅也用竹為引者事之宜也臣按五度之法髙一寸廣二寸長一丈而分寸尺丈存焉惟引則用竹蓋引長十丈髙一分廣六分長而難以收藏故用竹篾為之為宜也五量之法用銅方尺而圜其外旁有庣不滿之處焉其上為斛其下為斗左耳為升右耳為合籥其狀似爵夫班志於度量二者皆言其所以製造之質或用銅或用竹獨於權衡略焉乃於下文總言度量衡用銅者意者權衡亦用銅歟後世於度量二者用木為之度間有用銅者而斗斛之制用銅鮮矣權之為器非若度量雖有長短大小之不同而各自為用惟權之一器則兼衡與凖而參用之所以為之質者亦各不同凖必以繩權必以銅而衡則以木若銅為之也後世一惟用木耳臣請詔有司考校古今之制鑄銅為度量權衡之式藏在户部頒行天下藩服郡縣凡民間有所鑄造必依官式刻其成造歲月匠作姓名赴官校勘印烙方許行使秦始皇二十六年一衡石丈尺呂祖謙曰自商君為政平斗甬權衡丈尺其制變於古矣至是並天下一之皆令如秦制也然此乃帝王初政之常秦猶沿而行之至於後世則鮮或舉之矣臣按秦事不師古至為無道而猶知以一衡石丈尺為先務况其不為秦者乎然呂祖謙作大事記於始皇平六國之初書曰一衡石丈尺而其解題則云自商君為政平斗甬權衡丈尺意其所書之石非鈞石之石也後世以斛為石其始此歟宋太祖詔有司精考古式作為嘉量以頒天下凡四方斗斛不中度不中式者皆去之又詔有司按前代舊式作新權衡以頒天下禁私造者太宗淳化三年詔曰書云同律度量衡所以建國經而立民極也國家萬邦咸乂九賦是均顧出納於有司繫權衡之定式如聞秬黍之制或差毫釐錘鉤為姦害及黎庶宜令詳定稱法著為通規臣按宋太祖太宗皆起自民間熟知官府出納之弊故其在位首以謹權量為務史謂比用大稱如百斤者皆懸鈎於架植鐶於衡或偃手或抑按則輕重之際殊為懸絶於是更鑄新式悉繇絫黍而齊其斤石不可得而增損也又令每用大稱必懸以絲繩既置其物則却立以視不可得而抑按繇是觀之可見古昔好治之君莫不愛民其愛民也凡官吏可藉以害民者無不預為之禁革則雖一毫之物不使過取於民彼其具文移著律例約束非不備刑罰非不嚴然利之所在人惟見利而不見害往往法外以巧取依法以為姦孰若每事皆立為一法如宋人之於權衡必齊其斤石不可得而增損又俾操執者却立以視而不得按抑噫使凡事事皆凖此以立為之法則官吏無所容其姦而小民不至罹其害矣程頤曰為政須要有綱紀文章謹權審量讀法平價皆不可闕朱熹曰所謂文章者便是文飾那謹權審量讀法平價之類耳臣按程子謂為政須要有綱紀文章謹權審量皆不可闕朱子謂文章便是文飾那謹權審量之類然但言文章而不及綱紀臣竊以謂權而謹之量而審之使其長短適平多寡酌中固是文飾之意然於操執之時或鉤錘之轉移衡尾之按抑收放之際或斛面之加淋旁庣之搖撼則是無綱紀矣是知聖人為治無一善之徒行無一法之徒立一器之設雖小也而必正其制度一物之用雖微也而必防其病弊惟恐一事之或失其宜一民之或被其害此所以巨細精粗無不畢舉上下四方無不均平也歟以上權量之謹臣按舜巡守同律度量衡而此止云權量而不及度者蓋論語叙武王之行政止言謹權量朱子注孟子引程子之言亦止言謹權審量而不及度意者權量之用比度為切歟不然則舉二以包其一也大學衍義補卷九十五
