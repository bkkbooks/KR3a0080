body:
  text: 大學衍義補卷一百二十二明丘濬撰治國平天下之要嚴武備器械之利下荀子曰魏氏武卒衣三屬之甲操十二石之弩負矢五十箇置戈其上䩜與胄同帶劍嬴負擔三日之糧如淳曰上身一髀禪一脛繳一凡三屬臣按魏之武卒操弩負矢而置戈其上是葢長短之兵兼用也司馬法曰兵不雜則不利長兵以衛短兵以守太長則難犯太短則不及太輕則鋭鋭則易亂太重則鈍鈍則不濟又曰弓矢禦句殳矛守句戈㦸助句凡五兵五當長以衛短短以救長迭戰則久皆戰則强見物與侔是謂兩之臣按所謂兵不雜則不利與夫長以衛短短以救長古今制隊伍用兵器其法不出此數言六韜曰陷堅陳敗强敵以大黄參連弩飛鳬電景矢自副註曰飛鳬赤莖白羽以鐡為首電影青莖白羽以銅為首臣按周禮六射之目其二曰參連參連云者謂前放一矢後放三矢連續而去也考吳越春秋有云夫射之道從分望敵合以參連後漢書亦云弩射以參連為竒夫古人自八歲入小學已學射藝而敎以參連之法自㓜及長習熟其事故仕而為將不仕而為卒無不能射者今世古法盡廢有能射疏及逺者已為竒矣若夫參連之法少有知者誠能以古參連法敎士卒使當矢石之間一射而連放三矢則是一人而兼三人之用也意者李廣以二千騎當胡騎四萬之圍所謂大黄即六韜所謂大黄參連乎漢髙祖四年初為算賦註民年十五以上至五十六出賦錢人百二十為一算為治庫兵車馬臣按此漢以後賦民治兵之始考史成帝建始元年立故河間王弟上郡庫令良為王註謂北邉郡庫官之兵器所藏故置令則前此邉郡各有庫庫有令以掌兵器舊矣然地理志於南陽郡宛下註有工官鐡官則不獨邉郡有武庫而内地亦有之矣髙祖時蕭何治未央宫立武庫以藏兵器臣按漢志中尉屬中有武庫令則是時既立武庫以藏兵器而設令以司之屬之中尉其後光武置武庫令主兵器則以屬執金吾考工令主作兵器弓弩之屬成則傳金吾入武庫魏晉一遵其制葢始于此也百官表中尉秦官武帝更名執金吾屬官有武庫令丞中尉屬官有武庫令少府屬官有若盧考工室令丞臣按漢書註若盧以藏兵器考工室主作器械哀帝時毋將隆言武庫兵器天下公用國家武備繕治造作皆度大司農錢邉吏職在禦寇賜武庫兵林駉曰周之兵器在民漢之兵器在官周之在民以兵農為一之時漢之在官以兵農已分之後臣按漢自郡國至于京師皆有武備在郡國則有庫兵或置工官庫兵以算賦為之而工官與鐡官同置于産鐡之郡在京師則有武庫令掌於中郡而天子又有若盧考工室以藏兵器以主作器械一以少府主之武庫則以大司農錢為之也漢制財用有二供天子雜用以少府之錢若大司農錢非軍國之事不得用也兵甲之作以為軍國之備故亦用大司農錢歟鼂錯言於文帝曰勁弩長㦸射疏及逺匈奴之弓弗能格也堅甲利刃長短相雜遊弩徃來什伍俱前匈奴之兵弗能當也材官騶發矢道同的匈奴之軍笥木薦弗能支也下馬地鬭劍㦸相接去就相薄匈奴之足弗能給也此中國之長技也臣按自昔談兵者皆以弩為中國之長技故漢兵器以弩為尚將軍有彊弩積弩之名而其用人亦有材官蹶張之目平城之圍陳平請强弩傅兩矢外向夏侯嬰徐行弩皆因滿外向淮南之反亦欲以强弩臨江而守卜式亦願與臨菑習弩者請行死之與夫弓弩持滿抱弩負籣盛弩箭箙見於周亞夫韓延夀之傳自古用弩以取勝見於史傳者不可勝紀今世則惟用弓矢而所謂弩者隊伍之間不復用矣意者有神機火鎗之用以代之故不復置歟然以臣觀之二者皆不可偏廢也敵惟用弓矢一事今我既用弓矢又用火鎗而又復用古人之弩則是敵之長兵一而我之長兵三以一制三敵騎欲來衝突不待短兵接而我之三技已斃之於百步之外矣武帝元狩二年李廣將四千騎出右北平匈奴左賢王將四萬騎圍廣廣為圜陳外向胡急擊矢下如雨漢矢且盡廣令持滿毋發而廣自以大黄射其裨將殺數人服䖍曰黄肩弩也晉灼曰黄肩即黄間也大黄其大者也漢志有逺望連弩射法具十五篇臣按古者弩之制有七一擘張弩二角弓弩三木單弩四大木單弩五竹竿弩六大竹竿弩七伏逺弩擘張弩步兵所用角弓弩騎兵所用木單竹竿伏逺等其力益大所及漸逺今世官兵全不用弩而四夷亦未聞有用者惟廣右猺獞用之然其弩不可施於騎殆古所謂擘張者歟炙轂子曰夷牟製角弩馬上用之則是角弓弩乃可用於騎者今不得其製然朝家萬一用之天下之大安知其無人以意㑹而為之者歟李陵傳發連弩射單于張晏曰三十絭共一臂諸葛亮傳亮性長於巧思損益連弩皆出其意臣按魏氏春秋云亮損益連弩謂之元戎以鐡為矢長八寸一弩十矢俱發夫弩而謂之連則非一弩也意必數者相連謂之損益者前蓋有此弩至亮而有所損益於其間耳考史魏司馬懿征公孫淵軍至遼東為發石連弩射城中唐李元諒節度隴西築連弩臺盧躭節度四川為大旝連弩南詔憚之則古人攻戰以連弩取勝者多矣今連弩之製不可考説者謂古時西蜀弩兵尤多大者莫踰連弩十矢謂之羣鴉一矢謂之飛鎗通呼為摧山弩即孔明所謂元戎也今具其法如此萬一有巧思者出因其名而想其意度以復古人之制是亦攻守之一助也虞詡為武都守令軍中彊弩勿發而潛發小弩羌并兵急攻使二十彊弩共射一人發無不勝臣按五兵之利莫利於弓弩而自漢以來而弩之取勝者比弓為多虞詡守武都遇有急攻使二十强弩共射一人此非但可用之以弩而弓矢之利亦宜依此用焉此即俗所謂攅射也宜申諭軍中習為攅射法臨戰之際寇中有驍勇出掠陳者攅矢而射之蔑不中矣陳球守零陵弦大木為弓羽矛為矢引機發之逺射千步臣按此大木弓後世無有可依其法製之以為守城寨之具明帝永平中北匈奴攻金蒲城耿恭為戊巳校尉以毒藥傅矢語匈奴曰漢家箭神其中創者必有異虜中矢者視創皆沸大驚匈奴相謂曰漢兵神真可畏也遂解去臣按今唐鄧山居者以毒藥漬矢以射獸應弦而倒謂之毛胡盧元末因用其人為兵立毛胡盧萬户府耿恭所用毒藥傅矢蓋此類也又聞廣西徭獞所用弩矢皆傅以藥中人濡縷即死比唐鄧者尤毒宜取其方付邉城以為毒箭是亦禦敵之一技也説者多謂西北地寒而藥性不行恐不可用然耿恭用之金蒲城豈非沍寒之地耶唐初置軍器監後併入少府監開元初以軍器使為監領領弩甲二坊臣按此唐人造軍器之所府兵之法人具弓一矢三十刀一其介胄戎具皆藏于庫有所征行則給之畨上宿衛者給弓矢横刀而已臣按此唐人府兵所執之器械也我朝制兵毎一百户轄百軍分為二隊毎隊銃手五名刀牌手十名弓箭手十五名鎗手二十名臣愚以為今毎隊之中短兵太多長兵太少宜如唐府兵之法毎人皆具弓刀則長短兼用也或曰國家承平于今百年内外懾伏何用變更為臣非敢變亂成法也亦惟循而用之特於定制隊伍中執短兵者加以長兵執長兵者加以短兵爾於舊制固無所更變也𤣥宗開元中擇宿衛勇者為畨頭習弩射又有羽林軍飛騎亦習弩凡伏逺弩自能弛張縱矢三百步臣按昔人謂弩者中國之勁兵四夷所畏服者也古有黄連百竹八擔雙弓之號絞車擘張馬弩之差後世亦有參弓合蟬手射小黄皆其遺法葢射堅及逺争險守隘怒聲勁勢遏衝制突者非弩不克馬燧為河南節度使造甲必為長短三等稱其所衣便於進趨臣按馬燧所造之甲可以為後世法則宋太祖開寳二年馮義昇岳義方上火箭法試之賜束帛真宗咸平元年馬軍都頭石歸宋進木羽弩箭以木為簳為翎長尺餘入鎧甲則簳去而箭留牢不可㧞五年石普言能發火毬火箭臣按古所謂火攻者因風縱火也而無有今世所謂火藥者宋太祖時始有火箭真宗時始有火毬之名然或假木箭以發未知是今之火藥否也今之火藥用硝石硫黄柳炭為之硝之名見于本草漢張仲景方論中已用為劑則是漢時已有矣然陶隠居日華子及宋圖經衍義等註未嘗言其可為兵用也硫黄自舶上來唐以前海島諸夷未通中國則唐以前無此也自古中國所謂礟者機石也用機運石而飛之致逺爾近世以火藥實銅鐡器中亦謂之礟又謂之銃銃字韻書無之蓋俗字也其以紙為之者俗謂之爆爆者如以火燒竹而有聲如竹爆然也今礟之製用銅或鐡為具如筒狀中實以藥而以石子塞其口旁通一線用火發之其石子之所及者無問人物皆糜爛然惟用之攻與守也戰則資其聲以為號令焉近有神機火鎗者用鐡為矢鏃以火發之可至百步之外捷妙如神聲聞而矢即至矣永樂中平南交交人所製者尤巧命内臣如其法監造在内命大將總神機營在邉命内官監神機鎗蓋慎之也歴考史册皆所不載不知此藥始於何時昉於何人意者在隋唐以後始自西域與俗所謂煙火者同至中國歟天祚國家錫以自古所無之兵器五兵而加以一五行而用其三可以代矢石之施可以作鼓角之號可以通斥候之信一物而三用具焉嗚呼神矣哉自有此器以來中國所以得志於四夷者徃徃藉此然用久而人玩敵人習知其故或出其巧智以為之避就者亦不能無也何也蓋士卒執此鎗而用之也人持一具臨時自實以藥一發之後倉卒無以繼之敵知其然凡臨戰陳必伏其身俟我火發聲聞之後即衝突而來請自今以後凡火鎗手必五人為伍就其中擇一人或二人心定而手捷目疾者専司持放其三四人者互為實藥畨遞以進専俾一人司放或髙或下或左或右應機遷就則發無不中者矣其視一發即退心志不定而髙下無凖者有間矣又宜用紙為爆其聲與火鎗等者毎發一鎗必連放三五紙爆或前或後以混亂之使敵不知所避如此則其用不測而無敵於天下矣書生不經戰陳以意消息而為此説乞下曽經戰陳者議其可否以聞太宗至道二年上部分諸將攻討李繼遷以方略授諸將先閲兵崇政殿引陳著為攻撃之狀刺射之法且令多設强弩及賊布陳萬弩齊發賊無所施其技矢纔一發賊皆散走凡十六戰而抵其巢穴臣按此前代用弩取勝之效真宗景徳元年幸澶州王師成列李繼隆等伏勁弩分據要害周文質部下以連弩射殺達蘭臣按宋澶淵之役所以退敵而成和者達蘭一矢之功也由是觀之則弩之為用其于守尤不可無焉城寨之守環之萬弩張其機而駕以矢動輒發焉其視礟銃必待㸃火弓矢必待開張其用為速矣歐陽修言於仁宗曰諸路州軍分造器械工作之際已勞民力輦用般送又苦道途然而鐡刃不剛筋膠不固長短大小多不中度造作之所但務充數而速了不計所用之不堪經歴官司又無檢責此有器械之虚名而無器械之實用也以草草之法敎老怯之兵執鈍折不堪之器百戰百敗理在不疑臨事而悔何可及乎臣按修此言切中官府造作之弊今世管工監造兵器者得無有近似之者乎宜嚴加戒飭庻不虛費民財物料工力官俸而無益於兵用也熈寧中内副都知張若水進神臂弓初民李宏獻此弓其實弩也以檿為身檀為弰鐡瞪鎗頭銅為馬面牙麻解索札絲為弦弩身通長三尺二寸兩弭各長九寸二分兩閃各長一尺一寸七分弝長四寸通長四尺五寸八分弦長二尺五寸箭木羽長數寸時於玉津園校驗射二百四十餘步穿榆木没長簳有司并箭奏御詔依式製造大觀中吳擇仁奏神臂弓實乃天授以甚利之器徽宗御筆謂射逺攻堅所向無前可謂利器使敵人習而能之非中國利令民間不得習製臣按自古弓弩之製其最善者漢稱大黄唐稱伏逺宋之神臂克敵其最也其製略見於史謹録於此使后世留心邉事者或因其名而得其遺法想像而造之以為中國之長技是亦禦邉衛民之一助也神宗時有臣僚上言曰方今外禦兩邉之患内虞盜賊之變而天下歳課弓弩甲胄之類入充武庫之積以千萬數乃無一堅好精利實可以為武備者臣嘗觀諸州作院有兵匠乏少而拘市人以備役所作之器但形質具而已矣武庫吏亦惟計其多寡之數藏之未有貴其實用者故所積雖多大抵敝惡為政如此而欲抗威决勝外懾夷狄之强獷内沮奸兇之竊發未見其可臣私計其便莫若更制法度斂數州之作而聚以為一處毎監擇知工事之臣使専於其職且募天下之良工散為匠師而朝廷内置工官以總制其事察其精窳而賞罸之則人人務勝不加責而皆精矣臣按此王雱所上之疏其言雖為宋神宗時發然今日亦可依此而行焉又熈寧六年置軍器監凡産材州置都作院凡天下知軍器監利害者聴詣監陳述於是吏民獻器械法式者甚衆是歳又置内弓箭南庫而軍器監奏遣使以利器頒諸路作為式臣按設官以造軍器是誠嚴武偹之要務我祖宗以來以其事屬之工部凡軍器専設軍器局軍裝設針工局鞍轡設鞍轡局掌管時常整㸃若有缺少隨即行下本局計料委官監督定立工程如法造完進納内帑内帑遇有闗支奏聞支給其外藩府州縣呈禀成造具奏行下依式造完支撥若各處有司歳造之數起解到部辨驗堪中送庫交收有不堪者坐監造者以罪其所邉軍器弓有二等曰二意角弓曰交阯弓鎗有二等曰魚肚鎗曰蘆葉鎗刀之制有馬軍雁翎刀步軍腰刀將軍刀凡三等又有馬軍义黒漆鈚子箭紅油團牌等器械若夫甲胄則有水磨頭盔水磨鑞子䕶項頭盔紅漆齊腰甲水磨齊腰鋼甲水磨栁葉鋼甲水銀摩挲長身甲併鎗馬赤甲之類此皆國初所造之制其後内兵仗局各以巧計加添新様者又不止是臣考漢之史臣稱頌宣帝綜核名實至謂其技巧工匠咸精其能此雖有司之事然亦上繋朝廷之政葢有是君則有是臣有是臣則有是政治政治之大者不徒在文事而亦有武功焉文事有一物之或遺則是其文之未明武功有一器之或虧則是其武之未備是故經武之有五兵猶修文之有六藉也六藉未明固是文之缺典五兵未具豈非武之失策乎漢宣帝於技巧工匠猶且留心况此兵戎之器所以修武備立戰功以衛國家安生靈而保國祚於億萬年者哉宋髙宗紹興中詔有司造克敵弓弓乃韓世忠所獻者命殿前司閲習詔能貫甲踰三石弓施二十矢者進秩一等帝謂宰執曰此弓最為强勁雖被重甲亦須洞徹若得萬人習熟何可當也其後楊存中以為克敵弓雖勁而士病蹶張之難乃増損舊製造馬黄弩製度精密彼一矢未竟而此發三矢矣臣按觀其所謂施二十矢及病蹶張之難之語則克敵雖以弓名其實弩也竊惟自古論兵者莫不以弩為中國長技臣故備載之以貽後世元西域人伊斯瑪音善造礟世祖時與阿爾威丹同至京師從攻襄陽未下伊斯瑪音相地勢置礟於城東南隅重一百五十斤機發聲震天地所擊無不摧陷入地七尺宋吕文煥遂以城降元人渡江宋兵陳于南岸擁舟師迎戰元人于北岸陳礟以擊之舟悉沈没後毎戰用之皆有功臣按元人始造此礟以攻破襄陽世因目曰襄陽礟考唐史李光弼作駁飛巨石一發輒斃二十餘人疑即此礟葢古原有此制流入西畨伊斯瑪音倣而為之也自有此駁用以攻城城無不破用以擊舟舟無不沈今民間多有知其制度者宜行天下俾民間有傳其式様者許具其圖本赴官投獻給賞有私藏習製者罪之而賞其首者仍將其式様給與邉將收藏非警急不許輒造亦猶宋徽宗禁民不許習製神臂弓然以上器械之利下大學衍義補卷一百二十二
