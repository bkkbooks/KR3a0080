body:
  text: 大學衍義補卷七十七明丘濬撰治國平天下之要崇教化本經術以為教下程頥曰大學孔氏之遺書而初學入德之門也於今可見古人為學次第者獨賴此篇之存而論孟次之學者必由是而學焉則庶乎其不差矣邵申曰他書言平天下本於治國治國本於齊家齊家本於修身者有矣言修身本於正心者亦有矣若夫推正心本於誠意誠意之本於致知致知之在於格物則他書未之言六籍之中惟此篇而已程復心曰不由是而學則記誦詞章之旨虛無寂滅之教與夫權謀術數百家衆技皆紛然雜出此其所以差也朱熹曰河南程氏兩夫子出實始尊信此篇而表章之既又為之次其簡編發其歸趣然後古者大學教人之法聖經賢傳之指粲然復明於世雖以熹之不敏亦幸私淑而與有聞焉顧其為書猶頗放失是以忘其固陋采而輯之間亦竊附己意補其闕略以俟後之君子極知僣踰無所逃罪然於國家化民成俗之意學者修己治人之方則未必無小補云臣按大學在禮記中程氏兄弟始表章之朱熹又為之章句或問又曰大學是曾子述孔子説為學之大方而門人又傳述以明其旨前後相因體統都具玩味此書知得古人為學所向却讀語孟便易入後面功夫雖多而大體已立矣又曰大學是為學綱領先讀大學立定綱領他書皆雜説在裏許通得大學了去看他經方見得此是格物致知事此是誠意正心事此是修身事此是齊家治國平天下事又曰今且熟讀大學作間架却以他書填補去又曰大學是箇腔子要填教他實臣按此二條真德秀所以作大學衍義本諸此又曰看大學且逐章理會先將本文念得次將章句來解本文又將或問來參章句須逐一令記得反覆尋究待念得浹洽既逐段曉得却統看溫尋過又曰大學一書有正經有章句有或問看來看去不用或問只看章句便了久之亦只看正經便了又久之自有一部大學在我胸中又曰大學之書譬如人起屋是畫一箇大地盤在這裏會得這箇了他日若有材料却依此起將去臣按朱熹謂某一生看得這文字透見得前賢所未到處溫公作通鑑言平生精力盡在此書某於大學亦然先須通此方可讀他書又謂不用某許多工夫亦看某的不出不用聖賢許多工夫亦看聖賢的不出臣按朱子有功於聖門非止一端然其最大者在大學一書是書在禮記中程子始表章之然猶未大明於世也朱子章句或問一出天下家傳而人誦之皆知聖門有全體大用之學為學者不能外此以求聖賢之道為治者不能外此以成帝王之功治而外此則為伯道用非其用無體故也學而外此則為異端體非其體無用故也朱子謂平生精力盡在此書擇焉而精其在章句語焉而詳其在或問乎所謂析之極其精而不亂合之盡其大而無餘其朱子自道歟程頥曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理此篇乃孔門傳授心法子思子恐其久而差也故筆之書以授孟子其書始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於密其味無窮皆實學也善讀者玩索而有得焉則終身用之有不能盡者矣朱熹曰中者不偏不倚無過不及之名庸平常也陳淳曰文公解庸為平常非於中之外别有所謂庸只是這中的便是日用平常道理平常與怪異字相對陳櫟曰不偏不倚未發之中以心論者也中之體也無過不及時中之中以事論者也心之用也臣按朱熹謂庸是依本分不為怪異之事堯舜孔子只是庸夷齊所為都不是庸了子思作書以是為名以見人之存心行事一切以不偏不倚無過不及為準則而其所以為是者皆是日用平常之事也故其為書不徒謂之中而又加以庸焉恐學者以中庸為難行之事使知其中即是庸不庸則非中矣又曰曾子學於孔子而得其傳子思又學於曾子而得其所傳於孔子者既而懼夫傳之久逺而或失其真也於是作為此書又曰中庸一篇某以己意分其章句是書豈可以章句求哉然學者之於經未有不得於辭而能通其意者黃幹曰中庸與他書不同論語是一章説一事大學亦然中庸則大片段須是滚讀方知首尾然後逐段解釋則理通矣今莫若且以中庸滚讀以章句仔細一一玩味然後首尾貫通真德秀曰中庸始言天命之性終言無聲無臭宜若髙妙矣然曰戒慎曰恐懼曰謹獨曰篤恭則皆示人以用力之方蓋必戒懼謹獨而後能全夫性之善必篤恭而後造無聲無臭之境未嘗使人馳心窈冥而不踐其實也臣按中庸一書雜在禮記中程氏始表出之至朱熹為之章句或問始大明於世蓋中之為言始於虞書庸之言則昉於易也堯以是傳之舜舜以是傳之禹湯文武周公皆聞而知是道者也孔子集羣聖之大成刪述六經既載其授受之言於書門人又記其所嘗言者於魯論之終篇中之道至是大著矣雖然中之在人雖出於心而人之所以信執之者不過言與行而已故於易之乾文言又著一庸字焉曰庸言之信庸行之謹嘗以語其門人曰中庸之為德也其至矣乎民鮮久矣門人既載之論語中子思以孔子之孫而親受業於曾子曾子親受其師之口傳面命者也有所受而為此書乃合中庸二字以為其書之名而載其聖祖所嘗語者於第二第三章所以立萬世聖學之標凖也其意若曰聖門之學必中而中又必庸乃人倫日用之常非詭異難行之事也是理也乃上天之所命人物之所率聖人之所以教學者之所以學帝王之所以治百姓之所以行一皆以是中庸為準則不可偏於此亦不可倚於彼不可以不及亦不可以太過平平焉以無險無陂常常焉以不怪不竒教者必於是而受其教以為學者亦必於是治者必於是而奉其治以為生者亦必於是為學者異乎此則為異端之差為治者異乎此則為伯道之雜先儒謂此為孔門傳授心法而臣亦曰子思所以立萬世聖學之標準者此也以上言中庸司馬遷曰孟軻述唐虞三代之德是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇朱熹曰熟讀七篇觀其筆勢如鎔鑄而成非綴緝可就也論語便是記録綴緝所為非一筆文字矣韓愈曰孔子之道大而能博門弟子不能遍觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以其能授弟子源逺而末益分惟孟軻師子思而子思之學出於曾子自孔子沒獨孟軻氏之傳得其宗故求觀聖人之道者必自孟子始又曰揚子雲曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢孟子雖賢聖不得位空言無施雖切何補然賴其言而今之學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左衽而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也陳櫟曰孟子闢楊墨功不在禹治洪水下者洪水溺人之身異端陷溺人心心溺之禍甚於身溺故也程頥曰孟子有大功於世以其言性善也又曰孟子性善養氣之論皆前聖所未發朱熹曰邪説橫流壞人心術甚於洪水猛獸之災慘於夷狄篡弒之禍故孟子深拒而力救之再言豈好辨哉豫不得已也所以深致意焉然非知道君子孰能真知其所以不得已之故哉又曰孟子道性善稱堯舜使天下曉然知仁義之所在者此所以正人心以為息邪説距詖行之本也排為我斥兼愛使天下曉然知邪詖之不可由者此所以息邪距詖而為正人心之用也蓋其體用不偏首尾相應如此然後足以撥亂世而反之正此所以雖得其本而不免於多言也然豈其心之所好哉亦畏天命悲人窮不得已而然耳臣按六經之外書籍之在天地間者論語之外有孟子故先儒論儒道之書必以論孟並言蓋此二書六經之骨髓儒道之根本也為學之要出治之法皆不外乎此六經譬則海也山也論語譬則泛海之航上山之階也孟子其入海之潢登山之徑乎故學堯舜禹湯文武周公之道者必自孔子入而入孔子之門者必自孟子始以上言孟子程頥曰學者當以論語孟子為本論語孟子既治則六經可不治而明矣又曰學者須將論語中諸弟子問處便作自己問聖人答處便作今日耳聞自然有得雖孔孟復生不過以此教人若能於語孟中深求玩味將來涵養成甚生氣質又曰凡看語孟且須熟讀玩味須將聖人言語切己不可只作一場話説人只看此二書切己終身儘多也又曰孔子言語句句是自然孟子言語句句是實事臣按程頥又言學者先讀論語孟子如尺度權衡相似以此去量度事物自然見得長短輕重朱熹亦謂先讀得語孟二書十分透徹其他書都不費力觸處便見由是觀之聖賢千言萬語不出乎孔孟之所言經籍積案盈箱不出乎語孟之所載學者茍能專心致志於此二書用之以制事推之以教人本之以事君施之以為政學問之功於是乎至聖賢之事於是乎畢矣朱熹曰論語之言無所不包而其所以示人者莫非操存涵養之要七篇之旨無所不説而其所以示人者類多體驗擴充之端或問於朱熹曰學者之於論孟其用功也奈何曰循序而漸進熟讀而精思可也曰然則請問循序漸進之説曰以二書言之則先論而後孟通一書而後及一書以一書言之則其篇章文句首尾次序亦各有序而不可亂也量力所至約其程課而謹守之字求其訓句索其旨不得乎前則不得求其後不通乎此則不敢志乎彼如是而循序漸進焉則意定理明而無疏易陵躐之患矣是不惟讀書之法是乃操心之要尤始學者之不可不知也曰其熟讀精思者何邪曰論語一章不過數句易以成誦成誦之後反覆玩味於燕間靜一之中以須其浹洽可也孟子每章或千百言反覆論辨雖若不可涯者然其條理疏通語意明潔徐讀而以意隨之出入往來以十百數則其不可涯者將有以得之於指掌之間矣臣按朱熹又言大抵觀書先須熟讀使其言皆若出於吾之口繼以精思使其意皆若出於吾之心然後可以有得耳徐行却立處靜觀動如攻堅木先其易者然後及其節目如解亂繩有所不通姑置而徐理之此朱子讀書法也程子亦曰讀書者當觀聖人所以作經之意與聖人所以用心聖人之所以至於聖人而吾之所以未至者所以未得者句句而求之晝誦而味之中夜而思之平其心易其氣闕其疑則聖人之意可見矣此程子讀書法也學者讀書誠以此兩賢之言為法則凡聖賢之所以著書立言與其所以立心制行而至於為聖為賢者皆可於言意之表得之矣得其言於心本之以制行本之以處事本之以為學本之以為政不徒出口入耳而皆有諸己以為實行措諸事以為實用聖賢地位不難到矣朱熹又曰論語工夫少得效多六經工夫多得效少又曰天下之物莫不有理而其精藴則已具聖賢之書故必由是而求之然欲簡而易知約而易守則莫若大學論語中庸孟子也又曰不先乎大學無以提挈綱領而盡論孟之精微不參之論孟則無以融貫會通而極中庸之歸趣然不會典極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉臣按孔孟之時已有六經之説而四書之名則始於宋焉所謂四書者論語大學中庸孟子也此數書者所謂為天地立心為生民立命為往聖繼絶學為萬世開太平之具也學者必先讀四書而後及於六經而讀四書者又必自大學始程子謂其為初學入德之門朱子謂其為古者大學教人之法真氏謂其為聖學之淵源為治之根柢君天下之律令格例是知儒者之書莫切要如大學一書小學由是而入德大學本是以為教聖人之道帝王之治皆不出乎是焉是則易也書也詩也春秋與禮也論孟之與中庸也皆所以填實乎大學一書今日在學校則讀之以為格物致知之資他日有官守則用之以為齊治平均之具我祖宗以學校育才以經術造士教之於學校者以此經此書取之於科目者以此經此書蓋將資之以為輔治之具而以是經是書之所載者以敷布乎天下使斯世斯民皆皥皡乎雍熙泰和之域也然則凡今日所施教而承學者烏可不知其所自哉以上兼言四書以上本經術以為教下大學衍義補卷七十七
