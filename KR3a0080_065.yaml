body:
  text: 大學衍義補卷六十五明丘濬撰治國平天下之要秩祭祀釋奠先師之禮上周禮大司樂掌成均五帝學名之法以治建國之學政而合國之子弟焉凡有道者有德者使教焉死則以為樂祖祭於瞽宗鄭𤣥曰有道德者若舜命夔典樂教胄子是也死則以為樂之祖神而祭之吕祖謙曰設教受教當知無窮意思若死則配食於樂祖祭於學校使天下常不忘所謂君子以教思無窮者也蓋不特是時尊師敬長之義使國之慎終追逺民德歸厚亦是當時有道德者教之入人之深當時設教有時雨化之者人自不能已大胥春入學舍采合舞舍音釋采讀為菜鄭𤣥曰春始以學士入學宫而學之始入學必釋菜禮先師也菜蘋蘩之屬吕大臨曰釋菜之禮禮之至簡者也皆不在多品貴其誠也其用有三每嵗春合舞則行之月令云仲春命樂正合舞舍菜也始立學則行之文王世子云既受器用幣然後舍菜是也始入學則行之學記云大學始教皮辨祭菜示敬道也王制天子出征反釋奠于學以訊馘告陳祥道曰訊者問其首馘者截其耳釋奠于學而告之者以學者文德之地也月令仲春之月上丁命樂正樂官之長習舞釋菜仲丁又命樂正入學習樂陳澔曰此月上旬之丁日必用丁者以先庚三日後甲三日也習舞釋菜謂將教習舞者則先以釋菜之禮告先師也馬睎孟曰釋奠用丁為文明故也文王世子凡學春官釋奠于其先師秋冬亦如之鄭𤣥曰官謂禮樂詩書之官周禮曰凡有道者有德者使教焉死則以為樂祖祭於瞽宗此之謂先師之類也若漢禮有高堂生樂有制氏詩有毛公書有伏生可以為之也陳澔曰釋奠者但奠置所祭之物而已無尸無食飲酬酢等事所以若此者以其主於行禮非報功也先師謂前代習明此事之師也凡始立學者必釋奠于先師及行事必以幣孔穎達曰諸侯始立學釋奠先聖先師而天子亦然陳澔曰諸侯初受封天子命之教於是立學所謂始立學也立學事重故釋奠于先聖先師四時之教常事耳故惟釋奠于先師而不及先聖也行事謂行釋奠之事必以幣必以奠幣為禮也始立學而行釋奠之禮則用幣四時常奠則不用幣也凡釋奠者必有合也有國故則否鄭𤣥曰國無先聖先師則所釋奠者當與鄰國合有國故則否謂若唐虞有夔伯夷周有周公魯有孔子各自奠之不合也朱熹曰以下文考之有合當為合樂國故當為喪紀凶札之類魏了翁曰釋禮者謂釋奠先師若禮有高堂生樂有制氏謂釋奠必有合若周有周公魯有孔子各自奠之不合也至於祀先賢於西學祭樂祖於瞽宗亦謂各於所習之學祭先師夫周公孔子非周魯所得而專也而經各立師則周典安有是哉自孔子以前曰聖曰賢有道有德未有不生都顯位沒祭大蒸者此非諸生所得祠也自君師之職不修學校廢井牧壞民散而無所繫於是始有師弟子羣居以相講受者所謂各祭其先師疑秦漢以來始有之而詩書禮樂各立師不能以相通此亦可見世變日降君師之職下移而先王之道分裂矣然而春秋戰國之亂猶有聖賢為之師秦漢以來猶有專門為之師故所在郡國尚存先師之號奠祠於學故記者識於禮而傳者又即其所見聞以明之也始立學者既興當作釁器用幣然後釋菜不舞不授器乃退儐于東序一獻無介語可也陳澔曰立學之初未有禮樂之器及其制作之興塗釁既畢即用幣于先聖先師以告此器之成既又釋菜以告此器之將用也熊禾曰釋奠有六始立學釋奠一也四時釋奠通前五也王制師還釋奠于學六也釋菜有三春入學釋菜合舞一也此釁器釋菜二也學記皮辨祭菜三也秋頒學合聲無釋菜之文則不釋菜也釋幣唯一即此釁器用幣是也學記大學始教皮辨祭菜示敬道也陳澔曰始教學者入學之初也有司衣皮辨之服祭先師以蘋藻之菜示之以尊敬道藝也吳澄曰古者始入學必釋菜于先聖先師故大學始初之教有司先服皮辨服行釋菜禮蓋示學者以敬先聖先師之道也常服𤣥冠今加服皮辨芹藻之菜簡質而潔皆示敬也漢高帝過魯以太牢祀孔子臣按此漢以來祀孔子之始平帝元年初追諡孔子曰褒成宣尼公姚燧曰孔子卒哀公誄之子貢以為非禮至漢平帝時始封諡褒成宣尼公蓋王莽假善以收譽遂其姦謀也臣按此後世尊崇孔子之始夫平帝之世政出王莽姦僞之徒假崇儒之名以收譽望文姦謀聖人在天之靈其不之受也必矣有若曰自生民以來未有盛于夫子者也豈一言一行之善而可以節惠立諡也哉然則不加以諡號將何以稱曰千萬世之下惟曰先師孔子以見聖人所以為萬世尊崇者在道不在爵位名稱也安帝延光三年祀孔子及七十二弟子於闕里臣按此後世祀孔子弟子之始魏正始七年令太常釋奠以太牢祀孔子于辟雍以顔淵配臣按漢以來釋奠之禮始見於此前此祠孔子者皆於闕里至是始行于太學晉武帝太始三年詔太學及魯國四時備三牲以祀孔子七年皇太子親釋奠于太學臣按此太子釋奠之始南宋文帝元嘉二十二年太子釋奠採晉故事裴松之議應舞六佾宜設軒懸之樂臣按釋奠用六佾軒懸之樂始此元魏文成帝詔宣尼廟别敕有司行薦享之禮臣按有司薦享始於此前此但云釋奠而未嘗言廟至是始有宣尼廟之文北齊每月朔制祭酒領博士以下及國子諸學生以上太學四門博士升堂助教以下太學諸生階下拜臣按此後世朔日行禮之始今制有朔望行香之禮此其權輿歟隋制國子學每嵗四仲月上丁釋奠于先聖先師州縣學則以春秋仲月釋奠臣按前此元魏雖命有司薦享未名為釋奠及有定時至是始命州縣學以春秋二仲釋奠唐高祖武德二年詔國子學立周公孔子廟各一所四時致祭臣按自魏釋奠孔子於辟雍後至元魏始有廟然不知其何時立也至是高祖始詔國子立廟然周公孔子各自為廟太宗貞觀二年左僕射房𤣥齡等議武德中詔釋奠於太學以周公為先聖孔子配享臣以為周公尼父俱稱聖人庠序置奠本緣夫子故晉宋梁陳及隋皆以孔子為先聖顔回為先師請停周公升孔子為先聖以顔回配從之臣按至是始定以孔子為先聖顔子為先師貞觀二十年詔皇太子于國學釋奠于先聖先師皇太子為初獻國子祭酒為亞獻司業為終獻初釋奠以儒官自為祭主至是中書奏按禮凡學春釋奠于先師注謂官詩書禮樂之官也彼謂四時之學將習其道故儒官釋奠各於其師既非國家行禮所以不及先聖至于春秋合樂則天子視學命有司興秩節總祭先聖先師焉請國學釋奠令國子祭酒為初獻祝辭稱皇帝謹遣仍令司業為亞獻博士為終獻其諸州刺史為初獻上佐為亞獻博士為終獻縣學令為初獻丞為亞獻無博士以主簿為終獻臣按此後世國學遣官釋奠之始前此蓋學官自祭也而州縣以守令主祭亦始於此貞觀二十一年詔以左丘明卜子夏公羊高榖梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭康成服子慎何休王肅王輔嗣杜元凱范寧賈逵二十二人代用其書垂於國胄自今有事於太學並令配享尼父廟堂臣按此後世以先儒配享孔子之始高宗乾封元年追贈孔子為太師總章元年顔回贈太子少師曽參贈太子少保並配享孔子廟臣按此後世追贈孔門弟子之始而以曽參配享亦始於此𤣥宗開元八年司業李元瓘言孔子廟顔子配其像立侍凖禮授坐不立授立不跪請據禮文合從坐侍又四科弟子閔子騫等雖列像廟堂不參享祀謹按祠令何休等二十二賢猶霑從祀豈有升堂入室弟子獨不霑配享之餘望請列享在二十二賢之上曽參孝道可崇凖二十二賢從享詔顔子等十哲宜為坐像悉令從祀曽參特為坐像坐十哲之次馬端臨曰禮記釋奠于先聖先師之說鄭康成釋先師以為如禮有高堂生樂有制氏詩有毛公書有伏生之類自是後儒言釋奠者本禮記言先師者本鄭氏唐貞觀時遂以左丘明以下二十二人為先師配食孔聖夫聖作之者也師述之者也述夫子之道以親炙言之則莫如十哲七十二賢以傳授言之莫如子思孟子必如是而後可以言先師可以繼先聖今舍是不録而皆取之於釋經之諸儒姑以二十二子言之獨子夏無以議為左丘明公羊高榖梁赤猶曰受經于聖人而得其大義至於高堂生以下則謂之經師可矣非人師也如毛鄭之釋經於名物固為該洽而義理間有差舛至王輔嗣之宗㫖老莊賈景伯之附㑹䜟緯則其所學已非聖人之學矣又况戴聖馬融之貪鄙則其素履固當見擯於洙泗今乃俱在侑食之列而高第弟子除顔淵之外反不得與李元瓘雖懇懇言之而僅得升十哲曽子儕於二十二子之列而七十二賢俱不霑享祀蓋拘于康成之注而以專門訓詁為盡得聖人之傳也臣按塑像之設自古無之至佛教入中國始有也三代以前祀神皆以主無有所謂像設也彼異教用之無足怪者不知祀吾聖人者何時而始為像云觀李元瓘言顔子立侍則像在唐前已有矣嗚呼姚燧有言北史敢有造泥人銅人者門誅則泥人固非中土為主以祀聖人法也後世莫覺其非亦化其道而為之郡異縣殊不一其狀長短豐瘠老少美惡惟其工之巧拙是隨就使盡善亦豈其生盛德之容甚非神而明之無聲無臭之道也國初洪武十四年首建太學聖祖毅然灼見千古之非自夫子以下像不土繪祀以神主數百年之習乃革嗚呼盛哉夫國學廟貌非但以為師生瞻仰之所而天子視學實於是乎致禮焉夫以冕旒之尊而臨夫俎豆之地聖人百世之師坐而不起猶之可也若夫從祀諸儒皆前代之縉紳或當代之臣子君拜於下而臣坐於上可乎臣知非獨名分之乖舛而觀瞻之不雅竊恐聖賢在天之靈亦有所不安也或者若謂既已摶土為之事之以為聖賢一旦毁之以為泥滓似乎不恭竊觀聖祖詔毁郡邑城隍塑像用其土泥壁以繪雲山載在令甲可考也矧所塑者特具人形耳豈真聖賢之遺貌哉程頤論人家祖宗影有一毫不類則非其人彼親見其人而貌之有毫髮不肖似尚非其人况工人隨意信手而為之者哉臣惟文廟之在南京者固已行聖祖之制今京師國學乃因元人之舊正統中重修廟學惜無以此上聞者儻有以聞未必不從今天下郡邑恐于勞民無俟改革惟國學乃天子臨視之所乞如聖祖之制以革千古之陋習如儒臣宋訥所云者誠千萬世儒道之幸仰惟我聖祖有大功於世教十數此其一也發揚祖宗之功烈亦聖子神孫繼述之大者開元二十七年追諡孔子為文宣王贈顔子為兖國公閔損等九人為侯曽參等為伯姚燧曰杜預春秋傳叙曰子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也斯言為獲聖人之心而後世王之堯舜二帝也宰我以夫子逺賢於堯舜何王之不可居然後世天子之子有功之臣皆曰王以孔子之聖卒下比爵於其臣子誠不知其可也臣按此孔子封王弟子封公侯之始夫自漢平帝追諡孔子為宣尼公後世因謂孔子為宣父又謂為宣尼至是又加文與宣為諡然文之為言諡法有所謂經緯天地者也孔子亦曰文王既沒文不在兹乎以是諡之固亦幾矣若夫宣之為宣諡法之美者不過聖善周聞而已豈足以盡吾聖人之大德哉况唐未加聖人是諡之前而北齊高洋李元忠南齊蕭子良隋長孫賢之數人者固先有此諡矣天生聖人為萬世道德之宗主稱天以誄之猶恐未足以稱其德彼區區荒誕之稱汙下之見何足以為吾聖人之輕重哉以上釋奠先師之禮上大學衍義補卷六十五
