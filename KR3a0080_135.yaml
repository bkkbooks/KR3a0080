body:
  text: 大學衍義補卷一百三十五明丘濬撰治國平天下之要嚴武備察軍之情詩邶風擊鼓之首章曰擊鼓其鏜擊鼓聲踊躍坐作擊刺之狀用兵戈戟之屬土土功國國中城漕衛邑名我獨南行朱熹曰春秋隱公四年宋衛陳蔡伐鄭正州吁自立之時衛人從軍者自言其所為因言衛國之民或役土功於國或築城於漕而我獨南行有鋒兵端鏑矢鋒死亡之憂危苦尤甚也臣按本朝學士朱善曰役土功於國者此民也築城於漕者亦此民也南行而平陳與宋者又此民也先王之於民也不得已而用之則必先其所急後其所緩未聞衆役並興罷民之力以逞己之志若斯之甚者也是亦可謂忍矣其卒至於敗亡也宜哉吁國風之詩皆出於閭巷之言先王命官采民詩以觀民風民之言見於詩為治者誠能因民之言而察民之心所欲與聚所惡勿施王天下之大本在此矣况征伐大事又烏可咈民之情而必從己之志哉王風君子于役首章曰君子婦人目其夫之辭于役不知其期曷至哉雞棲于塒鑿墻而棲曰塒日之夕矣牛羊下來君子于役如之何勿思朱熹曰大夫久役于外其室家思而賦之曰君子行役不知其反還之期且今亦何所至哉雞則棲于塒矣日則夕矣牛羊則下來矣是則畜産出入尚有旦暮之節而行役君子乃無休息之時使我如何而不思也哉臣按謝枋得曰雨雪霏霏遣戍役而預言歸期也卉木萋萋勞還率而詳言歸期也四牡之使寧幾何時勞之曰我心傷悲吉甫在鎬不過千里勞之曰我行永久吾觀先王之心惟恐一人之勞苦惟恐一人之怨咨何也不如是非所以體羣臣也本于推已及物之恕發而為序情閔勞之仁豈有無期度者哉今君子于役至于不知其期仁恕之意泯然矣由是推之暫時之役近地之行猶不可以無期矧以中土之人而為邊鄙之戍沙漠沍寒之塞炎蒸瘴厲之鄉一籍邊關永無可歸之期則人之愁怨無聊也可知矣居人上者恆念及此其去也有常時其歸也有定限知其苦而閔其情加以恩而厚其賞則彼雖艱苦萬狀亦所甘心矣唐末之禍起于龎勛桂林之戍不更後世人主尚鑒之哉小雅采薇首章曰采薇菜名采薇薇亦作生出地也止曰歸曰歸嵗亦莫晚也止靡無也室靡家玁狁北狄之故不遑暇也啓跪也居玁狁之故其卒章曰昔我往矣楊柳蒲柳依依今我來思雨雪霏霏雪甚貌行道遲遲長逺也載渴載飢我心傷悲莫知我哀詳見真氏前書朱熹曰此遣戍役之詩以其出戍之時采薇以食而念歸期之逺也故為其自言而以采薇起興曰采薇采薇則薇亦作止矣曰歸曰歸則嵗亦莫止矣然凡此所以使我舍其室家而不暇啓居者非上之人故為是以苦我也直以玁狁侵陵之故有所不得已而然耳蓋敘其勤苦悲傷之情而又風以義也程子曰毒民不由其上則人懷敵愾之心矣又曰卒章又設為役人預自道其歸時之事以見其勤勞之甚也程子曰此皆極道其勞苦憂傷之情也上能察其情則雖勞而不怨雖憂而能勵矣范氏曰豫于采薇見先王以人道使人後世則牛羊而已臣按采薇之詩真氏已載其全篇於格物致知之要下察民情條其言謂此戍者之情鬱結於中不能以自訴者文王乃先其未發歌詠以勞之如其身之疾疚焉者而臣於此不復詳載惟摘取其首末二章而備詳程朱之言程氏所謂毒民不由其上則人懷敵愾之心上察民情則雖勞而不怨雖憂而能勵斯二言也真得斯民之情在上者誠知軍旅為毒民之具凡有興舉皆為乎民非不得已而不為及其役之也又能深察其情知其勞苦之狀恤其飢寒之苦憐其室家之離曠念其生業之廢墜有所用心則為上所知有所效力則不為人所掩如此則彼雖勞也而忘其為勞雖憂也而忘其為憂而一於敵君王之愾而功無不成矣詩序苕之華大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以飢饉君子閔周室之將亡傷已逢之故作是詩也其首章曰苕陵苕之華藝其黃矣心之憂矣維其傷矣朱熹曰詩人自以身逢周室之衰如苕附物而生雖榮不久故以為比而自言其心之憂傷也何草不黃下國刺幽王也四夷交侵中國背叛兵革不息視民如禽獸君子憂之故作是詩也其首章曰何草不黃何日不行何人不將經營四方二章曰何草不玄何人不矜無妻曰矜哀我征夫獨為匪民朱熹曰周室將亡征役不息行者苦之故作此詩言何草而不黃何日而不行何人而不將亦行也以經營於四方也哉李樗曰文王之民無不得其所矣而猶視之如傷此周之所以興也幽王之民愁苦甚矣而幽王曽不之恤視民如禽獸此周之所以亡也興亡之鑒豈逺乎哉謝枋得曰東山采薇出車杕杜諸詩序情閔勞皆以室家之望者為説同為天民血氣嗜欲豈有異哉先王以民待民幽王之待民如犬馬耳故曰哀我征夫獨為匪民臣按先儒謂苕之華言國家之衰微時物之凋耗人民不聊其生天運窮矣何草不黃言士民役使之煩數征行之勞苦上之人視之與禽獸無異人事極矣周室至是無可為矣此黍離所以降為國風也噫人君當四方無虞之時九重清燕之時試以二詩與先儒所論者而諷味焉其尚日思所以愛惜民力而培養元氣凡有興師動衆揆之於天道人情物理事勢茍可以已者無不已之非甚至於不得已無不已焉者以民待民而不至以犬馬待其民必毋使天運至此而窮人事至此而極如二詩所云者天下豈有亂亡之禍哉桑柔芮伯刺厲王也其二章曰四牡騤騤旟旐有翩亂生不夷平也靡國不泯滅也民靡有黎黑也具俱也禍以燼灰燼於乎有哀國步運也斯頻急蹙也朱熹曰厲王之亂天下征役不息故其民見其車馬旌旗而厭苦之自此至第四章皆征役者之怨辭也輔廣曰王者豈能無所征役但出於不得已則民將悅而從之以忘其勞今也使人見其車馬旌旗而厭苦若是則民不可得而用矣亂生不夷亂日生而無平定之期也無國不滅無民不燼則甚言之耳君子之哀則哀其國家運祚之急蹙也其三章曰國步蔑滅也資咨也天不我將養也靡所止疑定也云徂何往君子實維秉心無競爭也誰生厲怨也階至今為梗病也朱熹曰言國將危亡天不我養居無所定徂無所往然非君子之有爭心也誰實為此禍階使至今為病乎蓋曰禍有根原其所從來也逺矣輔廣曰居無所定則無以自安也徂無所往則無以避患也凡為君子則其心無所爭耳然不知誰為此厲階而使至今為病乎其四章曰憂心殷殷念我土鄉也宇居也我生不辰時也逢天僤厚也怒自西徂東靡所定處多我覯見也痻病也孔棘急也我圉邊也輔廣曰土宇謂鄉里與室家也周在西故曰自西徂東前三章雖皆是征役者怨辭然二章則言亂生不已而要其禍亂之終三章則言行止無定而原其禍亂之始四章則言多矣我之見病也急矣我之在邊也情益切而辭益哀矣臣按桑柔之詩凡十六章此四章皆士卒遭亂離而厭苦自傷之辭人君當承平無事之時而諷之於口察之於心必先有以調息而消弭之使其厲階不生國步不頻民之居者皆有定所民之出也皆有定向不至於多矣其見病也急矣其在邊也則夫橫目而黎首者見其車馬之盛旌旗之美則欣欣然有喜色而不疾首蹙頞以相哀相怨矣漢高祖四年下令軍士不幸死者吏為衣衾棺斂轉送其家六年令吏卒從軍至平城及守城邑者皆復終身勿事八年又令士卒從軍死者為槥歸其縣縣給衣衾棺葬具祠以少牢長吏視葬臣按復謂除其賦役也光武建武元年從薊還范陽命收葬吏士臣按高光皆起自兵間目見軍士之勞苦故其於死者眷眷如此也死者感恩於地下則未死者安得不大有所感乎古人於犬馬之死猶必葬之以帷蓋況兵士有功於我乎唐陸贄言於德宗曰曠嵗持久師老費財加算不止於舟車徴卒殆窮於閩濮笞肉捶骨呻吟里閭送父别夫號呼道路杼軸已甚興發已殫而將帥猶曰財不足兵不多又曰興師四方無逺不暨父子訣别夫婦分離一人征行十室資奉居者有餽送之苦行者有鋒刃之憂去留騷然而閭里不寧矣贄又言曰古之善選置者必量其性習辨其土宜察其技能知其欲惡用其力而不違其性齊其俗而不易其宜引其善而不責其所不能禁其非而不處其所不欲而又類其部伍安其室家然後使之樂其居定其志奮其氣勢結其恩情撫之以惠則感而不驕臨之以威則肅而不怨靡督課而人自為用弛禁防而衆自不攜故出則足兵居則足食守則固戰則強其術無他便於人情而已矣今則散徴士卒分戍邊陲更代往來以為守備是則不量性習不辨土宜邀其所不能強其所不欲求廣其數而不考其用將致其力而不察其情斯可以為羽衛之儀而無益備禦之實也何者窮邊之地千里蕭條寒風裂膚驚沙慘目與豺狼為鄰伍以戰鬪為嬉遊晝則荷戈而耕夜則倚烽而覘日有剽害之慮永無休暇之娛地惡人勤於斯為甚自非生於其域習於其風幼而覩焉長而安焉不見樂土而不遷焉則罕能寧其居而狎其敵也又曰今者窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇角其所能則練習度其所處則孤危考其服役則勞察其臨敵則勇然衣糧所給惟止當身例為妻子所分常有凍餒之色而關東戍卒嵗月踐更不安危城不習戎備怯於應敵懈於服勞然衣糧所頒厚踰數等豐約相形隔絶斯甚臣按陸贄之言灼見人情事弊而於征行之勞擾邊塞之苦楚人情之哀怨軍伍之事宜忽忽如昨日事如身親履其地而目親見其人辛苦勞頓悲啼怨恨阽於死亡欲求須臾之生而不可得也其所以為之處置者則又如親見其人親理其事必如此而後可不如此則決然有不可者非泛泛然而虛為之言也後世聖君賢輔凡贄所言皆當恆寫一通置之座隅使邊塞寒苦之狀士卒哀怨之情恆接乎目每動於心宋太祖建隆元年給攻城役夫死者人絹三匹復三年三年又詔瘞征蜀戰死士卒被傷者給繒帛臣按創業之君一戎衣而有天下雖曰天命然非人力亦不能以成也同時將士與我百戰以爭天下致我貴為天子富有四海之大而又傳於子孫世世享其富貴而無窮其一時攀鱗附翼之人幸而生者固與我共享之矣而其子孫亦與有焉若夫不幸而死者則是徒以一命而膏草野何為也哉此古之帝王所以既用人之力必恤人之身非徒恤其生而必恤其死也繼世之君坐享富貴者尚體祖考之心而毋忘其富貴之所自哉張方平言於仁宗曰戰勝之後陛下可得而知者凱旋捷奏拜表稱賀赫然耳目之觀至於逺方之民肝腦屠於白刃筋骨絶於餽餉流離破産鬻賣男女薰眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也譬猶屠殺牛羊刳臠魚鱉以為膳羞食者甚美死者甚苦使陛下見其號呼於梃刃之下宛轉於刀几之間雖八珍之美必將投箸而不忍食而況用人之命以為耳目之觀乎臣按此蘇軾代方平所草之奏也人君有欲用兵以廣地而雪憤者觀此亦可以惕然於心矣或言古人之兵當如子弟之衛父兄而孫吳之徒必曰與士卒同甘苦而後可是子弟必待父兄施恩而後報也朱熹曰巡三軍拊撫也而勉慰也之三軍之士皆如挾纊纊綿也言悅以忘寒此語出左傳此意也少不得臣按孔子曰體羣臣則士之報禮重解者曰體者設以身處其地而察其心也此言最善形容夫人君之於士卒雖曰勢分懸絶然其好惡則初無以異人君誠能設以其九重之身而處夫四塞之地而察其好惡之情切切然形之於言孜孜然念之於心恆使萬里之外如在咫尺之間邊塞之境恆在殿陛之下有情而無不達有功而無不知有屈而無不伸則凡為吾禦邊而敵愾者豈有不盡其心也哉或者之言所謂古人之兵當如子弟之衛父兄此就下人而言大義固當如是也若夫居人上者不能體情以盡下而惟責下之盡義非所謂以人望人也朱子所謂巡而拊之三軍之士皆如挾纊此意也少不得非但為將者少不得也而為君者亦豈可少哉以上論察軍之情大學衍義補卷一百三十五
