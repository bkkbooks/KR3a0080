body:
  text: 大學衍義補卷九十明丘濬撰治國平天下之要備規制冕服之章易黃帝堯舜垂衣裳而天下治蓋取諸乾坤張栻曰作衣裳以被之於身垂綃為衣其色𤣥而象道襞幅為裳其色纁而象事法乾坤以示人使民知君臣父子尊卑貴賤莫不各安其分也謝枋得曰乾天在上衣象衣上闔而圓有陽奇象坤地在下裳象裳下兩股皆陰偶象上衣下裳不可顛倒使人知尊畢上下不可亂則民志定天下治矣丘富國曰十三卦制器而尚象皆通變宜民之事特於黃帝堯舜氏言之者羲農之時人害雖消而人文未著衣食雖足而禮義未興為之君者方且與民竝耕而食饔飱而治蚩蚩蠢蠢蓋未識所謂上下尊卑之分於是三聖人者仰觀俯察體乾坤之象正衣裳之儀使君臣分義截然於天高地下之間天下其有不治者乎臣按先儒謂衣裳即舜所謂古人之象五色作服者是也蓋衣裳之制始於黃帝備於堯舜書帝曰豫欲觀古人之象像也日月以下是也日月星辰山龍華蟲作會宗彜藻火粉米黼黻絺繡以五采彰施於五色作服汝明蔡沈曰日月星辰取其照臨也山取其鎮也龍取其變也華蟲雉取其文也會繪也宗彜虎蜼取其孝也藻水草取其潔也火取其明也粉米白米取其養也黼若斧形取其斷也黻為兩已相背取其辨也絺紩也紩以為繡也日也月也星辰也山也龍也華蟲也六者繪之於衣宗􅉓也藻也火也粉米也黼也黻也六者繡之於裳所謂十二章也采者青黃赤白黑也色者言施之於繪帛也繪於衣繡於裳皆雜施五采以為五色也汝明者汝當明其大小尊卑之差等也臣按舜欲觀古人之象則是章服在舜之前已有矣古者自天子以下至於士皆有服章多少之數以次而殺上得兼下下不得僭上今世冕服惟天子及親王有之自公侯以下皆無有也周禮辨師掌五冕之官掌王之五冕袞冕鷩冕毳冕絺冕𤣥冕皆𤣥冕朱裏𤣥表朱裏延即冕之覆在上者紐小鼻也綴於延上四旁以笄貫之五采繅十有二就以五采絲為繩如繅以貫玉垂於延之前後各有十二就皆五采玉十有二以五采玉相間玉筓以玉為筓朱紘以朱為紘綴笄兩端結於頷下王之皮辨視朝之服會五采結五采玉玉璂即五采玉十二也𧰼邸以象骨為之玉笄王之辨絰弔服辨而加環絰纒而不紏王安石曰五采備采也十有二備數也玉十有二備物也臣按先儒謂冕服有六而云五冕者祀昊天上帝服大裘則服袞可知矣大裘與袞同一冕也此所謂五冕歟司服掌王之吉凶衣服吉祭服凶喪服辨其名物名以命之物以色之與其用事王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則袞冕享先公饗享食賔客射與諸侯射則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕祭羣小祀林澤墳衍四方百物之屬則𤣥冕凡兵事韋謂革之熟者辨冠也服視朝則皮辨服凡甸冠辨服甸獵冠服凡凶事服辨喪冠服凡弔事辨經服大扎大荒大烖素服吳澄曰用事謂祭祀視朝甸凶弔之事臣按虞書以日月星辰山龍華蟲宗彜藻火粉米黼黻為天子十二章服而其祭祀兼用諸侯之五服者大章小章俱備十二之數也司裘掌為大裘以共王祀天之服中秋獻良裘王乃行羽物季秋獻功裘以待頒賜吳澄曰大裘者黑羊裘服之祀天示質也良裘者王所服之善裘也功裘者謂人功治之者臣按用裘以為祭天之服蓋反古始也天地生人之初未有織紝惟衣鳥獸之皮而已其後乃有絲枲之事屨人掌王之服屨單履曰屨為赤舄復屨曰舄黑舄赤繶縫中紃也黃繶青句當作絇素屨葛屨凡四時之祭祀以宜服之吳澄曰言屨必言服服各有屨也吉服有九舄三等赤舄為上冕服之舄也其下白舄黑舄絇為之拘著舄屨之頭以為行戒也臣按所謂凡四時之祭祀以時服之者若吉祭則用赤舄黑舄喪祭則用素屨葛屨皆隨時之宜禮記天子玉藻十有二旒前後邃深也延冕上覆也龍卷與袞同畫龍於衣以祭陳澔曰玉冕前後垂旒之玉也藻雜采絲繩之貫玉者也以藻穿玉以玉飾藻故曰玉藻馬睎孟曰冕之為物後方而前圓後仰而前俯有延在上有旒在下視之則延長察之則深邃臣按玉藻至邃延言首服之冕龍卷言身服之衣皮辨以日視朝遂以食孔穎達曰天子既著皮辨視朝遂以皮辨而朝食所以敬養身體臣按此天子服皮辨之禮論語子曰服周之冕何晏曰黃帝作冕其制蓋以木為幹以布衣之上𤣥下朱取天地之色阮湛三禮圖云長尺六寸廣八寸天子以下皆同前圓後方前垂四寸後垂三寸朱熹曰周冕有五祭服之冠也冠上有覆前後有旒黃帝以來蓋已有之而制度儀等至周始備然其為物小而加於衆體之上故雖華而不為靡雖費而不及奢夫子取之蓋以為文而得其中也或問周冕不為侈何也曰加之首則體嚴而用約詳其制則等辨而分明此周冕所以雖文不為過也夏商之制雖不可考然意必有未備者矣臣按冕自黃帝以來已有之至周而其制始備先儒謂周尚文則有過於文者周之冕則得乎文之中者也漢官儀曰天子冠通天冠後漢志通天冠高九寸正豎頂少邪却乃直下為鐵卷梁前有山展筒為述駁犀簮導乘輿所常服隋志平冕俗所謂平天冠也臣按晉志云通天冠本秦制前有展筒冠前加金博山述郊祀天地明堂宗廟元會臨軒介幘通天冠平冕冕皂表朱緑裏加於通天冠上前圓後方垂十二旒又通典謂宋加黑介幘齊加玉簮導梁加冕於上為平天冕意所謂通天冠者先戴之於首然後加冕於其上歟至宋通天冠二十四梁加金博山附蟬十二戴此冠則服絳紗袍隋文帝聽朝之服以赭黃文綾袍烏紗帽折上巾六合鞾與貴臣通服惟天子之帶十有三鐶至唐高祖以赭黃袍巾帶為常服臣按天子服黃始於隋後遂因之以為常唐志太宗常以幞頭起於後周便武事者也方天下偃兵採古制為翼善冠自服之臣按翼善冠天子始以為常服後尋廢不用至宋淳化二年詔檢討翼善冠制度及所用衣服自是遂常服之南齊輿服志袞衣漢世出陳留襄邑所織宋末用繡及織成齊建武中乃采畫為之加飾金銀薄時亦謂為天衣臣按此後世袞衣之制宋志天子之服一曰大裘冕二曰袞冕三曰通天冠絳紗袍四曰履袍五曰衫袍六曰窄袍天子祀享朝會親耕及視事燕居之服也七曰御閲服天子之戎服也中興之後則有之臣按此宋朝一代冕服之制其間所謂大裘冕者用以郊祀當時有司及陸佃何洵直等議論不一其所製造或以黑羔皮或以黑繪代之或謂其冕無旒或謂以袞襲之或者又謂袞冕至大次質明改服大裘兩不相戾訖無定論夫祀天之器物一切以素質故其服亦以質焉今既不掃地用陶匏則其服獨欲尚質可乎先王制禮本乎誠惟專一其內心之誠在乎外者隨時制宜惟其稱而已矣英宗治平二年李育上言冕以周官為本凡十二旒間以采玉加以紘綖笄瑱之飾袞以虞書為始凡十二章首以辰象别以衣裳繪繡之采東漢至唐史官名儒記述前制皆無珠翠犀寶之飾蓋明水大羮不可以衆味和雲門咸池不可以新聲間衮冕之服不宜以珍怪纍也按開寶通禮及衣服令冕服皆有定法悉無寶錦之飾夫太祖太宗富有四海豈乏寶玩顧不可施之郊廟也臣願陛下肇祀天地躬饗祖禰服周之冕觀古之象復先王之制祖宗之法詔禮官參定奏曰國朝冕服雖倣古制然增以珍異巧縟前世所未嘗有國家大事莫大於祀而祭服違經非所以肅祀容尊神明也宜如育言參酌通禮一切改造之臣按冕服之制雖曰華而不為靡費而不及奢然必有中制不可過也不可不及也若魏明之用珊瑚六朝之用翡翠宋人之繡龍錦七星紫雲白鶴皆非禮之禮也非禮之禮且不可以見師長況用以祀天地祖宗哉以上冕服之章備規制璽節之制周禮地官司市凡通貨賄以璽節出入之掌節掌邦節貨賄用璽節臣按璽之名始見於此然專以出入貨賄蓋上下通用也左傳襄公二十九年公自楚還及方城季武子取卞使公冶問璽書追而與之林堯叟曰璽印也印書追公冶而與之臣按用璽於文書謂之璽書璽書二字始見於此然此乃季武子書而用璽記之者是時上下印章皆名璽故也自秦以來惟天子印得稱璽故其制詔謂之璽書臣下不得用也漢高祖元年高祖至霸上秦王子嬰封皇帝璽符節降顔師古曰符謂諸印合符以為契者也節以毛為之上下相重取象竹節因以為名將命者持之以為信胡寅曰官府百司之印章一代所為而受之君者也不可以失失之則不敬天子之璽非一代所用而非受之於天者也必隨世而改不改則不新故漢有天下當刻漢璽而不必襲之秦所以正位凝命革去故而鼎取新也茍以為不然曷不於二帝三王監之後世之璽以亂亡喪逸者固多矣必以相傳為貴又豈得初璽如是之久哉臣按傳國璽圖說謂其方四寸秦始皇併六國命李斯篆其文孫夀刻之子嬰奉其璽降漢高祖即位服之世因謂之傳國璽厥後平帝崩孺子未立藏於長樂宮王莽篡位使王舜迫太后求之出璽投地刓螭角微玷其後璽歸光武至獻帝時董卓亂掌璽者投於井中孫堅於井中得之後徐璆得以送獻帝尋以禪魏魏以禪晉永寧之後為劉石所得後復歸之東晉是後宋齊梁陳以至於隋隋滅陳蕭后攜之入突厥唐太宗求之不得乃自刻玉曰皇帝景命有德者昌貞觀四年蕭后始自突厥奉璽歸於唐朱溫篡唐璽入於梁梁亡入後唐廢帝自焚自是璽不知所在臣嘗考之其璽之文曰受命於天既壽永昌自秦以後相傳以為受命璽得其璽也遂傳以為真有受命之符無是璽也乃至目之為白板天子一何愚且惑哉且命出於天必有德者然後足以受之受命者不於其德而顧區區於一物之用命果在是乎三代有道之長享國皆至數百年初未聞有此璽也秦自作璽之後僅七八年遺臭聞於沙丘肉袒負於軹道烏在其為壽且昌哉繇是觀之是一亡國不祥之物耳有與無何足為國重輕哉蔡雍獨斷云璽印也信也天子璽白玉螭虎紐臣按此漢天子璽之制也漢舊儀曰璽皆白玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽皇帝行璽封賜諸侯王書信璽發兵徵大臣天子行璽䇿拜外國事天地鬼神臣按此漢朝六璽之制後世率遵而用之說文曰璽王者印也以守土故字從土籀文從玉臣按璽古上下通用至秦始專以為天子印章之稱霍光傳召符璽郎取璽昌邑王受皇帝信璽行璽就次發璽不封孟康曰漢初有三璽天子之璽自佩行璽信璽在符節臺臣按漢之符節臺即今尚寶司此設官之始漢制符節令一人六百石為符節臺率主符節事凡遣使掌授節尚符璽郎中四人舊二人在中主璽及虎符竹符之半者臣按霍光傳召符璽郎取璽則在前漢已有符璽郎矣說者謂符璽令總符璽即又趙堯為符璽御史則符璽又不但有郎而已也北魏太平真君七年鄴城得玉璽其文曰受命於天既壽永昌刻其旁曰魏所受傳國璽臣按此文疑乃魏文帝所受於漢獻帝以禪位者但其旁所刻文有少異然說者又謂璽至晉為劉石所得尋復歸東晉傳宋齊梁陳以至於隋不知孰為真物也唐制天子有傳國璽及八璽皆玉為之神璽以鎮中國藏而不用受命璽以封禪禮神皇帝行璽以報王公書皇帝之璽以勞王公皇帝信璽以召王公天子行璽以報四夷書天子之璽以勞四夷天子信璽以召兵四夷臣按此唐朝璽制唐制有符寶郎四人掌天子八寶及國之符節有事則請於內既事則奉而藏之大朝㑹則奉寶進於御座行幸則奉以從焉大事出符則藏其左而班其右以合中外之契兼以敇書小事則降符函封使合而行之凡命將遣使皆請旌節旌以顓賞節以顓殺臣按此唐人設官掌寶及符節之制今制為尚寶司專司寶璽及金牌牙牌之屬五代周始造二寶其一曰皇帝承天受命寶一曰皇帝神寶宋太祖受禪傳二寶宋又製大宋受命之寶至太宗又别製承天受命之寶是後諸帝嗣服皆自為一寶以皇帝恭膺天命之寶為文凡上尊號則以所上尊號為文寶用玉填以金盤龍紐别有三印一曰天下合同之印中書奏覆狀疏內銓歷任三代狀用之二曰御前之印樞密院宣命及諸司奏狀內用之三曰書詔之印翰林詔敕用之皆鑄以金後竝改印為寶高宗中興御府藏玉寶十有一一曰鎮國神寶文曰承天福延萬億永無極二曰受命寶文曰受命於天既夀永昌二寶封禪用之三曰天子之寶答外夷書用之四曰天子信寶舉大兵用之五曰天子行寶封册用之六曰皇帝之寶答鄰國書用之七曰皇帝信寶賜鄰國書及物用之八曰皇帝行寶降御劄用之所謂八寶也九曰大宋受命之寶太祖作十曰定命寶徽宗作十一曰大宋受命中興之寶高宗作又作金寶三曰皇帝欽崇國祀之寶二曰天下合同之寶三曰詔書之寶臣按此宋朝寶璽之制哲宗元符元年咸陽縣民段義修舍得古玉印文曰受命於天既壽永昌上之詔蔡京等辨驗以為秦璽遂命曰天授傳國受命寶改元元符劉定之曰秦始皇以藍田玉製璽子嬰以降漢漢以傳魏晉亂為劉石二虜所得冉閔篡石氏置璽於鄴閔死國亂其子求救於晉謝尚尚遣兵入鄴助守因紿得璽以歸晉方其未還也劉石二虜以璽不在晉謂晉為白板天子晉蓋恥之謂紿得璽意者以解此恥也惡足盡信哉不旋踵鄴為慕容燕所取璽或者實在燕矣謂在燕則燕為苻堅所併而堅見虜於姚萇萇從堅求璽堅罵曰五胡次序無汝羌名璽已送晉不可得也卒拒之以死蓋堅未嘗以送晉而璽於是乎亡矣謂晉果紿得璽於鄴則傳宋齊梁而侯景取之景敗其侍中趙思賢棄之草間郭元建取送高齊齊亡歸宇文周周傳隋隋煬帝死宇文化及取之化及死竇建德取之建德妻奉以歸唐唐傳朱梁梁亡歸於後唐後唐廢帝從珂與璽俱焚繼之者石晉晉出帝重貴降遼德光以其所獻璽非真詰之重貴對以昔璽既焚今璽先帝所為羣臣共知蓋自有秦璽以來其間得喪存毁真僞之故難盡究詰而至於重貴降遼之日秦璽之燬於火也已灼然著於人人口耳自是以後有天下者不託以為言矣哲宗蔡京乃能復得之咸陽豈堅之所瘞藏至此而始出乎曰非也是又作天書之故智也天書號年為祥符秦璽號年為元符既紹述其乃考神宗之法又紹述其高考真宗之符不亦異哉其後徽宗復製二璽其一曰承天福延萬億永無極謂之鎮國寶其一曰範圍天地幽贊神明保合太和萬壽無疆謂之定命寶二寶與受命寶為三已而悉為金人所俘以去前此金人以遼取石晉意其得秦璽責而徵之延禧訴以兵敗失於桑乾河及既得於宋自謂愜所欲而義宗守緒死於蔡州幽蘭軒又為煨燼然則哲宗之所得縱使真為秦璽元人亦不得而取之矣詭妄之臣乃猶以之藉口欺世基禍黷武亦獨何哉元至元三十二年御史中丞崔彧得實迪妻所售玉印監察御史楊桓辨之以為秦璽進之臣按秦璽者始皇之所作也秦子嬰以降漢自高祖迄於獻帝所寶用者皆此璽也歷代皆用其名永嘉之亂沒於劉石永和之世復歸江左其文曰受命於天皇帝壽昌者晉所自刻者也非秦璽也大元之末得自西燕更涉六朝至於隋代者謂之神璽乃燕慕容氏所刻者也非秦璽也劉裕北伐得之關中歷晉暨陳復為隋有者其文雖與秦同乃姚秦所刻者也非秦璽也開運之末沒於耶律後為女真所獲者則以受天明命惟德允昌為文乃石晉所刻者也非秦璽也蓋在當時皆誤以為秦璽而不知秦璽之亡則已久矣若夫元人所得之璽楊桓考證以為秦璽考璽在漢為元后所擲螭角有微玷魏文帝刻其旁曰魏受漢傳國之璽今此印其螭角無玷其旁無魏所刻字非秦所製者明甚豈元人所得於實迪妻者即宋元符所得於咸陽民家之故物乎臣故詳具其始末如此皆明明有徵驗非虛言也萬一有以秦璽尚在為言者請以臣斯言折之以上寶璽說文曰印執政所持信也臣按秦以前民皆以金石為印惟其所好自秦以來惟天子之印獨稱璽又以玉羣臣莫敢用也漢制諸侯王金璽璽之言信也諸侯王黃金璽橐他紐文曰璽刻曰某王之璽列侯黃金龜紐文曰某侯之章丞相太尉與三公前後左右將軍黃金龜紐文曰章中二千石銀印龜紐文曰章千石六百石四百石至二百石以上皆銅印鼻紐文曰印印制兩漢以後人臣有金印銀印銅印唐制諸司皆用銅印宋因之臣按此漢唐宋羣臣印章之制今制惟親王用金二品以上用銀三品以下皆銅惟京尹以三品獨得用銀以上古今臣下印章之制以上印章周書康誥曰小臣諸節蔡沈曰小臣之有符節者臣按符節小臣皆有之蓋自周則已然矣周禮掌節掌守邦節而辨其用以輔王命守邦國五等諸侯之國者用玉節守都鄙公卿大夫采地者用角節角當作管凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英飾也簜竹也輔之門關用符節貨賄用璽節道路用旌節皆有期以反節凡通達於天下者必有節以傳輔之無節者有幾察也則不達鄭𤣥曰邦節者珍圭牙璋穀圭琬圭琰圭也王有命則别其節之用以授使者輔王命者執以行為信必有節者言遠行無有不得節而出者也輔之以傳者節為信爾傳謂所齎操及所適吳澄曰辨其用者以玉角金竹為符契或用以守或用以使皆以牝牡相合為驗也使節者奉使之節諸侯講信修睦為虎龍人三節執之以為行道之信金為之鑄象則有堅而不變之義竹為之函而加以英飾則有儀文相接之禮門關則王畿之門關貨賄則門關出入之貨賄道路則王畿及侯國之道路符節以竹符合之者也璽節者加印璽其上者也旌節者用析羽之旌彰其所持也節所以輔王命傳所以輔邦節無節則幾之幾之以防姦私而輕重為不等也臣按節者古人為符契牝牡二者以相合各持其一以相驗信者也凡乘傳者必有節如今世符驗之類司關凡四方之賔客叩猶至也關則為之告有外內之送令則以節傳出內之鄭𤣥曰叩關猶謁關人也有送令謂奉貢獻及文書以常事往來至關則為之節與傳以通之臣按有內外之送令則以節傳出內之謂有文書自外入者則以節傳納之於內有文書自內出者則以節傳出之於外後世設人以傳送公文者本此小行人達天下之六節山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之鄭𤣥曰此謂邦國之節也達之者使之四方亦皆齎法式以齊等之也臣按小行人之所達者即掌節之所掌也但掌節所掌者是主天子之節為言而小行人之所達謂諸侯使者之入聘者耳考漢世有所謂銅虎符以金為之是即虎節之屬竹使符以竹為之是即旌節之屬禮記玉藻凡君召以三節二節以走一節以趨在官不俟屨在外不俟車鄭𤣥曰節以玉為之所以明信輔於君命者也君使使召臣有二節時有一節時故合云三節也隨時緩急急則二節故走緩則一節故趨官謂治事處外謂其室及官府臣按三代以前人君召臣皆必有節非但在遠則雖在朝廷官府居室皆用焉左傳文公十二年秦使西乞術來聘曰不腆先君之敝器致諸執事以為瑞節要結好命臣按此所謂節蓋用圭玉以為節爾非别有一物也注謂節信也用圭以表信故為之節焉昭公二十九年公賜公衍羔裘使獻龍輔玉名於齊侯孔頴達曰周禮澤國用龍節皆金也以英簜輔之杜子春謂以函器盛此節鑄金為龍以玉為函輔盛龍節謂之龍輔臣按以玉為節春秋之時皆用之史記魏公子無忌用侯生計得虎符以解趙圍漢高后八年襄平侯紀通尚符節令持節矯納周勃北軍臣按此古人以符節發軍者其後武帝時又使光祿大夫范昆等衣繡衣持節發兵以興擊則是古人發兵不但有符又有節也漢書南粵王傳漢十一年立尉他為南越王剖符通使臣按說文符漢制以竹長六寸分而相合其後唐人給蕃國符十二銘以國名雄者進內雌者付其國其國朝貢使各齎至不合者劾奏其制蓋始於漢也今世蕃國朝貢者皆給以勘合本此文帝二年九月初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易也呂祖謙曰漢制諸侯不得自發兵魏勃曰非有漢虎符驗則文帝以前蓋有虎符矣此謂初作者豈非用銅於此始乎臣按與郡守為符者各分其半右留京師左以與之武帝征和二年更節加黃旄臣按節之為制以竹為之柄長八尺以旄牛尾為其眊三重人臣出使必杖節自守不可失若袁盎解節而懷其旄蘇武杖節而旄盡落皆所謂不失節也昭帝元始元年遣王平等五人持節行郡國臣按自後宣帝遣使者持節詔郡國二千石謹牧養民而風德化則是漢世之節不但以發兵出使外夷則雖巡行郡國亦持節矣唐初高祖入長安罷隨竹使符班銀菟符其後改為銅魚符以起軍旅易守長京都留守折衝府捉兵鎮守之所及左右金吾宮苑牧監皆給之畿內則左三右一畿外則左五右一左者進內右者在外用始第一周而復始宫殿門城門給交魚符巡魚符左右廂給開門符閉門符臣按此唐朝符節之制以上符節周禮司約小約劑書於丹圖鄭𤣥曰約劑約也丹圖者雕器簠簋之屬有圖象者歟春秋傳曰裴豹𨽻也著於丹書今俗語有鐵劵丹書豈此舊典之遺言歟漢高祖六年始剖符封功臣又與功臣剖符作誓丹書鐵劵金匱石室藏之宗廟唐代宗廣德元年給功臣鐵劵藏名於太廟臣按自古封功臣必有鐵劵以紀其功我聖祖得國之初欲依前代作劵而不得其製作之制有言錢鏐之後居浙者家傳唐昭宗賜鏐之劵猶有存者乃遣使求之按其制造之用金填其字功臣初封者錫之以為一代之制以上鐵劵以上璽節之制大學衍義補卷九十
