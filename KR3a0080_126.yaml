body:
  text: 大學衍義補卷一百二十六明丘濬撰治國平天下之要嚴武備簡閲之教上周禮大宗伯以軍禮同邦國大田之禮簡衆也鄭玄曰軍禮之别有五同謂威其不服僭差者王昭禹曰坐作進退不講則不知刺伐擒縱不習則不能春以教振旅夏以教茇舍秋以教治兵冬以教大閲此所以簡其能也臣按禮有六禮軍其一也軍禮有五王安石謂以用其命為主以合其志為終臣竊以為有大師之禮以用其衆有大均之禮以恤其終然無大田之禮以簡擇之則亦無以别其材力之強弱技藝之能否心志之離合而致之用焉故必有大田之禮以簡其能然後知其力而任之而以興大役合其志而一之而以建大封是知五禮皆不可無而大田之禮尤為其切要者也大司馬中音仲春教振旅謂振整其衆司馬以旗致民平列陳平其列以為陳如戰之陳音陳辨鼓鐸鐲鐃之用以教坐作進退疾徐疏數之節遂以搜田吳澄曰凡師出曰治兵入曰振旅先王因四時之田以教民戰而春曰振旅者取兵入之義以收其衆而使之就農也以旗致民謂植旗而期民於其下也鐸鐲鐃皆似磬而大小異鐸其至大者鐸以通鼓鐲以節鼓鐃以止鼓臣按兵者守國之備茍非素教之一旦驅之以臨敵是棄之而已然兵凶戰危以殺戮為事不可以人試於是因搜狩而習之因祭以行獵用獸以試術使其目熟於旌旗耳熟於號令或坐以待或作以起進而之前退而之後疾而趨走徐而緩行分疏而散開急數而屢進皆於是時聞鼓而興聽金而止一旦用其所以田獵者而施之行陳用其所以殺獸者而施之敵人不至倉皇失措紛亂無統也中夏教茇舍草止之也如振旅之陳羣吏撰數擇之也車兵車徒步卒讀書述事為書契合驗為契辨號名之用帥謂軍將以下以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅遂以苗田如搜之法吳澄曰茇舍草止之也軍有草止之法防冦敵也讀書契以簿書校録軍實也丘葵曰帥六軍之帥也門所居之門公邑間田謂之縣小都謂之鄙大夫謂之家鄉謂六鄉野謂六遂茇舍之教乃寨法專以辨軍之夜事蓋休兵偃師之時宿火而寢目固無見銜枚而處耳固無聞也將以鼓鐸而聲之則所聞必亂將以旗物而揮之則所見必昧於是專以號名為尚而號名又必外假者所以防姦細及間諜等事臣按所謂撰車徒讀書契如今人按簿籍以點名也觀其所謂辨軍之夜事可見古人教戰不徒教其晝且教其夜不徒教其行兵而又教其止息此所以舉無廢事而兵無敗陳也歟中秋教治兵如振旅之陳辨旗物之用王載大常日月為常諸侯載旗交龍為旗軍吏載旗熊虎為旗師都謂孤卿之位載􅎶通帛為􅎶鄉遂載物雜帛為物郊野載旐龜蛇為旐百官載旟烏隼為旟各書其事與其號焉其他皆如振旅遂以獮田如搜田之法吳澄曰於中秋言治兵者禮春夏不興師秋乃出兵之時也陳旗物所以作戰也辨其用者有所將者有所畫無所將者無所畫臣按夏秋之教皆曰如振旅之陳又曰其他皆如振旅遂以田如搜之法可見四時教閲之法皆同各隨時舉其重者而言互文以見義也後世有欲用古法以教閲者宜詳考而兼用之中冬教大閲大閲兵而習戰前期先大閲之期羣吏謂鄉師以下戒衆庶修戰法虞人山澤之虞萊所田之野為表除去田草立表田之日司馬建旗于後表第一表也之中羣吏以旗物鼓鐸鐲鐃各帥其民而致致之大司馬質明天正明弊仆也旗誅後至者仆旗而後至者誅之乃陳陳列車兵車徒步卒如戰之陳皆坐使坐聽誓羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗植所仆者車徒皆作起也鼓行鳴鐲車徒皆行及表第二表乃止三鼓摝掩其口而振之鐸羣吏弊旗又仆其旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟聚足而進徒趨及表第三表乃止坐作如初乃鼓車馳決圍而去徒走速也及表第四表乃止鼓戒三闋鼓以三為節車三發徒三刺乃鼓退鳴鐃且卻及表退至第一表乃止坐作如初遂以狩田吳澄曰仲冬農暇故教大閲以簡車馬習戰陳尤詳於三時萊所田之野謂芟除田野以便馳驅也表所以正行列者於百步而立一表三表則三百步又五十步為一表則四表總三百五十步左右之廣當容三軍其步數隨軍多少可矣建旗後表之中謂第四表之中央也質明弊旗謂期衆之至須早故明以仆旗後至者誅皆坐以當聽誓也陳前謂南面鄉表也中軍謂中軍將也令鼓者鼓以作士氣也鼓人師帥旅帥也司馬謂兩司馬振鐸以作衆也及表乃止謂自後表前至第二表也三鼓摝鐸摝者掩鐸之口而振之所以止行息氣也又二鼓而車驟徒趨及表乃止謂自第二表前至第三表也又三鼓而車馳徒走及表乃止謂自第三表前至四表也鼓戒謂戒攻敵也每鼓一闋則車一轉徒一刺至三而止象敵服矣鳴鐃且卻謂軍退則卒長鳴鐃以和衆鼓及表乃止謂自前表至後表而止也臣按周禮四時皆教閲而名各不同春曰振旅振之為言收也以冬方大閲春則農務方殷故收其衆也夏氣炎燠萬物告成故以茇止為名而教之以夜戰之事秋氣肅殺故以治兵為教而教之以晝戰之法冬則農事已隙則通以三時之教而並舉焉故謂之大閲也國家大事在戎而國之安危下之生死所係當承平之時而習戰陳之法異時有事驅之以臨戰陳冒鋒鏑將可以全勝卒可以全生而國亦由之以全安焉然所以教之者欲其有所辨也辨之於豫則兵知將意欲有所謀為不待言語告詔曉然自喻於耳目之間耳目有所見聞則心運於中而手足應於外凡士卒坐作進退遲速開合之數皆將意之所欲為者也如此是惟不戰戰無不勝矣周禮振旅所辨者在鼓鐸鐲鐃茇舍所辨者在號名治兵所辨者在旗物至於大閲則兼辨夫是三者焉三者行師布陳缺一不可三時則各專習其一冬閲則兼用其三專之欲其精熟合之欲其貫通是知先王教戰之法雖多端而其要不外乎辨而已矣夫戰非一人可為亦非一日可了人多則難齊必欲齊之不能人人以戒之不可事事以教之故有金鼓之聲聲有不同則事亦隨異有旗物之節節有異形則事亦隨别茍非早有以辨之乃至臨期而示之必不能盡記也日多則難防必欲防之晝有晝之事夜有夜之事晝則為旗物之號使之視龍虎鳥龜之像而知所向夜則為名號之别使之聞門名縣鄙之名而契於心茍非早有以辨之乃至臨期而示之必不能遽曉也夫三時各辨一物則習之熟而諭之深矣茍非合三者而並閲焉又安能通融而盡其用哉此嵗終所以必有大閲之教也惟今朝廷教戰之法月凡三次操練非嚴寒盛暑不息比周人之教閲止於四時尤為數矣但所以立為之法者未必詳盡而所以奉行之者多不盡心臣願特敕有司集會文武大臣典司政本及知兵法者斟酌古今事宜立為定制頒之將領俾其按此教習每嵗仲冬車駕親臨大閲之而施賞罰之典焉如此則列屯坐食者皆精兵而用之天下無敵矣詩序車攻宣王復古也宣王能內修政事外攘夷狄復文武之境土修車馬備器械復會諸侯於東都因田獵而選車徒焉朱熹曰先王之田因此見車馬之盛紀律之嚴所以為中興之勢者在此其所謂田者異乎尋常之田矣臣按古人多因田獵以講武事其所以為田者非荒於禽也是時周室中微玁狁內侵逼近京邑宣王即位北伐南征以成中興之功詩序所謂復文武之境土者此也東都之會久缺田獵之禮不講於是修車馬備器械復會諸侯因田獵以選車徒蓋借搜狩以講武事以益嚴其內修外攘之治焉耳非專為禽也吉日美宣王田也朱熹曰此亦宣王之詩吕祖謙曰車攻吉日所以為復古者何也蓋搜狩之禮可以見王賦之復焉可以見軍實之盛焉可以見師律之嚴焉可以見上下之情焉可以見綜理之周焉欲明文武之功業者此亦足以觀矣臣按先儒謂宣王所以復文武功業者固不止於二詩所言搜狩之事然即二詩而觀之則其車馬徒御之所出可見王賦之復也旌旄車斾之備決拾弓矢之精可見軍實之盛也選徒則囂囂徒御則不驚行者有聞而無聲又可見師律之嚴也會同有繹而助我舉㧘積禽也悉率左右而以燕天子又可見上下之情也將用馬力而既伯既禱頒禽之均而大庖不盈又見其綜細之周密蓋一事之間而五美具焉即此推之則其餘可知矣春秋桓公四年春正月狩于郎胡安國曰戎祀國之大事狩所以講大事也用兵以訓軍旅所以示之武而威天下取物以祭宗廟所以示之孝而順天下故中春教振旅遂以搜中夏教茇舍遂以苗中秋教治兵遂以獮中冬教大閲遂以狩然不時則傷農不地則害物田狩之地如鄭有原圃秦有具囿皆常所也違其常所犯害民物而百姓苦之則將聞車馬之音見羽旄之美舉疾首蹙頞而相告可不謹乎臣按先王之田因獵以講武事所謂安不忘危治不忘亂也必有一定之所必有一定之時不傷乎農不害乎物所以習馳驅之節試擊射之藝蓋非所謂外作禽荒從獸無厭者也我朝都城西南有海子即古原圃具囿之類每嵗仲冬以後車駕親臨校獵即古人遺制也桓公六年秋八月大閲何休曰以不教民戰是謂棄之故比年簡徒謂之搜三年簡車謂之大閲五年大簡車徒謂之大搜存不忘亡安不忘危程頤曰為國之道武備不可廢必於農隙講肄保民守國之道也無事而為之妄動也有警而為之則教之不素豈所以保其國乎臣按大閲之禮天子之禮也而魯以諸侯行之故春秋書以見其僭禮行之諸侯則為僭行之天子則保民守國之道也後世雖有教閲之事而其禮不備在漢唐亦間有行者乞敕禮官會本兵柄者考究周官及漢唐以來典故著為大閲之禮除逐月將帥自行教戰外每嵗仲冬請車駕幸教場行大閲禮以考校將領及軍士技能以賞罰升黜之使天下四夷聞之知聖人安不忘危治不忘亂如此不敢萌非分作亂之心穀梁傳曰因搜狩以習用武事禮之大者也艾蘭香草以為防田之大限置旃旌旗之名以為轅門卬車以其轅表門也以葛或作褐覆質質椹也以褐覆其椹以為𣙗門中闑也流房握謂兩車轊頭各去門邊空握四寸御轚挂也者不得入車軌塵謂車不得入門車軌之塵不出轍馬候蹄發足相應掩禽旅掩取衆禽御者不失其馳然後射者能中過防弗逐不從奔之道也面傷不獻不成禽不獻禽雖多天子取三十焉其餘與士衆以習射於射宫射而中田不得禽則得禽田得禽而射不中則不得禽是亦知古之貴仁義而賤勇力也臣按古者因搜狩以習用武事非徒以習戰以行禮也非徒以尚勇力以表仁義也假艾蘭之草以為防置通帛之旃以為門以毛布覆門闑恐傷其馬足也車之入門則礙之以車軸以驗其能御也車轍之塵則欲其不逺馬行之蹄則欲其相應禽之羣隊則欲其不遺若是者非御者不失其馳不能也御者不失其馳則射者關弓命中矣獸之過防者不許逐是則戰之不逐奔走也獸之面傷者不許獻是則戰之不殺迎降也獸之不成者不許獻是則戰之不戮幼稚也田雖以得禽為上而戰則以能射為先故於頒禽之際又以射為去取焉古昔盛時因搜狩以習用武事是以三軍之衆耳目之所濡染手足之所運動見聞貫熟心意流通一旦臨於戰陳之間進退取舍咸中其節是以軍旅所至無不成功由教閲之有素也左傳隱公五年臧僖伯曰春搜夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也杜預曰搜索擇取不孕者苖為苗除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也四時講武三年而大習出曰治兵謂始治其事入曰振旅謂禮畢整容而還也歸而飲於廟以數車徒器械及所獲也林堯叟曰昭文章昭著也君大夫士車服旌旗各有文章明貴賤謂田獵之制貴者先殺所以明君大夫士庶人之貴賤辨等列謂辨上下之等第行列坐作進退皆是也順少長出則少者在前趨敵之義還則少者在後殿師之義皆所謂順也臣按成周之世田獵之禮每年而四舉三年而大舉出而謂之治兵入而謂之振旅歸而飲至於廟以數軍實然不謂之治田而謂之治兵不謂之田實而謂之軍實以見搜苗獮狩之行雖曰以田實以習戰也若其所謂昭文章明貴賤辨等列順少長而總結之曰習威儀則又以見凡其所昭所明所辨所順無非以肄習武事之威儀使其有威而可畏有儀而可象焉後世田獵之禮惟以從禽縱欲為樂而已無復古人講武之制所謂教閲者徒應故事而射之所施戈之所擊刃之所刺皆無所受之地所演者皆虛文而無實用也僖公二十七年晉侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王周王也入務利民民懷生矣將用之子犯曰民未知信未宣明也其用未明見用之信於是乎伐原以示之信民易資以貨物易資財者不求豐焉明徴其辭明定其辭不二價也公曰可已乎子犯曰民未知禮未生其共恭敬之心於是乎大搜以示之禮作執秩主爵秩之官以正其官民聽不惑而後用之出穀戍明年楚子使申叔去穀釋宋圍明年楚子使子玉去宋一戰而霸明年戰于城濮文之教也由晉侯以文德教民臣按晉文公欲用其民以戰而子犯以民未知義與信與禮故未可用也文公於是示之義示之信示之禮然後用之故一戰而能成伯功蓋有合乎孔子答樊遲之問所謂上之所好禮義信之三事也然聖人所謂好者中心好之自然有以致民之敬服用情而文公則欲民之用而故為是以示之此王伯所以分也雖然文公伯者爾其用民也尚必有以服其心而後用之焉後世則驅之而已矣茍遂吾之所欲遑恤民之從違昭公十四年楚子使然丹簡上國之兵於宗丘地名且撫其民分貧貧乏者分與之振窮窮困者救振之長孤幼孤而幼者長育之養老疾老而貧者贍養之收介特單身者收録之救恤也災天災患人患宥寬也孤寡赦罪重罪戻輕戾詰姦慝舉淹滯有才德而淹滯禮新羈旅方新者敘舊勳故祿勳有功合親九族之親任良物事也官量能授官使屈罷簡東國之兵於召陵亦如之如然丹好結好於邊疆息民五年而後用師禮也孔穎達曰兵者戰器之名戰必令人執兵即名人以為兵也簡兵謂料簡其強弱集而簡之且慰撫其人民也分貧振窮以下皆撫民之事也臣按簡兵而且撫其民蓋民者兵之所自出也為民而設兵兵備而民失其所孰與養其兵哉本朝於邊地命大臣守備而兼巡撫之任即此意也王制有發則命大司徒教士以車甲鄭玄曰有發謂有軍師發卒孔穎達曰國有軍旅以發士卒是司馬之事王則命大司徒教以乘兵車及衣甲之儀容必司徒者以司徒主衆又主教故與司馬相參也臣按先儒謂司徒教士則使司馬論其材故出任之為比長鄉大夫伍長軍將其材無不宜司馬治軍則使司徒教其事故入以之為比閭族黨州鄉伍兩卒旅軍帥其事無不治月令季秋之月天子乃教於田獵以習五戎鄭玄曰教於田獵因田獵之禮教民以戰法也五戎謂五兵弓矢殳矛戈戟也臣按先儒謂教田獵繼以習五戎與車攻因田獵而選車徒同意上言教下言習者我教之故彼習之也戎器必以五以兵法五人為伍故也田獵所以得利軍旅所以效死人之所欲莫甚於利所惡莫甚於死以所惡寓所欲而習焉先王之深意也大司馬秋獮教治兵其以是歟以上論簡閲之教上大學衍義補卷一百二十六
