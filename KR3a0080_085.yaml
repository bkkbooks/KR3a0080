body:
  text: 大學衍義補卷八十五明丘濬撰治國平天下之要備規制都邑之建上書禹貢曰冀州蔡沈曰冀州帝都之地八州皆言疆界而冀不言者以餘州所至可見亦所以尊京師示王者無外之意臣按朱熹語録冀都正是天地中間好風水山脉從雲中發來雲中正高脊處自脊以西之水則西流入於龍門西河自脊以東之水則東流入於海前面一條黄河環繞右畔是華山自華山來至中為嵩山是謂前案遂過去為泰山聳於左淮南諸山為第二重案江南諸山為第三重案觀是言也則知古今建都之地皆莫有過於冀州可知矣虞夏之時天下分為九州冀州在中國之北其地最廣而河東河北皆在其域中四分之一舜分冀為幽并營幽與并營皆冀境也就朱子所謂風水之説觀之風水之説起於郭璞謂無風以散之有水以界之也冀州之中三面距河處是為平陽蒲坂乃堯舜建都之地其所分東北之境是為幽州太行自西來演迤而北綿亙魏晉燕趙之境東而極於醫無閭重岡疉阜鸞鳳峙而蛟龍走所以擁䕶而圍繞之者不知其幾千萬重也形勢全風氣宻堪輿家所謂藏風聚氣者兹地實有之其東一帶則汪洋大海稍北乃古碣石淪入海處稍南則九河既道所歸宿之地浴日月而浸乾坤所以界之者又如此其直截而廣大也况居直北之地上應天垣之紫微其對面之案以地勢度之則泰岱萬山之宗正當其前也夫天之象以北為極則地之勢亦當以北為極易曰艮者東北之卦也萬物之所以成終而成始也艮為山水為地之津液而委于海天下萬山皆成于北天下萬水皆宗于東於此乎建都是為萬物所以成終成始之地自古所未有也茲蓋天造地設藏之以有待我太宗文皇帝初建藩于此既而入正大統乃循成王宅洛故事而又于此建都焉蓋天下王氣所在也前乎元而為宋宋都于汴前乎宋而為唐唐都于秦在唐之前則兩漢也前都秦而後洛然皆非兾州境也雖曰宅中圖治道里適均而天下郡國乃有偝之而不靣焉者我朝得國之正同乎堯舜拓地之廣過于漢唐書所為東漸西被朔南暨聲教訖于四海僅再見也猗歟盛哉孔子曰為政以徳譬如北辰居其所而衆星共之易曰離萬物皆相見南方之卦也聖人南靣而聼天下嚮明而治夫以北辰為天之樞居微垣之中而受衆星之環拱天之道固在北也天之道在北而靣之所嚮則在乎南焉今日京師居乎艮位成始成終之地介乎震坎之間出乎震而勞乎坎以受萬物之所歸體乎北極之尊嚮乎離明之光使夫萬方之廣億兆之多莫不面焉以相見則凡舟車所至人力所通者無不在於照臨之中自古建都之地上得天時下得地勢中得人心未有如今日者也况此乃蘇秦所謂天府百二之國杜牧所謂王不得不可為王之地牧之言曰禹畫九州一曰冀州舜以其太大離為幽州其人沈鷙多材力重許可能音耐辛苦本兵矢他不能蕩而自若也復産健馬下者日馳二百里所以兵嘗當天下則其兵馬之强在昔則然矣且其地瀕大海在秦始皇時起黄腄瑯琊負海之粟轉輸北河是時海運通于茲矣唐杜甫謂漁陽豪侠之地雲帆轉遼海粳稻来東呉則唐時又通東呉之粟于此焉元之盛時漕東南粟至燕歳幾至四百萬石而南方之貨亦隨以至是葢天生鉅海以為國家餫道不假通渠轉漕自然而成者也則其食貨之豐有非他方可及可知己噫兵食俱足文武竝用向明以用文則有以成文明之化偝幽以建武則有以張震疊之威臣故曰自古建都之地上得天時下得地利中得人心皆莫有如今日者此也雖然居之安者不可不思其危享全盛者不可不為衰微之慮詩不云乎殷鑒不逺在夏后之世自昔都燕者始于召公而極于金元皆上不足以當天心下不足以乘地利而其事勢則有可以為鑒戒者焉是必固邊圉選将帥强兵馬豐貨食使國勢壯而外地不敢興窺伺之心謹法度用賢才省刑罰薄稅歛使朝綱正而生靈不敢萌背畔之念如此則國家如泰山之安與天地相為悠久矣召誥惟二月既望十六日也越六日乙未王朝步自周鎬京則至于豐豐鎬至洛邑俱三百里惟太保先周公相宅越若来古語辭三月惟丙午朏月出也三日明生之名越三日戊申太保朝至于洛卜宅厥既得卜則經營越三日庚戌太保乃以庶殷殷之衆庶攻位于洛汭越五日甲寅位成若翼日乙夘周公朝至于洛則逹觀于新邑營經營之位越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一越七日甲子周公乃朝用書役書命庶殷侯甸男邦伯蔡沈曰周鎬京也去豐二十五里文武廟在焉成王至豐以宅洛之事告廟也成王在豐使召公先周公行相視洛邑召公于豐迤邐而来也卜宅者用龜卜擇都之地既得吉卜則經營規度其城郭宗廟郊社朝市之位位成者左祖右社前朝後市之位成也周公至則徧觀新邑所經營之位郊祭天地也故用二牛社祭用太牢禮也皆告以營洛之事春秋傳曰士彌牟晉大夫名營成周計丈數揣度高曰揣高低度厚薄仭度深曰仭溝洫物土方議逺邇量事期計徒庸慮材用書餱乾食糧以令役於諸侯亦此意又曰左傳曰武王克商遷九鼎于洛邑史記載武王言我南望三塗山名北望嶽鄙太行山下都鄙之地顧瞻有河粤瞻洛伊毋逺天室營周居于洛邑而後去則宅洛者武王之志周公成王成之召公實先經理之洛邑既成成王始政召公因周公之歸作書致告逹之于王其書拳拳於歴年之久近反復乎夏商之廢興究其歸則以諴小民為祈天命之本以疾敬德為諴小民之本一篇之屢致意焉古之大臣其為國家長逺慮蓋如此洛誥惟三月周公攝政七年之三月哉始也生魄十六日也周公初基作新大邑于東國洛四方民大和㑹侯甸男邦采衛百工百官播民和見士于周周公咸勤乃洪大誥治此條本洛誥文誤在康誥吕祖謙曰斧斤版築之事亦甚勞矣而民大和㑹悉來赴役即文王作靈臺庶民子來之意周公拜手稽首曰朕復如逆復之復子明辟辟君也予惟乙夘即召誥之乙夘朝至於洛師猶言京師我卜河朔黎水河北黎水交流之内我乃卜澗水東瀍水西惟洛食食其墨也我又卜瀍水東亦惟洛食伻使也來以圖洛之地圖及獻卜卜之兆辭也蔡沈曰此下周公授使者告卜之辭拜手稽首者史記周公遣使之禮也成王命周公往營成周周公得卜復命於王也澗水東瀍水西王城也朝㑹之地瀍水東下都也處商民之地王城在澗瀍之間下都在瀍水之外其地皆近洛水故兩云惟洛食也陳大猷曰成王實都鎬京特往來朝諸侯祀清廟於洛故鎬京謂之宗周以其為天下所宗也洛邑謂之東都又謂之成周以周道成於此也洛邑天下之至中豐鎬天下之至險成王於洛邑定鼎以朝諸侯所以承天地冲和之氣宅土中以涖四海其示天下也公於鎬京定都以壯基本所以據天下形勝處上游以制六合其慮天下也逺漢唐竝建兩京蓋亦識形勢之所在而有得於成王周公之遺意歟臣按此古人都洛之始而竝建兩京者亦始於是焉夫武王得天下都於豐鎬成王繼其志即有宅洛之舉亦猶我太祖建都於呉而太宗繼之而又建都於燕也成周之後漢唐宋皆竝建兩京然漢唐皆以長安為西京洛陽為東京宋以汴為東京洛為西京其地皆接壤相去不甚逺也惟我朝則以南北為稱蓋跨江南北而各為一大都㑹也仰惟我高皇帝定鼎金陵天下萬世之大利也文皇帝遷都金臺天下萬世之大勢也蓋天下財賦出於東南而金陵為其㑹戎馬盛於西北而金臺為其樞竝建兩京所以宅中圖治足食足兵據形勢之要而為四方之極者也用東南之財賦統西北之戎馬無敵於天下矣詩文王有聲其二章曰文王受命有此武功既伐於崇作邑徙都也於豐即崇國地在今鄠縣文王烝君也哉其七章曰考稽也卜維王宅居也是鎬京在豐水東維龜正決也之武王成作邑居也之武王烝哉朱熹曰此詩言文王遷豐武王遷鎬之事朱熹曰大命自文王而始集故武功自文王而始成伐崇所以除天下之暴作豐所以立天下之本有以除天下之暴則人心服有以立天下之本則人心歸此文王之所以克君也又曰武王之遷鎬非以徇一己之私也必考之於卜以定其宅焉惟龜為能致其決惟武王為能成其事則武王之遷固將上以承天意下以順民心前以承先王之志後以開無窮之基信乎其克君也哉臣按周家自后稷居邰公劉居豳太王邑岐而文王始營鎬邑至於伐崇又作豐邑居之武王又於豐旁近地二十五里制為鎬京蓋其所以遷者以勢益大人益衆不足以容之故也蓋當彊盛之時而為遷都之舉非若後世衰微而後遷也是故自邰而豳而岐而豐而鎬而又宅洛此周家所以日盛也至於平王而東遷則淪於衰微矣竊嘗論之遷都之舉惟可於方盛之時至於衰微而遷者未有能復興者也觀諸東周東晉南宋可見矣惟光武遷洛則是中興非衰微也商頌𤣥鳥之篇曰邦畿千里維民所止居也肇開也域彼四海朱熹曰言王畿之内民之所止不過千里而其封域則極乎四海之廣也嚴粲曰京師諸夏之本王圻之内人心安止則四海之大皆在綂理之内也臣按先儒謂王畿自東自西自南自北皆千里也千里之内為畿是皆聲明文物之所萃衣冠禮樂之所㑹為鈞天帝居之尊非復陋邦僻壤之比農願耕於其野商願出於其塗賈願藏於其市咸得吾所當止之地也豈不猶大學之止於至善乎故曾子傳大學首引此詩語以釋在止於至善之義有由然也殷武之五章曰商邑翼翼整敕貌四方之極表也赫赫顯盛厥聲濯濯光明厥靈壽考且寧以保我後生朱熹曰商邑王都也言高宗中興之盛輔廣曰高宗中興王都始復翼翼然為四方之儀表是蓋有以使之然者矣不獨是也又有赫赫然風聲之盛濯濯然威靈之光此高宗所以享國長久而又有以保安其後嗣子孫也臣按京都為四方之極亦猶紫宫為周天之極也有京師以為四方之極有帝王以建惟皇之極則其為所以赫赫厥聲濯濯厥靈者有以聳萬國之觀瞻為萬民之儀表傳之於千萬世而無窮矣以上都邑之建上大學衍義補卷八十五
