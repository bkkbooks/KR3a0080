body:
  text: 大學衍義補卷六十九明丘濬撰治國平天下之要崇教化設學校以立教中禮記王制曰天子命之教然後為學小學在公宫南之左大學在郊天子曰辟雍諸侯曰頖宫陳澔曰辟明也雍和也君則尊明雍和於此學中習道藝使天下之人皆明達諧和也頖之言班所以班政教也舊說辟雍水環如璧泮宫半之蓋東西門以南通水北無水也臣按學之名自五帝之時有之然始見於周禮大司樂所謂成均者說者謂此大學也而未聞有諸侯學諸侯有學始見於魯頌而此言天子命之教然後為學又言小學在公宫南之左大學在郊則是諸侯非但有學而其學又有小大者焉小學所以處學之小者而教之以灑掃應對之類大學所以處學之大者而教之以格致誠正之類學正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書鄭𤣥曰樂正者樂官之長掌國子之教順此詩書禮樂四術以教成是士故云以造士陳澔曰術者道路之名言詩書禮樂四者之教乃入德之路故言術也古人之教雖曰四時各有所習其實未嘗截然棄彼而習此亦互言耳王大子王子羣后謂諸侯之大子卿大夫元士之適子國之俊選皆造焉凡入學以齒方慤曰天子之子則適庶皆與諸侯而下則庶子不與學所以明人倫人倫之大莫先乎孝弟故入學者必以齒曰凡則無貴賤皆以齒矣將出學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉去食樂屏之遠方西方曰棘東方曰寄終身不齒鄭𤣥曰出學謂九年大成也大胥小胥皆樂官屬也大樂正告于王王命三公至於元士皆入學習禮以化之不變王親為之臨視重棄賢者子孫也周諝曰棘急也示其雖屏之欲棘於誨過寄者示其雖屏之特寓於此爾屏而必謂之棘與寄者恩也卒不免於不齒者義也方慤曰以視學之禮化之而又不變則終不變矣故三日不舉將以棄之也將棄之而不舉則自貶損以責其教之不至也臣按先儒有言聖人以學校為朝廷之大政使太子齒於俊選使樂正磨其性情必順先王詩書禮樂以性其情然後已也不變者九年雖王子亦屏逺方公於教化而不私則凡在學者孰敢不性其情以蹈於中和之域哉觀此可見先王之世其立教以化人也極其情文之備盡其恩義之詳其有教而不化也養之以久待之以寬親臨而觀感之責己以竦動之其不輕以絶人也如此非至於甚不得已而不不齒焉此先王之世所以無棄人而人亦不輕自棄也歟文王世子凡學以下皆音效世子及學士必時四時各有所教春夏學干盾也戈句子㦸也秋冬學羽翟雉之羽籥笛之屬皆於東序小樂正學干大胥贊相助之籥師學戈籥師丞贊之胥鼓南春誦夏弦大師詔之瞽宗秋學如字禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠陳澔曰干戈為武舞羽籥為文舞小樂正大胥籥師丞胥四人皆樂官之屬誦口誦歌樂之篇章也弦以琴瑟播被詩章之音節也皆大師詔教之瞽宗殷學名上庠虞學名周有天下兼立虞夏殷周之學也吳澄曰詩云以雅以南謂詩之二雅二南胥鼓南者亦謂大胥以鼓而節二南之樂歌臣按王制主於教造士而王大子王子羣后之大子元士之適子亦與焉文王世子主於教世子而國之學士亦及焉蓋古者大學之設以教胄子而必及於俊選以其位雖有貴賤而他日竝皆將有輔世長民之責皆不可以不教也明堂位曰米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也孔穎達曰此明魯得立四代之學陳澔曰魯之米廩即虞氏之庠謂藏此米於學宫也亦教孝之義序者射也射以觀德有先後之次焉樂師瞽矇之所宗故謂之瞽宗頖半也諸侯曰頖宫以其半辟雍之制也學記曰君子如欲化民成俗其必由學乎又曰古之王者建立也國君長也民教立教學立學為先陳澔曰化民成俗必如唐虞之於變時雍乃為至耳然則舍學何以哉此學乃大學之道明德新民之事也吳澄曰古者建王國天子自君其畿內之民又建侯國命諸侯各君其封內之民其民飽暖逸居而無以教之則近於禽獸故天子諸侯之國皆必建學立師以教其民使之知有禮義也古之教者家有孰黨有庠術有序國有學鄭𤣥曰術當為遂五百家為黨萬二千五百家為遂孔穎達曰古謂上代也百里之內二十五家為閭同一巷巷首有門門邊有孰民在家之時朝夕出入恆受教於孰里中之有道德仕而年老退歸者為之師庠序皆學名於黨中立學教閭中所升也於遂中立學教黨學所升也國謂天子所都及諸侯國中臣按真德秀言古法其近民者教彌數故二十五家為閭閭有孰民朝夕處焉四閭為族則歲之讀法十有四士生斯時不待舍去桑梓而有學有師敬敏任恤則閭胥書之孝弟睦姻則族師書之其所以教又皆因性牖民而納諸至善之域禮鎔樂冶以成其德達其材古者教人之功蓋如此今之世里於民最近而無學士嘗輕去土著而事逺遊行之修窳無所乎考至其設教以琢辭鎪句為巧詭聖僻說為能非惟無以淑其人抑且重斫喪之也真氏此言切中秦漢以來教學之弊我聖祖慨然欲復古庠序之制未即大位之先即建國子學洪武二年詔天下立序州縣學八年詔立社學上諭中書省臣曰昔成周之世家有孰黨有庠故民無不知學是以教化行而風俗美今京師及郡縣皆有學而鄉社之民樂覩教化宜令有司更置社學延師儒以教民間子弟庶可導民善俗也竊觀三代以後之君以武功定天下者往往緩於文事漢歷高惠文景至武帝五世始立大學宋歷太祖太宗真宗至仁宗四世州郡始有學我聖祖立國子學於未登極前之三年立郡縣學於登極後之二年至於八年即立社學其與古人家孰黨庠術序之名雖不同其以土著教人則一也比年入學中年考校一年視離經離絶經書句讀辨志别其趨向邪正三年視敬業於所習無怠忽樂羣於朋徒無睽五年視博習不以程度為限制親師於訓誨知嗜好七年視論學講求學問蘊奧取友擇取益者謂之小成九年知類知其類聚通達明通義理强立而不反謂之大成夫然後足以化民易俗近者說服而遠者懷之此大學之道也陳澔曰每歲皆有入學之人中年間一年也每間一年而考校其藝之進否也七年是學之小成至於九年則理明義精觸類而長無所不通有卓然自立之行而外物不得以奪之矣是大成也吳澄曰自一年至七年之歲終察視之以上皆小學之事九年則十五入大學之次年自始入小學之年而通數之為九年也若比而教則可化其民使之為賢能而移易其俗人人有士君子之行也故近而被其教者既皆心恱而服遠而聞其風者亦且懷而慕之也臣按此古者學校逐年比校之法大學始教入學之初皮辨祭菜有司衣皮辨之服祭蘋藻之菜示敬道也示之以尊敬道藝宵雅小雅肄習也三釋菜歌鹿鳴四牡皇皇者華官其始也三詩取居官受任之美誘其初志入學鼓篋入學時擊鼓發篋出其書孫其業也以遜順之心進其德業夏楚二物夏檟也楚荆也收其威也收斂威儀未卜禘五年大祭不視學游其志也不五年不視學優游學者之心志時觀而不語春秋視學無有言說存其心也存其心思幼者聽而弗問聽受師說無有問難學不躐等也此七者教之大倫也吳澄曰禘者時祭之名非五年大禘之禘視學謂考試學者經業或君親往或有司為之非天子大視學之禮也待時祭後乃視學不欲急迫使學者得以優游其志而學也臣按此古者學校示教之法大學之教也時春夏秋冬教四時之教必有正業退息退而燕息必有居學不學操縵操弄琴瑟之絃不能安弦不學博依廣求物理之所依附不能安詩不學雜服冕辨衣裳之類不能安禮不興其藝即三者之學不能樂好也學故君子之學也藏焉修焉息焉游焉夫然故安其學而親其師樂其友而信其道是以雖離師輔而不反也陳澔曰凡學之道貴於能安安則心與理融而成熟矣然未至於安則在乎為之不厭而不可有作輟也君子之學也藏焉修焉之時必有正業則所習者專而志不分息焉游焉之際必有居學則所養者純而藝愈熟故其學易成也吳澄曰藏謂入學受業時藏其身於所學之宫若東序瞽宗等處也修謂治其正業息謂退息私居游者玩物適情之謂臣按學記此章可見古人教學者無一時一處而不用其功焉此其學之所以易成也而成之者本末兼該精粗通貫無一而或遺焉者也雖然一弛一張文武之道是以君子之學固不可無藏修之處亦不可無游息之時蓋喜說生於時習自得由於深造成其功於進德修業之際養其心於玩物適情之餘學者如此則未得之而不苦其難既得之而去之不速矣今之教者呻吟諷之聲其占視也畢簡也多其訊問也言及于數所言不止一端進而不顧其安使人不由其誠教人不盡其材其施之也悖其求猶責也之也佛弗夫然故隱其學而疾其師苦其難而不知其益也雖終其業其去之必速教之不刑其此之由乎張載曰人未安之又進之未喻之又造之徒使人生此節目不盡其材不顧其安不由其誠皆施之妄也教人至難必盡人之材乃不誤人觀可及處乃告之故使人必由其誠教人必盡其材人之材足以有為但以其不由於誠則不盡其材若曰勉率而為之則豈有由其誠哉吳澄曰今之師誦其所視之簡多其所告之辭學者未可以進而又進之不顧其所學已安與否也實知此一理而後使之别窮一理是謂由其誠能行此一事而後教之别為一事是謂盡其材否則使之不由其實教之不盡其能也不觀其已知己能而進之以未知未能是其施教於人也先後失宜故曰悖不俟其自知自能而强之以必知必能是其求責於人也淺深莫辨故曰佛如是則莫能明其所受於師之學不願親其師而反疾其師矣已知已行者未能安則苦其難進之以其所未可雖欲益之而彼不能知其益也縱使强抑俾終受其業然所知非久必又昏忘所行非久必又遺失故曰其去之也必速刑猶成也謂教人不成者由此臣按此章論教之不成切中後世教人之弊祖宗以來設立學校惟立師儒以教導之命有司以提調之未嘗有提督憲臣之設至正統中以學政多廢弛乃用建議者每道添設風憲官一員以專督學政設官之意止欲振作其頽墮者耳非使其人各自為一法以通教一方之學者夫聖人施教各因其材雖以孔門弟子猶分四科顧乃以中人以下之私見而欲盡律一方之人才使之如已多見其不知量也凡其所為所行盡墮在學記此章中記謂教之不成其此之由今日人才不及於前政由於此非獨不能成其不成之才併與其可成者分其志而墮其業也且其所督地方多者三四千里一歲不能遍歷所至之處又不能浹旬即去固有九年而僅一至者彼豈聖人而能過化存神哉臣竊以為今兩京畿及十三藩所用者須十有四人其人未易得也莫若復祖宗之舊必欲設置乞敕內閣儒臣將洪武初侍御史雎稼建言朝命省臺部官會議定擬格式立碑在天下學校者及憲綱等書一一斟酌詳議參以聖賢教學之法以中人以下為準立為學校教養法式命禮部頒行天下俾其遵依為師儒者必依此式為教為生徒者必依此式為學為守令者必依此式提調而提學憲臣所至一以此式考驗其所以教學提調者必合此式否則有罰大抵學校之教德行為先然德行難於考驗必先考其藝業所謂藝業有三讀書作文寫字凡此三者一以中人以下為則每日背書不過二百字習字亦然作課則隨其學力所至以為數本經四書史鑑經義策論其正業也有志及於子集及作詩辭者聽不以是為正業而試之其出題不許裁截破碎經文及出偏僻之書課必文從理順不許奇怪尖新以是為準每月學校將所出題目申提學憲臣憲臣以其所出題目申禮部轉行翰林院國子監看詳如此則進人顧其安使人由其誠教人盡其才而施之不悖於正理而求之不拂於常情矣此非獨有以成就人材是亦一道德之大端也大學之法禁于未發之謂豫當其可之謂時不陵踰犯也節言分限所在而施之謂孫順也相觀而善之謂摩相厲並進此四者教之所由興也發然後禁則扞拒扞也格如地之堅凍難入而不勝不能承當其教時過然後學則勤苦而難成雜施謂躐等陵節而不孫則壞亂而不修獨學而無友則孤陋而寡聞燕朋逆其師燕辟廢其學此六者教之所由廢也陳澔曰豫者先事之謂時者不先不後之期也不陵節而施謂不教幼者以長者之業也相觀而善如稱甲之善則乙者觀而效之乙有善可稱甲亦如之燕私之朋必不責善或相與以慢其師燕遊邪僻必惑外誘得不廢其業乎此燕朋燕辟之害皆由於發然後禁以下四者之失皆與上文四者相反也臣按教之所由興者有四先儒謂三屬於師一屬於友臣則以為所由廢者有六其前三者屬於師其後三者屬於友也由是觀之可見師之為教止於大綱若夫切磋琢磨薰陶漸染而朋友有講習之益觀感之化尤為多焉學者有四失教者必知之人之學也或失則多才有餘者或失則寡才不足者或失則易俊快者或失則止鈍滯者此四者心之莫同也知其心然後能救其失也教也者長善而救其失者也吕祖謙曰四者心之所由莫同病各有别知其心然後能救其失譬如醫者要識他病處方始隨證用藥陳祥道曰古之教者觀性以知心因心以救失多者約之以禮寡者博之以文易者抑之以自反止者勉之以自强此長善救失之道也臣按人之生也性無不善故人人皆有是善然氣稟所拘物欲所蔽不能無失也故教者必因其本無而今有者拯救補塞之如是則師之教道立而天下無不成之才矣尚書大傳曰公卿之大子大夫元士之適子十有三年始入小學見小節焉踐小義焉二十入大學見大節焉踐大義焉故入小學知父子之道長幼之節入大學知君臣之義上下之位故為君則君為臣則臣為父則父為子則子臣按白虎通曰八歲入小學十五入大學此云十有三年始入小學二十入大學說者謂八歲十五歲天子世子之禮十三二十乃公卿大夫元士適子入學之期臣竊以為八歲至十三皆可以入小學十五至二十皆可以入大學大約言之耳非截然立此以為期限也孟子曰設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫序也也人倫明於上小民親於下朱熹曰庠以養老為義校以教民為義序以習射為義皆鄉學也學國學也共之無異名也父子有親君臣有義夫婦有别長幼有序朋友有信此人之大倫也庠序學校皆以明此而已臣按三代學校之制其鄉學之名雖有不同而國學之名則無或異然其所以教之者無間小大一是皆以明倫為本焉所謂養老教民習射其義雖殊而同歸於闡明倫理以為教本養育人才以為治具而已蓋今日教之於學校俾其講明義理異日則將用之於政治使其推平日學校之所講明者以施政行教而輔君善俗焉以上設學校以立教中大學衍義補卷六十九
