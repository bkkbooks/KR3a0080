body:
  text: 大學衍義補卷九十七明丘濬撰治國平天下之要備規制工作之用易曰備物致用立成器以為天下利莫大乎聖人徐幾曰智者創物巧者述之皆足以為利而物無不備用無不致立成器以為天下利者惟聖人為大臣按天下之物無一不起於聖人是雖一耒耜之末一門户之微凡所以為利於天下者皆有所取象而非無所本也作結繩而為網罟以佃以漁蓋取諸離斫木為耜揉木為耒耒耨之利以教天下蓋取諸益斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過朱熹曰此聖人制器尚象之事胡炳文曰聖人之制此器也此卦之中自有此理而已蓋之一字疑取諸此而非必取之此也臣按聖人制器尚象凡十三卦此特録其三卦者工作之器爾書帝曰疇誰也若豫工僉曰垂哉帝曰俞咨垂汝共工朱熹曰若順其理而治之也帝問誰能順治豫百工之事者垂臣名有巧思臣按工而謂之若若者順其理而治之也先儒謂守法信度因聖人創作之制而持循之此之謂若所謂因萬物自然之理而為之行其所無事之智焉耳後世之工作為淫巧以蕩上心豈所謂若哉周禮太宰以九職任萬民五曰百工飭化八材鄭𤣥曰八材珠曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰析臣按周太宰以九職任萬民而必謹於百工飭化八材者以民生日用衣服器械之所由出也工而謂之百不止一工也飭者修治以為器化者變轉以為用考工記國有六職百工與居一焉或坐而論道或作而行之或審曲面藝以飭五材以辨民器或通四方之珍異以資之或飭力以長地財或治絲麻以成之坐而論道謂之王公作而行之謂之士大夫審曲面藝以飭五材以辨民器謂之百工通四方之珍異以資之謂之商旅飭力以長地材謂之農夫治絲麻以成之謂之婦功鄭𤣥曰審曲面藝謂審察五材曲直方面形藝之宜以治之及隂陽之向背是也五材金木皮玉土王昭禹曰飭五材若飭木而為舟車弓廬之屬飭金而為鼎量劍削之屬飭土而為甗甑簋豆之屬飭水火而運用之以成乎衆材之屬臣按國有六職者即所謂王公士大夫百工商旅農夫婦功也所謂職者通上下言猶所謂職業云非專言官職之職也作記者述百工之事因舉其通功易事者凡有六焉蓋無是五者則百工所飭之五材所辨之民器亦無所用之也智者創物巧者述之守之世謂之工百工之事皆聖人之作也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也天有時地有氣材有美工有巧合此四者然後可以為良材美工巧然而不良則不時不得地氣也吳澄曰五行者天地生成自然之理考工述之刃之以金為體者以火為用故於金言爍器之以土為體者以水為用故於土言凝水行乘舟以濟不通陸行乘車以任重致逺則木之為用無往不利時寒溫也氣剛柔也考工者舉此以推五行造化之理以明聖人器用之制使天下因物以窮夫理也王昭禹曰形而上者謂之道形而下者為之器道本於性命而器之理藏乎其中器成於度數而道之迹顯於其外君子上達則其智足以窮理而能創小人下達則其巧足以循迹而能述故曰智者創物巧者述之大司徒曰以世事教能則民不失職古者四民莫不皆然而百工之於官府也其父兄之教不肅而成其子弟之學不勞而能少而習焉其心安焉不見異物而遷焉故攻木之工不使之攻金攻皮之工不使之攻玉㮚氏之子常為量鳬氏之子常為鍾桃氏之子常為劒函人之子常為甲而各使之精其事焉故曰守之世謂之工雖然此特循法度之迹而守之也若夫得之於手應之於心則輪扁之斫輪也不能授之子况可得而世耶臣按易曰備物致用立成器以為天下利莫大於聖人是則天下之器用無一而非聖人之所造始也智者於其間特因其類而創為之而巧者又從而述之耳夫天生五材民竝用之有一器之作則有一器之用有一器之用則有一器之利不徒作也茍有器而無用有用而無利耗材物於無用費民力於無益聖人所不作者則智者必不創巧者必不述也茍肆其私意而作淫巧於用器常度之外此聖王之法所必誅而無赦者凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五搏埴之工二攻木之工輪為輪為蓋輿為車輿弓為弓廬為廬器戈柲之類匠營宫室為溝洫車為車為耒梓為筍簴為飲器攻金之工築為削冶為戈㦸鳬為鍾㮚為量段為鎛桃為劒攻皮之工函為甲鮑治韋革韗為鼓韋熟皮裘為裘設色之工畫繢維五色鍾染羽筐闕㡛練絲刮摩之工玉治為圭璧楖雕闕矢為矢磬為磬摶埴之工陶為瓦旊為簋鄭𤣥曰事官之屬六十此三十工略記其事爾其曰某人者以其事名官也其曰某氏者官有世功族有世業以氏名官者也賈公彥曰此言工之多少總數臣按先儒謂天生五材水火金木土也加之以皮玉設色則為八材九職所謂百工飭化八材是也水火之材則運用此六者而成之有虞氏上陶夏后氏上匠殷人上梓周人上輿故一器而工聚焉者車為多鄭𤣥曰官各有所尊王者相變也舜至質貴陶器甒大瓦棺是也王昭禹曰聖人立成器為天下利者亦審所尚而已四代所尚亦因時而已夏后氏繼舜猶以質為尚卑宫室而盡力溝洫而尚匠人之職焉商王興禮樂而尚文以梓人為侯為筍簴為飲器故尚梓至周而文大備矣以輿人為車其材至備其工至多故尚輿臣按疏謂此一段論四代所尚不同之事遂專據周所尚言之直至篇終一車之作有輪人有輿人有車人又有輈人是車之工最多以周所尚在此也夫歷代各有所尚夏尚忠商尚質周尚文後之所尚者乃所以矯前代之失也然矯其失而或過於專一而其流之弊又不能無偏焉此聖人為制所以必因時制宜損過以就中非但施於禮樂政事者為然則雖一器之末亦莫不寓意於其中也此先王之世所以事皆得中而無過舉歟禮記天子之六工曰土工金工石工木工獸工草工典制六材鄭𤣥曰六工於周皆屬司空土工陶旊也金工築冶鳬㮚段桃也石工玉人磬人也木工輪輿弓廬匠車梓也獸工函鮑韗韋裘也惟草工職亡蓋謂作萑葦之器臣按曲禮所記六工與考工記大同小異先儒謂此為殷制然所稱之名雖異而所治之事則同土工即摶埴之工金工即攻金之工石工刮摩之工也木工攻木之工也獸工攻皮之工也草工蓋設色之工歟月令孟春之月其器疏以達孟夏之月其器髙以粗中央土其器圜以閎孟秋之月其器亷以深孟冬之月其器閎以奄方慤曰春主發散故其器疏以達疏則散達則發故也夏主長大故其器髙以粗髙則長粗則大故也秋主刻深故其器亷以深亷則制深則刻故也冬主收藏故其器閎以奄閎則收奄則藏故也中央土其器圜以閎者圜若物由是以周旋閎若物由是以出入萬物周旋於土者也故中央之器所象如此臣按月令於四時所用之器各有不同蓋王者承天以出治凡其身體之所居處被服食用一一皆順天時以奉天不敢茍也是以非四時之正味不敢食非五方之正色不敢服凡一器用之微亦必隨時而為之制所以範一身於禮法之中身所被服口所飲啖目所盼視手所執持無一事而非順天時合天理也彼雖欲作淫巧以蕩上心烏可得哉季春之月命工師令百工審五庫之量金鐡皮革筋角齒羽箭幹脂膠丹漆母或不良百工咸理監工日號毋悖于時毋或作為淫巧以蕩上心陳澔曰工師百工之長也五庫者金鐵為一庫皮革筋為一庫角齒為一庫羽箭幹為一庫脂膠丹漆為一庫視諸物之善惡皆有舊法謂之量一說多寡之數也審而察之故云審五庫之量也此時百工各理治其造作之事工師監臨之每日號令必以二事為戒一是造作器物不得悖逆時序如為弓必春液角夏治筋秋合三材寒定體之類是也二是不得為淫過竒巧之器以搖動君心使生奢侈也孟冬之月命工師效功陳祭器按度程毋或作為淫巧以蕩上心必功致緻同為上物勒工名以考其誠功有不當必行其罪以窮其情孔頴達曰於是之時命此工官之長效實百工所造之物陳列祭器善惡按此器舊制度大小及容受程限多少勿得有作過制之巧以搖動在上之心而生奢侈作器不須靡麗華侈必功力密緻為上每物之上刻所造工匠之名於後以考其誠信與否若其用材精美而器不堅固則功有不當必行其罪罰以窮其詐僞之情也方慤曰工固有巧也然過乎巧則為淫矣以其淫故足以蕩上心焉此仲春孟冬皆言毋或作為淫巧以蕩上心前則因其作而戒之後則因其成而又戒之臣按虞廷九官共工居其一是則工師之官所掌之事雖若輕而小而其所以關係者君心之收斂放蕩存焉嗚呼國家之患孰有大於君心之蕩者哉人君一心萬化之本天下安危生靈休戚皆由乎此耿耿方寸間耳使其常囿於禮法之中則必不肯輕費民財輕勞民力財不費則斂於民也薄力不勞則役於民也輕而天下安矣茍其心蕩焉出於禮法之外宫室之奉必欲其壯麗服飾之奉必欲其華美器用之奉必欲其精緻則必費財而勞民而人有不堪者矣然是心也斂之則難蕩之則易其始也未嘗不起於細微其終也乃至於滔天而不可救止焉此箕子所以於紂之用象箸知其必為玉杯噫玉杯尚可其後乃至於瓊宫瑶臺而無己焉由是以觀古人防未然之欲而必謹於其微其意深矣其慮逺矣漢表少府有考工室令丞太初元年更名考工室為考工臣瓉曰冬官為考工主作器械續志少府有尚方令六百石掌工作御刀劒諸好器物顔師古曰主作禁器物臣按後漢典工作之官宣帝時王褒上言周之所以能致刑措而不用者以其禁邪於冥冥絶惡於未萌也宜減樂府省尚方明示天下以儉古者工不造雕瑑商不通侈靡非工商之獨賢政教使之然也民見儉則歸本本立而末成和帝時樊準上言調和隂陽實在儉節朝廷雖勞心元元事從省約而在職之史尚未奉承夫建化致理由近及逺故詩曰京師翼翼四方是則今可先令大官尚方考工上林池禦諸官實減無事之物五府調省中都官吏京師作者如此則化四方人勞省息臣按書云不作無益害有益蓋古昔先王尚象以制器以為民生日用之具竝有五材以修六府有不備者又因其材而飭化之使之利其用而不至於闕乏無非有益於人生日用者也是故分為六官而專以一官司百工之事後世乃於官常之外别以禁禦之內立為尚方之官聚竒巧之工製珍異之器嗚呼器之為器取適用而已茍製一器而費百器之材當用一工而費百工之力耗貨財於無用用工力於無益何為也哉夫人之所以為竒巧精緻之物者欲以誇耀於人也貴為天子富有四海之內其尊無對其富無倫欲誰誇哉况宫闈邃密門禁深嚴外人無由而至朝夕左右得於觀視之間者宦官官妾爾彼生深宫之中執使令之役固無外交亦無逺識亦何用誇彼為哉為人上者何苦竭生民之膏血奪生民之衣食勞生民之筋力以為此無益之事哉張藴古云瓊其宫而瑤其臺所居不過容膝糟其丘而酒其池所食不過適口臣愚謂於器用亦然南宋明帝時淮泗用兵府藏空竭內外百官竝斷俸祿而明帝奢費過度每所造器用必為正御副御次副各三十枚嬖幸用事貨賂公行臣按人君之於器用取其足用而已明帝之造器用必為正御副御次副各三十事人生幾何一生能著幾輛屐邪天下無事府庫盈溢且不可暴殄天物而過於自奉况兵外用而財內竭百官月俸皆不繼而吾乃多為器用而置之於無用之地何為也哉唐置少府監掌百工技巧之政中尚署令掌供郊祀圭璧天子器玩后妃服飾雕文錯綵之制臣按此唐掌工作之官夫中尚令掌供郊祀圭璧以祀天享帝者也而又兼掌天子玩器后妃服飾雕文錯綵之制豈其倫哉毋乃近於䙝乎宋太祖收僞蜀圖書法物皆不中度悉命焚毁孟昶服用奢僭至於溺器亦􅋔以七寶遽命碎之曰自奉如此欲無亡得乎上躬履儉約乘輿服用皆尚質素臣按亡國之君與興王之主自然奢儉不同太宗淳化二年令左藏庫籍所掌金銀器皿之屬悉毁之有司言中有制作精巧者欲留以備進御上曰將焉用此汝以竒巧為貴我以慈儉為寶卒皆毁之臣按金銀器皿之屬雖極精巧然其質猶不費損也一旦毁之本質固在上下通得用之惟所謂珍異寶石之類裒工於無益毁壞則無用上好之則貴一旦廢之與瓦礫等耳太宗於金銀器之精巧者且毁之况肯聚工以為寶石竒玩也哉所謂汝以竒巧為貴我以慈儉為寶大哉王言可為百世師法淳化四年有司言油衣㡩幕損者數萬段欲毁棄之上令煮浣染以雜色刺為旗幟數千以示宰相宰相李昉等奏曰陛下萬幾之外聖智髙逺事無大小皆出意表天生五材兼而出之物有萬殊博而通之雖有細微無所遺棄固非臣等智慮所及臣按太宗於油衣㡩幕之損者尚不忍棄遺則其於物之成用者其肯棄遺之乎仁明之君其愛惜微物如此其視裂帛以為樂翦綵綺以為花而鋪於水者其夀命短長國祚久近皆分於此也上工作之用大學衍義補卷九十七
