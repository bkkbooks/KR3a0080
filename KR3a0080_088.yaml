body:
  text: 大學衍義補卷八十八明丘濬撰治國平天下之要備規制宫闕之居易上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯壯固之意司馬光曰風雨動物也風雨動於上棟宇建於下大壯之象也蔡淵曰棟屋脊檁也宇椽也棟直承而上故曰上棟宇兩垂而下故曰下宇棟取四剛義宇取二柔義臣按此人生有宫室之始詩序曰定之方中美衞文公也文公徙居楚丘始建城市而營宫室得其時制百姓悦之國家殷富焉其首章曰定之方中作于楚宫楚丘之宫揆度也之以日作于楚室其二章曰升彼虛故城矣以望楚楚丘矣望楚與堂旁邑景測景山與京高丘降觀于桑木名卜云其吉終焉允臧朱熹曰文公徙居楚丘營立宫室國人悅之而作是詩以美之定北方之宿營室星也此星昏而正中夏正十月也於是時可以營制宫室故謂之營室楚宫楚丘之宫也揆度也樹八尺之臬而度其日出入之景以定東西又叅日中之景以正南北也又曰本其始之望景觀卜而言以至於終而果獲其善也臣按古人作事必順天時察地勢審土宜不徒盡夫人事也而又質之鬼神焉蓋宫室之建不免於勞民傷財可已未嘗不已也萬一不得已而為之必升高以望而審其面勢之可否降下以觀以察其土地之宜否考之日景而驗其方向之正否稽之卜筮而考其龜兆之吉否曰望曰觀曰景曰卜無一而不善然後興工動衆蓋不暫勞則不可以久安所以然者非但以為人君安佚之計亦以臣民觀瞻之所係也或曰後世測景占卜之法鮮有精者有所營建而選日相地之法亦可用歟曰擇其可者用之而不泥於拘忌可也周公指南之法彷彿猶存用之以代測景何不可之有惟定之為星乃上天示人以營室之時非其方中農事未隙不可為己之居室而廢農之耕藝也大雅綿之篇曰迺立臯門臯門有伉高貌迺立應門應門將將嚴正也朱熹曰傳曰王之郭門曰臯門王之正門曰應門太王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立焉臣按周制天子有五門曰臯曰庫曰雉曰應曰路釋者謂臯者遠也門最在外故曰臯庫門則有藏於此故也雉門者取其文明也應門者居此以應治也路門者取其大也五門各有其義其三門者乃周既為天子時所立惟臯應二門在太王時已有之後世遂因之而不改歟是則雉庫路三者諸侯亦得立之惟此二者乃始祖肇基之迹非周之正嫡嗣天子位者則不得立焉禮記昔者先王未有宫室冬則居營窟夏則居橧巢後聖人有作起也然後修火之利范金合土以為臺榭宫室牖户鄭𤣥曰上古之時寒則累土暑則聚薪柴居其上陳祥道曰范金合土固不止於為宫室之具而為宫室必在於范金合土之後以其斤斧瓦甓之所當先也臣按聖人有作因民之營窟橧巢之居而為之臺榭以登眺為之宫室以居處為之户牖以啓閉是皆以木為之者也然非修火以范金而為之斤斧則無以成其棟宇用水以合土而為之瓴甋則無以完其蓋藏蓋天生五材竝用之而後民頼之以安居也今日普天之下君臣上下所以安居而無上風旁雨之患者可不知所以帡幪者哉春秋僖公二十年春新作南門胡安國曰言新者有故也言作者創始也其曰南門者南非一門也庫門天子臯門雉門天子應門書新作南門譏用民力於所不當為也春秋凡用民力得其時制者猶書於䇿以見勞民為重事而況輕用於所不當為者乎然僖公嘗修泮宫復閟宫矣傒斯董其役史克頌其事而經不書者宫廟以事其祖考學校以教國之子弟二者為國之先務雖用民力不可棄也其垂教之意深矣臣按觀春秋之所書及胡氏之所論則國家修造其前後緩急之序可見矣定公二年新作雉門及兩觀胡安國曰書新作者譏僭王制而不能革也雉門象魏之門其外為庫門而臯門在庫門之外其内為應門而路門在應門之内是天子之五門也僖公嘗修泮宫復閟宫非不用民力也而春秋不書新作南門則獨書者南非一門也必有不當為者劉敞曰魯用王禮是以其庫門天子臯門雉門天子應門而設兩觀僭君甚矣習舊而不知以為非覩變而不知以為戒無怪乎季氏之脅其主矣此春秋之微詞至意也臣按天子諸侯臺門天子外闕兩觀諸侯外闕一觀蓋為二臺於門外作樓觀於上兩觀雙植中不為門魯諸侯立雉門兩觀僭天子也魯僭天子之禮雉門及两觀為天火所焚魯復因其舊而新之天示之變尚不知儆聖人所以書之也繇是以觀凡宫殿門闕有所災變皆天示之儆也所儆不同天意心有所在人君遇災其必反己自求所以致天怒而召天災者其咎安在而加省察之功則災不為咎矣左傳新作南門書不時也凡啓塞從時杜預曰不時失土功之時門户道橋謂之啓城郭牆塹謂之塞皆官民之開閉不可一日闕故隨壞時而治之臣按國家之修造有待時而修者有不待時而修者蓋居室宴㳺之所可以有可以無與雖不可無而有他所以暫代者必須農隙之時無事之日然後修之可也若夫門户以開闔道橋以往來城郭以衞民牆塹以禦冦不可一日無焉者也茍必待時而為之豈不至於有所損失而誤事乎史記堯之有天下也堂高三尺采椽不斵茅茨不剪臣按堯時去洪濛之世未遠故其居室簡樸如此然堯之居雖陋而其仁則如天其智則如神巍乎其有成功煥乎其有文章蕩蕩乎不可得而名也商紂為傾宫世目之為獨夫秦皇為阿房宫世稱之為亡道主然則人君之好尚可不謹哉秦始皇以咸陽人多先王宫庭小乃營朝宫渭南上林苑中先作前殿阿房東西五百步南北五十丈上可以容萬人下可以建五丈旗周馳為閤道自殿下直抵南山表山顛以為闕複道渡渭屬之咸陽隱宫徒刑者七十餘萬人分作阿房驪山關中計宫三百關外四百餘因徙三萬家驪邑五萬家雲陽杜牧曰嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家奈何取之盡錙銖用之如泥沙使負棟之柱多於南畝之農夫架梁之椽多於機上之女工釘頭磷磷多於在庾之粟粒瓦縫參差多於周身之帛縷直欄横檻多於九土之城郭絃管嘔啞多於市人之言語使天下之人不敢言而敢怒獨夫之心日益驕固戍卒叫函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟夫使六國各愛其人則足以拒秦使秦復愛六國之人則遞三世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也臣按秦始皇於三十五年作阿房宫至三十七年東巡而崩於沙丘勞七十餘萬人之力費百千萬億之財營建始成僅僅二朞而身已下世嗚呼一身之微嵗月幾何何苦勞人費財而為此無益之事流毒四海遺臭千載也哉秦始皇亦愚也已矣不知己之愚而欲愚黔首噫果孰愚哉後世人主誦杜牧之賦所謂一人之心千萬人之心取之盡錙銖用之如泥沙及天下之人不敢言而敢怒後世哀之而不鑑之等語其亦知所以省悟也夫漢高祖五年治長樂宫於長安吕祖謙曰按史記高帝六年更命咸陽曰長安然盧綰傳云綰封為長安候長安故咸陽也則長安為咸陽别名久矣是時高祖雖西入關尚居櫟陽方營宫室於長安謀遷都也臣按漢建長樂宫始此七年帝至長安蕭何治未央宮帝見其壯麗甚怒曰天下匈匈數嵗成敗未可知是何治宮室過度也何曰天下方未定故可因以就宮室且天子以四海為家非壯麗無以重威且無令後世有以加也司馬光曰王者以仁義為麗道德為威未聞其以宮室塡與鎮同服天下也天下未定當克己節用以趨民之急而顧以宮室為先豈可謂知所務哉昔禹卑宫室而桀為傾宮創業垂統之君躬行節儉以訓示子孫其末流猶入於淫靡况示之以侈乎孝武卒以宫室罷敝天下未必不繇酇侯啓之也臣按蕭何此對所謂禦人以口給也説者乃謂何欲以此堅帝都長安未必然也當以司馬氏之言為正文帝即位二十三年宮室苑囿車騎服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中人十家之產也吾奉先帝宫室常恐羞之何以臺為臣按所貴乎人主者以天下之事無所不知也内而宫闈外而朝廷遠而至於邊徼下而至於閭閻人情世態無一而不知既知之而又念之必使無一物無一人之不得其所然後能盡父母斯民之責文帝欲作一臺召工計之直百金曰百金中人十家之產也蓋帝起自外藩耳聞目見民間之事非若景武生於深宮之中長於婦女之手者比也故知天下之民有上中下三等上等之人其家固不止十金也中人一家產僅直十金則下者不及十金可知矣其中甚者乃至無一錢之儲隔宿之食立錐之地枵腹而眠賃屋而居者比比皆是九重之上左右之人乃至有一飯而費十金者一宴而費百金者一器用服飾之微而費千金者尚或以為不滿意而他求及其有所營造以恣游玩佞佛老媚神鬼者往往傾府庫之財竭生民之力略不顧惜嗚呼胡不思之甚耶觀於此可見文帝為三代以後絶無僅有之令主書文史册千載有光後世人主其或有所營建必先計其工用而以文帝為法毋為嬖倖所欺以多為少以不可為可則足以盡天下之情而成天下之治矣武帝元鼎二年起栢梁臺作承露盤高二十丈大七圍以銅為之上有仙人掌承露和玉屑飲之云可以長生宮室之修自此日盛公孫卿又言仙人好樓居於是上令長安甘泉作諸臺觀使卿持節設具而候神人益廣諸宮室臣按人君不可多慾慾心一萌左右窺見其端遂從而從臾之因而疲勞生民空竭府庫天下生靈繇是而凋瘵有不得其所者矣武帝富貴已極而求長生左右因引進方士言有物餌之可以不死而為仙人好樓居之說於是隨所指教而大興工役勞民傷財以為無益之事慾心既熾而置政治於不問遂致海内虛耗盜賊蠭起一人之欲長其生竟不可得而使千萬人之速致於死良可悲夫太初元年栢梁臺災越人勇之曰越俗有火災復起屋必以大用勝服之於是作建章宫度為千門萬户東鳳闕西虎圏北漸臺太液池中有蓬萊方丈瀛洲壺梁南玉堂璧門立神明臺井幹樓輦道相屬臣按武帝建栢梁臺而天火災之是天以火而儆帝也帝為此臺本以求神仙神仙有靈必為之訶禁而火不得災之矣一旦蕩然於烈焰之中其仙之不神亦可見矣帝於此尚不覺悟而又大為宮室以厭勝之帝非獨不燭理蓋亦不畏天也天怒於上而假火為災以警人譬則君怒其臣而毁其所為也其臣恬然不知所戒懼又從而大其所為比舊愈加焉君怒之否乎武帝茍以是反求諸已則必兢惕戒謹以畏天怒而不敢復有所作矣太始三年趙偼伃居鉤弋宮任身十四月而生子弗陵武帝曰聞昔堯十四月而生乃命門曰堯母門司馬光曰為人君者動靜舉措不可不慎發於中必形於外天下無不知之當是時也皇后太子皆無恙而命鉤弋之門曰堯母非名也是以姦臣逆探上意知其奇愛少子欲以為嗣遂有危皇后太子之心卒成巫蠱之禍悲夫臣按一宮室之門若無甚大關係也而國本因之而動搖幾至亡宗社是知人君於宮殿之創建不可輕易則雖命一門之名亦當熟思審處而不可輕易也明帝永平三年夏旱而大起北宮鍾離意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日宻雲遂無大潤豈政有未得應天心邪昔成湯遭旱以六事自責曰政不節邪使人疾邪宮室營邪女謁盛邪苞苴行邪讒夫昌邪竊見北宮大作人失農時此所謂宮室營也自古非苦宮室小狹但患人不安寧宜且罷止以應天心帝䇿詔報曰湯引六事咎在一人其冠履勿謝比上天降旱朕蹙然慙懼故分日禱請今又敇大匠止作諸宮減省不急庶消災譴詔因謝公卿百僚遂應時澍雨焉後德陽殿成百官大㑹帝思意言謂公卿曰鍾離尚書若在此殿不立臣按成湯六事之責其一宮室營則是修造營建勞民動衆怨懟之氣上干天和此所以不當天心而來旱熯也鍾離意諫其君而以天心為言其知本者歟明帝一聞其言遂䇿詔答謝敇止作諸宮減省不急不徒謝意而又因之以謝公卿百僚不徒生前納其言逮其死也又思其言而對衆揚之明帝好諫之誠思賢之切後世所當法者也靈帝中平二年宦者張讓趙忠說帝斂天下田畝十錢以修宮室鑄銅人樂安太守陸康上疏諫曰昔魯宣稅畝而蝝災自生哀公增稅而孔門非之豈有聚奪民銅以營無用之物捐捨聖戒自蹈亡王之法哉内倖譖康援引亡國以譬聖明大不敬檻車徵詣廷尉侍御史劉岱奏陳解釋得免歸田里又詔發州郡材木文石黃門侍郎輒令譴呵不中者因强折賤賣僅得本價十一復貨之中者亦不即受材木腐積宮室連年不成刺史太守復增私調百姓呼嗟又令西園騶分道督趣恐動州郡多受賕賂牧守茂材孝亷遷除皆責修宮錢當之官者皆先至西園諧價然後得去鉅鹿太守司馬直以有清名減直三百萬直悵然曰為民父母而反割剝百姓以稱時求吾不忍也辭疾不聽行至孟津上書極言吞藥自殺書奏為暫絶修宮錢臣按靈帝聽嬖幸之言斂天下錢以修宮室謂之修宮錢既取之於田畝復取之於選調取之田畝而免樂安太守陸康取之選調而殺鉅鹿太守司馬直二太守者皆上書以聞靈帝既知之矣而猶不知痛革僅暫免焉司馬直曰為民父母而割剝百姓以稱時求吾不忍也嗚呼太守為民父母而不忍剝割其子以稱時求靈帝非民之大父母乎而忍剝割其孫曾以稱己欲何其忍哉且稱時求繇乎人稱己欲繇乎我繇乎我者進止一反掌間耳魏明帝太和元年營修宮室王朗上疏諫曰昔大禹欲拯天下之大患故先卑其宮室儉其衣食勾踐欲廣其禦兒之疆亦約其身以及家儉其家以施國漢之文景欲恢𢎞祖業故割意於百金之臺昭儉於弋綈之服霍去病中材之將猶以匈奴未滅不治第宅明䘏遠者略近事外者簡内也今建始之前足用列朝會崇華之後足用序内官華林天淵足用展游宴若且先成象魏修城池其餘一切須豐年專以勤耕農為務習戎備為事則民充兵强而宼戎賔服矣臣按國家修營宮室若無預於戎備也而王朗乃謂修營必須豐年而兼以勤耕農習戎備為言夫修營妨農則有矣而亦謂妨於戎備何哉朗所謂䘏遠者略近事外者簡内是也夫泛用民力於内尚有以簡戎備於外況專用兵力者哉尤不可也當夫無事之時而殫其力於無益之營造勞其筋骨耗其財力廢其家計而起其怨懟之心一旦有事用之而又欲其效死力禦强暴豈不難哉明帝好土功既作許昌宮又治洛陽宮起昭陽太極殿築總章觀高十餘丈力役不已農桑失業司空陳羣上疏曰昔漢祖惟與項羽爭天下羽己滅宮室燒焚是以蕭何建武庫太倉皆是要急然高祖猶非其壯麗今二虜未平誠不宜與古同也漢明帝欲起德陽殿鍾離意諫即用其言後乃復作之殿成謂羣臣曰鍾離意尚在不得成此殿也夫王者豈憚一臣蓋為百姓也今臣曾不能少凝聖聽不及意遠矣明帝乃為之少有減省廷尉高柔上疏曰昔漢文惜十家之資不營小臺之娛去病慮匈奴之害不遑治第之事況今所損者非惟百金之費所憂者非徒北狄之患乎可粗成見所營立以充朝宴之儀乞罷作者使得就農二方平定復可徐興少府楊阜上疏曰堯尚茅茨而萬國安其居禹卑宮室而天下樂其業及至殷周或堂崇三尺度以九筵耳桀作璇室象廊紂為傾宮鹿臺以喪其社稷楚靈以築章華而身受禍秦始皇作阿房二世而滅夫不度萬民之力以從耳目之欲未有不亡者也陛下當以堯舜禹湯文武為法則夏桀殷紂楚靈秦皇為深誡而乃自暇自逸惟宮室是飾必有顛覆危亡之禍矣明帝感其忠言手筆詔答臣按明帝好土功而力役不已其臣陳羣高柔楊阜皆上疏諫之明帝不之罪乃為之少有減省乃手筆詔答雖不能盡從其亦異乎愎諫遂非者矣楊阜所謂不度萬民之力以從耳目之欲未有不亡者也臣愚以為非但營建宮室一事凡恣耳目所欲如崇佛老之居好珍玩之物未必於此即亡然為之不已則必馴致於亡有此理也晉孝武太元二年初謝安欲增修宮室王彪之曰中興之初即東府為宮殊為儉陋蘇峻之亂成帝止蘭臺都坐殆不蔽寒暑是以更營新宮比之漢魏則為儉比之初過江則為侈矣今宼敵方彊豈可大興工役勞擾百姓邪安曰宮室弊陋後世謂人無能彪之曰凡任天下之重者當保國寧家緝熙政事乃以修宮室為能邪臣按謝安謂宮室弊陋後世謂人無能王彪之曰凡任天下之重者當保國寧家緝熙政事不以修宮室為能此就人臣言也若夫人君富有四海貴為天子何欲不遂何求不得凡其所以能大有興作極其壯麗奇巧者皆假人力為之非天子能事也適足以彰其無遠圖而不恤民耳堯之土堦茅茨禹之卑宮室可謂弊陋矣未聞後世人有議其不能者也彼桀之璇宫象廊紂之瓊宮瑤臺豈所以爲能哉劉宋孝武奢欲無度自晉氏渡江以來宮室草創朝宴所臨東西二堂而已晉孝武末始作清暑殿宋興無所增改武帝始大修宮室土木被錦繡嬖倖賞賜傾府藏壞高祖所居陰室於其處起玉燭殿與羣臣觀之牀頭有土障壁上挂葛燈籠麻繩拂侍中袁顗盛稱高祖儉素之德帝不答獨曰田舍翁得此已為過矣蔡沈曰昔劉裕奮農畝而取江左一再傳後子孫見其服用反笑曰田舍翁得此已過矣此正無逸所謂昔之人無聞知也使成王非周公之訓安知其不以公劉后稷為田舍翁乎臣按王者之宮室固不可以不嚴䆳然亦不可過於嚴邃況吾祖吾考立國以來皆已安之矣何獨至我必為宏大壯麗之居乎非夫國計有餘内無水旱之災外無邊防之警不可有所作興以妨民動衆也北朝魏太武性儉率服御飲膳取給而已羣臣請增峻京城及修宮室曰易云王公設險以守其國又蕭何云天子以四海為家不壯不麗無以重威世祖曰古人有言在德不在險屈丏蒸土築城而朕滅之豈在城也今天下未平方須民力土功之事朕所不為蕭何之對非雅言也臣按觀世祖謂蕭何之對非雅言誠是也若夫易設險以守國之言則有國者不可無險以守也但不可若屈丏蒸土築城以過勞民力耳夫守國以修德為本而設險亦不可無茍徒恃險而不修德則險非吾有矣文成帝還平城起太華殿是時給事中郭善明性傾巧說文成大起宮室中書侍郎高允諫曰太祖始建都邑其所營立必因農隙況建國已久永安前殿足以朝㑹西堂溫室足以宴息紫樓足以臨望縱有修廣亦宜馴致不可倉猝今計所當役凡二萬人老弱供餉又當倍之期半年可畢一夫不耕或受之饑況四萬人之勞費可勝道乎此陛下所宜畱心也文成納之臣按高允謂縱有修廣亦宜馴致不可倉猝馴而致之之一語是誠公私造作之良方也大凡為事以漸為之用民力以遞休則人不勞擾以久為之聚財用以漸致則價不踊貴然非甚不得已則亦不可為也若或見有者足以居處姑仍舊貫可也隋文帝開皇十五年仁壽宮成文帝幸之時天暑役夫死者相次於道楊素悉焚除之文帝聞之不悅及至見制度壯麗大怒曰楊素殫民力為離宮為吾結怨天下素聞之皇恐慮獲譴以告封德彜德􅉓曰公勿憂俟皇后至必有恩詔明日果召素入對獨孤后勞之曰公知吾夫婦老無以自娛盛飾此宮豈非忠孝賜錢百萬緡絹三千段臣按隋文帝之怒楊素是也而封德彜乃逆知獨孤后之意豈后豫以告德彜哉蓋德􅉓事文帝日久知其心非誠於愛民也使帝誠心於愛民必不忍以役夫之暍死為娛老之地而不能以一朝居矣况聽后言賞素哉唐太宗貞觀四年發卒修洛陽宮以備巡幸張𤣥素上書諫以為洛陽未有巡幸之期而預修宮室非今日之急務昔漢高祖納婁敬之説自洛陽遷長安豈非洛陽之地不及關中之形勝邪景帝用鼂錯之言而七國搆禍陛下今處突厥於中國突厥之親何如七國豈得不先為憂而宮室可遽興乘輿可輕動哉陛下初平洛陽凡隋氏宮室之宏侈者皆令毁之曽未十年復加營繕何前日惡之今日效之也且以今日財力何如隋世陛下役瘡痍之民襲亡隋之弊恐又甚於煬帝矣太宗謂𤣥素曰卿謂我不如煬帝何如桀紂對曰若此役不息亦同歸於亂耳太宗曰吾思之不熟乃至於是顧謂房𤣥齡曰朕以洛陽土中朝貢道均意欲便民故使營之今𤣥素所言誠有理宜即為之罷役後日或以事至洛陽雖露居亦無傷也仍賜𤣥素綵二百匹臣按唐太宗之為君也營一行宮固未必至於亂而張𤣥素至比帝以隋煬帝太宗不惟不之怒而且加賜以旌其言賢哲之君所存所行有可為百世之法者此類是也後世昏君庸主諫者之言未出口已逆惡之矣此所以甘於為庸主而坐受亂亡之禍貞觀十一年太宗作飛仙宮魏徵上疏以為煬帝恃其富强不虞後患窮奢極欲使百姓困窮以至身死人手社稷為墟陛下撥亂反正宜思隋之所以失我之所以得撤其峻宇安其卑宫若因基而增廣襲舊而加飾此則以亂易亂殃咎必至難得易失可不念哉臣按魏徵諫太宗作飛仙宮其言至切世主所當深玩貞觀十五年房𤣥齡高士亷遇少府少監竇德素於路問北門近何營繕德素奏之太宗怒讓𤣥齡等曰君但知南牙政事北門小營繕何與君事𤣥齡等拜謝魏徵進曰臣不知陛下何以責𤣥齡等而𤣥齡等亦何所謝𤣥齡等為陛下股肱耳目於中外豈有不應知者使所營為是當助陛下成之為非當請陛下罷之問於有司理則宜然不知何罪而責亦何罪而謝也太宗甚愧之臣按朝廷有所營繕不問中外大臣皆所當知太宗責𤣥齡等非也𤣥齡等謝罪亦非也使無魏徵之言何以起太宗之愧哉太宗不惟不之怒而且内愧愧之一言孟子所謂羞惡之心人君處仁遷義之機也繇是而上堯舜之道不外是也穆宗長慶四年波斯獻沈香亭子材左拾遺李漢上言此何異瑤臺瓊室敬宗雖怒亦優容之臣按敬宗雖能優容李漢之言而未聞其罷香亭而不構蓋其僅能不加以罪而侈欲之心終不能遏也宋太祖開寶二年詔曰一日必葺昔賢之能事如聞諸道藩鎮郡邑公宇及倉庫凡有隳壞弗即繕修因循嵗時以至頺毁及僝工充役則倍增勞費自今節度觀察防禦團練使刺史知州通判等罷任其治所廨舍有無隳壞及所增修著以為籍迭相符授幕職州縣官受代則對書於考課之厯損壞不全者殿一選修葺建置而不煩民者加一選蘇軾曰宮室蓋有所從受而傳之無窮非獨以自養也今日不治後日之費必倍而比年以來所在務為儉陋尢諱土木營造之功欹側腐壞轉以相付不敢擅易一椽此何義也洪邁曰宋太祖創業方十年而聖意下逮克勤小物一至於此後之當官者少復畱意以興仆植僵為務則暗於事體不好稱人之善者往往指為妄作名色盜隱官錢至於使之束手諱避忽傾視陋逮於不可奈何而後已殊不思貪墨之吏欲為姦者無施不可何必假於營造一節乎臣按官吏必有廨宇以為視事臨民之所衆之聚集所在下之瞻視所繫誠不可無也上而朝廷則有宮闕下而官府則有廨宇非以私奉養也蓋上之所居必尊嚴則下不敢輕忽上之所居有定在則下知所趨集上之所居有統會則下有所聯束此勢之必然亦自然之理也臣故附載官吏廨宇於宮闕之末以上宮闕之居大學衍義補卷八十八
