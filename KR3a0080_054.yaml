body:
  text: 大學衍義補卷五十四明丘濬撰治國平天下之要秩祭祀總論祭祀之禮上易萃王假有廟程頥曰王者萃聚天下之道至於有廟極也羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其来格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至於有廟則萃道之至也祭祀之報本於人心聖人制禮以成其徳耳故豺獺能祭其性然也渙之象曰風行水上渙先王以享于帝立廟程頥曰風行水上渙有渙散之象先王觀是象救下之渙散至于享帝立廟也收合人心无如宗廟祭祀之報出於其心故享帝立廟人心之所歸也繫人心合離散之道莫大於此胡炳文曰享帝而與天神接立廟而與祖禰交皆聚已之精神以合其渙者也臣按萬物本乎天人本乎祖天之生物散其氣於萬類祖之生孫散其氣於衆支人乃物之一而人君於衆人之中而為天之宗子萃上天生物之全氣者也吾所以得天之全者承吾祖吾考之所得於天者而有之以為吾家之宗子人物莫不得天之氣而吾獨受其全子孫莫不受祖之氣而吾獨受其正必欲合萬類之散而咸歸於天是以享帝於郊合衆支之散而咸依乎祖是以享祖於廟是則郊天享帝非獨以之報本而反始蓋郊祀以奉上帝所以收天下渙散之心而萃於一使其知萬物之生一天也廟享以祀祖宗所以收一家渙散之心而萃於一使其知百世之𫝊一祖也内而一家之心不散則彞倫攸叙九族既睦倫理以明恩義以篤聯絡而親比確為􅀢石之宗天下之人孰敢侮予哉由中而達外地非一方人非一姓莫不興其水木本源之念江漢朝宗之心勢雖分散而心則同歸地雖隔越而心則嚮往不出壇墠之間堂陛之近而天下之大億兆之衆其心畢萃於此矣先儒謂繫人心合離散之道莫大於此豈不信哉虞書肆遂也類于上帝禋精意以享之于六宗望望而祭之于山川名山大川徧周也于羣神丘陵墳衍古昔聖賢之類孔頴達曰此經惟有祭天不言祭地及社稷必皆祭之史略文耳蘇軾曰古者郊天必及天地間尊神此之禋六宗望山川徧羣神蓋與類上帝為一體爾朱熹曰類禋望皆祭名類謂非常祀而祭告於天其禮依郊祀為之上帝天也宗尊也所尊祭者其祀有六時也寒暑也日也月也星也水旱也胡宏曰國有大事告于天地以及羣神禮之常也祀上帝謂之類者本乎天者咸在其中也臣按帝舜攝位之初既已受終於文祖而又類于上帝以及於上下神祗獨於后土之祭闕焉何也意者類之為言方以類聚之類也所謂依郊祀而為之祭乃易漢儒以解周禮者未必虞時以類名祭之意也竊恐天地常祀或分祭而於非常之禮則類合天地而祭之所祭者以上帝為主而類聚羣祀以為一禮如蘇胡二氏所云者夫論禮者當原其本初而漢儒議禮率多以成周為主而强牽在前者以合於後虞書此數言者萬世經典言祭祀之始先於成周千餘年要當以之為正其禮雖為攝位而祭告實則當時常行之禮亦萬世當行之禮也益曰至誠感神朱熹曰誠感物曰諴益推極至誠之道以為神明亦且感格商書伊尹申誥于王曰鬼神無常享享于克誠蔡沈曰謂之誠者不誠無物誠立於此而後神格於彼臣按誠之一言感神之本自古帝王𫝊授心法之要不過此誠而已是誠也首見於虞書然言其義而已未始指言也指言以示萬世實始於伊尹之此言夫帝王之道無一而不本乎誠而於感格神天之際尤其精禋者焉承天命以居帝位而主百神之祀者要當以是誠為本傅說進于王曰黷于祭祀時謂弗欽禮煩則亂祀神則難蔡沈曰祭不欲黷黷則不敬禮不欲煩煩則擾亂皆非所以交鬼神之道也祖巳曰嗚呼王司主也敬民㒺非天𦙍嗣也典祀無豐于昵近也蔡沈曰王之職主於敬民而已儌福於神非王之事也况祖宗莫非天之嗣主祀其可獨豐於昵廟乎吕祖謙曰髙宗恭黙夢帝精神素與天通又聰明憲天脩徳又與天合故於祀事略過豐飛雉隨即應之此雖過於厚亦過也精誠積久天既賚之過失微形天遽儆之固見天之儆君無私亦見天之愛君甚速也黷于祭祀禮煩則亂說已知髙宗之偏在此㫖哉惟艱領畧警省深矣而此心終難除氣質偏厚者尚難變乃知行之果為艱也臣按蔡氏謂商俗尚鬼髙宗或未能脫於流俗事神之禮必有過焉祖己戒其祀無豐昵而黷于祭祀傅說亦甞以進戒蓋因其失而正之也有商盛時大臣事君以道其君於祀神之道少有過豐即相與諌言不肯放過過於厚者猶如此况其過於刻薄放肆者哉後世人君往往昵嬖倖奉邪術備所不當備之物祭所不當祭之鬼䙝天而瀆神費財而害民遂因而致災異之變起禍亂之端者亦有之矣非獨為君者之失而一時所謂大臣諌輔者黙黙而㒺聞知不敢一言以形於奏牘甚者又從而開導從臾之而為之營規制作讃頌噫斯人也其傅說祖己之罪人歟周書周公曰王肇稱殷盛也禮祀于新邑咸秩序也無文祀典不載蔡沈曰言王始舉盛禮祀于洛邑皆序其所當祭者雖祀典不載而義當祀者亦序而祭之也臣按祀典固有常禮然於祀典之外而義所當祀者亦先王之所不廢也然謂之義者必合於人心之宜當於天理之正者也否則非義而不可祭矣非惟吾不可祭而神亦不吾享矣多士王若曰自成湯至于帝乙罔不明徳恤祀蔡沈曰明徳者所以修其身恤祀者所以敬乎神臣按此言乃周公託為成王之言以告多士也所謂自成湯至于帝乙莫不恤祀則是自古帝王為治莫不以祀事為先可知矣然祀而謂之恤者蓋祀所以交神明非獨以致人之敬亦所以妥神之靈而廢祀則神無所嚮矣殷之民士不明厥徳多廢其嵗祀蓋於神有所不暇恤者矣此成王所以舉其先世明徳恤祀之故以為之告歟吕刑王曰乃命重即羲也黎即和也絶地天通㒺有降格羣后之逮在下明明顯明之理棐常彛常之性鰥寡無蓋無有蔽蓋吕祖謙曰治世公道昭明為善得福為惡得禍民曉然知其所由則不求之渺茫㝠昩之間當三苗昏虐民之得罪者莫知其端無所控訴相與聽於神祭非其鬼天地人神之典雜揉瀆亂此妖誕之所以興人心之所以不正也在舜當務之急莫先於正人心首命重黎脩明祀典天子然後祭天地諸侯然後祭山川髙卑上下各有分限絶地天之通嚴幽明之分焄蒿妖誕之說舉皆屏息羣后及在下之羣臣皆精白一心輔助常道民卒善而得福惡而得禍雖鰥寡之微亦無有蓋蔽而不得自伸者也蔡沈曰按國語少皥氏之衰九黎亂徳民神雜揉家有史巫民瀆齊盟禍災薦臻顓頊受之乃命南正重司天以屬神北正黎司地以屬民使無相侵瀆其後三苗復九黎之徳堯復育重黎之後不忘舊者使復典之臣按國將興聽於民國將亡聽於神是以神怪之興皆於衰亂之世然必在上之人有以惑亂其心而興非鬼之祭以求無望之福然後下之人従而應之謂福可以禱而得禍可以祈而免不信人道而信鬼道不行正術而行邪術棄經典之所載而狥異端之所為由是天地之氣亂幽明之理微蚩蚩蠢蠢之民心無所主而邪偽之徒乗其所蔽而惑亂之脇之以禍害誘之以福利如漢末之五斗米賊宋之吃菜事魔元之彌勒佛出世皆是假神以作亂也明主知其然制為祭祀之禮秩乎其有序非此族也不在祀典絶在地之民使人不得以妖術以格夫在天之神絶在天之神使人不得假其名字以降於在地之民是則所謂絶地天通罔有降格者也臣請於凡天下神祀非夫經典所載及祖宗以来著在祀典者一切革除凡夫世之所謂扶鸞降聖追䰟攝魄等術不許士民習學崇奉違者治以重罪是亦正人心息邪術弭禍亂之一端也周禮太宰以八則治都鄙一曰祭祀以馭其神葉時曰官吏民士可馭也神者幽而無迹又安得而馭之蓋古者雖敬於神而未甞聽於神三時不害則奉樂以告之牲牷肥腯則奉牲以告之有功者無不報也犧牲既成粢盛既備然而旱乾水溢則變置社稷無功者無不奪也是以都宗人家宗人掌祭祀之禮凡祭祀必致福於國國有大故令禱祠必反命於國蓋其神歸王所馭也先王設廢置刑賞之法雖至幽而鬼神亦在吾操縦闔闢之内是其為則未甞略也又况祭祀不離於九式初非有所輕重於其間也臣按人君為神人之主有民人社稷之寄凡其所以為法則以治都鄙者不惟馭乎民而必先有以馭乎神焉夫謂之則者一定之制可以為人之法者也凡夫天下大邦小國一都一鄙其所當祀之神當秩之典其法則皆統馭之於上焉不可得而僭也不可得而廢也未有者不敢創其始已有者不敢廢其成必承命而後敢行既畢事而必反命先王所以馭世立法其嚴如此此法誠行安得有陪臣而旅泰山諸侯而行郊祀者哉大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國以吉禮事邦國之鬼神示與祗同鄭𤣥曰建立也立天神人鬼地示之禮者謂祀之祭之享之臣按禮有五吉禮為之首禮而謂之吉者以祭祀有受福之理也吉禮之别十有二大宗伯掌之大宗伯之職掌邦禮而禮之大者在祀故首以為言上言建邦據王言也下言佐王建保邦國則統侯國言之矣謂之建者謂封國則頒祀也謂之保者謂祭祀則受福也所謂祀之享之祭之凡十有二分見各條小宗伯之職掌建國之神位右社稷左宗廟兆五帝於四郊四望四類亦如之兆山川丘陵墳衍各因其方王安石曰右隂也地道之所尊故右社稷左陽也人道之所鄉故左宗廟位宗廟於人道之所鄉則不死其親之意吴澂曰右社稷右隂也地道尊右左宗廟左陽也人道尚左此云左右在庫門之内雉門之外兆為壇之營域也五帝五方之帝也五帝而兆止於四者土與火相生以相繼蓋同兆於南郊也四望謂五嶽四鎮四瀆蓋望山川而祭也四類者兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊蓋以氣類為之位也山川丘陵墳衍於四望名山大川之外又有當祭者各因其方而祭之臣按宗廟社稷内祭也故其神位在廟内五帝四望以下外祭也故其神位在郊外若夫山川丘陵墳衍則又各順其所在而為之位焉國之大事在禮禮官之大者大小宗伯大宗伯掌祀神之禮小宗伯掌禮神之位位者棲神之所禮者事神之儀也神必有所棲然後禮可行禮必有其儀然後神可接此成周設官之大意也肆師陳列祭祀之官之職掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲以歳時序其祭祀鄭𤣥曰大祀天地宗廟次祀日月星辰社稷五祀五嶽小祀司中司命風伯雨師山川百物也臣按天神地示人鬼皆國祀也即其祀中皆有三等之差而以玉帛牲牷明其大小焉然是三祀也各當其時以祭之以時序為先後之序不必先大後小也大祝掌六祝之辭以事鬼神示祈福祥求永長也貞正也一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝賈公彥曰此六辭皆是祈禱之事皆有辭說以告神故曰六祝之辭吴澂曰順祝者謂天人和同納於大順也年祝者謂五氣時若常大有年也吉祝者謂斂時五福吉無不利也化祝者謂化被六極以為和氣也瑞祝者謂天不愛寳形為上瑞也筴祝者謂龜筴不違於人是謂大同也臣按大祝者祈祝大事也郊天地祀社稷享宗廟先王既盡内心之誠於備物之祭然無辭說以通達焉則無以致吾感格之誠故設大祝之官掌六祝之辭所以薦吾之誠而祈神之嘏也掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰說王昭禹曰夫鬼神示與祗同之於人幽明異勢疑若不可同也然鬼神依人而行先王與鬼神合其吉凶則同鬼神示固有其道矣所祈如此亦以與民同吉凶而已臣按大祝所掌之祝辭六皆所以祈福祥也又所祈之事又有六焉類則聚於一若類于上帝也造則詣其所若造于祖也禬若禬國之凶荒民之札喪之屬禜若春秋祭禜之屬攻若翦氏以攻禜攻之之屬說謂辭以責之若庶氏以攻說禬之之屬凡此皆所以祈福祥也夫福祥之所以為福祥無災禍之謂也去其災禍則福祥在是矣祝者其辭祈者其事大祝以祝辭事鬼神而祝之中又各因其事而祈之以同乎鬼神易所謂與鬼神同其吉凶其斯之謂歟辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號呉澂曰號者謂尊其名更為美稱神號者尊天曰皇天上帝鬼號者尊祖曰皇祖伯某示號者尊地曰后土地祗牲號者牛曰一元大武之類齍號者黍曰薌合之類幣號者幣曰量幣之類致美於牲幣所以致敬於鬼神也臣按所謂號者易其常名以為美稱用申其所以尊而敬之之心焉禮記曲禮曰踐履也阼主階也臨祭祀内事曰孝王某外事曰嗣王某陳澔曰祝辭稱孝王某者事親之辭嗣王某者事神之辭也吴澂曰宗廟所祭者一家之親内神也故曰内事郊社及山川之屬所祭者天下一國之神皆外神也故曰外事臣按某者天子之名也孝王某嗣王某皆祝辭也天子祭天地祭四方祭山川祭五祀歳徧諸侯方祀祭山川祭五祀嵗徧大夫祭五祀嵗徧士祭其先吕大臨曰此章泛論祭祀之法天子繼天而王君天下而有之冬日至祀天夏日至祭地四時各祭其方以迎氣又各望祭其方之山川五祀則春祭户夏祭竈季夏祭中霤秋祭門冬祭行此所謂嵗徧諸侯有國國必有方祭其所居之方而已非所居之方及山川不在境内者皆不得祭故曰方祀大夫有家不與山川之祀所得祭者五祀而已天子至大夫言祭百神而不及其先惟於士言者舉輕以明重且言士有不得祭者也臣按先儒言天子祭天地則天下之事諸侯方祀則一國之事大夫祭五祀則一家之事士祭先則一身之事蓋徳有隆殺故所祭之神有大小業有廣狹故所祭之神有逺近凡祭有其廢之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰淫祀淫祀無福吕大臨曰廢之莫敢舉如已毁之宗廟變置之社稷不可復祀也舉之莫敢廢如已修之壇墠而輒毁已正之昭穆而輒變也非所祭而祭之如法不得祭與不當祭而祭之者也淫過也以過事神弗享也故無福陳淳曰天子祭天地諸侯祭山川大夫祭五祀士祭其先古人祀典品節一定不容紊亂在諸侯不敢僭天子而祭天地在大夫不敢僭諸侯而祭山川如季氏旅泰山便不是禮故曰非所當祭而祭之名曰淫祀淫祀無福淫祀皆是不正之鬼假如正當正神自家不應祀而祀便是淫祀臣按魯立武宫立煬宫舉其廢也躋僖公廢其舉也魯之郊禘與祀文王祀爰居祭所不當祭也若楚昭王之不祀河甯武子之不祀相皆變易舊俗而趨之正則於禮為得矣王制天子祭天地諸侯祭社稷大夫祭五祀天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭名山大川之在其地者天子諸侯祭因國之在其地而無主後者陳澔曰視三公視諸侯諸視其饔餼牢禮之多寡以為牲器之數也因國謂所建國之地因先代所都之故墟也今無主祭之子孫則在王畿者天子祭之在侯邦者諸侯祭之以其昔甞有功徳於民不宜絶其祀也朱熹曰一家之主則一家鬼神屬焉諸侯守一國則一國鬼神屬焉天子有天下則天下鬼神屬焉看来為天下者這一箇神明是甚麽大如何有些子差忒得若縦欲無度天上許多星辰地下許多山川如何不變怪臣按祭祀之禮在上者可以兼下在下者不可以僭上荀卿曰郊止乎天子社止乎諸侯道及乎大夫是也蓋天子繼天以出治凡其治之所及其人民土地皆為所有是凡在天成象若日月星辰之類在地成形若山川丘陵之類人生其間若先代聖君賢相名臣烈士之類其精神氣魄皆與之相為流通貫徹雖其物之殊形其人之已往然吾一念之誠既立於此則彼雖髙髙於九霄之上纍纍於萬里之逺寥寥於千百世之久莫不翕聚於肸蠁之間感孚之際洋洋乎如在其上如在其左右也茍縱欲敗度弗事上帝神祗遺厥先宗廟弗祀攘竊神祗之牲犧牷則吾之精神既不孚於冥冥之間而神之氣類亦不形於昭昭之際朱子所謂天上許多星辰地下許多山川如何不變怪有必然者矣噫彼昏狂之君至謂祀無益謂神無能為而荒誕者又馳心冥漠之域而蠧財勞民以從事乎鬼教二者之失均焉惟禮所得為者為之斯為中道矣喪三年不祭唯祭天地社稷為越猶躐也紼輶車索也而行事鄭𤣥曰不敢以卑廢尊也孔頴達曰私喪卑天地社稷尊雖遭私喪既殯已後若有天地社稷之祭即行之未葬之前屬紼於輴祭天地社稷須越躐此紼而往祭所故云越紼六宗山川之神則否陸佃曰不祭謂宗廟爾即天地社稷雖未𦵏猶祭之是之謂越紼臣按宋英宗初即位有人以此問程頥頥謂古人居喪百事皆如禮雖廢祭祀可也今人百事皆如常特於祭祀廢之則不若無廢為愈也張載正之曰父在子為母䘮則不敢見其父不敢以非禮見也今天子為父之喪以此見上帝是以非禮見也故不如無祭臣竊以為後世人君往往於柩前即位而喪服用以月易日之制事事皆從吉矣而獨於祭祀之禮必拘古制可乎設遭大喪果終三年之制則郊社宗廟之禮特遣禮官攝行如周禮大宗伯所謂有故則攝行祭事之文不然則用程頥之說可也以上總論祭祀之禮大學衍義補卷五十四
