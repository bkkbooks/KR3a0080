body:
  text: 大學衍義補卷一百十明丘濬撰治國平天下之要慎刑憲明復讐之義周禮調人掌司萬民之難謂相與為仇讐而諧諧猶調也和之凡過謂無本意也而殺傷人者以民成平也之鳥獸亦如之凡和難父之讐辟諸海外兄弟之讐辟諸千里之外從父兄弟之讐不同國君之讐眡父師長之讐眡兄弟主友之讐眡從父兄弟弗辟則與之瑞節而以執之凡殺人有反殺者使邦國交讐之凡殺人而義者不同國令勿讐讐之則死凡有鬬怒者成之不可成者則書之先動者誅之鄭𤣥曰一說以鄉里之民共和解之吳澂曰為親復讐者人之私情蔽囚致刑者君之公法使天下無公法則已如有公法則私情不可得而行矣夫司徒掌教教民以六德之和又教之以六行之睦唯欲斯民之和恊也如其不從教則不睦之刑從而加焉在所不赦也而其官屬乃掌萬民之難使之相避是使天下之人得以肆其私情而人君之公法不復可行於世與大司徒之教相反如必曰從人之私情則父之讐不與共戴天辟諸海外亦未為得盍亦使之弗共戴天而後可也又曰凡殺人有反殺者使邦國交讐之凡殺人而義者不同國勿令讐讐之則死果如是殆將使天下以力相陵交相屠戮往來報復無有已時聖王令典決不若此之繆臣按調人之和難蓋謂過而殺傷人者也如律文所謂誤殺戲殺過失殺之類以其本無意而殺人而或致其人於死事雖可惡而情則可矜然死者不可復生孝子弟弟忠臣義士其於父兄師主之死不以其天年彼雖無故殺之心而其父兄師主實因之而死其心有不能忘者然其人或在十議之辟及有益於斯世原其所犯罪不至死是以先王立調人之官以和其難凡過而殺傷人者以民成之鄭氏謂過無本意也成平也以鄉里之民共和之蓋以謂報讎天下之公義宥過聖人之㣲權若施之以法則傷孝子之心姑避之於他少舒報者之憤先王治世不專以法法之中有情不專以仁仁之中有義如此夫我聖祖作為教民榜文頒示閭里有曰民間除犯十惡及强盗殺人外其有犯姦盗詐偽人命本鄉本里内自能含忍省事不願告官係累受苦被告伏罪亦免致身遭刑禍止於老人處決斷者聽嗚呼聖祖之意其與周禮調人凡過而殺傷人者以民成之者不約而同也朝士凡報仇讎者書於士殺之無罪鄭𤣥曰凡報仇讐者書於士殺之無罪謂同國之相辟者將報之必先言之於士臣按所謂士者非謂朝士也凡書於鄉士縣士方士皆是也既書於士而上於朝士而掌之曲禮曰父之讐弗與共戴天兄弟之讐不反兵交遊之讐不同國吕大鈞曰殺人者死古今之達刑也殺之而義則無罪故令勿讎調人之職是也殺而不義則殺者當死宜告於有司殺之士師之職是也二者皆無事乎復讐也然復讐之文雜見於經傳考其所以必其人勢盛緩則不能執故遇則殺之不暇告有司也父者子之天不能復父讐仰無以視乎皇天矣報之之意誓不與讐俱生此所以弗共戴天也馬睎孟曰先王以恩論情以情合義其恩大者其情厚其情厚者其義隆是故父也兄弟也交游也其為讐則一而所以報之者不同或弗共戴天將死之而耻與之俱生也或不反兵將執殺之而為之備也或不同國將逺之而惡其比也嗚呼聖人不能使世之無讐亦不能使之釋讐而不報惟稱其情義而已矣若夫公羊論九世之讐則失於太過而所報非所敵矣漢之時孝子見讐而不敢復則失於太嚴而孝弟之情無所伸矣游桂曰聖人之治天下於暴亂之人以公法治之茍制之於公法而不足則由於私義而制之是以暴亂者無所逃罪而人安其生夫所謂讐皆王誅所不及公法有時而失之者聖人因禮而為之法曰某讐也是其子與弗共戴天者也某讐也是其兄弟所必報而不反兵者也某讐也是其交游之所不同國者也三讐皆以殺人而言人之子弟交游皆得報而殺之弗共戴天則世之暴者不敢害人之父母矣不反兵則世之暴者不敢害人之兄弟矣不同國則世之暴者不敢害人之交游矣自秦以來私讐皆不許報復下之私相殘死而無告者不知其幾何子報仇而以其獄上者有司常不知所以處之至唐而陳子昻韓愈栁宗元之議起陳之議報父仇者誅之而旌其閭栁固已闢之雖闢之而初無一定之論韓之言曰子報父母仇以其獄上尚書省使百官集議聞奏此說粗為得之然亦不能明先王之故復讐之事茍欲從古則其所以為天下之道舉必如三代而後可三代之時皇極立而公法行治不一出於法而私義得以參乎其間今欲依古許人復讐則為有司者道法交有所不備不許復讐則傷孝子順弟賢人義士之心顧元常曰治平盛世井井有綱紀安有私相報讐之事然事變萬端豈可以一律論如父母出於道忽被彊寇刦盗殺害其子豈容但已在旁必力鬭與之俱死不在旁必尋探殺之而後已此乃人子之至痛追思殆不欲生縱彼在窮荒絶域亦必欲尋殺之以雪父母之寃故不與共戴天也然讐亦非一端又㸔輕重如何如父母因事被人擠陷為人子者亦當平心自反不可專以報復為心或被人挾王命以矯殺雖人子之至恨然城狐社鼠不可動揺又當為之飲恨而不容以必報為心也凡此之類皆宜隨事斟酌儻不顧事之曲直勢之可否各挾復讎之義以相搆害則是刑戮之民大亂之道也春秋公羊傳曰父不受誅子復讎可也父受誅子復讎推刃之道也復讎不除害定公四年何休曰不受誅罪不當誅也若父受誅子復讎則復討其子一往一來曰推刃取讎身而已不得兼讎其子復將恐害己而殺之韓愈曰誅者上施於下之辭臣按公羊因論伍子胥報讎而言此蓋謂列國爭殺報復之事非王法也人君誅其臣民無報復之理若有司假法以致人於死則當赴愬於君以正其罪亦不當私自報之唐武后時下邽人徐元慶父爽為縣尉趙師韞所殺元慶手殺之自囚詣官武后欲赦死右拾遺陳子昻上疏曰先王立禮以進人明罰以齊政枕戈讐敵人子義也誅罪禁亂王政綱也然無義不可訓人亂綱不可明法元慶報父讐束身歸罪雖古烈士何以加然殺人者死畫一之制也法不可貳元慶宜伏辜傳曰父讐不同天勸人之教也教之不茍元慶宜赦臣聞刑所以止遏亂也仁所以利崇德也今報父之仇非亂也行子之道仁也仁而無利與同亂誅是曰能刑未可以訓然則邪由正生治必亂作故禮防不勝先王以制刑也今義元慶之節則廢刑也跡元慶所以能義動天下以其忘生而及於德也若釋罪以利其生是奪其德虧其義非所謂殺身成仁全死忘生之節也臣謂宜正國之典寘之以刑然後旌閭墓可也請編之令永為國典栁宗元曰禮之大本以防亂也刑之大本亦以防亂也旌與誅莫得而並焉誅其可旌茲謂濫旌其可誅茲謂僭果以是示於天下傳於後世趨義者不知所向違害者不知所立不可為典蓋聖人之制窮理以定賞罰本情以正褒貶統於一而已矣若元慶之父不陷於公罪而師韞之誅獨以其私怨奮其吏氣虐於無辜州牧不知罪刑官不知問上下蒙冒籲號不聞而元慶能以戴天為大耻以枕戈為得禮處心積慮以衝囚人之胸即死無憾是守禮而行義也執事者宜有慚色將謝之不暇又何誅焉其或元慶之父不免於罪師韞之誅不愆於法是非死於吏也死於法也法其可讐乎讐天子之法而戕奉法之吏是悖驁而淩上也執而誅之所以正邦典而又何旌焉憲宗時富平人梁恱父為秦果所殺恱殺仇詣縣請罪詔曰在禮父讐不同天而法殺人必死禮法王教大端也二說異焉下尚書省議韓愈曰子復父讐見於春秋禮記又見周官及諸子史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也蓋以為不許復讐則傷孝子之心而乖先王之訓許復讐人將倚法專殺無以禁止其端夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義於經而深没其文於律者其意將使法史一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讐讐之則死義宜也明殺人而不得其宜者子得復讐也此百姓之相讐者也公羊傳曰父不受誅子復讐可也不受誅者罪不當誅也誅者上施於下之辭非百姓之相殺者也又周官曰凡報仇讐者書於士殺之無罪言將復讐必先言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自專訪議羣下臣愚以為復讐之名雖同而其事各異或百姓相讐如周官所稱可議於今者或為官所誅如公羊所稱不可行於今者又周官所稱將復讐先告於士則無罪者若孤稚羸弱抱㣲志而伺敵人之便恐不能自言於官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凡有復父讐者事發具其事申尚書省尚書省集議奏聞酌其宜而處之則經律無失其指也𤣥宗開无二十九年嶲州都督張審素人有告其罪者詔監察御史楊汪按之告者復告審素與總管董元禮謀反元禮以兵圍汪脇使雪審素罪既而吏共斬元禮汪得出遂當審素實反斬之没其家時審素子瑝琇俱㓜坐流嶺表尋逃歸手殺汪於都城係表於斧言父寃狀為有司所得中書令張九齡等皆稱其孝烈宜貸死裴耀卿李林甫等陳不可帝亦謂然謂九齡曰孝子之情義不顧死然殺人而赦之此塗不可啓也乃下勅曰國家設法期於止殺各伸為子之志誰非狥孝之人展轉相讎何有限極咎繇作士法在必行曾參殺人亦不可恕宜付河南府杖殺士民皆憐之胡寅曰復讐因人之至情以立臣子之大義也讐而不復則人道滅絶天理淪亡故曰父之讐不與共戴天君之讐視父張審素未嘗反為人妄告楊汪受命往按遂以反聞審素坐斬此汪之罪也瑝與琇忿其父死之寃亡命報之其失在不訟於司寇其志亦可矜矣張九齡欲宥之豈非為此乎而裴李降勑之言何其戻哉設法之意固欲止殺然子志不伸豈所以為教且曰曾參殺人亦不可恕是有見於殺人者死而無見於復讐之義也楊汪非理殺張審素而瑝琇殺汪事適均等但以非司寇而擅殺當之仍矜其志則免死而流放之可耳若直殺之是楊氏以一人而當張氏三人之命不亦頗乎臣按復讐之義乃生民秉彛之道天地自然之理事雖若變然變而不失正斯為常矣以五行之理論之如金生水金為火所克水必報之水生木水為土所克木必報之木火土三行皆然人禀五行以有生有以生之必有以報之人之所生者必報其所由生是以相保愛相䕶衞不敢相戕殺非但畏公法亦畏私義非但念天理亦念人情此人所以與人相安相忘而得以遂其有生之樂也然人世有無窮之變王法有不到之處天理有未定之時或相殺焉殺之不以其罪泯之不存其迹急之不容其緩是故所殺之人其父也其子曰父生我者也而人殺之是無我也我何以生為必殺之以報我所生所殺之人其兄若弟也其兄若弟曰兄若弟我同生者也而人殺之是蔑我也必殺之以報我同生我不報之人設殺我而我兄若弟不為報吾謂之何所殺之人其交好游從也其交好游從者曰若與我交好游從彼非不知也而殺之是藐我也必殺之以報我所知我不報之人設殺我而我交好游從不為報吾謂之何天下之人凡有生者皆相為死則彼不逞之徒不仁之輩不敢起殺人之念盖慮其人之有子若孫有兄若弟若交好若游從將必上告天子下告方伯赴愬於有司聲寃於鼓石也然而王法雖公刑官雖明然無愬告者則其寃又不能以上達此聖人制其法於禮使凡為人子為人兄若弟有父母兄弟之讐則必赴愬於官不幸而無子孫兄弟則其所交游者雖非血屬亦得以為之伸理焉茍愬於公而公不為之報或其勢逺而力弱事急而情切一時不能達諸公奮其義而報之則亦公義之所許也禮所謂不共戴天不反兵不同國蓋謂為人子為人兄若弟為人交游恒各以是存諸心必報吾父必報吾兄若弟必報吾交游不然吾不與殺吾父者同戴此天殺吾兄弟者吾遇之必不反兵殺吾交游者吾與之必不同居此國甚言必殺之以報所仇不但已也解禮者乃專以為私報所仇狹矣禮蓋兼公私言也不能報以公必報以私斷斷乎其必然此先王立禮之意也三代之時皇極建而公道明非士師無擅殺之吏非天命無枉死之人非獨無不報之讐而亦無讐可報也然先王以好生為德恒恐一人之不得其生而或有以戕其生者故既本天地相生之理制刑罰之常以弼教又因五行相克之理明報復之義以垂訓使人人知殺人之親交者必死殺已之親交者必報而皆不敢相戕害以䘮其生相容忍以忘其死此古昔盛時所以人無寃聲天無盭氣而世無禍亂之作也自秦漢以來此義不明一切以法律持世惟知上之有法而不知下之有義所謂復讐之義世不復講至於有唐陳子昻韓愈栁宗元始因適有報復父仇者而各言所見要之皆是也而未盡焉謹按周官朝士凡報仇讐者書於士殺之無罪所謂報仇讐者非謂為人子若弟者親手剚刃於所仇之人凡具其不當死之故與所殺之由逹於官者皆是欲報其仇讐也既書其情犯而告於官而其所仇者或隱蔽或逋逃或負固而報仇之人能肆殺之以報其所親之仇則無罪焉蓋人君立法將以生人無罪者固不許人之枉殺有罪者亦不容人之擅殺所以明天討而安人生也茍殺人者人亦殺以報之曰吾報吾所親交之仇也不分其理之可否事之故誤互相報復無有已時又烏用國法為哉孟子曰為士師則可以殺人明不為士師則不可以殺人也朝廷當明為之法曰凡有父兄親屬為人所殺者除誤殺戲殺過失殺外若以故及非理致死者親屬隣保即為之䕶持其子若孫及凡應報復之人赴官告愬如無親屬其隣里交游皆許之府縣有礙赴藩臬藩臬有礙赴闕庭徑赴者不在越訴之限若官司狥私畏勢遷延嵗月不拘繫其人而為之伸理其報復之人奮氣報殺所仇者所在即以上聞特敇理官鞫審若其被殺者委有寃狀而所司不拘其人不具其獄即根究經由官司坐以賍罪除名而報仇者不與焉若所司方行拘逮而或有他故以致遷延即坐殺者以擅殺有罪者之罪而不致死焉若不告官不出是日而報殺者官司鞫審殺當其罪者不坐若出是日之外不告官而擅殺者即坐其親屬鄰保以知情故縱之罪而其報復之人所殺之讐果係可殺則讞以情有可矜坐其罪而免其死若官吏假王法以制人於死律有常條不許私自報復必須明白赴愬若屢愬不伸而殺之者則以上聞委任大臣鞫審如果被殺者有寃而所司不為伸理則免報仇者死而流放之如胡氏之所以處張瑝者而重坐經由官司之罪若被殺之人不能無罪但不至於死則又在隨事情而權其輕重焉如此則於經於律兩無違悖人知讐之必報而不敢相殺害以全其生知法之有禁而不敢輒專殺以犯於法則天下無難處之事國家無難斷之獄人世無不報之讐地下無枉死之鬼矣宋髙宗紹興末盗發王公哀母冢有司釋之公哀手殺盗事聞兄佐為吏部員外郎乞納官以贖公哀之罪詔令給舍議楊椿等謂發冢開棺者事當絞公哀始獲盗不敢殺而歸之官獄成而吏出之使揚揚出入閭巷與齊民齒則地下之辱沉痛鬱結終莫之伸為人子者尚當自比於人公哀殺掘冢法應死之人為無罪納官贖罪之請當不許故縱失刑有司之罪宜如律上是之詔公哀降一官依舊供職紹興府當職官皆抵罪臣按戕人之屍與其身雖有死生之異孝子愛親之心則不以死生而異也王公哀訴發冢之盗於官官不為之理而殺之蓋所殺者發冢應死之盗所報者不共戴天之仇朝廷坐有司之罪是也而降公哀一官豈所以為訓乎夫公哀不聞之官而擅殺之罪之可也今既聞之官而官出之則故縱失刑罪有所歸矣以上明復讐之義大學衍義補卷一百十
