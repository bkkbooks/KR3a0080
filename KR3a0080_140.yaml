body:
  text: 大學衍義補卷一百四十明丘濬撰治國平天下之要嚴武備賞功之格下晉武帝泰始七年豫州刺史石鑒坐擊吳軍虛張首級詔曰鑒備大臣吾所取信而乃下同為詐義得爾乎遣歸鄉里終身不得復用臣按虛張首級此古今之通弊也然後世人主能如晉武帝以義責其紀功之臣有犯者痛加罪斥終身除名雖有功能亦不復用則下人皆知所警矣武帝平吳王濬入建業受吳主降明日王渾乃濟江以濬不待己意甚愧忿將攻濬濬送吳主與渾繇是事得解渾表濬違詔不受節度渾子濟尚公主宗黨強盛有司請檻車徴濬帝弗許但以詔書責之濬上書曰臣前被詔書直造秣陵以十五日至三山渾在北岸遣書邀臣水軍風發無緣回船及以日中至秣陵暮乃被渾所下當受節度之符欲令明日還圍石頭又索諸軍人名定見臣以為皓已來降無緣空圍石頭又兵人定見亦非當今之急不可承用非敢忽棄明制也事君之道茍利社稷死生以之若顧嫌避咎則人臣不忠之利非明主社稷之福也濬至京師有司奏濬違詔大不敬請付廷尉不許渾濬爭功不已命廷尉劉頌校其事以渾為上功濬為中功帝以頌折法失理左遷京兆太守乃詔增渾邑八千户進爵為公以濬為輔國大將軍封縣侯時人咸以濬功重報輕為之憤悒博士秦秀等上表訟之帝乃遷鎮國大將軍臣按渾濬爭功朝廷當俱下廷尉一以詔書月日為斷其受節度之詔何日達渾所渾下節度之符何日達濬所若詔到渾軍已旬日而不遣人達於濬濬得符已旬日而不於渾軍受節制則渾濬二人各有當坐之罪若濬軍猶未抵石頭吳主猶未出降而濬得渾符而不少待則惟罪濬可也然亦當以功而折罪若夫渾符實未到及到之時而吳主已降則渾有遲滯之罪非濬不受詔旨設渾受詔而即發其符符未到而濬受吳主降矣則彼此皆無罪也校其月日以定其功罪則兩人者皆無辭矣惜乎無人以此而告諸武帝也武帝知罪劉頌之折法失理而於所請徴濬以檻車付廷尉顧乃置之不問何也無亦以渾子尚主宗黨強盛而庇之邪不然胡不著其功罪之狀而明白布諸朝廷使天下曉然知曲直是非之所在顧不韙歟北魏孝文時定州刺史陸睿等謀反有司奏新興公丕應從坐孝文以丕嘗受詔許以不死聽免死為民初丕及睿與僕射李沖領軍于烈俱受不死之詔睿既誅孝文賜沖烈詔曰睿之反逆既異餘犯雖欲矜恕如何可得然猶聽自死免其孥戮丕連坐應死特恕為民朕本期始終而彼自棄絶故此别示想無致怪謀反之外皎如白日司馬光曰夫爵祿廢置殺生豫奪人君所以馭臣之大柄也先王之制雖有親故賢能功貴勤賔茍有其罪不直赦也必議於槐棘之下可赦則赦可宥則宥可刑則刑可殺則殺輕重視情寬猛隨時故君得以施恩而不失其威臣得以免罪而不敢自悖及魏不然勳貴之臣往往豫許之以不死使彼驕而觸罪又從而殺之是以不信之令誘之使陷於死地刑政之失無此為大焉臣按命德討罪皆天也人君當奉天意不可違天理而擅豫奪諸人亦不可假天威而私用舍諸己有罪無罪惟其人後世往往許臣下以不死非天意也宜著之令曰所不死者律文所載雜犯者爾事關宗社得罪於天於祖宗者則否孝明帝時征西將軍張彛之子仲瑀上封事求銓削選格排抑武人不使豫清品於是喧謗盈路立榜大巷克期會集屠害其家羽林虎賁作亂殺張彛父子胡太后收掩羽林虎賁凶強者八人斬之其餘不復窮治大赦以安之識者知魏之將亂矣高歡至洛陽歎曰宿衛相帥焚大臣之第朝廷懼其亂而不問為政如此事可知矣臣按文武無二道彼此不可相無而建議者乃欲折抑武人固非大公至正之道然所言之非則受抑者明言之以斥其非以聽朝命可也而元魏宿衛之士乃至焚言者居而殺其人朝廷之上乃不痛加懲治何以為國哉用是建議之臣事有涉武人者一切為之避諱不敢明白建置蓋懼禍之及也蓋此叔季之世衰亂之時若夫明盛之代所宜明立典憲敢有蹈魏人覆轍者坐其典領之官及主使之人不徒如魏之女主有所隱忍以啓姦雄輕蔑之心則禍亂無從而興矣唐太宗面定勳臣長孫無忌等爵邑命陳叔達於殿下唱名示之且曰朕敘卿等勳賞或未當宜各自言於是諸將爭功紛紜不已淮安王神通曰臣舉兵關西首應義旗今房玄齡杜如晦等專弄刀筆功居臣上臣竊不服上曰義旗初起叔父雖首唱舉兵蓋亦自營脫禍及竇建德吞噬山東叔父全軍覆沒劉黑闥再合餘燼叔父望風奔北玄齡等運籌帷幄坐安社稷論功行賞固宜居叔父之先叔父國之至親朕誠無所愛但不可以私恩濫與功臣同賞耳諸將乃相謂曰陛下至公雖淮安王尚無所私吾儕何敢不安其分遂皆悅服臣按唐太宗之論房杜亦如漢髙之論蕭何然漢之功臣以何為首而唐功臣之首則長孫無忌也無忌之功不見於史豈非以除建成事為大功歟夫開國承家論功行封當先社稷而後己私顧以奪嫡之功而加諸建業之首豈大公之道乎李神通惟論房杜而不較無忌意者有所回護而不敢言歟太宗時房玄齡嘗言秦府舊人未遷官者皆嗟怨曰吾屬奉事左右幾何年矣今除官返出前宫齊府人之後上曰王者至公無私故能服天下之心朕與卿輩日夜衣食皆取諸民者也故設官分職以為民也當擇賢才而用之豈以新舊為先後哉必也新而賢舊而不肖安可捨新而取舊乎今不論其賢不肖而直言嗟怨豈為政之體乎臣按太宗此言非但以論功行賞大凡用人皆當然肅宗至德元載帝謂李泌曰今郭子儀李光弼以為宰相若克兩京平四海則無官以賞之奈何對曰古者官以任能唐初未得關東故封爵皆設虛名其食實封者給繒布而已繇是賞功者多以官夫以官賞功有二害非才則廢事權重則難制是以功臣居大官者皆不為子孫之逺圖嚮使祿山有百里之國則亦惜之以傳子孫不反矣為今之計莫若疏爵土以賞功臣則雖大國不過一二百里可比今之小郡豈難制哉上曰善臣按人君之頒爵祿於臣下固為國家用人之計亦不可不為其人之慮其人年方少壯而功已高位已崇一旦再有功庸吾將何官以報之不報之則其人怨望而無以振起乎人心報之則官位已極無容再加使其人賢歟固無慮也茍非其人或有以起其非分之望不然無可賞之功而或挾之以震主繇此其兆不可不知也玄宗開元四年宋璟為紫薇侍郎突厥默啜自則天世為中國患朝廷旰食傾天下之力不能克郝靈荃得其首自謂不世之功璟以天子好武功恐好事者競生心徼幸痛抑其賞逾年始受郎將臣按宋璟之不賞郝靈荃與蕭望之匡衡意同德宗幸梁州有百姓進瓜果者上欲與散試官陸贄上言曰爵位者天下之公器而國之大柄也惟功勳才德所宜處之非此二途不在賞典恆宜謹惜理不可輕起端雖微流弊必大所獻瓜果量以錢帛為賜饋獻酬官恐非令典又曰今或捧瓜一器挈果一盛亦授試官以酬所獻則彼突銛鋒而竭筋力者必相謂曰吾以忘軀命而獲官彼以進瓜果而獲官是乃國家以吾之軀命同於瓜果矣瓜果草木也視人如草木誰復為用哉臣按德宗欲以散試官賞獻瓜果之人固為非宜然猶肯以下問於侍從之臣故陸贄得以進諫其視夫任情直行不復詢訪於人者德宗猶為賢乎已夫散試之官無俸祿之資無攝管之柄無見敬之貴無免役之優惟假空名以籠浮俗猶不可以與人况有俸祿之給名位之榮不徒身享之而子孫又世襲之者不以軍功而可輕以豫人哉贄又言於德宗曰賞以懋庸名以彰行賞乖其庸則忠實之效廢名浮於行則瀆冒之弊興一足以撓國權一足以亂風俗授受之際豈容易哉頃以駐蹕奉天迫於患難竟攘凶逆實賴武人遂旌定難之勳特賜功臣之目名頗符實事亦會時所霑雖多誰曰非允至如宫闈近侍班列具臣雖奔走恪居各循厥職而驅除剪伐諒匪所任臣忝縉紳之列又當受賜之科竊自校量猶知不可而况於介胄之士乎人之多言靡所不至必謂陛下溺愛近習故徇其茍得之情泛訊羣司以分其私昵之謗怨不在大釁皆自微必將阻戰士激厲之心結勳臣憤恨之氣所悅者寡所慍者多所與者虛名所失者實事且名者衆之所評也是曰公器亦為爭端當功而奬尚恐未孚奬又非功固宜見誚儻有節效尤著理當褒崇實典甚多何必在此臣按人君行賞皆不可以不公而於軍功尤當公而不可一毫之私何者蓋戰伐之功以將士之性命易敵人之性命而得之也將士捐軀捨死以立功而嬖幸富豪之徒乃以貨賄私昵而得之則彼立功者曰我以性命而得之彼以貨賄私昵而得之上之視我性命輕矣况又真有功而不得者乎彼將曰我之性命反不如貨賄私昵也上之所為如此後將何以用人乎贄又言曰賞以存勸罰以示懲勸以懋有庸懲以威不恪故賞罰之於馭衆也猶繩墨之於曲直權衡之揣重輕輗軏之所以行車銜勒之所以服馬也馭衆而不用賞罰則善惡相混而能否莫殊用之而不當功過則姦妄寵榮而忠實擯抑夫如是聰明可衒律度無章則用與不用其弊一也自頃權移於下務相遵養茍度嵗時欲賞一有功翻慮無功者反側欲罰一有罪復慮有惡者憂虞罪以隱忍而不彰功以嫌疑而不賞使忘身效節者獲誚於等夷率衆先登者取怨於士卒僨軍蹙國者不懷於愧畏緩救失期者自以為智能褒貶既闕而不行稱毁復紛然相亂人雖欲善誰為言之况又公忠者直已而不求於人反罹困厄敗撓者行私而茍媚於衆例獲優崇此義士所以痛心勇夫所以體體也臣按賞罰國家之大柄所謂紀綱是也為國不可無賞罰至於出軍命將所以置人於死地及其成功而其賞罰尤不可不明焉蓋明今日之賞雖所以正前日之功罪而實所以為來日用人舉事之地也贄又曰謹按命秩之載於甲令者有職事官焉有散官焉有勳官焉有爵號焉雖以類而分其流有四然其掌務而授俸者唯繫於職事之一官以序才能以位賢德此所謂施實利而寓之虛名者也其勳散爵號三者所繫大抵止於服色資蔭而已以敘崇貴以甄功勞此所謂假虛名以佐其實利者也虛實交相養故人不瀆賞輕重互相制故國不廢權今之員外試官頗同勳散爵號雖則授無費祿受不占員然而突銛鋒排患難者以是賞之竭筋力展勤效者以是酬之其為用也可謂重矣臣按陸贄此疏可見有唐一代賞功之格所謂爵號者如今公侯伯之類所謂職事者如今都督都指揮千百户鎮撫之類所謂勳者如今柱國騎都尉之類所謂散官者如今光祿大夫驃騎將軍之類在唐則分為四類而今日則惟三類焉蓋在今之勳階散官隨職事而有非若唐别以授人也我朝異姓無生而封王者列爵惟公侯伯而無子男嵗錫以祿而無唐宋食邑之虛名蓋自漢以後以古爵封功臣所僅見也其職事之官皆以階級相承無不掌務而授俸者但就其中又次為等第焉有世官有流官世官則以軍功得官而子孫承襲者也世世不絶自指揮使以下至於鎮撫是也流官者因其材能擢以任事則終其本身而不得世襲在內則五軍都督錦衣衛指揮在外則都指揮及試官是也贄謂輕重互相制而國不失權我祖宗蓋得此意矣其報臣之功則賞延於世因人之能則用盡其才有唐人之實而無其虛焉嗚呼三代以來所未有也伏願聖子神孫念祖宗天下得之不易惜祖宗之官爵保祖宗之功臣追崇其所已然以報其功振作其所未然以激其志非軍功不授以武職非異才不試以流官使天下之人得之為難則我國家一旦有事人人欲得我之官爵以為子孫計則得之者盡職以保其家未得者竭力以求吾祿如此則維持之者既固奮起者又繼之則凡吾心之所向無不如意事之所舉無不成功宗社之安如泰山而四維立矣伏惟聖神留意毋輕以賞功之典以為施恩之具而輕以授之嬖幸技藝之流則天下國家不勝大幸唐自天寶末安祿山反是時府庫無蓄積朝廷專以官爵賞功諸將出身但給空名告身臨時注名其後又聽以信牒授人官爵有至異姓王者諸軍但以職事相統攝不復計官爵高下復以官爵收散率繇是官輕而貨重大將軍告身一通僅易一醉凡應募入軍者一切衣金紫至有朝士僮僕衣金紫稱大官而執賤役者臣按陸贄謂天寶季年嬖幸傾國爵以情授賞以寵加天下蕩然紀綱始紊安史乘釁遂亂中原遣戍嵗增䇿勳日廣財賦不足以供賜而職官之賞興焉職員不足以容功而散試之號行焉銀青雜沓於胥徒金紫普施於輿皂薰蕕無辨涇渭不分當今所病方在爵輕設法貴之猶恐不重若又自棄將何勸人繇是觀之則有唐一代賞功之格其得失可見矣大抵朝廷方創業之初慎惜官爵不輕以豫人故官爵重而人得以為榮及其末世不知祖宗立法之深意往往輕以與人是以人人可得其所得未必皆有奇功異能故人視之蔑如也自古用官爵以賞功其輕賤之弊未有如唐之甚者也史臣書之於册足以為萬世戒有國者尚其鑒之慎之毋蹈其故轍穆宗長慶二年初上在東宫聞天下厭苦憲宗用兵故即位務優假將卒以求安息詔神䇿六軍及南牙常參武官具繇歷功績牒送中書量加奬擢其諸道大將人次及有功者悉奏聞與除官應天下諸軍各委本道據守舊額不得輒有減省於是商賈胥吏爭賂藩鎮牒補列將而薦之即升朝籍奏章委積士大夫皆扼腕歎息臣按自古創業之君立為法制以遺子孫未有不盡善盡美者但事久而弊生弊積之久而弊中又有弊焉古今同一律也唐穆宗承唐積弊之後務優假將卒以求安息乃詔神䇿六軍及諸武官并諸道大將俾其內外各具事功無故而加以奬擢補官升朝蓋欲餌之使不生事也嗚呼爵賞所以待有功令無功而加以爵賞一旦有功何以酬之乎穆宗所為如此宜乎唐之不復振也五代唐莊宗許伶人欲以為刺史郭崇韜諫曰陛下所與共取天下者皆英豪忠勇之士今大功始就封賞未及一人而先以伶人為刺史恐失天下心踰年伶人屢以為言莊宗謂崇韜曰吾已許之矣使吾慚見之公言雖正然當為我屈意行之遂以為刺史時親軍有從百戰未得刺史者莫不憤歎臣按陸贄有言爵位惟功勳功德所宜處之茍非四者雖公卿之世華夏之胄猶不可輕褻况優伶乎莊宗之不以令終國祚不永有以夫宋貞宗時龎籍言綱紀者其要在賞罰恩賞貴乎審當法令貴乎齊一伏見近年恩及僥幸而典憲稍縱夫賞所以勸功也無功之人坐獲殊寵後有臨敵效命立勳行陳者將何賞以塞其望乎顧陛下愛惜爵祿無及僥幸以待立功之臣申嚴憲法無使縱弛以威不恪之臣此最切務也臣按龎籍欲真宗愛惜爵祿無及僥幸以待立功之臣申嚴憲法無使縱弛以威不恪之臣以為此最切務臣於今日亦云然歐陽修言於仁宗曰用人之術不過賞罰然賞及無功則恩不足勸罰失有罪則威無所懼雖有人不可用矣太祖時王令斌破蜀而歸功不細矣犯法一貶十年不問是時方討江南故黜全斌與諸將立法太祖神武英斷所以平定天下者其賞罰之法皆如此也昨關西用兵四年矣大將以無功罷者依舊居官軍中見無功者不妨得好官則諸將誰肯立功矣裨將畏懦逗遛者皆當斬罪或罰貶而尋遷或不貶而依舊軍中皆有罪者不誅則諸將誰肯用命所謂賞不足勸威無所懼賞罰如此而欲用人其可得乎臣按修所言軍中見有罪者不誅則諸將誰肯用命是知國家於將領有功者固所當賞而有罪者亦不可以不罰賞必足勸罰必足懼然後可以用人高宗時鄧肅言金人不足畏但其信賞必罰不假文字故人各用命朝廷則不然有同時立功而又相等者或已轉數官或尚為布衣輕重上下只在吏手賞既不明誰肯自勸欲專立功賞一司使凡立功者得以自陳若功狀已明而賞不行或功同而賞有輕重先後並置之法臣按自古最難得明實者軍功也原其所以不明之故繇於主帥之不得其人一委之吏胥之手出入輕重任其所為此將士所以不服而憤怨也鄧肅乞立功賞一司專主其事然功賞之司但能考其功狀耳未必得其虛的也臣愚以為凡出師必擇朝臣公明有風力者一人付以屬吏俾其專掌功賞隨軍紀功遇有功次即於軍中核實詳定焉高宗時給事中金安節駁皇城司濫賞曰凡外之將帥效命邊庭亦必有功而後加爵豈可以僥幸一時微勞而反過於親臨行陳出入萬死一生者乎今劉允升幹辦皇城任滿比之立軍功者勞逸異矣遽以一官轉承宣使其以皇城任滿遂將轉節度使乎竊恐行之則將士解體望愛惜名器以待勳勞從之臣按朝廷立武爵以待有功之臣必親臨行陳者然後為軍功彼其出入禁旅左右承奉者雖有年勞當别甄敘我朝立錦衣衛以掌宿衛官職之設雖與列衛同而其官則用其能而不用其世蓋所以待武臣之超出羣類者也然亦惟武臣之胄而他塗不得與焉其選可謂重而嚴矣今世乃有不出自武胄而以嬖幸技藝進者失祖宗之初意矣夫技藝之流舊制當屬工部今因其能而用以雜流俾專司其業豈不名稱其實哉顧乃以賞功之官以為恩賜之具彼得之而人譏之固不足以為榮彼何足惜遂使國家失賞功之常典而凡親臨行陳出萬死得一生者皆因之以解體其失豈小小也哉授之以是官固非矣而又使之世襲可乎彼技藝之流有異能者朝廷以特恩授之可也而其子豈亦有異能而使之世其官乎有異能且不可况實無異能在其身且不可况又延及其子孫乎髙宗論諸軍使臣猥多嵗增俸廪因曰大將奏功率以所愛偏禆多轉官資而出戰士卒往往不及不惟無以勸有功兼亦蠧國朕嘗謂行賞當先自下行罰當先自上趙鼎曰聖慮髙逺豈諸將所及臣按宋髙宗謂大將奏功率以所愛偏禆多轉官資而出戰士卒往往不及此弊匪但宋人有之唐人之詩亦云死是軍人死功是將軍功其弊之來也久矣居人上者而能思慮及此遇有紀録功次者必加詳審毋俾將領專有其功而致士卒之嗟怨異時復興師旅凡在戎行者皆奮其勇而不患上之人不已知矣以上賞功之格臣按祖宗立為武職專以賞有功之臣以延及其子孫世其職而不遷不計滿限不用磨勘父死而子繼兄亡而弟及官職簡而階級明非若宋人遙授遷轉無定職且無定員也今制十軍立一小旗五十軍一總旗兩總旗一百户十百户一千户千户有正有副千户以上有指揮指揮有司有同知有僉事此皆世襲之官也至於都指揮都督各三等亦如指揮之制此則擢其有才能者為之用其才而不世其官者也祖宗之制可謂盡善盡美後世雖有作者不可及已奈何積日久而人日多前之積者未銷後之來者日至遂至軍少而官多所任者一人之事而所食者大官之祿欲國計不屈難矣伏惟我太祖高皇帝於洪武二十九年大賚天下致仕武臣論之曰同立艱難致有今日顧朕子孫保無窮之天下則爾子孫亦享無窮之爵祿一何仁之至也太宗文皇帝於永樂二年因法司言征討官有繫獄者請論功定罪諭曰朝廷大公至正之道有功則賞有過則刑刑賞者治天下之大法不以功掩過不以私廢公一何義之盡也仁之至所以報其功使其世世享爵祿之奉以衍其家慶義之盡所以勵其節使其世世奉法度之公以保其世祿大哉皇言萬世所當服膺者也然祖宗不惟形之言者仁義兼至如此而又著之於法律以維持警飭之使吾仁義之澤百世如一日焉伏讀律文有曰凡內外大小軍民衙門官吏犯公罪杖罪以上明立文案每年一考紀録罪名九年一次通考所犯次數重輕以慿黜陟又曰若軍官有犯私罪該笞者附過收贖杖罪解見任降等敘用該罷職不敘者降充總旗該徒流者照依地里逺近發各衛充軍嗚呼太祖定律之意即太宗垂戒之言也誠能本太祖立律之文用太宗垂戒之意則武臣益知所懼無有不盡忠守法者矣然人之材質不能相同其間固不能無不忠不謹者焉因其人之所犯而用國法以遞降之消之以漸日減月削去者去而來者來今之來者即所以補乎昔之去者焉則人與官互相稱矣尚何軍少官多之患哉臣於此又有見焉孟子曰君子之澤五世而斬注云父子相繼為一世四世而緦服之窮也六世則親屬竭矣夫以大賢君子功業見乎一世德澤被乎天下其沒世之後四世而後子孫尚廢其祀况彼一介武夫乘時崛起因人而成事隨衆以建功未必真有出竒制勝之智搴旗斬將之勇定難拓土之功錫之以官爵食之以俸祿終其身已為多矣况及其子若孫乎况無子及孫者又及其旁支别𣲖乎且開國大臣封國公者六封侯者十有五其餘封伯及繼封者又不下數十人今存者無幾大功多廢小功多存何大功之澤不宄而小功之澤反延哉今文武官犯入私罪律條久廢驟而用之可駭物聽臣請敕兵部查內府貼黃將洪武永樂宣德年間以來官職從軍升授緣繇及行內外衛所并各官原籍與舊任去處通行造册開具在任見在親屬若干原籍户口若干舊任遺下家屬若干要見其人是始初從軍者的𣲖子孫與否明白詳實備具以聞彼此對照無差然後將前項軍官分為三等一曰奉天啓運二曰奉天征討其他立功邊庭及隨大將平冦者居其次三焉啓運征討之功已經五世之後若不係從軍人的𣲖者革去職任其子孫附籍所在世世優免雜差五世之後仍係從軍的𣲖子孫者遇有公私過犯依律遞降不在赦原之數無犯者照舊其不係啓運征討及各處立功者三世之後子孫不係的𣲖者革職的𣲖子孫三世之後有犯者遞降三世之後又有加功者不革否則革之其五世三世之後例該革任者若其間有一世以王事及再加功者又從此人起計其世數以上皆優免其子孫如此則禮與律皆協人知所勸勉而官不至於冗濫矣臣愚見如此非敢犯衆怒而輒興異議以取張仲瑀之禍念此乃國家大事不於無事之時而預有以為之調停一旦馴致於無可奈何之地雖有智者不能善其後矣伏望明主閔其愚而察其心毋使若髙觀者得以起異議而生邪心大學衍義補卷一百四十
