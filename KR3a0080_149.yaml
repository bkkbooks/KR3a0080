body:
  text: 大學衍義補卷一百四十九明丘濬撰治國平天下之要馭外蕃修攘制御之䇿下宋太宗時張齊賢奏曰聖人舉事動在萬全百戰百勝不若不戰而勝若重之慎之勁敵不足吞矣自古疆場之難非盡由外國亦多邊吏擾而致之若緣邊諸寨撫御得人但使峻壘深溝蓄力養銳以逸自處寧我致人李牧所以稱良将於趙用此術也擇卒不如擇将任力不及任人如是則邊鄙寧矣夫邉鄙寜則輦運減輦運減則河北人民獲休息矣獲休息則田業時而蠶織廣務農積穀以實邊用且敵人之心亦擇利避害安肯投死地而為冦哉又曰家六合者以天下為心豈止争尺寸之事角强弱之勢而已是故聖人先本而後末安内以養外是知二帝三王未有不先根本者也堯舜之道無他廣推恩於天下之民爾推恩者何在乎安而利之民既安利則四海歛祍而至矣臣按齊賢之言乃反本之論自治之䇿田錫言於太宗曰應動而静則養冦以生姦應静而動則失時以敗事動静中節乃得其宜今北鄙繹騷盖亦以居邉任者規羊馬細利為捷捕斬小勝為功賈結怨仇召戎起釁職此之由伏願申飭将帥謹固封守勿尚小功許通互市索獲蕃口撫而還之如此不出五載河北之民得務三農之業亭障之地可積十年之儲臣按田錫斯言得安静守邉之道錫又言于太宗曰将帥行恩信䘏士卒必豐財貨方得士心昔趙奢為将所得王之賞賜盡與軍吏又李牧為将軍市之租皆用享士卒魏尚守雲中其軍市租盡以給士卒出私養錢享賔客軍吏是以匈奴不近雲中之塞今國家所命将帥雖古今異宜凡有給賜今則誰敢效古散家財賞士卒哉若以年年供億輓運老師費財曷若厚給将帥使之賞用也臣按錫之此言得任用邉将之道錫又言曰禦戎在乎辨邉上奏報之虚實察左右䝉蔽之有無奏失利則未必盡言報大捷則不足深信陛下未當信而先信陛下本欲知而未知如此何以料安危䇿成敗安危成敗之理乞詳而察之臣按錫謂禦戎在辨邊報虚實察左右䝉蔽有無盖以有為無以無為有多為少少為多邉上奏報卒用此計以欺罔朝廷將以希功而免罪也然非左右之臣僚為之䝉蔽則彼亦不敢肆其欺焉此人主於聴任之際尤不可不擇其人也任非其人則咫尺之間為所蔽矣况萬里之邊城乎王禹偁言於太宗曰漢之十三帝言乎聖明者文景也言乎衰亂者哀平也然而文景之時單于最為彊盛大有侵掠候騎至雍火照甘泉宫哀平之時呼韓邪單于毎嵗來朝委職稱臣邊烽罷警此豈繋乎厯數而不由于道徳邪臣以為不然矣且漢文當單于彊盛之時而外能任人内能脩徳使不為深患者由乎徳也哀平當單于衰弱之際外無良将内無賢臣而使之來朝者繋乎時也臣按禹偁謂漢文帝内能脩徳外能任人故單于不為深患嗚呼人君能盡二言中國之治不出此而已矣范中淹上仁宗和守攻備四䇿其備䇿曰請朝廷力行七策以防大患一宻為經畧二再議兵屯三専於選将四急於教戰五訓練義勇六脩京師外城七定討伐之謀其一請選有材識近臣暫往經畫使親視邉壘精究利害凡邊計未備者皆條上而更置之不出半年歸奏闕下更令中書樞宻院子細詢訪熟議經久之計臣按范仲淹所上四策雖為當時契丹而設然萬世之下備禦之方實不外此謹凖當時之事以為今日之用其備䇿凡七其一請選材識近臣親視邊壘精究利害此䇿今日實可用之我朝罷前代樞宻院而以兵事専屬兵部臣請兵部於尚書外添設尚書一員輪掌部事毎嵗遣一員行邉錫以璽書俾起自遼東厯宣府大同延綏寧夏甘肅抵平凉等邊地凡山川之險易營壘之逺近戍卒之多寡糗糧之有無敵人之向背将領之壮怯已然者當何如而修飭未有者當何如而増補某處當設為營堡某堡當加軍守備某墩臺可廢某蹊隧可塞某處可屯種某處宜牧蓄凡邉計未備者皆與巡撫都御史守備總兵㕘将等官計議經畫條而上之如此則可銷患於未萌如此則可以待敵之來攻如此則可以遏其衝突如此則可以遏其侵擾歸奏闕下更令内閣大臣㑹合六卿以下詳訪熟議施行之嵗歲以為常其四川湖北兩廣雲貴則三年一巡行如此朝廷不忘邊備邊方無復廢事居廟堂者無遙度之失守封疆者無不通之情其二曰再議兵屯者自來北邉分為三路其所轄軍馬不甚整齊及有一州兵馬却屬兩路之處又未曉本路将於何處控扼合行重兵若干又甚處只宜固守合屯兵若干及三路互相應援次第須差近臣徃彼宻為經畧方可預定法制臨時不至差失或事宜未動亦當相度兵馬合那減於何處駐泊使就芻糧以省邊費庶免先自匱乏臣按此䇿亦切於今日之用臣請毎嵗所遣行邉大臣即以其事付之其三曰専於選将者委樞密院於閤門祗候使臣以上選人三班院於使臣中選人殿前馬步軍司於軍旅中選人或有智畧或有材武堪邊上試用者逐旋進呈據選到人數以籍記之候本路有闕則從而差授如此則二三年間得人多矣臣按范中淹欲凡掌兵諸司選将今不必盡如其言毎嵗行邉大臣所至邊境即令總兵以下各舉所知不問有官無官皆明著其名目某人有智略某人有膂力某人有膽氣某人善騎射因而試之用為選鋒試中即於本色糧賞外加以廪食量為任使其四曰急於教戰者於四路抽取曽經押戰隊使臣十數人更授以新議八陳之法遣徃河北閱習諸軍使各知竒正循環之勢應敵無窮臣按今朝廷訓兵已有成法大約教之使知金鼓作止旌旗偃仰角礟𦂳緩以為進退疾徐分合之節而已然按行故事視為泛常請於時常教閱之外専以教射為事乞勑緣邊将領通行各處抽選能射軍士分軍教習名為教師毎一人教十人或二十人其都御史往來提督試驗行邉大臣至日計所教有成效者多少以為教師陞賞及凡軍中有差役爭訟事有疑似難辨取與分輕重及有過失者皆以射决之射中者予之免之輕之如此則人皆習弓矢無不善射者矣其五曰訓練義勇今河北所籍義勇雖約唐之府兵法制三時務農一時教戰然未見府衛之官而法制不行號令不一湏别選知州知縣可治兵者并増置将校使人人各知軍中之法應制可用斯則彊兵制勝之本矣臣按邉城有州縣之處今已簽民與軍相兼守禦可用仲淹此議俾其隨軍操練仍湏擇守令責以訓練之任旌其勤而懲其惰其六曰脩京城外城者後唐無備契丹一舉直䧟洛陽石晉無備契丹再舉直䧟京師故契丹之心至今驕慢必謂邉城堅而難攻京師坦而無備一朝稱兵必謀深入若京城堅固則戒河朔重兵勿與之戰彼欲戰不能戰謀深入則前有堅城後有重兵必将沮而自退退而不整則邀之可也是則脩京城者非徒禦冦誠以伐深入之謀也漢恵帝起六百里内男女城長安二年而畢唐明皇時城長安九十日畢考法於古擇利於今京城之修盖無疑矣然湏二年成之則民不勞苦人不驚駭臣按宋都汴梁去幽燕之地千餘里而范仲淹議守邊策猶以修京城為言當時若余靖輩皆力攻之以為非其後靖康之禍果有如仲淹所議者矧今國家都燕其去邊地尤近尤不可不留意焉者已已之變也先直犯京師雖我金城湯池如天難升然而重城之外百萬人家亦嘗為之驚疑幸此無事之時請如漢恵帝唐明皇故事築為外城包圍城外民居萬一有儆人心有所倚賴而不至於驚潰矣仲淹又言曰元昊作偽詔誘邉人實闗中其謀不細盖漢多叛人䧟於窮漠衣食嗜好皆不如意必以苻堅劉淵元魏故事日夜游說元昊使其侵取漢地而以漢人守之則富貴功名衣食嗜好得如其意非獨元昊志在侵漢實漢之叛人日夜為賊之謀也臣按外國不用中國人其為害不深而其所以深為中國害者用中國之人也臣請立為條格凡近邉之人有一才一藝者皆許自陳試之稍如所言不必深求全備茍有可用皆隨其才而授以官如此則此輩心有所繋跡有所拘而不為彼用矣吴育言於仁宗曰聖人統馭之䇿羈縻弗絶而已或有一背叛來則備禦去則勿追今西夏止是鈔掠邉隅當置而不問若已見叛状必須先行文告以詰其由若是用中國叛臣即加征討太凡兵家之勢征討者貴在神速守禦者利在持重况夷狄之性惟事剽急因而偽遁多誤王師武夫氣銳輕進貪功或䧟誘詐之機今但明烽堠堅壁清野以挫剽急之鋒而徐觀其勢乃廟堂之逺算也臣按大朝用兵與小國不同呉育以徐觀其勢之一言為廟堂之逺算諒哉田况言於仁宗曰古之良将以燕犒士卒為先所以然者鋒刃之下死生俄頃固宜推盡恩義以慰其心李牧備匈奴市租皆入幕府為士卒費趙充國禦羌戎亦日饗軍士太祖用姚全斌董遵誨抗西戎何繼筠李漢超當北冦人各得環慶齊棣一州征租農賦市牛酒犒軍中不問其出入故得戎寇屏息不敢窺邉臣按田况言古之良将以燕犒士卒為先而引李牧趙充國姚全斌董遵誨事為議且曰鋒刃之下死生俄頃宜推恩義以慰其心此語尤為警切臣惟今日邊城糧賞之外為将者别無儲蓄况邊塞之地多無征租臣請自今以後别扵常儲之外稍以嬴餘付邉将為燕犒之費遇有警報勑遣近臣齎宫錢赴邊市牛酒燕犒将卒是以感人心作士氣之一事也蘓軾代滕甫草奏上神宗曰近者因病求醫偶悟一事推之有政似可施行惟陛下財幸臣近患積聚醫云據病當下一日而愈若不下半月而愈然中年以後一下一衰積衰之患終身之憂也臣私計之終不以一日之快而易終身之憂遂用其言以善藥磨治半月而愈初不傷氣體力益全因悟近日臣僚獻言欲用兵西方皆是醫人欲下一日而愈者也其勢亦未必不成然終非臣子深憂君父欲出萬全之道也以陛下聖明将賢士勇何往不克而臣尚以為非萬全者俗言彭祖觀井自係大木之上以車輪覆井而後敢觀此言鄙而切於事陛下愛民憂國非特如彭祖之愛身而兵者凶器動有危亡其䧟人可畏有甚於井故臣願陛下用兵如彭祖之觀井然後為得也臣按蘇軾代滕甫草此奏而引醫及彭祖觀井為譬盖合古人所謂帝王之師以萬全為勝之㫖矣末章乂曰滅國大事也不可以速譬如小兒之毁齒以漸搖撼之則齒脫而兒不知若不以漸一㧞而得齒則毁齒可以殺兒此譬尤善凡除宿弊興善政莫不皆然非但用兵滅國一事也靖康元年金人犯京師其帥斡哩雅布至京城西北屯牟駝岡天駟監即孳生馬監之所芻豆山積異時郭藥師來朝得㫖打毬於其間金人兵至徑趣其所藥師導之也臣按自古國都於其近郊必有牧馬之所其間必積芻豆以為飼秣之具方無事時資以牧育固為近便然世道不能常泰而意外之變不可不先為之慮金人犯汴京姦人導之屯兵於其近郊之牟駝岡藉其芻豆飼其馬以為久駐之計此往事之明鑒也矧今國都去邊伊邇已己之變倉卒用言者計焚棄芻豆何啻千萬當時見者莫不悔惜然事已即休無復有以為言者竊惟都城東北鄭村壩二十四馬房其倉場所儲積者如京如坻請於無事之時即其地築為一城以圍䕶其積聚及移附近倉場咸聚其中就将騰驤等四衛官署軍營設於其中特勅武臣一員於此守鎮仍司羣牧四衛官軍不妨照舊輪班内直下直囘城屯住是亦先事而備之一策也伏惟聖明决其可否大學衍義補卷一百四十九
