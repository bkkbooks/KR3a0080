body:
  text: 大學衍義補卷一百二十八明丘濬撰治國平天下之要嚴武備將帥之任上之上易師之辭曰師貞丈人吉无咎程頤曰師之道以正為本興師動衆以毒天下而不以正民弗從也强驅之耳故師以貞為主其動雖正也帥之者必丈人則吉而无咎也丈人者尊嚴之稱帥師總衆非衆所尊信畏服則安能得人心之從故司馬穰苴擢自微賤授之以衆乃以衆心未服請莊賈為將也所謂丈人不必素居崇貴但其才謀徳業衆所畏服則是也如穰苴既誅莊賈則衆心畏服乃丈人矣又如淮隂侯起於微賤遂為大將蓋其謀為有以使人尊畏也朱熹曰師卦惟九二一陽居下卦之中為將之象上下五隂順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象故其卦之名曰師丈人長老之稱用師之道利於得正而任老成之人乃得吉而无咎吕祖謙曰丈人者老成持重諳練之人如趙充國之比是也二以一陽為卦之主猶將帥也二雖剛中必待五之應猶將帥雖賢必待君為之應然後能成功也茍五不應師變為坎矣將帥臨敵而上無君之應豈非天下之至險乎臣按先儒謂用師之道利於得正則不正不利可知矣丈人則吉而不任老成之人則凶可知矣然師既以正動而又任夫老成之人然非在上之人為之主宰則亦不能以成功也師九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也程頤曰師卦惟九二一陽為衆隂所歸五居君位是其正應二乃師之主專制其事者也居下而專制其事惟在師則可自古命將閫外之事得專制之在師專制而得中道故吉而无咎蓋恃專則失為下之道不專則无成功之理故得中為吉凡師之道威和竝至則吉也既處之盡其善則能成功而安天下故王錫寵命至於三也六五在上既專倚任復厚其寵數蓋禮不稱則威不重而下不信也人臣之道於事无所敢專惟閫外之事則專制之雖制之在已然因師之力而能致者皆君所與而職當為也在師中吉者以其承天之寵任也天謂王也人臣非君寵任之則安得專征之權而有成功之吉象以二專主其事故發此義王三錫以恩命褒其成功所以懷萬邦也郭忠孝曰威克厥愛允濟愛克厥威允罔功九二剛勝之將能用中焉是以有功而宜膺寵錫者也丘富國曰上承天子之寵任而以兵權屬之錫命至三使之得專閫外之事王者用兵非得已嗜殺豈其本心故三錫之命惟在於懷綏萬邦而已臣按人臣無專制之義故受閫外之寄者有剛中之徳而又適時中之宜然後可也然必有王者之錫命至於再至於三焉承天寵之優布懷綏之徳如後世所謂便宜行事者然後專之也不然非吉善之道也故為臣受命必協乎中道為君命將必錫以寵命則臣無專擅之過而君無中制之失而師無有不利功無有不成者矣六三師或輿尸凶象曰師或輿尸大无功也程頤曰師旅之事任當專一二既以剛中之才為上信倚必專其事乃有成功若或更使衆人主之凶之道也輿尸衆主也軍旅之事任不專一覆敗必矣倚付二三安能成功豈惟無功所以致凶也楊時曰師之或以衆尸之也衆尸之稟命不一而無功矣凶之道也六三上乘衆隂輿尸也故凶唐九節度之師不立統帥雖李郭之善兵猶不免敗衂則輿尸之凶可知楊萬里曰河曲之師趙盾為將而令出趙穿邲之師荀林父為將而令出先縠後世復有中人監軍者師焉往而不敗臣按朱氏本義解輿尸為師徒撓敗輿尸而歸足以為犯非其分者之戒今從程氏傳以尸輿為衆主者以為人君倚任將帥之法六五長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也程頤曰任將授師之道當以長子帥師二在下而為師之主長子也若以弟子衆主之則所為雖正亦凶也弟子凡非長者也自古任將不專而致覆敗者如荀林父邲之戰唐郭子儀相州之敗是也長子以中正之徳合於上而受任以行若復使其餘者衆尸其事是任使之不當也其凶宜矣朱熹曰長子九二也弟子三四也人君專於委任若使君子任事而又使小人參之則是使之輿尸而歸故雖貞而亦不免於凶也臣按人君使其臣以統師馭衆固不可以不審尤不可以不專不審則使非其人或至於喪師而辱國得其人而任之不專則事無統攝或彼或此而不歸於一是亦覆敗之所由也使一人焉以為三軍之司命人命之生死疆場之得喪國家之安危皆繫於斯茍使之而不當使之當矣而又使人參之皆足以致凶而取禍人君之使人固不可以不謹而况於任將授師乎詩大明之八章曰牧野洋洋廣大貌檀車檀木為車煌煌鮮明貌駟騵駵馬白腹彭彭强盛貌維師尚父時維鷹揚涼作亮佐助也彼武王肆縱兵也伐大商會朝㑹戰之旦清明朱熹曰師尚父太公望為太師而號尚父也鷹揚如鷹之飛揚而將擊言其猛也此章言武王師衆之盛將帥之賢伐商以除穢濁不崇朝而天下清明臣按六經言將帥之勇者始見於此夫出征之事有虞氏固已命禹矣但其誓師之辭特數所征者之惡及其不可不正之意未有指言其將帥之勇者也有之始見此詩是以古今言將帥者必以太公為首稱然其所以勇而猛者鷹揚一言之外無他美焉蓋王者之師天下無敵譬如鷙禽之擊羣小雛然所至披靡夫豈有當之者哉此其所以為王者之師有征而無戰也江漢詩曰江漢浮浮水盛貌武夫滔滔順流貌匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪陳也其二章曰江漢湯湯武夫洸洸武貌經營四方告成于王四方既平王國庶幸也定時靡有爭王心載寧朱熹曰淮夷夷之在淮上者也宣王命召穆公平淮南之夷詩人美之輔廣曰其志專其氣銳有不戰戰必勝矣臣按先儒謂讀此詩見宣王能以天下之心為心而召公受命以出征又能以宣王之心為心也宣王之心何心也心乎寧天下也何則天下之所以不寧者以爭心之未息也爭心未息則見利則奪見便則乘此王國所以靡定也王國靡定則强之攫而弱之食王之心曷由而寧乎必欲王心寧必須王國之定必欲王國之定必得滔滔洸洸之武夫而經營四方以告成于王則四方平而王國庶幾乎其定矣宣王之用召穆公穆公能體其欲寧天下之心而為之經營此王之心所以載寧也歟常武之詩曰赫赫明明王命卿士即皇父之官南仲此時大將大祖始祖大師皇父之兼官皇父整我為宣王之自我六師以修我戎兵器既敬既戒惠此南國其二章曰王謂尹氏吉甫命程伯休父周大夫左右陳行戒我師旅率彼淮浦省此徐土不留不處三事三農之事就緒朱熹曰宣王自將以伐淮北之夷而命卿士之謂南仲為大祖兼太師而字皇父者整治其從行之六軍修其戎事以除淮夷之亂而惠此南方之國詩人作此以美之必言南仲大祖者稱其世功以美大之也既命皇父而又命程伯休父者蓋王親命太師以三公治其軍事而使内史命司馬以六卿副之耳楊時曰聖主得賢臣而𢎞功業古人皆然也昔宣王中興有吉甫召虎仲山甫之徒以之伐玁狁平淮夷卒致再造之業諸臣之力居多易未濟六五之光亦九四震用伐鬼方之力也臣按古者六軍之制軍將皆命卿無事則將歸卿列有事則諸卿皆將入則典司政本出則經營四方宣王之時命召虎以平淮夷而王心載寧又命皇父及程伯休父以省徐土徐方為之震驚然三臣者皆世臣虎則康公之子皇父則南仲之世程伯休父則重黎氏之後也世臣之於國非獨有世功且有世業詩書禮樂夙講於家庭功勲閥閲允孚於内外耳目之見聞有素技藝之傳習有常一旦用之必安詳閒雅老成持重不失於倉皇失律輕易誤國矣春秋閔公二年鄭棄其師胡安國曰按鄭詩清人刺文公也髙克好利而不顧其君文公惡之而不能逺使克將兵禦狄於境陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩觀此則鄭棄其師可知矣人君擅一國之名寵殺生予奪惟我所制爾使克不臣之罪已著按而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也烏有假以兵權委諸境上坐視其失伍離散而莫之恤乎二三執政股肱心膂休戚之所同也不能進謀於君協志同力黜逐小人而國事至此是謂危而不持顛而不扶則將焉用彼相矣晉出帝時景延廣專權諸藩擅命及桑維翰為相出延廣於外一制書所敕者十有五鎮無敢不從者髙閌曰人君之使臣也知其賢而使之則功必成不知其不賢而使之則事必敗夫不知其不賢而過使之至於敗事君子猶曰君不知之當自罪耳况已知其不賢而强使之不獨陷其身又棄其民乎呉澂曰子曰以不教民戰是謂棄之古人視民如赤子故平日教之習戰一旦不得已而用之於軍旅欲其完師而歸一無所損也今鄭無戰鬬之事乃使其臣將兵於外久而弗得歸致其衆潰散非棄其民而何哉臣按髙氏之言用將之道呉氏之言用兵之道胡氏所謂三䇿則馭將之道也人主惟不知其臣之不賢而以為賢故使之知其不賢而使之者蓋鮮矣知其不賢而使之者必其久掌兵權不可猝去故不得已而使之往往置嫌疑於心而假以兵權一旦事機彰露而馴致於不可駕馭亦有之矣非但棄其師而已也春秋書鄭棄其師不但責其君兼責其臣後世有國家與夫輔人之國家者其尚以春秋為法而謹其微左傳僖公二十有七年楚子成公將圍宋使子文治兵於睽楚邑終朝而畢不戮一人子玉復治兵於蒍楚邑終日而畢鞭七人貫三人耳國老謂卿大夫之致仕者皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何言所得不補所失子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣茍入而賀何後之有蘇軾曰蒍賈論子玉過三百乘必敗而郤克自謂不如先大夫請八百乘將以用寡為勝抑以將多為賢也如淮隂侯言多多益辦是用衆亦不易古人以兵多敗者不可勝數如王尋苻堅哥舒翰者多矣子玉剛而無禮少與之兵或能戒懼而不敗耶臣按用兵之道不可以無剛剛而有禮則其所以為剛者得其中矣徒有其剛而無禮則是强愎自用而已豈所謂剛者乎子玉之為人剛而無禮不可以治民以之一乘且不可况三百乘之多哉是知禮也者治三軍之本也子玉為人以一少年之蒍賈知之而子文不之知楚子不之知是則知人誠難也而知將為尤難然則終無可知之理乎曰有觀其持身以禮治家以禮而治兵也又能以禮以一禮為三軍之約束譬則束茅葦焉數以億萬計而束之以一繩整然齊矣楚子及諸侯圍宋五國圍宋宋公孫固如晉告急狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣於是乎蒐治兵于被廬晉地作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣說禮樂而敦詩書詩書義之府也禮樂德之則也徳義利之本也夏書曰賦納以言明試以功車服以庸君其試之乃使郤縠將中軍二十七年臣按文武非二道也為將者徒知戰陳而不知徳義則其所謂武者非聖人之武也臯陶贊堯稱其乃武乃文是武乃戡定禍亂之具所以濟文者也為將者必講明禮樂詩書於平時而以徳義為之本然後可以本兵柄而司三軍之命所以然者詩書禮樂文徳之教也必有文徳以為武事之本則其武乃止戈之武也茍專以能戰鬬曉方略以為武則武乃不仁之器殺人之具矣月令孟秋之月天子乃命將帥選士言其人厲兵言其器簡練傑俊專任有功以征不義詰誅暴殘下慢慢上以明好惡順彼逺方方慤曰才足以將物而勝之謂之將智足以帥人而先之謂之帥選士則人無不能於事厲兵則器無不利於用傑俊簡之則無所不擇練之則無所不熟既選厲簡練之矣茍非已試之效則勝負猶未可知故所任必在乎有功之人也任有功矣茍置疑貳於其間則知者必不盡其謀能者必不竭其力故任之又欲其專也凡此皆欲以征不義而已無以覆下之謂暴不能敬上之謂慢詰以問其罪誅以戮其人所詰誅者暴慢則好惡公而明矣好惡得其明則合天下之所願而無逆矣臣按月令者記一年十二月所行之政令也是以孟秋之月盛徳在金天子乃命將帥選士厲兵又於所選士之中簡擇其傑俊者以練習之以待不時之用然既練習之矣若夫有事之時則又於傑俊之中而任其有功者蓋兵凶戰危人之性命繫焉國之安危闗焉必須甞經戰陳而屢著功勩者然後用之而用之又必專焉謂之專者付之以閫外之寄權必歸於一人事不從於中制也然月令以此為孟秋之令豈每嵗至此而皆出師逺征哉蓋著為此令無事之時豫於此月而詔命將帥選士厲兵簡練傑俊有事之時必待此月而專任有功以征不義誅詰暴慢所以然者明好惡之所在使四方萬國咸知天子之所好者仁以恤下暴而肆虐者則惡之所好者忠以敬上慢而無禮者則惡之好惡既明人心順服無敢暴下慢上而為不義者也有不義者天子必命將帥征之每嵗於是月而一申明焉孰敢違王好惡而干天之誅哉荀子孝成王趙君臨武君楚將請問為將孫卿即荀子曰知莫大乎棄疑不用疑謀行莫大乎無過事莫大乎無悔至無悔而止矣不可必也故制號政令欲嚴以威此一術慶賞刑罰欲必以信二術處舎收藏欲周以固三術徙舉進退欲安以重欲疾以速四術窺敵觀變欲潛以深欲伍以參伍參猶錯雜也五術遇敵決戰必道言也又行也吾所明無道吾所疑六術夫是之謂六術無欲將而惡廢此一權無怠勝而忘敗二權無威内而輕外三權無見其利而不顧其害四權凡慮事欲熟而用財欲泰謂不恡賞五權夫是之謂五權所以不受命於主有三可殺而不可使處不完一至可殺而不可使擊不勝二至可殺而不可使欺百姓三至夫是之謂三至凡受命於主而行三軍三軍既定百官得序羣物皆正則主不能喜敵不能怒夫是之謂至臣謂為臣之至當也慮必先事而申之以敬慎終如始終始如一夫是之謂大吉言無覆敗之禍凡百事之成也必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶戰如守行如戰有功如幸敬謀無壙與曠同敬事無壙敬吏無壙敬衆無壙敬敵無壙夫是之謂五無壙無壙言無須臾不敬也慎行此六術五權三至而處之以恭敬無壙夫是之謂天下之將則通於神明矣臣按荀卿論為將之道至矣盡矣所謂可殺而不可欺百姓敬謀敬事敬吏敬衆敬敵而總以一言曰凡百事之成也必在敬之其敗也必在慢之卿之此言蓋有得於洙泗之餘論而與孫呉所著之書專以權謀詐力者不可同年語矣至若所謂戰如守行如戰有功如幸斯三如者為將行兵而能恒以此一敬存於心念念在兹事事在兹而又以是三如者凡戰凡行凡有功皆如斯言則永逺無覆敗之患而可以方行於天下矣以上論將帥之任上之上大學衍義補卷一百二十八
