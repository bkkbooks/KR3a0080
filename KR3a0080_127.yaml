body:
  text: 大學衍義補卷一百二十七明丘濬撰治國平天下之要嚴武備簡閲之教子曰善人教民七年亦可以即就也戎兵也矣朱熹曰教民者教之孝弟忠信之行務農講武之法民知親其上死其長故可以即戎臣按先儒謂善人有忠愛惻怛之心而其教人又盡本末兼該之法孝弟忠信本也務農亦本也講武之法末也本末兼該且必七年而僅可即戎兵其可易言哉嗚呼夫以忠良易直之善人而教夫孝弟忠信之良民然必七年之久而後可以即戎未至七年猶未可也可者僅可而有所未盡之辭後世召募烏合之衆以禦必死之盜賊袵金革之戎夷其敗也宜哉其克有濟者亦幸而已矣子曰以不教民戰是謂棄之朱熹曰以用也言用不教之民以戰必有敗亡之禍是棄其民也張栻曰所謂教者教之以君臣父子長幼之義使皆有親其上死其長之心而又教之以節制如司馬法是也若未之教而驅之戰是棄之死地而已矣臣按聖人所謂教民者非但教其武技必先教以文事也必使斯民知尊君親上之義然後使之執干戈擐甲胄習弓矢以敵王所愾而衛社稷如此則心專於內而堅氣奮乎外而果有不戰戰則無敵矣魯欲使慎子為將軍孟子曰不教民而用之謂之殃民殃民者不容於堯舜之世朱熹曰教民者教之禮義使知入事父兄出事長上也用之使之戰也輔廣曰能如是而教其民乃可以即戎使之敵愾禦侮臨陳之際皆如手足之捍頭目子弟之衛父兄矣不然則是陷之於死地也故謂之殃民在堯舜之仁政豈容之哉臣按孔孟百世文教之宗而言及武事切切以教為言由是觀之非獨文有教而武亦有教也名雖二而教則一要歸於明民之性全民之生而已然必民性明而後其生可全茍不教民而用之孔子謂為棄其民孟子謂為殃其民為上人者平日不知所以教民乃一旦驅之以臨鋒鏑則雖不加之以斥逐施之以刑戮其實與棄之殃之也何異嗚呼為民父母不能生養之福祐之而棄之殃之矧又所爭者乃以土地名稱之細故是則孟子所謂民賊者也堯舜之世豈容如是之人哉如是之人堯舜之世尚不之容矧居堯舜之位臨堯舜之民者乃欲自為堯舜之世所不容之人之所為哉漢制常以九月都試太守都尉令長丞相會都試課殿最東漢制立秋之日自郊禮畢始揚威武斬牲於郊東門以薦陵廟其儀乘輿御戎路白馬朱鬛躬執弩射牲牲以鹿麛太宰令謁者各一人載獲車馳駟送陵廟還宫遣使者齎束帛以賜武官武官肄兵習戰陳之儀斬牲之禮名曰貙劉兵官皆肄孫吳兵法六十四陳名曰乘之臣按漢承秦制三時不講惟十月車駕幸長安水南門會五營士為八陳進退名曰乘之而東漢所肄者乃六十四陳蓋六十四陳即八陳演之為八八六十四也所謂貙劉即武帝時太初二年令天下五日之膢也膢音劉劉殺也蓋欲習戰陳之法先斬牲以為禮也靈帝中平五年詔發四方兵講武於平樂觀下起大壇上建十二重五采華蓋髙十丈壇東北為小壇復建九重華蓋髙九丈列步兵騎士數萬人結營為陳天子親出臨軍駐大華蓋下進駐小華蓋下禮畢帝躬擐甲胄介馬行陳三匝而還蓋勳曰先王耀德不觀兵今冦在逺而設近陳不足以昭果毅秪黷武耳唐制仲冬之月講武於都外前期十有一日所司奏請講武兵部承詔遂命將帥簡軍士除地為場四出立五表又别墠地於北廂南向為車駕停觀之處前三日尚舍奉御設大次及御座於墠所建旗為和門如方色都墠之中及四角皆建以五采牙旗旗鼓甲仗威儀悉備大將以下各有統帥大將被甲乘馬教戰隊之法凡教為陳少者在前長者在後其還則反之長者持弓矢短者持戈矛力者持旌旗勇者持鉦鼓刀楯在前行持矟者次之弓箭為後行旗臥即跪旗舉即起聲鼓即進鳴金即止講武之日皇帝乘革輅至墠所兵部尚書介胄乘馬奉引入自都墠北和門至大次在位者皆再拜謁者引諸州使人鴻臚引蕃客立於大次四方觀者立於都墠騎士仗外四周然後講武吹大角三通中軍將各以鞞令鼓二軍俱擊鼓三鼓有司偃旗步士皆跪大將立於旗鼓之東西面諸軍將立於其南北面以聽大將誓左右三軍各長史二人振鐸分循以警衆諸果毅各以誓詞告其所部遂聲鼓有司舉旗士衆皆起騎從皆行及表擊鉦騎從乃止又擊三鼓有司偃旗士衆皆跪又擊鼓有司舉旗士衆皆起騎驟徒趨及表乃止東軍一鼓舉青旗為直陳西軍亦鼓舉白旗為方陳以應之次南軍亦鼓舉赤旗為鋭陳東軍亦鼓舉黑旗為曲陳以應之次東軍鼓而舉黃旗為圜陳西軍亦鼓而舉青旗為直陳以應之次西軍鼓而舉白旗為方陳東軍亦鼓而舉赤旗為鋭陳以應之次東軍鼓而舉黑旗為曲陳西軍亦鼓而舉黃旗為圜陳以應之凡軍先舉者為客後舉者為主從五行相勝之法為陳以應之每變陳二軍各選刀楯士五十人挑戰第一第二挑戰迭為勇怯之狀第三挑戰為敵均之勢第四第五挑戰為勝敗之形每將變陳先鼓而為直陳然後變從餘陳之法五陳畢兩軍俱為直陳又擊三鼓有司偃旗士衆皆跪又聲鼓舉旗士衆皆起騎馳徒走左右軍俱至中表相擬擊而還每退至一行表跪起如前遂復其初侍中跪奏請觀騎軍騎軍皆如步軍之法每軍各八騎挑戰五陳畢大擊鼓而前盤馬相擬擊而罷遂投旅侍中奏禮畢乃還臣按教閲之法備於周禮在春夏有振旅茇舍之制在秋冬有治兵大閲之制中春振旅王執路鼓中秋治兵王載太常蓋一嵗四時之教天子再臨焉文武無二道六禮之中軍居其一我國家凡百禮制皆循古典獨於軍禮所謂簡衆講武者缺焉嵗時雖有教閲然止是命將肄習坐作進退之節而車駕不親臨焉請下禮官講究周禮及漢唐宋遺制本開元禮儀注而增損之以為一代講武之禮每嵗冬月一行焉以復古禮以講武事以作士氣以備一代之制每嵗季冬折衝都尉率五校兵馬之在府者置左右二校尉位相距百步每校為步隊十騎隊一皆卷矟幡展刃旗散立以俟角手吹大角一通諸校皆斂人騎為隊二通偃旗矟解幡三通旗矟舉左右校擊鼓二校之人合譟而進右校擊鉦隊少却左校進逐至右校立所左校擊鉦少却右校逐至左校立所右校復擊鉦隊還左校復薄戰皆擊鉦隊各還大角復鳴一通皆卷幡攝矢弛弓匣刃二通旗矟舉隊皆進三通左右校皆引還是日也因縱獵獲各入其人臣按此唐府軍教閲之法玄宗先天二年十月講武於驪山之下徴兵二十萬列大陳於長川坐作進退以金鼓之聲節之帝親擐戎服持大鎗立於陳前以虧失軍容坐兵部尚書郭元振於纛下將斬之宰臣跪於馬前諫曰元振推戴上皇有大功雖違軍令不可加刑乃舍之流新州給事中知禮儀事唐紹以草軍儀有失斬之衆以元帥及禮官得罪諸節度頗亦失序惟左軍節度薛納及解琬軍不動上令輕騎召納等至軍門不得入禮畢特加慰勞開元八年八月敕四方雖安不可忘戰故周禮以軍禁糾邦國以搜狩習戎旅不教人戰是謂棄之宜差使於兩京及諸州簡取十萬人務求灼然驍勇不須限以蕃漢皆放番役差科惟令團伍教練辨其旗物簡其車徒習攻取進退之方陳威儀貴賤之等俾少長有禮疾徐有節將以伐叛懷服保大定功協於師貞以𢎞武備臣按唐玄宗嗣位未久即行講武其後又詔兩京諸州簡選教練其不忘武備有如此者宋太祖建隆二年十一月講武於近郊六軍之容甚盛帝每御講武殿親臨教閲其法刻木為箭鏃裹以氊罽命強者兩兩相射避即捶之取其不避者又以木梃為馬檛施諸韋矟俾馳騎相擊取其尤勝者各分等級以遷𨽻之自是師旅皆精鋭太宗太平興國二年詔築講武堂於西郊九月大閲上與從官登而觀焉是冬又觀飛山兵射連弩發機石於臺下又淳化五年八月召天武士卒教射於殿庭弓力有至石三斗以引強平射者為上等艱於引滿者别為一等其諸淺軟者又為一等各量其材力而遷𨽻之至道元年又閲禁旅有挽強至一石五斗連三十發而有餘力又令騎兵步兵各數百東西列陳挽強彀弩視其進退發矢如一容止中節上曰此殿庭間數百人耳猶兵威可觀况堂堂之陳數萬成列者乎臣按宋之太祖太宗起自兵間故知武事不可弛而為講校如此太宗選軍中勇士教以劒舞皆能擲劒凌空繞身承接妙捷如神每契丹使至賜宴乃出以示之凡數百輩袒裼鼓譟挺刃而入各獻其技霜鋒雪鍔飛躍滿空及親征太原巡城耀武必令劒舞前導觀者神聳臣按秦人以講武為角抵之戲則太宗此舉不為無所本也是雖非三代之制然亦足以懾伏外夷使彼知我中國之人亦有如此巧捷之技能不敢自恃其猛鷙而輕我中國也後世所謂角抵之戲日巧一日其間有妙捷如神者非積以嵗月之久演試之勤不能造其極如此也習成之後止以資人笑樂顧於訓練軍伍之法茍應故事有同兒戲是以真為假而以假為真也今日操練軍士誠使馳馬擊刺者皆能如優人之角抵每遇外夷朝貢燕享之際出以示之使彼目眩而神聳是亦不戰而屈人之兵之一計真宗咸平二年大閲諸軍詔有司擇地於含暉門外之東武村為廣場憑髙為臺臺上設屋搆行宫其夜三鼓殿前侍衛馬步諸軍分出諸門詰旦帝乘馬從官並戎服至行宫諸軍陳於臺前左右相向步騎交屬亙二十里諸班衛士翼從於後有司奏成列帝升臺東向御戎帳召從臣坐觀之殿前都指揮使執五方旗以節進退又於兩陳中起候臺相望使人執旗如臺上之數以相應初舉黃旗諸軍旅拜舉赤旗則騎進舉青旗則步進每旗動則鼓駴士譟聲震百里外皆三挑乃退次舉白旗諸軍復再拜呼萬嵗有司奏陳堅而整士勇而厲欲再舉詔止之遂舉黑旗以振旅仁宗康定元年帝御便殿閲諸軍陳法言者謂諸軍止教坐作進退雖整肅可觀然臨敵難用請自今遣官閲陳畢令解鐙以弩弓射營置弓三等自一石至八斗弩四等自二石八斗至二石五斗以次閲習詔行之陜西河東河北路是嵗詔教士不袵金甲緩急不足以應敵自今諸軍各豫鎧甲十馬甲五令迭披帶又命諸軍班聽習雜武技勿輒禁止臣按議者謂諸軍止教坐作進退雖整肅可觀臨敵難用可謂切中教閲之弊夫戰必用兵而五兵皆莫利於弓矢故操練以弓矢為大用請凡軍士各執一器如鎗刀之類然皆必兼以弓矢焉是則長短之兵各具於一人矣每月三操之際而以一日專習長兵校其能否髙下以為賞罰必全軍皆善射之人則可以無敵於天下矣又人情由難及易易由輕入重難今之操兵者往往不擐甲而輕衣而所執之兵又用輕物代之一日遇敵驟加以厚甲重器必至於顛躓矣此亦操兵者之所當知种世衡知環州課吏民射有過失射中則釋其罪有辭某事請某事輒因中否而豫奪之人人自厲皆精於射自是數年敵不近環境仁宗時賦近畿户出馬備邊民以為病沈括言北地多馬而人習騎戰猶中國之工強弩也今舍我之長技強所不能何以取勝又邊人習兵惟以挽強定最而未必貫革謂宜以射逺入堅為法吳玠論所以制勝金人之䇿謂金人弓矢不若中國之徑利中國士卒不及金人之堅耐吾常以長技洞重甲於數百步外則其衝突固不能相及臣按自古以弓弩為中國之長技古之名將所以守邊禦敵者往往以是取勝載之史册可考也沈括謂舍我之長技強所不能何以取勝吳玠謂常以長技洞重甲於數百步外使其衝突不能相及觀二人言則知中國技之所長者誠在於射然非教之有素而激勸之有方則亦不能使之射逺入堅而洞重甲也請以常時教閲之外許邊將用种世衡課吏民射法於過失之輕者差役之冗者以射中否為賞罰操縱則人人自勵皆精於射而中國之兵無敵於天下矣張方平言於仁宗曰臣聞太祖訓齊諸軍法制甚嚴軍人不得衣皂豈有紅紫之服蔥韭不得入營門豈知魚肉之味每請月糧時營在城西者即於城東支營在城東者即於城西給之須令自負以勞役之今則異矣臣嘗入朝見諸軍帥從卒一例新紫羅衫紅羅把肚白綾袴絲鞋青紗帽拖長紳帶鮮華爛然計其所受廪給不足一身之費若有妻子爭得不飢寒此軍情所以易動也臣按軍情所以易動者由其無恆心也何也蓋上之所以給豫之者有限而下之所以用度者不資用度不資則衣食不給衣食不給則無恆心矣用無恆心之人以待不可測之變欲保其臨事不變難矣宋太祖起自戎伍熟知軍情所以訓齊之者其嚴如此然不得衣紅紫可也而亦不許衣皂及蔥韭不得入營門則甚矣無故不許羣飲可也歐陽修言於仁宗曰數年以來點兵不絶然有點兵之虛名而無得兵之實數新集之兵所在教習追呼上下民不安居主教者非將領之才所教者無旗鼓之節往來州縣愁嘆嗷嗷既多多病小怯之人又無訓齊精練之法此有教兵之虛名而無訓兵之實藝也臣按修此言切中時弊神宗元豐三年詔樞密院曰唐李靖兵法世無全書又官號物名稱謂不同武人將佐多不能通其意今樞密院檢詳官校正分類解釋令今可行朱熹曰陳者定也八陳圖中有奇正前面雖未整猝然遇敵次列便已成正軍矣又曰大凡有兵須有陳不成有許多兵馬相戰鬬只滚作一團排作一行必須左右前後部伍行陳各有條理方得臣按行軍不可無陳而陳法必有據依自昔以來所傳者雖多然皆以八陳圖為得其法説者謂八陳始於黃帝用之以破蚩尤於涿鹿諸葛亮造八陳圖於魚腹平沙之上壘石為八行桓溫見之曰此常山蛇勢也文武皆莫能識之此即九軍陳法隋韓擒虎得其法以授李靖靖為六花陳以變九軍之法大抵八陳即九軍九軍者六陳也宋蔡元定為八陳圖説朱子謂其分開方圖陳法不相混雜亦有取而又嘗與之論陳法元定曰譬如一箇十分雄壯人與一箇四五分人厮打雄壯的只有力四五分的却識相打法對副雄壯的更不費力只指點將去這見得八陳之法有以寡敵衆之理由此言觀之則訓練之間不可不知古人陳法也明矣哲宗元祐元年司諫蘇轍言諸道禁軍日夜按習武藝將兵皆蚤晚兩教新募之士或終日不得休息今平居無事朝夕虐之以教閲使無遺力以治生事衣食殫盡憔悴無聊緩急安得其死請使禁軍除新募未習之兵其餘止一教朝請郎任公裕言軍中誦習新法愚懵者頗以為苦夫射志於中而擊刺格鬬期於勝豈必盡能如法臣按軍士之所以善戰非但熟於技亦必養其力非但養其力亦必得其心茍於無事之時未戰而先失其心耗其力一旦驅之以禦敵心不在焉而氣力不足以繼之彼雖熟於技而精於藝而不為吾用用之而不盡其心亦安能成功哉本朝之制每月三操而於極寒極暑之候皆停焉其為法也可謂得中矣蘇轍進䇿於其君有所謂安萬民者其别曰教戰守有所謂訓兵旅者其别曰倡勇敢教戰守之䇿曰生民之患在乎知安而不知危能逸而不能勞此其患不見於今而將見於他日今不為之計其後將有所不可救者昔者先王知兵之不可去也是故天下雖平不敢忘戰秋冬之隙致民田獵以講武教之以進退坐作之方使其耳目習於鐘鼓旌旗之間而不亂使其心志安於斬刈殺伐之際而不懾是以雖有盜賊之變而民不至於驚潰及至後世以去兵為王者之盛節天下既定則卷甲而藏之數十年之後甲兵頓弊而人民日以安於佚樂卒有盜賊之警則相與恐懼訛言不戰而走開元天寶之際天下豈不大治惟其民安於太平之樂豢於遊戲酒食之間其剛心勇氣消耗鈍眊痿蹶而不復振是以區區之祿山一出而乘之四方之民獸奔鳥竄乞為囚虜之不暇天下分裂而唐室因以微矣且夫天下固有意外之患也愚者見四方之無事則以為變故無自而有此亦不然矣天下固不免於用兵所不可知者有遲速逺近而要以不能免也臣欲使士大夫尊尚武勇講習兵法庶人之在官者教以行陳之節役民之司盜者授以擊刺之術每嵗終則聚於郡府如古都試之法有勝負有賞罰而行之既久則又以軍法從事然議者必以為無故而動民又撓以軍法則民將不安而臣以為此所以安民也天下果未能去兵則其一旦將以不教之民而驅之戰夫無故而動民雖有小怨然孰與夫旦之危哉臣按蘇氏之策欲無事之時士大夫皆尚武勇習兵法教庶人之在官者以行陳之節役民之司盜者以擊刺之術嵗終試之較其勝負以為賞罰一旦有事免以不教之民而驅之戰臣竊以謂今天下州郡凡要害處皆設衛所以養列屯坐食之官軍以為民衛民既出賦稅以衣食之而又使之執干戈以從事乎軍旅則民有辭矣然則今日官軍之外民兵不可用歟曰有事之秋禍變有必至之理彼此同之於此教而用之非但為國亦以為民也彼又將何辭乎不得已什伍之以協助官軍事已即休可也蘇軾倡勇敢之䇿曰戰以勇為主以氣為決天子無皆勇之將而將軍無皆勇之士是故致勇有術致勇莫先乎倡倡莫善乎私均是人也皆食其食皆任其事天下有急而有一人焉奮而爭先而致其死則翻然者衆矣弓矢相及劒盾相交勝負之勢未有所決而三軍之士屬目於一夫之先登則勃然者相繼矣諺曰一人善射百夫決拾茍有以發之及其翻然勃然之間而用其鋒是之謂倡倡莫善乎私天下之人怯者居其百勇者居其一是勇者難得也捐其妻子棄其身以蹈白刃是勇者難能也以難得之人行難能之事此必有難報之恩者矣天子必有所私之將將軍必有所私之士視其勇者而隂厚之人之有異材者雖未有功而其心莫不自異自異而上不異之則緩急不可望其為倡故凡緩急而肯為倡者必其上之所異也臣按蘇軾此言真得夫激勸用人之道但其所謂視其勇者而隂厚之隂之為言豈王道蕩蕩光明正大之謂哉臣竊以為其言雖不能無偏而其䇿則為甚善請如宋人廂禁軍之制分軍為二等擇其一等強壯精鋭者以為正軍以備征戰之用其次者以為副軍以應工作之役軍士每月支糧一石其正軍全支副軍每名減其二斗有役則否積其減下之數以為賞費軍士有材力過人試合式者定為賞格如射十矢中八矢者為上五矢以上者為中則賞之三四矢者為平不賞不及二矢者有罰合格者月支加米三斗或五斗其他技能以此為凖用蘇氏之䇿校其技能而賞以倡之得賞者既以自負惟恐一旦不得賞不徒失利而且為人所訾而益致其操習之功彼不得賞者遇有緩急則責之曰爾平日受厚賞今日正爾報效之秋雖欲隨衆退避不可得已如是則軍士之中有才者為上所用有勇者為上所私緩急之際必有為衆人之倡者矣胡寅言於髙宗曰減汰其疲老病弱升擇其壯健驍勇分屯在所置營房以安其家室聚粟帛以足其衣食選衆所畏信者以董其部伍申明階級之制以變其驕恣悍悖之習然後被之以精甲付之以利器進戰獲酋人則厚賞死則恤其妻孥退潰則誅其身降敵則戮其族令在必行分毫不貸者乃治軍之實也無所别擇一切安養姑息之惟恐一夫變色不悅幸無事則曰大幸矣教習擊刺有如聚戲紀律蕩然雖其將帥不敢自保者為治軍之虛文也臣按寅所言治軍虛實非但一時事也人君以誠為治凡事皆然而於治軍旅尤不可務虛文而不崇實效孝宗淳熙十四年樞密同知趙雄奏昨日大閲車甲鮮明紀律嚴整十萬之衆一一少壯上曰前此虞允文行揀汰之法其初謗議紛然今諸軍皆無老弱乃見成效雄奏凡造事之初衆口難一惟聖明不惑乃能集事臣按人君惟不惑於羣議乃能成事况軍旅之事尤難於逆料遙度往往有意外之變報復之禍人臣非真有為國之心者不敢建議自非上人持志之堅見理之的臨事之斷而不為羣議所移動者鮮矣趙雄謂造事之初衆口難一惟聖明不惑乃能集事豈但揀汰一事然哉以上論簡閲之教下大學衍義補卷一百二十七
