body:
  text: 大學衍義補卷三十明丘濬撰治國平天下之要制國用征榷之課周禮太宰九賦其七曰關市之賦關以征其貨之出入市以征其貨之所在大府掌九賦之二以受其貨賄之入關市之賦以待王之膳服司市國凶荒札喪則市無征㕓人凡珍異之有滯者斂而入于膳府王安石曰關市商旅所㑹共王膳服者百物珍異於此乎在故也夫以關市待王之膳服凶荒札喪關市無征而王於是時亦不舉而素服也陳傅良曰王之膳服僅取具於關市古者關譏而不征市㕓而不征其稅入視他至薄也不常獲也以富有四海而一人之奉特居經費之九一又取其至薄不常獲者如是足矣而司市又嚴為國君夫人世子命夫婦過市之法茍有過用於上則大臣盡規茍有過取於下則有司守法而後人主常立於無過之地此又先王之深意臣按成周盛時關市之征用以供王之膳服而已非若後世以之供凡國用也王之膳服關市之所有王則用焉不出關市之外而别有所求是以當時之君所以為衣食者皆與民同非若後世巧為製造一服之費至用百夫之衣一味之費至用百人之食也司關關謂境上之門掌國貨之節以聫門市自外入者通之門與市自內出者通之門與關司貨賄之出入者掌其治禁與其征㕓征謂稅而正之㕓謂舍而禁之凡貨不出於關者舉其貨設入罰其人凡所逹貨賄者則以節傳出之國凶荒年札疾疫死亡則無關門之征猶幾察也臣按關市有征稅始此我朝每府立稅課司州縣各立為局設官以征商稅凡商賈欲齎貨賄于四方者必先赴所司起關券是即周禮節傳之遺制也蓋節以驗其物傳以書其數也王制市㕓而不稅關譏而不征朱熹曰㕓市宅也市㕓而不征謂使居市之㕓者各出㕓賦如今質賃鋪面相似更不征其所貨之物關謂道路之關市謂都邑之市譏察也征稅也關市之吏察異服異言之人而不征商賈之稅也孟子曰昔者文王之治岐也關市譏而不征又曰市㕓而不征法而不㕓則天下之商皆悅而願藏於其市矣關譏而不征則天下之旅皆悅而願出於其路矣張載曰或賦其市地之㕓而不征其貨或治以市官之法而不賦其㕓蓋逐末者多則㕓以抑之少則不必㕓也臣按古者於衆途所㑹之地則立關以限其出入於庶民所聚之地則立市以通其有無所以兼濟之而足其用度凡若此者無非以利民而已後世則專用之以利國非古人意矣古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣朱熹曰龍斷岡壟之斷而高也孟子釋龍斷之說如此治之謂治其爭訟左右望者欲得此而又取彼也罔謂罔羅取之也從而征之謂人惡其專利故就征其稅後世緣此遂征商人也臣按孟子此言可見古人立為關市之本意其意惡人逐末而專利故立法以抑之非有所利之也匹夫而私登龍斷以罔利既得此而又望彼尚為士人之所賤彼讀聖賢書儒其衣冠如王安石之徒乃亦為賤丈夫之所為其貽譏於天下後世而為人之賤也宜矣後世君子以道事君者尚其鑒諸漢高祖時凡市肆租稅之入自天子至于封君皆各自為私奉養不領於天下經費又令賈人不得衣絲乘車重租稅以困辱之葉夢得曰高祖禁賈人毋得衣錦繡綺縠綺紵罽毛布也操兵乘騎馬其後又禁毋得為吏與名田凡民一等商賈獨倍其賤之至矣敦夲抑末亦後世所不能行也臣按漢初去古未逺其行抑商之政猶有古意夫市肆之所入不以為經費商賈之服用不許其過侈可也然捐市稅以豫封君重商稅以致困辱則過矣武帝元光六年初算商賈馬廷鸞曰武帝承文景富庶之後即位甫一紀耳征利已至於此然則府庫之積其可恃哉臣按後世稅商賈車船令出算始此宋太祖詔所在不得苛留行旅齎裝非有貨幣當算者毋得發篋搜索又詔榜商稅則例于務門毋得擅改更增及創收陳傅良曰太祖開基之歲首定商稅則例自後纍朝守為家法凡州縣不敢專擅創取動輒奏禀取㫖行下太宗詔除商旅貨幣外其販夫販婦細碎交易並不得收其算哲宗元祐八年商人載米入京糶者有力勝稅權蠲之蘇軾曰榖太賤則傷農太貴則傷末是以法不稅五榖使豐熟之鄉商賈爭糴以起太貴之價災傷之地舟車輻輳以壓太貴之直自先王以來未之有改也而近歲法令始有五榖力勝稅錢使商賈不行農末皆廢竊為聖世病之臣按民種五榖已納租稅無可再賦之理非他竹木牲畜比也竹木牲畜之類原無征算故商賈貨賣於關市也官可稅之今民既納租于官倉矣而關市又征其稅豈非重哉此不獨非王政亦非天理也我朝制稅課司局不許稅五榖及書籍紙札其事雖微其所關繫甚大王者之政仁人之心也以上征商酒誥王若曰明大命于妹邦蔡沈曰商受酗酒天下化之妹土商之都邑其染惡尤甚武王以其地封康叔故作書誥教之云乃穆敬也考文王肇國在西土厥誥毖戒謹庶邦庶士越少正官之副二御事朝夕曰祀兹酒惟天降命肇我民惟元祀蔡沈曰文王朝夕敕戒之曰惟祭祀則用此酒天始令民作酒者為大祭祀而已文王誥教小子少子之稱有正有官守者有事有職業者無毋同彛常也酒越庶國飲惟祀德將無醉蔡沈曰小子血氣未定尤易縱酒喪德故文王專誥教之毋常於酒其飲惟於祭祀之時然亦必以德將之無至於醉也臣按先儒有言古之為酒本以供祭祀灌地降神取其馨香上達求諸隂之義也後以其能養陽也故用之以奉親養老又以其能合歡也故用之於冠昏賔客然曰賔主百拜而酒三行又曰終日飲酒而不得醉焉未嘗過也自禹飲儀狄之酒而疏之寧不謂之太甚已而亡國之君敗家之子接踵於後世何莫由斯然則文王之教不惟當明於妹邦家寫一通猶恐覆車之不戒也噫兹言也凡酒之為酒所以為用及其所以為害皆具于此矣有國家者可不戒哉矧汝剛制于酒厥或誥曰羣飲汝勿佚失也盡執拘以歸于周豫其未定辭殺蔡沈曰汝之身所以為一國之視效者可不謹於酒乎故曰矧汝剛制于酒剛果用力以制之也羣飲者羣聚而飲為姦惡者也豫其殺者未必殺也猶今法當斬者皆具獄以待命不必死也然必立法者欲人畏而不敢犯也臣按蘇軾有言自漢武帝以來至于今皆有酒禁嚴刑重賞而私釀終不能絶周公獨何以能禁之曰周公無所利於酒也以正民德而已甲乙皆笞其子甲之子服乙之子不服何也甲笞其子而責之學乙笞其子而奪之食此周公所以能禁酒也噫由蘇氏此言而推之非但禁酒一事凡國家有所興事造役莫不皆然周禮酒正掌酒之政令以式法授酒材謂材食麴蘖之類凡為公酒者亦如之臣按周人設官以掌酒凡以為祭祀養老奉賔而已非以為日用常食之物也酒人掌為五齊一曰泛二曰醴三曰盎四曰緹五曰沈三酒一曰事二曰昔三曰清臣按凡祭祀天地宗廟社稷諸神皆有五齊三酒萍氏比其浮於水上掌國之水禁幾酒察非時飲者謹酒使民節用酒臣按幾酒則於飲酒微察其不節即酒誥所謂德將無醉以文王幾酒而庶國之飲酒者皆有節也謹酒則於用酒謹制其無度即酒誥所謂越庶國飲惟祀者以文王謹酒而庶國之用酒者皆有度也嗚呼天下之物最沈溺人者水也而酒之為物起風波於尊罍之中其沈溺乎人殆有甚於水焉周禮設官以萍人掌國之水禁而併付之以幾酒謹酒之權其意深矣周之先王既設官以幾謹乎酒又作誥以示戒乎人其後子孫乃至於沈酒淫泆而天下化之以底於亂亡酒之沈溺於人也如此吁可畏哉司暴音暴掌憲市之禁令禁其以屬遊飲食于市者若不可禁則搏而戮之臣按司暴市官之屬萍氏刑官之屬成周既設刑官以幾察其飲酒之人然其所飲者多在市肆之中而又立市官以禁戒之焉其刑之嚴乃至於搏而戮之嗚呼古之聖王豈欲以是而禁絶人之飲食哉蓋民不食五榖則死而酒之為酒無之不至傷生有之或至於致疾而亂性禁之誠是也後世不徒不禁釀而又設為樓館於市肆中以誘致其飲以罔利此豈聖明之世所宜有哉梁惠王觴諸候於范臺酒酣請魯君舉觴魯君興避席擇言曰昔者帝女令儀狄作酒而美進之禹禹飲而甘之遂疏儀狄絶㫖酒曰後世必有以酒亡其國者孟子曰禹惡㫖酒而好善言臣按大禹此言則酒乃亡國之物而漢武帝顧用之以為興國之利噫此聖狂之所以分歟漢興有酒酤禁其律三人以上無故羣飲酒罰金四兩文帝即位賜民酺五日十六年九月令天下大酺後元年詔戒為酒醪以靡榖臣按酺之為言布也王者德布于天下而合聚飲食以為酺自古以來皆有酒禁而漢法無故羣飲酒罰金四兩而又屢詔戒為酒醪以靡榖民之得飲也蓋鮮矣故於時和歲豐或賜酺焉夫禁其釀所以為義賜之酺所以為仁一張一弛文武之道漢時去古未逺猶有古意存焉後世縱民之飲非仁也因而取利非義也景帝中元三年夏旱禁酤酒臣按酒酤之禁雖不能行於平世若遇凶荒米榖不繼而一舉行釀酒造麴之禁是亦賑荒之一䇿也武帝天漢三年初榷酒酤吕祖謙曰周公作酒誥以告康叔其刑之重至于盡執拘以歸於周豫其殺此是最初禁酒恐人沈湎浸漬傷德敗性不過導迪民彛防間私欲之意至於周官之禁酒禹之惡㫖酒皆是此意及其再變如漢文為酺景帝以歲旱禁民酤酒與古人恐民傷德敗性已自不同恐有用為無用之物耗榖米民食不足此是再變比之酒誥所謂非惟不敢亦不暇已無此意然而猶有重本抑末之心及至三變自桑𢎞羊建𣙜酒之利設心大不同不過私家不得擅利公家却自專其利耳臣按酒者以榖為之縣官既已取榖以為租稅矣及其造榖以為酒而又稅之則是一物而再稅也可乎况古有酒禁恐民沈酗以喪德靡費以乏食耳本無所利之也漢武帝始為榷酤之法謂之𣙜者禁民醖釀官自開置獨專其利如渡水之𣙜焉是則古之禁酒惟恐民之飲後世之禁酒惟恐民之不飲也嗚呼武帝其作俑者歟昭帝元始六年詔有司問郡國所舉賢良文學民所疾苦乃罷𣙜酤官令民得以律自占占謂隱度其實租賣酒升四錢劉攽曰罷酤占租賣酒錢共是一事以律占租者謂令民賣酒以所得利占而輸其租矣占不以實則論如律也租即賣酒之稅賣酒升四錢所以限民不得厚利耳臣按前此𣙜酒官自釀以賣也至是以賢良文學言罷榷酤官然猶聽民自釀以賣而官定其價每升四錢隱度其所賣之多寡以定其稅此即胡氏所謂使民自為之而量取其利也後世稅民酒始此我朝於酒課不設務不定額民之開肆者即報官納課罷肆即已姑為之禁而已未嘗藉此以為經費如唐宋然也唐初無酒禁肅宗乾元元年以廪食方屈乃禁京城酤酒二年饑復禁酤非光祿祭祀燕蕃客不御酒德宗建中元年罷酒稅三年禁人酤酒官自置店酤收利以助軍費胡寅曰善政建於古聖王者後世鮮克遵之不善之政興於聚斂之臣者後世多不肯改德宗盡罷酒稅善矣已而牟利最急故知盡罷之未若勿𣙜而以豫民之為善也宋初諸路未盡禁酒吳越之禁自錢氏始京西禁自太平興國二年閩廣至今無禁真宗詔曰𣙜酤之法素有定規宜令計司立為定式自今中外不得復議增課以圖恩奬臣按酒之為物古人造之以祀神養老宴賔亦如籩豆之實然非民生日用不可無之物也儀狄始造酒大禹飲之豫知後世必有因之以亡其國者武王作誥以戒其臣下至欲加以殺之之刑古之聖王必不忍以口食之微戕人性命而猶然者法不嚴則禁不絶故也自桑𢎞羊為𣙜酒取利之法縱民自造而自飲嗚呼所得幾何乃使天下國家受無窮之禍遂至蚩蚩之民嗜其味之甘忘其身之大性以之亂德以之敗父子以是而不相慈孝兄弟以是而不相友愛夫婦以是而相反目朋友以是而相結怨甚至家以之破國以之亡國家有所興作率因是以僨敗者不可勝數明君賢相何苦而不為之禁絶哉且前代賴之以濟國用不禁尚有可諉者况祖宗以仁義立國不忍計民口食以為國用如存其名實無其利臣愚以為今日化民厚俗之急務莫先於復三代聖王禁酤之良法然法太嚴則不可行法太寬則不能禁况民以飲與食並嗜習已成性甚乃有廢食而專飲者性嗜已久一旦革之良為不易乞敕有司申明古典革去額課今後官吏軍民之家並許私釀然所醖釀者不許過五斗相饋送者不許過二升宴會不許過三巡飲嗜不許至甚醉開店以賣者有重刑載酒以出者有嚴禁凡民家所有􅀈醡之類盡行送官毁壞不送者有罰而又禁革造醡之木工燒􅀈之窯戶定為限制違者治罪如此則酒非富家不能造而貧者無從以得酒不畏法者雖欲縱情以自肆而知禮守法者亦有所據依以節制之矣若此者雖非古人立法之本意然亦因時制宜足民化俗之一端也迂儒之言知其一而不知其二伏惟聖君賢輔相與折𠂻而施行之天下臣民蓋有隂受其賜者矣元武宗大德八年大都酒課提舉司設槽房一百所九年併為三十所每所一日所醖不許過二十五石之上臣按宋朝東京酒務三十五元於大都總置提舉司一設為槽房三十所每所一日所醖不許過二十五石總計日費七百五十石月費二萬二千五百石歲費二十七萬石今日京師一歲所費恐不止此且釀酒之米皆出江南舟載車輦歷數千萬乃至于此嗟夫民生有欲禁之猶恐其縱乃設樓店以召致之使縱其欲可乎倫理以之而斁政事以之而廢詞訟姦盜以之而興是乃一不仁不義之舉興禍起亂之端伏願聖明天子奮發剛斷毅然禁之以革自漢以來千載深痼之弊使萬世以下良史書之以為善政豈不韙歟雖然千年之事萬人之欲乃欲一日而頓去之良不易然者必不得已而思其次請亦如元人置司開槽京師五城每城各為五槽每槽日醖不許過十石官吏軍民之家遇有公私祭奠昏冠禮㑹許其先期具辭告官酤買官為之券券用花欄中印文移空其月日及所行禮會臨時填注仍批其券曰出本日不用每券不過一斗以下價直必倍其本價貴則酤者少矣酤酒者執券為照無券及多買多賣者各治以罪以上𣙜酤唐揚州等八道州府置𣙜麴務宋承五代之後置諸州麴務至道三年再下酒麴之禁凡私造差定其罪宋諸郡有醋坊元祐初臣僚請罷𣙜醋紹聖二年翟思請諸郡醋坊日息調度之餘悉歸常平元太宗立酒醋務坊場官𣙜酤辦課臣按榖麥既已納稅用榖以為酒又稅之造麥為麴以醖酒又稅之用米與糟以為醋又稅之是則榖麥一類農耕以為食官既取之商糴於農以為酒為麴為醋官又取之此一物而三四出稅也嗚呼此皆末世之事隆盛之時所無有也是豈上天生物養民人君代天子民之意哉我朝不立酒麴務而惟攤其課於稅務之中而醋則自來無禁凡唐宋以來苛征酷斂一切革之其取於民也可謂寬矣夫天生五榖以為民食民無食則死少食則不飽民不可以一日而不飽而可以終身而不醉上之人何苦而必欲民之醉哉乃至設務置官以司酒至于所用為酒之麴亦司之焉殊不思所以為醉之具即所以為飽之物也去此以為彼彼多則此少必然之理也太平無事之時恐其敗民之德尚不可以不禁兵荒凶札之歲必至損民之食烏可不嚴為之禁哉禁酒之䇿臣已具于前矣若夫麴蘖之禁民家自造不過斗者請聽民自為之但不許其以交易貨買今天下造麴之處惟淮安一府靡麥為多計其一年以石計者毋慮百萬且此府居兩京之間當南北之衝綱運之上下必經於此商賈之往來必由於此一年之間般運於四方者不可勝計嗚呼費民生日用之資以為醺酣荒亡之具前代以國計故不得已而取其利縱之可矣而今日無所利之而亦莫之禁臣不知其何故也臣請敕所司嚴加禁約於凡民間造麴器具悉令拆毁與凡為之傭作者一切勒以歸農有犯以與私鹽僞錢同科如此則一年之間亦可存麥百餘萬石以資民食民之所有即國之所有是即古者所謂藏富于民者也以上麴醋周禮委人掌斂野之賦斂薪以烹者芻草凡疏材菜蔬之類木材可為宫室者凡畜聚之物臣按疏材草木之可食茹者木材木植之可為宫室器用者薪以供烹飪芻以飼畜類四者皆出於野必畜聚之以待不時之用也故以委人掌之後世疏果竹木柴薪有稅其原蓋出于此唐德宗時始用戶部侍郎趙贊稅天下竹木十取其一以為常平本臣按後世竹木之稅始此然唐時所稅者取其利以為常平本今世則用之以為宫宇什器耳我朝於凡天下關津去處設抽分竹木局抽分客商興販竹木柴炭等物在京者令軍衛自設場分收貯柴薪按月給與禁軍孤老等燒用竹木等物堆垜在場令各局按旬奏申知數遇有用度以憑計料揀定度量支撥在外場局則用各給所在之用近年於太平之蕪湖荆州之沙市浙江之杭州徑遣工部屬官親臨其地抽分變賣取其價直銀兩解京以供工部繕造之費免以科徴於民是誠良䇿然商販無常難為定數後來者務踰前人之數以僥能名歲增一歲無有紀極竊恐後來之難繼商賈折閲興販者不至而官與民兩失其利乞量為中制因地定額多者不以為優不及數者不以為劣庶幾可以久行此言竹木漢宣帝五鳳中耿壽昌白增海租蕭望之言縣官嘗自漁海魚不出後復與民魚乃出臣按後世魚課其原出於此我朝凡有河泊之處皆立官以司魚課歲有定額河泊之所遍天下而惟湖廣最多一藩十二所四州共百四十餘處而沔陽一州乃至有三十一處歲納課鈔有定數使鈔法果行所得亦不資矣今日非但魚課凡征商等課皆然茍鈔法通行則諸課皆得以資國之用不然則是虛費官吏之俸徒為下人之擾而所得不足以償所費也此言魚課元史額外之課凡三十有二其一曰厯日二曰契本三曰河泊四曰山場五曰窯冶六曰房地租七曰門攤八曰池塘九曰蒲葦十曰食羊十一曰荻葦十二曰煤炭十三曰撞岸十四曰山查十五曰麴十六曰魚十七曰漆十八曰酵十九曰山澤二十曰蕩二十一曰栁二十二曰牙例二十三曰乳牛二十四曰抽分二十五曰蒲二十六曰魚苖二十七曰柴二十八曰羊皮二十九曰磁三十曰竹葦三十一曰薑三十二曰白藥臣按元史食貨志有所謂歲課山林川澤之産若金銀珠玊銅鐡水銀朱砂碧甸子鉛錫礬鹻竹木之類其利最廣者鹽法茶法商稅市舶四者外此又有所謂額外課凡三十二謂之額外者歲課皆有額而此課不在其額中也嗚呼元有天下其取之民課額之名目乃至如此之多當時之民其苦可知也我朝一切削去十存其一二亦不聞國用之不足臣意當時亦徒有此名目以為姦人之資而已國家未必賴其用也史書之以垂戒後世以見其國脈之所以促有其因耳嗚呼其尚永鑒之哉以上論征𣙜之課大學衍義補卷三十
