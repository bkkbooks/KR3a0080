body:
  text: 大學衍義補卷五十八明丘濬撰治國平天下之要秩祭祀宗廟饗祀之禮上易王假有廟致孝享也程頥曰王者萃人心之道至於建立宗廟所以致其孝饗之誠也祭祀人心之所自盡也故萃天下之心者無如孝享王者萃天下之道至於有廟則其極也吳澄曰致者至其極也極盡孝享之道乃能萃已散之精神也臣按祖考精神自有生以來禪續承傳以至於今日子孫之精神即祖考之精神而祖考之精神又即其所承祖考之精神也先儒謂人之精神萃於己祖考之精神萃於廟先王設為廟祧以聚祖考於其間而子孫致其孝享之誠上以承祖考氣脉之傳下以為子孫嗣續之地使其精神萃聚凝結而常不散繼承而永不絶也虞書正月上日受終于文祖孔頴達曰上日言一歲日之上也朱熹曰文祖者堯始祖之廟受終者堯於是終帝位之事而舜受之也臣按此萬世人君祭廟之始經典所載莫有先於此者商書七世之廟可以觀德蔡沈曰天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有德之主則不祧毁故曰七世之廟可以觀德臣按伊尹此言可見七廟之制不獨周始有之而商以來固有之矣然不但自商始也伊尹之為此言想必商前已有此制故以是告太甲亦猶賈誼告文帝以為漢明神之意由是以觀則宗廟之祀非但以報先世之德亦可以厲後世之君矣勉其修德立政也盤庚兹豫大享于先王爾祖其從與享之蔡沈曰言兹我大享于先王爾祖亦以功而配食於廟先王與祖父臨之在上質之在旁陳大猷曰大勳勞之人方得配食此言與享如司禮司勳凡有功者祭於大蒸耳臣按享廟以功臣配享三代已有之周書王在新邑蒸祭歲文王騂牛一武王騂牛一詩序清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉詩曰於歎辭穆深逺清清靜廟肅敬也雍和也顯明也相助也濟濟多士執事之人秉文之德對越於也在天駿大而疾也奔走在廟不顯不承尊奉無射於人斯語辭朱熹曰王在新邑蒸祭歲實周公攝政之七年而此其升歌之辭也書大傳曰周公升歌清廟茍在廟中嘗見文王者愀然如復見文王焉又曰此周公既成洛邑而朝諸侯因率之以祀文王之樂歌言於穆哉此清靜之廟其助祭之公侯皆敬且和而其執事之人又無不執行文王之德既對越其在天之神而又駿奔走其在廟之主如此則是文王之德豈不顯乎豈不承乎信乎其無有厭斁於人也臣按頌者宗廟之樂歌大序所謂美盛德之形容以其成功告於神明者也周頌三十一篇而以清廟為之首蓋周之祖考莫盛於文王而文王之德莫重於清廟故禮每云升歌必舉清廟而不及乎他云是詩惟一句說廟首一句之外皆就助祭者言雖不言文王之文而文王之所以為文隱然自見於雍肅顯相對越奔走之間矢詩雍頌有來雍雍和也至止肅肅敬也相助也維辟公諸侯天子穆穆天子之容於歎辭薦廣牡大牲相豫肆陳也祀假大也哉皇考文王綏安也豫孝子武王自稱朱熹曰此武王祭文王之詩言諸侯之來皆和且敬以助我之祭事而天子有穆穆之容其和敬之諸侯薦大牲以助我之祭事而大哉之文王庶其享之以安我孝子之心也臣按周頌祭先王之詩多言諸侯之助祭此章乃武王祭文王諸侯助祭之詩下章載見辟王乃成王祭武王諸侯助祭之詩孔子謂四海之內各以其職來祭揚雄謂寧親莫大於得四海之歡心者此也今國家一歲五享太廟而無有所謂禘祫之制天下藩憲都邑即古五等諸侯請凡遇朝覲歲天下布政按察二司及府州縣官來朝者當歲暮孟春之享皆與助祭之列世異時殊雖不能盡如周制是亦古者以職助祭之遺意周禮大宗伯以肆獻祼古灌字享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王鄭𤣥曰宗廟之祭有此六享肆獻祼饋食在四時之上則是祫也禘也肆者進所解牲體謂薦熟時也獻獻醴謂薦血腥也祼之言灌灌以鬱鬯始獻尸求神時也祭必先灌乃後薦腥薦熟於祫逆言之者與下共文明六享俱然祫言肆獻祼禘言饋食者著有黍稷互相備也吳澄曰肆獻祼五年之禘也饋食三年之祫也祠禴蒸嘗四時祭名春物初生未有以享以祠為主故曰祠夏物未成用薄物以祭故曰禴秋物漸成以薦新為主故曰嘗冬物畢成可進者衆故曰蒸臣按禘者禘其所自出之帝為東向之尊其餘皆合食於前此之謂禘祫者於太祖之廟合羣廟之主以食此之謂祫吳澄以肆獻祼為禘饋食為祫說者謂於凡行祭皆既祼而獻有薦禮既薦而肆有薦熟禮既肆而饋有饋食禮非但禘祫也但四時之祭雖有祼饋然其節文比於禘祫為略觀孔子論禘失禮而專以灌言則禘之所重在灌可知矣灌重於禘饋食重於祫各舉所重而言也小宗伯辨廟祧之昭穆劉歆曰禮天子七廟三昭三穆與太祖之廟為七七者其正法數可常也宗不在此數中宗變也茍有功德則宗之不可預為設數吳澄曰天子七廟三昭三穆之外又有二祧謂之祧者逺廟之主遷而藏之也臣按昭穆之名始見於此前乎此者商雖有七廟之文見於書然未明言其為昭穆也周雖有穆考昭考之頌見於詩然未竝舉以為言也商雖未明言而昭穆之數隱然在乎其中周雖未竝言而昭穆之次秩然已有定序是則昭穆之名前此已有之而明著於載籍則始於此耳夫宗廟有迭毁而昭穆則一成而不可易此小宗伯所以為之辨别也歟司勳凡有功者銘書於王之太常祭於太蒸司勳詔之鄭𤣥曰銘之言名也生則書於王旌以識其人與其功也死則於蒸先王祭之詔謂告其神以辭也臣按周書洛誥曰記功宗以功作元祀君牙曰厥有成績紀于太常而與商書盤庚所謂大享先王爾祖其從與享之皆是祀先王而以功臣配享也歷代相承率循是典本朝廟祀以中山武寧王徐達開平忠武王常遇春岐陽武靖王李文忠寧河武順王鄧愈東甌襄武王湯和黔寧昭靖王沐英虢國忠烈公俞通海蔡國忠毅公張德勝越國武莊公胡大海梁國武桓公趙德勝泗國武莊公耿再成永義侯桑世傑十二人者配享太祖以河間忠武王張玉東平武烈王朱能寧國公王真榮國恭靖公姚廣孝四人者配享太宗自中山王以下十二人者皆武臣也河間王以下四人者其一人姚廣孝文臣也臣觀前代功臣配享文武並用乞下禮官議請於今開國元勳中擇一文臣始終全節者以配享太祖高皇帝又於仁宗宣宗英宗三廟皆如二廟故事推擇文武大臣配享以成一代崇德報功之典王制天子七廟三昭三穆與太祖之廟而七朱熹曰劉歆之說謂三昭三穆與太祖之廟為七文武之宗不在數中蓋周自武王克殷即增二廟於二昭二穆之上以祀高圉亞圉遞遷至懿王時則文王親盡而以有功當宗故别立一廟於三穆之上謂之文世室至孝王時則武王親盡而亦以有功當宗故别立一廟於三昭之上謂之武世室又曰周禮建國之神位左宗廟其制在中門外之左外為都宫內各有寢廟别有門垣太祖在北左昭右穆以次而南晉博士孫育議太祖百世不遷一昭一穆為宗亦百世不遷二昭二穆為四親廟高祖以上親盡則毁而遞遷昭常為昭穆常為穆儀禮所謂以其班祔檀弓所謂祔於祖父者也三代之制其詳雖不得聞焉其大略不過如此又曰以諸侯之廟明之太祖在北二昭二穆以次而南太祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂寢室而牆宇四周焉太祖之廟百世不遷自餘四廟則六世之後每一易世而一遷其遷之也新王祔于其班之南廟南廟之主遷於北廟北廟親盡則遷其主于太廟之西夾室而謂之祧凡廟主在本廟之室中皆東向及其祫于太廟之室中則惟太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其嚮明故謂之昭北向者取其深逺故謂之穆蓋羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也六世之後昭常為昭穆常為穆二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以為序若武王謂文王為穆考成王稱武王為昭考則自其始祔而已然矣又曰宗廟之制但以左右為昭穆而不以昭穆為尊卑五廟同在都宫昭帝在左穆帝在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而內有以各全其尊必大祫而㑹於一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易臣按漢儒七廟之制有兩說所謂周之所以七廟者以后稷始封文王武王受命而三廟不毁與親廟四而七韋𤣥成等之說也七者其正數可常數者宗不在此數中茍有功德則宗之不可預為設數劉歆之說也朱熹以劉歆之說為是若從諸儒之說則王者不過立親廟四與太祖為五其與諸侯五廟又何别乎况商書已云七世之廟可以觀德則自昔已有七廟矣天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰蒸天子犆與特同礿祫禘祫嘗祫蒸吳澄曰按此春夏祭名是記者之誤礿當為祠禘當為禴犆謂各祭於其廟祫謂合祀於祖廟陳祥道曰天子之禮春則犆祭夏秋冬則合享犆祭各於其廟合享同於太廟又曰祫有三年之祫有時祭之祫時祭之祫小祫也三年之祫大祫也時祭有小禮有大禮小禮春也大禮夏秋冬也公羊傳曰大事者何大祫也則明時祭之祫為小祫矣陳澔曰祫合也其禮有三時祭之祫則羣廟之主皆升而合食於太祖之廟而毁廟之主不與三年大祫則毁廟之主亦與焉臣按古者天子七廟天子以一人之身而於一日之間遍行七廟之禮雖有強力之容肅敬之心非獨心力有所不逮亦恐日力有所不給矣昔季氏以大夫行一祭事日不足而繼之以燭他日子路與祭略其煩文然質明行事猶至晏朝而退夫以大夫行一祭猶且許時况天子以燕安之體具冕服躬祼饋乃於半日之短晷行九獻之盛禮而欲一日七舉行雖强力之匹夫有所不勝也况萬乘之尊哉世儒泥古而不通變因王制此章有礿禘祭名之誤遂以此為夏殷之祭夫禮合於義適其時斯可行矣尚何殷周之拘况七廟之制商已有之周承殷後已從其廟制之數則其所行之禮安知其不相沿襲哉本朝嵗五祀皆合享於太廟雖不拘拘於古而自與古意合云月令仲春之月天子乃鮮當作獻羔開冰先薦寢廟季春之月薦鮪于寢廟孟夏之月農乃登麥乃以彘嘗麥先薦寢廟仲夏之月農乃登黍乃以雛嘗黍羞以含桃先薦寢廟孟秋之月農乃登穀嘗新先薦寢廟季冬之月命漁師始漁乃嘗魚先薦寢廟陳祥道曰廟藏神主而祭以四時寢藏衣冠几杖之具而祭之以新物方慤曰既曰寢又曰廟何也蓋王者之於祖禰以人道事之則有寢以神道事之則有廟祭神道也薦人道也臣按自古帝王於時祭之外又有薦新之禮蓋四時各有新物必先獻而後食蓋事死如事生不敢以人之餘奉神也月令寢廟之說解者率以為二臣竊以謂月令之書雜記秦禮而以寢廟併言無所經見意必宗廟之外别有奉先之所藏其衣冠几杖之類因設為几筵以奉之如所謂極廟原廟者本朝於太廟之外設奉先殿於大內每月太常寺進薦新品物送光祿寺供薦即此制也禮運故𤣥酒用水為之在室設之室內而近北醴酒之一宿者盞即盎齊在户設之稍南而近户粢才細反醍即醍齊在堂設之在堂澄酒即沈齊在下堂下陳其犧牲備其鼎俎列其琴瑟管磬鍾鼓修其祝為主人告神之辭嘏為尸致福於主人之辭以降上神在天之神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜陳祥道曰道之精常幽𤣥而淡薄道之粗常明著而精美精則常貴而尊粗則常賤而卑先王於名數之間而未嘗不寓之以道德之意此𤣥酒所以在室醴盞所以在户粢所以在堂澄所以在下也昔先王之於鬼神以神道事之則以五齊以人道事之則以三酒犧牲所以致其養琴瑟鍾鼓所以致其樂祝嘏所以致其文此固足以降上神與先祖也然上神先祖之降在彼而天祜之承在我在彼者以禮物之所備在我者以禮教之所成故必正君臣篤父子睦兄弟齊上下以至於夫婦有所也臣按古者祭祀陳設禮物莫不各有其義然不惟備夫禮物也而尤於君臣父子兄弟上下夫婦之間必彝倫以叙恩義以篤同心合德以秉誠盡禮然後得以承天之祜焉所謂祜者豈休徵嘉祥之謂哉在乎人倫而已作造也其祝祝辭號美號𤣥酒以祭薦其血毛殺牲之時取血及毛腥其俎以生肉盛於俎孰其殽醴盞薦血腥時用醴薦熟時用盞以獻薦其燔炙燔肉炙肝君與夫人交獻以嘉魂魄嘉善死者之魂魄是謂合莫永其契合於冥漠之中然後退而合亨合而烹煮之使熟體其犬豕牛羊實其簠簋籩豆鉶羮祝以孝告嘏以慈告是謂大祥善也此禮之大成也方慤曰血所以告幽毛所以告全腥其俎則事之以神道孰其殽則事之以人道周諝曰奉上世之禮物而罕及於後世者則無文奉後世之禮物而罕及於上世者則無本有本有文此之謂禮之大成也臣按先王制為祭祀之禮凡器物之陳節文之變皆有深長之意存乎其間禮器廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東君在阼夫人在房君西酌犧象夫人東酌罍尊禮交動乎上樂交應乎下和之至也陳澔曰罍尊夏后氏之尊也犧尊周尊也縣鼓大應鼓小設禮樂之器一以西為上故犧尊縣鼓皆在西而罍尊與應鼓皆在東也君在東而西酌犧象夫人在西而東酌罍尊此禮交動乎堂上也縣鼓應鼓相應於堂下是樂交應乎下也太廟之內敬矣卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也納牲詔於庭血毛詔於室羮定詔於堂三詔皆不同位蓋道求而未之得也陳澔曰洞洞敬之表裏無間也屬屬誠實無僞也勿勿勉勉不已也詔告也牲入在庭以幣告神故云納牲詔於庭殺牲取血及毛入以告神於室故曰血毛詔於室羮肉汁也定熟肉也煮之既熟將迎尸入室乃先以俎盛羮及定而告神於堂此是薦熟未食之前也道言也此三詔各有其位蓋言求神而未得也臣按以上凡言君者諸侯也夫人諸侯之配也不言天子而天子之禮亦以是為準亦猶儀禮止言士冠禮而不及天子諸侯卿大夫也郊特牲周人尚臭周人所尚在臭氣灌灌地降神用鬯以秬黍合鬱金革為之臭鬱合鬯鬯既成和以鬱金之汁臭隂達於淵泉先求諸隂灌以圭璋以圭璋為瓉之柄用玉氣也既灌然後迎牲致隂氣也蕭音蒿合黍稷取此蒿及牲之脂膋合黍稷燒之臭陽達於墻屋使其氣旁達於墻屋之間故既奠然後焫燒也蕭合羶馨也薌香也即黍稷凡祭慎諸此馬睎孟曰灌者禮之始而敬之至者也易曰觀盥而不薦語曰禘自既灌而往者吾不欲觀之矣推此足以知周人尚臭之意也臣按古人之祭各有所尚虞人尚氣殷人尚聲周人尚臭所謂臭即氣也氣有隂陽之别尚秬黍和鬱金香為鬯酒灌地以求神是以臭而求神於隂取香蒿及脂膋與黍稷燒之使其氣旁達於墻屋是以臭而求神於陽吁假品物羶薌之臭以通神明薰蒿之氣古人所以感格乎神而致其歆饗者無所不用其誠敬也如此詔告白也祝於室取牲之膟膋燎於爐炭而告神也坐尸於堂灌鬯之後尸坐户西南面也用牲於庭升首於室直祭正祭祝于主索求也祭祝于祊不知神之所在於彼乎於此乎或諸逺人乎祭于祊尚曰求諸逺者與陳澔曰直祭正祭也祭以薦熟為正正祭之時祝官以祝辭告於神主如云薦歲事于皇祖伯某甫也祊有二一是正祭時設祭于廟又求神於廟門之內詩云祝祭于祊是也一是祭之明日繹祭也廟門謂之祊設祭在廟門外之西旁故名為祊也求索其神靈而祭之則祝官行祭于祊也於彼於此言神在於彼室乎在於此堂乎或逺離於人而不在廟乎尚庶幾也祭于祊庶幾可求之於逺處乎臣按古人之祭所以求感格於神靈者非止於正祭之時及行禮之所而已祭之日既設祭于廟門之內祭之明日又設祭于廟門之外所以求而索之者惟恐一時之或間一處之或遺也以上宗廟饗祀之禮上大學衍義補卷五十八
