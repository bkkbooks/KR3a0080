body:
  text: 大學衍義補卷七十三明丘濬撰治國平天下之要崇教化本經術以為教上之上周易易有太極是生兩儀兩儀生四象四象生八卦朱熹曰一每生二自然之理也易者隂陽之變太極者其理也兩儀者始為一畫以分隂陽四象者次為二畫以分太少八卦者次為三畫而三才之象始備此數言者實聖人作易自然之次第有不假絲毫智力而成者畫卦揲蓍其序皆然胡一桂曰此明伏羲始畫八卦也八卦為小成之卦三畫之卦乾一兌二離三震四巽五坎六艮七坤八伏羲不是逐卦如此畫只是自太極理也生兩儀為第一畫者二陽儀隂儀兩儀生四象為第二畫者四太隂少陰太陽少陽四象生八卦為第三畫者八所謂始畫八卦者此也臣按先儒謂易者生生之妙而太極者所以生生者也一生二二生四四生八八生三十二三十二生六十四程頤所謂加一倍法者一言以蔽之矣此易學綱領開卷第一義是故天生神物謂蓍龜聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之朱熹曰此四者聖人作易之所由也張栻曰通於天者河也有龍馬負圖而出此聖人之德上配於天而天降其祥也中於地者洛也有神龜戴書而出聖人之德下及於地而地呈其瑞也聖人則之故易興於世然後象數推之以前民用卦爻推之以前民行而示天下後世也臣按先儒謂四者聖人作易之由神物一也天地變化二也天垂象三也河圖洛書四也是知聖人作易之由非止一端為一物也說者乃顓顓謂聖人則河圖以作易其然豈其然哉蓋聖人畢具衆理於一心偶因一物以起義古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與當有天字地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情朱熹曰俯仰逺近所取不一然不過以驗隂陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象臣按神物變化天象圖書聖人由之以作易天文地理人身物則聖人取之以作卦易言其綱卦言其目天地定位山澤通氣雷風相薄水火不相射八卦相錯朱熹曰邵子曰此伏羲八卦之位乾南坤北離東坎西兌居東南震居東北巽居西南艮居西北於是八卦相交而成六十四卦所謂先天之學也帝天之主宰出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮朱熹曰邵子曰此卦位乃文王所定所謂後天之學也臣按先天後天之言始見於乾之文言然謂先於天後於天焉耳至宋邵雍始以天地定位以下為伏羲先天易帝出乎震以下為文王後天易各有方位之次分為橫圜之圖子曰加我數年五十以學易可以無大過矣朱熹曰此章之言史記作假我數年若是我於易則彬彬矣加正作假而無五十字蓋是時孔子年已幾七十矣五十字誤無疑也學易則明乎吉凶消長之理進退存亡之道故可以無大過蓋聖人深見易道之無窮而言此以教人使知其不可不學而又不可以易而學也真德秀曰聖人作易不過推明隂陽消長之理而已陽長則隂消隂長則陽消一消一長天之理也人而學易則知吉凶消長之理以隂陽對言則陽為善為吉隂為惡為凶獨言陽則陽自有吉有凶蓋陽得中則吉不中則凶隂亦然以天理言則為消息盈虛以人事言則為存亡進退蓋消則虛長則盈如日中則昃月盈則虧暑極則寒寒極則暑此天道所不能已也人能體此則當進而進當退而退當存而存當亡而亡如此則人道得而與天合矣故孔子可以進則進可以退則退可以久則久可以速則速用之則行舍之則藏此孔子之身全體皆易也臣按史謂夫子晚而好易讀之韋編三絶蓋尤加精審爾非謂至此始學易也朱熹謂此章大指在無大過不在五十上周惇頤曰大哉易也性命之源乎又曰聖人之精畫卦以示聖人之蘊因卦以發卦不畫聖人之精不可得而見微卦聖人之蘊殆不可悉得而聞易何止五經之源其天地鬼神之奧乎朱熹曰精者精微之意畫前之易至約之理也伏羲畫卦專以明此而已蘊謂凡卦中之所有如吉凶消長之理進退存亡之道至廣之業也有卦則因以形矣隂陽有自然之變卦畫有自然之體此易之為書所以為文字之祖義禮之宗也然不止此蓋凡管於隂陽者雖天地之大鬼神之幽其理莫不具於卦畫之中焉此聖人之精藴所以必於此而寄之也臣按朱熹又謂易有精有藴如師貞丈人吉此聖人之精畫前之易不可易之妙理至於容民畜衆處因卦以發蓋其蘊也非獨此一段凡六十四卦皆當以此推之程皓曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神又曰易起於數非也有理而後有象有象而後有數易因象以明理由象而知數得其義則象數在其中矣程頤曰易變易也隨時變易以從道也其為書也廣大悉備將以順性命之理通幽明之故盡事物之情而示開物成務之道也至微者理也至著者象也體用一源顯微無間觀會通以行其典禮則辭無所不備故善學者求言必自近易於近者非知言者也豫所傳者辭也由辭以得其意則在乎人焉范念德曰易也時也道也皆一也自其流行不息而言之則謂之易自其推遷無常言之則謂之時而其所以然之理則謂之道臣按易之為易有理有數言理者宗程頤言數者宗邵雍至朱熹作本義啓䝉始兼二家說先儒謂程學言理而理者人心之所同今讀其傳犁然即與心合邵學言數數者康節之所獨今得其圖若何而可推驗明理者雖不知數自能避凶而從吉學數者儻不明理必至舍人而言天窮理而精則可修已治人言數不精且將流於技術易雖告以卜筮而未聞以推步漢世納甲飛伏卦氣凡推步之術無不倚易為說而易實無之今邵學無傳不若以理言易則日用常行無往非易矣看易且要知時凡六爻人人有用聖人自有聖人用賢人自有賢人用衆人自有衆人用學者自有學者用君有君用臣有臣用無所不通聖人用意深處全在繫辭張載曰易為君子謀不為小人謀邵雍曰君子於易玩象玩數玩辭玩意夫易者聖人長君子消小人之具也及其長也闢之於未然及其消也闔之於未然一消一長一闔一闢渾渾然無迹非天下之至神其孰能與於此臣按先儒謂玩象玩數玩辭玩意此學易之法楊時曰夫易求之吾身斯可見矣朱熹曰易之為書文字之祖義理之宗又曰易有兩義一是變易是流行者一是交易是對待者易中之辭大抵陽吉而隂凶亦有陽凶而隂吉者蓋有當為有不當為若當為而不為不當為而為之雖陽亦凶易中多言利貞貞吉利永貞之類皆是要人守正又曰易大槩欲人恐懼修省臣按易者五經之本源萬世文字之所自出義理之所由生者也散見於五經者皆學者人倫日用所當為之事而其所以當為與不當為者其理則具於易可行與止之幾於是乎決焉是讀經而不讀易如木之無本水之無源也伏羲畫八卦只此數畫該盡天下萬物之理學者於言上會得者淺於象上會得者深又曰凡讀一卦一爻便如占筮所得虛心以求其辭義之所指以為吉凶可否之決然後考其象之所以然者求其理之所以然者推之於事使上自王公下至民庶所以修身治國皆有可用看易者須識理象數辭四者又曰讀易之法先讀正經不曉則將彖象繫來解臣按程氏論易曰辭曰變曰象曰占邵氏論易曰象曰數曰辭曰意至於朱氏之論則曰理曰數曰象曰辭焉三家之說雖不同然所謂辭象者皆未有遺焉者也豈不以易有理有數有變有占而其意寓乎其中所謂象與辭者平居無事之時所當觀而玩者尤為要切乎程氏之說即孔子之說所謂易有聖人之道四焉者也我朝趙謙謂如乾之初九變也潛龍象也勿用者占也初九潛龍勿用辭也有言象而不言占者占在象中有言占而不言象者象在占中以此推之盡矣要其歸則三百八十四爻只是一時字臣竊以謂程氏本孔子說易之本指動靜觀玩之用邵朱二說教人讀易之法也學易者必兼三說以求之思過半矣以上論易孔安國曰孔子討論墳典斷自唐虞以下訖於周芟夷煩亂剪截浮辭舉其宏綱撮其機要足以垂世立教典謨訓誥誓命之文凡百篇所以恢𢎞至道示人主以軌範也帝王之制坦然明白可舉而行三千之徒並受其義程頤曰上古雖已有文字而制立法度為治有迹得以紀載有史官以識音志其事自堯始耳臣按先儒謂書者史之所紀録也從聿從耆聿古筆字以筆畫成文字載之簡冊曰書者諧聲伏羲始畫八卦黃帝時蒼頡始制文字凡通文字能書者謂之史人君左右有史以書其言動堯舜以前世質事簡莫可考評孔子斷自堯舜以後史所紀録定為虞夏商周四代之書孔穎達曰以其上古之書謂之尚書此文繼伏生之下則知尚字乃伏生所加也臣按尚訓為上程頤曰看書須要見二帝三王之道如二典即求堯所以治民舜所以事君朱熹曰二典三謨等篇義理明白句句是實理堯之所以為君舜之所以為臣臯陶稷契伊傅輩所言所行最好綢繆玩味體貼向自家身上來其味自别又曰唐虞三代事浩大闊逺何處測度不若求聖人之心如堯則考其所以治民舜則考其所以事君且如湯誓湯曰豫畏上帝不敢不正熟讀豈不見湯之心臣按書之大義在奉天治民事君其要也程朱二子論書專指堯治民舜事君為言蓋二者人倫之至也若夫舜禹成湯文武之所以治民禹臯䕫益稷契伊傅周召之所以事君其心未嘗不同因其所言所行而見也又曰尚書初讀若於己不相關熟而誦之乃知堯禹湯文之事無非切己者又曰欽之一字書中開卷第一義也讀者深味而有得焉則一經之全體不外是矣又曰高宗舊學于甘盤六經至此方言學字臣按書之為書人皆知其為帝王為治之要道而不知學者之所以為學與其所以為學者之本原皆本諸此學者存養以敬而進學以致知所以致其知者學于古訓斆學于人也由是以格君心之非而致之於無過之地則時雍咸寧之化不在唐虞之世矣又曰書有古文今文古文乃壁中之書今文乃伏生口傳又曰書有兩體有極分曉者有極難曉者如盤庚大誥多方多士之類恐是當時召來而面命之自是當時一類說話至於湯誥微子之命君陳諸篇則修其詞命又曰典謨諸書恐是曾經史官潤色來周誥諸篇只似今榜文曉諭方言俚語隨地隨時各自不同吕祖謙曰書者堯舜禹湯文武臯䕫稷契伊尹周公之精神心術盡寓其中觀書不求心之所在夫何益欲求古人之心盡吾之心然後可以見古人之心蔡沈曰二帝三王之治本於道二帝三王之道本於心得其心則道與治固可得而言矣何者精一執中堯舜禹相授之心法也建中建極商湯周武相傳之心法也曰德曰仁曰敬曰誠言雖殊而理則一無非所以明此心之妙也至於言天則嚴其心之所自出言民則謹其心之所由施禮樂教化心之法也典章文物心之著也家齊國治而天下平心之推也心之德其盛矣乎二帝三王存此心者也夏桀商受亡此心者也太甲成王困而存此心者也存則治亡則亂臣按書之大要在於允執厥中之一語而其所以信執其中者在知人心道心之所以分既知其所以分又能精察而一以守之則信能執之矣是知唐虞聖君為治之要不出乎一心而已故朱吕二子及蔡氏皆本諸心為言蓋示人以讀書旨要也真德秀曰五十八篇之書無一語不及天無一語不主敬董鼎曰帝王之書歷代所寶天下家傳人誦之人生八歲入小學教之以詩書六藝之文即此書也孔子斷自唐虞訖於周者蓋以前乎五帝為三皇世尚洪荒後乎三王為五伯習尚權譎故自唐訖周以定百篇之書自是誦習者簡要而不繁舉行者中正而無弊一書之中其於明德新民之綱修齊治平之目即堯典已盡其要而危微精一四言所以開知行之端主善協一四言所以示博約之義務學則說命其入道之門為治則洪範其經世之要也他如齊天運則有羲和之厯定地理則有禹貢之篇正官僚則有周官之制度修己任人則有無逸立政諸書煨燼壞爛之餘百篇僅存其半而宏綱實用尚如此又曰六經莫古於書易雖始於伏羲然有卦未有辭辭始於文王耳六經莫備於書五經各主一事而作耳易主卜筮洪範之稽疑也禮主節文虞書之五禮也詩主詠歌后䕫之樂教也周禮設官周官六卿率屬之事也春秋褒貶臯陶命德討罪之權也五經各主帝王政事之一端書則備紀帝王政事之全體修齊治平之規模事業盡在此書臣按天下大道二義理政治也易者義理之宗書者政治之要是以六經之書此為大焉學者學經以為儒明義理以修己行政治以治人學之能事畢矣儒者之全體大用備矣易者其體書者其用也以上論書以上本經術以為教上之上大學衍義補卷七十三
