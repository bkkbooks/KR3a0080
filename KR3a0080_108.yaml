body:
  text: 大學衍義補卷一百八明丘濬撰治國平天下之要慎刑憲謹詳讞之議舜典眚災肆赦怙終賊刑孔頴達曰此二句承上文典刑之言總言用刑之罪過而有害雖據狀合罪而原心非故如此者當緩赦之小則恕之大則宥之怙恃姦詐欺罔時人以此自終無心改悔如此者當刑殺之小者刑之大者殺之臣按舜典此二言萬世讞刑之權度也蓋無心失理為過眚災是也人之有過誤或不幸而入於罪者讞之知其非故也當五刑者則減而流當鞭朴者則減而贖知其無心而誤犯也非故也有心失理為惡怙終是也人之有所恃而又再犯者讞之知其非過也當典刑者則坐以典刑當鞭撲者則坐以鞭撲知其有心而故犯也非過也世之讞刑者以聖經二言為權度則讞獄道盡而所處無不當之罪而人自以為不寃矣大禹謨宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經孔安國曰過誤所犯雖大必宥不忌故犯雖小必刑刑疑從輕賞輕從重忠厚之至寧失不常之罪不枉不辜之善仁愛之道也臣按宥過無大刑故無小此二言即舜典眚災肆赦怙終賊刑也後世讞疑獄者以舜典二言及大禹謨此六言為主以權度天下之疑獄而又以與其殺不辜寧失不經一言恆存諸心焉則天下無寃獄矣夫所謂不可殺者不辜者爾而其有辜者亦自不苟免也蓋以人有罪犯在乎可殺不可殺之間殺之則若無罪不殺則失常刑臯陶立為此言蓋探大舜之心而代為之辭也夫子刪書存之以示萬世使斷疑獄者以此為豫奪輕重之權度雖曰一時之言然萬世之下人賴之以全其生者多矣所謂仁人之言其利溥者也誰謂臯陶無後哉君陳王曰辟以止辟乃辟狃習也于姦宄敗常典常亂俗風俗三細不宥蔡沈曰刑期無刑刑而可以止刑者乃刑之狃于姦宄與夫毁敗典常壞亂風俗人犯此三者雖小罪亦不可宥以其所關者大也臣按聖人之制為刑辟非故用此以張其威罔其民也蓋立為刑辟使人知所避而不犯則無犯刑辟者矣此所謂辟以止辟也詳讞之際人之真有所犯者則必決然而不宥焉其罪雖小不可不為之懲不為之懲則必有倣而為者於其後矣吁懲之於細則大者不作戒之於光則後者不繼懲一人以懼千萬人戒一事以遏千萬事聖人之慮逺矣聖人之心仁矣彼以姑息為仁者真不仁者也吕刑上刑適輕下服下刑適重上服蔡沈曰事在上刑而情適輕則服下刑舜之宥過無大康誥所謂大罪非終者是也事在下刑而情適重則服上刑舜之刑故無小康誥所謂小罪非眚者是也臣按穆王訓刑此二句逺宗乎虞廷之典近法乎武王之誥非無徵之言也先儒以為罪莫大乎殺人然所殺奴婢也非適輕乎罪莫輕於罵詈然所詈父祖也非適重乎是故原情以定罪而不拘於一定之法其刑上備有并兩刑蔡沈曰其刑上備有并兩刑者言及其斷獄之書當備情節一人而犯兩事罪雖從重亦并兩刑而上之言讞獄者當備其辭也臣按兩刑謂一人有兩罪一罪有二法并具上之以聽命於上不敢專也周禮司刺掌三刺三宥三赦之法以贊司冦聽獄訟一刺曰訊問也羣臣再刺曰訊羣吏三刺曰訊萬民一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老旄耄同三赦曰憃愚以此三法者求民情斷民中而施上服下服之罪然後刑殺鄭玄曰不識謂不審也若今報讐當報甲見乙誤以為甲而殺之之類過失謂舉刃欲斫伐而誤軼人之類遺忘謂若間帷幕而忘有人在焉以兵矢誤投射之之類幼弱老耄今律年未滿八嵗及八十以上非手殺人者他皆不坐蠢愚謂生而癡騃童昏者吳澄曰上服情重者墨劓及死刑是也下服情輕者宫刑是也臣按三刺之訊羣臣羣吏萬民即孟子所謂左右諸大夫國人皆曰可殺然後殺之之意也訊於羣臣羣吏萬民皆曰可殺則罪有可殺之辟矣而猶原之以三宥恐其所以犯此者其不識乎或過失遺忘乎三者皆無之然猶審之以三赦若其人果幼弱老耄蠢愚也則又在所釋焉以此三法參酌民情而求其實斷制罪獄而折其中情之重者服以上刑輕者服以下刑然後刑之殺之則所刑者乃求其所以免不可得而後刑之所殺者乃求其所以生不可得而後殺之則刑與不刑殺與不殺皆合乎中道矣讞獄恆以是存心則死者與我俱無憾而朝廷無寃獄天下無寃民矣王制附從輕赦從重孔頴達曰附從輕者施刑之時此人所犯之罪在輕重之間可輕可重則當求可輕之刑而附之罪疑惟輕是也赦從重者所犯之罪本非意故為而入重罪放赦之時從重罪之上而赦之書眚災肆赦是也臣按犯罪者有重有輕定罪者或附或赦附入者當從其輕赦出者當從其重疑獄泛與衆共之衆疑赦之必察小大之比以成之方慤曰泛與泛愛之汜同可信則斷之以已可疑則資之於衆也衆疑赦之者又不以偏愛而有所釋必察其罪之在大辟則比於大辟以成其獄察其罪之在小辟則比於小辟以成其獄臣按疑獄與衆共之吕刑所謂胥占是也衆疑赦之吕刑所謂刑罰之疑有赦是也梁人有取後妻後妻殺夫其子又殺之孔季彥過梁梁相曰此子當以大逆論禮繼母如母是殺母也季彥曰昔文薑殺魯桓春秋去其薑氏傳曰絶不為親禮也絶不為親即凡人爾且夫手殺重於知情知情猶不得為親則此下手之時母名絶矣方之古義是子宜以非司冦而擅殺當之不得以殺母而論為逆也梁相從其言臣按此事與漢武帝為太子時所論訪年殺繼母之獄同武帝謂繼母無狀手殺其父下手之日母恩絶矣其言與季彥同季彥又謂方之古義宜以非司冦而擅殺當之後世遇有獄如此比者宜以為凖漢髙帝制詔御史獄之疑者吏或不敢決有罪者久而不論無罪者久繫不決自今以來縣道官獄疑者各讞所屬二千石官二千石官以其罪名當報謂處斷也所不能決者皆移廷尉亦當報之廷尉所不能決謹具為奏傅所當比律令以聞臣按此漢人讞獄之制景帝中五年詔諸獄疑若雖文致於法而於人心不厭服也者輒讞之臣按文致於法謂原情定罪本不至於死而以律文傅致之也傅致於法而於人心有不服者則必讞之使必服於人心而後加之以刑否則從輕典焉後元年詔曰獄重事也人有智愚官有上下疑獄者讞有司有司所不能決移廷尉有令讞而後不當讞者不為失欲令治獄者務先寬臣按治獄者必先寬此一語古帝王之存心也武帝時兒寬為廷尉史以古法義決疑獄張湯甚重之時上方向文學湯決大獄欲傅古義乃請博士弟子治尚書春秋補廷尉湯雖文深意忌不専平然得此聲譽而深刻吏為爪牙用者依於文學之士臣按漢人去古未逺其斷大獄猶必傅古義不顓顓於律也後世但知有律令爾不復有言及古義者矣宣帝置廷平季秋後請讞常幸宣室齋居而決事臣按宣帝於季秋後幸宣室齋居而決事蓋知獄事乃死生之所繫不敢輕也齋居則心清而慮専燭理明而情偽易見成帝時淳于長坐大􅊇誅小妻乃始等六人皆以事未發覺時棄去或更嫁及長事發丞相翟方進等議欲坐之廷尉孔光駮議以為大逆無道父母妻子同産無少長皆棄市欲懲後犯法者也夫婦之道有義則合無義則離長自未知當罪大逆而乃始等棄去或更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是臣按婦人從夫者也在室之女當從父母已醮之婦則當從夫家况夫婢妾之屬事未發前已離主家豈有從坐之理哉孔光之議誠是也哀帝時丞相薛宣不持後母服給事中申咸毁之不得封侯宣子况令楊明斫傷咸事下有司議御史中丞衆等議奏曰况首為惡明手傷功意俱惡皆當棄市廷尉直駮議曰殺人者死傷人者刑古今之通道三代所不易也春秋之義原心定罪原况以父見謗發忿怒無他大惡加詆欺輯小過成大辟陷死刑違明詔非法意不可施行明當以賊傷人不直况與謀者皆爵減以其官爵減罪完為城旦帝以問公卿丞相孔光大司空師丹以中丞議是臣按漢人有疑獄既下法官議議上又以問公卿大臣此疑獄所以卒無疑也獄不疑則人不寃矣章帝時有兄弟共殺人者帝以兄不訓弟故報論也兄重而減弟死中常侍孫章宣詔言兩報重尚書奏章矯制罪當腰斬帝問郭躬躬對曰法令有故誤章傳令之謬於是為誤誤者於文則輕當罰金帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐且王法天刑不可以委曲生意帝善之臣按郭躬謂王法天刑不可以委曲生意斯言也可以為讞獄者之格式魏夷毌丘儉族儉孫女適劉氏當死以孕繫廷尉司𨽻主簿程咸議曰女適人者若已産育則成他家之母於防不足以懲姦亂之原於情則傷孝子之恩男不遇罪於他族而女獨嬰戮於二門非所以哀矜女弱均法制之大分也臣以為在室之女可從父母之刑既醮之婦則從夫家之戮朝廷從之著於律令臣按有虞之世罪人不孥矧女之適異姓者乎程咸之議魏人著於律令後世宜凖以為法晉元帝為左丞相時熊逺上書以為軍興以來處事不用律令競作新意臨事立制朝作夕改至於主者不敢任法每輒關咨非為政之體也愚謂凡為駁議者皆當引律令經傳不得直以情言無所依凖以虧舊典若開塞隨宜權道制物此是人君之所得行非臣子所宜専用也臣按熊逺謂凡為駁議者皆當引律令經傳不得直以情言此可以為後世法官駁正讞疑者之法又謂開塞隨宜權道制物是人君之所得行非臣子所宜専此言深明於君臣之義蓋人臣當官處事凡有所見自當敷陳上聞以須進止不可任意直行非但駁疑獄一事然也唐制天下疑獄讞大理寺不能決尚書省衆議之録可為法者送祕書奏報臣按唐制凡大理寺所不能決之疑獄尚書省會衆議定録可為法者送祕書省祕書省者文學侍從之臣所聚之處欲其引古義質經史以證之因一時之疑立百世之法本一人之事為衆人之則臣請自今遇三法司有疑獄會衆詳讞有可為法者亦乞送翰林院纂集為帙以示天下貞觀中大理卿胡演進月囚帳太宗曰其間有可矜者豈宜以一律斷因詔凡大辟罪令尚書九卿讞之臣按罪至大辟罪之大者也人命至重死者不可復生今憑一吏之見據一簡之書致一人於不可復生之地安能保其皆當罪而無寃哉太宗詔凡大辟罪不以一律斷而必令尚書九卿同讞之重人命也太宗嘗因録囚見同州人房強以弟謀反當從坐謂侍臣曰反逆有二興師動衆一也惡言犯法二也輕重固異而鈞謂之反連坐皆死豈定法耶臣按此言後世斷反逆獄者宜以為凖太宗欲止姦遣人以財物試賂之有司門令史受饋絹一匹上怒將殺之裴矩諫曰此人受賂誠合重誅但陛下以物試之即行極法所謂陷人於死恐非道德齊禮之義上納其言臣按太宗餌人以物而坐以贓罪非人君以誠待人之道然裴矩諫之而即納其言其亦異諸偏執不回者歟太宗以為古者斷獄必訊於三槐九棘之下今三公九卿即其職也乃詔死罪中書門下五品以上及尚書平議之臣按今制令文武大臣議死囚與此同然當秋後會議之時大臣一時會集法司承行官吏雖即其犯由當衆先讀然成案或有文致具成文理一時猝急未易詳究乞為明制每嵗會議重囚先期法司備將會議罪囚所犯事由及其招擬通行知會中間若有可疑可矜者詳具明白當衆辨詰聨名以聞如此則會議不為虛應故事而民之犯罪死者無寃矣玄宗時武強令裴景仙犯乞取贓積五十匹上怒令集衆殺之大理卿李朝隱奏曰景仙犯乞贓罪不至死其曾祖寂締構元勳其家曾陷非辜誅夷惟景仙獨存宜入議條且一門絶祀情或可矜願寬暴市之刑俾就投荒之役詔不許朝隱又奏曰生殺之柄人主合専輕重有條臣下當守據法枉理而取十五匹便抵死刑因乞為贓數千匹止當流坐若令乞取得罪便處斬刑後有枉法當科欲加何辟臣按今律有枉法贓求索贓受財雖同其所以得財者則異此罪所以有輕重也栁宗元為栁州刺史州民莫誠救兄以竹刺其人右臂經十二日身死凖律以他物毆傷在辜內死者依殺人論宗元上狀桂管觀察府謂莫誠赴急而動事出一時解難為心豈思他物救兄有急難之戚中臂非必死之瘡不幸致殂揣非本意按文固當恭守撫事似可哀憐律宜無赦使司明至當之心情或未安守吏切惟輕之願臣按部民犯法情有可矜為守令者不為之伸理則非所以為父母矣宗元上狀帥府請輕莫誠之罪亦刺史職分之所當為也穆宗長慶中羽林官騎康憲男買得年十四以其父被力能角抵有力之人人張涖所拉氣將絶持木鍤擊其首見血死有司當以死刑刑部員外郎孫革奏買得救父難非暴擊王制稱五刑之理必原父子之親春秋之義原心定罪今買得幼孝宜在哀矜伏冀下中書門下商量敕旨買得尚在童年能知子道雖殺人當死而為父可哀若從沈命之科恐失原情之義宜付法司減死罪一等處分臣按論罪者必原情原情二字實古今讞獄之要道也敬宗寶厯三年京兆府有姑鞭婦至死者奏請斷以償死刑部尚書栁公綽議尊毆卑非鬬也且其子在以妻而戮其母非教也遂減死論臣按刑以弼教論罪者必當以教為主五代晉天福中刑部員外郎李象奏據刑法盜賊未見本贓推勘因而致死者故者以故殺論無故者減一等又據斷獄律云若依法使杖依數拷決而邂逅致死者勿論邂逅謂不期致死而死且彼言拷決尚許勿論此云無故郤令坐罪事理相背請今後推勘之時致死者若實無故請依邂逅勿論之義馬端臨曰有罪者拘滯囹圄官不時科決而令其瘐死此誠有國者之所宜矜閔然既曰盜賊則大者可殺小者可刑其推勘淹時而不即引伏者皆大猾巨蠧也邂逅致死而以故殺論過矣臣按人之至惡者盜賊也大則害人之命小則攫人之財誠無足矜閔者而古之制法律者推勘盜賊不見本贓而死者尚為故與無故之刑非邂逅身死者必論焉此無他盜賊之名天下之至惡者也一旦用以加諸其人非真有實情顯迹者不可也欲知其實情顯迹必須窮其黨與索其贓仗焉蓋為劫盜必有黨與必持器仗必得貨財貨財物物同也器仗家家有也黨與人人可指也今獲盜焉併與其黨與器械貨財而得之其真耶偽耶吾不得而知也欲加人以惡名而致之於死地烏可以輕易乎哉是故不可以盛怒臨之俾之得以輸其情也不可以嚴刑加之俾之得以久其生也輸其情則真偽可得而見久其生則是非可因而知是以驗其黨與必歷審其家世居止性習之異離合聚散圗謀之由驗其贓仗必詳究其製造物色形狀之殊小大新陳利鈍之實某物因某而得某人因某而來某執某器械某得某貨財所經由也何處所證見也何人既訪諸其鄰保又質諸其親屬及其追贓也必俾失主先具其所失之物其形狀如何其色樣如何或大或小或長或短或新或陳某物乃某工所製某物從某人而得所失之物與所得之贓較勘皆同必須無一之參錯互異然後坐以罪焉則我心盡而彼心服矣仰惟我祖宗朝儀最為嚴肅雖犯反逆大罪亦不當朝引見惟於所獲強盜則連贓仗引赴御前非無意也蓋恐不逞之徒誣執平人以希升賞使有寃者得以對天籲告不至為人所隔絶也嗚呼聖祖之心天地之心也為臣子者所當深體宋太宗端拱中廣安軍民安崇緒告其繼母馮為父知逸所離今馮奪父資産欲與已子大理定崇緒訟母罪死太宗疑之判大理寺張佖固執前斷遂下臺省議徐鉉議謂崇緒詞理雖繁但當定其母馮曽離與不曾離右僕射李昉等議曰崇緒為馮強占田業親母阿蒲衣食不充所以論訴若從法寺斷死則知逸何辜而絶嗣阿蒲無地而托身臣等參詳田業並合歸崇緒馮亦合與蒲同居終身供侍不得有闕馮不得擅自貨易莊田并本家親族亦不得來主崇緒家務如是則男雖庶子有父業可安女雖出嫁有本家可歸阿馮終身亦不乏飬詔從昉等議佖等各罰一月俸臣按徐鉉謂但當定其母馮曾離與不曾離斷此獄者當以此言為主若是馮氏已離異則與安氏義絶不當得其田業况其所生之子乎崇緒訟之宜也若本不曾離異則是崇緒以庶子而訟嫡母當以死罪又何可疑觀崇緒訟馮占父資産欲與已子而李昉等亦謂女雖出嫁有本家可歸阿馮終身不乏養不知所謂已子者果知逸所生乎或前夫之子乎抑知逸死後而阿馮再嫁所生乎審是前子則固不當得安氏田業若是再嫁有所生則馮於安氏決無可復歸之理允若茲則佖與昉所議皆未必為得然則斷是獄也奈何曰若安知逸本不曾離阿馮而崇緒妄以為離非但得罪於母且得罪於父以子告母倫理何在坐以死宜也官司原情定罪閔知逸之絶祀而崇緒為親母乏養而訴嫡母情非為已亦有可矜聞之于上姑從輕減可也仁宗天聖四年詔曰朕念生齒之蕃抵冒者衆法有髙下情有輕重而有司巧避微文一切致之重辟豈稱朕好生之志哉其令天下死罪情理可矜及刑名疑慮者具案以聞有司勿得舉駁其後雖法不應奏吏當坐罪者審刑院貼奏率以恩釋為例名曰貼放吏始無所牽制讞者多得減死臣按罪而至於死死則不可復生矣法官明知其人之不應死而其所犯者罹于死之刑遂加以死刑焉是何也拘於文而恐為有司舉駁故也仁宗此詔可為後世法神宗熙寧初登州有婦阿云母服中嫁韋氏一作聘惡其夫陋謀殺不死按問欲舉自首審刑院大理寺論死用違律為婚奏裁敇貸其死知登州許遵奏引律因犯殺傷而自首得免所因之罪仍從故殺傷法以謀為所因當用按問欲舉條減二等刑部定如審刑大理遵不服請下兩制詳詔翰林學士司馬光王安石同議二人議不同遂各為奏光議是刑部安石議是遵詔從安石所議而御史中丞滕甫請再議詔送翰林學士吕公著知制誥錢公輔重定公著等議如安石詔曰可法官齊恢等皆以公著所議為不當又詔安石與法官集議恢等益堅其説明年二月詔今後謀殺人自首并奏聽敕裁判刑部劉述奏詔書未盡封還中書王安石時為參知政事又奏與唐介等數爭議帝前卒從安石議劉述等又請中書樞密院合議中丞吕誨御史劉琦皆請如述奏下之二府文彥博以為殺傷者欲殺而傷也即已殺者不可首吕公弼以為殺傷於律不可首請自今已殺傷依律其從而加功自首即奏裁陳升之韓絳議與安石略同司馬光曰執條據例者有司之職也原情制獄者君相之事也分爭辨訟非禮不決禮之所去刑之所取也阿云之事以禮觀之豈難決之獄哉彼謀殺為一事為二事謀為所因不為所因此苛察繳繞之論乃文法俗吏之爭豈明君賢相所當留意耶今議論嵗餘而後成法終為棄百代之常典悖三綱之大義使良善無告姦凶得志豈徇其枝葉而忘其本根之致耶臣按宋朝制刑有律有敕阿云之獄既經大理審刑刑部又經翰林中書樞密名臣如司馬光王安石吕公著公弼文彥博唐介法官如劉述吕誨劉琦錢顗齊恢王師元蔡冠卿議論紛紜迄無定説推原所自皆是爭律敕之文謀與殺為一事為二事有所因無所因而已由是以觀國家制為刑書當有一定之制其立文之初當須斟酌穩當必不可以移易然後著於簡牘使執其文而施之用者如持衡量然輕重多寡不可因人而上下斯為得矣然則阿云之獄何以處之曰司馬氏固云分爭辨訟非禮不決臣請決之以禮夫夫婦三綱之一天倫之大者阿云既嫁與韋則韋乃阿云之天也天可背乎使韋有惡逆之罪尚在所容隱今徒以其貌之醜陋之故而欲謀殺之其得罪於天而悖於禮也甚矣且妻之於夫存其將之之心固不可况又有傷之之迹乎諸人之論未有及此者司馬氏始是刑部其後有棄常典悖三綱之説然隱而未彰也臣故推衍其義以斷斯獄元豐中宣州民葉元以同居兄亂其妻而殺之又殺兄子而強其父與嫂約契不訟於官鄰里發其事州以情理可憫為上請審刑院奏欲貸其死上曰罪人已前死姦亂之事特出葉元之口不足以定罪且下民雖為無知抵法冒禁固宜哀矜然以妻子之愛既殺其兄仍戕其姪又罔其父背逆天理傷害人倫宜以毆兄至死律論臣按刑者弼教之具教以天理人倫為本茍背逆天理傷害人倫則得罪於名教大矣置之於死夫復何疑神宗而為此言可謂至明也已矣夀州民有殺妻之父母兄弟數口者州司以不道緣坐其妻子刑部駁之曰毆妻之父母即是義絶况是謀殺不當坐其妻又莆田民楊訟其子婦不孝官為逮問則婦之父為人毆死楊亦與焉坐獄未竟遇赦免婦仍在其家判官姚珤以為婦雖有父讐然既仍為婦則當盡婦禮欲併科罪攝守陳振孫謂父子天合夫婦人合人合者恩義有虧則已在法諸離異皆許還合獨於義絶不許者謂此類也况兩下相殺尤義絶之大者乎初問楊罪時合勒其婦休離當離不離則是違法且律文違律為婚既不成婚即有相犯並同凡人今此婦合比附此條不合收坐臣按刑以弼教刑言其法教言其理一惟制之以義而已義所不當然則入于法義所當然則原于理故法雖有明禁然原其情而於理不悖則當制之以義而不可泥於法焉夫父子夫婦皆人倫之大綱然原其初終是生身之恩重於伉儷之義蓋女子受命於父母後有夫因夫而有舅姑異姓所以相合者義也義既絶矣恩從而亡無恩無義人理安在哉此法所以必原於理而所以為理法之權者義而已矣哲宗元符中刑部言祖宗以來重失入之罪所以恤刑紹聖之法以失出三人比失入一人則是一嵗之中偶失出罪死三人即抵重譴夫失出臣子之小過好生聖人之大德請罷理官失出之責使有司讞議之間務令忠恕從之臣按宋朝重深入之罪而失出者不罪焉此書與其殺不辜寧失不經之意也後世失入者坐以公罪而失出者往往問以為贓是以為刑官者寧失入而不敢失出蓋一犯贓罪則終身除名犯公罪者可以湔除而無後患故也髙宗紹興二十六年詔申嚴州郡妄奏出入人死罪之禁右正言凌哲上疏言漢髙祖入關約法三章殺人者實居首焉司馬光有言殺人者不死雖堯舜不能致治竊見諸路州軍勘到大辟雖刑法相當者類以為可憫奏裁無他居官者無失入坐纍之虞為吏者有放意鬻獄之事貸死愈衆殺人愈多非辟以止辟之道也欲望特降睿旨應今後州軍大辟若情犯委實疑慮方得具奏若將别無疑慮情非可憫奏案輒引例減貸以破正條並許臺官彈劾嚴置憲典上覽奏曰但恐諸路滅裂實有疑慮情理可憫之人一例不奏有失欽恤之意臣按洪邁有言州郡疑獄許奏讞蓋朝廷之仁恩然不問所犯重輕及情理蠧害一切縱之則為壞法雖然人心所見不同而其所議擬之獄未必皆當或似是而非或似非而是茍非取裁於上焉能決斷必欲立為一定之法不許輕易奏讞則所失入者多矣髙宗曰但恐諸路實有疑慮情理可憫之人一例不奏有失欽恤之意仁者之言哉孝宗乾道四年臣僚言民命莫重於大辟方煆錬時何可盡察獨在聚録之際官吏聚於一堂引囚而讀示之死生之分決於頃刻而獄吏憚於平反摘紙疾讀離絶其文嘈噆其語故為不可曉之音造次而畢呼囚書字茫然引去指日聽刑人命所干輕忽若此臣請於聚録時委長吏點無干礙吏人先附囚口占責狀一通覆視獄案果無差殊然後亦點無干礙吏人依句宣讀務要詳明令囚通曉庶幾無辜者無憾寃枉者獲伸臣按民之有罪固有明知而故犯者然而愚騃不審而冒抵刑禁者亦往往有之鞫問之際彼既不能自直聚録之頃而官司又不與之辨明則含寃於地下矣以上謹詳讞之議大學衍義補卷一百八
