body:
  text: 大學衍義補卷一百四十八明丘濬撰治國平天下之要馭外蕃修攘制御之䇿上詩序曰文武以天保以上治內采薇以下治外始於憂勤終於逸樂臣按或處乎內或居乎外天造地設而以山川為之疆域所以别生分類而使之毋相混淆毋相侵越也是以自古聖帝明王必嚴內外之辨所以治內者必詳必慎而無一事之不備所以治外者必嚴必密而無一隙之可乘此其所以憂勤於其始而逸樂於其終也歟又曰小雅盡廢則四夷交侵中國微矣孫覺曰小雅王道之序凡其所言皆紀綱人倫惠養萬物君臣相遇以誠而知羣下之樂苦遣使勞還恩意愈篤反覆以自治為先故能周道中興夷狄逺迹夫以夷狄之患雖盛王所不能免惟知自治者為能勝之臣按孟子謂王者之迹熄而詩亡推而言之可見王道盛時治迹昌熾而詩之為詩所以宣暢歌詠於朝廷燕饗之際歡欣和恱以通羣下之情恭敬齋莊以發先王之德者無非和平正大之音內治既修而外治無不舉自小雅之詩廢則內治不修矣內治不修則紀綱廢弛政教乖亂又何以治外哉又曰宣王能內修政事外攘夷狄復文武之竟土修車馬備器械復會諸候於東都臣按成康既沒周室漸微八世而厲王胡暴虐周人逐之出居於彘儼狁內侵逼近京邑宣王即位內修政事外攘夷狄遂使文武成康之盛復其舊焉夫以帝王為治先內而後外必內之政事既無不修然後外之夷狄攘斥焉是知內修者外攘之本也漢文帝時太子家令鼂錯言臣聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水山林積石經川常流之水丘阜草木所在此步兵之地也車騎二不當一土山丘陵曼衍相屬平原廣野此車騎之地也步兵十不當一平陵相逺川谷居間仰髙臨下此弓努之地也短兵百不當一兩陳相近平地淺草可前可後此長戟之地也劍楯三不當一萑音完葦竹蕭蒿也草木蒙籠枝葉茂接此矛鋋鐵把之地也長戟二不當一曲道相伏險厄相薄此劍楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集趨利弗及避難不畢前擊後解與金鼓之音相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒禓同努不可以及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也五不當一臣按錯此言地形各有所宜與夫兵卒相當之數而卒歸其過於不習勒卒將不省兵夫將能省兵則器械無不利矣卒能習勒則兵無不可用矣錯又言曰臣聞小大異形強弱異勢險易異備夫卑身以事強小國之形也合小以攻大敵國之形也以蠻夷攻蠻夷中國之形也令胸奴地形技藝與中國異上下山阪出入溪澗險道傾仄古側字且馳且射風雨罷勞飢渴不困此胸奴之長技也若夫平原易地輕車突騎徑弩長戟射疏及逺堅甲利刃長短相雜遊弩往來什伍俱前材官騶矢之善者發矢道同的同一中的下馬地鬬劍戟相接去就相薄迫也此中國之長技也然兵凶器戰危事以大為小以疆為弱在俯仰之間耳夫以人之死爭勝跌而不振則悔之無及也帝王之道出於萬全令降胡義渠來歸誼者飲食長技與胸奴同可賜之堅甲絮衣徑弓利矢益以邉帥之良騎令明將能知其習俗和輯其心者以陛下之明約將之即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏而各用其長技衡橫也加之以衆此萬全之術也臣按錯謂兵凶戰危以大為小以強為弱在俯仰之間臣愚以為用兵之變豈但大小強弱之間可易置而已哉生死興亡在呼吸頃耳其蹉跌也不但不振而已其為悔也何可及哉是以帝王之道必出於萬全必先事而深思不臨事而後悔也宣帝元康三年先零羌與諸羌解仇交質上以問充國對曰羌人所以易制者以其種自有豪數相攻擊勢不一也哀帝建平中胸奴單于上書願朝哀帝以問公卿亦以為虛費府帑可且勿許揚雄上書諌曰六經之治貴於未亂兵家之勝貴於未戰二者不可不察也胸奴本五帝所不能臣三王所不能制以秦始皇之強蒙恬之威帶甲四十餘萬然不敢窺西河乃築長城以界之會漢初興以髙祖之威靈三十萬衆困於平城士或七日不食時竒譎之士石大也又堅固也畫計策之臣甚衆卒其所以脫者世莫得而言也髙后時胸奴悖慢大臣權書遺之然後得解及孝文時胸奴侵暴北邉候騎至雍甘泉京師大駭發三將軍屯細栁棘門霸上以備之數月乃罷孝武即位設馬邑之權欲誘胸奴徒費財勞師一虜不可得見况單于之面乎其後乃大興師數十萬使衛青霍去病操兵前後十餘年於是浮西河絶大幕破置顔襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨瀚海胸奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望胸奴地名之北哉以為不一勞者不久佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山胸奴中山之壑而不悔也至太始之初胸奴有桀心欲掠烏孫侵公主乃發五將之師十五萬騎以擊之時鮮有所獲徒奮揚威武明漢兵若風雷耳雖空行空反尚誅兩將軍故北狄不服中國不得髙枕安寢也至元康神爵之間胸奴內亂五單于爭立日逐呼韓邪攜國歸死扶伏匍匐稱臣然尚羈縻之計不顓制自此之後欲朝者不拒不欲者不強何者外國天性忿鷙形容魁健負力怙氣難化以善易肄以惡其強難詘其和難得故未服之時勞師逺攻傾國殫貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也胸奴真中國之堅敵前世重之滋甚未易可輕也今單于歸義懷款誠之心欲離其庭陳見於前此乃上世之遺䇿神靈之所想望國家雖費不得已者也奈何距以來厭之辭疏以無日之期消往昔之恩開將來之隙百年勞之一日失之費十而愛一臣竊為國不安也惟陛下少留意於未亂未戰以遏邊萌之禍臣按揚雄此書前漢所以處胸奴者備於此矣但其所謂單于歸義陳見于前以為乃上世之遺䇿神靈之所想望則過矣夫荒服之外禮教所不及者聖王所不臣必欲使冠帶以列位稽顙而來朝以此為遺後之䇿以此為足以慰神靈之想望是乃秦皇漢武夸大喜功之私心非帝王大中至正之道也王莽時胸奴入雲中塞諸將在邊未敢出擊嚴尤諫曰胸奴為害所從來久矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上䇿者也周得中䇿漢得下䇿秦無䇿焉當周宣王時玁狁內侵至於涇陽命將征之盡境而還其視胸奴之侵譬猶蚊虻之螫驅之而已故天下稱明是為中策漢武選將練兵約齎輕糧深入逺戌雖有克獲之功胡輒報之兵連禍結三十餘年中國罷耗胸奴亦創艾而天下稱武是為下䇿秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起于負海強境既完中國內竭以喪社稷是為無䇿劉貺曰嚴尤辨而未詳班固詳而未盡推其至當周得上䇿秦得其中漢無䇿何以言之荒服之外聲教所不逮其叛不為之勞師其降不為之釋備嚴守禦險走集使其欲為寇而不能欲為臣而不得也惠此中夏以綏四方周之道也故曰周得上䇿易稱王侯設險以守其國築長城守障塞所以設險也趙簡子起長城燕秦亦築長城以限中外秦兼天下益理城塹城全國滅人歸咎焉後魏築長城議者以為人治一步方三千里役三十萬人不旬朔而獲久逸故曰秦得中䇿漢以宗女嫁胸奴而髙祖亦審魯元不能止趙王之逆謀謂能息胸奴之叛非也且冒頓手殺其親而冀其不與外祖爭強豈不惑哉然則知和親非久安計而為之者以天下初定紓嵗月之禍耳武帝時中國乂安北寇益希疏而絶之此其時也方更縻耗華夏連兵積年故嚴尤以為下䇿臣按嚴尤謂後世征戎有三䇿謂周得中䇿漢得下䇿秦無䇿焉不知其所謂上䇿者果何代有之乎意者必如虞之無怠無荒而四夷來王周之明王慎德而四夷咸賔然後為上䇿乎夫虞周之事化之也非征之也若夫命將征之之䇿臣竊以為儼狁來侵從而禦之驅之出境不復窮追周得上䇿矣秦之築長城急於成功輕用民力內竭中國以喪社稷固為無䇿然使其能因近邉之人當農隙之時以漸而修築邉牆以禦戎馬之衝突劉貺謂之得中䇿亦非也漢武之窮兵黷武兵連禍結三十餘年謂之下策也宜哉雖然漢人出塞之兵猶因其犯邉而征之也後世乃有彼本不犯邊而出其不意以掩襲之者豈非無䇿之甚哉又出漢人之下矣順帝永和五年南胸奴吾斯車紐等反冦西河詔度遼將軍馬續招降之大將軍梁商移書續等曰中國安寧忘戰日久良騎野合交鋒接矢決勝當時戎狄之所長而中國之所短也強弩乘城堅營守固以待其衰中國之所長而戎狄之所短也宜務先所長以觀其變設購開賞宣示反悔勿貪小功以亂大謀臣按中國與外國各有所長吾惟用吾之長而於彼之所長也恆思有以避之設法用計隨時趨勢使彼違所長而以吾所長乘而陵之鮮不勝矣唐太宗貞觀二年北頡利政亂薛延陀回紇等叛之頡利不能制會大雪羊馬多死民大飢鄭元璹使還言於上曰戎狄興衰皆以羊馬為候今突厥民飢畜瘦將亡之兆也羣臣多勸上乘間擊之上曰背盟不信利災不仁乘危不武縱其種落盡叛六畜無餘朕終不擊必待有罪然後討之臣按太宗此言得帝王之道大哉王言天地之心也貞觀四年西突厥種落散在伊吾詔以李大亮為安撫大使貯糧磧口以賑之大亮言欲懷逺者必先安近中國如本根四夷如枝葉疲中國以奉四夷猶拔本根以益枝葉也今招至西突厥但見勞費未見有益况西河州縣蕭條不堪供億不如罷之其或自立君長求內屬者羈縻受之使居塞外為中國藩蔽此乃施虛惠而收實利也上從之臣按大亮此言既知所輕重又知所內外朝廷用若人以安撫外夷豈徒外夷得其安哉而中國亦將賴之也貞觀十八年突厥候利苾可汗北渡河薛延陀惡之數相攻候利苾有衆十萬不能撫禦其衆悉南渡河請處於勝夏之間上許之羣臣皆曰陛下方逺征遼左而置突厥於河南距京師不逺豈得不為後慮願留鎮洛陽遣諸將東征上曰彼亦人耳其情與中夏不殊人主患德澤不加不必猜忌異類蓋德澤洽則四夷可使如一家且彼不北走薛延陀而南歸我其情可見矣候利苾既失衆輕騎入朝上以為右武衛將軍胡寅曰子貢問博施濟衆堯舜其猶病諸四海至廣矣施必極其博濟必周於衆聖人心所欲也而勢有所弗及爾是故先王畿次中夏外四夷雖一視同仁然必篤近而舉逺也於是畫為五服要荒在外為之限禁自堯舜三代皆不敢廢夫聖人之心與天地同試必不為猜忌也而太宗所見特異乎此是以二帝三王有所未盡耶夫厚遇降人則於中國將薄矣推誠異類則於可信者將疑矣是以有征遼造舟之擾絶昏仆碑之失蓋必然之理也臣按胡氏所言非但為唐太宗也萬世人君皆當留念焉貞觀二十一年回紇諸部皆來朝請吏詔以為六府七州各以其酋長為都督刺史各賜金繒遣之諸酋長奏請以回紇以南突厥以北開一道謂之參天可汗道置六十八驛上許之於是北荒悉平范祖禹曰舜曰而難任人蠻夷率服又曰無怠無荒四夷來王蓋柔逺能邇治內安外而殊俗之民嚮風慕義不以利誘不以威脅而自至矣故不勞民不費財至於後世之君或雔疾而欲殄滅之或愛恱而欲招來之是二者皆非也何則彼亦人類也王者於天地間無所不養况人類而欲殘之乎殘之固不可况不能勝而自殘其民乎仁人之所不為也為之者秦始皇是也山川之所限風氣之所移得其地不可居得其民不可使列為州縣是崇虛名而受實弊也且得之既以為功則失之必以為恥不在於己則在子孫故有征伐之勞餽餉之煩民不堪命而繼之以亡隋煬帝是也且國家地非不廣也民非不衆也曷若修德行政以惠養之使男有餘粟女有餘布兵甲不試以致太平不亦帝王之盛美乎夫有求於外如彼其難也無求於外如此其易也然而人君常捨所易而行所難何哉忽近而喜逺厭故而謀新雖或未至於亡而常與之同事其纍德豈細哉太宗好大無窮兼蓄夷夏非所以遺後嗣安中國之道此當以為戒而不可慕也臣按范氏此論人主宜留心玩味則知內外之所關係孰輕孰重孰緩孰急孰是孰非瞭然於心目之間而為之去取從違則內安而外靖本固而末順矣德宗時陸贄上言曰陛下忿蕃醜之暴掠懲邉鎮之空虛繕甲益兵庇人保境此誠雄武之英志覆育之仁心刷憤恥而揚威聲海內咸望有必攻之期矣既而統師無律制事失權戍卒不𨽻於守臣守臣不總於元帥至有一城之將一旅之兵各降中使監臨皆承别詔委任分鎮亘千里之地莫相率從沿邊列十萬之師不設謀主每至敵人犯境方馳書奏取裁行李往來動輸旬日比蒙徴發救援冦已獲勝罷歸小則蹂藉麥禾大則驅掠人畜是乃益甲兵而費財用竟何補侵軼之患哉夫將貴専謀軍尚氣勢訓齊由乎紀律制勝在於機權是以兵法有分閫之辭有合拳之喻有進退如一之令有便宜從事之規故能動作協變通制備垂永久出則同力居則同心患難相交急疾相赴兵之奉將若四支之衛頭目將之守境若一家之保室廬然後可以扞寇讎護氓庶蕃畜牧闢田疇天子惟務擇人而任之則髙枕無虞矣吐蕃之比於中國衆寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令在將而我之節制在朝彼之兵衆合并而我之部分離析則紀律不一而氣勢不全節制在朝則謀議多端而機權多失臣故曰錯置乖當此之謂乎臣按贄謂吐蕃之比於中國多寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令在將我之號令在朝彼之兵衆合并而我之部分離析此非特當時蕃漢用兵之弊而今世沿邉將領所以守邉而禦敵其實與之無異焉善為國者尚思其所以然而豫為之圖豈非邊鄙生靈之幸哉贄又言曰戎狄為患自古有之其於制禦之方得失之論備存史籍可得而言大抵尊即敘者曰非德無以化要荒曾莫知威莫立則德不能馴也樂武威者曰非兵無以服凶獷曽莫知德不修則兵不可恃也務和親者曰要結可以睦鄰好曽莫知我結之而彼復解之也美長城者曰設險可以固邦國而扞寇讎曽莫知力不足而人不堪則險之不能恃城之不能有也尚薄伐者曰驅遏可以禁侵暴而省征徭曽莫知兵不鋭壘不完則遏之不能勝驅之不能去也議邊之要略盡於斯雖互相譏評然各有偏駁夫時勢有盛衰事機有利害措置有安危故無必定之規亦無長勝之法知其事而不度其時則敗附其時而不失其稱則成形變不同胡可専一夫以中國強盛而彼屈膝稱臣歸心受制拒之則阻其嚮化滅之則類於殺降安得不存而撫之即而敘之也又如中國強盛而彼棄信忤盟蔑恩肆毒諭之不變責之不懲安得不取亂推亡息人固境也其有遇中國喪亂之時圖之則彼釁未萌禦之則我立不足安得不卑辭降禮約好通和啖之以利以引其歡心結之以親以紓其交禍縱不必信且無大侵蓋時事亦有不得已而然也儻或強弱適同撫之不寧威之不靖力足以自保勢不足以出攻安得不設險以固軍訓師以待寇來則薄伐以遏其深入去則攘斥而戒於逺追雖非安邉之令圖蓋勢力亦不得已而然也臣按古今制禦之方不出贄所陳四者之䇿但其所謂設險以固軍訓師以待寇來則薄伐以遏其深入去則攘斥而戒於逺追以為非安邊之令圖臣竊以為中國帝王所以攘外安內之上䇿無出於此而贄以為非令圖然則圖之令者豈有過於此哉贄又曰夫制敵行師必量事勢勢有難易事有先後力大而敵脆則先其所難是謂奪人之心暫勞而永逸者也力寡而敵堅則先其所易是謂固國之本觀釁而後動者也頃屬多故民勞未瘳而欲廣發師徒深踐冦境復其侵地攻其堅城前有勝負未必之虞後有餽運不繼之患儻或撓敗適所以啓戒心而挫國威以此為安邉之謀可謂不量事勢而務於所難矣天之授者有分事無全功地之産者有物宜無兼利是以五方之俗長短各殊長者不可踰短者不可企勉所短而校其所長必殆用所長而乘其所短必安強者乃以水草為邑居以射獵供飲茹多馬而尤便馳突輕生而不恥敗亡此彼之所長也而中國乃欲益兵搜乘角力爭驅交鋒原野之間決命尋常之內以此為禦冦之術可謂勉所短而較其所長矣務所難勉所短勞費百倍終於無成雖果成之不挫則廢豈不以越天授而違地産虧時勢以反物宜者哉將欲去危就安息費從省在其慎守所易精用所長而已若乃擇將吏以撫寧衆庶修紀律以訓齊師徒耀德以佐威能邇以柔逺禁侵鈔之暴以彰吾信抑攻取之議以安戎心彼求和則善待而勿與結盟彼為冦則嚴偹而不務報復此當今之所易也賤力而貴智惡殺而好生輕利而重人忍小以全大安其居而後動俟其時而後行是以修封強守要害塹蹊隧壘軍營謹禁防明斥堠務農以足食練卒以蓄威非萬全不謀非百克不鬬寇小至則張聲勢以遏其入冦大至則謀其大以邀其歸據險以乘之多方以誤之使其勇無所加衆無所用掠則靡獲攻則不能進有腹背受敵之虞退有首尾難救之患所謂乘其弊不戰而屈人之兵此中國之所長也以長制短則用力寡而見功多以易敵難則財不匱而事速就捨此不務而反為所乘斯謂倒持戈矛以鐏授冦者也贄又曰守封未固冦戎未懲者其病在於謀無定用衆無適從所任不必才才者不必任所聞不必實實者不必聞所信不必誠誠者不必信所行不必當當者不必行故令措置乖方課責虧度財匱於衆愛力分於將多怨生於不均機失於遙制又曰理兵而措置乖方馭將而賞罰虧度制用而財匱建軍而力分養士而怨生用師而機失此六者強埸之蟊賊軍旅之膏肓也蟊賊不除而但滋之以糞溉膏肓不療而茍啖之以滑甘適足以養其害速其災欲求稼穡豐登膚革充美固不可得也臣按贄此言雖為一時人君告然而自古及今守封所以未固冦戎所以未懲正坐此六者之失若夫所謂所任不必才才者不必任所聞不必實實者不必聞所信不必誠誠者不必信所行不必當當者不必行又不止於用兵禦冦而已也後世人主所以應用不得其人而紀綱廢弛處制不得其宜而政治乖張皆以此也然則人君為治必欲任得其才聞者必實信者必誠行事必當其道何繇曰君子大居敬而貴窮理贄又曰今四夷之最強盛為中國甚患者莫大於吐蕃舉國勝兵之徒才當中國十數大都而已其於內虞外備亦與中國不殊所能寇邉數則蓋寡且又器非犀利甲不堅完識迷韜鈴藝乏趫敏動則中國懼其衆而不敢抗靜則中國憚其強而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥専一故也夫統帥専一則人心不分人心不分則號令不二號令不二則進退可齊進退可齊則疾徐如意疾徐如意則機會靡愆機會縻愆則氣勢自壯斯乃以少為衆以弱為強變化翕闢在於反掌之內是猶臂之使指心之制形若所任得人則何敵之有夫節制多門則人心不一人心不一則號令不行號令不行則進退難必進退難必則疾徐失宜疾徐失宜則機會不及機會不及則氣勢自衰斯乃勇廢為尫衆散為弱逗撓離析兆乎戰陳之前是猶一國三公十羊九牧欲令齊肅其可得乎開元天寶之間控禦西北兩蕃惟朔方河西隴右三節度而已猶慮權分勢散或使兼而領之自頃割裂誅鋤所餘無幾而又分朔方之地凡三使焉其餘鎮軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相稟屬每候邉書告急方令計會用兵既無軍法下臨惟以客禮相待是乃從容拯溺揖遜救焚冀無占危固亦難矣夫兵以氣勢為用者也氣聚則盛散則消勢合則威析則弱今之邉備勢弱氣消建軍若斯可謂力分於將多矣臣按三軍以氣勢為用氣勢以人心為主人心不分則氣勢自壯氣勢既壯則事權歸一可以折衝於內而制勝於外矣陸贄論將權之専分而以氣勢壯衰為言蓋真有見也大學衍義補卷一百四十八
