body:
  text: 大學衍義補卷七十九明丘濬撰治國平天下之要崇教化躬孝弟以敦化商書伊訓曰立植也愛惟親立敬惟長始于家邦終于四海蔡沈曰孝弟者人心之所同非必人人教詔之立愛敬於此而形愛敬於彼親吾親以及人之親長吾長以及人之長始于家達于國終而錯之天下矣臣按先儒有言孝弟之道達之天下而謂之立者盡吾愛敬之道於此使天下之愛其親者莫不視我以為法盡吾敬長之道於此使天下之敬其長者莫不視我以為凖此即所謂建中建極也愛敬之道既立於此則愛敬之化必形於彼始而一家次而一國終而四海之大莫不各有親也各有長也亦莫不有愛敬之心也觀感興起孝弟之心油然而生則各親其親各長其長而天下平矣臣惟天生人君而付之以肇修人紀之任必使三綱六紀皆盡其道然後不負上天之所命然其所以肇修之端則在乎愛敬焉愛敬既立則由家而國而天下天下之人無不愛其親敬其長人人親親而長長家家能愛而能敬天下之人皆由吾君一人植立以感化之也禮記子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命孝以事親順以聽命錯諸天下無所不行葉夢得曰君子無不愛也自親而推之則有殺故以愛親為始君子無不敬也自長而推之則有等故以敬長為始始乎親而達其教於天下凡有親者莫不敦愛而相顧也故曰教以慈睦而民貴有親始乎長而達其教於天下凡有上者莫不用命而相尊也故曰教以敬長而民貴用命親親長長君子所自立而效至於天下平故曰錯諸天下無所不行臣按人君之愛其親敬其長盡吾為人子為人少之禮耳而非欲人之貴有親貴用命而為之也然而天下之人見吾愛吾之親敬吾之長則曰以萬乘之尊四海之富猶且盡為人子之禮以愛其親盡為人少之禮以敬其長况吾儕小人哉於是咸知以愛親為事而敬其貴於是由己父之親而推之凡一家之親不敢以不愛焉咸知以敬長為事而用其命於是由己兄之命而推之凡在上之命無不順焉是則人君之愛敬行之於一家自然有以錯之於天下之大此無他以心感心天下無異心因化致化天下無異化故也孝經子曰先王有至德要道以順天下民用和睦上下無怨夫孝德之本也教之所由生也教民親愛莫善於孝教民禮順莫善於弟禮者敬而已矣故敬其父則子悅敬其兄則弟悅敬一人而千萬人悅所敬者寡而悅者衆此之謂要道君子之教以孝也非家至而日見之也教以孝所以敬天下之為人父者教以悌所以敬天下之為人兄者君子之事親孝故忠可移於君事兄弟故順可移於長居家理故治可移於官故雖天子必有尊也言有父也必有先也言有兄也孝悌之至通於神明光於四海無所不通臣按孝經孔曾問答之言而曾氏門人所記者也首言孝為至德要道而教之所由生因孝而推言及悌蓋以孝者必悌未有孝而不悌者也教以孝以敬天下之父教以悌以敬天下之兄敬一人而千萬人悅推其極以至於通神明光四海是則孝悌雖曰為治之要道其實人君之至德也而德之所以為德則以敬為本焉論語有子曰其為人也孝弟而好犯上謂干犯在上者鮮少也矣不好犯上而好作亂謂悖逆爭鬬之事者未之有也君子務本本立而道生孝弟也者其為仁之本與朱熹曰善事父母為孝善事兄長為弟言人能孝弟則其心和順少好犯上必不好作亂也仁者愛之理心之德也為仁猶曰行仁與者疑辭謙退不敢質言也言君子凡事專用力於根本根本既立則其道自生若上文所謂孝弟乃是為仁之本學者務此則仁道自此而生也臣按人之生也得天地之理以為性性之中則具此仁焉具此仁理自然便有此和順之德故孩提之童無不知愛其親及其長也無不知敬其兄是則所謂孝弟也孝弟出於良心自然不為逆理亂常之事君子知其然凡事必務於根本根本既立然後推之以仁民愛物無一民不得其生無一物不得其性皆由乎一念之仁而一念之仁則起於愛親而敬兄也大學曰上老老所謂老吾老也而民興感發而興起孝上長長而民興弟上恤孤幼而無父之稱而民不倍是以君子有潔度也矩所以為方之器之道也朱熹曰言此三者上行下效捷於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之間各得分願則上下四㫄均齊方正而天下平矣臣按朱熹嘗言大學先說上行下效則潔矩處是就政事上說若但興起其善心不使得遂其心雖能興起亦徒然耳如政煩賦重不得養其父母畜其妻子安得遂其善心須是推己之心以及於彼使彼仰足以事俯足以育方能使人興起者聖人之化也然有以化之而所以推己處之者可無其則乎所謂則者矩也矩者所以為方之器也先儒謂匠欲為方必先度之以矩欲平天下者以何物為矩而度之邪亦惟此心而已我心所欲即人心所欲我欲老吾老長吾長而人亦欲老其老長其長吾即推吾之所以欲老老長長之心而度天下之人心知其心所欲老老長長而無異於我也以我之心度彼之心吾之老者吾老之使之得以安其老吾之長者吾長之使之得以遂其長吾既得以遂吾老之長之之心而彼之有老有長者亦得以遂其老之長之之願而為其老者長者又皆安其老遂其長無一人之不得其所無一家之不如其意無有廢而不舉之處無有偏而不均之患人人皆然家家皆然推之於國而國亦然推之於天下而天下亦莫不然古之所謂明明德於天下者其端實在於此蓋德者人之所得乎天而虗靈不昧以具衆理而應萬事者也心德之全在於仁而行仁之本先乎孝弟親親而仁民仁民而愛物行之之端於是乎啓處之之則於是乎周治國平天下之要道孰有加於此哉孟子曰謹庠序之教申重也丁寧反覆之意之以孝弟之義頒與班同老人頭半黑白者白者不負任在背戴任在首於道路矣朱熹曰庠序皆學名也夫民衣食不足則不暇治禮義而飽暖無教則又近於禽獸故既富而教以孝弟則人知愛親敬長而代其勞不使之負戴於道路矣臣按先儒有言古者道路之間輕任并重任分班白者不提挈不特子弟代父兄之勞凡行道之人少者皆分代老者之任行道者如此則居家者可知於其家者既能孝弟如此則其於國者必能尊君親上矣若是者豈非庠序設教之功哉然學校之設所以明倫人倫非止於親長也而聖賢之論立教者莫不以孝弟為先焉孟子告齊梁之君又欲其於孝弟之義深致其丁寧反覆之意蓋以孝弟者人心之所同人人親其親長其長而天下平平天下之要道實有在於斯焉孟子曰道在邇而求諸逺事在易而求諸難人人親其親長其長而天下平朱熹曰親長在人為甚邇親之長之在人為甚易而道初不外是也舍此而他求則逺且難而反失之但人人各親其親各長其長則天下自平矣張栻曰使人各親其親各長其長其本在人君親其親長其長以倡率之而已味此數語堯舜三王之治可得而推矣臣按先儒有言仁義根於人心所同有行之則甚近而易其要在乎親親長長但人各自親親長長則仁義流行天下豈有不平者乎張栻謂味此數語堯舜三王之治可得而推則是唐虞三代之治所以後世不及者以人人有士君子之行也人人有士君子之行則溥天之下無一人而不孝不弟焉孝弟者行仁義之本仁義充塞於天下豈非雍熙泰和之世乎孟子曰仁之實事親是也義之實從兄是也朱熹曰仁主於愛而愛莫切於事親義主於敬而敬莫先於從兄故仁義之道其用至廣而其實不越於事親從兄之間蓋良心之發最為切近而精實者有子以孝弟為為仁之本其意亦猶是也臣按孔門傳授以孝弟為仁義之實而施於政治者必本仁義而仁義之推行必始於孝弟孔子曰惟孝友于兄弟施于有政曾子曰孝者所以事君弟者所以事長上老老而民興孝上長長而民興弟而孟子於是二者尤切切焉不一而足蓋親親長長達於天下而為仁義天下之人各親其親各長其長則仁義之效著而天下無不平治矣孟子曰堯舜之道孝弟而已矣陳氏失其名曰孝弟者人之良知良能自然之性也堯舜人倫之至亦率是性而已豈能加毫末於是哉又曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無他達之天下也朱熹曰良者本然之善也孩提二三嵗之間知孩笑可提抱者也愛親敬長所謂良知良能也親親敬長雖一人之私然達之天下無不同者所以為仁義也臣按為治之道不外乎仁義而仁義必先於孝弟蓋人人皆有愛親之心所以愛親者即仁也人人皆有敬長之心所以敬長者即義也親者吾之私親吾愛吾之親若私也然而通之天下之人亦莫不愛其私親與吾之所以愛吾之親者無以異使有一人之不愛焉非所以為仁也兄者吾之私長吾敬吾之兄若私也然而達之天下之人亦莫不敬其私兄與吾之所以敬吾之兄者無不同使有一人之不敬焉非所以為義也噫良心出於一人之私仁義通之天下之大因心為治天下之平其端在此矣王制凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之孔頴達曰人君養老有四一是養三老五更二是子孫為國難而死養其父祖三是養致仕之老四是引戶校年養庶人之老陳祥道曰虞氏以燕則以恩勝禮夏后氏以饗則以禮勝恩殷人以食則超恩禮之中周則文備故修而兼用之有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東郊養庶老於虞庠陳澔曰行養老之禮必於學以其為講明禮義之所也國老有齒有德之老庶老庶人及死事者之父母也國老尊故於大學庶老卑故於小學臣按王者之養老所以教天下之孝也而必於學者學所以明人倫也人倫莫先於孝弟老者之於君以德則君尊也以齒則老者先也人君致孝弟於其親長下之人無由以見也故於學校之中行養老之禮使得於聽聞觀感者曰上之人於夫人之老者尚致其敬如此矧其親屬乎萬乘之尊且如此吾儕小人所宜興起感發也噫老吾老以及人之老長吾長以及人之長一禮之行所費者飲食之微而所致者治效之大也月令仲秋之月養衰老授几杖行猶賜也糜粥糜亦粥也飲食陳澔曰月至四隂隂已盛矣時以陽衰陰盛為秋人以陽衰陰盛為老養衰老順時令也几杖所以安其身飲食所以養其體祭義虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也吳澄曰年即齒也四代之所貴雖有不同而其尊尚年齒則一蓋年齒之可貴於天下歷四代至於今不變故曰久矣尚齒之弟次乎事親之孝也孝弟發諸朝廷行乎道路至乎州巷放乎獀狩修乎軍旅衆以義死之而弗敢犯也孔頴達曰上文但言弟此兼云孝者以孝故能弟弟則孝之次也孝弟之道無處不行故衆行孝弟雖死不捨也吳澄曰朝廷政令所自出下民所視效故先朝廷道路民所行之處州巷民所居之處獀狩者用衆於內也軍旅者用衆於外也義謂所宜行衆人以此孝弟為所宜行者故寧死而不敢犯不孝不弟之事也祀乎明堂所以教諸侯之孝也食三老五更於太學所以教諸侯之弟也又曰食三老五更於太學天子袒袒衣而割牲制牲體為爼實執醬而饋進食也執爵而酳食畢潔口冕而總干總持干盾立於舞位所以教諸侯之弟也是故鄉里有齒而老窮不遺强不犯弱衆不暴寡此由太學來者也鄭𤣥曰三老五更互言耳皆老人更知三德五事者也方慤曰祀明堂以享帝而享必配以父所以教孝也食三老五更於太學以貴老所以教弟也由太學來者言教化之原出自太學來也臣按天子行養老之禮則下之人化之雖以鄉里閭巷之間莫不皆以齒序為尚也是以人之年老者雖耄耋困窮人知上之所敬在此也莫不尊奉敬養之而不敢遺棄舉斯心而推廣之至於强不犯弱衆不暴寡皆自人君養三老五更於太學中來也此無他本孝弟之心之所推爾周禮地官大司徒以保息六養萬民二曰養老夏官羅氏中春羅春鳥蟄而始出者獻鳩以養國老臣按天子之養老有二有國老有庶老貴胄謂之國子則貴而老者謂之國老賤者謂之庶人則賤而老者謂之庶老羅氏獻鳩以養之者國老也司徒以保息養之者庶老也漢明帝永平二年帝帥羣臣養三老五更于辟雍用其德行年耆髙者一人為老次一人為更服都紵大袍單衣皂緣領袖中衣冠進賢杖玉杖五更亦如之不杖皆齊于太學講堂其日乘輿先到辟雍禮殿御坐東廂遣使者安車迎三老五更天子迎于門屏交禮道自阼階三老升自賔階至階天子揖如禮三老升東面三公設几九卿正履天子親袒割牲執醬而饋執爵而酳祝鯁在前祝饐在後五更南面公進供禮亦如之明日皆詣闕謝恩中元元年又行此禮乃下詔曰眇眇小子屬當聖業令月元日復踐辟雍尊事三老兄事五更安車輀輪供綏執授侯王設醬公卿饌珍朕親袒割執爵而酳升歌鹿鳴下管新宫八佾具修萬舞於庭三老李躬年耆學明五更桓榮授朕尚書三老五更以二千石祿養終厥身其賜天下三老酒人一石肉四十斤有司其存耆耄恤幼孤惠鰥寡稱朕意焉馬端臨曰古人養老之禮有養於鄉者所謂五十養於鄉王命公侯伯子男及羣吏曰反養老於東序是也有養於國者天子視學設三老五更羣老之席位執醬親饋執爵親酳是也漢初每鄉及縣皆有三老嵗首則使人存問賜以束帛酒肉或賜以爵乃古人養於鄉之意而國學養老天子親講之禮則至東漢始行之臣按養老之禮則自有虞氏以來有之至周而禮始備其養老也天子視學合樂而行之春秋戰國此禮不行也久矣至漢明帝始行之歷魏晉至北朝往往舉行唐開元禮雖有其儀考之史未見其行也蓋帝王之世以孝弟為治老者近於父長者近於兄故設為視學養老之禮所以教天下之人孝弟也上之人以孝弟帥先天下之人使之皆歸於親親長長之化無一人而不親其親而孝不長其長而弟禮教日明風俗日厚天下豈有不治平者哉以上躬孝弟以敦化大學衍義補卷七十九
