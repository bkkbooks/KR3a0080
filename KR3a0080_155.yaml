body:
  text: 大學衍義補卷一百五十五明丘濬撰治國平天下之要馭外蕃四方夷落之情下漢武帝元朔三年張騫自月氏還具為天子言西域諸國風俗大宛在漢正西可萬里其東北則烏孫東則于填于填之西則水皆西流注西海其東水東流注鹽澤去長安可五千里胸奴右方居鹽澤以東至隴西長城南接羌鬲與隔同漢道焉烏孫康居奄蔡大月氏皆行國隨畜牧與胸奴同俗大夏在大宛西南與大宛同俗臣在大夏時見卭竹杖蜀布問安得此曰市之身毒身毒在大夏東南可數千里其俗土著與大夏同度大夏去漢萬二千里居漢西南今身毒又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從羌中險少北則為胸奴所得從蜀宜徑又無寇天子既聞諸國多竒物而兵弱貴漢財物誠得而以義屬之則廣地萬里重九譯致殊俗威德遍於四海欣然以騫言為然乃今騫因蜀犍為發間使四道竝出求身毒國各行一二千里其北閉氐筰南閉嶲昆明殺略漢使終莫能通騫又言于武帝曰臣居胸奴中聞烏孫王號昆莫今單于新困於漢而昆莫地空蠻夷戀故地又貪漢物誠以此時厚賂烏孫招以東居故地漢遣公主為大夫結昆弟其勢宜聽則是斷胸奴有臂也既連烏孫自其西大夏之屬皆可招來而為外臣自是西域始通於漢凡三十六國臣按此自秦漢以來通西域之始光武建武二十一年西域十八國俱遣子入侍請都護帝不許諸國侍子久留敦煌皆愁思亡歸莎車王賢知都護不出擊破鄯善鄯善王安上書願復遣子入侍請都護帝報曰今使者大兵未能得出如諸國力不從心東西南北自在也班固曰孝武之世圗制胸奴患其兼從西國結黨南羌乃表河曲列四郡開玉門通西域以斷胸奴右臂隔絶南羌月支單于失援由是逺遁而幕南無王庭矣然通西域近有龍堆逺則葱嶺身熱頭痛懸度之厄淮南杜欽揚雄之論皆以為此天地所以界别區域絶外內也西域諸國各有君長兵衆分弱無所統一雖屬胸奴不相親附胸奴能得其馬畜旃罽而不能統率與之進退與漢隔絶道里又逺得之不為益棄之不為損盛德在我無取於彼故自建武以來西域思漢威德咸樂內屬數遣使置質于漢願請都護光武逺覽古今因時之宜羈縻不絶辭而未許雖大禹之序西戎周公之讓白雉太宗之却走馬義兼之矣臣按自漢遣張騫通西域後而中國帝王當全盛時往往遣使逺通西域在漢則為大宛烏孫于闐龜兹月氏諸國在唐則為髙昌焉耆龜兹于闐天竺諸國在宋則為天竺髙昌大食于闐龜兹諸國在本朝則為哈密和卓額爾巴拉賽瑪爾堪哈里于闐諸處夫古今所謂西域者其土壤山川不改其舊但其名稱隨世更改不可一一復識别也惟所謂于闐者自漢以來至於今日恆不改其舊稱焉因此一國考史所紀方向里數步而考之似亦可以得其倣佛者矣然聖人詳於治內而略於治外因其名知其所在隨其俗而處之期為得矣正不必如漢人之遣使臣設都護置質子通昏姻求珍貨是皆無益於治亂班因所謂得之不為益棄之不為損期言盡之矣惟今所謂哈密齊勤䝉古罕都安定鄂端察遜皆前代中國之邊境所謂敦煌酒泉伊吾之故地洪武永樂中因其土酋內附立以為衛其地處吾近邊薄於北部不可槩以外國視之使為敵用是亦漢人斷胸奴臂不使得以通羌之一策也唐書吐蕃夲西羌屬蓋百有五十種散處河湟江岷間有發羌唐旄等然未始與中國通居析支水西祖曰鶻提勃悉野健武多智稍并諸羌據其地蕃發聲近故其子孫曰吐蕃而姓勃窣野宋祁曰唐興四夷有弗率者皆利兵移之蹶其身犁其庭而後已惟吐蕃號雄彊為患最久贊普遂盡盜河湟薄王畿為東境犯京師掠近輔謀夫虓帥圜視共計卒不得要領晚節自亡而唐亦衰焉臣按唐書謂吐蕃散處河湟江岷間河湟即今陜西西寧河州等處江岷即今陜西岷洮州及四川松茂等處也大明一統志西蕃即吐蕃也其先本羌屬散處河湟江岷間其酋發羌唐旄等居析支水西後有樊尼者西濟河逾積石居跂布川或邏婆川隋開皇中有論贊索者居牂牱西唐貞觀中始通中國既而滅吐谷渾盡有其地至唐末衰弱種類分散入內屬者謂之熟户餘謂之生户宋時朝貢不絶其首領唃厮羅始居鄯州後徙青唐神哲高宗朝皆授以官元憲宗始於河州置吐蕃宣慰司都元帥府又於四川徼外置碉門魚通黎雅長河西等處宣撫司世祖時復郡縣其地設官分職以吐蕃僧帕克斯巴為大寶法王帝師領之嗣者數世弟子號司空司徒國公佩金玉印本朝洪武六年詔吐蕃各族酋長舉故有官職者至京授職遂置五衙門建官賜印俾因俗為治以攝帝師納木喀巴勒藏布為熾盛佛寶國師元國公納木喀斯逹克巴勒嘉勒燦等為都指揮同知宣慰使元師招討等官自是蕃僧有封灌頂國師及贊善王闡化王正覺大乘法王如來大寶法王者俱賜印章誥命比嵗或間嵗赴京朝貢臣按吐蕃之地北起陜西之河湟迤南歷四川抵雲南西北之境洪武六年立都指揮使司者二烏思藏朵甘也指揮使司者一隴答衛也七年又置宣慰司者三朵甘及董卜韓胡長河西魚通寧逺也置招討司者六萬户府者四千户所者十有七此皆在外化之境嵗通朝貢而已自有西僧以來此屬不為邊患遇有寇盜朝遣僧諭之尋即解散若夫邊徼之內如陜西之岷州洮州四川之龍州黎州諸處人雜氐羌是皆吐蕃之種落久已內屬悉聽官府約束不復生梗惟所謂松潘者其地險隘饋餫為難生蕃頑獷屢為邊害所以遏絶之者區處未得其宜蓋其地瘠而人貧性躁而無常然俗頗尚僧請下羣臣議隨其俗以為治於今屯軍去處依岷州例建一大殺擇蕃僧中之有道行為衆所信服者授以誥印識名俾守其地每嵗遣人賞賚仍於威州或茂州立一大營退前時將卒於此守禦扼其要害通其互市如此則可以少紓蜀人輸運之苦而息邊境劫掠之患矣以上西羌漢武帝元狩元年始通滇國元封二年始置益州郡明帝永平十二年哀牢王柳貌率其民五萬户內附以其地置哀牢博南二縣唐𤣥宗開元二十六年册南詔為王蠻語謂王曰詔先有六詔莫能相統䝉舍詔最在南至皮邏閣寖彊大乃求合為一朝廷許之徙居太和城宋熙寧九年大理遣使貢方物政和九年封其酋為大理國王元憲宗二年平大理立為三十七郡世祖自西蕃入大理平雲南遣將招降其酋長遂分三十六路四十八甸皆設土官管轄以大理金齒都元帥府總之本朝洪武十七年立為麓川車里二宣慰使司此外又有孟養木邦緬甸老檛八百大甸宣慰司其與麓川車里皆是百夷之種類也蘇轍曰蠻夷之人擾邊求利其中非有大志者其類皆可以謀來也愚嘗觀於西南徼外蠻夷而求所以為變之始而至於攻城郭殺人民縱橫放肆而不可救者其積之莫不有漸也夫蠻夷之民寧絶而不與通今邊徼之上和其貨財而納之於市使邊民凌侮欺謾而奪其利長吏又以為擾民而不之禁窮恚無聊莫可告訴故其勢必至於解仇結盟攻剽蹂踐殘之於鋒鏑之間而使其志得伸也嗟夫為吏如此亦見其不知本矣通關市戢吏民待之如中國之民尚誰所激怒而為此哉自金齒過蒲縹將至怒江有屋牀山乃雲南百夷界限也髙山夾箐地險路狹馬不可並行過是山三里許即怒江渡此江即百夷地也沿河下數十里上髙黎共山即今之通衢也髙黎共山路亦頗險上二十里下一陡澗復上三十里至山巔夷人立柵為寨過寨復下四十里許平地乃麓川江上流過此則無險隘之地矣一路從怒江西上二十程至騰衝府七日許到麓川一路從雲南白崖過景束從木通甸至彎甸渡河入茫施約十日程到麓川自怒江上流䝉來渡至景東沿河小渡十數處皆可入境也臣按雲南地漢時已入中國謂為西南夷唐末為南詔所據後為䝉假二氏所有自為一國宋竟不能有之元世祖始平大理以其地內屬本朝立為藩府命黔國公世守之今其雲南楚雄臨安大理等府設置如內地而更以元江永昌之外麓川車里等處為西南夷亦猶漢時自成都而視滇池也國初止立麓川車里二宣慰司者凡七焉七者皆百夷之地而惟麓川最大且要正統中以思任發梗化降為隴川宣撫司大抵雲南之地其南以元江為關以車里為蔽而逹于八百其西以永昌為關以麓川為蔽而逹于木邦西南通緬甸底于南海東南統寧逺而接乎安南西北盡麗江而通乎吐蕃所以制馭之者與南蠻北狄不同蓋彼去中國逺甚其有叛亂不過梗化虧缺嵗貢而已不足為中國輕重也為今之計宜擇一要害地或景東或騰衝命將一員統軍於此守備嚴禁中國客啇不許擅入其地則彼不知中國虛實而不為人所扇惑引誘設為互市有所交易許其移文通譯齎載以來使彼知中國之貨難得則不敢輕自棄絶矣以上西南夷唐書髙麗東跨海距新羅南跨海距百濟西北接營州大明一統志朝鮮國周為箕子所封之國秦屬遼東外徼漢初燕人衛滿據其地武帝定朝鮮為真蕃臨屯樂浪𤣥莬四郡昭帝并為樂浪𤣥莬二郡漢末為公孫度所據傳至孫淵魏滅之晉永嘉末始為髙麗髙麗本扶餘别種其王髙璉居平壤城即樂浪郡地唐征髙麗拔平壤置安東都護府其國東徙在鴨緑水東南千餘里五代唐時王建伐髙氏闢地益廣并古新羅百濟而為一遷都松嶽以平壤為西京其後子孫遣使朝貢於宋亦朝貢遼金歷四百餘年未始易姓元至元中西京內屬置東寧路總管府畫慈悲嶺為界本朝洪武二年王顓表賀太祖即位賜以金印誥命封髙麗國王二十五年其門下侍郎李成桂主國事更名旦徙居漢城遣使請改國號詔更國號曰朝鮮其國分八道分統府州郡縣臣按髙麗自晋代建國至是八百餘年始易三姓在唐以前所謂髙麗者止是一國五代以後乃併三韓百濟而一之在勝國時猶有耽羅今耽羅亦為所有其土壤比隋唐往征之時已數倍矣然其國頗尚禮誼安分守自入國朝以來恭順朝廷四時朝貢不廢禮節蓋得小國事大之禮孟子曰畏天者保其國朝鮮有之雖然先儒有言君臣之道各欲自盡而已彼既盡夫畏天之誠則吾所以待之者可不樂天以自居哉仰惟大明麗天而萬方之逺無所不燭彼夫星羅棊布之國寸地尺天莫不在吾照臨之下而此國者依吾暘谷之隅庇吾扶桑之隂而其所得之光輝獨先于他國者非有所私近故也昔者唐太宗以英武之君親駕於樂浪𤣥莬之境而卒不得志而我朝開明堂而坐受其朝嵗時節序而使幣往來曽無虛月是故德化感召之使然而亦壤域接近之故也日本在東海之中古稱倭奴國或云惡其舊名故改名曰日本以其近日所出也吳萊曰海東之地為國無慮百數北起拘耶韓南至耶馬臺而止旁又有夷洲紵嶼人莫非倭種度皆與會稽臨海相望大者户數萬小者僅一二百里無城郭以自固無米粟以為資徒居山林捕海錯以為活漢魏之際已通中國其人弱而易制慕容廆曽掠其男女數千捕魚以給軍食其後種類繁殖稍知用兵唐攻百濟百濟借其兵敗於白江口乃逡巡斂甲而退今之倭奴非昔日倭奴也臣按皇明祖訓所列諸夷國名凡十有五而日本與焉而于其下注曰日本國雖朝貢時通奸臣謀為不軌故絶之蓋以此國其人雖粗知文字而心實狡詐海外諸蕃如占城真臘閔婆之類皆未嘗為邊境患惟此一國居海之中在勝國時許其互市自四明航海而來艨艟數十戈矛劍㦸莫不畢具出其重貨貿易即不滿所欲燔焫城郭鈔掠居民海道兵卒無以應之往往為海邊州郡害聖祖灼知其故故痛絶之當開國之初四夷賔服惟兹倭奴時或犯我海道故於山東淮浙閩廣緣海去處設為衛所居多大抵為倭故也宣德以前彼猶出沒海濵以為民害正統以後蓋罕有至者矣向時因風候遣舟師由海道以備之近乃于緣海都司委都指揮一員統其屬衛摘撥官軍專以備倭為名操習戰船以為防備是以數十年來彼知吾有備不復犯邊時或數年一來朝貢朝廷亦以其恭順之故而禮遇之噫前日之絶而今日之客非自相戾也前日之詐今日之誠也聖人何容心於其間哉大學衍義補卷一百五十五
