body:
  text: 大學衍義補卷三十七明丘濬撰治國平天下之要明禮樂總論禮樂之道下孝經子曰移風易俗莫善扵樂安上治民莫善扵禮禮者敬而已矣故敬其父則子悦敬其兄則弟悦敬其君則臣悅敬一人而千萬人悦所敬者寡而悦者衆此之謂要道也臣按人君為治之道非止一端而其最要者莫善扵禮與樂禮之安上治民人皆知之若夫樂之移風易俗人多疑焉何也蓋禮之為用民生日用彛倫不能一日無者無禮則亂矣樂以聲音為用必依永以成之假器以宣之資禮以用之有非田里閭巷間所得常聞也而欲以之移風易俗不亦難哉夫樂有本有文出扵人心而形扵人聲然後諧協扵器以為樂聖人之論論其本耳禮之本在敬樂之本在和敬立則為禮所以安上治民者在是矣和同則為樂所以移風易俗者在是矣故孝經此章首以教民親愛莫善扵孝教民禮順莫善扵弟為言而繼之以此然不先禮而先樂而扵禮之下即繫之曰禮者敬而已矣不言樂之和而和之意自溢扵言外下文所謂敬其父敬其兄敬其君者禮之敬也子之悦弟之悦臣之悦者樂之和也敬一人而千萬人悦豈非安上治民而移風易俗之效哉由是觀之禮樂二者交相為用可相有而不可相無是誠治天下之要道也彼區區求其治效扵聲音器數之末豈知要者哉論語有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也程頥曰禮勝則離故禮之用和為貴先王之道以斯為美而小大由之樂勝則流故有所不行者知和而和不以禮節之亦不可行也范祖禹曰凡禮之體主扵敬而其用則以和為貴敬者禮之所以立也和者樂之所由生也若有子可謂達禮樂之本者矣朱熹曰禮者天理之節文人事之儀則也和者從容不迫之意蓋禮之為體雖嚴然皆出扵自然之理故其為用必從容而不迫乃為可貴先王之道此其所以為美而小事大事無不由之也又言如此而復有所不行者以其徒知和之為貴而一扵和不復以禮節之則亦非復禮之本然矣所以流蕩忘反而亦不可行也又曰嚴而泰和而節此理之自然禮之全體也毫釐有差則失其中正而各倚扵一偏其不可行均矣臣按有子此言専言禮之用而程氏始用樂記二語以見禮之不可無和和便是樂之意朱子謂嚴而泰是禮中有樂和而節是樂中有禮雖不明言樂字而樂之意自見扵言外臣故列之扵禮樂篇子曰人而不仁如禮何人而不仁如樂何程頥曰仁者天下之正理失正理則無序而不和游酢曰人而不仁則人心亡矣其如禮樂何哉言雖欲用之而禮樂不為之用也李郁曰禮樂待人而後行臣按先儒謂此章重在仁字上仁者心之全徳也人能全心徳自然敬而和以敬行禮則禮皆得其宜以和用樂則樂皆合其度是禮樂皆為我用茍心不仁則無敬與和無敬與和其将奈禮樂何哉是故用禮樂者必以和敬為本而和敬又以仁為本子曰先進扵禮樂野人也後進扵禮樂君子也如用之則吾從先進程頥曰先進扵禮樂文質得宜今反謂之質朴而以為野人後進之扵禮樂文過其質今反謂之彬彬而以為君子蓋周末文勝故時人之言如此不自知其過扵文也朱熹曰先進後進猶言前輩後輩野人謂郊外之民君子謂賢士大夫也用之謂用禮樂孔子既述時人之言又自言其如此蓋欲損過以就中也或問朱熹曰此禮樂還説宗廟朝廷以至州閭鄉黨之禮樂曰也不止是這般禮樂凡日用之間一禮一樂皆是禮樂只管文勝去如何合殺須有箇變轉道理臣按此章孔子因時人文質之偏而欲救其弊蓋欲損文之過扵質者以就文質之中也大抵世道有升降而禮樂之在世者有質有文世至叔季其文必勝文勝而至扵滅質則必有王者興焉扵是損文以就質使之復得其中馴至中葉則又漸漸日趨扵文所貴乎在位者隨時消息而張弛之使文與質恒相稱而彬彬然以復其先進之舊則大中之世矣子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳朱熹曰君子小人以位言之子游所稱蓋夫子之常言言君子小人皆不可以不學故武城雖小亦必教以禮樂蓋治有大小而其治之必用禮樂其為道一也又曰禮樂之用通乎上下一身有一身之禮樂一家有一家之禮樂一邑有一邑之禮樂以至推之天下則有天下之禮樂亦隨其大小而致其用焉不必其功大名顯而後施之也臣按此章見禮樂為為治之本然本文只説絃歌絃歌樂耳而未嘗言禮而註乃謂武城雖小亦必用禮樂及治有大小而治之必用禮樂之説蓋禮樂二者為治之本相須而成既有絃歌之聲必有儀文之禮不徒然也吁一邑之小尚必用夫禮樂以為治則夫天下之大而可無禮樂哉後世急扵刑罰事功失古人為治之意矣子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉程頥曰禮只是一箇序樂只是一箇和只此兩字含蓄多少義理天下無一物無禮樂且如置此兩椅一不正便是無序無序便乖乖便不和又如盜賊至為不道然亦有禮樂蓋必有總屬必相聴順乃能為盜不然則叛亂無綂不能一日相聚而為盜也禮樂無處無之學者要須識得朱熹曰敬而將之以玉帛則為禮和而發之以鐘鼓則為樂遺其本而専事其末則豈禮樂之謂哉臣按周末文滅其質禮廢樂壊之時人但知以玉帛鐘鼓為禮樂而忘其本故聖人以是為言云云者謂人所常言也乎哉者疑而反之之辭也人之言禮樂者莫不云云而不知禮樂之所以云云者不在扵玉帛鐘鼓之末而在扵和敬也中庸子思曰雖有其位茍無其徳不敢作禮樂焉雖有其徳茍無其位亦不敢作禮樂焉鄭𤣥曰言作禮樂者必聖人在天子之位朱熹曰有位無徳而作禮樂所謂愚而好自用有徳無位而作禮樂所謂賤而好自専臣按為治之道其最大者在禮樂故必有徳有位之聖人然後足以當制作之任雖然此言創始者耳若夫承天踐祚之君膺天命之重居五位之尊必須因前人之故典而開一代之新規選用賢能發揮盛製不可如漢文之謙讓未遑而安陋就簡以貽後時之悔漢書禮樂志曰六經之道同歸禮樂之用為急臣按所謂六經者易書詩春秋禮樂也今世樂經不全惟見扵戴記中之樂記説者因班固此言謂易以道禮樂之原書以道禮樂之實詩以道禮樂之志春秋以道禮樂之分是則六經為治道之本原而禮樂又為六經之要道人君為治誠能以禮樂為本凡夫政治之施一惟唐虞三代是法而不雜扵秦漢以来功利之私則古治不難復矣歐陽修曰三代而上治出扵一而禮樂達于天下三代而下治出扵二而禮樂為虚名朱熹曰此古今不易之至論也臣按修之言曰古者宫室車輿以為居衣裳冕弁以為服尊爵俎豆以為器金石絲竹以為樂以適郊廟以臨朝廷以事神而治民其嵗時聚㑹以為朝覲聘問懽欣交接以為射鄉食饗合衆興事以為師田學校下至里閭田畆吉凶哀樂莫不一出扵禮由之以教其民為孝慈友弟忠信仁義者常不出扵居處動作衣服飲食之間蓋其朝夕從事者無非乎此也此所謂治出扵一而禮樂達于天下使天下安習而行之不知所以遷善逺罪而成俗也及三代以亡遭秦變古後之有天下者自天子百官名號位序國家制度宫車服器一切因秦其間雖有欲治之主思所改作不能超然逺復三代之上而牽其時俗稍即以損益大抵安扵茍簡而已其朝夕從事則以簿書獄訟兵食為急曰此為政也所以治民至扵三代禮樂具其名物而藏扵有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出扵二而禮樂為虚名故自漢以来史官所紀事物名數降登揖讓拜俛伏興之節皆有司之事爾所謂禮之末節也然用之郊廟朝廷自縉紳大夫從事其間者皆莫能曉習而天下之人至扵老死未嘗見也况欲識禮樂之盛曉然諭其意而被其教化以成俗乎修為此言可謂盡古今禮樂之事後世君臣有志扵復三代之治者其尚視此言以為凖則痛革後世茍簡之政而必以禮樂為本凡其所以施扵政治之間者或寓三代禮樂之意扵中庶幾今世復見古昔之盛治豈非萬世之幸哉周敦頥曰禮理也樂和也隂陽理而後和君君臣臣父父子子兄兄弟弟夫夫婦婦萬物各得其理然後和故禮先而樂後朱熹曰禮隂也樂陽也此太極圖定之以中正仁義而主靜之意程子論敬則自然和樂亦此理也學者不知持敬而務為和樂鮮不流扵慢者陳淳曰禮樂不是判然兩物不相干涉禮只是箇序樂只是箇和纔有序便順而和失序便乖戾而不和如父子君臣夫婦兄弟所以相戕相賊相怨相仇如彼其不和者都緣先無箇父子君臣兄弟夫婦之禮無親義序别便如此臣按敦頥此言推原禮樂之本然必其本立而後備其儀文度數聲容節奏之制不然其如禮樂何哉胡寅曰仁者所行皆理故可以為禮所安皆樂故可以為樂此禮樂之本也臣按寅之此言亦循本之論後世人主心有不存而徒欲慕古人以為文飾之具所行不必皆合理而其所安者乃在扵彼而不在扵此凡其所以紛然雜就之者皆非其中心之所樂而姑為是使天下後世之人知吾亦有尚禮好樂之名耳政昔人所謂内多欲而外施仁義者也吁内多欲者固不能有仁義既無仁義又安能興禮樂哉以上總論禮樂之道臣按宋儒朱熹上疏扵其君謂遭秦滅學禮樂先壊漢晉以来諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳前此猶有三禮等科禮雖不行而士猶得以誦習而知其説自王安石棄罷儀禮獨存禮記之科棄經任傳不過習為虛文以供應舉若乃樂之為教則又絶無師授律尺短長聲音清濁學士大夫莫有知其説者而不知其為闕也欲以儀禮為經而取禮記及諸經史雜書所載有及扵禮者皆以附其本經之下具列註疏諸儒之説但私家無書檢閲無人鈔冩迄不能就而鍾律之制則士友間亦有得其遺意者竊欲更加參考别為一書以補六藝之闕而亦未能具也臣覩朱氏此疏所謂以儀禮為經而以禮記及諸書為傳者雖不見用扵時而其徒黄幹楊復蓋己私輯之以為儀禮經傳通解所謂士友間有得鍾律遺意者則指蔡元定律吕新書也今儀禮經傳通解南雝有刻本已行扵世而律吕新書永樂中已載之性理大全書中則朱氏之言雖不見行扵當時而實得表章扵聖世臣竊聞開國之初太祖皇帝不遑他務首以禮樂為急開禮樂二局徵天下耆儒宿學分局以講究禮典樂律将以成一代之制然當草創之初廢學之後稽古禮文之事諸儒容或有未足以當上意者當時雖輯成大明集禮一書然亦無所折衷樂則未見有全書焉古云禮樂百年而後興今承六聖太平之治百有餘年於兹所謂聖人在天子之位而制禮作樂者兹其時歟大學衍義補卷三十七
