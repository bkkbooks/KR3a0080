body:
  text: 大學衍義補卷四十二明丘濬撰治國平天下之要明禮樂樂律之制上之下樂記曰凡音之起由人心生也人生之動物使之然也感于物而動故形于聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂陳澔曰凡樂音之初起皆由人心之感于物而生人心虛靈不昧感而遂通情動于中故形于言而為聲聲之辭意相應自然生清濁髙下之變變而成歌詩之方法則謂之音矣成方猶言成曲調也比合其音而播之樂器及舞之干戚羽旄則謂之樂焉干戚武舞也羽旄文舞也臣按此推原作樂之本蓋以樂之為樂人見其備金石絲竹之音干戚羽旄之舞以為樂在是矣而不知其所以有清濁髙下之變而合宫商角徵羽之調者其本元之所自則由乎人心之感物而然也凡音者生人心者也情動于中故形于聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣陳澔曰此言音生于人心之感而人心哀樂之感由于政治之得失此所以愼其所以感之者也治世政事和諧故形于聲音者安以樂亂世政事乖戾故形于聲音者怨以怒將亡之國其民困苦故形于聲音者哀以思此聲音所以與政通也宫為君商為臣角為民徵為事羽為物五者不亂則無怗懘憋敗之音矣劉彛曰宫屬土絃用八十一絲為最多而聲至濁于五聲獨尊故為君象商屬金絃用七十二絲聲次濁故次于君而為臣象角屬木絃用六十四絲聲半清半濁居五聲之中故次于臣而為民象徵屬火絃用五十六絲其聲清有民而後有事故為事象羽屬水絃用四十八絲為最少而聲至清有事而後用物故為物象此其大小之次也五聲固本于黃鍾為宫然還相為宫則其餘十一律皆可為宫宫必為君而不可下于臣商必為臣而不可上于君角民徵事羽物皆以次降殺其有臣過君民過臣事過民物過事者則不用正聲而以半聲應之此八音所以克諧而無相奪倫也然聲音之道與政相通必君臣民事物五者各得其理而不亂則聲音和諧而無怗懘也臣按君臣民事物五者該盡天下之理一樂之作而萬理無不該盡先王作樂以一聲寓一理于其聲之髙下而驗其理之得失覺其有失則乘除抑揚以應之使之必得其平協比和諧無相凌奪然後反求于吾之政治宫音有失則求之于君商音有失則求之于臣以至角徵羽之失而求之民事物者皆然如此則樂音與政事常相流通則凡一世之君臣民事物皆止其所而天下和平矣前代之人如萬寶常張文收皆能以音樂而知時政之得失非虛語也鄭衛之音亂世之音也比于慢矣桑間濮上皆衛地之音亡國之音也其政散其民流誣上行私而不可止也司馬遷曰衛靈公適晉舍濮上夜聞琴聲召師涓聽而寫之至晉命涓為平公奏之師曠曰此師延靡靡之聲武王伐紂師延投濮水死故聞此聲必於濮水之上也臣按聲音之道與政相通古之善觀人國者不觀其政治而觀其聲音其音安以樂者其政必和其音怨以怒者其政必乖其音哀以思者其民必困政之和者治國也政之乖者亂國也民之困者將亡之國也國之將亡其政必散其民必流政散則誣罔其上罔上則民無誠心矣民流則肆行其私行私則無公心矣如此行之不已則靡靡之樂所由作焉是以自古人君必致謹于禮樂刑政之施以為感化斯人之本恆使吾之政咸和而不乖吾之民咸安而不困采民之歌詩順民之情性協比以成文播奏以為樂使天下之人聞吾之聲者知吾之德聆吾之音者感吾之治審吾之樂者得吾之政凡音者生于人心者也樂者通倫理者也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂是故審聲以知音審音以知樂審樂以知政而治道備矣方慤曰凡耳有所聞者皆能知聲心有所識者則能知音道有所通者乃能知樂若瓠巴鼓瑟游魚出聽伯牙鼓琴六馬仰秣此禽獸之知聲者也魏文矦好鄭衛之音齊宣王好世俗之樂此衆庶之知音者也若孔子在齊之所聞季札聘魯之所觀此君子之知樂者也臣按三代而上本人心以為治其政治寓于聲樂之中故審其聲樂即知其政治之所以然三代而下一切從事于簿書期㑹刑罰兵戎之末所謂樂者特用以行禮耳不本于人心不協于律吕人之氣不復關于天君之政不復寓于樂故流為茍簡之治而無復文明之化者此也是故先王本之情性稽之度數制之禮義合生氣之和道五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交于中而發作于外皆安其位而不相奪也臣按聖人作樂必本于人之性情性之未發者中也發為情而中節者和也而又稽考于天然自有之度物理自然之數或長或短曰多曰少皆必合于古昔之制焉然樂之作也必與禮俱而禮則各有所宜又必裁制于禮之義焉律陽而吕隂必使其協比諧和則生氣之在天者陽之氣不至于散泄隂之氣不至于祕密矣仁禮義智信在人為常行必使其道達流通則常德之在人者剛之氣不至于忿怒柔之氣不至于怯懾如此則天地之隂陽人心之剛柔四者各得其中而和暢焉交暢于中而發形于外于是宫君商臣角民徵事羽物各安其位而不相奪倫矣凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應回邪曲直各歸其分而萬物之理各以類相動也鄭𤣥曰姦聲正聲感人是倡也而逆氣順氣應之是和也回謂乖違邪謂邪僻及曲之與直各歸其善惡之分善歸善分惡歸惡分而萬物之情理亦各以善惡之類自相感動也輔廣曰由是觀之先王之樂固非一日之積也而樂之和與淫亦豈一人之所能為哉自聲之感氣氣之成象然後樂興焉先王因其自然之象而寫之于八音固不能有所加損于其間也至紂為靡靡之樂亦其逆氣自然之象耳臣按說者皆謂聲樂之作出于人君之心而此則謂聲感人而氣應氣應而成象然後樂興焉蓋以聲出人君之心而其聲有正有姦此以聲感彼以氣應一倡一和相為應驗或形于詠歌或著于舞蹈斐然而成章粲然而成列是以其為樂也有淫有和焉自古聖君建中和之極以為樂本聲之出者必致其謹非合于天理之正也有所不言惟恐其或流于姦而致逆氣之應也然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理孔穎達曰動發心志以聲音文飾聲音以琴瑟振動形體以干戚裝飾樂具以羽旄隨從音樂以簫管用以奮動天地至德之光則神明來降感動四時氣序之和則風雨順寒暑時以著萬物之理則萬物得其所也陸佃曰奮猶發也若大章所以發堯德之光大韶所以發舜德之光臣按此章上文既言姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設于身體使耳目鼻口心知百體皆由順正以行其義必如上所言然後可以作樂不然則無其本矣人而不仁如樂何樂云樂云鐘鼓云乎哉夫既修身以為作樂之本然後從之以聲容備之以器數在己則奮至德之光在天則動四氣之和在地則著萬物之理矣是故清明象天廣大象地終始象四時周旋象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生倡和清濁迭相為經故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧鄭𤣥曰八風八方之風也律十二月之律也距冬至四十五日條風至四十五日明庶風至四十五日清明風至四十五日景風至四十五日涼風至四十五日閶闔風至四十五日不周風至四十五日廣莫風至張載曰正樂既行故人倫之道清不視聽姦亂故耳目聰明口鼻心知百體皆由順正故血氣和平風移俗易移是移徙之名易是改易之稱易前之惡從今之善上行謂之風下習謂之俗方慤曰清明者樂之聲故象天廣大者樂之體故象地終始者樂之序故象四時周旋者樂之節故象風雨應鏞曰五聲配乎五行之色八音配乎八卦之風自一度衍之而至于百則百度各得其數曰不亂不姦以至有常言其常而不紊也曰相成相生以至迭相為經言其變而不窮也臣按自古聖人以樂為內外交修之要始也由修身而後作樂以致夫交感天人之效終也因樂行而養德以致夫風俗移易之美樂之功效大矣哉故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀德矣程頥曰人雖不能無欲然當有以制之無以制之而惟欲之從則人道廢而入于禽獸矣臣按樂之所以為樂因乎人情之所樂而已矣然人情之所樂者則各有不同焉中人以上所樂者在乎道理中人以下所樂者在乎情欲是以君子之人必反其情以和其志以道義之正而制情欲之私所以然者廣樂以成其教耳廣吾所樂之道以寓之聲容之間以成天下之教使凡天下之有耳目口鼻心知之欲者皆知反其情不以其私而忘乎道義之正莫不各有所以趣向之方焉如此則君子之德從可知矣詩言其志也歌咏其聲也舞動其容也三者本于心然後樂器從之是故情深而文明氣盛而化神和順積中而英華發外惟樂不可以為僞臣按樂之為樂曰聲曰容曰器三者而已聲寓于歌容著于舞歌之所協者金石絲竹舞之所執者干戚羽旄然推原其本則出于心具于性而為德發于志而為詩由是而協于聲則為歌詩之章見于形則為文武之舞情之感于中者深則文之著于外者明如天地之氣盛于內則化之及于物者神妙不測也此無他有和順積于中斯有英華發于外有諸中必形于外夫豈可以聲音像貌而僞為之乎由是觀之則可見為樂之本在于心而心之所以大和極順者又在乎誠也是故情見而義立樂終而德尊君子以好善小人以聽過故曰生民之道樂為大焉陳澔曰情見于樂之初而見其義之立化成于樂之終而知其德之尊君子聽之而好善感發其良心也小人聽之而知過蕩滌其邪穢也故曰以下引古語結之臣按此章諸家皆以為論大武之樂陳氏特以為通論樂與舞之理如此末引古語所謂生民之道樂為大焉蓋動之以形者不若動之以聲喻之以事者不若喻之以理不假之教條無待于約束濳銷默化自然相忘于不知不識之天大哉樂乎斯其至矣魏文矦問于子夏曰吾端冕而聽古樂則唯恐臥聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今夫古樂進旅衆也退旅進退齊一和正以廣弦匏笙簧㑹守拊鼓衆樂待鼓而作始奏以文謂鼓復亂卒章以武鐃也治亂以相拊也訊治也疾急也以雅樂器君子于是語于是道古修身及家平均天下此古樂之發也今夫新樂進俯退俯行列雜亂姦聲以濫不正溺而不止及優俳優侏傿短小之人獶獮㺅雜子女不知父子樂終不可以語不可以道古此新樂之發也臣按子夏既别古樂新樂之異以告文矦而下又告之以其所問者乃樂而所好者則音而音有德音溺音之不同而總結之曰為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之所謂好惡者謂好古樂惡新樂也文矦不能謹其所好惡好其所當惡惡其所當好聽古樂則思睡聽新聲則不知倦好惡之不謹故也謹之一言其人君為治之本豈但樂之一事乎夫樂者象成者也總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也陳澔曰言作樂者倣象其成功故將舞之時舞人總持干盾如山之立嶷然不動此象武王持盾以待諸矦之至故曰武王之事也所以發揚蹈地而猛厲象太公威武鷹揚之至也亂樂之卒章也上章言復亂以武言武舞將終而坐象周公召公文德之治蓋以文而止武也臣按此孔子因賔牟賈問武樂而答之也先儒輔氏謂此三言說盡武樂之事且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子陳澔曰成者曲之一終初自南第一位而北至第二位故云始而北出也此是一成再成則舞者從第二位至第三位象滅商也三成則舞者從第三位至第四位極于此而反乎南象克殷而南還也四成則舞者從北頭第一位郤至第二位象伐紂之後疆理南方之國也五成則舞者從第二位至第三位乃分為左右象周公居左召公居右也綴謂南頭之初位也六成則舞者從第三位而復于南之初位樂至六成而復初位象武功成而歸鎬京四海皆尊崇為天子矣臣按帝王之樂莫盛于韶武孔子以之而竝論而皆有盡美之稱韶以九成武以六成後世言文樂者宗韶言武樂者宗武皆所謂至矣盡矣不可復加者也韶樂之制備于虞書武舞之義詳于樂記後世有志于帝王之樂者尚有考于斯二者以為萬世作樂之凖春秋傳隱公五年公問羽數于衆仲對曰天子用八八八六十四人諸矦用六六六三十六人大夫四四四十六人士二士有功賜樂二二四人夫舞所以節八音而行八風八方之風故自八以下臣按舞佾之數惟天子得以盡物數故以八為列范祖禹所謂自上而下降殺以兩兩之間不可以毫髮僭差也昭公二十年晏子曰先王之濟五味和五聲也以平其心成其政也聲亦如味濟和五聲亦如五味一氣樂以氣動故居苐一二體舞有文武三類風雅頌四物四方之物以成器五聲宫商角徵羽六律黃鍾大蔟姑洗㽔賔夷則無射七音宮商角徵羽變宫變徵八風八方之風條風明庶風清明風景風涼風閶闔風不周風廣莫風九歌九功之事皆可歌也以相成也合此九者然後為樂清濁小大短長疾徐哀樂剛柔遲速高下出入周密疏稀以相濟也合此十者相濟後和君子聽之以平其心心平德和臣按晏子此言非專為樂也借樂以喻人之和耳然前九者盡樂之大綱後十者備樂之要用作樂者必本諸此然後無所遺聽樂者必達諸此然後無不通國語周景王將鑄無射問律于伶司樂官州鳩人名對曰律所以立均出度也古之神瞽考中聲而量之以制度律度其長短均平也鍾百官軌道也儀法也紀之以三天地人平之以六律也成于十二十二律吕天之道也夫六中之色也故名之曰黃中色鍾聚也陽氣聚于此所以宣養六氣隂陽風雨晦明九德即六府三事也由是第之二曰太蔟陽氣太簇達于上所以金奏太簇正聲為商故為金奏贊陽贊佐陽氣出滯發出滯伏也三曰姑洗姑潔洗濯所以修潔百物考神納賔合致神人享宴納賔也四曰㽔賔隂氣委㽔于上陽氣盛長于下有似賔主所以安靖神人獻酬交酢也五曰夷則夷平則法所以詠歌九則九功之法則平民無二疑二也六曰無射陽氣收藏萬物無射所以宣布哲人之令德示民軌儀也為之六閒六閒即六吕在陽律之間以揚沉伏發揚滯伏之氣而黜去也散越揚也也元閒隂繫于陽以黃鍾為主故曰元閒大吕天氣成于黃鍾受之于大吕助宣物也二閒夾鍾助陽鍾聚出四隙之細四時閒隙之氣細微者也三閒中吕宣中氣也四閒林氣盛也鍾和展審也百事俾使也莫不任任職肅速也純大也恪敬也也五閒南任也吕贊陽秀也六閒應台也鍾均利器用俾應復也律吕不易無姦物也細細聲謂角徵羽鈞調也有鍾大為鍾無鏄小為鏄昭明也其大也大大聲謂宫商鈞有鏄無鍾甚大無鏄鳴其細也細則用大以大平細大則用小以小平大至則甚大則獨鳴其細細謂絲竹革木大昭小鳴和之道也和平則久久固則純純明則終終復則樂所以成政也故先王貴之朱熹曰均只是七鈞如以黃鍾為宫便以林鍾為徵太蔟為商南吕為羽姑洗為角應鍾為變宫㽔賔為變徵這七律自為一鈞其聲自相諧應古人要合聲先須吹律衆聲皆合律方可用後來人想不解去逐律吹得京房始有律凖乃是先做下一箇子母調得正了後來只依此為凖國語謂之均梁武帝謂之通其制十三絃一絃是全律臣按國語載伶州鳩對周景王之言所以發明十二律之名義居然可見考之是時單穆公又告王鈞音之說有曰先王之制鍾也大不出鈞重不過石律度量衡于是乎生小大器用于是乎出即此章立均出度之說也均者鈞鍾也以木長七尺有絃繫之以為鈞法用以度鍾之大小清濁也漢大豫樂有之家語孔子曰夫先王之制音也奏中聲以為節流入于南不歸于北夫南者生育之鄉北者殺伐之域故君子之音溫柔居中以養生育之氣憂愁之感不加于心也暴厲之動不在于體也夫然者乃所謂治安之風也小人之音則不然亢麗微末以象殺伐之氣中和之感不載于心溫和之動不存于體夫然者乃所以為亂之風也㫺者舜彈五絃之琴造南風之詩其詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮唯修此化故其興也勃然德如泉流至于今王公大人述而弗忘殷紂好為北鄙之聲其廢也忽然至于今王公大人舉以為誡夫舜起布衣積德含和而終以帝紂為天子荒淫暴亂而終以亡臣按家語此章孔子聞仲由鼓琴而發也蓋人心善惡皆于樂聲見之故孔子聞其琴聲而為此言既言樂必以中聲為節而又推其聲有南北之異南者生育之鄉舜歌南風之詩其興也勃然含和而終以帝北者殺伐之域紂好北鄙之聲其廢也忽然暴亂而終以亡人君之于音樂烏可以不謹其所好樂者乎然舜非獨帝也當世化之皆有諧讓之美紂非獨亡也當世化之皆變靡靡之風由是觀之聲之有南北其來也逺矣今世樂部亦分為南北北音自金元始有之世因謂宋世以來所遺之音南音流于哀怨北音極其暴厲我國家復二帝三王之正統而世俗所尚之音猶有未盡去者所以奏中聲之節歌解愠阜財之詩一洗亢麗微末之習不能無望於當代之英君誼辟云以上論樂律之制上之下大學衍義補卷四十二
