body:
  text: 大學衍義補卷二十二明丘濬撰治國平天下之要制國用貢賦之常禹貢冀州厥賦惟上上錯上上第一等錯雜也謂雜出第二等也兖州厥賦貞貞正也賦以最薄者為正厥貢漆絲兖地宜漆宜桑厥篚竹器盛布帛者織文錦綺之屬青州厥賦中上第四等厥貢鹽絺細葛海物惟錯非一種也徐州厥賦中中第五等厥貢惟土五色五方之土以為土封夏翟染雉羽為五色孤桐以為琴瑟材浮磬石露水濵可為磬者蠙珠珠為服飾暨及也魚用祭祀厥篚𤣥纖縞𤣥赤黑色纎縞皆繒揚州厥賦下上上錯第七等雜出第六等厥貢惟金三品金銀銅瑶琨玉石篠簜竹可為矢及管者齒革可以成車甲羽毛可以為旌旄惟木可以備棟宇島夷卉服今木綿厥篚織貝木綿之精好者厥包裹也橘柚小曰橘大曰柚錫貢待錫命而後貢荆州厥賦上下第三等厥貢羽毛齒革惟金三品杶幹栝柏三木名礪砥皆磨石砮石砮丹砂也惟箘簵竹也楛木名可為矢包匭匣菁茅供縮酒者厥篚𤣥纁絳色幣也璣珠不圓者組綬類豫州厥賦錯上中第二等雜出第一等厥貢漆枲絺紵厥篚纖纊細綿梁州厥賦下中三錯第八等雜出第七等九等厥貢璆玉磬鐵柔鐵銀白銀鏤剛鐵砮石砮磬石磬熊羆狐狸織皮四獸之皮及毳毛可織為罽者雍州厥賦中下第六等厥貢球琳美玉琅玕石之似珠者蔡沈曰上之所取謂之賦下之所供謂之貢是篇有貢有賦而獨以貢名篇者孟子曰夏后氏五十而貢貢者較數嵗之中以為常則貢又夏后氏田賦之總名臣按國家之用度皆取於民而取民之大綱曰賦曰貢而已二者之制在唐虞已有之至夏后氏之世始詳焉蓋以禹未治水之前地猶未平物之生者未繁田之闢者未盡至是水土既平始可以任土作貢分田定稅焉九州各有賦有貢凡賦諸侯以供其國用者也凡貢諸侯以獻於天子者也大禹成功之後條陳九州所有以為定法孔子刪書特載之於夏書之首以示法天下俾後世之有土有民者取民之制視此為準焉凡外此而别為名目如後世之進奉和買勸借之類皆非中正之道天下經常之制也此兼言貢賦五百里甸服畿甸之地百里賦納總禾本全二百里納銍禾半藁三百里納秸半藁去皮服總結上皆有服役之事四百里粟納穀五百里米朱熹曰甸治田也畿內天子之田其民主為天子治田事故謂之甸服近粗而逺精畿內專言田賦者畿內不封諸侯故田賦入於天子蔡沈曰內百里為最近故并禾本總賦之外百里次之只刈禾半藁納也外百里又次之去藁粗皮納也外百里為逺去其穗而納穀外百里為尤逺去其穀而納米蓋量其地之逺近而為納賦之輕重精粗也馬端臨曰禹貢八州皆有貢物而冀州獨無之甸服有米粟之輸而餘四服俱無之說者以為王畿之外八州俱以田賦所當供者市易所貢之物故不輸粟然則土貢即租稅也臣按虞夏之世天子之田止於畿甸所謂五百里四方相距各千里也田賦之入止於米粟近地則併其本藁取焉蓋米以食人藁以飼馬無非以為國用也然其取之也因其地之逺近各有輕重之等精粗之異非若後世一槩取之無所分别焉魯宣公十五年初稅畝公羊髙曰譏始履畝而稅也古者什一而籍什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一行而頌聲作矣臣按什一者天下之中正一言誠萬世取民之定制孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也朱熹曰夏時一夫受田五十畝而每夫計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以助耕公田而不復稅其私田周時一夫授田百畝鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力而作收則計畝而分故謂之徹其實皆什一者貢法皆以十分之一為常數惟助法乃是九一而商制不可考周制則公田百畝中以二十畝為廬舍一夫所耕公田實計十畝通私田百畝為十一分而取其一蓋又輕於十一矣竊料商制亦當似此而以十四畝為廬舍一夫實耕公田七畝是亦不過什一也哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足朱熹曰民富則君不至獨貧民貧則君不能獨富有若深言君民一體之意以止公之厚斂為人上者所宜深念也楊時曰仁政必自經界始經界正而後井田均榖祿平而軍國之須皆量是以為出焉故一徹而百度舉矣上下寧憂不足乎以二猶不足而教之徹疑若迂矣然什一天下之中正多則桀寡則貉不可改也後世不究其本而唯末之圖故征斂無藝費出無經而上下困矣又惡知盍徹之當務而不為迂乎哀公又問於孔子孔子曰薄賦斂則人富公曰若是則寡人貧矣對曰豈弟君子民之父母未見子富而父貧也臣按先儒謂有若請魯哀公行徹法欲其節用以厚民也蓋國家之財皆出於民君之所用者皆民之所供也君能節用則薄取而有餘民之富即君之富也侈用則盡取而不足民既貧矣君孰與守其富哉有若所謂百姓足君孰與不足百姓不足君孰與足孔子所謂豈弟君子民之父母未見子富而父貧斯二言也最為親切著明九重之上念兹在兹以示教於千萬世之聖子神孫則千萬世之生靈不勝幸甚魏文侯時租賦增倍於常或有賀者文侯曰今戶口不加而租賦嵗倍此由課多也夫貪其賦稅不愛人是虞人反裘而負薪也徒惜其毛而不知皮盡而毛無所傅臣按魏文侯一國之諸侯疆域有限而用度孔多尚知課多之害於民而設為皮毛之喻况萬乘之尊而富有四海之大者乎秦舍地而稅人收大半之賦竭天下之資財以奉其政猶未足以贍其欲也二世承之不變海內潰叛臣按致亂之道多矣而尤莫甚於厚斂自三代以來皆因地而取稅至秦始舍地而稅人皆十分而取其一至秦始十分而取其五行如是之政則民之貧者何以為生哉貧無以為生則不愛其死是趣民而使之潰叛也漢興天下既定髙祖約法省禁輕田租什五而稅一量吏祿度官用以賦於民文帝十二年詔賜天下民租之半臣按漢文帝在位再賜天下半租其後也遂除之而不收者十餘年當是時豈一切無所用度哉兹蓋文帝恭儉節用國有餘蓄之明效也夫文帝承髙祖之後事事仰成稍加節約自有贏餘固無甚難者我聖祖得國之初凡事草創無所因仍然而免租之詔無嵗不下其視漢文益數焉豈非難哉今即御製文集考之洪武二年二月免租之詔凡三焉其一謂中原之民久困兵殘免山東北平燕南河東山西河南秦隴夏秋二稅山東二年其餘一年其二謂創業之初取辦應天太平鎮江寧國四郡免其租一年其三謂建都金陵以太平鎮江寧國廣德為京師之翼其應天太平鎮江寧國再免一年其廣德及滁州和州無為州亦與免一年洪武三年三月又詔免應天以至無為州等七郡徽州池州廬州金華嚴州衢州處州廣信饒州九郡及山東河南二布政司一年不寧惟是四年五月又有免兩浙江西之詔五年十月有免應天等五府之詔九年二月有免山東陜右之詔十一年八月有免太平等六州宜興等四縣之詔十二年有全免北平之詔至十有三年乃下詔曰荷上天眷佑君主華夷十有三年倉廪盈府庫充今民力未蘇凡天下今年夏稅秋糧盡蠲免之嗚呼我聖祖革命建極之初正創制立度之始事事未備凡宫室禁衛官署城池藩府與夫壇壝學校禮樂器用一一皆當創置矧干戈甫定之餘人民疲困之極列屯坐食仰給者衆分官置吏祿食者多所費比於承平之世奚翅千萬尚有餘資以資用度而免租之詔無歲無之此我聖祖所以結人心凝天命而培千萬年不拔之基端有在於此也矧今承列聖重熙纍洽之後垂拱仰成百度修舉不必更有作為一切事功略加省節自然有餘伏願聖明在上法漢文之儉德體聖祖之仁心慎乃儉德惟懷永圖使國計常足而有餘蓄時令有司計國儲之多寡因嵗事之登耗屢下寬征之詔以蘇農民之困所以固結人心者在是所以培殖國本者在是宗社生靈不勝大幸十三年詔曰農天下之本務莫大焉今廑古勤字身從事而有租稅之賦是謂本末者無以異也其於勸農之道未備其除田之租稅胡寅曰漢至文帝時封國漸衆諸侯王自食其地王府所入寡矣又與胸奴和親嵗致金繒後數為邊患天子親將出擊復因河決有築塞勞費大司農財用宜不充益矣而文帝在位十二年即賜民半租次年遂除之然則何以足用乎蓋文帝恭儉百金之費亦不茍用宫閫是效流傳國都莫有奢侈之習如之何不富其財蓋不可勝用矣然後知導諛逢惡者納君於荒淫取之盡錙銖用之如泥沙至於財竭下畔而上亡其罪可勝誅哉臣按秦漢之際其所以興亡者非止一端大要在得民心與失民心而已秦取民大半之賦漢則十五而取一其後乃盡除之焉蓋財者民之心得其財則失其心茍得民心吾雖不得其財而其所得者乃萬倍於財焉嗚呼有天下國家者其尚鑒秦漢之所以得失以為取舍哉昭帝元鳯二年令三輔太常郡得以菽粟當賦臣按以菽粟當賦謂聽以菽粟當錢物也蓋粟生於地非一日所能致錢出於人力可旬月間而辦也自古識治體者恆重粟而輕錢蓋以錢可無而粟不可無故也後世以錢物代租賦可謂失輕重之宜違緩急之序矣故為國家長久之計者寧以菽粟當錢物使其腐於倉庾之中備之於無用不肯以錢物當菽粟恐一旦天為之災地無所出金銀布帛不可以充饑坐而待斃也唐初始定租庸調之法以人丁為本一曰租丁男一人授田百畝但嵗納租粟二石二曰調每丁隨鄉土所出嵗輸絹或綾絁共二丈綿三兩輸布者麻三斤三曰庸每丁定役二十日不役則日為絹三尺臣按自古中國布縷之征惟絲枲二者而已今世則又加以木綿焉唐人調法民丁嵗輸絹綾絁及綿輸布及麻是時未有木綿也宋林勳作政本書匹婦之貢亦惟絹與綿非蠶鄉則貢布麻元史種植之制丁嵗種桑棗雜果亦不及木綿則是元以前未始以為貢賦也考之禹貢揚州島夷卉服注以為織貝則虞時已有之島夷時或以充貢中國未有也故周禮以九職任民嬪婦惟治蠶枲而無木綿焉中國有之其在宋元之世乎元初孟祺作農桑輯要云木綿種於陜右行之其他州郡多以土地不宜為解近世陶九成作輟耕録亦云閩廣多種木綿紡緝為布松江民因謀樹藝覓種於彼蓋自古中國所以為衣者絲麻葛褐四者而已漢唐之世逺夷雖以木綿入貢中國未有其種民未以為服官未以為調宋元之間始傳其種入中國關陜閩廣首得其利蓋此物出外夷閩廣海通舶商關陜壤接西域故也然是時猶未以為征賦故宋元史食貨志皆不載至我朝其種乃遍布於天下地無南北皆宜之人無貧富皆賴之其利視絲枲蓋百倍焉臣故表出之使天下後世知卉服之利始盛於今代代宗始以畝定稅而斂以夏秋德宗時楊炎為相遂作兩稅法夏輸無過六月秋輸無過十一月以大厯十四年墾田之數為定而均收之陸贄曰租庸調之法宗本前哲之規模參考歷代之利害有田則有租有家則有調有身則有庸法制均一下不困而上用足兩稅之法每州各取大厯中一年科率錢穀數最多者定為兩稅額惟以資産為宗不以丁身為本資産少者稅輕多者稅重吕祖謙曰田制雖商鞅亂之於戰國而租稅猶有歷代之典制惟兩稅之法立古制然後掃地馬端臨曰隨田之在民者稅之而不復問其多寡始於商鞅隨民之有田者稅之而不復視其下中始於楊炎三代井田之良法壞於鞅唐租庸調之良法壞於炎二人之事君子所羞稱而後之為國者莫不一遵其法或變之則反至於煩擾無稽而官與民俱受其病則以古今異宜故也臣按馬端臨又言賦稅必視田畝乃古今不易之法三代之貢助徹亦只是視田而賦之未嘗别有戶口之賦蓋授人以田而未嘗别有戶賦者三代也不授人以田而輕其戶賦者兩漢也因授田之名而重其戶賦田之授否不常而賦之重者已不可復輕遂至重為民病則自魏至唐之中葉是也自兩稅之法行而此弊革矣豈可以其出於楊炎而少之乎由馬氏斯言觀之則是兩稅之法實得古人取民之意後世徒以陸贄之言而非之贄之言蓋不欲茍變當時之法故極言其法之弊耳臣竊以謂土地萬世而不變丁口有時而盛衰定稅以丁稽考為難定稅以畝撿核為易兩稅以資産為宗未必全非也但立法之初謂兩稅之外不許分毫科率然兵興費廣不能不於稅外别有徵求耳此時之弊非法之弊也自唐立此法之後至今行之遂為百世不易之制我朝稽古定制以天下之墾田定天下之賦稅因其地宜立為等則徵之以夏者謂之稅徵之以秋者謂之糧嵗有定額家有常數非若唐人遇有百役之費先度其數而賦於人也隨其田之寬狹取其稅之多寡非若唐人以一年之科率最多者以為額也其額數則具於黃籍總於戶部其徵輸期限則責之藩服州縣非若唐人别設兩稅使以總之也若夫丁口之稅百無取焉惟逐戶編為里甲十年一度輪差其餘年分官司有所營為隨時起集傭倩事已即休所謂絹布之調無有也不役之絹無有也其法一定而可守其額百世而不虧吏不能以為姦民不至於重困陸贄所謂其取法也逺其立意也深其斂財也均其成人也固其裁規也簡其備患也周此六言者我祖宗取民之制真足以當之矣彼租庸調法烏可與同日語哉憲宗時李渤上言臣過渭南聞長源鄉舊四百戶今才百餘戶閿鄉縣舊三千戶今才千戶其他州縣大率相似跡其所以然皆由以逃戶稅攤於比鄰致驅迫俱逃此皆聚斂之徒剝下媚上惟思竭澤不慮無魚乞降詔書絶攤逃之弊盡逃戶之産稅不足者乞免之計不數年人皆復於農矣臣按吕氏春秋曰竭澤而漁豈不得魚明年無魚李渤所謂惟思竭澤不慮無魚其言蓋本諸此蓋以取稅於民如取魚於澤也澤以養魚必常有所養斯常有所生茍取具目前竭其所養之所空其所生之物則一取盡矣後何所繼乎後世取民大率似此而攤稅之害尤毒非徒一竭而已且將竭之至再至三而無已焉不至水脉枯而魚種絶不止也何則中人一家之産僅足以供一戶之稅遇有水旱疾厲不免舉貸逋缺况使代他人倍出乎試以一里論之一里百戶一嵗之中一戶惟出一戶稅可也假令今年逃二十戶乃以二十戶稅攤於八十戶中是四戶而出五戶稅也明年逃三十戶又以三十戶稅攤於七十戶中是五戶而出七戶稅也又明年逃五十戶又以五十戶稅攤於五十戶中是一戶而出二戶稅也逃而去者遺下之數日增存而居者攤與之數日積存者不堪又相率以俱逃一嵗加於一嵗積壓日甚小民何以堪哉非但民不可以為生而國亦不可以為國矣為今之計奈何曰李渤謂盡逃戶之産稅不足者免之是固然矣然民雖去而産則存宜斟酌具為常法每嵗十月以後詔布政司委官一員於所分守之地親臨州縣俾官吏里胥各具本縣本里民數逃去開除者若干移來新收者若干其民雖逃其産安在明白詳悉開具即所收以補所除究其産以求其稅若人果散亡産無蹤跡具以上聞核實除免如李渤所言絶攤逃之弊如此則民生既安國用亦足矣以上賦稅書明王慎德四夷咸賔無有逺邇畢獻方物惟服食器用蔡沈曰慎德一篇之綱領也方物方土所生之物明王慎德四夷咸賔其所貢獻惟服食器用而已言無異物也臣按武王克商之後西旅獻􅋙召公以為非所當受作此書以戒武王謂夫明德之君能慎其德故致四夷咸來賔服若逺若近皆獻其方土所生之物然所獻者衣服飲食器具用度之物而已所以然者以物表德獻有常之物所以表有常之德也茍以異物進焉則非常矣必其君無有常德而玩好之偏聞諸中外故逺人亦以是覘之歟嗚呼人主之好惡有關於心德者如此可不慎哉周禮太宰以九貢致邦國之用一曰祀貢犧牲包茅之屬二曰嬪貢絲枲之屬三曰器貢錢鐵石砮之屬四曰幣貢玉馬皮帛之屬五曰材貢栝柏篠簜之屬六曰貨貢金玉龜貝之屬七曰服貢絺紵之屬八曰斿貢羽毛可以為旌旄者九曰物貢所産雜物楊時曰太宰以九賦斂財賄以九式均節財用以九貢致邦國之用則理財真宰相之職也蓋古之制國用者量入以為出故以九賦斂之而後以九式均節之取之有藝用之有節然後足以服邦國而制其用致者使其自致也若天王求車求金則非自致也然則先王所謂理財者亦均節之使當而已矣徒紛紛較其贏餘以為宰相之職則非其義也林之奇曰先王制貢因其地之所宜而為政之序亦以逺近詳略為差傳曰上以共祭祀之物使侯服貢之則上先下後之意內以共嬪婦之物使甸服貢之則內先外後之意傳曰先王之制貢則近無不聽逺無不服者凡以此道也葉時曰周禮之言致貢亦禹貢之任土作貢也任者任其所有而不彊其所無致者聽其自至而不彊其不來蓋人君昭德之致於侯邦則諸侯服食器用之任自奔走入貢之不暇自有不求而自至者聖人何嘗彊之使貢哉林椅曰致邦國之用者非用物不貢則珍禽異獸不育於國以萬民惟正之供不貴異物賤用物也臣按太宰九貢致邦國之用謂之致者言自至而已非有所求也謂之用者言適於用而已非無用也蓋自祀貢以至於物貢固非無用之物而亦非有意而求其諸異乎後世人主之求之歟春秋桓公十五年天王使家父來求車左丘明曰求車非禮也諸侯不貢車服車服上之所以賜下天子不私求財諸侯有常職貢榖梁赤曰古者諸侯時獻於天子以其國之所有故有辭讓而無徵求求車非禮也胡安國曰王畿千里租稅所入足以充費不至於有求四方諸侯各有職貢不至於來求經於求賻求車求金皆書曰求垂後戒也古之君人者必昭儉德以臨照百官尊卑登降各有度數示等威明貴賤民志既定之後皆安其分而無求兵刑寢矣及侈心一動莫為防制必至於亢不𠂻官失德廉恥道喪寵賂日章淪於危亡而後止也臣按遣使需索之謂求求者下之乞於上不足者資於有餘之謂也巍巍天子居九重之上有四海之富乃遣使需求於人則是示貪風於天下開賄道於方國其失自上豈小故哉漢文帝時有獻千里馬者帝詔曰鸞旗在前屬車在後吉行日五十里師行三十里朕乘千里馬獨先安之朕不受獻也其令四方無求來獻光武下詔曰往年已敕郡國異味不得有所獻御今猶未止非徒有豫養導擇之勞至乃煩擾道上疲費過所其令大官勿復受明敕下以逺方口實所以薦宗廟者自如舊制和帝時南海獻荔枝龍眼奔騰險阻死者繼路臨武長唐羌上書陳狀帝下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈愛民之本其敇大官勿復受獻臣按漢家此三詔者皆不適己之便而有愛民之實謹表出之以示萬世安帝詔曰凡供薦新味多非其節或鬱養彊熟或穿屈萌芽味無所至而大折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆須時乃上臣按安帝此詔非徒有愛物之仁亦且得養生之義順帝永建四年詔曰海內頗有災異朝廷修政大官減膳珍玩不御而桂陽太守文礱不惟竭忠宣暢本朝而逺獻大珠以求幸媚令封以還之臣按順帝此詔與唐太宗罪權萬紀同一心也所謂不惟竭忠宣暢本朝而逺獻大珠以求幸媚文礱見之宜愧死矣後世人主乃因其臣獻珍異而奬寵之甚至加以爵祿焉視順帝豈不逺哉隋煬帝幸江都謁見者專問禮餉豐薄豐則超遷薄則停解江都郡丞王世充獻銅鏡屏風遷通守歷陽郡丞趙元楷獻異味遷江都郡丞由是郡縣競務刻剝以充貢獻民外為盜賊所掠內為郡縣所賦生計無遺臣按人君為天之子代天以理民不能自理故分命其臣以理之其所食之祿天祿也所涖之職天職也所治之民天民也天子不過承天意以豫之耳今顧因其所貢以私奉己者而酬之以官豈天意哉人君為此其拂天甚矣煬帝之為煬也宜哉唐制州府嵗市土所出以為貢其價視絹之上下無過五十匹異物滋味名馬鷹犬非有詔不獻有加配則以代租賦臣按唐制州府嵗貢土物其價視絹無過五十匹所貢至薄其物易供間加此數亦折租賦不别徵科及考其所以為貢者不過藥物食用而已祖宗以此為制後世子孫乃有如代宗之生日貢獻至數千萬加以恩澤者德宗之臣有日進月進因而得遷官者嗚呼祖宗立制之善而子孫猶繼之以不善况貽謀不善者哉太宗謂朝集侯曰任土作貢布在前典當州所産則充廷實比聞都督刺史邀射聲名厥土所賦或嫌其不善踰境外求更相倣效遂以成俗極為勞擾宜改此弊不可更然臣按太宗謂踰境外求極為勞擾竊以謂郡國貢獻非但踰所任之境而求之為勞擾也至於道里之逺輦運之煩經過州邑起役丁夫傭倩車馬官府為之廢政農作為之妨業上之所得無幾計其所費百倍於所貢之物亦有之矣况又遣使齎貨求之中國之外越沙漠漲海之涯其為勞擾又可勝言哉憲宗禁無名貢獻而至者不甚却學士錢徽懇諌罷之帝密戒後有獻毋入右銀臺門以避學士臣按普天之下莫非王土凡土所生之物何者而非天子之物乎有之固不足以為夸無之亦不足以為歉為萬乘之主而欲人之貢獻既知其非而禁之而又不甚却復因人言而罷之而又戒勿使之知吁學士雖不知吾所戒之人則知之矣非但所戒之人知之而當世史臣且筆之於冊焉歷今數百年猶如昨日乎然人主舉措可不慎哉五代周太祖命王峻疏四方貢獻珍美食物下詔悉罷之詔略曰所奉止於朕躬所害被於氓庶又曰積於有司之中甚為無用之物臣按周太祖此詔可謂切要讀之使人竦然唐白居易有詩云割我心頭肉市汝眼前恩進入瓊林庫嵗久化為塵可與周祖此詔竝傳後世人主恆心惟而口誦之天下不勝幸甚宋太祖詔自今長春節及他慶賀不得輒有貢獻真宗時內侍裴愈因事至交州俾其進龍花蕊帝怒黜愈神宗以諸州貢物耗蠧民力詔罷之孝宗詔諸路或假貢奉為名漁奪民利果實則封閉園林海錯則彊奪商販至於禽獸昆蟲珍味之屬則抑配人戶致使所在居民以土産之物為苦仰州軍條具土産合貢之物聞於朝當議參酌天地宗廟陵寢合用薦獻及德夀宫甘㫖之奉止許長吏修貢外其餘一切竝罷州郡因緣多取以違制坐之臣按宋朝諸帝往往罷貢獻而孝宗一詔尤為悉知其弊其中仰州軍條具土産合貢之物止許長吏修貢然考杜氏通典及唐書地理志各載諸郡土貢物件而宋地理志及㑹要亦載焉則是唐宋州郡所貢土産已有定制有司每嵗合依定制進獻為宜又何用州軍條上為哉夫有土則有貢隨其地之所有而獻之於上以為朝廷祭祀宴享之需是固義之當為然不可過為需索以一人口體之奉而貽纍千萬人而耗其衣食之資甚者假公以營私一人之用才一二而千百人因之而耗費其萬億焉是以自古愛民之君寧吾一人所欲有所不稱不忍以吾一人之欲而使千萬人失其所欲焉是以取於民也有制而庶邦惟正之供所供者郊廟祭祀之品宫闈甘㫖之奉軍國兵戎之需與夫衣服食物日用之不可闕者耳我太祖於國初即定諸州所貢之額如太常寺之牲幣欽天監之厯紙太醫院之藥材光祿寺之厨料寶鈔司之桑穰與凡皮角翎鰾之屬皆有資於國用者也著為定額俾其嵗辦外此珍奇玩好皆不取焉遇有急闕之用則折租以市其取民也可謂薄矣凡唐宋以來所謂藩方之羡餘郡國之進獻佞幸之珍異一切無有焉民生斯世一何幸哉元世祖至元二十二年遣使往馬八國求奇寶臣按春秋書天王遣使求車求金說者謂其求非所當求故聖人譏之然所求者中國之諸侯車以為乘金以為賻猶為有用者也彼元世祖乃遣使冒不測之險而求無用之物於遐絶之域世祖在元君中為最賢而猶如此他又何責哉臣嘗因是而考古今之所謂寶者三代以來中國之寶珠玉金貝而已貝俗謂海介蟲漢以後西域通中國始有所謂木難琉璃瑪瑙珊瑚琴瑟之類雖無益於世用然猶可製以為器焉至元所謂寶者則異於是是皆塊石碎砂之屬形既不圓文又不瑩他無可用者但可用之麗金銀以為服飾耳乃至費資萬億以售之嗚呼棄有用之金銀易無用之砂石惑亦甚矣以上貢獻以上論貢賦之常臣按治國者不能不取於民亦不可過取于民不取乎民則難乎其為國過取乎民則難乎其為民是以善于制治保邦者必立經常之法以為養民足國之定制所謂經常可久百世而不變者禹貢所載貢賦二者是已若漢之告緡算舟車之令唐之借商稅開架之法宋之經總制錢之類是皆罔民取利之具暫行尚不可况常乎臣于制國用總論理財之道之後即繼以貢賦之常者此也大學衍義補卷二十二
