body:
  text: 大學衍義補卷一百五十明丘濬撰治國平天下之要馭外蕃守邉固圉之略上詩小雅出車之三章曰王周王命南仲大將往城於方朔方出車彭彭旗交龍為旗旐央央鮮明天子命我城彼朔方赫赫威名光顯南仲儼狁于襄除也言勝之程頥曰城朔方而玁狁之難除守備為本不以攻戰為先也臣按朔方之地自三代已為邊地漢人城之以遏敵之內侵宋始廢其城而棄其地程氏謂禦敵之道守備為本不以攻戰為先乃帝王之要法萬世所當遵守者也禮記月令孟冬之月命有司壞補其闕薄城郭戒門閭修鍵鎖須閉鎖筒慎管籥鎖匙固封疆備邊竟境同完要塞謹關境上門梁橋也塞徯徑陳澔曰城郭欲其厚實故言壞門閭備禦非崇故言戒鍵閉或有破壞故云修管籥不可妄開故云慎要塞邊城要害處也徯徑野獸往來之路也陸氏佃曰壞城郭而門閭不戒無益也修鍵閉而管籥不慎無益也固封疆而邊境不備無益也完要塞謹關梁而徯徑不塞無益也臣按月令于孟冬之月既命百官謹蓋藏命有司循行積聚無有不斂而又命有司壞城郭戒門閭修鍵閉慎管籥者此蓋兼中外而言也至於固封疆備邊境完要塞謹關梁塞徯徑則専為邊境言焉然邊境之中亦有城郭而其城郭也則有門閭焉門閭之或啓或閉則有鍵閉管籥以司之故既壞其城郭之闕薄使其堅而厚而又戒其門禁之出入于鍵閉管籥也則又修而理之慎而守之所以防內之出而外之入也若夫封疆之固邊境之備則其所防者內恐盜賊之竊發外恐敵國之侵陵雖以無事之時亦必嵗嵗為先事之備於要塞也則完之以扼其要衝于關梁也則謹之以嚴其出入然非但於人馬可行之地而致其備也凡野獸往來之徑茍可容足者亦無不致其謹焉可見古人於封疆之守邉防之備其嚴且密也如此後世為政茍且目前而於邊塞之地無事則一切置之不問一有事焉則急遽之際倉惶無措者多矣甚者以槱薪之故而翦其䝉翳以營造之故而伐其障蔽以游畋之故而廢其險隘殊不思王公設險以守其國無其險尚百計以營為之况其有險而自去之以為敵除道邪智者不為也後之君子尚思所以為先事備而毋貽臨時噬臍無及之悔臣竊以為今京師切近邊塞所恃以為險固者內而太行西來一帶重岡連阜外而渾蔚等州髙山峻嶺蹊徑狹隘林木茂密以限馳突不知何人始於何時乃以薪炭之故營繕之用伐木取材折枝為薪燒柴為炭致使木植日稀蹊徑日通險隘日夷設使國家常如今日之無事固無所用之不幸一旦而有風塵之警將何以扼其來而拒其入乎失今不為之限制臣恐日甚一日雖有智者不能善其後矣臣請下工部稽考洪武永樂年間以來其所用材木薪炭取於何所掌於何人凡其可以措置之方用度之數與夫愛惜減省之節目一一以聞必須無損於邊關無虧于國用定為經久之計其事雖小所係實大考諸司職掌其工部抽分條止云抽分竹木場如遇客商興販竹木柴炭等項照例抽分若不敷定奪奏聞給價收買或差人砍辦則是祖宗之時遇有營造不敷方行買辦然亦止言營造而不知當時大庖之㸑內臣之炊何所取材意者洪武之初建都江南沿江蘆葦自足以供時之用也蘆葦易生之物刈去復生沿江千里取用不盡非若木植非歷十數星霜不可以燃取之須有盡時生之必待積久况今近甸别無大山茂林不取之邊關將何所取耶夫自立柴厰於易州以來恆聚山東西北直𨽻數州民夫數千于此取柴炭以供國用又役順天之民以為挑柴夫府縣添設佐二官以専管之又特勑侍郎或尚書一員以總督之此事非特今朝無有定制而前代亦所未聞也然則前代皆不舉火耶古之人必有善處之法然而史籍不載無從稽考意者以此為非要之務隨時制宜固取足用正不必顓顓設官拘拘督責因吾口食之奉以奪民衣食之資也為今之計宜移置易州柴厰於近京之地散遣丁夫各還原籍量其州縣大小人民多寡定為薪炭之數分𣲖輸納內外衙門每嵗定為限期俾其依期運納一如户部糧草例取納足通關以憑稽考又必痛為禁革除去印烙茍薪柴可以燃燎即與收貯不必問所從來限以式樣如宋之末世所取之炭必如核桃紋鸕鷀色以困吾民也如此非獨可以為邊關之固而京畿及山東西之民亦可以少蘇矣雖然木生山林嵗嵗取之無有已時茍生之者不繼則取之者盡矣竊恐數十年之後其物日少其價日增吾民之採辦者愈不堪矣臣又竊有一見請於邊關一帶東起山海以次而西於其近邊內地隨其地之廣狹險易沿山種樹一以備柴炭之用一以為邊塞之蔽于以限敵人之馳騎于以為官軍之伏地每山阜之側平衍之地隨其地勢髙下曲折種植榆栁或三五十里或七八十里若其地係是民産官府即于其近便地撥與草場及官地如數還之其不願得地者給以時價除其租稅又先行下法司遇有犯罪例應罰贖者定為則例徒三年者種樹若干二年者若干杕笞以下以次遞減照依繕工司運水和炭事例就俾専業種植之人當官領價認種某樹若干長短大小皆為之度以必成為效有枯損者仍責其賠其所種之木必相去丈許列行破縫參錯蔽虧使馬足不得直馳官軍可以設伏仍行委所在軍衛有司設法看守委官巡視嵗遣御史一員督察之不許作踐砍伐違者治以重罪待其五七年茂盛之後嵗一遣官採其支條以為薪炭之用如此則國用因之以舒民困因之以解而邊徼亦因之以壯固矣又今京城軍民百萬之家皆以石煤代薪除大官外其惜薪司當給薪者不過數千人之烟㸑無京民百分一獨不可用石煤乎儻以為便乞下辦納挑運州縣計其買辦雇覔工價所費幾何俾其辦價送官量給與之市石煤以㸑是亦良便左傳昭公二十三年楚囊瓦城郢沈尹戍曰古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟境同慎其四竟結其四援民狎安習其野三務春夏秋三時之務成功民無內憂而又無外懼國焉用城夫正其疆場修其土田險其走集邊境壘壁親其民人明其伍候部伍相為候望信其鄰國慎其官守守其交禮不僣不貪不懦不耆强也完其守備以待不虞臣按楚人畏吳之彊而城郢郢者楚之國都也不能逺撫邊境惟欲近守城郭故沈尹戍告之以此夫諸侯之守固在四鄰天子之守固在四夷然近者未備何以服逺內者未修何以攘外宋范仲淹欲修京城執政者引囊瓦城郢之事以沮之泥古人之陳言而不知當世之事宜者也秦始皇三十三年䝉恬於西北斥逐胸奴單于不勝秦北徙盡收河南地並河以東屬之隂山因河為塞築長城因邊山險塹溪谷可繕者治之起臨洮至遼東萬餘里臣按長城之築起臨洮至遼東延袤萬餘里其為計也亦勞矣然此豈獨始皇築也昭王時已于隴西北地上郡築長城矣亦非盡秦築也趙自代並隂山下至髙闕為塞燕自造陽至襄平亦皆築長城是則秦之前固有築者矣豈但秦也秦之後若魏若北齊若隋亦皆築焉蓋天以山川為險隘有所不足增而補之亦不為過然內政不修而區區於外侮之禦乃至于竭天下之財以興無窮己之功是則不知所務矣雖然長城之築雖曰勞民然亦有為民之意存焉設使漢之繼秦因其已成之勢加以修葺魏之繼漢晉之繼魏世世皆然則天下後世亦將有以賴之矣奈何後之人懲秦人起閭左之失慮䝉恬絶地脉之禍而廢其已成之功豈不可惜哉後世守邊者于邊塞之地無山川險阻之限而能因厄狹之闕順形勢之便築為邊墻以扼敵人之馳突亦不可無也但不可速成而廣擾爾若就用其守禦之人而限以三十年之久徐徐而為之其成雖遲猶勝於不為也始皇又使䝉恬渡河取髙闕陶山北假地名中築亭障以逐戎人恬居上郡十餘年威振胸奴水經曰趙武靈王自代竝隂山下至髙闕為塞山下有長城長城之際連山刺天其山中斷兩岸若闕焉自闕北出黃中關口有城跨山結局謂之髙闕戍自古迄今常置重捍以防塞道臣按所謂髙闕者其山中斷兩岸若闕焉今之邊關皆是萬山綿亘之間忽然中斷可以往來故厯代設為重城屯士卒以戍守之使外之冦賊不得入而內之姦細不得出也按史髙闕在古朔方臨戎縣北連山中斷兩峰俱峻若城闕焉朔方古夏州也今地在黃河套中世不知其所在就以今日邊關言之其最大而要者居庸紫荆松亭鴈門是也前代關隘之設皆為守邊惟今日邊關則咫尺神京之側非但守邊也蓋開闢之初天造地設此連亘之山以為內外之限而又遣巨靈擘開兩山以通出入蓋以億萬載之前豫有待乎我朝開國于億萬載之下也自古建都于燕者前有召公奭後有金元然王氣之降正有在乎今日漢人繼秦之後則以秦為鑒唐人繼隋之後則以隋為鑒彼秦與隋豈漢唐所可匹哉而以為鑒者警戒生於不足也臣嘗觀元人進金史之表曰徑卒搗居庸關北拊其背大軍出紫荆口南扼其吭此古今都燕者防患之明鑑也然搗居庸而謂之拊背出紫荆而謂之扼吭則其立言之間輕重緩急不問可知蓋背乃人身之所倚負而吭則呼吸飲食所必經死生之係也况今六軍億兆聚於京師北倚居庸即為重鎮而紫荆乃南出之路疾騎抵吾運道數日可到是尤不可不加之意焉議者往往急居庸而後紫荆此不知大勢者之言也伏望聖明深以前代為鑒防患于未然宗社生靈不勝大幸漢書賈誼傳曰斥堠望熢燧不得卧將吏被甲胄而睡文頴曰邊方備胡寇作髙土櫓櫓上作桔臯桔臯頭兜零以薪草置其中常低之有冦即火燃舉之以相告曰烽又多積薪寇至即燃之以望其煙曰燧顔師古曰晝則燔燧夜則舉烽臣按烽燧之制自漢已有之鼂錯言於文帝曰逺方之卒守塞一嵗而更不如選常居者家室田作且以備之以便為之髙城深塹具藺石布渠答鐵蒺藜復為一城其內城間百五十步要害之處通川之道調立城邑毋下千家為中周虎落外藩如淳曰藺石城上雷石也蘇林曰渠答鐵蒺藜也作虎落于塞要下以沙布其表旦視其迹以知胸奴來入文帝十四年胸奴十四萬騎入朝那蕭關殺北地都尉昻虜人畜甚多遂至彭陽使騎兵入燒回中宫候騎至雍甘泉詔以中尉周舍郎中張武為將軍車千乘騎卒十萬軍長安而拜昌侯盧卿為上郡將軍寧侯魏遫為北地將軍隆慮侯周竈為隴西將軍屯三郡上親勞軍勒兵自欲征胸奴羣臣諫不聽皇太后固要上乃止以張相如欒布為將軍擊逐出塞而還臣按漢文帝一聞邊報即欲勒兵自征胸奴帝之奮發則有矣然非帝王禦邉之常道也蓋備邊有其要不在于臨時而在於平日禦邊有其道不在於自用而在於用人是以自古聖帝明王于封疆之守尤盡心焉故於無事之時謀為措置㑹計考驗凡吾土宇之內臨邊之地若干處其延邪幾何某處為總㑹某處為要害某部最為强悍沿邊之城堡若干戍卒若干斥候若干某處當何如而守某部當何如而備某人可用為將帥某人可用為偏禆彼侵某處當用何處兵以緩之彼若深入當於何所而扼其歸某城與某城相接某寨與某寨相連里數之逺近山川之險易人力之勇怯儲峙之多寡具而為圖書而為䇿置於座右則人君雖居九重之上深宫之中不出殿門而邊寨城堡將卒戎落皆懸著於目睫之間輾轉於心胸之內一有警報即按圖運謀因機生智隨能命將合衆人之長集羣䇿之要正不必親駕六飛躬臨沙漠之區自親矢石之用屈帝王之尊為么麼之敵勝之不足以為武不幸而敗焉豈不長寇暴之威而貽中國之恥哉然則寇準勸真宗幸澶淵亦非歟曰聖人處事於其常而不於其幸夫以漢髙祖英雄之主而一時名將多在尚幾危於平城真宗視髙祖如何寇準視陳平如何髙瓊視樊噲如何必有能辨之者文帝後六年胸奴入上郡雲中所殺略甚衆烽火通於甘泉長安遣將軍令免屯飛狐蘇意屯句注張武屯北地周亞夫次細栁劉禮次霸上徐厲次棘門以備胡上自勞軍至霸上臣按漢都長安上郡雲中皆近邊之地烽火通於甘泉蓋傳報耳非敵至甘泉也飛狐句注之屯以備雲中北地細栁霸上棘門之屯以備上郡蓋古人守邊既於臨塞之地建城寨築亭障屯戍卒命將専守其地遇敵來冦既自禦之又通報於朝廷朝廷遣將屯其要害以備之所以為邊將之聲援耳不必親臨其地也使敵聞之知吾有備縱得入塞不敢馳突其塞垣守禦一責之邊將非其力不能支所遣之將不輕出也大抵內地之兵與戍邊之卒異內兵不經戰陳不曉地利且多驕脆但可以為聲援耳不若生長邊陲者慣戰而耐苦不徒為國而又亦各自為其家一卒亡一丁補知其必不可己所以肯捐軀拒敵也不然一旦命貴將統內軍以臨之兵不識將將不知兵情既不通教又非素甚者乃至未戰則用邊兵以供役臨戰則驅邊兵以當先遇有功次又攘而有之此戍邊將士所以解體也臣請遇有邊警宜如漢文遣將屯軍故事而責其功於邊將彼此相應以為聲援使知吾內外有備則自然退縮矣武帝太初四年遣光祿勳徐自為築五原塞外列城數百里逺者千里築城障列亭至盧朐顔師古曰漢制每塞要處别築為城置人鎮守謂之候城即此障也昭帝時胸奴行攻塞外亭障略取吏民去是時漢邊郡烽火候望精明胸奴為邊寇者少利希復犯塞元帝時單于上書願保塞上谷以西至敦煌傳之無窮請罷邊備塞吏卒以休天下人民天子令下有司議議者皆以為便郎中侯應習邊事以為不可許上問狀應曰周秦以來胸奴暴桀寇侵邊境漢興尤被其害臣聞北邉塞至遼東外有隂山是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北建塞徼起亭隧深開小道築外城設屯戍以守之然後邊境得用少安夫邊人之情困則卑順彊則驕逆天性然也前以罷外城省亭隧今裁足以候望通烽火而已古者安不忘危不可復罷中國有禮義之教刑罰之誅愚民猶尚犯禁又况單于能必其衆不犯約哉自中國設建關梁以制諸侯所以絶臣下之覬欲也設塞徼置屯戍非獨為胸奴而已亦為諸屬國降民本故胸奴之人恐其思舊逃亡也近因羌保塞與漢人交通吏民貪利侵盜其畜産妻子以此怨恨起而背畔世世不絶今罷乘塞乘登之而守也則生慢易分爭之漸往者從軍多沒不還者子孫貧困一旦亡出從其親戚又邊人奴婢愁苦欲亡者多日聞胸奴中樂無奈候望急何與夫盜賊桀黠羣輩犯法如其窘急亡走北出則不可制也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落謂山上樹木枯僵墮落溪谷水門稍稍平之卒徒築治功費久逺不可勝計議者不深慮其終始欲以一切省繇戍十年之外百嵗之內卒有他變障塞破壞亭隧滅絶更發屯繕治纍世之功不可卒復開邊疆之隙虧中國之固非所以永持至安威制百蠻之長䇿也顔師古曰隧謂深開小道而行避敵鈔寇也臣按班史武紀所謂城障列亭胸奴傳所謂建塞徼起亭隧是乃古人候望之所今世所謂營堡墩臺之類也賈誼傳所謂斥候烽燧鼂錯所謂藺石渠答虎落是乃古人候望之具今世所謂烟火信炮礌石之類也大抵斥候以逺為宜以髙為貴以簡為便蓋近則緩不及事低則候不及逺繁則人少而費多臣請以今日邉事言之且如宣府一處腹裏墩口二百七十二所沿邊共四百五十六所即此一處以例其餘其城塞之設皆當要害之處固無容議但墩臺之類則恐失之太多矣臣愚以為設墩臺以候望也其相去之逺近當以火光可見炮聲可聞為恨夫以方丈之土堆十數之孤卒持一二日之水米出于數百里之外其孤危甚矣茍非地險而徑迂勢髙而食足其乘障者幾何不為敵持首去如狄山也哉臣竊以為宜遣行邊大臣㑹同守邊將帥躬行邊地相其事勢審其形便于凡舊日墩臺可省者省之可增者增之可併者併之大抵主於簡而逺聲聞可相接目力可相及處則立為一墩及於衆墩之間要害處立為一堡使之統其附近諸墩有事則相為接應墩統於堡堡統於城如臂指之相使如氣脉之周流于外墩之內每二三十里各為總臺數處以次通報於城中其墩之制髙必極望墩之下于三四里間四周俱築為土牆髙四五尺長七八尺許橫斜錯亂彼此相入人須委曲然後可行使敵騎不能侵近其墩之上除候卒自持口糧外常蓄一月水米以防不測若夫烽燧之制古人晝則燔燧夜則舉燧偶遇風徑則煙斜而不能示逺值霖雨則火鬱而不能大明宜於墩臺之上立為長竿分為三等上懸紅燈以燈數多寡為緩急衆寡之候所謂紅燈者煆羊角及魚魫為之而染以紅遇夜則懸以示逺數百里之間舉目可見矣大學衍義補卷一百五十
