body:
  text: 大學衍義補卷十五明丘濬撰治國平天下之要固邦本重民之事舜典咨十有二牧養民之官曰食哉惟時朱熹曰王政以食為首農事以時為先舜言足食之道惟在於不違農時也臣按君之所以治者以民民之所以生者以食食之所以足者以農農之所以耕者以時人君所以設為州牧以子養乎民使之得以遂其生欲遂其生日食不可闕欲足其食農時不可違此帝舜所以咨牧而必以食為先而勉之以時也帝曰棄黎民阻飢厄也汝后稷播布也時百穀臣按帝舜於咨四嶽求奮事功熙帝載之後即首命棄以仍其舊職而後繼之敷教明刑之官則農事在所重而當先可知矣周公作無逸曰君子所其無逸先知稼穡之艱難乃逸則知小人之依蔡沈曰農之依田猶魚之依水木之依土魚無水則死木無土則枯民非稼穡則無以生也故舜自耕稼以至為帝禹稷躬稼以有天下文武之基起於后稷四民之事莫勞於稼穡生民之功莫盛於稼穡周公發無逸之訓而首及乎此有以哉臣按人君兢兢然所以居其身於無時暇逸之地者必先知夫稼穡之艱難也備嘗其艱難之事而後居於逸樂之地則知小人之所依矣小人所依在乎稼穡為人上者烏可縱己之欲以妨農事而使之失其所依哉文王卑服即康功安民之功田功養民之功孔穎達曰就田功知稼穡之艱難臣按文王卑服猶禹所謂惡衣服也文王於衣服之奉所性不存專意於安民養民之功然不謂養民而謂之田者周家以農事開國自公劉以來咸以稼穡為事而文王尤專心田事即是以為養民之功也周頌曰嗟嗟臣工羣臣百官敬爾在公公家王釐賜也爾成成法來咨來茹度也嗟嗟保介農官之副維莫之春夏正三月亦又何求如何新畬三嵗田於皇嘆美之辭來牟麥也將受厥明上帝之明賜也明昭上帝迄至也用康年豐年也命我衆人甸徒庤具也乃錢銚也鎛鉏也二者皆田器奄觀銍穫禾短鐮艾穫也嚴粲曰既嗟嘆而告臣工又嗟嘆而戒保介皆以重農之意告之也臣按此周成王戒農官之詩凡命他官皆無詩而命農官獨有者蓋以農者王政之本周家以此開國故重其事也成周盛時其播時百穀之事具有成法羣臣百官容或有不盡知者故於戒飭之際致其深嘆之言而且加以敬之一辭俾其詳考夫先王之成法以為三農之勸相既不可失其時又不可失其度自耕種以至于收穫無一不循其序凡舊田與夫新田無一不得其宜官則盡其勸相之功民則致其耕治之力一一皆如先王成法可也嗚呼先王之世盡心於農事者如此秦漢以來豈復有事哉噫嘻春夏祈穀于上帝也其詩曰噫嘻歎辭成王既昭明也假格也爾田官也率時是也農夫播厥百穀駿大也發耕也爾私私田終三十里萬夫之田內方三十里亦服爾耕十千維耦兩人並耕臣按我朝學士朱善謂此詩舉成王之諡則成王以後之詩也成王既置田官而戒命之後王復遵其法而重戒之率時農夫農官之職也播厥百穀農夫之事也終三十里欲其地之無遺利也十千維耦欲其人之無遺力也吁古之帝王致力於農事也如此後世之君聽民自耕自穫所以命官以治之者徵租賦督力役而已能勿擾之使其得以盡力南畝已為幸矣况求其戒敕農官勸相農民勤勤懇懇如是夫周禮遂師巡其稼穡春種曰稼秋斂曰穡而移用其民謂此遂之民移用於彼遂也以救其時事謂如水潦暴至之類合力救之遂大夫正嵗簡閲也稼器耒耜之類修稼政三嵗大比則帥其吏而興氓舉民之賢者能者明其有功者農功之修者則明之屬其地治者屬聚也地事之治者縣正趣催促也其稼事謂耕耘收斂之事而賞罰之勤者賞之怠者罰之鄼長趣其耕耨稽其女功勸織事也里宰以嵗時合耦于鋤耦並耕也以治稼穡趣其耕耨行其秩叙秩謂多寡叙謂先後司稼掌巡行視邦野之稼而辨穜先種後熟稑後種先熟之種周知其名與其所宜地所宜種之地以為法而縣于邑閭臣按周禮周公致太平之書也周家自后稷以來以農為國故周公於書既作無逸以為其君告使其知小民之所依而不敢逸豫又於詩作豳頌以為其君誦使其知王業之所起而不敢荒寧及其作周官也一書之間設官分職其間為農事者不一而足或以巡稼穡或以簡稼器趨其耕耨辨其種類合耦以相助移用以相救行其秩叙懸其法式又於三嵗大比以興其治田之氓亦如大比之興賢能焉或誅或賞或興或廢無非以為農事而已噫周公之輔成王陳言以獻忠於上者惓惓以稼穡為言建官以分治於下者諄諄以農事為急其知本乎月令孟春之月天子乃以元日上辛也祈穀于上帝乃擇元辰郊後吉日也天子親載耒耜措之于參參乘之人保介衣甲也之御御車也間帥三公九卿諸侯大夫躬耕帝籍天子三推執耒而進謂之推三公五推鄉諸侯九推又曰王命布農事命田田畯也舍居也東郊皆修封疆田之限域審端徑術術與遂通田間溝洫也善相視也丘陵阪險原隰土地所宜五穀所殖以教道民必躬親之田事既飭先定準直農乃不惑臣按天子籍田千畝收其穀為祭祀之粢盛故曰帝籍謂之籍者借也天子執耒而進然後借民力以終之也古之天子非無人可耕也而必躬為之者豈專為供上帝之粢盛哉亦以為天下之農民帥先爾天子既身為之帥先又必命田畯之官居郊野之外以督其耕修其封疆以防其交爭審端徑術以通其水道善相丘陵阪險原隰以相其地勢髙下險易燥濕土地各有所宜五穀各有所殖教之使能其事道之使達其理皆須田畯躬親教飭之以定其凖使得其平定其直使得其正則農民無所疑惑也吁以九重之上萬乘之尊猶且躬為之耕則夫閭閻小民豈有不興起也哉季春之月天子乃薦鞠衣色如鞠花之黃于先帝薦衣以祈蠶命野虞毋伐桑柘具曲簿也植槌也籧席之粗者筐筥之方者四者皆蠶具后妃齊戒親東鄉去躬桑禁婦女毋觀使不得為容觀之飾省婦使咸省其他役以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰孟夏之月蠶事畢后妃獻繭后妃受內命婦之獻乃收繭稅以桑為均繭之多寡以葉為均齊祭義古者天子諸侯必有公桑蠶室君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室嵗既單盡也矣世婦卒蠶奉繭以示于君遂獻繭于夫人夫人繅以為黼黻文章服既成君服以祀先王先公敬之至也祭統夫子親耕於南郊以共齊盛王后蠶於北郊以共純讀作緇服天子諸侯非莫耕也王后夫人非莫蠶也張栻曰周家建國自后稷以農事為務歷世相𫝊其君子則重稼穡之事其室家則躬織絍之勤相與咨嗟嘆息服習乎艱難詠歌其勞苦此實王業之根本也如周公之告成王其見於詩有若七月皆言農桑之候也其見於書有若無逸則欲其知稼穡之艱難知小人之依也帝王所𫝊心法之要端在乎此夫治常生於敬畏而亂常起於驕肆使為國者每念乎稼穡之勞而其后妃又不忘乎織絍之事則心不存焉者寡矣何者其必嚴恭朝夕而不敢怠也其必懷保小民而不敢康也其必思天下之饑寒若已饑寒之也是心常存則驕矜放肆何自而生豈非治之所由興也歟美哉周之家法也其後幽王惑褒姒而廢正后以召犬戎之禍而詩人刺之曰婦無公事休其蠶織蓋推其禍端良由稼穡織絍之事不聞於耳不動於心以至於此故誦葛覃服之無斁之章則知周之所以興誦休其蠶織之章則知周之所以衰其得失所自豈不較著乎臣按天子之尊非無可耕之人也而必躬耕以供宗廟之粢盛后妃之貴非無可織之人也而必躬蠶以為祭祀之服飾所以然者非但身致其誠信以事神明而已也亦將以其身為天下農夫蠶婦之帥先也由是畝畝之間閭閻之下聞其風教者莫不曰以天子之尊后妃之貴猶不廢耒耜機杼之業况吾儕小人乎夫然將見田里無不耕之夫室家無不織之女人人有業家家務本自然無遊手之民末作之技家給而人足盜息而訟簡民所以為生者益固國所以藏富者益厚矣張栻以為王業之根本於是乎在然推其根本之所以立則又在乎朝廷之上宫闈之間其言深至切要所謂帝王所傳心法之要端在乎此誠非虛語也伏望明主於燕閒之暇留神垂覽天下人民不勝大願國語周宣王即位不藉千畝虢文公諫曰不可夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之共給於是乎在和協輯睦於是乎興財用繁殖於是乎始敦龎純固於是乎成是故稷為大官古者太史順時瓜見視也土陽疸厚也憤積也盈土氣震發農祥房星也晨正立春之日晨中於中日月底于天廟營室土乃脈發先時九日太史告稷曰自今至于初吉二月朔日陽氣俱蒸土膏其動弗震弗渝脈其滿眚灾也穀乃不殖稷以告王曰史帥陽官春官以命我司事主農事官曰距今九日土其俱動王其祗祓祓除監農不易王乃使司徒咸戒公鄉百吏庶民司空除壇于藉命農大夫咸戒農用先時五日瞽告有協風至王即齊宫百官御事各三日王乃淳濯饗醴及期鬱人薦鬯犧人薦醴王祼鬯乃行百吏庶人畢從及藉后稷監之膳夫農正陳藉禮太史贊王王敬從之王耕一墢班三之庶人終于千畝其后稷省功太史監之司徒省民太師監之畢宰夫陳饗膳宰監之膳夫贊王王歆大牢班嘗之庶人終食是日也瞽率音官以省風土廪于藉東南鍾而藏之而時布于農稷則遍戒百姓紀農協功曰隂陽分布震雷出滯土不備墾辟在司冦乃命其旅衆也曰徇行也農師一之先往農正再之后稷三之司空四之司徒五之太保六之太師七之太史八之宗伯九之王則大徇耨穫亦如之民用莫不震動恪恭于農修其疆畔日服其鎛不解于時財用不乏民用和同是時也王事唯農是務無有求利於其官以干農功臣按詩序載芟春藉田而祈社稷也箋言藉田甸師氏所掌王載耒耜所耕之田天子千畝諸侯百畝藉之言借也借民力治之故謂之藉疏謂王一耕之而使庶民藝芓終之是借民者借此甸師之徒也漢書注韋昭亦以借民力為言臣瓚謂帝躬耕為天下先不得以假借為稱藉謂蹈藉也顔師古是瓚說引宣王不藉千畝虢文公諫為證明其非假借也以臣觀之二說相須其義始備夫以千畝之田非一人一日所能盡意其始也蹈藉田畝以躬三推之儀終也假借民力以終千畝之制爾自周以後迄于唐宋此禮不廢然耕藉田者必祀先農我列聖躬祀先農行藉田禮如古制非徒以供宗廟之粢盛實所以重農事以勸相天下之民使興起農功也漢文帝二年正月詔曰夫農天下之本也其開藉田朕親率耕以給宗廟粢盛九月又詔曰農天下之大本也民所恃以生也而民或不務本而事末故生不遂朕憂其然故今茲親率羣臣農以勸之其賜天下民今年田租之半文帝又詔皇后親桑以奉祭服為天下先景帝後二年詔曰雕文刻鏤傷農事者也錦繡纂組害女紅工也者也農事傷則飢之本也女紅害則寒之原也夫飢寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減大官省繇賦欲天下務農蠶素有畜積以備灾害臣按成周之後最重農者莫如漢文景二帝尤惓惓焉非徒有是虛文也而減租之詔嵗下雖以武帝之窮奢好武下至舟車皆有算而於田租則未嘗有加焉茲則所謂誠於憫農之實惠也自是而後君非不耕藉田后非不親蠶非不下憫農之詔非不敕守令以勸相然皆尚虛文而已非實惠也是故農不必勸也能無擾之足矣善乎柳宗元之言曰長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督爾穫蚤繅而緒蚤織而縷字而幼孩遂而雞豚鳴鼓而聚之擊木而召之小人輟飱饔以勞吏者且不得暇又何以蕃其生而安其性耶臣願仁聖在上思王業之所本念小人之所依禁遊惰則為之者衆省繇役則不奪其時減租賦則不罄所有是雖不下憫農之詔而人皆知其有憫念之心不設勸農之官而人皆受其勸相之惠田里小民不勝多幸鼂錯言於文帝曰聖王在上而民不凍飢者非能耕而食之織而衣之也為開其資財之道也民貧則姦邪生貧生於不足不足生於不農不農則不地著不地著則離鄉輕家民如鳥獸雖有髙城深池嚴法重刑猶不能禁也民者在上所以牧之趨利如水走下四方亡擇也夫珠玉金銀飢不可食寒不可衣然而衆貴之者以上用之故也粟來布帛生於地長於時聚於力非可一日成也一日弗得則飢寒至是故明君貴五穀而賤金玉又曰方今之務莫若使民務農而已矣欲民務農在於貴粟粟者王者大用政之本務臣按鼂錯以此告于文帝欲其為民開資財之道所以開之之要在於務民於農桑薄賦斂廣蓄積以實倉廩備水旱而已而其末又言方今之務莫若使民務農務農在於貴粟粟者王者大用政之本務人君誠貴五穀而賤金玉民知人君所貴在此則咸知所貴重矣九重之上誠躬行節儉而捐棄金玉切切焉勸農桑抑末作則天下之民咸趨於南畝而惟農之是務矣景帝後三年詔曰農天下之本也黃金珠玉飢不可食寒不可衣以為幣用不識其終始間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸取其資以雇庸采黃金珠玉者坐贓為盜二千石聽者與同罪臣按農天下之本也之一言者文帝之詔凡三見焉而景帝武帝亦皆以是言冠於詔之先漢人去古未逺猶知所重也後世往往重珠玉而輕穀粟是不知所重也景帝此詔令郡國務勸農桑益種樹可得衣食物其知所重矣乎以上論重民之事固邦本寬民之力易兊之彖曰說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉程頥曰君子之道其說於民如天地之施感於其心而說服無斁故以之先民則民心說隨而忘其勞率之以犯難則民心說服於義而不恤其死說道之大民莫不知勸勸謂信之而勉力順從人君之道以人心說服為本故聖人贊其大臣按此兌卦之彖辭兌之義說也兌上為君兌下為民有君民相說之象人君之用民力必以說服為本有事而欲與民趨之則思曰此民所說乎不說乎茍民心說也則先以趨之則民知上之勞我所以逸我也咸忘其為勞矣有難而欲與民犯之則民知上之死我所以生我也咸忘其為死矣人君之欲用民力察夫事之理而得其正體夫民之心而同其欲必為天下而不為一家必為衆人而不為一己然後為之則民無不勸勉順從者矣節之彖曰節以制度不傷財不害民程頥曰聖人立制度以為節故能不傷財害民人欲之無窮也茍非節以制度則侈肆至於傷財害民矣臣按此節卦之彖節之為言有限而止也為卦下兌上坎澤上有水其容有限故為節聖人體節之義則立為制度量入為出無過取無泛用寧損己而益人不厲民以適己則必不至於傷財不傷財則不至於害民矣詩靈臺之一章曰經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來朱熹曰國之有臺所以望氛祲察災祥時觀遊節勞佚也文王之臺方其經度營表之際而庶民已來作之所以不終日而成也雖文王心恐煩民戒令勿亟而民心樂之如子趨父事不召自來也孟子曰文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼此之謂也臣按人君之用民力以興土木之工必若文王之作靈臺將以望氛祲察災祥時觀遊節勞佚然後為之是其所以為此臺者非專以適己蓋不得已不得不為者也故其雖用民力民反歡樂之若秦之阿房漢之長楊五柞則是勞民以奉己也民安得而不怨恨之哉民怨則國不安危亡之兆也周禮小司徒之職乃均土地以稽其人民而周知其數上地家七人一夫受田百畝七口以上授以上等之地可任也者家三人可任力役者每家三人中地家六人可任也者二家五人二家共五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡正卒之外皆為羡卒惟田與追胥竭作惟田獵與逐捕冦盜則正卒羡卒皆作臣按成周盛時其役民也因其受田之髙下以定其力役之多寡故其事力相稱而其為役也適平及其徒役之起又不過家用一人非田獵與追胥不至於並行也非若後世不復考其人之數不復量其人之産一切征發乃至於盡室而行焉鄉大夫之職以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十七尺年二十野自六尺以及六十有五六尺年十五皆征之其舍者謂不征者國中貴者賢者能者服公事者老者疾者皆舍旅師凡新氓新徙來者之治皆聽之使無征役臣按成周力役之征必稽考其版籍之數以辨其事力之任否地近而役多者則征之遲而舍之早地逺而役少者則征之早而舍之遲非若後世役民往往勞近而寬逺政與古人相反也是以自古明王尤軫念畿甸之民無事之時常加寬恤蓋以有事之時必賴其用故也然不獨寬其國中之民而已凡國之中貴而有爵者賢而有德者能而有才者服勞公事者老者疾者皆復除之與夫新氓之治則無征役凶札之嵗則無力政凡此皆先王行役民之義而存仁民之心均人凡均力役之政以嵗上下豐年則公旬音均用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札凶謂饑荒札謂疾疫則無力政併與力政免之臣按此即王制所謂用民之力嵗不過三日者也然又因嵗時之豐歉以定役數之多寡是以三代盛時之民以一人之身八口之家於三百有六旬有六日之間無一日而不自營其私也所以為公者僅三日焉耳後世驅民於鋒鏑起民以繇戍聚民以工作蓋有一嵗之間在官之日多而家居之日少甚者乃至於終嵗勤苦而無一日休者嗚呼民亦不幸而不生於三代之前哉雖然萬古此疆界萬古此人民也上之人誠能清心省事不窮奢而極欲不好大而喜功庶幾人民享太平之福哉春秋僖公二十年春新作南門胡安國曰書新作南門譏用民力於所不當為也春秋凡用民力得其時制者猶書于䇿以見勞民為重事而况輕用於所不當為者乎臣按人君之用民力非不得已不可用也蓋君以養民為職所以養之者非必人人而食之家家而給之也惜民之力而使之得以盡其力於私家而有以為仰事俯育之資養生送死之具則君之職盡矣孔子作春秋於魯僖之作頖宫則不書復閟宫則不書而於作南門則書之不徒書之而且加以新作之辭以見頖宫閟宫乃魯國之舊制有以舉之則不可廢雖欲不修不可得也如此而用民力亦不為過若夫南門魯國舊所無也雖不作之亦無所加損何必勞民力以為此無益之事此聖人所以譏之歟左傳昭公十九年楚人城州來沈尹戍曰楚人必敗昔吳滅州來在昭十三年子旗請伐之王楚平王曰吾未撫吾民今謂城州來也亦如之而城州來以挑吳能無敗乎侍者戍之侍者曰王施施恩德舍舍逋負不倦息民五年可謂撫之矣戍曰吾聞民樂其性而無冦讎今宫室無量民人日駭勞罷音疲死轉忘寢與息非撫之也臣按沈尹戌此言人君之欲用民力必先有以撫之所以撫之之道在乎節用於內而樹德於外蓋用不節則必美衣食厚用度營宫室廣廟宇財費於內力疲於外而民不安其居不遂其生勞苦罷困死亡轉徙而林林而生總總而處者皆不得樂其性而且為吾之冦讎矣為人上者可不畏哉哀公十一年季孫欲以田賦使冉有訪諸仲尼仲尼不對而私於冉有曰君子之行政事也度於禮施取於厚事舉其中斂從其薄如是則以丘丘十六井是賦之常法亦足矣臣按施取於厚即所謂食壯者之食也事舉其中即所謂任老者之事也斂從其薄即所謂不厚斂於民也此三言者聖人雖為季孫發而以告冉有後世人主行事以禮用民以寬要當以是為法王制用民之力嵗不過三日孔穎達曰周禮均人豐年旬用三日中年旬用二日無年旬用一日年嵗不同雖豐不得過三日也臣按用民力如治城郭塗巷溝渠宫廟之類若師旅之事則不拘此制又曰凡使民任老者之事食壯者之食臣按先儒謂老者食少而功亦少壯者功多而食亦多今之使民雖少壯但責以老者之功程雖老者亦食以少者之飲食寬厚之至也八十者一子不從政從政謂給公家之力役九十者其家不從政廢疾非人不養者一人不從政父母之喪三年不從政齊衰大功之喪三月不從政將徙欲去者於諸侯三月不從政自諸侯來徙已來者家期不從政臣按昔人有言夫人莫衰於老莫苦於疾莫憂於喪莫勞於徙此王政之所宜恤者故皆不使之從政焉如是則老耄者得以終其天年廢疾者得以全其身體居喪者盡送終之禮遷徙者無失所之虞是亦仁政之一端也孔子曰張張弓弦也而不弛落弓弦也文武弗能也弛而不張文武弗為也一張一弛文武之道也臣按此章孔子因子貢觀蠟之問而以弓喻民以答之謂弓之為器久張而不弛則力必絶如民久勞苦而不休息則其力必憊久弛而不張則體必變如民久休息而不勞苦則其志必逸弓必有時而張如民必有時而勞弓必有時而弛如民必有時而息一於勞苦民將不堪雖文王武王有所不能治也一於逸樂則民將廢業則文王武王必不為此也然則果如之何而可曰不久張以著其仁不久弛以著其義子曰使民以時朱熹曰時謂農隙之時也臣按朱熹解此章謂時為農隙之時至孟子不違農時章則又解曰農時謂春耕夏耘秋收之時凡有興作不違此時至冬乃役之也臣竊以謂嵗時有早晚氣候有寒暑農事有劇易事體有緩急人君遇有興作必當順天之時量事之勢適民之願茍墮指裂肌之時爍石流金之候農務方殷飢寒切體而欲有所營為可乎所謂時者非但謂農時各隨時而量其可否可也魯人為長府閔子騫曰仍舊貫如之何何必改作王安石曰改作勞民傷財在於得己則不如仍舊貫之善臣按古人必不得已而後改作非甚不得已必不肯快一己之私意廢前人之成功安石能為此言至其為相乃變祖宗之法何哉魯定公問於顔回曰子亦聞東野畢之善御乎對曰善則善矣然其馬將必佚公曰何以知之對曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡銜體正矣步驟馳騁朝禮畢矣歷險致逺馬力盡矣然而猶乃求馬不已臣以此知之公曰吾子之言其義大矣願少進乎回曰鳥窮則啄獸窮則攫人窮則詐馬窮則佚自古及今未有窮其下而無危者也臣按家語此章顔子謂舜不窮其民是以無佚民由是推之則桀紂窮其民所以有佚民而致危亡之禍也可知己後世人主其尚無以苛政虐刑以窮其民哉漢髙祖七年民産子復勿事二嵗宣帝地節四年諸有大父母父母喪者勿繇事使得收斂送終盡其子道臣按地節之詔即推廣王制父母之喪三年不從政之意高帝七年令民産子復勿事二嵗豈非古人保胎息之遺意歟漢世去古未逺愛養元元之心猶有三代餘風已死也而憫其喪未生也而保其胎人君以此為政則其國祚之長豈不宜哉以上論寬民之力固邦本愍民之窮書大禹謨不虐無告不廢困窮惟帝時克真德秀曰易虐者不虐易廢者不廢皆自克艱一念為之臣按帝舜然禹克艱之言而及於無告困窮者蓋人君以一人而為億兆人之父母要必億兆人皆得其所然後一人克盡其道君道厥惟艱哉是以人君欲盡克艱之道布德於有生之民非難而施惠於無告之民為難也不虐無告不廢困窮帝舜不敢謂其必能而歸之於堯孔子謂堯舜以博施濟衆為病亦此意歟雖然人君富有四海茍惻然興念則澤無不被矣夫豈難事而必謂帝堯然後時克哉噫樹藝者培其方長非難而蘇其枯槁為難業醫者已其疾病非難而起其膏肓為難後世帝王有志於堯舜之治而思盡君道之難者發政施仁烏可後此無逸懷保小民惠鮮鰥寡蔡沈曰於小民則懷保之於鰥寡則惠鮮之惠鮮者鰥寡之人垂首喪氣賚豫周給之使有生意臣按昔帝舜告大禹以帝堯克艱之道而以不虐無告不廢困窮為言今周公告成王以文王無逸之實而以懷保小民惠鮮鰥寡為言是知自古帝王所以克艱其君而所其無逸者必先於發政施仁而所以發政施仁者必先於天民之無告者前聖後聖其揆一也詩正月篇哿矣富人哀此㷀獨朱熹曰亂世富人猶或可勝㷀獨甚矣此孟子所以言發政施仁必先鰥寡孤獨也臣按民之生也有富有貧其富者雖不幸而孤獨鰥寡然猶有以為養生送死之具惟夫既孤獨鰥寡矣而又貧窶乏絶焉生無以為生死無以為死其尤可哀哉是以帝王之施仁政也又於其中較其淺深而為之賙恤使之均得其所焉周禮大司徒以保息六養萬民三曰振窮鄭𤣥曰天民之窮者有四曰鰥曰寡曰孤曰獨臣按民之生也少者賴父母以鞠之老者賴子孫以養之生有衣食之資死有葬祭之具則其生遂而不窮矣然其所以遂其生者實賴上之人為之制産立法使之相生養相保愛而不相棄背焉然物不能以皆齊命不能以皆偶其間不能無幼弱而失怙恃衰老而無所依傍者焉非上之人𢎞保息之政舉振救之令則彼何所控告以全其身命而盡其天年也哉禮運大道之行天下為公矜寡孤獨廢疾者皆有所養臣按大道之行謂唐虞之世也當是之時家給而人足老安而少懷烏有所謂無告廢疾者哉記禮者猶以此為言以見天下為公之世無一人之不遂其生則雖窮而無告病而有疾者皆有所養焉舉隆古之盛以示後世之法使凡有志於堯舜之治者皆當以堯舜之心為心王制少而無父者謂之孤老而無子者謂之獨老而無妻者謂之矜老而無夫者謂之寡此四者天民之窮而無告者皆有常餼陳澔曰皆有常餼謂君上養以餼廩有常制也臣按天下之民孰非天之所生乃獨於幼而無父老而無子與夫無妻無夫者而謂之天民吁民固皆天生者也而此四民者力不足以養其身言不足以達其情則是生於天而不能全天之生尤天之所愍念者也人君於此四等窮人而加惠焉是乃所以補助天之所不逮者也月令孟春之月掩骼埋胔臣按人之生也全理氣之性具骨肉之軀其生也有所養其死也有所藏則人之始終畢矣茍死而暴露其骼胔必生而凍餒其身體者也仁人君子見之寧不惻然於心乎此三代盛時所以因時而有掩骼埋胔之令也孟子曰老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者也文王發政施仁必先斯四者朱熹曰先王養民之政導其妻子使之養其老而恤其幼不幸而有鰥寡孤獨之人無父母妻子之養則尤宜憐恤故必先之也臣按孟子此言即無逸所謂文王懷保惠鮮之實也昔者明王制民之産使仰足以事父母俯足以畜妻子其或不幸少而喪父老而喪子而無夫而無妻焉故其發之於政施之於仁汲汲然以此四者為先惟恐後時而其人或阽於死亡而吾之惠不得以及之也漢文帝詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡而莫之省憂為民父母將何如其議所以振貸之宣帝詔曰鰥寡孤獨髙年貧苦之民朕所憐也前下詔假公田貸種食其加賜鰥寡孤獨髙年帛章帝詔曰蓋人君者視民如父母有􅉃怛之愛有忠愛之教匍匐之救其嬰兒無父母親屬及有子不能養食者廩給如律臣按漢世去古不逺其惠養斯民猶有古意觀文帝宣帝章帝茲三詔者皆無上事而特下之顓顓然以惠此無告之天民其視魏晉以來因他事下詔而附列於條欵之中者有間也惟我聖祖登極之七年特詔天下其略曰曩因天下大亂死者不可勝數朕日夕慮上帝有責思之再三民間流離避亂父南子北至今不能㑹聚或子殁親老而無養親殁子幼而無依皆朕之過也今詔天下有司具名以言朕當惠居存養使不失所噫聖祖特下此詔蓋自漢帝三詔之後所僅有者也唐太宗貞觀元年賜民年八十以上有􅑏獨鰥寡疾病不能自存者米三斛宋崇寧元年詔諸路置安濟坊紹興二年詔臨安府置養濟院淳祐七年創慈幼局應遺棄小兒民間有願收養者官為倩貧婦就局乳視官給錢米如令臣按前此惠民之政及於無告者往往因事而行其置為院場以專惠之者始見于此我太祖開基之五年詔天下郡縣立孤老院凡民之孤獨殘疾不能自生者許入院官為贍養每人月米三斗薪三十斤冬夏布一匹小口給三分之二尋又改孤老院為養濟院其初著之於令曰凡鰥寡孤獨每月給米每嵗給布務在存恤監察御史按察司官常加體察既而著之於律曰凡鰥寡孤獨及廢疾之人貧窮無親屬依倚不能自存所在官司應收養而不收養者杖若應給衣糧而官吏尅減者以監守自盜論不特乎此其後也又申之以憲綱曰存恤孤老仁政所先仰府州縣所屬凡有鰥寡孤獨廢疾無依之人俱收於養濟院常加存恤合得衣糧依期按月支給毋令失所遇有疾病督醫治療噫列聖相承發政施仁咸先於斯凡頒詔條必申飭焉可謂仁之至而義之盡矣臣竊以謂京城百萬軍民所聚無告之民不可數計有司拘於事例必須赴告通政司送户部下該管官司取里鄰結狀然後得與居養之列文移上下動經旬月彼無告窮民豈能堪此為今之計乞敕巡城御史及兵馬司官凡遇街衢悲呼丐食之人即拘集赴官詢其籍貫居址挨究有無親屬産業有産業者責之管業之人有親屬者責之有服之親如果産業親屬俱無即發順天府收入養濟院居養如此則無告之民皆沾實惠而衢路之間無悲號者矣紹興十三年詔下錢塘仁和二縣踏逐近城寺院充安濟坊籍定老幼貧乏不能自存者及乞食之人每人日支米一升錢十文小兒半之臣按宋自南渡後建都臨安既於京府立養濟院又於兩赤縣以近城寺院充安置坊籍定老幼貧乏乞丐之食日支米給錢以收養之我朝於京府既立養濟院又於京城中東西就兩僧寺官給薪米爨熟以食貧丐之人每寺日支米三石恩至渥也臣竊以謂兩寺之設日有所費然兩捨飯寺皆在僻靜之地易於作弊臣請東寺移於崇文門大街西寺移於宣武門大街人煙輳集處每所差部屬官一員專提調光祿官一員司飯食每當食時兵馬官兵沿街趣召給與木籌依次散食仍令巡城御史監視有不如法及作弊者罪之如此非但貧窮得食亦使街道肅清雖然此事關繫非小京邑翼翼四方之極而使疲癃殘疾之人扶老攜幼垂首喪氣匍匐於周道之㫄悲號於通衢之側輦轂之下耳目所及乃尚如此何以示四逺之觀瞻豈不貽外夷之譏笑伏乞聖明降賜敕諭㮄于通衢付其責於巡城御史兵馬司官今後有匍匐悲號于道路者坐以違制之罪崇寧三年詔諸州縣擇髙曠不毛之地置漏澤園凡寺觀寄留槥櫝之無主者及暴露遺骸悉瘞其中各置圖籍立記識仍置屋以為祭奠之所聽親屬祭享著為令臣按先王之於民也制為養生之法而使之得所養有不得其養者則施之以惠鮮之政制為藏死之具而使之得所藏有不得其藏者則施之以掩埋之令不徒恤其生而又恤其死也聖祖於洪武三年慮天下貧民多以水火葬有傷風化下禮部議禮部奏民間死喪不許焚化貧窮無地者所在官司擇近城空地設為義冢以為瘞藏之所祖宗良法美意今皆廢弛乞敕有司舉行是亦仁民之政之大者以上論愍民之窮大學衍義補卷十五
