body:
  text: 大學衍義補卷二明丘濬撰治國平天下之要正朝廷正綱紀之常禮記曰聖人作為父子君臣以為紀綱紀綱既正天下大定漢匡衡曰窈窕淑女君子好仇此紀綱之首王教之端也白虎通曰三綱君臣父子夫婦也六紀諸父兄弟族人諸舅師長朋友也綱張也紀理也大綱小紀所以張理上下整齊人道也詳見前編臣按綱紀二字竝言始見于五子之歌再見于詩棫朴假樂之篇大約以網罟為喻綱謂網之大繩紀謂網中絲縷之目張其大者是之謂綱理其小者是之謂紀譬則朝廷之行事舉其大者則小者自隨貴乎能振肅之而已不然則有廢而不舉之處一切頺墮而不可為矣是則紀綱之喻也然所謂綱紀者蓋亦多端而在人倫者尤為重焉是故人君為治欲正天下之紀綱先正一家之紀綱家之紀綱倫理是也倫理既正則天下之事如挈綱然一綱既張而萬目之井然者各得其理矣臣於正朝廷下舉家之倫理以為紀綱之首者原其本也書五子之歌太康逸游失其國其弟五人述大禹之戒以作歌其三曰惟彼陶唐帝堯也有此冀方堯所都今失厥道亂其紀綱乃底滅亡蔡沈曰堯舜禹相授一道以有天下今太康失其道而紊亂其紀綱以致滅亡也臣按道者天下古今所共由之理大中至正之極堯傳之舜舜傳之禹禹𫝊之啓以詒厥子孫者也太康以逸豫滅厥德則失其祖父所傳之道所傳之道既失則凡其政令之所行大之為綱小之為紀者咸紊亂矣紀綱既亂則上無道揆下無法守其底於滅亡也宜哉先儒有言道者君天下之本紀綱者維持天下之具臣竊以為所以立道而維持其紀綱者修德又其本也人君誠能修德以立道立道以正天下之紀綱則可以保祖宗之基業詒子孫之逺謀矣詩大雅棫朴之篇曰勉勉我王綱紀四方朱熹曰凡網罟張之為綱理之為紀言文王之德有以振作綱紀天下之人而人歸之又曰勉勉我王綱紀四方都在他線索內牽著便動臣按此詩乃周人詠歌文王能振作人才之意上文有曰周王夀考遐不作人先儒謂綱紀即作人之意也商之末世士氣卑弱甚矣文王以夀考之年鼓舞振動之於上使之奮發踊躍之於下於是四方之人彬彬濟濟咸在乎文王變化鼓舞之中有如舉網之綱衆目自隨之而振動是則所謂勉勉不己之我王有以為四方人才之綱紀也是以卑弱之氣變而盛大頺靡之藝起而植立賢才於是乎奮庸政事於是乎修舉由是以觀可見人君為治之道在立紀綱立紀綱在作人才人才作於國中則綱紀張於四外此人君為治所以貴乎勉勉不已也假樂之詩曰威儀抑抑密也德音秩秩有常也無怨無惡率由羣匹類也謂盡用衆賢受福無疆成王在上受福無已四方之綱總持四方之大綱之綱謂大綱之紀謂小紀燕安也及朋友朋友者合百辟卿士言之也百辟卿士內之百辟外之卿士媚于天子皆盡媚愛天子之心不解于位不敢懈怠于職位民之攸暨暨息也朱熹曰言有威儀聲譽之美又能無私怨惡以任衆賢是以能受無疆之福為四方之綱又言人君能綱紀四方而臣下賴之以安則百辟卿士媚而愛之維欲不解于位以為民所安息也又曰四方之綱即繼之曰之綱之紀蓋張之為綱理之為紀下靣百辟卿士至於庶民皆賴君以為綱所謂不解于位者蓋欲綱常張而不弛也黃􅩂曰上四句即所以為綱之道也是故元氣不存雖盛且壯不足為一身之福綱紀不立雖强且富不足為人君之福詩人以無疆之福祝其子孫而繼之曰四方之綱又繼之曰之綱之紀其意不亦淵乎臣按先儒謂君燕其臣臣媚其君此上下交而為泰之時也所以然者其道本諸身徴諸庶民永終譽于天下而無厭無斁所持循者率皆匹類之所同然是以德備諸己而福集厥躬標凖立于上法則示乎下而有以為四方之綱而東西南北之人莫不於是總攝維繫之而皆歸附趣向之不容渙散矣然不徒其大者有以為大事之綱而其小者亦有以為小事之紀張之理之無或緩弛無或渙散皆足以垂憲而作則焉綱紀既立自然德澤禮節有以延及夫羣匹庶類凡夫心志同而意氣合者皆賴之以得其安矣既賴之以得其安則所安者心孚而意契感恩而思報咸知所以媚愛於上上下之情綢繆如一有如易所謂上下交而志同者豈非地天交泰之時乎夫既泰矣然又何憂之有哉憂乎怠荒而已此所以終於不解於位民之攸暨也蓋不解于位則其綱常張而不弛非特百辟卿士賴以為安羣黎百姓亦得以休息而福之在君身者且將永永有無疆之休矣由是觀之德之在身為威儀發於外為聲譽德乎德乎其立紀綱之根本而所謂不解者又其保紀綱之節度乎唐韓愈曰善醫者不視人之瘠肥察其脉之病否而已矣善計天下者不視天下之安危察其紀綱之理亂而已矣天下者人也安危者肥瘠也紀綱者脉也脉不病雖瘠不害脉病而肥者死矣通于此說者其知所以為天下乎夏殷周之衰也諸侯作而戰伐日行矣傳數十王而天下不傾者紀綱存焉耳秦之王天下也無分藝于諸矦聚兵而焚之傳二世而天下傾者紀綱亡焉耳是故四肢雖無故不足恃也脉而已矣四海雖無事不足矜也紀綱而已矣宋儒朱熹告其君曰四海之廣兆民至衆人各有意欲行其私而善為治者乃能總攝而整齊之使之各循其理而莫敢不如吾志之所欲者則以先有綱紀以持之於上也何謂綱紀辨賢否以定上下之分核功罪以公賞罰之施也然綱紀之所以振則以宰執秉持而不敢失臺諫補察而無所私人主又以其大公至正之心恭己於上而照臨之是以賢者必上不肖者必下有功者必賞有罪者必刑而萬事之統無所闕也紀綱既正則天下之人各自矜奮更相勸勉以去惡而從善蓋不待黜陟賞罰一一加于其身而禮義之風廉恥之俗己丕變矣惟至公之道不行于上是以宰執臺諫有不得人黜陟刑賞多出私意而天下之俗遂至於靡然不知名節行檢之可貴而惟阿諛軟熟奔競交結之為務一有端言正色於其間則羣譏衆排必使無所容於斯世而後已茍非斷自聖志灑濯其心而有以大警敕之使小大之臣各舉其職以明黜陟以信刑賞則何以振已頺之綱紀哉又曰人君為治之本在乎正心術以立紀綱所謂綱者猶網之有綱也所謂紀者猶絲之有紀也朱子此解紀字與詩集傳微不同網無綱則不能以自張絲無紀則不能以自理故一家則有一家之綱紀一國則有一國之綱紀若乃鄉總於縣縣總於州州總於諸路諸路總於臺省臺省總於宰相而宰相兼統衆職以與天子相可否而出政令此則天下之綱紀也然而綱紀不能以自立必人主之心術公平正大無偏黨反側之私然後綱紀有所繫而立君心不能以自正必親賢臣逺小人講明義理之歸閉塞私邪之路然後乃可得而正也又曰一二近習之臣上則蠱惑陛下之心志使其不信先王之大道而恱于功利之卑說不樂莊士之讜言而安于私􅉏之鄙態下則招集士大夫之嗜利無耻者文武彚分各入其門所喜則隂為引援擢置清顯所惡則密行訾毁公肆擠排交通貨賂所盜者皆陛下之財命卿置將所竊者皆陛下之柄宰相師保賓友諌諍之臣或反出入其門墻承望其風㫖藝成威立中外靡然向之使陛下之號令黜陟不復出于朝廷而出於此一二人之門名為陛下之獨斷而實此一二人者隂執其柄蓋其所壞非獨壞陛下之紀綱而已乃并與陛下所以立綱紀者而壞之焉臣按自古儒臣論為治之綱紀莫切於唐韓愈宋朱熹而熹之所以告其君者尤為切至焉伏望明主留神省察奮發剛斷一正宸心斥逺姦邪建立綱紀以幸四海困窮之民如熹之所以望其君者臣尤不勝大願以上正綱紀之常正朝廷定名分之等易履大象曰上天下澤履君子以辨上下定民志程頤曰天在上澤在下天下之正理也人之所履當如是君子觀履之象以辨别上下之分以定其民志夫上下之分明然後民志有定民志定然後可以言治民志不定天下不可得而治也古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之皆非有預于已也農工商賈勤其事而所享有限故皆有定志而天下之心可一後世自庶士至於公卿日志於尊榮農工商賈日志于富侈億兆之心交騖於利天下紛然如之何其可一也欲其不亂難矣此由上下無定志也君子觀履之象而分辨上下使各當其分以定民之心志也書說命曰明王奉若天道建邦建諸矦之邦於外設都設天子之都于內樹后王天子君公諸矦承以大夫師長臣按名分之等乃天下自然之理髙卑有不易之位上下有一定之分皆非人力私意之所為者也觀易之辨上下定民志法乎上天下澤自然之象書之樹后王君公承以大夫師長由於明王奉順上天之道是則尊之臨卑下之奉上一惟法天地自然之數順天道自然之常而已彼負其强乃欲以卑而逆尊恃其貴乃欲以上而陵下皆逆天道而不知上天下澤之理者也禮記大傳曰名著而男女有别又曰名者人治之大者也可無慎乎臣按所謂名者非止于位分之謂凡有所稱呼者皆名也所謂分者非止於等級之謂凡有所分别者皆分也是以不但朝廷之上位署之間有之則凡一家之內親屬之中皆有所謂名與分焉名分之在人家者尤嚴于男女之際婦人尊卑大小本無定位隨其夫以為尊卑大小其名分顯著灼然知其為尊為卑為昭為穆以之定昏姻别內外而淫亂賊逆之禍不作矣此名所以為人治之大而不可不慎者也論語子路孔子弟子姓仲名由曰衛君衛國之君名輒待子而為政子將奚先子曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足謝良佐曰正名雖為衛君而言然為政之道皆當以此為先臣按衛輒不父其父而禰其祖父子之名實紊矣故孔子為政必以正名為先焉然凡事皆有名非特父子為然也蓋有實斯有名名者實之賓也名既不正則凡見于言論之際稱謂之間皆有所疑惑窒礙非徒不可行且不可言播告之修必有所回護條教之布必有所妨礙彼或執詞以致詰我將無辭以質對此言不順所以事不成事不成而禮樂不興刑罰不中而流弊至于民無所措其手足也然則正名之道奈何曰務其實而已矣必有此實然後豫之以此名既有此名必當副以此實如此則稱謂之間端然其正言論之際怡然其順矣名正言順尚何事之不可為何政之不可成哉左傳桓公十年虢叔周襄王卿士譖其大夫詹父于王詹父有辭詹父有自直之辭訴于王以王師伐虢呂祖謙曰屈天下之理以信天下之分非善持名分者也虢叔譖其大夫詹父于桓王詹父有辭王為之伐虢而出虢公數𫝊而至于襄王晉文公以元咺執衛侯而請殺之襄王曰君臣無獄今元咺雖直不可聽也襄王之意豈非矯桓王之失乎所謂君臣無獄者固可以為萬世訓至若元咺雖直之一語猶未免世俗之見也茍如襄王之說是元咺之理未嘗不直所以不可聽者恐亂君臣之分耳有所謂理又有所謂分是理與分判然二物也君子言分必及理言理必及分理與分得則俱得失則俱失臣之訴君者先有訴君之曲不必問其所訴之辭也當詹父元咺未訴君之時其理固直既啓訴君之口則己陷于滔天之惡矣君臣之際本非較曲直之地後之為治者非合分與理為治亦安能洗犯上之習而還于古哉臣按呂氏謂君子言分必及理言理必及分得則俱得失則俱失君臣上下夫豈較是非爭曲直之所在哉此非特名分所拘而理固當如是也莊公十八年虢公晉侯朝王周惠王新即位虢公與晉獻公來朝王饗醴饗以醴酒命之宥以幣物宥之皆賜玉五瑴雙玉為瑴馬三匹非禮也王命諸矦名位不同禮亦異數不以禮假人晉矦與虢公同賜是以禮假人也呂祖謙曰為天守名分者君也周惠王誤視為己物輕以假人當虢公晉侯之來朝等其玉馬之數不為之隆殺殊不知天秩有禮多多寡寡不可亂也人心無厭侯而可假公之禮則公亦思假王之禮王既假晉侯以公禮矣後數十年而晉文有請隧之舉果欲假王之禮非惠王啓其僭心晉文遽敢爾邪聖人欲上全天子之尊必先下謹士庶人之分守其下所以衛其上也臣按呂氏謂欲上全天子之尊必先下謹士庶人之分守其下所以衛其上也斯言也真誠謹始審幾之要居人上者在所當知成公二年衛新築人仲叔于奚新築地名仲叔守其地救孫桓子名良夫桓子是以免既衛人賞之以邑辭不受請曲縣曲縣軒縣也諸矦之樂繁纓諸矦馬飾以朝許之仲尼聞之曰惜也不如多與之邑惟器與名車服之器爵號之名不可以假人輕假借于人君之所司也此器與名乃人君之所司主也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人若以器名假借于人與人政也是以國家之政與人也政亡則國家從之弗可止也已臣按人君之所以為君所以礪天下之人而使之與我共國家之政而治天下之民者爵號之名車服之器而已非有功者不可與非有德者不可與非有勞者不可與非有才者不可與為人君者謹司其出納之權不輕以假借于人焉必有功德才能者然後與之與之名與器即與之以政也使人聞吾爵號之名即知所敬服見吾車服之器即知所尊讓如是則吾之政令行矣茍有財者可以財求有藝者可以藝得有親昵夤緣者皆可以幸而致之則名與器不足貴矣名與器不足貴得者不以為榮見者不知其為尊則人君失其所司之柄矣失其所司之柄則亡其為政之體亡其為政之體則失其為君之道國家將何所恃以自立哉通鑑初命晉大夫魏斯趙籍韓䖍為諸侯司馬光曰天子之職莫大于禮禮莫大于分分莫大于名何謂禮紀綱是也何謂分君臣是也何謂名公侯卿大夫是也夫以四海之廣兆民之衆受制于一人雖有絶倫之力髙世之智莫不奔走而服役者豈非以禮為之綱紀哉故天子統三公三公率諸侯諸侯制卿大夫卿大夫治士庶人貴以臨賤賤以承貴而君臣之分猶天地之不可易然後上下相保而國家治安然禮非名不著非器不行名以命之器以别之然後上下粲然有倫名器既亡則禮安得獨在哉故繁纓小物也而孔子惜之正名細務也而孔子先之蓋事未有不始于微而成于著聖人之慮逺故能謹其微而治之衆人之識近故必待其著而後救之治其微則用力寡而功多救其著則竭力而不能及也嗚呼周道之衰綱紀散壞禮之大體十喪七八然猶歷數百年宗主天下徒以名分尚存故也今晉大夫暴蔑其君親分其地天子既不能討又寵秩之使得列于諸侯是區區之名分復不能守而并棄之也先王之禮於斯盡矣臣按司馬氏編歷代史而託始於周威烈王始命三晉為諸矦故為此名分之論而統其宗于禮其示後世人主以謹微之意至矣唐肅宗時平盧節度使王𤣥志卒上遣中使往撫慰將士就察軍中所欲立者授以旌節李懷玉殺𤣥志之子推侯希逸為軍使朝廷因以希逸為節度副使節度使由軍士廢立自此始司馬光曰民生有欲無主乃亂故聖人制禮以治之所以辨上下定民志也凡人君所以能有其臣民者八柄存乎已也茍或捨之則彼此藝均何以使其下哉肅宗遭唐中衰幸而復國宜正上下之禮以綱紀四方而偷取一時之安不思永久之患委一介之使徇行伍之情無問賢愚惟其所欲積習為常謂之姑息乃至偏裨殺逐主帥亦不治罪因而授之然則爵賞廢置殺生與奪皆不出於上而出於下亂之生也庸有極乎古者治軍必本于禮今唐蔑之使士卒得以陵偏裨偏裨得以陵將帥則將帥陵天子自然之藝也臣按名分生于上下之際名分一定則下之於上有順而無逆有令而無違上得以率于下下不得以犯乎上一有犯焉則刑戮加之矣犯且不可况敢廢立之哉此人君為治所以必謹于禮以正名分而防其陵替之漸也以上定名分之等大學衍義補卷二
