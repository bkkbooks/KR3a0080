body:
  text: 大學衍義補卷五十九明丘濬撰治國平天下之要秩祭祀宗廟饗祀之禮下祭義祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘故君子合諸天道春禘秋嘗吳澂曰天道三月一小變而為一時禘當作祠此言毎歳時祭疏數之義未及三月而又祭則祭期太促密疑若煩縟而媟瀆已過三月而不祭則祭期太闊逺疑若怠慢而不思其親天道一歳有四時故君子之祭取法於天道而一時一祭一歳通有四祭是為不數不疏而得其中合於天道三月為一時之節也周諝曰一歳之内天時有四而宗廟之祭亦有四舉春以見夏舉秋以見冬霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之樂以迎來哀以送往吳澂曰鄭氏謂霜露既降上脱一秋字此承上文春祠秋嘗而言隂陽往來之義孝子各因其時而念親也秋謂自孟秋之月以接乎秋後孟冬之月也已霜則霜降未霜則露降悽愴悲惨之意春謂自孟春之月以接乎春後孟夏之月也有雨則雨濡無雨則露濡怵惕驚恐之意來謂兩間生物長物之氣伸而來則祖考之魂氣亦隨之而來也往謂兩間收物藏物之氣屈而往則祖考之魂氣亦隨之而往也履秋時霜露所降之地而悲慘者非怯其寒而然以祖考與造化之氣俱往故悲其不可復留也履春時雨露所濡之地而驚恐者以祖考與造化之氣俱來如將見其在此故驚其忽有所見也黄裳曰雨露既濡則萬物感陽以生霜露既降則萬物感隂以死萬物以生之時君子不忍致死於其親且謂其與物而來矣故樂以迎之萬物以死之時君子不敢致生於其親且謂其與物而往矣故哀以送之致齊於内散齊於外齊之日思其居處思其笑語思其志意思其所樂五教反思其所嗜齊三日乃見其所為齊者祭之日入室僾然必有見乎其位周還旋出户肅然必有聞乎其容聲出户而聽愾然必有聞乎其歎息之聲陳澔曰五其字及所為皆指親而言入室入廟室也僾然仿佛之貌見乎其位如見親之在神位也周旋出户謂薦爼酌獻之時行步周旋之間或自户内而出也肅然儆惕之貌容聲舉動容止之聲也愾然太息之聲也臣按齊之日致其思慮祭之日若有見聞孝子不忍死其親而常常若其生存也君子有終身之䘮忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然陳澔曰忌日親之死日也不用不以此日為他事也非不祥言非以死日為不祥而避之也夫日猶此日也志有所至者此心極於念親也不敢盡其私不敢盡心於己之私事也如不欲生似欲隨之死也如欲色然言其想像親生平所愛之物如見親有欲之之色也方慤曰稱諱如見親所謂聞名心瞿也臣按或有問於宋儒張載曰忌日有薦可乎載曰古則無之今有於人情自亦不害本朝每遇列聖忌日先期太常寺官奏知遣官於各陵行禮至日上服淺淡服視朝盖得古意也祭綂夫祭有餕餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是已劉彛曰祭畢而餕餘是祭之終事也必謹夫餕之禮者慎終如始也臣按儀禮無天子宗廟之禮雖諸侯之禮亦亡所存者特牲饋食少牢饋食乃大夫士之禮而已然儀禮雖無其禮而散見於戴記之禮運禮器郊特牲祭義祭綂諸篇者其儀文名物之義猶有存者雖其叅錯不一渙散無綂然因其言繹其義而尋其脈絡之所自部分之所属分析而條理之使有所歸宿而又酌取周禮及儀禮所載大夫士之禮與夫諸儒註疏有及於禮者推類而求之則墜緒可得而尋古禮可得而復矣昔朱熹嘗欲以二禮及註疏所言折衷以為天子祭禮而其書未成以属其門人黄幹楊復自致齊而祼獻自祼獻而饋獻以至加爵徹爼旅酬登餕繹祭之儀次序分類今其成書具在可考也臣竊以謂古禮今世雖不能盡行然三代聖王制作之深意亦不可使其泯滅不存况禮為六經之一雖時異勢殊事難卒復然天理自然之則人事當然之義則萬古此天地萬古此人心也乞詔儒學之臣假以祕閤之書俾其叅考編類别為一書以補六藝之闕遇國家有稽古禮文之事於此得以考據藏之學校頒之天下垂之後世使夫自古聖賢精神心術之微儀文度數之詳不至於墜地是盖天地間一盛典聖明朝一大事也大傳禮不王不禘王者禘其祖之所自出以其祖配之趙匡曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也朱熹曰禘之意最深長如祖考於己身未相遼絶祭禮亦自易理㑹至如郊天祀地猶有天地之顯然者不敢不盡其心至祭其始祖已自闊逺難盡感格之道又推始祖所自出而祀之茍非察理之精微盡誠之極至安能與於此故知此則治天下不難也此尚明得何况其他此尚感得何况其他故孔子曰知其說者之於天下也其如示諸掌乎方慤曰此禘也以其非四時之常祀故謂之間祀以其及祖之所自出故謂之追享以其比常祭為特大故謂之大祭以其猶事生之有享焉故謂之肆祼獻名雖不同通謂之禘也臣按禘者王者五年之大祭也先正謂先王報本反始之意莫深於禘非仁孝誠敬之至不足以與此祭禮之大莫有大於此者矣春秋文公二年八月丁卯大事于太廟公羊傳曰大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳于太祖未毁廟之主皆升合食于太祖楊復曰大合毁廟與未毁之主祭于太祖之廟臣按祫者先王於歳事外三年則一行大祫禮太祖正東向之位凡毁廟未毁廟之主皆與焉盖宗廟之祭最大者禘也其次則大祫焉謂之大祫則此四時之祫不陳毁廟之主者小矣三年一祫五年一禘之說出於禮疏經無明文先儒所不取然此宗廟大禮考之經傳並不著其行禮時用姑從之以為準不然則是禮何由以行國語楚語曰古者先王日祭月享時類歳祀韋昭曰日祭於祖考月祭於曽高時類及二祧歳祀於壇墠朱熹曰左氏云時祭於寢而國語有日祭之文是主復寢猶日上食矣又曰國語日祭月祀時享既與周禮祀天神祭地祇享人鬼之名不合韋昭又謂日上食於祖禰月祀於高曽時享於二祧亦但於祭法略相表裏而不見於他經臣按日祭月享時類之禮盖行於寢廟者非太廟之常禮也是亦孝子事死如事生事亡如事存之意漢時宗廟在郡國及京師各居陵旁立廟并為七十六所又園中各有寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食歳二十五祠原廟十二祠有閏加一祠歳祠上食二萬四千五十五則失之煩雜䙝瀆聖王有作宜酌而行之可也中庸春秋脩其祖廟陳其宗器設其裳衣薦其時食朱熹曰此武王周公所制祭祀之禮祖廟天子七諸侯五大夫三適士二官師一宗器先世所藏之重器若周之赤刀大訓天球河圖之屬也裳衣先祖所遺衣服祭則設之以授尸時食四時之食各有其物如春行羔豚膳膏香之類是也宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也朱熹曰宗廟之次左為昭右為穆而子孫亦以為序有事於太廟則子姓兄弟羣昭羣穆咸在而不失其倫焉爵公候卿大夫也事宗祝有司之職事也旅衆也酬導飲也旅酬之禮賓弟子兄弟之子各舉觶於其長而衆相酬盖宗廟之中以有事為榮故逮及賤者使亦得以申其敬也燕毛祭畢而燕則以毛髮之色别長㓜為坐次也齒年數也踐猶履也其指先王也所尊所親先王之祖考子孫臣庶也始死謂之死既葬則曰反而亡焉皆指先王也臣按事死如事生事亡如事存此兩言者仁人孝子不忍死其親而萬世奉親思孝之要道也陳祥道曰君子以義處禮則祭不至於數煩以仁處禮則祭不至於疏怠悽愴發於霜露之既降怵惕生於雨露之既濡此所以有四時之享也然四時之享皆前期十日而齊戒前祭一日而省視祭之日禮文動乎上樂交應乎下自再祼以至九獻其禮非一端自致神以至送尸其樂非一次以一日而歴七廟則日固不足非彊有力者亦莫善其事矣若日享一廟前祭視牲後祭又繹則彌月之間亦莫既其事矣考之經傳盖天子之禮春則犆祭夏秋冬則合享犆祭各祭於其廟合享同祭於太廟程頥曰歳四祭三祭合食於祖廟惟春則徧祭諸廟朱熹曰漢承秦弊不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆貢禹韋𤣥成匡衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室章帝復如之後世遂不敢加而公私廟皆為同堂異室之制自是以來更歴魏晉隋唐其間非無奉先思孝之君據經守禮之臣而皆不能有所裁正至使太祖之位下同孫子而更僻處於一隅既無以見其為七廟之尊羣廟之神則又上厭祖考而不得自為一廟之主以人情論之則生居九重窮極壯麗而沒祭一室不過尋丈之間甚或無地以容鼎爼而隂損其數孝子順孫之心宜亦有所不安矣臣按古者天子七廟各自為室自漢明帝以後始為同堂異室之制行之千百餘年一旦革之以復古制盖亦難矣必欲酌古今之制果何如而可適今之宜而不失古人之意乎臣竊以謂宜如周人宗廟都宫之制七廟各為一室太祖之廟居中分為三昭三穆其中有功德者别出之以為世室如劉歆之說兄弟相繼者名為一世而各自為室毎歳四祭如周禮所謂祠禴嘗烝者春祠則犆祭夏秋冬則祫祭如王制之說春祠每歳孟春自初一日齊戒為始四日祭太祖廟間一日祭一廟前一日省視祭畢即繹歴十有四日徧七室每室各祭則羣廟之主各得自伸其尊而不厭於太祖矣至於夏之禴秋之嘗冬之烝則先期各於其廟告以時祫之意至日各迎其主合食於太祖之廟而已祧者不與焉則主祭者不勞而行之不難矣所謂大祫大禘者說者謂五年一禘三年一祫非古制大儒程頥有言立春祭先祖冬至祭始祖朱熹謂先祖之祭似祫始祖之祭似禘二儒之言雖為人家而發然揆之於義而合推而上之似亦可行請於每歳立春之日行大祫禮凡毁廟未毁廟之主皆合食於太祖之廟大禘之禮則於冬至之日行之於始祖之廟而又推始祖所自出之帝而以始祖配之焉後世人主多是崛起未必皆如三代世系有所據依功業有所積累所謂始祖者創業之君也始祖所自出之帝據其所可知者也請以宋朝為比而即光宗之世論之所謂始祖者太祖也太祖者宋創業之君也太宗仁宗二帝有功德不祧以為兩世室神宗哲宗徽宗欽宗髙宗孝宗六室為親廟前此順翼宣三祖真英二宗皆在三昭三穆之外親盡而祧所謂僖祖者太祖之高祖開國之初即追封以為親廟其所知者止此自此以上更不可考是為太祖所自出之帝宜别為一廟以藏其主而以順翼宣三祖祔其中遇行禘禮則請僖主出就太祖之廟祀之而以太祖配焉順翼宣三祖配食其左大祫則太祖正東向之位而凡毁廟未毁廟之主皆合食於太祖如常儀如此則太祖名號既與廟相稱而亦不失其所以追王崇祀僖祖之心矣宋人以僖祖正東向之位以為太祖然宋之太祖乃是建隆帝與廟號不相稱祧去僖祖不祭則又失太祖事亡如事存之心若夫祭天饗帝則惟以太祖配焉夫然則尊尊親親各得其宜而古禮庶㡬可行之今乎是雖不盡合古人之制而古人之意或亦略得其仿彿矣傳曰非天子不議禮顧臣何人輙敢妄議盖述所聞以比擬前代之制非敢以為今日可行也臣昧死謹言漢明帝永平元年正月帝率公卿以下朝于原陵如朝㑹儀蔡邕曰聞古者不墓祭朝廷有上陵之禮始謂可損今見威儀察其本意明帝至孝惻隱不可易胡寅曰送終之禮即逺而無近至於墓則終事盡矣人子孝思不忘則專精于廟享而已矣盖墓藏體魄而致生之是不智也廟以宅神而致死之是不仁也此聖人制禮明乎幽明之故仁智合而理義盡也既已送形而往安乎地下迎精而反主于廟中而致隆於陵園如元㑹儀上食奏樂郡國奏計言民疾苦是反易陵廟之理以體魄為有知虚廟祏而不重設複舉廟中之主而祭于寢所皆違禮也明帝此舉盖生於原廟蔡邕不折衷以聖人之制而直論其情情豈有既哉臣按此後世帝王上陵之始夫感雨露霜雪之變興思慕感念之誠行展省拜謁之禮不忘其體魄之所存怛若其音容之如在亦孝子一念愛親不忍死之之誠有不容己焉者明帝此舉亦不為過但因時序流易感時追慕率臣下以行禮可也乃如元㑹儀奏樂郡國奏計言民疾苦何居明帝之意豈非不忍死其親而以生事事之乎噫聖人之孝謂事死如事生者盖謂宗廟享祀之禮耳豈謂朝廷之上凡生時所事之事邪宋志古者無墓祭秦漢以降始有其儀至唐有清明設祭朔望時節之祀進食薦衣之式五代諸陵逺者令本州長吏朝拜近者遣太常宗正卿或因行過親謁宋初春秋命宗正卿朝拜安陵以太牢奉祠乾德四年始令宫人詣陵上冬服其後定制春秋仲月遣太常宗正卿先齊三日牲用少牢一獻臣按禮經無墓祭之文後世行之雖非古也然祖宗體魄所藏留骨所在為子若孫者漠然以土壠視之閱歳踰時不一展省焉其情安乎情之所不安義之所不當此禮所以貴乎義起也上陵之禮三代以前雖不經見然自漢以後歴代相承率不敢廢非不敢也盖不忍也在漢初天子雖不躬行然奉常屬官有寢園令長丞又有園郎寢郎園中各有寢便殿日祭於寢時祭於便殿寢日四上食丞相以四時行園光武自建武六年至二十二年凡三幸長安皆有事于十一陵則固躬詣陵行禮也但未立定制爾唐開元禮有天子上陵儀注又歳有清明設祭朔望時節之祀宋又行於春秋歳以為常我朝上陵之禮歳凡三舉焉清明也中元也冬至也每遇行禮文武諸司各遣官一員而以親王或駙馬都尉主祀事天下無事天子於清明日亦時或一行其忌日則惟遣駙馬而百官不與焉其或藩王有來朝者亦許拜謁孝陵在南京内外臣僚有事經過者必先拜謁否則有罪臣竊以為人子於其親當一於禮而不可茍於其生也則既事之以禮矣迨其死也其體魄之歸於地者為宅兆以藏之其䰟氣之在乎天者為廟祏以棲之其洋洋乎在廟祏者則固事之以生矣其累累然在丘壠者安忍以死視之哉但為之制不可盡備宜視歲享而殺一事之以神道而兼用吉㓙之禮庶乎得古人起禮之義云則此禮雖古無有而今有之亦不為過矣夫上陵雖非宗廟之禮然亦所以祀其先也故附於宗廟之禮之末以上宗廟饗祀之禮下大學衍義補卷五十九
