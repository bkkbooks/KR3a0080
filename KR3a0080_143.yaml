body:
  text: 大學衍義補卷一百四十三明丘濬撰治國平天下之要馭外蕃内外之限舜典帝曰臯陶蠻夷猾亂也夏冦刧人賊殺人姦在外宄在内汝作士理官朱熹曰夏明而大也又曰蠻夷猾夏不專指有苖但官為此而設董鼎曰虞時兵刑之官合為一此蠻夷猾夏亦以命臯陶臣按有虞之世臯陶為士士理官也所掌者刑獄之事而首以蠻夷猾夏為言且蠻夷處邊鄙之外負險阻以為固不可以理喻不可以言馴非用甲兵不可也豈區區刑法所能制哉而舜命臯陶以為士而首以是責焉而後及於冦賊姦宄何也葢人君為治必先去其梗吾治者然後其治可成所以梗吾治者其大在蠻夷其小在冦賊必使蠻夷冦賊不敢害吾良善之民則内外安靖而吾政化之所施者無所梗矣雖然内者外之本也内無其釁然後外患不生掌刑之官得其人則禁詰有常刑制伏有良法界限有定所潜消於未然之先遏絶于方萌之始不待其猖肆而後施之以甲兵也此聖人之微意歟禹貢五百里綏服三百里揆度也文教二百里奮武衛蔡沈曰謂之綏者漸逺王畿而取撫安之義侯服外四面又各五百里也綏服内取王城千里外取荒服千里介於内外之間故以内三百里揆文教外二百里奮武衛文以治内武以治外聖人所以嚴華夏之辨者如此此分綏服五百里而為二等也臣按禹貢五服之制曰甸服曰侯服曰綏服曰要服曰荒服内而甸侯二服外而要荒二服而綏服居乎其中則介乎華夷之間也就此一服而言其地凡五百里内三百里以揆文教由此而至於王城千里之内聲明文物之所萃故於此揆其文之教必燦然明備度之而皆同也由此而極于荒服千里之外障塞險阻之所限故于此奮其武之衛必居然振作修之而不弛也五百里要服三百里夷二百里蔡蔡沈曰要服去王畿已逺其文法略於中國謂之要者取要約之義特羈縻之而已綏服外四面又各五百里也蔡放也流放罪人於此也此分要服五百里而為二等也五百里荒服三百里蠻二百里流蔡沈曰荒服去王畿益逺而經略之者視要服為尤略也以其荒野故謂之荒服要服外四面又各五百里也流放罪人之地蔡與流皆所以處罪人而罪有輕重故地有逺近之别也此分荒服五百里而為二等也臣按先儒謂禹貢五服甸侯綏為中國要荒已為外國聖人之治詳内略外觀五服名義可見治中國則法度宜詳治以必治也治外國則法度宜略治以不治也觀至于五千見徳化之逺及觀要荒二服見法度之不泛及聖人不務廣地而勤逺略也如此後世為治者徃徃昧於輕重緩急之辨固有詳於内而忽於外者亦有專事外而不恤其内者又有内與外皆不加之意者胥失之矣雖然此非特世主處事之偏亦由其祖宗立法之失也載觀虞夏之世立為五服之制内二服以治乎内外二服以治乎外中一服則兼治乎内與外焉既有以為内治之具又有以為外侮之防文教之外以兵衛兵衛之外以蔡流其法一定而不可易其規一定而可長守所以為子孫生民計也逺矣東漸于海西被于流沙朔南暨聲教訖于四海蔡沈曰地有逺近故言有淺深也上言五服之制此言聲教所及葢法制有限而教化無窮也臣按中國之地南北東東西為逺故禹貢言聖人聲教之所及於東曰漸於西曰被皆指其地言而於南北則止曰暨而不言其地可見聖人嚮明之治自北而南日拓而逺不可為之限量也東漸于海海之外地盡矣西被于流沙流沙之外猶有地焉漸如水之漸漬底于海者也被則如天之無不覆被天所覆被處聖人之化皆可至也振舉於此而逺者聞焉是之謂聲軌範於此而逺者效焉是之謂教其風聲教化雖曰無逺不及然亦惟止于海而已雖然其所以漸被暨及風聞之聲神化之教使之聞而慕之振而動之而己未嘗體國經野設官分職而以内治治之也周禮職方氏乃辨九服之邦國方外千里曰王畿其方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服鄭樵曰禹貢有五服職方有九服五服九服之制不同詳考制度無不相合禹之五服各五百里自其一面而數之職方九服各五百里自其兩面而數之也又曰周之王畿有鄉遂稍縣都即禹之甸服納總秸銍粟米之地周之侯服即禹采男之地周之男服即禹貢揆文教之地周之采服即禹貢奮武衛之地周之衛服即禹貢三百里夷之地周之要服即禹貢二百里蔡之地周之夷服即禹貢三百里蠻之地周之鎭服即禹貢二百里流之地周之藩服即禹貢九州之外地也臣按禹服周畿要荒蠻夷邈然處於侯甸采衛之外其為當世制也嚴矣其為後世慮也逺矣又考賈公彦謂蕃之義以其最在外為藩籬故以蕃為稱後世通謂外國為蕃葢本諸此春秋隱公二年公㑹戎于濳臣按漢以南單于􅍁五原塞賜姓為藩臣其後劉淵劉聰大為晉室患唐至中葉以安禄山守范陽其後盡以蕃將易漢將河朔之禍直至唐亡嗚呼春秋以列國之諸侯一與會於壇坫之間猶謹其㣲如此况延之入吾疆域之中襍於編民之内甚者又付之以兵戈之柄居將領之職列宿衛而專邊閫何不思之甚哉雖聖人以天下為一家一視以同仁然仁之中不可以無義信之中不可以無智不可茍徇於目前必須逺慮于身後處之必欲盡其道安之必各止其所非獨以全吾安彼之心亦使彼得以全其所以報吾之義焉盖彼以窮困而歸我我不受之義者不為也既受之矣因其俗而制之順其勢而安之使其衛吾邊境可也予之以爵位而不極其所欲賜之以金帛而不徇其所求任之以偏禆而不付以獨柄如此則彼得以自安而吾無後患矣然此所以處新附者耳若夫乆附易世者必須以漸而為之因事而處之不使之羣而居也不使之專其位也不使之聮其職也不使之統其類也不使之臨乎邊也不使之治其國也所聚之處一郡不許過百所居之市一縣不許過十所任之官一署不許過二如此消之以其漸為之因其機處之服其心使彼不知不覺則乆乆自然潜消而日化矣庚辰公及戎盟于唐臣按費誓篇首言徂兹淮夷徐戎並興而孔頴達謂此戎葢帝王所羈縻居九州之内所謂淮夷徐戎非若後世化外之戎夷葢亦徐淮之間近邊之地自昔有一種不閑禮義之人耳莊公三十年齊人伐山戎杜預曰山戎北狄胡安國曰齊人者齊侯也其稱人譏伐戎也夫北戎病燕職貢不至桓公内無因國外無從諸侯越千里之險為燕闢地可謂能修方伯連帥之職何以譏之乎桓不務徳勤兵逺伐不正王法以譏其罪則將開後世之君勞中國而事外夷捨近政而貴逺略困吾民之力争不毛之地其患有不可勝言者故特貶而稱人以為好武功而不修文徳者之戒莊公三十有一年齊侯來獻戎㨗左丘明曰凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘胡安國曰軍獲曰㨗獻者下奉上之辭齊伐山戎以其所得躬來誇示書來獻者抑之也後世宰臣有不賞邊功以沮外徼生事之人得春秋抑戎㨗之意臣按以中國諸侯而能成武功除戎狄之患而以其㨗來獻豈非羙事哉然而不奉天子命而越境出疆以啓邊釁除戎之功小擅師之罪大漸不可長不可以功而掩罪也春秋謹㣲之意深矣僖公三十二年衛人及狄盟宣公三年楚子伐陸渾之戎成公元年秋王師敗績于茅戎程頥曰王師於諸侯不言敗諸侯不可敵王也于茅戎不言戰茅戎不能抗王也陸淳曰王者之於天下也葢之如天容之如地其有不庭之臣則告諭之訓誨之如又不至則增修其徳而問其罪故曰王者之師有征無戰今王師與茅戎為敵此取敗之道非戎所能敗也故以自敗為文所以深譏王也臣按程氏謂王師于茅戎不言戰茅戎不能抗王也然不謂之不可而謂之不能可見王者所以尊嚴而為天下之所畏服者其不專在于師旅也必有所以制伏勝人之本而人自有不能敵者焉然則有天下者其可不知所以自反而自彊乎九年秦人白狄伐晉胡安國曰晉常與白狄伐秦秦亦與白狄伐晉其稱人貶辭也武王伐商誓師牧野庸蜀羌髳㣲盧彭濮皆與焉除天下之殘賊出民於水火之中雖蠻夷戎狄以義驅之可也若其同惡相濟貽患於後焉不亦甚乎哀公十有三年公㑹晉侯及吳子于黄池胡安國曰吳人主㑹其先晉紀賞也吳僣王矣其稱子正召也定公以來晉失霸業不主夏盟夫差暴横勢傾上國自稱周室于已為長而黄池之㑹書法如此者盖存亡者天也得失者人也不可逆者理也以人勝天則事有在我者矣故春秋撥亂反正之書不可以廢焉者也於越入吳胡安國曰吳自栢舉以來慿陵中國黄池之㑹遂及夏盟可謂疆矣而春秋繼書於越入吳所謂因事屬辭垂戒後世而見深切著明之義也曽子曰戒之戒之出乎爾者反乎爾老氏曰佳兵不祥之器其事好還夫以力勝人者人亦以力勝之矣吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人争長自謂莫之敵也而越已入其國都矣吳争逺國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之老氏曾子其言豈欺也哉禮記其在東夷北狄西戎南蠻雖大曰子陳澔曰九州之外不過子男之國朝見之時擯辭惟曰子雖或有功益地至侯伯之數其爵亦不過子故云雖大曰子也如楚在春秋雖大國而其爵則稱子也臣按吳之爵本伯爵也春秋書吳不書曰伯而書曰子葢不以本爵與之也禮所謂四夷雖大皆曰子考于春秋尤信自恒山至於南河千里而近自南河至于江千里而近自江至於衡山千里而遥自東河至於東海千里而遙自東河至於西河千里而近自西河至於流沙千里而遥西不盡流沙南不盡衡山東不盡東海北不盡恒山應鏞曰此獨言東海者東海在中國封疆之内而西南北則夷徼之外也南以江與衡山為限百越未盡開也河舉東西南北者河流縈帶周繞雖流沙分際亦與河接也自秦而上西北袤而東南蹙秦而下東南展而西北縮先王盛時四方各有不盡之地不勞中國以事外也方慤曰不足謂之近有餘謂之遙臣按二帝三王之盛其所治之地四方相距亦不甚逺考成周之故疆而質以後世之職方可見也洛陽為王城而陸渾戎密邇乎其境其東之萊牟介莒皆夷地淮南為羣舒秦為西戎河北真定中山之境乃鮮虞肥鼓國河東之域而有赤狄甲氏此外荆楚吳越閩蜀又皆在荒服之外是時中國所有者宋晉齊魯衛鄭通不過今數十郡地耳周之盛時猶然則夏商以前可知已説者謂自秦以上西北袤而東南蹙秦以下東南展而西北縮臣竊以為今日地勢東南已極于海至矣盡矣更無不盡之處惟西與北及西南之地尚未底于海耳然皆限以重山疊嶂大荒絶漠地氣既惡人性復獷非復所居之處有與無不足為中國輕重焉惟明主瓦礫視之可也春秋左氏傳管敬仲言于齊侯曰戎狄豺狼不可厭也諸夏親暱不可棄也孔頴達曰中國而謂之華夏者夏大也有禮儀之大有文章之華僖公二十三年初平王之東遷也辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎于伊川吕祖謙曰物之相召者㨗於風雨地夷而人華者公劉之治豳也以華召華不旋踵而有文武之興王地華而人夷者晉帝之納款也以夷召夷不旋踵而有耶律之俘虜物物相召未嘗不以其類也中天下而畫壤者是為伊洛伊洛之民雖居聲明文物之地意之所向已在于大荒絶漠之外矣故以心感心以氣動氣安得不為陸渾之遷哉嗚呼辛有可謂知幾矣臣按天下之事莫不起於幾㣲幾㣲之際先王之所謹也故識㣲之君子因㣲而知著由邇而察逺昭公二十二年沈尹戌曰古者天子守在四夷臣按天子以天下為家内而中國其堂奧也外而封疆其垣藩也垣藩之外則外國矣是故天子布徳行政以内和其人民而外固其封守此所以中國奠安而外侮不侵也大學衍義補卷一百四十三
