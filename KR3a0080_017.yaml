body:
  text: 大學衍義補卷十七明丘濬撰治國平天下之要固邦本除民之害禹貢濟河惟兖州九河既道爾雅九河曰徒駭曰太史曰馬頰曰覆鬴曰胡蘇曰簡曰潔曰鉤盤曰鬲津呉程曰九河率在河間之滄州境孔穎達曰河分為九道在兖州界平原以北是吕祖謙曰禹不惜數百里地疏為九河以分其勢善治水者不與水爭利也孟子曰當堯之時天下猶未平洪大也水橫流不由其道散溢妄行氾濫於天下堯獨憂之舉舜而敷治焉禹疏九河瀹亦疏通之意濟漯而注諸海決汝漢排淮泗而注之江決排皆去其壅塞也然後中國可得而食也孟子曰禹思天下有溺者由已溺之也史記禹抑鴻鴻與洪同水十三年過家不入門然河菑菑與災同衍溢害中國也尤甚唯是為務故道河自積石在蘭州地歴龍門在蒲州地南到華隂東下砥柱今陜州三門山及孟津在孟縣雒汭在鞏縣東至于大邳在今黎陽縣於是禹以為河所從來者高水湍悍難以行平地數為敗迺釃分也二渠以引其河二河其一出貝丘西南河之南折者也王莽時遂空其一即漯川北載高地過降水在信都地至于大陸在邢趙深三州地播為九河同為逆迎也河入于勃海九川既疏九澤既陂諸夏乂安功施於三代臣按先儒有言人君以養民為職凡為民害者必除之夫民之所資以為養者土也而土必滋於水然後物得以生茍水之多而至於蕩焉則為害大矣非徒民不得以為衣食且不得以為居室矣民無衣食居室則何以為生哉是以天地間利於民者莫大乎水害於民者亦莫大於水堯舜之世用人以輔世尤重於治水之職鯀湮洪水則殛之禹能平水土則用以總百揆終而禪之以位聖人之意蓋可見矣中國四大水惟河之來為最逺其為害亦最大自漢以來屢為中國害一時君臣所以治之者亦各隨時因勢以為之疏塞無非除民之害而已吁民害弗除則民生弗遂今日為中原民害之大者莫甚於河有天下者烏可不以治河為急務乎漢孝文時河決酸棗東潰金隄興卒塞之孝武元光中河決於瓠子東南注鉅野通於淮泗天子使汲黯鄭當時發卒十萬塞之輒復壊自河決瓠子後二十餘嵗嵗數不登而梁楚尤甚天子既封禪其明年乃發卒數萬人塞之築宫其上名曰宣防道河北行二渠復禹舊迹初武帝既塞宣防後河復北決於館陶分為屯氏河東北入海廣深與大河等故因其自然不隄塞也至永光五年河決清河靈鳴犢口而屯氏河絶孝成建始四年河決東郡金隄先是清河都尉馮逡奏言郡承河上流土壤輕脆易傷頃所以無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖高増隄防終不能泄如有霖雨旬日不霽必盈溢九河故道今既滅難明屯氏河新絶未久其處易浚可復浚以助大河泄暴水備非常不豫修治北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史以為方用度不足可且勿浚至是大雨水十餘日河果大決於館陶及東郡金隄凡灌四郡三十二縣水居地十五萬餘頃深者三丈敗壊官亭室廬且四萬所河平元年以王延世為河隄使者延世以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日隄成鴻嘉四年勃海清河信都河水湓溢灌縣邑三十一敗官亭民舍四萬餘所平陵李尋等奏言議者恒欲求索九河故迹而穿之今因其自決可且勿塞以觀水勢何欲居之當稍自成川挑出沙土然後順天心而圖之必有成功而用財力寡哀帝初即位騎都尉平當使領河隄奏按經義治水有決河浚川而無隄防壅塞之文宜慱求能浚川疏河者待詔賈讓奏言治河有上中下三䇿古者立國居民疆理土地必遺川澤之分遺留也言川澤水所流聚之處皆留而置之不以為居室墾植度水埶所不及大川無防小水得入陂障卑下以為汙澤使秋水多得有所休息左右遊波寛緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言蓋隄防之作近起戰國雍防百川各以自利今行上䇿徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄埶不能逺泛濫朞月自定難者將曰若如此敗壊城郭田廬塚墓以萬數百姓怨恨答難曰今瀕河十郡治隄嵗費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相姦且大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上䇿若乃多穿漕渠於冀州地使民得以溉田分殺水怒可從淇口以東為石隄多張水門旱則開東方下水門溉冀州水則開西方高門分河流通渠有三利塡淤加肥一利禾麥更為秔稻二利轉漕舟船之便三利民田適治河隄亦成此誠富國安民興利除害支數百嵗故謂之中䇿若乃繕完故隄增卑倍薄勞費無已數逢其害此最下䇿臣按古今言治河者蓋未有出賈讓此三䇿者平帝元始四年徵能治河者以百數其大略異者闗並人名言河決率常於平原今徳州東郡今東昌左右其地形下而土疏惡聞禹治河時本空此地秦漢以來河決南北不過百八十里可空此地勿以為官亭民室韓牧以為可略於禹貢九河處穿為四五宜有益王橫言河入勃海地髙於韓牧所欲穿處往者海溢西南出寖數百里九河之地已為海所漸矣禹之行河水本從西山下東北去周譜世統譜諜云定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌之決處遂大不可復補宜更開空使緣西山足乗高地而東北入海乃無水災司空掾桓譚典其議為甄豐言凡此數者必有一是宜詳考驗皆可豫見計定然後舉事費不過數億萬亦可以事諸浮食無産業民衣食縣官而為之作乃兩便臣按西漢一代治河之䇿盡見於此大約不過數說或築隄以塞之或開渠以疏之或作竹落而下以石或聽其自決以殺其勢或欲徙民居放河入海或欲穿水門以殺水勢或欲空河流所注之地或欲尋九河故道桓譚謂數說必有一是詳加考驗豫見計定然後舉事以今觀之古今言治河者皆莫出賈讓三䇿其所以治之之法又莫出元賈魯疏濬塞之三法焉宋史河入中國行大行西曲折山間不能為大患既出大伾東更平地二千餘里特以隄防為之限夏秋霖潦百川所㑹不免決溢而大名鄆澶滑孟濮齊淄滄隶濱德慱懐衛鄭等郡及開封往往受其害於是詔命諸州長吏兼河隄使防塞之法甚備而決溢之患時有説者謂河隨時漲落自立春後凍解候人量水初至凡一寸則夏秋當至一尺頗為信驗謂之信水非時暴漲謂之客水隨決隨塞瀕河之民苦之仁宗至和二年河決大名館陶殿中丞李仲昌請自澶州商胡河穿六㙮渠入橫隴故道以披其埶富弼是其䇿詔發三十萬丁脩六㙮河以回河道以仲昌提舉河渠仲昌塞商胡北流入六㙮河不能容明年復決水死者數千萬人歐陽脩曰鯀障洪水九年無功禹得洪範五行之書知水潤下之性乃因水之流疏而就下水患乃息然則以大禹之功不能障塞但能因勢而疏決爾今欲逆水性障而塞之奪洪河之正流使人力斡而回注此大禹之所不能此其必不可者也熈寧十年河大決於澶州曹村北流斷絶河道南徙東匯於梁山張澤濼分為二派一合南清河入於淮一合北清河入於海凡灌郡縣四十五而濮齊鄆徐尤甚壊田逾三十萬頃臣按此黃河入淮之始然此特其支流由汴入泗至清河口入淮者耳又劉彜程昉言二股河北流今已閉塞然御河水由冀州下流尚當疏導以絶河患元至大三年河北河南道廉訪司言黃河伏槽之時水埶似寛觀之不足為害一遇霖潦湍浪迅猛自孟津以東土性疏薄兼帶沙滷一失導洩之功崩潰決溢可立而待河至杞縣三􅀈口播而為三蓋亦有年其後二􅀈湮塞三河之水合而為一下流既不通暢自然上溢為災即今水埶趨下有復鉅野梁山之意蓋河性遷徙無常茍不預防不出數年曹濮濟鄆蒙害必矣宜妙選廉幹深知水利之人專職其事頻為巡視謹其防䕶職掌既專則事功可立較之河已決溢民已被害然後鹵莽脩治以勞民者不同矣至正四年夏久雨河溢決堤瀕河郡邑濟寧單州虞城碭山金鄉魚臺豐沛定陶楚丘武城以至曹州東明鉅野鄆城嘉祥汶上任城等處皆罹水患水埶北侵安山沿入㑹通運河其後集羣議都漕運使賈魯議欲疏塞並舉挽河使東行以復故道丞相托克托韙其䇿以魯為總治河防使發民丁十五萬人自四月至十一月諸掃諸隄成河乃復故道南匯于淮又東入于海歐陽𤣥曰治河一也有疏有濬有塞三者異焉釃河之流因而導之謂之疏去河之淤因而深之謂之濬抑河之暴因而扼之謂之塞又曰賈魯有言水工之功視土工之功為難中流之功視河濱之功為難決河口視中流又難北岸之功視南岸為難用物之效艸雖至柔柔能狎水水漬之生泥泥與艸并力重如碇然維持夾輔纜索之功實多余闕曰中原之地平曠夷衍無洞庭彭蠡以為之匯故河嘗橫潰為患其埶非多為之委以殺其流未可以力勝也故禹之治河自大伾而下則析為三渠大陸而下則播為九河然後其委多河之大有所瀉而其力有所分而患可平也此禹治河之道也自周定王時河始南徙訖於漢而禹之故道失矣故西京時受害特甚雖以武帝之才乗文景富庶之業而一瓠子之微終不能塞而付之無可奈何而後已自瓠子再決而其流為屯氏諸河其後河入千乗而德隶之河又播為八漢人指以為太史馬頰者是其委之多河之大有所瀉而力有所分大抵偶合於禹所治河者由是而訖東都至唐河不為害者千數百年至宋時河又南決南渡時又東南以入于淮以河之大且力惟一淮以為之委無以㵼而分之故今之河患與武帝時無異自宋南渡時至今謂元殆二百年而河旋北乃其埶然也建議者以為當築隄起曹南訖嘉祥東西三百里以障河之北流則漸可圖以導之使南廟堂從之非以南為壑也其慮以為河之北則㑹通之漕廢予則以為河北而㑹通之漕不廢何也漕以汶而不以河也河北則汶水必㣲㣲則吾有制而相之亦可以舟可以漕書所謂浮于汶達于河者是也蓋欲防鉅野而使河不妄行俟河復千乗然後相水之宜而修治之臣按天地間為民害者在天有旱潦之災在地有河海之患然雨暘之為旱潦也有時而人猶可先事以為之備若夫河海之患則有非人力所能為者矣雖非人力所能為而人君有志於為民者其忍坐視而付之無可奈何哉中國之水非一而黃河為大其源逺而高其流大而疾其質渾而濁其為患於中國也視諸水為甚焉自禹疏九河之後遷史河渠書述之詳矣臣請探厥本原自張騫使西域之後說者咸謂河出崑崙至元世祖始命其臣篤實者西窮河源得其源於吐蕃朶思甘之南曰星宿海四山之間有泉近百泓匯而為澤登高望之若星宿然譯音所謂鄂端諾爾也其地在中國西南直四川馬湖府之正西三千餘里雲南麗江府之西北一千五百里較之崑崙殆為近焉自西而東合諸河水其流寖大東北流分為九渡行二十日至大雪山名謄格哩哈達即崑崙也繞崑崙之南折而東而北而西復繞崑崙之北又轉而東北行約二十餘日始入中國自貴德西寧之境至積石經河州東北流至蘭州北繞朔方上郡又東出境外經三受降城東勝等州又折東南出龍門過河中抵潼闗東出三門析津為孟津過虎牢而後奔放平壤吞納小水以百數埶益雄放無崇山巨磯以防閑之㫄激奔潰不遵禹跡故虎牢迤東距海口二三千里恒被其害方禹之導河其河蓋自西而東又轉而北之東以入海焉周定王五年河徙已非禹之故道漢元光三年河徙東郡更注勃海繼決於瓠子又決館陶遂分為屯氏河二河相並而行元帝永光中河水始分流於慱州屯氏河始塞後二年又決於平原則東入齊入青以達於海下流與漯川為一宋熈寧十年河又分為二派一合南清河入淮一合北清河入海是時淮僅受河之少半耳金之亡也河始自開封北衛州決入渦河以合於灌舊河在開封城北四十里東至虞城下達濟寧州界本朝洪武二十四年河決原武之黑陽山東經開封城北五里又南行至項城經潁州潁上東至壽州正陽鎮全入於淮而故道遂淤永樂九年復疏入故道正統十三年又決滎陽東過開封城之西南自是汴城在河之北矣又東南經陳留自亳入渦口又經䝉城至懐逺東北而入于淮焉抑通論之周以前河之埶自西而東而北漢以後河之埶自西而北而東宋以後迄于今則自西而東而又之南矣河之所至害亦隨之䘏民患者烏可不隨其所在而除之哉禮曰四瀆視諸侯謂之瀆者獨也以其獨入於海故江河淮濟皆名以瀆焉今以一淮而受大黃河之全蓋合二瀆而為一也自宋以前河自入海尚能為瀕河州郡之害况今河淮合一而清口又合沁泗沂三水以同歸於淮也哉曩時河水猶有所瀦如鉅野梁山等處猶有所分如屯氏赤河之類雖以元人排河入淮而東北入海之道猶微有存焉者今則以一淮而受衆水之歸而無涓滴之滲漏矣且我朝建國幽燕漕東南之粟以實京師必由濟慱之境則河決不可使之東行一決而東則漕渠乾涸嵗運不繼其害非獨在民生且移之國計矣今日河南之境自滎陽原武由西迤東歴睢陽亳潁以迄於濠淮之境民之受害而不聊生也甚矣坐視而不顧歟則河患日大民生日困失今不理則日甚一日或至於生他變設欲興工動衆疏塞並舉則又恐費用不貲功未必成而坐成困斃然則為今之計奈何孟子曰禹之治水水之道也又曰禹之治水也行其所無事也古今治水者要當以大禹為法禹之導河既分一為九以分殺其洶湧之埶復合九為一以迎合其奔放之衝萬世治水之法此其凖則也後世言治河者莫備於賈讓之三䇿然歴代所用者不出其下䇿而於上中二䇿蓋罕用焉往往違水之性逆水之埶而與水爭利其欲行也强而塞之其欲止也强而通之惜微眇之費而忘其所捐之大䕶已成之業而興夫難就之功捐民力於無用糜民財於不貲茍顧目前遑恤其後非徒無利而反有以致其害因之以召禍亂亦或有之顧又不如聽其自然而不治之之為愈也臣愚以為今日河埶與前代不同前代只是治河今則兼治淮矣前代只是欲除其害今則兼資其用矣况今河流所經之處根本之所在財賦之所出聲名文物之所㑹所謂中國之脊者也有非偏方僻邑所可比烏可置之度外而不預有以講究其利害哉臣願明詔有司愽求能浚川疏河者徵赴公車使各陳所見詳加考驗預見計定必須十全然後用之夫計䇿雖出於衆而剛斷則在於獨擇之審信之篤而用之專然後能成功耳不然作舍道傍甲是乙非又豈能有所成就哉臣觀宋儒朱熹有曰禹之治水只是從低處下手下面之水盡殺則上面之水漸淺臣因朱氏之言而求大禹之故深信賈讓上中二䇿以為可行蓋今日河流所以泛溢以為河南淮右無窮之害者良以兩瀆之水既合為一衆山之水又併以歸加以連年霖潦嵗嵗增益去冬之沮洳未乾嗣嵗之橫潦繼至疏之則無所於歸塞之則未易防遏遂使平原匯為巨浸桑麻菽粟之塲變為波浪魚鼈之區可嘆也已伊欲得上流之消洩必先使下流之疏通國家誠能不惜棄地不惜動民舍小以成其大棄少以就夫多權度其得失之孰急乗除其利害之孰甚毅然必行不惑浮議擇任心膂之臣委以便宜之權俾其治河流相地埶於其下流迤東之地擇其便利之所就其汙下之處條為數河以分水埶又於所條支河之旁地堪種稻之處依江南法創為圩田多作水門引水以資灌溉河既分疏之後水埶自然消減然後從下流而上於河身之中去其淤沙或推而盪滌之或挑而開通之使河身益深足以容水如是則中有所受不至於溢出而河之波不及於陸下有所納不至於束隘而河之委易達於海如是而又委任得人規置有法積以嵗月因時制宜隨見長智則害日除而利日興河南淮右之民庶其有瘳乎或曰若行此䇿是無故捐數百里膏腴之地其間破民廬舍壊民田囿發人墳墓不止一處其如人怨何嗚呼天子以天下為家一視同仁在此猶在彼也普天之下何者而非王土顧其利害之乗除孰多孰寡爾為萬世計不顧一時為天下計不徇一方為萬民計不䘏一人賈讓有言瀕河十郡治隄嵗費萬萬及其大決所殘無數如出數年治河之費足以業其所徙之民大漢方制萬里豈與河爭咫尺之利哉臣亦以謂開封以南至于鳳陽每嵗河水渰沒中原膏腴之田何止數十萬頃今縱於迤東之地開為數河所費近海斥鹵之地多不過數萬頃而已兩相比論果孰多孰少哉請於所開之河偶値民居則官給以地而償其室廬偶損民業則官倍其償而免其租稅或與之價直或助之工作或徙之寛閒之鄉或撥與新墾之田民知上之所以勞動乎我者非為私也亦何怨之有哉矧今鳳陽帝鄉園陵所在其所闗係尤大伏惟聖明留意萬一臣言可采或見之施行不勝幸甚大德中河決杞縣蒲口河北河南肅政廉訪使尚文建言長河萬里西來其埶湍猛至孟津而下地平土疏移徙不常失禹故道為中國患不知㡬千百年矣自古治河處得其當則用力少而患遲事失其宜則用力多而患速此不易之定論也今陳留抵睢東西百有餘里南岸舊河口十一已塞者二自涸者六通川者三岸高於水計六七尺或四五尺南岸故隄其水比田髙三四尺或高下等大槩南高於北約八九尺隄安得不壊水安得不北也蒲口今決千有餘步迅疾東行得河舊瀆行二百里至歸德橫堤之下復合正流或强湮遏上決下潰功不可成揆今之計河西郡縣順水之性逺築長垣以禦泛溢歸德徐邳民避衝潰聽從安便被患之家宜於河南退灘地内給付頃畝以為永業異時河決他所者亦如此亦一時救荒之良䇿也蒲口不塞便朝廷從之㑹河朔郡縣山東憲部爭言不塞則河北桑田盡為魚鼈之區塞之便復從之明年蒲口復決塞河之役無嵗無之是後水北入復河故道竟如文言臣按河為中原大害自古治之者未有能得上策者也蓋以河自星宿海發源東入中國踰萬里凡九折焉合華夷之水千流萬派以趨于海其源之來也逺矣其水之積也衆矣夫以萬川而歸于一壑所來之路孔多所收之門束隘而欲其不泛溢難矣况孟津以下地平土疏易為衝決而移徙不常也哉漢唐以來賈讓諸人言治河者多隨時制宜之䇿在當時雖或可行而今日未必皆便元時去今未逺地埶物力大段相似尚文所建之䇿雖非百世經久之長計然亦一時救弊之良方宜令河南藩憲每年循行瀕河郡縣如文所言者相地所宜或築長垣以禦泛溢或開淤塞以通束隘從民所便或遷村落以避衝潰或給退灘以償所失如此雖不能使瀕河州郡百年無害而被患居民亦可暫時蘇息矣以上論除民之害臣按天下之為民害者非特一水也水之在天下非特一河也流者若江海之類瀦者若湖陂之屬或徙或決或溢或潰隄岸以之而崩泉源以之而涸沙土由是而淤畛域由是而失以蕩民居以壊民田皆能以為民害也然多在邊徼之壖寛閒之野曠僻之處利害相半或因害而得利或此害而彼利其所損有限其所災有時地埶有時而復人力易得而脩非若河之為河亙中原之地其所經行皆是富庶之鄉其所衝決皆是膏腴之産其為民害比諸其他尤大且久故特以民之害歸焉使凡有志於安民生興民利者知其害之有在隨諸所在而除之而視河以為凖焉大學衍義補卷十七
