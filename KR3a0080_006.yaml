body:
  text: 大學衍義補卷六明丘濬撰治國平天下之要正百官頒爵禄之制周書武成曰列爵惟五分土惟三蔡沈曰列爵惟五公侯伯子男也分土惟三公侯百里伯七十里子男五十里之三等也臣按封爵之制自唐虞時已别爲五等曰公侯伯子男觀虞書所謂輯五瑞修五玉解者謂瑞玉爲五等諸侯所執之圭璧可見矣周禮天官大宰以八柄詔王馭羣臣一曰爵以馭其貴二曰禄以馭其富春官内史掌王之八枋枋與柄同之法以詔王治一曰爵二曰禄夏官司士以德詔爵有德者告于王而爵之以功詔禄有功者告于王而禄之以能詔事有才能者告于王俾以治事以久奠食食餼廩也以任事之久而定之臣按公侯伯子男孤卿大夫士爵也天子之田至君十卿禄禄也爵以貴之臣非得君之爵則無以爲榮禄以富之臣非得君之禄則無以爲養是爵禄者天子所操之柄所以崇德報功而使之盡心任力礪世磨鈍而使之趨事赴功者也其柄必出於上非人臣所得專也故周禮天官之大宰内史夏官之司士其於爵禄惟以詔告于王而已非敢自專其柄也以此爲防惟恐司其事者或有所專擅後世乃有非所攸司而手握王爵口銜天語者安得不罹凶國害家之禍哉孟子曰天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一位大夫一位上士一位中士一位下士一位凡六等朱熹曰此班爵之制也五等通於天下六等施於國中天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等不能五十里不達於天子附於諸侯曰附庸因大國以姓名通謂之附庸天子之卿受地視比也侯大夫受地視伯元士受地視子男不言中下士視附庸也大國地方百里次國七十里小國五十里君十十倍之也卿禄卿禄四四倍之也大夫次國卿禄三大夫小國二大夫大夫倍倍一倍也上士上士倍中士中士倍下士下士與庻人在官者同禄禄足以代其耕也次國小國皆同朱熹曰此班禄之制也君以下所食之禄皆助法之公田藉農夫之力以耕而收其租士之無田與庻人在官者則但受禄於官如田之入而已也臣按孟子言班爵禄之制與周禮王制不同周禮諸公之地封疆方五百里侯四百里伯三百里子二百里男百里而孟子則通天子而言公侯皆方百里伯七十里子男五十里王制王者之制禄爵公侯伯子男凡五等而孟子則通天子言而以子男同一位而爲五等諸侯之上大夫卿下大夫上士中士下士凡五等而孟子則兼君言而通以爲六等與夫王朝卿大夫士分地受禄之制亦有不同者焉孟子固先自言其詳不可得聞矣此蓋其畧爾先儒亦謂其不可考闕之可也臣姑載之于篇而微考其所以與二書不同者以見成周所頒爵禄之制其大畧有如此者以上爵禄之制洪範凡厥正人既富禄之也方榖善也汝弗能使有好于而家時人斯其辜蔡沈曰在官之人有禄可仰然後可責其爲善廩禄不繼衣食不給不能使其和好于而家則是人將陷于罪戻矣又曰必富之而後責其善者聖人設教欲中人以上皆可能也臣按漢張敞蕭望之言于其君曰倉廩實而知禮節衣食足而知榮辱今小吏俸率不足常有憂父母妻子之心雖欲案身爲亷其勢不能宋夏竦亦曰爲國者皆患吏之貪而不知去貪之道也皆欲吏之清而不知致清之本也臣以爲去貪致清者在乎厚其禄均其俸而已夫衣食闕於家雖嚴父慈母不能制其子况君長能檢其臣乎凍餒切於身雖巢由夷齊不能固其節况凡人能守清白乎二臣之言其庶幾洪範之意歟王制曰夫圭田無征孟子曰卿以下必有圭田圭田五十畆朱熹曰此世禄常制之外又有圭田所以厚君子也圭潔也所以奉祭祀也臣按三代盛時所以優待君子者如此其厚唐宋之職田蓋其遺意也漢宣帝詔天下曰吏不廉平則治道衰今小吏皆勤事而俸禄薄欲其毋侵漁百姓難矣其益吏百石以下俸十五若食一石則益五斗光武詔増百官俸十石以上減於西京舊制六百石以下増於舊秩臣按此二詔皆推洪範既富方榖之意益官之俸而於吏之小者尤加厚可謂善推古人之意而廣之矣宣帝所謂吏不廉平則治道衰尤爲確論有天下國家者不可不知也宋太祖詔曰吏員冗多難以求其治俸禄鮮薄而未可責以廉與其冗員而重費不若省官而益俸州縣宜以口數爲率差減其員舊俸外増給五千臣按宋太祖所謂與其冗官而重費不若省官而益俸此古今之至論也臣敢舉以爲今日獻以上論頒爵禄之制正百官敬大臣之禮周易晉坤下離上康侯安國之侯用錫馬蕃庶晝日三接程頥曰六五以柔居君位明而順麗爲能待下寵遇親宻之義是以爲康侯用錫馬蕃庶晝日三接也大明之君安天下者也諸侯能順附天子之明德是康民安國之侯也故謂之康侯是以享寵錫而見親禮晝日之間三接見於天子也不曰公卿而曰侯天子治於上者也諸侯治於下者也在下而順附於大明之君諸侯之象也朱熹曰晉進也錫馬蕃庶晝日三接言多受大賜而顯被親禮也臣按侯而謂之康者以其有康民安國之功而得爲侯者也大明之君在上臣下順附而奉承之而有康民安國之功是以人君必錫之以寵數車馬至於衆多接之以親禮晝日至于三接在外之侯且然則内之公卿可知也後世人主於在外之諸侯曠世不一再見於内之公卿或五日一朝或間日視朝其勤者雖一日一朝然惟應故事而已顔靣之不親情意之不孚况望其晝日之間三接乎夫惟接見之頻然後其情可以通其言可以入勢分不至於懸隔而上下無壅蔽之患内外無廢墜之事也有志任賢求治之主尚念之哉虞書帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞孔頴達曰鄰近也君臣道近相須而成臣按先儒謂臣以分言鄰以情言君臣之間一於分則離一於情則䙝故帝舜於大禹既欲其盡臣道以親助於我曰臣哉鄰哉又欲其親助我以盡臣道曰鄰哉臣哉反覆詠歎之不置舜歎而言之禹俞而然之君臣之際其交相親近有如此者後世人君之於臣下不過於嚴則過於瀆此上下之情所以不孚而治功之成恒不若於古歟帝庸用也作歌詩歌曰勅戒勅天之命惟時無時而不戒勅惟幾幾事之㣲也無事而不戒勅乃歌曰股肱臣也喜哉元首君也起興也哉百工熈廣也哉臯陶拜手稽首颺大言而疾曰颺言曰念哉率總率作興事愼乃憲謹其所守之法欽哉屢數也省乃成欽哉乃賡續也載成也歌曰元首明哉股肱良哉庶事康安也哉又歌曰元首叢脞煩碎哉股肱惰懈怠哉萬事墮傾圮哉帝拜曰俞往欽哉蔡沈曰舜將欲作歌而先述其所以歌之意臯陶將欲賡歌而亦先述其所以歌之意舜作歌而責難於臣臯陶賡歌而責難於君君臣之相責難者如此有虞之治兹所以爲不可及也臣按虞廷君臣相與賡歌以元首股肱爲言以見君臣一體之意君之歌則先股肱臣之歌則先元首於咏歌歡樂之中寓推尊致敬之意當是時也一堂之間君臣之際臣敬君則拜稽以颺其言君敬臣則致拜以俞其語君臣一心上下忘勢此虞廷之君臣所以爲萬世法而其治效所以爲不可及歟詩大雅卷阿其首章曰有卷曲也者阿阿大陵也飄風自南豈弟君子指成王也下放此來游來歌以矢陳也其音次章曰伴渙爾游矣優游爾休矣伴涣優游皆閒暇之意豈弟君子俾爾彌爾性似先公酋矣酋終也朱熹曰此詩召公從成王游歌於卷阿之上因王之歌而作此以爲戒首一章總叙以發端次章言王既伴渙優游矣又呼而告之言使爾終其壽命似先君善始而善終也臣按本朝學士朱善曰天下之可樂者莫如泰和盛治之時而可慮者亦莫如泰和盛治之時曷爲其可樂而又可慮也蓋泰和盛治之時以三光則得其明以四時則得其序以庶類則得其所是誠可樂也然治極而不戒則亂亦於此乎兆天地盈虚與時消息而謂治可保其常不亂乎此其所可慮也夫惟慮之於極治之時此有虞所以有臯陶之賡歌有周所以有召公之卷阿也第三章曰爾土宇昄章昄章大明也亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣謂終其身爲天地山川鬼神之主也第四章曰爾受命長矣茀禄爾康矣茀禄皆福也豈弟君子俾爾彌爾性純嘏爾常矣則純大之福常享而不失矣臣按此二章朱熹所謂極言夀考福禄之盛以廣王心而歆動之者也宋儒有言漢文之時賈誼爲之痛哭流涕如禍患之迫乎其後誼之憂國誠深矣然其言太過而無優游不迫之意帝退而觀天下之勢不至於此則一不之信然後知康公之戒君其言亦有法也由是以觀則知人臣之告君懼之以禍患不如歆之以福壽可知矣雖然此爲人臣告君者言爾若夫人君畏天命而悲人窮者固當求賢慕祖以迓福壽於方來尤當戒謹恐懼以消禍患於將萌二者不可偏廢也第五章曰有馮謂可爲依者有翼謂可爲輔者有孝謂能事親者有德謂得於已者以引導也以翼相也豈弟君子四方爲則吕祖謙曰賢者之行非一端必曰有孝有德者何也蓋人主常與慈祥篤實之人處其所以興起善端涵養德性鎮其躁而消其邪日改月化有不在言語之間者矣朱熹曰此章言得賢以自輔如此則其德日修而四方以爲則矣自此章以下乃言所以致上章福禄之由也其卒章曰君子之車既庶且多君子之馬既閑且馳矢陳也詩不多維以遂歌朱熹曰此章謂君子之車馬則既衆多而閑習矣其意若曰是亦足以待天下之賢者而不厭其多矣遂歌蓋繼王之聲而遂歌之猶書所謂賡載歌也臣按此詩先儒謂召公從成王游歌於卷阿之上而作其卒章所謂維以遂歌猶書臯陶賡帝舜之載歌也則是自古聖帝明王所以敬禮其臣相與游歌者有自來矣洪惟我太祖高皇帝萬幾之暇條成大誥三編以示天下臣民其初編之首即託始以君臣同遊爲第一其言曰昔者人臣得與君同游者其竭忠成全其君飲食夢寐未嘗忘其政所以政者何惟務爲民造福拾君之失撙君之過補君之闕顯祖宗於地下歡父母於生前榮妻子於當時身名流芳千萬載不磨噫聖祖之心所以爲聖子神孫慮者深矣蓋君尊如天臣卑如地其分至嚴矧繼世之君生長深宫其於臣下尤易懸絶蓋一日之間視朝之際僅數刻耳退朝之後所親接者宦官宫人所謂賢士大夫者無由親近也於是乎發爲君臣同游之訓謂之游者則凡便殿燕閒之所禁籞行幸之處無不偕焉如臯陶賡明良之歌召公從卷阿之游是已然尤恐其臣之同遊也或啓君之怠荒或長君之淫縱於是又教之曰務在成全其君飲食夢寐不忘其政惟務爲民造福拾君之失撙君之過補君之闕又恐其臣不知所以感發而歆動者於是又期之以顯祖宗歡父母顯榮生前流芳後世噫聖祖之心所以感發其臣而爲聖子神孫慮一何深且遠哉臣於是尤有以見古今聖君賢相其心千萬世而相通也何則召公作詩以臣而告君也故以夀考福禄之盛以歆動其君之心俾其興起於善求賢用善以爲法祖致治之基聖祖作誥以君而告臣也故以顯榮流芳之效以歆動其臣之心使其感發於善盡忠福民以爲成全其君之地可見君臣之義千古一心聖賢之心萬世一理後之踐聖祖之位以奉天出治者尚當以聖祖之心爲心居召公之位以從君遊歌者尚當以召公之心爲心臣不勝惓惓周書召誥今冲㓜也子嗣則無遺壽耉曰其稽考也我古人之德矧曰其有能稽謀自天蔡沈曰㓜冲之主於老成之臣尤易疎遠故召公言今王以童子嗣位不可遺棄老臣言其能稽古人之德是固不可遺也况言其能稽謀自天是尤不可遺也稽古人之德則於事有所證稽謀自天則於理無所遺無遺壽耉蓋君天下者之要務故召公特首言之臣按蔡沈言無遺壽耉君天下者之要務蓋壽耉之人閱世久而涉歴深於凡前王之政祖宗之典古今興衰治亂之迹當世沿革廢舉之由莫不有以知其所當然及其所以然如此則是如此則非如此則成如此則敗如此則治如此則亂灼然於心胷之間瞭然於見聞之際粲然於指畫之頃於事有所證非徒爲是空言也於理無所遺非徒爲此駕說也人君爲治誠能不遺斯人惟其言之是咨是用則其治效之臻視夫用彼新進少年不經事者其相去奚翅十百哉畢命惟公畢公懋盛大之義德克勤小物細行也弼亮四世文武成康正色率下罔不祗敬也師法也言訓也嘉績多于先王予小子康王自謂也垂垂衣拱拱手仰成蔡沈曰畢公既有盛德又能勤於細行輔導四世風采凝峻表儀朝著謂朝内列位有常處若大若小罔不祗服師訓休嘉之績蓋多於先王之時矣今我小子復何爲哉垂衣拱手以仰其成而已臣按史漸曰忠厚近迂濶老成若遲鈍先王終不以此易彼者蓋世臣舊德功業已見於時聞望已孚於人商功利課殿最雖不若新進者至於雍容廊廟天下想望其風采足以廉頑立懦敦薄厲偷如泰山喬嶽初無運動之勞而功之及人厚矣畢公四世元老雖有不可及之盛德常有不自足之誠心小物不以不必勤而不勤嘉績不以已多於前時而或怠正色斂容而使人之非意自消出辭吐氣而使天下之羣心胥服吁斯人也其書所謂壽耉詩所謂老成人歟人君誠能得斯人而付倚毘之任以正朝綱以敦雅俗垂衣拱手以仰其成尚何政教之不孚強暴之不服哉詩序曰行葦忠厚也周家忠厚仁及草木故能内睦九族外尊事黃耉養老乞言以成其福禄焉臣按此詩舊序朱熹辨其與詩意不合然以其外尊事黃耉養老乞言以成其福禄得古昔盛王敬老求言之意故載于篇蕩之什曰匪上帝不時殷不用舊雖無老成人尚有典刑曾是莫聽大命以傾朱熹曰老成人舊臣也典刑舊法也言非上帝爲此不善之時但以殷不用舊致此禍爾雖無老成人與圖先王舊政然典刑尚在可以循守乃無聽用之者是以大命傾覆而不可救也謝枋得曰三代而上國有大政有大議有大疑皆决於老成人之言曰圖任舊臣人共政殷先王所以立國也曰人惟求舊曰無侮老成人盤庚所以興也曰汝惟商耉成人宅心知訓周公所以訓康叔也犂老播棄格人罔敢知吉紂所以亡也在位罔有耆舊俊在厥服平王所以東遷也臣按爲治之具在人與法而已有人以爲咨詢謀爲之用有法以爲持循憑藉之資用老成之人行見成之法則凡所以咨詢而見於謀爲者皆先王之舊政成憲用之久而事無弊行之習而民相安者由是而循守之以爲憑藉之資則可以存國體安民生保天命千萬年如一日也不幸而老成凋喪而先王之舊法幸有存者持循而憑藉之猶可以繫人心延國祚而不至於傾覆茍驟用新進輕變舊法其不至於喪亂也者幾希若宋神宗舍韓琦富弼聽用王安石變祖宗舊法以馴致靖康之禍兹其明驗歟禮記内則凡養老五帝憲法也三王有乂也乞言臣按年之貴乎天下久矣五帝三王莫不有養老之禮然其所以養之者有國老焉有庶老焉所謂國老者國家耆舊之臣蓋嘗執政服役食君之禄任君之事者也非徒加之以執漿執爵之儀祝噎祝哽之禮實欲法其善行體之於已以爲美德求其善言服之於行以爲良法焉中庸子曰敬大臣則不眩又曰官盛任使所以勸大臣也朱熹曰不眩謂不迷於事敬大臣則信任專而小臣不得以間之故臨事而不眩也官盛任使謂官屬衆盛足任使令也蓋大臣不當親細事故所以優之者如此臣按朱熹於中庸或問論勸大臣之道無復餘藴前編已載之矣兹不重贅夫敬大臣九經之一也教大臣本於尊賢尊賢本於修身而修身則又本於誠焉誠者真實無妄之謂心有不誠則所以修身者無實德所以尊賢者無實禮所以敬大臣者貌敬而心不孚言入而實不繼皆爲虚文矣故曰凡爲天下國家有九經所以行之者一也一者誠而已矣漢賈誼上文帝疏曰廉耻節禮以治君子故有賜死而亡戮辱是以黥劓之辠不及大夫禮不敢齒君之路馬蹵其芻者有罰所以爲主上豫遠不敬也所以體貌大臣而厲其節也臣聞之履雖鮮不加於枕冠雖敝不以苴履苴者履中之藉也夫已嘗在貴寵之位天子改容而禮貌之矣吏民嘗俯伏以敬畏之矣今而有過令廢之可也退之可也賜之死可也若夫束縛之繫緤之謂以長繩繫之輸之司冦編之徒官小吏詈罵而榜笞之殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以尊尊貴貴之化也詳見前編臣按賈誼此言蓋爲當時大臣多以罪下獄而發文帝果深納其言養臣下有節是後大臣有罪皆自殺不受刑嗚呼誼之此言非特以救當時之弊蓋人君待臣之禮所當然也史謂文帝深納其言養臣下有節養之云者蓋欲其同入於德善之中而不至於罹吾之法也孟子曰以善養人文帝其庶矣乎以上論敬大臣之禮臣按前編於正倫理已載君使臣之禮而此又有敬大臣者蓋彼所謂臣者通小大而言此則專言大臣也大學衍義補卷六
