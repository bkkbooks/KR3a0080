body:
  text: 大學衍義補卷六十三明丘濬撰治國平天下之要秩祭祀祭告祈禱之禮上舜典正月上日受終于文祖孔安國曰上日朔日也終謂堯終帝位之事文祖者堯文徳之祖廟肆類于上帝禋于六宗望于山川徧于羣神孔安國曰宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也蘇軾曰受終之初既有事于文祖其勢必及餘廟胡宏曰國有大事既告諸祖廟然後告于天地以及羣神禮之常也故張髦以六宗為三昭三穆學者多從其說又曰聖人名必當物祀上帝而謂之類者本乎上者咸在其中也况四時寒暑水旱日月星辰之運即天神之奥豈可分裂各為神乎古者大旱雩于上帝不曰雩于旱神可見矣朱熹曰受終觀象後即祭上下神祗以攝位告也臣按王者中天地立為神人主是以其初即位也明則詔告于遐邇之臣庶幽則祭告于上下之神祗帝舜受堯之禪以有天下受終文祖之後遂類祭于上帝謂之類者意其所祭者非特一帝也凡夫后土社稷與夫境内祀典所載者皆聚合于上帝而併祭以告之焉始也受終于文祖僅告于受命之祖一廟而已兹于祭帝之次乃精意以享夫三昭三穆之宗焉既禋祀矣於是望祀天下之山川徧索天下之羣神蓋以道里遼逺不能親詣望所在而遥祭之祀典衆多恐有或遺按所有而徧及之也洪惟我列聖登基之初首祭告于郊廟社稷繼遣臣僚分祭天下山川等神蓋與有虞之制越千載而符合也或曰自漢以來解書者咸從周禮註疏依類之類孔註祭法六宗之宗蔡傳本朱子非茍同者而取之不以為非曰神之大者上帝也其次后土其次五土五榖之神舜告攝位雖山川羣神咸望祭而徧及之乃獨遺后土社稷乎受終文祖文祖之外豈無他祖宗若曽若祖若禰者而皆不使之與聞乎胡宏取晉張髦之說雖與周人祖有功宗有徳之制相合然帝王異世不相襲禮其制不必盡同也孔註謂文祖為堯文徳之祖廟有祖斯有宗合此六宗以為七廟故舜始則受終于祖繼則禋享于宗焉註家又謂四時寒暑日月星水旱為所尊祭故謂之宗嗚呼后土社稷比之六者卑耶胡乃遺之也况寒暑即四時之候水旱乃雨𤾉之變既祭四時則寒暑在其中矣水乃雨之淫旱乃𤾉之亢不常有也古有雩祭蓋有所因攝告之際未水旱而預祭之何居或又謂三昭三穆出於周非帝世制也曰七世之廟可以觀徳商初已有七廟矣安知其非承虞夏之遺制乎月正元日舜格于文祖孔安國曰月正正月也元日朔日也舜服堯喪三年畢將即位故復至文祖告廟大禹謨正月朔旦受命于神宗率百官若帝之初朱熹曰正月次年正月也神宗說者以為堯廟如帝之初即舜典齊七政脩羣祀等事也論語曰予小子履敢用𤣥牡敢昭告于皇皇后帝朱熹曰湯既放桀而告諸候也曰上當有湯字履蓋湯名用𤣥牡夏尚黑未變其禮也武成厥四月哉生明王來自商丁未祀于周廟邦甸侯衛駿速也奔走執豆籩越三日庚戌柴望大告武成蔡沈曰周廟周祖廟也武王以克商之事祭告祖廟近而邦甸逺而侯衛皆駿奔走執事以助祭祀既告祖廟燔柴祀天望祀山川以告武功之成漢文帝即皇帝位入未央宫十月辛亥見于高廟馬端臨曰古之受終革命者必告于天地祖宗堯舜之禪讓湯武之征伐未之有改也漢承秦後典禮隳廢以古人所以郊祀天地者施之五畤之淫祠而未嘗有祀天地之禮高皇帝平秦滅項諸侯推戴即皇帝位于泥水之陽亦不聞有燔柴告天之事於義闕矣至文帝以後凡嗣君即位必謁見高廟亦受命祖宗之意光武即位于鄗為壇營于鄗之陽祭告天地六宗羣神俱從唐高祖即皇帝位命兼太尉蕭造告于南郊宋太祖即皇帝位差官告天地社稷羣神高宗即位告于昊天上帝孝宗以三十二年受禪奏告天地宗廟社稷景靈宫諸宫觀諸陵紹興兩攢宫光宗寧宗亦如之馬端臨曰宋朝登極告祭之禮惟太祖創業高宗中興有之此後則惟孝宗光宗寧宗登極有告祭之禮而太宗以下皆無之豈軼其禮乎或孝光寧三帝以受内禪而累朝以諒闇不克行耶臣按國家之事孰有大於受終繼體者哉繼天命以出治承祖宗而踐阼必行告祭之禮自堯舜禹湯周武皆然自秦漢以來禮文茍簡乃有行不行者創業之君出于草創繼世之君拘於諒闇遂無一定之制宜以唐虞之世為則蓋舜受堯禪以姓言則舜與堯異以位言則舜受之堯蓋兼創與繼也方其攝位之初既以告于文祖而徧祀羣神矣及夫堯喪既畢之後而復至于文祖廟而告之焉竊意告祭之禮宜於嗣綂之初遣禮官告即位于郊廟社稷羣望分遣近臣徧祭於天下羣神迨夫喪畢之後特於常祀之外如舜格文祖之比擇日躬詣郊廟行禮庶幾合於舜典之義以上告即位儀舜典嵗二月東巡守至于岱宗泰山也柴燔柴望望而祭之秩牲帛祝號之次第于山川五月南巡守至于南岳如岱禮八月西巡守至于西岳如初十有一月朔巡守至于北岳如西禮歸格于藝祖即文祖用特特牲也朱熹曰古者君將出必告于祖禰歸又至其廟而告之孝子不忍死其親出告反面之義也詩序時邁巡守告祭柴望也般巡守而祀四岳河海也王制天子將出類于上帝宜乎社造乎禰諸侯將出宜乎社造乎禰陳澔曰類宜造皆祭名後章言天子將出征則此出為巡守也以上巡守出告儀召誥越六日乙未王朝步自周則至于豐惟大保先周公相宅至于洛卜宅厥既得卜則經營位成周公朝至于洛則達觀于新邑營越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一孔安國曰成王從鎬京至于豐以遷都之事告文武廟蔡沈曰周鎬京也去豐二十五里文武廟在焉成王至豐以宅洛之事告廟也卜宅者用龜卜宅都之地既得吉卜則經營規度其城郭宗廟郊社朝市之位位成者左祖右社前朝後市之位成也周公至則徧觀新邑所經營之位郊祭天地也故用二牛社祭用太牢禮也皆告以營洛之事臣按成王欲遷都于洛告于祖禰則躬行祭祀告於郊社則命周公于新邑行禮註家並無成王遣祭之文則似以為周公自祭恐無此理蓋成周初營洛邑非惟告于郊社以遷都之故且用以告上帝及社稷之神俾安其位也然無告廟之祭者意是時宗廟猶在于豐廟宇雖成而未遷主乎以上營都邑儀洛誥王在新邑烝祭嵗文王騂牛一武王騂牛赤色一王命作冊逸史佚也祝冊惟告周公其後王入大室清廟中室祼灌地降神王命周公後作冊逸誥孔安國曰成王居洛邑始於新邑烝祭古者褒徳賞功必於祭日示不敢專也特加文武各一牛告曰尊周公立其後為魯侯王為冊書使史逸誥伯禽封命之書皆同在烝祭日蔡沈曰成王在洛舉烝祭之禮曰嵗云者嵗舉之祭也逸祝冊者史佚為祝冊以告神也臣按洛誥篇末記祝冊事既曰惟告周公其後又曰王命周公後孔疏以為尊周公立其後為魯侯蔡傳以為命周公治洛留守其後考之經文無留守意而禮有賜爵祿於太廟史由君右執策之文意者成王以周公有大功以治洛功成遂因時祭而作冊告神以封其後歟詩大雅江漢篇曰王命召虎來旬徧也來宣布也文武受命召公康公奭也維翰幹也無曰予小子王自稱也召公是似肇開也敏戎汝也公功也用錫爾祉釐賜也爾圭瓚秬鬯一卣尊也告于文人先祖之有文徳者錫山土田于周岐周受命自召祖穆公之祖康公也命虎拜稽首天子萬年朱熹曰詩言王命召虎來此江漢之滸徧治其事以布王命而曰昔文武受命惟召公為楨幹今女無曰以予小子之故也但自為嗣汝召公之事且能開敏女功則我當錫汝以祉福如下所云也故又序王賜召公策命之詞言錫爾圭瓚秬鬯者使之以祀其先祖又告于文人而錫之山川土田以廣其封邑蓋古者爵人必於祖廟示不敢專也又使往受命於岐周從其祖康公受命於文王之所以寵異之而召公拜稽首以受王命之策書也臣按先儒有言錫山川土田必使虎受賜于岐周用文武封康公之禮以待之此時此意賞非宣王之賞如稟命于乃祖文武也功非召虎之功如受敎於乃祖康公也三代令王不責臣子以事功惟勉臣子以忠孝本於人心天理而感動之也嗚呼至哉祭綂古者明君爵有徳而祿有功必賜爵祿於太廟示不敢專也故祭之日一獻君降立於阼階之南南鄉所命北面史掌書者由君右執策命之再拜稽首受書以歸而舍釋也奠于其廟孔穎達曰君尊上爵賞於廟不自專故民知施必由尊也陳祥道曰施爵賞者必於太廟示其不敢專所以明父祖之尊也受爵祿者舍奠于廟示其有歸美所以明父子之賢也漢武帝元狩六年使御史大夫湯廟立子閎為齊王旦為燕王胥為廣陵王閎之策曰嗚呼小子閎受兹青社燕王曰𤣥社廣陵王曰赤社朕承天序惟稽古建爾國家封于東土燕王北土廣陵王南土世世為漢藩輔臣按先儒謂古者封國必告于廟而冊之示不敢專也漢制未聞史記三王世家武帝從大司馬去疾之請冊立齊燕廣陵三王策書有廟立之文蓋當時必有告廟之禮云以上廟封之儀湯誥曰敢用𤣥牡敢昭告于上天神后后土也請罪有夏以與爾有衆請命蔡沈曰𤣥牡夏尚黑未變其禮也泰誓曰予小子夙夜祇懼受命文考類于上帝宜于冢土以爾有衆底致也天之罰蔡沈曰冡土大社也言予小子畏天之威早夜敬懼不敢自寧受命于文王之廟告于天地神祗以爾有衆致天之罰於商武成曰底商之罪告於皇天后土所過名山大川曰將有大正于商孔頴達曰名山謂華大川謂河蓋自豐鎬往朝歌必道華涉河也曰舉武王告神之語周禮大祝大師宜于社造于祖設軍社類上帝國將有事于四望及軍歸獻于社則前祝鄭𤣥曰將有事于神則大祝居前先以祝辭告之賈公彦曰王出六軍親行征伐故曰大師宜于社者軍將出宜祭于社即將社主行不用命戮于社也造于祖者出必造即七廟俱祭取遷廟之主行用命賞于祖也設軍社者社在軍中非常而祭曰類將有事于四望者軍行所過山川造祭乃過也獻于社者征伐有功獻捷于社也王制天子將出征類乎上帝宜乎社造乎祖禡於所征之地受命於祖受成於學陳澔曰禡者行師之祭也受命於祖卜於廟也受成於學決其謀也曽子問曰古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊齋車言必有尊也吳澂曰遷廟主謂祔禰時所遷昭穆最上之廟一主也在昭廟穆廟之上最尊最親者也君將出行時徧告有廟之諸主又特告此無廟之一主而載之以行也臣按先儒謂齊車示有齋敬之心焉曽子問曰古者師行無遷主謂未有當毁之廟可遷之主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告於祖禰遂奉以出載于齊車以行每舍奠焉而後就舍反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也陳澔曰既以幣玉告于祖廟則奉此幣玉猶奉祖宗之命也故曰主命每舍必奠神之也反則設奠以告而埋藏之不敢䙝也臣按先儒謂廟無虚主有廟者不可以其主行主命謂雖無木主但所受於神之命即是主也春秋左氏傳曰國之大事在祀與戎祀有執膰祭肉戎有受脹宜社之肉神之大節也孔穎達曰宗廟之祀則有執膰兵戎之祭則有受脹此是交神之大節也孔叢子曰天子命有司以特牲告社告所以征之事而受命焉舍奠于帝學以受成然後乃類上帝柴于郊以出以齊車載遷廟之主及社主行大司馬職奉之無遷廟主則以幣帛皮圭告于祖禰謂之主命亦載齊車凡行主皮圭幣帛皆每舍奠焉而後就館主車主于中門之外外門之内廟主居於道左社主居於道右其所經名山大川皆告焉以上師行之儀周禮司巫若國大旱則帥巫而舞雩鄭𤣥曰雩旱祭也天子於上帝諸侯於上公之神臣按魯僖公亦以巫尫舞雩不得雨欲焚之則是自古祈雨以巫其來乆矣春秋桓公五年大雩胡安國曰大雩者雩於上帝用盛樂也諸侯雩境内之山川爾魯諸侯而大雩欲悉書於策則有不可勝書故雩祭則因旱以書而特謂之大左傳曰龍見而雩楊復曰春秋書雩二十有一因旱而雩也龍見而雩乃建巳之月萬物始盛待雨而長於此時而雩與為百榖祈膏雨於啟蟄之郊其意同皆是聖人為民之心切逺也吳澂曰左氏謂龍見而雩過則書龍見者孟夏建巳之月也雩者過時故書魯有舞雩壇蓋祀帝于壇如郊焉而用盛樂歌舞於壇上故名其壇為舞雩而日亦如郊之用辛也禮記月令仲夏之月命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益于民者以祈榖實陳澔曰山者水之源將欲禱雨故先祭其本源雩者吁嗟其聲以求雨之祭周禮女巫凡邦之大烖歌哭而請亦其義也帝者天之主宰百縣畿内之邑也百辟卿士謂古者上公句龍后稷之類季秋之月大饗帝陳澔曰仲夏大雩祈也此月大饗報也方慤曰雩所以祈也饗所以報也祈必於仲夏者以隂生於午而物成之始也所以祈物之成而已報必於季秋者以陽窮於戍而嵗功之終也所以報嵗之功而已祭法雩宗祭水旱也陳澔曰吁而求雨之謂雩主祭旱言之爾兼祭水者雨以時至則亦無水患雩而謂之宗尊也通典建巳月雩五方上帝名曰雩禜於南郊之旁命樂正習盛樂舞皇舞臣按雩之為祭蓋天子於郊天之外别為壇以祈雨者也當夫孟夏之月萬物將成之際斯時也必資雨澤以膏潤之然後秋成可望焉故三代盛時當夫龍見之月而有大雩之祭備盛樂集羣巫八音之聲迭奏歌呼之聲不絶或舞而擗踊或嘘而歎息蓋以斯民窮苦之狀烖傷之情上達於天聴庶其或有所聞垂閔念之仁而為降雨澤以甦民困耳後世此禮不傳而在位者遇有旱暵之災慮斯民之無告往往假異端之術為祈禱之事令方士用符咒指斥怒罵甚至殺害物命耗蠧民財冒天之功以希爵賞嗚呼上帝之靈不以誠感而以法術刼制之可乎臣請於郊兆之旁擇地以為雩壇命禮官叅酌古今雩祭之禮每嵗孟夏以後及遇有水旱舉行之痛革異端之邪術以復古人之盛禮庶幾上感天心以致雨𤾉之時若以上大雩之祭以上祭告祈禱之禮大學衍義補卷六十三
