body:
  text: 大學衍義補卷三明丘濬撰治國平天下之要正朝廷公賞罰之施臯陶謨天命有徳五服五章哉五服五等之服章顯也天討有罪五刑五用哉五刑五等之人政事懋勉也哉懋哉蔡沈曰天命有徳之人則五等之服以彰顯之天討有罪之人則五等之刑以懲戒之葢爵賞刑罰乃人君之政事君主之臣用之當勉勉而不可怠者也臣按先儒謂人受天地之中以生能者養之以福不能者敗以取禍故全是衷者為徳是不失天之所賦也故天命之君必體福善之天制五等之服以彰其徳戾是衷者為罪是失天之所賦也故天討之君必體禍淫之天用五等之刑以威其罪爵賞刑罰乃政事之大者當勉勉而不可怠也由是以觀則知人君之爵賞刑罰皆承天以從事非我有之得私也後世人主不知出此往往以己心之喜怒私意之好惡輙加賞罰於人則失天命天討之㫖矣詩商頌殷武篇曰天命降監視也下民有嚴威也不僭僭賞之差也不濫刑之過也不敢怠遑暇也命于下國封大也建厥福朱熹曰天命降監不在乎他皆在民之視聽則下民亦有嚴矣惟賞不僭刑不濫而不敢怠遑則天命之以天下而大建其福此髙宗所以受命而中興也臣按先儒謂此章言商髙宗所以致中興之道曰天雖髙而實下其監視甚可畏也民雖卑而天實以為視聽其威嚴不可忽也惟髙宗上畏天下敬民而見於刑賞者未嘗有僣濫之失存於中心者不敢有怠遑之意故天命之以天下而大建其福由是觀之則人君之刑賞非一己之刑賞乃上天之刑賞非上天之刑賞乃民心之刑賞也是故賞一人也必衆心之所同喜刑一人也必衆心之所同怒民心之所同即天意之所在也如或不然拂民心而逆天意如紂之任惡來飛㢘殺王子比干則天命去之矣尚何福之有哉周禮天官太宰以八則法也治都王子弟食邑鄙公卿食邑其七曰刑刑以懲惡賞賞以勸善以馭其威明其刑賞以示勸懲劉彛曰刑以誅惡賞以勸善其威柄皆出於朝廷以八柄所秉節以起事者詔告也王馭凡言馭者驅而納之於善羣臣一曰爵謂内則公卿大夫士外則公侯伯子男以馭其貴有爵則貴二曰禄禄仕者之俸以馭其富三曰予予之以財以馭其幸出於恩賜四曰置置之於位以馭其行謂有賢行五曰生生猶養也以馭其福福及子孫六曰奪臣有罪而奪之以馭其貧奪其所有七曰廢放之於逺以馭其罪八曰誅謂以言責讓之以馭其過謂有過失林椅曰必言詔王者賞罰誅廢非臣下所得專也葢八柄之重所以定羣臣之邪正一予奪之間又將以服天下之心而定夫君子小人消長之勢也此非人君曉然自有見於中則馭臣之柄吾未見其可又曰爵禄者厲世磨鈍之具也古人制爵必以徳制禄必以功所以抑夫人僥求倖得之心而作其進徳興功之志固不容以濫受也今八柄爵禄之外又有予以馭其幸豈人主或得以行其私恩而啟人之幸心耶大抵有所謂當然之報有所謂特厚之恩當然之報人以為宜得而或視以為常而無激昂自奮之意故於人之有超異者施之以特厚之恩所以鼓舞之使之奔走於事功也此則八柄予以馭幸之深意嵗終則令百官府徧敕百官之府各正其治各使之自正其治受其會受其一歳功徳之事聽其政事聽其所致以告之政事而詔王廢置告於王而廢之置之三歳則大計羣吏之治而誅賞之臣按人君為治之大柄曰慶賞刑罰而已周禮大宰以八則治都鄙既有曰刑賞以馭其威矣而又有八柄詔王以馭羣臣内史所掌之法以詔治者亦同焉所謂爵賞予置生五者賞之類也奪誅廢三者罰之類也是八者之柄皆掌之天官天官者象天所立也天有春生秋殺然後以成天之道君有慶賞刑罰然後以成君之道人君持其柄於上以馭乎下大臣計其治於下以輔乎上則綱紀立而主威不至於下移誅賞行而人心不敢以懈怠人君君國馭衆之大權誠莫有先於此者矣禮記爵人於朝與士共之刑人於市與衆棄之臣按爵人於朝所以勸君子士之所共樂也故於朝朝者君子之所會也刑人於市所以懲小人衆之所共惡也故於市市者衆人之所聚也以此見人君之刑賞非一人喜怒之私乃衆人好惡之公焉後世人主往往賜人爵位乃自内降而出不欲其公庭顯謝人臣有罪或至加以鴆毒惟恐外聞此皆非天命天討之至公也春秋左傳襄公二十六年蔡聲子曰善為國者賞不僭而刑不濫賞僭則懼及滛人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利滛無善人則國從之臣按刑賞貴乎得中固不可以僭濫也所謂寧僭無濫與書所謂與其殺不辜寧失不經之意同昭公五年周人有言曰為政者不賞私勞不罰私怨臣按此言人君賞罰當合天下之公論不可徇一己之私心孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之朱熹曰左右近臣其言固未可信諸大夫之言宜可信矣然猶恐其蔽於私也至於國人則其論公矣然猶必察之者葢人有同俗而為衆所恱者亦有特立而為俗所憎者故必自察之而親見其賢否之實然後從而用舎之則於賢者知之深任之重而不才者不得以幸進矣然非獨以此進退人才至於用刑亦以此道葢所謂天命天討皆非人君之所得私也臣按人君用舎人才而加以賞罰固不可不參之於衆既參於衆尤不可不察之於獨也參之於衆也詳而察之於獨也審則用舎刑賞皆得其當矣而或不然聽一人之言遽以為賢否而用舎之甚而加刑賞焉不復參詳致察此朱熹所謂名曰獨㫁而主威不免於下移也歟通鑑齊威王召即墨大夫語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢人民給官無留事東方以寧是子不事吾左右以求助也封之萬家召阿大夫語之曰自子之守阿譽言日至吾使人視阿田野不闢人民貧餒趙攻鄄子不救衛取薛陵子不知是子厚幣事吾左右以求譽也是日烹阿大夫及左右嘗譽者於是羣臣聳懼莫敢飾詐務盡其情齊國大治彊於天下臣按齊威王之於阿大夫也非惟烹之而又及於左右之嘗譽者其於即墨大夫也非惟封之而又及於左右之嘗毁者若威王者可謂能操賞罰之權而不為左右所惑者矣後世人主不知出此往往溺於左右之偏私輕信其言不復致察以是為非以非爲是以賢為不肖以不肖為賢者多矣幸而覺悟又或置而不復詰問世之小人所以往往得志而賢人君子恒有擯棄沈鬱之患者此也其視威王不亦可愧也哉漢髙祖以項籍將季布數窘辱之籍滅購求布急滕公言於上以為郎中布母弟丁公亦為項羽將逐窘帝彭城西短兵接帝急顧曰兩賢豈相戹哉丁公乃還至來謁帝以狥軍中曰丁公爲臣不忠使項王失天下者也遂斬之曰使後人臣無傚丁公也司馬光曰髙祖網羅豪傑招亾納叛亦已多矣而丁公獨以不忠受戮何哉當羣雄角逐之際民無定主來者受之固其宜也及貴為天子海内為臣茍不明禮義以示人使爲臣者人懷二心以儌大利則國家其能久安乎是故斷以大義使天下曉然皆知為臣不忠者無所自容而懷私結恩者雖至於活已猶不與也戮一人而千萬人懼其慮事豈不深且逺哉臣按髙帝之斬丁公赦季布封雍齒是皆有公天下之意百世帝王所當法者也宣帝厲精為治信賞必罰見於詔令者有曰有功不賞有罪不誅雖唐虞猶不能以化天下臣按唐虞之世舉十六相去四凶大功二十爲天子是帝王之所以致雍熙泰和之治亦不能外刑賞以為治也誠有如宣帝詔書之所云者矣然是詔也乃為膠東相王成勞来不倦流民自占八百餘口賜之以闗内侯爵而下抑孰知其所賞者乃僞増户口者邪不特此也趙葢韓楊之不得其死𢎞恭石顯之委任非人所謂厲精為治信賞必罰亦虛言爾唐太宗嘗謂房𤣥齡曰有功則賞有罪則刑誰敢不竭心盡力以修職業臣按太宗此言可謂得馭臣之道矣觀其斥封徳彛以明天下之義用魏徴而忘平日之讐裴寂貨賂公行雖故舊亦行貶斥蕭瑀劾李靖之過乃録其功而賞之刑賞如是則臣下孰敢不竭心盡力以修職業哉然以䜟言而誅李君羡以譖言而殺劉洎以外戚而封長孫無忌以受賂而賜長孫順徳則又不能盡出於公也惜哉宋朱熹曰聖人之心未感於物其體廣大而虚明絶無毫髪偏倚所謂天下之大本者也及其感於物也則喜怒哀樂之用各隨所感而應之無一不中節者所謂天下之達道者也葢自本體而言如鏡之未有所照則虚而已矣如衡之未有所加則平而已矣至語其用則以其至虚而好醜無所遁其形以其至平而輕重不能違其則此所以致其中和而天地位萬物育雖以天下之大而不外乎吾心造化之中也以此而論則知聖人之於天下其所以慶賞威刑之具者莫不各有所由而舜典所論敷奏以言明試以功車服以庸與夫制刑明辟之意皆可得而言矣雖然喜而賞者陽也聖人之所欲也怒而刑者隂也聖人之所惡也是以聖人之心雖曰至虛至平無所偏倚而於此二者之間其所以處之亦不能無少不同者故其言又曰罪疑惟輕功疑惟重此則聖人之㣲意然其行之也雖曰好賞而不能賞無功之士雖曰惡刑而不敢縱有罪之人而功罪之實茍已曉然而無疑則雖欲輕之重之而不可得是又未嘗不虚不平而大本之立達道之行固自若也臣按朱熹此言推本之論以上論公賞罰之施正朝廷謹號令之頒易姤卦大象曰天下有風姤遇也后人君也以施命誥四方程頤曰風行天下無所不周爲君后者觀其周徧之象以施其命令周誥四方也臣按昔人有言風者天之號令所以鼓舞萬物命者君之號令所以鼓舞萬民風自天而下無物不遇而君之命令實似之人君尊居九重與下民本無相遇之理惟王言一布則萬民爭先快覩莫不鼓舞於其下而君民之心始遇矣由是觀之人君命令之頒所以布君之徳感民之心其機括之大轉移之妙有如此者可不謹哉巽之彖曰重巽以申命程頤曰重巽者上下皆巽也上順道以出命下奉命而順從上下皆順重巽之象也君子體重巽之義以申復其命令申重復也丁寧之謂也臣按巽之卦象風也風之吹物無處不入無物不鼓動詔令之入人淪於肌膚浹於骨髓亦如風之動物也人君體巽之象順人心以行事重復而丁寧之必須上下皆以為順而不拂逆人心然後行之則徳之入人也深而澤之及人也厚矣象曰隨風巽君子以申命行事程頤曰兩風相重隨風也隨相繼之義君子觀重巽相繼以順之象而以申命令行政事隨與重上下皆順也上順下而出之下順上而從之上下皆順重巽之義也命令政事順理則合民心而民順從矣臣按先儒謂巽爲風而風者所以發揚天之號令風隨風而不逆此重巽之象也在上之君子體隨風之巽出而發號施令凡事必申復詳審一再命之然後見之行事則四方風動順而易入申命者所以致其戒於行事之先行事者所以踐其言於申命之後由是觀之人君詔令之出不可不詳審於未頒之前尤不可不踐行於既頒之後審之於前不可行者則不言也踐之於後既言之矣則不可不行也後世之詔惟其失於詳審輕為條欵故既行之後往往杌􅑾齟齬有所牽制妨礙而不可行焉此其詔令所以不見信於臣民有所頒布人率以虚言視之國家猝有急切之事因之而失機敗事者多矣渙九五渙汗其大號程頤曰君臣合徳以剛中正巽順之道治渙唯在浹洽於人心則順從也當使號令洽於民心如人身之汗浹於四體則信服而從矣如是則可以濟天下之渙朱熹曰陽剛中正以居尊位當渙之時能散其號令則可以濟渙而無咎矣九五巽體有號令之象汗謂如汗之出而不反也又曰渙汗其大號號令當教如汗之出千毛百竅中迸散出來人君之號令當出乎人君之中心由中而外由近而逺雖至幽至逺之處無不被而及之亦猶人身之汗出乎中而浹於四體也臣按人君當人心渙散之時而欲收之非有大號令不可也故當渙之時必有號令之頒如身之出汗無處而不浹洽然後可以免咎也觀唐徳宗奉天宋髙宗中興二詔可驗矣書多方周公曰王若曰猷告爾四國多方呂祖謙曰先曰周公曰而復曰王若曰何也明周公傳王命而非周公之命也徧告四方者何也殷奄即淮夷之一種屢叛驅扇者廣今雖平殄譬諸餘邪遺疾猶或在肺腑間恐或有時而發也故渙發大號歴叙天命之功前代之事征誅安集之本末俾四方咸與聞之大破羣疑深絶亂根葢本於是兵寢刑措者四十餘年其亦訓誥之助歟臣按後世人臣代傳王言葢本諸此國家不幸而有刑討征誅之事在可否之間渉形似之疑者必須明白詳悉頒布天下使人心曉然知吾意嚮之所在因其情而定其罪隨其罪而加以刑葢有不得已焉者如此則羣疑釋而人心服亂根永絶而國是明著矣周官王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷蔡沈曰反者令出不可行而壅逆之謂言敬汝所主之職謹汝所出之令令出欲其行不欲其壅逆而不行也以天下之公理滅一己之私情則令行而民莫不敬信懷服矣臣按令之大者固出於君而百司庶府下其敎條於其屬亦令也故成王既訓迪百官而又合其尊卑大小而同訓之焉夫朝廷之政由上而行之於下由内而行之於外必假命令以達之於其未出之前必須謹審詳度知其必可行而無弊然後出之既出之後必欲其通行而無礙不至於壅塞而反逆可也然其所出之令一惟以公理而滅私情然後可行而不反茍或私勝而公㣲則將反逆而不可行矣又何以使民咸敬信而懷服也哉詩大雅抑之篇曰訏大也謨謀也定命號令也逺猶圖也辰時也告朱熹曰訏謨大謀也大謀謂不爲一身之謀而有天下之慮也定審定不改易也逺謀謂不為一時之計而爲長久之規也辰告謂以時播告也臣按人君欲示訓於四方也必廣大其謀謨不為一身而必為天下無終窮之慮審定其號令不敢輕易而必為一定不可易之制於是乎長慮却顧深思逺圖稽其所終所蔽益之損之與時宜之必可為久逺之規然後以時而播告之焉如此則夫號令之頒圖惟之事永永無弊施之於一時者可以為法於百世矣後世世主淺謀輕舉容易發為號令可言而不可行者多矣縱有可行亦惟可用於一時不可詒之於久逺於是朝更夕改民不知所遵守是以號令之頒民視之以為泛常一旦遇夫倉猝之變有所補偏救急而下人不知其所以而往往至於不可救藥吁可不謹哉春秋穀梁傳曰爲天下主者天也繼天者君也君之所存者命也為人臣而侵其君之命而用之是不臣也為人君而失其命是不君也君不君臣不臣此天下所以傾也臣按君代天出命者也臣代君行命者也君出命固不可違天之道臣行命亦不可侵君之事茍臣侵君之事則君失其命矣君失其命則不足以繼天而君非君矣臣侵君命則不知以事君而臣非臣矣人君繼天以出治恒必兢兢業業敬以存心明以燭理剛以制欲則臣下知所凛畏而不敢侵吾之事而吾所以繼天道而主天下者其威命不至旁落而下移矣禮記王言如絲其出如綸王言如綸其出如綍臣按王者之言其在中也惟細如絲而已及其出也乃如宛轉繩之大焉其初出也僅大如綸而已及其出而益逺也乃如引棺之大索焉所以然者良以人君居九重之上為萬方之主一言一話在人君雖若甚㣲者及其施之於外天下之人仰之如日星之明畏之如雷霆之震去之愈逺而見之愈大焉然則人君號令之頒其可以不謹哉漢賈山言於文帝曰臣聞山東吏布詔令民雖老羸癃疾扶杖而往聽之願少須㬰母死思見徳化之成臣按司馬遷作史記於文帝紀凡詔皆稱上曰而他紀則不然葢以見文帝之詔皆出於帝之實意也上以實感故下以實應一見其詔書之下欣欣然相率以聽意必其真有此實恵然後爲此實言也後世詔書之下率出於詞臣之視草有司之議擬皆按故事而舉之未必皆出於上心也是以有其言無其事有其事無其效許人以直言不加罪而罪之愈甚許民以欠負不復徴而徴之如故是故上之言不信於民民之心不孚於上此徳化之成所以有歉於文帝歟光武時天下已定務用安静以手迹賜萬國者一劄下行細書成文勤約之風行於天下唐陸贄從徳宗幸奉天嘗奏曰今乘輿播遷陛下宜痛自引過以感人心徳宗從之故行在詔書始下雖驕將悍卒莫不揮涕激發及還京師李抱真來朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思奮臣節臣知賊不足平也臣按感人之易者莫易於言故人君一言之善雖於深宫之中九重之上四海之逺莫不應之况以徳音之宣布詔令之頒行於郡國者哉夫上有由中之誠下必有感孚之效不徒然也觀光武勤約之風行於天下徳宗引過之詔感夫士卒可見矣人君誠能誠實其心審定其命擇視草之臣守渙汗之信則雖惷愚之夫驕悍之卒亦無不感動者而况愚直之民循良之吏乎唐太宗謂侍臣曰詔令格式若不常定則人心多惑姦詐盡生周易稱渙汗其大號施令若汗出於體一出而不復也又書曰愼乃出令令出惟行弗惟反且漢祖日不暇給蕭何起於小吏制法之後猶稱畫一今宜詳思此義不可輕出詔令必須審定以為永式臣按太宗此言則凡號令之頒不但詔告天下而已凡夫一事之施一令之布皆不可輕出必委曲審定以爲久逺之規焉宋劉安世言于其君哲宗曰臣嘗考載籍以推先王之道雖禮樂刑政號為治具而所以行之者特在命令而已昔之善觀人之國者不視其世之盛衰而先察其令之弛張未論其政之醇疵而先審其令之繁簡惟其慮之既臧發之不妄而持以必行則堅如金石信如四時敷天之下莫不傾耳承聽聳動厭服此聖人所恃以鼔舞萬民之術也傳曰令重則君尊又曰國之安危在出令凡此皆謹重之意也今朝廷命令變易頻數逺不過一二嵗近或期月而已甚者朝行而夕改亦有前詔來頒後令蠲除者吏不知所守民不知所從求其弊原葢由講議未精思慮未審人情有所未盡事理有所未通或牽於好惡之私或溺於迎合之説是非無所辨取舍無所宗故一人言之而遽為之紛更也方平安無事之時輕慢多變之如此緩急有事之際何以取信於人伏望深鑒前古之戒謹為今日之慮至於法度之廢置政事之因革必使大臣公心協謀博詢利病廣攬詳擇務當義理更其所可更則不嫌於違俗守其所可守則無憚於襲故庶幾政令清簡吏民信服事可久行不至反汗臣按安世斯言切中古今之弊有志於天下國家者其於命令之頒要當以為鑒戒范成大曰人君所以為國者恃其命令足以鼓舞羣下而已命令重則其政舉命令輕則其事隳人臣敬君之命如雷霆之不敢侮葢以吾君之所以爲國者在焉故曲禮序尊敬君命之説爲尤詳人君深居九重之中而化萬里之外命令所至奔走奉承其震動如此是以聖王兢兢業業不敢忽於出令審之而勿輕發守之而勿輕變使天下致敬而取則觀聽不惑而後治功可成也臣按范成大此言所以解曲禮曰凡爲君使者已受命君言不宿於家也曲禮之言爲臣而發范氏之言爲君而發臣必敬君命之施君必謹已命之發命之發也不輕禮之敬也不忽古之帝王所以言不妄發發而人必信之事不妄舉舉而人必從之此其治功之成所以易易也歟以上論謹號令之頒大學衍義補卷三
