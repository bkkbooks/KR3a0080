body:
  text: 大學衍義補卷五明丘濬撰治國平天下之要正百官總論任官之道虞書臯陶謨曰無曠廢也庶官天工人其代之蔡沈曰人君代天理物庶官所治無非天事茍一職之或曠則天工廢矣可不深戒哉臣按宋儒陳大猷曰天子能以一心察天下之幾不能以一身兼天下之務任之庶官而已不可使曠非無其人之為曠非其人之為曠也天下之事無一不出於天天不自為人代為之一官曠則一事闕矣元儒吳澄亦曰天下之事皆天之事天以此事付之君君不能自治而分之人是庶官所治之事皆代天而為之者也噫人君誠知人臣所治之事皆天之事而付於我者其必不肯任用非人而致天事之曠以得罪於上帝矣商書伊尹曰任官惟賢才左右惟其人臣為上為德為下為民其難其慎惟和惟一為皆去聲蔡沈曰賢者有德之稱才者能也左右者輔弼大臣人臣之職為上為德左右厥辟也為下為民所以宅師也臣職所係其重如此是必其難其慎難者難於任用慎者慎於聽察所以防小人也惟和惟一和者可否相濟一者終始如一所以任君子也臣按為治之道在於用人用人之道在於任官人君之任官惟其賢而有德才而有能者則用之至於左右輔弼大臣又必於賢才之中擇其人以用之非其人則不可用也人臣之職在乎致君澤民其為乎上也必陳善閉邪以為乎君之德其為乎下也必發政施仁以為乎民之生如此之人然後任之於左右俾其上輔君德下濟民生既得如是之人非用之之難察之之謹則其進也易而雜而僥幸之小人得以間之矣非待之以協和信之以専一則其用也乖而二而正大之君子不得以久安矣吁方用之之初則其難其慎既用之之後則惟和惟一其者必然之辭惟者専一之謂人君致審於斯則知所以任官之道矣説命惟治亂在庶官官不及私昵愛也惟其能爵罔及惡凶也德惟其賢蔡沈曰庶官治亂之原也庶官得其人則治不得其人則亂六卿百執事所謂官也公卿大夫士所謂爵也官以任事故曰能爵以命德故曰賢惟賢惟能所以治也私昵惡德所以亂也臣按蔡沈謂庶官治亂之原蓋以為治亂皆本於此也夫人君用人以圖治惟其賢能而用之則國家之治原於此矣茍舍其賢者能者惟已之所親愛者是用雖有可惡之德不問也如此則列之五等布之庶位者皆不仁不義之人無禮無智之士天下豈有不亂者哉周書武成建官惟賢位事惟能蔡沈曰建官惟賢不肖者不得進位事惟能不才者不得任立政王左右常伯常任凖人綴衣虎賁音奔周公曰嗚呼休兹知恤憂也鮮哉蔡沈曰王左右之臣有牧民之長曰常伯有任事之公卿曰常任有守法之有司曰凖人三事之外掌服器者曰綴衣執射御者曰虎賁皆任用之所當謹者周公於是嘆息言曰美矣此官然知憂恤者鮮矣言五等官職之美而知憂其得人者少也臣按常伯常任凖人即下文所謂三事三宅誠周官之别名也牧民之長曰常伯所謂宅乃牧是也其虞廷四嶽之任乎任事之公卿曰常任所謂宅乃事是也其虞廷典禮典樂百揆之官乎守法之有司曰凖人凖之云者掌法之官刑罰當如凖之平即所謂宅乃凖也又非虞廷士師之職乎綴衣者掌王之服器居則張設者焉虎賁者執王之器械行則防護者焉是常伯常任凖人三者國之大臣以共理朝廷之政綴衣虎賁二者王之親臣以供奉服御之用宋儒呂祖謙謂職重者有安危之寄職親者有習染之移其繫天下之本一也職有大小而經綸康濟薰陶涵養賴焉知其美而加之憂庶不以非人處之矣林之竒亦謂三宅固不可不得人然進見有時虎賁綴衣之類則朝夕與王處最親且密茍非其人則主德內蔽大臣雖賢何所施其力哉綴衣即今內司設尚衣等監之職虎賁即今錦衣衛之職吁有大臣理國之政有親臣在君之側二者皆得其人則君之左右所聞所見者無非正理國之任用所施所行者無非仁政任官如此天下豈有不治哉禮記王制凡官民材謂凡民之有材加以官也必先論之論謂考評其行藝之詳也論辨然後使之任事然後爵之位定然後祿之臣按此古者官人之法夫民莫不有材也顧上用之何如耳然民生草澤中林林總總之多茍非在上者有以評論之於先又何以知其材而用之哉後世一惟資格用人稽考簿書嵗月次序無復先王論辨之意此所以任用不得其人而治效不古若也緇衣子曰大臣不親百姓不寧則忠敬不足而富貴已過也大臣不治而邇臣比私相親也矣故大臣不可不敬也是民之表也邇臣不可不慎也是民之道也君毋以小謀大毋以逺言近毋以內圖外則大臣不怨邇臣不疾而逺臣不蔽矣孔頴達曰大臣離二不與上親政教煩苛百姓不寧是臣不忠於君君不敬於臣所以致然由君與臣富貴已過極也大臣不肯為君理治職事由邇臣與上相親比也君無與小臣而謀大臣之事無以逺臣共言近臣之事無以內臣共謀外臣之事所以然者恐各為朋黨彼此交爭轉相陷害故不圖謀若能如此則內外情通小大意合大臣不怨恨於君也近臣不為人所非毁逺臣不被障蔽也臣按先儒謂此章言大臣不信而小臣之比國之大患也蓋大臣之任國之安危繫焉用之斯信之可也居其任而不親信之則下之人知其不為上所親信也是以令之而不從制之而不服此百姓所以不寧也所以然者由臣之忠不足於君君之敬不足於臣徒富之貴之至於太過焉耳君以富貴豢其臣臣以富貴豢其身為下者不知盡忠以啓上之敬為上者不復致敬以來下之忠兩相乖二不相親信如此則大臣不得治其事嬖寵之小臣相與親比而大臣之柄反為所移奪矣是故人君於大臣必加敬焉而不可輕以其係國之治忽而民所瞻望以為儀表者也於邇臣必致慎焉而不可忽以其係君之好惡而民之所由以為道路者也敬之則大臣得以治其事慎之則邇臣不至於相比昵矣不以小臣謀大臣則大臣不至於怨乎不以不使逺臣間近臣則近臣不至於疾視其上不使左右寵幸之臣圖謀四方宣力之士則逺臣之賢不為近臣所壅蔽矣先儒謂小謀大逺言近內圖外三者任臣之大害也臣竊以謂逺言近者百一二小謀大者什三四內圖外者什八九人君任人之際誠能親信大臣而敬之審擇邇臣而慎之則股肱得其人而耳目不為人所蔽矣嗚呼可不念哉以上論總論任官之道正百官定職官之品舜典帝曰咨汝二十有二人欽哉惟時亮天功朱熹曰二十二人四嶽九官十二牧也周官言內有百揆四嶽外有州牧侯伯蓋百揆者所以統庶官而四嶽者所以統十二牧也臣按天下之大非止一方也而統宗會元於國都之中朝廷之上必君總治於上臣分治於下然後事有統紀民有依歸而天下平定焉然君一人而已所統之地非一所也所治之民非一人也所行之事非一類也必欲事理民安而無一處不到焉非立官以分理之不能得也自唐虞之世已設官二十有二人以分理天下內焉有九官而總之於百揆外焉有十二牧而總之於四嶽舜之咨命其於九官人各為之辭隨其職而致其戒勉之意其於十二牧也則人共為一辭其所分牧雖有不同而所以命之為民之意則無不同也大抵天立君以為之子君立官以為之臣無非為乎斯民而已蓋天生蒸民不能以自治而付之君君承天命不能以獨理而寄之臣則是臣所治者君之事君所治者天之事也帝舜於受終告攝之後首詢四嶽次咨十有二牧然後及於百揆九官者豈不以百揆九官所治者事而四嶽十二牧所牧者民凡夫朝廷之間百官庶務何者而非為民者乎帝既分命之又總告之而要其終於欽哉惟時亮天功之一語以見臣之事即君之事君之事即民之事民之事即天之事也我朝內設六部即虞廷之九官外建十三布政司即虞世之十有二牧名雖不同而所理之事則一地雖有異而分牧之意則同其所以立制度明紀綱真可以為萬世法者也商書説命乃進于王曰嗚呼明王奉若順也天道建邦設都樹后王天子也君公諸候也承以大夫師長不惟逸豫惟以亂治也民蔡沈曰明王奉順天道建邦設都立天子諸侯承以大夫師長制為君臣上下之禮以尊臨卑以下奉上非為一人逸豫之計而已也惟欲以治民焉耳熊禾曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民至哉斯言千萬世為人君者之龜鑑也桀惟不知此而湯有鳴條之師紂惟不知此而武有孟津之會師曠言於晉侯曰天之愛民甚矣豈其使一人肆於民上以從縱也其淫而棄天地之性為人君者聞此言可以悚然懼矣臣按天立乎君君奉乎天天固非以一人之故而立其人以為君人君亦非以其人之故而以之為諸候大夫師長人君則當奉順天道人臣則當承順君命天之道在生民人君之命亦在生民人君知天之道為生民立我以為君則必愛天之民而不肆虐於天之所生者而竭其力盡其財以為私奉人臣知君之命為生民設我以為諸侯大夫師長則必恤君之民而不敢肆毒於君之所付者而竭其力盡其財以為私用君則奉乎天而順之臣則承乎君而行之則生民無不得其所者矣是則上天所以立君而明王所以順天道定職官以為民者大意蓋如此世之為君臣者惡可不知其所以然之故哉周官唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂治也明王立政不惟其官惟其人蔡沈曰百揆四嶽總治於內州牧侯伯總治於外內外相承體統不紊故庶政惟和而萬國咸安夏商之時世變事繁觀其會通制其繁簡官數加倍亦能用治明王立政不惟其官之多惟其得人而已臣按此唐虞夏商四代之官是即上文所謂制治未亂保邦未危之事明王所以立政者也蓋官不在多惟在得人得其人則一人可以兼數人之事不得其人雖叢數人不如得一人也此唐虞之官惟百而治繼而夏商倍之為二百亦克用治用是以保邦用是以制治所以上下相承內外相維而永無危亂之患也歟以上總論設官堯典克明俊德以親九族周禮少宗伯掌三族之别以辨其親疏陳傅良曰堯典言九族而周禮言三族三族父子孫也九族髙祖至玄孫也三族舉其本九族極其末舉三族則九族見矣臣按施仁之序親親而後仁民為治之道齊家而後治國故史臣紀堯之典於治效被格之後即繼之以明德親族之言蓋以出治之本在此也當時雖未設官觀其敘親睦九族於平章百姓協和萬邦之前則其立言之序輕重可見矣自成周以三族之别掌於少宗伯之官後世因之列宗正於九寺之中殊失帝堯睦親之道我聖祖超然逺見特立宗人府於六部之上其秩一品專以皇親掌之可謂得帝堯親族之深意而足以為萬世法矣漢髙祖七年初置宗正官以敘九族臣按班固漢書表宗正秦官掌親屬蓋漢因秦制而設之也以上宗人周官立太師太傅太保兹惟三公論道經邦燮理陰陽官不必備惟其人賈誼曰保者保其身體傅者傅之德義師者道之教訓少師少傅少保曰三孤特也二公𢎞化寅亮天地弼豫一人胡安國曰古者三公無其人則以六卿之有道者上兼師保之任冢宰或闕亦以三公下行端揆之任禹自司空進宅百揆又曰作朕股肱耳目是以宰臣上兼師保之任也周公為師又曰位冢宰正百工是以三公下行端揆之職也所以然者三公與王坐而論道故難其人而冢宰總百官均四海亦不易處也呂祖謙曰案顧命太保領冢宰畢公領司馬毛公領司空别有芮伯為司徒彤伯為宗伯衛侯為司冦則周時三公兼六卿三公無職六卿則有職者也三公論道而六卿行道者也以三公兼六卿合本末精粗於一原也陳傅良曰周之三公多是六卿兼之但其人足以兼公則加其公之職位無其人則止為卿而已三公三孤皆無其人則闕焉而已而六卿自若也要之成周以三公三孤待非常之德故曰官不必備惟其人臣按公孤之職夏商以前未有也其名始見於此昔大舜命伯禹總百揆髙宗爰立傅説作相則成周之世未聞有是名意者立公孤而以六卿兼之是即揆相之任歟我朝稽古定制革去前代中書省倣六典立六部而公孤之職間以六卿兼之其亦成周此意也嗚呼是職也未易稱也必其人果能論道經邦燮理陰陽然後可以當三公之寄果能二公𢎞化寅亮天地然後可以當三孤之任不然寧闕毋備可也以上公孤冢大也宰治也掌邦治統百官均四海蔡沈曰天官卿治官之長是為冢宰內統百官外均四海蓋天子之相也百官異職管攝使歸於一是之謂統四海異宜調劑使得其平是之謂均臣按冢宰今吏部尚書之職司徒徒者衆也主民衆故曰司徒掌邦教敷五典擾馴也兆民蔡沈曰地官卿主國教化敷君臣父子夫婦長幼朋友五者之教以馴擾兆民之不順者而使之順也臣按司徒今户部尚書之職但周時所掌者教化後世則專理户口財賦之事焉嗚呼唐虞三代之時其民淳朴其於天理民彛無甚相悖焉者猶且設官以掌之俾其敷布教條以馴擾夫億兆之民後世風氣日漓民心不古顧無有大臣以專掌教事所以禁之者僅見於刑官弼教之設此亦可以觀世變矣宗伯掌邦禮治神人和上下蔡沈曰春官卿主邦禮治天神地祗人鬼之事和上下尊卑等列春於四時之序為長故其官謂之宗伯成周合樂於禮官謂之和者蓋以樂而言也臣按宗伯今禮部尚書之職司馬掌邦政統六師平邦國蔡沈曰夏官卿主戎馬之事掌國征伐統御六軍平治邦國平謂強不得陵弱衆不得暴寡而人皆得其平也軍政莫急於馬故以司馬名官何莫非政獨戎政謂之政者用以征伐而正彼之不正王政之大者也臣按司馬今兵部尚書之職夫國之大事在戎宋以樞密院專掌兵政與中書省並謂之兩府今制設兵部以掌兵政所以統軍旅専征伐則歸之五軍都督府焉兵部有出兵之令而無征伐之權五軍有統兵之權而無出兵之令彼此相維內外相制其法制之善前代所未有者也司寇掌邦禁詰姦慝刑暴亂蔡沈曰秋官卿主寇賊法禁羣行攻劫曰寇詰姦慝刑強暴作亂者掌刑不曰刑而曰禁者禁於未然也臣按司寇今刑部尚書之職司空掌邦土居四民時地利蔡沈曰冬官卿主國空土以居士農工商四民順天時以興地利臣按司空今工部尚書之職但周時所掌者度地居民量地制邑之事後世則專理營造工作之事焉六卿分職各率其屬以倡九牧阜成兆民呂祖謙曰六卿者萬事之綱也為天下者始於立綱紀故一曰邦治綱紀既立首教之以人道之大故二曰邦教人道立則必有節文之者故三曰邦禮教立禮行而猶有干紀亂常者焉則將帥之事也故四曰邦政大罪陳之原野降此則有司之法在故五曰邦禁民遷善逺罪然後可以永奠其居故六曰邦土終焉六卿分職各率其屬以倡九牧阜成兆民為治體統上下相統內外交應本末具舉絲牽繩聨無一節不相關處天下雖廣會頭都在六卿上冢宰相天子而統百官則司徒以下無非冢宰之所統乃均列一職而併數之為六卿何也綱固在網之中而首亦豈處乎身之外哉乾坤之與六子並列於八方也冢宰之與五卿並居於六職也一也蔡沈曰六卿分職各率其屬官以倡九州之牧自內達之於外政治明教化洽兆民之衆莫不阜厚而化成也臣按周禮每卿六十屬六卿三百六十屬六卿所分之屬在唐分為二十四司今制吏部四司文選驗封稽勳考功戶部十二司則分𨽻浙江等十三藩仍量繁簡帶領直𨽻府州每一司內仍各分為民度金倉四科禮部四司儀制祠祭主客精膳兵部四司武選職方車駕武庫刑部十三司如戶部之制仍各分為憲比司門都官四科工部四司則營繕虞衡都水屯田也司設郎中員外郎主事以分主各部所掌之職而統於尚書侍郎吏部所掌則天下官吏選授勳封考課之政令戶部所掌則天下人民田土户口錢糧之政令禮部則掌天下禮儀祭祀宴享貢舉之政令兵部則掌天下軍衛武官選授戎馬之政令刑部則掌天下刑名徒𨽻句覆關禁之政令工部則掌百工山澤之政令六部統各司各司分掌天下之務如網之有綱如絲之有紀上下相承巨細畢舉其官屬雖無三百六十之多其間脈絡相通體統不紊深得周官六典之遺意自有周禮以來二千餘年僅見行於今日者也臣伏覩皇明祖訓有曰自古三公論道六卿分職並不曽設立丞相自秦始置丞相不旋踵而亡漢唐宋因之雖有賢相然其間所用者多有小人專權亂政今我朝罷丞相設五府六部都察院通政司大理寺等衙門分理天下庶務彼此頡頏不敢相壓事皆朝廷總之所以穩當以後子孫做皇帝時並不許立丞相臣下敢有奏請設立者文武羣臣劾奏將犯人凌遲全家處死嗚呼此我聖祖髙見逺慮超出百王之上是誠有合於成周設官分職以為民極之意則是今日之五府六部卿佐與夫都察院通政司大理寺皆前代三省兩府執政之官也雖無宰執之名實理宰執之事但其事一總於朝廷而不顓顓任於一人是以百年以來朝廷無紛更之弊臣宰無專擅之禍上安其政下保其位如一日也説者猶云政權必有所在不有所統必有所歸其中不無旁落下移之處潛持默運之人茍非其人其弊有不可勝言者是以我太宗皇帝即位之初即選文學之臣七人者俾居內閣專掌制詔凡國家大典禮大政令大事幾皆得以預聞謨謀既定然後付所司行之不豫之以名而豫之以實自是以為故事餘七十年於兹矣夫不豫之以名則下無作福作威之具豫之以實則上賴詢謀咨訪之益其處置之善防慮之深漢唐以來所未有者也以上六部舜典帝曰龍朕望疾也讒説殄絶也行謂傷絶善人之事也震驚朕師衆也其言不正駭衆聽也命汝作納言夙夜出納朕命惟允朱熹曰納言官名命令政教必使審之既允而後出則讒説不得行而矯偽無所託矣敷奏復奏事也逆受下奏也必使審之既允而後入則邪僻無自進而功緒有所稽矣周之內史漢之尚書魏晉以來所謂中書門下者皆此職也臣按納言今通政司之職我太祖髙皇帝命曽秉正為通政使諭之曰壅蔽於言者禍亂之萌專恣於事者權姦之漸故必有喉舌之司以通上下之情以達天下之政昔者虞之納言唐之門下省皆其職也官以通政為名政猶水也欲其常通無壅遏之患其審命令以正有司達幽隱以通庶務當執奏者勿忌避當駁正者勿阿隨當敷陳者毋隱蔽當引見者毋留難毋巧言以取容毋苛察以邀功毋讒間以欺罔公清直亮以處厥心庶不負委任之意嗚呼後世人臣有居此職者服膺聖祖此訓則非惟其職任之修舉而於輔成國家太平之治實亦有賴焉以上通政司堯典乃命羲和羲氏和氏主厯象授時之官欽敬也若順也昊廣大之意天厯紀數之書象觀天之器日月星辰敬授人時耕作之候凡民事早晚之所關者周禮馮相氏馮乘也相視也言登臺以視天文也掌十有二嵗嵗星所在十有二次十有二月謂斗柄所建十有二辰謂日月所會十日甲乙丙丁戊巳庚辛壬癸二十有八星之位星即宿也辨其敘事以會天位保章氏保守也章文也掌天星以志星辰日月之變動以觀天下之遷謂災祥禍福之遷動者辨其吉凶以星土星所主之土辨九州之地所封封猶界也封域皆有分星如角亢氐兗州房心豫州之類以觀妖祥臣按唐堯之羲和成周之馮相保章即今欽天監之職夫陶唐以前法制未立占步之術未詳天道幽逺非有神聖之德不足以知之故帝堯命官以羲和為第一義自是以後紀數之書則有一定之厯觀天之器則有一定之制故成周馮相氏保章氏皆世其官以專其業不過春官宗伯一屬吏而處於羣僚之中而其所以命之之始亦不復有如堯之欽敬也已雖然堯之所以欽順乎天道即所以敬授乎民時也不徒總命之於朝廷而又分命之於四方蓋象以正厯厯以定時無非以為民而已成周之制則專主於天而不及於民此堯舜所以為萬世法歟近代制厯觀象之官往往以司天為名噫巍巍乎惟天為大在人君者日當敬而順之夫豈一事一物之職而臣下可司之乎我聖祖改前代司天臺為欽天監得帝堯欽若之心於數千載之上其敬天勤民之心可以為萬世帝王法雖然欽之一言非但人君所當盡而任職之臣尤不可不盡也夏書曰先王克謹天戒臣人克有常憲謹者恐懼修省以消變異也常憲者奉法修職以供乃事也為人君者固當謹天戒於上然非涖職之臣奉法修職以供其事則天戒之垂人君容有不盡知者矣故先王尤嚴於畔官離次俶擾天紀之誅夫謂之天紀者嵗日月星辰厯數也厯數之法久則不能無差我朝之厯承元之舊今用之百年餘矣天道參差不齊久則有變所以釐正之而使千嵗之日至可坐而致者政有在於今日以上欽天監天官膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人掌王之食飯也飲酒漿膳牲肉也羞有滋味者以養王及后世子臣按膳夫即今光祿寺官之職膳夫食官之長自膳夫以下庖人內饔外饔亨烹同人等官皆以士為之屬於冢宰秦時為大官令漢始有光祿勳然乃持戟宿衛之官以之司膳羞始於南北朝唐宋因之今制光祿寺有四署曰大官即周官庖饔之任曰珍羞即周官籩人之職曰良醖周官酒正是也曰掌醢周官醢人是也夫人君一身為天地民物之主宗廟社稷之所關是尤不可以無所養要必內養其德外養其體可也膳夫所掌食飲膳羞之類雖以養君之體而君之德亦於是乎繫焉故用之必以其道行之必以其時茍肥甘鮮美之是耽而貪冒沈酣之弗職則所掌之人為有罪矣晉平公之宰夫責司聰司明之罪其以此歟雖然是職也又非特供王后世子之膳與其薦羞而已凡祭祀之牲體薦俎賓客饔餐饗食皆在所司雖曰飲食口腹之奉而皆大有關係焉屈到以薦芰致譏陳平以惡具反間專諸以七首進食生禍亂是皆由於飲食之微也是亦不可不戒以上光祿寺醫師掌醫之政令聚毒五毒也藥五藥也以共醫事凡邦之有疾病者輕曰疾重曰病疕瘍者頭瘡曰疕身瘡曰瘍則使醫分而治之歲終則稽其醫事以制其食疾醫掌萬民之疾病四時皆有癘疾以五味酸苦甘辛鹹五穀稻麥黍稷豆五藥草木蟲石穀養其病以五氣心肝脾肺腎所藏之氣五聲五臟所發之聲五色五臟所發之色視視也其死生瘍醫凡療瘍以五毒攻之以五氣養之以五藥療之臣按周禮醫師即今太醫院之職疾醫今所謂內科也瘍醫今所謂外科也醫之説見於經典始於商書若藥弗瞑眩厥疾弗瘳之一語蓋藥所以攻病故醫師所掌之政令所聚之藥以毒為先而瘍醫所療五毒之攻亦在五氣之養之前其意可見矣夫治病用藥而用其毒如人之馭惡人控猛獸非善於駕馭制伏者往往反受其害茍非有傳授之素講貫之功一旦而付之斯人死生之命不至於實實虛虛損不足益有餘而夭閼人生也者幾希今世之業醫者挾技以診療者則有之矣求其從師以講習者何鮮也我祖宗內設太醫院外設府州縣醫學醫而以學為名蓋欲聚其人以斆學既成功而試之然後授以一方衛生之任由是進之以為國醫其嘉惠天下臣民也至矣臣願究成周所以謂之醫師國朝所以立為醫學之故精擇使判以上官聚天下習醫者俾其教之養之讀軒岐之書研張孫之技試之通而後授之職因其長而專其業稽其事以制其祿則天下之人皆無夭閼之患而躋仁壽之域矣是亦王者仁政之一端也以上太醫院以上論定職官之品臣按國朝設官不止於六部通政司光祿寺欽天監太醫院也而以定職官之品不及五軍都督府見本條司馬下及嚴武備類本兵之柄條都察院見本類重臺諫之任條大理寺見慎刑憲類設典獄之官條太常寺見秩祭祀類翰林院中書舍人見本類簡侍從之臣條六科見本類重臺諌之任條國子監見崇教化類設學校以立教條太僕寺見嚴武備類牧馬之政條禁衛見嚴武備類宮衛之禁條京尹監司府州縣見固邦本類擇民之長條者各從其類也大學衍義補卷五
