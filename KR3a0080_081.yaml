body:
  text: 大學衍義補卷八十一明丘濬撰治國平天下之要崇教化謹好尚以率民尚書君陳篇王若曰爾惟風下民惟草蔡沈曰君子之德風也小人之德草也草上之風必偃君陳克由周公之訓則商民亦由君陳之訓矣臣按此成王命君陳代周公尹東郊策命之辭孔子答季康子之問其言本諸此風譬則君也草譬則民也風之為氣徑而力草之為物柔而弱以徑而有力之風而加諸柔弱之草其偃仆之易且速可知矣人君之居上也其轉移之勢豈止於風而民之處下也其隨順之形則甚於草矣人君神而化之使民宜之則其感孚之妙轉移之易順從之速其猶風之於草有莫知其然而然矣惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷蔡沈曰言斯民之生其性本厚而所以澆薄者以誘於習俗而為物所遷耳然厚者既可遷而薄則薄者豈不可反而厚乎反薄歸厚特非聲音笑貌之所能為爾民之於上固不從其令而從其好大學言其所令反其所好而民不從亦此意也敬典者敬其君臣父子兄弟夫婦朋友之常道也在德者得其典常之道而著之於身也蓋知敬典而不知在德則典與我猶二也惟敬典而在德焉則所敬之典無非實有諸己實之感人捷於桴鼓所以時乃罔不變而信升于大猷也臣按人之生也其性本有善而無惡有善故其有生之初無不厚也逮夫有生之後蔽於外物誘於習俗於是乎其厚者始變而薄矣然向者其所得於天之本然者則固淳如也在上者誠能敬典而在德於凡所謂人倫之常道兢兢焉敬恭之而不忽皆必實而有諸己凡吾所令於民以為政教者即吾所好以為典常者也則吾之一身周旋動履於大道之中由是得於聽聞觀感之下者莫不遷善而改過變惡以為美化頑為仁反薄歸厚蕩蕩平平皆升進于大道之中無反無側矣君牙篇王若曰爾身克正罔敢弗正民心罔中惟爾之中蔡沈曰教之本在君牙之身正也中也民則之體而人之所同然也正以身言欲其所處無邪行也中以心言欲其所存無邪思也孔子曰子率以正孰敢不正周公曰率自中臣按此穆王命君牙為大司徒之誥命詩序曰羔羊鵲巢之功致也召南之國化文王之政在位皆節儉正直德如羔小曰羔羊大曰羊也羔羊之皮所以為裘素白也絲五紽以絲飾裘之名退食退朝而食於家自公從公門而出委蛇委蛇自得之貌朱熹曰南國化文王之政在位皆節儉正直故詩人美其衣服有常而從容自得如此也臣按先儒謂此詩為文王作人之效如春風和氣所在生輝故人才之所成就驗諸在野則﨣﨣之武夫公侯腹心觀諸在朝則委蛇之大夫節儉正直此文王之化不可以淺深逺近論者也然則人君一身為風化之本烏可不愼其所自出哉又曰騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃植搜田以時仁如騶虞則王道成也朱熹曰文王之化始於關雎而至於麟趾則其化之入人者深矣形於鵲巢而及於騶虞則其澤之及物者廣矣蓋意誠心正之功不息而久則其薰蒸透徹融液周遍自有不能己者非智力之私所能及也故序以騶虞為鵲巢之應而見王道之成其必有所傳矣陳鵬飛曰始於鵲巢之夫婦而人倫正中於羔羊之君臣而朝廷治人倫既正朝廷既治使天下皆被文王之化而有騶虞之仁心則王道成矣禮記坊記子云善則稱親過則稱已則民作孝吳澄曰言人子善稱親過稱已則民化之皆興起而孝於親子曰長民者朝廷敬老則民作孝鄭𤣥曰長民謂天子諸侯也葉夢得曰老近於親也近者猶敬於上則親者民必知孝於下緇衣子言之曰為上易事也為下易知也則刑不煩矣吕大臨曰上好信則民莫敢不用情易事者以好信故也易知者以用情故也若上以機心待民則民亦以機心待其上姦生詐起欲刑之不煩不可得矣劉彛曰上難事則下難知上易事則下易知好惡悖於上喜怒失其常於是有匿其誠信以為容悅者屈其忠直以為阿諛者包其禍心以為詐僞者茍可以罔上而免其咎罰者奚所弗至哉為下如是可謂難知也臣按上下之分雖殊而人心之理則一上之人有偏心難事也有褊心難事也有私心難事也有忌心難事也有疑心難事也有欲心難事也下之人深情者難知也厚貌者難知也巧言者難知也令色者難知也隂私者難知也隱忍者難知也藏機者難知也蓄奸者難知也為人上者知吾之位尊而權重人敬憚畏避之不暇必和顔悅色以待人開心見誠以示人傾心輸意以用人平心易氣以與人寬仁大度以容人至誠惻怛以恕人則在我者易於事矣知人之難知也推誠以待之因事以試之如孔子所謂視其所以觀其所由察其所安又如所謂不逆詐不億不信抑亦先覺者是賢則人之難知者亦易於知矣大抵知人則哲雖堯猶以為難下之人誠不易知也上之人茍能一待之以誠而不藏機蓄智以為牢籠駕馭之術則在我者易事而在彼者不難於知矣孟子曰至誠而不動者未之有也子曰好賢如緇衣惡惡如巷伯則爵不瀆而民作願刑不試而民咸服大雅曰儀刑文王萬國詩作邦作孚陳澔曰緇衣鄭國風美鄭武公之詩小雅巷伯寺人刺幽王之詩大雅文王之篇吕大臨曰好賢必如緇衣之篤則人知上之誠好賢矣不必爵命之數勸而民自起願心以敬上惡惡必如巷伯之深則人知上之誠惡惡矣不必刑罰之施而民自畏服文王好惡得其正而一出乎誠心故為天下之所儀刑德之所以孚乎下也子曰下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不慎也是民之表也陳祥道曰言之化人也淺故不從其所令行之感人也深故從其所行好惡出於正則彼皆從而正好惡出於非則彼皆從而非猶表端而影端表枉而影枉也故謂民之表馬睎孟曰令者令之於民行者行之於己其所行者若此其所令者若彼民不從其若彼之令而從若此之行則是上之好惡下之所取以為正而不可以不慎也臣按上好是物下必有甚焉者矣甚者甚於君也林林之衆蠢蠢之民無所知識見上之所好者在此則從而趨赴之倣效之始雖一二而終至於千萬始雖涓滴而終至於滔天所謂甚焉者如是噫人君之好尚起於一念之偏私頃刻之順適而不知天下之人從風而靡遂因之而成風俗或以之而致亂亡然則君人者其好尚可不謹哉子曰上好仁則下之為仁爭先人故長民者章志貞教尊仁以子愛百姓民致行己以說其上矣陳澔曰章志者明吾好惡之所在也貞教者身率以正也所志所教莫非尊仁之事以此為愛民之道是以民皆感其子愛之心致力於行己之善而悅其上如子從父母之命也子曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡方慤曰民以君為心者言好惡從於君也君以民為體者言休戚同於民也體雖致用於外然由於心之所使故曰心好之身必安之心雖為主於內然資乎體之所保故曰心以體全亦以體傷陳祥道曰體從心者也民從君者也故上臨之以莊則下亦舒矣上臨之以肅則下亦敬矣心以體率心不在焉則視而弗見聽而弗聞豈非心好之身必安之之謂乎君所以率民者也君好仁則下莫不仁君好義則下莫不義茍君不為之則民無從焉體衛心者也體全則心與之全體傷則心與之傷故曰心以體全亦以體傷民衛君者也民歸之然後可以君天下民去之則亦不能以獨君矣故曰君以民存亦以民亡臣按緇衣此篇即心體相須以喻君民相資之意以見肢體之運動皆由心神之主使亦猶庶民之休戚皆由君上之好惡也然肢體之運動心神固資之以為榮衛然而運動之極至於疲廢而痿痺焉則人心之神亦因之而傷損矣人民之供役人君固資之以為奉養然而役使之過至於貧苦而怨叛焉則人君之國亦因之而喪亡矣所謂君以民存亦以民亡此二言者為人上者宜常書于座右以為朝夕之警以比丹書之戒焉春秋左氏傳穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟孔頴逹曰所好必善所惡必惡在上者所好所惡不有過愆則下民知所適歸言皆知歸於善也臧武仲曰夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又何禁乎陸贄曰凡上之所為以導下也上所不為以檢下也上所不為而下或為之然後可以設峻防置明辟若上為之而下亦為之固其理也又何禁乎臣按武仲此言雖為季武子而發然萬世之下居人上者立法制明禁令必先有諸己然後為之夫然則所令無不行所禁無不止矣茍徒知責人而不知責己是豈大學潔矩之道哉論語季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸朱熹曰莊謂容貌端嚴也臨民以莊則民敬於己孝於親慈於衆則民忠於己善者舉之而不能者教之則民有所勸而樂於為善張栻曰此皆在我所當為非為欲使民敬忠以勸而為之也然能如是則其應蓋有不期然而然者矣臣按季康子問使民敬忠以勸謂之使者是有意於驅使其民也聖人答之以莊孝慈及舉善教不能而加之以則之一辭蓋謂在上者能如此臨之以莊而孝而慈而舉善教不能則民自有如此感應初非有所使亦不待於使而然也季康子問政於孔子孔子對曰政者正也子率以正孰敢不正范祖禹曰未有己不正而能正人者臣按書曰表正萬邦上者表也下者影也表正則影正矣先儒謂政之所以得名以其能以正己者正人也己不能正焉能正人哉居人上者誠能以正存心以身率先天下則近而羣臣逺而萬民孰敢以不正哉季康子患盜問於孔子孔子對曰茍子之不欲雖賞之不竊朱熹曰言子不貪欲則雖賞民使之為盜民亦知耻而不竊臣按非其有而取之盜也非獨謂貨財凡吾之所不當有者而有之皆是盜之事康子患人盜他人所有之貨物而欲弭之聖人告之以不欲所謂不欲者凡吾所嗜好用度茍理之不可為義之不當為分之不得為而恃吾之勢以多取之乘吾之力以强劫之恣吾之材以妄為之皆是盜也吾為大盜而禁小民之不為小盜豈理也哉所謂雖賞之不竊乃假設之言季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃朱熹曰為政者民所視效何以殺為欲善則民善矣尹焞曰殺之為言豈為人上之語哉以身教者從以言教者訟而况於殺乎張栻曰在上者志存於殺則固已失長人之本矣烏能禁止其惡乎欲善之心純篤發見於政教之間則民將率從丕變如風之所動其孰有不從者然則民之所以未之從者則吾欲善之誠不篤而已臣按人君之於民如天地之於物父母之於子也天地生物父母生子惟恐不得其所而夭閼其生生之理而或至於傷其生君之於民當體天地父母之心庶幾盡君之道也是故人君之於民賢者則保恤之不肖者則哀憐之養之教之懲之戒之至於再至於三不得已而後加之刑焉而刑亦有等第非至於逆天理敗人倫不加之以極刑也康子乃欲殺無道以就有道夫道有諸己然後可以責人吾居人之上所謂道者或出或入焉乃欲責下之人無道而殺之又何以知其為無道也聖人告之以子欲善而民善欲其反諸身而自盡其道也所謂善者天理之公人道之正純粹而無惡者也我有是善人亦有是善上以善而自為則下之人同有是善者亦感發而興起矣子曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁織縷為之以約小兒於背者負其子而至矣朱熹曰好義則事合宜情誠實也敬服用情蓋各以其類而應也臣按在己者皆盡其道則在下者各以類而應之所謂正己而物正者也子曰上好禮則民易使也謝良佐曰禮達而分定故民易使輔廣曰上好禮則品節分明而誠意退遜故觀感於下者亦皆安己之分聽上之命而易使大學詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母朱熹曰能潔矩而以民心為己心則是愛民如子而民愛之如父母矣又曰君子有潔矩之道故能以己之好惡知民之好惡又能以民之好惡為己之好惡也夫好其所好而與之聚之惡其所惡而不以施焉則上之愛下真猶父母之愛其子矣彼民之親其上豈不亦猶子之愛其父母哉臣按先儒謂愛民之道不過順其好惡之心而己大約民所好者飽暖安樂所惡者飢寒勞苦使民常得其所好而不以所惡之事加之則愛民之道也雖然上下之分雖殊好惡之情則一民之所好惡者即吾之所好惡者也因己之所好惡而知人之所好惡又以民之所好惡而為己之所好惡焉非真心於愛民而以父母斯民為心者能若是乎茍為不然好人之所惡惡人之所好是謂拂人之性菑必逮夫身不獨用人為然詩云節截然髙大貌彼南山維石巖巖赫赫師尹民具俱也爾瞻有國者不可以不愼辟偏也則為天下僇矣朱熹曰詩小雅節南山之篇師尹周太師尹氏也言在上者人所瞻仰不可不謹若不能潔矩而好惡徇於一己之偏則身弒國亡為天下之大僇矣臣按先儒謂傳引二詩以明為人上者民所共仰則其好惡當與民同之茍徇一己之偏私焉則逆人心之所同而為天下之所戮矣蓋上人者下人之所瞻仰者也民有不平賴以平之民有不公賴以公之而上之人先以不平不公自居而好惡狥於一己之偏是謂拂人之性逆人之情雖其位髙勢重一時無如之何雖未必至於戮而有可戮之理噫為人父母者而不能盡父母之道而為天下之大戮亦惟於好惡之公與偏而己可不謹哉孟子曰君仁莫不仁君義莫不義朱熹曰張氏謂此章重出然上篇主言人臣當以正君為急此章直戒人君義亦小異耳臣按此章即君道以明感化之機蓋有堯舜之君則有堯舜之民有桀紂之君則有桀紂之民茍所行者桀紂之事而求堯舜之治無此理也人君行仁義而下之人逆天悖理以不仁不義應之天理昭昭亦不之容也不久旋即淪敗自古及今無不然者是以人君為治必存仁義之心以行仁義之政漢章帝時馬廖上疏曰昔元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劍客百姓多創瘢楚王好細腰宫中多餓死長安語曰城中好髙結與髻同四方髙一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下素簡所安發自聖性誠令斯事一竟則四海誦德聲薰天地神明可通况行令乎臣按廖所謂百姓從行不從言是誠識治化之體風化之原者也是言也始於成王命君陳曰違上所命從厥攸好大學所謂所令反其所好而民不從禮記謂不從其所令從其所行皆此意也蓋人君一身風化之本原而京師者又風化始出之地君人上者誠能正身齊家而不為非禮非義之事而於京師首善之地於凡事之營為物之創造有不合於禮不當於義者一切禁革而惟古初之是式禮義之是程茍有違焉必加以罪并坐其監領之官製造之工不但已也後世世主其所頒之律令格式非不嚴而謹也然而能行之於暫而不能久者何也上之人既不能率先以身以故貴近者倣效而先犯之然後天下從風而靡焉所謂百姓從行不從言豈不信哉第五倫又言于章帝曰諸王主貴戚驕奢踰制京師尚然何以示逺故曰其身不正雖令不行以身教者從以言教者訟夫隂陽和嵗乃豐君臣同心化乃成也臣按第五倫言以身教者從以言教者訟是即大學所謂其所令反其所好而民不從者也是故人君既正身修德躬行節儉以身示教為天下先復立為制度嚴為禁令以戒飭夫妃嬪宗戚之屬左右侍御之臣內而朝著近而京邑使各安其分守不得越禮踰制則天下靡然從其化而不敢犯矣茍徒責人而不責己限踈而不限親禁逺而不禁近耳目所及者則若罔聞知而於郡縣之逺閭里之間乃詳為之制嚴為之法則亦虛費文移徒掛牆壁而己安能戢其泛泛之心杜其呶呶之議而革其靡靡之俗哉以上謹好尚以率民大學衍義補卷八十一
