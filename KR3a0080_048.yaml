body:
  text: 大學衍義補卷四十八明丘濬撰治國平天下之要明禮樂郡國之禮周禮州長二十五百家為一州各掌其州之敎治政令之法則也正月建子之月之吉各屬合也其州之民而讀法以攷其德行道藝而勸之以糾其過惡而戒之若以嵗時祭祀州社則屬其民而讀法亦如之嵗終則㑹其州之政令正嵗建寅之月則讀教法如初黨正五百家為一黨各掌其黨之政令教治及四時之孟月吉日則屬民而讀邦法以糾戒之春秋祭禜謂祭水旱之類亦如之族師百家為族各掌其族之戒令政事月吉則屬民而讀邦法閭胥二十五家為閭各掌其閭之徴令聚衆庶既比則讀法朱熹曰周禮屬民讀法今有司能一嵗三四舉行之其於風化不為無助臣按成周盛時制為教治政令之法既已行之於朝廷國都而又推之於州黨族閭焉二千五百家為州州有長五百家為黨黨有正百家為族族有師二十五家為閭閭有胥皆以嵗時屬其民而讀邦法每嵗之常州長則以正月及正嵗是一嵗而再讀也黨正則以四時之孟月是一嵗而四讀也族師則每月而一舉行焉是一嵗而十二讀也他如州長之祭祀州社黨正之春秋祭禜族師之春秋祭酺其非時而讀法者又不止一也是以當時之民耳目之所聞見者莫非先王之教典朝廷之政治官府之禁令是其出作入息皆在乎禮法之中出口入耳無非勸戒之語欲為善而知所勸欲為惡而有所懲此所以比屋可封而鄉無不善之俗而世多良材也歟我聖祖作為教民榜文頒布天下閭里御製大誥三編頒布天下學校葢即周官所謂教治政令之法也鄉師之職正嵗稽其鄉器考其良窳比五家為比共平聲下同吉凶二服閭二十五家共祭器族百家共喪器黨五百家共射器州二千五百家共賔器鄉萬二千五百家共吉凶禮樂之器鄭𤣥曰吉服者祭服也凶服者弔服也比長主集為之祭器者簠簋鼎爼之屬閭胥主集為之喪器者素爼揭豆之屬族師主集為之此三者民所以相共也射器者弓矢楅中之屬黨正主集為之賔器者尊爼笙瑟之屬州長主集為之吉器若閭之祭器也凶器若族之喪器也禮樂之器若州長賔射之器鄉大夫集此四者為州黨族閭有故而不共也此鄉器者旁使相共則民無廢事上下相補則禮行而教成矣臣按成周盛時以禮樂為治而行禮樂者必有器具非特朝廷之上為然而凡比閭族黨之間皆有其器以為行禮之具當世之民耳聞而目見無非禮樂之事此所以比屋可封而成粹美之俗也後世非獨民不識禮樂而名為士大夫者亦惟口誦其言而不知其所以為禮樂之器具何如也風俗之不如古又何怪哉以上讀法供器禮記曰鄉飲酒之義主人拜迎賔于庠門之外入三揖而后至階三讓而后升所以致尊讓也盥洗揚觶所以致潔也拜至拜洗拜受拜送拜既所以致敬也尊讓潔敬也者君子之所以相接也君子尊讓則不爭潔敬則不慢不慢不爭則逺于鬬辨矣不鬭辨則無暴亂之禍矣吕大臨曰鄉飲酒者鄉人以時㑹聚飲酒之禮也因飲酒而射則謂之鄉射鄭氏謂三年大比興賢者能者鄉老及鄉大夫率其吏與其衆以禮賓之則是禮也三年乃一行諸侯之卿大夫貢士於其君蓋亦如此黨正每嵗國索鬼神而祭祀則以禮屬民而飲酒于序則黨正因蜡飲酒亦此禮臣按先儒謂鄉飲有四一則三年賓興賢能二則鄉大夫飲國中賢者三則州長習射四則黨正蜡祭今世所行者惟存一鄉大夫飲國中賢者爾他如所謂州長習射黨正蜡祭世不復講而三年賔興賢能其宴㑹雖謂為鹿鳴而亦不以鄉飲為名焉夫鄉飲之名始於成周漢唐以来亦間行之然無定制我太祖皇帝得國之初即詔天下府州縣每嵗再行永為定制伏讀御製大誥有云鄉飲酒禮不過申明古先哲王教令而已所以鄉飲酒禮叙長幼論賢良别姦頑異罪人其坐席間年髙有德者居於上髙年淳篤者竝之以次序齒而列其有曽違條犯法之人列於外坐同類者成席不許干於良善之席主者若不分别致使貴賤混淆察知或坐中人發覺主者坐以違制姦頑不由其主紊亂正席全家移出化外嗚呼斯禮古先哲王之制妥良民於宇内亙古至今興者鄉里安鄰里和長幼序無窮之樂大哉王言所謂從者昌否者亡其垂世警俗之意深矣𫝊曰禮之教化也微其止邪於未形使民日遷善逺罪而不自知也其此意歟故聖人制之以道鄉人士君子尊于房户之間賓主共之也尊有𤣥酒以水為之貴其質也羞出自東房主人共之也洗當東榮主人之所以自潔而以事賓也鄭𤣥曰鄉人謂鄉大夫也士謂州長黨正也君子謂鄉大夫也尊于房户之間賓主共之者設酒尊于東房之西室户之東在賓主之間酒雖主人之設而賓亦以之酢主人故云共之也地道尊右設𤣥酒在西者貴其質素故也臣按此古人行鄉飲酒禮之一賈公彦所謂又有鄉大夫士飲國中賢者用鄉飲酒者此也由是觀之則是禮非獨尚齒又所以尚賢也而我聖祖之誥所謂序長幼尚齒也論賢良尚賢也然非特如此而已又因之以别姦頑異罪人一禮之舉衆義備焉嗚呼盛哉周禮鄉大夫之職三年則大比攷其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之以鄉飲之禮禮而賔之吴澂曰古者鄉大夫行鄉飲酒於鄉學以賔禮興賢者能者而升其書於天府擇其最賢者為賔其次為介此以德選不以齒論臣按此古人行鄉飲酒禮之二也本朝三年大比一開科兩京十三藩皆有鄉試撤棘之日有司設席以待考試官及中式舉子謂之鹿鳴宴今宜斟酌古制以解首為賔以次為介為三賔為衆賔而以考試官為僎提調官為主監試官為司正執事官及藩臬官僚皆以陪位其中執事人員有營私作弊者列於外坐一如朝廷頒降禮制而行以復古人賔興賢能之禮或别設席以勞試官亦可黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位鄭𤣥曰國索鬼神而祭祀謂嵗十二月大蜡之時也正齒位者鄉飲酒義所謂六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆是也必正之者為民三時務農至此農隙而教之尊長養老見孝弟之道也臣按此古人行鄉飲酒禮之三也竊惟今制一嵗凡再行鄉飲酒禮既行之於正月望日又以十月朔旦行焉嵗首之禮宜如常制合養在官在民之老以正齒位若夫孟冬之月百榖告成農夫終嵗勤苦始得少息請略倣周人蜡祭之禮備牲醴以索祭鬼神聚民之老者飲以勞之遂禮其年髙有德者以為大賔而以其能帥子弟耕稼者為衆賔庶合古禮意射義曰卿大夫士之射也必先行鄉飲酒之禮賈公彦曰州長因春秋二時以禮㑹聚其民而行禮於州之序學中先行鄉飲酒為禮而射臣按此古人行鄉飲酒禮之四是即州長春秋以禮㑹民而射於州序也臣請於正月望日十月朔日行禮之後即率賔以下依朝廷原降射禮儀注行射禮於學中庶古禮復行於今日孔子曰吾觀於鄉而知王道之易易也吕大臨曰禮之所尊尊其義也其文則擯相習之其義則君子知之修其文逹其義然後可以化民成俗也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五者皆見于飲酒之禮而可以化民成俗故曰吾觀于鄉而知王道之易易也易謂易行易易者甚言其易也黄幹曰請賔介陳器饌獻賔介獻僎旅酬燕此六者禮之大節也登降辭受禮之文也鼎爼籩豆禮之器也脯醢脊脅禮之用也此觀禮者所共知也其數易知其義難知也鄉飲教親睦也鄉閭親睦陵犯爭訟之風息矣一飲一食一拜一坐一揖一降無非教也通於義者又非但可以親睦鄉閭而已也天理得人心正無所施而不可也聖人著為禮以教人凡為鄉人者皆知此義焉此成周之世所以人人皆有士君子之行也禮廢樂墜鄉人之羣飲者未嘗廢豐飲食侈供張悅聲妓恣驩嗷教侈也誨淫也恣欲也無非所以敗人心者也後世之士夫曽古之服勤于畎畝者之不若也然則是禮也今世學士大夫有志于古者其可不思所以講明而肄習之歟臣按孔子此言與所謂聖人制之以道及我聖誥之文是知是禮之在天下誠行王道之要萬世帝王所當舉行而凡有民社之寄者不可徒應故事而不知所以敬慎之也以上鄉飲酒禮周禮鄉大夫退而以鄉射之禮五物猶事也詢衆庶一曰和發而中節二曰容動皆合禮三曰主皮不失正鵠四曰和容容比於和五曰興舞節比於樂吴澂曰詢衆庶者問于衆庶而求其人也臣按此鄉大夫賔興賢能既退而行鄉射之禮以詢衆庶也我聖祖於洪武三年初詔天下開科第三場面試四事其一曰射以觀其中數多寡即此制也州長春秋以禮㑹民而射于州序丘葵曰序者州之學孟子曰序者射也葢射以序進且以别其賢否也臣按三代之後射禮不行也乆矣惟晉庾亮曽依周制以行我聖祖初得天下即令天下府州縣學訓誨生員每日講讀經書罷於學後設一射圃教學生習射朔望要試過其有司官閒暇時與學官一體習射命禮部定圖式儀注凡八則一射式二樹射鵠三置射位四主射五賞酒六司射七射器八射職九射位十儀注所謂射器者凡九射職者凡七至今天下皆立射圃朔望有司躬謁先師及聽諸生講讀後詣圃行射禮是即州長㑹民射于州序之遺意也射義曰故射者進退周還必中禮内志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德行矣吕大臨曰禮射者必先比耦故一耦皆有上耦下耦皆執弓而挾矢其進也當階及階當物及物皆揖其退也亦如之其行有左右其升降有先後其射皆拾發其取矢于楅也始進揖當福揖取矢揖既搢挾揖退與將進者揖其取矢也有横弓郤手兼弣順羽拾取之節焉卒射而飲勝者袒決遂執張弓不勝者襲脫決拾加弛弓升飲相揖如初則進退周旋必中禮可見矣夫先王制禮豈茍為繁文末節使人難行哉亦曰以善養人而已蓋君子之于天下必無所不中節然後成德必力行而後有功其四肢欲安佚也茍恭敬之心不勝則怠惰傲慢之氣生動容周旋不能中乎節體雖佚而心亦為之不安安其所不安則手足不知其所措故放辟邪侈踰分犯上將無所不至天下之亂自此始矣聖人憂之故常謹于繁文末節以養人于無所事之時使其習之而不憚煩則不遜之行亦無自而作至于乆而安之則非禮不行無所徃而非義矣君子敬以直内義以方外所存乎内者敬則所以形乎外者莊矣内外交修則發乎事者中矣射一藝也容比于禮節比于樂發而不失正鵠是必有樂于義理乆于敬恭用志不分之心然後可以得之則其所以得之者其為德可知矣子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子朱熹曰揖讓而升者大射之禮耦進三揖而後升堂也下而飲謂射畢揖降以俟衆耦皆降勝者乃揖不勝者升取觶立飲也言君子恭遜不與人爭惟于射而後有爭然其爭也雍容揖遜乃如此則其爭也君子而非若小人之爭矣子曰射不主皮為力不同科古之道也朱熹曰射不主皮鄉射禮文為力不同科孔子解禮之意如此也皮革也布侯而棲革于其中以為的所謂鵠也科等也古者射以觀德但主于中而不主于貫革葢以人之力有彊弱不同等也楊時曰中可以學而能力不可以彊而至臣按儀禮射有三大射賔射燕射天子諸侯卿大夫皆有之士無大射而有賔射燕射後世禮廢之後而所謂射者惟用之戰陳而用之以為禮節者葢微矣我聖祖欲以之取士以復古人擇士澤宫之制而不果既而頒其圖式儀注於天下非但以是而教士子而必俾學官與有司習射焉噫方其無事而教之于學校以習其禮遜之容一旦有事也則以用之于戰陳而無敵于天下矣以上鄉射禮周禮大行人王之所以撫邦國諸侯者嵗徧存問其安否三嵗徧覜眡其治效五嵗徧省察其風俗國語曰周之秩官秩官周常官篇名有之曰敵國賔至闗尹官名以告行理吏也以節以節為信逆迎也之候人為導導引卿出郊勞門尹除掃除門宗祝執祀司里授館司徒具徒執役者司空視塗道路司冦詰奸禁詰奸盗虞人入材材木甸人積薪用以㸑爇火師監燎火燎水師監濯滌濯膳宰致餐熟食廩人獻餼生食司馬陳芻養馬工人展車補傷敗百官各以物至賔入如歸是故小大莫不懐愛其貴國之賔至則以班加一等益䖍至于王使則皆官正長也涖臨也事上卿監視也之臣按周禮一書其于諸侯聘問之禮詳備而于王朝遣使之禮略焉大行人王之所以撫邦國諸侯無嵗無之而不聞其有節送供奉之禮獨于國語定王使單襄公聘宋楚而道陳道茀而不可行歸告于王而引周之秩官之語所言皆侯國之禮其末一語云至於王使皆官正涖事上卿監之則在當時必有其禮周禮立制以訓諸侯惟載其所以相待之禮而其所以奉上者不載焉非不載也敵國之禮尚如此而貴國賔至且以班加一等益䖍則天子之使至所加不止於一等而其所以䖍敬者益之又益可知也自罷侯置守之後無復邦交之禮所以奉承者惟天子之使爾攷歴代之禮制惟有王朝之禮所謂郡邑之禮泯如也本朝開國之初定為洪武禮制出使禮儀凡六條二十年又命禮部官著為禮儀定式出使禮儀凡三條二十七年又命禮官參用二書為出使禮儀緫二十條開讀遣使一奉使王國二奉使諸司十四蕃國三頒降行人司永為定制又詔頒迎詔儀注於天下凡朝遣使各處開讀將至所在官僚朝服具龍亭綵輿儀仗鼓樂郊迎使者下馬以詔置於龍亭使者立亭東官吏人等北向行五拜三叩頭禮衆官及鼓樂前導使者隨行至所司衆官先入東西序立龍亭至使者立其東西向如有出使廷臣先贊曰出使官行禮引贊引出使官於露臺行五拜三叩頭禮贊唱排班班齊之後四拜使者捧詔授展讀官跪受之開讀衆官跪聽出使官於露臺束跪聽宣讀訖展讀官捧詔授使者復置亭中衆官俯伏興四拜山呼舞蹈又四拜禮畢衆官詣龍亭前跪長官致辭曰聖躬萬福使者鞠躬答曰聖躬萬福衆官乃退易服見使者行再拜禮臣竊以謂自古禮文之詳莫傋於周禮一書而其間所載朝覲聘問之禮雖詳而於出使一節獨闕而我聖祖創為之制其詳有如此者葢王朝之於郡國以地言之則疆域阻逺以分言之則名分懸絶所以逹上下之情一逺近之勢以其有使臣之往来詔令之頒布耳其所以迎接而授受者茍簡而粗率非獨無以嚴九重之威命重皇華之使節而下之人亦輕忽而不知所重而播告之修申諭之意或不足以聳動乎奉承之人而事體或至於隳機㑹或至於失亦或有之矣以上出使及迎詔禮月令季冬之月命有司大難與㑚同旁磔披磔牲體攘除隂氣出土牛以送寒氣陳澔曰月建丑丑為牛土能生水故特作土牛以畢送寒氣也陳祥道曰土勝水牛善耕勝水故可以勝寒氣善耕故可以示農耕之早晩月令季冬之月大難旁磔然後出土牛則出土牛驅除之終事也既乃告民出五種命農計耦耕事則出土牛又農耕之始事也後漢祭祀志立春之日迎春於東郊車旗服飾皆青歌青陽舞雲翹之舞宋志立春前五日並造土牛耕夫犁具於大門之外是日黎明有司為壇以祭先農官吏各具綵杖環擊牛者三所以示勸耕之意臣按宋景祐所頒土牛經其作土牛以嵗之幹色為首支色為身納音色為腹以立春日幹色為角耳尾支色為脛納音色為蹄元至元所頒經式牛色則以立春日為法日幹為頭角耳色支為身色納音為蹄尾肚色國初襲用元制正統中始用言者製土牛色復用嵗之支幹納音如宋法今制每嵗立春日内而京兆外而藩府州縣先期造土牛芒人前一日出東郊具鼓樂迎入所司至日行鞭春禮衆官各執綵鞭環牛者三衆共擊碎之以上迎春禮馬端臨曰秦漢之後禮之因革不同有古有而今無者如大射聘禮士相見之類是也有古無而今有者如聖節上夀上尊號拜表之類是也臣按古今異宜禮經有可以義起之文天下之事揆之於義而與義無悖則是禮雖自古先王未之有制而後世之人以義起之而剏為一代之禮不為過也馬氏著文獻通考獨為王朝之禮所謂郡國之禮無有焉其言曰今禮則雖不能無失然而議禮制度非書生可得與聞也是以亦不復措辭焉夫書生而與聞議禮制度而為之措辭固不可若夫述前人之舊詳一代之制亦何不可之有夫所謂聖節上夀及漢以来賀嵗首魏晉以来賀冬至此雖三代以前所未有然古者列國之於王朝朝覲㑹同殷頫之類嵗無虚月而今世所行者此三禮而已三禮也在朝文武百官至日具表拜賀而天下親藩邊將藩憲府州衛所五品以上宫司先期遣官奉表稱賀至期前一日習儀於寺觀至日於所在官㕔行慶賀禮其儀注大略如朝儀但祝贊之辭不同及正至不用𫝊制耳茲三禮者今日朝儀以為大禮是非獨以寓臣子忠愛之誠亦以昭示華夷使人心之趨向者益以恭萬方之尊戴者益以固是雖古無而今有禮所謂義起者政此類也聖人復起臣知其決不易之矣今其禮儀具見洪武禮制但今天下進表衙門先期進表已行十二拜山呼舞蹈禮至日惟行五拜三叩頭禮而五品以下衙門則行全禮臣竊以臣子奉上之禮宜隆而不宜殺當三大朝賀之日闔郡官吏儒生軍民人等畢至必先演習其儀而後行禮至日其禮乃簡略如此似乎不稱請一體俱行全禮為宜以上遥賀之禮朱熹曰禮之施於朝廷者州縣士民無以與知為也而盡頒之則𫝊者苦其多習者患其博而莫能窮也故莫若取自州縣官民所應用者參以近制别加纂次號曰臣民禮略鋟板模印而頒行之州縣各為三通一通於守令㕔事一通於學一通於名山寺觀皆櫝藏之守視司察體如詔書而民庶所用則又使州縣自鋟之板正嵗則模而掲之市井村落使通知之則可以永乆矣又曰禮書既頒則又當使州縣擇士人之篤厚好禮者講誦其說習其頒禮州縣各為若干人廪之於學名曰治禮每將舉事則使教焉又詔監司如提學司者察其奉行不如法者舉懲治之臣按朱氏此言可以施行於今請令禮官將洪武年間頒降孝慈録諸司職掌洪武禮制禮儀定式及永樂中頒降文公家禮等書逐一參考凡繫天下郡縣家鄉臣民所當行之禮勅翰林儒臣簡節刪潤著為一書印行天下使之遵守如朱熹所議者又於學校村社選人習學演行而命州縣正官學校教職専一管領而提督學校憲臣敕書中以此載入俾其按部提督察其勤惰以為勸懲是誠化民成俗之要務為治之道莫先於此伏惟聖明留意則朱熹之議不行於昔而行於今矣天下臣民不勝幸幸周禮小行人若國札病疾為札喪札而死曰喪則令賻以禮傅之謂之賻補助其不足之若國凶榖不熟荒凶甚為荒則令賙以利周之委以聚與之之若國師軍旅役工役則令槁犒也禬㑹衆財與之之若國有福事則令慶賀之若國有禍烖則令哀弔之凡此五物者治其事故臣按天子之於侯國有札喪則令賻補有凶荒則令賙委是即大宗伯以喪禮哀死亡以荒禮哀凶札也有師役則令犒禬是即大宗伯以禬禮哀圍敗以䘏禮哀冦亂也福事則令慶賀禍烖則令哀弔豈非大宗伯以賀慶之禮親異姓之國以弔禮哀禍烖者乎臣於明禮樂下著郡國之禮前此皆郡國奉行於上之禮此則朝廷所以施行於下之禮也成周盛王所以周䘏保愛其臣民者不以勢而以理不以分而以禮如此視後世以牛羊草芥待其民者有間矣嗚呼仁矣哉及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂安親和平為一書凡此物者每國辨異之以反命於王以周知天下之故吴澂曰萬民之利害謂若禁革則某事為民便某事為民害也逆順者遵王法為順背王法為逆也悖逆至犯令謂人之為惡者也札喪凶荒厄貧謂人之不幸而遇災者也康樂和親安平謂人之為善而又有福慶者也以此五者詢問諸國别而書之使王得以周知若民利興政俗美惡人少烖禍弭福慶集則治可知也反是則不治矣鄭鄂曰職方掌天下之圖以周知其利害其知也以圖此則載之以書按書所以知其事也禮俗也政事也教治也刑禁也諸侯之所行者或有逆順從違不為一書無以知其叛服之事悖逆也暴亂也作慝也犯令也過惡之己著也不為一書無以知其罪惡之輕重猶是曽犯令矣猶不改而猶犯令焉札喪也凶荒也厄貧也諸侯所遭之故不為一書無以知逺民之憂康樂謂民之安樂和親謂僚寀之交歡安平謂其國之寧靜不為一書無以知侯國之治臣按三代封建之制行而天子所以相與為治者侯國也罷侯置守之後則藩服州郡實視古諸侯焉然古之侯國不過數十今之郡縣多至千百其土宇之分割疆域之遼隔官吏之繁多其勢未易以合其情未易以通視古為尤難也在成周之時設為小行人之職巡行而辨異之有不能徧究而悉舉故為之書以述其事凡有五焉葢先王以天下為一家中國為一人則小行人以此五物者巡行天下每國而辨異之各為一書以反命於王以周知天下之故則人君居九重之上不下几席而一繙閲之頃天下之大四海之廣萬民之禮俗皆在乎心目之間矣臣願乞敕兩畿十三藩巡撫大臣及方面府州各為一書傋載郡邑禮俗政事教治刑禁當行切要之務以傋乙夜之覽遇有急切之事按書以求其故其於國政未必無補以上郡國之禮臣按郡國之禮不止於此而所載止此者祀典則具秩祭祀下學校則具崇教化下大學衍義補卷四十八
