body:
  text: 大學衍義補卷三十三明丘濬撰治國平天下之要制國用漕輓之宜上禹貢兾州夾右碣石入于河自北海達河碣石在其右兖州浮舟行水曰浮于濟漯達因水入水曰達于河青州浮于汶達于濟徐州浮于淮泗達于河揚州㳂順流而下曰㳂于江海達于淮泗荆州浮于江沱濳漢逾越也于洛至于南河豫州浮于洛達于河梁州浮于濳逾于沔入于渭亂絶河而渡曰亂于河雍州浮于積石至于龍門西河㑹于渭汭程頥曰冀為帝都東西南三靣距河他州貢賦皆以達河為至朱熹曰冀州三面距河其建都實取轉漕之利朝㑹之便故九州之終皆言達河以紀其入帝都之道臣按禹貢于各州之下列貢賦之後而叙其各州之水達河之路達于河即達京師也然當時貢賦皆駕舟筏浮水路以達于河葢亦後世漕運之法也但未明言其為漕耳然叙水路於貢賦之後每州皆同意自可見也百里賦納總禾本全曰總二百里納銍刈禾曰銍三百里納秸半藁去皮曰秸服又使服輸將之事四百里粟五百里米臣按禹貢之時民所輸納以供京師者止于五百里葢當是時風俗淳厚用度儉朴而卿大夫各有采地而又寓兵賦于井田無後世養官養兵之費也管子曰粟行三百里則國無一年之積粟行四百里則國無二年之積粟行五百里則衆有饑色臣按周之王畿止于千里逺輸不出五百里乘輿器服之用宗廟百司之給自足以供春秋戰國以來行師千里間行漕輓然事已兵休猶未至于甚困也左傳僖公十三年晉荐饑乞糴于秦秦輸粟于晉自雍及絳相繼命之曰汎舟之役臣按汎舟以輸粟春秋之世已有之矣哀公九年吳城䢴溝通江淮杜預曰於䢴江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵韓江是臣按開渠以通糧道已見于春秋之世孫武曰千里饋糧士有饑色食敵一鍾當吾二十鍾臣按古者出師往往因糧于敵而兵不乆暴糧不逺饋非若後世興乆出之師饋至逺之糧也秦欲攻匈奴運糧使天下飛芻輓引車船也粟起于黄腄黄腄東萊二縣瑯邪負海之郡轉輸北海在朔方率三十鍾六斛四斗而致一石臣按前此未有漕運之名也而飛輓始于秦秦以欲攻匈奴之故致負海之粟輸北河之倉葢由海道以入河也海運在秦時已有之然率以三十鍾而致一石是以百九十斛乃得一石葢通計其飛輓道路所費不專指海運之時也漢興髙祖時漕運山東之粟以給中都官歳不過數十萬石張良曰闗中阻三靣而守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師諸矦有變順流而下足以委輸臣按秦致負海之粟猶是資以行師而國都之漕尚未講也至漢張良所論始是漕輓以為國都之給然是時也凡事草創所以給中都官者僅數十萬石不啻足矣孝文時賈誼上疏曰天子都長安而以淮南東道為奉地鏹道數千不輕致輸郡或乃越諸矦而遂調均發徴至無狀也古者天子地方千里中之而為都輸將繇使遠者不在五百里而至公矦地百里中之而為都輸將繇使逺者不在五十里而至輸者不苦其繇繇者不傷其費故逺方人安及秦不能分人寸地欲自有之輸將起海上而來一錢之賦數十錢之費不輕而致也上之所得甚少人之所苦甚多也臣按賈誼此言則漢都闗中固已資淮南以為奉地不特唐宋以來然也所謂一錢之賦而用數十錢之費始能致豈特秦人海運然哉凡逺地之輸將無不然者人君觀之其尚思物之難致如此其祿賜于人非真有功勞者烏可以輕予之哉武帝時通西南夷作者數萬人負擔饋糧率十餘鍾致一石其後東滅朝鮮人徒之衆擬西南夷又擊匈奴取河南地今朔方復興十萬餘人築衛朔方轉漕甚逺自山東咸被其勞臣按武帝通西南夷滅朝鮮擊匈奴而勞中國人漕中國粟以爭無用之地是猶以璀璨之珠而彈啁啾之雀也務虚名而受實害捐有用之財而易無用之地豈帝王盛徳事哉元光中大司農鄭當時言闗東運粟漕水從渭中上度六月而罷而渭水道九百餘里時有難處引渭穿渠起長安並傍也南山下至河三百餘里徑易漕度可三月罷而渠下民田萬餘頃又可得以溉此損漕省卒上以為然發卒穿渠以漕運大便利吕祖謙曰漢初高后文景時中都所用者省歳計不過數十萬石而足是時漕運之法亦未講也到得武帝官多徒役衆在闗中之粟四百萬猶不足以給之所以鄭當時議開漕渠引渭入河葢緣是時用粟之多漕法不得不講臣按吕祖謙言武帝時官多徒役衆用粟之多漕法不得不講所謂官多徒役衆此二者國粟所以費之由也官多而不切于用者可以減其冗員徒役衆而無益于事者可以省其冗卒如是則食粟者少食粟者少則可以省歳漕之數漕數日省則國用日舒民力日寛矣豐國裕民之策莫先于此武帝作栢梁臺宫室之脩由此日麗徒奴婢衆而下河漕度四百萬石及官自糴乃足元封元年桑𢎞羊請令民入粟補吏贖罪他郡各輸急處而諸農各致粟山東漕益歳六百萬石臣按昔人言漢初致山東之粟歳數十萬石耳至孝武歳至六百萬石則幾十倍其數矣雖征斂苛煩取之無藝亦由河渠疏利致之有道也雖然與其致之有道而積粟于國之多孰若用之有節而藏粟于民之多之為愈哉葢粟資民力以種種成而不得食而輸于官以為之食官食之而自取之可也而又資民力以輸將之焉造作舟車之費疏通溝渠之勞䟦渉河流之苦鞭撻賠償之慘百千萬狀乃達京師使其所養者皆有功于國有益于民之人不徒費也不然何苦苦吾有用之民而養此無用之人為此無益之事哉嗚呼人主授一官興一役費一物必以此為念而痛為之撙節焉非决不可不已必已也國用其有不給民生其有不安者哉昭帝元鳳二年詔曰前年減漕三百萬石三年又詔曰民被水災頗匱于食其止四年勿漕臣按昭帝承武帝歳漕六百萬石之後一歳而減其半又一歳而併免漕矧武帝末年海内虛耗而昭帝即位之初又從賢良文學言罷征𣙜之課是時霍光輔政知時務之要輕徭薄賦與民休息至是而又免漕何以為國用哉吁國用之贏縮在用度之侈儉而不在漕運之多少也宣帝五鳳中耿壽昌奏故事歳漕闗東榖四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原諸郡榖足供京師可省闗東漕卒過半臣按壽昌此議遇京輔豐穰之歳亦可行之趙充國條留屯十二便其五曰至春省甲士卒循河湟漕榖至臨羌以威羌虜揚武折衝之具也臣按充國此議邊方無事遇歳豐稔亦可行之光武北征命寇恂守河内收四百萬斛以給軍以輦車驪駕轉輸不絶臣按自古輸運皆以轉為名是以漢唐宋之漕輓皆是轉相遞送而未有長運者而長運之法始見于本朝明帝永平十三年汴渠初成河汴分流復其舊跡胡寅曰世言隋煬帝開汴渠以幸揚州據此則是明帝時已有汴渠矣臣按河即黄河汴乃汴渠也史稱明帝時河汴決壊乆而不修至是明帝遣王景發卒數十萬修汴渠堤自滎陽東至千乘今青州樂安縣也海口千餘里葢昔河汴隄壊則汴水東與河合日月彌廣而為兖豫民害今隄既成則河東北入海而汴東南入泗是分流復其故迹也諸葛亮在蜀勸農講武作木牛流馬運米集斜谷口治斜谷邸閤息民休士三十年而後用之馬廷鸞曰邸閤者倉廩之異名臣按牛馬之制不可考葢蜀地出褒斜不通舟楫亮不得已而為此非通行之法也魏正始四年鄧艾行陳項以東至夀春開廣漕渠東南有事興衆泛舟而下達于江淮資食有儲而無水害臣按凡漕運者皆自南而運于北而此則自北而運于南後魏自徐揚州内附之後經略江淮轉運中州以實邊鎮有司請于水運之次隨便置倉乃于小平石門白馬津漳涯黑水濟州陳郡大梁凡八所各立邸閤每軍國有須應機漕引臣按後魏于水運之次隨便置倉此亦良便隋文帝開皇三年以京師倉廩尚虛議為水旱之備詔于蒲陜虢熊伊洛鄭懷邠衛汴許汝等水次十三州置募運米丁又于衛置黎陽倉陜州置常平倉華州置廣通倉轉相灌注漕闗東及汾晉之粟以給京師臣按隋于蒲陜等十三州募運米丁又于衛陜等州置倉轉相灌注漕粟以給京師葢于凡經過之處以丁夫逓運要害之處置倉場收貯次第運之以至京師運丁得以番休而不乆勞漕船得以囬轉而不長運而所漕之粟亦得以隨宜措注而或發或留也四年又詔宇文愷率水工鑿渠引渭水自大興城東至潼闗三百餘里名曰廣通渠轉運通利闗内便之煬帝大業元年發河南諸郡開通濟渠自西苑引榖洛水達于河又引河通于淮海自是天下利于轉輸四年又發河北諸郡開永濟渠引沚水南達于北河通涿郡臣按隋雖無道然開此三渠以通天下漕雖一時役重民苦然百世之後頼以通濟煬帝又置洛口囘洛倉穿三千三百窖窖容八千胡寅曰隋煬積米多至二千六百餘萬石何凶旱水溢之足虞然極奢于内窮武于外耕桑失業民不聊生所謂江河之水不能實漏甕也臣按國家以得民心為治本倉廩之積雖多不足恃也其多適足以為盜賊之資耳唐都闗中歳漕東南之粟高祖太宗之時用物有節而易贍水陸漕運不過二十萬石臣按創業之君以兵戎得天下所與共成王業者將帥士卒耳其賜予之駢蕃周給之優裕固其所也况宫室未備城池未固凡百乘輿什器當用之物皆未具焉必須一一剏置而經營之宜其用度之廣也然漢唐之初歳漕不過一二十萬及夫繼世之君往往歳漕至百倍其數何也史所謂用物有節而易贍一言足以盡之矣斯言也豈難為哉繼世而有天下者誠能以祖宗之心為心一切用度俱從撙節其復祖宗之治功不難矣𤣥宗開元十八年裴耀卿請于河口置武牢倉鞏縣置洛口倉使江南之舟不入黄河黃河之舟不入洛口而河陽栢崖太原永豐渭南諸倉節級轉運水通則舟行水淺則寓于倉以待不滯遠船不憂欠耗比於曠年長運利便一倍有餘臣按耀卿此奏𤣥宗不省在當時雖未行然其所謂沿河置倉水通則舟行水淺則寓于倉以待此法亦良便二十一年裴耀卿請罷陸運而置倉河口乃于河隂置河隂倉河西置栢崖倉三門東置集津倉西置鹽倉鑿山十八里以陸運自江淮漕者皆輸河隂倉自河隂西至太原倉謂之北運自太原倉浮渭以實京師益漕魏濮等郡租輸諸倉轉而入渭凡三歳漕七百萬石臣按自漢以來至于今日漕運之數無有踰于此數者代宗廣徳二載劉晏領漕事晏即鹽利雇傭分吏督之隨江汴河渭所宜故時轉運船繇潤州陸運至揚子斗米費錢十九晏命囊米而載以舟減錢十五繇揚州距河隂斗米費錢百二十晏造歇艎支江船二千艘每船受千斛十船為綱每綱三百人篙工五十自揚州遣將部送至河隂上三門斗米減錢九十江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入太倉歳轉粟百一十萬石無升斗溺者臣按自古稱善理財者首劉晏然晏歳運之數止百一十萬石爾然當時運夫皆是官雇而所用傭錢皆以鹽利非若今役食糧之軍多加兌以為費也今米石加兌五六是民之納租名一石者出石五六斗田之起科名三升者加多一升半且軍在衛所既支月糧及出運又有行糧之給而一夫歳運不過三十石通其所加兑及所支給者而計之則多于所運之數矣葢費一石有餘而得一石也而舟船之費不與焉又晏所造歇艎支江船二千艘每船受千斛十船為一綱每綱三百人篙工五十人則是三百五十人駕十船運米一萬石較之今日十人駕一船一船載米三百石通三十船運米九千石其人少五十其米少一千而不甚相逺也惟所謂囊米之説今日尚有未行綱米所以耗損運卒所以困斃者坐此故也史謂晏歳轉運粟百一十萬無斗升溺然當時未聞有加兑也其所行漕乃大江大河而又隨處轉運非但若今長運于窄淺之漕渠者何以能無溺哉况今加兑浮于所運之半而歳歳有所損溺官軍賠償舉債鬻産無有已時所以然者政坐剝淺之費廣挨次之日多不幸而沉溺顆粒無餘也為今之計宜如劉晏之法所運之米皆以囊盛遇河淺澁暫舁岸上過淺而復舁歸舟或分載小舟以過淺亦有包封不致散失不幸而沉溺撈而出之不致全失縱有浥爛亦可他用也説者若謂囊米恐舟淺不能受夫既實滿艎中宜加之艎板之上䕶以竹簟葦席以蔽雨水其後船毁再造量加大之可也然則米皆用囊如費將益多何夫囊以布為之可用數年有山處可用竹篾近江處可用蒲葦其所費比所散失亦為省矣徳宗貞元初闗輔宿兵米斗千錢太倉供天子六宫之膳不及十日禁中不能釀酒以飛龍駝負永豐倉米給禁軍江淮米不至六軍脱巾于道上憂之㑹韓滉運米至陜上喜謂太子曰米已至陜吾父子得生矣置酒相慶臣按人君之處國亦當如富民之處家有富人焉而城居負郭無半畆田而惟逺外之是資其無逺圖可知矣一旦為道梗所隔將何以度日哉是以人君于豐足之時恒為閼絶之慮撙節用度必使有餘而于畿甸之間墾田務農不顓顓待哺于逺漕也唐徳宗事可鑒也已當是時也上用且乏六軍百姓又何頼焉周世宗謂侍臣曰轉輸之物向來皆給斗耗自漢謂北漢以來不與攴破倉廩所納新物尚破省耗况路所般豈無損失今後每石宜與耗一斗胡寅曰觀世宗此言則知晉漢間取耗未嘗為耗用直多取以實倉廩耳世宗予之善矣臣按國家處事必須詳察事理曲盡物情一事之行必思其弊之所必至一物之用必思其患之所由來况于轉輸糧斛載以舟車經渉艱險積以歳月之乆行于道路之間霖雨風波水火盜賊不能保其必無立法以防姦不可不嚴而體情以寛下亦不可不盡是以積糧者自唐明宗始給䑕雀耗而運糧者亦給斗耗用是故也既名為耗而官又取之甚者計算俾其償焉是何理也以上論漕輓之宜上大學衍義補卷三十三
