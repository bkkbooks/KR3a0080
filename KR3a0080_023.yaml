body:
  text: 大學衍義補卷二十三明丘濬撰治國平天下之要制國用經制之義上周禮太宰以九賦上取於下曰賦斂聚也財賄帛布也一曰邦中之賦在城郭者二曰四郊之賦去國百里三曰邦甸之賦去國二百里四曰家削之賦去國三百里大夫家也五曰邦縣之賦去國四百里六曰邦都之賦去國五百里七曰關市之賦關征貨出入市征貨所在八曰山澤之賦虞衡所掌九曰幣餘之賦職幣所掌餘財葉時曰邦中之賦如載師所任田里場圃之地四郊之賦如載師任逺郊近郊之地亦使閭師征之所謂國中四郊以時征其賦是也邦甸家削之賦如載師所任公邑家邑之地邦縣邦都之賦如載師所任小都大都之地乃使縣師征之所謂邦鄙稍甸以時征野之賦貢是也關市之賦如司市關之地使㕓人斂市布㕓布皮角筋骨與夫司關所掌征㕓關門之征是也山澤之賦如山虞澤虞之地使角人斂齒角骨物羽翮於山澤之農以當邦賦是也幣餘之賦如職幣斂官府都鄙與夫凡用邦財者之幣振掌事者之餘財是也蓋穀粟之賦出於井田特以祿諸臣兵車之賦出於丘乘特以供軍賦雖有邦國之貢只以待弔用九職之貢只以充府庫至於國之大事有祭祀賔客有喪荒羞服有工事幣帛有芻秣匪頒好用不調之民而責之誰乎是以九賦之目常與九貢九職並行而其貨賄之入則太府受而頒之內府藏而待之司會則令而會之其賦斂之目則掌於道揆之大臣名色寧至於巧立輕重寧至於過差出入寧至於相悖費用寧至於無藝乎臣按古者賦於民有穀粟之賦有兵車之賦而又以九賦斂財賄者穀粟兵車之賦其常也此九者不在常賦之數焉自一至六平地之賦自七至九興作之賦蓋古者賦取於民皆十分而取一凡上供與受采者各就所得一分之中分而為十自用其八而以其二賦於國與夫關市之所收虞衡之所獲及官府用度之所贏餘凡諸所有貨賄幣帛皆以歸之太宰而畀以斂頒之權遇國家有事當用財賄則以給焉以九式用財節度均節財用一曰祭祀之式其祀有大小其禮有豐殺二曰賓客之式諸侯之君為賔其臣為客三曰喪荒之式喪禮賵賻荒年散利之屬四曰羞服之式飲食衣服五曰工事之式百工之事六曰幣帛之式所以贈勞者七曰芻秣之式養牛馬者八曰匪頒之式匪分也頒賜也九曰好用之式燕好所用楊時曰先王所以禮財者非盡籠天下之利而有之其取之有道其用之有節而各當於義之謂也取之不以其道用之不以其節而不當於義則非理矣故周官以九職任民而後以九賦斂之九賦之入各有所待不相侵紊而太宰又以九式節之下至芻秣工事匪頒好用之微咸有式焉雖人主不得而踰也嵗終制國用則量入以為出此之謂制度有不如式則太宰得以均節之所謂王及后世子不會者特有司之事耳世儒此指王安石以謂至尊不可以法數制之非正論也葉時曰太宰以九賦斂財賄之後而繼之以九式均節財用未見其理財先見其節用則是周公之節財乃所以理財也何者財非天雨鬼輸必取之民民之所供有限國之所用無窮茍不於其經費之際而品節之必至於泛用無度苛取無厭而非正辭禁非以為理也九式均節之法其周公理財之道歟臣按太宰以九式均節財用式者用財之節度也均節之使多不至於有餘寡不至於不足立為中制以為用財之法度也夫財用供於有司所以為天子用也而其式法則掌於太宰焉何也蓋有司職卑不能抗尊而制衆大宰以道佐君為天子之大臣下得以制有司使之不敢逆式法而擅供上有以約王后世子俾其不敢違式法而過用凡所以用度取豫一付於九式之成法故雖一尺之帛一束之芻一飲食之微一燕好之私而皆不得以過差焉是以上之人侈心有所憚而不生欲心有所節而不縱非徒以惜民財裕國用政所以養人主恭儉之德而致之於無過之地焉昔人謂以九式均節財用正太宰格心之業大臣之事也吁此三代盛時所以君無失德國有餘財而世底隆平也歟大府治藏之長掌九貢九賦九功即九職之二貢賦皆大宰所掌此其副二以受其貨賄之入金玉曰貨布帛曰賄頒其貨於受藏之府內府頒其賄於受用之府外府凡官府都鄙之吏及執事者受財用焉凡合用財物皆受之大府凡頒財如下文所云以式法授之式謂用財之式法謂治財之法關市之賦以待王之膳服膳即羞邦中之賦以待賓客四郊之賦以待稍秣即芻秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜豫凡邦國之貢以待弔用以九貢之財給凶喪之禮凡萬民之貢以充府庫以九職之財充實府庫凡式九式貢九貢之餘財以供玩好之用凡邦之賦用取具焉賦謂當入之數用謂當出之數嵗終則以貨賄之入出會之入謂所收出謂所用嵗終總計其大數也李覯曰太宰以九賦之財給九式王日一舉其膳六牲祀兵朝甸其服有九故關市之賦以待王之膳服諸侯來朝卿大夫來聘致之則有積饔接之則有饗食燕故邦中之賦以待賔客牛馬之食其用芻禾車乘之數皆視牢禮故四郊之賦以待稍秣功懋懋賞以馭其幸所受之物邦之大用故家削之賦以待匪頒冬官百工取財非一五庫之量毋或不良故邦甸之賦以待工事問勞贈賄酬爵侑食皆為篚實將其厚意故邦縣之賦以待幣帛大祀小祀事神之禮牲帛器玉不奢不儉故邦都之賦以待祭祀股肱或虧君之所痛賵襚含賻闕一不可故山澤之賦以待喪紀王及冢宰時有所善燕好之用亦以頒恩故幣餘之賦以待賜豫王於諸侯分災救患凶禮五事其費則多故邦國之賦以待弔用國家間暇要在多積積貯之道天下大命故萬民之貢以充府庫難得之貨飢不可食燕遊所用非國之急故式貢之餘財以共玩好之用凡其一賦之出則給一事之費費之多少一以式法如是而國安財阜非偶然也吕祖謙曰關市之賦待王之膳服則膳服雖不會要不出關市之賦而已臣按太府之職兼總內外二府凡貨賄入太府而其物則仍分置於內外焉遇有用度則有司於此請受而太府頒之其頒之也以九賦之材給九式之用稽其事合其式然後隨其所賦以待之隨其所用以給之至嵗之終則計其一嵗之中凡取於九賦而收之於官合於九式而用之於人者而總會之焉誠以國家貨賄出於民而藏於官固非一人之所能致亦非一日之所能積也是以賦之於民也必有定制而用之於官也必有定式有此式則用此賦則事無廢而用不闕矣茍非先有以待之則臨時何所取具哉玉府主藏金玉器用掌王之金玉玩好兵器凡良善也貨賄之藏凡王之獻謂有獻於賔客金玉兵器文織良貨賄之物受而藏之凡王之好賜共其貨賄內府主藏在內者掌受九貢九賦九功之貨賄良兵良器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉外府主藏在外者掌邦布之入出布泉也以共百物而待邦之用凡有法者無法不可用共王及后世子之衣服之用李覯曰玉府內府之職掌天子器用財賄燕私之物及受貢獻以備賞賜此帑藏之在宫中官職之最私褻者然而為冢宰之屬列大府之下與凡治藏之官不異者何也蓋王者無外以天下為家尺地莫非其土一民莫非其子財物之在海內如在槖中况於貢賦之入何彼我之云哉漢湯沐邑為私奉養不領於經費靈帝西園萬金聚為私藏皆衰亂之俗非先王之法也惟周公皆入於太府則司書之要二司會之鉤考而廢置誅賞之政行焉如此則用安得不節財安得不聚若以御府禁錢捐之親幸之手省闥之中外人弗睹法制所不行校比所不及則傷財害民非細事也臣按成周之制內府在內所供者乃邦之用外府在外所供者乃王及后世子衣服之用內外交相稽考用之於外者取之於內用之於內者取之於外此宫中府中共為一體而內外之情通而不至於相隔絶外有所費內無不知內有所費外無不知或者深宫之中燕好之私欲有所妄費恐外人知而或至於中止也亦有之矣此古人之深意後世所以不及歟司會會大計也掌邦之六典即大宰所掌治典以下六者八法即官屬以下八者八則即祭祀以下八者之二副也以逆邦國都鄙官府之治以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用掌國之官府郊野縣都之百物財用凡在書紀載為書契合驗為契版具人民之數圖畫土地之形者之二副也以逆羣吏之治而聽其會計以參互考日成以月要考月成以嵗會考嵗成以周知四國之治以詔王及冢宰廢置劉彛曰司會職財計者也而必先掌六典八法八則之二以逆邦國都鄙官府之治者聖人以為職會計以進身者不顧國政之是非不度民情之弊疚惟利是積則或傷於仁惟節是求則或害於義故禮樂衰微黎民困弱則非所以存國之體也於是擇中大夫之賢取其道德猷為亞於冢宰而才於列卿者以司計會是故必知六典八法八則之本然後施九貢九賦九功九式之法知其治之本而不失之則財用可致而不害乎王之所以皇建其極於天下者矣故冢宰施其法於上者也司會察其法於下者也則有傷於國有蠧於民蓋得以卷舒裁成王道焉然後參互以考日成以月要考月成以嵗會考嵗成防吏之姦欺非以戕吾民也不明乎是者則務刻削於民國利雖贏而下增弊疚蠧於王體非所以建大中也以周知四國之治者謂八州諸侯之國禮樂刑政能致中和於其民者必周知之則嵗會雖不足而其法有可旌者焉嵗會雖贏而其治有可廢者焉故以詔王及冢宰廢置者以治為本也其財用之姦弊則其下吏當之嗚呼盛哉其制治之方也財足以周天下之用而治不失其本焉臣按成周設司會之官以職財計而必先之掌六典八法八則者何蓋六典八法八則皆大宰佐王之職六典治邦國者也八法治官府者也八則治都鄙者也必先知六典八法八則之本然後可以施九貢九賦九功九式之法茍不知其本而徒施其法則取之不應其式供之不以其正用之不合其禮何所折𠂻哉是故大宰總其法於上司會察其法於下有所施用於邦國有所施用於官府有所施用於都鄙皆必合於六典八法八則之典禮然後致之令之均節之使財足以周天下之用而用之各得其宜焉司書會計簿書掌邦之六典八法八則九職九正即九職九賦九事即九式邦中之版土地之圖以周知入出百物或入而藏或出而用以敘其財受其幣使入於職幣林之竒曰司書目九貢九賦為九正而書稱文王以庶邦惟正之供蓋古之王者必正經賦以足經用而未見其有無名橫斂焉臣按司會掌鉤考司書掌書記二者之職交相參互以此所掌稽彼所録多寡虛實昭然矣所以然者蓋以國家之大用度之夥其出入之數必為籍以紀之設官以稽之所以防有司之姦欺也職內掌邦之賦賦是九賦九貢等總名入辨别也其財用之物而執其總總要簿書以二副也官府都鄙之財入之數以逆邦國之賦用職嵗掌邦之賦出以二官府都鄙之財出賜之數以待會計而考之或出以給用或用以賜豫職幣掌式法以斂官府都鄙與凡用邦財者之幣振掌事者之餘財皆辨其物知其色類善惡而奠定也其録籍也以書揭之以詔上之小用賜豫上有小可用度及賜豫嵗終則會其出黃庶曰周公設官理財者居其半財用之數驗之以書契督之以要成證之以二令考之以參互制之以式法辨之有類執之有總小數之則乘大數之則會職嵗所敘職幣所振雖餘財而加肅焉臣按職內以掌邦之賦入職嵗以掌邦之賦出而職幣又以振掌事者之餘財也夫財之入而藏也既有官以主其數及其出而用也亦有官以主其數至於既用之餘又有官以振舉之謂之振者興起之謂也蓋掌事者所用有餘財既不復用則乾沒矣故振興之以為他用則財無沈滯者焉吁先王之世吝惜民財以為國計無或棄之物此所以無不足之用也廪人主藏米之官掌九穀之數九榖黍稷稻梁秫苽麻麥豆也以待國之匪分也頒賜也賙賜賙給賜豫稍食祿廪以嵗之上下上謂豐年下謂歉嵗數邦用以知足否足與不足以詔穀用以治年之凶豐凡萬民之食以民數計度所食之數食者人四釜上也六斗四升曰釜每人一日食穀四釜則年之上也人三釜中也年之中人二釜下也年之下若食不能人二釜則令邦移民就穀移民之不足以就榖之有餘詔王殺減省邦用凶年邦用宜從減省凡邦有會同師役之事則治其糧與其食行道曰糧止居曰食臣按成周設廪人之職以嵗之豐歉計國之用度知其足與不足之數以告之於上年適豐雖粒米狼戾不使侈於有餘年適凶雖飢饉薦臻不使苦於不足所以然者以有治之之法豫為之防也然其所以專為之計豫為之治者必以民食為本蓋君以養民為職人君所以儲財積榖凡以為民而已所謂匪頒賙賜稍食豈直為己哉故必於一歲之中逐郡之內因其年嵗之上下計其民數之多寡每口月食其穀幾何每年口食其數幾何若其數不足夫下年之食則令移民之不足以就粟之有餘具其數原其故以詔告於王曰凶年邦用不足凡事皆宜從減省然臣於是知三代盛王設官分職積財備用無非以為民也後世之所儲峙者專以為宫禁之用官府之用兵衛之用邊鄙之用而所以為民者特於此數用之外而别有所謂常平義社之倉僅千百之一二耳吁先王之所重後世之所輕先王之所後後世之所先民何幸而生三代之時哉倉人掌粟入之藏辨九穀之物以待邦用若穀不足則止餘法用止殺也止餘法用者謂法式所當用者有不足則殺之待有餘財而後用之有餘則藏之以待凶而頒之鄭玄曰九穀盡藏焉以粟為主吳澄曰廪主藏倉主散也臣按成周之時設為倉廪之官廪人掌九穀之數倉人辨九穀之物所謂穀者凡有九焉入則掌其數出則辨其物數之入也不一物之出也不同後世所謂穀者不過三四品而已江南止於一稻江以北有粟有麥有豆三者然豆麥止於京儲外郡亦少焉夫古之所儲非止一穀蓋古人因其土宜雜種百穀以備旱潦穀有多種隨其所成熟而取舍多寡焉非若後世各以一穀為賦他穀雖狼戾不取也是以取之於民者專而聚之於官者恆不足臣愚以為今日之取於民者除江南嵗運實京倉者外凡北方之賦無問粟麥黍豆之類隨年所有皆用為糧一以時價為準原額輸粟者估以時直如粟直六百文豆直三百則以二石準一石焉他皆放此每年支散先其易腐者亦準粟價而給之以或多或寡諸穀之中惟粟為耐久地窖藏之可踰十年隋人於洛口穿窖三千三百窖容八千此古人窖粟之驗宜别設倉儲之必待雜穀盡絶然後發之若其廪人之職擇武臣中之家計優足者授之蓋久其任武臣不計資考故也萬一臣言有可采者乞下有司參酌行之是亦便民足國之一得也臣嘗因是而通考周禮一書誠周公致太平之典也其間理財之法居多而其制用之柄則付之大臣有太宰以制其出有司徒以制其入而其官屬之置於太宰者尤為詳焉有職內以會其入有職嵗以會其出有職幣以會其餘而其大要則總之以司會則掌之以司書其所以參校鉤稽之者日有日要月有月成嵗有嵗會若夫司徒之屬則又有所謂泉府廪人舍人倉人者焉或以分其財守或以取其財用豈古昔聖君賢輔固屑屑然為是不憚煩哉蓋以財之有無國之貧富民之休戚兵之強弱世之治亂繫焉是固人君治世之大用而大臣經國之要務也原其所以經治之大要有三焉生財有道取財有義用財有禮而已先儒謂自其繫之九兩一曰牧二曰長三日師四曰儒五曰宗六曰主七曰吏八曰友九曰藪以定其業任之九職一曰三農二曰園圃三曰虞衡四曰藪牧五曰百工六曰商賈七曰嬪婦八曰臣妾九曰間民轉移執事以厚其生雖無常職者猶使之轉移執事以食其力凡此皆生其財者也財足矣然後制九賦之法以取之輕重多寡內外逺近皆酌以為中制而無一毫之過焉而又制為九式之法以用之自祭祀賓客以至好用又從而均節之焉夫有道以生財有義以取財有禮以用財然後有以服天下則諸侯莫敢不來享而邦國之用可得而制矣故九貢又次之由是觀之則知周禮經制之法非義不取而所取者皆合乎天理之正非禮不用而所用者不為乎一己之私以義為利以禮制欲萬世安民生裕國用之常經大道誠不出乎是書若王莽假之以禍天下王安石竊之以促國脈皆周禮之罪人也孔子曰若欲行而法則周公之典在王通亦曰如有用我執此以往後世君子有志於為國為民者宜究心焉詩曰小雅甫田之篇倬明貌彼甫大也田嵗取十千萬畝之入也我取其陳舊粟也食我農人自古有年豐年也朱熹曰詩言於此大田嵗取萬畝之入以為祿食及其積之久而有餘則又存其新而散其舊以食農人補不足助不給也蓋以自古有年是以陳陳相因所積如此然其用之之節又合宜而有序如此所以粟雖甚多而無紅腐不可食之患也謝枋得曰民生於三代之前其命制乎君民生於三代之後其命制乎天吾求其所以制命之道矣取民常少與民常多斂散得宜豐凶有備新者方收入廪陳者即取以食農人補不足助不給皆取其陳者也從古以來豈無水旱霜蝗吾民常如有年者上之人斂散得其道也臣按甫田之詩雖是述公卿有田祿者力於農事以奉祭祀之意章首五句實有以見夫成周盛時取民之義而用民之仁用之既合其宜散之又有其序上有以致天之常稔下不至棄物於無用謝枋得所謂三代以上制民之命在君三代以下制民之命在天尤為切至人君受天命以為生民主烏可付民命於天而不思所以制之於己哉制之以己者奈何蓋民以食為命資貨以生足其食用則是延其生命也白圭曰吾欲二十而取一何如孟子曰子之道貉道也貉北方夷狄之國名欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也朱熹曰什一而稅堯舜之道也多則桀寡則貉今欲重輕之則是小貉小桀而已胡宏曰易曰節以制度必先言中正以通蓋堯舜之道中正而已重之輕之皆非中也可行於夷狄不可通於天下可行於一時不可通行於萬世臣按上之取於下固不可太過亦不可不及觀孟子此言則知人君過取於民固非中正之道而寡取之亦不得為中正也雖然與其過也寧不及茍國家無事倉廪充牣或時下詔減除若漢文帝之三十稅一盡除田租君子亦不以為非也孟子曰有布縷之征粟米之征力役之征君子用其一緩其二用其二一時併用二端也而民有殍用其三一時併用三端也而父子離尹焞曰民為邦本取之無度則其國危矣朱熹曰征賦之法嵗有常數然布縷取之於夏粟米取之於秋力役取之於冬當各以其時若并取之則民力有所不堪矣今兩稅三限之法亦此意也臣按自古征取於民者其目有二其限有三唐有兩稅宋有三限亦此意但其名雖同於古而其實則異爾我朝夏稅以五月望開倉而七月終齊足秋糧以十月朔開倉而十二月終齊足蓋得古人期限之意惟所謂力役之征則無定制亦無定限焉夫漢承秦制有丁口之賦唐有家調民不役者計日出絹宋有身丁絹及丁鹽等錢我朝皆無之惟所謂戶口食鹽鈔蓋計日出錢而償之以鹽非空取也但有司失於奉行近日徴鈔如舊而民得鹽食者蓋鮮矣陸贄所謂此時弊非法弊也振舉之則民受實惠矣以上經制之義上大學衍義補卷二十三
