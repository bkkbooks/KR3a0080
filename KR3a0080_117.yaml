body:
  text: 大學衍義補卷一百十七明丘濬撰治國平天下之要嚴武備軍伍之制周禮小司徒乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役功力之事以比追逐冦胥伺盗捕賊以令貢賦施政令以貢賦之事鄭𤣥曰用謂使民事之也伍兩卒旅師軍皆衆之名兩二十五人卒百人旅五百人師二千五百人軍萬二千五百人此皆先王因農事而定軍令者也欲其恩足相恤義足相救服容相别音聲相識臣按此即五家為比五比為閭四閭為旅五旅為黨五黨為州五州為鄉之制乃均土地以稽其人民而周知其數上地家有夫有婦為家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡饒也唯田與追胥竭盡也作行也賈公彦曰凡起徒役毋過家一人以其餘為羡者一家兄弟雖多除一人為正卒正卒之外其餘皆為羡卒唯田與追胥竭作非直正卒一人其羡卒盡行也呉澂曰以田賦出軍古法也今則難行何也古者田役追胥在一鄉之中近止數十里逺則數百里其行速而期近故丁夫無畏憚室家無怨思秦漢以來萬里長戍民之憚行如徃棄市于斯之時乃假周官之説以抽民丁甚可悲也今兵農既分制雖非古然兵受廪給不耕而食雖勞而不怨民出賦税免于征行雖貧而不勞若夫募兵之法懸以重賞使自應募而又使之二十備戎行五十免軍役斯盡善矣此斟酌之得宜臣按成周因田賦而出軍必先均平其土地之髙下徧知其人丁之多寡又于人口之中考其身力之强弱能任其事與否若其家七人之中有任事者三人惟用其一人為正卒其餘為羡卒也用其正卒一人合四家編次為一伍積累而上階級相承以為伍兩卒旅軍師之制因地劑而起則人無貧窘非任事不用則士無疲懦此制一定遇有征伐則起之以為軍旅當敎閲則作之使趨田役遇有盗賊則比之使與追捕遇夫閒暇則令之使出貢賦盖有事則随時起調無事則依舊輸納毎正卒之外皆有餘丁以為之副貳随闕而随補軍伍無有空也多用則多起分數無不足也先儒謂先王足兵而未嘗有兵非無兵也用之則布滿于行陳不用則收斂而歸之田里此萬世無弊之軍政也後世舎無弊之法而用有弊之法古制一失永不可復可慨也夫大司馬凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長一軍則二府六史胥十人徒百人吕祖謙曰一軍之制為人萬二千五百損一人則不足増一人則有餘大國之三軍也地方百里而其人僅足以具三軍也次國之二軍也地方七十里而其人僅足以具二軍也小國一軍也地方五十里而其人僅足以具一軍也地有限則人有限人有限則軍有限雖欲僭侈其人亦窘于無人而不得騁矣王綱上舉侯度下修大不侵小彊不犯弱地有常地人有常人軍有常軍雖欲如晉之僭豈可得哉呉澂曰伍一比也兩一閭也卒一旅也旅一黨也師一州也軍一鄉也家所出一人將帥長司馬其師史者也成用寓兵于農方其無事為農則萬二千五百家而為一鄉鄉大夫卿一人及其有事以為兵則萬二千五百人為一軍軍將皆命卿即鄉大夫之卿也臣按成周之制兵籍于大司徒征行則属之大司馬凡其有事以起徒役則皆前日之農也士不待遷皆吾民將不改置即吾吏居則聨其家而為比閭族黨出則聫其人以為伍兩卒旅六鄉之官皆折衝禦侮之人六鄉之人皆敵愾伏節之士有事則驅之于行陳事已則歸之于田里父死而子繼無招收之繁而數不闕自耕而自食無廩給之費而食自飽兵無屯戍之勞將無握兵之患先王之時所以守則固戰則克内足衛中國外足威四夷豈非制軍之得其道歟春秋成公元年作丘甲胡安國曰作丘甲益兵也為齊難作丘甲益兵備敵重困農民非為國之道其曰作者不宜作也劉敞曰魯不務徳而務廣力不務益義而務益兵以王者之制論之則作丘甲之罪大矣王者之制諸矦不得擅賦税其民今不循先王之制而以意為凖必亂之道也是以聖人禁之臣按先儒謂兵制之變始壊于齊之内政而家一人焉繼壊于晉之州兵而家五人焉長勺之戰桓公自謂帶甲十萬車五千乗叔向亦謂寡君有甲車四千乗則兵制之増益于古可知矣循襲效尤魯遂作丘甲厥後楚為乗廣魏為武士秦為戎卒古制亡矣兵農遂分更歴千載永不可復春秋作丘甲之書其垂戒後世意深切矣班固漢志曰殷周以兵定天下天下既定戢藏干戈敎以文徳猶立司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有税税為田租有賦賦謂發賦斂之財税以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乗牛十二頭甲士三人卒七十二人干戈備具是謂乗馬之法天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乗故稱萬乗之主戎馬車徒干戈素具五國為属属有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧此先王為國立武足兵之大畧也薛氏失其名曰周制萬二千五百人為軍六軍七萬五千人千里之畿提封萬井定出賦六十四萬井一井之田八家耕之總計六十四萬井之田為五百一十二萬家家之一夫為五百一十二萬夫以此夫衆而供萬乗之賦是為七家而賦一兵自夫率之七家相更以給軍則王畿之内凡七征而役方一遍焉臣按三代因井田而制兵賦故有乗馬之法後世騎戰不復用車姑備其制于此説者謂王畿之兵凡七次征行而役一遍方成周盛時百年之中兵不三四舉是以其兵雖設而其人老死而不試者多矣然先王立法周而慮患逺固未嘗好戰亦未嘗忘戰制為立武足兵之法凡七家而給一兵七征而役一次先儒謂先王忠厚之至更勞均逸不欲窮兵之力也有如此夫國語齊桓公任管仲作内政以寓軍令制國五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之三軍故有中軍之鼓有國子之鼓有高子之鼓春以蒐同振旅秋以獮治兵是故卒伍整于里軍旅整于郊内敎既成令勿使遷徙伍之人祭祀同福死䘮同恤福災共之人與人相疇匹也家與家相疇世同居少同游故夜戰聲相聞足以不乖晝戰目相視足以相識其歡欣足以相死居同樂行同和死同哀是故守則同固戰則同彊君有此士也三萬人以方猶横也行于天下以誅無道以屏周室天下大國之君莫之能禦也蘓軾曰王者之兵出于不得已而非以求勝敵也故其為法要以不可敗而已管仲欲以嵗月服天下故變古司馬法而為是簡畧速勝之兵李覯曰管仲相桓公作内政而寓軍令焉故卒伍定乎里而軍政成乎郊連其什伍居處同樂死生同憂福禍共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死其敎已成外攘夷狄内尊天子以安諸夏然則軍之法固嘗試之矣臣按管仲内政謂得此士三萬人以方行于天下天下大國莫能敵後世之兵動以十百萬計而徃徃不能成功而反以取敗此無他所以什伍之者無定制所以敎養之者無成法所以通融而使之相保衛者無常心此其所以雖多而不得其用也内政之作猶有三代鄉兵之遺意後有作者於兵農既分之後畧放其意而制其兵是亦可以足兵矣漢志天下既定踵秦而制材官於郡國京師有南北軍之屯至武帝平百粤内増七校外有樓船皆嵗時講肄修武備云至元帝時以貢禹議始罷角抵而未正治兵振旅之事也易祓曰漢之兵制莫詳於京師南北軍之屯雖東西兩京沿革不常然皆居重馭輕而内外自足以相制兵制之善者也是時兵農未分南北兩軍官調諸民猶古者井田之遺意北軍番上與南軍等南軍衛士調之郡國而北軍兵卒調之左右京輔林駉曰漢制南軍衛宫衛尉主之北軍䕶京中尉主之南軍則有郎衛兵衛之别如三署諸郎羽林期門則皆郎衛也如衛士令丞諸屯衛侯則皆兵衛也是衛也非南軍守宫之衛乎北軍則有調兵募兵之分如三輔兵卒則是調兵而衛如八挍胡騎則是募兵而衛是衛也非北軍䕶京之衛乎此漢人南北軍之制也臣按三代兵有定制見于周官者可考也自遷固史皆不志兵而此數言者附見班史刑法志中固之意謂兵乃刑之大者如虞書蠻夷猾夏寇賊姦宄而掌於臯陶之刑之意雖然帝世純用徳化而漢以戰爭得天下豈其倫哉遂使一代兵戎之制無所於考可慨也抑考古制王前朝後市而王宫在南故漢衛宫之兵在城内者為南宫城之軍既謂之南則京城之軍謂之北所以别也本朝設錦衣旗手等十二衛親軍指揮使司即漢南軍衛宫之意立中左右前後五軍都督府即漢北軍衛京之意漢調兵之制民年二十三為正一嵗為衛士二嵗為材官騎士習射御馳戰陳年六十五衰老乃得免為庶民就田里更有三品有卒更有踐更有過更古者正卒無常人皆迭為之一月一更為更卒也如淳曰卒更者正身供正役也踐更者以錢雇直代行者也過更者亦以錢雇直不行者輸之縣官以給代者也臣按以上漢一代軍制大畧具焉唐志云唐有天下二百餘年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎彍騎又廢為方鎮之兵及其末也彊臣悍將兵布天下而天子亦自置兵于京師曰禁軍臣按唐一代軍制大畧具于此府兵之制起自西魏後周而備於隋唐興因之武徳初始置軍府以驃騎車騎兩將軍領之析關中為十二道道皆置府三年更以道為軍軍置將副各一人以車騎府統之六年廢十二軍既而復之軍置將軍一人軍有坊置主一人太宗貞觀十年總置折衝府凡天下十道置府六百三十四皆有名號而闗内二百六十有一皆以𨽻諸衛杜牧曰為國者不能無兵也居外則叛韓黥七國禄山僕固是也居内則篡卓莽曹馬以下是也使外不叛内不篡兵不離伍無自焚之患將保頸領無烹狗之諭古今已還法術最長其置府立衛乎歐陽修曰古之有天下國家者其興亡治亂未始不以徳而自戰國秦漢以來鮮不以兵夫兵豈非重事哉然其因時制變以茍趨利便至於無所不為而考其法制雖可用於一時而不足施于後世者多矣惟唐立府兵之制頗有足稱焉盖古者兵法起于井田自周衰王制壊而不復至於府兵始一寓之於農其居處敎養蓄財待事動作休息皆有節目雖不能盡合古法盖得其大意焉此高祖太宗之所以盛也臣按史謂府兵之置居無事時耕于野其番上者宿衛京師而已若四方有事則命將以出事解輒罷兵散于府將歸于朝故士不失業而將帥無握兵之重所以防㣲杜漸絶禍亂之源也嗚呼太宗逺矣而子孫不能守唐遂因以衰而至于亡後之世主其於祖宗之法固不可輕改而于兵尤當加慎重焉凡民年二十為兵六十而免其能騎而射者為越騎其餘為歩兵武騎排􅗋手歩射自高宗武后時天下乆不用兵府兵之法寖壊番役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請一切募士宿衛十一年取京兆蒲同岐華府兵及白丁而益以潞州長從兵共二十萬號長從宿衛明年更號曰彍騎臣按歐陽脩謂夫置兵所以止亂及其弊也適足為亂又其甚也至困天下以養亂而遂至於亡焉盖以唐之子孫驕弱不能謹守高祖太宗之法屢變其制馴致于天子弱而方鎮彊而唐遂以亡滅以為措置之勢使然嗚呼兹豈獨勢之使哉盖亦人謀之不臧也徳宗與李泌議復府兵泌因為上歴叙府兵興廢之由且言府兵平日皆安田畆毎府有折衝領之折衝以農隙敎習戰陳國家有事徴發則以符契下其州及府參驗發之至所期處將帥按閲有敎習不精者罪其折衝甚者罪及刺史軍還賜勲加賞便道罷之行者近不踰時逺不經嵗高宗以劉仁軌為洮河鎮守使以圖吐蕃於是始有乆戍之役武后以來承平日乆府兵漸墮為人所賤百姓耻為之又牛仙客以積財得宰相邉將效之誘戍卒以繒帛寄府庫晝則苦役夜縶地牢利其死而没入其財戍卒還者十無一二其殘虐如此然未嘗有外叛内侮殺帥自擅者誠以顧戀田園恐累宗族故也自張說募長征兵謂之彍騎李林甫為相又奏募人為兵兵不土著又無宗族不自重惜忘身徇利禍亂自生至今為梗嚮使府兵之法常存不廢安有如此上陵下替之患哉陛下思復府兵乃社稷之福太平有日矣上曰俟平河中當與卿議之臣按李泌此言可見府兵之善三代以後所僅見者也盖有恒産者有恒心有所顧惜者然後不敢恣肆有所係累者然後不肯棄捨凡民皆然而兵尤甚自井田之法廢而兵農遂分而不可復合惟唐府兵之制稍近於古然行之未乆而遂廢李泌當上陵下替之時思欲復之然終不能復可慨也夫穆宗之初立也兩河畧定蕭俛段文昌以為天下已太平漸宜銷兵請密詔天下兵鎮有兵處毎嵗百人之中限八人逃死穆宗方荒宴不以國事為意遂可其奏軍士落籍者衆皆聚山澤為盗及朱克融王庭湊作亂一呼而亡卒皆集詔諸道兵討之諸道兵既少皆臨時召募烏合之衆臣按安不忘危天下不可一日無兵備寜備而無用不可欲用而無人此國家之大戒也宋之兵制大槩有三天子之衛兵以守京師備征戍曰禁軍諸州之鎮兵以分給役使曰廂軍選于户籍或應募使之團結訓錬以為在所防守則曰鄉兵又有蕃兵其法始於國初且籍塞下團結以為藩籬之兵其伍分隊伍給旗幟繕營堡備器械一律以鄉兵之制太祖起戎行有天下收四方勁兵列營京畿以備宿衛分班屯戍以捍邉圉于時將帥之臣入奉朝請獷暴之民收𨽻尺籍雖有桀驁而無所施于其間咸平以後承平既乆武備漸寛仁宗之世西兵招刺太多將驕士惰徒耗國用神宗更制聫比其民以為保甲崇寜大觀間増額日廣而乏精鋭建炎南渡收兵卒招羣盗其初兵不滿萬光寜以後募兵雖衆而土字日蹙臣按宋一代軍制具于此臣嘗因漢唐宋之軍制而論之漢之材官踵秦而置唐之府兵沿隋而立宋人鑒五代之失而萃兵京師然亦多因其舊本朝雖接元之後而未嘗因元之舊是何也元起朔漢兵制簡畧不可為法故也我祖宗得國之初在内設錦衣等上十二衛以衛宫禁設留守等四十八衛以衛京城上十二衛為親軍指揮使司番上宿衛無所𨽻属而京城之衛分属五軍都督府遇有征行則調發之今天下都指揮使司凡十六處而為行都司者四近又於湖廣添一行司為五焉内外衛凡若干處其所設軍士俱有定數大率以五千六百名為一衛一千一百十二名為一千户所一百一十二名為一百户所衛分軍數或有多寡而千百户所綂則一毎一百户内總旗二名小旗十名管領鈐束以成隊伍此則本朝軍伍之制也竊考歴代兵制前後多有變更加減惟今日立制一定百世不易盖前代之制多因勝國之舊或臨時制宜或因時救弊徃徃皆出有司之處置臣子之建請惟我聖祖乆歴戎行洞燭古今之利病斷自宸衷制為畫一之法可以經久遵行萬世無弊故自開國至今百有餘年矣聖子神孫恪守成規以為宗社不拔之基其間固有軍伍懸空之處將領積多之患惟在設法填補調停之則盡善矣蘓軾應詔作䇿别其一曰定軍制昔漢之制有踐更之卒而無營田之兵雖皆出於農夫而方其為兵也不知農夫之事是故郡縣無常屯之兵而京師亦不過有南北軍期門羽林而已邉境有事諸侯有變皆以虎符調發郡國之兵至於事已而兵休則渙然各復其故是以其兵雖不知農而天下不至於弊者未嘗聚也唐有天下置十六衛府兵天下之府八百餘所而屯于闗中者至有五百然皆無事則力耕而積穀不惟以自贍養而又足以廣縣官之儲是以兵雖聚於京師而天下亦不至於弊者未嘗無事而食也今天下之兵不耕而聚於畿輔者以數十萬計皆仰給於縣官有漢唐之患而無漢唐之利擇其偏而兼用之是以兼受其弊而莫之分也天下之財近自淮甸而逺至於呉楚凡舟車所至人力所及莫不盡取以歸于京師晏然無事而賦斂之厚至於不可復加而三司之用猶恐其不給其弊皆起于不耕之兵聚於内而食四方之貢賦非特如此而已又有循環徃來屯戍于郡縣者皆出自禁兵大自藩府小至於縣鎮徃徃皆有京師之兵由是觀之則是天下之地一尺一寸皆天子自為守也且費莫大於養兵養兵之費莫大於征行今出禁兵而戍郡縣逺者或數千里其月廪嵗給之外又日供其芻糧三嵗而一遷徃者紛紛來者纍纍雖不過數百為軰而要其歸無以異於數十萬之兵三嵗而一出征也農夫之力安得而不竭餽運之卒安得而不疲且今天下未嘗有戰鬬之事武夫悍卒非有勞伐可以邀其上之人然皆不得為休息閒居無用之兵者其意以為為天子出戍也是故美衣豐食開府庫輦金帛若有所負一逆其意則欲羣起而譟呼此何為者也臣按蘓軾此䇿于漢唐宋軍制之得失瞭然明白就其三者而論之宋之禁軍不如漢之踐更漢之踐更不如唐之府兵三代之制不可遽復必欲復古之漸以壯國勢以省國費皆莫若唐府兵之盡善焉然唐行之未百年而中變者何也盖府兵之制無事則畨上宿衛京師有事則調發出征四逺雖曰寓兵于農暇則耕稼然軍府雜郡縣之中士卒混編民之内其他徭役科征未能盡蠲况又承平日乆兵政廢弛番易更代多不以時非法徴求分外驅役此其立制非不善而其行之既乆終不能以無弊也設使當時知其弊之所在補其罅舉其偏而振其所廢墜雖至今存可也惟今聖朝建國幽燕直𨽻八府之地盖古幽冀之域也杜牧所謂山東河北王不得不王霸不得不霸之所其人沈鷙多材力重許可耐辛苦敦五種本兵矢他不能蕩者復産健馬下者日馳二百里所以兵常當天下唐自天寳末失此地其後聲天下之力以經營之不能得其尺寸人望之若回鶻吐蕃無有敢窺者必欲使生人無事其要先去兵不得山東兵不可去是兵殺人無有已也由牧此言觀之則今日京畿之形勝物力天下莫敵焉可知已彼區區叛將以逆犯順茍得地之形便尚敢以拒王師况居萬乗之尊有萬方之衆而又據形勢之便者哉文皇建都于此餘六十年矣承平日乆民不知兵武備不無少弛徃時一衛以五千六百名為率今一衛有僅及其半者甚則什無二三焉朝廷非不時加整飭嵗遣御史分部清句而法司亦徃徃謫有罪者戍邉然終不能復國初之舊臣愚過為逺慮竊恐自兹以後日甚一日失今不圖恐後愈難于今矣請於國家常制之外於京畿之中别為寓兵之法用唐人之意而不泥其故迹因今日之便而不變其常制不識可乎請試言之今京畿八府其順天保定真定河間永平五府寔居輦轂之下所轄十七州八十九縣若見丁盡以為兵可得四五十萬使今日京輔之間有此勁兵則國勢自尊國威自壯視彼列屯坐食之衆㳺手豢養之徒盖有間矣萬一臣言有可採者請敕大臣集議若於舊制無礙治體有益民情不拂即委有心計知治體之臣専主其事講求利害的然有利而無害然後見之施行每縣因其原設里社制為隊伍一以所居就産為定里社丁户有不足者移其少而就多使之整然有定數毎一里百户分為二隊隊五十名立二總甲視軍衛總旗每隊分為五小甲甲十名視軍衛小旗又合十隊為一都甲視軍衛千百户而属之州縣州縣属之府其十年輪當之里甲咸仍舊焉凡民差役如皂𨽻柴夫等類科𣲖如嵗辨和買等類一切蠲除之嵗惟養馬納糧二事他賦役皆無焉其民籍十年一造如舊例其兵籍每嵗季秋一造籍不以户而以丁丁以二為一單丁則合諸他毎丁自備軍裝器械如軍伍制有司嵗時閲視有不如度及頓壊者易之民年二十二附籍五十八免役尫贏篤廢者除其名秋糧量減其額或三而去其一或五而取其三兵不番戍糧不調運嵗十月上其籍于兵部五郡謂順天等五府之兵分属五軍州縣各為敎場月一㸃操之毎府又闢平衍地為一大敎場孟冬農隙兵部奏遣該府都督一員帶領將率于此召集民兵依京場操練分命御史監督之而紏其不如法者兵部遣官挍馬政工部遣官閲兵器事竣各具寔開奏遇有征行按籍起調又見京輔之屯條所謂養馬之政計村莊有民居五十家以上者立一馬廐不及數者合諸其鄰毎三丁備一種馬俗所謂騾馬併力養之晝則分牧夜則合飼擇其中有物力材幹之人立為羣長每春種時督其民計丁種粟取稈種豆取料至秋成時按畆以收預為倉場積草料於近廐之地以為牧養之費民無地者官給之凡境中原額草場為勢家奏取為莊田者一切查理還官分給于民非但養馬兼蓄驢騾以為駕車運逓之用孶生之馬有壯健者印烙畢即俵散壯丁俾其騎操官時㸃視有疲損者罪其人如此則國家不徒得兵而且有馬矣詳見牧馬之政條或曰五郡切近京師應内外百需所出百役所萃今一切罷免從何措注請下各部查勘順天等五府每嵗夫役若干物料若干通計該費若干然後行下户部計算天下秋糧夏鋭鹽鈔坑冶課程等項名色之數嵗入凡㡬何舊積凡㡬何經費之外預備之餘酌量多寡足以備用無闕其有羡餘者别為收貯以為此五郡雇役之直買物之費凡此五郡常年合用夫役官為計工定直出此錢雇閒民以代之當此即宋人雇役法但宋人取錢于民今取于官凡雇民役必先使之當過然後逐月予直如當過正月於二月朔日予之凡此五郡毎嵗各辦物料官為先事計算出此錢随時估以代之售如此不徒寛民力以足兵備亦可以收市井游惰之民而官府所需之物皆得寔用官吏不多科擾民矣然則國計僅足不能有餘則如之何曰設法措置随時通融損有餘以補之捐不急以足之大約計順天一府一嵗所費不過用二十萬其餘每府不過十萬或五七萬耳土宇之廣民物之衆國家嵗入夏秋税糧見今二千六百二十三萬餘其他鹽糧課鈔亦不下千萬之數捐此五六十萬之貲以寛今日畿甸之民以復古人府兵之制以壯國勢以張國威内以固京師外以懾夷狄其於國計亦無大損或曰昔宋韓琦刺民兵于陜西亦謂得唐府兵法而司馬光六上章以為不便其後不十年果以之運糧戍邉大為民害皆如光所言竊恐既籍民為兵之後而州縣科差如故既受有司之役又有征戍之苦民愈不堪也臣為此議惟仍州縣之舊而不属之軍衛所謂㸃操者月惟一行非若宋人保甲之頻數也農隙敎戰朝委將帥惟於冬月一行必與御史俱焉兵不畨上糧不調運惟於三時農事之隙開通溝洫築堤引水以備旱澇或修築京城以為急切之備或幹運京儲以寔近邉之闕除此之外不許他役有他役者必坐以罪况此五郡之民差役繁重不聊生也甚矣一旦得此優閒如出湯火以就清爽之地上感國恩淪肌徹髄其懽欣鼓舞銘刻思報為何如哉此法儻行非但可以足兵亦可以省費内可以壯中國之勢外可以懾外夷之心立法既定行之乆而成俗随時制宜補偏起廢又有待於他日之良臣賢輔焉以上軍伍之制大學衍義補卷一百十七
