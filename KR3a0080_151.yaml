body:
  text: 大學衍義補卷一百五十一明丘濬撰治國平天下之要馭外蕃守邉固圉之略下武帝元朔二年衛青出雲中西至高闕遂至隴西捕首虜數千走白羊樓煩王取河南地為朔方郡主父偃言河南地肥饒外阻河䝉恬城之以逐胸奴省轉戍漕廣中國滅胡之本也公卿皆不便上竟用偃計立朔方郡募民徒者十萬口築城繕寨因何為固轉漕甚逺自山東咸被其勞費數十百巨萬府庫並虛臣按漢立朔方郡即赫連勃勃命叱干阿利蒸土築城之處所謂夏州是也後秦姚興以赫連勃勃為安北將軍鎮朔方勃勃僭稱天王建國曰夏命其臣叱干阿利發嶺北夷夏十萬人於朔方水北黑水之南營起都城號為統萬命其祕書監胡義周作頌曰營啓都城開建京邑背名山而面洪流左河津而右重塞蓋此地在漢已有城而赫連夏乃於此建都也隋以朔方地分置勝州榆林郡唐開元中置朔方郡大總管兼安北都護唐末拓拔思恭鎮是州唐賜姓李五代李仁福彛超繼領節鎮號定難軍宋太平興國八年李繼捧來朝願納土其弟繼遷不樂內附亡命嘯聚擾邊淳化中太宗以夏州深在沙漠姦雄因之以竊據欲墮其城吕䝉正曰自赫連築城以來頗與關右為患若廢之萬世利也遂詔廢之遷其民於銀綏分官地給之其州兵不徙相聚置營仍曰夏州真宗咸平末繼遷死景德中其子德明欵寨內附朝廷假以本道節制始自夏州遷懷逺鎮改為興州居之即今寧夏衛是也德明之子元昊僭號自稱夏帝史謂其境土方一萬里河之內外州郡凡二十有二河南之州九曰靈曰洪曰宥曰銀曰夏曰石曰鹽曰南威曰會河西之州九曰興曰定曰懷曰永曰涼曰甘曰肅曰瓜曰沙熙秦河外之州四曰西寧曰樂曰廓曰積石其地饒五榖尤宜稻麥即今州郡考之所謂興即今寧夏也河西及河外之州今多存焉其河南九州雖其一二可考而其七者不知其所在意者皆在今河套中邪自昔守邊者皆襲前代之舊漢因秦唐因隋其邊城營堡往往皆仍故迹惟我朝守邊則無所因襲而創為之制焉蓋自唐天寶以後河朔以北多為方鎮所有其朝廷所自禦者突厥吐蕃南詔而已五代以來石晉以燕雲賂契丹而河西盡屬拓拔氏宋人以內地為邊境金元又無所謂邊者我聖祖得天下遍於西北邊城立為藩府統重兵據要害然皆在近邊而未嘗逺戍境外如漢唐之世也洪武之初西北邊防重鎮曰宣府曰大同曰甘肅曰遼東曰大寧永樂初革去大寧惟存四鎮寧夏守鎮肇於永樂之初榆林控制始於正統之世其餘花馬池等堡皆是邊境多事之秋創置者也方今要害之處朝廷處置固已嚴密但所謂黃河套者尚若闕焉何也前代所以廢棄之者以其邊城之防守在內而其地在外故也今日吾之守鎮顧有在河套之外者秋高馬肥風寒河凍彼或長驅而入屯結其中以為吾內地之擾幸其素無深謀未用華人之計不為據地之爭是以亟來亟往有獲即去似若無足為意者然謀事貴乎先防患貴乎豫往者彼固嘗深入矣議者慮其為吾內地害百計謀所以驅而出之者未得其便幸其自去矣遂無有一人議及之者萬一再來何以處之乎夫事之未來者雖未能逆料其有無計之萬全者不可不先為之擘畫臣愚過為之慮今日西北諸邊祖宗以來所以備禦之具固已詳盡惟此一處偶未之及非遺之也芽蘖未萌也今則已暴著矣所以先事而豫為之防者兹其時乎自昔中國守邊者皆將卒守其內而拒戎人於外兹地則彼反入吾之內而吾之所守者反在其外焉彼所以從入者必有其物皆一一推求其故於其所經行之路則預扼其要衝於其所屯聚之處則先據其形勝勿但幸其眼前之無事而必為後日之逺圖議者若謂置為城守則饋餉為難將至於漢人之勞費盍思赫連之建國元昊之列郡皆在此地何從得食乎宋史明言其地饒五榖尤宜稻麥漢人於境外輪臺之地尚為之屯營况此乃在黃河之南次邊之地乎臣請下合朝議當此無事之秋北敵逺遁之際遣通古今識事體大臣躬蒞其地詳察可否以聞儻以為可行或於河之南築城池以為之鎮遏或于河之北據要害以為之扼塞或沿河之壖設營堡以防其徑渡事必出於萬全然後行之不然較其利害足以相當姑仍其舊可也愚儒未履邊地姑以意言可否惟上之命後漢王霸將弛刑徒六千餘人與杜茂治飛狐道堆石布土築起亭障自代至平城三百餘里李賢曰飛狐道在蔚州飛狐縣北通媯州懷戎縣即古之蜚狐口也臣按飛狐口在今蔚州廣昌縣北魏中書監高閭表以為北部所長者野戰所短者攻城若以彼之所短奪其所長則雖衆不能成患雖來不能深入又彼散居野澤隨逐水草戰則與家業並至奔則與畜牧俱逃不齎資糧而飲食自足是以歷代能為邊患六鎮勢分倍衆不鬬互相圍逼難以制之請依秦漢故事於六鎮之北築長城擇要害之地往往開門造小城於其側置兵扞守彼既不攻城野掠無獲草盡則走終必懲艾計六鎮東西不過千里一夫一月之功可成三步之地疆弱相兼不過用十萬人一月可就雖有暫勞可以永逸凡長城有五利罷遊防之苦一也北部放牧無鈔掠之患二也登城觀敵以逸待勞三也息無時之備四也嵗常遊運永得不匱五也臣按我朝建都于燕切臨邊境所以設險以扞蔽其國都者尤宜慎固太行西來逶迤而北歷居庸而東極于醫巫閭是為第一層之內藩籬也又東起舊大寧界越宣府大同代州之境而西至于保德州之黃河又為第二層之外藩籬也其內之藩籬天造地設重岡疊嶂以為國家北門之屏蔽易所謂地險者也若夫外之藩籬固有天然之地險然其間多有間斷之處因而補其缺塞其罅以為外冦之防則又賴乎王公之設險焉臣聞雲代一帶其設墩臺以守候也有大邊有小邊大邊以謹斥候小邊以嚴守備今誠於大邊墩臺之間空缺之處因其崖險隨其地勢築為城牆以相連綴實為守邊長久之計高閭謂六鎮東西不過千里一夫一月之功可成三步之地彊弱相兼不過十萬人一月可就臣竊以為今山後緣邊之地東起永寧之四海冶西底保德之河壖自東而西計其所長一千三百二十里而已其間墩臺相望逺者十數里近者數里就其空處而加築塞之功延引以相連接亦無甚勞費者昔人謂一月可就臣請以三年為期遇夫邊方無警之秋米榖豐登之嵗孟夏仲秋天氣溫涼之候量撥騎兵以為防護借十萬人之工力費十數萬之資糧三年之中僅勞一百八十日成此千百年莫大之功夫然則邊城冦盜永清國家藩籬益厚高閭所謂五利者彼徒託之空言而我今日真實享其利矣唐高祖時突厥嵗盜邊帝㑹羣臣問所以備邊者將作大匠于筠請于五原靈武置舟師於河扼其入中書侍郎溫彥博曰魏為長塹遏胸奴今可用帝使桑顯和塹邊大道召江南船工大發卒治戰艦臣按據于筠所請于五原靈武置舟師于河扼敵之入彥博亦言魏為長塹則是迤西黃河固可以行舟而沿河之地亦可以塹也始朔方軍與突厥以河為境非崖有拂雲祠突厥每犯邊必先謁祠禱解然後料兵度而南時默啜悉兵西擊突馳施張仁願請乘虛取漠南地於河北築三受降城絶其南冦路唐休璟以為兩漢以來皆北守城今築城彼腹中終為所有仁願固請中宗從之表留嵗滿兵以助功咸陽兵五百人逃歸仁願擒之盡斬城下軍中股栗役者盡力六旬而三城就以拂雲為中城南直朔方西城南直靈武東城南直榆林三壘相距各四百餘里其北皆大磧也斥地三百里而逺又於牛頭朝那山北置烽候千八百所自是突厥不敢踰山牧馬朔方益無冦嵗損費億計减鎮兵數萬王禹稱曰兵勢患在不合將臣患在無權今固未能專委一人則請於沿邊要害之地為三城以備之若有唐受降城之類如國家有兵三十萬人使互相救援責其成功臣按朔方軍即今河套地也唐初與突厥以河為界則是固常守河矣而張仁願所築三受降城皆在黃河之北大漠之南史謂中城南直朔方意今河套之地西城南直靈武意今寧夏之地東地南直榆林意今在綏雲之間今其故址無復可考說者多謂東勝州即古東受降城所在其地今有斷頭山地最肥腴且宜焉疑即史所謂牛頭朝那也國朝設東勝衛於此其後移於內地宣德正統間往往有建議者欲復其故然而卒不果焉夫自古守封疆者必據險阻然守險也不守其險而守於險之外若即險而守則敵與我共其險矣是以古人之守江也必守淮而河亦然唐人禦突厥也始以河為界其後張仁願乃建三城于河之外焉是即守江之意蓋擇其要害之地扼其吭而折其脅也是以唐自有此城之後朔方益無冦嵗省費億計減鎮兵數萬此其明驗也今日邊城營堡措置已定固無可更革之理然事有暫勞而久安費少而效大者古人亦不憚改作在乎行之有其漸處之有其道焉耳臣故微舉其端而不敢盡其說以候後之經國逺圖者云五代晉高祖割幽今順天地薊今薊州瀛今河間地莫今任丘地涿今涿州檀今密雲縣順今順義縣新今保安州媯今隆慶州儒今永寧縣武在今朔州西境雲今大同地應今應州寰今馬邑縣朔今朔州蔚今蔚州十六州與契丹胡三省曰石晉以十六州與契丹人以為北方自撤藩籬之始豫謂雁門以北諸州棄之猶有關隘可守若燕順薊等州則失地險矣然盧龍之險在營今昌黎等縣地平今永平地二州界自劉守光僭竊周德威攻取契丹乘間遂據營平自同光以來契丹南來直抵朔易其失險也久矣其後天福八年契丹主乃集山後及盧龍兵合五萬人使趙延夀將之經界中國所謂山後即雲應諸州而盧龍即幽州軍號也此乃天福初割與契丹之土地人民契丹用中國之將將中國之兵以攻中國籍冦兵而齎盜糧自此中國胥為患矣臣按石晉所賂契丹十六州地幽薊瀛莫涿檀順七州在山前新媯儒武雲應寰朔蔚九州在山後合前此契丹所自取營平二州通計之蓋十有八州也自是中國非但失其土地人民乃併其關隘而失之晉人自捐其險隘與人既無以自守其國宋人承其後而不能復中國之舊遂以白溝河為界故二國所受禍略同夫自晉天福元年以其地賂契丹首尾四百五十餘年我太祖始援之於泥塗之中又於此建都則隮之天日之上矣夫以百二山河而有天然之地險重城萬雉屯百萬貔貅於此鎮壓之是誠萬萬年不拔之基也今山前山後皆吾中國之地山前七州今為畿甸之地太行西來連岡壘嶂環而繞之東極于醫巫閭之境以為內之藩籬山後諸州自永寧四海冶以西歷雲代之境重關列戍以為外之藩籬茍委任得人守禦有法可保其無外患也惟昌平以東遵化永平一帶往者有大寧都司興營義㑹等衛在山之後以為外障其後移入內地以此之故京師東北藩籬單薄之甚異時卒有外患未必不出於此夫天下之患往往出於意料之外然能謀畫於未事之先而豫有以防備之則所患者消泯於無迹矣請下大臣議居庸以東歷黃花鎮古北口直抵山海關山之後皆荒漠無人之境非如居庸以西大小邊鎮兩層可以防備若何可以善其後而使之永無外患必有竒謀宏略出於其間必不得已而臣有一見請將洪武中大寧都司後移保定者立于永平或遵化或薊州以為重鎮凡舊所屬衛所移於沿山要害相為聲勢仍於山之後去山五里或十里或三四十里量其地勢因其形便築為墩臺就其空缺之地接連以為邊牆就於其間擇一要地設為關鎮屯軍守備以為烏梁海入貢之道一以衛都城一以護陵寢此誠千萬年之逺謀也不然國家飬鋭儲材俟吾力有餘而其機可乘仍復洪武中山後帥閫之舊俾與宣府大同列為三鎮直逹遼東之境則是國家之險要既失復得藩籬厚而無可乘之隙根本固而無意外之患矣伏惟聖明當此太平無事之時思患豫防有以為國家萬年無窮之慮勿以為書生過慮而忽之宋仁宗時范仲淹攻守二議其議攻曰竊見延州之西慶州之東有賊界百餘里侵入漢地可攻之地其在外此軍行入界當先布號令生降者賞殺降者斬得精强者賞害老幼婦人者斬拒者併力以戮之服者厚利以安之逃遁者勿追疑有質也居者勿遷俾安土也乃大為城寨以据其地俟城寨堅牢當留土兵以守之方諸舊寨必倍其數使使臣以安撫之必嚴其戒曰賊大至則明斥候召援兵堅壁清野以困之外至則扼險設伏以待之居常高估入中及置營田以助之如此則分彼賊勢振此兵威所用主兵官員使臣勇夫身死者居其前可用䇿應者居其次使臣中可當一隊者參以前隊有心力幹事者營立城寨臣觀後漢假紀明以騎三千步萬人車三千兩錢五十四億三冬三夏大破諸羌如此取下一處城寨平定則更圖一處為據守之䇿其議守曰西戎居絶漠之外長河之北倚逺恃險未易可取建官置兵不用祿食每舉衆犯邊一毫之物皆出其下風集雲散未嘗聚飬中國則不可逺戍之兵久而不代負星霜之苦懷鄉國之望又日給廪食月給庫緡春冬之衣鞋饋輸滿道不絶國用民力日以屈乏軍情愁怨須務姑息此中原積兵之憂也臣謂塞垣鎮守當務經逺臣觀趙充國興屯田大獲地利遂破先零魏武於征伐之中令帶甲之士隨宜墾闢故不甚勞大功克舉數年之中所在積粟食廪皆滿唐置屯由天寶八年河西收二十六萬石隴西收四十四萬石孫武曰分建諸候以其利而利之使其食地之毛實役其人民之力故賦稅無轉徙之勞徭役無怨曠之歎臣按仲淹上攻守二議終之曰國家用攻則宜取其近而兵勢不危用守則必圖其久而民力不匱可謂得攻守之宜矣仲淹又上和守攻備四䇿其守策曰久守之計須用土兵各諳山川習戰鬬比之東兵戰守功倍然緣邊次邊土兵數少分守不足更當於要便城寨招置土兵若近裏土兵願改𨽻邊寨者即遷其家團集之何則關內諸州土兵多在邊上或得代歸營數月之間復出逺戍豈徒星霜之苦極傷骨肉之思征夫不保其家嫠婦頗多犯法人情不免久則怨起如得并遷其家於緣邊住營更免出軍父母妻子樂於團聚戰則相救守則相安又緣邊無稅之地所招弓箭手各使聚居險要每一兩指揮共修一堡以全其家與城寨相應彼或小至則使弓箭手與諸寨土兵共力捍禦彼或大舉則二旬之前必聞舉集我之次邊軍馬盡可勾呼駐於堅城以待敵之進退緣邊山坂重復彼之重兵必循大川而行先求疾速俟其得勝使我師沮而不出方敢散兵慮掠過越險阻更無顧慮我若持重不戰則彼之重兵行川路中糧草無所給牛羊無所獲不數日人馬困斃彼之重兵更不敢越險又未能決勝必不得已而散兵虜掠我於山谷村落中伏精鋭以待之彼散掠之兵輕而寡弱可擊可逐使散無所掠聚不得戰欲長驅深入我則使諸將出竒以躡其後欲全師以歸我則使諸城出兵以乘其弊此守䇿之要也其攻䇿曰臣常計陜西四路之兵數幾三十萬非不多也然各分守城寨故每嵗㸃兵不過二萬餘人坐食芻糧不敢舉動嵗嵗設備常如冦至不知賊人之謀果犯何路賊界則不然種落散居衣食自給忽爾㸃集併攻一路故動號十餘萬以我分散之兵拒彼專一之勢衆寡不敵遂及於敗且彼為客當勞而反逸我為主當逸而反勞我若復用此計彼勞我逸則取勝必矣請於鄜延環慶涇原路各選將佐三五人使臣一二十人步兵二萬騎兵三千以為三軍以新定陳法訓練嵗餘候其精勇然後觀賊之隙使三軍互掠於橫山降者厚賞各令安土拒者併兵急擊必破其族假若鄜延一軍先出賊必大舉來應我則退守邊寨或據險要不與大戰不越旬日彼自困弊勢將潰歸則我環慶之師復出焉彼若再圖㸃集來拒王師則又有涇原之師乘間而入彼則奔命不暇部落攜怨則我兵勢自振三五年間山界可以盡取此春秋時吳用三師破楚之䇿也臣按仲淹所議攻守之䇿雖以防當時之西夏然以通論後世之邊事勢不同而理同擇而行之舉而措之未必不可用也張亢上仁宗論邊機軍政所疑十事其三曰今鄜延副總管許懷德兼環慶軍馬環慶副總管王仲寶復兼鄜延其涇原秦鳯總管等亦兼鄰路雖令互相䇿應然環州至延州十四五程直路亦不下十驛涇原至秦州又逺于此若一處有事自此發兵赴援而山谷險惡人馬已困欲責其功何可得也臣按兵勢貴乎相接茍相去懸絶則首尾不能相應必致緩不及事之失亢又言曰四路軍馬各不下五六萬朝廷盡力供億而邊臣但言兵少每路欲更增十萬人亦未見成功之效且兵無節制一弊也無竒正二弊也無應援三弊也主將不一四弊也兵分勢弱五弊也有此五弊如驅市人而戰雖有百萬亦無益於事臣按張亢所言五弊非但當時有之而今世亦然歐陽修上英宗曰禦邊之備東起麟府西盡秦隴地長二千餘里分為路者五而分為州為軍者二十有四而軍州分為寨為堡為城者又幾二百皆須列兵以守之故吾兵雖衆不得不分所分既多不得不寡而賊之出也常舉其國衆合聚為一而來是吾兵雖多分之而寡彼衆雖寡聚之為多以彼之多擊吾之寡不得不敗也此城寨之法既不足自守矣而五路大將軍所謂戰兵者分在二十四州軍欲合而出則懼後空而無備欲各留守備而合其餘則數少不足以出攻退不能自守所以用兵纍年終不能一出者以此也又曰夫兵分備寡兵家之大害也其害常在我以逸待勞兵家之大利也其利常在彼今誠能反其事而移我所害者豫敵奪敵所利者在我如此則動而有成功也臣按今日備邊之地東起遼東西極隴蜀非但若宋人之邊地起麟府盡秦隴而已洪武永樂之盛所守不過數處然皆據其總㑹扼其要害人聚而力全而彼之來有以待之得以全力而制勝也正統以後分為堡寨日多軍卒之數不減前日而堡寨之設日益加多誠有如歐陽修所謂吾兵雖多分之而寡彼衆雖寡聚而為多者也今兵無可添而堡寨不可減乞敕知邊事大臣躬臨邊境審視寨堡之設若非要害或雖要害而兵力寡少不足以守之處革其稍緩者而併歸於最要害之地如此則城堡不虛設而將卒皆有用矣大學衍義補卷一百五十一
