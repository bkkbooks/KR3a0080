body:
  text: 大學衍義補卷一百三十四明丘濬撰治國平天下之要嚴武備戰陳之法下通典司馬穰苴曰五人為伍十伍為隊一軍凡二百五十隊餘奇為握奇故一軍以三千七百五十人為奇兵隊七十有五以為中壘守地六千尺積尺得四里以中壘四面乘之一面得地三百步壘內有地三頃餘百八十步正門為握奇大將軍居之六纛五麾金鼓府藏輜積皆中壘外餘八千七百五十人隊百七十五分為八陳六陳各有千九十四人六陳各減一人以為陳之部署舉一軍則千軍可知蘇軾曰司馬法曰五人為伍五伍為兩萬二千五百人為軍二百五十取三焉而為奇其餘七以為正四奇四正而八陳生焉夫以萬二千五百人而均之八陳之中宜其有奇而不齊者是以多為之曲折以盡其數以極其變鉤聨蟠屈各有條理臣按凡兵者有四正四奇皆合而為一或離而為八是曰八陳故以正合為奇勝也大抵穰苴之法即古司馬之法其隊伍營壘坐作進退之度皆有所本世謂之穰苴陳法陳法者所以訓齊士卒使其上下如一前後左右進退周旋如身之運臂臂之使指無不如意也孫子曰善戰者其勢險其節短勢如彍弩節如發機紛紛紜紜鬬亂而不亂也渾渾沌沌形圓而不可散也李靖曰臣修其術凡立隊相去各十步駐隊去師隊二十步每隔一隊立一戰隊前進以五十步為節角一聲諸隊皆散立不過十步之內至第四角聲籠槍跪坐於是鼓之三呼三擊三十步至五十步以制敵之變馬軍從背出亦五十步臨時節止前正後奇觀敵如何再鼓之則前奇後正復邀敵來伺隙搗虛吳起教戰之令短者持矛戟長者持弓弩強者持旌旗勇者持金鼓弱者給厮養智者為謀士鄉里相比什伍相保一鼓整兵二鼓習陳三鼓趣食四鼓嚴辦五鼓就行聞鼓聲合然後舉旗臣按説者孫吳兵法主於權譎非王者之師然其計謀雖有詭詐而其行軍布陳之法則多有可取蜀諸葛亮推演八陳圖咸得其要杜牧曰數起於五而終於八今夔州諸葛武侯以石縱橫八行為方陳奇正之出皆生於此奇亦為正之正正亦為奇之奇彼此相用循環無窮也諸葛出斜谷以兵少但能用六數今盩厔司竹園乃有舊壘司馬懿以四十萬步騎不敢決戰皆知其能也朱熹曰陳圖自古有之周官所謂如戰之陳蓋是此法握機文雖未必風后所作然由來須逺武侯立石於江邊乃是水之回洑處所以水不能漂蕩其擇地之善立基之堅如此此其所以為善用兵也臣按亮至南中生致孟獲使觀於營陳之間縱使更戰七縱七擒獲曰公天威也司馬懿按行營壘歎曰天下奇材由是觀之武侯所置之陳誠非偶然也至今魚復平沙上壘石八為行相去二丈凡六十四蕝晉桓玄見之謂為常山蛇勢説者謂玄妄言耳嗚呼神兵非學到自古不留訣至人心已悟後世徒妄説蘇氏之言有自哉唐太宗問李靖曰卿所製六花陳法出何術乎靖對曰臣所本諸葛亮八陳法也大陳包小陳大營包小營隅落鉤連曲折相對古制如此臣為圖因之故外畫之方內環之圜是成六花俗所號耳太宗曰內圜外方何謂也靖曰方生於正圜生於奇方所以矩其步圜所以綴其旋是以步數定於地行綴應於天步定綴齊則變化不亂八陳為六武侯之舊法焉太宗曰天地風雲龍虎鳥蛇斯八陳何義也靖曰傳之者誤也古人祕藏此法故詭設八名爾八陳本一也分為八焉若天地者本乎旗號風雲者本乎幡名龍虎鳥蛇者本乎隊伍之别後世誤傳詭設物象何止八而已乎太宗曰五行陳如何靖曰本因五方色立此名方圓曲直鋭實因地形使然凡軍不素習此五者安可臨敵乎朱熹曰八陳之法每軍皆有用處天衝地軸龍飛虎翼蛇鳥風雲之數各為一陳有專於戰鬬者有專於衝突者又有纒繞之者又曰古來許多陳法遇征戰亦未必用得所以張巡用兵未嘗倣古兵法不過使兵識將意將識士情蓋未論臨機應變方略不同只如地圓則須布圓陳地方則須布方陳亦豈容槩論也臣按史稱靖舅韓擒虎每與論兵輒歎曰可與語孫吳非斯人而誰其後仕唐為大將平蕭銑於江陵獲輔公袥於丹陽禽頡利平吐谷渾太宗謂古韓白衛霍無以加則是靖自用其法有實效矣説者謂靖與太宗問對之書乃宋阮逸假托而作考宋仁宗命王震校正武經已有其書豈其然哉宋仁宗曰黃帝始置八陳法敗蚩尤於涿鹿諸葛亮造八陳圖於魚復平沙之上壘石為八行此即九軍陳法也後至韓擒虎深明其法以授其甥李靖靖以時遭久亂將帥通達其法者頗多故造六花陳以變九軍之法使世人不能曉之大抵八陳即九軍九軍者方陳也六花陳即七軍七軍者圓陳也蓋陳以圓為體方陳者內圓而外方圓陳則內外俱圓矣故以圓物驗之則方以八包一圓以六包一此九軍六花之陳大體也六軍者左右虞候軍各一軍為二虞候軍左右軍各二軍為四廂軍與中軍共為七軍八陳者加前後二軍共為九軍朕采古之法酌今之宜曰營曰陳本出乎一法而已止則曰營行則曰陳奇正言之則營為正陳為奇也臣按自古出師必有營有陳止而無營則無以自守行而無陳則無以制敵周禮大司馬四時之教中春振旅執鼓鐸鐲鐃以教坐作進退徐疾疏數之節中秋治兵所載旗物若太常旗旜旐旟之屬中冬大閲所以立表陳車徙坐作馳行三時之教皆所以習為陳法也若夫中夏之茇舍謂之茇舍者茇如召伯所茇之茇茇之為言草止也其所以撰車徒讀書契辨號名而凡門名縣鄙各以其名百官各象其事以辨軍之施事蓋三時之教教以行陳之法也夏時之教教以止營之法也周之制不可詳惟今世兵家所傳陳法雖未必如武侯衛公之舊然亦未嘗無所本者也夫時勢不同面勢不一地之險易既有所限卒之多寡復有不齊而又敵有強弱智愚勇怯之不同有不可一槩而論者所謂陳法未必皆一一可用如古人所云者也然用之雖在乎應機然習之則在乎有素譬之學奕然局面雖不可豫料而行動機變則不可不預知也知之固未必盡皆可行然非熟之於目得之於手則亦豈能應之以心哉臣請命知兵事大臣將古人陳法詳加審定櫽括以為圖條陳以為説使人人易曉然後詔武臣俾其按圖布陳使六軍之士皆習熟於耳目見聞之間曉了於心口意慮之際一旦有事大將有所謀為處置上得所依循下知所指示而行之不難矣宋吳璘立壘陳法每戰以長鎗居前坐不得起次最強弓次強弩跪膝以俟次神臂弓約賊相搏至百步內則神臂先發七十步強弓併發次陳如之凡陳以拒馬為限鐡鉤相連俟其傷則更代之遇更代則以鼓為節騎兩翼以蔽於前陳成而騎退謂之疉陳朱熹曰大要臨陳在番休遞上分一軍為數替將戰則食第一替人既飽遣之入陳便食第二替人第一替人力將困即調發第二替人往代第三替亦如之只管如此更番則士常飽健而不至於困之張柔直守南劒退范汝為用此法方汝為之來寇也柔直起鄉兵與之戰令城中殺羊牛豕作肉串仍作飯分鄉兵為數替以入陳之先後更迭食之士卒力皆有餘遂勝汝為又劉信叔順昌之勝大槩亦是如此時極暑探報人至云敵騎至矣信叔令一卒擐甲立之烈日中少頃問甲熱乎曰熱矣可著手乎曰熱甚不可著手矣時城中軍亦不多信叔嘗有宿戒遇戰則分為數替於是下令軍中依次飲食士卒更番而上又多合暑藥往者歸者皆飲之故能大敗敵人蓋方我甲士甲熱不堪著手則敵騎被甲來者其熱可知又未免有困餒之患於此擊之是以勝也臣按朱子所論張觷劉錡所以破敵者皆是更休之法璘之疉陳法亦是更代但璘是俟其傷而更代之夫二人者皆是立為定法預分其人為班次而更休之也然璘以鼓為節則敵知我更代之期或生他計宜於未戰之先某隊以某人為初班替某人其次班三班亦如之别為暗號使其潛自更替之為無患也吳璘謂其疉陳法乃古束伍令束伍令見兵法尉繚子今考之不合不知何據而云然以上陳法史記武王即位九年東伐以觀諸侯集否師行師尚父左杖黃鉞右把白旄以誓曰蒼兕蒼兕總爾衆庶與爾舟楫後至者斬遂至盟津馬融曰蒼兕主舟楫官臣按此古人用舟師之始考齊世家太公會舟楫于盟津則舟師自武王時已有之蓋以濟河也其後春秋時孟明濟而焚舟亦皆在乎河然亦暫以濟爾非若吳楚之人用之則專以戰焉昔人謂吳人以舟楫為輿馬以江海為平道是其所長吳人以舟師伐楚又越軍吳軍舟戰於江伍子胥對闔閭以船軍之教比陸軍之法大翼者當陸軍之車小翼者當輕車突冒者當衝車樓船者當行樓車走舸者當輕走驃騎公輸般自魯之楚為舟楫之具謂之鉤拒退而鉤之進則拒之又以歷代史考之舟師可以進戰之處東南之師趨三齊者自淮入泗而止劉裕伐南燕舟至下邳是也趨河北者自汴入河而止桓溫伐燕至枋頭是也捨舟登陸尚得半利趨關中者自河而入徑至長安王鎮惡以蒙衝小艦至渭橋是也水陸並進可得全利此皆以舟師進者也若夫舟師可以守之處塞建平之口使自三峽者不得下此王濬伐吳楊素伐陳之路也據武昌之要使自漢水者不得進此何尚之所謂津要根本之地也守采石之險使自合肥者不得渡蓋韓擒虎嘗因以滅陳也防瓜步之津使自盱胎者不得至蓋魏大武欲道此以寇宋也扼其要害使不得進此皆以舟師守者也左傳襄公二十四年楚子為舟師以伐吳昭公十七年吳伐楚戰于長岸大敗吳師而獲其乘舟餘皇或作艎舟名臣按此南國用舟師見於史者始此哀公十年吳徐承吳大夫帥舟師將自海入齊臣按此戰用海舟之始吳之海道通齊蓋自春秋時已然矣漢武帝時朱買臣言東越王居保泉山更徙居大澤中今發兵浮海直指泉山陳舟列兵席卷南行可破滅也乃拜買臣為會稽太守詔買臣到郡治樓船備糧食水戰具歲餘買臣受詔與韓説俱擊破東越臣按西漢會稽郡治在今蘇州則吳之海舟可通閩久矣臣嘗因是而通考天下之海道觀秦運負海粟以給北邊及吳徐承帥舟師將自海道入齊漢武伐東越亦自會稽以舟師入閩則燕可至齊齊可至吳吳可至閩蓋自秦以前則已通行矣然吳既可至閩閩之至廣尤易易然臣於制國用條嘗請復元人海運今日誠能用軍三四萬人舟三五千艘由海道漕運因而教以水戰則東可以制朝鮮南可以制交址噫當元盛時而知為此備則張士誠方國珍豈敢稱亂哉惜乎當時惟以運糧而不習水戰武帝時有樓船有戈船有下瀨有橫海江淮青齊皆有樓船軍擊南粵救東甌則用江淮會稽樓船滅朝鮮則用齊樓船又開昆明池以習水戰臣按漢人之造舟以為戰具於凡邊江海之處皆為樓船臣竊以為船謂之樓其質必大所費蓋不資也有事而造之則緩不及事無事而造之則貯之無用之地歲久而自弊弊而又造則勞民費財多矣臣請凡為運舟者必備戰具無事則用以漕有事則用以戰豈不一舉而兩得哉今沿海衛所造為備倭船隻歲歲督造而無一日之用勞費無已况操海舟與河舟不同軍不素練一旦驅之登舟以戰彼方眩暈嘔吐之不暇又豈能禦敵哉況其舟中器具朽腐倉卒豈能猝辦賊舟多而我舟少其不能敵之決矣臣請革罷此舟備倭官軍惟拒之使不登岸不必追之可也魏曹操遺孫權書欲治水軍與之會獵於吳張昭等曰操得荆州水軍蒙衝鬬艦浮以沿江長江之險已與我共之矣周瑜曰操捨鞍馬仗舟楫遠涉江湖不習水土禽操宜在今日瑜與先主進與曹操遇於赤壁瑜部將黃蓋取蒙衝鬬艦十艘載燥荻枯柴灌油其中裹以帷幕上建旌旗預備走舸繫於其尾時東南風急蓋以十艦最著前中江舉帆餘船以次俱進去北軍二里餘同時發火火烈風猛船往如箭燒盡北船延及岸上營落煙焰漲天瑜等率輕鋭繼其後靁鼓大進曹操軍敗退臣按此古人焚敵舟之法晉武帝謀伐吳詔王濬修舟艦乃作大船連舫百二十步受二千餘人以木為城起樓櫓開四出門上得馳馬往來又畫鷁首怪獸於船首以懼江神舟楫之盛自古無有吳為鐡鎖橫截江險又作鐡椎暗置江中濬知狀乃作大筏數十亦方百餘步縛草為人令善水者以筏先行遇鐡椎輒著筏而去又作大炬長十餘丈大數十圍灌以麻油在船前遇鎖然炬燒斷於是順風鼓棹徑造三山臣按王濬造巨舟沿長江而下其大至方百二十步受二千餘人今長江故在舟行往來者雖百斛之舟尚有膠於淺者今晉舟如許之大轉動為難要非良法也晉有指南舟臣按今番舶於舵樓之下亦置盤針蓋凡舟皆用盤針於舟中以定方向非專設為一舟也宋太祖開寶七年命曹彬伐南唐彬等發江陵水陸並進克池州敗唐兵於銅陵遂次采石磯初唐池州人樊若水纍舉進士不第遂謀歸宋乃漁釣采石江上月夜乘小舟載絲繩維南岸疾棹抵北岸以度江之廣狹尋詣汴上書言江南可取狀請造浮梁以濟師宋主然之遣內侍往荆湖造黃黑龍船數千艘以大艦載大竹緪自荆渚而下命丁匠營之三日橋成議者以為自古未有作浮梁渡江者宋主不聽師南下以若水為嚮導既克池州即用為知州者水請試舟於石牌口移置采石梁成不差尺寸宋師因之濟江若履平地臣按自樊若水獻量江為梁之策而江面遂不可守大抵據江為國者必得上流敵者不得我之上流若水此策亦無所施矣然是策也非但可施於江除大海外凡據水以為險者我若得其上流皆可潛遣人量其廣狹以為浮筏蔑不濟矣高宗建炎四年金烏珠入冦韓世忠與相持於黃天蕩世忠以海艦進泊金山下將戰世忠預命工鍛鐡相連為長綆貫一大鉤以授士之驍捷者平旦敵以舟譟而前世忠分海舟為兩道出其背每縋綆則曳一舟而入敵竟不得濟烏珠既為世忠所厄欲自建康謀北歸不得去或教以蘆場地鑿大渠二十餘里上接江口在世忠之上遂傍冶城西南隅鑿渠一夜渠成次早出舟金人悉趨建康世忠尾擊敗之敵終不得濟乃揭榜募人獻所以破海舟之策有教其於舟中載土以平板鋪之大船板以棹槳俟風息則出江有風則勿出海舟無風不可動也以火箭射其蒻蓬則不攻自破矣一夜造火箭成是日引舟出江其疾如飛天霽無風海舟皆不能動以火箭射海舟蒻蓬世忠軍亂焚溺而死者不可勝數世忠與餘軍至瓜步棄舟而陸奔還鎮江臣按或人之教烏珠禦宋人大舟之法今倣而用之亦可制倭人之巨舟紹興五年嶽飛破楊太一名么於洞庭太時與劉豫通負固不服方浮舟湖中以輪激水其行如飛旁置橦竿官舟迎之輒碎飛伐君山木為巨筏塞諸港汊又以腐木亂草浮上流而下擇水淺處遣善罵者挑之且行且罵賊怒來追則草木壅塞車輪礙不得行急擊之賊奔港中為筏所拒官軍乘筏張牛革以蔽矢石舉巨木撞其舟盡壞太計窮赴水死臣按舟之大者非風不行而行風必以帆帆之製非蒻葉與竹篾則布為之以火箭射之無不焚者然則如之何而可曰楊么之舟以輪激水雖無風亦可行也巧思者能師其意倣而製之則雖無風不用帆亦可行矣以上舟師以上論戰陳之法下大學衍義補卷一百三十四
