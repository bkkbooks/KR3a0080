body:
  text: 大學衍義補卷四十四明丘濬撰治國平天下之要明禮樂樂律之制下周敦頥曰古者聖王制禮法脩敎化三綱正九疇叙百姓太和萬物咸若乃作樂以宣八風之氣以平天下之情故樂聲淡而不傷和而不滛入其耳感其聲莫不淡且和焉淡則欲心平和則躁心釋徳盛治至道配天地古之極也後世禮法不脩政刑苛紊縱欲敗度下民困苦謂古樂不足聽也代變新聲妖滛愁怨導欲増悲不能自止故有賊君棄父輕生敗倫不可禁者矣嗚呼樂者古以平心今以助欲古以宣化今以長怨不復古禮不變今樂而欲至治者逺矣朱熹曰古聖賢之論樂曰和而已此所謂淡葢以今樂形之而見其本於莊正齋肅之意故希簡而寂寥耳廢禮敗度故其聲不淡而妖滛政苛民困故其聲不和而愁怨妖滛故導欲而至於輕生敗倫愁怨故増悲而至於賊君棄父古今之異淡與不淡和與不和而已臣按周子此言葢謂復古禮然後可以變今樂程頥曰律者自然之數先王之樂必須律以攷其聲尺度權衡之正皆起於律以律管定尺以天地之氣為凖非秬黍之比也律取黄鍾黄鍾之聲亦不難定世自有知音者参上下聲攷之自得其正既得其正將黍以實其管看管實得幾粒然後推而定法可也古法律管當實千二百粒黍今羊頭黍不相應則將數等驗之看如何大小者方應其數然後為正胡先生定樂取羊頭山黍用三等篩子篩之取中等者特未定也臣按程氏此言欲知音者攷聲上下以定黍張載曰聲音之道與天地通蠶吐絲而商絃絶木氣成則金氣衰乃此理自相應今人求古樂太深始以古樂為不可知律吕有可求之理惟徳性淳厚者能知之臣按宋三儒之説周氏以復古禮為先程氏以攷聲音為正張氏則以人之徳性為本三人者可謂窮本知變達樂之要者矣且生當有宋全盛之時天子鋭意古樂而胡瑗范鎭司馬光輩方講求鍾律徧訪四方草澤以應詔而三大儒者乃見遺焉使當時若在講求之列其所次叙必有可觀古樂或有可復之理惜哉朱熹曰五聲之序宫最大而沈濁羽最細而輕清商之大次宫徵之細次羽而角居四者之中焉然世之論中聲者不以角而以宫何也曰凡聲陽也自下而上未及其半則屬於隂而未暢故不可用上而及半然後屬於陽而始和故即其始而用之以為宫因其每變而益上則為商為角為變徵為徵為羽為變宫而皆以為宫之用焉是以宫之一聲在五行為土在五常為信在五事為思葢以其正當衆聲和與未和用與未用隂陽際㑹之中所以為盛若角則雖當五聲之中而非衆聲之㑹且以七均論之又有變徵以君焉亦非五聲之所取正也然自其聲之始和者推而上之亦至於變宫而止耳自是而上則又過乎輕清而不可以為宫於是就其兩間而細分之則其别又十有二以其最大而沈濁者為黄鍾以其極細而輕清者為應鍾及其旋相為宫而上下相生以盡五聲二變之用則宫聲常不越乎十二之中而四聲者或時出於其外以取諸律半聲之管然後七均備而一調成也黄鍾之與餘律其所以為貴賤者亦然若諸半聲以上則又過乎輕清之甚而不可以為樂矣葢黄鍾之宫始之始中之中也十律之宫始之次而中少過也應鍾之宫始之終而中已盡也諸律半聲過乎輕清始之外而中之上也半聲之外過乎輕清之甚則又外之外上之上而不可為樂者也正如子時初四刻屬前日正四刻屬後日其兩日之間即所謂始之始中之中也然則聲自屬隂以下亦當黙有十二正變半律之地以為中聲之前段如子初四刻之為者但無聲氣之可紀耳由是論之則審音之難不在於聲而在於律不在於宫而在於黄鍾葢不以十二律節之則無以著夫五聲之實不得黄鍾之正則十一律者又無所受以為本律之宫也今有極論宫聲之妙而無曰黄鍾云者則恐其於聲音法制之間猶有所未盡也夫以聲音法制之粗而猶有未盡則雖有黄帝大舜之君伶倫后䕫之佐亦如之何徒手而可以議大樂之和哉又有宫當配仁之説者則以仁當四徳之元而有包四徳之義耳夫仁木行而角聲者也以之配宫則仁既不安而信亦失據矣五行之序木為之始水為之終而土為之中土則水火之所寄金木之所資居中而應四方一體而載萬類者也是則宫之綂五聲仁之包五常葢有並行而不悖者矣何奪彼與此哉以宫配仁五峰胡氏説熹又曰古樂之亡乆矣然秦漢之間去周未逺其器與聲猶有存者故其道雖不行於當時而其為法猶未有異論也逮於東漢之末以接西晉之初則已寖多説矣歴魏周齊隋唐五季論者愈多而法愈不定爰及宋朝功成治定理宜有作建隆皇祐元豐之間葢亦三致意焉而和峴胡瑗阮逸李照范鎭馬光劉几楊時諸賢之議終不能以相一也而况於崇宣之季姦䛕之㑹指蔡京輩黥涅之餘魏漢津而能有以語夫天地之和哉建陽蔡元定㫄搜逺取巨細不捐積之累年乃若㝠契著為律吕新書明白而淵深縝宻而通暢不為牽合附㑹之談其言雖多出於近世之所未講而實無一字而不本於古人已試之成法蔡元定曰律吕散亡其器不可復見然古人所以制作之意則猶可攷也太史公曰細若氣微若聲聖人因神而存之雖妙必効言黄鍾始於聲氣之元也班固所謂黄帝使伶倫取竹斷兩節間吹之以為黄鍾之宫又曰天地之風氣正而十二律定劉昭所謂伏羲統陽氣之初以為律法又曰吹以攷聲列以候氣皆以聲之清濁氣之先後求黄鍾者也是古聖人制作之意也夫律長則聲濁而氣先至極長則不成聲而氣不應律短則聲清而氣後至極短則不成聲而氣不應此其大凡也今欲求聲氣之中而莫適為凖則莫若多截竹以擬黄鍾之管或極其短或極其長長短之内每差一分以為一管皆即以其長權為九寸而度其圍徑如黄鍾之法焉如是而更迭以吹則中聲可得淺深以列則中氣可驗茍聲和氣應則黄鍾之為黄鍾者信矣黄鍾者信則十一律與度量衡權者得矣後世不知出此而惟尺之求晉氏而下則多求之金石梁隋以來又絫之秬黍下至王朴剛果自用遂專恃絫黍而金石亦不復攷矣夫金石真偽固難盡信若秬黍則歲有凶豐地有肥瘠種有長短小大圓妥不同尤不可恃况古人謂子榖秬黍中者實其龠則是先得黄鍾而後度之以黍不足則易之以大有餘則易之以小約九十黍之長中容千二百黍之實以見周徑之廣以生度量權衡之數而已非律生於黍也百世之下欲求百世之前之律者其亦求之聲氣之元而毋必之於秬黍則得之矣又曰律者致中和之用止於至善者也以聲言之大而至於雷霆細而至於蠛蠓無非聲也律則寫其黄鍾一聲而已矣雖有十二律六十調然實一黄鍾也是理也在聲為中聲在氣為中氣在人則喜怒哀樂未發與發而中節也此聖人所以一天人贊化育之道也臣按蔡元定作律吕新書朱熹為之序曰其中所謂黄鍾圍徑之法則漢斛之積分可攷寸以九分為法則淮南太史小司馬之説可推五聲二變之數變律半聲之例則杜氏之通典具焉變宫變徵之不得為調則孔氏之禮疏因亦可見臣既本朱氏此序而引諸説而附以元定之所參定者既具於各條之下至是剟取序文而繼以元定截竹為管以求中聲之説是則朱氏所謂先求聲氣之元而因律以生尺尤所謂卓然者也然此求其聲氣耳而所謂均調節奏被之管絃蔡氏又欲别為樂書以究其業今世無之豈其後竟不克就耶尚幸此新書之存以俟後世之聖君賢相功成作樂者焉雖然此書之作雖由蔡氏而皆本其師之意也觀朱氏與元定書曰但用古書古語或註疏而以己意附其下方甚簡約而極周盡學者一覧可得梗槩其他推説之泛濫㫄證之異同不盡載也今即其書以觀無一不如其師所敎者所謂甚簡約而極周盡者一言以蔽之矣其後朱氏又與其門人攷訂禮書又定鍾律詩樂樂制樂舞等篇皆聚古樂之根源簡約可觀而鍾律分前後篇其前篇凡七條一曰十二律隂陽辰位相生次第之圖二曰十二律寸分釐毫絲數三曰五聲五行之象清濁髙下之次四曰五聲相生損益先後之次五曰變宫變徵二變相生之法六曰十二律正變倍半之法七曰旋宫八十四聲六十調之圖其後篇凡六條一曰明五聲之義二曰明十二律之義三曰律寸舊法四曰律寸新法五曰黄鍾寸分數法六曰黄鍾生十一律數法大槩率采元定所著更互演繹尤為明邃其樂制彚於王朝禮其樂舞彚於祭禮上下數千載㫄搜逺紹昭示前聖禮樂之非迂以為後世作樂者之法則後世有作者合二書而求之思過半矣以上論樂律之制臣按禮樂之制作其微也乆矣而樂為甚非其情義之難明也而其所謂制度者失其傳焉耳在漢之世樂家有制氏世在樂官但能紀其鏗鏘鼓舞而不能言其義論者惜之然唐宋以來其精義之存於古典者通經學古之士尚能因文以求義或得其情於編簡之中若夫所謂鏗鏘鼓舞者則知之者葢已鮮矣論禮者謂其數可知其義難知葢是時度數詳明人所共習所難知者其義理𤣥㣲者耳故為是言若就後世言之則可學而知者義理耳若夫名物度數非上智之資豈能奮乎千載之下而逆探其遺文墜緒於千載之上也哉且禮之行也文與器而已然樂不徒文而又有其容不徒器而又有其聲習學者既失其傳造作者又失其製葢非一日矣一旦求之簡牘之中以不試之學而欲合古人之制自非知禮樂之情之聖有開物成務之才而妙達天人之理者孰能與於斯哉三代之制不可攷已孔子自衛反魯之所正僅云雅頌而不及於制度在聖人時魯之樂工擊磬鼓鼗者踰河蹈海孔門弟子皆詳記於所録師説之中非無意也其意以為自是之後樂工散亡非獨無明樂義之聖賢而併與其習樂器之賤工亦無之矣後有作者其何所持循而復古制也哉漢初古樂猶有存者文帝資雖近道而謙讓未遑武帝慨然有志於樂然所好者世俗之所樂非先王之所制也魏用杜䕫隋用鄭繹何妥宋用和峴胡瑗阮逸范鎮輩非不留心於鐘律也然卒無所得焉葢用其心於𣺌茫而無所從入之端故耳孟子曰聖人既竭耳力焉然後繼之以五聲六律程子亦曰有知音者参上下聲攷之自得其正葢必求之吾之心思竭乎吾之耳力因其所易而後及其所難因其所習而後及其所未達為之以其漸循之以其方深造之以其道記曰作者之謂聖述者之謂明今世古制無復存者雖是述之其與作者之功何異吾無聖人之天資而欲任聖人之創作可乎既不敢作而欲述之又無可因而以為述之之地不得已而就其所近而易者以求之求之之道先從吾身始晉人有言絲不如竹竹不如肉言漸近自然耳黄帝取嶰谷之竹吹之以為黄鍾之宫者有由然也六經之中論樂之最先者莫先于虞書詩言志歌永言聲依永律和聲之四言此萬世論聲樂之祖也史亦稱大禹聲為律身為度孔子正樂亦以雅頌得所為先古之樂器無存而存者亦多非古制惟孔子所删三百篇之詩乃商周祭祀燕享及房中所歌者其篇章宛然三代之舊也無所欠闕大戴禮云凡雅二十六篇其八篇可歌晉志亦云漢末杜䕫傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭戴記頗有闕誤篇數不可攷漢末止存三篇而加以文王不知其何自來也其後改作新辭舊曲遂廢至唐開元鄉飲酒禮其所奏樂乃有鹿鳴四牡皇皇者華魚麗南有嘉魚南山有臺關雎葛覃卷耳鵲巢采繫采蘋十二篇之目而其聲亦不得聞矣宋時有趙彦肅者傳此十二詩之譜每句之中字皆叶以律吕即開元遺聲也朱子既以載之儀禮經傳中以為詩樂且謂古聲亡滅已乆不知當時工師何所攷而為此疑古樂有唱有歎唱者發歌句也和者繼其聲也詩詞之外應更有叠字散聲以歎發其趣故漢晉之間舊曲既失其傳則其辭雖存而世莫能補為此故也若但如此譜直以一聲叶一字則右詩篇篇可歌無復樂崩之歎矣夫豈然哉又其以清聲為調似非古法然古聲既不可攷姑存之以見聲歌之彷彿以俟後之知樂者噫朱子非知樂者哉而姑為是謙退之辭耳大賢若朱子而不任其責後世之人又孰有過于朱子者哉人人皆為是言則此樂直至天地之戍㑹永無可復之期矣雖然與其不能盡復天地之純全而略得以見古人之彷彿猶賢乎已夫有之而不全猶勝于全無而不有也漢唐以來郊廟燕享未嘗不用樂而樂之用或至于用鄭衞之音今吾稍存古人之意以倣古人之樂雖不全于古而猶彷彿于古豈不愈于鄭衞之音也哉程子曰古人之詩如今之歌曲古人之詩其音調不復可知己而今之歌曲雖出時人之口而亦有所沿襲如向所謂十二詩于鹿鳴等六詩云黄鍾清宫註云俗呼正宫關雎等六詩云無射清商註云俗呼越調所謂黄鍾清宫無射清商世俗固不知所以為聲而正宫越調之類宋世所謂詩餘金元以來所傳南北曲者雖非古之遺音而猶有此名目也夫人能為之而聞之者亦能辨别其是否誠因今而求之古循俗而入于雅以求古人之所彷彿者萬一天生妙解音樂之人如師曠州鳩信都芳萬寳常王令言張文收之輩必能因其彷彿而得其純全者焉因聲以攷律正律以定器三代之樂亦可復矣然如此之人豈易得哉吁必待后䕫而後作樂必待師曠而後聽音斯人不世出而樂之在天下不可一日無也而音豈可不聽哉世無后䕫師曠而后䕫之心師曠之耳則人人有也萬古如一日也昔宋李照胡瑗阮逸改鑄鍾磬徐復笑之曰聖人寓器以聲不先求其聲而更其器其可用乎其後卒無所成如復言房庻亦言古樂與今樂本末不逺其大略以謂上古世質器與聲樸後世稍變焉金石鍾磬也後世易之以方響絲竹琴簫也後世易之以箏笛笙匏也攢之以斗塤土也變而為甌柷敔木也貫之以板凡若此者八音之變也亦猶大輅起于推輪龍艘生于落葉其變則然爾古者食以爼豆後世易以杯盤簟席以為安後世更以榻案使聖人復生不能舎杯盤榻案而復爼豆簟席也八音之器豈異此哉孔子曰鄭聲滛豈其器之不古若哉亦疾其聲之變耳試使知樂者由今之器寄古之聲去惉懘靡曼而歸之中和雅正則感人心導和氣不曰治世之音乎然則世所謂雅者未必如古而敎坊所奏豈盡滛聲哉庻之此言雖非窮本之論而不謂之知變不可也樂記曰窮本知變樂之情也樂之本同而其變則異同者其精者也異者其粗者也推其異而合之同舉其粗而歸之精則其體凝一矣臣請眀詔天下求知音律者内而朝著外而州郡隠而草澤之士賤而技藝之流許其自陳及臣僚薦舉聚于一處俾其各就所能因其明處而各罄其所知用今世所奏之樂今日所歌之辭度其腔調按其節拍先求世之所謂正宫越調之類以究古人清宫清商之調依俗法之所移換尋古調之所抑揚然後被之于絲吹之以竹宣之以金收之以石必俗器之調而後古器之即合作于一堂之間而有和應之美不徒協夫奏者之心而且諧之聽者之耳無間賢愚貴賤一是同和然後按古人鍾律之法即蔡元定之律吕新書朱文公之通解鍾律依其說按其法而講究其所當然之則與其所以然之故築室布灰如其候氣之法截竹為管以求黄鍾之聲如所謂或極其短或極其長長短之内每差一分以為一管皆即以其長權為九寸而度其圍徑如黄鍾之法焉此則蔡氏截管候氣之法也若夫所謂度其圍徑者則未有定凖焉夫所列之管既已應氣可豫尋秬黍中者分為三等先以一等實于是管之中必須千二百粒適滿其中無欠無餘然後用之有餘欠者則用次等次等不合又别用之必同而後己所實既同然後因之以定尺審度量謹權衡焉由是以制律吕均聲音製樂器先試以歌聲齊簫聲以簫聲定十六聲又以十六聲而齊入器聲髙者則抑而下之聲下者則引而上之過于厲者平之過于醲者淡之逐器而調之使其一器之中聲律自然均調而無有參錯合器而協之使其衆器之間自然翕合而無相奪倫無一器之不諧無一音之不應如此雖不能盡善盡美如古人之純全然通其變以窮其本亦可以得古人之彷彿者矣方之章韶濩武雖不可企及然視後世之因循茍且者則有間矣臣於鍾律非所通曉姑述所聞以俟當代之聖明任作述之大柄者焉大學衍義補卷四十四
