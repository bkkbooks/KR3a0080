body:
  text: 大學衍義補卷一百明丘濬撰治國平天下之要慎刑憲總論制刑之義易噬齧也嗑合也亨利用獄程頤曰口中有物則隔其上下不得嗑必齧之則得嗑故為噬嗑聖人以卦之象推之於天下之事在口則為有物隔而不得合在天下則為有彊梗或讒邪間隔於其間故天下之事不得合也當用刑法小則懲戒大則誅戮以除去之然後天下之治得成矣噬嗑者治天下之大用也去天下之間在任刑罰又曰天下之事所以不得亨者以有間也噬而嗑之則亨通矣利用獄噬而嗑之之道宜用刑獄也天下之間非刑獄何以去之不云利用刑而云利用獄者卦有明照之象利於察獄也獄者所以究治情僞得其情則知為間之道然後可以設防與致刑也朱熹曰卦以隂居陽雖不當位而利用獄蓋治獄之道惟威與明而得其中之為貴彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也程頤曰剛爻與柔爻相間剛柔分而不相雜為明辨之象明辨察獄之本也動而明下震上離其動而明也雷電合而章雷震而電耀相須竝見合而章也照與威竝行用獄之道也能照則無所隱情有威則莫敢不畏六五以柔居五為不當而利於用獄者治獄之道全剛則傷於嚴暴過柔則失於寬縱五為用獄之主以柔處剛而得中得用獄之宜也臣按先儒有言噬嗑震上離下震雷離電天地生物有為造物之梗者必用雷電擊摶之聖人治天下有為生民之梗者必用刑獄斷制之故噬嗑以去頤中之梗雷電以去頤中之梗刑獄以去天下之梗也所謂梗者即有間之謂也物有間於吾頤之中必齧斷之而後口可閉合口不能合則有所窒礙而氣有不通矣人有梗於吾治之間必斷制之而後民得安靖民不得安則有所苛擾而生有不寧矣然其所以梗吾治而使民之不安者必有其情焉有其情故有其獄也所以治斯獄也非明不能致其察非威不能致其決明以辨之必如電之光歘然而照耀使人不知所以為蔽威以決之必如雷之震轟然而擊搏使人不知所以為拒明與威竝行用獄之道也然其施於外者用其剛如此可爾若夫存於中者則又以柔為本而其柔也非專用柔用柔以處剛無太過焉無不及焉夫是之謂中夫是之謂利茍偏於一而或過與不及則非中矣則為不利矣象曰雷電噬嗑先王以明罰勑法程頤曰電明而雷威先王觀雷電之象法其明與威以明其刑罰勑其法令法者明事理而為之防者也吳澄曰明者辨别精審之意勑者整飭嚴警之意明象電光勑象雷威罰者一時所用之法法者平日所定之罰一時所用之允當者示平日所定之信必也故明其罰所以勑其法臣按制定於平昔者謂之法施用於臨時者謂之罰法者罰之體罰者法之用其實一而已矣人君象電之光以明罰象雷之威以勑法蓋電之光非如日星之明有恆而不息歘然而為光於時頃之間如人之有罪者或犯於有司則當隨其事而用其明察以定其罰焉或輕或重必當其情不可掩蔽也否則非明矣雷之威歲歲有常􅊒􅊒之聲震驚百里如國家有律令之制違其式而犯其禁必有常刑或輕或重皆有定制不可變渝也否則非勑矣夫法有定制而人之犯也不常則隨其所犯而施之以責罰必明必允使吾所罰者與其一定之法無或出入無相背戾常整飭而嚴謹焉用獄如此無不利者矣初九屨加於足校木械滅趾傷滅其趾無咎小懲而大戒故無咎六二噬膚旡骨之肉滅深入至沒其鼻鼻無咎六三噬臘肉乾臘堅韌之物遇毒小吝無咎九四噬乾胏肉之帶骨者得金鈞金矢束矢利艱貞吉六五噬乾肉得黃金貞厲無咎上九何校滅耳凶朱熹曰初上無位為受刑之象中四爻為用刑之象初在卦始罪薄過小又在卦下故為屨校滅趾之象止惡於初故得無咎子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何上聲校滅耳凶臣按噬嗑一卦六爻俱以刑獄言而聖人於大傳特論初九上九二爻蓋初與上無位為受刑之人而其中四爻則用刑之人也然下之人必犯於刑而後受之所以受之者由上之人用之也用刑以刑人將使人不敢為惡而務於為善然後吾刑不用矣上無所用則下無所受下無何校滅耳之苦上無滅鼻遇毒之勞所以然者聖人明罰勑法懲之於早故也天生聖人為民造福既叙彜倫而錫君子以考終命之福復明刑罰而養小人以全身命之福蓋小人不以不仁為恥見利而後勸於為仁不以不義為畏畏威而後懲於不義懲之於小所以誡其大懲之於初所以誡其終使其知善不在大而皆有所益惡雖甚小而必有所傷不以善小而弗為不以惡小而為之不至於惡積而不可掩罪大而不可解以傷其膚殞其身亡其宗其為小人之福也則亦何以異於錫君子者哉賁之象曰山下有火賁君子以明庶政無敢折獄程頤曰君子觀山下有火明照之象以修明其庶政成文明之治而無果敢於折獄也折獄者人君之所致慎也豈可恃其明而輕自用乎乃聖人之用心也為戒深矣折獄者專用情實有文飾則沒其情矣故無敢用文以折獄也朱熹曰山下有火明不及逺明庶政事之小者折獄事之大者內離明而外艮止故取象如此旅之象曰山上有火旅君子以明慎用刑而不留獄程頤曰火之在高明無不照君子觀明照之象則以明慎用刑明不可恃故戒於慎明而止亦慎象觀火行不處之象則不留獄獄者不得已而設民有罪而入豈可留滯淹久也臣按朱熹謂賁與旅卦皆說刑獄事但爭艮與離之在內外故其說相反止在外明在內故明庶政而不敢折獄止在內明在外故明慎用刑而不留獄粗言之如今州縣治獄禁勘審覆自有許多節次過乎此而不決便是留獄不及乎此而決便是敢於折獄書曰要囚服念五六日至于旬時丕蔽要囚周禮秋官亦有此句便是有合如此者若獄未具而決之是所謂敢折獄也若獄已具而留之不決是所謂留獄也由是觀之賁旅二卦蓋交相成而互相用也獄之未具則不敢折故獄得真情而人不寃獄之已具則無或留故獄不停囚而人不滯治獄之道備於此矣治獄君子必象離之明以為之體象山之止以為之用明矣而猶不敢折獄明矣而猶必慎而不留皆止之象也獄不難於治而難於用故噬嗑卦辭曰利用獄豐之象曰雷電皆至豐君子以折獄致刑程頤曰雷電皆至明震竝行也二體相合故云皆至離明也照察之象震動也威斷之象折獄者必照其情實惟明克允致刑者必威於姦惡惟斷乃成故君子觀雷電明動之象以折獄致刑也朱熹曰噬嗑明在上是明得事理先立這法在此未有犯的人留待異時之用故云明罰勑法豐威在上明在下是用這法時須是明見下情曲折方得不然威動於上必有過錯也故云折獄致刑此是程子之意其說極好洪邁曰易六十四卦而以刑罰之事著於大象者凡四焉噬嗑旅上卦為離豐賁下卦為離離明也聖人知刑獄為人司命故設卦觀象必以文明為主而後世付之文法俗吏何耶臣按豐之為卦盛大之義也明足以照動足以亨然後能致豐大之功茍天下之人有以梗吾之教化犯吾之禁令而吾之明不足以照之吾之威不足以折之何以成其豐亨盛大之治哉是以君子必體電之明以折斷獄情體雷之威以致用刑殺威至而明不至不可也明至而威不至不可也必明威竝用如雷之擊也必與電俱電之掣也必與雷竝明寓於威斷之中則其威也非肆暴虐而灼然有以燭其姦威施於明察之下則其明也非作聰明而毅然有以正其罪威明竝用容光之隙無不照雷霆之下無不折無一人而敢隱其情無一地而敢負其固則天下之大四海之廣豐豫而亨通矣中孚之象曰澤上有風中孚君子以議獄緩死程頤曰水體虛故風能入之人心虛故物能感之風之動乎澤猶物之感於中故為中孚之象君子觀其象以議獄與緩死君子之於議獄盡其忠而已於決死極於惻而已故誠意常求於緩緩寬也於天下之事無所不盡其忠而議獄緩死其最大者也朱熹曰風感水受中孚之象議獄緩死中孚之意楊萬里曰風無形而能震川澤鼓幽潜誠無象而能動天地感人物此澤上有風所以為中孚故君子以之議獄緩死蓋好生治民舜之中孚也不犯有司天下之中孚也天下中孚則萬心一心矣鳥巢可窺況豚魚乎無他不殺之心孚於鳥耳使無誠慤好生之心巢中之鳥不為海上之鷗乎議獄者求其入中之出緩死者求其死中之生若元惡大姦不在是典故四凶無議法少正卯無緩理臣按卦象言刑獄者五卦噬嗑賁豐旅中孚也噬嗑賁豐旅皆有離象而噬嗑豐則兼取震賁旅則兼取艮蓋獄以明照為主必先得其情實則刑不濫然非震以動之則無有威斷非艮以止之則輕於用刑惟中孚一卦則有取於巽兌先儒謂中孚體全似離互體有震艮蓋用獄必明以照之使人無隱情震以威之使人無拒意而又當行而行當止而止不過於用其明而恣其威也夫然後兌以議之巽以緩之原情定罪至再至三詳之以十議原之以三宥王聽之司冦聽之三公聽之旬而職聽三旬而職聽三月而上之議而又議緩而又緩求其出而不可得然後入之求其生而不可得然後死之本乎至誠孚信之心存乎至仁惻怛之意在我者有誠心則在人者無遺憾矣聖人作經垂世立教惓惓於刑獄之事不一而足焉如此其知天下後世之憂患而為之慮也深且逺矣書舜典象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉朱熹曰象如天之垂象以示人而典者常也示人以常刑所謂墨劓剕宮大辟五刑之正也所以待夫元惡大憝殺人傷人穿窬淫放凡罪之不可宥者也流宥五刑者流遣之使逺去如下文流放竄殛之類是也宥寬也所以待夫罪之稍輕雖入於五刑而情可矜法可疑與夫親貴勳勞而不可加以刑者則以此而寬之也鞭作官刑者木末垂革官府之刑也撲作教刑者夏楚二物學校之刑也皆以待夫罪之輕者金作贖刑者金黃金贖贖其罪也蓋罪之極輕雖入於鞭撲之刑而情法猶有可議者也此五句者出重入輕各有條理法之正也肆縱也眚災肆赦者眚謂過誤災謂不幸若人有如此而入於刑則又不待流宥金贖而直赦之也賊殺也怙終賊刑者怙謂有恃終謂再犯若人有如此而入於刑則雖當宥當贖亦不許其宥不聽其贖而必刑之也此二句者或由重而即輕或由輕而即重蓋用法之權衡所謂法外意也聖人立法制刑之本末此七言者大略盡之矣雖其輕重取舍陽舒隂慘之不同然欽哉欽哉惟刑之恤之意則未始不行乎其間也蓋其輕重毫釐之間各有攸當者乃天討不易之定理而欽恤之意行乎其間則可以見聖人好生之本心也又曰象以典刑此一句乃五句之綱領諸刑之總括猶今之刑皆結於笞杖徒流絞斬也凡人所犯合墨則加以墨刑所犯合劓則加以劓刑剕宮大辟皆然流宥五刑者其人所犯合此五刑而情輕可恕或因過誤則全其肢體不加刀鋸但流以宥之屏之逺方不與同齒如五流有宅五宅三居之類鞭作官刑者此官府之刑猶今之鞭撻吏人蓋有一項刑專以治官府之胥吏如周禮治胥吏鞭五百鞭三百之類撲作教刑此一項學官之刑猶今之學舍夏楚凡教人之事有不率者則用此刑撲之如侯明撻記之類金作贖刑謂鞭撲二刑之可恕者則許用金以贖其罪夫象以典刑之輕者有流以宥之鞭撲之刑之輕者有金以贖之流宥所以寬五刑贖刑所以寬鞭撲聖人斟酌損益低昻輕重莫不合天理人心之自然而無毫釐秒忽之差也其曰欽哉欽哉惟刑之恤哉者此則聖人畏刑之心閔夫死者之不可復生刑者之不可復續惟恐察之有不審施之有不當又雖已得其情而猶必矜其不教無知而抵冒至此也詳此數言則聖人制刑之意可見而其於輕重淺深出入取舍之際亦已審矣雖其重者或至於誅斬斷割而不少貸然本其所以至此則其所以施於人者亦必嘗有如是之酷矣是以聖人不忍其被酷者銜寃負痛而為是以報之雖若甚慘而語其實則為適得其宜雖以不忍之心畏刑之甚而不得赦也惟其情之輕者聖人於此乃得以施其不忍畏刑之意而有以宥之然亦必投之逺方以禦魑魅蓋以此等所犯非殺傷人則亦或淫或盜其情雖輕而罪實重若使既免於刑而又得還鄉復為平民則彼之被其害者寡妻孤子將何面目以見之而此幸免之人髮膚肢體了無所傷又將得以遂其前日之惡而不悔此所以必曰流以宥之而又有五流有宅五宅三居之文也若夫鞭撲之刑則雖刑之至小而情之輕者亦必許其入金以贖而不忍輒以真刑加之是亦仁矣然而流專以宥肉刑而不下及於鞭撲贖專以待鞭撲而不上及於肉刑則其輕重之間又未嘗不致詳也至於過誤必赦故犯必誅之法則又權衡乎五者之內欽哉欽哉惟刑之恤之㫖則常通貫乎七者之中此聖人制刑明辟之意所以雖或至於殺人而其反覆表裏至精至密之妙一一皆從廣大虛明心中流出而非私智之所為也而或者之論乃謂上古惟有肉刑舜之為流為贖為鞭為撲乃不忍民之斬戮而始為輕刑者則是自堯以上雖犯鞭撲之刑者亦必始從墨劓之坐而舜之心乃不忍於殺傷淫盜之凶賊而反忍於見殺見傷為所侵犯之良民也聖人之心其不如是之殘忍偏倚而失其正亦已明矣臣按舜典此章萬世論刑之祖象以典刑以下七句凡二十八字萬世聖人制刑之常典欽哉欽哉惟刑之恤哉二句凡九字萬世聖人恤刑之常心聖賢之經典其論刑者千言萬語不出乎此帝王之治法其制刑者千條萬貫亦不外乎此後世帝王所當凖則而體法焉者也此章真氏衍義既已載於審治體篇以見德刑輕重之分而此又備詳之者蓋前編言其理所以致其知故宜略此編載其事所以見於行故不得不詳蓋互相備也他倣此帝曰臯陶蠻夷猾亂也夏冦劫人曰冦賊殺人曰賊姦在外曰姦宄在內曰宄汝作士理官也五刑有服服服其罪五服三就五流五等象刑之當宥者有宅五宅三居惟明克允朱熹曰服服其罪也吕刑所謂上服下服是也三就孔氏以為大罪於原野大夫於朝士於市竊恐惟大辟棄之於市宮辟則下蠶室餘刑亦就屏處蓋非死刑不欲使風中其瘡誤而至死聖人之仁也五流五等象刑之當宥者也五宅三居者流雖有五而宅之但為三等之居孔氏以為大罪居於四裔次則九州之外次則千里之外大槩當略近之此因禹之讓而申命之又戒以必當致其明察乃能使刑當罪而人無不信服也臣按惟明則情僞畢知克允則輕重適當非明不足以盡人情不允不足以當人罪帝舜告臯陶而戒之以惟明克允謂之惟者此外别無他術謂之克者如此然後能信大禹謨帝曰臯陶惟兹臣庶罔或干犯也豫正政也汝作士明于五刑以弼輔也五教期于豫治刑期于無刑民協于中時乃功懋哉朱熹曰聖人之治以德為化民之本而刑特以輔其所不及而已期者先事取必之謂舜言惟此臣庶無或有干犯我之政者以爾為士師之官能明五刑以輔五品之教而期我以至於治其始雖不免於用刑而實所以期至於無刑之地故民亦皆能協於中道初無有過不及之差則刑果無所施矣凡此皆汝之功也朱熹又曰法家者流往往常患其過於慘刻今之士大夫恥為法官更相循襲以寬大為事於法之當死者反求以生之殊不知明于五刑以弼五教雖舜亦不免教之不從刑以督之懲一人而天下知所勸戒所謂辟以止辟雖曰殺之而仁愛之實已行乎中今非法以求其生則人無所懲懼陷於法者愈衆雖曰仁之適以害之聖人亦不曽徒用政刑到德禮既行天下既治亦不曽不用政刑故書說刑期于無刑只是存心期於無而刑初非可廢臣按明于五刑以弼五教此萬古聖人制刑之本意也可見刑之制非專用之以治人罪蓋恐世之人不能循夫五倫之教故制刑以輔弼之使其為子皆孝為臣皆忠為兄弟皆友居上者則必慈與人者則必信夫必守義婦必守禮有一不然則入於法而刑辟之所必加也天下之人有見於此其資質之美者有所畏而一於為善氣稟之偏者有所懲而不敢為惡則彜倫為之益叙而刑罰可以不用矣臯陶曰宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心兹用不犯于有司朱熹曰過者不識而誤犯也故者知之而故犯也過誤所犯雖大必宥不忌故犯雖小必刑即上篇所謂眚災肆赦怙終賊刑者也罪已定矣而於法之中有疑其可重可輕者則從輕以罰之功已定矣而於法之中有疑其可輕可重者則從重以賞之辜罪經常也謂法可以殺可以無殺殺之則恐陷於非辜不殺之恐失於輕縱二者皆非聖人至公至平之意而殺不辜者尤聖人之所不忍也故與其殺之而害彼之生寧姑全之而自受失刑之責此其仁愛忠厚之至皆所謂好生之德也蓋聖人之法有盡而心則無窮故其用刑行賞或有所疑則常屈法以伸恩而不使執法之意有以勝其好生之德此其本心所以無所壅遏而得行於常法之外及其流衍洋溢漸涵浸漬有以入於民心則天下之人無不愛慕感悅興起於善而自不犯于有司也朱熹曰觀臯陶所言帝德罔愆以下一節便是聖人之心涵育發生真與天地同德而物或自逆於理以于天誅則夫輕重取舍之間亦自有決然不易之理其宥過非私恩其刑故非私怒罪疑而輕非姑息功疑而重非過豫如天地四時之運寒凉肅殺常居其半而涵養發生之心未始不流行乎其間此所以好生之德洽于民心而自不犯于有司非既抵罪而復縱舍之也夫既不能止民之惡而又為輕刑以誘之使得以肆其凶暴於人而無所忌則不惟彼見暴者無以自伸其寃而姦民之犯于有司者且將日以益衆亦非聖人匡直輔翼使民遷善逺罪之意也臣按好生之德洽于民心此帝舜所以為舜也蓋天地生人而人得以為生是人之生也莫不皆欲其生然彼知己之欲生而不知人之亦莫不欲其生也是以相爭相奪以至於相殺以失其生生之理人君為生人之主體天地之大德為生靈之父母於凡天下之人無不欲其生於凡有生者茍可以為其養生之其者無不為之處置營謀俾之相安相樂以全其生生之天茍於其中有自戕其生而逆其生生之理者則必為之除去此所以有刑法之制焉所以然者無非欲全民之生而已聖人欲全民之生如此一言以蔽之曰好生吁天地之大德曰生聖人之大德曰仁仁者好生之謂也康誥王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式用也爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺蔡沈曰此慎罰也人有小罪非過誤乃其固為亂常之事用意如此其罪雖小乃不可不殺即舜典所謂刑故無小也人有大罪非是故犯乃其過誤出於不幸偶爾如此既自稱道盡輸其情不敢隱匿罪雖大時乃不可殺即舜典所謂宥過無大也諸葛孔明治蜀服罪輸情者雖重必釋其既道極厥辜時乃不可殺之意歟臣按康誥所謂既道極厥辜時乃不可殺一言此後世律文自首者免罪之條所自出也非汝封康叔名刑人殺人無或刑人殺人非汝封三字當在又曰下又曰劓割鼻也刵截耳也人無或劓刵人蔡沈曰刑殺者天之所以討有罪非汝封得以刑之殺之也汝或無以已而刑殺之刑殺刑之大者劓刵刑之小者兼舉小大以申戒之也朱熹曰康叔為周司寇故一篇多說用刑呂氏說非汝封刑人殺人則人亦無敢刑人殺人又曰非汝封劓刵人則人亦無敢劓刵人蓋言用刑之權正在康叔不可不謹之意耳臣按康誥此言可見刑無大小皆上天所以討有罪者也為人上者茍以私意刑戮人則非天討矣一人殺人有限而下之人效之其殺戮滋多為人上者奈何不謹於刑戮上拂天意下失人心皆自此始衰世之君往往任意恣殺享年所以不永國祚所以不長其以此夫王曰汝陳時臬法也為準限之意事罰蔽殷彜用其義宜也刑義殺勿庸以次次舍之次汝封乃汝盡遜順也曰時叙惟曰未有遜事蔡沈曰言敷陳是法與事罰斷以殷之常法矣又慮其泥古而不通又謂其刑其殺必察其宜於時者而後用之既又慮其趨時而狥已又謂刑殺不可以就汝封之意既又慮其刑殺雖已當罪而矜喜之心乘之又謂使汝刑殺盡順於義雖曰是有次叙汝當惟謂未有順義之事蓋矜喜之心生乃怠惰之心起刑罰之所由不中也可不戒哉臣按此武王封康叔於衛告以謹罰之意蓋衛是殷之故都周承殷之後康叔往殷故都而治其遺民故欲其敷陳是刑法之事其有所罰者一斷以前殷之常法矣然殷之刑殺不必皆是也有合義者焉有不合義者焉惟取其合於義者而用之然所謂合義與否又不可專用以就已意也夫既合於義又不徇已則刑罰當其罪矣設使刑殺盡順於義雖曰是有次叙而汝亦惟曰未有順義之事焉蓋刑殺關乎人之性命一人負寃天地為之變色和氣為之感傷人心為之喪失烏可以輕忽哉武王告康叔以雖盡遜而惟曰未遜事蓋欲康叔之心常常不足已遜而猶曰未遜已盡而常如未盡則不敢輕視人命而茍具獄辭則問刑之人與受刑之人兩無所憾焉刑罰無不中者矣人君命臣以治民而欲其慎罰拳拳告教如此為之臣者安敢不盡其心哉立政曰和我庶獄庶慎時則勿有間之又曰繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之又曰今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫蔡沈曰庶獄獄訟也庶慎國之禁戒儲備也和調均齊獄慎之事而又戒其勿以小人間之使得終始其治此任人之要也文子文孫者成王武王之文子文王之文孫也誤失也有所兼有所知不付之有司而以己誤之也正猶康誥所謂正人與宫正酒正之正指當職者為言不以己誤庶獄庶慎惟當職之人是治之又曰始言和我庶獄庶慎時則勿有間之繼言其勿誤于庶獄庶慎惟正是乂之至是獨曰其勿誤于庶獄惟有司之牧夫蓋刑者天下之重事挈其重而獨舉之使成王尤知刑獄之可畏必專有司牧夫之任而不可以己誤之也呂祖謙曰始言庶言庶獄庶慎繼去其一止曰庶獄庶慎又去其一獨曰庶獄蓋挈其尤重獨舉之獄曷為其獨重也民命所繫亦國命所繫也導迎善氣祈天永命者獄也竝告無辜無世在下者亦獄也宜周公獨言而獨戒之臣按先儒謂立政周公說不可誤于庶獄庶慎到此又說獄者蓋獄者天下之命所以文王必明德慎罰收聚人心感召和氣皆是獄離散人心感召乖氣亦是獄大底事最重處只在于獄故三代之得天下只在不嗜殺人秦之所以亡亦只是獄不謹惟是以用獄之際養得一好生之德自此發將去方能盡得君德所謂事最重處只在于獄最為切要人君為治真誠知獄之為重則必調和均齊夫獄慎之事擇人以用而不間以小人委心以用而不誤以己私惟在內之獄專任之以司刑之職在外之獄分命之以牧守之任用命者則申敇之使益䖍違命者則戒約之使不肆非惟不敢誤且不敢兼之也以上總論制刑之義上大學衍義補卷一百
