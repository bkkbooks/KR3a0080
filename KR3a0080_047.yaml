body:
  text: 大學衍義補卷四十七明丘濬撰治國平天下之要明禮樂王朝之禮下儀禮大射之儀君有命戒射宰戒百官有事於射者射人戒諸公卿大夫射司士戒士射與贊者贊佐也謂士佐執事不射者前射三日宰夫戒宰及司馬射人宿視滌臣按宰冢宰天官治卿也將有祭祀之事當射宰告於君君乃命之射人則戒公卿大夫之與射者司士則戒士之為贊佐者前射之三日宰夫則戒冢宰與司馬凡大射則合其六耦而司馬又俾其屬所謂射人者溉滌其禮器及掃除其射宫焉射義曰古者天子以射選諸侯卿大夫士射者男子之事也因而飾之以禮樂也故事之盡禮樂而可數為以立德行者莫若射故聖王務焉鄭玄曰射者男子之事謂生有懸弧之義也方慤曰天子大射則共虎侯熊侯豹侯虎侯則天子所自射也熊侯則助祭諸侯所射也豹侯則卿大夫士所射也射之中否足以觀人之賢不肖故天子以之選人焉以之選人而天子亦自射者以身率之也或先行燕禮或先行鄉飲酒之禮所謂飭之以禮也或以騶虞為節或以貍首為節所謂飭之以樂也古者天子之制諸侯嵗獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭葉夢得曰貢士而擇之助祭者所以示敬而不敢専爵祿也周禮射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面諸侯在朝則皆北面詔相其法若有國事則掌其戒令詔相其事掌其治逹鄭玄曰位將射始入見君之位諸侯來朝王與之射於朝者皆北面從三公位法其禮儀也國事謂若王有祭祀之事諸侯當助其薦獻者也戒令告以齊與期掌其治逹謂諸侯因與王射及助祭而有所治受而逹之於王王有命又受而下之臣按先王於祭祀賓燕之事則必有射方其與諸侯行賓射之禮則國之三公孤卿大夫預焉故射人掌其位也三公北面答君也孤東面佑王也卿大夫西面佐王也大射有士而此士不預者射人所掌乃賓射而大射則選賢與祭也故亦及士焉以射法治射儀王以六耦兩人為耦射三侯熊虎豹三獲執旌而告獲者三容三人容設之以蔽待獲者樂以騶虞以歌為節九節以九為數五正以五采為正鵠諸侯以四耦射二侯二獲二容樂以貍首今詩亡七節三正朱白蒼三色孤卿大夫以三耦射一射麋侯也一獲一容樂以采蘋五節二正朱緑士以三耦射犴胡犬侯一獲一容樂以采繁五節二正與孤卿同陳澔曰節者歌詩以為發矢之節度也一終為一節尊卑之節雖多少不同而四節以盡乘矢則同如騶虞九節則先歌五節以聽餘四節則發四矢也七節者三節先以聽五節者一節先以聽也四詩唯貍首亡臣按先儒有言射者男子之所有事者也天子無事則用之於禮義故有大射賓射之禮所以習容習藝觀德而選士天子有事則用之於戰勝故主皮主力所以禦侮克敵也大射之禮詳見儀禮本文以上大射周禮甸祝掌四時之田春搜夏苗秋獮冬狩表立表以祭貉師祭也與禡同之祝號舍奠于祖廟告祖廟而后田也禰父廟亦如之師甸用師以田致禽于虞中所表之處乃屬禽别其種類及郊饁饋也獸舍奠于祖禰乃斂頒也禽禱禱也牲禱馬禱牲與馬之祭皆掌其祝號臣按四時之田春搜夏苖秋獮冬狩也田者習兵之禮故人君將田立表以祭謂之表貉祭於立表之處無壇壝置甲胄弓矢於神座之側建矟於神座之後告將師田也既田虞人植旗所禡之地以所得之禽各以其類聚之用以饁饋於郊薦於四方羣兆入以釋奠於祖禰告至也斂禽者擇其三十入於臘人以為乾豆備祀享祭焉既而又以所斂之禽祭禱於牲牢之神以求其肥腯祭禱於馬祖之神以求其孔阜由是以觀先王之田其有禮也如此非専為遊畋也迹人主迹知鳥獸之處掌邦田之地政為之厲禁而守之凡田獵者受令焉禁麛鹿子卵者與其毒矢射者鄭玄曰禁麛卵與其毒矢射者為其夭物且害心多也田僕掌馭田路即巾車之木路以田田獵也以鄙巡行郡縣掌佐車田車副二之政設驅謂驅禽使前逆之車令獲者植旌及獻比禽比次其大小之類凡田王提馬而走使人扣而舉其馬諸侯晉使人扣而仰其馬大夫馳放而不扣王安石曰提節之晉進之馳則亟進之尊者安舒卑者速戚臣按古者田獵之禮蓋因之以修武事備牲豆非以恣其殺戮之心以為馳騁之娛也是以三代盛王因之以行禮不得已而為之故必擇僕御之人以掌佐車之政故於王之馬則提之提之者扣舉之使不至於奔逸而傾跌也昔漢武帝好田獵嘗自擊熊豕馳逐野獸司馬相如借楚為諭作賦諷之曰終日馳騁勞神苦形罷車馬之用抗士卒之情費府庫之財而無德厚之恩務在獨樂不顧衆庶忘國家之政貪雉兔之獲仁者不為也其後又上疏諫有曰卒然遇逸材之獸犯屬車之塵輿不及還轅人不暇施巧雖有烏獲逄蒙之技不得用枯木朽株盡為難矣言尤切直詳見前衍義詩序車攻宣王復古也宣王能內修政事外攘夷狄復文武之竟土修車馬備器械復會諸侯於東都因田獵而選車徒焉其第七章詩曰蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈朱熹曰古者田獵獲禽面傷謂當面射之不獻踐音剪毛謂在傍逆射不獻不成禽不獻惡其害細小擇取三等自左膘脅後髀前肉也而射之逹於右腢肩前為上殺以為乾豆奉宗廟逹右耳本者次之以為賓客射右髀股外逹于右􅞞音杳脅也以充君庖每禽取三十焉每等得十其餘以與士大夫習射為澤宫中者取之是以獲雖多而君庖不盈也張子曰饌雖多而無餘者均及於衆而有法耳凡事有法則何患乎不均也臣按宣王中興因田獵以選車徒蓋非為流連荒亡之舉也然又循理守法而不從欲以多取取之而不盡以用焉此所以為王者之事也春秋魯桓公四年春正月公狩于郎胡安國曰戎祀國之大事狩所以講大事也用民以訓軍旅所以示之武而威天下取物以祭宗廟所以示之孝而順天下故中春教振旅遂以搜中夏教苃舍遂以苗中秋教治兵遂以獮中冬教大閲遂以狩然不時則傷農不地則害物如鄭有原圃秦有具囿皆常所也違其常所犯害民物而百姓苦之則將聞車馬之音見羽旄之美舉疾首蹙額而相告可不謹乎以非其地而必書是春秋謹於微之意也每謹於微然後主德全矣臣按古者田獵之禮所以訓軍旅之事為宗廟之祭非以從禽而為樂也然必度間曠之地以為囿而於農隙之時行之蓋恐妨農事傷民業也春秋左傳隱公元年魯臧僖伯曰春搜搜索禽獸之不孕者夏苖為苖除害秋獮順秋氣殺也冬狩圍也皆於農隙以講事也鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也若夫山林川澤之實山林材木樵薪之類川澤菱芡魚鱉之類器用之資所資取以為器用者皂𨽻之事微賤小臣所掌之事官司之守百官有司之守非君所及也臣按僖伯此言蓋謂人君田獵行禮而已而實無所利之王制天子諸侯無事則嵗三田一為乾豆二為賓客三為充君之庖孔穎逹曰無事謂無征伐出行喪凶之事嵗三田謂乾豆以下三事也一為乾豆上殺者也二為賓客中殺者也三充君庖下殺者也臣按乾豆所以奉神賓客所以奉人充庖所以奉己先神而後人先人而後己蓋厚所養而薄所以自養也三田與易言獲三品同義公羊氏以為夏不田非是無事不田曰不敬田不以禮曰暴天物天子不合圍四面圍之也諸侯不掩羣掩襲而舉之也天子殺則下大綏旌旗之屬諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵鄭玄曰合圍掩羣為盡物馬睎孟曰自天子不合圍至百姓田獵此田以禮之事也蓋田所以供祖廟可田而不田則是謂祭無益故曰不敬田雖以殺為尚而殺之中又有禮焉故曰不以禮雖為之詭遇一朝而獲十君子不取也天子勢足以合圍而不合圍諸侯勢足以掩羣而不掩羣此非特田之以禮又示其有愛物之仁也臣按成湯見祝綱者四面皆離其網乃解其三面祝曰欲左者左欲右者右欲髙者髙欲下者下吾取其犯命者其憚害物也如是漢南之國聞之曰湯之德及禽獸矣四十國歸之是時湯猶為諸侯其解三面之網非但不掩羣也愛物之心如此其仁民又何如哉獺祭魚孟春之月然後虞人入澤梁絶水取魚者豺祭獸季秋之月然後田獵鳩化為鷹仲秋之月然後設罻羅捕鳥之網草木零落然後入山林昆蟲未蟄不以火田不麛獸子之通稱不卵不殺胎不夭斷殺之也夭禽獸之稚者不覆巢臣按説者謂此十者皆田之禮順時序廣仁義也臣竊以為此十者非但行禮之時然也古者聖王凡其心之所存耳目之所見聞日用之所飲食用度莫不恆存仁民愛物之心故其於禽獸也見其生不忍見其死聞其聲不忍食其肉魚肉不入廟門鳥獸不成毫毛不登庖厨所以然者蓋以人之於禽獸同生而異類其所以貪生而畏死者亦初與人不異也故聖王之取之也必以其時而用之也必有其節其不忍之心恆因其所及而推至於其所不及此無他體天地好生之心以廣為仁之術也漢賈誼新書曰傳曰春曰搜夏曰苗秋曰獮冬曰狩苖者謂何曰苖毛也取之不圍澤不掩羣取大禽不麛不卵不殺孕重者春搜者不殺小麛及孕重者冬狩皆取之百姓皆出不失其時不抵禽不詭遇逐不出防此苖獮搜狩之義也故苖獮搜狩之禮簡其戎事也故苖者毛取之搜者搜索之狩者守留之夏不田何也天地隂陽盛長之時猛獸不攫鷙鳥不摶蝮蠆不螫鳥獸蟲蛇且知應天而况人乎哉是以古者必有豢牢其謂之畋何聖人舉事必反本五榖者以奉宗廟養萬民也去禽獸害稼穡者故以田言之聖人作名號而事義可知也臣按古者人君一嵗凡四田而於夏則謂之苖説者謂去禽獸之害苖者也蓋禽獸多則傷五榖因習兵事以捕禽獸所以共奉宗廟示不忘武備又因以為除田害取鮮禽以備秋嘗焉後世人主乃有因田獵而踐民之稼穡者豈知古人所以作名號事義哉孟子曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同之民以為小不亦宜乎朱熹曰古者四時之田皆於農隙以講武事然不欲馳騖於稼穡場圃之中故度間曠之地以為囿臣按古之人君設苑囿育鳥獸以為搜田之所蓋因之以講武事備祀牲也有之固不為過但不可多奪民田嚴為厲禁耳以上田獵周禮太史正嵗年以序事頒之于官府及都鄙頒告朔于邦國閏月詔王居門終月鄭玄曰中數曰嵗朔數曰年中朔不齊正之以閏若今時作厯日矣定四時以次序授民時之事臣按先王欽若昊天以作厯上以因天之時下以成人之事或頒于官府或頒于都鄙王國之事時定矣然後頒告朔于邦國朔者以十二月厯及政令若月令之書諸侯受之縣之於中門匝日斂之藏於祖廟月朔用羊告而受行之春秋文公六年閏月不告月猶朝于廟胡安國曰不告月不告朔也不告朔則曷為不言朔也因月之虧盈而置閏是主乎月而有閏也故不言朔而言月占天時則以星授民事則以節候寒暑之至則以氣百官修其政於朝庶民服其事於野則主乎是焉耳矣左傳桓公十七年曰天子有日官諸侯有日御日官居卿以底平也日禮也日御不失日以授百官于朝杜預曰日官日御典厯數者天子掌厯者不在六卿之數而位從卿故言居卿也日官平厯以頒諸侯諸侯奉之不失天時以授百官文公六年閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民鄭玄曰天子頒朔于諸侯諸侯藏之祖廟至朔朝于廟告而奉行之謂之告朔杜預曰經稱告月傳稱告朔明告月必以朔臣按期三百有六旬有六日以閏月定四時成嵗其餘則歸之閏閏非四時之正也而四時不得則不正然嵗時月日蓋有常矣而置閏則無常蓋以一年之內有二十四氣一月二氣皆朔氣在前中氣在後若朔氣在晦則後月當置閏中氣在朔則前月當置閏節氣則有入前月法中氣則無入前月法朔氣匝則為年周禮注所謂朔數曰年是也中氣匝則為嵗周禮注所謂中數曰嵗是也蓋四時漸差則置閏以正之作厯頒布天下使其順時以作事事不失時則嵗獲豐穰家有蓋藏而民生厚矣先王知其然設官以司其事按月以定其朔先期而班其令視朔而行其政所以然者以生民之道於是乎在也不然則是棄時失政矣何以為民哉民者國之所恃以為國者也無以為民則無以為國矣玉藻天子玄端聽朔於南門之外諸侯皮辨聽朔於太廟鄭玄曰南門謂國門也天子明堂在國之陽每月就其時之堂而聽朔焉臣按古者天子每嵗常以季冬頒來嵗十二月之朔每月天子則服玄冕以聽是月之朔於南門之外示受之於天諸侯則服皮辨以聽是月之朔於太廟之中示受之於祖皆原其所自也春秋傳疏曰天子頒朔于諸侯諸侯受之藏於祖廟每月之朔以特牲告廟受而施行之遂聽治此月之政朱熹曰古者天子常以季冬頒來嵗十二月之朔於諸侯諸侯受而藏之祖廟月朔則以特羊告廟請而行之許謙曰古者以竹簡為書蓋十二月作十二簡故每月至朔日告廟請本月之簡而行之朝廷及國中簡上書朔之日辰及節氣臣按厯象日月星辰以授人時自堯以來未之有改也虞書齊七政洪範陳五紀周以馮相氏會天位保章氏辨地域又以太史正嵗年而頒官府都鄙以序事頒邦國以告朔每嵗以季冬頒來嵗十二月之朔於諸侯蓋每月各自為一書先期而頒之於邦國使其至期按月而聽治也春秋之時告朔之禮蓋已不行自罷侯置守之後無復此禮然先期頒厯之令則未嘗廢也我朝每年春二月欽天監官先進來嵗厯樣預頒天下藩服俾其依式印造至十一月朔欽天監官行進厯禮是日天子具皮辨服升奉天殿文武百官朝服侍班監正以下暨天文生四拜訖鴻臚寺官引監正升殿於御前呈進退行四拜禮畢文武百官行四拜禮跪受厯復行四拜禮然後下諸司以所印厯頒布民間以上進厯夏書惟仲康肇位四海羲和廢厥職胤后承王命徂征告于衆曰惟時羲和顚覆厥德沈亂于酒畔官亂其所治之職離次舍其所居之位俶始也擾亂也天紀日月星辰厯數遐棄厥司乃季秋月朔辰日月會次之名弗集于房所次之宿瞽奏鼓嗇夫馳庶人走羲和尸厥官罔聞知昏迷于天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦孔穎逹曰先時謂厯象之法四時節氣弦望晦朔先天時則罪死不赦不及謂厯象後天時雖治其官茍有先後之差則無赦况廢官乎臣按救日之禮夏以前無明文然觀胤征之所以責羲和者則其禮之行其來逺矣且日月之盈虧有常度精厯算者皆能前知也何關於人事而先王必為之恐懼修省而至日又為之救護乎謹天戒而已誠以日者衆陽之宗人君之象於其常也則必寅餞出納敬致其至所以奉若天道也及其有變之時則預行天下百司候其至期行禮由朝廷以至州郡莫不皆然其謹之也至矣雖然謹在天之天而不謹在已之天此孔子所謂人而不仁如禮何也明王克謹天戒者尚自省哉周禮鼓人救日月則詔王鼓鄭玄曰日月食王必親擊鼓者聲大異春秋傳曰非日月之眚不鼓太僕所掌凡軍旅田役贊王鼓救日月亦如之臣按軍旅田役王皆親鼓太僕贊之而日月薄蝕則亦然也鼓有聲舉陽事以厭陽氣王親擊其一而太僕擊其餘以贊佐之春秋莊公二十五年六月辛未朔日有食之鼓用牲于社胡安國曰按禮諸侯旅見天子入門不得終禮者四而日食與焉古者固以是為大變人君所當恐懼修省以答天意而不敢忽也諸侯用幣于社伐鼓于朝退而自責皆恐懼修省以答天意而不敢忽也然則鼓用牲于社何以書譏不鼓于朝而鼓于社又用牲則非禮矣左傳莊公二十五年惟正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝杜預曰正月夏之四月正陽之月也食於正陽之月於是乎用幣于社伐鼓于朝退而自責以明隂不宜侵陽臣不宜掩君以示大義臣按日有薄蝕則伐鼓用幣以救之而此謂正陽之月則然餘則否而胤征日食乃在季秋之月説者謂夏禮與周異臣竊以謂日者正陽之精人君之象日而有薄蝕亦猶君父之有急難也臣子急切之至情夫豈有異時哉穀梁日有食之鼓用牲于社曰鼓禮也用牲非禮也天子救日置五麾旌幡也陳五兵矛戟鉞楯弓矢五鼓臣按日食之禮其來尚矣我朝凡遇日月有食之先期欽天監官推算其時刻秒忽奏聞行下禮部通行天下至期日食文武百官具朝服於禮部行禮月食則行於中軍都督府在外日食行於有司月食行於軍衛遇有隂雲則免以上救護禮記月令孟春之月是月也以立春先立春三日太史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿大夫於朝命相布德和令行慶施惠下及兆民慶賜遂行母有不當孔頴逹曰立春為正月節有在十二月之時云是月者謂十二月之氣不謂是月之日也季冬之月命有司出土牛以送寒氣孔穎逹曰其時月建丑又土能尅水持水之隂氣故特作土牛以畢送寒氣也方慤曰牛土畜又以土為之水用事之極欲勝水者必以土故出是以送寒氣東漢志是月也立土牛六頭於國都郡縣城外丑域以送大寒劉昭曰是月之會建丑丑為牛寒將極故出其物類形象以示送逹之且以升陽臣按後世有進春之禮考於經無所見惟月令有迎氣之説然夏秋冬三孟之月皆有之不止春也後世又有土牛之説而以年月支干為之色復以草為句芒神國朝禮制每遇立春節京尹帥其屬行進春禮是日早朝天子皮辨服升正殿文武百官朝服侍班京尹行四拜禮禮官引京尹升殿跪玉陛前進所塑土牛訖復行四拜禮畢文武百官行慶賀禮是日賜百官春宴以上進春以上論王朝之禮臣按王朝之禮非止於此著其切要者耳其郊廟羣祀則具於祭祀藉田則具於農事養老視學則具於學校鄉飲酒禮則具于郡國之禮大閲之禮則具於嚴武備大學衍義補卷四十七
