body:
  text: 大學衍義補卷七十一明丘濬撰治國平天下之要崇教化明道學以成教上周易乾九二君子學以聚之問以辨之寛以居之仁以行之程頤曰學聚問辨進徳也寛居仁行修業也眞德秀曰乾天徳也聖人之事也猶必學以成之學之不可己者如是九二曰庸徳之行庸言之謹閑邪存其誠善世而不伐徳博而化九三曰知至至之可與幾也知終終之可與存義也皆學之事也臣按大人之所以為大人者以其徳業之盛也學者未至於大人之地欲希之者當何如亦惟進徳修業而已矣忠信所以進徳也修辭立其誠所以居業也學以聚之問以辨之則徳之進者日以崇寛以居之仁以行之則業之修者日以廣夫然則九二大人之地亦可以企而及之矣然則用功之要何先曰誠而已忠信誠也修辭以立其誠誠即忠信也誠乎誠乎其進徳修業之本乎蒙之彖曰䝉以養正聖功也程頤曰未發之謂蒙以純一未發之䝉而養其正乃作聖之功也發而後禁則扞格而難勝養正於䝉學之至善也朱熹曰䝉以養正乃作聖之功張栻曰孟子曰大人者不失其赤子之心者也蓋童稚之時純一不雜人欲未起天理實存謂之大人者守此而已謂之小人者失此而已人於是時保䕶養育則虛靜純白渾然天成施為動作酬酢進退皆天理也非作聖之功起於此乎臣按學記云禁于未發之謂豫發然後禁則扞格而不勝是以聖人施教必於童蒙之時是以商之三風十愆先具訓于蒙士周之正事彞酒豫誥教於小子穆王以聽言格命告於幼子童孫蓋與此養䝉同一意也方人之幼也欲念未熾情竇未開其本然之性得於天者猶純全不昧故教之者易入而其所受之教亦堅久而不忘此養之所以貴於豫而正不正則又莫若弗教之聽其自然而自有之也然則所以養之以正者若何朱熹感興詩曰童䝉貴養正遜弟乃其方雞鳴咸盥櫛問訊謹暄涼奉水勤播洒擁篲周室堂進趨極虔恭退息常端莊劬書劇嗜炙見惡逾探湯庸言戒粗誕時行必安詳聖途雖云逺發軔且勿忙十五志於學及時起高翔大畜之象曰天在山中大畜君子以多識前言往行以畜其徳程頤曰天為至大而在山之中所畜至大之象君子觀象以大其蘊畜人之蘊畜由學而大在多聞前古聖賢之言與行考跡以觀其用察言以求其心識而得之以畜成其徳乃大畜之義也魏了翁曰天在山中譬則心之體也聞一言焉見一行焉審問而謹思明辨而篤行即所以畜其心之徳蓋畜故乃所以養新而新非自外至也昭昭之多止於所不見是以愈畜而愈大臣按程氏言人之蘊畜由學而大此蓋就卦象言之以徳言也若以學言之則人之為學亦必由藴畜而後大焉為學者苟顓顓於一藝一能則其學局而小矣故於凡天地之大古今之變事物之理聖賢言行之懿無一而不藴畜於心然後其學大焉朱子曰學者必自知識入易曰多識大學曰致知此為學之先務也商書說命曰學于古訓乃有獲蔡沈曰古訓者古先聖王之訓載修身治天下之道二典三謨之類是也學古訓深識義理然後有得又曰惟學遜謙抑也志務專力也時敏無時而不敏厥脩乃來蔡沈曰遜其志如有所不能敏于學如有所不及虚以受人勤以勵己則其所脩如泉始達源源乎其來矣又曰惟斆學半念終始典于學厥徳脩罔覺蔡沈曰斆教也言教人居學之半蓋道積厥躬者體之立斆學於人者用之行兼體用合内外而後聖學可全也始之自學學也終之教人亦學也一念終始常在於學無少間斷則徳之所脩有不知其然而然者矣臣按學之一言前此未有言者而傅說首以告高宗說之言雖以告當時之君然萬世之下學者之所以為學與其所以為教上下可通用也眞氏既以全章載之帝王為學之條今摘此數語以示後世之斆學者云詩敬之日就月將學有緝熙于光明朱熹曰成王受羣臣之戒而述其言曰敬之哉敬之哉乃自為答之之言曰我不聰而未能敬也然願學焉庶幾日有所就月有所進續而明之以至於光明也臣按眞徳秀謂玩此二語則成王用力於學者可知矣高宗成王皆王者之學然大學之道自天子至於庶人一而已矣高宗之學曰遜志曰時敏成王之學曰就將曰緝熙學者而不由此未有能進者也噫高宗成王皆萬乘之君且務學如此學者可不知所勉乎論語子曰學而時習之不亦說喜意乎有朋自逺方來不亦樂乎人不知而不愠不亦君子乎朱熹曰學之為言效也人性皆善而覺有先後後覺者必效先覺之所為乃可以明善而復其初也習鳥數飛也學之不已如鳥數飛也既學而又時時習之則所學者熟而中心喜說其進自不能已矣自逺方來則近者可知愠含怒意君子成徳之名及人而樂者順而易不知而不慍者逆而難故惟成徳者能之然徳之所以成亦曰學之正習之熟說之深而不已焉耳王逢曰學習兼大學小學而言明善而復初是大學明明徳之事朋來而以善及人是新民之事不知不愠而成君子是止至善之事也臣按天下之理二善與惡而已矣所貴乎學者以其能明其善以復其本然之初以為君子而不流於惡以為小人孔子教人拳拳以君子小人竝言而屢道之門人記其言以為論語開卷即以君子託其始至其末也又以君子結其終焉以見聖人之教無非欲人明其善以去其惡存乎公以絶乎私篤乎義而不喻於利以為君子所以然者欲其復其本然之善成其固有之徳也使斯世之人人人有君子之行而不流於小人之歸則天下成比屋可封之俗矣子曰弟子入則孝善事父母出則弟善事兄長謹行之有常而信言之有實汎廣也愛衆謂衆人而親近也仁行有餘力則以學文謂詩書六藝之文程頤曰為弟子之職力有餘則學文不修其職而先文非為己之學也尹焞曰徳行本也文藝末也窮其本末知所先後可以入徳矣朱熹曰洪氏謂未有餘力而學文則文滅其質有餘力而不學文則質勝而野愚謂力行而不學文則無以考聖賢之成法識事理之當然而所行或出於私意非但失之於野而已臣按聖人之言貫徹上下先儒謂此章雖言為弟子之職始學者之事然充而極之為賢為聖亦不外是凡聖人之言無不然者豈但此章哉子曰君子不重則不威學則不固主忠信無友不如己者過則勿憚改程頤曰君子自修之道當如是也游酢曰君子之道以威重為質而學以成之學之道必以忠信為主而以勝已者輔之然或吝於改過則終無以入徳而賢者亦未必樂告以善道故以過勿憚改終焉張栻曰重者嚴於外者也忠信者存乎中者也存乎中所以制其外嚴於外所以保其中也而資友以輔之改過以成之君子之學不越於是而已矣臣按此章程頤謂自修之道當如是而張栻謂君子之學不越於是則孔門之教學者其用功親切之要有在於此所當盡心者也子曰學而不思則罔思而不學則殆朱熹曰不求諸心故昏而無得不習其事故危而不安張栻曰自洒掃應對進退而往無非學也然徒學而不能思則無所發明罔然而已思者研窮其理之所以然徒思而不務學則無可據之地危殆不安矣學而思則徳益崇思而學則業益廣蓋其所學乃其思之所形而其所思即其學之所存也用功若此内外進矣臣按學而思思而學為學之道不外是矣子曰溫尋繹也故而知新可以為師矣朱熹曰故者舊所聞新者今所得言學能時習舊聞而每有新得則所學在我而其應不窮故可以為人師若夫記問之學則無得於心而所知有限故學記譏其不足以為人師正與此意互相發也臣按學記謂記問之學不足以為人師而此則云温故知新可以為師可云者明未至此者不可以為師非以為能如是則為師有餘也若夫不足之云者非但不可且不足矣不足者有餘之對也子曰中人以上可以語告也上也中人以下不可以語上也朱熹曰言教人者當隨其高下而告語之則其言易入而無躐等之弊也張栻曰聖人之道精粗雖無二致但其施教則必因其材而篤焉蓋中人以下之質驟而語之太高非惟不能以入且將妄意躐等而有不切於身之弊亦終於下而已矣故就其所及而語之是乃所以使之切問近思而漸進於高逺也子曰君子博學於文約之以禮亦可以弗畔矣夫顏淵曰夫子循循然善誘人博我以文約我以禮子思曰博學之審問之愼思之明辨之篤行之孟子曰博學而詳說之將以反說約也臣按孔門之教知行二者而己博學於文約之以禮孔門之教也博我以文約我以禮顏子受孔子之教以為學也子思所謂博學而繼之以問思辨而篤於行孟子謂博學詳說而反之以約皆是理也三千之徒莫不聞其師說而顏子獨以為已有而謂之博我約我則似孔子專為顏子設此教也嗚呼此孔子所以善誘而顏子所以好學也歟曾子之作大學格物致知而后誠意正心子思得於曾子孟子得於子思一知行之外無餘法焉周程張朱之學皆不外此而陸九淵者乃注心於茫昧而外此以為學是果聖人之學哉子曰德之不脩學之不講聞義不能徙不善不能改是吾憂也尹焞曰徳必脩而後成學必講而後明見善能徙改過不吝此四者日新之要也茍未能之聖人猶憂况學者乎子曰志於道據於德依於仁游於藝朱熹曰志者心之所之之謂道則人倫日用之間所當行者是也知此而心必之焉則所適者正而無他岐之惑矣據者執守之意德則行道而有得於心者也得之於心而守之不失則終始惟一而有日新之功矣依者不違之謂仁則私欲盡去而心德之全也工夫至此而無終食之違則存養之熟無適而非天理之流行矣游者玩物適情之謂藝則禮樂之文射御書數之法皆至理所寓而日用之不可闕者也朝夕游焉以博其義理之趣則應務有餘而心亦無所放矣此章言人之為學當如是也蓋學莫先於立志志道則心存於正而不他據徳則道得於心而不失依仁則徳性常用而物欲不行游藝則小物不遺而動息有養學者於此有以不失其先後之序輕重之倫焉則本末兼該内外交養日用之間無少間隙而涵泳從容忽不自知其入於聖賢之域矣子曰不憤不啓不悱不發舉一隅不以三隅反則不復也程頤曰憤悱誠意之見於色辭者也待其誠至而後告之既告之又必待其自得乃復告爾又曰不待憤悱而發則知之不能堅固待其憤悱而後發則沛然矣朱熹曰憤者心求通而未得之意悱者口欲言而未能之貌啓謂開其意發謂達其辭物之有四隅者舉一可知其三反者還以相證之義復再告也上章已言聖人誨人不倦之意因并記此欲學者勉於用力以為受教之地也子以四教文行忠信程頤曰教人以學文修行而存忠信也忠信本也金履祥曰文行忠信此夫子教人先後淺深之序也文者詩書六藝之文所以考聖賢之成法識事理之當然蓋先教以知之也知而後能行知之固將以行之也故進之於行既知之又能行之矣然存心之未實則知或務於誇博而行或出於矯偽安保其久而不變故又進之以忠信忠信皆實也分而言之則忠發於心而信周於外程子謂發已自盡為忠循物無違謂信天下固有存心忠實而於事物未能盡循而無違者故又以信終之至於信則事事皆得其實而用無不當矣此夫子教人先後淺深之序有四節也子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已朱熹曰孔子言後生年富力彊足以積學而有待其勢可畏安知其將來不如我之今日乎然或不能自勉至於老而無聞則不足畏矣言此以警人使及時勉學也曾子曰五十而不以善聞則不聞矣蓋述此意張栻曰後生可畏以其進之不可量也然茍至四十五十於道無所聞則其不能激昂自進可知因循至是則無足畏者矣辭氣抑揚之間學者所宜深味也雖然有至於四十五十而知好學如中庸所謂困知勉行者聖人猶有望焉若後生雖有美質而悠悠歳月則夫所謂四十五十將轉盼而至可不懼哉子曰古之學者為己今之學者為人程頤曰為己欲得之於己也為人欲見知於人也朱熹曰聖賢論學者用心得失之際其說多矣然未有如此言之切而要者於此明辨而日省之則庶乎其不昧於所從矣又曰大抵以學者而視天下之事以為已事之所當然而為之則雖甲兵錢穀籩豆有司之事皆為己也以其可以求知於世而為之則雖割股廬墓敝車羸馬亦為人耳學古箴曰相告先民學以為己今也不然為人而已為己之學先成其身君臣之義父子之仁聚辨居行無怠無忽至足之餘澤及萬物為人之學燁然春華誦數是力纂組是夸結駟懐金煌煌煒煒世俗之榮君子之鄙惟是二者其端則微眇綿弗察胡越其歸臣按所引論語孔子之言凡其所言以示學者皆所以為教也學者本之以為學教者本之以為教聖賢同歸矣子夏曰百工居肆謂官府造作之處以成其事君子學以致極也其道朱熹曰工不居肆則遷於異物而業不精君子不學則奪於外誘而志不篤尹氏曰學所以致其道也百工居肆必務成其事君子之於學可不知所務哉二說相須其義始備臣按百工居肆方能成其事君子學方可以致其道然今之士子羣然居學校中博奕飲酒議論州縣長短官政得失其稍循理者亦惟飽食安閒以度歲月畢竟成何事哉惟積日待時以需次出身而已其有向學者亦多不務正學而學為異端小術中有一人焉學正學矣而又多一暴十寒半塗而廢而功虧一簣者亦或有之學之不以道而不能致其極皆所謂自暴自棄之徒也此最今日士子之病宜痛禁之大學之道在明明德在親親當作新民在止於至善古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平自天子以至於庶人壹是皆以脩身為本朱熹曰大學者大人之學也明明之也明德者人之所得乎天而虛靈不昧以具衆理而應萬事者也但為氣稟所拘物欲所蔽則有時而昏然其本體之明則有未嘗息者故學者當因其所發而遂明之以復其初也新者革其舊之謂也言既自明其明徳又當推以及人使之亦有以去其舊染之汚也止者必至於是而不遷之意至善則事理當然之極也言明明徳新民皆當止於至善之地而不遷蓋必其有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也明明徳於天下者使天下之人皆有以明其明徳也心者身之所主也誠實也意者心之所發也實其心之所發欲其必自慊而無自欺也致推極也知猶識也推極吾之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也物格者物理之極處無不到也知至者吾心之所知無不盡也知既盡則意可得而實矣意既實則心可得而正矣脩身以上明明徳之事也齊家以下新民之事也壹是一切也正心以上皆所以脩身也齊家以下則舉此而措之耳臣按儒者之學不出乎大學一書所謂三綱領八條目也外有以極其規模之大内有以盡其節目之詳凡夫所謂三綱五常六紀三統五禮六樂盡天下義理皆不出乎此道凡夫所謂六經十九史諸子百家盡天下經典皆不出乎此書儒者之道至於是而止無俟他求也聖賢之所以教士子之所以學帝王之所以治撮凡舉要皆在此矣蓋學至於平天下而天下平學問之功於是乎極聖賢之能事於是乎畢矣此儒者之道所以大而實而異乎異端之小而虚歟或者乃求聖道於渺茫之外而高談性命與異端較其是非烏知所謂大學之道哉以上明道學以成教上大學衍義補卷七十一
