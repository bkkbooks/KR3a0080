body:
  text: 大學衍義補卷一百四十七明丘濬撰治國平天下之要馭外蕃征討綏和之義下左傳襄公四年晉悼公曰然則莫如和戎乎魏絳曰和戎有五利焉戎狄荐草也居狄人逐水草而居貴貨易輕也土土可賈焉一也邊鄙不聳民狎習也其野穡人成功二也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓壞也四也鑒于后羿而用德度逺至邇安五也君其圖之公說使魏絳盟諸戎臣按此後世和戎之始襄公十一年鄭人賂晉侯以歌鐘二肆列也及其鏄磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也臣按魏絳所和之戎戎而入居中國者也而後世所和之戎則是化外之人處荒漠不毛之地者也漢高祖八年胸奴數苦北邊帝患之劉敬曰天下初定士卒罷與疲同於兵未可以武服也冒頓弒父代立妻羣母以力為威未可以仁義說也獨可以計久逺子孫為臣耳陛下誠以適長公主妻之彼必慕以為閼氏生子必為太子嵗時問遺諭以禮節冒頓在固為子壻死則外孫為單于可無戰以漸臣也帝曰善欲遣長公主吕后不可乃取家人子名為長公主以妻單于使劉敬往結和親約司馬光曰劉敬謂冒頓殘賊不可以仁義說而欲與為婚姻何前後之相違也帝王之御外國服則懷之以德叛則震之以威未聞與為昏姻也臣按齊景公一列國之諸侯也畏吳之强不得已而以女女去吳吳泰伯之後周之同姓固在九州之域中也景公猶且為之涕泣焉堂堂中朝奄有四海之大土宇之廣甲兵之强人士之衆乃至無䇿以禦外侮而與之通昏姻嗚呼景公不得已而為之髙帝則可以已而不已焉夫以創業之君任百戰之將馭戎豈無他䇿而必割所愛以遺所惡哉蓋髙帝因劉敬之言劉敬本魏絳之說後遂祖之以為馭戎上䇿夫以閨門窈窕之姿為殊族異鄉之配田舍翁溺所愛者尚不忍也孰謂英雄之主如漢髙祖唐太宗者乃忍為之哉蓋其慕割愛為民之名而不明內外之分人倫之理故也文帝遣陸賈使南越賜其王他書曰朕髙皇帝側室之子也棄外奉北藩于代道里遙逺壅蔽朴愚未嘗致書髙皇帝棄羣臣孝惠皇帝即世髙后自臨事不幸有疾諸吕為變賴功臣之力誅之已畢朕以王侯吏不釋之故不得不立乃者聞王遺將軍隆慮侯書求親昆弟請罷長沙兩將軍朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問修治先人冢前日聞王發兵於邊為寇不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也得王之地不足以為大得王之財不足以為富服領以南王自治之雖然王之號為帝兩帝並立亡與無同一乘之使以通其道是爭也爭而不讓仁者不為也願與王分棄前惡終今以來通使如故賈至南越他恐頓首謝罪願明詔長為藩臣奉貢職胡寅曰賢哉文帝之不欺也實言之於德無損而聽者心說而誠服矣或者夸大其辭侈耀其事假於符䜟託於怪神欲以讋厭肅衆而不知虛誕之可愧也易曰謙尊而光卑不可踰文帝有焉臣按天下道理最大且真者誠而已是誠也可以感天地格鬼神洞金石孚禽魚南越亦人也孰謂不可以誠感乎誠之謂言真實無妄之謂也真則無僞實則無虛無妄則誠矣觀漢文帝賜尉他書自言其為側室子而又言高后自臨事諸吕為變非但言其身之所自出而國家不幸之變故亦併及之千載之下讀之猶使人心悅而誠服況同時之人素不知其故者一旦得而聞之寧能不感動其心乎後世帝王惟我聖祖開國之初所降詔書與文帝不約而同一則曰朕本淮右小民二則曰朕本淮右布衣其言不一而足中庸謂惟天下至誠可以參天地贊化育區區小醜固在其化育之中矣文帝時賈誼上疏曰胸奴侮嫚侵掠而漢歲致金絮采繒以奉之玩細娛而不圖大患非所以為安也欲試屬國施五餌三表以係單于顔師古曰愛人之壯好人之技仁道也信為大操常義也愛好有實已諾可期十死一生彼將必至此三表也賜之盛服車乘以壞其目賜之盛食珍味以壞其口賜之音樂婦人以壞其耳賜之髙堂邃宇倉庫奴婢以壞其腹於來降者上召幸之相娛樂親酌手食之以壞其心此五餌也臣按或問朱子曰五餌之說何如曰伊川言宋朝正用此術契丹分明是被金帛買住了彼分明是遭餌但恐金帛盡則復來觀此說則昔人謂誼為迂誼豈迂者哉蓋用兵則利在臣下不用兵而和則利歸其主此所以樂從也宋富弼說契丹以歲幣亦是此意雖然金帛出於民國家既竭民力以養兵而又使出財以為賂金帛有時而竭而彼之貪叨無已一旦無以應其求則兵端起矣宋人之於契丹女真可見也已此君子作事所以貴乎謀始而必思為可繼也邪武帝建元六年胸奴來請和親天子下其議王恢燕人習胡事曰胸奴和親不過數嵗即復倍約不如勿許興兵擊之韓安國曰胸奴遷徙鳥舉難得而制今行數千里與之爭利則人馬疲乏虜以全制其敝此危道也不如和親羣臣議者多附安國於是許之臣按胸奴求和親割所愛而與之固不可而又假以家人子與之則是待之不以誠也尤不可若夫彼不曽侵我也而興兵擊之則曲在我直在彼可不可乎方其彼之有求也則正辭以拒之曰中國女子不習外國水土而又多病況人生修短不常而女子性質不定或反因之以成釁隙不若各守疆界敦禮義之為久長也如此復之非獨善為之辭理亦當如是也宣帝時議者多曰胸奴為害日久可因其壞亂舉兵滅之詔問御史大夫蕭望之對曰春秋晉士丐帥師侵齊聞齊侯卒引師而還君子大其不伐喪以為恩足以服孝子誼足以動諸侯前單于慕化鄉善遣使請求和親海內欣然夷狄莫不聞不幸為賊臣所殺今而伐之是乘亂而幸災也彼必奔走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂蒙恩得復其位必稱臣服從此德之盛也上從其議成帝河平二年胸奴遣右臯林王伊邪莫演奉獻罷歸自言欲降即不受我我自殺終不敢還使者以聞下公卿議議者或言宜如故事受其降谷永杜欽以為漢興胸奴數為邊害故設金爵之賞以待降者今單于稱臣朝賀無有二心接之宜異於往時今既享其聘貢之質更受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立欲委身中國未知利害使之詐降以卜吉凶受之虧德沮善令單于自疏不親邊吏或者設為反間欲因而生隙受之適合其䇿使得歸曲而責直此誠邊境安危之原師旅動靜之首不可不詳也不如不受以明日月之信抑詐諼之謀懷附親之心便臣按谷永杜欽此議得帝王誠信之道後世邊夷來貢而降有與此事相同者宜準此以為法光武建武二十八年北胸奴遣使貢馬及裘更乞和親并請音樂又求率西域諸國胡客俱獻見帝下三府議酬答之宜司徒掾班彪曰臣聞孝宣帝敕邊守尉曰胸奴大國多變詐交接得其情則卻敵折衝應對失其數則反為輕欺今北胸奴見南單于來附懼謀其國故數乞和親又逺驅牛馬與漢合市重遣名王多所貢獻斯皆外示富彊以相欺誕也臣見其獻益重知其國益虛歸親愈數為懼愈多然今既未能助南則亦未宜絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當報答之辭令必有所適臣按孔子言不逆詐不億不信抑亦先覺之為賢班彪之處北胸奴蓋有得於先覺之道者矣其所立藁草委曲明盡可為後世代言者法班固曰和親之論發於劉敬是時天下初定新遭平城之難故從其言約結和親賂遺單于以救安邊境孝惠髙后時遵而不違胸奴冦盜不為衰止而單于反以加驕倨逮至孝文與通關市妻以漢女增厚其賂嵗以千金而胸奴數背約束邊境屢被其害是以文帝中年赫然發憤遂躬戎服親御鞍馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論將帥喟然嘆息思古名臣此則和親無益已然之明效也仲舒親見四世之事猶欲復守舊文頗增其約以為義動君子利動貪人如胸奴者非可以仁義說也獨可以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以纍其心胸奴雖欲輾轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約而使邊城守境之民父母緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事乃知其未合於當時而有闕於後世也當孝武時雖征伐克復而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里胸奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以愛子而為質哉此不合當時之言也若不置質空約和親是襲孝文既往之悔而長胸奴無已之詐也夫邊境不選守境武略之臣修障隧備禦之具厲長㦸徑弩之械恃吾所以待邊冦而務賦斂於民逺行貨賂割剝百姓以奉冦讐信甘言守空約而幾胡馬之不窺不已過乎夫規事建議不圖萬世之利而偷恃一時之事者未可以經逺也臣按班固引董仲舒之言和親謂其不圖萬世之利而偷恃一時之事斷之曰仲舒之言漏信乎其漏也仲舒此言蓋與賈生五餌之說略同其言與之厚利和親後世亦有用之以餌禍息爭者矣然而無益焉唐人之遣公主宋人之納歲幣徒費民財損國威其後效果何如也後之人尚鑒之哉魏毌丘儉為安定太守將之官魏公操戒之曰羌胡欲與中國通自當遣人來慎勿遣人往善人難得必將教羌胡妄有所請求因欲以自利不從便為失異俗意從之則無益事興至遣校尉范陵至羌中陵果教羌使自請為屬國都尉公曰吾預知當爾蓋經事多耳臣按曹操謂羌欲與中國通自當遣人來慎勿遣人往此誠練逹事體之語也蓋中國之與外域疆域殊隔無事時正不必屑屑相與通往來也非甚不得已決不可以通使必不得已須擇其人不得其人寧受其責而不輕啓其途是何也善人之難得也彼不善之小人昧於大體惟顧目前理之可行與否事之可繼與否皆不暇計往往順適敵情以為身利假上㫖以許豫教敵人以請求啓其所未知逄其所欲為允其所不可必得既而不副其意因而啓釁端開邊隙者皆此輩為之也然其中固有怵於利害茍逭一時者而亦有反假敵勢以為身榮利如范陵者曹公為此言自謂其經事多豈不信哉萬一國家不得已與外國通使須審擇其人必知禮義有氣節通古今識事體者然後遣之不可專用武辨而必兼之文士不可專任邊吏而必主之廷臣唐文宗太和五年吐蕃維州副使悉怛謀請降盡帥其衆奔成都李德裕遣兵據其城具奏其狀事下尚書省集百官議皆請如德裕䇿牛僧孺曰吐蕃之境四靣各萬里失一維州未能損其勢比來修好約罷戍兵中國禦戎守信為上彼若來責曰何事失信養馬蔚茹川上平涼坂萬騎綴回中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之徒棄誠信有害無利此匹夫所不為況天子乎上以為然詔德裕以其城及悉怛謀等悉歸之吐蕃吐蕃誅之於境上極其慘酷至武宗朝德裕為相言維州據髙山絶頂三靣臨江在戎人平川之衝是漢地入兵之路初河隴盡沒惟此獨存吐蕃以計陷之號曰無憂城從此得以併力西邊憑陵近甸韋臯欲經略河湟須此城為始急攻數年卒不可克臣到西蜀空壁來歸南變震懾山西八國皆願內屬可減八處鎮兵坐收千餘里舊地且維州未降前一年吐蕃猶圍魯州豈顧盟約當時不與臣者望風疾臣詔臣執送悉怛謀等令彼自戮臣纍表陳論乞垂矜捨答詔嚴切竟令執還將吏對臣無不隕涕蕃帥即以此人戮於境上絶忠欵之路快凶虐之情乞追奬忠魂各加褒贈悉怛謀右衛將軍司馬光曰論者多疑維州之取舍不能決牛李之是非臣以為唐新與吐蕃修好而納其維州以利言之則維州小而信大以害言之則維州緩而關中急然則為唐計者宜何先乎悉怛謀在唐則為向化在吐蕃不免為叛臣其受誅也又何矜焉且德裕所言者利也僧孺所言者義也匹夫徇利而忘義人猶恥之况天子乎譬如鄰人有牛逸而入於家或勸其兄歸之或勸其弟攘之勸歸者曰攘之不義也且致訟勸攘者曰彼嘗攘吾羊矣何義之拘牛大畜也鬻之可以富家以是觀之牛李之是非可見矣胡寅曰司馬公之言過矣使維州本非唐地既與之和棄而不取姑守信約可耳本唐之地為吐蕃所侵乃欲守區區之信舉險要而棄之可乎僧孺所謂三日至咸陽特以大言怖文宗非事實也夫奪吾之地而約以盟此正蒲人所以要孔子者不可謂之信也取我故地乃義所當為司馬公不以義斷之而以利害為言又斥德裕為利僧孺為義是皆無所據矣故以維州歸吐蕃棄祖宗土宇縛送悉怛謀沮歸附之心僧孺以小信妨大計也下維州遣兵據之洗數十年之耻追奬悉怛謀贈以官秩德裕以大義謀國事也此二人是非之辨也臣按維州悉怛謀之事司馬氏是僧孺胡氏是德裕其所論者牛李二人已然之是非也臣請就其未然者而為之處置焉夫德裕初得悉怛謀之通款即密以其事聞之朝廷且致書宰執俟報下而行焉報可則行不可則姑已之以待機會之來如此則不失歸附之心而貽之禍患且亦不起邊釁矣不然若其人既歸其地已為吾所據業已如此不待其請即明言告諭之歸其地而不豫其人則彼感吾恩信而歸附之人亦不遭慘毒矣由是觀之二人者皆有失也德裕之失在於急功名僧孺之失在於報私怨就二人之中而言則急功名者猶為彼善於此也嗚呼假國家之事以行其私其於私計得矣如公義何范仲淹議和守攻備四䇿其和䇿曰元昊未嘗挫衄而輒求通順實圖休息所獲者大利所屈者虛稱然干請多端姦謀未測國家以生靈為念不可不納如唐髙祖太宗應天順人百戰百勝猶屈於突厥當彼主始亡為之舉哀廢朝三日遣百僚詣館弔其來使其屈禮之之甚也又太宗驅六騎於渭上見頡利與語復親與之盟頡利既退左右勸擊之太宗不從此盛王之謀也陛下如唐髙祖太宗隆禮謹信以盟好為權宜選將厲兵以攻守為實事彼不背盟我則撫納無倦彼將負德我則攻守皆宜如此結好之䇿未有失也臣按仲淹所謂隆禮謹信以盟好為權宜選將厲兵以攻守為實事後世不得已而與和親者當以此言為權度以上征討綏和之義臣按昔人謂戰守和皆應敵之具而非制敵之本制敵之本乃在夫可以戰可以守可以和何者此實其腹心而運夫四肢之道也蓋盡吾所以治中國者則戰之中有守有和守之中有和有戰和之中亦有戰有守如環無端迭相為用其變不同則其所以應之者亦不一要令制敵在我而其力常有餘欲戰則為唐太宗欲守則為漢光武欲和則為漢文帝如斯而已茍惟先外而後內執一而廢二以鏖兵為戰以畫地為守以解弛為和則以戰乃秦氏隋氏之戰守乃朱梁之守而其和乃石晉之和矣由是觀之則知戰守和之三言者古今制馭外國之道不出乎此矣漢人所謂治戎三䇿者皆在焉然就其三者而言之上䇿莫如守守而彼侵軼要求不已然後量彼己審時勢或與之戰或與之和所以戰者以固吾守非利其有而侵之所以和者以安吾守非畏其彊而屈之是故戰而彼吾服吾亦不忘戰而一於守和而彼吾孚吾亦不忘戰而一於守戰也守也和也皆應敵之具而所以用之以制敵者在因其勢隨其機應其變可以戰可以無戰可以和可以無和其運用在吾之一心然要其歸止於守吾之封疆而已是則三者之中則又以守為本焉大學衍義補卷一百四十七
