body:
  text: 大學衍義補卷一百五十二明丘濬撰治國平天下之要馭外蕃列屯遣戍之制詩序采薇遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還杕杜以勤歸也程頥曰毒民而不由其上則人懷敵愾之心矣又曰古者戍役兩期而還今年春暮行明年夏代者至復留備秋至過十一月而歸又明年中仲同春至春暮遣次戍者每秋與冬初兩番戍者皆在疆圉如今之防秋也熊禾曰北部畏暑耐寒又秋氣折膠則弓弩可用故秋冬易為侵暴每留屯以防臣按程頥前所言者萬世為民用兵之大義後所言者萬世遣戍留屯之常制秦始皇既并天下北築長城四十餘萬南戍五嶺五十餘萬驪山阿房之役各七十餘萬兵不足用而後發謫矣其後里門之左一切發之鼂錯曰秦時北攻胡貉築塞河上南攻楊粵置戍卒焉夫胡貉之地積隂之處也木皮三寸冰厚六尺食肉而飲酪其人密理鳥獸毳細也毛其性能耐同寒揚粵之地少隂多陽其人疏理鳥獸希毛其性能暑秦之戍卒不能其水土戍者死於邊輸者僨疲也於道秦民見行如往棄市因以謫發之名曰謫戍先發吏有謫及贅壻賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後又閭取其左發之不願行者深怨有背畔之心凡民守戰至死而不降北謂敗退者以計為之也故戰勝守固則有拜爵之賞攻城屠邑則得其財物以富家室則能使其衆蒙矢石赴湯火視死如生今秦之發卒也有萬死之害而亡銖兩之報死事之後不得一算之復復除也天下明知禍烈及己也陳勝行戍至於大澤為天下先倡天下從之如流水者秦以威劫而得之之弊也易祓曰始皇既并天下北築長城南戍五嶺又有驪山阿房之役兵不足用乃至發謫先發弛刑之類次發賈人之類次發治獄不直者之類次隱宫刑徒者次以嘗有市籍者又其次則大父母父母嘗有市籍者先發里門之左名閭左之戍未及發右而二世立復調材士五萬以衛咸陽民不聊生天下騷動而勝廣起矣臣按三代之遣戍役不得已而遣之反覆開諭既憫其私情復陳之以公義蓋以仁義而行之也秦人則不然以威劫而行之而已則行者豈能得其心而使之效其力哉錯謂凡民守戰至死而不降北者以計為之也戰勝守固則有拜爵之賞攻城屠邑則得其財物以富其家室故能使其衆蒙矢石赴湯火視死如生則以功利言不如三代之使民專以道義為説也雖然人心不古好義不如好利所以勉勵中人以下者亦不得不然秦用商鞅之法月為更卒已復為正一歲屯戍一歲力役三十倍於古臣按更卒謂給郡縣一月而更者正卒給中都官者也漢更有三品有卒更有踐更有過更古者正卒無常人皆迭為之一月一更為更卒也貧者欲得雇更錢次直者出錢雇之月二千是為踐更也天下人皆直戍邊三日亦名為更律所謂繇戍也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因便往一歲一更諸不行者出錢三百入官以給戍者是謂過更也馬端臨曰卒更者正身供正役也踐更者以錢雇直所直者內地其役一月不行者以錢雇代行者過更者亦以錢雇直所直者邊疆其役三日不行者以錢輸之縣官縣官以給代行者但所謂一歲而更者恐是併往回行程言之逺戍且以兩月為行程則每歲當役者十月如是踐更則是一人替九人之役如是過更則是一人替九十九人之役夫戍邊重事而百人之中行者才一人則兵之在戍者無幾矣吾意一歲而更是秦以此待謫戍者本非正法及其窮兵黷武則雖無罪者及元係復除者皆調發之而儕之謫戍矣漢初亦遵其法後來乃著令有罪者乃戍邊一歲而凡民之當戍者不過三日若不願行者則聼其出錢縣官以給戍者為過更之法耳臣按漢時戍邊有過更之法凡民當戍者不過三日若不願行則聽其出錢縣官以給戍者臣愚以為此法今亦可行內地衛所官軍戍邊者每歲分兩班赴邊屯戍行程往來頗為勞苦且內地人多怯弱不耐寒苦而其衛所輪差之際不免作弊請凖古過更法每歲該戍邊方衛所官旗軍餘計口出錢貼助應戍之人其有壯健之士願受直代人出戍者聽官為驗其身力年齒相當一體給與合得糧賞惟在得人不必正身此法今亦可行高祖十一年發巴蜀材官衛軍霸上景帝後二年發車騎材官屯雁門宣帝神爵元年發三河潁川沛郡淮陽汝南材官詣金陵臣按此漢初遣軍戍邊散見於史者文帝時鼂錯言于文帝曰胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於廣壄美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以離南畝古畝字也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望有降敵之心救之少發則不足多發逺縣才至則胡又已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令逺方之卒守塞一歲而更不知北人之能不如選常居者家室田作且以備之以便為之高城深塹先為屋室具田器豫冬夏衣廪食其亡妻者官買豫之胡人入驅而能止其所驅者以其半豫之縣官為贖其民如是則邑里相救助赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也以陛下之時徙民實邊使逺方亡屯戍之事塞下之民父子相保亡係虜之患其與秦之行怨民相去逺矣臣按今西北緣邊一帶遼東宣府寧夏甘肅四處無有州縣而大同延綏涼洮等處皆有人民及蕃族今亦編其丁壯與軍伍相兼守禦然其民既已供賦役而又使之備戰陳有事之時暫用之可也無事之時一體與軍常操似非人情所堪臣請下山西陜西二布政司凡極邊去處如大同延綏民有願自投軍者免其户糧十二石就以為月糧官不復支給其本户糧原數不及者以同里人户糧足其數其近邊去處在千里而近者有願投軍者亦如之免糧之外别免本户敷科及凡雜役俾其供送凡投軍者加以義勇之名俾其自備鞍馬器械糗糒隨軍征調死不勾丁有願替者聽似亦良便錯又言曰陛下幸募民相徙以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚意奉明法存恤所徙之老弱善遇其壯丁和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙逺方以實廣虛也古之置邊縣以備敵也民至有所居作有所用民所以輕去故鄉而勸之新邑使五家為伍而至於十連一邑生死相恤室屋完安所以使民樂其處而有長居之心居則習於射法出則教於應敵故卒伍成於內則軍政定於外服習收成勿令遷徙幼則同遊長則同事夜戰聲相知則足以相救晝戰目相見則足以相識歡愛之心足以相死而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亡功也陛下絶胸奴不與和親臣竊意其冬來南也一大治之則終身創矣創艾也欲立威者始於折膠來而不能困使得氣後未易服也臣按鼂錯之䇿欲募民相徙以實塞下又欲置邊縣以備敵然今日諸邊見有列屯坐食之兵不須召募舊有衛所營堡之制不須置縣但其所謂五家為伍合於古法今不必以家為伍而以五人為伍使其自相聨屬或其戚屬或其交契從其所好官府因而什伍之方其係籍食糧各仍其舊惟於操練征調之際則用伍法焉每伍同一字號以一人為首呼兵首則五人必與偕所聚集之處如錯所謂居則習為射法出則教於應敵起止相隨而暫離者有禁器用相共而自私者有罪中有嫌隙者許其明白告官而離合之匿怨而貌從者同伍知而不告罪同伍中不許飲博惟合伍校射方許飲酒遇有冦至少至則因其人之多寡而遣吾卒以應之彼以十人來吾以十人應之彼以百人來吾以百人應之吾之所謂十與百蓋以伍為卒十人為五十人百人乃五百人也冦非大至不以大衆武帝時發天下七科謫出朔方張晏曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七臣按武帝發天下七科謫一曰吏有罪秦始皇謫治獄吏不直者築長城即此科也二曰亡命三曰贅壻四曰賈人即秦始皇三十三年發諸嘗逋亡人贅壻賈人擊南越也五曰故有市籍與夫父母有市籍大父母有市籍是三者皆賈人之類也武帝此七科先儒謂其因秦人之舊蓋兵出於農固有定籍故於定籍之外立此七科吏有罪者席其故官亡命者去其鄉土贅壻者托於婦家賈人以下皆身不在農畝是七者皆非調發所及故謫之此雖非先王令典然亦可以制伏姦人使皆為國禦冦而亦寬農實邊之一助也明帝永平八年詔郡國中都官死罪繫囚減罪一等勿笞屯朔方五原之邊縣後又詔詣邊者妻子自隨臣按此秦漢以來謫有罪者戍邊之始蓋置惡人於荒僻之地以禦魑魅古典也秦始皇謫治獄吏不直者築長城漢武帝謫吏有罪者出朔方其來逺矣但有罪繫獄者人非一等有農民有遊民與夫工商吏卒不一類焉彼夫農工商賈平日習勞苦事役作之人用以戍邊無不可者若夫名為士流繫宦籍者率多選軟脆弱之人平日呻吟占畢不經勞役一旦使之被堅執鋭以從事隊伍之間以禦強虜用此之警衆庶固為可矣其如誤國計何况邊塞之地餽餉為難內地米一斛至邊計其費不止三斛也乃歲苦內地良民運三十斛米以養一無用之人無乃非計歟必欲重困罪人使彼知警豈無别䇿而乃必用此乎明帝以後又歲募郡國中都官死罪繫囚出戍聽從妻子自占邊縣以為常凡徙者皆給弓弩衣糧於是北胡有變則置度遼營南蠻或叛則置上林兵羌犯三輔則置長安雍二尉鮮卑冦居庸則置漁陽營臣按漢人守邊多是募兵其所置兵營皆是蠻夷有變而後增之也今日邊城之守士卒之屯皆是聖祖開國之初舊制然歲久弊生不無消乏軍伍或不能如往時之盛欲行漢人召募之法然承平日久民戀鄉土必欲行國初簽補之例然版籍已定民或起怨臣於制國用下嘗建因荒收兵之䇿此䇿似亦可行儻不棄芻蕘之言斟酌行之是亦足兵之一助也東漢自光武罷都試而外兵不練雖疆場之間廣屯增戍列營置塢而國有征伐終籍京師之兵以出蓋自建武迄漢衰胸奴之冦鮮卑之冦嵗嵗有之或遣將出擊或移兵留屯連年暴露而禁旅無復鎮衛之職矣臣按漢人疆埸之間既已廣屯增戍列營置塢而國有征伐又籍京師之兵夫內地有冦可出京師兵以平之若夫邊圉之冦必須用其邊兵何則蓋邊兵生長邊陲慣於戰鬬知敵人之情狀識道路之迂直且復屢經戰陳目熟心定若夫京畿之兵驕奢脆懦目所未嘗見身所未嘗經况受命而總兵者皆天子之勳貴報效而從征者皆是權貴富豪子弟欲希功以得官耳非實有材勇欲敵所愾以建功業也一至邊城身既不能戰反役使邊兵之善鬬者為之給薪水供草料及至冦退而論功方且虛張功次奪邊兵之虜獲攘其首級以為己功是以邊城一聞京軍之來無不解體者為今之計緣邊一帶分定疆界專責邊將守禦不得已而出京軍止用以為邊城之聲援如大同則於應州或渾源州立一大營宣府則於懷來或保安一大營其他遼東甘肅諸處皆然敵少入冦則各邊自為守戰敵大入冦方許奏請京軍如敵冦大同京軍則於應州駐劄敵冦宣府京軍則於懷來駐劄兵法先聲後實每調一千則稱五千用以為邊城之聲援非其力果不能支而京軍不得貪功冒進如此則各邊將卒畏京軍之擾害且奪其功無不奮志效死矣唐方鎮節度使之兵其原皆起於邊將之屯防者唐初兵之戍邊者大曰軍小曰守捉曰城曰鎮而總之曰道自武德至天寶以前邊防之制其軍城鎮守捉皆有使而道有大將一人曰大總管已而更曰大都督至太宗時行軍征討曰大總管在其本道曰大都督自永徽後都督帶使持節者始謂之節度使然猶未以名官景雲二年以賀拔延嗣為涼州都督河西節度使自此而後接乎開元朔方隴右河東河西諸鎮皆置節度使臣按唐初大總管其後節度使即今總兵官之職名德宗時陸贄上言工欲善其事必先利其器武欲勝其敵必先練其兵練兵之中所用復異用之於救急則權以紓難用之於暫敵則緩以應機故事有便宜而不拘常制謀有竒詭而不徇衆情進退死生惟將所命此所謂攻討之兵也用之於屯戍則事資可久勢異從權非物理所愜不寧非人情所欲不固夫人情者利焉則勸習焉則安保親戚則樂生顧家業則忘死故可以理術馭不可以法制驅此所謂鎮守之兵也夫欲備封疆禦戎狄非一朝一夕之事固當選鎮守之兵以置焉古之善選置者必量其性習辨其土宜察其技能知其欲惡用其力而不違其性齊其俗而不易其宜引其善而不責其所不能禁其非而不處其所不欲而又類其部伍安其室家然後能使之樂其居定其志奮其氣勢結其恩情撫之以惠則感而不驕臨之以威則肅而不怨靡督課而人自為用弛禁防而衆自不攜故出則足兵居則足食守則固戰則疆其術無他便於人情而已矣今者散徴士卒分戍邊陲更代往來以為守備是則不量性習不辨土宜邀其所不能強其所不欲求廣其數而不考其用欲致其力而不察其情斯可以為羽衛之儀而無益於備禦之實也何者窮邊之地千里蕭條寒風裂膚驚沙慘目與豺狼為鄰伍以戰鬬為嬉遊晝則荷戈而耕夜則倚烽而覘日有剽害之慮永無休暇之娛地惡人勤於斯為甚自非生於其域習於其風幼而覩焉長而安焉不見樂土而不遷焉則罕能寧其居而狎其敵也關東之地百物阜繁從軍之徒尤被優養慣於溫飽狎於歡康比諸邊隅若異天壤聞絶塞荒􅑍之苦則辛酸動容聆強蕃徑虜之名則懾駭奪氣而乃使之去親戚捨園廬甘其所辛酸抗其所懾駭將冀為用不亦疏乎矧又有休代之期無統帥之馭資奉若驕子姑息如倩人進不邀之以成功退不加之以嚴憲其來也咸負德色其止也莫有固心屈指計歸張頥待飼僥幸者猶患還期之賒緩恆念戎醜之充斥王師挫傷則將乘其亂離布路東潰情志且爾得之奚為平居則殫耗資儲以奉浮冗之衆臨難則捐棄城鎮以搖逺近之心其弊豈惟無益哉固亦將有所撓也復有抵犯刑禁謫徙軍城意欲增户實邊兼令展效自贖既是無良之類且加懷土之情思亂幸災又甚戍卒適足煩於防衛諒無望於功庸雖前代時或行之固非良善之可遵者也臣按陸贄此奏曲盡古今屯戍防邊之利害所謂屯戍之兵事資可久勢異從權非物理所愜不寧非人情所欲不固蓋處制天下之事合於人情宜於土俗然後可以經久而不廢事莫不然不但屯戍一事也其間所論人情苦樂之實邊塞窮苦之狀與夫分蕃更戍之無益緣事謫戍之非宜皆洞燭事情切中時弊人主宜寫一通於座右朝夕目焉則邊塞之苦如在目前事機之宜如指諸掌於是揆之人情驗之時事因其利而見於施行究其害而痛加禁革則邊防無事而中國乂安矣贄又言理戎之要最在均齊故軍法無貴賤之差軍實無多少之異是將所以同其志而盡其力也如或誘其志意勉其藝能則當閲其才程其勇校其勞逸度其安危明申練核優劣之科以為衣食等級之制使能者企及否者息心雖有厚薄之殊而無觖望之釁蓋所謂日省月試餼廩稱事如權量之無情於物萬人莫不安其分而服其平也今者窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇角其所能則練習度其所處則孤危考其服役則勞察其臨敵則勇然衣糧所給惟止當身例為妻子所分常有凍餒之色而關東戍卒歲月踐更不安危城不習戎備怯於應敵懈於服勞然衣糧所頒厚踰數等繼以茶藥之饋益以蔬醬之資豐約相形隔絶斯甚又有素非禁旅本是邊軍將校詭為媚詞因請遙𨽻神䇿不離舊所惟改虛名其於廩賜之饒遂有三倍之益此則儔類所以忿恨忠良所以憂嗟疲人所以流亡經制所以褊匱夫事業未異而給養有殊人情不能甘也况乎矯佞行而廩賜厚績藝劣而衣食優茍未忘懷孰能不愠不為戎首則已可嘉而欲使其協力同心以攘冦難雖有韓白孫吳之將臣知其必不能焉養之若斯可謂怨生於不均矣臣按陸贄之言雖是當時之弊然今世兵在外則苦在內則樂在內則逸在外則勞朝廷所以廩賜之者在外則薄在內則厚無以異於唐之季也明主鑒贄斯言痛革其弊使之內外均齊憫其苦而知其勞時加優恤比諸內地樂而逸者有加而無不及如此則士卒感恩思報人心歸而氣勢壯軍威振矣宋制凡上軍遣戍皆本司整比軍頭司引對便殿給以裝錢代還亦入見犒以飲食採拔精鋭以補之或退其疲老者凡大祀有賞給每嵗寒食端午冬至各有特支戍邊每季又加給銀鞋環慶緣邊難於㸑給者又有薪水錢其役兵勞苦者或季給錢或川廣代還者别給裝錢川廣之補卒或給時服錢屨凡出外卒有口糧臣按宋朝之所以優待邊戍之軍者如此其至其出戍代還皆得引見而所以賞給之者比諸內地之軍為加優蓋宋太祖太宗起自兵間深知軍中利病而知邊戍之兵尤為勞苦故優待之也如此或者謂宋時賞給諸軍如此國力焉得不屈臣竊以為國家禍亂多起於冦盜所以遏絶之者將卒也國家誠省嬖幸之賞賜異端之崇奉以為軍國之用綽乎有餘裕矣宋制蕃兵者塞下內屬諸部落團結以為藩籬之兵也西北邊羌戎種落不相統一保寨者謂之熟户餘謂之生户其大首領為都軍主有帳以上為軍主其次為副軍主又有以功次補者其官職給俸有差臣按凡今天下邊防皆有夷人種類部落馭之得其道皆得其用或以為捍蔽或以為爪牙或以為鄉道或以為間諜顧用之何如耳楊缺謂御得其道狙詐皆作使但不可偏徇專任而已大學衍義補卷一百五十二
