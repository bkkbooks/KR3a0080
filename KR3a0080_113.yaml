body:
  text: 大學衍義補卷一百十三明丘濬撰治國平天下之要慎刑憲戒濫縱之失周書吕刑曰惟時苗民匪察于獄之麗附也罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世蔡沈曰苗民不察于獄辭之所麗又不擇吉人俾觀于五刑之中惟是貴者以威亂政富者以貨奪法斷制五刑亂虐無罪上帝不蠲貸而降罰于苗苗民無所辭其罰而遂殄滅之也陳大猷曰自古酷吏如郅都寗成嚴延年王溫舒周興來俊臣之流未有不反中其身及其子孫者上帝不蠲而絶厥世古今一律也臣按刑罰之所以不中者非訖于威則訖于富訖于威所以狥人之勢訖于富所以阜已之財用是以斷制刑獄虐亂無辜之人民怨于下天怒于上卒之所依之勢不可怙所得之財不能保而併與已之所有者而䘮之遂使自受姓以來之宗祀亦殄滅而無遺類焉嗚呼吕刑此言豈非萬世典獄者之永鑑哉獄貨非寶惟府聚也辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令善也政在于天下蔡沈曰獄貨鬻獄而得貨也府聚也辜功猶云罪狀也報以庶尤者降之百殃也非天不中惟人在命者非天不以中道待人惟人自取其殃禍之命爾吳澂曰非天不中而偏罰之葢以人之為人在于有生之命陷人命以至于死天豈容之哉若天之罰不如此其極則獄吏將無所畏恣于深刻而施之庶民者皆酷虐之政無復有令善之政在于天下矣臣按獄之于人乃性命之所闗係顧不以公而以私不以理而以欲以人之性命而成吾之私家其與殺越人于貨其心一也盍思曰人之生也乃天之所命吾以貨而殺人是逆天命也天豈容我哉以貨殺人且不可况又假天之討有罪者以殺無罪是重得罪于天矣左傳僖公二十三年晉懷公執狐突曰子來則免突之子毛及偃從公子重耳在秦對曰父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣按刑以弼教必原父子之親君臣之義以權其輕重以為取舍焉茍在上者理有不明而惟欲之狥至用刑誅以快其志則凡所惡者大者可誅小者可論而人無容足措手之地矣下拂乎人心上逆于天道人雖無如我何其如天何秦文公二十年初有三族罪孝公用衞鞅變法令令民為什伍而相収司連坐不告姦者腰斬始皇并吞六國毁先王之法減禮誼之官專任刑罰躬摽文墨晝斷獄夜理書目程決事日懸石之一而姦邪竝生赭衣塞路囹圄成市天下愁怨潰而叛之臣按秦不師古專用刑法以致民不聊生而天下潰叛後世所當以為鑑戒者也漢髙祖除秦苛法孝惠欲除三族罪妖言令議未決而崩髙后除之孝文元年盡除収帑相坐律令臣按古者五刑極於大辟死一身之外無餘刑也至秦人始有三族之法罪及于妻子同産夫以一人之有罪而其妻子固無罪也况一族乎父之族同一氣脉之相傳且猶不可又况于母族妻族乎是人家以一女子適人之故而累及其一家一族無辜而至于絶宗殞祀若推其類而至于義之盡則生女可以不舉矣使家家皆懲之而不舉則人類不幾於絶乎所謂妖言之令尤為無可慿據言出于人之口而入于人之耳甚無形迹也徒以一人之言而坐其一人之罪且不可况其家族乎有國者恐其揺民惑衆或至姦宄之生禍亂之作必明立禁條須必見於手書著于簡牘成夫文理質証對驗明白無疑然後坐之不然且將有如賈生之論秦者矣生之言曰忠諫者謂之誹謗深計者謂之妖言非徒不能禁亂且因以生亂而至於亡矣漢承秦後而一切禁之其享國至四百餘年宜哉武帝即位之後自公孫𢎞以春秋之義繩下張湯以峻文决理于是見知之法生而廢格沮誹窮治之獄用湯奏顔異九卿見令不便不入言而腹誹論死是後有腹誹之法比公卿大夫多諂諛取容矣胡寅曰昏主姦臣未有不惡嫉言者武帝非昏主也而信張湯立此令何哉古者立誹謗之木以求謗言故士傳言庶人謗既許之謗則有口者皆得盡其情矣周厲王雖監謗亦見其時言路之不隘也監之而後隘矣秦禁偶語則兩人不得相與言矣其後又有妖言令則一人而為國家深計者亦不得獨獻言矣雖然是猶或發之於口或筆之於書得一據證反是為非加之罪辟也若夫腹誹之法不亦異哉自堯舜大聖猶以知人為難知人之道必自聽言始是故敷奏以言既觀其言明試以功又考其事庶乎盡之而大姦似忠大佞似信者尚不得而知也乃探心腹不用形顯而罪之嗚呼異哉人心難測甚于知天腹之所藏何從而驗今指孝子曰爾欲弑父指忠臣曰爾欲弑君指亷人曰爾欲為穿窬指義士曰爾欲為盗賊爾雖不言不為吾知爾之心也然則凡所嫉惡者孰不可殺矣立法如此與商紂剖比干觀七竅也幾希使賢人君子精忠不得以上白志義不得以自伸反貽暗昧之誅喑嗚而死皆湯啓之也湯禍賊不足道其報亦不旋踵獨孝武信而用焉惜哉史云公卿大夫自是諂諛取容夫求合者不待是而諂諛也况立法以詔之乎臣按腹誹之法胡氏論之可謂切至矣張湯今年殺顔異明年即自殺天道好還彰彰如此為人臣以事君何用殺人以求自安其位耶武帝以法制御下好尊用酷吏民益輕犯法盗賊滋起道路不通乃使樊昆等衣繡衣持節發兵以興擊所至得擅斬二千石以下誅殺甚衆一郡多至萬餘人散卒失亡復聚黨阻山川者往往而羣居無可奈何于是作沈命法曰盗起不發覺發覺而捕不滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盗不敢發府亦使其不言故盗賊寖多上下相為匿以文辭避法焉胡寅曰所為立君者為人羣而爭也不務德化而以力從事是與之爭也夫民服之則馴治之則駭與之爭則奮然競起矣雖大無道之君惡民叛已臨以嚴刑如薙草者錢鎛耰鋤相尋於地上亦未有能盡殺四海之人者何則寡不勝衆也漢監不逺在嬴政之世矣是故以法制民不若以善養民以政御衆不若以德撫衆撫以德養以善居上而寛如天覆然何至于為盗哉臣按聖人制刑以求無刑立辟以求止辟武帝時以盗賊滋起作為沈命法非獨不能止盗反由是而盗賊滋多且又因之而致官吏之相為掩蔽而盗賊益甚是一舉而二失焉由是而馴致大亂不難也吕刑云民之亂罔不中是則治民之道無有過于中者也是故先王立法制刑莫不用中中則無過無不及可以常用而無弊不過而嚴亦不及而寛過而嚴則民有不堪而相率為偽以避罪不及而寛則民無所畏而羣聚競起以犯罪初孝武之世徵發煩數百姓貧耗窮民犯法姦軌不勝于是使張湯趙禹之屬條定法令作見知故縱監臨部主之法緩深故之罪急縱出之誅其後姦猾巧法轉相比况禁網浸密律令煩苛文書盈于几閤典者不能徧睹是以郡國承用者駮不曉其用意也或罪同而論異姦吏因縁為市弄法而受財若市買之交易所欲活則傳生議所欲陷則予死比例也議者咸寃傷之臣按武帝以百姓貧耗窮民犯法乃使酷吏條定法令推求其罪以網羅之嗚呼盍亦反求民之所以犯法之由乎史固曰徵發煩數百姓貧耗民之所以窮而至於犯法者有由也始也既用桑羊孔僅以徵發煩數而致民於法獄終也又用張湯趙禹以律令煩苛而陷民于死地武帝何不仁之甚哉然則欲民之不犯法其道何繇曰管子有言倉廩實知禮節必也制節謹度薄稅斂寛力役使其家給人足則民不窮而人不犯于有司矣宣帝時廷尉史路溫舒上言秦人用刑之失其終有曰烏鳶之卵不毁而後鳯凰集誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含詬雖陛下除誹謗以招切言開天下之口廣箴諫之路掃亡秦之失尊文武之德省法制寛刑罰以廢治獄則太平之風可興于世永履和樂與天亡極天下幸甚臣按温舒之疏真氏已載于前書且謂箠楚之下何求而不得故囚不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏却則煅煉而周納之葢奏當之成雖咎繇聽之猶以為死有餘辜何則成鍊者衆文致之罪明也故俗語云畫地為獄議不入刻木為吏期不對此十餘言其于胥吏慘刻之情獄犴寃枉之狀可謂盡矣然觀其疏始言秦之時正言者謂之誹謗遏過者謂之妖言盛服先王不用於世忠良切言皆鬱於胸虚美薰心實禍蔽塞乃秦之所以亡繼言胥吏慘刻獄犴寃枉及其終也又以除誹謗以招切言開天下之口廣箴諫之路省法制寛刑罰以廢治獄結之大意謂秦之所以亡由刑獄慘刻刑獄慘刻由言路不開言路所以不開者由以正言遏過者為誹謗妖言也宣帝善其言故下詔立廷平然當時楊惲之死正坐南山蕪穢縣官不足為盡力之言于定國為廷尉乃奏以為妖惡言大逆無道則是溫舒之言切中宣帝之失而借秦為言耳胡氏謂人君行事不當於人心天下得而議之豈有戮一夫鉗一喙而能沮弭之哉宣帝於是乎失君道矣噫人君之酷刑皆足以失人心而亡國一旦茍有革心猶足以善其後惟殺諫者則無不亡之理觀諸漢唐末世之君可見矣有國家者尚鑑之哉章帝時陳寵上疏曰陛下即位數詔羣僚宏崇晏晏而有司執事未悉奉承典刑用法猶尚深刻斷獄者急於篣格酷烈之痛執憲者煩於詆欺放濫之文或因公行私逞縱威福今宜蕩滌煩苛之法輕薄箠楚以濟羣生帝納寵言詔有司絶鉆鑽諸慘酷之科解妖惡之禁除文致之請讞五十餘事定著于令臣按文致謂其人無罪文飾致其法中也桓帝延熹元年中常侍侯覽等令牢修上書告李膺等養太學游士交結諸部生徒更相驅馳共為部黨誹訕朝廷疑亂風俗帝怒下郡國捕黨人布告天下使同忿疾案經三府太尉陳蕃郤之曰今所按者皆海内人譽憂國忠公之臣此等猶將十世宥之豈有罪不彰而致収掠乎不肯平署上愈怒遂下膺等於黄門北寺獄其辭所連及杜密陳翔范滂之徒二百餘人或逃遁不獲皆懸金購募使者四出相望陳蕃上書極諫帝怒策免之自後無敢復言者竇武霍諝復以為言帝意稍解乃詔黨人二百餘人皆歸田里書名三府禁錮終身及靈帝即位陳竇用事復舉㧞膺等陳竇誅膺等復廢侯覽怨張儉尤甚乃命朱並上書告儉等共為部黨圖危社稷時上年十四問曰黨人何用為惡而欲誅之耶對曰欲為不軌上曰不軌者何對曰欲危社稷上乃可其奏凡黨人死者百餘人妻子皆徙邉連引収考布徧天下宗戚並皆殘滅郡縣為之殘破馬端臨曰黨錮之獄出於宦官之惡直醜正然欲加之罪則必從而為之辭帝之問曹節曰黨人何用為惡而欲誅之耶善哉問也帝時方童㓜未知姦佞容恱之可親忠賢鯁直之可惡故發此問至對以謀不軌危社稷則不復能窮詰其所以謀之說所以危之狀而遽可其奏矣自昔昬暴之君誅諍臣戮直士若龍逄比干之儔皆以諫諍於朝而嬰禍而竊議於野者則未嘗罪之也至李斯始有偶語之禁張湯始有腹誹之律皆處以死罪今觀黨錮諸賢所坐即偶語腹誹之罪而曹節王甫所為葢襲斯湯之故智也至於根連株逮坐死者不可勝計雖曰主昬政亂㓙璫得以肆其威虐然亦有由來矣盖漢家之法以殊死為輕典而治獄之吏則以深竟黨與為能事夫子曰始作俑者其無後乎傳曰作法於貪弊將若之何信哉臣按路溫舒言秦有十失其一尚存治獄之吏是也臣以為治獄之吏其小者耳其所失之存最大者則誹謗妖言之禁焉吕后時雖除去其禁然温舒上疏於宣帝始終以誹謗為言則是雖除之實則暗用之而不自知也其子孫習見以為當然左右兇邪遂襲用之以除異已之人其禍乃至更代累世而猶熾卒之善良受禍國祚隨之後之有天下者其他刑獄雖若慘刻然失人心促國脉趣于亟亡者皆莫甚于誹謗妖言之令也古語云殺諫臣者其國必亡然殺諫臣猶有定名不諫者未必殺也惟用誹謗妖言坐人之罪則不分在朝在野有官無官一切誅之以鉗天下之口其國之亡也又何疑哉魏孝文以有罪徙邉者多逋亡乃制一人逋亡闔門充役光州刺史傳陵崔挺諫曰天下善人少惡人多若一人有罪延及闔門則司馬牛受桓魋之罰栁下惠嬰盗跖之誅不亦哀哉孝文善之遂除其制臣按秦始有夷族之刑一人犯罪延及一家而且及其母族妻族焉崔挺茲言其仁人之言哉秦僅再世而博陵之崔世為北朝大族至於唐猶盛不可謂天無意也初魏元丕與陸叡李沖于烈俱受不死之詔叡既誅賜沖烈詔曰叡反逆違誓在彼不闗朕也然猶不忘前言聽其自死免其孥戮朕本期始終而彼自棄絶司馬光曰殺生予奪人君馭臣之大柄是故先王之制雖有八議茍有其罪不直赦也必議於槐棘之下可宥則宥可刑則刑故君得以施恩而不失其威臣得以免罪而不敢自恃魏於勲貴之臣往往豫許之以不死彼驕而觸罪又從而殺之是以不信之令使陷於死地也臣按人君為治大要在仁義所以持仁義者信也不當死而死之非仁當死而不死之非義既許以不死而又死之非信失此三者何以為國梁武帝疎簡刑法自公卿大臣咸不以鞫獄為意又專精佛戒每斷重罪則終日不懌或謀反逆事覺亦泣而宥之由是王侯益横或白晝殺人於都街或暮夜公行剽掠有罪亡命者匿於主家有司不敢搜捕帝深知其弊而溺於慈愛不能禁也臣按大禹泣囚憐民之愚也梁武泣囚儌已之福也灑淚雖同而處心則異憐愚而泣終寘之于法所以戒其後使之化愚為智變惡為良儌福而泣雖若免之于死然而法度日弛姦惡日起卒致白晝殺人公行摽掠本欲儌福于已而反有以致禍於人所謂求福不得而禍已隨之者也佛教之不足慿信如此後世人主其鑑之哉隋文帝素不恱學既任智而獲大位因以文法自矜明察臨下恒令左右覘内外小有過失則加以重罪又患令史贓汙使人以錢帛遺之得犯立斬每于殿廷捶人一日之中或至數四嘗怒問事揮楚不甚即令斬之髙熲等諫以為朝堂非殺人之處殿廷非决罰之地帝不納又為殿廷殺人兵部侍郎馮基固諫不從竟于殿廷行決帝亦尋悔宣慰馮基而怒羣臣之不諫者臣按智者行其所無事所惡於智者為其鑿也文帝既以任智而獲大位故凡事皆以所謂智者處之欲人莫測吾之所為而知所畏懼將以得其情而攝其心也嗚呼聖人所謂智者豈若是耶彼盖自智其智非吾聖人之智也智與仁勇為天下之三達德缺一不可也而其所以然者則本於誠焉誠以用智則所謂行其所無事也噫隋文用其奸謀詭詐以為智天之未定則因之以奸天位天之既定則因之以滅宗祀後世人君有任私智者尚文帝之鑑哉文帝尚慘急而奸囘不止定盗一錢棄市法聞見不告者坐至死自此四人共盗一榱桷三人共竊一𤓰即時行决有數人刼執事而謂之曰吾豈求財者耶但為枉人来耳而為我奏至尊自古以來體國立法未有盗一錢而死也而不為我以聞吾更來而屬無類矣帝聞之為停盗取一錢棄市之法臣按先王因情以立法如衡之於輕重少者不可多大者不可小物有多少大小而衡一以無心待之隨其多少大小而權之也盗一錢者則坐以死盗萬錢者又何以加之哉以是立法是教天下之為盗者不為盗則已如必為盗則為其大而毋為其小寧取其多而不取其少豈所謂辟以止辟者耶唐武后自以久專國事且内行不謹欲大誅殺以威之乃盛開告密之門擢胡人索元禮為遊擊將軍令按制獄元禮推一人必令引數十百人周興來俊臣之徒效之紛紛繼起私蓄無賴數百人專以告密為事欲陷一人輒令數處俱告事狀如一俊臣與萬國俊共撰羅織經數千言教其徒網羅無辜織成反狀構造布置皆有支節太后得告密者輒令索元禮等推之競為訊囚酷法作大枷有定百脉突地吼死豬愁求破家反是實及鳯凰曬趐驢駒㧞橛僊人獻果等名或倒懸石縋其首或以醋灌鼻每得囚輒先陳其械具以示之皆戰慄流汗望風自誣胡寅曰自古酷刑未有甚于武后之時其技與其具皆非人理盖出於佛氏所說地獄之事也佛之意本以怖愚人使之信也然其說自南北朝瀾漫至唐未有用以治獄者佛之言在册知之者少至閻立本圖地獄變相形于繪畫則人之得見而慘刻之吏智巧由是滋矣是故惟仁人之言其利溥佛本以善言之謂治鬼罪于幽隂間耳不虞其弊使人真受此苦也吁亦不仁之甚矣臣按先王制刑本以制民使之不敢為惡後世為惡者乃以刑為行惡之具其慘酷有如武后時酷吏之所為者盍思曰吾人也彼亦人也人以是加我我能堪之乎天道好還吾害人以保己之富貴人雖不奈我何其如天道何吾雖尊貴彼雖卑賤同一知識蠢動也我與彼均禀性賦形於天地間天生我亦猶生彼也不畏於人獨不畏于天乎武后長夀元年來俊臣羅告同平章事狄仁傑等謀反先是俊臣奏請降敇一問即承反者得減死及仁傑下獄俊臣以此誘之仁傑即承反是實俊臣乃少寛之仁傑令其子上寃狀武后覽之以問俊臣對曰仁傑等下獄未嘗褫其巾帯寢處安甚茍無事實安肯承反太后使通事舍人周綝往視之俊臣暫假仁傑等巾𢃄羅立於西使綝視之俊臣詐為仁傑等謝死表使綝奏之樂思晦男數歲没入司農上變得召見武后問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言可擇朝臣之忠清陛下素所信任者為反狀以付俊臣無不承反矣武后意稍悟召見仁傑曰卿承反何也對曰不承則已死於拷掠矣武后曰何為作謝死表對曰無之出表示之乃知其詐臣按路溫舒言箠楚之下何求而不得箠楚刑具之輕者也人之肌膚尚有所不堪者况用非法之重刑乎後世人主觀武后時來俊臣治狄仁傑謀反之獄及詳樂思晦㓜男之言與仁傑召見之對則酷吏害人之情狀罪人承罪之因由灼然見矣武后謂侍臣曰頃者周興來俊臣按獄多連引朝臣云其謀反中間疑有不實使近臣就獄引問得其手狀皆自承服朕不以為疑自興俊臣死不復聞有反者然則前死者不有寃耶姚元崇對曰自垂拱以來坐謀反死者率皆興等羅織自以為功陛下使近臣問之近臣亦不自保何敢動揺所問者若有翻覆懼遭慘毒不若速死賴天啓聖心興等伏誅臣以百口為陛下保自今内外之臣無復反者若㣲有實狀臣請受知而不告之罪武后恱曰曏時宰相皆順成其事陷朕為淫刑之主聞卿所言深合朕心賜元崇錢千緡臣按武后雖女主然其本心之天理亦未嘗無也雖以一時酷吏逢其惡用淫刑以逞彼雖昧於其初然事久而天理定事過而善心生卒亦未嘗不知其非也是以酷吏無不坐誅而當時宰臣順成之者亦咎其陷已於淫刑焉後世人主觀仁傑之對及元崇此言凡有大獄必須自引所犯者於前躬自詰問而毋為所蔽為刑官者毋逢君之惡為大臣者必匡君之失毋使他日其君之悔悟而誅戮之及咎怨之歸也武后時侍御史周矩上疏曰推刻之吏以深刻為功鑿空爭能相矜以虐泥耳籠頭摺脅籖爪懸髪熏耳刻害支體糜爛獄中號曰獄持或累日節食連宵緩問晝夜揺撼使不得眠號曰宿囚此等即非木石且救目前茍求賖死臣竊聽輿議皆稱天下太平何苦須反豈被告者盡是英雄欲求帝王邪但不勝楚毒自誣耳願陛下察之周用仁而昌秦用刑而亡願陛下緩刑用仁天下幸甚臣按人主所深惡者反叛也而小人之欲求富貴者往往假是誣人以求爵賞人主不之察而聽之其致人於死地輒至十百寡人之妻孤人之子絶人之宗祀其為仁政之累和氣之盭也大矣遇有斯獄必須隔别而問證佐既明必須得其反具引赴御前躬為詰問許其靣辯不付其獄於所執之人必察其詳於外廷之訊如此則奸狀無不明刑獄無不當矣𤣥宗天寶初李林甫為相起大獄以誣陷異已者寵任吉溫羅希奭為御史二人皆隨林甫所欲深淺煅煉成獄無能自脫者時人謂之羅鉗吉網臣按國家置為刑獄有一定之名有一定之所祖宗成法子孫當遵守之不敢有加焉可也漢唐以來乃有詔獄之名及有起大獄者是於常憲之外而更為之異名以羅人於死地所以張奸臣之威失天下之心皆由乎此後世人臣有請於祖宗常獄之外别起獄者必奸邪也人主宜痛斥之肅宗時將軍王去榮以私怨殺本縣令當死上以其善用礟免死以白衣於陜郡効力賈至上疏曰易曰臣弑其君子弑其父非一朝一夕之故其所由來漸矣若縱去榮可謂生漸矣議者謂陜郡初復非其人不可守然則他無去榮者何以能亦堅守乎陛下若以礟石一能即免誅死今諸軍技藝絶倫者其徒實繁必恃其能所在犯上復何以止之若止捨去榮而誅其餘者則是法令不一而誘人觸罪也今惜一去榮之材而不殺必殺十如去榮之材者不亦其傷益多乎夫去榮逆亂之人也焉有逆於此而順於彼亂於富平而治於陜郡悖於縣君而不悖於大君歟下其事令百官議韋見素等議以為法者天地大典帝王猶不敢擅殺而小人得擅殺是臣下之權過于人主也去榮既殺人不死則軍中凡有技能者亦自謂無憂所在暴横為郡縣者不亦難乎陛下為天下主愛無親疎得一去榮而失萬姓何利之有於律殺本縣令列於十惡而陛下寛之王法不行人倫道屈臣等奉詔不知所從夫國以法理軍以法勝有恩無威慈母不能使其子陛下厚養戰士而每戰少利豈非無法乎今陜郡雖要不急於法也有法則海内無憂不克况陜郡乎無法則陜郡亦不可治得之何益而去榮末技陜郡不以之存亡王法有無家國乃為之輕重此臣等所以區區願陛下守貞觀之法上竟捨之臣按肅宗之於一王去榮殺縣令而不正其罪賈至既言之韋見素等又言之諄複明切如此而肅宗竟不悟焉其後卒至法令廢弛士卒桀驁終唐室而不振其原未必不出諸此也懿宗同昌公主薨悼痛不已殺醫官韓宗卲等二十餘人収捕親族三百餘人係京兆獄平章事劉瞻言以為修短之期人之定分昨公主有疾深軫聖慈宗卲等診療之時惟求疾愈備施方術非不盡心而禍福難移竟成蹉跌原其情狀亦可哀矜而械係老㓜三百餘人道路嗟嘆奈何以達理知命之君涉肆暴不明之謗願少囘聖慮寛釋係者上覽疏不恱臣按古人所以大過人者無他焉善推其所為而已矣懿宗以一女之故而殺醫者二十餘人而収捕親族至三百餘人知痛吾女之死而人之死獨不可痛哉彼二十人者皆有父母子女吾愛吾女而彼之父母子女亦愛其父與子人有貴賤而痛戚之情則一也吾女之死非其故若出於誤亦在所宥况醫所能生者不死者爾數之盡者醫豈能延哉劉瞻之言痛切而懿宗不悟非獨不仁盖不智也宋至和中太常博士吳及言古人除肉刑重絶人之世也今則宦官之家競求他子𠞰絶人理希求爵命童㓜何罪陷於刀鋸因而夭死者多矣夫有疾而夭治世所羞有罪而宫前王不忍况無疾與罪乎臣聞漢永平之際中常侍四員小黄門十人唐太宗定制無得踰百員且以祖宗近事較之祖宗時宦官凡幾何人今凡幾何人臣愚以謂胎卵傷而鳯凰不至宦官多而繼嗣未育伏望濬發德音詳為條禁進獻宦官一切權罷擅宫童㓜寘以重法若然則天心必應聖嗣必廣召福祥安宗廟之策莫先於此臣按五刑之中宫刑最重四刑惟殘人之肌體宫刑則絶人之種類故雖死辟之大不若宫刑之慘大辟雖曰身首異處然止於一身一時而宫刑則上閼先傳下絶後繼非止一人一世焉今世無古宫刑亦無宋人宦官之家取他人子宫以為嗣之例祖宗以來凡人侍掖庭者多取軍旅中不得已所繫累之㓜穉免其死而生之至仁之恩也近年乃有軍民之家自宫其子以求進者而在近甸尤多惟我國家都燕切近邉鄙民之生於是者比諸他境尤當加意愛惜而保養之使其蕃息以壯實根本一人失其生固在所惜况千百人絶其後代乎伏願體天地好生之德嚴為禁制自今有自宫其子弟者罪其父母及其生户全家戍邉隣保知情重加罰贖其主使下手之人問以死罪被宫者分送藩府以給使令永不許進入掖庭如此則不禁自絶矣是亦聖朝體天心惜民命錫民類莫大之仁政也髙宗紹興中殿中侍御史常同論私鹽刑名太重主議之臣但曰刑不峻不足以致厚利夫峻刑章而不恤民害此奸臣之所為也自古及今刑之所犯必稱罪之輕重豈有罪無等降一用重刑之理今私鹽一斤至杖脊配廣南則孰不相率而為百千斤之多哉祖宗之仁德在人猶人之有元氣今天下之勢可謂病矣奈何遂欲傷元氣乎法令之行繫乎國本不使有識縉紳之士議之而使刀筆之吏弄其文墨非國之福也臣按天生物以養人非專為君也而君専其利己違天意矣為之禁且不可也况又為不稱其罪之重刑哉常同謂刑之所犯必稱罪之輕重深得先王制刑之意後世法令所以禁愈嚴而犯愈多者以不稱其罪也夫立法者君也而導君而為是法者左右之臣也而行法者未必皆無仁心未必皆欲從君之欲彼見法之過於嚴而民之愚而貧無知而冒法不得已而犯禁不肯盡行其法故法雖行於暫而不能行之於久而卒歸於廢弛此非獨人心之不然而天理亦不之然也後世大盗多起於鹽徒正以鹽禁太嚴有國者不可不知理宗朝天下之獄不勝其酷每歲冬夏詔提刑行郡决囚提刑憚行悉委倅貳倅貳不行復委幕屬所委之人皆肆行威福以要餽遺監司郡守擅作威福意所欲黥則入其當黥之由意所欲殺則證其當死之罪呼喝吏卒嚴限日時監勒招承催促結欵而又擅制獄具非法殘民或斷薪為杖掊擊手足名曰棹柴或木索并施夾兩股名曰夾幫或纒繩於首加以木楔名曰腦篐或反縛跪地短竪堅木交辮兩股令獄卒跳躍於上謂之超棍痛深骨髓幾於殞命富貴之家稍有罥罣動籍其貲又以趂辦月樁及添助版帳為名不問罪之輕重並從科罰大率官取其十吏漁其百州縣往往專殺拘鎻罪人死而後已甚至户㛰詞訟亦皆収禁有飲食不充饑餓而死者有無力請求陵虐而死者有為兩詞賂遺苦楚而死者懼其發覺先以病申名曰監醫實則已死名曰病死實則殺之至度宗時雖累詔切責禁止終莫能勝而國亡矣臣按宋至理宗時土地已蹙窮民殘喘待日而斃多方以嫗乳之猶恐不足以有而一時監司守令乃為嚴刑苛法以籍民財以殘民命理宗在位方以崇尚道學為事務虚名而蔑實政當是之時為監司守令者豈無學道學之流乎要之皆趣時好名之士非真有心於居敬窮理以濟人利物者也卒至於傷天地之和促國家之脉而有裔夷之禍也嗚呼豈無所自哉今去宋季不逺其淫刑之具如所謂腦篐超棍之類世猶有襲而用之者伏惟國家以仁立國乞勑有司痛加禁革敢有於律文訊杖之外巧意用刑者坐以違制之律造之者重罰用之者除名是亦順天心夀國脉之一大事也以上戒濫縱之失大學衍義補卷一百十三
