body:
  text: 太學衍義補卷九十八明丘濬撰治國平天下之要備規制章服之辨書舜典曰明試以功車服以庸民功曰庸孔頴達曰人以車服為榮故天子之賞諸侯皆以車服賜之覲禮曰天子賜侯氏以車服是也程頤曰言之善者從而明考其功有功則賜車服以旌異之臣按賜服以表功自唐虞之世已有之臯陶謨天命有德五服五章哉孔安國曰五服天子諸侯卿大夫士之服也尊卑采章各異所以命有德臣按先儒謂天命有德之人則以五等之服以彰顯之蓋爵豫之以名服錫之以器皆所以彰顯夫人之德也人有是德契合於天人君承天命以彰顯之命之以爵而必與服俱不過承天之意而已茍以命德之服而加諸無德之人豈不逆天意哉周禮大司徒以本俗六安萬民六曰同衣服鄭𤣥曰同猶齊也民雖有富者衣服不得獨異賈公彥曰士以上衣服皆有采章庶人皆同深衣而已臣按衣服之制皆有等差謂之同者各隨其等而為之服士與士同庶人與庶人同不得自為異制也司服公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服士之服自皮辨而下如大夫之服王昭禹曰凡諸侯之服各視其命之數上公九命故其服九章自袞冕而下如王之服侯伯七命故其服七章自鷩冕而下如公之服子男五命故其服五章自毳冕而下如候伯之服孤之服自希冕而下如子男之服自此而下皆諸侯之孤卿大夫士也公之孤四命故其服三章希冕而下如子男之服公侯之卿皆三命其大夫皆再命子男之卿再命則其服一章而已故自𤣥冕而下如孤之服公侯伯之士同一命子男之士不命則其服無章數其首服以皮辨故曰士之服自皮辨而下如大夫之服則𤣥衣纁裳而已臣按先儒謂冕服之名皆取章首為義衮冕九章以龍為首龍首卷然故以衮為名其衣五章裳四章鷩冕七章華蟲為首華蟲即鷩雉也其衣三章裳四章毳冕五章虎蜼為首虎蜼毛淺毳是亂毛故以毳為名其衣三章裳二章此是周時五等之爵及其孤卿大夫士朝祭之冕服各有章數如此今世古制不行所謂朝祭之服無復有章數矣辨師諸侯後既有諸侯此當作諸公之繅藻同雜文之名斿九就成也瑉惡玉也玉三采朱白蒼也其餘如王之事繅斿皆就謂皆三采也玉瑱以玉為之塞耳者玉筓以玉為之所以貫者諸侯及孤卿大夫之冕韋辨皮辨各以其等為之而掌其禁令不得相踰越劉彛曰尊卑貴賤由乎冕辨定等差也卑不可踰於尊賤不可踰於貴辨師掌其禁令則禮行於九服矣臣按古者之冠自天子而下至於大夫皆謂之冕後世惟天子得謂之冕焉夫古者冕服之制上下同用之但有命數等差爾後世則有不然者姑存古制以示後世使後有作者因今之制用古之意庶幾有以為復古之漸屨人辨外內命夫命婦之命屨功屨散屨凡四時之祭祀以宜服之臣按內命夫卿大夫士之在宮中者外命夫卿大夫士在朝者命屨以王命賜之者也功屨冬之皮屨服功裘者散屨卑者之素屨也後漢志注光武建武元年復設諸侯王金璽綟綬公候金印紫綬九卿以下秩中二千石大長秋以下秩二千石校尉都尉以下秩二千石以上皆銀印青綬中外官尚書令以下中二千石丞正平諸司馬以下皆千石尚書中謁者以下秩皆六百石雒陽市長以下秩四百石以上皆銅印黑綬諸丞尉四百石三百石二百石皆銅印黃綬臣按此漢朝印綬之制然所謂金紫者印與綬也非服色也北朝周武帝初服常冠以皂紗全幅向後幞髮仍裁為四腳胡寅曰君子大復古重變古非泥於古也以生人之具皆古之聖人因時制宜各有法象意義不可以私智更改之也以周家紗幞一事論之此後世巾幘朝冠之所自始也古者賔祭喪燕戎事冠各有宜紗幞既行諸冠由此盡廢稽之法象果何所則求之意義果何所據哉為治莫大於禮禮莫明於服服莫重於冠冠必欲盡善其必考古而立制臣按此後世幞頭之始隋文帝始服黃百官常服同於庶人皆著黃袍胡寅曰服章之設所以辨上下定民志也莫卑乎民莫尊乎天子上下無所辨民志何由定僣亂由此而生矣隋文儉約施之宫閫之中燕私之用可也與庶人同而坐乎廟朝儉不中禮不足以為法矣臣按衣服者身之章名器之所寓也君子正其衣冠則民望而畏之茍上下同服則混而無别何以聳下人之觀視哉唐太宗貞觀四年詔三品以上服紫四品五品服緋六品七品以緑八品九品以青髙宗上元元年敇文武三品以上服紫金玉帶四品五品服緋金𢃄六品七品緑銀帶八品九品青鍮石帶庶人黃銅鐵帶永徽二年五品以上隨身魚銀袋以防召命之詐出內必合之三品以上金飾袋咸亨三年五品以上改賜新魚袋竝飾以銀三品以上各賜金裝刀子礪石一具武后時督刺史亦準京官𢃄魚袋又改賜佩魚皆為龜尋復舊開元以後百官賞緋紫必兼魚袋謂之章服臣按此有唐一代章服之制所謂金紫者金謂魚袋之飾紫謂衣也與漢所謂金紫名同而實異矣宣宗重惜服章有司具緋紫衣數襲從行以備賜或半嵗不用其當時以緋紫為榮臣按唐自中葉以後品服太濫每朝會朱紫滿庭而少衣緑者當時視金紫如韋布宣宗稍加重惜人遂以為榮蓋朝廷之所以尊而天下之人所以奔走而趨赴之者求名與器也朝廷章服乃名器之所寓人君必自貴然後人貴之人人可得則不足貴矣宋志朝服一曰進賢冠二曰貂蟬冠三曰獬豸冠皆朱衣朱裳進賢五梁冠一品二品侍祠朝會則服之中書門下則冠加籠巾貂蟬諸司三品御史臺四品兩省五品侍祠朝會則服之御史大夫中丞則冠有獬豸角兩梁冠四品五品侍祠朝會則服之六品以下亦服之衣無中單無劒佩綬御史則冠有獬豸角臣按此宋初朝服之制一品至九品其冠之塗金銀花額皆同所不同者其簮導五梁則玳瑁三梁兩梁則犀也其服竝緋羅袍白花羅中單緋羅裙緋羅蔽膝皂縹襈白羅大帶白羅方心曲領銀革帶白綾襪皂皮履皆同所不同者冠五梁者則玉劒佩暈錦綬二玉環冠三梁者則劒佩以銀綬以獅子錦環以銀冠兩梁者則劒佩以銅綬以練鵲錦環以銅而已今朝之制因之而有不同者惟公候駙馬伯有立筆而加以籠巾貂蟬而文武臣僚皆不得用方心曲領惟加之祭服而朝服亦無焉其餘皆同惟不佩劒若夫今日侍祠之祭服則與唐宋皆不同矣唐宋皆略準周禮服冕有旒今制皆與朝服同惟易以青衣而加以方心曲領耳臣嘗因是而通考之宋朝服之冠雖曰有三然皆進賢冠也加以貂蟬豸角因異其名爾其製作始於漢即古緇布冠也文儒者之服也前髙七寸後髙三寸長八寸公侯三梁中二千石以下至博士兩梁自博士以下至小史皆一梁晉加為五梁唐之梁數如漢宋初有五梁三梁兩梁而無一梁其後又加以七梁六梁凡七等我朝則加至八焉公八梁侯伯駙馬及一品皆七梁二品六三品五四品四五品三六品七品二八品九品一也夫冠有梁所以别貴賤之等級也上而天子之通天冠前後二十四梁以應冕旒前後之數人臣之數則自八而下以至於一而不及於九者九者陽數之極也至是不可復加矣宋因唐制為公服三品以上服紫五品以上服朱七品以上服緑九品以上服青其制典領大袖下施橫襴束以革𢃄幞頭烏皮鞾自王公至一命之士通服之朱熹曰自隋煬帝令百官以戎服從一品賜紫次朱次緑後世遂為朝服馬端臨曰用紫緑青為命服昉於隋煬帝而其制遂定於唐然漢夏侯勝謂士明經取青紫如拾芥揚子雲亦言紆青拖紫西漢服章無所考見史言祭服用袀紺色𤣥東漢則百官之服皆袀𤣥而青紫乃其時貴官燕居之服非微賤者所可服歟臣按孔子曰紅紫不以為䙝服朱子謂紅紫間色不正䙝服私居服也言此則不為朝祭之服可知嗚呼五胡亂華以來極於元魏之世凡中國之衣冠禮服皆為所變一切趨於茍簡是雖華夏之域其所以為身之章者無復上衣下裳之制豈但其服色之不正而已哉自隋以來以紫為大臣之服我朝始復古制朝服一以赤而所謂公服者始革去紫不復用一洗唐宋以來之舊習太宗雍熙元年出魚袋以賜近臣由是內外通朝文武官佩魚服紫者飾以金服緋者飾以銀後俱以入銜黃履翁曰明庶以功車服以庸古人所以重報功之典彼其之子不稱其服詩人所以譏其無德焉嘗觀唐初之所辭受宋朝之所豫奪其意猶古也溫璋為大理丞賜以緋衣以審獄得情也牛叢為睦州刺史力辭金紫以越等不宜也陽城以處士而賜緋衣所以旌逸德也李泌以山人而賜金紫所以表異能也夫受之者不以為䙝辭之者不以為矯正唐人别功過之美意也以三品服賜楊安國以五品服賜趙師民重儒臣也以三品服賜王素以五品服賜余靖歐陽修蔡襄寵諫臣也曾致堯之浮躁不可賜以章紱則奪之王文度之伎術不可加以佩魚則抑之夫豫之者不以為狥情奪之者不以為少恩此勸懲之微權也臣按魚袋之制始於唐蓋用以為符契也其始曰魚符左一右一左者進內右者隨身刻官銜姓名出入合之因盛以袋故以魚袋名焉宋因之其制以金銀飾為魚形公服則繫於𢃄而垂於後以明貴賤蓋無復如唐之符契者矣我朝革去前代魚袋不復設凡常朝參官則製牙為牌刻其官銜於上凡勳親文武四字號俾其懸於帶上以出入禁門無者則不得闌入焉其制雖與唐之魚符不同其所以為出入之防則一也其諸異乎宋人用以為美飾榮觀者歟宋初因五代舊制每嵗諸臣皆賜時服然止賜將相學士禁軍大校建隆三年太祖謂侍臣曰百官不賜甚無謂也乃遍賜之嵗遇端午十月一日文武羣臣將校皆給焉臣按此宋朝嵗時賜服之制太祖建隆三年給中書門下樞密宣徽節度使及侍衛步軍都虞候以上皇親大將軍以上天下樂暈錦三司使學士中丞內客省使駙馬留後觀察使皇親將軍諸司使廂主以上簇四盤鵰細錦三司副使官觀判官黃獅子大錦防禦團練使刺史皇親諸司副使翠毛細錦權中丞知開封府銀臺司審刑院及待制以上知檢院鼓院同三司副使六統軍金吾大將軍紅錦諸班及諸軍將挍亦賜窄錦袍有翠毛宜男雲雁細錦獅子練鵲寶照大錦寶照中錦凡七等應給錦袍者皆五事臣按此宋朝給賜錦袍之制錦凡數樣皆為鳥獸之形我朝定制品官各有花樣公侯駙馬伯繡麒麟自澤不在文武之數文武官一品至九品皆有應服花樣文官用飛鳥象其文彩也武官用走獸象其猛鷙也定為常制頒之天下俾其隨品從以自造非若宋朝官為製之嵗時因其官職大小而為等第以給賜之也上可以兼下下不得以僣上百年以來文武率循舊制非特賜不敢僣差惟武臣多有不遵舊制往往專服公侯伯及一品之服自熊羆以下至於海馬非獨服者鮮而造者幾於絶焉伏請申明舊制違者治之如律蓋本朝無金紫之賜所以辨章服者實有在於斯元志仁宗延祐元年定服色等第惟䝉古不在禁限臣按元朝服色雖禁不許服龍鳯文然所謂龍者五爪一角者爾其四爪者上下通用不禁逮我聖朝立為定制凡品官常服用雜色紵絲綾羅綵繡庶民止用紬絹紗布及凡官員軍民僧道人等衣服帳幔並不許𤣥黃紫三色並織繡龍鳯文違者罪及染造之人嗟乎禮所以辨上下定民志也而上下之辨心志之定必由於耳目之所見聞身體之所被服自其顯著者而禁革之所以潜消其非分之望密遏其過求之心於隱微之中此先王制禮之深意杜亂之微權也以上論章服之辨治國平天下之要備規制胥𨽻之役周禮宰夫掌百官府之徵上所召令下所禀辨其八職五曰府掌官契以治藏六曰史掌官書以贊治七曰胥掌官叙以治叙八曰徒掌官令以徵令吳澄曰府主蓄藏文書及器物者官契謂要書藏謂所蓄藏者史主理文辭而述事者官書謂史所述者贊治若今文書起草也胥治文書之次叙謂才智為什長者官叙即胥所治者治叙謂應所治之先後也徒趨走以應呼召者官令謂官府之令徵令即上所召也四者皆庶人之在官者臣按宰夫八職其前四者皆王臣此四者乃庶人在官者耳府如今世掌庫藏之吏史若今吏典掌文案者也胥若今之都吏所謂一胥則十徒才智為什長者也徒若今𨽻卒之屬王制制農田百畝百畝之分分或為糞上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差也鄭𤣥曰農夫皆受田公田肥瘠有五等收入不同也庶人在官謂府史胥徒之屬官長所除不命於天子國君者賈公彥曰王制下士視上農夫食九人祿足以代耕則府食八人史食七人胥食六人徒食五人李覯曰孟子曰無君子莫治野人無野人莫養君子蓋以農夫而制祿則治於人者必思所以養之食於人者必思所以治之且示其不能交相無也庶人之在官者其家亦授之田周官之所謂官田也祿足以代耕而又受其田所以責其亷也方慤曰以食九人者為上農夫食五人者為下農夫則食八人至於食六人者為中農夫可知矣其詳有五等之别其大略不過三等而已言其祿以農為差則多者不得過九人之祿寡者不得下食五人之祿臣按先儒謂自太宰至旅下士凡六十三人而府史胥徒止百五十人五官亦然夫官若是其衆而下吏止若此其所以省吏員者至矣吏省則其祿易給吏有祿則人知自愛故當時庶人之在官凡有秩祿者無非賢德之人而漢猶倣此意佐史有斗食之秩長安游徼吏有百石之秩左馮翊有二百石卒史張敞為膠東相吏追捕有功者得一切比三輔尤異自是以後百石吏皆差自重賢人君子往往多出其間有得於先王遺意後世不然上至朝廷下至州縣每一職一司官長不過數人而胥吏不勝其衆夫官之不勝吏姦也明矣天下何從而治哉由是言之則夫太宰之所以省吏者直欲夫祿之易給也吏之所以必給其祿者直欲人人知自愛也雖然周人所以多其官而少其吏者固是使其祿之易給而人知自愛然亦所以省事也蓋為治之道當委任責成而嵗終考其殿最必使案不重挍文不煩悉然後易以考挍而無紛更䝉蔽之患茍一事而數人主之則甲可乙否此是彼非一人之聰明有限衆人之錯雜難防是豈御簡舉要之道哉古人有云省官不如省事欲事之省莫若少置吏吏省則事體歸一而上之人得所據而不煩矣孟子曰耕者之所獲一夫百畝百畝之糞上農夫食九人上次食八人中食七人中次食六人下食五人庶人在官者其祿以是為差方慤曰王制言百畝之分孟子言百畝之糞蓋分以均之之法出乎上糞以治之之力出乎下互相備也臣按先儒謂此章之說與王制不同然皆是說庶人在官之祿必視農夫之上下以為多寡也王制謂諸侯之下士視上農夫祿足以代其耕孟子謂小國之下士與庶人之在官者同祿祿足以代其耕則王制所謂下士視上農夫食九人則府食八人史食七人胥食六人徒食五人孟子所謂下士與庶人在官者同祿蓋亦與王制之意同也但周禮所謂府史胥徒胥雖列於府史之下然十徒而後一胥胥乃衆人之中有材智為什長者則其祿當比三者稍加優而賈氏特序而順推之以為多於徒而少於史恐未必然也以上言吏胥周禮司𨽻掌五𨽻之法辨其物而掌其政令帥其民而搏盜賊役國中之辱事為百官積任器凡囚執人之事邦有祭祀賓客喪紀之事則役其煩辱之事掌帥四翟之𨽻使之皆服其邦之服執其邦之兵守王宮與野舍之厲禁王昭禹曰五𨽻罪𨽻與四夷之𨽻也掌五𨽻之法則其役使之差等各有度數存焉辨其物則衣服兵器之屬也掌其政令正之則有政使之則有令也帥其民而搏盜賊役國中之辱事民謂五𨽻之民也盜賊之未獲者則司𨽻帥而搏之國中汚辱之事則司𨽻帥而役之以五𨽻之屬各有百二十人則足以供其事非特是也百官任用之器亦其民為積之也凡囚執罪人之事亦使為之也邦有祭祀賔客喪紀亦役之也掌帥四翟之𨽻守王宮與野舍之厲禁蓋以四夷之民內守王宮外守厲禁皆司𨽻帥之也臣按𨽻謂給勞辱之役者設官以掌之謂之司𨽻而司𨽻又統其屬有五焉曰罪𨽻曰蠻𨽻曰閩𨽻曰夷𨽻曰貉𨽻先王之世設為百官百執事各有其職所以奉上而臨下者禮節事為舉其大者而已若夫勞苦之役卑瑣之務汚辱之事必有卑賤者以代之此司𨽻之官所由設也所謂帥其民者役常民而為之也罪𨽻者有罪而役之也蠻閩夷貉則俘虜而用之者也然不徒供使令也衛王宮守厲禁搏盜賊養鳥獸牧牛馬助牽傍皆用之焉今制凡大小衙門各設直㕔皂𨽻於凡職官自一品至九品又皆給以皂𨽻以供使令之用其多寡之數隨其品級以為等差此即役常民而用之者也若夫民有犯該徒者法司又計其嵗月俾其給役於諸司即周人罪𨽻之餘意條狼氏掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人吳澄曰條除也狼道上之狼扈也趨謂疾行辟謂辟除行人也臣按先儒謂條狼氏掌執鞭以辟道路之穢惡及車馬人物之壅塞不通者即今制職官出而𨽻人引路以傳呼者也左傳昭公七年芈尹無宇曰天有十日人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧孔頴達曰環齊要略云自營為某八某為公言正無私也大夫者夫之言扶也大能扶成人也士者事也言能理庶事也服䖍云皂造也造成事也輿衆也佐皂舉衆事也𨽻𨽻屬於吏也僚勞也共勞事也僕僕豎主藏者也臺給臺下微名也此皆以意言之臣按人有十等自王公而下數而至於臺極矣諺所謂一階服事一階即此意也以上言徒𨽻以上論胥𨽻之役大學衍義補卷九十八
