body:
  text: 大學衍義補卷七十二明丘濬撰治國平天下之要崇教化明道學以成教下中庸曰天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達德也所以行之者一也朱熹曰達道者天下古今所共由之路即書所謂五典孟子所謂父子有親君臣有義夫婦有别長幼有序朋友有信是也知所以知此也仁所以體此也勇所以強此也謂之達徳者天下古今所同得之理也一則誠而已矣達道雖人所共由然無是三徳則無以行之達徳雖人所同得然一有不誠則人欲間之而徳非其徳矣或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也朱熹曰知之者之所知行之者之所行謂達道也以其分而言則所以知者知也所以行者仁也所以至於知之成功而一者勇也以其等而言則生知安行者知也學知利行者仁也困知勉行者勇也蓋人性雖無不善而氣稟有不同者故聞道有蚤莫行道有難易然能自強不息則其至一也吕大臨曰所入之塗雖異而所至之域則同此所以為中庸若乃企生知安行之資為不可幾及輕困知勉行謂不能有成此道之所以不明不行也子曰好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以脩身知所以脩身則知所以治人知所以治人則知所以治天下國家矣朱熹曰此言未及乎達徳而求以入徳之事通上文三知為知三行為仁則此三近者勇之次也斯三者指三近而言人者對己之稱天下國家則盡乎人矣吕大臨曰愚者自是而不求自私者徇人欲而忘返懦者甘為人下而不辭故好學非知然足以破愚力行非仁然足以忘私知恥非勇然足以起懦臣按理之在人人人所同由者道也人人所同得者徳也人人所同存者誠也得天下古今人所同由者於己徳也存天下古今人所同得者於心誠也非知之則無所見非行之則無所得學者未至於生知安行之域此學知利行困知勉行之功所以不可無也教者因其資質之近而導以入之使各至其至焉則天下無棄才矣誠之者擇善而固執之者也博學之審問之愼思之明辨之篤行之朱熹曰聖人之徳渾然天理眞實無妄不待思勉而從容中道未至於聖則不能無人欲之私而其為徳不能皆實故未能不思而得則必擇善然後可以明善未能不勉而中則必固執而後可以誠身學問思辨所以擇善而為知學而知也篤行所以固執而為仁利而行也或曰學問思辨亦有序乎朱熹曰學之博然後有以備事物之理故能參伍之以得所疑而有問問之審然後有以盡師友之情故能反覆之以發其端而可思思之謹則精而不雜故能有所自得而可以施其辨辨之明則斷而不差故能無所疑惑而可以見於行行之篤則凡所學問思辨而得之者又必皆踐其實而不為空言矣饒魯曰學必博然後有以聚天下之見聞而周知事物之理問必審然後有以祛其學問之所疑而自得於心辨必明然後有以别其公私義利是非眞妄於毫釐疑似之間則不至於差繆擇善至此可謂精矣如是而加以篤行則日用之間由念慮之微以達於事為之著必能去利而就義取是而舍非不使人欲之私得以奪乎天理之正而凡學問思辨之所得者皆有以踐其實矣所執如此其固為何如許謙曰博學是總說聖賢每教人博學夫子謂博學於文顏子謂博我以文孟子謂博學而詳說之蓋為學規模不廣淺見謏聞安能知道問思以下是逐一事一節理會問須是詳審使答者辭盡意暢如樊遲問仁知既聞於師又質於友必達其意而後止既問而得之又思之使自得於心思則必愼思之不及非愼也思之過非愼也思之泛非愼也思之鑿非愼也思既得之又加辨晰使明徹無纎毫疑滯然後措之行事而篤焉臣按誠之之道在乎擇善固執所以擇善而固執之者則在乎博學審問愼思明辨篤行焉章句謂此五者誠之之目也程子曰五者廢其一非學也學者烏可不循序而兼致其功乎有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之已百之人十能之已千之果能此道矣雖愚必明雖柔必强朱熹曰君子之學不為則已為則必要其成故常百倍其功又曰明者擇善之功强者固執之效按或又謂子思之意蓋曰人有弗學者學之有弗問者問之學之問之弗得弗措則為必要其成朱子以學字為句且曰弗為則已則人有弗學弗問者矣與下文人一已百等語文不相貫其說亦有理吕大臨曰君子所以學者為能變化氣質而已徳勝氣質則愚者可進於明柔者可進於强不能勝之則雖有志於學亦愚不能明柔不能立而已矣蓋均善而無惡者性也人所同也昏明强弱之稟不齊者才也人所異也誠之者所以反其同而變其異也夫以不美之質求變而美非百倍其功不足以致之今以鹵莽滅裂之學或作或輟以變其不美之質及不能變則曰天質不美非學所能變是果於自棄其為不仁甚矣臣按為學最是變化氣質為難為學而能變己之氣質則其學成矣施教而能變人之氣質則其教成矣故君子尊徳性而道問學致廣大而盡精微極高明而道中庸溫故而知新敦厚以崇禮朱熹曰尊者恭敬奉持之意徳性者吾所受於天之正理道由也溫猶燖溫之溫謂故學之矣復時習之也敦加厚也尊徳性所以存心而極乎道體之大也道問學所以致知而盡乎道體之細也二者脩徳凝道之大端也不以一毫私意自蔽不以一毫私欲自累涵泳乎其所已知敦篤乎其所已能此皆存心之屬也析理則不使有毫釐之差處事則不使有過不及之謬理義則日知其所未知節文則日謹其所未謹此皆致知之屬也蓋非存心無以致知而存心者又不可以不致知故此五句大小相資首尾相應聖賢所示入徳之方莫詳於此學者宜盡心焉臣按尊徳性道問學二者儒者為學之大端也二者不可偏廢致廣大極高明溫故敦厚四者尊徳性之目也盡精微道中庸知新崇禮四者道問學之目也朱子謂其大小相資首尾相應聖賢所示入徳之方莫詳於此蓋二者可相有而不能相無偏其一則非聖人之道儒者之學矣彼陸九淵者乃欲專以其一為學烏有是理哉孟子曰中也養不中才也養不才故人樂有賢父兄也如中也棄不中才也棄不才則賢不肖之相去其間不能以寸朱熹曰無過不及之謂中足以有為之謂才養謂涵育薫陶俟其自化也賢謂中而才者也樂有賢父兄者樂其終能成已也為父兄者若以子弟之不賢遂遽絶之而不能教則吾亦過中而不才矣其相去之間能幾何哉張栻曰中者以徳言才者以質言惟有徳者為能涵養性情而無過不及之患故謂之中而其倚於一偏者不能自正者則謂之不中天資美茂如忠厚剛毅明敏之類皆謂之才而其資稟之不美以陷於刻薄柔懦愚暗之流則謂之不才父兄之於子弟見其不中不才也則當思所以教之教之之道莫如養之養之者如天地涵養萬物其雨露之所霑風雷之所振和氣之薫陶寧有間斷乎哉故物以生遂焉父兄養子弟之道亦當如是也寛裕以容之義理以漸之忠信以成之開其明以祛其惑引之以其方而使之自喻夫豈歲月之功哉彼雖不中不才涵養之久豈無有萌焉如其有萌養道益可施矣臣按孟子此章言父兄之於子弟必當有以教養之然國家之於臣下師儒之於子弟亦莫不然茍不能養之而棄絶之則其間之相去其與父兄之於不中不才子弟何異哉孟子曰仁人心也義人路也舍其路而弗由放其心而不知求哀哉人有雞犬放則知求之有放心而不知求學問之道無他求其放心而已矣程頤曰心至重雞犬至輕雞犬放則知求之心放則不知求豈愛其至輕而忘其至重哉弗思而已矣聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也朱熹曰仁者心之徳程子所謂心如榖種仁則其生之性是也然但謂之仁則人不知其切於已故反而名之曰人心則可以見其為此身酬酢萬變之主而不可須臾失矣義者行事之宜謂之人路則可以見其為出入往來必由之道而不可須臾舍矣哀哉二字最宜詳味令人惕然有深省處上兼言仁義而下專論求放心者能求放心則不違於仁而義在其中矣學問之事固非一端然其道則在於求其放心而已蓋能如是則志氣清明義理昭著而可以上達不然則昏昧放逸雖曰從事於學而終不能有所發明矣臣按蔡淵曰或者但見孟子有無他而已矣之語便立為不必讀書窮理只要存本心之說所以卒流於異學集註謂學問之事固非一端然其道則在於求放心而已正所以發明孟子之本意以示異學之失學者切宜玩味竊考其所謂異學者蓋指當時陸九淵也至今學者猶有假之以惑世廢學切宜痛絶孟子曰羿善射者之教人射必志猶期也於彀弓滿也學謂學射者亦必志於彀大匠工師也誨人必以規矩匠之法也學者亦必以規矩朱熹曰此章言事必有法然後可成師舍是則無以教弟子舍是則無以學曲藝且然况聖人之道乎張栻曰彀者弩張回的處也射者期於中鵠也然羿之教人使志於彀鵠在彼而彀在此心心存乎此雖不中不逺矣學者學為聖賢也聖賢曷為而可至哉求之吾身而已求之吾身其則蓋不逺心之所同然者人所固有也學者亦存此而已存乎此則聖賢之門牆可漸而入也規矩所以為方圓大匠誨人使之用規矩而已至於巧則非大匠之所能誨存乎其人焉然巧固不外乎規矩也學者之於道其為有漸其進有序自洒掃應對至於禮儀之三百威儀之三千猶木之有規矩也亦循乎此而已至於形而上之之理則在其人所得何如形而上者固不外乎洒掃應對之間也舍是以求道是猶舍規矩以求巧也此章所舉二端教人者與受教於人者皆不可以不知臣按此章言施教受教之法朱熹謂師舍是則無以教弟子舍是則無以學張栻謂教人者與受教於人者皆不可不知孟子曰教亦多術矣予不屑之教誨也者是亦教誨之而已矣朱熹曰多術言非一端屑潔也不以其人為潔而拒絶之所謂不屑之教誨也其人若能感此退自修省則是亦我教誨之也尹焞曰言或抑或揚或與或不與各因其材而篤之無非教也張栻曰教人之道不一而足聖賢之教人固不倦也然有時而不輕其教誨者非拒之也是亦所以教誨之也然就不屑教誨之中亦有數端焉或引而不發而使之自喻或懼其躐等而告之有序聖賢之書若是者多矣又有以其信之未篤則不留於門使自求之如孟子之於曹交以其行之未善則拒而不見而使之知之如孔子之於孺悲凡此亦皆為不輕其教誨而乃所以教誨之也蓋聖賢言動無非教也在學者領略之何如耳臣按先儒謂不屑教非忍而絶之實將激而進之是亦多術中教誨之一術也孟子曰君子之所以教者五有如時雨化之者有成徳者有達財者有答問者有私淑艾者此五者君子之所以教也朱熹曰五者蓋因人品高下或相去逺近先後之不同時雨及時之雨也草木之生播種封植人力已至而未能自化所少者雨露之滋耳及此時而雨之則其化速矣教人之妙亦猶是也若孔子之於顏曾是已財與材同各因其所長而教之者也成徳如孔子之於冉閔達材如孔子之於由賜就所問而答之若孔孟之於樊遲萬章也私竊也淑善也艾治也人或不能及門受業但聞君子之道於人而竊以善治其身是亦君子教誨之所及若孔孟之於陳亢夷之是也孟子亦曰予未得為孔子徒也予私淑諸人也聖賢施教各因其材小以成小大以成大無棄人也張栻曰記曰當其可之謂時所謂有如時雨之化者也言如時雨之造化萬物也今夫物之萌者欲發甲者欲拆於是時也而雨及之則皆得以遂矣蓋不先不後當其可而適與之會無待於彼之求也君子之教其察之精矣於其告之得之者如物之被時雨焉其於欲達未達之間所賴者深矣龜山楊氏以為如告曾子以吾道一以貫之是也蓋曾子未嘗問而夫子呼以告之當其可也成徳者因其有徳而成之如顏閔仲弓之徒其徳之所存雖存乎其人而成之者聖人也達材者因其材而達之如賜之達由之果求之藝隨其天資所禀而達之使盡其材則教之功也臣按此章聖賢施教之道先儒謂君子之教人如天地之生物各因其材而篤焉天地無棄物聖賢無棄人公孫丑曰道則高矣美矣宜若登天然似不可及也何不使彼為可幾及而日孳孳也孟子曰大匠不為拙工改廢繩墨羿不為拙射變其彀率彎弓之限君子引引弓也而不發發矢也躍如如踊躍而出也也中道而立能者從之朱熹曰言教人者皆有不可易之法不容自貶以徇學者之不能也又因彀率而言君子教人但授以學之之法而不告以得之之妙如射者之引弓而不發矢然其所以不告者已如踊躍而見於前矣中者無過不及之謂中道而立言其非難非易能者從之言學者當自勉也此章言道有定體教有成法卑不可抗高不可貶語不能顯默不能藏張栻曰公孫丑之意以為孟子之道高大學者有難進之患欲少抑而就之庶其可以幾及而為之孶孳也夫聖人之道天下之正理不可過也不可不及也自卑者視之以為甚高而不知高之為中也自隘者視之以為甚大而不知大之為常也徇彼而遷就則非所以為道矣故孟子以大匠之繩墨羿之彀率為譬夫繩墨而可改則非所以為繩墨矣彀率而可變則非所以為彀率矣君子之教人引而不發引之使向方而發則係於彼也躍如者言其自得之如有所興起於中也蓋義理素存乎其心向也陷溺而今焉興起耳道以中為至中道而立其能者固從之其不能者亦莫如之何也已亦猶大匠設繩墨羿為設彀率以示人其能與不能則存乎其人耳中道而立能者從之此正大之體而天地之情也公都子曰滕更之在門也若在所禮而不答何也孟子曰挾貴而問挾賢而問挾長而問挾有勲勞而問挾故而問皆所不答也滕更有二焉趙岐曰滕更滕君之弟來學者也二謂挾貴挾賢也尹焞曰有所挾則受道之心不專所以不答也朱熹曰君子雖誨人不倦又惡夫意之不誠者張栻曰受道者以虚心為本虚則受挾則私意先横於胷中而可告語乎故空空之鄙夫聖人未嘗不竭兩端之教而滕更在門若在所禮而不答也使滕更思其所以不答之故於其所挾致力以銷弭之其庶幾乎荀子曰學惡音烏乎始惡乎終曰其數則始乎誦經終乎讀禮其義則始乎為士終乎為聖人眞積力久則入學至乎沒而後上也君子之學也入乎耳著乎心布乎四體形乎動靜小人之學也入乎耳出乎口口耳之間財四寸耳臣按程頤謂學未至而其言至者循其言亦可以入道荀子曰眞積力久乃入荀卿元不知此臣竊謂此所謂賢人而言聖人之道也揚子曰務學不如務求師師者人之模範模不模範不範為不少矣一鬨巷同之市不勝異意焉一卷之書不勝異說焉一鬨之市必立之平一卷之書必立之師習乎習以習非之勝是也况習是之勝非乎於戲學者審其是而已矣或曰焉知是而習之曰視日月而知衆星之蔑微也也仰聖人而知衆說之小也司馬光曰南方之俗以雕題為美羌戎之俗以焚尸為榮安於所習不知其非習小道者亦類於此人茍盡心於聖人之道則衆說之不足學易知矣又曰學者所以求為君子也求而不得者有矣夫未有不求而得者也臣按理有善有惡人有君子有小人為人而求為君子而不為小人非學不能也學也者所以明善而去惡也善明而惡去則不為小人而為君子矣韓愈曰古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣是故道之所存師之所存也嗟乎師道之不傳也久矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其下聖人也亦逺矣而恥學於師是故聖益聖愚益愚周惇頤曰或問曰曷為天下善曰師曰何謂也曰性者剛柔善惡中而已矣不達曰剛善為義為直為斷為嚴毅為幹固惡為猛為隘為彊梁柔善為慈為順為巽惡為懦弱為無斷為邪佞惟中也者和也中節也天下之達道也聖人之事也故聖人立教俾人自易其惡自至其中而止矣故先覺覺後覺闇者求於明而師道立矣師道立則善人多善人多則朝廷正而天下治矣朱熹曰此所謂性以氣稟而言也剛柔固隂陽之大分而其中又各有隂陽以為善惡之分焉惡者固為非正而善者亦未必皆得乎中也中也者和也天下之達道也此以得性之正而言也然其以和為中與中庸不合蓋就已發無過不及者而言之如書所謂允執厥中者也易其惡則剛柔皆善有嚴毅慈順之徳而無彊梁懦弱之病矣至其中則其或為嚴毅或為慈順也又皆中節而無太過不及之偏矣師者所以攻人之惡正人之不中而已矣師道立則善人多善人多則朝廷正而天下治此所以為天下善也又曰聖希天賢希聖士希賢伊尹顏淵大賢也伊尹恥其君不為堯舜一夫不得其所若撻於市顔淵不遷怒不貳過三月不違仁志伊尹之所志學顏子之所學過則聖及則賢不及則亦不失令名朱熹曰三者隨其用之淺深以為所至之近逺不失令名以其有為之實也胡宏曰周子患人以發策決科榮身肥家希世取寵為事也故曰志伊尹之所志患人以廣聞見工文辭矜智能慕空寂為事也故曰學顏子之所學又曰聖人之道入乎耳存乎心藴之為徳行行之為事業彼以文辭而已者陋矣程頤曰聖賢之言不得已也蓋有是言則是理明無是言則天下之理有闕焉如彼耒耜陶冶之器一不制則生人之道有不足矣聖賢之言雖欲己得乎然其包函盡天下之理亦甚約也後之人始執卷則以文章為先而其所為動多於聖人然有之無所補無之無所缺乃無用之贅言也而止於贅而已既不得其要則離眞失正反害於道必矣朱熹曰古之聖賢其文可謂盛矣然初豈有意學為如是之文哉有是實於中則必有是文於外如天有是氣則必有日月星辰之光耀地有是形則必有山川草木之行列聖賢之心既有是精明純粹之實以磅礴充塞乎其内則其著見於外者亦必自然條理分明光輝發越而不可掩蓋不必託於言語著於簡冊而後謂之文但是一身接於萬事凡其語默人所可得而見者無適而非文也姑舉其最而言則易之卦畫書之記言詩之詠歌春秋之述事與夫禮之威儀樂之節奏皆已列為六經而垂萬世其文之盛後世固莫能及然其所以盛而不可及者豈無所自來而世亦莫之識已程頤曰古之學者一今之學者三異端不與焉一曰詞章之學二曰訓詁之學三曰儒者之學欲趨道舍儒者之學不可言學便以道為志言人便以聖為志臣按程氏言今之學者有三謂詞章訓詁儒者也臣竊以謂詞章訓詁皆儒學之事也詞章以達意訓詁以解經儒者固不能外此以為學但肆意乎枝葉之文而不根乎義理局志於言語之末而不求夫道理則不可也或問古之道如是之明後世之道如是不明其故何也程頤曰此無他知道者多即道明知道者少即道不明也知者多少亦由乎教也眞徳秀曰以魯國言之止及今之一大州然一時間所出大賢十餘人豈不是有教以致然也蓋是聖人既出故有許多賢者以後世天下之大經二千年間求如一顏閔者不可得也臣按程氏謂知道多少皆由乎教則學校之設師儒之教誠不可無於天下也又曰坎之六四納約自牖人心有所蔽有所通通者明處也當就其明處而告之求信則易也非惟告於君者如此為教者亦然夫教必就人之所長所長者心之所明也從其心之所明而入然後推及其餘孟子所謂成徳達材是也臣按程頤謂納約自牖非惟告於其君如此為教者亦然蓋告教於人必就其所通以開其所蔽則易入也楊時曰學者學聖賢之所為也欲為聖賢之所為須是聞聖賢所得之道若只要博通古今為文章忠信原慤不為非義之士而已則古來如此等人不少然以為聞道則不可學而不聞道猶不學也志學之士當知天下無不可為之理無不可見之道思之宜深毋使心支而易昏守之宜篤毋使力淺而易奪要當以身體之以心驗之則天地之心自陳露於目前古人之大體已在我矣不然未免口耳之學古之學者以聖人為師其學有不至故其徳有差焉人見聖人之難為也故凡學以聖人為可至必以為狂而竊笑之夫聖人固未易至若舍聖人而學是將何所取則乎以聖人為師猶學射而立的然的立於此然後射者可視之而求中若其中不中則在人而已不立之的以何為準臣按射者必志於的不立的則無以為準而何以射哉儒者之學亦然故曰學以聖人為的朱熹白鹿學規曰父子有親君臣有義夫婦有别長幼有序朋友有信右五教之目堯舜使契為司徒敬敷五教即此是也學者學此而已而其所以學之之序亦有五焉其别如左博學之審問之愼思之明辨之篤行之右為學之序學問思辨四者所以窮理也若夫篤行之事則自修身以至於處事接物亦各有要其别如左言忠信行篤敬懲忿窒慾遷善改過右修身之要正其義不謀其利明其道不計其功右處事之要已所不欲勿施於人行有不得反求諸己右接物之要臣按朱氏此規雖為學者而設然聖賢之所以為聖賢及其所以為學與所以施教者皆不外乎此也所謂知其理之當然而責其身以必然凡為學者皆以是而責諸己施教者皆以是而求諸人人人皆然則道明而行矣天下豈有不平也哉張栻曰天下之物衆矣紛紜膠轕日更於前可喜可怒可慕可愕所以盪耳目而動心志者何可勝計而吾以藐然之身當之知誘於外一失其所止則遷於物夫人者統役萬物者也而顧乃為物役其可乎哉是以貴於講學也講學而明理則執天下之物不固而應天下之變不膠吾於天下之物無所惡而物無以累我皆為吾役者也吾於天下之事無所厭而事無以汩我皆吾心之妙用也豈不有餘裕乎然所謂講學者寧他求哉致其知而已知者吾所固有也本之六經以發其蘊泛觀千載以極其變即事即物身親格之超然會夫大宗則徳進業廣有其地矣臣按張栻大意謂人所以統役萬物而不為物役者貴乎有講學之功也講學在乎致知本之六經以發其藴泛觀千載以極其變即事即物身親格之超然會夫大宗以為進徳廣業之地吁學而會夫大宗則學之全體具而大用周矣黄幹曰有太極而隂陽分有隂陽而五行具太極二五妙合而人物生賦於人者秀而靈精氣凝而為形魂魄交而為神五常具而為性感於物而為情措諸用而為事物之生也雖偏且塞而亦莫非太極二五之所為此道原之出於天者然也聖人者又得其秀之秀而最靈者焉於是繼天立極而得道統之傳故能參天地贊化育而統理人倫使人各遂其生各全其性者其所以發明道統以示天下後世者皆可考也堯之命舜則曰允執厥中中者無所偏倚無過不及之名也存諸心而無偏倚措之事而無過不及則合乎太極矣此堯之得於天者舜之得統於堯也舜之命禹則曰人心惟危道心惟微惟精惟一允執厥中舜因堯之命而推其所以執中之由以為人心形氣之私也道心性命之正也精以察之一以守之則道心為主而人心聽命焉則存之心措之事信能執其中曰精曰一此又舜之得統於堯禹之得統於舜者也其在成湯則曰以義制事以禮制心此又因堯之中舜之精一而推其制之之法制心以禮制事以義則道心常存而中可執矣曰禮曰義此又湯之得統於禹者也其在文王則曰不顯亦臨無射亦保此湯之以禮制心也不聞亦式不見亦入此湯之以義制事也此文王之得統於湯者其在武王受丹書之戒則曰敬勝怠者吉義勝欲者從周公繫易爻之辭曰敬以直内義以方外曰敬者文王之所以制心也曰義者文王之所以制事也此武王周公之得統於文王者也至於夫子則曰博學於文約之以禮又曰文行忠信又曰克己復禮其著之大學曰格物致知誠意正心脩身齊家治國平天下亦無非數聖人制心制事之意焉此又孔子得統於周公者也顏子得於博文約禮克己復禮之言曾子得之大學之義故其親受道統之傳者如此至於子思則先之以戒懼謹獨次之以知仁勇而終之以誠至於孟子則先之以求放心而次之以集義終之以擴充此又孟子得統於子思者然也及至周子則以誠為本以欲為戒此又周子繼孔孟不傳之緒者也至二程子則曰涵養須用敬進學則在致知又曰非明則動無所之非動則明無所用而為四箴以著克己之義焉此二程得於周子者也先師文公之學見之四書而其要則尤以大學為入道之序蓋持敬也誠意正心修身而見於齊家治國平天下外有以極其規模之大而内有以盡其節目之詳此又先師之得其統於二程者也聖賢相傳垂世立教粲然明白若天之垂象昭昭然而不可易也雖其詳略之不同者愈講而愈明也學者之所當遵承而同守也違乎是則差也故嘗撮其要指而明之居敬以立其本窮理以致其知克己以滅其私存誠以致其實以是四者而存諸心則千聖萬賢所以傳道而教人者不越乎此矣臣按道學之傳起自堯舜而備於孔子至孟子沒中絶者千有餘年有宋周子始復開其端闡而明之者二程緒而成之者朱子也朱門高第弟子親得其眞傳者勉齋黄氏一人其在朱門亦猶孔門之有曾子焉其得之口傳心授者最為親切故其總敘聖賢道統所以傳授者眞而的詳而明有非諸儒所及者至其篇末又撮其要指而明之所謂居敬以立其本窮理以致其知克己而滅其私存誠以致其實所以發明聖賢傳道之要指示學者入道之方無餘藴矣臣謹剟六經諸子之言有及於道與學而可以成教於天下者備載於篇而終之以黄氏斯言蓋摘出前人傳授之實以為後人教學之準使之知所嚮方云以上明道學以成教下大學衍義補卷七十二
