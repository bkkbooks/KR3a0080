body:
  text: 大學衍義補卷一百二十五明丘濬撰治國平天下之要嚴武備牧馬之政下保甲養馬者自熙寧五年始先是中書省樞密院議其事於上前文彥博吳充言國馬宜不可闕今法馬死者責償恐非民願王安石以為令下而京畿投牒者已千五百户決非出於驅迫持論益堅帝詔開封府界保甲願牧馬者聽仍以陜西所市馬選給之六年曽布等承詔上其條約凡五路義勇保甲願養馬者户一匹物力髙願養二匹者聽皆以監牧見馬給之或官與其直令自市毋或彊與府界毋過三千匹五路毋過五千匹襲逐道路外乘越二百里者有禁在府界者免體量草二百五十束加給以錢布在五路者嵗免折變緣納錢三等以上十户為一保四等以下十户為一社以待病斃補償者保户馬斃保户獨償之社户馬斃社户半償之嵗一閲其肥瘠禁苛留者凡十有四條先從府界頒焉五路委監司經略司州縣更度之於是保甲養馬行於諸路矣馬端臨曰熙寧五年所行者户馬也元豐七年所行者保馬也皆是以官馬責之於民令其字養户馬則是蠲其科賦保馬則是蠲其征役臣按此宋熙寧保馬之法大類今日兩京畿河南山東編户養馬之法但宋人保甲養馬自願者聽及以官馬給之且免其體量草束及折變緣納錢今日則論丁養馬丁及數者與之不及數者足諸他户不問其願與否也糧草户役徴輸如故况宋人所謂保甲者不供他役今日則科賦征役非止一端而又於郡邑正佐之外加設以官里社之外别立羣長民以一身而當二役既為人而差復為馬而役既供芻糧以給公家之用復備芻秣以為官馬之養其害比宋為甚矣假令百姓竭力破産以飼養馬匹官得其用雖曰有損於民而實有益於官今所養之馬既皆小弱羸瘠有之若無驅逐數十里固已困憊矣况用以出塞禦戎乎是官民胥失之也夫養馬之令生必報數死必責償一馬之斃未償而一馬又斃前嵗之生未俵而嗣嵗又生生者嵗增而供給愈難死者日繼而陪償無已民何以為生乎今日兩京畿河南山東之弊政莫此為甚朝廷建國於北藉此數郡以為根本而當無事之時首先困之而不為之拯恤可乎知治體憂深思逺者所當為之軫念也伏惟聖明明見萬里之外仁同一視之中况此根本重地不出二三千里之外者乎萬乞留神聽察則宗社生靈不勝大幸哲宗嗣位議者爭言保馬之不便乃下詔以兩路保馬分配諸軍餘數發赴太僕寺不堪支配者斥還民户元祐初議興復廢監於是詔陜西河東相視所當置監又下河北陜西按行河渭并晉之間牧田以聞時已罷保甲教騎兵而還户馬於民右司諫王巖叟言兵所恃在馬而能蕃息者牧監也昔廢監之初識者皆知十年之後天下當乏馬已不待十年其弊已見此甚非國之利也乞收還户馬復置監如故監牧事委之轉運官而不專置使今鄆州之東平北京之大名元城衛州之淇水相州之安陽洺州之廣平監以及於瀛定之間柵基草地疆畫具存使臣牧卒大半猶在稍加招集措置可定而人免納錢之害國收牧馬之利豈非計之得哉臣按古今牧馬之制在官在民二者而已宋人始制牧監以牧馬是牧之於官至其中世改以為户馬保甲馬之法則是牧之於民也牧之於官雖不能無害而猶得馬之用牧之於民非獨有害而又不得馬之用焉昔王安石行新法而為户馬之制文彥博言於神宗不見用至元豐時其弊一如彥博所言神宗乃歎曰朕於是有愧於文彥博矣雖然神宗雖知所愧而不能有所改至哲宗乃罷之而復廢監百姓如釋重負而出於水火之中今日養馬之政不幸馴致於熙寧之弊誠能如元祐之改轅易轍則此數郡之民感戴聖恩如天矣嘉祐中置買馬司於原渭州德順軍而增為招市之令後開熙河則更於熙河置買馬司而以秦州買馬司𨽻焉又置熙河路買馬坊六岷州通逺軍等場熙寧七年詔知成都府秦延慶兼提舉戎黎州買馬以經度其事未幾罷之元豐中復命吕大防同成都府利州路轉運司經制邊郡之可市馬者林駉曰監牧之置圉師以蓄之校人以視之秣飼以時部轄有方則以渥窪之種耳否則貴市於夷狄而賤棄於中國此李覺之所以慮也臣按自唐以來中國馬不足往往與戎狄互市然多費財用而實無益於用宋南渡以後失中原宜馬之地而所資以為戰騎者求於西南夷蓋有不得已焉者今世全得中原之地凡西北髙寒之所宜馬之地皆為吾所有茍制置得宜牧養有道典掌得人又何患乎無馬乎患無其人耳神宗元豐四年郭茂恂言承詔議專以茶市馬以物帛市穀而併茶馬為一司臣聞頃時以茶易馬兼用金帛亦聽其便近嵗事局既分專用銀絹錢鈔非蕃部所欲且茶馬二者事實相須請如詔奏可仍詔以雅州名山茶為易馬用至是蕃馬至者愈衆六年買馬司復置兼茶事七年更詔以買馬𨽻經制熙河財用司經制司罷乃復故自李杞建議始於提舉茶司兼買馬其後二職分合不一林駉曰以摘山之利而易充廏之良戎人得茶不能為我害中國得馬足以為我利亦濟用之良䇿也臣按唐宋以茶易馬多是交互市於境外之夷我朝於四川置茶馬司一陜西置茶馬司四以茶易馬設官掌之蓋取之我羈縻之土民非若前代出境外而與蕃戎交易也髙宗時廣西進出格馬上曰此幾似代北所生廣西亦有此馬則馬之良者不必西北可知上因論春秋列國不相通所用之馬皆取於中國而己申公巫臣使吳與其射御教吳乘車則是雖吳亦自有馬今必於産馬之地而求之則馬政不修故也臣按宋南渡以後凡中國宜馬之地皆為金有然而張韓劉嶽之出戰亦未聞其乏馬建炎末廣西提舉峒丁李棫始請市戰馬赴行在紹興初𨽻經略司三年即雍州置司提舉市羅殿白杞大理諸蠻其後又置買馬司以帥臣領其事然諸蕃本自無馬蓋又市之南詔南詔今大理國也洪邁曰國家買馬南邊於雍管西邊於岷黎皆置使提督嵗所綱發者蓋踰萬匹使臣將校遷秩轉資治道數十州驛程劵食廏圉薪芻之費其數不資而江淮之間本非騎兵所能展奮因讀五代舊史唐明宗問范延光內外馬數對曰三萬六千匹帝歎曰太祖在太原騎軍不過七千先皇自始至終馬才及萬今有鐵馬如是而不能使九州混一是吾養士練兵之不至也延光對曰國家養馬太多計一騎士之費可贍步軍五人三萬五千騎抵十五萬步軍既無所施虛耗國力帝曰誠如卿言肥騎士而瘠吾民民何負哉明宗出於蕃戎猶能以愛民為念李克用父子以馬上立國制勝然所畜止於此今蓋數倍之矣尺寸之功不建可不惜哉且明宗都洛陽正臨中州尚以騎士為無所施今雖純用步卒亦未為失計也臣按古今馬政漢人牧於民而用於官唐人牧於官而給於民至於宋朝始則牧之在官後則蓄之於民又其後則市之於戎狄惟我朝則兼用前代之制在內地則散之於民即宋人户馬之令也在邊地則牧之於官即唐人監牧之制也而於川陜又有茶馬之設豈非宋人之市於夷者乎請以今日國馬之政言之在內有御馬監掌天子十二間之政以供乘輿之用凡立仗而駕輅者皆於是而畜之其牧放之地則有鄭村等草場其飼秣之卒則有騰驤等四衛國初都金陵設太僕寺於滁州其後定都於北又設太僕寺於京師凡兩淮及江南馬政則屬於南其順天等府暨山東河南馬政則屬於北其後又用言者每府州若縣添設佐二官一員專管馬政在外設行太僕寺於山西陜西遼東凡三處苑馬寺亦三處陜西甘肅各轄六監二十四苑遼東僅一監二苑焉內地則民牧以給京師之用外地則官牧以給邊方之用又於四川陜西立茶馬司五以茶易蕃戎之馬亦用以為邊也本朝國馬之制大略如此承平百年無大征伐遇有征行隨用隨足雖不至於大乏絶然求其如前代之雲錦成羣則未焉所謂官牧者是蓋唐人之四十八監宋人之十八監之遺制也然唐宋行之於內地而今日則用之於邊方焉其蕃育生息雖不能盡如國初之盛然惟馬之用不足而已而害未及於民一旦按其已然之迹而振舉其廢弛之政則祖宗之良法善政固在也乞命本兵柄大臣講求本朝故事及參究唐宋之典以濟今日之所不及遣知馬政者勘實牧地其有舊有而今為人所侵欺埋沒者咸復其舊或有山林原隰可以開墾以為牧地者開墾之或附近州縣有空閒地可以增置監苑者增置之士卒有逃亡者則為之勾補廏庌有未備者則為之修葺所畜之馬若牡多而牝少則為之添牝孳生之牝其種有不良則為之求良游牝去特必順其時騰放調養各有其法俵散關換咸定其規皆一一講求其所以然之故與其所當然之則立為一定之法使之永逺遵守嵗時遣官巡視有不如法者坐以牧放不如法之律必慎擇其官而優寬士卒必務臻實效而不為虛文如此則邊圉得馬之用矣若夫所謂民牧者是蓋宋王安石新法之遺緒也方宋神宗初行此法文彥博極言其不可而不見聽其後大為民害神宗有見愧彥博之言而深知安石之誤而亟罷之是以在當時雖為民害猶未至於甚也今日之弊臣已詳之於前矣而所以為之處置者亦已具於制軍伍之條之下焉然所處置者特議以行於畿甸五郡耳萬一可以通行請下兵部及兩太僕寺查算天下馬數某布政司若干某府若干某州若干某縣若干及查各府州縣原先有無草場及沒官空閒田地并可以為草場馬廏者假如某縣舊額民若干里户若干丁若干某縣原額馬若干匹羣長若干人既具其數遣官親臨州縣勘實以聞然後因其已然之法而立為救弊之政必不失其原額必不拂乎民情務使官得其用而民無其害然後行之請即一縣言之其縣舊有里五十羣長千人馬千匹今即就五十里之中擇其鄉村相依附處或十村五村為一大廏村落相去逺者或五六十家七八十家為一小廏每廏就其村居以有物力者一人為廏長年老者一人為廏老無力不能養馬者數人為廏卒每廏各設馬房倉囷及長槽大鑊每嵗春耕之候廏長遍諭馬户每領馬一匹者種稈禾若干畝料豆若干畝履畝驗之有不種者聞官責罰毋使失時無田者許其分耕於多田之家或出錢以租耕收穫之際廏長及老計畝而收之倉囷之中稈草料豆以飼馬而豆之萁即以為煮豆之用按日而出之嵗終具數以聞於官若其馬種即以在官之數充之若其種非良許其售而換之必求其良前此倒死未償之馬五分蠲其三徴其二以市馬種凡馬始生則書其月日别其毛色使有所稽考又令通曉馬事者定為養馬之式鏤板以示之凡一嵗游牝騰駒去特皆有其時越其時者有罪凡一日齕草飼料飲水皆有其節違其節者有罰其房庌必冬暖而夏凉其牧養必早放而晡收凡可以為馬之利者無不為凡可以為馬之害者無不去如此則牧養有其道其視各家人自為養者大不同矣舊例凡羣頭管領騍馬一百匹為一羣每年孳生駒一百匹不及數者坐以罪請酌為中制每騍馬十匹止取孳生七匹其年踰數者除以補他年缺闕之數今年不足明年補之其有種馬倒死者即以駒足其數本廏生牝多許他廏聞官以牡來易每廏兼畜驢騾以馬為凖牝馬二十畜牡驢一牝驢四所生或驢或騾具數報官官為造車遇有搬運官物許於各廏起倩無事之日本廏馬户借用者聽按日計傭收以為秣飼之用每季本縣管馬官一行巡視府官則嵗一行太僕寺官因事而行無定時凡其馬之壯老肥瘠逐月開具㸃視之凡房宇有不如度水草有不如法芻豆有不及數馳走有不如式皆為修葺處置違者治以罪是就民養之中而微寓以官牧之意上不失祖宗之成法下有以寬民庶之困苦中有以致馬政之不失大略如此雖然其間之委曲纎悉又在臨時之因事制宜補偏救弊也若夫俵散關換之法具有成規官軍領馬騎操遇有倒死責以追償是固足以為不行用心保惜者之戒但馬之給於官軍者多係餓損并老弱羸疾者及至官給草料多不以時或馬有不時之疾猝然莫救者亦往往有之律文死損數目竝不准除然一軍之産不滿十百而一馬之直多踰數千傾家之所有不足以償甚至賣三子不足以償一馬興言及此可傷也請自今以後給馬與軍必具其年齒毛色體質或肥或瘠或有疾或無疾明具於帳如齒踰十二或原瘦弱并有疾者不償惟以皮尾入官若雖少壯而忽然有奇疾先期告官及衆所共知者亦在不償之數詳見前卷馬質條下申明舊制凡馬軍皆要攢槽共餵如居隔逺秋冬之月皆俾就近攢餵半夜以後本管頭目親行㸃視草料有不如法及不及數者罪之其關領草料則嚴為立法不許變賣及將換易他物買者換者罪同凡馬倒死必責同伍互償若同伍之人知其馬之老瘠疾病及其人棄縱不理雇倩與人削減草料者預先告官料理者免其共償如此則人人愛惜其馬有不惜者人共責之而預得以調治之則馬無橫死而人免陪償矣是非獨以足乎馬而亦有以寬乎軍也雖然此內地官軍騎操之馬爾至於邊方之馬所係尤大與其得駑馬而乘之以禦敵又不若不乘之之為愈也蓋騎戰非中國所長而中國之馬比胡馬為劣以非長之技而騎下劣之馬以角敵人之所長非計之得也請自今給馬於軍士非良不與而所與者必良與之騎操而不倚之飼䬴宜於邊城中擇空閒地為廏置長槽或十或五隨其廣狹不為定數不分衛所隊伍因其近便而為飼養之所選其老弱之卒不堪戰陳者專一餵養置大囤以貯草支大鑊以煮料每日遣官㸃視晡時則檢其所儲夜半則視其所飼操練之日軍士持鞍就彼鞁騎無事之時輪番收放逐名調習或有瘦損疾病告官調治如此則馬得所養而無損失之患軍得其用而免陪償之苦矣或曰今邊城非一處處處皆屯重兵所騎之馬安能皆得其良竊考五代時唐明宗與范延光所言者李克用以馬上立國制勝所畜不過七千今東起自遼東西盡岷洮其間歷宣府大同延綏興慶甘肅之境邊城萬里其馬不翅數十倍矣然牧馬之數雖多未嘗以之臨敵出陳往往老死皂櫪之間而責吾士卒之陪償人不幸而生於邊界天苦寒而地磽燥物不生殖而人無蓄積天下之人莫苦焉既資其出力以為國防冦又責其出財以為官償馬以每嵗所賜豫之衣糧猶不足以償其遞年倒死之馬匹况望飽暖其妻子哉則是無事之時無故以是不戰之馬而坐困吾得用之士卒而使之失所離心蓋亦不思之甚也昔人有言帝王之師以萬全為勝中國之所以取勝於夷狄者以人不以馬以智不以力以守不以戰臣愚以為自今以後邊境一以髙城深池為固扼其要害塞其蹊徑來則拒之去則不追凡其制兵卒以步兵為正以騎兵為奇大率步十而騎二步軍一萬騎兵二千馬非壯健不以給軍軍非驍勇不以為騎扼之使不得入而已而不遮其出拒之使不敢來而已而不追其往如此則步兵無非良而馬亦易於辦矣或者若謂馬者兵之大用兵非馬決不能以制勝吁此論戰兵非所以論兵之守也所謂守者我靜而彼動我逸而彼勞我大而彼小我衆而彼寡彼用其所長我捨我之短而用我之長以制之焉則彼進不得戰而退可以回自然屈服於我矣臣愚無知識輒敢肆其胸臆而妄為異議伏望天地大量憫其區區一念憂邊愛民之誠以上論牧馬之政下大學衍義補卷一百二十五
