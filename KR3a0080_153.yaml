body:
  text: 大學衍義補卷一百五十三明丘濬撰治國平天下之要馭外蕃四方夷落之情周禮職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害王知禹曰職方氏掌天下之圖以掌天下之地非特圖也又掌其地焉東方曰夷其種有四南方曰蠻其種有八東南曰閩其種有七西北曰貉其種有九西方曰戎其種有五北方曰狄其種有六自邦國都鄙至於夷蠻閩貉戎狄雖有內外之殊然先王之政一視而同仁其人民之所聚財用之所出九榖之所生六畜之所産其數要不可以不辨也其利不可不知也臣按天地之大德曰生而其所以生者以人為貴而人之中有居中者焉有處外者焉中者混而同其性禀習俗雖有少異而其大略則同也外者環而繞之有接續之際而無混同之勢故其性禀習俗也始而近也則大同而小異終而逺也乃至於背戾而懸絶焉惟其勢異而情殊故帝王所以治之也修其教不易其俗齊其政不易其宜隨機而應變因事而制宜要在使之各止其所而已彼既止其所而不為疆埸之害則吾之內地華民得其安矣王制曰中國戎夷五方之民皆有性也不可推移東方曰夷被髮文身有不火食者矣南方曰蠻雕題交趾有不火食者矣西方曰戎被髮衣皮有不粒食者矣北方曰狄衣羽毛穴居有不粒食者矣鄭𤣥曰五方之民性不可推移地氣使之然也雕文謂刻其肌以丹青涅之不火食地氣暖不為病也不粒食地氣寒少五榖也吳澄曰皆有性謂其生禀各不同不可推移謂其生禀一定而不可易東方曰夷以下言四夷異俗文身與雕題同衣皮與衣羽毛同此亦言其俗之大略而已通典曰緬惟古之中華有居處巢穴焉有葬無封樹焉有手團食焉有祭立尸焉聊陳一二不能遍舉其地偏其氣梗不生聖哲莫革舊風訓誥之所不可禮義之所不及外而不內疏而不戚來則禦之去則備之臣按自古馭四夷之要法不出乎來則禦之去則備之二言而已以上總論四夷舜典竄三苗于三危朱熹曰三苗國名在江南荆揚之間恃險為亂者也竄則驅逐禁錮之分北三苗朱熹曰北猶背也其善者留其不善者竄徙之使分背而去也益稷苗頑弗即工帝其念哉帝曰迪朕德時乃功惟叙臯陶方祗厥叙方施象刑惟明蔡沈曰內而侯牧外而蕃夷皆蹈行有功惟三苗頑慢不率不肯就工帝當憂念之也帝言四海之內蹈行我之德教者是汝功惟叙之故其頑而弗率者則臯陶方敬承汝之功叙方施象刑惟明矣或者乃謂苗之凶頑六師征之猶且逆命豈臯陶象刑之所能致是未知聖人兵刑之叙與帝舜治苗之本末也蓋威以象刑而苗猶不服然後命禹征之征之不服而又增修德教及其來格然後分背之也禹貢三危既宅三苗丕叙蔡沈曰三危即舜竄三苗之地吕祖謙曰三苗有罪自當竄逐發政施仁自當及之故治水至三危亦既使安居大得其叙後世以為投之四裔若棄之者非聖人之心也臣按夷者外蕃之總名而經史所謂蠻則多指南方之夷也夷之見於經者始於三苗所謂苗民者舜典禹謨益稷禹貢吕刑皆具焉帝舜授禪之初既首竄之于三危至禹治水時其竄者既丕叙其留者猶不即工故帝命禹徂征然猶逆命及禹班師而後來格於是考其善惡而分背之焉蓋有虞之世西北之戎狄未熾所慮者南方之蠻耳故舜命臯陶為士首舉蠻夷猾夏為言所謂蠻者蓋三苗也其始也即其極惡者而竄徙之既竄之後而又於所留者分背其中之善與惡者焉善者則奬之而加以恩惡者則懲之而施以威加以恩則彼知所慕而興於為善施以威則彼知所畏而不敢為惡是則聖人之微權也今自巴蜀以東歷湖南北桂嶺雲貴數千里溪峝山箐之中有曰犵曰狑曰獠曰猺曰獞之類凡十數種皆所謂蠻也其間最輕捷者曰猫說者謂此即三苗之後也然今之猫依山以居性習不常無有倫紀禮義觀禹誓辭數苗之罪謂其君子在野小人在位則是時之苗蓋有國都官屬但其用舍顛倒耳非若今世之猫若猿猱然無定居無常業不相統屬也國初於湖北川東立宣慰司者五曰永順曰保靖曰貴州曰思州曰播州又有宣撫司安撫司及招討司長官司之設外此所謂軍民府及軍民指揮使司者又兼設土官以轄其夷人隨其地而設其官因其俗而為之治善者授以職惡者分其勢是蓋得有虞分背之義禹貢丕叙之意也秦昭王使白起伐楚略取蠻夷置黔中郡漢興改為武陵郡嵗令大人輸布一匹小口二尺是謂賨布臣按漢武陵郡即今常德澧辰沅等州郡是也始皇三十三年發諸嘗逋亡人贅壻賈人擊南越取其地置桂林南海象郡又閩越王無諸及越東海王搖者其先皆越王句踐之後也姓騶氏秦已并天下皆廢為君長以其地為閩中郡臣按秦并百粵嶺南有三郡桂嶺今廣西地南海今廣東地象郡今安南地也蓋越之地在古種類實多故有百越之名曰南越曰甌越曰閩越曰東越曰於越其地非一處其人非一種然自秦漢以來所謂於越東越甌閩之類皆已久入中國與齊魯宋衛無異惟所謂南越者其地西連湖湘直抵滇貴牂牁越嶲之境山深而地險猶有不盡歸王化者時時為郡邑居民害蓋今日湖南北廣東西其郡邑皆錯列山嶺之間與蠻夷雜居但有險易之異耳時或竊發難於備禦非若西北邊塞之有限隔也漢武帝時欲代閩越淮南王安上書言越方外之地剪髮文身之民不可以冠帶之國法度理也自三代之盛胡越不與受正朔非彊弗能服威弗能制以為不居之地不牧之民不足以煩中國也南方暑濕近夏疸熱暴露水居蝮蛇蠚噆也音壑生疾癘多作兵未血刃而病死者什二三雖舉越國而虜之不足以償所亡今以兵入其地必雉兔逃入山林險阻背而去之則復相羣聚留而守之歷嵗經年則士卒罷倦兵糧乏絶民苦兵事盜賊必起兵者凶事一方有急四面皆聳臣恐變故之生姦邪之作由此始也臣聞天子之兵有征無戰言莫敢校也如使越人䝉徼幸以逆執事之顔行猶言雁行謂在前厮輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之臣按閩越今福建地其入職方已久非復漢時舊矣然劉安所言南方濕毒兵入其地不待兵刃先自病死與夫兵至則濳藏兵退則復聚持久則士卒疲倦民苦兵事今日湖南廣右雲貴其山箐之瘴癘猫獠之情狀省民之受害實與漢時無異也明主在上以天地為量以宇宙為境遇有逺夷梗化則如安言以方寸之印丈二之組鎮撫方外不勞一卒不頓一㦸而威德竝行以一使之任代十萬之師毋使中國之民罹蝮蛇猛獸之毒染嘔泄霍亂之病親老涕泣孤子啼號迎尸千里之外棄骨無人之境如安所慮者非獨逺夷之幸實中國之幸也元帝初元三年珠崖儋耳郡率數年一反殺吏漢輒發兵擊定之至是諸縣叛連年不定上謀於羣臣欲大發軍待詔賈捐之曰臣聞堯舜聖之盛禹入聖域而不優以三聖之德地方不過數千里西被流沙東漸于海朔南暨聲教訖于四海言欲與聲教則治之不欲與者不彊治也殷周之地東不過江黃西不過氐羌南不過蠻荆北不過朔方是以頌聲竝作人樂其生越裳氏重九譯而獻此非兵革之所能致也至於秦興兵逺攻貪外虛內而天下潰畔孝武皇帝厲兵馬以攘四夷賦役煩重冦賊竝起是皆廓地太大征伐不休之故也今關東民困流離道路至嫁妻賣子法不能禁義不能正此社稷之憂也駱越棄之不足惜不擊不損威今陛下不忍悁悁之忿欲驅士衆擠之大海之中快心幽冥之地非所以救饑饉保元元也且以往者羌事言之暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此况於勞師逺攻亡士無功乎臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠崖專用恤關東為憂上以問大臣丞相于定國以為前擊珠崖興兵連年校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降今關東困乏民難搖動捐之議是詔珠崖民有慕義欲內屬便處之不欲勿彊蘇軾曰揚雄有言珠崖之棄捐之力也否則鱗介易我冠裳此言施於當時可也自漢末至五代中國避亂之人多家於此今衣冠禮樂蓋班班矣其可復言棄乎臣按捐之謂非冠裳之國禹貢所及春秋所治皆勿以為臣竊以為凡今日境土非祖宗所有者則可用捐之之䇿若夫祖宗初得天下即入版圖者其可以與人乎况本中國膏腴之地要害之塞昔人所謂一寸山河一寸金者哉非至於甚不得已而存亡安危之决在此不可輕言棄也順帝永和初武陵太守上書以蠻夷率服可比漢人增其租賦議者皆以為可尚書令虞詡獨奏曰自古聖王不臣異服非德不能及威不能加其獸心貪婪難率以禮是故羈縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢稅多少所由來久矣今猥增之必有怨叛計其所得不償其費臣按帝王之馭外蕃一惟以義勝之而不校其利舊有者不取則彼敢於恣肆舊無者取之則彼必至於怨望吾惟循其舊而已舊例之外毫末不加焉然又必因其災患匱乏而又時有所縱舍焉不責其備不逆其詐永和中侍御史賈昌與州郡討區憐等嵗餘不克帝召百官問以方略皆議遣大將發荆揚兖豫四萬人赴之李固駁曰荆揚盜賊盤結不散長沙桂陽數被徵發如復擾動必更生患兖豫之人逺赴萬里詔書迫促必致叛亡南州溫暑加有瘴氣致死亡者十有四五逺涉萬里士卒疲勞比至嶺南不復堪鬬軍行日三十里而兖豫去日南九千餘里三百日乃到人廪五升用米六十萬斛不計將吏驢馬之食設軍所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支九真日南相去千里發其吏兵猶尚不堪况乃苦四州之卒以赴萬里之艱哉前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏旬月之間破殄冦虜此發將無益之效州郡可任之驗也宜更選有勇略仁惠任將帥者以為刺史太守徙日南吏民北依交址還募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者許以封候列土之賞故并州刺史祝良性多勇决張喬前有破虜之功皆可任用四府悉從固議即拜良為九真太守喬為交址刺史喬至開示慰誘竝皆降散良到九真單車入賊中設方略招以威信降者數萬人皆為良築起府寺嶺外復平臣按李固此議言南方用兵之病弊切中事情使後世讀史者至此灼然如親在行間目擊其事千古如一日也至其所謂發將無益州郡可任者此皆已然之明效然後世藩服郡守任用不久隨即罷去夷獠知其去任之速不可倚仗而後來之吏又未必然往往疑信相半故雖暫服而復叛也請以今廣西左右兩江言之兩江地方二三千里其所轄狼兵無慮十數萬今設為府者四為州者三十有七其府州正官皆以土人為之而佐二幕職參用流官故今百餘年間未聞有屯聚侵掠者而所以為州縣害者皆是不屬土官管束之人錯雜州縣間者其間雖或亦有有司帶管及設土官巡檢者然流官無權彼知其不久而輕玩之而所謂土巡檢者官卑力薄不足以相鈐制臣愚以為今日制馭馴服之䇿莫急於立土官請用左右兩江之例而微寓夫設立軍衛之意蓋左右兩江府州之設專以其地屬之一姓臣所謂微寓設立軍衛之意者衆建官而分其權也凡今猺獞與編民雜居州縣之間但彼依山箐以居耳今宜特敕內外大臣躬臨其地召集其酋豪諭以朝廷恩威將授以官如左右兩江土官例俾其子孫世享之意有能率其種類五百名以上內附者即授以知州之職四百名以下量授同知判官吏目等官其官不拘名數亦如衛所之制既授其投詞不須勘實官給以冠服遣部屬以騶從鼓樂送歸所居徐俾其擇地立為治所合衆力成之既成具奏請印俾推其中一人為衆所信服者掌印則彼受朝廷爵命必知所感慕而其同類咸尊敬之有不伏者彼仗國威併力除之不難矣積久成俗彼皆慕華風習禮教而知殺掠之為非况衆設其官勢分力敵自足相制不能為亂而其中不能無自相爭訟者須至申上司奏朝廷則國家之勢益尊不勞兵戈而一方安靖矣然所慮為後日患者地界不明異時不能無爭耳宜乘其初即遣官㑹同土酋分立地界或以溪澗或以山阜就於界上立石為識大書深刻於上曰某至某為有司界至某為土官界其中民地有深入其境者即以外地無徵者與民易之隨其廣狹不復丈量其土酋所領地就俾其認納稅糧定為額數曰後不得有所加增如此處置庶幾其永無患乎唐貞元中廣西黃洞首領黃少卿者攻雍管及陷欽橫貴等州屢服屢叛長慶初經略使嚴公素復請討之兵部侍郎韓愈建言黃賊竝是夷獠無城郭可居依山傍險尋常亦各營生急則屯聚相保比緣雍管經略使多不得人德既不能綏懷威又不能臨制侵欺虜縛以致怨恨蠻夷之性易動難安遂致攻劫州縣侵暴平人或復私讐或貪小利或聚或散終亦不能為事近者征討本起於裴行立楊旻此兩人者本無逺慮深謀意在邀功求賞亦緣見賊未屯聚之時將謂單約立可摧破爭獻謀計惟恐後時朝廷信之遂允其請自用兵以來已經二年前後所奏殺獲計不下一二萬人儻皆非虛賊之所處又更荒僻假如盡殺其人盡得其地在於國計不為有益容貸羈縻比之禽獸來則捍禦去則不追亦未虧損朝廷事勢請為選有材用威信諳嶺南事者為經略使處理得宜自然永無侵叛之事臣按韓愈所言自用兵以來已經二年前後所奏殺獲一二萬人儻皆非虛賊已尋盡此言非獨當時之弊也古今人情不大相逺舉古可以知今惟聖明留意遇有逺方捷報以此言驗之洞見其真僞矣至其請為選有材用威信諳嶺南事者為經略使處理得宜自然永無侵叛之事此語誠古今處治南蠻之良䇿大抵蠻性隂柔倚山為勢軍來則入山逺避軍去則外出虜掠如蠅蚋然揮扇則飛散收扇則復集勦滅之甚難且其地多瘴癘中原之人憚入其地未至固已怯畏一入其地氣候不齊蒸濕特甚往往不戰而死既不可速戰又不可持久所以自古用兵未有大得志於南蠻者也雖然天下之患皆有所以然之故知其故而逆閉其塗絶其根則其患自息矣且今所謂猺獞者非有强宗豪族亦無深謀逺慮非欲爭城邑非欲收人心不過欲虜掠財物而已其所處深山大箐之中不為宫室之奉不為妻妾之用不為子孫之計所得之財將何所用而用之將何所貿易哉使吾內地之人不與之交通則彼所得財無所用而欲用之亦無所於售為今之計宜敕鎮守都憲督責藩臬帥閫及守令將領嚴束所部軍民不許與賊交通凡軍民人等有入山峝生理者許其赴官告知齎載某物赴某山峝貨賣官司給與印帖為照無帖者不許責令供結不敢將帶違禁器物惟許取其生口米榖土物不許受其銀兩及其地所不産之物違者枷號示衆沒入其財物親屬鄰保知情不首罪同有首告者給以其財物三之一如此則彼得物無所售而不劫質以求財而殺人以立威矣又聞近年以來其間城邑暮夜多有為賊所竊入者非殺死官員掠去印信輒避罪不以聞推原其故非彼之有能乃吾之無備也宜令守鎮都憲總兵等官規畫城池守備之法行下軍衛有司俾其遵守則永無失矣蓋嘗推求其所以竊入之故多因軍衛有司互相推調夜間失於覺察城邑往往至於失陷蓋非內無糧餉外無救援力屈而不能支也今後凡有城池去處責令軍衛有司正佐官僚寫立領狀責其與城相為存亡有失陷者决不輕恕則彼知罪責深重不敢輕忽則賊不能盜入矣所謂規畫守備之法者每城必為內垣荐棘樹柵總為一門昏夜既上城守即不容復下必至黎明然後開門彼知無可生路則寢不安席矣又預蓄乳犬馴伏之每五垜間用木為匱懸一吠犬微有風聲犬先知警彼不能架梯登垣而盜入之計無所施矣宋史古者帝王之勤逺略耀兵四裔不過欲安內而捍外非以求逞也西南諸蠻夷重山復嶺雜厠荆楚巴巫黔中四面皆王土乃欲竭上腴之征以取不毛之地疲易使之衆而得梗化之民誠何益哉樹其酋長使自鎮撫始終蠻夷遇之斯計之得也然無經久之䇿以控馭之狌鼯之性便於跳梁或以讐隙相尋或以饑饉所逼長嘯而起出則衝突州縣入則負固山林致煩興師討捕雖能殄除而斯民之荼毒深矣臣按唐虞之世東西北三邊之夷皆不經見而首見於經者南方之苗也然三方之夷皆一面臨邊夷居外而其中乃王土也惟南徼之地則夷人錯居王土之中與居民相雜故其害及民尤易非若三邊之冦其來有時其侵有處其行有程先時可以為備臨時不至於蒼茫失措仁宗時狄青請擊儂智高願得西邊蕃落兵自從或謂南方非騎兵所宜樞密使高若訥言蕃部善射耐艱苦上下山如平地當瘴未發時疾驅破之必勝之道也青卒用騎兵破賊臣按蕃落之兵以騎射名天下南夷聞之自然膽落然臣以為用之於有事之時不若無事之時遇有羌胡內附者即優加養給安置此方不徒今日徼南賴其用亦可以銷異時內地之禍宋初言於仁宗曰嶺南外區瘴癘薰蒸北方戍人往者九死一在多發兵則糧乏少則事不集急責功則蠻遁逃不肯出緩則復來擾人是宜有以制之也今聞發北兵踰萬人戍嶺外下濕上蒸病死必多料羣蠻勢不久屯擊之必散臣謂不如選一二健將嵗才留北兵五千人分屯要害處得善吏十數人分置諸州募土人為鄉軍復其租調視州大小户多少為之數統以部伍教以進退皆以彼所長技與相追逐率百人給北兵三十以徑弩利兵佐之冬春則使深入擾其居夏秋則使謹守防其略彼雖能誘納中國亡命要之食盡必出虜掠若其來也大大斬獲則終身創矣威已立後可議招來與之盟則固許之臣則久逺期五年近止一年南方無事矣臣按說者謂征蠻無全勝之䇿蓋以其地炎燠卑濕瘴癘特甚中原士卒不服水土不待戈矛之及矢石之交自相疾疫而死雖有百萬之兵亦無所施故也臣竊以為瘴癘之災特以加諸貧弱及不善調攝者爾若夫為將帥居顯要者則罕焉請命彼處守土重臣多方詢察久謫彼地之人夀而健者問其所以起居調攝之方詳稽備述刻梓以頒示士卒每隊伍中選一人專司其事有不遵條示而自恣不檢者必加以罪其所當備藥餌器具令有司給之張栻知靜江府奏本部備邊之郡九而雍管為最重雍之所管幅員數千里而左右兩江為最重自雍之西北有牂牁羅甸自此而西南有安南諸國皆其所當備者然雍之戍兵不滿千人所恃以為籬落者惟左右兩江溪峝共八千餘處民兵不下十萬首領世襲人自為戰如古諸候民兵之制其去雍管近者餘三百里逺者近千里所恃以維持撫治之者惟提舉盜賊都巡檢四人各以戍兵百餘為溪峝綱領其職任可謂不輕矣可不遴選其人謹護其土以為逺方久逺之計哉臣按唐分嶺南地為五管而桂雍容三管地屬嶺南西道在於本朝割容迤西之地屬廣東而廣西實全得桂雍二管及容管之少半雍即今南寧府其地控制左右兩江實為安南咽喉之地國初因前代之舊設太平田州思明鎮安四府龍州等七州正統初又升思恩州為府用其土人為守長佐二幕職則用流官惟太平府全用流官而其屬州仍其舊俗凡此羈縻州郡面內嵗久首領世襲人自為戰如古諸候民兵之制遇有征發亦賴其用但今控制之戍僅有南寧馴象二衛太平一所似乎單弱請如張栻所言及今無事時於此地屯兵以為重鎮遴選守將謹護其土以為久逺之計用以銷變於未然安南古交址也秦并天下於此置象郡秦亡南海尉趙他擊併之漢置九郡九真日南象三郡是為交址地後女子徵側反遣馬援平之立銅柱為漢界唐始分嶺南為東西二道置節度立五管官南𨽻焉五代劉𨼆并其地以為交址節度使其後管內大亂有丁部領者定之其子璉內附宋封為交址郡王交人封王自此始傳子璿為黎桓所奪淳化四年封桓為王桓卒子龍鉞立其弟龍廷殺鉞而代之龍廷欲修貢安撫使邵曄以聞真宗曰遐荒異俗不曉事體何可怪也仍封為王賜名至忠為其下李公藴所奪即封公藴為王李氏傳八世至昊旵閩人陳日煚為其壻遂有其國臣按交址本秦漢以來中國郡縣之地五代時為劉隱所并至宋初始封為郡王然猶授中國官爵勳階如所謂特進檢校太尉靜海軍節度觀察等使及賜號推誠順化功臣皆如內地之臣未始以國稱也其後封南平王奏章文移猶稱安南道孝宗時始封以王稱國而天下因以高麗真臘視之不復知其為中國之郡縣矣李氏傳八世陳氏傳十二世至日焜為黎季犛所篡季犛上表竄姓名為胡一元子蒼易名奆詐稱陳氏絶嗣奆為甥求權署國事我太宗皇帝從其請逾年陳氏孫名添平者始遁至京訴其實季犛乃表請迎添平還以國朝廷不逆其詐遣使送添平歸抵其境季犛伏兵殺之并及使者事聞太宗遍告於天地神祇聲罪致討遣征夷將軍朱能等征之能道卒命副將張輔總其兵生擒季犛及其子蒼澄獻俘京師詔求陳氏遺裔立之國人咸稱季犛殺之盡無可繼承者僉請復古郡縣遂如今制立交址都布按三司及各府州縣衛所諸司一如內地其後有黎利者中官庇之遂致猖肆上表請立陳氏後宣宗皇帝謂此皇祖意也遂聽之即棄其地俾復為國嗚呼自秦并百郡交址之地已與南海桂林同入中國漢武立嶺南九郡而九真日南交址與焉在唐中葉江南之人仕中國顯者猶少而愛州人姜公輔已仕中朝為學士宰相與中州之士相頡頑矣奈何世歷五代為土豪所據宋興不能討之遂使兹地淪為侏離藍縷之俗三百餘年而不得與南海桂林等六郡班班然衣冠禮樂以為聲明文物之鄉一何不幸哉其間宋人雖一逐其王元人雖再入其國都而終不能有我太祖皇帝開國之初陳氏首先納欵太祖著之祖訓不許後人伐其國陳氏為賊犛所戕太宗皇帝體高皇之意不絶陳氏之嗣遣使送還其國賊犛乃殺之并及使者不得已興師平之求陳氏後不可得乃用漢唐故事復立郡縣而守臣不謹遂至夷獠復肆而黎利者以求得陳氏後為詞宣宗皇帝體文皇之心俾復繼陳氏之絶不逆黎利之詐遂為所蔽羣臣屢請興兵討之章皇帝念聖祖之垂訓因置不問而九真日南之域秦漢以來之遺民既得見天日而又淪於幽谷之中何其重不幸哉竊惟今日彊域逺過有宋竝於唐而不及漢者以失嶺外此三郡也幸而得之而又失之似若可惜然守祖宗之訓而不愆不忘此繼述之大孝守成之大體也所可惜者一方之民重不幸耳安南彊域在秦漢為三郡地今其地東起廣東之欽州迤西歷廣西之左江至雲南之臨安元江為界欽以東海道與之對境欽之西乃南寧府界南寧之東南思明府所屬上思州忠州上下石西諸州太平府所屬龍英太平安平上下凍諸州皆與之接境而龍州乃其所必由之路而憑祥縣則其要害也鎮安府所屬有歸順及下雷峝亦與接境二峝迤西則雲南界矣臨安之阿迷州左能寨等九長官司皆其近界元江有水路通之而䝉自縣則其所必由之路也其道路在廣西則由太平府歷龍州及憑祥縣抵其諒山府至其所稱東都者可七日程在廣東則自欽州西南一日至其永安州由玉山等處至其東都可五日程在雲南則由臨安府經䝉自縣河底之蓮花灘至其東都可四五日程此中國與交南邊境之大略也以上言南大學衍義補卷一百五十三
