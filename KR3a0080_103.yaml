body:
  text: 大學衍義補卷一百三明丘濬撰治國平天下之要慎刑憲定律令之制下景帝中六年詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又笞者所以教之也其定箠令孝武即位徵發頻數百姓貧耗窮民犯法酷吏擊斷姦軌不勝於是進張湯趙禹之屬條定法令作見知故縱監臨部主之法見知人犯法不舉為故縱而所監臨部主有罪并連坐緩深故之罪急縱出之誅其後姦猾巧法轉相比況禁罔寖宻律令凡三百五十九章大辟四百九條千八百八十二事決事比比以例相比況也萬三千四百七十二事臣按漢祖入闗約法三章後蕭何廣為九篇叔孫通又増為十八篇自髙帝世至武帝時僅五六十年間爾乃増至三百五十九章其大辟乃有四百九條千八百八十二事其決事比乃至萬三千四百七十二事何禁網之密一至此㢤觀吕步舒治一淮南獄死者數萬人由是推之則當時死者不知凡㡬千百萬也意其當世之民舉手動足即陷刑辟大者可誅小者可論其不聊生也甚矣國之不亡蓋亦幸爾我朝自聖祖定律之後百有餘年條律之中存而不用者亦或有之未嘗敢有擅増一條者詩云不愆不忘率由舊章我列聖有焉宣帝時涿郡太守鄭昌上疏言聖王立法明刑者非以為治救衰亂之起也今明王躬垂明聼雖不置廷平獄將自正若開後嗣不若刪定律令律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末也政衰聽怠則廷平將招權而為亂首矣臣按聖人制刑以弼教輔治而使之不至於衰亂有虞之刑必得臯陶以為士有周之刑必得蘇公以敬獄蓋為政在人人必與法而兼用也鄭昌乃謂刑法非以為治救衰亂之起明王埀聽不必置廷平無律令而有廷平政衰聽怠之平將招權而為亂首是乃一偏之見也夫治國而無律令固不可有律令而無掌用之人亦不可人君雖有聰明之資亦無不用人用法而自垂聽之理元帝初下詔曰夫律令者所以抑暴扶弱欲其難犯而易避也今律煩多而不約自典文者不能分明而欲羅元元之不逮斯豈刑中之意哉其議律令可蠲除輕減者條奏惟是使安百姓而已臣按律令之設蓋懸法以示人使人知所避而不犯非故欲為是以待天下之罪人如人設網羅以待禽獸也後世之律往往文深而義晦比擬之際彼此可以旁通下人不知所守而舞智之吏得以輕重其罪誠有如此詔所謂今律煩多而不約自典文者不能分明而欲羅元元之不逮者所謂不逮者解者謂不逮言意識所不及也噫蚩蚩之民不能皆讀律令及其讀之又有所不逮者則其不幸而陷於罪者豈非上之人之過哉然則後世有制律者當何如亦曰淺易其語顯明其義使人易曉知所避而不犯可也今之律文䝉唐之舊文以時異讀者容或有所不逮者伏乞聖明簡命儒臣之通法意者為之解釋必使人人易曉不待思索考究而自有以得於言意之表則愚民知所守而法吏不得以容情賣法矣斯世斯民不勝大幸成帝河平中詔曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟之刑千有餘條律令煩多百餘萬言竒請它比日以益滋其令中二千石二千石博士及明習律令者議減死刑及可蠲除約省者令較然易知條奏書不云乎惟刑之恤哉其審核之務凖古法朕將盡心覽焉臣按漢之律百有餘萬言可謂煩多矣而大辟之刑至千有餘條視成周時蓋數倍焉元成之世竒請它比又日益滋多成帝下詔令中二千石二千石博士及明習律令者議減死刑及可蠲除省約者可謂知所先務矣所謂竒請它比者竒請謂常文之外别有所謂以定罪也它比謂引它類以比附之不主正律也分破律條妄生端緒舞弄文法巧詆文致意所欲生即援輕比意欲其死即引重例上不知其姦下莫明其故此民所以無所措手足網密而姦不塞刑繁而犯愈多也我朝律文比前代為省約其條止四百六十其死罪止二百二十用之餘百年于兹其中固有不用者矣未聞有所加増也特所謂例者出於一時之建請權宜以救時弊者也歲月既久積累日多朝廷未聞公有折衷是以刑官猶得以意為去取伏乞特下明詔如漢人所云者命在廷大臣及翰林儒臣會三法司官將洪武元年以來至于成化丁未以前事例通行稽考㑹官集議取其可為萬世通行者節其繁文載其要語分類條列以為一書頒布中外與大明律竝行其成化丁未以後有建請者或救時弊或逹民情則别為一書以俟他日之裁擇如此則民知所遵守吏不能為姦矣光武時桓譚上疏曰今法令決事輕重不齊或一事殊法同罪異論姦吏得因緣為市所欲活則出生議所欲陷則予死比是為刑開二門也今可令通義理明習法律者校定科比一其法度班下郡國蠲除故條如此天下知方而獄無寃濫矣臣按成帝之詔令博士及明律令者議桓譚之請亦欲令通義理明法律者校定蓋博士明經者也經者禮義之所自出人必違於禮義然後入於刑法律令者刑法之所在也議而校定必禮義法律兩無歉焉本是以立天下之法用是以酌生民之情無間然矣後世乃謂儒生迂拘止通經術而不知法意應有刑獄之事止任柱後惠文冠而冠章甫衣縫掖者無與焉斯人也非獨不知經意而其所謂律意者蓋有非先王之所謂者矣漢世去古未逺猶有古意此後世所當取法者也和帝時廷尉陳寵鉤校律令條法溢於甫刑即吕刑者除之曰臣聞禮儀三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮則入刑相為表裏者也今律令死刑六百一十罰罪千六百九十八贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪宜令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并為三千悉刪除其餘令與禮相應以易萬人視聽以致刑措之美傳之無窮未及施行及寵免其子忠略依寵意奏上二十三條為決事比以省請讞之弊又上除蠶室刑解贓吏三世禁錮狂易殺人得減重論母子兄弟相代聽赦所代者事皆施行臣按漢去古未逺論事往往主於經義而言刑者必與禮竝其原蓋出於吕刑伯夷降典折民惟刑陳寵論刑必欲大辟二百耐罪以下二千八百并為三千以合於禮固似乎泥然其所平定惟取其應經合義者則百世定律之至言要道也至其子忠為決事比請除蠶室刑解贓吏三世禁錮狂易殺人得減死論母子兄弟相代聽赦所代者蓋有補於世教可謂克肖其父矣晉武帝時有邵廣者坐盜官物當棄市其二㓜子宗雲撾登聞鼔乞恩求自没為奚官奴以贖父命議者欲特聽減廣死罪為五歲刑宗等付奚官為奴而不為永制尚書右丞范堅駁之曰自淳朴旣散刑辟乃加刑之所以止刑殺之所以止殺雖時有赦過宥罪議獄緩死未有行不忍而輕易典刑者也且旣許宗等宥廣罪若復有宗比而不求贖父者豈不擯絶人倫同之禽獸耶今聽宗等而不為永制臣以為王者之作動闗盛衰嚬笑之間尚慎所加今之所以宥廣正以宗等爾人之愛父誰不如宗今旣許之將來訴者何獨匪人特聽之意未見其益不以為例交興怨讟此為施一恩於今而開萬怨於後也從之臣按人君所舉即以為例故凡事謀始事茍不可繼於後即必不可創於前也元康中朝臣務以苛察相髙每有疑議羣下各立私意刑法不一獄訟繁滋裴頠表言先王刑賞相稱輕重無二故下聽有常羣吏安業先因風落廟闕屋瓦數枚免太常荀㝢事輕責重有違常典其後主者懲懼前事雖知小事而按劾難測搔擾驅馳各競免負夫刑書之文有限而舛違之故無方故有臨時議處之制不能皆得循常也至於此等皆為過當恐姦吏因緣得為深淺劉頌上疏言近世法多門令不一吏不知所守下不知所避姦偽者因以售其情居上者難以檢其下事同議異犴獄不平夫君臣之分各有所司法欲必奉故令主者守文理有窮塞故使大臣釋滯事有時宜故人主權斷主者守文若釋之執犯蹕之平也大臣釋滯若公孫𢎞斷郭解之獄也人主權斷若漢祖戮丁公之為也天下萬事非此類不得出意妄議皆以律令從事然後法信於下人聽不惑吏不容姦可以言政矣臣按裴頠謂刑書之文有限舛違之故無方故有臨時議處之制劉頌謂法欲必奉令主者守文理有窮塞使大臣釋滯事有時宜請人主權斷非此類不得出意妄議皆以法令從事二臣之言可以為後世議處刑獄之法隋定律令置十惡之條多採齊之制而頗有損益一曰謀反二曰謀大逆三曰謀叛四曰惡逆五曰不道六曰大不敬七曰不孝八曰不睦九曰不義十曰内亂十惡及故殺人獄成者雖會赦猶除名臣按十惡之名非古也起於齊而著於隋唐因之所謂謀反大逆及叛大不敬此四者有犯於君臣之大義所謂惡逆不孝不睦内亂四者有犯於人道之大倫所謂不道不義二者有犯於生人之大義是皆天理之所不容人道之所不齒王法之所必誅者也故常赦在所不原自隋以前死刑有五曰罄絞斬梟裂而流徒之刑鞭笞兼用數皆踰百至隋始定為笞刑五自十至于五十杖刑五自六十至于百徒刑五自一年至于三年流刑三自千里至于三千里死刑二絞斬除其鞭刑及梟首轘裂之酷臣按笞杖徒流死此後世之五刑也始於隋而用於唐以至於今日萬世之下不可易也唐之刑書有四曰律令格式令者尊卑貴賤之等治國家之制度也格者百官有司之所常行之事也式者其所常守之法也凡邦國之政必從事於此三者其有所違及人之為惡而入于罪戻者一斷以律律之為書因隋之舊為十有二篇一曰名例二曰衛禁三曰職制四曰戸昏五曰廐庫六曰擅興七曰盜賊八曰鬬訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄其用刑有五一曰笞笞之為言恥也凡過之小者箠撻以恥之漢用竹後世更以楚書曰扑作敎刑是也二曰杖杖者持也可持以擊也書曰鞭作官刑是也三曰徒徒者奴也蓋奴辱之周禮曰其奴男子入于罪𨽻任之以事寘之圜土而教之量其罪之輕重有年數而捨四曰流書曰流宥五刑謂不忍刑殺宥之于逺也五曰死乃古大辟之刑也唐因隋制高祖入京師約法十二條後詔裴寂等更撰律令凡律五百麗以五十三條流罪三皆加千里居作三歲至二歲半者悉為一歲餘無改焉太宗即位詔長孫無忌房𤣥齡等復定舊令𤣥齡等與法司増損隋律降大辟為流者九十二流為徒者七十一以為律定令一千五百四十六條以為令又刪武徳以來勑三千餘條為七百條以為格又取尚書省列曹及諸等監十六衛計帳以為式臣按自魏李悝作法經六篇蕭何加以三篇為九章後世作律者本以為宗劉劭衍漢律為魏賈充參魏律為晉唐長孫無忌等聚漢魏晉三家擇可行者定為十二篇自名例至斷獄是也本朝洪武六年命刑部尚書劉惟謙等重定諸律以協厥中而近代比例之繁姦吏可資以出入者咸痛革之毎一篇成輒繕冩上奏揭於西廡之壁聖祖親御翰墨為之裁定明年書成篇目一凖於唐之舊采用己頒舊律二百八十八條讀律百二十八條舊令改律三十六條因事制律三十一條掇唐律以補遺一百二十三條合六百有六分為十三卷其間或損或益或仍其舊務合輕重之宜其後以其比類成篇分合無綂復為釐正定為吏戸禮兵刑工六類析十八篇以為二十九約六百六條以為四百六十析户昏以為戸役昏姻分鬭訟以為鬭毆訴訟廐庫一也則分廐牧於兵倉庫於戸焉職制一也則分公式於吏受贓於刑焉名例舊五十七條今止存其十有五賊盜舊五十三條今止存其二十八名雖沿於唐而實皆因時以定制緣情以制刑上稽天理中順時宜下合人情立百世之準繩為百王之憲度自有法律以來所未有也且又分為六部各有攸司備天下之事情該朝廷之治典綂宗有綱支節不紊無比附之勞有歸一之體吏知所守而不眩於煩文民知所避而不犯於罪戾誠一代之良法聖子神孫所當遵守者也然臣於此竊有見焉蓋刑法雖有一定不易之常而事情則有世輕世重之異方天下初定之時人稀事簡因襲前代之後政亂人煩今則承平日久生齒日繁事久則弊生世變則俗改是以周人象魏之法每嵗改懸三典之建隨世輕重蓋前日之要策乃今日之芻狗此必然之勢亦自然之理也今法司於律文之中往往有不盡用者律文如此而所以斷罪者如彼罪無定科民心疑惑請下明詔㑹官計議本之經典酌諸事情揆之時宜凡律文於今有窒礙者明白詳著於本文之下若本無窒礙而所司偶因一事有所規避遂為故事者則改正之仍勑法司自時厥後内外法司斷獄一遵夫成憲若事有窒礙明白具奏集議不許輒引前比違者治以専擅之罪如此則法令畫一情罪相當而民志不惑矣唐自房𤣥齡等更定律令格式訖太宗世用之無所變改髙宗時又詔長孫無忌等増損格勑其曹司常務曰留司格頒之天下曰散分格其後武后時有垂拱格𤣥宗時有開元格憲宗有開元格後勑文宗有太和格又有開成詳定格宣宗又以刑律分類為門而附以格勑為大中刑律綂類歐陽脩曰書曰慎乃出令令在簡簡則明行之在久久則信而中材之主庸愚之吏常莫克守之而喜為變革至其繁積雖有精明之士不能徧習而吏得上下以為姦此刑書之弊也臣按我朝之律僅四百六十條頒行中外用之餘百年于兹列聖相承未嘗有所増損而於律之外未嘗他有所編類如唐宋格勑者所謂簡而明久而信真誠有如歐陽氏所云者萬世所當遵守者也髙帝時趙冬曦言隋著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪則舉輕以明重立夫一言而廢其數百條自是迄今竟無刋革遂使死生罔由乎法律輕重必因夫愛憎蓋立法貴乎下人盡知則天下不敢犯耳何必飾其文義簡其科條哉夫科條省則下人難知文義深則法吏得便下人難知則暗陷機穽矣安得無犯法之人法吏得便則比附而用之矣安得無弄法之臣請律令格式直書其事無假文飾其以准加減比附量情及舉輕以明重不應為而為之之類皆勿用之使愚夫愚婦聞知必悟則相率而逺之矣亦安肯知而故犯哉故曰法明則人信法一則主尊臣按冬曦之言謂立法貴乎下人盡知何必飾其文義簡其科條請更定科條直書其事毋假文飾以其准加減比附量情皆勿用之使愚夫愚婦聞之必悟切中後世律文之弊臣愚以為今之律文多䝉於唐唐之律則䝉隋也冬曦所論者雖曰隋唐之失然自隋以至於今古今一律切考今律為卷三十為條四百六十必欲不簡其科條不飾其文義惟直書其事顯明其義用世俗淺近之言備委曲詳盡之義所謂以准加減等文皆即實以書明白著其文曰該得某罪該杖㡬十所加者何罪所減者㡬何使天下有目者所共見有耳者所共聞粗知文義者開卷即了其義不待思索議擬而皆暸然於心目之間昭然於見聞之頃則民知所趨避不陷於機穽矣說者若謂祖宗成憲不敢有所更變臣非敢欲有所更變也特欲於本文之下分書其所犯之罪所當用之刑或輕或重或多或少或加或減皆定正名皆著實數所讀律者不用講解用律者不致差誤爾儻以臣言為可采乞命法官集㑹儒臣同加解釋標註其於四百六十之條不敢一毫有所加減惟於卷帙稍加増耳夫制為一代之律以司萬人之命垂萬世之憲非他書比今天下書籍支辭蔓語費楮何啻千萬顧於律書簡約如此無乃詳於古而略於今重乎詞而輕乎法哉迂儒過慮死罪死罪伏惟聖明矜察宋法制因唐律令格式而隨時損益則有編勑一司一路一州一縣又别有勑神宗以律不足以周事情凡律所不載一斷以勑乃更其目曰勑令格式而律恒存乎勑之外曰禁於未然之謂勑禁於已然之謂令設於此以待彼之謂格使彼效之之謂式凡入笞杖徒流死自名例以下至斷獄十有二門麗刑名輕重皆為勑自品官以下至斷獄三十五門約束禁止者皆為令命官之等十有七吏庶人之賞等七十有七又有倍全分釐之級凡五等有等級髙下者皆為格表奏帳籍闗諜符檄之類有體製模楷者為式臣按唐有律律之外又有令格式宋初因之至神宗更其目曰勑令格式所謂勑者兼唐之律也我聖祖於登極之初洪武元年即為大明令一百四十五條頒行天下制曰惟律令者治天下之法也令以教之於先律以齊之於後古者律令至簡後世漸以煩多甚至有不能通其義者何以使人知法意而不犯哉民旣難知是啓吏之姦而陷民於法朕甚閔之今所定律令芟繁就簡使之歸一直言其事庶㡬人人易知而難犯書曰刑期于無刑天下果能遵令而不蹈於律刑措之效亦不難致茲命頒行四方惟爾臣庶體予至意斯令也蓋與漢髙祖初入闗約法三章唐髙祖入京師約法十二條同一意也至六年始命刑部尚書劉惟謙等造律文又有洪武禮制諸司職掌之作與夫大誥三編及大誥武臣等書凡唐宋所謂律令格式與其編勑皆在是也但不用唐宋之舊名爾夫律者刑之法也令者法之意也法具則意寓乎其中方草創之初未暇詳其曲折故明示以其意之所在令是也平定之後旣己備其制度故詳載其法之所存律是也伏讀祖訓訓告之辭有曰子孫做皇帝時止守律與大誥而不及令而諸司職掌於刑部都官科下具載死罪止載律與大誥中所條者可見也是誥與律乃朝廷所當世守法司所當遵行者也事有律不載而具於令者據其文而援以為證用以請之於上可也此又明法者之所當知徽宗崇寜元年臣僚言三省六曹所守者法法所不載然後用例今類引例而破法此何理哉請取前後所用例以類編脩與法妨者去之臣按法者祖宗所制百世之典例者臣僚所建一時之宜法所不載而後用例可也旣有法矣何用例為若夫其間世異勢殊人情所宜土俗所異因時救弊不得不然有不得盡如法者則引法與例取裁於上可也宋之臣僚請取前後所用例以類編脩與法有妨者去之在今日亦宜然以上論定律令之制下大學衍義補卷一百三
