body:
  text: 大學衍義補卷一百二十四明丘濬撰治國平天下之要嚴武備牧馬之政中庾人掌十有二間之政教以阜馬句佚特句教駣句攻駒句及祭馬祖祭間之先牧句及執駒句散馬耳句圉馬句正挍人員選句馬八尺以上為龍七尺以上為騋六尺以上為馬鄭玄曰阜盛壯也佚特者用之不使甚勞安其血氣也三嵗曰駣始教乘習之也二嵗曰駒攻騬之也散馬耳以竹栝押馬耳其頭動搖則括中物後遂串習不復驚也正員選者選擇可備員者平之也臣按此九者馬之政教也圉師掌教圉人養馬春除蓐釁廏始牧夏庌廡也馬冬獻馬臣按古人之養馬必順其四時冬之寒也則藉之以蓐春之暖也則除去之然又恐其所居之廏積糞穢之久而或足以致馬疾故殺牲以血塗之而後以居焉冬之寒也則燠之以廏夏之炎也則涼之以庌其養也殆無異於人則其馬安得而不壯盛哉圉人掌養馬芻牧之事以役圉師臣按芻以食馬牧以放馬皆所以養之也周官設官以掌王馬之政不惟有政而又有教有養焉政以正之教以導之而養以安之也養之則生息多而壯健教之則性習馴而調和是故馬質挍人掌其政者也趣馬巫馬牧師圉師圉人則以養之而庾人則又所以教之者焉月令季春之月乃合纍平聲牛騰馬遊牝於牧犧牲駒犢舉書其數陳澔曰春陽既盛物皆産育故合其纍繫之牛騰躍之馬而遊縱之使牡者就牝者於芻牧之地欲其孳生之蕃也養其中犧牲之用者及馬之駒牛之犢皆書其數者以備稽校多寡也臣按先儒謂遊牝則牡雖在牧不得遊也蓋嗜欲不制則雖有龍牡猶將耗矣遊雖牛馬之真性若牡則連之以羈馽編之以皂棧亦豈可少哉於此可見先王於牛馬固欲遂其生育之性而亦不使之得以縱其欲而損其真如此則牝者生育多而不失其時牡者氣力全而咸得其用是亦至誠聖人盡物之性之一事也仲夏之月遊牝别羣則縶騰駒班馬政陳澔曰季春遊牝於牧至此妊孕已遂故不使同羣拘縶騰躍之駒者止其踶齧也班馬政布養馬之政令也方慤曰馬政者若周官趣馬之簡其節巫馬之治其疾校人之辨其屬庾人之掌其間以至圉師之所教圉人之所養莫不有政焉故班之也班則制而分之之謂歟臣按月令仲夏之月班馬政則其政以養為主季秋之月班馬政則其政以御為主養之欲得其蕃息御之欲得其調習各因其時而班其政令各有其宜焉季秋之月班馬政命僕戎僕也及七騶咸駕載旌旗羽曰旌旐龜蛇曰旐授車以級整設於屏外司徒搢撲即夏楚也北面誓之鄭玄曰馬政謂齊其色度其力使同乘也七騶謂趣馬主為諸官駕説音稅者也孔穎達曰七騶者天子馬有六種種别有騶則六騶也又有總主之人并六騶為七既班馬政乃命戎僕及七騶等皆以馬駕車又載旌旗既畢授此七戎之車以其尊卑等級正其行列設於軍門屏之外東西廂以為行陳臣按月令雖吕氏所作然其所載者皆先王之故典季秋之月班馬政而命戎僕駕車載旌以設行陳蓋以操習天子之六種馬也先王之練兵不惟習其人而又習其馬不惟命典兵之官而又命掌教之職吁三代之兵人與馬相習三代之政文與武兼用此所以兵威所及而功無不成而武不至黷也歟魏武侯問吳起曰凡畜率騎豈有方乎起對曰夫馬必安其處所適其水草節其飢飽冬則溫廏夏則涼廡刻剔毛鬛謹落四下戢其耳目無令驚駭習其馳逐間其進止人馬相親然後可使車騎之具鞍勒銜轡必令完堅凡馬不傷於末必傷於始不傷於飢必傷於飽日暮道逺必數上下寧勞於人慎無勞馬常令有餘備敵覆我能明此者橫行天下臣按古人調養戰馬之法無出此矣畜戰馬者所宜用心觀玩秦之先有非子居犬丘好馬及畜善養息之犬丘人言之周孝王孝王召使主馬于汧渭之間馬大蕃息於是孝王曰昔柏翳為舜主畜之多息故有土賜姓嬴今其後世亦為朕息馬朕其分土為附庸邑之秦使復續嬴氏之祀臣按人性各有所能因其能而用之鮮有不濟周穆王因非子善養馬而使之主馬於汧渭之間而馬大蕃息是知為政在人惟在乎人君之善任使也漢制太僕掌輿馬屬官有太廏未央家馬三令又車府路軨騎馬駿馬四令丞又龍馬間駒橐泉騊駼承華五監長丞臣按太僕周官掌正服位出入大命及左右御僕而專命以司馬政則始於漢焉本朝初於南京設太僕寺專掌馬政及於北平山西陜西遼東各設行太僕寺以司一方之馬政其後建都於北革去北平行寺又設太僕寺以總司天下馬政漢初鑄策錢馬匹至百金自天子不能具與醇同駟而將相或乘牛車文帝二年詔太僕見馬遺財足餘皆以給傳置又令民有車騎馬一匹者復卒三人景帝時造苑馬以廣用太僕牧師諸苑三十六所分布北邊西邊以郎為苑監官奴婢三萬人養馬三十萬匹孝武時衆庶街巷有馬阡伯即阡陌之間成羣乘牸牝者擯而不得會聚武帝於口賦錢人增三錢以補車騎馬建元元年罷苑馬以賜貧民元朔五年以後大將軍衛青比嵗十餘萬衆擊胡漢軍士馬死者十餘萬後與霍去病兩將軍之出塞塞閲官馬及私馬凡十萬匹而後入塞者不滿三萬匹元鼎元年令民畜邊縣得畜牧於邊縣官假馬母三嵗而歸及息什一明年車騎乏馬縣官錢少買馬難得乃著令令封君以下至三百石吏以上差出壯馬天下亭亭有畜字馬嵗課息征和中帝下詔深陳既往之悔修復馬令宣帝五鳳二年令郡國毋斂今年馬口錢林駉曰漢初稍復古制勸民養馬有一匹者復卒三人蓋居間則免三人之算有事則當三人之卒此內郡之制也至於邊塞則縱民畜牧而官不禁烏氏居塞則致馬數千羣橋桃居塞則致馬千匹於時內郡之盛則衆庶有馬阡陌成羣邊郡之盛則三十六苑分置西北武帝初年單于入塞見馬布野而無人牧者征伐四夷而馬往來食長安者數萬匹既數出師馬大耗乏乃行一切之令自封君以下至三百石吏以次出馬則內郡庶民之有馬者欲望復卒難矣又令民得畜邊者從官假馬母而歸其息什一則邊郡之欲蓄牧者難矣又匿馬者有罪有以列侯匿馬而腰斬者有以民或匿馬馬不具而長安令幾坐死者故內郡不足則藉民馬以補車騎邊郡不足則發酒泉驢駝負出玉門關輪臺之悔始修馬令此漢牧於民而用於官之制也臣按林駉之言西漢之馬政始末盛衰之故備於此矣唐之初起得突厥馬二千匹又得隋馬三千於赤岸澤徙之隴右其官領以太僕其屬有牧監副監監有丞有主簿直司團官牧尉排馬牧長羣頭有正有副凡羣置長一人十五長置尉一人嵗課功進排馬又有掌間調馬習上臣按監牧之制始於此尚乘掌天子之御左右六間一曰飛黃二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑總十有二間為二廏一曰祥麟二曰鳳苑以繫飼之其後禁中又增置飛龍廏臣按此唐一代天子御馬之制所謂飛龍廏即今御馬監也初用太僕少卿張萬嵗領羣牧自貞觀至麟德四十年間馬七十萬六千匹置八坊岐豳涇寧間地廣千里一曰保樂二曰甘露三曰南普閏四曰北普閏五曰岐陽六曰太平七曰宜祿八曰安定八坊之田千二百三十頃募民耕之以給芻秣八坊之馬為四十八監而馬多地狹不能容又析八監列布河西豐曠之野凡馬五千為上監三千為中監餘為下監監皆有左右因地為之名方其時天下以一縑易一馬萬嵗掌馬久恩信行於隴右臣按唐人牧馬置八坊四十八監其牧地在岐豳涇寧間即今陜西鳳翔府及西安之邠州平涼之涇州慶陽之寧州其地也募民所耕以為芻秣者其地止於一千二百三十頃而用其地出以飼七十萬六千匹馬而馬之直至以一縑易一匹今其地固在其中間田民所不耕者何止一千二百三十頃而已本朝於此地立行太僕寺一及苑馬寺一以司蓄牧而苑馬之所轄者凡三十監監皆有馬然監之立百年於兹矣而其馬之蕃盛略不及唐人之一二豈無其故歟臣考唐制始曰置八坊岐豳涇寧間其後又曰其始置四十八監也據隴西金城平涼天水員廣千里繇京度隴置八坊為會計都領其間善水草腴田皆肄之由此以觀則其所牧之地又若不專在岐豳涇寧也蓋跨數州之地凡其善水草膏腴之田皆以為牧放之所而又得人以司之是宜其馬蕃盛至七十萬之多也今其地固在然皆齊民耕種納租之地一旦奪之以為耕牧芻秣之所其勢有不可者然當唐之世民皆不耕田納租乎何養馬如此之多也乞敕有司循唐人之故迹由京兆度秦隴以求夫可以放牧之地必不奪之民必不虧於官然後行唐人監牧之政萬一有可行者其於馬政不為無助後以太僕少卿鮮于匡俗檢校隴右監牧儀鳳中以太僕少卿李思文檢校諸牧監使後又有羣牧都使有間廏使使皆置副有判官又立四使南使十五西使十六北使七東使九其後益置八監於鹽州三監於嵐州臣按監牧有使自儀鳳中李思文始玄宗開元初國馬益耗太常少卿薑晦乃請以空名告身市馬於六胡州率三十匹讐一逰擊將軍臣按此後世以官爵易馬之始玄宗以王毛仲領內外間廏馬稍稍復始二十四萬至十三年乃四十三萬其後突厥款塞玄宗厚撫之嵗許朔方軍西受降城為互市以金帛市馬於河東朔方左右牧之既雜胡種馬乃益壯天寶後諸軍戰馬動以萬計議者謂秦漢以來唐馬最盛林駉曰唐府兵之制當給馬者官與其直市之每匹錢二萬五千刺史折衝果毅嵗周不任戰者鬻之以其錢更市不足則府供之此給錢以市也至府兵漸壞兵貧難致乃給以監牧之馬此給馬以用也大抵唐之馬政皆給於官民無與焉始唐接周隋亂離之後承天下征伐之餘鳩括殘騎僅得牝牡二千匹於赤岸澤徙之隴右始命太僕張萬嵗葺其政肇自貞觀訖於麟德四十年間至七十萬餘匹於時天下以一縑易一馬秦漢之盛未始聞也垂拱以後馬耗大半開元始命王毛仲為內外間廏使牧養百法雲錦成羣此唐牧馬於官而給於民之制也臣按議者謂秦漢以來唐之馬最盛原其所以盛者蓋以監牧之置得其地而監牧之官得其人而牧養之有其法也唐都關中其地宜馬我朝都燕冀亦是良馬所生之地然馬之蕃息不及唐之盛者豈無其地與其人歟蓋襲用宋人保馬之法牧馬於民而官之所以牧者徒有其名而政則未嘗舉焉必欲舉其政請下户部查究永樂以來牧馬草場為官民所耕佃者盡以還官及所在間田未經開墾者亦俾報官遣官經量創為牧馬之所而俾諳練民事臣僚講求其利害以聞必上有益於國下無害於民真有利而無害然後立為一代經久之制以為國家安民足兵之良法宋之馬政凡御馬之等三給用之等十有五羣號之字十有七毛物之種九十有二其官司之規則太祖初置左右飛龍二院以二使領之後改為天廏坊又改為騏驥院以天駟監𨽻焉真宗置估馬司凡市馬掌辨其良駑平其直以分給諸監三年置羣牧使景德二年改諸州牧龍坊悉為監在外之監十有四置羣牧制置使及羣牧使副都監判官廏牧之政皆出於羣牧司自騏驥院而下皆聽命焉諸州有牧監知州通判兼領之林駉曰宋朝馬政蓄於監牧者曰官馬散於編户者曰户馬市於邊郡者曰戎馬太宗淳化二年通利軍上十牧草地圖上慮畜牧之地多侵民田乃遣中使檢視畫其疆界又從趙守倫之請於諸州牧龍坊畜牝馬萬五千匹逐水草牧放不費芻秣生駒可資軍用自是諸牧馬頗蕃息臣按馬以資軍用誠國家之急務然用軍欲何為哉衛民而已本欲衛民未有事乃先害民可乎宋太宗慮牧馬侵民田遣使檢視良是也然不遣文吏而遣中使何哉夫天下土地何者而非國家之有在民猶在官也而在官者則非民有矣其疆界之彼此誠不可不為畫定也疆界不定則官田日廣民田日削馬雖蕃而民日耗而用馬以誰衛哉國子博士李覺言於太宗曰冀北燕代馬之所生胡戎之所恃也制敵以騎兵為急議者以為欲國之多馬在乎啖戎以利而市其馬然市馬之費嵗益而廏牧之數不加者失其生息之理也且戎人畜牧轉徙馳逐水草騰駒遊牝順其物性所以蕃滋其焉至於中國縶之維之飼以枯藁離析牝牡制其生性玄黃虺隤因而減耗宜然矣古皆因田賦出馬馬皆生於中國不聞市之於戎今所市戎馬直之少者匹不下二十千往來資給賜豫復在數外是貴市於外夷而賤棄於中國非理之得也今宜減市馬之半直賜畜駒之將卒增為月給俟其後納馬則止焉是則貨不出國而馬有滋也大率牝馬二萬而駒收其半亦可嵗獲萬匹况夫牝又生駒十數年間馬必倍矣昔猗頓窮士也陶朱公教以畜五牸乃適西河大畜牛羊於猗氏之南十年間其息無算况以天下之馬而生息乎臣按覺疏引猗頓畜牸之事尤為切於事情由是以觀牧馬之政以畜牝為先牝得其養則生育多矣積以嵗年牝又生牝駒又生駒不出十年馬大蕃息矣覺又言中國之馬食枯芻處華廏故多生息而無耗今官散馬於編民户丁分日而飼各家分次而牧委之以老稚食之以蕪雜處之以汙穢而欲其生息之蕃多體力之壯健性習之調伏難矣仁宗慶厯中知諫院余靖言謹按詩書以來中國養馬蕃息故事不獨出於戎狄也秦之先曰非子居犬丘好馬及畜養息之周孝王召使主馬於汧渭之間馬大蕃息犬丘今之興平汧渭今之秦隴州界也衛文公居河之湄以建國而詩人歌之曰騋牝三千不言牡而言牝則牝為蕃息之本也衛則今之衛州也詩人又頌魯僖公能遵伯禽之業亦云駉駉牡馬魯今屬兗州左氏云冀之北土馬之所生今鎮定并代其地也漢之太原有家馬廏一廏萬匹又樓煩胡北皆出名馬即今之并嵐石隰界也唐以沙苑最為宜馬即今之同州也開元中置七坊四十八監半在秦隴綏銀則知古來牧馬之政修之由人不在於地臣切見今之同州及太原以東相衛邢洺皆有馬監其餘州軍牧地七百餘所乞於羣牧使副都監判官等內差一員往監牧舊地相度水草豐茂去處選擇孳生堪牧養馬專差人員牧於四逺牧放一依周官月令之法務令蕃息别立賞罰以明勸沮庶幾數年之後馬畜蕃盛臣按我朝奄有四海之大凡中國所謂宜馬之地皆在焉非若唐人自中葉以後失去河北宋人失幽燕寧夏之地其後也并中原而失之然是時未嘗去兵而用兵也未嘗乏馬今天下無事所謂馬政者特以為操習豫備之具耳司戎行者往往以乏馬為憂掌國計者切切以擾民為慮何哉不行先王之政而襲用王安石之弊政故也噫無事之時且爾一旦事出倉卒又將何以濟哉臣聞天下無難處之事君子懷先事之憂當間暇之時而豫為之處置稽之於古驗之於今廣詢訪於衆謀不拘泥於陳迹其間必有一不虧官不損民之良法行之有利而無害者出焉宋祁言於仁宗曰天下久平馬益少臣請多用步兵夫鬨然聚忽然散雲奔飈馳鈔後掠前此馬之良也強弩巨梃長鎗利刀什什相聯伍伍相縫大呼薄戰此步之良也臣料朝廷與敵相攻必不深入窮追驅而去之及境而止然則不待馬而步可用矣臣請損馬而益步故馬少則騎精步多則鬬健我惟用步所長契丹馬多無所用之臣按中國之馬不如敵馬之良非徒無其良而孶生之多亦不及也今天下無事之秋欲為武備內疲齊民外苦邉卒皆以馬之故馬之弊極矣而訖無善政宋祁謂朝廷與敵相攻必不深入窮追驅而去之及境而止不待馬而步可用請損馬益步馬少則騎精步多則鬬健祁之言蓋有得於周人薄伐之意其䇿誠莫有過焉者也臣請於西北沿邉一帶凡屯戍之所率以守疆界為重扼要害為主惟限敵使不得入不必窮追惟制敵使不敢越不必深入十兵之中步八而騎二騎以為竒而驅馳必精健之足步以為正而什伍皆健鬬之卒如此則馬雖不多而皆得其用內可以寬保户之孳生外可以免騎士之倍備英宗治平中歐陽修言唐之牧地西起隴右金城平涼天水外暨河曲之野內則岐豳涇寧東接銀夏又東至於樓煩今則沒入蕃界惟河東嵐石之間山荒甚多汾河之側草地亦廣其間水甘草軟最宜牧養乃唐樓煩監地臣往年出使嘗行威勝以東及遼州平定軍其地率多間曠河東一路水草甚佳地勢髙寒必宜馬性又京西唐汝之間荒地亦廣請下河東京西轉運司遣官審度興制監牧臣按今日馬政兩京畿及山東河南牧之於民山西陜西遼束牧之於官在官者有名而無實在民者有損而無益國家承平踰百年於兹矣正居安思危之日修政舉廢之時乞下本兵柄大臣推求祖宗立法養馬之意寺監之養必循名而責實民間之畜必無損而有益立為通融之法兩京畿及山東河南於民養之外擇地以立監牧山西陜西遼東於官養之外設法以為俵散制畜養之規修廏牧之所勘牧地之數廣收市之利分支免之等寬追陪之限如此則名稱其實有益而無損矣神宗熙寧中王安石因曽孝寬言慶厯中嘗詔河北民户以物力養馬備非時官買乞參考申行之而户馬法始此文彥博言漢唐之盛苑監實繁祖宗以來修舉甚至七八十年搜補取用源源不絶近時議者多不深究本末熟詳利害乃欲賦牧地與農民斂其租課散國馬於編户責其孳息即不知所賦之地肥瘠皆可耕乎所斂租賦豐凶皆可得乎復不知户配一馬縶之維之皆可蕃息乎既不蕃息則後將可繼乎臣按彥博兹言雖言當時户馬之弊殆有若為今日設也但宋時户馬是散官馬於民今日乃令民自買馬養耳宋時賦牧地與民今日乃民自用其地所出以養耳其中所謂維之縶之皆可蕃息乎之一言尤為有見蓋馬所以蕃息者以其羣聚之相資騰遊之有道今小民一家各縶一馬而欲其生息固難矣况求其皆良乎以上論牧馬之政中大學衍義補卷一百二十四
