body:
  text: 大學衍義補卷四十六明丘濬撰治國平天下之要明禮樂王朝之禮中漢書髙祖七年長樂宫成諸侯羣臣朝十月漢初以十月為正儀叙下儀注先平明謁者治禮引以次入殿門廷中陳車騎戍卒衛官設兵張旗幟傳曰趨𫝊聲教入者急走也殿下郎中俠陛陛數百人功臣列侯諸將軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉大行設九賔公侯伯子男孤卿大夫士臚上傳告下句下告上傳於是皇帝輦出房百官執㦸𫝊警𫝊聲而唱警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不振恐肅敬至禮畢盡伏臣按此後世嵗首行朝賀禮之始漢承秦制以十月為嵗首故也武帝始行夏正而以正月為嵗首然朝賀之禮則仍其舊用十月焉至後漢始命行朝㑹禮於正月此禮三代以前雖未有其制然嵗序更端之始萬物維新而凡為臣子者畢來朝㑹以致其履端之慶亦義之當然也晉書禮志云魏晉冬至日受方國及百僚稱賀因令㑹其儀亞於獻嵗之旦臣按此後世冬至行朝賀禮之始蔡邕獨斷曰冬至陽氣起君道長故賀夏至隂氣起君道衰故不賀宋人於五月朔亦賀非是唐書𤣥宗以帝生日爲千秋節臣按此後世人君以始生日為節而表賀之始此前代毎一君為一節如宋太祖為長春節太宗為乾明節之類在我朝列聖一以萬壽聖節為名未有易也竊惟今日承前代故事為三大節元旦冬至聖誕是也前代惟至日行禮未有先期習儀者有之始自我朝葢以此禮雖非唐虞三代之制然臣子所以致敬君上而敦其水木本源之心以致其祝頌補報之願者於是乎在茍羣聚於一時而不豫習於先日則不免臨期參差失誤故凡遇三大朝若内若外先期二日於寺觀演習者謹之至也謹之至以其禮之大以上朝賀禮虞書羣后四朝敷奏以言明試以功車服以庸民功曰庸朱熹曰五載之内天子廵狩者一諸侯來朝者四盖廵狩之明年則東方諸侯來朝于天子之國又明年則南方之諸侯來朝又明年則西方之諸侯來朝又明年則北方之諸侯來朝又明年則天子復廵狩程頥曰敷奏以言者使各陳其為治之說言之善者則從而明考其功有功則賜車服以旌異之其言不善則亦有以告飭之也臣按有虞之世廵守之年四方諸侯隨地各朝于方岳廵守之後四方諸侯分年各朝於京師葢是時封建之制行諸侯世守其國恐其嵗月易流人心易懈上下易隔故其為制如此若夫罷侯置守之後任用不久遷補無常因時制宜惟可行三年朝覲之典三考黜陟之法焉本朝雖無虞朝羣后四朝之制然三年朝覲三考黜陟盖得有虞之意於千載之下也周禮大行人主賔客之官掌大賔之禮及大客之儀以親諸侯春朝諸侯而圗天下之事圗其可否秋覲以比邦國之功比其髙下夏宗以陳天下之謨謀有是非冬遇以協諸侯之慮慮有異同時㑹以發四方之禁無常時相見也殷同以施天下之政衆見曰同時聘以結諸侯之好時聘曰問結其恩好殷覜以除邦國之慝殷覜曰視除其惡慝間問以諭諸侯之志間嵗一問歸脈以交諸侯之福分祭祀之胙同其福嘏賀慶以賛諸侯之喜有喜慶事則慶賀之致襘以補諸侯之烖禬祈禳也有烖則補助之臣按先儒有言君臣之禮不可以不接不接則上恩不下流下情不上逹嫌疑易以生毁譽易以入易天地不交則否柔進而上行則錫馬蕃庶晝日三接也先王知其如此故制諸侯之朝以之圗事比功陳謨協慮發禁施政則言何以不見納行何以不見知姦邪何以介其間左右何以塞其路漢刺史奏事京師其亦知此意歟粤自秦罷侯置守此禮不復講然後世所謂部使者監司守令即古者諸侯也其制雖不可卒復其意則不可以不存葢天子奉天命以治天之民所以致天子之命而施之民者監司守令也分雖懸絶而心則不可以不親親之為言親暱恩愛之謂也古者天子制為是禮以親當世之諸侯世異勢殊其禮雖不能一一行之於今然能即前日所以親諸侯之心以為今日所以親監司守令之禮千古猶一日也大行人所掌者朝覲宗遇㑹同六者諸侯致覲於王者也間問歸賑賀慶致襘四者天子致愛於諸侯者也諸侯以禮致其敬天子以仁致其愛尊卑之意通上下之誠逹尚何猜疑間二之為患哉先王所以親諸侯也如此後世人主其尚體古人親諸侯之心以親今日監司守令乎禮記天子當依上聲而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝鄭𤣥曰依狀如屏風以絳為質髙八尺東西當户牖之間繡為斧文亦曰斧扆天子見諸侯則依而立負之而南面以對諸侯也宁者門屏之間謂之宁人君視朝所宁立處盖竚立以待諸侯之至游桂曰禮不可一端盡也不有君臣相臨之禮則無以見大君之尊不有賔主相與之禮則無以見同姓異姓親親之恩夫諸侯之中有伯父焉有叔父焉有伯舅焉有叔舅焉有兄弟焉有昏姻焉三王家天下所恃以為天下者不獨恃其形勢也天子以親親之恩而臨諸侯諸侯亦以親親之恩而報天子上下相睦同奬一姓所以數百年長久安寧而無患由此之故且尊卑之分不綂於一聖人固以為不可天子之尊諸侯之卑其自然之分固也然諸父兄弟舅甥昏姻相去之逺而久不相見於其來朝忘親親之恩專以分臨之聖人之心無乃有所不安於此此親親之恩賔主之禮所以行於春朝而異於覲禮之受於廟而臣皆北面也此三代之至文聖人待諸侯之禮僃矣臣按三代之時封建諸侯以分治其民其所以分土而為諸侯者非王室懿親則有功之臣及前代之後也自秦罷侯置守列為郡縣之制歴代分封宗室及有勲庸之臣多無分地其間親王固有之國者然亦有不出國門者焉我太祖分封親藩以大國雖有分地而無分民其制雖不盡合於周然斟酌漢唐之制最得其中制為禮儀凡親王來朝在外廷則行君臣禮於便殿則行家人禮既有以尚親親之恩又有以存君臣之義盖得三代所以待諸侯之禮若前代專用君臣禮則過於無恩專用親親禮則過於無義皆非中道也以上諸侯來朝禮周禮大宗伯以飲食之禮親宗族兄弟以饗燕之禮親四方之賔客鄭𤣥曰親者使之相親人君有食宗族飲食之禮所以親之也文王世子曰族食世降一等大傳曰繫之以姓而分别綴之以食而弗殊百世而昏姻不通者周道然也王安石曰宗族兄弟飲食之而已致其愛故也四方賔客則有饗燕之禮致其敬故也臣按燕饗之禮不同饗以訓恭儉燕以示慈惠然皆所以飲食之也大行人以九儀辨諸侯之命等諸侯之爵以同邦國之禮而待其賔客上公之禮饗禮九獻食禮九舉諸侯之禮饗禮七獻食禮七舉諸伯如諸侯之禮子男饗禮五獻食禮五舉鄭𤣥曰九儀謂命者五公侯伯子男也爵者四孤卿大夫士也吳澂曰饗禮者設盛禮以飲賔也公九獻侯伯七獻子男五獻食禮者以飲為主也舉者一曰舉牲體也一曰舉樂也公九舉侯伯七舉子男五舉掌客掌四方賔客之牢禮餼獻飲食之等數與其政治王合諸侯而饗禮則具十有二牢庶具百物僃諸侯長謂上公九命作伯者十有再獻賈公彦曰魯哀公七年吳來徵百牢子服景伯對曰周之王也制禮上物不過十二以為天之大數也上公以九為節則十二者是王禮之數臣按古者天子之於賔客有饗有燕饗在朝燕在寢饗重而燕輕饗則君親獻燕則不親獻詩序曰鹿鳴燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣朱熹曰雅者正也正小雅燕享之樂也歡忻和恱以盡羣下之情鹿鳴燕饗賔客之詩也盖君臣之分以嚴為主朝廷之禮以敬為主然一於嚴敬則情或不通而無以盡其忠告之益故先王因其飲食聚㑹而制為燕饗之禮以通上下之情而其樂歌又以鹿鳴起興而言其禮意之厚如此庶乎人之好我而示我以大道也記曰私惠不歸徳君子不自留焉葢其所望於羣臣嘉賔者唯在於示我以大道則必不以私恵為徳而自留矣嗚呼此其所以和樂而不淫也與范祖禹曰食之以禮樂之以樂將之以實求之以誠此所以得其心也賢者豈以飲食幣帛為恱哉夫昏姻不僃則貞女不行也禮樂不僃則賢者不處也賢者不處則豈得樂而盡其心乎真徳秀曰鹿食苹則相呼呦呦焉而樂君臣賔主之相樂亦猶是也臣按易言天地交而為泰觀鹿鳴諸詩天子所以燕饗其臣者如此此泰和之治所以後世不能及歟四牡勞使臣之來也朱熹曰此勞使臣之詩也夫君之使臣臣之事君禮也故為臣者奔走於王事特以盡其職分之所當為而已何敢自以為勞哉然君之心則不敢以是而自安也故燕饗之際叙其情而閔其勞言駕此四牡而出使於外其道路之回逺如此當是時豈不思歸乎特以王事不可以不堅固不敢狥私以廢公是以内顧而傷悲也臣勞於事而不自言君探其情而代之言上下之間可謂各盡其道矣范祖禹曰臣之事上也必先公而後私君之勞臣也必先恩而後義皇皇者華君遣使臣也朱熹曰此遣使臣之詩也君之使臣固欲其宣上徳而逹下情而臣之受命亦唯恐其無以副君之意也常棣燕兄弟也毛萇曰常棣之木衆華俱發實韡韡而光明故興兄弟朱熹曰此燕兄弟之樂歌故言常棣之華則其鄂然而外見者豈不韡韡乎凡今之人則豈有如兄弟者乎吕祖謙曰疎其所親而親其所疎此失其本心者也故此詩反覆言朋友之不如兄弟盖示之以親踈之分使之反循其本也代木燕朋友故舊也自天子至於庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民徳歸厚矣其末章曰伐木于阪釃酒以茅泲去其糟有衍多也籩豆有踐陳列貌兄弟無逺言皆在也民之失徳乾餱食之薄者以愆過也有酒湑亦釃也我無酒酤買也我坎坎鼓我蹲蹲舞我迨我暇矣飲此湑矣朱熹曰此燕朋友故舊之樂歌末章言人之所以至於失朋友之義者非必有大故或但以乾餱之薄不以分人而至於有愆耳故我於朋友不計有無但及閒暇則飲酒以相樂也臣按此詩可見人君之於其臣下非但有大燕享若夫閒暇之時其於諸侯諸舅朋友故舊亦必有燕飲以篤其恩義云天保下報上也古註曰鹿鳴至伐木皆君所以下其臣臣亦歸美于上崇君之尊而福祿之以答其歌朱熹曰人君以鹿鳴以下五詩燕其臣臣受賜者歌此詩以答其君言天之安定我君使之獲福也王安石曰君恩至重臣雖有犬馬之勞不足以上答故惟稱其福祿以報之此出於懽心而不強以為者也朱熹曰當是時君以鹿鳴四牡皇華燕羣臣以常棣燕兄弟以伐木燕朋友而臣之所以答其君者如此君燕其臣臣媚其君此所以上下交徳業成而均享盛大悠久之福也與臣按古者人君以嘉禮賔之者有四焉宗族兄弟也朋友故舊也孤卿大夫士也公侯伯子男也其禮之行也有饗焉有食焉有燕焉然其燕也有因祭而餕有因勞而勞有因閒暇而㑹所謂饗者烹太牢以飲賔几設而不倚爵盈而不飲以訓恭儉也食者是於饗禮之中舉樂以薦牲體焉燕則異於饗食之禮示以慈惠其樂無筭也取其驩而已其爵無算也取其醉而已至若中庸曰燕毛所以序齒坊記曰因其酒肉聚其宗族以教民睦則是祭畢而燕四牡皇皇者華所歌則是因勞而勞伐木之亂所謂迨我暇矣飲此湑矣則是因閒暇而時㑹也噫三代盛時上下之情相親相愛有如此者後世人主之於臣下以勢臨之而已以利啗之而已以法驅之而已無復三代和合親比氣象凡其所以嵗時燕饗之者一惟按故事而姑為之禮焉耳若夫朝夕所以相與燕好而飲食者不出乎宫闈永巷之中左右便辟使令之人治欲復古得乎蓼蕭詩之首章曰蓼長大貌彼蕭艾也斯零露湑湑湑然蕭上露貌兮既見君子指諸侯言我心寫輸寫兮燕謂燕飲笑語兮是以有譽善譽也處安樂也兮朱熹曰諸侯朝于天子天子與之燕以示慈惠故歌此詩言蓼彼蕭斯則零露湑然矣既見君子則我心輸寫而無留恨矣是以燕笑語而有譽處也其曰既見葢於其初燕而歌之也臣按先儒謂諸侯來朝天子天子見之而得以輸寫其心而無所留隠相與燕飲笑語和恱則上下可以保有聲譽與和樂也茍上之于下也有所疑而不敢盡其情下之於上也有所畏而不敢申其意則是上下不交否之時也禍端亂萌皆由於此尚何保有其安樂於長久乎湛露天子燕諸侯也其詩曰湛湛露盛貌露斯匪陽不晞乾也厭厭安久足也夜飲和燕不醉無歸湛湛露斯在彼豐茂也草厭厭夜飲在宗宗室路寢之屬載考成也在宗室而成燕禮湛湛露斯在彼杞棘顯明允信君子指諸侯為賔者莫不令善也徳其桐其椅其實離離垂也豈弟君子莫不令儀朱熹曰此亦天子燕諸侯之詩言湛湛露斯非日則不晞以興厭厭夜飲不醉則不歸盖於其夜飲之終而歌之也令徳謂其飲多而不亂徳足以將之也令儀言醉而不䘮其威儀也臣按先儒謂此詩前兩章厭厭夜飲所以道其情之相親也後兩章言令徳令儀又美其徳將而無醉也是詩盖於褒美之中而寓規戒之意左傳昭公五年楚薳啟彊曰聖王務行禮朝聘有圭享饗也頫見也有璋小有述職諸侯適天子大有廵功天子廵守設几而不倚爵盈而不飲言務行禮宴有好貨飱有陪加也鼎入有郊勞出有贈賄禮之至也臣按設几而不倚爵盈而不飲即聘儀所謂酒清人渴而不敢飲肉乾人飢而不敢食也宴有好貨即詩序所謂鹿鳴燕羣臣嘉賔既飲食之又實幣帛筐篚以將其厚意也古者人君之於臣下有享禮以嚴其分有燕禮以通其情此上下所以交而為泰也歟漢髙祖長樂宫成諸侯羣臣皆朝賀禮畢置法酒猶言禮酌不飲至醉諸侍坐殿上皆伏抑首抑屈也以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者臣按此後世大朝賀宴㑹之禮所由起自漢行嵗首慶賀禮魏晉以後又有賀冬至禮唐中葉又有所謂賀生日禮皆於是日行禮畢設大宴以享百官我朝禮儀視前代為僃文臣四品以上及諸學士武臣都督以上皆宴殿上經筵官及翰林講讀官尚寳卿六科都給事中暨文臣五品堂上官武臣都指揮以上官宴中左中右門翰林院中書舎人左右春坊御史欽天監太醫院鴻臚寺官及五品以上陪祀官宴于丹墀是日行禮畢該宴官更衣立殿外俟上至升座樂作入拜進花進酒跪俟上飲訖乃起即席簮花啐酒酒凡九進湯五進羣臣則殺其二毎嵗三大朝賀及郊祀禮成行慶成禮凡四舉焉遇有故則賜鈔以代宴惟慶成則否臣竊以謂正旦長至遇故免宴可也惟萬壽聖節天下藩服重臣親齎表賀有自萬里而來者無不望一霑醉酒飽徳之恩請命禮官舉行之宋志宴饗之設所以訓恭儉示惠慈也宋制常以春秋之季仲月及誕聖節郊祀藉田禮畢廵幸還京凡國有大慶皆大宴羣臣於集英殿次宴紫宸殿小宴垂拱殿有司預於殿庭設山樓排場為羣仙隊仗六番進貢九龍五鳯之狀宰相率百官入宣徽閤門通唱致辭謝宰相升殿進酒各􅈬坐酒九行曲宴七行或五行毎上舉酒羣臣立侍次宰相次百官舉酒或傳㫖命釂即皆搢笏起飲再拜曲宴多不拜或上壽更衣賜花有差其郊祀藉田禮畢皆設大宴上元觀燈及苑囿池籞觀稼較獵逰幸所至亦常以暮春召近臣賞花釣魚於苑中其或兩府使相赴鎮還朝咸賜宴臣按此宋朝賜宴之儀臣聞國朝洪武永樂宣徳中時有賜宴近年以來雖三大朝賀葢久不舉而所謂曲宴者益稀濶矣竊惟一張一弛文武之道人臣終嵗勤劬職業幸而得一日醉飽之歡是乃君上莫大之恩澤古之人君所以致其臣庶竭忠盡力以至於殉國以身此亦其一機也但不可施諸非其人而流於䙝耳宋太宗時直史館陳靖言古之宴饗者所以省禍福而觀威儀也故宴以禮成賔以賢序風雅之作兹為盛焉伏見内殿賜宴羣臣拜舞方畢趨馳就席品列之序紏紛無别及至尊舉爵羣臣起立先後不整俯仰失節欲望令有司預依品位告諭其有踰越班次拜起失節喧譁者並令紏舉至道中御史中丞李昌齡言廣宴之設以均飫賜供事禁庭當定貟數籍姓名以謹其出入酒殽之司或虧精潔望分命中使廵察從之真宗咸平三年學士梁顥請以春秋大宴小宴賞花行幸為四圗頒下閤門遵守從之臣按人君賜宴於臣人臣受宴於君非徒飲之食之而已也内則以廣恩惠外則以觀威儀施恩者固當以禮受賜者尤當以敬茍進退拜起之無節固臣之罪矣若夫酒殽之或虧精潔禮度之或至簡略亦豈人君禮待其下之道哉李昌齡請命中使廵察梁顥請以所宴為圗在今日亦所宜行焉以上燕饗虞書嵗二月當廵守之年二月東廵守至于岱宗泰山柴燔柴祀天望望祭山川秩牲幣祝號次第于山川肆覲東后東方諸侯協時四時月月之大小正日日之甲乙同律十二律度分寸尺丈量龠合升斗斛衡銖兩斤鈞石脩五禮吉凶軍賔嘉五玉三圭二璧三帛纁𤣥黃二生羔鴈一死雉贄贄所執以相見者如同也五器五禮之器卒畢也乃復五月南廵守至于南岳衡山如岱禮八月西廵守至于西岳華山如初十有一月朔廵守至于北岳恒山如西禮歸格至也于藝祖即文祖用特一牛五載一廵守朱熹曰卒乃復者舉祀禮覲諸侯一正朔同制度脩五禮如五器數事皆畢則不從東行而遂南向且轉而南行故曰卒乃復二月東五月南八月西十一月北各以其時也古者君將出必告于祖禰歸又至其廟而告之孝子不忍死其親出告反面之義也吕祖謙曰廵守而歸茍民物有一不得其所其見祖廟有愧必矣想舜歸格之時此心無愧對越在廟慰愜可知也臣按先儒有言廵守所以維持封建後世罷封建以為郡縣之制萬方一國四海一家如肢體之分布如心手之相應萬里如在殿廷州縣如在輦轂挈其領而裘隨舉其綱而網順政不必屈九重之尊千乗萬騎之禁衛百司庶府之扈從以勞民而傷財也茍慮事久而弊生而欲有以考察而振作之遣一介之臣付方尺之詔璽書所至如帝親行天威不違天顔咫尺孰敢懈怠哉然則帝舜廵守非歟臣故曰廵守所以維持封建也大行人十有二嵗王廵守殷國王安石曰王廵守則諸侯各朝于方岳王不廵守則㑹諸侯而殷見或廵守或殷國其出而省焉一也吕祖謙曰廵守之禮此乃維持治具提攝人心聖人運天下妙處大抵人心久必易散政事久必有闕一次廵守又提攝整頓一次此所以新新不已之意然唐虞五載一廵守周却十二年何故盖周時文治漸成禮文漸僃所以十二年方舉廵守之事此是成王知時變識㑹通處臣按吕氏謂舜五載廵守周十二年廵守為成王知時變識㑹通臣竊以謂在虞時則可五載在周時則可十二年在後世罷封建立州郡之時守令不世官政令守成憲雖屢世可也在今日時變㑹通之要所以提攝整頓之者誠能擇任大臣毎五年一次分遣廵行天下如漢唐故事雖非古典亦古意也孟子天子適諸侯曰廵守廵守者廵所守也諸侯朝於天子曰述職述職者述所職也無非事者春省耕而補不足秋省斂而助不給夏諺曰吾王不逰吾何以休吾王不豫吾何以助一遊一豫為諸侯度今也不然師行而糧食飢者弗食勞者弗息睊睊胥讒民乃作慝方命虐民飲食若流流連荒亡為諸侯憂從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡朱熹曰廵所守廵行諸侯所守之土也述所職陳其所受之職也皆無有無事而空行者而又春秋循行郊野察民之所不足而補助之故夏諺以為王者一遊一豫皆有恩惠以及民而諸侯皆取法焉不敢無事慢遊以病其民也臣按天理人欲同行異情遊豫為諸侯度天理也流連為諸侯憂人欲也孟子言古之帝王與今之諸侯其遊豫雖同而其所以遊豫者一則為諸侯之法一則為諸侯之憂天理人欲之異也秦始皇二十七年廵隴西北地出鷄頭山過回中臣按有虞之時五年一廵守周十有二年王乃時廵所以省方觀民非為遊樂也然又必以四岳為底止之地出必有期行必有方未有頻年出行遊蕩如始皇者也今年廵隴西北地至回中明年上鄒嶧繼是渡淮浮江至南郡登之罘刻碣石門至雲夢上㑹稽直至沙丘崩而後己其後漢武隋煬亦效尤焉漢武幸而不敗然海内虚耗所損亦多矣煬帝南遊竟死於江都說者謂二君者假望秩省方之說以濟其流連荒亡之舉千乗萬騎無嵗不出遐方下國無地不到至於民怨盗起覆祚殞身曽不旋踵雖秦隋所以召亡者固非一端然儻非遊蕩無度則河決魚爛之勢亦未應如是其促也文中子叔恬曰舜一嵗而廵五嶽國不廢而民不勞何也曰無他道也兵衛少而徵求寡也臣按時異世殊上古之時風氣淳樸人用未滋故人君所以奉身用度者未至於華靡故其廵行兵衛可以不僃而徵求不至於過多後世則不然雖時君有仁愛之心恭儉之徳然兵衛少則不足以防姦徵求寡則不足以僃用不若深居九重求賢審官内委任大臣以帥其屬外分命大臣以治其方則垂拱仰成不出國門而天下治矣以上廵守以上論王朝之禮中大學衍義補卷四十六
