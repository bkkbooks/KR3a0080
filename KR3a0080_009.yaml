body:
  text: 大學衍義補卷九明丘濬撰治國平天下之要正百官清入仕之路周禮大司徒以鄉三物物事也三物德行藝也教萬民而賔敬之也興舉也之一曰六德知别是非仁公無私也聖通明也義有斷制中誠實也和無乖戾二曰六行孝善事父母友善於兄弟睦親其九族姻親其外親任信於朋友恤振於貧乏三曰六藝禮有五禮樂有五樂射有五射御有五御書有六書數有九數鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏謂州長以下與其衆寡謂無多少以禮謂行鄉飲酒禮禮謂禮之也賓之以賔客之禮敬之厥明明日也鄉老及鄉大夫羣吏獻賢能之書于王王拜受之登于天府掌宗廟之寶藏者內史二之書其副本也臣按成周盛時用鄉舉里選之法以取士然所以取士之法則奉大司徒之教而興舉之也其教云何所謂六德六行六藝是也德存於心不可見故考其行藝而書之二十五家為閭閭有胥閭胥則書其敬敏任恤者百家為族族有師族師則書其孝弟睦姻有學者五百家為黨黨有正黨正則書其德行道藝二千五百家為州州有長州長則考其德行道義而勸之萬二千五百家為鄉鄉有大夫則於三年大比考其果有六德六行而為賢通夫六藝之道而為能則是能遵大司徒之所教而成材矣於是鄉老及鄉大夫帥胥師正長之屬合閭族州黨之人行鄉飲之禮用賔客之儀以興舉之書其氏名於簡冊之中獻其所書於天府之上謂之賔者以賔禮敬之而不敢忽也雖然豈但賔於鄉而已哉易曰觀國之光利用賔于王則在天子亦賔之矣然不特此耳及其登名天府之時賢能之書一上九重之君至尊至貴亦且屈萬乘之尊以拜而受之所以然者豈非賢才之生乃上天所遺以培植國家元氣者乎王制命鄉論謂述其德藝而保舉之秀士升之司徒曰選士選擇而用之也司徒論選士之秀者而升之學曰俊士才過千人之謂升於司徒者不征征謂徭役於鄉升於學者不征於司徒曰造士造成也大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後祿之臣按三代盛時仕進有二道有由鄉學而進者有由國學而進者鄉學則掌於鄉大夫而用之在大司徒國學則掌於大樂正而用之在大司焉鄉學所教之士大夫論其秀者升之司徒則謂之選士選者擇而用之也升之司徒既選而用之則不給徭役於鄉矣選士之中有不安於小成者司徒又論而升之國學則雖司徒之徭役亦不給矣此二等皆謂之造士造者成也由選士而為造士是鄉學所進者則用之為鄉遂吏由俊士而為造士是國學所進者則進之於大樂正大樂正於是乎論其秀頴者以告于王而升諸大司馬焉是之謂進士也既為進士則大司馬辨論其材之大小高下而官使之舉其賢者以告于王既有一定之論然後授之以官或以為司士或以為內史之類所謂官之也既任其官然後豫之以爵或以為士為大夫而進至於卿所謂爵之也有爵斯有位矣其位既定然後頒之以祿或食九人或食八人所謂祿之也此三代鄉里選用之法而所謂進士者蓋以其成材將進於朝以用之故耳後世取士不復此制而亦以進士名其原蓋出於此其名雖同而其所以進之之實則不同也漢高祖詔曰王者莫高於周文伯者莫高於齊桓皆待賢人而成名今天下賢者智能豈特古之人呼患在人主不交故也賢士大夫有肯從我游者吾能尊顯之布告天下使明知朕意其有意稱明德者必身勸為之駕有賢者郡守自為勸勉駕車遣之遣詣相國府署行義年謂行狀年紀也有而弗言覺免發覺免其官文帝十五年詔諸侯王公卿郡守舉賢良能直言極諫者臣按賢良極諫科始此孝武初董仲舒對䇿曰臣愚以為使列侯郡守二千石各擇其吏民之賢者歲貢各二人且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也後遂令州郡舉茂才孝廉皆自仲舒發之臣按鄉舉里選之法後世所以不可行者蓋人情日僞敢於為私以相欺公於為黨以相蔽茍無試驗之方防察之政糾舉之法而徒任人而不疑信言而不惑則情僞日滋而賢否不復可辨矣仲舒所謂歲貢之法貢其吏民之賢者爾今所貢者則學校之士也今貢者試不中有罰俸之比而無賞然亦姑應故事而已誠能振舉祖宗之法而加嚴於學校之教提調之罰考試之方亦足以得人致用也元光元年初令郡國舉孝廉各一人臣按孝廉科始此元光五年徵吏民有明當世之務習先聖之術者縣次續食令與計偕計謂上計簿也偕謂每歲郡國有上計之吏命與俱來也臣按今世科舉初場試士以五經四書即此習先聖之術終場䇿士以時務即此明當世之務鄉貢舉人赴禮部者給腳力廪給即此續食計偕元朔元年詔曰十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也二千石官長紀綱人倫將何以佐朕燭幽隱勸元元厲蒸庶崇鄉黨之訓哉且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉孝廉者罪有司奏議曰古者諸侯貢士一適謂之好德適謂德其人再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵再則黜地三則出爵削地畢矣今詔書昭先帝聖緒令二千石舉孝廉所以化元元移風易俗也不舉孝不奉詔當以不敬論不察廉不勝任也當免奏可臣按漢世去古未逺而賢能之士皆知自重而不肯自衒以求售而上之所以待之者既厚而求之者亦切出而仕者有司既躬為之駕而縣次續食俾與計偕其不肯出者既懸賞以招人之薦又嚴法以罪人之不薦雖無賔興拜受之禮猶存好賢敬士之心後世嚴繆舉之罰而限其途轍者則有之矣未聞有不舉之罰而責其薦揚者也元朔五年詔補博士弟子郡國縣官有好文學敬長上肅政教順鄉里出入不悖所聞令相長丞上屬二千石二千石謹察可者令與計偕詣太常得受業如弟子臣按漢制郡國舉士其目大槩有三曰賢良方正也孝廉也博士弟子也賢良孝廉舉以任用似今之科目博士弟子入補國學似今之歲貢其察舉考試之實不同而其取士大略則相類也孝武立五經博士開弟子員設科射䇿臣按射䇿者謂為難問疑義書之於䇿有欲射者隨其所取得而釋之何武蕭望之翟方進等皆以射䇿甲科為郎孝宣本始元年地震詔內郡國文學高第各一人臣按此因災異舉士之始其後日食星隕輒行之元康四年詔遣大中大夫循行天下舉茂材異倫之士臣按此遣使行天下舉士之始其後或遣諌議大夫或遣博士或遣光祿大夫舉茂材特立淳厚直言其名目不一光武始詔三公光祿勳御史司𨽻州牧歲舉茂材臣按前此舉士無常時至此始歲一舉漢召信臣以明經甲科為郎臣按明經之科始見於此後漢順帝時尚書令左雄議改察舉之法限年四十以上儒者試經學文吏試章奏臣按限年之法始于此魏陳郡立九品官人之法州郡皆置中正以定其選臣按魏始置中正州郡縣皆有之而以本處人充俾區别所管人物定為九等吏部慿之授受及其弊也惟據閥閲不辨賢愚所以劉毅云下品無高門上品無寒士歷晉南北朝至隋選舉之法皆用之至開皇中方罷晉武帝詔州郡舉秀異之才劉宋凡州秀才郡孝廉至皆䇿試隋始置進士科臣按此後世進士之科之始蓋始専以文辭試士也夫三代以前鄉舉里選之法行取士專以德行為本漢制孝廉茂材等科皆命公卿大夫州郡舉有經術德行之士試以治道然後官之魏晉以降所舉秀孝猶取經術州郡皆置中正以品其才行雖其立法未必盡善然清謹之士猶知有所畏忌不敢放恣恐有言行之疵以為終身之纍至是隋有進士之舉始專試士以文辭士皆投牒自進州里無復察舉之制矣唐制取士之科大要有三由學館者曰生徒由州縣者曰鄉貢皆升於有司而進退之其科之目有秀才有明經有俊士有進士有明法有明字有明算有一史有三史有開元禮有道舉有童子此歲舉之常選也其天子自詔者曰制舉所以待非常之才焉臣按唐科目雖曰多端而其行之最久者進士明經而已然進士以聲韻為學不本經術明經以帖誦為能不窮義理所謂德行者不復問矣武后天授元年䇿問貢士於洛陽殿殿前試士自此始臣按此後世臨軒䇿士之始𤣥宗開元中令諸州貢舉省試不第願入學者聽臣按此下第舉人入學之始宋之科目有進士有明經諸科常選之外又有制科而進士得人為盛神宗始罷諸科而分經義詩賦以取士宋太宗謂侍臣曰朕欲博求俊彥於科場中非敢望拔十得五止得一二亦可為致治之具太平興國九年進士始分三甲自是錫宴瓊林苑上因謂近臣曰朕親選多士殆忘饑渴召見臨問觀其才拔而用之庶使田野無遺賢而朝廷多君子耳臣按歷代科目得人惟宋為盛蓋以太宗留意科目自是以後天下士子爭趨向之故也仁宗時張方平知貢舉言文章之變與政通今設科選才專取辭藝士惟道義積於中英華發於外以文取士所以叩諸外而質其中之藴也言而不度則何觀焉邇來文格日失其舊各出新意相勝為竒朝廷屢下詔書戒飭學者樂於放逸罕能自還嘉祐二年親試舉人凡與殿試者始免黜落時進士習為竒僻鉤章棘句寖失渾厚歐陽修知貢舉痛裁抑之澆薄之士不預選者多毁修然自是文體亦少變臣按文章關氣運之盛衰而科場之文為甚蓋科場之文乃一世所尚者上以此取人以為一代輔治之具下以此為業以為一生進用之階非徒取其能文而已蓋將因其文以叩其人心之所藴才之所能識之所及由是用之將藉之以輔君澤民修政立事不茍然也昔朱熹嘗與其門人言及科舉文字之弊熹歎曰最可憂者不是說文字不好這事大關世變東晉之末其文一切含胡是非都沒理會夫東晉未以文取士所謂文者出於衆人之私作未必人人同也其禍且至於不可支持况科舉之文乃國之所以取士士之所以為業者其所關係豈不益大哉茍非在上屢頒戒飭之詔慎擇主試之人示之以趨向之方付之以斡旋之柄則文辭日流於卑弱而國勢隨之矣嗚呼可不念哉英宗以間歲貢士法不便詔禮部三歲一貢舉臣按此即成周三年一大比之制自是遂為常制至今日行之神宗時王安石告其君曰今人才乏少且其學術不一異論紛然不能一道德故也一道德則修學校欲修學校則貢舉法不可不變若謂此科常多得人自緣仕進别無他路其間不容無賢爾今以少壯時正當講求天下正理乃閉門學作詩賦及其入官世事皆所不習此科法敗壞人才致不如古既而言者又謂古之取士皆本學校道德一於上習俗成於下其人才皆足以有為於世今欲追復古制則患於無漸宜除去聲韻對偶之文使學者專意經術於是改法罷詩賦帖經墨義士各占易詩書周禮禮記兼論語孟子中書撰大義式頒行試義者須通經有文采乃為中格不但如明經墨義粗解章句而已臣按此後世經義之始前此所謂明經者試其墨書帖義但耴其記誦而已未嘗考其義理求其文采也王安石為人固無足耴及其自作三經專用已說欲以此一天下士子使之遵已固無是理然其所製經義之式至今用之以取士有百世不可改者是固不可以人廢言也及其所謂士當少壯時正當講求天下正理乃閉門學作詩賦及其入官世事皆所不習切中今世學者習科舉之弊今世舉子所習者雖是五經濂洛之言然多不本之義理發以文采徒綴緝敷演以應主司之試焉耳名雖正理其實與前代所習之詩賦無大相逺也欲革其弊在擇師儒之官必得人如胡瑗者以教國學慎主司之選必得人如歐陽修者以主文柄則士皆務實用以為學本義理以為文而不為無益之空言矣他日出而為國家用其為補益蓋亦不小熙寧三年親試進士始專以䇿定著限以千字臣按殿廷試士始於唐武后時宋初沿之然皆試以詩賦至是神宗始試以䇿至今用之方是時蘇軾為編排官見一時舉人所試䇿多阿諛順㫖乃擬一道以進大略謂科場之文風俗所繫所收者天下莫不以為法所棄者天下莫不以為戒今始以䇿取士而士之在甲科者多以諂諛得之天下觀望誰敢不然風俗一變不可復返正人衰微則國隨之噫觀軾兹言則知朝廷以言試士雖若虛文而一時人心之邪正國勢之興衰實關于此識治體者不可不加之意理宗御筆付知貢舉杜範曰朕爰簡儒彥俾典文衡凡爾攸司宜鑒舊弊一取一舍惟公惟明經學欲其深純詞章欲其典則言惟合理䇿必濟時毋以穿鑿綴緝為能毋以浮薄險怪為尚參稽互考優劣自分庶使賢俊畢登以副朕新美治功之意臣按宋朝文弊至理宗時極矣每遇大比帝輒下詔崇雅黜浮蓋有以見夫士習之美惡形於文辭之浮雅文辭之浮雅而實有關於氣化之盛衰也蘇軾告神宗曰願陛下明詔有司試之以實學博通經史者雖朴不廢稍涉浮誕者雖工必黜則風俗稍厚學術近正庶幾得忠實之士不至蹈衰季之風臣於今日亦然朱熹作貢舉私議曰古者學校選舉之法始於鄉黨而達於國都教之以德行道藝而興其賢者能者蓋其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定志而無他慕早夜孜孜惟愳德業之不修而不憂爵祿之未至又曰古者大學之教以格物致知為先而其考校之法又以九年知類通達強立不反為大成蓋天下之事皆學者所當知而其理之載於經者則各有所主也今治經者類皆舍其所難而就其所易僅窮其一而不及其餘若諸子之學同出於聖人諸史則該古今興亡治亂得失之變皆不可闕者而學者豈能一旦盡通若合所當讀之書而分之以年試義各二道諸經皆兼大學論語中庸孟子義各一道論則分諸子為四科而分年以附焉諸史及時務以次分年如經子之法試䇿各二道使治經者必守家法答義者必通貫經文條舉衆說而斷以己意有司命題必依章句如是則士無不通之經無不習之史而皆可用於世矣臣按朱熹之議雖未上聞而天下莫不稱誦以為後世貢舉之法未有過焉者也我太祖皇帝於開國之初即詔天下曰自洪武三年為始特設科舉以起懷才抱德之士務在經明行修博古通今文質得中名實相稱其中選者朕將親䇿於廷觀其學識品其高下而任之以官果有才學出衆者待以顯擢使中外文臣皆由科舉而選非科舉者毋得與官至十七年又命禮部頒行科舉程式凡三年大比子午卯酉年秋鄉試辰戌丑未年春會試士各專一經皆兼大學論語中庸孟子四書四書義主朱氏集注章句易主程朱𫝊義書主蔡氏𫝊及古注疏詩主朱氏集𫝊春秋主三𫝊及胡氏張洽𫝊禮記主古注疏肆我太宗皇帝修五經四書大全易詩書如舊惟春秋則宗胡氏禮記則又加以陳澔集說焉初場以初九日試四書義三道本經四道次場用十二日試論一道詔誥表內科一道判語五條終場以十五日試經史時務䇿五道初場及終場未能者許減其二道嗚呼本朝試士之制雖不盡用朱氏分年之議然士各專一經經必兼四書一惟主於濂洛關閩之說以端其本又必使之兼明子史百家之言古今政務之要而以論䇿試之考其識見本末兼該文質得中雖不盡如朱氏之說實得朱氏之意於數百年之後矣凡前代之科目如制科秀才之類一切廢絶前代之制度如詩賦墨義之類一切不用可謂簡而要明而切真可以行之於千萬年而無弊矣本朝科舉參酌前代之制而取厥中凡所謂明經宏辭諸科一切革罷惟有進士一科洪武三年詔天下行省以是年秋八月開鄉試明年春二月禮部會試其解額以五百人為率會試取百人而所試之文尚仍元制至十七年始定今科試格式十八年會試止録士子姓名鄉貫而未刻程文録文自二十一年始也自是三年一開科取人無額惟善是取宣德改元始鐫定額兩京十二藩貴州雲南附各隨地産以差多寡而會試如洪武初取士之數又以北方學者文采不能自見分南北中三數取人正統壬戌於各布政司舊額上量增之而會試則加以半景泰初詔除科額以復洪武永樂之舊尋復鐫定比舊額稍增禮部試則臨期取㫖自是遂為定制夫自洪武甲子定為三歲一開科至是三十餘試矣科場條貫日增日密一切病弊盡革無餘惟程試之文氣進用之人才似乎有愧於前者雖或氣運之使然習俗之流弊然不可不知其故也祖宗時其所試題目皆摘取經書中大道理大制度關係人倫治道者然後出以為題當時題目無甚多故士子專用心於其大且要者其用功有倫序又得以餘力旁及於他經及諸子史主司亦易於考校非三場勻稱者不取近年以來典文者設心欲窘舉子以所不知用顯已能其初場出經書題往往深求隱僻强截句讀破碎經文於所不當連而連不當斷而斷遂使學者無所據依施功於所不必施之地顧其綱領體要處反忽略焉以此科場題目數倍於前學者竭精神窮目力有所不能給故於䇿場所謂古今制度前代治蹟當世要務有不暇致力焉者甚至登名前列者亦或有不知史冊名目朝代前後字書偏旁者可嘆也已然以科額有定數不得不取以足之以此士子倣效成風䇿學殆廢間有一二有䇿學者又以前場不稱略不經目人才所以不及前者豈不以是哉其録出以為程文者又多萎薾粗淺拘泥纒繞不厭士心録一出議論紛然其所謂主意之說尤為乖繆凡其所命之題專主一說謂之主意殊不知聖經深逺非一人之見所能盡理茍通焉斯在所取矣何必惟己之同哉士子志於必得謂非合主司之意不可以取中往往將聖經賢𫝊之㫖旁求曲說牽綴遷就以合主司所主之意此非獨壞士習其為聖經之蠧也甚矣有司主此以出題士子主此以為文今日為士子既以此進身異日為主司又以此取士宋史所謂繆種流𫝊今日時文之弊殆類之也然此又不但科試為然而提學憲臣之小試殆又有甚焉者也其所至出題尤為瑣碎用是經書題目愈多學者資禀有限工夫不能遍及此䇿學所以幾廢而科舉所得罕博古通今之士也正統景泰以前所刻程文皆士之親筆有司稍加潤色耳近日多是考官代作甚至舉子無一言於其間殊非設科之本意若夫考試之官兩京及會試皆出自朝命鄉試則方面官先期訪請洪武以來惟有學者是用不問是何官職雖儒士亦在所聘後乃有建言專用教官者其所禮聘無非方面之親私率多新進士少能持守一惟監臨官是聽內外之權悉歸御史凡科場中出題刻文閲卷取人皆一人專之所謂彌封謄録殆成虛設謹按科場舊例分簾內外以隔絶交通之弊自簾以內考試官主之自簾以外監試官主之而提調官則兼總內外焉然惟涖其事爾而取人刻文皆不得預所以用巡按御史為監臨官者特以糾察其不如法者爾今宜敕有司凡科場條貫必復祖宗之舊所命題必光明正大切於人情物理關於彛倫治道者小録所刻之文謂之程文特録出為士子程式也非用是以獻上也文有可為程式者則刻無則否或多或寡不必齊同不許代舉子作如有缺闕繁冗稍加筆削可也經書題目無甚凶惡字面不必回避初場經義四條以通三條書義三條以通二條為合格否則不取五䇿問目通以十事為率非通五以上不在取數會試則本數不足取别數足之鄉試則此經不足足以他經凡解額惟限之不許過數茍無足取者寧缺無足通場全無然後短中求長取以傋數如此則科目所得者皆通經學古之士而適於世用矣更乞申明舊制在外鄉試俱照會試及兩京例不設監臨官其巡按御史止於科場外嚴加糾察士子欲入場者專委提學憲臣考驗而亦不許他官小試凡百執事不許用進士舉人出身人員恐有夤緣作弊臨晚給燭雖唐宋故事然今科場代筆換卷多在昏暮宜革去給燭而取減場先期聘考試官必詳加詢訪不許狥私濫舉許御史糾治惟有學行譽望者是取不分有司教職見任致事仍乞申嚴簾內簾外之限不許通融出入三日一宴之禮惟送酒殽不必宴會考試官閲卷去取既定先將所取中卷用其字號編定名第一樣三本封號印記其一留以自傋其二以授提調監試官至期比硃墨卷相同然後拆號各照所編定字號填榜不許更易又於各經各存傋卷三五卷如所取卷有參錯即隨經用所傋卷依次補之如此庶幾科場少弊可以得人而復祖宗之舊矣又考會試舉人往時入場者極多不過二千人今則積多已踰四千矣竊恐數科之後日纍日多又不止此數竊考宋歐陽修作禮部唱和詩序謂宋制考校五十日今制自初八日入場至二十日以後揭曉不過十餘日卷多日少恐不能無遺才請下禮部議寬其日限而移殿試于三月望日庶幾考試者日力有餘得以盡其心力精詳文理以為國家求才以上科舉漢武帝時太常孔臧等議請太常博士置弟子復其身擇民年十八已上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞者令二千石謹察可者當與計偕詣太常得受業如弟子一歲皆輒試能通一藝以上補文學掌故缺其高第可以為郎中者太常籍奏即有秀才異等輒以名聞臣按此太學生入仕之始夫自漢置博士弟子試通一藝者補以官其後唐人有學館生徒之設宋人有三舍之制今世歲貢生員禮部奏於奉天門下試中送國子監肄業循資送吏部選用本朝入仕之途科目之外惟此為重亦多得人此學校歲貢周禮宰夫掌百官府之徵令五曰府主蓄藏文書及器物者六曰史理文辭述事者七曰胥治文書之次叙謂才智為什長者八曰徒趨走以應呼召者臣按周官之府史胥徒即今之吏員也所謂庶人之在官者與下士同祿是巳是時未有進試之階至秦棄儒崇吏漢因之始有試吏入仕之途考之史若路溫舒為縣獄吏丙吉為魯獄吏龔勝為郡吏趙禹為佐史之類則是吏員入官其來久矣本朝入仕之途於科目監生之外有吏員凡在外藩憲衛府州縣任自辟舉以六年或三年為滿限至部分撥在內諸司以三年為考依資格叙用此吏員出身以上清入仕之路臣按我朝選舉之制比漢唐宋為省科舉之外止有監學歷仕吏員資次二途以為常選其他如經明行修賢良方正材識兼茂楷書秀才童子之類皆興廢不常惟任子祖宗雖有定數然皆出自恩典或與或否近年三品以上子孫入監方有定例故臣於入仕之路獨詳進士之科而兼及監生吏員者以當世之所重者在進士科而此二途次之竊惟本朝雖大封拜百官亦未嘗具服拜賀惟於䇿士𫝊臚之後羣臣致辭慶賀曰天開文運賢俊登庸由是觀之則祖宗所恃以求賢輔治之具誠莫先於進士一科是以百年以來凡明治體建功業者皆自此途以出唐史言方其取以辭章類若浮文而少實及其臨事施設奮其事業隱然為國名臣者不可勝數宋人亦言豪傑之士由之而進夫唐宋取士以詩賦多文而少實尚足以得一時之豪傑以為名臣况本朝取士之制本六經語孟之文用濂洛關閩之說即漢人所謂經術宋人所謂道學者也為士者誠專心於此而有所得焉上之人精擇而謹取之必名實相符文質相稱然後得預斯選焉其所得之人才當不止於唐宋而已也大學衍義補卷九
