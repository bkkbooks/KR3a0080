body:
  text: 大學衍義補卷四十五明丘濬撰治國平天下之要明禮樂王朝之禮上通典周制天子有四朝一曰外朝秋官朝士掌之二曰中門夏官司士正其位朝夕視政三曰內朝亦謂路寢之朝正朝視事畢退適路寢聽政四曰詢事之朝小司冦掌其政以致萬人而詢焉臣按天子路寢門有五焉其最外曰臯門二曰庫門一作雉門三曰雉門一作庫門四曰應門五曰路門一作畢門臯門之內或作外曰外朝朝有三槐九棘近庫門有三府九寺庫門內有宗廟社稷雉門外有兩觀連門觀外有詢事之朝在宗廟社稷間雉門內有百官宿衛之廨應門內曰中朝中朝東有九卿室為理事之處所謂中朝即中門也然不謂之朝而謂之門意者堂宇深邃難于聽對每日常朝則御其門歟今制天子大朝賀朔望行禮御正殿常朝御門與此合周禮天官宰夫之職掌治朝之法治朝在路門外以正王及三公六卿大夫羣吏之位掌其禁令禁謂止其非法令謂使之有為叙羣吏之治次序所治之事以待賔客之令令謂賔客未至而先為之具諸侯之復報也謂奏事者萬民之逆自下而上曰逆謂上言者鄭𤣥曰治朝在路門之外其位司士掌焉宰夫察其不如儀叙羣吏之治者常次叙羣吏之職事三者之來則應使辨理之臣按天官卿冢宰其二則少宰少宰之次又有宰夫王視朝則冢宰贊聽治而宰夫掌其治之法所謂叙羣吏之治即今百司各奏所治之事也待賔客之令即今鴻臚引見藩府所遣使及外夷也諸侯之復萬民之逆即今通政司所奏事也正公卿大夫羣吏之位正之為言疏謂察其不如儀者即前代殿中御史之職今輪御史紏儀也古今委任之職不同而朝廷之間所當為之令所當禁之法則一而已夏官司士正朝儀之位辨其貴賤之等正南鄉向明三公北面東上對上以東為尊孤東面北上位于右卿大夫西面北上位于左王族故士王之同族故為士而留宿衛者虎士虎賁之士在路門之右南面東上分立于右面向外太僕侍御之長大右即司右勇士為軍右者大僕從者小臣祭僕之類在路門之左南面西上分立于左西向外司士擯掌擯相之禮孤卿特揖逐人而揖大夫以其等旅免也揖卿大夫有上中下等各隨其等合衆而揖士㫄三揖士立于孤卿大夫之兩㫄待其特揖旅揖已訖後即其處而揖之王還視朝畢將還也揖門左揖門右王將還用手揖退立路門左右者大僕前大僕向王前立而奏復逆王入內朝皆退王入路門內朝者皆退王安石曰此所謂治朝也鄉明以聽天下者王故王南鄉鄉王而答之者三公故三公北面孤佑王者也故東面卿大夫佐王者也故西面王族故士虎士大僕大右大僕從者則從王者也順王所鄉故南面臣按此即通典所謂周制四朝之一二曰中門者也蓋在路門之外人君與羣臣常朝之所若今奉天門日朝是也其司士略似今鴻臚寺卿然公孤卿大夫每日朝參之臣也王族故士虎士大僕大右大僕從者侍衛執役之臣也王族故士宗室之有職任者也虎士虎賁氏掌先後王而趨以卒伍者也大僕掌王之服位出入王之大命及掌諸侯復逆者也大右即司右掌羣后之政令凡勇力之士能用五兵屬焉大僕從者有小臣掌公孤卿之復逆有御僕掌羣吏庶民之復逆當人君視朝之時司士正其位以正朝儀辨其等以定班次王族故士以肺腑之親而錯居侍衛之間虎賁士以武勇之選而趨走前後之列掌服位者大僕也而兼司出入之大命掌卒伍者司右也而實統勇力之士朝廷之間明明在朝穆穆在位所以鄉明而聽天下者肅肅乎其嚴也而左右前後之人所以環列而侍衛者又皆親信武勇之臣所以防微威衆者又無所不僃焉當是時也視是朝也論道經邦二公𢎞化者固各盡其道分職率屬敬官亂政者亦各理其事凡天下諸侯與在朝卿士及內外之羣吏庶民事之已行者有以復乎上事之未行者有以逆乎上則有大僕與其屬之小臣御僕以為之通逹焉若此者乃成周盛時常朝之儀位也然當天子視朝之際臣下入朝之初大臣則逐位而拜羣臣則逐列而拜小臣則即其位而㫄拜左右侍從之臣則方有事而未暇也故王于大臣則答以特揖之禮于羣臣則答以旅揖之禮于小臣則于再揖之後向其㫄而答之焉聽政既畢王將還內而侍衛于門之左右者始行拜禮王于是隨其所在而左右揖之可見隆古盛時以禮為治位有尊卑而禮無不答也秦不師古始尊君卑臣而此禮廢矣太僕侍御之官太僕其長也掌正王之服位王之吉服有六所立有位太僕正之使當其理出入王之大命出大命則宣之于外入大命則納之于內掌諸侯之復逆復有報乎上也逆有言乎上也王視朝則前正位而退入亦如之建路鼓于大寢之門外而掌其政以待逹窮者與遽令聞鼓聲則速逆御僕與御庶子王視朝則正位王與族人燕處則正其位掌擯相擯以助賔相以助主王不視朝則辭于三公及孤卿王有故不朝則以告于大臣臣按太僕之官在周為侍御之長所掌者視朝之事也後世則敷以典牧馬之政失古意矣周穆王命伯冏為太僕正特作命書所謂侍御僕從罔匪正人以旦夕承弼厥辟者也正王之服猶後世行某禮當具冕服某禮當具皮辨服是也正王之位如後世行某禮當御正衙某禮當御便殿是也出之命王之詔􅎁也入之命臣之奏報也復者何事之已行者報之于上也逆者何事之未行者言之于上也凡此皆太僕之所掌當王視朝之初出則出次而奏于王之前以正其位次有不當其位者正之既正而退于侍衛之列及王視朝之將畢又出次而奏于王之前以見朝事之畢凡夫視朝之時有出入之大命有復逆之奏報在其位者則自掌之在公孤卿及羣吏庶民者則其屬分掌之而總之于已使有所稽考而不至于遺忘時以逹之于上而分付于所司而施行焉如正典則付之夏官憲典則付之秋官之類也然猶恐困窮者不能以自逹而急遽之事不容以暫緩而又設四面之鼓于寢門之外俾大僕掌其政焉由是觀之則人君之視朝非但以嚴上下之分而惟以通上下之情可知矣然視朝之政若後世付之鴻臚而屬之禮部可也今乃以屬之司馬何耶昔秦章邯使長史欣請事咸陽留司馬門三日不得見邯遂降楚趙充國戊申上奏甲寅璽書報下往還才七日果以成功兵事貴速而忌壅蔽蓋司馬掌兵政而以其屬司𫝊奏則無壅遏故也周人之意或出此歟小司寇之職掌外朝之政以致聚也萬民而詢焉謀也一曰詢國危有兵寇之難謀所以安也二曰詢國遷徙郡改邑三曰詢立君君無適子謀所以嗣其位君臣與民所立之位王南鄉天子南面三公及州長百姓北面三公鄉老也羣臣西面卿大夫士也羣吏東面府史之類小司冦擯揖之使前以叙進而問焉以次序而進之以衆輔志而弊謀弊斷也以衆之謀輔王之志又斷之于王也臣按王朝有三有內朝有治朝有外朝治朝其常治事之位內朝則退居之處也外朝不常御惟國家有非常之事然後御于此致萬民而詢謀之焉若夫常行之事則在治朝與羣臣按古典而施行之也洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人詩曰詢于芻蕘此所謂致萬民而詢焉詢及萬民則卿大夫士皆在其中矣國危則詢之而求其所以安國之䇿國遷則詢之而求其所以徙國之方立君則詢之而求其所以嗣國之人三者皆國之大政必民心之所安衆論以為可然後行之茍非遍訪于人人其不至于逆天理而拂人心也者幾希然其詢之不于治朝而必于外朝者以民之衆且微治朝之嚴與狹非獨不可使之䙝入亦恐不足以容之也朝士掌建邦外朝之法外朝在庫門之外左九棘朝之下其左樹以棘棘取其赤心而外刺也孤卿大夫位焉羣士上士中士下士在其後右九棘公侯伯子男位焉羣吏府吏也在其後面三槐朝之前有三槐木槐取其黃中也三公位焉州長衆庶在其後左嘉石平罷疲急民焉右肺石逹窮民焉帥其屬而以鞭呼趨且辟用鞭呼朝者使趨焉又為之辟也禁慢朝怠慢不敬錯立參錯不齊族談相聚而語者臣按外朝在庫門之外最居外者也人君不常御國家有大禮典則于此朝㑹而朝士掌其法有大疑難則于此詢問而小司冦掌其政法者經常之制政者權宜之事也朝著之間有上下之位有前後之次入者必循序漸進而不可參差立者必肅容守次而不可錯亂非奏對不言無故不可聚而喧譁故當人臣朝見之時小司寇則擯而相之使之次第而進朝士則帥其屬而用鞭號呼以肅之使之各趨其位而知所避焉後世人君出警入蹕而鳴鞭以肅衆其原蓋出于此禮記玉藻曰朝辨色始入君日出而視之退適路寢聽政使人視大夫退然後適小寢釋服陳祥道曰朝辨色始入所以防微日出而視之所以優尊詩曰夜鄉晨言觀其旗臣辨色始入之時也又曰東方明矣朝既盈矣君日出而視之之時也蓋尊者體盤卑者體蹙體蹙者常先體盤者常後朝以先為勤以後為逸朝而臣先于君所以明分守退而君後于臣所以防怠荒此所以使人視大夫大夫退而後適小寢釋服也臣按周有三朝一曰外朝二曰治朝三曰內朝亦謂之燕朝即路寢也外朝不常御人君每日出視治朝見羣臣以通上下之情退適路寢聽政治以決可否之計蓋視朝之時百官班次以列趨蹌以進漏下無幾刻爾奏對之際機務雜沓未易一一以詳悉也故于退朝之後再御燕寢取其事務之急且切者重聽之與夫左右臣工所謂股肱心膂者委曲講究必罄竭其本末終始如此行之則便不如此則弊俾上心曉然于中而奉行之臣亦灼然知其必如此而不可如彼然後行下如此則朝廷所行之事皆所當行所禁之事皆所不當行行之萬世而無弊太平之根本在此矣漢唐以來或五日一視朝或三日或旬日始朝我祖宗以勤為治無日不朝而每日之間有早午晚三朝或再朝方是之時國家多事幾務叢委事事取自上裁今則治定功成百事具有成憲每日早朝百司奏對只是按行故事于午晚二朝似若可省然自古禍亂之端皆起自䝉蔽䝉蔽之由起自上下之情不通上下之情不通起自君臣不相接見然徒接見而不相親欵見猶不見也我太祖髙皇帝立法創制于君臣之分最嚴然猶恐其嚴而或過于亢故御製大誥首篇以君臣同逰為開卷第一義所以示萬世聖子神孫者至矣盡矣臣願參酌祖宗之制每日早朝之後遇有急切重務成憲所不載或行之久而弊者許承行之臣先期入奏請御便殿具其本末源委㑹集大臣面究利害然後施行事畢之後或從容顧問以泛及天下之事災異水旱之由田里休戚之故皆許以聞如此則上下之情通而為泰矣此最今日求治之要務惟聖明注意則天下不勝幸甚漢有天子大㑹殿為周之外朝蕭何造未央宫言前殿宜有後殿大㑹殿為外朝宫中有後殿為治朝臣按七年諸侯羣臣朝長樂宫蓋大朝㑹之所唐以宣政殿為前殿謂之正衙即古之治朝也以紫宸殿為便殿謂之入閣即古之燕朝也而外别有含元殿含元非正至大朝㑹不御正衙則日見羣臣百官皆在謂之常參葉夢得曰古者天子三朝外朝內朝燕朝外朝在王宫庫門外有非常之事則于此詢萬民治朝在路門外燕朝在路門內蓋內朝以見羣臣或謂之路朝燕朝以聽政或謂之燕寢漢去周未逺猶倣佛其意唐含元殿宜如漢之大㑹殿宣政紫宸乃前後殿其沿習有自來矣唐制在京文武官職事九品以上朔望日朝其文官五品以上及監察御史貟外郎大常博士每日常參武官五品以上仍每月五日十一日二十一日二十五日參三品以上直諸司及長上者各准職事參若雨霑失容及泥潦並停周喪未練大功未葬非供奉及宿衛官皆聽不趨臣按此唐朝朝參之儀制令也漢朝參儀史不載所載朝㑹之儀耳惟宣帝紀中興始五日二視事觀此則唐之朝比漢為勤然勤之中又有節焉若雨沾失容泥潦停朝常參官周喪未練大功未葬皆聽不趨是也臣乞于今日亦准此制雨潦之免臨時取㫖若常朝之臣有期功以下喪許其告假下禮官定為限期若事未訖亦許展限如此庶使羣臣注門籍者不致虛飾本遭喪者不託以疾一事之舉上足以見人君體臣之仁下足以表臣下事君之誠唐室升平日常參官每日朝退賜食謂之廊餐自乾符亂離之後秪遇月旦入閣日賜食臣按唐人于每日常參皆有廊餐及朔望皆賜食其為國費亦夥我朝廢之良是其三大朝賀禮宴祖宗所以禮答臣下者必須舉行唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閣宣政前殿也謂之衙衙有仗紫宸便殿也謂之閣其不御前殿而御紫宸也乃自正衙喚仗由閣門而入故謂之入閣李琪曰衙朝也其禮尊閣燕見也其事殺琪又言入閣有待制次對官論事而內殿起居一見而退欲有言者無由自陳非所以數見羣臣之意也葉夢得曰唐正衙日見羣臣百官皆在謂之常參喚仗入閣百官亦隨以入則唐制天子未嘗不日見百官也其後不御正衙紫宸所見惟大臣及內諸司百官俟朝于正衙者𫝊問不坐即退則百官無復見天子矣其後惟存朔望兩朝至五代又廢唐明宗始詔羣臣每五日一隨宰相入見謂之起居臣按孔子吉月必朝服而朝蓋以一月之間朔望為重而見君必僃服以盡禮唐人制禮于常日則隆而于朔望反殺失所輕重矣雖曰是日薦食陵寢有思慕之心盍于雞初鳴時先行薦食之禮昧爽乃御殿受朝乎我祖宗以來每日先于奉先殿行禮東朝問安然後御朝其于父子之親君臣之義兩盡可以為萬世帝王之法宋朝因唐與五代之制文武官每日赴文明殿正衙常參宰相一人押班五日起居即崇德長春二殿中書門下為班首其長春殿常朝則內侍省都知押班至神宗元豐中官制始行詔侍從官而上日朝垂拱謂之常參官百司朝官以上每五日一朝紫宸為六參官在京朝官以上朔望一朝紫宸為朔望參官遂為定制臣按前代朝儀無一定之制時有更改惟我朝自祖宗以來至于今日率循舊章一日三朝自古帝王所無也每日晨興上便服御奉天門文東武西侍鳴鞭畢鴻臚卿唱入班百官行叩頭禮分班侍立翰林學士侍御座左錦衣衛官俠陛西立六科給事中分侍左右御史分班面北立鴻臚官屬立其後先日謝恩見辭者于鴻臚寺報名至日先赴午門外俟百官叩頭畢鴻臚卿對御宣奏姓名貟數于午門外行五拜三叩頭禮畢五府六部以次奏所司合行事次通政司引入于御前面奏請㫖該司官出班承㫖大理寺以下有事出奏無則已次禮科引差使考滿官貟次六科各奏㫖意題本守衛揭帖賞賜鈔錠次鴻臚宣奏藩府邉鎮所遣使臣上命以酒飯賞賜既而兩京堂上官新升者及在外三司來朝赴任者面見叩頭畢鴻臚卿唱奏事畢羣臣俱側身向上立鳴鞭畢上乘輦往御武英殿或文華閲章疏日率如此至午復出朝晚亦如之此每日常朝之制也每月朔望上具皮辨服御正殿百官公服叩頭畢分班侍鴻臚卿宣奏謝恩見辭貟數畢上出奉天門視朝如常儀臣竊考前代之制有所謂捲班放仗入閣等名目或失于粗略或失于煩瑣惟今日朝儀酌古凖今實為得中洪武二十年冬十月太祖皇帝諭大臣曰近者臣僚尊卑體統多未得宜爾等宜著禮儀以為定式禮部尚書李原名等㑹官著為禮儀定式一書凡三十七條所謂朝參之禮有八焉頒行既久而奉行者偶因一時之便遂襲以為故事旁觀者雖知其非而不敢以為言後來者因以為當然者亦或有之竊觀前代朝㑹班次儀注皆著成圗式載在文獻通考諸書者可考也乞敕大臣及翰林院鴻臚寺官將纍朝實録及禮儀定式等書并稽洪武永樂年間以來事例詳加講究櫽括節潤畫為圗式懸于兩長安門用以表正百官觀示列辟俾人人知所趨避世世得以遵守永為定制云以上朝儀以上論王朝之禮上大學衍義補卷四十五
