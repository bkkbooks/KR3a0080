body:
  text: 大學衍義補卷十九明丘濬撰治國平天下之要固邦本分民之牧舜典肇始也十有二州朱熹曰中古之地但為九州曰冀兖青徐荆揚豫梁雍禹治水作貢亦因其舊及舜即位以冀青地廣始分冀東恆山之地為并州其東北醫無閭之地為幽州又分青之東北遼東等處為營州而冀州止有河內之地今河東一路是也咨十有二牧曰食哉惟時柔逺能邇惇厚也德有德之人允信也元仁厚之人而難拒絶也任人包藏凶惡之人蠻夷率服朱熹曰牧養民之官十二牧十二州之牧也舜言足食之道惟在於不違農時也柔者寬而撫之也能者擾而習之也逺近之藝如此先其略而後其詳也又言當厚有德信仁人而拒姦惡凡此五者處之各得其宜則不特中國順治雖蠻夷之國亦相率而服從矣臣按有虞之世分天下為十二州每州設一牧以分治之在內則統之以四嶽亦猶百揆統在廷之庶官也蓋帝王之治內外相維大小相承分而理之使其有條序而不亂合而一之使其有統攝而歸一所以為此者不過安養斯民而已故舜咨十二牧首以民食為言蓋以國之所以為國者民也民之所以有生者食也然欲民之得食在乎不違農時農不失時則得以盡力田畝而仰事俯育之有餘而公私咸給矣不然則非但民不得以為民而國亦不得以為國矣然欲吾民之得其所又在乎所用之得其人茍非受民牧之寄者所厚者皆有德之人所信者皆仁厚之士而包藏凶惡之人皆知所以拒而絶之不使之得以預吾政臨吾民焉雖有仁心仁聞而民不被其澤矣是以人君為治必擇牧民之長而又使其長擇其所用以分牧之人一處不得其人則一處之民受其害必無一處之不得其人使家家皆有衣食之資嵗歲不違耕作之候則家給人足而禮義興行協氣嘉生薰為太和而唐虞雍熙泰和之治不外是矣禹貢禹敷分也土分别土地以為九州隨山刋木奠定也髙山大川冀州濟河惟兖州海岱惟青州海岱及淮惟徐州淮海惟揚州荆及衡陽惟荆州荆河惟豫州華陽黑水惟梁州黑水西河惟雍州鄭樵曰州縣之設有時而更山川之形千古不易所以禹貢分州必以山川定疆界使兖州可移而濟河之兖州不能移使梁州可遷而華陽黑水之梁州不能遷是故禹貢為萬世不易之書後世之為史者主於州縣故州縣移易而其書遂廢矣臣按舜以前皆為九州至舜乃肇為十二州蓋禹治水敷土在肇十二州之前時猶九州也其後禹復并為九州商因之觀左傳所謂昔夏之方有德也九牧貢金及商頌所謂帝命式於九圍可見矣周官內有百揆四嶽外有州牧侯伯蔡沈曰百揆無所不總者四嶽總其方嶽者州牧各總其州者侯伯次州牧而總諸侯者也臣按唐虞之世設百揆以統內之庶官設四嶽以統外之州牧州牧之分任者既各以其事功而上於四嶽四嶽又總以各牧之所上者以歸於百揆此體統所以歸於一而不紊也爾雅兩河間曰冀州河南曰豫州河西曰雍州漢南曰荆州江南曰揚州濟河間曰兖州濟東曰徐州燕曰幽州齊曰營州孫炎曰爾雅與禹貢職方皆不同疑殷制大雅嵩髙詩篇序曰尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉其首章曰嵩髙維嶽駿大也極于天維嶽降神生甫甫侯也及申申伯也維申及甫維周之翰幹也四國于蕃蔽也四方于宣朱熹曰宣王之舅申伯出封于謝而尹吉甫作詩以送之言嶽山髙大而降其神靈和氣以生甫侯申伯實能為周之楨幹屏蔽而宣其德澤於天下也臣按人君建國以為國之楨幹實欲資之以為京師之屏蔽而宣布王者之德澤也三代以前則列爵分土以為國家蕃翰自秦罷侯置守所以為國蕃翰者藩服州郡而已春秋公羊傳自陜而東者周公主之自陜而西者召公主之隱公五年朱熹曰文王辟國寖廣於是徙都於豐而分岐周故地以為周公旦召公奭之采邑且使周公為政於國中而召公宣布於諸侯臣按陜古𢎞農地蓋在今河南陜州也周禮職方氏掌天下之圖乃辨九州之國使同貫利東南曰揚州正南曰荆州河南曰豫州正東曰青州河東曰兖州正西曰雍州東北曰幽州河內曰冀州正北曰并州劉彜曰乃辨九州之國使同貫利者四方之人民好惡之不同財用有無之不等必周知其利害貫而通之使有無之相易也善惡之相濟也一天下之財用養天下之人民謂同享其利焉臣按古者言九州者有三禹貢之冀兖青徐揚荆豫梁雍夏制也爾雅之冀幽營兖徐揚荆豫雍商制也職方之揚荆豫青兖雍幽冀并周制也商有幽營而無禹貢之青梁周有幽并而無禹貢之徐梁此三代九州之不同也然此皆三代以前封建之制也後世郡縣亦不異焉夫以人君中天下而立定四海之民萬方如此其大也四海如此其逺也億兆如此其衆也人君以一人之身必欲周知而遍以及焉非細析而總㑹之分其肢而解其節提其綱而挈其領使如身之使臂臂之使指安能一一中其理處處得其所哉此古今為治者既分以州縣必統以藩服使其上下相承彼此相維以為久安長治之基也王制千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬于天子之老二人分天下以為左右曰二伯陳澔曰自陜以東周公主之自陜以西召公主之此即天子之上公分主天下之侯國也八伯為八州之伯二伯則天下之伯也徐自明曰先王衆建諸侯而設方伯連帥之職或以子男附庸之屬不能專達於天子故貢賦朝聘之數悉使之聽命於牧伯此特其一節耳夫先王舉天下以封建諸侯而缺然無所紀綱於其間則强弱有以相吞而大小無以相維甚非經久長治之策也蓋方伯連帥之設所謂褒表功德關諸盛衰深根固本為不可拔者也其所係大矣哉臣按先王之世封建之制行故其中又設為方伯連帥以監臨而總督之後世立為郡縣於其間又分屬於各道制雖不盡同而亦其遺意歟漢地理志武帝開地斥境南置交趾北置朔方之州兼徐梁幽并夏周之制改雍曰涼改梁曰益凡十三部曰豫州部潁川汝南沛凡三郡梁魯二國曰冀州部魏巨鹿常山清河四郡趙廣平真定中山信都河間凡六國曰兖州部陳留山陽濟隂泰山東郡凡五郡城陽淮陽東平凡三國曰徐州部琅邪東海臨淮凡三郡泗水廣陵楚凡三國曰青州部平原千乘濟南北海東萊齊凡六郡菑川膠東髙密凡三國曰荆州部南陽江夏桂陽武陵零陵南郡凡六郡長沙一國曰揚州部廬江九江㑹稽丹陽豫章凡六郡六安一國曰益州部漢中廣漢武都犍為越嶲益州牂牁蜀凡六郡曰涼州部隴西金城天水武威張掖酒泉敦煌五原雲中定襄雁門上郡凡九郡曰幽州部勃海上谷漁陽右北平遼西遼東𤣥莵樂浪涿代凡十郡廣陽一國曰交州部南陽鬱林蒼梧交合浦九真日南七郡曰并州部太原上黨西河朔方凡四郡臣按自漢以來分部牧民之始漢十三部部各有郡國郡天子親理命守治之國分封諸侯王置相以為之治也漢分天下為十三部而在關中者則屬司𨽻挍尉部京兆扶風馮翊𢎞農河內河南河東凡七郡在征和以前司𨽻所統亦有刺史察之後乃除焉今制分天下為十三布政司而兩京畿則直𨽻府部亦此意也唐太宗貞觀元年帝以民少吏多悉併省之因山川形便分為十道曰關內古雍州之地漢京兆馮翊扶風北地安定上郡及𢎞農隴西五原西河雲中之境曰河南古豫兖青徐之域漢河南𢎞農熲川汝南陳留沛泰山濟隂濟南東萊齊國山陽東海琅邪北海千乘東郡及梁楚魯國東平城陽淮陽菑川髙密泗水平原勃海之境曰河東古冀州之域漢河東太原上黨西河雁門代郡及巨鹿趙國常山廣平國之地曰河北古幽冀二州之域漢河內魏勃海清河平原常山上谷涿漁陽右北平遼西真定中山信都河間廣陽等郡國又參有東郡河東上黨巨鹿之地曰山南古荆梁二州之域漢南郡武陵巴郡漢中南陽及江夏等郡之地曰隴右古雍梁二州之域漢天水武都隴西金城武威張掖酒泉燉煌等郡曰淮南古揚州之域漢九江廬江江夏等郡廣陵六安國及南陽汝南臨淮之境曰江南古揚州南境漢丹陽㑹稽豫章廬江零陵桂陽等郡長沙國及牂牁江夏南郡福建汀漳曰劒南古梁州之域漢蜀都廣漢犍為越嶲牂牁巴郡之地曰嶺南古揚州之南境漢南海鬱林蒼梧珠崖儋耳交趾合浦九真日南等郡臣按此後世因山川形便分道始此宋太宗分天下為十五路仁宗析為十八路神宗又析為二十三路曰京東東西東路今山東之濟南青登萊四府南直𨽻之邳州西路今河南之歸德睢二州及太康縣山東之兖州府南直𨽻之徐州曰京西南北南路今湖廣之襄陽府隨安陸二州河南之南陽府北路今河南之河南汝寧二府許鄭陳汝四州及孟泛水河隂三縣南直𨽻之潁州北直𨽻之滑胙城二縣曰河北東西東路今北直𨽻之大名河間二府冀霸二州及成安清河保定容城雄五縣山東之東昌府武定德濵三州西路今北直𨽻之真定順德廣平保定四府及濬縣河南之彰德懷慶衛輝三府曰河東今山西之太原平陽二府澤潞汾遼沁五州陜西之葭州及吳堡神木府谷三縣曰陜西二路永興軍路今陜西之西安延安慶陽三府河南之陜州山西之蒲解二州及平陸縣湖廣之上津縣秦鳯路今陜西之鳯翔臨洮鞏昌平涼四府河岷洮三州曰兩浙二路西路今南直𨽻鎮江常蘇松江四府浙江之杭嚴嘉興湖四府東路今浙江之紹興寧波台溫金華衢處七府曰淮南東西東路今南直𨽻之揚淮安二府滁宿泗三州及五河亳二縣河南之永城鹿邑二縣西路今南直𨽻之鳯陽廬安慶三府河南之光州湖廣之黃州曰江南東西東路今應天府及直𨽻之太平池徽寧國五府廣德州江西之饒廣信撫建昌四府西路今江西之南昌瑞袁吉安臨江九江南康贑南安九府湖廣之興國州曰荆湖南北北路今湖廣之武昌漢陽嶽常德德安荆辰七府沔陽靖二州南路今湖廣之長沙衡永寶慶四府郴州廣西之全州曰成都等四路成都府路今四川之成都府睂嘉定雅三州及黎州安撫司潼川府路今四川之叙順慶二府潼川瀘合三州及資金堂榮三縣利州路今四川之保寧府蓬州及龍州宣撫司陜西之漢中府階州及西河成文三縣䕫州府路今四川之重慶䕫二府及播州宣慰司湖廣之施州衛貴州之思州府曰福建今福建之福泉興化漳建延平邵武汀八府曰廣南東西東路今廣東之廣肇慶韶南雄惠潮六府廣西之富川賀縣西路今廣西之桂林平樂栁慶逺潯梧南寧太平八府廣東髙雷廉瓊四府曰燕山府今順天府及北直𨽻之永平府易隆慶保安三州山西之大同府此地宋時屬遼金臣按自漢分天下為十三部設部刺史後改為州牧唐分天下為十五道宋始分為十五路繼為十八路後又析為二十三路皆因山川形便設為藩服以分統天下郡縣吏民本朝內有兩京畿外有十三布政司畿內郡縣親領於六部故曰直𨽻而有南北之分惟兩京府南曰應天北曰順天在天子輦轂下與內諸司相頡頏不以直𨽻稱其十三布政司曰浙江曰江西曰湖廣曰福建曰廣東曰廣西曰四川曰雲南曰河南曰陜西曰山東曰山西曰貴州國初止十二布政司後革思州宣慰司以其地併貴州升為布政司永樂初平安南又立交趾布政司未幾罷之其因山川分疆域比前代尤為得中焉臣嘗因是而通論之天地之間而人生焉天雖無所不包而地則必有逺近人君中天地而立為生民之主民生近地者舉目而可見聞聲而即至百步之外則視有所不及矣一里之外則呼有所不聞矣是以人君必隨地藝之所至民生之所在立為君長以臨涖保養之由近而及逺用大而統小自中而制乎外合外以奉乎中譬則人之一身焉上必有首以為衆體之尊自是而下分為肢體肢體之下又有臂有指焉上焉以衛乎首次焉以為耳目口鼻之用外焉以修飾乎髮膚內焉以承附乎臟腑夫然則彼此應援血氣周流而一身得其安矣人君於民何以異此夫人君以一人之身雖曰居尊以臨卑然實以寡而御衆以理言固可以一人統以藝言則不能以一人周也是以為治者既建國立都以宅中圖治又必隨地形因民俗衆為郡國邑里以分理之然散必有所以聯之之方分必有所以合之之處於是乎又因山川之形便據地理之總㑹建為州牧方伯之職以提綱而挈領承流而宣化使上之政教有所承傳以代之下宣下之心志有所敷奏而代之上達此唐虞三代之制皆有九州十二州之設而漢唐宋之世因之而分部設道也歟以上論分民之牧固邦本詢民之瘼詩皇皇者華其首章曰皇皇猶煌煌也者華草木之華于彼原隰髙平曰原下溼曰隰侁侁衆多疾行之貌征夫使臣與其屬也每懷思也靡及其二章曰我馬維駒六轡如濡鮮澤也載馳載驅周褊也爰于也咨諏訪問程頤曰遣使四方以觀省風俗采察善惡訪問疾苦宣道化於天下故為使者惟慮不能宣道也朱熹曰此遣使臣之詩也君之使臣固欲其宣上德而達下情而臣之受命亦惟恐其無以副君之意也使臣自以每懷靡及故廣詢博訪以補其不及而盡其職也程子曰咨訪使臣之大務歐陽修曰周詳訪問以博采廣聞不徒將一事而出也輔廣曰每懷靡及者心也諏謀度詢者事也有是心則有是事矣程子之意蓋謂人君正以耳目不得與逺民相接故遣使以宣己意而通下情為之使者豈可不咨訪以副君意哉臣按三代盛時既列爵分土以分牧於天下而又特遣使臣循行四方諏謀詢度以求民隱察民瘼此下民所以無隱情而王政罔有闕遺也歟周禮撢人主撢序王意以語天下掌誦王志道國之政事以巡天下之邦國而語諭說也之使萬民和悅而正王面猶向也使民心曉而正向王鄭𤣥曰道猶言也以王之志與政事諭說諸侯使不迷惑臣按王者處九重之上其去民也有千萬里之逺焉王之心志所在下人何從而知之哉故設為撢人之官巡邦國之內使之探王志之所在為之誦說以曉諭夫天下之人俾其在閭閻之下者如在殿陛之間處萬里之逺者如在跬步之近親聞玉音之謦咳親面天威之嚴穆上無隔絶之藝下無阻閼之情故凡一號令之頒一政事之舉莫不曉然於心欣然於色而知上之人志向在此也是以詔之無不信行之無不從禮記天子使其大夫為三監監於方伯之國國三人方慤曰方伯專征於一方其權實重焉天子不可不大為之防每國三人故謂之三監不使卿為之止使大夫為之以見天子之尊雖使其大夫固足以制於方伯故也臣按先儒謂方伯者天子所任以總乎外者也又有監以臨之蓋方伯權重則易專大夫位卑則不敢肆此小大相維內外相統之微意今制分天下為十三布政司每嵗遣監察御史往巡其地蓋得古人此意秦以御史監理諸郡謂之監察御史漢惠帝三年遣御史監三輔郡察詞訟所察之事凡九條監者二歲更之常以十月奏事十二月還監其後諸州復置監察御史文帝十三年以御史不奉法下失其職乃遣丞相史出刺并督察監察御史武帝元封元年御史止不復監臣按御史之設於周而加以監察之名則始於秦而漢因之蓋設此官以監郡邑及察其官吏也自武帝置郡刺史不復用監直至我朝乃復遣監察御史巡按天下藩服武帝元狩元年遣謁者巡行天下詔曰朕嘉孝弟力田哀夫老眊孤寡鰥獨或匱於衣食甚憐閔焉其遣謁者巡行天下存問致賜曰皇帝使謁者賜縣三老孝者帛人五匹鄉三老弟者力田帛人三匹九十以上及鰥寡孤獨帛人二匹絮三斤八十以上米人三石有寃失職使者以聞縣鄉即賜無贅聚臣按漢去古未逺所以惠賜元元者猶存古意往往留意於孝弟力田存恤其鰥寡孤獨失職者得以叙復寃枉者得以伸訴至其末章所謂縣鄉即賜無贅聚尤切中後世有司之弊當是之時詔令之頒無有虛文恩典之施皆有實惠使者銜命所至有如旱暵而得時雨也元狩六年遣博士大等六人分循行天下存問鰥寡廢疾無以自振業者貨與之諭三老孝弟以為民師舉獨行之君子徵詣行在所詳問隱處亡無同位及寃失職姦猾為害野荒治苛者舉奏郡國有所以為便者上丞相御史以聞臣按漢世既有郡國守相以牧民而又州設部刺史以監之然猶恐其守相之不得其人而部使者之不舉其職也時遣在廷之臣分循天下存問無告振貸貧困伸理寃抑舉用人才黜陟官吏考察吏治觀覽風俗今制既歲遣御史出巡天下藩服而又時遣大臣巡撫即漢人此意元鼎二年又遣博士中等循行詔曰仁不異逺義不辭難今京師雖未為豐年山林池澤之饒與民共之今水潦移於江南迫隆冬至朕懼其飢寒不活江南之地火耕水耨方下巴蜀之粟致之江陵遣博士中等分循行諭告所抵無令重困吏民有振救飢民免其厄者具舉以聞臣按博士之官通經學古者也漢朝遣使分循天下豈無理政事司憲法之臣而必用儒生哉蓋漢人本經術以為治其政法雖不能純如三代然猶有古人尚德不尚刑之遺意故其詔書所下顓顓然多以教化仁政為言略不及於法令征賦此三代以後之治所以漢世為獨優歟元封五年置刺史掌詔六條察州凡十三部焉漢制刺史以六條問事非條所問即不省一條强宗豪右田宅踰制以强陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁諂牟利侵漁百姓聚斂為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則任賞煩擾刻暴剝戮黎元為百姓所疾山崩石裂妖祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟怙恃榮藝請託所監六條二千石違公下比阿附豪强通行貨賂割損政令臣按漢每郡置刺史以六條察州蓋漢郡最大其一郡可以當今之布政司一其刺史以六條問事所監臨之州其官吏人民有犯在六條者即舉問之亦猶今以御史監察天下藩臬也然今制御史出巡一方凡事無不在所省察非若漢人非條所問不省也一嵗一易非若漢人居部九嵗也蓋天下之事幾無窮人情之變詐不一限條而問則所遺多矣况人之相與久則玩玩則狎狎則法有不能盡行者矣此我朝遣御史監察天下藩服每歲一易焉而無事不在所問蓋得中制而萬世所當法者也宣帝詔曰朕惟耆老之人髮齒墮落血氣衰微亦亡無同暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今以來諸年八十以上非誣告殺傷人他皆勿坐遣太中大夫疆等十二人循行天下存問鰥寡覽觀風俗察吏治得失舉茂材異倫之士臣按宣帝遣使齎此詔循行天下專以耆老犯法為言至末乃及存問鰥寡覽觀風俗察吏治得失舉茂材異倫之士蓋宣帝雖以勵精嚴察為治然所舉行者皆仁厚之政此則漢人之家法也元帝初元元年詔曰間者地數動而未靜懼於天地之戒不知所繇方田作時朕憂蒸庶之失業臨遣光祿大夫褒等十二人循行天下存問耆老鰥寡孤獨困乏失職之民延登賢俊招顯側陋因覽風俗之化相守二千石誠能正躬勞力宣民教化以親萬姓則六合之內和親庶幾乎無憂矣又建昭四年詔曰朕承先帝之休烈夙夜栗栗懼不克任間者隂陽不調五行失序百姓飢饉惟蒸庶之失業臨遣諫大夫博士賞等二十一人循行天下存問耆老鰥寡孤獨乏困失職之人舉茂材特立之士相將九卿其帥意毋怠臣按元帝此二詔皆是因災異遣使循行天下也其後成帝建始三年遣諫大夫林鴻嘉元年遣諌大夫理永始二年遣太中大夫嘉綏和二年遣光祿大夫亦皆是因災異而遣使問孤老録寃獄蠲逋貸閔疾苦舉幽隱除貪暴免被災者租賦給疫死者棺錢凡此皆仁者之政人君居富貴安樂之地而知畏天災悲人窮則必兢兢戒謹不敢少有恣肆是以天雖災而不災人雖苦而不苦含齒戴髮之民窮山絶塞之外茅簷草屋之下咸知有生之樂惟恐死亡及之雖驅之為亂有不屑者矣是何也下之人咸知上之人不我忘也知上之人不我忘咸思所以尊其君親其上矣成帝綏和元年何武奏曰春秋之義用貴理賤不以卑臨尊刺史位下大夫而臨二千石輕重不相準請罷刺史更置州牧以應古之制奏可乃更刺史為州牧秩真二千石位次九卿哀帝建平二年朱博又奏曰漢家立置郡縣部刺史奉使典州督察郡國吏民安寧故事居部九嵗舉為守相其有異材功效者者輒登擢秩卑而賞厚咸勸功樂進今增秩為牧以髙第補九卿其中材則茍自守而已恐功效陵夷姦軌不禁臣請罷州牧置刺史如故乃復以為刺史臣按漢部刺史十三人秩六百石專以六條察二千石其職卑故已不敢自恣其權重故人不敢慢忽上之人以此使人使之激昻而自奮也何武之奏但知以貴理賤不以卑臨尊為春秋之義而不知義有常經而權則無常藝也人君操天下之大權以鼓一世之士民而振舉萬事之機要使利不顓於一人害不及於衆庶藝不偏於一隅非有微權不可也漢人立部刺史以六百石吏察郡國二千石守相蓋得此意朱博之論蓋近之而何武輩不足以知此也今制布政使從二品都指揮使正二品按察使正三品知府正四品知州從五品而監察御史之品僅與知縣同繡衣一出山嶽動搖輶車一臨郡縣奔走而藩服大臣亦莫不趨承禀令蓋得漢人立部刺史之微意也順帝漢安元年遣杜喬周舉周栩馮羡欒巴張綱郭遵劉班分行州郡表賢良顯忠勤其貪汚有罪者刺史二千石驛馬上之黑綬以下便輒收舉臣按漢順帝遣此八使者分行天下顓以考察守長為事而不及於民然去貪汚之吏即所以安窮困之民也唐太宗遣杜淹巡關內諸州出御府金贖貧民男女自賣者還其父母其後又遣褚遂良等二十二人以六條巡察四方黜陟官吏臣按唐太宗遣使關內又分遣使巡四方所遣者乃杜淹褚遂良輩皆極一時之選者也此貞觀之治所以為有唐一代之盛也歟德宗時遣黜陟使庾何等十一人行天下陸贄說使者請以五術省風俗八計聽吏治三科登俊乂四賦經財實六德保罷瘵五要簡官事五術曰聽諍誦審其哀樂納市價觀其好惡訊簿書考其爭訟覽車服等其儉奢省作業察其趣舍八計曰計戶口豐耗以稽撫字視墾田贏縮以稽本末視賦役薄厚以稽廉冒視案籍煩簡以稽聽斷視囚繫盈虛以稽決滯視姦盜有無以稽禁禦視選舉衆寡以稽風化視學校興廢以稽教導三科曰茂異賢良幹蠱四賦曰閲稼以奠稅度産以衰與差同征料丁壯以計庸占商賈以均利六德曰敬老慈幼救疾恤孤賑貧窮任失業五要曰廢兵之冗食蠲法之撓人省官之不急去物之無用罷事之非要臣按陸贄以五術八計三科四賦六德五要說當時黜陟使自古遣使巡撫之條目蓋莫詳焉然此等事固非一人所敢專亦非一時所能成盍聞諸朝俾述於詔條録為事比頒之天下使世世遵守而臨當遣使按文考驗以為刺舉勸懲之實夫然吏治庶其修舉民生得以安富乎宋仁宗時蔡襄言人主宅中國居法宫而使幽遐異域風謡習尚寃隱沈抑無一不陳於前者託聰明於臣下故也人主知其所託之難明賞罰以馭之賞罰既明則臣下不敢蔽欺而聰明無所壅也今天下之俗至有巨室富家兼并貨財作為奢靡超踰法制交通大吏欺轢愚弱而貧者父子轉流闕養生送死之具不幸孤獨廢疾不得終其天年州縣吏視而不能掩遏豪猛矜哀窮厄而又侵牟漁奪不識休己或愚繆昏耄無所是非或依倚權藝壞裂公法其焯然有狀可指數也監刺之官大率以寬紓含隱為良既發一姦贓衆輒指目以是須其自敗乃始糾擲或有所私慮垂敗之人亦加意覆藏使得脫去其蔽䝉如此監司之設僅與無同吏之茍偷姑息寖以成俗頃年遣使安撫諸郡比其還奏薦舉雖多而蠧暴不察惡吏不除窮民不恤有使之出不如無出之愈伏惟陛下垂意生民方使者之行幸嚴賜告諭令其畢力推揚德音以致於下究悉利害庶有補於政治勿徒使郡縣供具吏民遮列道途迎候往來重為此紛擾也臣按襄繼言古之遣使皆務恤窮民除惡吏舉材能收滯逸而已請令使者所至之郡存問鄉里其孝行著聞及年八十九十以上鰥寡篤疾依漢故事量豫布帛即貧無所養而有男女僦傭於人償其餘直而追還之若為僧尼僧年四十尼年三十以下並除其籍而歸養更無此等子孫官給餱糧責任親黨鄰里養之以沒其齒孤獨者戒敕所養之家務全其生寃結無告使者擇吏而治其曲直力行篤學衰老淪滯表之以勸風俗郡縣吏治績可稱條列其狀顯褒其尤者貪墨腥聞即令責詢材不任職於其職之相倫者易之或雖潔廉而違法慘刻及年七十已上昏老而不知退者咸以名聞願一切罷之其官吏貪墨因使摘發監司之官素所不紏隨而坐之即使者不紏異日傾敗事在使者循行已前并使者坐之襄之言如此類者非但在宋時可行而已也慶厯中歐陽修言天下之事積弊已多如治亂絲未知頭緒欲事事更改則力未能周而煩擾難行欲漸漸整緝則困弊已極而未能速效如欲用功少為利博及民速於事切莫若精選强幹朝臣十許人分行天下盡籍官吏能否而升黜之臣按修奏乞特立按察之法於內外朝官自三丞以上至郎官中選强幹廉明者為諸路按察使請令進奏院各録一州官吏姓名為空行簿以授之使至州縣遍見官吏其公廉勤幹明著實狀及老病不才顯有不治之迹皆以朱書之又有中材之人别無奇效亦不至於曠敗者以墨書之又有雖是常材能專長於一事亦以朱書别之使還具奏則朝廷可以坐見官吏賢愚善惡不遺一人修上此議朝廷重於特遣使惟詔諸路轉運使兼按察修又言臣之議本欲使者四出使天下悚然知朝廷賞善罰惡之意按文責實以救民急病如漢之刺舉唐之黜陟使之類蓋人君之治天下如農夫治田不可一槩也久荒之地必先芟闢然後以時耘耨特遣之使如久荒而芟闢也轉運兼按察乃以時而耘耨者爾臣竊惟今日之制天下分為十三布政司皆設按察司而又歲遣御史一人巡按或三年五年又遣廷臣一員巡撫誠能舉蔡襄歐陽修所言於宋者以行於今其清吏治除民害恤民窮是亦固邦本之大助也以上論詢民之瘼大學衍義補卷十九
