body:
  text: 大學衍義補卷一百五十四明丘濬撰治國平天下之要馭外蕃四方夷落之情中胸奴其先夏后氏之苗裔曰淳維唐虞以上有山戎獫狁薰鬻居於北邉隨草畜牧而轉移其畜之所多則馬牛羊其竒畜則槖駝驢騾與騾同駃騠生三日而超其母騊駼生北海驒奚駏驉也逐水草遷徙無城郭常居耕田之業然亦各有分地無文書以言語為約束兒能騎羊引弓射鳥鼠少長則射狐􅊵肉食士力能彎弓盡為甲騎其俗寬則隨畜田獵禽獸為生業急則人習戰攻以侵伐其天性也其長兵則弓矢短兵則刀鋋鐡杷小矛也利則進不利則退不羞遁走茍利所在不知禮義自君王以下咸食畜肉衣其皮革被旃裘壯者食肥美老者飲食其餘貴壯健賤老弱父死妻其後母兄弟死皆取其妻妻之臣按漢史謂胸奴無文書以言語為約束自秦漢以至於唐宋皆然䝉古始令西番僧帕克斯巴造為字書今所謂䝉古字是也周武王世以時入貢名曰荒服其後二百有餘年周道衰穆王之孫懿王時王室遂衰戎狄交侵詩人始作疾而歌之曰靡室靡家獫狁之故至懿王曾孫宣王興師命將以征伐之詩人美大其功曰薄伐獫狁至於太原是時四夷賓服稱為中興至於幽王用周姬褒氏之故與申侯有隙申侯怒而與畎戎共殺幽王於麗與驪同山之下遂取周之地虜獲而居於涇渭之間侵暴中國胸奴之先自淳維在殷時奔北方至周末七國時而與燕趙秦三國為邊鄰秦滅六國始皇遣蒙恬北擊胡悉逐出塞收河南地渡河以隂山為塞起臨洮至遼東萬餘里胸奴單于曰頭曼不勝秦北徙至秦亂稍度河與中國界於故塞後為其子冒頓射殺之而自立為單于遂東襲滅東胡西擊走月自南并樓煩侵燕伐悉復秦所奪胸奴地其控弦之士三十餘萬自淳維以至頭曼千有餘嵗其世傳不可得而次然至冒頓而胸奴最強大盡服從北夷而南與諸夏為敵國其姓世官號可得而記曰單于姓孿鞮氏其國稱之曰撑犁孤塗單于胸奴謂天為撑犁今猶謂為騰乞里即撑犁也謂子為孤塗單于者廣大之貌也言其象天單于然也臣按此北狄之在前漢者漢髙祖七年帝自將討韓王信信亡走帝聞冒頓居代谷欲擊之使人覘胸奴冒頓匿其壯士肥馬但見老弱及羸畜使者十輩來皆言胸奴可擊髙帝復使劉敬往使胸奴敬還報曰兩國相擊此宜矜夸見所長今臣往徒見羸瘠老弱此必欲見短伏竒兵以爭利愚以為胸奴不可擊也是時漢兵已業行髙帝怒罵劉敬曰齊虜以口舌得官今乃妄言沮吾軍械繫敬廣武髙帝至平城兵未盡到冒頓縱精騎四十萬騎圍髙帝於白登七日漢兵中外不得相救餉髙帝用陳平祕計使使間厚遺閼氏謂冒頓曰兩主不相圍今得漢地而單于終非能居之也乃解圍之一角㑹天大霧漢使人往來胸奴不覺陳平請令彊弩傳兩矢外鄉去聲從解角直出髙帝出圍至平城漢大軍亦到胡騎遂解去髙帝至廣武赦劉敬曰吾不用公言以困平城吾皆已斬前使十輩矣乃封敬二千户為關內侯臣按漢髙祖以百戰之餘所統皆竒才良將且為胸奴所圍者七日不有陳平祕計不幾于危乎然是時敵騎乃至四十萬則是北部之彊自漢初已然矣夫自髙祖解圍之後至於我朝一千四百餘年中間歷魏晉隋唐宋而北部之興亡盛衰起滅分合不知凡幾變而至於元極矣蓋天下理勢相為乘除物極則反盛極而衰亦必然之理也何以明之自古北部之為害者非以其地之廣也亦非以其人之衆也徒以其生長沙漠之外遂水草以為居捕野獸以為食而衣其皮耐饑寒習勞苦而不畏死而中國之人好逸而不禁勞不能忍饑而受寒而又惜身愛命以故往往為彼所勝耳至于元人崛起奄南北而有之宫居而室處衣錦而食粟其黠慧者雅言而士行濶步而寬衣凡其自昔猛鷙之態皆變而為柔耐苦之性皆變而為驕其肢體筋骨無復如前日之耐饑寒甘勞苦矣一旦大兵南來其主開建德門夜遁倉卒隨行者惟宫禁宿衛京輦屯營者耳若夫逺宦之臣外戍之卒固不能盡從也敗亡之餘歸其故域者蓋亦無幾游魂殘魄茍延喘息於草野之間分散而微弱紛雜而無統方且自相魚肉自相攘奪救死扶傷之不暇以故不能為我邊防之害雖有小警不過鼠竊狗偷非有深謀宿計處心積慮如前代胸奴突厥之所為者我太宗皇帝親統六師凡六出塞歷數千里之逺窮其巢穴彼皆雉竄鼠伏無有敢張螳臂以當雷霆之威者自洪武永樂以來其酋如布尼雅錫哩瑪哈穆特阿嚕多爾濟巴勒皆駑才下乘非有冒頓之猛鷙尚結贊之狡猾雖或侵軼隨即破滅惟托歡者挾托克托布哈以肆毒其子額森繼之已己之變非彼之能乃吾謀臣之誤也使當時聽大臣言遣一禆將禦之不過旬日彼自去也若夫統幕之還分為數營使彼不知所攻不終日入懷來城矣設使不分而我軍中尚存前代之長技如髙祖解平城之圍令其彊弩傅二矢外嚮數萬之弩次第齊發彼安能薄我哉然當是時彼悉其部落并脅烏梁海海西諸部皆來大衆不滿四五萬其視平城之四十萬騎何其多寡之懸絶也自是以後托歡為哈喇所殺哈喇為博囉所殺博囉之後摩囉歡竒木嘉色稜之徒皆是自相屠戮釁生於黨與禍起於肘腋未有父子繼世者是其無能為亦可見矣雖然蜂蠆有毒古人善喻昔者阿固達之起於遼末特穆津之起於金季皆以其微弱而蔑視之也為國者防微杜漸恆恐禍生於所忽譬則近山之居慮有虎狼之害則必髙其垣墉深其陷穽塞其蹊隧而迂其往來之道徑則虎狼不能為吾畜産之害矣我國家都燕邊防尤宜加慎則夫關隘之修兵備之飭將師之任兢兢然如蹈虎尾如臨深淵一食息之頃一寐之餘念兹在兹無一念而不在兹是惟宗社無彊之休朝錯言于文帝曰今胸奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也險道傾反且馳且射中國之騎弗與也風雨罷勞饑渴不困中國之人弗與也此胸奴之長技也若夫平原易地輕車突騎則胸奴之衆易撓亂也徑弩長㦸射疏及逺則胸奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則胸奴之兵弗能當也材官騶發矢道同的則胸奴之革笥木薦弗能支也下馬地鬬劔㦸相接去就相薄則胸奴之足弗能給也此中國之長技也以此觀之胸奴之長技三中國之長技五臣按胸奴地形技藝與中國異而各有所長用兵者知其長短之所在以其所長而乘其所短掩吾所短而避其所長則可以取勝而不敗矣突厥阿史那氏蓋古胸奴北部也居金山之陽臣于蠕蠕種裔繁衍至吐門遂彊大更號可汗猶單于也妻曰可敦其地三垂薄海南抵大漠隋末始畢可汗咄吉嗣位華人多往依之控弦且百萬唐髙祖起太原遣使往聘與連和宋祁曰隋季世虛內以攻外生者罷道路死者暴原野天下盜賊共攻而亡之當此時突厥最彊控弦者號百萬華人之失職不逞者往從之共為之謀導之入邊故頡利自以為彊大古無有也髙祖初即位與和因數出軍助討賊故詭臣之贈豫不可計於是掃國入寇薄渭橋騎􅙟䝉京師太宗身勒兵顯責而隂間之戎始內阻不三年縛頡利獻北闕下霆掃風除其國遂墟臣按漢之冒頓控弦三十萬唐之頡利控弦幾百萬宋之契丹女真韃靼未必如漢唐之盛然而漢唐之世雖受其害而終不若宋朝之甚焉蓋漢唐有邊關以為之厄塞宋則失其險隘而以內地為邊故也回紇其先胸奴也元魏時號髙車部或曰敕勒訛為鐡勒其部落曰袁紇薛延陀等凡十有五種皆散處磧北至隋曰韋訖其人驍彊初無酋長逐水草轉徙善騎射喜盜鈔臣于突厥突厥資其才力雄北荒後韋紇叛突厥自為俟斤稱回紇姓藥羅葛氏居薛延陀北娑陵水上距京師七千里衆十萬勝兵半之突厥已亡惟回紇與薛延陀為最雄彊其後攻薛延陀殘之并有其地遂南踰賀蘭山境諸河天寶中有裴羅者自稱骨咄祿毗伽闕可汗南居突厥故地悉有九姓之地斥地愈廣東極室韋西金山南控大漠盡得古胸奴地其後易回紇曰回鶻言捷鷙猶鶻然臣按有唐一代前曰突厥後曰回鶻期其最強者突厥控弦多幾百萬回紇悉有九姓之衆然皆居其境內而不得中國地故其為害止於邉地宋之契丹拓跋其地與衆未必過此二部然契丹得幽燕十八州地拓跋盡有興夏之境據中國地用中國人為中國害此宋邊患所以比唐為甚今當以之為戒而防之於微切不可使之得用吾逸出之人據吾尺寸之地契丹之制居有宫衛謂之鄂爾多出有行營謂之巴納分鎮邊圉謂之部族有事則以攻戰為務閒暇則以畋漁為生秋冬則違寒春夏則避暑隨水草以就弋獵大明一統志曰北部種落不一歷代名稱各異夏曰獯鬻周曰獫狁秦漢皆曰胸奴自漢以來胸奴頗盛後稍弱而烏桓興漢末鮮卑滅烏桓盡有其地後魏時蠕蠕獨強與魏為敵蠕蠕滅而突厥起盡有西北地唐滅之五代及宋契丹復盛别部小者曰䝉古曰泰楚特曰塔塔爾各據分地既而䝉古兼并有之遂入中國傳十四世遁于沙漠傳子阿裕爾實哩逹喇傳托果斯特穆爾為伊蘇岱爾所殺其部屬皆奔散來附洪武二十五年遣將周興往討其罪追至察察爾山大敗之自是不敢近邊者十餘年永樂間有布尼雅錫哩者及其下瑪哈穆特阿嚕台奉貢惟謹因封瑪哈穆特為順寧王阿嚕台為和寧王已而叛服不常遣使諭之不悛車駕屢親征布尼雅錫哩妻率其部屬來朝願居京師宣德中瑪哈穆特殺阿嚕台欲領部落人心不服乃求托克托布哈立為王居沙漠北瑪哈穆特子托歡托歡子額森居沙漠之西北衛喇特地臣按秦漢以來建都于關中洛陽汴梁其邊圉皆付之將臣惟我朝都于幽燕蓋天子自為守也前此都此者若金若元而我朝則居中國之盡處而北臨邊夷我之所以控而制之者固重而要而彼之所以來而侵者亦速而近所以思其患而預為之防者比漢唐元宜倍加意焉當夫無事之時而為先事之慮毋恃其不來恃吾有以待之毋恃其不攻恃吾有所不可攻可也君臣上下朝夕講究預求所以待彼及我所不可攻之策必須盡善盡美萬全無弊彼雖欲來也無可通行之徑彼雖欲攻也無可容足之地彼雖欲變也無可乘起之隙兢兢焉無事之時恆以有事處之業業焉彼雖不來而吾切切焉如其禍患常在旦夕間焉此無他切而近也寧過備而棄之不後時而生悔萬一公卿相將及左右之臣有假鎮靜之術以掩其無能之迹為必無事之言以寬主上之憂此皆奸邪小人李期趙髙之流也吕祖謙有言何能為之一言實亡國敗家之本古人所謂一言而喪邦者也又曰何能為者萬惡之所從生也伏惟聖明留神省察大明一統志曰烏梁海本春秋時山戎地秦為遼西郡北境漢為奚酋所據東漢征敗之走匿松漠間後魏之先復居于此號庫莫奚後服屬契丹元為大寧路北境本朝洪武二十二年詔以烏梁海之地置泰寧諾延福餘三衛以處之為東北外藩命其長為指揮使指揮同知各領其部臣按三衛有以福餘名者古有扶餘國在𤣥莬北千里或是其遺種不可曉也永樂初棄大寧地與之今其地密邇京師嵗嵗朝貢不絶用為藩屏夫彼雖內附日久然所以區處之者不可不以其道賜豫之者不可不以其節竊聞景泰初三衛為北部所驅竄名其中隨之來貢我所以待之者比其常例加優數倍彼乃憤然謂我畏彊而慢弱遂堅從彼之心噫此乃陳平用草具間楚使之計我偶襲而用之不自覺也大學衍義補卷一百五十四
