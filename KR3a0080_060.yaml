body:
  text: 大學衍義補卷六十明丘濬撰治國平天下之要秩祭祀國家常祀之禮上周書召誥戊午乃社于新邑牛一羊一豕一馬融曰言社則稷在其中臣按六經言社始於此詩大雅綿之詩曰乃立冢土戎醜攸行朱熹曰冢土大社也太王所立而後因以為天子之制也戎醜大衆也起大事動大衆必有事乎社而後出謂之宜臣按國家大事在祀與戎故人君建國必先立社欲有兵戎之舉必有事於社而後啓行爾雅所謂兵凶戰危慮有負敗祭之以求福宜故謂之宜者也詩序載芟春藉田而祈社稷也良耜秋報社稷也陳祥道曰社所以祭五土之祗稷所以祭五穀之神社而命之稷以其首種先成而長百穀故也稷非土無以生土非稷無以見生生之效故祭社必及稷以其同功均利而養人故也臣按社與稷並言始見於此周禮地官大司徒設其社稷之壝謂壇與堳埒也而樹之田主山神后土田正之所依各以其野之所宜木遂以名其社與其野賈公彥曰謂於中門之外右邊設大社大稷王社王稷又於廟門之屏設勝國之社稷其社稷外皆有壝埒於四面也句龍生時為后土官有功於土死配社而食棄為堯時稷官立稼穡之事有功於民死乃配稷而食名為田正也臣按周禮鄭氏注此謂所宜木謂若松柏栗也即魯哀公問社於宰我宰我所對者也或問朱熹以木造主還是以樹為主熹曰以木為社主使神依焉是三代以前之社皆以木為主後世乃易之以石焉小司徒凡建邦國立其社稷賈公彥曰言邦國者謂立畿外諸侯邦國立其社稷者諸侯亦有三社三稷謂國社侯社勝國之社皆有稷配之封人掌詔王之社壝為畿封而樹之凡封國設其社稷之壝令社稷之職賈公彥曰掌設王之社壝者謂王之三社三稷之壇及壇外四邉之壝皆設置之直言壝不云壇舉外以見內內有壇可知也設其社稷之壝者案禹貢徐州貢五色土注云王者封五色土為社建諸侯則割其方色土與之使立社燾以黃土苴以白茅茅取其潔黃取王者覆四方是封乎諸侯立社稷之法也令社稷之職謂未祭之時令諸有職事於社稷也州長若以歲時祭祀州社賈公彥曰歲時春秋也春祭社以祈膏雨望五穀豐熟秋祭社以五穀豐稔所以報功黃幹曰社祭土稷祭穀土穀之祭達乎上下故方丘與社皆祭地也而宗伯序祭有社無示舉社則其禮逹乎上下舉示則天子獨用之鼓人職曰以雷鼓鼓神祀以靈鼓鼓社祭不曰示祭而曰社祭亦是禮之達乎上下也大司樂靁鼓靁鼗以祀天神靈鼓靈鼗以祭地示是則示祭社祭其用同矣非天子不祭天而天子與庶人皆得祭社尊父親母之義也臣按此一州之祭也後世命郡縣祭社本此春官大宗伯以血祭社稷鄭𤣥曰隂祀自血起貴氣臭也社稷土穀之神有德者配食焉小宗伯之職掌建國之神位右社稷王安石曰右隂也地道之所尊故右社稷若大師則帥有司太祝也而立軍社奉主車鄭𤣥曰王出師必先有事於社而以其主行社主曰軍社書曰不用命戮于社社主用石為之奉謂將行也臣按社之主樹以木出師則不可載以行意者當時壇壝之上則樹以木而又以石為主如喪之車然遇有征行則奉之以車而行乎後世遂因之不用木而用石也不然則是臨行旋為之故曰有司立軍社謂之立者前故未有也禮記王制諸侯祭社稷天子社稷皆太牢牢圈也諸侯社稷皆少牢方慤曰太牢狊牛羊豕焉少牢則羊豕而已天子之社稷主天下之土穀故用太牢以祭之諸侯之社稷主一國之土穀故用少牢以祭之月令仲春之月擇元日命民社陳澔曰郊特牲言祭社用甲日此言擇元日是又擇甲日之善者歟臣按此一里之祭也後世命民主里社本此然郊特牲祭社用甲日而召誥用戊日戊者土之氣也因土氣以祭土神當用上戊為是况所謂元者非但訓善也亦有首始之義謹考官歷春秋二社皆在仲月臣竊以為官府祭社宜用仲月上戊而里民所祭者當用官歷所定社日為宜又往往見有司祭社偶遇春秋二仲月之上旬丁在戊後必先釋奠而後祭社吁豈所謂上戊哉亦豈古人所以秩祭祀之意哉蓋秩之為言次序之謂也周禮肆師以歲時序其祭祀正謂此爾况社稷大祀先師中祀自當循其次序郊特牲而社稷太牢方慤曰郊用特牲而召誥言牛二者兼稷牛言之耳社祭土而主隂氣也君南鄉於北墉下答隂之義也朱熹曰社是土神社之所以有神能生物便是神也馬睎孟曰古人之言社必有稷此言社而不言稷蓋社總祭五土之神而山林川澤丘陵墳衍原隰皆是也稷則止於原隰而已言社可以兼稷也天子大社必受霜露風雨以達天地之氣也是故喪國之社屋之不受天陽也薄社北牖使隂明也方慤曰大社即祭法所謂王社也以王社為大則自侯社而下皆為小矣達者上下達之謂也上則達天之氣以濟乎下下則達地之氣以濟乎上故以達言之喪國之社即媒氏所謂勝國之社也勝言我所勝喪言彼之喪其實一也於大社言必受霜露風雨於喪國之社言不受天陽亦互言之爾陳澔曰薄作亳於周為亡國之社必存之者白虎通曰王者諸侯必有誡社示有存亡也屋其上則天陽不入牖於北則隂氣可通隂明則物死也社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示本也陳澔曰聖人知地道之大故立社以祭所以神而明之也美報美善其報之之禮也中霤與社皆土神卿大夫之家主祭土神於中霤天子諸侯之國則祭土神於社皆以示其為載物生財之本也祭法王為羣衆也姓立社曰大泰社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社孔頴達曰大社在庫門內之右王社在藉田王所自祭以供粢盛諸侯國社亦在公宫之右侯社亦在藉田大夫以下為衆特置故曰置社張載曰在漢猶有大社在唐只是一社大社祭天下之地祗王社祭京師之地祗陳祥道曰有天下之社有一國之社有衆人之社有一人之社有失國之社大社天下之社也國社一國之社也王社侯社一人之社也喪國之社屋之失國之社也三社之制大社為大此孟子所謂民為貴社稷次之君為輕也喪國之社天子所以為戒以言安不可以忘危也臣按聖人言郊必以社對謂郊以明天之道社以神地之道說者謂天逺於人則尊而不親明之欲民尊而親之也地近於民則親而不尊神之欲民親而尊之也周禮大宗伯以禋祀祀上帝以血祭祭社稷禋天則以氣以天陽也祭地則以血以地隂也禋祀祭天則兼地血祭祭社則兼稷胡宏謂社即北郊朱熹有取焉臣竊以謂地之所以為地積土而成也地其總名所謂山林川澤丘陵墳衍原隰之五土則各分而名之也分而名之則各一其土合而言之則皆地也人在天地間仰而視之同此一天即其所在則各一其地也天父也父一而已母各有所在故惟天子得以祭天祭天而遂及乎地下而諸侯卿大夫士庶人皆得以祭其社社之名雖同而所祭之神則各不同也厲山氏之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社孔頴達曰國語云神農之子名柱作農官因名農也共工氏以水紀官在炎帝之前太昊之後共工後世之子孫為后土之官能治九州故祀以配社之神臣按社以祀土神稷以祀穀神而配以人尚矣祭法謂祀后土以為社而春秋傳則謂句龍為后土蓋后土掌水土之官句龍嘗居是官一以人名一以官名也鄭𤣥謂句龍以有平水土之功配社祀之稷有播種之功配稷祀之非謂即祀之以為社為稷也本朝內設大社外則親王之國布政司若府州縣皆有社稷之壇春秋二仲以上戊日致祭其大社也則列於大祀天子親祭而以太祖太宗並配白虎通曰王者所以有社稷者為天下求福報功人非土不立非穀不食土地廣博不可遍敬也五穀衆多不可一一而祭也故封土立社示有土尊稷五穀之長故封稷而祭之也稷得隂陽中和之氣而用尤多故為長也王者立親祭社稷何社者土地之神也土生萬物天下之所主也尊重之故自祭也臣按先儒胡宏謂古者祭地於社猶祭天於郊也周禮别無祭地祗及祭社之說後世既立社又立北郊失之矣楊復謂禮經天子祭天地諸侯祭社稷祭莫重於天地而社稷其次也社者五土之神是亦祭地也而有廣狹之不同曰里社則所祭者一里之地而已曰州社則所祭者一州之地而已諸侯有一國其社曰侯社則所祭者一國之地一國之外不及也天子有天下其社曰王社則所祭者天下之地極其地之所至無界限也故以祭社為祭地惟天子可以言之凡胡氏所引皆天子社也但云後世既立社又立北郊失之矣此則未然大抵社所以祭五土之祇天子大社則土五色而冒以黃諸侯國社則受其方之土於天子而苴以茅其位則中門之右其壝則北面其飾則不屋其表則樹其土之所宜木遂以名其社其壇方五丈諸侯半之唐以來始用石主其祭天子用太牢諸侯用少牢其日古用甲今用上戊以上社稷之祭周禮大宗伯以實柴祀日月星辰賈公彥曰實柴實牛柴上也星謂五緯辰謂日月所㑹十二次典瑞圭璧以祀日月星辰吳澄曰一圭而邸以璧故謂之圭璧璧圓象天而一圭所邸於天道為不足故以祀日月星辰禮記月令孟冬天子乃祈來年於天宗鄭𤣥曰天宗謂祭日月星辰也玉藻天子𤣥端而朝日於東門之外鄭𤣥曰案宗伯實柴日月星辰為中祀而用𤣥冕者以天神尚質陳澔曰朝日春分之禮也東門謂國門祭法王宫祭日也夜明祭月也幽宗祭星也方慤曰天無二日土無二王則王有日之象而宫乃其居也故祭日之壇曰王宫日出於晝月出於夜則夜為月之時而明乃其用也故祭月之坎曰夜明幽以言其隱而小也祭星之所謂之幽宗祭義郊之祭大報天而主日配以月祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别外內以端其位方慤曰壇之形則圓而無所虧以象日之無所虧而盈也坎之形則虛而有所受以象月之有所受而明也壇髙而顯坎深而隱一顯一隱所以别隂陽之幽明一髙一深所以制隂陽之上下東動而出西靜而入出則在外入則反內故東西所以别隂陽之外內東為陽中西為隂中中則得位故東西所以端隂陽之位春秋昭公元年左氏傳曰日月星辰之神則雪霜風雨之不時於是乎禜之臣按古者日月星辰各為壇坎而祭遇雪霜風雨之不時則又禜之前代則於春分朝日秋分夕月為大祀天子躬行焉本朝郊祀天地設為四壇而遣官分獻於大祀殿之前以上祭日月星辰大宗伯以槱燎祀司中司命飌師雨師鄭𤣥曰槱積也積柴實牲體焉司中司命文昌第五第四星風師箕雨師畢也天府若祭天之司民司祿而獻民數穀數則受而藏之鄭𤣥曰司民軒轅角也司祿文昌第六星或曰下能與台同也王昭禹曰天之司民所以制民之生死也而民數有登下司祿所以制穀之凶豐也而穀數有多寡孟冬既祭司民司祿而後獻其數于王王拜受之藏于天府所謂天實司之也然則天府之所掌凡以奉承天之所為而已小司冦孟冬祀司民獻民數于王楊復曰當獻民數之時祭司民所以報天生蒸民之德也當獻穀數之時而祭司祿所以報天生百穀之德也即一事之所主而名之曰司因一事之功而祭報之則曰司民司祿之神亦如司春司夏司中司命之類也臣按祀司中司命司民司祿注疏謂四者皆星也而飌師雨師亦以為星焉蓋以洪範星有好風星有好雨好風箕宿也好雨畢宿也臣竊以謂人間有此物則夫蒼蒼之表必有所以司之者大而天天則有帝次而五行有此質則有此氣有此氣則有此神隂陽不測之謂神祀之以神必指為某星則執泥矣風而為箕雨而為畢可矣則夫後世所祀之雲雷則又指何星以主之乎本朝郊祀既已設星辰二壇於上又有風雲雷雨之壇則亦不以風雨為星也祭法埋少牢於泰昭祭時也相近於坎壇祭寒暑也陳澔曰泰昭壇名也祭時祭四時也祭寒暑者寒暑一來一往周禮仲春晝迎暑仲秋夜送寒臣按一歲之間而有春夏秋冬之時四時之候而有寒暑溫凉之氣冥冥之間必各有神以司之古者各因其時而致其祭隨其候而行其禮本朝於春秋二時祭太歲之神及四時月將之神蓋以四時之首合於太歲而四時之令分於月將其亦祭時與寒暑之遺意歟唐天寶五載詔曰發生振蟄雷為其始畫卦陳象威物效靈氣實本於隂陽功未施於動植今雨師風伯久列於常祠惟此震雷未發於羣望其已後每祀雨師宜以雷師同壇臣按此後世祀雷之始周禮有風師雨師漢以丙戌日祀風師於戌地以己丑日祀雨師於丑地宋人兆風師於西郊祠以立春後丑日兆雨師於北郊祠以立夏後申日兆司中司命司祿於南郊祠以立秋後亥日以雷師從雨師之位以司民從司中司命司祿之位皆各壇為祭未嘗合而為一本朝於風雨雷之外又加以雲合以為一壇以從獻於郊天大祀又為壇於郊壇之西每歲仲秋天子又躬祀焉其與並祀者太歲及五嶽五鎮四海四瀆之神而以京畿山川四季月將京都城隍從享所謂太歲月將城隍與夫風雨雷師之外而加以雲皆前代所未嘗祀者也此皆出自我聖祖之獨見神斷其視前代所祠九宫貴神之屬蓋有間矣夫雲興而雨霈既祀夫雨而獨遺於雲可乎峙形於兩間者既已享祀而流行於四時以司民興作耕作之候者而無其祭可乎名山大川遼絶於千萬里之外者既皆入於望祀而宸居所涖之地六宫百司三軍百姓之所居止者反遺之可乎聖祖之見所以卓越千古非獨人蒙其至治之澤而凡冥漠之中有焄蒿之感者莫不咸受其職焉嗚呼至哉以上祭風雲雷雨之神以上國家常祀之禮上大學衍義補卷六十
