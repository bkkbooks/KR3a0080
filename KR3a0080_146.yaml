body:
  text: 大學衍義補卷一百四十六明丘濬撰治國平天下之要馭外蕃征討綏和之義上周易既濟九三高宗伐鬼方三年克之小人勿用程頥曰高宗商之高宗也天下之事既濟而逺伐暴亂也威武可及而以救民為心乃王者之事也唯聖賢之君則可若騁威武忿不服貪土地則殘民肆欲也三年克之見其勞憊之甚朱熹曰三年克之言其久而後克戒不可輕動之意鄭汝諧曰以高宗之盛而伐鬼方猶三年而後克之其可用小人而啓多事之源乎無事之世捨內治而幸邉功者皆小人啓之也臣按先儒謂威武可及而以救民為心乃王者之事也唯聖賢之君則可高宗商中興之君雖不至於聖亦不可不謂之賢君也其所伐之鬼方意其人必有可伐之罪不得已而興師以弔民然而不急近功不用非人是以兵雖久用而處之者有道不至於罷敝中國師雖逺出而任之者得人不至於别生他變後世以帝王之師為弔伐之舉者必須事出乎萬全非萬全不可舉也是故於未濟之初審幾而緩進於既濟之後擇人而任用虞書帝曰咨禹惟時有苖弗率汝徂征禹乃會羣后誓于師曰濟濟有衆咸聼朕命蠢兹有苖昏迷不恭侮慢自賢反道敗德君子在野小人在位民棄不保天降之咎肆豫以爾衆士奉辭伐罪爾尚一乃心力其克有勳臣按此萬世中國帝王征討蠻夷之始蓋夷有四而居南方者謂之苖苖民弗循正理故帝舜遣禹征之由此一事而觀可見唐虞之世非獨政教與後世不同其征伐亦與後世不同也何也後世之征伐四夷皆以其侵軼我邊境戕賊我生靈以故興師討之而帝舜之命禹大禹之誓衆則惟數有苖之罪所謂昏迷不恭侮慢自賢反道敗德責其行己之不循正道也君子在野小人在位責其用人之不循正道也民棄不保責其不循正道以恤民而致其怨天降之咎責其不循正道以奉天而召其怒蓋以其人之道還治其人之身未嘗有一言而及國家疆埸之事嗚呼此所以為帝王之師也歟詩序六月宣王北伐也其首章曰六月棲棲皇皇不安之貌戎車兵車既飭整也四牧騤騤強貌載是常服戎事之常服玁狁孔甚也熾盛也我是用急王于出征以匡王國朱熹曰六月建未之月也成康既沒周室漸衰八世而玁狁見侵逼近京邑宣王即位命尹吉甫帥師伐之有功而歸詩人作詩以序其事如此司馬法冬夏不興師今乃六月而出師者以玁狁甚熾其事危急故不得已而王命於是出征以正王國也謝枋得曰戎車曰既飭則車馬器械士卒馬牛無一物不整齊矣四牧曰騤騤則無一馬不精強矣曰載是常服則無一衣一裳不經點檢矣臣按本朝學士朱善曰先王之法天下有大變諸侯有能討之者許之先發而後聞其急如此今玁狁內侵不得已而應之雖六月出師而人不以為暴者知其過之不在於君上蓋以為所以勞我者乃所以安我也其第四章曰玁狁匪茹度也整居焦地名穫地名侵鎬地名及方朔方至於涇陽言其深入為冦織幟同文鳥章鳥皋之章白斾繼旐央央鮮明貌元戎戎車十乘以先啓開也行道也啓行猶言發程朱熹曰言玁狁不自量度深入為冦如此是以建此旌旗選鋒鋭進聲其罪而致討焉直而壯律而臧有所不戰戰必勝矣王安石曰元戎十乘所謂選鋒也兵法兵無選鋒曰北臣按易曰師出以律否臧凶左傳師直為壯曲為老所以然者惟其辭直故其氣壯惟其用之以律故每事而盡善今宣王興六月之師因玁狁深入我地不得已而應之其辭直矣其辭既直是以聲罪致討而我三軍莫不懷敵愾之心其氣安得而不壯哉辭直而氣壯而又選諸隊伍之中簡其鋒鋭之士使之開先啓行其旗旐鮮明兵甲犀利無一事之不盡善此其所以為王者之師彼區區醜虜惡足以當我之鋒哉其五章曰戎車既安如輊車之覆而前也如軒車之郤而後也四牡既佶壯健貌既佶且間薄伐玁狁至于太原地名朱熹曰至于太原言逐出之而已不窮追也臣按漢書嚴尤曰宣帝時玁狁內侵命將征之盡境而還其視戎狄之侵譬猶虻蟲之螫驅之而已薄伐玁狁至于太原叛則伐之服則舍之不窮追逺討也由是觀之可見先王之治以吾邊境為限越境而入者則治之不及吾境者則不治焉詩序采芑宣王南征也其首章曰薄言采芑苦菜于彼新田二嵗曰新田于此災田一嵗畝方叔涖臨也止其車三千師衆也干扞也之試習方叔率總率之止乘其四騏四騏翼翼順序貌路車戎路有奭赤貌簟笰以竹簟為車蔽魚服鉤膺馬婁領有鉤而在膺有樊有纓也鞗轡也革轡首也朱熹曰方叔宣王卿士受命為將者也其車三千法當用三十萬衆然此亦極其盛而言未必實有此數也宣王之時蠻荆皆叛王命方叔南征軍行采芑而食故賦其事以起興曰薄言采芑則于彼新田于此災畝矣方叔涖止則其車三千師干之試矣又遂言其車馬之美以見軍容之盛也其卒章曰蠢動而無知之貌爾蠻荆州之蠻荆大邦為讐方叔元大也老克壯其猷謀也方叔率止執訊獲醜戎車嘽嘽衆也嘽嘽焞焞盛也如霆疾雷如雷顯允方叔征伐玁狁蠻荆來威朱熹曰言方叔雖老而謀則壯也方叔蓋嘗與於北伐之功者是以蠻荆聞其名而皆來畏服也臣按南蠻北狄最為中國患在帝世已有有苖之師矣北狄之寇見于經者始于宣王之世是時北有玁狁之征六月之師是也南有蠻荆之伐采芑之詩是也説者謂二詩皆班師時作六月之辭迫采芑之辭緩六月以計而定采芑以威而服也雖然時世不同盛衰亦異南與北殊俗古與今殊時強與弱殊勢所謂計與威不可以偏廢又在用之何如耳茍北伐而有文武之吉甫南征而有壯猷之方叔上之人用得其人而又委任之專則成功不難矣詩序江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷其首章曰江漢浮浮水盛貌武夫滔滔順流貌匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪陳也朱熹曰淮夷夷之在淮上者也鋪陳師以伐之也宣王命召穆公平淮南之夷詩人美之此章總序其事言行者皆莫敢安徐而曰吾之來也惟淮夷是求是伐耳其二章曰江漢湯湯武夫洸洸武貌經營四方告成于王四方既平王國庶幸也定時靡有爭王心載寧輔廣曰四方既平則王國庶可平定所謂柔逺能邇也時靡有爭王心載寧又見宣王以天下為心一有爭鬩則心之不安也讀此章見宣王能以天下之心為心而召公又以宣王之心為心也臣按周室至厲王出居于彘國勢中微矣宣王即位北伐玁狁則命吉甫南征蠻荆則命方叔至於討淮南之夷則又得召虎焉召公既自疾其驅而一時從行之人亦莫敢安徐焉既而經營四方告成于王止曰王國庶定而已庶之云者昔人謂幸其僅然非以是為美也此無他用兵非人主之美事不得已而興師以遏絶亂略焉耳非以快吾所大欲也漢宣帝時先零羌楊玉叛時趙充國年七十餘上老之使丙吉問誰可將者對曰亡踰於老臣者上問當度用幾人充國曰百聞不如一見兵難隃遙也度臣願馳至金城圖上方略羌戎小夷逆天背叛滅亡不久願陛下以屬老臣勿以為憂臣按充國謂百聞不如一見兵難隃度此真老將諳練之言彼不出國門而任己意以節制千里之外固有幸而中者矣要之不可為法也趙充國至金城須兵滿萬騎欲渡河恐為虜所遮即夜遣三校銜枚先渡渡輒營陳會明畢乃以次盡渡虜數十百騎來出入軍旁充國曰吾士馬新倦不可馳逐此皆驍騎又恐其為誘兵也擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望狹中無虜乃引兵進召諸校謂曰吾知羌虜不能為兵矣使虜發數千人守杜塞也四望愜中兵豈得入哉充國常以逺斥堠為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰西至西部都尉府日饗軍士士皆欲為用虜數挑戰充國堅守臣按充國謂以殄滅為期小利不足貪此有國者馭敵之法充國行兵行必為戰備止必堅營壁持重愛士卒先計而後戰此可以為將兵者持重之法酒泉太守辛武賢奏言以七月上旬齎三十日糧分兵並出擊罕口堅反开音其奪其畜産虜其妻子冬復擊之虜必震壞天子下其書充國以為一馬自他負三十日食為米二斛四斗麥八斛又有衣􅏻兵器難以追逐虜必商計度軍進退稍引去逐水草入山林隨而深入虜即據前險守後厄以絶糧道非至計也先零首為畔逆它種劫略故臣愚䇿欲捐罕开暗昧之過先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者拊循和輯此全師保勝安邊之䇿臣按天子之師所以誅有罪罪有大小則誅有先後先零首為畔逆而罕幵特劫略耳劫略夷人之常它種皆然不但罕幵也未嘗加兵於畔逆之先零而先加兵於暗昧之罕幵雖能制其命不足以服其心况未必能乎充國自謂其議為全師保勝安邦之䇿非但可用于一時真可以為萬世帝王以全取勝之法也宣帝拜許延壽為強弩將軍辛武賢為破羌將軍嘉納其䇿以書敕讓充國曰今轉輸並起百姓煩擾將軍不早及秋共水草之利爭其畜食至冬虜藏匿山中依險阻將軍士寒手足皸折裂瘃寒創寧有利哉今詔武賢等以七月擊罕开將軍其引兵並進充國上書曰陛下前幸賜書欲不誅罕以解其謀臣故遣开豪雕庫宣天子至德罕开之屬皆聞知明詔今先零為寇罕羌未有所犯乃釋有罪誅無辜起一難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人今罕羌欲為寇宜飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道臣愚以為不便先零欲畔故與罕开解仇結約常欲先赴罕开之急以堅其約今虜馬肥食足擊之恐不能傷害適使先零得施德於罕羌堅其約合其黨迫脅諸小種虜兵漸多誅之用力數倍臣恐國家憂纍繇十年數不二三嵗而已先誅先零則罕开之屬不煩兵而服涉正月擊之得計之理及其時也以今進兵誠不見其利臣按充國引兵法曰攻不足者守有餘又曰善戰者致人不致於人今彼欲為寇宜飭兵馬練戰士以須其至坐得致敵之術以逸待勞取勝之道也此數言者真萬世守邊保圉之格言良法今日所當遵行也宣帝詔武賢與充國合擊先零時羌降者萬餘人矣充國度其必壞欲罷騎兵屯田以待其敝作奏未上會得進兵璽書其子卬使客諫之充國嘆曰是何言之不忠也本用吾言羌虜得至是邪今兵久不決四夷卒有動搖相因而起雖有智者不能善其後羌獨足憂邪吾固以死守之遂上屯田奏曰羌虜易以計破難用兵碎臣愚以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上臣願罷騎兵留步兵分屯要害處至四月草生發郡騎及屬國胡騎各千就草為田者遊兵以充入金城郡益積畜省大費謹上田處及器用簿上報曰即如將軍之計虜當何時伏誅兵當何時得決熟計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰百戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦稠也草愁於寄託逺遁骨肉離心人有畔志而明主班師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵決可期月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之計也臣按充國所謂帝王之師以全取勝此一言者萬世中國保治安邦之格言國家當全勝之時猝有兵革之變一以是言為主毋僥幸於一戰以中賊之計張賊之威必持重而不輕動必詳慮而不茍進非在我者有必不可勝之資而在彼者有必可勝之算斷然不輕發也趙充國奏每上輒下公卿議臣初是充國計者什三中什伍最後什八有詔詰前言不便者皆頓首服魏相曰臣愚不習兵事利害後將軍數畫軍䇿其言常是臣任其計可必用也上於是報充國嘉納之其後充國乞骸骨罷就第朝廷每有四夷大議常與參兵謀問籌䇿焉張栻曰漢將臣當以趙充國為最凡將之病患於用而不詳也充國蓋更軍事多矣及聞西羌之事則不敢以遽而曰兵難遙度願馳至金城圖上方略其不敢忽如此蓋思慮之深經歷之多孔子所謂臨事而懼好謀而成者也將之病在於急近切也充國則圖其萬全陳屯田十二利持久而為不可動之計其規模與孔明渭上之師何以異哉將之病在果於殺而不恤百姓也充國任閫外之寄而為國家根本之慮要使百姓安邊疆固而西戎坐銷焉此殆三代之將非戰國以來摧鋒折敵者所可班也反覆究其規模味其風旨逺大周密拔出倫輩其在宣帝時且不獨為賢將殆可相也使其為相必能為國家圖回制度為後世慮安養百姓為邦本計如魏相輩當在其下風耳戴溪曰世有所謂智將有所謂勇將有所謂常勝之兵有所謂幸勝之兵四者不可同日而語也圖事揆䇿因時制勝以深謀逺慮為先惟全國全軍是務此智將也躍馬撫劒窮討殊鬬貪前利而不恤後害急近功而不暇逺略此勇將也以律而出見利而動十則圍而五則攻避其鋭而乘其弊此常勝之兵也勃興於草野閭巷之中再鼓於奔北敗衄之後垂亡而復存轉禍以為福此幸勝之兵也勇將能效搏執之力智將能取指縱之功幸勝之兵可成事於一時常勝之兵可為法於萬世充國以智將而用常勝之兵先計而後戰常曰擊虜以殄滅為期小利不足貪又曰兵所以明德除害也舉德於外則福生於內不可不謹又曰帝王之兵以全取勝又曰兵以計為本故曰多算勝少算不勝又曰戰不必勝不茍接刃攻不必取不茍勞衆凡上書至於論列再四其言深切可為萬世法與夫不度彼已不計成敗殘兵以逞僥幸功名者豈不相萬萬邪臣按自古論兵者多矣惟趙充國最得帝王全勝之要道焉萬世持盈守成之君所當師法者也蓋創業之君與守成之君不同故其用兵亦不同焉何也創業之君尺地一民皆非己有其所糾集者皆一時烏合之衆兵雖衆而人心不堅軍資有限而餽餉或至於不繼故乘勢急戰以求決勝若夫守成之君則不然上承祖宗之業內撫人民之衆以衆而臨寡以大而制小以有餘而應不足其於寇盜除去其害爾非有所利之也况其所嘯聚者皆吾之民克之雖可喜而亦可悲勝之未必得福而敗或足以致禍在我所繫者重故其發之也不可以輕故非萬全決勝必不為也自世尚孫吳之法謂兵貴神速往往以逗遛為將之罪殊不知帝王之師與敵國戰爭不同彼言各有當耳惟充國以深逺之謀用常勝之兵所謂帝王之兵以全取勝全之一言真得三代帝王用兵取勝之要道萬世所當師法者也張栻謂漢將當以趙充國為最嗚呼豈但漢之將哉臣竊以為古今論帝王之師者一充國而已何止最於將而已哉班固曰久矣胸奴之為患也故自漢興忠言嘉謨之臣曷常不運籌䇿相與爭於廟堂之上乎高祖時則劉敬吕后時樊噲季布孝文時賈誼鼂錯孝武時王恢韓安國朱買臣公孫𢎞董仲舒人持所見各有同異然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未究胸奴之終始也自漢興以至於今曠世歷年多於春秋其與胸奴有修文而和親之矣有用武而克代之矣有卑下而承事之矣有威服而臣畜之矣詘伸異變強弱相反臣按班固謂漢之諸臣論馭胸奴者不過兩科和親與征伐而已然兩科之中又各有兩科焉修文而和親之上也卑下而承事之則失之弱矣威服而臣畜之上也黷武而征伐之則失之暴矣然此皆視彼以為屈伸強弱非帝王慎德威懷之道也是故凡為天下國家者必內無虞廷怠荒之失外有周官九伐之師合內外而一之斯其為帝王馭逺之術歟以上言征討大學衍義補卷一百四十六
