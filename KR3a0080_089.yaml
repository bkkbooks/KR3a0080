body:
  text: 大學衍義補卷八十九明丘濬撰治國平天下之要備規制囿游之設詩大雅靈臺篇曰經度也始靈臺經之營表也之庶民攻作也之不日不終日也成之經始勿亟急也庶民子來王在靈囿臺下有囿域養禽獸麀牝鹿鹿攸伏不驚擾麀鹿濯濯肥澤貌白鳥翯翯潔白貌王在靈沼囿中有沼於牣滿也魚躍言多而得所朱熹曰國之有臺所以望氛祲察災祥時觀游節勞佚也謂之靈臺者言其倐然而成如神靈之所為也文王之臺方其經度營表之際而庶民已來作之所以不終日而成也雖文王心恐煩民戒令勿亟而民樂之如子趣父事不召自來也靈囿臺之下有囿所以域養禽獸也靈沼囿之中有池也臣按自古人君為治固不可不惕厲其心亦不可不舒暢其情蓋一張一弛非但以施之於民藏修息游非但以施之於學而為治亦莫不然也故雖以文王之憂勤自朝至於日中昃而亦必有靈臺囿沼之設焉雖然必有文王之憂勤然後有文王之逸樂茍徒肆情於逸樂出於已心之嗜好繇於左右之慫慂拂民心而勞民力所以亟成者不出於民心之樂趣而繇於己意之欲速與左右之督責夫然則亦異於文王之所以經營者矣臣故願有欲為臺囿以為舒暢情志之所者必先有文王之憂而又得周民之樂然後可周禮囿人掌囿游之獸禁牧百獸祭祀喪紀賔客共其生獸死獸之物鄭𤣥曰囿游囿之離宮小苑觀處也葉時曰周禮囿人一官掌囿游以牧百獸鄭氏謂囿若漢之苑游為離宮養獸以宴樂視之如漢掖庭有鳥獸焉嘗觀周公作無逸以戒成王必曰爾其無淫於逸於游於田今設囿游以為宴樂之玩安能禁成王之逸游也哉蓋以一人而尊居萬乘富有四海安能盡絶其逸游之樂使之坐受束縛耳目有所不得玩手足有所不得佚心意有所不得通夫人且不能以自克而亦何樂於為君也一旦人情有所不能堪天理有所不能制淫壑一開隄防一決則將奔突橫流而不可禦將至於盤游無度流連無厭矣豈特囿游而已哉然周公之設囿游也惟以刖者而守囿必不能從王而為馳逐禽獸之事惟賔客喪祭則共其獸物而已雖名囿游而無一語及宴游之事鄭氏以囿比漢苑以游比漢宮以獸比漢獸則周之制果如漢乎周公之作周禮其言囿游也止於牧獸正所以存人君天理之樂而示之以制度之儉云臣按周官囿游蓋謂苑囿游觀之處即今之海子也牧者孶養之也百獸者獸非止於一甚言其多也所以然者為共祭祀喪紀賓客三者而已故當政事閒暇之時而為游行觀省之樂百日之勤劬而假一日之暇豫雖曰游目以適情然亦非縱欲而敗度是何也蓋設官以牧百獸以為祭祀喪紀賓客之用因從獸之游而寓省牲之禮先王因人情而制禮既不拂乎人情又不廢乎禮節此類是也春秋莊公三十有一年春築臺於郎夏築臺於薛秋築臺於秦榖梁赤曰不正罷疲同民三時虞山林藪澤之利且財盡則怨力盡則懟君子危之故謹而志之也胡安國曰何以書厲民也天子有靈臺以候天地諸侯有時臺以候四時去國築臺於逺而不緣占候是於游觀之所厲民以自樂也厲民自樂而不與民同樂則民欲與之偕亡雖有臺豈能獨樂乎臣按先儒謂莊公一嵗三築臺所謂及是時般樂怠敖者則治國治家之當務荒廢多矣此所以踰年身死而蕭牆之禍至奕世而不能定也可不鑒哉成公十有八年築鹿囿穀梁赤曰築不志此其志何也山林藪澤之利所以與民共也虞之非正也孫覺曰春秋興作皆書雖城池之固門廄之急無遺焉重民力也況耳目之玩一身之娛哉臣按先儒謂春秋前此未有書築囿者是後昭九年築郎囿定十有二年築蛇淵囿人君之示子孫也可不謹哉左傳襄公十七年宋皇國父為太宰為平公築臺妨於農收謂收斂之時子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執撲以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也杜預曰澤門宋東城南門也皇國父白晳而居近澤門子罕黑色而居邑中臣按宋平公築臺無益之事也而皇國父以無益妨有益子罕諫之而不聽此所以來築者之謳也人君有所興作雖有益之事固不可妨農況無益乎築者口中之謳乃其心中之事為人上者宜慎興作毋使下之人詛之於心而謳之於口子罕謂宋國區區而有詛有祝禍之本也豈但宋哉則凡天下之大亦莫不然昭公九年冬築郎囿書時也季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來焉用速民其以勦勞也民也無囿猶可無民其可乎臣按叔孫昭子謂無囿猶可無民其可乎斯一言也尤為緊切有民者將欲舉事恆以其所作為者與民相比竝權其有無可與不可則知所輕重緩急而不輕用民力以失其心哉國語楚靈王為章華之臺與伍舉升焉曰臺美夫對曰臣聞國君服寵謂以賢受寵服以為美安民以為樂聽德以為聰致遠以為明不聞其以土木之崇高彤謂丹楹鏤謂刻桷為美而以金石匏竹之昌盛也大囂華也庶衆也為樂不聞其以觀大視侈淫色以為明而以察清濁為聰也先君莊王為匏居臺名之臺高不過望國氛大不過容宴豆木不妨守備不妨城郭守備之材用不煩官府財用不出府藏民不廢時務官不易朝常先君是以除亂克敵而無惡於諸侯今君為此臺也國民罷疲同焉財用盡焉年穀敗焉百官煩焉舉國留治也之數年乃成臣不知其美也夫美也者上下外內小大遠邇皆無害焉故曰美若於目觀則美於日則美於德則不縮取也於財用則匱是聚民利以自封而瘠民也胡美之為夫君國者將民之與處民實瘠矣君安得肥其有美名也唯其施令德於遠近而小大安之也若斂民利以成其私謂私欲宏侈欲使民蒿耗也焉忘其安樂而有遠心畔離也其為惡也甚矣安用目觀故先王之為臺榭也榭不過講軍實臺不過望氛祥故榭度於大卒之居臺度於臨觀之高其所處也不奪穡地其為作也不匱財用其事不煩官業其日不廢時務瘠磽之地於是乎為之城守之末謂餘木於是乎用之臣按伍舉諫其君之為臺而必舉其先君之所為者以告之且謂木不妨守備用不煩官府民不廢時務官不易朝常是以能除亂克敵而無惡於諸侯今其君之為臺則民罷而財盡穀敗而官煩舉國治之數年乃成是聚民利以自封而瘠民也民實瘠矣君安得肥嗚呼伍舉之言其所以告於君何其切實而明快也哉後世所當鑑也孟子見梁惠王王立於沼上顧鴻鴈麋鹿曰賢者亦樂此乎孟子對曰賢者而後樂此不賢者雖有此不樂也詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴王在靈沼於牣魚躍文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚鱉古之人與民偕樂故能樂也湯誓曰時日害喪豫及女偕亡民欲與之偕亡雖有臺池鳥獸豈能獨樂哉朱熹曰孟子言文王雖用民力而民反歡樂之既加以美名而又樂其所有蓋由文王能愛其民故民樂其樂而文王亦得以享其樂也又引湯誓桀自言吾有天下如天之有日日亡吾乃亡耳民怨其虐故因其自言而目之曰此日何時亡乎若亡則我寧與之俱亡蓋欲其亡之甚也孟子引此以明君獨樂而不恤其民則民怨之而不能保其樂也楊時曰梁王顧鴻鴈麋鹿以問孟子孟子因以謂賢者而後樂此至其論文王夏桀之所以異則獨樂不可也世之君子其賢者乎則必語王以憂民而勿為臺池苑囿之觀是拂其欲也其佞者乎則必語王以自樂而廣其侈心是縱其欲也二者皆非能引君以當道唯孟子之言常於毫髮之間剖悉利善之所在使人君化焉而不自知夫如是其在朝則可以格君心之非而其君易行矣張栻曰民一也得其心則子來而樂君之樂失其心則害喪而亡君之亡究其本則由夫順理與狥欲之分而已人君常懷不敢自樂之心則足以遏人欲矣常懷與民偕樂之心則足以擴天理矣臣按孟子因梁王之問而舉文王與民偕樂與夏桀結怨奉已二者竝言使其自擇焉與民偕樂者君既得已之樂而民亦得民之樂是以吾心休休焉享民之奉已何樂如之若夫獨樂已之樂者奪民衣食之資以為之財用占民耕藝之土以為之臺池已則樂矣樂而及於鳥獸矣如民之苦何苦之不已則怨怨之不已則叛則民之所以苦者將移於我而我之所以樂者將為他人有矣為人上者盍鑒文王之所以興而戒夏桀之所以亡哉齊宣王問曰文王之囿方七十里有諸孟子對曰於傳有之曰若是其大乎曰民猶以為小也曰寡人之囿方四十里民猶以為大何也曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同之民以為小不亦宜乎臣始至於境問國之大禁然後敢入臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪則是方四十里為阱於國中民以為大不亦宜乎朱熹曰囿者蕃育鳥獸之所古者四時之田皆於農隙以講武事然不欲馳務於稼穡場圃之中故度閒曠之地以為囿然文王七十里之囿其亦三分天下有其二之後也歟禮入國而問禁國外百里為郊郊外有關阱坎地以陷獸者言陷民於死也張栻曰意齊王欲廣其囿諛佞之徒必有假文王事以逢之者文王豈崇囿如此蓋其搜田所及民以為文王之囿耳以芻雉得往知其然也臣按設禁阱民者人欲之私與民同利者天理之公一田囿之設而公私義利於是乎在天理人欲於是乎分為人上者於凡舉措可不謹哉漢武帝建元三年帝使吾丘壽王舉籍阿城以南盩厔以東宜春以西提封頃畝及其賈直欲除以為上林苑屬之南山壽王奏事武帝大悅稱善時東方朔在旁進諫曰夫南山天下之阻也漢興去三河之地止霸滻以西都涇渭之南此所謂天下陸海之地秦之所以虜西戍兼山東者也其山出玉石金銀銅鐵良材百工所取給萬民所卭古仰字足也又有粳稻梨栗桑麻竹箭之饒土宜薑芋水多䵷即蛙字魚貧者得以人給家足無饑寒之憂故酆鎬之間號為土膏其賈畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業是其不可一也且盛荆棘之林廣狐菟之苑大虎狼之虛壞人冢墓發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也夫殷作九市之宮而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣逆盛意罪當萬死武帝乃拜朔為給事中賜黃金百斤然遂起上林苑如夀王所奏臣按武帝使吾丘夀王闢地為上林苑東方朔諫帝拜朔為給事中賜黃金百斤然遂起上林苑如夀王所奏夫聽其言而受其金爵可也帝不受朔之言徒與之爵與金是買之使不言也朔受之不辭而不復言譬則狗焉嘷於主人之側投以一臠俯首帖耳逝矣靈帝光和三年作圭靈昆苑司徒楊賜諫曰先王造囿裁足以修三驅之禮薪採芻牧皆悉往焉先帝左開鴻池右作上林不奢不約今廢田園驅居人畜禽獸殆非若保赤子之義宜惟卑宮露臺之意以慰民勞帝欲止侍中任芝樂松曰昔文王之囿百里人以為小齊宣王四十里人以為大今與百里共之無害於政也帝說遂為之胡寅曰天下之理至五經語孟亦可謂正矣邪說之害至五經語孟亦可以息矣然而道大如天見在乎人小智姦識謂聖人之心與我何異哉則五經語孟雖存乎世而窽言橫議亦傍緣而作非人君明哲心與正會則不能昭其誣罔設或主意違道則窽言橫議入之猶水赴谷矣堯舜為天下得人而奪國者用以為名湯武順天革命而代君者取以藉口𦙍侯征羲和而討不附己者資焉伊尹放太甲而欲奪其主者託焉五就湯五就桀非為利也而求富貴利達者以為大人欲速其功也致辟管叔囚蔡降霍非為己也而手刃同氣者以為聖人與我同志也曰公劉好貨則掊克聚斂不知紀極曰召公闢國則窮兵遠討無有休息曰省耕斂助不足則出錢貸民而取其利曰藏不售興滯用則置官畜貨而自為市依倚外患脅制人主以叨富貴而自比於惠連之降志辱身廢法任情肆行無道以專寵利而自比於仲尼之無可無不可遂使詆訾儒術者舉是以為笑曰五經語孟殆亦姦宄之囊橐耳彼樂松任芝所以欺靈帝者特辨髦土梗未足多誚也或曰然則何以正之曰姦人之假託經義以文其說者非能欺天下也直欺人主耳茍人主信之足矣人君能格物致知使疑邪不能亂正心誠意使利欲不能昏就道親賢問之辨之以明所未明篤志勵行精之一之以守所難守則鄭自鄭雅自雅杲日中天萬象畢照辨言安得而亂吾政利口安得而覆吾邦此二帝三王中心無為以守至正之要道也臣按人臣託經義以欺其君是愚其君也其君聽其言而從之是自愚其身也彼臣而愚其君是欲以求其利也君而自愚豈非快其所欲哉臣之愚君得罪於君不臣者也君之自愚則得罪於天得罪於聖經得罪於師父之教其不君也哉隋煬帝大業元年築西苑周二百里其內為海周十餘里為方丈蓬萊瀛洲諸山高出水百餘尺臺觀宮殿羅絡山上海北有龍鱗渠縈紆注海內緣渠作十六院門皆臨渠每院以四品夫人主之堂殿樓觀窮極華麗宮樹秋冬凋落則剪綵為花葉綴於枝條色渝則易以新者常如陽春沼內以綵為荷芰菱芡乘輿遊幸則去水而布之十六院競以殽羞精麗相高求市恩寵煬帝好以月夜從宮女數千騎遊西苑作清夜遊曲於馬上奏之臣按煬帝於元年始即位即為西苑至七年天下兵起十四年被弒於江都一時恣情游樂之地今則蕩為荒煙野草莫知其所在矣而書之史册者昭昭在人目睫間穢汚簡牘遺臭萬世者恆如在然嗚呼人生幾何名教中自有樂地何苦為此不道之事以勞生民之力費天下之財而貽後世之笑哉以上囿游之設大學衍義補卷八十九
