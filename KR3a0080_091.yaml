body:
  text: 大學衍義補卷九十一明丘濬撰治國平天下之要備規制輿衛之儀易坤為大輿吳澄曰為大輿三畫虛所容載者多也坎為水為矯輮為弓輪其為輿也為多眚徐幾曰陽在隂中抑而能制故為矯輮為弓輪矯者矯曲而使之直輮者輮直而使之曲也弓蓋二十八所以蔽其車之上輪輻三十六所以載其下弓輿輪皆矯輮之所成也吳澄曰其於輿也為多眚者謂有險難而多阻礙也蓋行於險道不若坤輿之行於平地者易且安也臣按先儒謂易取坤象稱輿本之剝上九爻蓋剝卦五隂承載上九之一陽如人之在車上坤六畫皆隂其象為虛虛則承載為多故為大輿而坎之為卦則中虛虛中而實外故有矯輮為弓輪之象是則車輿之作其所取象者大矣古人謂天為蓋地為輿聖人告顔子以四大之禮樂而於殷獨取其輅則車輿之為用豈小也哉書顧命大輅在賔階西階也靣南嚮也綴輅在阼階東階也靣先輅在左孰門側堂也之前次輅在右孰之前蔡沈曰大輅玉輅也綴輅金輅也先輅木輅也次輅象輅革輅也王之五輅玉輅以祀不以封為最貴金輅以封同姓為次之象輅以封異姓為又次之革輅以封四衛為又次之木輅以封蕃國為最賤其行也貴者宜自近賤者宜逺也王乘玉輅綴之者金輅也故金輅謂之綴輅最逺者木輅也故木輅謂之先輅以木輅為先輅則革輅象輅為次輅矣呂祖謙曰此非特盛彌文而彰備物天位峻極幄座靚深寶鎮燁華車輅峙列入其庭肅然起敬懼不克承委重投艱之意不言而已傳矣臣按王朝之輅不但巡行以馳於道路之間而於朝㑹之間亦陳列之於殿廷以盛彌文而彰備物焉周禮巾車車官之長掌公車之政令辨其用與其旗物而等叙之治其出入王之五路一曰玉路以玉飾其末錫馬靣當盧刻金為之樊馬大𢃄纓馬鞅也十有再就以五采罽飾之十有二匝建大常旗上畫日月十有二斿旗上綴十二斿以祀用祀天地金路金飾之鉤當馬胸金為之樊纓九就建大旗畫交龍以賔同姓以封象路用象齒為飾朱樊纓七就建大赤通帛之旗以朝用以視朝異姓以封革路挽之以革而漆龍勒以龍文飾馬勒條纓五就建大白以即戎以封四衛木路前讀為剪淺黑色樊鵠纓建大麾以田以封蕃國劉􅉓曰玉以比德也王祭祀乘玉輅者欲王之奉祭祀雖在道途不敢跬步忘乎其德也朱熹曰輅者身之所乘足之所履其為用也賤矣運用震動任重致逺其為物也勞矣且一器而工聚焉其為費也廣矣賤物而貴飾之則易壞費廣而又增費之則傷財此周輅之所以為過歟臣按周人尚輿既於冬官設輿人等官掌作車之事而又設巾車之官屬於春官者蓋春官掌邦禮禮必乘輅輅必有其飾巾者設飾之物也輅而謂之金玉象者用以飾其末爾非純用也王之喪車五乘木車不漆者始遭喪乘之素車堊以白土卒哭乘之薻車堊以蒼土既綀乘之駹車邊側有漆大祥乘之漆車黑漆車既禫乘之臣按此王有喪所乘之車考工記曰軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也鄭𤣥曰輪象日月以其運行也日月三十日而合宿老子曰三十輻共一轂賈公彥曰天之列宿二十有八而蓋弓之數象之王昭禹曰蓋在上以覆乎下故象天體之圓軫在下以載乎上故象地體之方聖人乘焉以位乎其中則三才之道備矣鄭樵曰聖人作車圜而為輪方而為輿曲而為輈皆有制度輪以運輿以載輈以服三者備然後行轂以利轉輻以直指牙以固抱轂以受軸大穿為篆小穿為軹軸近轂為股近牙為骹股入轂中為菑骹入牙中為蚤牙之材或謂之渠或謂之楺此輪之制也兩輢出式者較較下橫木者式輢之植者軹式之植者轛輿後橫木曰軫式前橫木曰軌此輿之制也三馬之輈適當伏兔圍在前持衡為頸圍在後承軫為踵圍此輈之制也輪之中有軸輿之下有轐輈之前有衡軸末有轊助輻曰輔輿間橫木曰軫係木乘輿曰輹大車輈端曰䡚小車輈端曰軏其制雖考工記無所見要之闕一不可臣按先儒謂易言兼三才而兩之故六六者非他也三才之道也備三才之道者莫如車故有六等之數蓋之圜也以象天而天之道有隂陽軫之方也以象地而地之道有剛柔人位乎中而人之道有仁義車六等之數所以法易之三才六畫如此先儒謂一器而工具之蓋以一車之作有輪人有輿人輈人也車之為制不止三者而必以此三物名官者蓋察車自輪始作車始於輿而造車以輈為難故也司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為􅎶雜白為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌鄭𤣥曰凡九旗之帛皆用絳陳祥道曰旗期也言與衆期於下朱申曰大常畫日月者取天道之運也旗畫龍者取君德之用也􅎶用通幅絳帛所謂大赤也物則內幅以絳外幅以白也旗畫熊虎取其猛毅也旟畫鳥隼取其摯速也臣按司常九旗惟大常者天子之所建其餘則自諸侯以下皆得建之所謂大常者非但畫日月於其上則凡人臣之有功者皆銘書之焉龍旗九斿以象大火也鳥旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也弧旌旗上有弓枉矢上畫枉矢以象弧星也也鄭𤣥曰交龍為旗大火蒼龍宿之心其屬有九星鳥隼為旟鶉火朱鳥宿之柳其屬七星熊虎為旗伐屬白虎宿與參連體而六星龜蛇為旐營室𤣥武宿與東壁連體而四星臣按疏家謂九斿七斿六斿四斿之旌旗皆是天子自建非謂臣下以其九七六四不與臣下命數相當故也若臣下則皆依命數然天子以十二為節乃用九七六四者上得兼下也禮器曰大路繁馬腹帶纓鞅也一就五色一匝曰就次路繁纓七就陳澔曰殷世尚質其祭天所乘之車木質而已無别雕飾謂之大路繁纓在馬膺前染絲而織以為罽繁與纓皆以此罽為之車朴素故馬亦少飾也大路路下有先路次路次路殷之第三輅也供卑雜之用故就數多郊特牲曰大路繁纓一就先路三就次路五就陳祥道曰禮器與郊特牲言大路繁纓一就則同其言次路繁纓五就七就則不同者先王之路降殺以兩反此而加多焉蓋亦以兩而已大路一就先路三就則次路有五就七就者矣書言次路以兼革木二路則殷之次路五就七就庸豈一車邪臣按所謂就者言路馬之飾也周禮巾車言樊纓禮記左傳皆作繁纓有一就再就九就七就五就之别左傳所謂斿纓昭其數者此也明堂位曰鸞車有虞氏之路也鉤車夏后氏之路也大路殷路也乘路周路也鄭𤣥曰鸞有鸞和也鉤有曲輿者也大路木路也乘路玉路也孔頴逹曰此明四代之車其制各别臣按車之言路者先儒謂大也君之所在以大為號門曰路門寢曰路寢故車亦謂之路車焉春秋左傳桓公二年臧哀伯曰君人者將昭德昭明善惡塞違閉塞惡邪以臨照百官猶懼或失之故昭令德以示子孫大路昭其儉也斿旌旗之斿纓在馬膺前昭其數也錫在馬額鸞在鑣和在衡鈴在旗昭其聲也三辰日月星旗旗昭其明也杜預曰大路祀天車也臣按路之大者以木為之則行禮以儉為德於是乎昭矣周人飾以金玉豈所以昭其儉朴之德而塞其邪侈之惡也哉然德固先乎儉也然亦不可過於固而陋焉於是乎有繁纓以為之文飾有鸞和以為之音節焉論語子曰乘殷之輅朱熹曰商輅木輅也輅者大車之名古者以木為車而已至商而有輅之名蓋始異其制也周人飾以金玉則過侈而易敗不若商輅之朴素渾堅而等威已辨為質而得其中也臣按先儒謂商尚質亦有過於質者惟商之輅則得乎質之中此聖人所以斟酌其制以答顔子為邦之問也為邦之道大經大法非止一端此特其制度中之一物耳舉此一物為凖以例其餘使其推類以盡之蓋為治之道非發政施令之為難政以酌古凖今之不易也秦金根車用金為飾謂金根車而為帝軫又以輦為人君之乘宋志曰周則玉路最尊秦漢之金根亦周之玉路也臣按後世人君所乘車謂之輦始于此蓋古以人牽為輦秦始皇去其輪而舁之漢代遂為人君之乘漢王居黃屋以黃繒為蓋左纛毛羽幢也鸞旗在前屬車在後翠鳯之駕旌旗車旄頭先驅驂乘漢制乘輿大駕備車千乘騎萬匹屬車八十一乘公卿奉引太僕大將軍參祀天於甘泉用之三輔黃圖天子出車駕次第謂之鹵簿有大駕有法駕有小駕大駕則公侯奉引大將軍驂乘大僕御屬車八十一乘作三行尚書御史乘之最後一乘垂豹尾豹尾以前皆為省中備千乘萬騎出長安祠天於甘泉備之葉夢得曰大駕儀仗通號鹵簿蔡雍獨斷已有此名唐人謂鹵櫓也甲楯之别凡兵衛以甲楯居外為前導桿蔽其先後皆著之簿籍故曰鹵簿臣按鹵簿之名始見于此後漢志上古聖人見轉蓬始知為輪輪行可載因物知生復為之輿輿輪相乘流運罔極任重致逺天下獲其利後世聖人觀於天視斗周旋魁方杓曲以携龍角為帝車於是乃曲其輈乘車駕馬登險赴難周覽八極故易震乘乾謂之大壯言器莫有能上之者也自是以來世加其斾至奚仲為夏車正建其斿旐尊卑上下各有等級臣按大壯之象乾剛而震動車之器似之此漢志所以有莫能上之說也其九四爻又有壯于大輿之輹之象先儒謂輹與輻同車之要處也車之敗常在折輻輻壯則車彊矣壯于輹謂壯于進也蓋以車之為器一器而羣工聚焉所以任重致用非壯大而剛健不能進進而不已也漢制乘輿金根安車立車蔡雍曰金根車駕六馬有五色安車五色立車各一各駕四馬是為五時副車又有戎立車以征伐三蓋車名耕根車一名芝車親耕籍田乘之凡乘輿車皆羽蓋金華瓜黃屋左纛金鍐方釳繁纓重轂副牽臣按此漢一代車輅之制唐制天子居曰衙行曰駕皆有衛有嚴羽葆華蓋旌旗罕畢車馬之衆盛矣皆安居而不譁人君舉動必以扇出入則撞鐘庭設樂宫道路有鹵簿鼓吹禮儀百司必備物而後動蓋所以為慎重也夫儀衛所以尊君而肅臣其聲容文采雖非三代之制至其盛也有足取焉凡朝㑹之仗三衛番上分為五仗號衙內五衛一曰供奉仗二曰親仗三曰勳仗四曰羽仗五曰散手仗臣按漢制每大朝㑹必陳乘輿法物於庭謂之充庭車唐凡羽葆華蓋旌旗罕畢車馬之類皆備不止以車充庭而已凡天子之車曰玉輅者祭祀納后所乘也青質玉飾末金路者饗射祀還飲至所乘也赤質金飾末象路者行道所乘也黃質象飾末革路者臨兵巡守所乘也白質鞔以革木路者搜田所乘也黑質漆之五路者重輿皆有副耕根車者耕籍所乘也青質三重蓋安車者臨幸所乘也金飾重輿四望車者拜陵臨弔所乘也又有屬車十乘一曰指南車二曰記里鼓車三曰白鷺車四曰鸞旗車五曰辟惡車六曰皮軒車七曰羊車與耕根車四望車安車為十乘行幸陳于鹵簿則分前後大朝㑹則分左右後又加黃鉞車豹尾車通為屬車十二乘臣按此唐一代車輅之制唐制輦有七一曰大鳯輦二曰大芳輦三曰仙遊輦四曰小輕輦五曰芳亭輦六曰大玉輦七曰小玉輦輿有三一曰五色輿二曰常平輿三曰腰輿大駕鹵簿先五路以行臣按三代以前車輅皆以馬駕之周有輜車即輦也古謂人牽為輦始皇以為人君之乘而以人舁之至唐其制始大備天子將出太樂令設宫縣之樂於庭侍中奏請中嚴有司陳鹵簿諸位以次陳殿庭既外辨太僕卿升執轡乘輿以出天子升路太僕卿授綏黃門侍郎前奏請發鸞駕動警蹕鼓傳音玉金象木革五路皆有副車有指南記里鼓等十二乘輿有相風行漏腰輿輦有大輦方輦小輦以旗計者二十有七有青龍白虎辟邪應龍之類以隊計者七有青游朱雀步甲持鈒之目以兵計者自金吾果毅佽飛至衙門左右廂凡大駕一千八百三十八人分為二十四隊列為二百十四行仗則有黃麾仗細仗儀刀仗殳仗衛則有親勳翊衛散手衛儀物有曲直華蓋六寶香燈大繖雉尾障扇花蓋朱畫團扇之屬戎器有鈒㦸弓箭橫刀䂍矟儀刀班劒黃鉞楯􅗋弩黑鍪甲之屬服飾有平巾幘緋裲襠大口袴朱緑綟綬紛武辨朱衣革帶赤綦襖紫誕𢃄之屬鼓吹有掆鼓金鉦大鼓長鳴鐃鼓太橫吹笛簫觱篥大角之屬凡五部七十五曲臣按此唐朝鹵薄之制之大略也宋志宋初因唐五代之舊其殿廷之儀則有黃麾大仗黃麾半仗黃麾角仗黃麾細仗凡正旦冬至五月一日大朝㑹大慶冊受賀受朝則設大仗月朔視朝則設半仗外國使來則設角仗發冊受寶則設細仗其鹵簿之等有四一曰大駕郊祀天饗用之二曰法駕方澤明堂宗廟籍田用之三曰小駕朝陵封祀奏謝用之四曰黃麾仗親征省方還用之周必大曰宋承五季搶攘之後鹵簿踳駁為甚於是知制誥范質張昭等正其繆盩參定典制已而禮儀使陶榖奉言金吾諸衛將軍暨押仗導駕等官服皆以紫於禮未稱請按開元禮咸用繡袍至若執仗之士舊服五色請以黑為先而青赤黃白以次分列用協五行相生之序凡馬步儀仗總萬有一千二百二十有二人悉以紵絁繡文代采畫之服稽諸會要始造於乾德四年而告備於開寶三年越明年謁款圜丘實始用之想夫䂍矟前驅五路增副里以鼓記車以南指雞翹豹尾夭矯婀娜公卿執事前導後陪細仗大角壯其容幰蓋繖扇備其飾此治世之巨典華夏之偉觀也臣按此宋朝儀仗之制其用人之數大駕鹵簿總用二萬六千一人法駕三分減一鸞駕又減半黃麾仗又減於鸞駕以上輿衛之儀臣按昔人謂綦天下之貴一人而已是故環拱而居備物而動文謂之儀武謂之衛一以明制度示等威一以慎出入逺危疑也書載辨戈冕劉虎賁車輅周官旅賁王出入執盾以夾王車朝儀之制固已燦然降及秦漢始有周廬陛㦸鹵簿金根大駕千乘萬騎之盛歷代因之雖或損益然不過為尊大而已雖然臣竊以為此豈特為尊大而已哉亦所以為慎重也慎重則威嚴威嚴則肅恭天子之尊肅恭於上則環列乎左右者不敢有怠惰之容拜伏於逺近者不敢興干犯之念所以表一人之尊大而聳萬姓之瞻仰端有在於此矣大學衍義補卷九十一
