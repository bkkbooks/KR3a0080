body:
  text: 大學衍義補卷四十九明丘濬撰治國平天下之要明禮樂家鄉之禮上之上禮記王制六禮冠昏喪祭鄉相見吳澄曰冠昏喪祭四者家之禮也鄉相見二者鄉之禮也儀禮有士冠禮士昏禮士喪禮士之祭有特牲饋食禮鄉有鄉飲酒禮相見有士相見禮論語子曰慎終追逺民德歸厚矣朱熹曰慎終者喪盡其禮追逺者祭盡其誠民德歸厚謂下民化之其德亦歸於厚蓋終者人之所易忽也而能謹之逺者人之所易忘也而能追之厚之道也故以此自為則己之德厚下民化之則其德亦歸於厚也蘇説曰忽略於喪祭則背死忘生者衆而俗薄矣子曰生事之以禮死葬之以禮祭之以禮朱熹曰生事葬祭事親之始終具矣禮即理之節文也人之事親自始至終一於禮而不茍其尊親也至矣胡寅曰人之欲孝其親心雖無窮而分則有限得為而不為與不得為而為之均於不孝所謂以禮者為其所得為者而已矣文中子曰冠禮廢天下無成人矣昏禮廢天下無家道矣喪禮廢天下遺其親矣祭禮廢天下忘其祖矣朱熹曰禮有本有文自其施於家者言之則名分之守愛敬之實其本也冠昏喪祭儀章度數者其文也其本者有家日用之常體固不可以一日而不修其文又皆所以紀綱人道之始終雖其行之有時施之有所然非講之素明習之素熟則其臨事之際亦無以合宜而應節是亦不可一日而不講且習焉者也臣按禮曰人有禮則安無禮則危是則禮之在天下非徒有是儀章度數以為觀美而已也風俗之隆汙世道之理亂人家之成敗皆繫於是禮焉禮無乎而不在要必人人行是禮家家行是禮積家以為郡國積郡國以為天下無一處而無是禮無一事而不由是禮是則所謂三代比屋可封之俗矣又曰三代之際禮經備矣然其存於今者宫廬器服之制出入起居之節皆已不宜於世世之君子雖或酌以古今之變更為一時之法然亦或詳或略無所折衷至或遺其本而務其末緩於實而急於用自有志好禮之士猶或不能舉其要而困於貧窶者尤患其終不能有以及於禮也是以嘗獨究觀古今之籍因其大體之不可變者而少加損益於其間以為一家之書大抵謹名分崇愛敬以為之本至其施行之際則又略浮文趨本實以竊自附於孔子從先進之遺意庶幾古人所以修身齊家之道慎終追逺之心猶可以復見而於國家所以崇化道民之意亦或有小補云臣按宋儒朱熹本儀禮及程張司馬氏諸家禮書作為家禮一書酌古準今實為簡易可行太宗皇帝命儒臣修性理大全書已􅊀載其書今士大夫家亦往往有舉行者乞敕禮部詳定頒行天下俾諸道督學憲臣兼提其要行下府州縣教官每旬一次帥師生演習其儀并令鄉村社學教讀者専習其事遇民間有吉凶等事按儀而行如此則天下之人家有其書人習其禮朱熹謂修身齊家之道慎終追逺之心可以復見然不見於熹之時而見於今世又謂國家崇化道民之意亦有所補然不補於宋朝而補於今朝矣臣嘗將家禮櫽括以為儀節頗簡易可行今士夫亦有依而行者儻有可采乞發下天下郡縣不為無補以上總論人家當行之禮內則曰后王命冢宰降德於衆兆民吕祖謙曰內則一篇首言后王命冢宰降德於衆兆民蓋三代所以教天下者皆以是自秦漢以來外風俗而論政事不復以人家事為問矣吳澄曰天子為天下之君師治而教之而冢宰六卿之長佐天子者也降下也德得也謂以人所同得於天之理立為教法命冢宰降下其德教於衆兆民俾效而法之也所謂德教如下文所載是也臣按三代帝王本乎德以為教非但行之於宫闈朝廷官府而又制為禮法命大臣以降下於天下使凡億兆之衆莫不知所以法則而遵行焉蓋天下者家之積也積億萬人家以成天下必家家齊然後天下之治成蓋人君之平治天下譬如搆萬間之廣厦焉茍其間闕其一榱一桷則其規制亦非全者矣子事父母雞初鳴咸盥洗頮潄潄口櫛梳也縱結髮筓簪也總裂繒以束髮婦事舅姑如事父母以適父母舅姑之所及所下氣怡聲問衣燠寒疾痛苛疥也癢而敬抑按也搔摩也之出入則或先或後而敬扶持之進盥少者奉槃長者奉水請沃盥盥卒授巾問所欲而敬進之柔色以溫之饘厚粥􅋳薄粥酒醴芼羮以米雜肉菽麥蕡大麻稻黍梁秫唯所欲棗栗飴蜜以甘之堇荁枌榆免音問新鮮者薧滫久泔瀡滑也以滑之脂膏以膏之父母舅姑必嘗之而後退司馬光曰父母舅姑起子供藥物具晨羞尊長舉箸子婦乃各退就食臣按人子事親固當盡其孝尤當致其敬不徒以下氣怡色柔聲為孝也而凡其抑搔也扶持也問所欲也皆必以敬焉孝而不敬非孝矣在父母舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖逰不敢噦嘔逆出聲噫氣塞出聲嚏咳嗽聲欠氣乏則欠伸體疲則伸跛偏任為跛倚依物為倚睇視順視也不敢唾口津也洟鼻液也寒不敢襲重衣癢不敢搔不有敬事不敢袒裼不涉謂涉水不撅揭裳褻衣衾不見裏方慤曰噦噫嚏咳則聲為不恭欠伸跛倚則形為不恭寒不敢襲癢不敢搔不敢適己之便也子婦孝者敬者父母舅姑之命勿逆勿怠陳澔曰子而孝父母必愛之婦而敬舅姑必愛之然猶恐其恃愛而於命或有所違也故以勿逆勿怠為戒子謂為人子者婦子之妻無私貨無私畜無私器不敢私假不敢私與鄭玄曰家事統於尊也吳澄曰貨謂所儲資財之物畜謂所養畜牲之物器謂飲食等所用之物假謂以物借人與謂以物遺人也以上兼言子婦事父母舅姑之禮曲禮曰凡為人子之禮冬溫而夏凊昏定而晨省司馬光曰父母舅姑將寢則安置而退吕祖謙曰一歲冬夏有寒暑之變一日晨昏有晦明之變冬溫如古人置密室之類夏凊如古人扇枕之類夫為人子者出必告反必面所遊必有常所習必有業恆言不稱老陳澔曰出則告違反則告歸遊有常身不他往也習有業心不他用也平常言語之間自以老稱則尊同於父母而父母為過於老矣食饗不為槩陳澔曰食饗如奉親延客及祭祀之類皆是不為槩量順親之心而不敢自為限節也聽於無聲視於無形鄭玄曰雖聽不聞父母之聲雖視不見父母之形然心常想像似見形聞聲謂將有教使已然父母存不有私財戴溪曰粒粟縷絲以上皆親之物豈敢私有為人子者父母存冠衣不純素鄭玄曰純緣素為有喪象也父子不同席吳澄曰古者一席坐四人言父子偶共一處而坐雖止一人必各坐一席蓋以父昭子穆父穆子昭尊卑不同故也父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧齒本也怒不至詈疾止復故司馬光曰凡父母舅姑有疾子婦無故不離側親調嘗藥餌以供之父母有疾子色不滿容不戲笑不宴遊捨置餘事專以迎醫檢方以求藥為務子於父母則自名也吕大臨曰子之名父母所命敬親之命不敢有他稱也親有疾飲藥子先嘗之顔之推曰父母有疾子拜醫以求藥蓋以醫者親之存亡所繫豈可傲忽哉子之事親也諌而不聽則號泣而隨之孔頴達曰父子天性理不可逃雖不從當號泣而隨之兾有悟而改內則曰父母有過下氣怡色柔聲以諌諌若不入起敬起孝説則復諌不説與其得罪於鄉黨州閭寧熟諌父母怒不説而撻之流血不敢疾怨起敬起孝孔頴達曰諌而使父母不悅其罪輕畏懼不諫使父母得罪於鄉黨州閭其罪重二者之間寧用熟諌謂純熟殷勤若物之成熟然吳澄曰復諌再諌也熟諌者至三至四而猶未己如火之熟物必期變化生物之堅硬者至於軟熟也臣按內則此章之旨朱子引之以解論語事父母幾諌章謂二章之言相表裏解幾為微微諫謂下氣怡色柔聲以諌漸漸細密不須峻暴強加闌截也臣竊以謂朱子之意固是但於幾字之訓似不甚親切若以為幾微之幾則孝子之於親視於無形聽於無聲方其幾微萌露之初即探其情志意向之所在隨事而致其察先事而為之防消之於未然遏之於將然則用力比於熟諌為省矣噫孝子之於親過未形則幾諌過己形則熟諌致其親於無過之地則非徒養其志而又有以成其德矣由是言之二章之意非但相表裏蓋相始終焉凡父母在子雖老不坐吳澄曰家人有嚴君焉父母之謂也有尊者在上故子之年雖老亦不敢坐玉藻曰親在行禮於人稱父人或賜之則稱父拜之方慤曰不敢私交不敢私受故也父命呼唯而不諾手執業則投之食在口則吐之走而不趨方慤曰既曰命又曰呼者命之以事呼之以來也唯諾皆應也而唯之應速於諾走趨皆步也而走之步速於趨親老出不易方復不過時親癠病也色容不盛此孝子之疏節謂常行疏略之禮非大節也也方慤曰孝子之事親豈必老而後如是耶蓋以親老者尤不可不知此故也陳澔曰易方恐召已而莫知所在過時則恐失期而貽親之憂臣按為人子者當父母生存之日兢兢愛日而盡其當然之理是則所謂孝也易曰有父子而後有君臣傳曰事親孝故忠可移於君人人盡為子之道則治平之基在此矣論語曰父母在不遠遊遊必有方朱熹曰逺遊則去親逺而為日久定省曠而音問疏不惟己之思親不置亦恐親之念我不忘也遊必有方如已告云之東即不敢更適西欲親必知己之所在而無憂召己則必至而無失也范祖禹曰子能以父母之心為心則孝矣臣按先儒謂朱子十四歲喪父事母盡孝所以發明此章曲盡孝子之心蓋非身歷心驗之不能精微曲折如此人子之事親者宜身體之以上人子生事父母之禮內則曰凡婦不命適私室不敢退鄭玄曰婦侍舅姑者也方慤曰私室婦室也其視舅姑之室若公所婦將有事大小必請於舅姑鄭玄曰家事統於尊也婦或賜之飲食衣服布帛則受而獻諸舅姑舅姑受之則喜若反賜之則辭不得命藏以待乏吳澄曰為人婦者或有私親兄弟賜之飲食衣服布帛等物既受之後持以獻之舅姑舅姑肯受所獻則喜若舅姑不受而以所獻還賜其婦則必辭而不敢受若不許辭亦不敢用藏之以待舅姑乏用之時與之用也舅姑使冢婦毋怠不友當作敢無禮於介婦劉彛曰舅姑以事命冢婦則冢婦當自任其勞不可憚其勞而怨介婦不助己遂不愛敬之也舅姑若使介婦毋敢敵耦於冢婦不敢並行不敢並命不敢並坐方慤曰兩相抗為敵兩相合為耦言使之勞逸不敢與冢婦均也不敢並行並坐亦毋敢敵耦之事冢婦所祭祀賔客每事必請於姑介婦請於冢婦輔廣曰婦傳家事矣禮之大者亦必請於姑臣按子於父母天性也而婦於舅姑雖非天性之親然緣夫而以父母之道事之所以助成其孝亦天性之自然也故內則后王降教於民往往以子婦並言子於父母婦於舅姑其稱謂雖有異名而其所以事之之道則一而已故臣於家鄉之禮既兼載子婦事父母舅姑之禮又分載子事父母婦事舅姑而於婦禮牽連及其所以處娣姒者以上言婦事舅姑及處姒娣之禮曲禮曰見父之執父之友也不謂之進不敢進不謂之退不敢退不問不敢對此孝子之行也方慤曰愛親者不敢惡於人敬親者不敢慢於人見父之執於進退之節有所不敢則一舉足不敢忘親可知於對問之際有所不敢則一出言不敢忘親可知年長以倍則父事之十年以長則兄事之五年以長則肩隨並行而差退之羣居五人則長者必異席陳澔曰此泛言長幼之序非謂親者邵淵曰年倍於我事以父禮長我十年事以兄禮長我五年差肩隨之至於羣居五人則又異長者之席其於人也庸敢慢乎以此事親愛敬之道盡矣長者賜少者賤者不敢辭陳澔曰辭而後受賔主平交之禮非少賤事尊貴之道少儀曰尊長於己踰等不敢問其年燕見不將命遇於道見則面不請所之不畫地手無容不翣扇也也寢則坐跪也而將命陳澔曰踰等祖與父之行也不敢問年嫌若序齒也燕見不將命謂燕私來見不使擯者傳命非賔主之禮也遇尊長於道見己則面見之不見則隱避不欲煩動之也不請所之不問其所往也無故而畫地亦為不敬手容恭若舉手以為容亦為不恭時雖暑熱不得揮扇當尊者寢卧之時而傳命必跪而言之不可直立以臨之也王制曰父之齒年與父等隨行從其後兄之齒年與兄等鴈行並行差退朋友不相踰並行而齊輕任並己獨任之重任分析而二之班白者不提挈君子耆老不徒行無乘而行庶人耆老不徒食無羞而食劉彞曰帝王之為治也不出人倫天下之人入於五品爾故其天下外薄四海行路之人皆服教化父之齒隨行父子之教著於道路矣兄之齒鴈行兄弟之教著於道路矣朋友不相踰禮義之教著於道路矣輕任并重任分任恤之行著於道路矣班白不提挈孝友之行著於道路矣故君子耆老不徒行庶人耆老不徒食君子小人之為子弟者莫不知尊德而養老孟子曰徐行後長者謂之弟疾行先長者謂之不弟臣按此古者少事長之禮所謂長者非但吾之同氣凡年齒加於己者皆長也孟子有言人人親其親長其長而天下平為治者誠能立為教條布之民間使其必遵之而行否則治其罪積之以嵗月而治平之緒可成矣以上少事長之禮易家人初九間有家悔亡象曰間有家志未變也程頤曰初家道之始也間謂防間法度也治其有家之始能以法度為之防間則不至於悔矣茍不間之以法度則人情流放必至於有悔失長幼之序亂男女之别傷恩義害倫理無所不至能以法度間之於始則無是矣臣按程氏所謂間之之法度是即禮也先儒謂禮始於謹夫婦為宫室辨內外男位乎外女位乎內男不入女不出所以間有家也所以謹始也吁謹其始於男女心志未變動之初則豈復有傷恩敗倫之事哉曲禮曰男女不雜坐不同椸音移枷置衣服之具不同巾涗潔者櫛理髮者不親受鄭玄曰皆為重别防淫陳澔曰此四者所以逺私褻之嫌外言不入於梱門限也內言不出於梱孔穎達曰男職在官政女職在織紝各有限域不得濫預女子許嫁纓非有大故不入其門姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食陳澔曰許嫁則繫以纓示有所繫屬也此與幼所佩香纓不同劉彞曰家人內政不嚴以防之於細微之初不剛以正之於未然之始則其悔咎不可逭矣易曰間有家志未變也男女之志既為情邪之所變間禁雖嚴求其無咎而咎可無哉故夫婦未七十雖同藏未有可嫌也聖人制禮必爾者以無嫌正有嫌也用有情之難正無情之易也而况於男女未有室家哉女子許嫁纓所以繫屬其心以著誠於夫氏起其孝義也既許嫁則有姆教之處於梱門之别室男子非有疾憂之故不入其門也男女異長鄭玄曰男女各自為伯季也內則曰男不言內女不言外非祭非喪不相授器其相授則女受以篚其無篚則皆坐跪也奠之而後取之陳澔曰男正位乎外不當於外而言內庭之事女正位乎內不當於內而言梱外之事惟喪祭二事乃得以器相授受者以祭為嚴肅之地喪當急遽之時乃無他嫌也非此二者則女必執篚使授者置之篚中也授者跪而置諸地則受者亦就地而跪以取之也外內不共井不共湢浴室浴不通寢席不通乞假男女不通衣裳內言不出外言不入男子入內不嘯不指夜行以燭無燭則止女子出門必擁猶障也蔽其面夜行以燭無燭則止道路男子由右女子由左劉彞曰外內不共井嫌同汲也不共湢浴嫌相褻也不通寢席嫌相親也不通乞假嫌往來也不通衣裳嫌淆雜也內言不出惡交於外也外言不入惡交於內也禮當入內嘯則涉乎異也指則涉乎覘也有燭則行夜有不可得而已也無燭則止行則涉於不明也道路之法其右以行男子其左以行女子古之道也禮始於謹夫婦為宫室辨外內男子居外女子居內深宫固門男不入女不出陳澔曰夫婦為人倫之始不謹則亂其倫類方慤曰天下之本在國國之本在家故禮始於謹夫婦謹夫婦故為宫室以居之辨外內以防之男子居外女子居內隂陽之分也深宫則外人不得而入固門則強者不得而啓春秋左傳君子曰婦人送迎不出門見兄弟不踰閾臣按易曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦蓋太極動而生陽靜而生隂隂陽之氣凝而成人乾道成男坤道成女男陽而女隂男陽而配合女之隂則為夫婦由是而生父子由是而成君臣由是而敘為尊卑上下親疏之分此禮義所由以錯也是以人君為治必以正家為本而家之所以正者統系明內外辨秩然有其禮也禮始於謹夫婦夫婦之謹在於正男女之位而分别之人君既正身修德以間其有家又必命官惇典庸禮以敷德教於天下使天下之人曉然知大防之所在男盡男之禮女盡女之禮各夫其夫各婦其婦以是成孝敬厚人倫美教化移風俗則治平之基於是乎立矣三代之盛率循是道漢唐以來治雜於霸陋習相承而不知其非宋世雖稱尚文然藩服郡邑皆置營妓而名為士大夫者亦蓄歌姬時或出以娛賔而人家所謂養娘者又皆立契典雇逮于我朝痛革前弊立為官吏宿娼之律士夫一有犯焉終身不齒宋朝視我有愧多矣昔漢承秦人苛刻之後一切反其所為然路溫舒猶謂秦有十失其一尚存今元之弊政汙習固己泛掃無餘矣然猶不免有一之尚存者男女之無别也今燕趙齊晉之域古所謂中州也自古聖帝明王大賢君子過化存神之地禮義亷耻所自出也而今閭閻之下貧下之家內外尚無限隔乃至男女同炕而寢夫婦以名相呼翁婦嫂叔之不相回避繼父繼母之子女相為昏配諸如此類者尚或有之乞敕令有司痛加禁約一洗前朝之陋習以昭盛代之文明毋使片翳寸纇以為大朝之玷以上人家男女有别之禮斯干之詩曰乃生男子載寢之牀載衣之裳載㺯之璋半圭也其泣喤喤大聲也朱熹曰寢之於牀尊之也衣之以裳服之盛也弄之以璋尚其德也又曰乃生女子載寢之地載衣之裼褓也載㺯之瓦紡磚無非無儀善也唯酒食是議無父母詒罹憂也朱熹曰寢之於地卑之也衣之以褓即其用而無加也弄之以瓦習其所有事也有非非婦人也有善非婦人也蓋女子以順為正無非足矣有善則亦非其吉祥可願之事也唯酒食是議而無遺父母之憂則可矣內則曰子生男子設弧弓也於門左女子設帨佩巾也於門右三日始負抱也子男射女否方慤曰設弧於門左左者天道所尊設帨於門右右者地道所尊必曰設者方男女之生其於弧帨有可用之道而未能有用之實也古之人重男女之生又重男女之别非特見於弧帨而已男則寢於牀之尊女則寢於地之卑其衣之也男以晝服之裳女以夜服之裼其弄之也男以所有事之璋女以所有事之瓦凡接子擇日庶人特豚士特豕大夫少牢其非冢子則皆降一等鄭玄曰凡接子雖三日之內尊卑必皆選其吉焉輔廣曰父子之氣未嘗不相接也生三日而又以禮接之於是為至吳澄曰庶人長子止用特豚禮窮於此無復可降故庶子亦用特臣按今世人家生子三日而會親姻亦古人接子之意異為孺子室於宫中擇於諸母與可者必求其寬裕慈惠溫良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不往大夫之子有食母乳母也士之妻自養其子鄭玄曰異為孺子室者特掃一處以處之諸母衆妾也子師教以善道者慈母知其嗜欲者保母安其居處者士妻自乳之而已他人無事不往為兒精意微弱將驚動也孔頴達曰此文雖據諸侯其實亦兼大夫士但士不具三母耳司馬光曰凡子始生必為之求乳母必擇良家婦人稍溫謹者方慤曰雖非諸母而其德如下所言可以為師者亦擇之故曰與可者三月之末擇日剪髮為鬌音朵男角夾囱留兩髻女羈頂上留三髻否則男左女右是日也妻以子見於父父執子之右手咳父作咳聲而名之咳小兒笑聲謂父作咳聲而名之輔廣曰男女初生羈角左右其辨也如此則知男女之别無非自然之理豈特以末流之害然後制禮以别之耶凡名子不以日月不以國國號不以隱疾大夫士之子不敢與世子同名鄭玄曰此在常語之中為後難諱也王子墨曰名子父之責也命之名所以示之教也陳澔曰常語易及則避諱為難故名子者不之用臣按禮謂大夫士之子不敢與世子同名則祖宗之廟諱尤當謹避可知矣為臣子者不可諉以二名不偏諱而故犯之也左傳桓公六年申繻曰名有五有信有義有象有假有類以名生為信若唐叔虞魯公子友以德命為義若文王名昌武王名發以類命為象若孔子首象尼丘取於物為假若伯魚生有饋之魚名曰鯉取於父為類若子同生有與父同者不以國不以官不以山川不以隱疾不以畜牲不以器幣臣按禮所禁名字者止於不以國不以隱疾而申繻則於國隱疾之外則又加以不以官不以山川不以畜牲不以器幣而終之曰周人以諱事神名終將諱之蓋尤嚴於祭享之時恐名有犯於官則官職為之廢有犯於山川則主祀為之廢與夫犯於畜牲器幣則行禮讀祝之時難於避諱也家禮曰主人生嫡長子則滿月而見主人立於香卓之前告曰某之婦某氏以某月某日生子名某敢見告畢立於香卓東南西向主婦抱子進立於兩階之間再拜主人乃降復位臣按此古者人家生子之禮臣嘗櫽括文公家禮以為儀注前一日齋宿其日夙興陳設如常儀主人以下各具盛服詣祠堂前男列於左女列於右世為一列各盥洗啓櫝訖主人詣香案前焚香酹酒再拜以降神衆參神行四拜禮主人斟酒主婦點茶訖主人跪告辭云云俯伏興主婦抱子立兩階間四拜然後衆辭神行四拜禮禮畢奉主入櫝生長子則用此儀次子則稍殺之以上人家生子之禮以上家鄉之禮上之上大學衍義補卷四十九
