body:
  text: 大學衍義補卷三十一明丘濬撰治國平天下之要制國用傅算之籍孟子曰有力役之征朱熹曰征賦之法歲有常數力役取之于冬臣按孟子此章舉布縷粟米與力役並言而皆謂之征征也者上取于下之名也布縷粟米專取其物而力役之征蓋兼乎人力也小司徒之職稽國中及四郊都鄙之夫家九比之數冢宰職出九賦者之人數以辨别也其貴賤老幼廢疾凡征役之施讀為弛舍賈公彥曰司徒是主土地之官故亦兼主采地之法辨其貴賤老幼廢疾者謂别其貴賤老幼廢疾合科役者科役之征謂稅之役謂繇役施舍者貴與老幼廢疾者不科役故言弛也吳澄曰夫謂上地中地下地皆一㕓舉其凡也家謂上地七人中地六人下地五人别其目也乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡饒也吳澄曰一家男女七人以上授之以上地所養者衆也五人以下授之以下地所養者寡也止以七人六人五人為率者有夫有婦然後為家也可任謂丁彊任力役之事者餘則為老弱也鄉大夫以歲時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之給公上也其舍者國中貴者賢者能者服公事者老者疾者皆舍以歲時入其書作文書入于司徒吳澄曰國中城郭中也晚賦稅而早免之以其所居復多役少也野則早賦稅而晚免之以其復少役多也征之者給公上之事也舍者謂有復除而不收役事也遂大夫以歲時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者章氏失其名曰三代役法莫詳于周周禮伍兩軍師之法此兵役也師田追胥之法此徒役也府史胥徒之有其人此胥役也比閭族黨之相保此鄉役也有司徒焉則因地之美惡而均役有族師焉則校民之衆寡以起役有鄉大夫焉則辨民之老少以從役有均人焉則論歲之豐凶以行復役之法臣按凡有天下國家者不能不役乎民然役有輕重繁簡逺邇久速之殊民有老少强弱富貧貴賤之異不可以一槩論也是以成周之世欲役乎民必先均其土地以别其寬狹磽腴必稽其人民以知其多寡虛實必量其人身以知其强弱老少必驗其畜産以知其貧富有無必有夫有婦然後謂之一家必年富力强然後謂之可任彼夫貴而有爵者賢而有德者能而有才者服事于公與衰耄之老篤廢之疾皆不可任以繇役之事所以任夫繇役者皆必少壯之夫平日習勞丁多而家給者也夫民食三土而賴官府之庇以有其室家田産則服力役以為國衛足國用成國事亦其職分之所當為者也用所當用之人為所當為之事雖曰為國亦所以為民而又明以察之公以處之仁以憫之是以國家有所經營則咸如子趨父事有所征伐則莫不敵王所愾而上無不成之事下有衛上之忠而天位永安國祚延長矣載師凡民無職事者出夫家之征張載曰夫家之征疑無過家一人者謂之夫餘夫竭作或三人或二人或二家五人謂之家吳澄曰民無職事謂游惰者也游惰則罰之使出一家力役之征力役之征謂出士徒車輦以給繇役者也閭師凡無職者出夫布馬端臨曰古人于游惰不耕及商賈末作之人皆于常法之外别立法以抑之間民或出夫布或并出夫家之征夫布其常也并出夫家所以抑之也夫家解當如橫渠之說鄭注謂令出一夫百畝之稅則無田而所征與受田者等不幾於太酷乎臣按民之無職者既不受田乃使之出一家一夫之征彼將何從而得乎聖人為此制所以抑游惰而使之趨南畝也當是之時民之無田者蓋鮮矣間有無田者而亦不免供有田之賦但比之有田者為輕爾後世口賦之算不問有田無田皆出賦與古異矣均人掌均人民牛馬車輦之力政讀為征凡均力政以嵗上下豐年則公旬均也用三日焉中年則公旬用二日焉無年則公旬用一日焉鄭𤣥曰人民則治城郭涂巷溝渠牛馬車輦則轉運委積之屬臣按力征即孟子所謂力役之征也力役之征有專用人力為者造作修治之屬也有兼資物力成者輦運挽輸之類也均人掌均力征必先審民家之丁中或寡或多其家之牛馬車輦或有或無因其材而任以事隨所宜而加之役用其所有而不强其所無此民之役所以易供而國之事所以易成也然用民之力豐年不過三日歉年僅用一日而已而不豐不歉之年則又惟用二日焉一歲之間三百有六旬上之人僅用其民三日之力其三百五十有七日皆民之所自有也民安得不安富國安得不清泰哉司民掌登萬民之數自生齒以上皆書於版辨其國中與其都鄙及其郊野異其男女歲登上也下落也其死生及三年大比以萬民之數詔司冦司冦及孟冬祀司民之日獻其數於王徐幹曰民數為國之本也先王周知其萬民衆寡之數乃分九職焉九職既分則劬勞者可見勤惰者可聞而事役不均者未之有也事役既均故上盡其心而人竭其力而庶功不興者未之有也庶功既興故國家殷富大小不匱百姓休和下無怨疾而治不平者未之有也周禮獻民數於王王拜受之登于天府其重之也如此今之為政者未之知恤也是以先王致六鄉六遂之法所以維持其民而為之綱目也使其鄰此相保愛賞罰相延及故出入存亡臧否逆順可得而知也及亂君之為政也户口漏于國版夫家脫於聫伍避役逋逃者有之于是姦心競生僞端竝作小則竊濫大則攻劫嚴刑峻令不能救也民數者庶事之所自出也莫不取正焉以分田里以令貢賦以造器用以制祿食以起田役以作軍旅國以建典家以立度五禮用修五刑用措其惟審民數乎臣按所謂版者即前代之黃籍今世之黃册也周時惟書男女之姓名年齒後世則凡民家之所有丁口事産皆書焉非但民之數而已也我朝每十年一大造其册首著户籍若軍民匠竈之屬次書其丁口成丁不成丁次田地分官民等則例房屋牛隻凡例有四曰舊管曰開除曰新收曰實在今日之舊管即前造之實在也每里一百一十户十户一甲十甲一里里有長轄民户十輪年應役十年而周周則更大造民以此定其籍貫官按此以為科差誠有如徐氏所謂庶事之所從出而取正焉者也版籍既定户口之或多或寡物力之或有或無披閲之頃一目可盡官府遇有科差按籍而注之無不當而均矣然民僞日滋吏弊多端茍非攢造之初立法詳盡委任得人則不能禁革其脫漏詭寄飛走那移之弊請當大造之年户部定為則例頒行天下凡所造之册必須縣册詳于府府册詳于布政司司册詳于進呈者其縣册當如諸司職掌所載凡各州縣田土必須開具各户若干及條段四至于實在下則書曰坐落某里于新收下則書曰某年買某里某人户下田明開畝段價值界至其開除者則止書曰某年賣與某里某人府册止書地名司冊及進呈者則否如此則官府科差有所稽考得以驗其貧富民間爭訟有所質證得以知其虛實遇有旱潦有所優免不至于混而無别矣秦用商鞅之法月為更卒已復為正一歲屯戍一歲力役三十倍于古漢興循而未改臣按更卒謂給郡縣一月而更者正卒謂給中都官者也漢高祖四年初為算賦賦錢人百二十為一算馬端臨曰古之治民者有田則稅之有身則役之未有稅其身者也漢法民年十五而算出口賦至五十六歲而除二十而傅給繇役亦五十六而除是稅之且役之也臣按後世户口之賦始此蓋古者有田則有稅有身則有役稅出財役出力惟游惰無職事者則抑之俾視夫家出征稅焉非有所利之也自漢計口出算之後則凡為民者有身則有庸力役之外計口出財遂為後世定制景帝二年男子年二十始傅臣按傅著也言著名籍以給公家繇役也漢制民年二十二始傅五十六乃免至是景帝更為異制令男二十始傅則是民之一生供繇役出口賦凡三十有六年也齊髙祖詔朝臣曰黃籍人之大紀國之理端自頃民僞已久乃至竊注爵位盜易年月或户存而文書已絶或人在而反記死叛停私而去𨽻役身强而稱有疾皆政之巨蠧教之深疵比年雖却改籍書終無得實若約之以刑則人僞已逺若綏之以德又未易可懲諸賢並深明理體各獻嘉謀以何科算能革斯弊臣按册籍之弊古今一律國初洪武五年户部發下户由以定民籍十四年始大造自是以來每十年一攢造民年十五為成丁未及十五為未成丁官府按册以定科差脫漏户口者有禁變亂版籍者有刑凡有科徴差役率驗其户口田産立為等第敷役者不得差貧賣富受役者不得避重就輕其制度可謂詳盡矣然嵗久弊生非止一端固非一二日禁革所能盡亦非一二人智慮所能周也請自今遇大造之年先期敇户部移文天下司府州縣俾其詳詢博采積年病弊何在各處事宜何如一一條上户部户部臣僚將所條具者講究處置以聞定為則例頒行天下如齊髙祖詔所謂各獻嘉謀以何算而革弊焉者如此則宿弊既革版籍頓清非獨官府之科差適均而民間之詞訟亦息矣唐令以百户為里五里為鄉每里設正一人掌案此户口課植農桑撿察非違催驅賦役在邑居者為坊别置坊正在田野居者為村别置村正臣按周禮六鄉有比長閭胥之屬六遂有里宰酇長之名唐人里正坊正村正之設蓋本諸此今制每一里百户立十長長轄十户輪年應役十年而周當年者謂之見役輪當者謂之排年凡其一里之中一年之內所有追徴錢糧句攝公事與夫祭祀鬼神接應賔旅官府有所徴求民間有所爭鬬皆在見役者所司惟清理軍匠質證爭訟根捕逃亡挨究事由則通用排年里長焉此外又分為區以督賦稅謂之糧長蓋簽民之丁力相應者充之非輪年也惟糧多之處有之必須精擇其人不然非惟有虧于國課而又有擾于生民也唐制凡民始生為黃四歲為小十六為中二十一為丁六十為老凡里有手實法歲終具民之年與地之濶狹為鄉帳鄉成于縣縣成于州州成于户部又有計帳具來歲課役以報度支凡天下户口其資産升降定為九等三年一造户籍凡三本一留縣一留州一送户部代宗廣德二年敇天下户口委刺史縣令據見在實户量貧富等第科差不得依舊帳宣宗時詔州縣每縣據人貧富及役輕重作科差簿送刺史撿署訖鎖于令㕔每有役事委令據簿科差臣按天道十年一變十年之間人有死生家有興衰事力有消長物直有低昻蓋不能以一一齊也唐人户籍三年一造廣德之詔且欲守令據見在實户量貧富等第不得依舊帳籍况今十年一造十年之中貧者富富者貧地或易其主人或更其業豈能以一律齊哉今宜每年九月人民收穫之後里甲入役之先布政司委官一員督府州縣官造明年當應賦役之册先期行縣俾令各里開具本里人民軍民匠竈其籍各若干仕宦役占其户各若干其餘民户當應役者總有若干量其人丁事産分為九等一以黃册為主册中原報人丁有逃亡事故田地有沉斥買賣必須買者賣者兩户相照典當者不具審實造册州縣上之府府上之司委官親臨其地據其見在實有以田丁相配參錯斟酌定為九等則例隨據州縣一年該應之役幾何當費之財幾何某户當某役各填注其下輕而易者則一力獨當重而難者則合衆併力貧者任其力富者資其財必盡一年之用而無缺無餘造成三册一留司二發府州縣俾其前期開示以曉民使知備豫至期據册以召集使供繇役有不均者許其指告若夫非常有之事不時需之物則責之見役里甲云然州縣所在或在衝要或在迂僻衝要之所官物之運載使客之供應蓋無虛日而迂僻之鄉固有經年纍月而無一人過往者也民之勞逸不均莫此為甚請立為均一之法亦據此册通以一布政司之民丁計算不分有無役占但見一丁出錢一文或二三文多不過五文通收在官隨其縣分劇易道路逺近定為雇錢則例衝要縣分所收之錢留縣應用有所不足申文關領其迂僻去處量留足用之外具數報官年終類送上司以慿均敷其兩京之間運河之側州縣人民尤為勞苦若本司不足或通行他司有所餘者用以補之雖然人烟輳集去處固易于傭雇矣若夫偏鄉下邑無人可雇何如曰召農而役之與之傭直可也或曰近世均徭之法十年而一役民頗便之若用此法則均徭不可行歟曰均徭之法可行于江南不可行于江北可行于大縣不可行于小縣可行于大户不可行于貧民何也江北州縣民少而役多大縣民多可待十年而一役小縣民少役之三四年已有周之者矣大户産廣丁多産廣則出財易丁多則出力省若夫貧下之户以十年之役併用于一時豈易當哉竊嘗以九等之法與均徭之法計之譬如官有粟十石焉九等之法官使民日負一石十日而盡其十石也均徭之法官使民一日而負十石之粟日負一石者雖有往返之勞然輕而易舉也一日而負十石往返雖不煩然以一人一日而為十日十人之事雖强有力者固有所不堪矣况單弱者哉均徭之法十年而一役其間有九年之歇且足以革里長吏胥放富差貧之弊固為一時良法行之江南大縣固為民便但民多役少之處往往多有餘剩户編次者每用中下户而留上户俾出錢以為公用因而入已若夫小縣地濶民稀多設驛鋪去處不待十年已有遍二三次者矣必欲行之惟可以七八十里以上縣分及里分雖不多而差役頗少之處行之其餘三四十里者俟其行周而罷大抵均徭之法役民一年而罷若皂𨽻膳夫之類可也如倉斗必須支盡所收庫子數易則有抵換官物之弊鋪兵不居鋪舍則易于損壞此類可令當役之民出錢貼雇為宜唐租庸調法丁隨鄉所出歲輸絹二匹綾絁二丈布加五之一綿三兩麻三斤非蠶鄉則輸銀十四兩謂之調用人之力歲二十日閏加二日不役者日為絹三尺謂之庸有事而加役二十五日者免調三十日者租調皆免通正役不過五十日臣按唐人租庸調法皆論丁一年之間納租之外一丁出銀十四兩出力二十日今制賦稅一出于田役民之力一以黃冊為定分其人户為上中下三等各具軍民竈匠等籍排年里甲依次輪當之外其大小雜泛差徭各照所分之等不拘拘于一定之制遇事而用事已即休非若唐人民有常調役有定日也宋以衙前主官物以里正户長鄉書手課督賦稅以耆長弓手壯丁逐捕盜賊以承符人力手力散從官給使令縣曹司至押録州曹司至孔目官下至雜職虞候揀掐等人各以鄉户等第定差臣按宋初以來差役法也凡當役人户以等第出錢名免役錢其坊郭等第户及未成丁單丁女户寺觀品官之家舊無色役而出錢者名助役錢凡敷錢先視州若縣應用雇直多少隨户等均取雇直既已用足又率其數增取二分以備水旱缺闕雖增毋得過二分謂之免役寬剩錢臣按此宋熙寧免役法也其議始于韓絳成于王安石元祐初元司馬光言免役之法其害有五為今之計莫若降勑應免役錢並罷其諸色役人並依熙寧元年以前舊法章惇駁司馬光所更役法其略曰役法熙寧之初遽改免役後遂有弊今復為差役當議論盡善然後行之不宜遽改以貽後悔邵伯溫曰吳蜀之民以雇役為便秦晉之民以差役為便吕中曰司馬光主差役王安石主雇役二役輕重相等利害相半蓋嘗推原二法之故差役之法行民雖有供役之勞亦以為有田則有租有租則有役皆吾職分當為之事無所憾也其所可革者衙前之重役耳官物陷失勒之出官綱費用責之供農民之所不堪茍以衙前之役募而不差農民免任則民樂于差之法矣至雇役之法行民雖出役之直而闔門安坐可以為生生之計亦無怨也其可去者寬剩之過敷耳實費之用固所當出額外之需非所當誅茍以寬剩之數散而不斂則樂于雇之說矣因其利而去其害二役皆可行也臣按吕中謂二法利害相半因其利而去其害二役皆可行也臣竊以謂古今役民之法必兼用是二者然後行之不偏非特利害相半而已蓋實相資以為用也夫自古力役之征貧者出力富者出財各因其有餘而用之不足者不强也各隨其所能而任之不能者不强也彼有力者而無財吾則俾之出力財有不足者人助之彼有財者而無力吾則俾之出財力有不能者人代之若夫事巨而物重費多而道逺則必集衆力裒衆財使之運用而不至于頓躓資給而不至于困乏則民無或病事無不舉矣惟今差役之法有所謂里長甲首老人者即宋里正户長耆長也有所謂弓兵民壯者即宋弓手壯丁也有所謂皂𨽻禁子者即宋承符人力手力也有所謂稱子鋪户者即宋人揀掐也有所謂庫子斗級納户解户者即宋人衙前也宋之諸役衙前最重今之雜役亦惟納户解户斗級為難此二役者必須家道殷實丁口衆多平日有行檢者充之然後上不虧于官下不破其家也若夫皂𨽻之設除監獄守庫外凡直㕔守門跟隨者皆可用雇役之法而在兩京尤為切要今後各府州縣簽皂𨽻解京者于民間應役人户選其馴謹强健耐勞者以身供監獄守庫之役其餘跟隨導從者每户俾其日出銀三分以雇人代當歲該銀十兩八錢閏加其數歲前類解兵部分送各司俾其自雇凡豫其雇工之直須于按日當滿之後如當過正月則二月初一與之直則彼不至逃負如此則農夫遂耕穫之願官府得使令之給而亦可以收市井游手之徒一舉而三得也以上論傅算之籍臣按制國用者取民財以用之公也而此以役民之力附于國用之後者孟子論有布縷之征粟米之征而即繼之以力役之征者此也然舍孟子力役之征之言而取漢人傅民丁算口賦之籍就後世以為言以見計口用丁而因之以取資是亦制國用之一法也大學衍義補卷三十一
