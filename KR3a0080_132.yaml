body:
  text: 大學衍義補卷一百三十二明丘濬撰治國平天下之要嚴武備出師之律易師之彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣程頤曰能使衆人皆正可以王天下矣得衆心服從而歸正正道止於是也二以剛處中剛而得中道也六五之君為正應信任之專也雖行險道而以順動所謂義兵王者之師也夫師旅之興無不傷財害人毒害天下然而民心從之者以其義動也朱熹曰此以卦體釋師貞之義以謂能左右之也一陽在下之中而五隂皆為所以也能以衆正則王者之師矣剛中謂九二應謂六五應之行險謂行危道順謂順人心此非有老成之德者不能也毒害也師旅之興不无害於天下然以其有是才德是以民悅而從之也臣按王者之兵行一不義殺一不辜而得天下不為故惟能以衆正而後可以王也蓋兵凶戰危所謂險道也非正不興師非順不用衆是謂王者之師然而不免有殺戮之慘供需之費兵戎所至毒害隨之故興師動衆如用毒藥以攻病非眞有沈痼之疾癥瘕之癖決不可輕用也毒之一言易之垂戒深矣初六師出以律否臧凶象曰師出以律失律凶也程頤曰在邦國興師而言合義理則是以律法也謂以禁亂誅暴而動茍動不以義則雖善亦凶道也善謂克勝凶謂殃民害義也在行師而言律謂號令節制行師之道以號令節制為本所以統制於衆不以律則雖善亦凶使雖勝㨗猶凶道也制師無法幸而不敗且勝者時有之矣聖人之所戒也蓋師出當以律失律則凶雖幸而勝亦凶道也朱熹曰律法也否臧謂不善也在卦之初為師之始出師之道當謹其始以律則吉不臧則凶當謹始而守法也李過曰甘誓攻左攻右御非其馬之正牧誓正歩六歩七歩五伐六伐七伐皆不可亂周官司馬法坐作進退皆有常節魯侯撫師牛馬臣妾戒以勿逐以其亂部分後不可以為師也臣按律有二義有出師之律有行師之律出師之律當以正以義行師之律當有號令有節制六四師左次无咎象曰左次无咎未失常也程頤曰師之進以强勇也知不能進而退故左次左次退舍也量宜進退以所當也故无咎見可而進知難而退師之常也惟取其退之得宜不論其才之能否也度不能勝而班師以退愈於覆敗逺矣可進而退乃為咎也行師之道因時施宜故左次未必為失易之發此義以示後世其仁深矣臣按聖人作易恐人以退為怯故明當退而退退而无所失雖无功亦无咎也後世一切以文法從事而有行師逗遛之罰坐於廟堂之中逆料境外之事惟欲其功之成而不計其勢之可否臣竊以為帝王之師當出萬全有行師左次者當計其得失成敗而不論其進退遲速可也虞書帝曰咨禹惟時有苖弗率汝徂往也征禹乃㑹徵㑹也羣后誓戒也于師曰濟濟和整衆盛之貌有衆咸聽朕命蠢動也無知之貌兹有苖昏迷不恭侮慢自賢反道敗德君子在野小人在位民棄不保天降之咎肆予以爾衆士奉辭伐罪爾尚一乃心力其克有勲朱熹曰舜咨嗟言今天下惟是有苖之君不循教命汝往征之征正也往正其罪也禹㑹諸侯之師而戒誓以征討之意言苖民昏迷不敬侮慢於人妄自尊大反戾正道敗壞常德用舍顚倒民怨天怒故我以爾衆士奉帝之辭罰苖之罪爾衆士庶幾同心同力乃能有功此上禹誓衆之辭也臣按此人君征蠻夷誓衆之始先儒謂舜時薄海内外皆迪有功弗率惟有苖耳三苖之君舜嘗竄之三苖之民又嘗分之至此而尤弗率故征之蓋征之為言正也必其人有不正之罪然後人君奉天道以正之茍在我者有不正則亦無辭以正彼矣觀禹誓師所謂昏迷不恭侮慢自賢反道敗德君子在野小人在位民棄不保則三苖之君其所為不正甚矣帝舜奉天命以為華夷主坐視其不正而不有以正之則非天意失君道矣故命禹以往征之焉大扺人君一身率天下以正道使天下之人若内若外無間華夷惟吾正道之是循是遵茍有一人之弗循王道則必命其臣以正之使之咸歸於正道之中人君於是奉君之辭而聲其不正之罪以致伐焉然人非一人人各一心而趨向之不同膂力之不齊故又必誓之戒之欲其同心同力庶幾其功勲之有成也蓋心不一則敵愾之志不專力不一則擊刺之勇不決又安能以成功哉甘誓誓師于甘故以甘誓名大戰于甘地名乃召六卿六鄉之卿王曰嗟六事之人予誓告汝有扈氏威暴殄之也侮輕忽之也五行怠棄不用正朔三正子丑寅天用勦絶其命今予惟恭行天之罰左車左不攻治也于左汝不恭命右車右不攻于右汝不恭命御非其馬之正汝不恭命用命賞于祖不用命戮殺也于社予則孥戮汝蔡沈曰誓與禹征苖之誓同義言其討叛伐罪之意嚴其坐作進退之節所以一衆志而起其怠也有扈夏同姓之國史記曰啓立有扈不服遂滅之有扈氏暴殄天物輕忽不敬廢棄正朔虐下背上獲罪于天天用勦絶其命今我伐之惟敬行天之罰而已左車左右車右也古者車戰之法甲士三人一居左以主射一居右以主擊刺御者居中以主馬之馳驅也御非其馬之正猶王良所謂詭遇也蓋左右不治其事與御非其馬之正皆足以致敗故各指其人以責其事而欲其各盡其職而不敢忽也禮天子親征必載其遷廟之主與其社主以行以示賞戮之不敢專也祖左陽也故賞于祖社右隂也故戮于社孥戮言不用命不但戮及汝身將併汝妻子而戮之戰危事也不重其法則無以整肅其衆而使赴功也臣按先儒謂甘誓一篇僅八十字而其間六軍之制車乘之法邦國賞刑之典誓師之辭靡不明備葢古人之學精粗本末不廢啓雖承禹傳道之後而干戈行陳之事亦曾從家學素講明來臣竊以此篇合禹征苖之辭而觀之啓所以數有扈之罪者無以異於禹之於苖也然誓之中皆必以天為言禹之於苖謂天降之咎今啓於有扈亦謂天用勦絶其命可見古之帝王所以興師問罪皆因其得罪於天而奉天討以正之也苖惟昏迷不恭所以來徂征之師有扈之侮慢怠棄即苖之不恭也禹奉辭於帝以征苖啓恭行天罰以征有扈夫征者正也人之不恭故正之茍在己有不恭與夫左右從事之人不恭命焉則己不正矣又何以正人哉故一篇之中拳拳以恭為言用命而賞賞其恭也不用命而戮戮其不恭也賞與戮不敢自專必行之於祖與社皆所以致其恭者也恭者敬之别名乃帝王相傳之心法啓之恭即禹之祗承禹之祗承即舜之恭已堯之欽明也事有常變而恭敬之心則無往而不存焉大哉恭乎其行師之本乎𦙍征惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍后承王命徂征告于衆曰嗟予有衆惟時羲和顚覆厥德沈亂于酒畔官離次俶始也擾亂也天紀遐逺也棄厥司所司之事今予以爾有衆奉將行也天罰爾衆士同力王室尚弼予欽承天子威命火炎崐山名岡山瘠也玉石俱焚天吏逸過也德烈于猛火殲厥渠大也魁脅從罔治舊染汙俗咸與維新嗚呼威克厥愛允濟愛克厥威允罔功其爾衆士懋戒哉蔡沈曰仲康始即位即命𦙍侯以掌六師畔官則亂其所治之職離次則舍其所居之位天紀即洪範所謂歳月日星辰厯數是也又言火炎崐岡不辨玉石之美惡而焚之茍為天吏而有過逸之德不擇人之善惡而戮之其害有甚于猛火不辨玉石也今我但誅首惡之魁而已脅從之黨則罔治之舊染汙習之人亦皆赦而新之威者嚴明之謂愛者姑息之謂記曰軍旅主威蓋軍法不可以不嚴嚴明勝則信其事之必濟姑息勝則信其功之無成誓師之末而復嗟歎以是深警之欲其勉力戒懼而用命也臣按蔡氏謂天子討而不伐諸侯罰而不討仲康之命𦙍侯得天子討罪之權𦙍侯之征羲和得諸侯敵愾之義其辭直其義明非若五覇樓諸侯以伐諸侯其辭曲其義迂也臣竊以謂篇中所謂火炎崐岡玉石俱焚可以為萬世濫殺不分者之戒殱厥渠魁脅從罔治可以為萬世誅惡宥善者之法威克厥愛允濟愛克厥威允罔功可以為萬世行師姑息者之戒湯誓王曰王曰者史臣追述之稱格至也爾衆庶悉聽朕言又曰爾尚輔予一人致天之罰予其大賚賜與也汝爾無不信朕不食言言已出而反吞之爾不從誓言予則孥戮汝罔有攸赦臣按誓者臨衆發命述其所以興師之辭用之以作士氣一人心自禹征苖有誓之後啓征有扈則有誓𦙍侯征羲和則有誓至是湯之伐桀亦有誓焉先儒謂禹之征苖也曰爾尚一乃心力其克有勲至啓則曰用命賞于祖不用命戮于社予則孥戮汝至湯又益以朕不食言罔有攸赦可以觀世變矣泰誓王曰追稱之嗟我友邦親之也冢君尊之也越及也我御事治事者庶士衆士也明聽誓予小子夙夜祗懼受命文考類于上帝宜祭社名于冢土大社以爾有衆底致也天之罰蔡沈曰告以伐商之意且欲其聽之審也言予小子告于天神地祗以爾有衆致天之罰於商也王制曰天子將出類乎上帝宜乎社造乎禰受命文考即造乎禰也王制以神尊卑為序此先言受命文考以伐紂之舉天本命之文王武王特禀文王之命以卒其伐功而已臣按泰誓所謂友邦冢君御事庶士明聽誓以征伐之意告諸人也受命文考類上帝宜冢土以征伐之意告于神也人君舉事必上承天意下順人心誓于臣民而無疑質之神明而無愧然後興師動衆是為王者之師不然徒以土地之故意氣之間恃强以陵弱倚衆以暴寡言於人則强為之辭告於神則曲為之禱是以人命而攄其貪殘忿怒之心人必不直之而神亦不之祐矣王曰嗚呼我西土君子天有顕道厥類惟彰樹德務滋除惡務本肆予小子誕以爾衆士殄殲乃讎爾衆士其尚迪蹈也果毅以登成也乃辟功多有厚賞不迪有顯戮蔡沈曰天有至顯之理其義類甚明至顯之理即典常之理也植德則務其滋長去惡則務絶根本兩句古語喻衆惡之本在所當去故我小子大以爾衆士而殄絶殲滅汝之世讎也殺敵為果致果為毅爾衆士其庶幾蹈行果毅以成汝君若功多則有厚賞非特一爵一級而已不迪果毅則有顯戮謂之顯戮則必肆諸市朝以示衆庶臣按人君出師以作士氣一衆心者不過賞罰二者而已啓誓師於甘曰用命賞于祖不用命戮於社而武王伐商其所以申命有衆亦曰功多有厚賞不迪有顯戮是即甘誓之意也然甘誓以用命不用命為言泰誓則以迪不迪為言蓋惟用命則能迪果毅以有功賞不用命則不能迪果毅以致顯戮其言互相發也牧誓今予發惟恭行天之罰今日之事不愆過也于六歩進趨七歩乃止齊齊整焉夫子朂勉也哉不愆于四伐擊刺五伐六伐七伐乃止齊焉朂哉夫子蔡沈曰今日之戰不過六歩七歩乃止而齊此告之以坐作進退之法所以戒其輕進也少不下四五多不過六七乃止而齊此告之以攻殺擊刺之法所以戒其貪殺也上言夫子朂哉此言朂哉夫子者反覆成文以致其丁寜勸勉之意吕祖謙曰大司馬之法伍兩卒旅各有其長使止齊之者使其部伍之長各自止其止各自齊其齊故當戰時井然有序不失紀律三軍如一人臣按後世戰法之見於經者始於此先儒謂六歩七歩足法也六伐七伐手法也列陳進戰之時所以坐作進退者足也足以行止於六七歩焉所以戒其輕進也所以攻殺擊刺者手也手之伐止於六七伐焉所以戒其貪殺也蓋王者之師聲罪致討理直而氣壯不慮其不勇惟慮其過於勇耳武王之誓師不勸其進而戒之止而其所以止者皆必要其整肅齊一焉此王者之師所以不急於成功而亦不至於敗北其與後世之師進之惟恐不速殺之惟恐不多一敗即至於潰散也異矣尚桓桓威武貌如虎如貔執夷也如熊如羆于商郊弗迓迎也克奔以役西土朂哉夫子爾所弗朂其于爾躬有戮蔡沈曰欲將士如四獸之猛而奮擊于商郊也能奔來降者勿迎擊之以勞役我西土之人此勉其武勇而戒其殺降也弗朂謂不勉於前三者此篇嚴肅而温厚與湯誥誓相表裏真聖人之言也臣按先儒謂用兵以制節為尚以武勇為主武王慮其或拘故喻以虎貔之勇又慮其過於勇而妄殺故以殺降為戒其篇終所謂弗朂者即申前所言之三朂哉也一朂其勿輕進再朂其勿貪殺三朂其尚武勇而勿殺降出師臨戰而能勉於此三者是則所謂節制之兵也是惟不戰戰則必勝雖不勝亦不敗矣武王於此丁寜反覆呼其人而致其勉然猶恐其聼信之不專也故其終也又示以有戮之戒蓋軍士主嚴不嚴則號令不立也嗚呼此其所以為王者之師歟武成丁未祀于周廟邦甸侯衛駿速也奔走執豆木豆籩竹豆越三日庚戌柴望大告武成蔡沈曰周廟周祖廟也武王以克商之事祭告祖廟近而邦甸逺而候衛皆駿奔走執事以助祭祀既告祖廟燔柴祭天望祀山川以告武功之成由近而逺由親而尊也臣按此武功成告祖及天之禮先祖後郊者鄭氏謂其自近始蔡氏以為由親而尊臣竊以謂武王伐商受命於文考及其成功也先告焉因告文考遂及七世之廟故又三日然後以所以成文考之志者告天焉蓋武王成文考之志而文考又所以成天之志也豈以逺近為先後哉底至也商之罪告于皇天后土所過名山大川曰惟有道曾孫周王發將有大正于商惟爾有神尚克相予以濟兆民無作神羞蔡沈曰后土社也周禮大祝云王過大山川則用事焉孔氏曰名山為華大川謂河曰者舉武王告神之語有道指其父祖而言臣按王者之師代天致罰非其人得罪於天天理所不容人情所不堪必不輕易以動衆也其始也必以其人所積之惡所犯之罪以告于皇天后土軍旅所至之地所經過之山川皆必致吾所以興師及彼不可不討之意以告于神明茍揆之理反諸身而有一毫利己之私一念忿人之意不合于天不順于人決不敢輕舉焉孟子曰征者正也己必正而後可以正人未有己不正而能正人者也不正之事言之人且不可況神乎神所不可聞者人決不可為也一己為之且不可況役使千萬人而為之乎詩序常武穆公美宣王也有常德以立武事因以為戒然其首章曰赫赫明明王命卿士南仲大祖大師皇父整我六師以脩我宣王自我戎兵器也既敬既戒惠此南國朱熹曰宣王自將以伐淮北之夷詩人作此以美之其四章曰王奮厥武如震如怒進鼔而進之厥虎臣闞奮怒貌如虓虎之自怒虎鋪布也敦厚也淮濆仍就也執醜虜截不可犯之貌彼淮浦王師之所輔廣曰言王師在淮浦之上有截然不可犯之勇也臣按先儒謂此言王師至徐布陳而制勝也其五章曰王旅嘽嘽衆盛貌如飛如翰羽也如江如漢如山之苞本也如川之流緜緜翼翼不測不克濯大也征徐國朱熹曰如飛如翰疾也如江如漢衆也如山不可動也如川不可禦也緜緜不可絶也翼翼不可亂也不測不可知也不克不可勝也臣按先儒此極言王師之無敵如此其卒章曰王猶道也允信也塞實也徐方既來徐方既同天子之功四方既平徐方來庭朝也徐方不囘違也王曰還歸班師而歸臣按詩篇之名多以章首二字惟此篇則以常武為名一篇之詩凡六章章八句並無所謂常武二字也以此名篇蓋特立名義序所謂因常德以立武事是以始言敬戒終言允塞是則所謂立常德也其間所謂整六師奮厥武進虎臣執醜虜疾而栗衆而盛其静也則不可動其强也則不可禦緜緜然而相續翼翼然而整肅有不可測度之神有不可勝當之勇乃一舉而致徐方之來同同者上下内外咸服而無二心也由一方而致四方之來庭庭者四夷八蠻朝㑹而無間也若是者雖曰奮武立功人君之常德然至于四方來庭則亦非常之武矣左傳僖公二十八年晉侯文公獻楚俘于王周襄王駟介馬被甲者百乘徒兵千鄭伯傅相也王用平禮也己酉王享醴命晉侯宥助以玉帛王命尹氏及王子虎内史叔興父策命晉侯為侯伯九命作伯賜之大輅之服戎輅之服彤赤色弓一彤矢百玈黒色弓矢千秬黒黍鬯香草一卣中尊虎賁三百人曰王謂叔父敬服王命以綏四國糾逖遠也王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受策以出出入三覲臣按此古人獻俘策命之禮見於春秋者晉侯城濮之戰振旅振整行列愷樂歌也以入於晉獻俘獻所俘獲授數也馘所截耳飲至飲酒告至于廟大賞大行賞徵會召諸侯為㑹討貳討有貳心者殺舟之僑濟河先歸者以徇于國民于是大服君子謂文公其能刑矣三罪而民服三罪謂上文殺顛頡爇負羈祁暪姦命及舟之僑也詩云恵此中國以綏四方不失賞刑之謂也二十八年臣按此雖春秋時事而亦可見三代振旅凱還之遺制定公四年衛祝佗子魚曰君以軍行祓社釁鼓祝奉以從杜預曰師出先事祓禱於社謂之宜社於是乎殺牲以血塗鼔鼙為釁鼓臣按古禮天子親征祝必奉廟主社主從軍而行有功則賞于廟主前不用命則戮于社主前示不專也論語子路曰子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也朱熹曰萬二千五百人為軍大國三軍子路見孔子獨美顔淵自負其勇意夫子若行三軍必與己同暴虎徒摶馮河徒渉懼謂敬其事成謂成其謀言此皆以抑其勇而教之然行師之要實不外此又曰三軍要勇行三軍者要謀既好謀然須要成事人固有好謀而事有不成者却亦不濟事好謀而成既謀了須是果決去做敎成若徒謀而不成何益於事所謂作舍道旁三年不成者也臨事而懼是臨那事時又須審一審蓋閒時已是思量都是了都曉得了到臨事時又更審一審黄幹曰臨事而敬懼則有持重謹畏之心好謀而圖成則有用悉萬全之計敬其事而無忽心無惰氣臨事必能戒懼非懦怯而恐懼也成其謀則不妄動不亟取於事必有一定之謀既成而不愆於素自無僥倖速成之弊也無非抑其血氣之勇而教之以義理之勇焉臣按孔子所謂臨事而懼好謀而成之二言者萬世行軍制勝之要法也後世兵書所謂四部七書千言萬語其方法籌策雖非一途之可盡一端之能畢然其大要皆不外乎吾夫子此二言焉漢武帝時李廣與程不識俱以將兵有名當時廣行無部伍行陳就善水草舎止人人自便不擊刁斗自衛幕府省約文書然亦逺斥候未嘗遇害不識正部曲行伍營陳擊刁斗士吏治軍簿至明軍不得休息然亦未嘗遇害不識曰李廣雖極簡易然虜卒犯之無以禁也我軍雖煩擾然虜亦不得犯我司馬光曰易曰師出以律否臧凶言治衆而不用法無不凶也李廣之將使人人自便以廣之才如此焉可也然不可以為法何則其繼者難也況與之並時而為將乎夫小人之情樂於安肆而昩於近禍彼既以程不識為煩擾而樂於從廣且將仇其上而不服然則簡易之害非徒廣軍無以禁虜之倉卒而已也故曰兵事以嚴終為將者亦嚴而己矣然則傚程不識雖無功猶不敗傚李廣鮮不覆亡哉臣按程李二將出師之是非司馬光斷之當矣後世行師者要當以程不識為法而以李廣為戒宋歐陽脩言於仁宗曰攻人以謀不以力用兵鬬志不鬬多前代用兵之人多者常敗少者常勝王尋以百萬之兵遇光武九千人而敗是多者敗而少者勝也苻堅以百萬之兵遇東晉二三萬人而敗是多者敗而少者勝也曹操以三十萬青州兵大敗於吕布退而歸許復以二萬人破袁紹十二萬人是用兵多則敗少則勝之明騐也況於夷狄尤難以力争只可以計取李靖破突厥於定襄用三千人其後破頡利於隂山亦不過一萬蓋兵不在多能以計取爾故善用兵者以少為多不善者雖多而愈少也為今計者添兵則耗國減兵則破賊今沿邉之兵不下七八十萬可謂多矣然訓練不精又有老弱虛數則十人不當一人是七八十萬之兵不當七八萬人之用加又軍無綂制分散支離分多為寡兵法所忌此所謂不善用兵者雖多而愈少故常戰而常敗也臣願陛下赫然奮威敇厲諸將精加訓練去其老弱七八十萬中可得五十萬數古人用兵以一當百今既未能但得以一當十則五十萬精兵可當五百萬兵之用所謂善用兵者以少為多古人少而常勝者以此也臣按先儒謂世之為將者咸欲多兵而不知兵至三十萬難用矣前代以六十萬勝楚以四十萬勝秦惟王翦項籍二人而多多益辦者惟韓信能之自餘兵至三十萬未有得志者若趙括王尋苻堅之類其衆愈多其敗愈毒然猶有可諉者曰將不善也曹操可謂善將矣乃以水軍六十萬敗於烏林是時戰艦相接故為敵人所燒大衆屯聚故疫死者幾半豈非兵多為之累乎夫以漢祖之才不過能將十萬衆則軍六十萬當得如高祖者六人乃能將之高祖豈易得哉由是觀之則兵多適足為累爾況國家之粟帛有限生民之膏血有涯脩武備者惟在愼選將帥嚴立階級因其見有之人補其不足之數無事則簡閱之訓練之沙汰之使人人皆可用而無一人之不中用有事則約束之戒敇之申令之使事事皆合法而無一事之不如法縱不能如古人之兵以一而當十然一人有一人之用用一人是一人用千百人如一人既不虛吾之糧賞以致耗費又不閡吾之號令以致廢格所御乃所識所戰皆所教情意易以流通恩威易以周徧少而愈精多而益辦無敵於天下矣以上論出師之律大學衍義補卷一百三十二
