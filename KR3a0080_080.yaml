body:
  text: 大學衍義補卷八十明丘濬撰治國平天下之要崇教化崇師儒以重道周禮曰大宰以九兩繫邦國之民三曰師以賢得民四曰儒以道得民大司徒以本俗六安萬民四曰聫師儒葉時曰大宰繫民之九兩司徒安萬民之六俗而皆以師儒行乎其中誠以師道不立則天下無善人儒道不立則天下無正學臣按天下不可一日無師儒之功然師必以儒儒必以道然後可以立規矩於一時垂楷範於後世也彼異端衆技亦皆有師然師不以儒儒不以道豈足以繫天下之心而聮天下之俗哉此人君所以有志於三代之英而徯大道之行者莫不崇儒重道立為師表以正天下之人心以成天下之治化學記曰凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔於天子無北面所以尊師也陳澔曰嚴師如孝經嚴父之義謂尊禮嚴重之也無北面不處之以臣位也方慤曰嚴即尊也嚴師即雖詔於天子無北面是矣以一人之貴而師匹夫之賤以四海之富而師環堵之貧此嚴師所以為難也嚴師者人嚴之也人嚴其師則師道嚴矣師所以傳道故師嚴然後道尊學所以為道故道尊然後民知敬學以神言之故為尸則弗臣以道言之故為師則弗臣大戴禮武王踐阼召師尚父而問焉曰黄帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣王齊三日王端冕師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而東東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者㐫凡事不彊則枉弗敬則不正枉者滅廢敬者萬世王聞書之言惕若恐懼而為戒書於席之四端銘曰安樂必敬無行可悔一反一側亦不可不志殷監不逺視爾所代几銘曰皇皇惟敬口口生敬口生㖃口戕口鑑銘曰見爾前慮爾後盤銘曰與其溺於人也寧溺於淵溺於淵猶可游也溺於人不可捄也楹銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長牖銘曰隨天之時以地之財敬事皇天敬以先時劒銘曰帶之以為服動必行徳行徳則興倍徳則分朱熹曰周武王踐祚之初受師尚父丹書之戒曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者㐫退而於几席觴豆刀劒戶牖莫不銘焉今其遺語尚幸頗見於禮書願治之君志學之士皆不可以莫之考也臣按周武王之於師尚父欲有問焉則以師禮尊之而不敢處以臣位而師尚父知道之在已也亦不敢輕屈其道必以師道為尊忘其身之為臣而君之為君也君忘其身之為君以道在臣也臣忘其身之為臣以道在己也古之聖君其尊師者如此非尊其人也尊其道也以為不如是則不足以得其道不得其道則無以為治然不徒求之求之而得其言則又惕然恐懼而推演之以為銘焉用以朝夕警省欲其常接於目毎存乎心而將以施之天下國家而為子孫千萬世之貽謀也此無他予之者不輕受之者知重知所以重則不輕視之而兢兢業業惟恐不能保守而或失之也銘凡十有四今摘其辭語易知者如右孟子曰天下有達尊三爵一齒一徳一朝廷莫如爵鄉黨莫如齒輔世長民輔相世代君長人民莫如徳惡得有其一以慢其二哉朱熹曰達通也蓋通天下之所尊有此三者曽子之説蓋以徳言之也今齊王但有爵耳安得以此慢於齒徳乎又曰達尊之説達通也三者不相值則各伸其尊而無所屈一或相值則通視其重之所在而致隆焉故朝廷之上以伊周之忠聖耆老而祇奉嗣王左右孺子不敢以其齒徳加焉至論輔世長民之任則太甲成王固拜手稽首於伊周之前矣其迭為屈伸以致崇極之義不異於孟子之言也故曰通視其重之所在而致隆焉爵也齒也蓋有偶然而得之者是以其尊施於朝廷者則不及於鄉黨施於鄉黨者則不及於朝廷而人之敬之也亦或以貌而不以心惟徳得於心充於身行於家推於鄉黨而達於朝廷者也曽子曰彼以其富我以吾仁彼以其爵我以吾義子思曰事之云乎豈曰友之云乎孟子曰惡得有其一以慢其二師弟之間意見之相合固如此又曰故將大有為之君必有所不召之臣欲有謀焉則就之其尊徳樂道不如是不足與有為也故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸今天下地醜類也徳齊莫能相尚過也無他好臣其所教而不好臣其所受教程頤曰古之人必待人君致敬盡禮而後往者非欲自為尊大也為是故耳朱熹曰大有為之君大有作為非常之君也先從受學師之也後以為臣任之也所教謂聽從於己可役使者也所受教謂己之所從學者也又曰此章見賔師不以趨走承順為恭而以責難陳善為敬人君不以崇髙富貴為重而以貴徳尊士為賢則上下交而徳業成矣輔廣曰天地交而後萬物遂上下交而後徳業成此自然之理也世衰道微君不知下賢惟知恃勢以驕賢者下不知自重惟知自屈以諂時君上日驕而下日諂上下之情扞格而不接徳之與業渙散而無成天下日趨於亂而世俗猶以孟子為迂闊良可悲矣臣按道出於天徳得於人人人皆有初不以貴賤少長而有異也但所禀者有偏全所得者有先後故齒之長者先得之禀之厚者全得之我雖有之然或有所未盡故於其齒之長而得之全者尊敬之而不敢慢好樂之而不敢疎惟恐彼之不我親不我告而我終焉如此而已也夫然則吾擁是虗器於臣民之上則人將有負乗之譏彼其之刺何以成治功而保先王之基業而貽厥子孫之孫謀歟此古之帝王所以尊徳樂道而敬夫黄耇之老老成之賢必先學焉而後臣之也噫人君之尊徳樂道如此則凡得於聽聞觀感之下者孰不敬賢而重道哉以上尊敬師儒檀弓魯哀公誄孔丘曰天不遺耆老莫相予位焉嗚呼哀哉尼父鄭𤣥曰尼父者因其字以爲之諡也陸佃曰據左𫝊所録公誄之曰旻天不弔不憗遺一老俾屏余一人以在位不修春秋之辭也今記修之如此陳澔曰作諡者先列其生之實行謂之誄大聖之行豈容盡列但言天不留此老成而無有佐我之位者以寓其傷悼之意而已耳稱孔丘者君臣之辭臣按此後世追諡孔子之始盖孔子儒教之宗師所謂為天地立心為生民立命為往聖繼絶學為萬世開太平者也自哀公誄之之後後世帝王屢加褒崇尊其人所以尊其道也哀死者所以示生者也漢髙祖十二年上行自淮南還過魯以太牢祠孔子臣按髙祖不事詩書之主得天下之初其於他神不見有所尊敬而於孔子獨以太牢之禮祀焉盖孔子萬世帝王之師人心之有天理者自然為之起敬盖秉彛好徳之良心也漢四百年之治所以幾於三代者盖祀魯一太牢之效耳元帝時孔覇以帝師賜爵號褒成君奉孔子後臣按後世封孔子子孫俾奉其後者始此梅富上書于其君曰仲尼之廟不出闕里孔氏子孫不免編戶以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者以聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉平帝元始初追諡孔子曰褒成宣尼公追封孔均為褒成侯臣按此孔子諡宣之始光武建武五年幸魯使大司空祠孔子章帝元和二年東巡守過魯幸闕里以太牢祠孔子及七十二人作六代之樂大㑹孔氏男子二十以上者六十三人命儒者講論語帝謂孔僖曰今日之㑹於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乗辱臨敝里此乃崇禮先師増輝聖徳至於光榮非所敢承帝笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯損及孔氏男女錢帛臣按昔人有言古人建立學校未嘗不以祀禮為先也髙皇帝雖在倥傯猶能修其祀於過魯之日武帝興學校而獨未聞釋奠之禮焉明帝行鄉飲于學校祀聖師周公孔子初似未知所以獨崇宣聖之意至永平十五年幸孔子宅祠仲尼章帝安帝皆幸闕里祠孔子作六代之樂則所以崇文重道者至矣使當時儒學之臣能以古人釋奠之禮而推廣之則又何以加焉魏文帝黄初二年詔曰昔仲尼資大聖之才懐帝王之器當衰周之末無受命之運教化乎洙泗之上于時王公莫能用之乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌千載之後莫不宗其文以述作仰其聖以成謀咨可謂命世之大聖億載之師表者也遭天下大亂百祀墮壊舊居之廟毁而不修褒成之後絶而莫繼闕里不聞講頌之聲四時不覩蒸嘗之位斯豈所謂崇禮報功盛徳百世必祀者哉其以議郎孔羡為宗聖侯邑百戶奉孔子祀令魯郡修起舊廟置百戶吏卒以守衛之又於其外廣為室屋以居學者唐𤣥宗開元二十七年詔曰𢎞我王化在乎儒術能發此道啓迪含靈則生人以來未有如夫子者也所謂自天攸縱將聖多能徳配乾坤身掲日月故能立天下之大本成天下之大經美政教移風俗君君臣臣父父子子人到于今受其賜不其猗歟年祀漸逺靈光益彰雖代有褒稱而未為崇峻不副於實人其謂何夫子既稱先聖可追諡為文宣王臣按文宣王之諡始此五代周太祖幸曲阜謁孔子祠既奠將致敬左右曰仲尼人臣也無致敬之禮上曰文宣百代帝王師得無拜之即拜奠於祠前胡寅曰孔子大聖途之人猶知之豈以位云乎哉如以位固異代之陪臣也如以道則配乎天地如以功則賢於堯舜斯臣也當周太祖時以拜孔子為不可則當石髙祖時必以拜契丹為可者是故君子有言天下國家所患莫甚於在位者不知學在位者不知學則其君不得聞大道淺俗之論易入義理之言難進人主功徳髙下一係於此然則學乎學乎豈非君臣之急務哉宋真宗咸平三年幸曲阜縣謁文宣王廟帝服鞾袍詣廟酌獻廟内外設黄麾仗孔氏家屬陪列初有司定儀止肅揖帝特再拜又至墓奠拜追諡曰𤣥聖文宣王先是詔有司檢討漢唐褒崇宣聖故事初欲追諡為帝或言宣父周之陪臣周止稱王不當加帝號故第増美名乃按春秋演孔圖及莊子之言加以𤣥聖其後又以犯聖祖諱改至聖臣按宋真宗幸闕里奠孔子有司定儀注止肅揖帝不從特行再拜禮可謂知禮矣然不服𤣥端而用鞾袍况其所以至聖人之居者乃為封禪之故非誠也其所加諡者用緯書異端之說至其改諡又因黥卒所言妖妄之神而避其諱要皆非禮之禮心既不誠名又不正聖人在天之靈其肯受之乎且孔子所以為萬世帝王之師所重在道而不在爵位名稱曰王曰帝有與否皆不足以為吾聖人之輕重也元武宗大徳十一年制曰先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述堯舜憲章文武儀範百王師表萬世者也朕纂承丕緒敬仰休風循治古之良規舉追封之盛典可加大成至聖文宣王於戲父子之親君臣之義永惟聖教之尊天地之大日月之明奚罄名言之妙臣按孔子為儒道之宗萬代綱常之主上焉而伏羲神農黄帝堯舜禹湯文武周公之道賴之以明不有孔子之六經則所謂十聖人者世之人或有不得其詳者矣孔子以身立教以言垂教使天下後世知有彛倫之理中正之道君子得以聞大道之要小人得以䝉至治之澤一皆吾聖人作經垂訓之功也是以帝王有志於盛徳大業者固皆崇重其道則雖幼冲之君如漢平帝不學之主如周太祖多欲之君如元武宗皆知所以崇重焉可見天理之在人心其所以秉彛好徳者初不間於智愚賢不肖與古今也矧夫聰明睿智之君而處夫崇髙富貴之位且又當夫重熙累洽之時可不知所以崇重之哉雖然與其崇聖人以虚名孰若遵聖人以實理唐𤣥宗諡聖人以文宣似矣然而麀聚瀆倫聖道安在宋真宗加聖諡以至聖似矣然偽作天書聖道如何臣故曰與其崇聖人之虚名孰若遵聖人以實理以上褒崇先聖魏齊王正始七年始以顔回配享孔子臣按此後世以顔回配享孔子之始唐太宗貞觀二十一年詔以左丘明等二十二人從祀孔子廟堂臣按唐太宗詔以諸儒從祀孔子皆其有功於聖人之經者也卜子夏毛萇有功於詩左丘明穀梁赤公羊髙有功於春秋伏勝孔安國有功於尚書髙堂生戴聖有功於禮王輔嗣有功於易劉向鄭衆杜子春馬融盧植鄭康成服子慎王肅賈逵則通有功於諸經者何休杜元凱范寗則又有功於三傳者然子夏在十哲之列而此又列之者是時七十二子雖列像廟堂未得享祀惟子夏以有功於詩得在從祀之列至開元七年七十二子始從李元瓘請得從享祀𤣥宗開元二十七年追諡孔子為王乃贈顔子為公閔子等九人為侯曽參等七十六人為伯臣按此後世追贈孔門弟子為公侯伯之始宋真宗咸平三年追封兖公顔回為兖國公費侯閔損等九人為公郕伯曽參等七十六人為侯又詔封左丘明等二十一人俱為伯臣按此後世從祀諸儒有封爵之始神宗元豐七年以孟子同顔子配食宣聖荀況揚雄韓愈從祀臣按此後世以孟子配享孔子之始徽宗大觀二年詔躋子思從祀政和三年封王安石為舒王配享臨川伯王雱從祀臣按宣聖廟堂乃大公至正之所在豈容一毫私意於其間而姦黨之徒乃敢欺天罔聖以扶翼其惡黨以為自己姦利之地時君可欺而聖人在天之靈其可欺乎徽宗燭理不明而為姦黨所蔽雖曰褒崇安石而不知適所以彰其莫大之惡而増其極惡之罪也理宗淳祐元年詔曰朕惟孔子之道自孟子後不得其傳至我朝周惇頤張載程顥程頤真見力踐深探聖域千載絶學始有指歸中興以來又得朱熹精思明辯表裏混融使中庸大學語孟之書本末洞徹孔子之道益以大明于世詔令學宫列諸從祀以示崇奬之意又以王安石謂天命不足畏祖宗不足法人言不足恤為世罪人豈宜從祀景定二年皇太子言乾淳間文公朱熹與宣公張栻成公吕祖謙志同道合切思講磨擇精語詳開牖後學誠有功於聖門三臣者俱嘗被詔追褒兼凖御筆秩熹于從祀如栻如祖謙宜升從祀詔從之度宗咸淳三年始以顔回曽參孔伋孟軻並配孔子元文宗加顔回為兖國復聖公曽參郕國宗聖公孔伋沂國述聖公孟軻鄒國亞聖公是嵗始以董仲舒從祀臣按自禮經有釋奠于先聖先師之説唐貞觀中始以左丘明等二十二人有功於聖經以為先師從祀先聖廟庭至宋神宗進荀況揚雄韓愈于從祀此三人者其功又不專於一經其後徽宗以王安石配享及祀王雱雖是羣姦私意然亦以其有作三經義之功理宗崇尚理學列周惇頤等七大儒于從祀後又兼秩司馬光邵雍蓋以此九儒者重明聖道俾大明于世也夫自唐人列祀諸儒如荀況之性惡揚雄之詘身王弼之虗無賈逵之䜟緯戴聖之貪殘馬融之荒鄙杜預之短喪多得罪聖門者其間純正如董仲舒者顧不得侑食至于元天厯中始秩祀焉我聖祖開國之初首去揚雄之祀正統改元用言者從祀吳澂後又以胡安國蔡沈真徳秀列在從祀此數儒者皆於經有發明之功故特祀之夫從祀於孔子之廟堂者必其人於孔子之道有所合而無所愧然後可以與焉不輕與之所以重其事重其事所以重其道也以上言褒祀先儒文王世子天子視學大昕鼔徴所以警衆也衆至然後天子至乃命有司行事興舉也秩常也節禮也祭先師先聖焉陳澔曰天子視學之日初明之時學中擊鼓以徴召學士蓋警動衆聽使早至也有司教詩書禮樂之官也臣按天子之尊不輕舉動惟於學宫時常臨視雖曰以舉賢斂才而實以崇儒重道也漢明帝中元元年初建三雍親行其禮天子冠通天衣日月備法物之駕盛清道之儀袒割辟雍之上尊養老更饗射禮唐髙祖武徳七年幸國子學親臨釋奠太宗召天下純儒耆徳以為學官數臨幸觀釋菜命祭酒博士講論經義賜以帛廣學舍千二百區宋太祖建隆元年正月幸國子監二月又幸四年四月又幸太宗端拱元年幸國子監將出顧見講堂左右博士李覺方聚徒講書詔覺講易卦淳化五年又幸國子監召孫奭講堯典說命哲宗元祐中幸國子監詣文宣王殿行釋奠禮御端化堂命祭酒豐稷講尚書無逸臣按哲宗視國學或謂呂大防曰祖宗視學非有爵命之賞則有金帛之賜今皆無之何也大防曰古者天子視學盖常事也徳意在焉小惠何足道哉吾固欲天子時一幸金帛之賞後日何可繼也政恐惜費而止耳大防此言可謂至論盖天子視學所以崇儒而重道非但以為美觀而已也盖學校禮義之所在聖賢道徳之所宗萬乗所以必親臨之者所以崇儒道敬先師作興人才以為世道之故而或者乃欲望爵禄之賞金帛之賜何所見之小哉盖君子之所重者道義也小人之所嗜者則在於祿利焉荷君之恩付我以師儒之任兢兢然以不稱厥職為懼賴主上之寵靈以光賁我學宫崇重乎師道而吾之所感荷者雖九錫之榮萬鎰之富不足以彷彿之矣一階半級匹帛銖金焉能為有亡哉萬一君恩以吾教訓之有方講論之明切而有錫焉受之可也我聖祖初得天下首建太學車駕屢臨幸焉列聖相承率循是道命坐賜茶兼有衣幣之賜錫以璽書以勉勵我師生者諄切詳悉往往勉以聖人為學之道期以帝王作人之效用鋟于梓士子入學之初俾之莊誦佩服士習丕變人才彚興有由然哉以上視學以上崇師儒以重道大學衍義補卷八十
