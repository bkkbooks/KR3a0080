body:
  text: 大學衍義補卷一百四十四明丘濬撰治國平天下之要馭外蕃內外之限論語曰管仲相桓公霸諸侯一匡天下民到于今受其賜微無也管仲吾其被髮左袵衣襟矣朱熹曰匡正也尊周室攘夷狄皆所以正天下也臣按孔子於他章嘗小管仲之器而於此則大其功蓋以其事功言也朱子謂漢髙祖唐太宗未可謂之仁人然戰國至暴秦其禍極矣髙祖出而平定天下隋末殘虐尤甚太宗出而掃除以致貞觀之治此二君者豈非仁者之功邪管仲之功亦猶是也孟子曰周公兼并之也夷狄驅猛獸而百姓寧又曰詩魯頌閟宫之篇曰戎狄是膺擊也荆楚本號舒近楚國是懲則莫我敢承當也無父無君是周公所膺也朱熹曰按今此詩為僖公之頌而孟子以周公言之亦斷章取義也臣按閟宫之詩乃魯僖公時頌而孟子兩引之皆以周公為言前曰周公方且膺之後又曰是周公所膺也朱子胡其斷章取義是固然矣然斷章而取其義泛言之可也而孟子乃明白兩指周公而言意者魯乃周公之後故頌僖公者因其嘗率車千乘徒三萬從齊伐楚故述其始封之祖兼夷狄之功以美之其下文繼以俾爾昌熾夀富之祝所謂爾者對祖之言託為周公之言也及味其兩是字及莫敢承之語蓋已然必有之辭非祝頌期望之意孟子去聖人時未遠其或他有所據歟漢髙祖四年北貉燕人來致梟騎助漢顔師古曰貉在東北方三韓之屬臣按此中國借兵外國之始文帝時賈誼上疏曰天下之勢方倒縣平聲凡天子者天下之首也上也今胸奴侮慢侵掠至不敬也而漢歲致金絮采繒以奉之胸奴徵令主上共貢足反居上首顧居下倒縣如此莫之能解猶為國有人乎胡寅曰易曰首出庶物萬國咸寧賈誼所謂天子天下首者其有見於此乎抑其言之偶似也若夫首不出乎庶物則與物等夷則無以相長而爭奪離析之禍起尚何咸寧之可冀又况首顧居下足反居上亂常逆理勢若倒懸偷安目前而不虞後患者哉臣按誼以漢事胸奴為天下之勢方倒懸莫之能解為國無人當文帝之世開國功臣名將固有存者而誼謂無人然誼所言如此則誼必有解縣之術誼又謂竊料胸奴之衆不過漢一大縣以天下之大困于一縣之衆陛下何不試以臣為屬國之官以主胸奴行臣之計請必係單于之頸而制其命伏中行說而笞其背舉胸奴之衆惟上之令今不獵猛獸而獵田彘不搏反冦而搏畜莵玩細娛而不圖大患非所以為安也德可逺施威可逺加而直數百里外而威令不信音伸可為流涕斯言也其所以解天下之倒縣者在此乎雖然誼少年而未經事前所流涕者得易春秋之㫖其理萬世而不易後所流涕者謂行其計則可以係單于之頸舉其衆以惟上之命不知帝若用誼其計之行者果何如也末云德可逺施威可逺加直數百里外而威令不信毋乃亦欲施德而加威乎德與威所以施而加之者其事必有本末其行必有次第惜乎誼言之不詳也使文帝覽其言而有問焉誼必將有所陳說擇而用之安知其無少補乎班固曰春秋內諸夏而外夷狄夷狄之人逐水隨畜射獵為生隔以山谷壅以沙漠天地所以絶外內也是故聖王不與約誓不就攻伐約之則費賂而見欺攻之則勞師而招冦其地不可耕而食也其民不可臣而畜也是以外而不內疏而不戚故政教不及其人正朔不加其國來則懲而御之去則備而守之其慕義而貢獻則接之以禮讓羈靡與縻同不絶使曲在彼蓋聖王制御外國之常道也臣按班固謂聖王之于外國不與約誓則後世之之通和者非矣不就攻伐則後世窮兵出塞者非矣然則如之何則可固曰來則懲而御之去則備而守之斯二言者所謂治戎之上䇿也若夫使曲在彼之一言則又真得聖人正義明道之心躬自厚而薄責人之道也固又曰西域諸國與漢隔絶道里又逺得之不為益棄之不為損盛德在我無取于彼故自建武以來西域思漢威德咸樂內屬聖人逺覽古今因時之宜羈縻不絶辭而未許雖大禹之叙西戎周公之讓白雉太宗之却走馬亦何以尚兹臣按自古帝王皆以能致外夷以為盛德殊不知德在華夏文明之地而與彼之荒落不毛之區無預焉固所謂得之不為益棄之不為損盛德在我無取于彼真知言哉范曄曰先王疆理九土判别畿荒若二漢御戎之方失其本矣何則先零侵境趙充國遷之內地當煎作冦馬文淵徙之三輔貪其暫安之勢信其馴服之情計日用之權冝忘經世之逺略夫豈識微者之為乎晉武帝時郭欽上疏曰北部彊獷歷古為患魏初人寡西北諸部皆為戎居今雖服從若百年之後有風塵之警彼自平陽上黨不三日而至孟津矣宜及平吳之威謀臣猛將之略出北地西河安定復上郡實馮翊於平陽以北諸縣募取死罪徒三河三魏見士四萬家以充之漸徙平陽𢎞農魏郡京兆上黨雜胡峻內外出入之防明先生荒服之制萬世之長䇿也武帝不納惠帝元康九年太子洗馬江統作徙戎論以警朝廷曰漢建武中馬援領隴西太守討叛羌徙其餘種於關中居馮翊河東空地數歲之後族類蕃息永初叛亂夷夏俱敝自此之後餘燼不盡小有際會輒復侵叛魏武帝徙武都氐於秦川以禦蜀蓋權宜之計今已受其敝矣今宜及兵威方盛因其死亡流散與關中之人户為仇讐之際徙諸羌著先零罕幵析交支之地徙諸氐出還隴右著隂平武都之界廪其道路之糧令足自致谷附本種反其舊土使屬國撫夷就安集之并州之胡本胸奴桀惡之冦也建安中使右賢王去卑誘質呼厨泉聽其部落散居六郡今為五部户至數萬驍勇便利倍于氐羌若有不虞則并州之域可為寒心正始中毌丘儉討句驪徙其餘種于滎陽户落今以千計數世之後必至殷熾夫為邦者憂不在寡而在不安以四海之廣士民之富豈須此等在內然後取足哉此等皆可申諭遣還其本域慰彼土思惠此中國于計為長也朝廷不能用臣按郭欽之疏江統之論晉人心腹之病也而不能用之其後劉石迭起率如所料自長淮之北無復晉土而為戰爭之場者幾二百年嗚呼後之人主為國家逺慮者其尚為子孫計豫有以杜絶而消弭之哉惠帝時成都王頴表胸奴左賢王劉淵行寧朔將軍監五部軍事使將兵以其子聰為積弩將軍其右賢王劉宣謂其族人曰自漢亡以來我單于徙有虛號自餘王侯降門編户今吾衆雖衰猶不減二萬奈何斂手受役奄過百年左賢王英武邁世天茍不欲生胸奴必不虛生此人也今司馬氏骨肉相殘四海鼎沸復呼韓邪之業此其時矣乃相與推淵為大單于使其黨詣鄴告之淵白穎請歸會葬穎弗許及王浚及東嬴公騰起淵說穎曰今二鎮跋扈衆十餘萬恐非士卒及近郡士衆所能禦也請還說五部以赴難穎悅拜淵為北單于參丞相軍事淵至右國城劉宣等上大單于之號二旬之間有衆五萬尋稱漢王又四年稱皇帝唐大宗時突厥既亡其降唐者尚十萬口詔羣臣議區處之宜朝士多言北狄幸而破亡宜悉徙之河南兗豫之間分其種落散居州縣教之耕織永空塞北之地中書侍郎顔師古請皆置之河北分立酋長領其部落則永無患矣禮部侍郎李百藥以為突厥雖云一國然其種類區分各有酋帥今宜因其離散各即本部署為君長不相臣屬國分則弱而易制勢敵則難相吞滅各自保全必不能抗衡中國仍請于定襄置都督府為其節度此安邊之長䇿也夏州都督竇靜以為置之中國有損無益莫若因其破亡之餘假之王侯之號妻以宗室之女分其土地析其部落使其權弱勢分易為羈制可使常為藩臣永保邊塞溫彥博請凖漢建武故事置胸奴於塞下全其部落順其土俗以實空虛之地使為中國扞蔽䇿之善者也魏徵以為突厥世為冦盜百姓之讐也今幸而破亡陛下以其降附不忍盡殺宜縱之使還故土彥博曰王者之于萬物天覆地載靡有所遺今突厥窮來歸我奈何棄之而不受乎孔子曰有教無類若救其死亡授以生業教之禮義數年之後悉為吾民選其酋長使入宿衛畏威懷德何後患之有太宗卒用彥博䇿處突厥降衆東自幽州西至靈州分突厥故所統之地置四川都督府以統其衆其餘酋長至者皆拜將軍中郎將布列朝廷五品以上百餘人殆與朝士相半因而入居長安者近萬家臣按唐太宗朝羣臣承詔議處突厥降者部落朝士多言欲處之河南兖豫之間顔師古欲置之河北溫彥博欲凖漢建武故事李百藥欲各即本部署為君長與竇靜之議略同惟魏徵之議思患豫防之道太宗散處其民于諸州用其酋長以為宿衛數年果有結社率之反言事者多言突厥留河南不便乃詔突厥在諸州者並令渡河反其舊部太宗有朕不用魏徵言幾致狼狽之嘆由是以觀為人臣者不可不明春秋之義而議事者當援古以證今昭昭然明矣武后時四夷質子多在京師如論欽陵阿思德元珍孫萬榮皆因入侍見中國法度廢弛及還並為邊害薛登諫曰戎夏不雜古所戒也故斥居塞外有時朝謁已事則歸三王之法也漢魏以來革襲衣冦築室京師不令歸國較其利害三王是而漢魏非拒邊長而質子短伏見突厥吐蕃契丹因往入侍並被奬遇官戎狄步黌門窺圖史成敗熟山川險易國家雖有冠𢃄之名而狼子孤恩患必在後昔申公奔晉使子狐庸為吳行人教吳戰陳使之叛楚漢遷五部胸奴于汾晉卒以劉石作難竊計秦并天下及劉項用兵人士凋散以冒頓之盛乘中國之虛而髙祖困厄平城胸奴卒不入中國者以其生長磧鹵謂穹廬賢于城郭氊罽美于章紱既安所習是以無窺中國心不樂漢故也劉淵五部散亡而能自振者少居內地明習漢法鄙單于之陋竊帝王之稱使其未嘗內徙不過劫邊人繒綵麴糵歸隂山而已臣謂願充侍子可一切禁絶則夷人保疆邊邑無爭矣臣按昔之忠臣為國逺慮者無所不至薛登斯言是亦思患而豫防之者也唐自貞觀以來任蕃將者如阿史那社爾契苾何力皆以忠力奮然猶不為上將皆大臣總制之故上有餘權以制於下臣按自古創業之君經事多而慮患逺其所創制立法皆有深意後世子孫所當遵守者也唐𤣥宗不守太宗之法專用蕃將遂成變亂嗚呼可不戒哉天寶六載李林甫為相欲杜邊帥入相之路乃奏言文臣為將怯當矢石不若用寒族胡人胡人則勇決習戰寒族則孤立無黨上悅其言始用安祿山至是諸道節度使盡用胡人精兵咸戍北邊天下之勢偏重卒使祿山傾覆天下皆出于林甫專寵固位之謀也范祖禹曰明皇蔽于吞滅四夷欲求一切之功是以林甫得以行其計人君茍不能以義制欲迷而不復何所不至哉臣按李林甫欲為專寵固位之謀杜邊將入相之路奏言文臣為將怯當矢石而欲用胡人夫文臣固怯矢石矣而豈無武臣乎當世如王忠嗣等流輩固非文臣也盍用之乎使𤣥宗而慮及此則林甫之奸計不行矣當貞觀時魏徵為太宗處置突厥乃為國家逺慮于數百年之後而林甫區區乃為一身之謀于年歲之間君子小人用心不同如此而國家安危治亂之所由分也為人君者可不謹于擇相哉天寶十四載安祿山使副將何千年入奏請以蕃將二十二人代漢將韋見素謂楊國忠曰祿山久有異志今又有此請其反明矣明日入見上迎謂曰卿等疑祿山邪見素因極言祿山反已有迹所請不可許上不悅竟從祿山之請他日國忠見素言于上曰臣有䇿可坐消祿山之謀若除祿山平章事召詣闕以賈循吕知誨楊光翽分領范陽平盧河東節度則勢自分矣上從之已草制而不發更遣中使輔璆琳以珍果賜祿山潜察其變璆琳受祿山厚賂還盛言祿山無二心上謂國忠等曰朕推心待之必無異志朕自保之卿等無憂也臣按自昔帝王用人不繫世類蕃將之中如漢之金日磾唐之阿史那忠等不可謂無人然而為治之道當循其常從其多不可以其一二而廢其千百以其偶然而遂不信其常然耳何者天地生人同此天而各異其地地有不同則其生智習性自然殊别及其混處之久則不知不覺而合為一矣方當無事之秋聚居而托處聨絡而親比日染月化遂認并州為故鄉者多矣彼其感恩思報之心忠君親上之念固未嘗無非惟無異夢指天誓日真如金石之固死生不渝矣一旦而有風塵之警疆場之變我之勢方彊氣方壯根本方固彼固不敢有異志不幸而我弱彼强我負彼勝則彼將持兩端觀成敗以為去留此等之事不能無也其甚者若漢之中行說宋之郭藥師豈非後世之永鑑哉然唐之蕃將如執失思力出自突厥契苾何力生于鐵勒他如史大奈李謹行泉男生李多祚之倫皆能知義而鷙挺不遷為唐史所稱其尤著勳名者則有如渾減阿跌光顔者焉豈可以非華而不用哉仰惟我祖宗朝凡諸歸正而建功者往往錫之以封爵膺之以顯任惟于五府諸衛之長諸邊總戎之任則有所限制而不得以專蓋有合于唐人不用蕃將為上將之意夫于任用之中而寓制馭之意非獨使上之人無所疑于後而亦俾下之人得以保其全于終也豈非萬世之良法乎聖子神孫所當遵而行之萬世而不可輕變者也大學衍義補卷一百四十四
