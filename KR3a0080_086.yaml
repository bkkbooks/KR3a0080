body:
  text: 大學衍義補卷八十六明丘濬撰治國平天下之要備規制都邑之建下周禮惟王建國辨方正位體國經野設官分職以為民極鄭玄曰建立也周公相成王營邑於土中是為雒邑吳澄曰周公居攝營邑於洛中七年致政成王使居洛邑治天下而立國都焉辨别也别東西南北之四方正祖社朝市之位體猶分也經猶畫也體國者分營其國之宫城門塗猶人身之有四體經野者畫治其野之丘甸溝洫如織之有經緯也設官者謂設置冢宰司徒之官分職者謂分辨掌治掌教之職為民極者令天下之人各得其中不失所也葉時曰周公所以為民立極者惟在王畿方位國野官職之中蓋王畿立而後根本定方位設而後等級明國野分而後疆理正官職舉而後綱目張民極之立孰有大於此者臣按天生民而立之君而君之為君必有所止而示法則於上而施政教於下使天下四方咸面內環拱之如衆星之於北極焉君建皇極於上所以為民極於下也所以為民極者其本在於一人之身然一人之身必有所居止之所其所居止必於地大人衆之處四方道里適均之中而建其國都焉國都之建不徒建也必辨其方東西南北前後左右於此而取正也必正其位左祖右社前朝後市於此而定制也國焉而體之何者為內朝何者為外朝之類野焉而經之九夫為井四井為邑之類所設之官自六卿至於百執事所分之職自掌邦治至於掌邦土凡若此者雖若以奉君實則為民而為之立極也極者何先儒謂極猶北極之義標準之名中立而四方之所取正焉者也極立於此是以近而鄉遂逺而侯國又逺而荒服之外來朝覲者於焉而合瑞封爵土者於焉而受命有才能者於焉而獻藝為政教者於焉而質正有訟獄者於焉而取決所以然者極建於此也大司徒以土圭之法測土深正日景以求地中日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也陰陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之凡建邦國以土圭土其地而制其域鄭玄曰土圭所以致四時日月之景也臣按洛誥所謂自服於土中蓋以洛邑在周時為中國之中四方道里適均故於此宅中圖治以定四海之民也作周禮者見其中於中國故為天地所合四時所交風雨所會陰陽所和之説蓋盛稱華夏之地居地勢之中得天氣之正時序正而寒暑不過甚風雨時而收穫有定期非若偏方僻壤節候不正而時氣之大寒大暑物生不常而收穫之或早或晚也中國皆然而洛邑乃其要會焉故為此説耳雖然自三代以前則洛為中國之中以今天下觀之則南北袤而東西蹙則其所謂中者蓋在荆襄之間也朱子曰豈非天旋地轉閩浙反為天地之中閩浙在東南海盡處難以為中朱子蓋以聲明文物通論天下非論地勢也土方氏掌土圭之法以致日景以土地相宅而建邦國都鄙鄭玄曰致日景者夏至景尺有五寸冬至景丈三尺其間則日有長短土地猶度地知東南西北之深而相其可居者宅居也臣按大司徒凡建邦國以土圭度其地而土方氏掌土圭之法以土地相宅而建邦國都鄙蓋大司徒掌建邦國乃國家之大事辨方正位體國經野其事非一而用土圭以致日景以求地中特其中之一事爾大司徒總其凡土方氏專其事有事之時用其所職以輔相司徒也匠人建國水地以縣音玄置𣙗以縣視以景為規識日出之景與日入之景晝參諸日中之景夜考之極星以正朝夕匠人營國方九里旁三門國中九經南北之道為經九緯東西之道為緯經塗九軌左祖右社面朝後市市朝一夫鄭玄曰國中城內也經緯謂塗也經緯之塗皆九軌積七十二尺王昭禹曰先王建國必先於辨方正位是以匠人置𣙗視景必正地中以天地之所合四時之所交風雨之所會陰陽之所和於是乎建王國也然其置𣙗必先水地以懸使所直之臬必平而直然後可以正日景也水莫動則平可因之以望高下之勢繩垂之而墜可用之而正曲直之形以繩取其直又以水取其平然後於所平之地置臬也爾雅曰在地者謂之臬所謂𣙗則臬也於所平地之中央立八尺之表以縣正之以視日景將以正四方也於晝漏半又參諸日中之景夜又考之極星以北辰所居者天之中故也又曰左人道之所向右地道之所尊言祖則宗可知言社則稷可知朝者義之所在於朝言面則知市之在所背於市言後則知朝之在所先朝者官吏之所會市者商賈之所聚一夫百畝之地然後足以容之臣按匠人既曰建國又曰營國蓋作而立之謂建言其始也周圍而治之以丈尺其小大謂之營言其終也所謂置𣙗者疏家謂以水平地於四角立四柱於四柱畔懸繩以正柱以水望其高下即知地之高下然後平高就下而地乃平殆今世所謂水平也與春秋桓公九年紀季薑歸於京師公羊傳曰京師者何天子之居也京者何大也師者何衆也天子之居必以衆大之辭言之臣按榖梁傳亦云京大也師衆也言周必以衆與大言之也所謂京師者始於此後世因以天子所都為京師焉周幽王為犬戎所殺於是諸侯乃即申侯而共立幽王太子宜臼是謂平王以奉周祀平王立東遷於洛邑蘇軾曰周之失計未有如東遷之繆也自平王至於亡非有大無道者也頿王之神聖諸侯服享然終以不振則東遷之過也今夫富民之家所以遺其子孫者田宅而已不幸而有敗至於乞假以生可也然終不敢議田宅今平王舉文武成康之業而大棄之此一敗而鬻田宅者也夏商之王皆五六百年其先王之德無以過周而後王之敗亦不減幽厲然至於桀紂而後亡其未亡也天下宗之不如東周之名存而實亡也是何也則不鬻田宅之效也使平王收豐鎬之遺民而修文武成康之政以形勢臨諸侯齊晉雖強未敢二也而秦何自霸哉魏惠王畏秦遷於大梁楚昭王畏吳遷於郢項襄王畏秦遷於陳考烈王畏秦遷於夀春皆不復振有亡徴焉東漢之末董卓劫帝遷於長安漢遂以亡近世李景遷於豫章亦亡故曰周之失計未有東遷之繆者也臣按蘇軾謂遷都為周人失計舉後世遷都數君皆不復振而有亡國之徵是固然矣然此蓋謂衰敗之餘者爾若天國勢方興之日或依形勢之固或就富庶之所或逺夷狄之害則不可專泥此説也史記貨殖傳曰昔唐人都河東殷人都河內周人都河南夫三河在天下之中若鼎足王者之所更居也臣按秦分天下為三十六郡有山川河東漢分三川為河南河內與河東號為三河是三郡者皆濵河之地故帝堯都平陽商都亳成王營洛邑皆以河為運道達於河即達於京師也後世都汴洛者皆由汴水入河都長安者雖不濵河然亦由河入於渭是古今建都無有不資於河道者也我朝都燕咫尺瀛海則所以通天下之食貨以足國用者莫便於海焉蓋海道以天為界地界已盡而人之行者不止蓋天造地設以有待而為今日萬世無窮之利者也秦始皇二十六年徙天下豪傑十二萬户於咸陽臣按此後世徙天下富民填實京師之始漢初齊人婁敬過洛陽見漢高祖曰陛下都洛陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周自后稷積德絫古纍字善十有餘世至於文武而諸侯自歸之遂滅殷為天子及成王即位周公相焉乃營洛邑以為此天下之中也諸侯四方納貢職道里均矣有德則易以王無德則易以亡故周之盛時諸侯四夷莫不賔服及其衰也天下莫朝周不能制非惟德薄形勢弱也今陛下起豐沛卷蜀漢定三秦與項羽戰滎陽成臯之間哭聲未絶傷者未起而欲比隆於成康之時臣竊以為不侔也夫秦地被山帶河四塞以為固卒然有急百萬之衆可立具也夫與人鬭不扼其亢拊其背未能制其勝也今陛下案秦之故地此亦扼天下之亢而拊其背也帝問羣臣羣臣皆山東人爭言周王數百年秦二世即亡洛陽東有成臯西有殽澠倍河鄉伊洛其固亦足恃也上問張良良曰洛陽雖有此固其中小不過數百里田地薄四面受敵非用武之國也關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而守獨以一面東制諸侯諸侯安定河渭漕挽天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國敬説是也上即日西都關中陸贄曰關中古邦畿千里之地也王業根本於是在焉秦用之以傾諸侯漢因之以定四海蓋由憑山河之形勝宅田里之上腴內保一方當天下之半可以養力俟時外制東夏據域中之大可以蓄威昭德吕祖謙曰婁敬建入關之䇿則是至言周公營洛邑有德則易以王無德則易以亡乃戰國陋儒之説而論周秦形勢初未嘗考也豐鎬本文武成康之所都平王東遷始以封秦爾敬所談秦之形勢乃周之形勢也秦漢間人多不學但據目前言之東周以前全勝之周則識之者鮮矣羣臣皆山東人爭言洛陽東有成臯西有殽澠倍河向洛其固亦足恃高帝獨非山東人乎與項羽富貴不歸故鄉之見異矣臣按此秦以後都長安之始張良謂關中為用武之地阻三面而守獨以一面東制諸侯臣竊以謂今世都燕真所謂用武之地比之關中其所阻者亦有三面而亦獨以一面制天下之大凡虞州十二夏州九春秋國十二戰國國七其地皆在所臨制也較之關中則西有巴蜀之饒南有商鄧之險以為退步之地燕則前之進者無窮盡後之退者有界限焉則是今日京師之勢大非漢唐都關中比也關中地被山此則被乎大行一帶之險阻關中帶河此之所襟帶者則大海也然漢之邊在北咸陽去朔方餘千里唐邊在西長安去土蕃界亦幾千里焉今京都北抵居庸東北抵古北口西南抵紫荆關近者百里逺者不過三百里所謂居庸則吾之背也紫荆則吾之吭也據關中者將以扼中國之吭而拊其背都幽燕者切近於北狄則又將恐其反扼我之吭而拊我之背焉所以防蔽之者尤當深加之意蓋制人而不得猶不至於失己守己而或有所失則其害豈但不得於入而已哉高祖八年徙齊魏大族豪傑於關中劉敬言胸奴河南地去長安近者七百里輕騎一日一夜可以至秦中且諸侯初起時非齊諸田楚昭屈景莫能興今關中少民北近胸奴東有強族一日有變陛下未得高枕而卧也願徙六國後及豪傑名家居關中無事可以備胡有變帥以東伐此強本弱末之術也於是徙昭屈景懷田氏及豪傑民家居於關中與利田宅凡十餘萬口臣按徙民以實京師必使其衣食用度無不如意忘其家之徙也然後賴其用不然養生送死有不贍方且憂思怨恨之無己日有逃亡而已雖有之亦如無焉何名之為實哉必也寬之以力役優之以恩澤凡有征斂科賦視諸民為減省焉光武元年十月車駕入洛陽幸南宫遂定都臣按後世建都洛陽始此周人營洛邑以為朝會之所非建都也至平王避犬戎始遷焉漢高祖始亦欲都洛後以婁敬張良之言都於長安光武中興始於此定都焉諸葛亮至京口因覩秣陵山阜嘆曰鍾山龍盤石城虎踞此帝王之宅臣按自古帝王之都多在江以北江南形勢之地莫若金陵自孫吳都此繼以東晉宋齊梁陳終於南唐凡七代皆偏安一隅惟我聖祖始混一天下建都於此蓋自開闢天地以來所未有也宋仁宗慶厯二年陜西按撫使范仲淹上言天有九閽帝居九重是以王公法天設險以安萬國也臣請陛下修東京高城深池軍民百萬足以為九重之備乘輿不出則聖人坐鎮四海而無煩動之勞鑾輿或出則大臣居守九重而無回顧之憂矣彼或謀曰邊城堅牢不可卒攻京師坦平而可深犯我若修固京師使不可犯則伐彼之謀而阻南牧之志矣寇入之淺則邊壘已堅寇入之深則都城已固彼請割地我可弗許也彼請決戰我可弗出也進不能為患退不能忘歸然後因而撓之返則追之縱有鈔掠可邀可奪彼衰我振未必不大勝豈非陛下保社稷安四海之全䇿哉或曰京師王者之居高城深池恐失其體臣聞後唐末契丹以四十萬衆送石高祖入朝而京城無備閔宗遂亡石晉時叛臣張彥澤引契丹犯闕而京城無備少主乃陷此皆無備而亡何言其失體哉臣但憂國家之患而不暇顧其失體也若以修築城隍為失體不猶愈於播遷之禍哉臣按宋都於汴去邊地甚逺范仲淹當仁宗之朝乃有宋一代極盛之時仲淹時守西邊乃建議修築京城一時議者皆以為失體臣竊以為古之大臣憂國之心每先事而預為之計惟恐一旦禍機之發有不及措手者不以身在遐外而忘也夫宋與契丹以白溝為界相去二千里而為國逺慮者猶建議速修京城蓋欲固根本之地以伐外寇之謀恐一旦無備而蹈後唐石晉之覆轍也矧今京城與北敵為鄰疾馳之騎不數日可抵其境當國者烏可不懷仲淹之憂先天下而預憂之哉以上都邑之建臣按秦漢以來混一天下者都邑之地有四偏安於一隅及立國未百年者不與焉一曰長安漢唐盛時所都也曰洛陽漢中興以後所都也曰汴梁宋盛時所都也曰幽燕皇朝所都也隋唐非不都長安晉非不都洛陽後梁晉周非不都汴梁金元非不都幽燕然皆偏安不久也固無足論與夫鄴臺金陵錢唐諸處古固亦有都之者矣然皆非此四都比也夫華夏自唐虞之世為九州或為十二州長安在雍州域中洛汴皆在豫州域中惟今日之神京在虞世則幽州域在禹貢則冀州域也黃帝都幽州之涿鹿堯舜都冀州之平陽蒲坂涿鹿去此僅餘百里而平陽蒲坂去此僅千里蓋近境也是則秦漢以來得國之正綿祚之遠皆莫有如我朝而其建都之地自南而北卒復黃帝堯舜之故都於七八千年之後猗歟盛哉洪惟國家得中國帝王之正統奄有黃帝以來之境土承傳堯舜以來之位號况所以建極以圖四方之治者又在黃帝堯舜之故都則其所以繼志述事以上承祖宗垂憲作則以貽厥孫謀者烏可但己哉雖然黃帝堯舜固所當法女真韃靼尢所當戒詩不云乎殷鑒不遠在夏后之世以上都邑之建下大學衍義補卷八十六
