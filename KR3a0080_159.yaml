body:
  text: 大學衍義補卷一百五十九明丘濬撰治國平天下之要成功化聖神功化之極中大學之道在明明徳在新民在止於至善朱熹曰大學者大人之學也明明之也明徳者人之所得乎天而虚靈不昧以具衆理而應萬事者也但為氣禀所拘人欲所蔽則有時而昏然其本體之眀則有未嘗息者故學者當因其所發而遂明之以復其初也新者革其舊之謂也言既自眀其明徳又當推以及人使之亦有以去其舊染之汙也止者必至於是而不遷之意至善則事理當然之極也言明明德新民皆當止於至善之地而不遷葢必其有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也或問於朱熹曰所謂在明明徳在新民在止於至善者亦可得而聞其説之詳乎曰天道流行發育萬物其所以為造化者隂陽五行而已而所謂隂陽五行者又必有是理而後有是氣及其生物則又必因是氣之聚而後有是形故人物之生必得是理然後有以為健順仁義禮智之性必得是氣然後有以為魂魄五臟百骸之身周子所謂無極之真二五之精妙合而凝者正謂是也然以其理而言之則萬物一原固無人物貴賤之殊以其氣而言之則得其正且通者為人得其偏且塞者為物是以或貴或賤而不能齊也彼賤而為物者既梏於形氣之偏塞而無以充其本體之全矣唯人之生乃得其氣之正且通者而其性為最貴故其方寸之間虚靈洞徹萬理咸偹盖其所以異於禽獸者正在於此而其所以可為堯舜而能参天地以贊化育者亦不外焉是則所謂明徳者也然其通也或不能無清濁之異其正也或不能無美惡之殊故其所賦之質清者智而濁者愚美者賢而惡者不肖又有不能同者必其上智大賢之資乃能全其本體而無少不明其有不及乎此則其所謂明徳者已不能無蔽而失其全矣况乎又以氣質有蔽之心接乎事物無窮之變則其目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚所以害乎其徳者又豈可勝言也哉二者相因反覆深固是以此徳之明日益昏昧而此心之靈其所知者不過情欲利害之私而已是則雖曰有人之形而實何以逺於禽獸雖曰可以為堯舜而参天地而亦不能有以自充矣然而本明之體得之於天終有不可得而昧者是以雖其昏蔽之極而介然之頃一有覺焉則即此空隙之中而其本體已洞然矣是以聖人施教既已養之於小學之中而復開之以大學之道其必先之以致知格物之説者所以使之即其所養之中而因其所發以啟其明之之端也繼之以誠意正心修身之目者則又所以使之因其已明之端而反之於身以致其明之之實也夫既有以啟其明之之端而又有以致其明之之實則吾之所得於天而未嘗不明者豈不超然無有氣質物欲之累而復得其本體之全哉是則所謂明明徳者而非有所作為於性分之外也然其所謂明徳者又人人之所同得而非有我之得私也向者俱為物欲之所蔽則其賢愚之分固無以大相逺者今吾既幸有以自明矣則視彼衆人之同得乎此而不能自明者方且甘心迷惑沒溺於卑汚茍賤之中而不自知也豈不為之惻然而思有以救之哉故必推吾之所以明者以及之始於齊家中於治國而終及於平天下使彼有是明徳而不能自明者亦皆有以自明而去其舊染之汙焉是則所謂新民者而亦非有所付畀増益之也然徳之在己而當明與其在民而當新者則又皆非人力之所為而吾之所以明而新之者又非可以私意茍且為也是其所以得之於天而見於日用之間者固已莫不各有其本然一定之則程子所謂以其義理精㣲之極有不可得名者故姑以至善目之而傳所謂君之仁臣之敬子之孝父之慈與人交之信乃其目之大者也衆人之心固莫不有是而或不能知學者雖或知之而亦鮮能必至於是而不去此為大學之敎者所以慮其禮雖粗復而有不純已雖粗克而有不盡且將無以盡夫修己治人之道必指是而言為明徳新民之標的也欲明徳而新民者誠能求必至是而不容其少有過不及之差焉則其所以去人欲而復天理者無毫髪之遺恨矣大抵大學一篇之指總而言之不出乎八事而八事之要縂而言之又不出乎此三者此愚所以斷然以為大學之綱領而無疑也然自孟子沒而道學不得其傳世之君子各以其意之所便者為學於是乃有不務明其明徳而徒以政敎法度為足以新民者又有愛身獨善自謂足以明其明徳而不屑乎新民者又有畧知二者之當務顧乃安於小成狃於近利而不求止於至善之所在者是皆不考乎此篇之過其能成已成物而不謬者鮮矣臣按大學經之全章真徳秀既已備載於前編矣而臣復節其辭載於崇敎化條而此於成功化下又載焉所以原始而要終也蓋明明徳而不止於至善則是安於小成新民不止於至善則是狃於近利明徳新民皆止於至善之地而不遷有以盡夫天理之極而無一毫人欲之私則大學之道盡善盡美全體以立大用以行聖神功化於是乎極矣古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平朱熹曰明明徳於天下者使天下之人皆有以明其明徳也心者身之所主也誠實也意者心之所發也實其心之所發欲其必自慊而無自欺也致推極也知猶識也推極吾之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也或問於朱熹曰古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物何也曰此言大學之序其詳如此蓋綱領之條目也格物致知誠意正心修身者明明徳之事也齊家治國平天下者新民之事也格物致知所以求知至善之所在自誠意以至於平天下所以求得夫至善而止之也所謂明明徳於天下者自明其明徳而推以新民使天下之人皆有以明其明徳也人皆有以明其明徳則各誠其意各正其心各脩其身各親其親各長其長而天下無不平矣然天下之本在國故欲平天下者必先有以治其國國之本在家故欲治其國者必先有以齊其家家之本在身故欲齊其家者必先有以脩其身至於身之主則心也一有不得其本然之正則身無所主雖欲勉強以脩之亦不可得而脩矣故欲脩身者必先有以正其心而心之發則意也一有私欲雜乎其中而為善去惡或有未實則心為所累雖欲勉強以正之亦不可得而正矣故欲正其心者必先有以誠其意若夫知則心之神明妙衆理而宰萬物者也人莫不有而或不能使其表裏洞然無所不盡則隠微之間真妄錯雜雖強勉以誠之亦不可得而誠矣故欲誠意者必先有以致其知致者推致之謂如䘮致乎哀之致言推之而至於盡也至於天下之物則必各有所以然之故與其所當然之則所謂理也人莫不知而或不能使其精粗隠顯究極無餘則理所未窮知必有蔽雖欲勉強以致之亦不可得而致矣故致知之道在乎即事觀理以格夫物格者極至之謂如格於文祖之格言窮之而至其極也此大學之條目聖賢相傳所以教人為學之次第至為纎悉然漢魏以來諸儒之論未聞有及之者至唐韓子乃能援以為說而見於原道之篇則庶幾其有聞矣然其言極於正心誠意而無曰致知格物云者則是不探其端而驟語其次亦未免於擇焉不精語焉不詳之病矣何乃以是而議荀楊哉或又問之曰物格而后知至至於治國而后天下平何也曰此覆説上文之意也物格者事物之理各有以詣其極而無餘之謂也理之在物者既詣其極而無餘則知之在我者亦隨所詣而無不盡矣知無不盡則心之所發能一於理而無自欺矣意不自欺則心之本體物不能動而無不正矣心得其正則身之所處不至陷於所偏而無不脩身無不脩則推之天下國家亦舉而措之耳豈外此而求之智謀功利之末哉或又問之曰篇首之言明明徳以新民為對則固専以自明為言矣後段於平天下者復以明明徳言之則似新民之事亦在其中何其言之不一而辨之不明邪曰篇首三言者大學之綱領也而以其賓主對待先後次第言之則明明徳者又三言之綱領也至此後段然後極其體用之全而一言以舉之以見夫天下雖大而吾心之體無不該事物雖多而吾心之用無不貫蓋必析之有以極其精而不亂然後合之有以盡其大而無餘此又言之序也臣按宋儒朱熹既著為大學章句又設為或人之問而發明旨趣書成錄以進於其君且曰大學經文前章畧提綱領後章細分條目鉅細相涵首尾相應極為詳偹必先讀經文使之習熟而綱領條目羅列胸中如指諸掌然後增考傳文隨事體察而實致其力使吾所以明徳而新民者無不止於至善而天下之人皆有以見其意誠心正身脩家齊國治天下平之效則大學之道不在於書而在於我矣朱熹以此進於其君期於使天下之人皆有以見意誠心正身脩家齊國治天下平之效謂之效者用之而驗也臣謹録其言而綴於其所著書之末蓋期世之為治者必推其效至於天下之平而後已允若兹斯為聖神功化之極伏惟聖明深加之意則朱熹所以告其君者所謂大學之道不在書而在我在當時則為虚文在今日則有實用矣臣不勝惓惓詩云於戲前王不㤀君子賢其賢而親其親小人樂其樂而利其利此以沒世不㤀也朱熹曰詩周頌烈文之篇於戯嘆辭前王謂文武也君子謂其後賢後王小人謂後民也此言前王所以新民者止於至善能使天下後世無一物不得其所所以既沒世而人思慕之愈乆而不㤀也又曰沒世而不能忘如堯舜文武之徳萬世尊仰之豈不是賢其賢如周后稷之徳子孫宗之以為先祖之所自出豈不是親其親或問於朱熹曰引烈文之詩而言前王之沒世不㤀何也曰賢其賢者聞而知之仰其徳業之盛親其親者子孫保之思其覆育之恩也樂其樂者含哺鼓腹而安其樂也利其利者畊田鑿井而享其利也此皆先王盛徳至善之餘澤故雖已沒世而人猶思之愈乆而不能㤀也臣按明徳新民能使人沒世而不能忘之如此是則其治化之所及者又不止在當世而已也所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有絜矩之道也朱熹曰老者所謂老吾老也興謂有所感發而興起也孤者㓜而無父之稱絜度也矩所以為方也言此三者上行下效㨗於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之間各得分願則上下四旁均齊方正而天下平矣或問於朱熹曰上章論齊家治國之道既以孝弟慈為言矣此論治國平天下之道而復以是為言何也曰三者人道之大端衆心之所同得者也自家以及國自國以及天下雖有大小之殊然其道不過如此而已但前章専以己推而人化為言此章又申言之以見人心之所同而不能己者如此是以君子不唯有以化之而又有以處之也蓋人之所以為心者雖其未嘗不同然貴賤殊勢賢愚異禀茍非在上之君子眞知實蹈有以倡之則下之有是心者亦無所感而興起矣幸其有以倡焉而興起矣然上之人乃或不能察彼之心而失其所以處之之道則彼其所興起者或不得遂而反有不均之嘆是以君子察其心之所同而得夫絜矩之道然後有以處此而遂其興起之善端也曰何以言絜之為度也曰此莊子所謂絜之百圍賈子所謂度長絜大者也前此諸儒蓋莫之省而強訓以挈殊無意謂先友太史范公乃獨推此以言之而後其理可得而通也蓋絜度也矩所以為方也以己之心度人之心知人之所惡者不異乎已則不敢以己之所惡者施之於人使吾之身一處乎此則上下四方物我之際各得其分不相侵越而各就其中挍其所占之地則其廣狭長短又皆均平如一截然方正而無有餘不足之處是則所謂絜矩者也夫為天下國家而所以處心制事者一出乎此則天地之間將無一物不得其所而凡天下之欲為孝弟不倍者皆得以自盡其心而無不均之歎矣天下其有不平者乎然君子之所以有此亦豈自外至而强為之哉亦曰格物致知故有以通天下之志而知千萬人之心即一人之心意誠心正故有以勝一己之私而能以一人之心為千萬人之心其如此而已矣一有私意存乎其間則一膜之外便為胡越雖欲絜矩亦將有所隔礙而不能通矣臣按平天下之道不外乎化之處之二者而已葢人君以一人之身而臨天下之大地非一方不能處處而親履之也人非一人不能人人而親諭之也必欲治而平之豈能一一周而徧之哉夫我有此本然之性而人亦莫不有此本然之性我盡我本然之性使之觀感興起而莫不盡其本然之性皆如我性之本然者焉是則所謂化之也夫我有此當然之理而彼亦莫不有此當然之理我以當然之理推之以量度處置使彼各得其當然之理皆如我理之當然者焉是則所謂處之也盖化之以吾身處之各以其人之身其人所有之理即吾所有之理是理也具於心而為性人人皆同以吾之心感人之心上行下效各欲以自盡以己之心度人之心彼此相方各得其分願矣必使物我之間上下四傍不相侵越前後左右不相違背面面得其所處之方人人得其所有之分概而視之累而觀之皆截然方正無髙低廣狹長短不均之處是則所謂絜矩也以絜矩之心行絜矩之政天下之大將無一人不得其分無一事不得其理無一地之不從其化人人親其親長其長恤其孤由家而國國無不然由國而天下天下無不然所謂王道平平王道蕩蕩王道正直端有在於斯矣所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂絜矩之道朱熹曰此覆解上文絜矩二字之義如不欲上之無禮於我則必以此度下之心而亦不敢以此無禮使之不欲下之不忠於我則必以此度上之心而亦不敢以此不忠事之至於前後左右無不皆然則身之所處上下四傍長短廣狹彼此如一而無不方矣彼同有是心而興起焉者又豈有一夫之不獲哉所操者約而所及者廣此平天下之要道也故章内之意皆自此而推之臣按先儒金履祥有曰大學傳之十章釋治國平天下者也天下至廣也天下之人至衆也孰為經制之本孰為統馭之略傳不一言焉而惟諄諄以絜矩之義反覆言之蓋天下雖大億兆雖衆然皆一人之積耳夫乾始坤生塞體帥性而為人人情固不相逺也平天下者惟以一人之心體天下之心以天下人之心為一人之心推而度之概而取之則各得其所而天下平矣此絜矩所以為平天下之要道也大學傳之十章反覆推明固不一節要其旨意不過一綱二目而已一綱即絜矩也二目即財利也君子小人也目雖有二其因一耳蓋所謂絜矩者固欲以公天下之好惡然天下之所同好者財利也公其利以利天下者君子也利其利以害天下者小人也是又民心之所同好同惡也是故十章之傳第一節以起絜矩之道第二節以解絜矩之義第三節眀絜矩之得也第四節眀不絜矩之失也第五節則總得失之説以結之第六節承得衆之説以眀有財之本絜矩之效也第七節因有財之説以眀内末之非不絜矩之戒也第八節並論財民聚散之效第九節獨指貨悖出入之應皆絜矩與否之類感也第十節則總善不善以結之此皆就貨利一目反覆之以明絜矩不絜矩之分也十一節承上文善字以明好善之實十二節承上文寳字以明仁親之實此善絜矩者也十三節引秦誓能容之人君子之絜矩者也不能容之人小人之反絜矩者也十四節絶小人之決絜人心之所惡而仁人得好惡之正也十五節以戒用君子之緩退小人之不能逺知絜人心之所好惡而未能盡好惡之道者也十六節感君子小人進退之失言好惡拂人之菑不能絜矩而反人心之好惡者也十七節則又總得失之説以終之此皆就君子小人一目反覆之以眀絜矩不絜矩之分也十八節即財利一目以指國家生財之有道十九節即君子小人一目以論仁不仁者之於財二十節明仁義之説以總之二十一節明君子之不專其利絜矩之正也二十二節明小人之必専其利絜矩之反也兩結之以義為利之語即上文以善為寳之意也此傳十章之大略也節段雖多其綱則一綱目雖異其歸則同参而伍之經而緯之反覆而玩味之其意切而所語者大其辭詳而所持者約誠平天下之要道大學之極功也為人君者誠能即一人而絜之合人人而矩之絶一己之私而公天下之利用君子之利而去小人之私使天下之大同得其所好同愜其所惡親賢樂利各得其所天下其有不平者乎臣謹詳履祥此説推明治國平天下章之旨義無餘蘊矣朱熹所謂章内之意皆自此而推之所謂此者指絜矩而言也平天下之要道端莫外此臣故詳載之以為願治之聖君告嗚呼為學而至於平天下學之道盡矣為治而至於天下平治之道極矣曾子親受大學於孔子其傳眞切明實故其為書鑿鑿乎皆布帛菽粟確確乎皆参苓芝术無有𤣥妙髙虚之談無有宏闊夸大之見此真孔門傳授心法儒者當世守之以為輔世長民之術人君當世傳之以為化民成俗之本聖神功化之極中大學衍義補卷一百五十九
