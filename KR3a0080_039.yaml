body:
  text: 大學衍義補卷三十九明丘濬撰治國平天下之要明禮樂禮儀之節中禮運孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死方慤曰禮本乎天之道故先王制禮所以承乎天之道禮出乎人之情故先王制禮還以治人之情人之所欲莫甚于生所惡莫甚于死禮之得失遂有死生之道此其所以為急歟臣按禮運此言因言偃問禮如此乎急而孔子答之如此以見禮之為禮上以承天道下以治人情其得失為人生死所繫人而無禮乃不如鼠之有體此其雖生不如死也嗚呼人之所急孰有過于死生哉禮之所繫如此其急可知也夫禮之初始諸飲食其燔黍以黍加諸燒石之上捭豚擘析豚肉燒食之汙尊掘地為汙坎以盛水而抔飲以手掬水而飲蕢桴摶土塊為鼓椎而土鼓築土為鼓猶若可以致其敬于鬼神鄭𤣥曰言其物雖質略有齊敬之心則可以薦羞于鬼神鬼神饗德不饗味也臣按人之生也先有飲食飲食之初乃禮之所由起也其初未有釜甑刀匕以及罍爵鼓樂之類所食用也以是而用以致敬鬼神也亦以是是以彌文之世恆思太古之初凡有制作恆寓質朴之意于繁文之中稍存古人制禮之初意是故禮者君之大柄也所以别嫌明微儐接賓以禮曰儐鬼神考制度别仁義所以治政安君也故政不正則君位危君位危則大臣倍違上行私小臣竊盜也刑肅峻急而俗敝敗也則法無常法無常而禮無列上下之私禮無列則士不事不修職也也刑肅而俗敝則民弗歸也是謂疵國吳澄曰别謂剖判之嫌謂似同而不同者明謂著察之微謂可見而難見者凡祀祭享皆儐鬼神也布帛長短以刀裁之曰制以尺量之曰度制度不定以禮稽考之仁義所施輕重不一以禮辨别之君之執禮以為柄者決人事于顯感鬼神于幽粗而考長短廣狹之器數精而别親疏尊卑之等殺並須用禮禮所以治其國之政使不亂安其君之位使不危也以下遂言君危政亂之禍禮可以正天下國家政不正謂為政不以禮也政不正之所致有二一則君位危二則法無常君位危則失其尊髙下無忌憚則大臣為姦小臣為盜君務嚴刑勝之而上下睽乖習俗敝壞矣法無常謂渝其律令下無遵守而天秩之儀亦紊其次矣士之所事者禮也有國而無禮則士無所服習矣民之所歸者德也有刑而無德則民無所懷嚮矣此疵病之國也臣按禮為人君操持之大柄所以治天下之政所以安一人之尊皆由是也後世人君皆知以政為治而不知本之禮以為政失其本矣雖然蓋亦日用而不自知耳向也不知而暗用之今既知之盍反其本而明明執之以持世乎故禮達而分定故人皆愛其死而患其生臣按昔人有言天下之勢莫患乎上下無以相别而分守無以相安也若夫主勢一定而君德既孚天下之民方且遵名守教相從于畏愛則象之中甘心于服役事養之際求其為自安自適之不暇安有欺背替陵之事哉故曰禮達而分定則人皆愛其死而患其生好生惡死人心之所同然聖人有禮以率天下能使所欲有甚于生所惡有甚于死大哉禮乎其功用之大有如此者禮教既達非但其分之定亦使其心之安也故聖人之所以治人七情修十義講信修睦尚慈讓去爭奪舍禮何以治之臣按禮運此章上文有曰何謂七情喜怒哀懼愛惡欲何謂人義父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患而繼之以此以見禮之為禮乃聖人治情修義之本興利除患之具人君未有舍此而能為治者也故禮義也者人之大端也所以講信修睦而固人肌膚之㑹筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇孔穴也故惟聖人為知禮之不可以已也故壞國喪家亡人必先去其禮陳澔曰肌膚之總㑹筋骸之聨束非不固也然無禮以維飭之則惰慢傾側之容見矣故必禮以固之也竇孔穴之可出入者由于禮義則通達不由禮義則窒塞故以竇譬之聖人之能達天道順人情者以其知禮之不可以己也彼敗國之君喪家之主亡身之夫皆先去其禮之故也臣按禮必有義禮而不合于義則為非禮之禮故古人言禮必兼義言之蓋以人之為人有禮則生無禮則死有禮則安無禮則危而其所以為人者其大端在禮之義而已有此禮義則外焉而信實以講和睦以修而與人也誠內焉而肌膚有所㑹筋骸有所束而在己也固明焉而養生送死幽焉而郊天享廟此其大端緒也上焉而通達天道下焉而和順人情此其大竇穴也是禮也人人由之而不人人知之唯聖人則知此禮為人大端為人大竇雖欲己之而不可以己也于不可已而已之則國必壞家必喪人必亡故禮也者義之實也協諸義而協則禮雖先王未之有可以義起也張載曰人情所安即禮也故禮所以由義起臣按禮之為禮皆義之所當為者也義不當為則禮不可行則是禮之用皆是義之實也古昔聖人所制之禮皆是合為之事茍有事焉考之先王雖未為之禮然以之協合于義而于義無所悖則是當為之事也吾則以義起之而為之節文儀則焉是亦聖人之所許也先王能修禮以達義體信以達順故此順之實也吳澄曰大順之應如此亦無他故而使之然蓋由古先聖王能修治其禮而達之于禮之義以教天下之人體實理于心而達之于一身之順充而為家國天下之順之故也臣按禮運于篇終論禮之義而至于體信達順蓋言禮之極功也論禮之功用而至于此蓋不可復加矣然而反推其本固在于修禮而禮之所以修者則又在乎敬而已矣禮器曰先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行臣按發已自盡為忠循物無違為信以之為禮之本固矣若夫義者合宜之謂理者有條理之謂茍儀文度數之間登降上下之際不合于宜而無條理焉則亦不文矣此禮所以貴乎有本有文無忠信則禮不能立無義理則禮不可行孔子曰禮不可不省也禮不同不豐不殺此之謂也蓋言稱也是故先王之制禮也不可多也不可寡也唯其稱也是故君子太牢而祭謂之禮匹士太牢而祭謂之攘管仲鏤簋簋有雕鏤之飾朱紘冕繫山節藻梲君子以為濫矣晏平仲祀其先人豚肩不掩豆浣衣濯冠以朝君子以為隘矣臣按禮之等不同而各有當然之則過于豐則踰降而殺則不及一惟稱而已矣是以天子太牢而祭稱也則謂之禮匹士太牢而祭不稱也則謂之攘焉攘者非其有而取也管仲之濫豐而不稱者也晏平仲之隘殺而不稱者也先王之制禮或稱其內或稱其外寡者不可多多者不可寡一惟歸之于稱君子之行禮者其可不之省察而妄有所去取加損哉是故君子之行禮也不可不慎也衆之紀也紀散而衆亂臣按禮所以防範人心綱維世變如綱之有紀然紀散則綱之目無所維禮散則人之心無所守前篇言壞國喪家亡人必先去其禮者此也禮也者猶體也體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可掩微者不可大也陳澔曰體人身也先王經制大備如人身體之全具矣若行禮者設施或有不當亦與不備同也大者損之小者益之掩其顯著其微是不當也臣按禮之在天也有自然之節文其在人也有當然之儀則故先王制之以為度數亦有一定之理如人身之有四肢百體在上者不可移之下在外者不可納之內左不可遷之右大不可減為小禮之為禮亦若是而已矣故曰禮也者猶體也體不備謂之不成人故經禮三百曲禮三千其致一也未有入室而不由戶者朱熹曰禮儀三百便是儀禮中士冠諸侯冠天子冠禮之類此是大節有三百條如始加再加三加又如坐如尸立如齊之類皆是其中小目臣按經禮謂禮之經常者如冠昏喪祭朝聘㑹同之類曲禮謂禮之委曲者如進退升降俯仰揖遜之類禮雖有三千三百之多求其極致一而已矣一者何敬是也入室必由戶行禮必由敬未有入室而不由戶者豈有行禮而不由敬者乎禮也者反本修古不忘其初者也臣按本謂人心之初古謂禮制之初禮之行也必反其本求之于人心本然之初不可任情而直行必修其古考夫先王制作之始不可率意而妄為反思其本修舉夫古則是不忘其初矣君子曰甘受和白受采忠信之人可以學禮茍無忠信之人則禮不虛道是以得其人之為貴也臣按味有五而甘者其自然之味也色有五而白者其自然之質也甘則可以受五味之和白則可以受五色之采人之有是忠信猶味之甘色之白也有是忠信之質而後可以學禮忠信者何誠實之理也人無誠實則虛僞矣禮其可以虛僞為乎是以人之欲行禮者必以誠實為主而人君之任人以行禮亦必用誠實之人也郊特牲曰禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而敬守之天子之所以治天下也朱熹曰此蓋秦火之前典籍備具之時之語固為至論然非得其數則其義亦不可得而知矣况今亡逸之餘數之存者不能什一則尤不可以為祝史之事而忽之也臣按禮有數有義數其事物之粗者義則其精微之理也先王盛時儀文具備而凡一時掌文書司贊祝之人莫不知其登降灌奠之節俎豆牲醴之數特于禮之所以然與其所當然者有所不知耳自秦廢禮之後漢興不能復古凡三代之儀文器數一切掃地所幸者經典尚存古昔先王制作之義猶見于簡冊之中耳是以秦以前數易陳而義則難知漢以後義猶可以討論而數則有不能以盡考者矣雖然後有作者之聖能本吾心之敬而酌以先王之義凡儀文有所闕略一皆以義起之因時制宜以為一代之禮而不徒事乎政治刑罰之末本乎禮以治躬主乎敬以行禮而又立為定制以貽子孫使之世守而不替其于三代之治殆庶矣乎經解曰禮之于正國也猶衡之于輕重也繩墨之于曲直也規矩之于方圜也故衡誠縣音𤣥不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜君子審禮不可誣以姦詐臣按經解此言則知禮之為禮非獨以之辨上下定民志亦可用之以察人情審事理于凡天下之人情事理或輕或重或曲或直或方而常或圜而變一以禮而正之莫不各因其自然而得其所以然而格之以當然之道雖有姦欺詐僞之術無所施矣是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也故以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序孔子曰安上治民莫善于禮此之謂也吳澄曰隆者其崇重之心由者其踐行之迹方猶法也禮者敬讓之道也人皆隆禮由禮則凡奉宗廟者皆敬先入朝廷者皆敬貴處室家者皆讓父兄處鄉里者皆讓長老敬讓之道達于宗廟朝廷室家鄉里故上為下之所敬讓而居上者不危不危則安矣民知君之當敬讓而為民者不亂不亂則治矣其安其治皆由禮而然故曰莫善于禮記者推言禮之功用而引孔子之言以結之也臣按吳澄之言備矣故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也昏姻之禮所以明男女之别也臣按古昔聖王之為治不必拘拘于禁令刑罰一惟以禮明之上而朝廷外而侯國下而里閭族黨莫不制為當行之禮以明其當行之道使之知所以慕向而興起也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患臣按坊記有曰禮者因人情而為之節文以為民坊者也先王制為此禮莫不各有所本亦莫不各有所用有以舉之莫敢廢也是何也創業垂統之君燭理既明涉世既深所以制為一代之制者灼知其源之所自來而逆料其流之所必至不徒然也為之後者不推究其本末輕重有所更革焉不可也况又去之乎禮經壞坊之譬切矣坊以障水非一日所能成也成之甚難而壞之甚易幸而時之熯旱無水患也率意壞之一旦秋雨時至壞山陵衝城郭蕩廬舍倉卒欲為之坊得乎繼世之君輕去祖宗之禮法者何以異此故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬬之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也微其止邪也于未形使人日徙善遠罪而不自知也是以先王隆之也易曰君子慎始差若毫釐繆以千里此之謂也臣按所引易文今易無之蓋逸文也所謂君子慎始一言誠萬世人君為治之要焉夫天下之事莫不有所始其所始也皆起于細微眇末之間故聖人制禮以為慎始之具因人有男女之欲而易至于淫辟也故于其匹配之始而制為昏姻之禮因人有飲食之欲而易至于爭鬬也故于其㑹合之始而制為鄉飲之禮以至喪祭朝覲之初莫不皆為之禮使不至于恩薄而敗起則是止邪于未形而使民日遷徙于善遠離夫罪有不知其所以然者矣茍不于其始而慎之則其差也始于毫釐之間而其終也得失成敗之分乃有至于千里之遙焉嗚呼君子之作事也其可不慎于始乎欲慎其始舍禮不可也先王所以隆重之有由然矣哀公問孔子曰民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以别男女父子兄弟之親昏姻疏數之交也君子以此之為尊敬然臣按民之所由生者以禮為大則失此禮民有不得其死者矣君子以之為尊敬如此夫豈徒然哉後世乃以法持世而棄禮蓋不知其民之所由生者其大在此也仲尼燕居子曰禮乎禮夫禮所以制中也吳澄曰中者無過不及制者裁也子貢見夫子言師商之過不及遂問夫子何以得為過不及之中而夫子答以禮也蓋禮有節以禮裁制之使中其節則無過亦無不及矣先云禮乎者設為問辭後云禮者設為答辭也臣按理之出于人心事之行于天下莫不各有天然自有之正道當然得宜之定則然人稟賦各殊而其學力有至有不至是以事之行者不能一一皆合于人心而中夫天理也何則人之生也剛克者多失之太過柔克者多失之不及剛者則過于剛而不足于柔柔者則過于柔而不足于剛是以其行事也寬則失于太縱而無制猛則失于太苛而無恩或優容于此而操切于彼或慢令于前而致期于後不失之有餘則失于不足是何也無禮以為之裁制也用禮以裁制天下之事如布帛之刀尺如梓匠之斧斤相體以為之衣隨材以制其用不使其有餘亦不使其不足既無太過亦無不及子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求于幽室之中非燭何見若無禮則手足無所錯耳目無所加進退揖讓無所制是故以之居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其策軍旅武功失其制宫室失其度量鼎失其象味失其時樂失其節車失其式鬼神失其饗喪紀失其哀辨說失其黨官失其體政事失其施加于身而錯于前凡衆之動失其宜如此則無以祖始也洽合也于衆也吳澄曰治者使之不亂也即事之治即其事而治之以禮也有其事必有其治之之禮治國而無禮則其事必亂而不能治如無目之人無相者前導旁扶則不能有所往如黑暗之時在黑暗之地無燭以照則不能有所見無禮則手足皆妄動故曰無所錯耳目皆妄聽妄視故曰無所加進退揖讓無以裁制而使之中節别即辨也策謂講武教戰之謀策制謂全師克敵之法制臣按燕居此章之言可見禮之無乎不在一日不可以無禮一事不可以無禮一言一動一進一退與凡天下之大萬幾之衆一事之行皆必有所以治之者所以治之者何禮而已矣唐虞三代之君率本此禮以為治後世人主生死乎節文儀則之中而不自知其皆聖人所制之禮一惟以事視之殊不知事之所以中節者即禮之所以為禮也古人創之于前祖宗述之于後凡吾今日之所餔啜者皆古人之糟粕所衣被者皆祖宗之餘裔若瞽而無相助之人與冥行于昏暗之夜然而未至于亡者有此禮以為之治也然則有志于三代之治者可不以禮而為之本乎坊記子云小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為節文以為民坊者也臣按坊記此章上文有曰君子之道譬則坊與防同與坊民之所不足者也大為之坊民猶踰之故君子禮以坊德刑以坊淫命以坊欲而繼之以此坊之義見前經解中所謂君子之道即禮也國之有禮猶水之有坊坊以止水因水之藝禮以坊民因民之情民之情莫不好富而惡貧好貴而惡賤富與貴者必驕驕必至于為亂貧與賤者必約約必至于為盜此聖人既以禮為之大坊節其過不及之情俾其歸于中正之德化不可入者有刑之法以坊之使其有所忌憚而不至于淫心無窮己者有命之理以坊之使其知所分限而不極其欲所以然者無非因人之情而為節文之禮也喪服四制凡禮大體體天地法四時則隂陽順人情故謂之禮陳澔曰體天地以定尊卑法四時以為往來則隂陽以殊吉凶順人情以為隆殺先王制禮皆本于此不獨喪禮為然臣按先王制禮其大體雖曰體天地法四時則隂陽而其大歸則在于順人情也以上論禮儀之節中大學衍義補卷三十九
