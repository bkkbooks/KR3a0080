body:
  text: 大學衍義補卷一百十四明丘濬撰治國平天下之要嚴武備總論威武之道上易師之象曰地中有水師君子以容民畜衆程頥曰師為卦坤上坎下以二體言之地中有水為衆聚之象以二卦之義言之内險外順險道而以順行師之義也以爻言之一陽而為衆隂之主統衆之象也比以一陽為衆隂之主而在上君之象也師以一陽為衆隂之主而在下將帥之象也地中有水水聚于地中為衆聚之象故為師也君子觀地中有水之象以容保其民畜聚其衆也朱熹曰師兵衆也下坎上坤坎險坤順坎水坤地古者寓兵于農伏至險于大順藏不測于至靜之中水不外于地兵不外于民故能養民則可以得衆矣臣按先儒謂古者兵農合一居則為比閭族黨之民役則為卒伍軍旅之衆容之畜之于無事之時而用之于有事之日此衆即此民也容之則保愛而不傷畜之則聚處而不散有以容之故無事之時得以生養而自遂有以畜之則有事之時易于召集以相衛國家之有衆亦猶土地之有險也地有險則人莫敢踰國有兵則人不敢犯然兵雖險而用之又必以順焉不順不動也序卦曰師者衆也衆必有所比故受之以比程頥曰人之類必相親輔然後能安故既有衆則必有所比比所以次師也吕祖謙曰師以二為主二將帥也以一陽而為衆隂之所聴命者比以五為主以一陽而為衆隂之所親輔者也比所以次師者言衆雖聴命于將帥而心當親輔于君也雜卦曰比樂師憂蘓軾曰有親則樂動衆則憂余芑舒曰在上而得衆故樂居下而任衆故憂中天下而立定四海之民比之樂也鞠躬盡力死而後已成敗利鈍非所逆覩師之憂也臣按師之為卦萬世論行師之道皆不出乎此六爻之間凢軍旅之用所謂出師駐師將兵將將與夫奉辭伐罪旋師班賞無所不有先儒謂雖後世兵書之繁不如師卦六爻之略且所論者王者之師比後世權謀之書竒正甚逺為天下者制師以立武立武以衛國衛國以安民烏可舎此而他求哉謙六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也程頥曰富者衆之所歸惟財為能聚人五以君位之尊而執謙順以接于下衆所歸也故不富而能有其鄰也鄰近也不富而得人之親也為人君而持謙順天下所歸心也然君道不可専尚謙柔必須威武相濟然後能懐服天下故利行侵伐也威徳並著然後盡君道之宜而无所不利也征不服者征其文徳謙遜所不能服者也文徳所不能服而不用威武何以平治天下非人君之中道謙之過也朱熹曰以柔居尊在上而能謙者也故為不富而能以其鄰之象盖從之者衆矣猶有未服者則利以征之而于它事亦无不利楊萬里曰征不服者不服而征不得已爾舜征苖不得已也漢武征匈奴豈不得已乎臣按征者正也下有不正上則正之下之人非有不正之事而上之人輙興師以侵伐之則上已不正矣如正人何在上之人且謙柔和順而下之人廼負固不服桀驁不馴其不正甚矣上之人専尚文徳而不奮威武以正之則流于姑息失之寛縱廼謙之過非謙之益也又豈所謂稱物平施者哉豫利建侯行師程頥曰豫順而動也豫之義所利在于建侯行師夫建侯樹屏所以共安天下諸侯和順則萬民悦服兵師之興衆心和悦則順從而有功故豫悦之道利于建矦行師也又上動而下順諸矦從王師衆順令之象君萬邦聚大衆非和悦不能使之服從也朱熹曰豫和樂也人心和樂以應其上也又曰建矦行師順動之大者臣按兵師之興所以為民也興師而民心不悦則其所行必非王者之師仁義之舉也是以人君舉事既揆之已復詢之衆衆心和悦然後從而順之茍有不悦必中止焉寜失勢于他人不失心于已衆夬之彖曰夬揚于王庭孚言信之在中誠已也號命衆之辭有厲危也告自邑私邑也不利即從也戎尚武也利有攸徃程頥曰小人方盛之時君子之道未勝安能顯然以正道决去之故含晦俟時漸圖消之之道今既小人衰㣲君子道盛當顯行之于公朝使人眀知善惡故云揚于王庭也君子之道雖長盛而不敢忘戒備故至誠以命衆使知尚有危理焉以此之甚盛决彼之甚衰若易而無備則有不虞之悔是尚有危理必有戒懼之心則無患也聖人設戒之意深矣然君子之治小人以其不善也必以已之善道勝之故聖人誅亂必先修已舜之敷文徳是也告自邑先自治也戎兵者彊武之事不利即戎謂不宜尚壯武也朱熹曰夬决也陽决隂也其决之也必正名其罪而盡誠以呼號其衆相與合力然亦尚有危厲不可安肆又當先治其私而不可專尚威武則利有所徃也皆戒之之辭九二惕號莫夜有戎勿恤程頥曰内懐兢惕而外嚴誡號雖莫夜有兵戎亦可勿恤矣臣按先儒謂不利即戎與莫夜有戎相應莫夜有戎言小人常伺隙興兵以冦君子不利即戎言君子不當専尚威力以勝小人盖君子之感小人固自有道若徒以力角力則君子未必有加于小人而適以敗天下之事爾此聖人之所以深戒也然則所謂君子勝小人之道奈何曰君子之治小人以其不善也必以已之善道勝之養之以善而横逆自若也則含晦俟時以冀其機之可乗仗義執言以明其罪之所在布誠信以孚衆心申號令以竦衆聴相與同心以除害協力以敵愾兢兢焉常存危厲之心不欺彼衰而遂安肆也業業焉益盡自治之道不恃已彊而事威武也内懐乎兢惕外嚴乎備戒雖有倉卒莫夜之戎亦無所憂矣夫然後以堂堂之陳正正之旗舉無敵之師而加諸有罪之人夫何徃而不成功哉茍或恣其一决之勇而求大快于吾心則非徒不能除其害而反有以致其大害矣聖人于夬之卦而丁寜深切如此其為君子謀至矣有天下者可不戒哉萃之象曰澤上于地萃君子以除戎器戒不虞程頥曰澤上于地為萃聚之象君子觀萃聚以除治戎器用戒備于不虞凡物之萃則有不虞度之事故衆聚則有爭物聚則有奪大率既聚則多故矣故觀萃象而戒也除謂簡治也去弊惡也除而聚之所以戒不虞也朱熹曰除者修而聚之之謂又曰大凡物聚衆盛處必有爭故當預為之備如人少處必無爭纔人多少間便自有爭所以當預為之防也丘富國曰天生五材誰能去兵用兵亂也去兵亦亂也君子當萃聚之世而除戎器非右武也特戒不虞而已如秦人之銷鋒鏑唐末之議銷兵則非謂之除戎器漢武席文景富庶之極至窮兵黷武以事四夷又豈戒不虞之義乎臣按民生于世猶澤在地中澤潤乎地而不燥地容乎澤而不溢相與含容而不覺其為多也澤一出乎地上則日積月累其出也無窮盡其流也無歸宿則必有奔放潰決之虞矣譬之民焉當夫國初民少之際有地足以容其居有田足以供其食以故彼此相安上下皆足安土而重遷惜身而保類馴致承平之後生齒日繁種類日多地狹而田不足以耕衣食不給于是起而相爭相奪而有不虞度之事矣是以聖王随其時而為之制既為之足食以順其生又為之足兵以防其變所謂足兵者不止戎器也而獨以戎器言盖兵與農皆出于民農所以别于兵者以所執之器異也執耒耜痔錢鎛者則謂之農手戈矛擐甲胄者則謂之兵其寔皆民也言器則人在其中矣大抵兵威之所以不振者由上之人狃于治安而不知戒也盖事乆則必弊除其舊而新之則宿弊為之一新人聚則必散收其散而聚之則泮渙有所拘束夫然則事之可虞者皆不足虞矣竊惟我聖祖承元政廢弛之後民俗凋弊之餘大振威武以立國内而畿甸外而邉方設立衛所每衛五所每所千軍錯時郡邑之中以為民生之衛盖不待民生之萃聚而後戒其不虞也聖祖思患豫防之心逺矣今承平百餘年生齒之繁比國初㡬千倍蓰而兵戎之衆反不及什二三焉豈大易因萃象以除戎器戒不虞之義哉㐲惟聖明留心武事明勅所司通將洪武年間原設衛所軍士隊伍并見在數目以聞下執政大臣俾其詳究軍伍前後所以多寡之數必欲復祖宗之舊其道何繇或别有它策具疏備陳然後集議除其舊而新之收其散而聚之㫁㫁乎必有益于國必無損于民然後行之庶㡬合乎大易萃卦之象以為國家制治保邦千萬年長乆之計宗社生靈不勝大幸聖人以此洗心退藏于密言凶與民同患神以知來知以藏徃其孰能與于此哉古之聰明睿知神武而不殺者夫朱熹曰聖人之徳無一塵之累無事則其心寂然人莫能窺有事則神知之用随感而應神武不殺得其理而不假其物之謂又曰武雖是殺人的事聖人却存此神武而不殺也臣按神武不殺四字雖聖人以贊易卦之用然武而謂之神神武而謂之不殺神武而不殺之一言是誠聖人文化之妙用武徳之至仁函隂陽生殺之機妙仁義生成之化方其事之未來也運其神妙之機而測度之于㡬㣲朕兆之先及其事之既徃也斂其明照之用而包函之于幽㣲隂密之地用是以立武則變化而莫測運用而無方仁厚而不傷廣大而無問是即帝堯廣運之武成湯天錫之勇也伏惟聖人在上體大易神智之徳存神武不殺之心民之有患不得已而用武本仁心而運神智仗道義以施徳威以不殺而為殺也則聖武布昭于天下則其所謂乃武者不獨並稱于乃文而且與乃聖乃神之妙用巍巍乎蕩蕩乎與帝堯之徳同一廣運矣虞書益曰帝徳廣運乃聖乃神乃武乃文朱熹曰廣者大而無外運者行之不息大而能運則變化不測故自其威之可畏而言則謂之武自其英華發外而言則謂之文臣按益贊堯之徳不徒曰徳而且曰帝徳廣運不徒曰廣運而繼曰乃聖乃神乃武乃文謂之乃者以見帝徳之所以廣運有此四者而其所以知其為聖神文武者乃以時而出之也本神聖以為文武此聖人之文所以為文思而光于四表而其武所以為神武而不殺也歟商書伊尹曰惟我商王布昭敷著聖武代虐以寛兆民允懐蔡沈曰聖武猶易所謂神武而不殺者湯之徳威敷著于天下代桀之虐以吾之寛故天下之民信而懐之也臣按先儒謂不徒武而謂之聖武以見其出于徳義之勇故能除暴救民以安天下此聖武之實也至于天下之民莫不信而懐之此聖武之效也詩商頌長發之七章曰武王載斾有䖍秉鉞如火烈烈則莫我敢曷遏同苞有三蘖旁生萌蘖謂韋顧昆吾也莫遂莫達九有有截韋顧既伐昆吾夏桀韋顧昆吾皆桀之黨朱熹曰武王湯也虔敬也言恭行天討也言湯既受命載斾秉鉞以征不義桀與三蘖皆不能遂其惡而天下截然歸商矣初伐韋次伐顧次伐昆吾乃伐桀當時用師之序如此臣按先儒謂載斾秉鉞不敢不虔所謂臨事而懼也夫成湯以天錫勇智之資以至仁伐至不仁而猶虔敬如此况無成湯之徳之才而所遇者又非韋顧昆吾之敵而可以恣肆而不知所懼哉殷武之首章曰撻疾貌彼殷武奮伐荆楚罙冒也入其阻裒聚也荆之旅有截其所湯孫之緒朱熹曰殷武殷王之武也湯孫謂髙宗舊說以此為祀高宗之樂盖自盤庚没而殷道衰楚人叛之高宗撻然用武以伐其國入其險阻以致其衆盡平其地使截然齊一皆高宗之功也易曰高宗伐鬼方三年克之盖謂此歟李雩曰楚為夷狄之國世亂則先叛世治則後服商室中㣲徃徃為患高宗所以伐之朱善曰自古中興之君未有不以武徳勝者盖繼衰亂之後内之則法度之既弛紀綱之既壊外之則諸矦之既叛四夷之既起自非以武徳勝之則安能舉王綱于已墜合人心于已離撥亂而復反於正哉若殷之高宗是已信乎其無愧於為湯之孫矣臣按高宗伐鬼方三年克之事之至難者也然詩人頌高宗不徒曰武而曰殷武而又以為湯之緒以見高宗所以用武逺伐暴亂者不過承其先世餘烈以孫而成祖之功緒而已然則後人所成之功何者而非前人之緒哉皇矣美周也其五章曰帝謂文王設為天命文王之辭無然不可如此畔離也援攀援無然歆欲之動也羡愛慕誕先登于岸道之極至處密人密須氏姑姓之國不恭敢距大邦侵阮國名徂徃也共阮國之地名王赫斯怒爰整其旅周師以按遏也徂旅密師之徃共者以篤于周祜福也以對答也于天下孟子曰此文王之勇也文王一怒而安天下之民朱熹曰人心有所畔援有所歆羡則溺于人欲之流而不能以自濟文王無是二者故獨能先知先覺以造道之極至盖天寔命之而非人力之所及也是以密人不恭敢違其命而擅興師旅以侵阮而徃至于共則赫怒整兵而徃遏其衆以厚周家之福而答天下之心盖亦因其可怒而怒之初未嘗有所畔援歆羡也此文王征伐之始王安石曰有所畔援歆羡不得其欲而怒則其怒也私而已文王之怒是乃與民同怒而異乎人之私怒也臣按怒者七情之一怒而無所畔援歆羡是怒而得其中中而中其節是之謂和聖人一心中和之極是惟不怒而其所怒者必其所當怒而不可不怒者焉無所偏倚無所乖戻乃合天理人情于一心故一怒而可以安天下之民彼秦皇漢武之窮兵黷武是怒所不當怒者也所怒者一己之私一怒而害天下之民乃至毒流于四海禍延于子孫嗚呼可不戒哉其七章曰帝謂文王予設為上帝之自稱懐眷念也明徳文王之徳不大聲以猶與也色不長夏以革未詳不識不知順帝之則法也帝謂文王詢爾仇方讎國同爾兄弟與國也以爾鉤援鉤梯也與爾臨臨車也衝以伐崇國名墉城也司馬遷曰崇矦虎譛西伯于紂紂囚西伯于羑里其後赦西伯賜之弓矢鈇鉞得専征伐曰譛西伯者崇矦虎也西伯歸三年伐崇矦虎而作豐邑朱熹曰言上帝眷念文王而言其徳之深㣲不暴著其形迹又能不作聰明以循天理故又命之以伐崇也吕氏謂此言文王徳不形而功無迹與天同體而已雖興兵以伐崇莫非順帝之則而非我也嚴粲曰崇矦譛文王而文王伐之疑于報私怨者然虎倡紂為不道乃天人之所共怒文王奉天討罪何容心哉盖由其心純乎天理故喜怒皆與天合所仇者非私怒所同者非茍合也八章曰臨衝閑閑徐緩也崇墉言言髙大也執訊連連属續狀攸馘割耳也安安不輕暴也是類祭上帝是禡祭始造軍法者是致致其至是附使之來附四方以無侮臨衝茀茀彊盛貌崇墉仡仡彊壯貌是伐是肆縱兵也是絶是忽滅也四方以無拂戻也左氏曰文王伐崇三旬不降退修敎而復伐之因壘而降朱熹曰言文王伐崇之初緩攻徐戰告祀羣神以致附來者而四方無不畏服及終不服則縱兵以滅之而四方無不順從也夫始攻之緩戰之徐也非力不足也非示之弱也將以致附而全之也及其終不下而肆之也則天誅不可以留而罪人不可以不得故也此所謂文王之師也臣按先儒謂文王之伐始于密王功之始也終于崇天下遂無不服王功之成也文王伐崇之師詩人于其卒章形容文王所以緩攻徐戰之方致至待附之故及其終不服從而後縱兵誅滅之意朱子所以觧釋之者明白詳悉後世帝王伐叛討罪所當取法焉者也文王有聲之一章曰文王有聲遹發語辭駿大也有聲遹求厥寜遹觀厥成文王烝哉其二章曰文王受命有此武功既伐于崇作邑于豐即崇國之地文王烝哉孔頴達曰武功非獨伐崇而已所伐䢴耆密須昆夷之属皆是也别言伐崇者以其功最大其伐最後故特言之為作邑張本言功成廼作邑也朱熹曰此詩言文王遷豐武王遷鎬之事而首章推本之曰文王之有聲也甚大乎其有聲也盖以求天下之安寜而觀其成功耳文王之徳如是信乎其克君也哉臣按先儒謂文王之所以大有聲者本由于征伐而其所以征伐者不過求天下安寜而觀其功底于成耳盖以既為人君則當奉天道以安民民有不安必有逆天命以致之者于是乎奉天命以討其罪使之不敢厲吾民焉罪人既得而其所以為安集生聚之者不可無所居故又為之邑以居之焉凡若是者非貪功以立威也非廣地以附衆也盡吾為君之道以無負上天付託之意焉耳大明之七章曰殷商之旅其會如林言衆也矢陳也于牧野惟予矦維也興上帝臨女無貳疑也爾指武王心朱熹曰此章言武王伐紂之時紂衆會集如林以拒武王而皆陳于牧野則維我之師為有興起之勢耳然衆心猶恐武王以衆寡之不敵而有所疑也故勉之曰上帝臨女無貳爾心盖知天命之必然而賛其決也然武王非必有所疑也設言以見衆心之同非武王之得已耳臣按此詩可見武王之伐紂盖承上帝之命有如上帝赫赫然在上而臨督之者矣此衆所以勸之無二其心也盖人之心即天之心人心之所欲即帝命之所臨茍拂人心而肆行已志則是人心不歸人心不歸則是上帝不臨矣上帝不臨則其心不能無疑其心既疑則雖有師徒之衆將帥之賢亦豈能有成功哉是故明主之興師動衆恒反求諸心曰上帝臨我乎揆之天理而合則帝命在是矣夫然後決然為之而不疑不然則􅑶􅑶然而不敢少安也詩序酌告成大武也曰於歎辭鑠盛也王師遵循也養時晦時純熈光矣矣是用大介甲也所謂一戎衣也我龍寵也受之蹻蹻武貌王之造為也載則也用有嗣實維爾公事也允信也師朱熹曰此頌武王之詩言其初有於鑠之師而不用退自循養與時皆晦既純光矣然後一戎衣而天下大定後人於是寵而受此蹻蹻然王者之功其所以嗣之者亦惟武王之事是師爾臣按先儒謂此詩頌武王之武功言其初雖有甚盛之師而退自循養與時皆晦不見其有迹直至其時之至既純光矣然後一著戎衣而天下翕然大定此其所以為武王之武也後王於是寵而受此蹻蹻然之武功其所以嗣之者亦惟武王之事是師可也不先時而動不後時而靡君之用武能如是是亦武王也已魯頌泮水其五章曰明明魯侯克明其徳既作泮宫淮夷攸服矯矯武貌虎臣在泮獻馘所格者之左耳淑善也問訊囚也如臯陶在泮獻囚所虜獲者朱熹曰古者出兵受成於學及其反也釋奠於學而以訊馘告故詩人因魯侯之在泮而願其有是功也其六章曰濟濟多士克廣徳心善意也桓桓于征狄遏也彼東南渭淮夷烝烝皇皇盛也不呉音話不揚肅也不告于訩訟也在泮獻功其七章曰角弓其觩健貌束矢五十為束其搜矢疾聲戎車孔博廣大徒御無斁兢勸也既克淮夷孔淑不逆違令也式固爾猶謀也淮夷卒獲司馬光曰受成獻馘莫不在學所以然者欲其先禮義而後勇力也君子有勇而無義為亂小人有勇而無義為盗若専訓之以勇力而不使之知禮義奚所不為矣臣按朱熹謂作泮宫克淮夷之事他無所考故不質其為僖公之詩而且以克淮夷為頌禱之辭則是詩所謂獻馘獻囚獻功者則未必有是事也然其事雖未必有但味其辭克而謂之既既者已然之辭也考之春秋僖公十三年魯嘗從齊桓會于鹹為淮夷之病杞十六年嘗從齊桓會于淮為淮夷之病鄫當是時主會在齊而僖公從焉作頌者以公亦嘗與齊之會故掠齊之美者以頌魯歟其事之有無固不可必臣載之于此以見受成獻馘之禮皆在于學非但禮有是言而古之人寔嘗行之非虚語也以上總論威武之道上大學衍義補卷一百十四
