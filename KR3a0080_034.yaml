body:
  text: 大學衍義補卷三十四明丘濬撰治國平天下之要制國用漕挽之宜下宋定都于汴漕運之法分為四路江南淮南浙東西荆河南北六路之粟自淮入汴至京師陜西之粟自三門白波轉黃河入汴至京師陳蔡之粟自閔河即惠民河蔡河入汴至京師京東之粟歷曹濟及鄆入五丈渠至京師四河惟汴最重臣按漢唐建都于關中漢漕仰于山東唐漕仰于江淮其運道所經止于河渭一路宋都汴梁四衝八達之地故其運道所至凡四路宋朝歲漕東南米麥六百萬斛漕運以儲積為本故置三轉般倉於真今儀真楚今淮安泗今泗州三州以發運官董之江南之船輸米至三倉卸納即載官鹽以歸舟還其郡卒還其家汴船詣轉般倉漕米輸京師往來摺運無復留滯而三倉常有數年之儲臣按昔人謂宋人以東南六路之粟載於真泗楚轉般之倉江船之入至此而止無留滯也汴船之出至此而發無覆溺也江船不入汴汴船不入江豈非良法歟臣竊以謂宋人都汴漕運比漢唐為便易前代所運之夫皆是民丁惟今朝則以兵運前代所運之粟皆是轉遞惟今朝則是長運唐宋之船江不入汴汴不入河河不入渭今日江河之船各逺自嶺北湖南直達于京師唐宋之漕卒猶有番休今則歲歲不易矣夫宋人漕法其便易也如此而其回船也又有載鹽之利今之漕卒比之宋人其勞百倍一歲之間大半在途無室家之樂有風波之險洪閘之停留舳艫之衝激隂雨則慮浥漏淺澀則費推移沿途為將領之科率上倉為官攢之阻滯及其回家之日席未及暖而文移又催以兑糧矣運糧士卒其艱苦萬狀有如此者食此糧者可不知其所自哉臣于鹽法條下既已歷陳宋人轉船載鹽之法于前伏乞九重注意推行其法于今日少寬士卒之一分寬一分則受一分賜矣況其所賜非止一分哉真宗景德三年內侍趙守倫建議自京東分廣濟河由定陶至徐州入清河以達江淮漕路以地隆阜而水藝極淺雖置堰埭又歷吕梁灘磧之險罷之臣按汴水入河之故迹自漢明帝時王景修汴渠而河與汴分流至晉安時劉裕伐秦彭城內史劉遵考將水軍出石門自汴入河隋焬帝自板渚引河歷滎澤入汴又自大梁之東引汴水入泗達于淮蓋汴河舊自滎陽縣東經開封府城內又東合蔡水東注泗州入于淮今蔡河湮沒不知所在而汴河則自中牟縣入于黃河今歸德宿州虹縣泗州一帶汴河故隄尚有存者而河流久絶所謂入泗達淮者今無復有矣是則漢以來漕路所謂汴船入河者率由蔡河經泗州入于淮而吕梁之險未有以之為運道者惟晉謝玄肥水之役堰吕梁水以利運漕蓋瀦水以漸用耳非通運也宋真宗時趙守倫建此議又以歷吕梁險而竟罷由是觀之吕梁之險用之以為漕路始自我朝引沁水以入于泗經二洪下會沂河至清口以滙于淮合于河沁水者源出山西沁州之綿山舊自武陟縣入于河隨河達海自河南徙之後沁水乃别自武陟縣界東流經原武祥符歸德等處至徐州城東北與泗水合以為今運道云雍熙中轉運使劉璠議開沙河以避淮水之險喬維嶽繼之開河自楚州今淮安府至淮隂凡六十里舟行便之臣按沙河即今淮安府板閘至新莊一帶是也本朝永樂十三年平江伯陳瑄因運舟泝淮險惡乃尋喬維嶽所開故道開清江浦五十餘里置四閘以通漕又于沿河一帶增堰以防走泄蓄水以資灌注引泉以備乾涸至今以為利徽宗重和元年發運副使栁庭俊言真揚楚及高郵運河隄岸舊有斗門水閘七十九座限節水藝常得其平比多損壞詔撿討復修臣按今日運道自儀真直抵潞河其間最險者有二所髙郵湖隄及徐吕二洪是也然二洪之險地也地有定形人可以用其力湖隄之險則天也天無常變雖若非人力可為然人力勝天亦有此理惟今高郵之湖南起杭家嘴北至張家溝共三十餘里唐李吉甫為淮南節度使始于湖之東直南北築平津堰以防水患即今牽路在宋時又有斗門水閘我朝洪武九年知州趙原者始甃以甎永樂十九年加以甎之大者景泰五年又護以木樁實以甎土以備風浪綱運之上下舟楫之往來皆沿隄行人以牽百丈方其天色晴霽風恬浪靜如行鏡中然一遇西風驟起波濤洶湧頃刻之間檣楫傾沈人物淪亡不可勝計建計者往往欲于舊隄之外河泊之旁别為長隄一帶約去舊隄一二十丈許下覆鐵釡以定其基旁樹木樁以固其藝就浚其中之土以實之用甎包砌一如舊隄其中舊有減水閘三座就用改作通水橋洞引湖水于內以行舟楫仍于外隄造減水閘以節水勢如此則人力足以勝天天雖有迅歘之變人則有持循之方省官物之失陷免人命之死亡其為利益實亦非小元史食貨志元都于燕去江南極逺而百司庶府之繁衛士編民之衆無不仰給于江南自巴延獻海運之言而江南之糧分為春夏二運蓋至于京師者歲多至三百萬餘石民無挽輸之勞國有儲蓄之富豈非一代良法歟胡長孺曰杭吳明越揚楚幽薊萊密俱岸大海舟航可通相傳朐山海門水中流積淮淤江沙其長無際浮海者以竿料淺深此淺生角曰料角不可度越淮江入海之交多洲號為沙朱清者嘗傭海濵沙民楊氏家殺人亡命捕急輒引舟東行三日夜得沙門島又東北過髙句麗水口見文登夷維諸山又北見燕山與碣石往來若風與鬼形迹不可得稍怠則復來亡慮十五六往返私念南北海道此固徑且不逢淺角識之後就招懷為防海義民清與其徒張瑄隨宰相入見受金符千戶遂言海漕事試之良便遂興海運虞集曰至元十二年既平宋始運江南糧以河運弗便至元二十九年用巴延言初通海道漕運抵直沽以達京城立運糧萬户府三以南人朱清張瑄羅璧為之初歲運四萬餘石後纍增及三百餘萬石春夏分二運至舟行風信有時自浙西不旬日而達于京師內外官府大小吏士至于細民無不仰給于此臣按海運之法自秦已有之而唐人亦轉東吳粳稻以給幽燕見唐杜甫詩然以給邊方之用而已用之以足國則始于元焉初巴延平宋命張瑄等以宋圖籍自崇明由海道入京師至至元十九年始建海運之策命羅璧等造平底海船運糧從海道抵直沽是時猶有中灤之運不專于海道也元初糧道自江入淮由黃河至封丘縣中灤旱站陸運至濬縣淇門一百八十里入御河二十八年立都漕運萬户府以督歲運至大中以江淮江浙財賦府每歲所辦糧充運自此以至末年專仰海運矣海運之道其初也自平江劉家港今在蘇州府崑山縣太倉入海至海門縣界開洋月餘始抵成山計其水程自上海至楊村馬頭凡一萬三千三百五十里最後千户殷明略者又開新道從劉家港至崇明州三沙放洋向東行入黑水大洋取成山轉西至劉家島又至登州沙門島于萊州大洋入界河當舟行風信有時自浙西至京師不過旬日而已説者謂其雖有風濤漂溺之虞然視河漕之費所得蓋多故終元之世海運不廢我朝洪武三十年海運糧七十萬石給遼東軍餉永樂初海運七十萬石至北京至十三年會通河通利始罷海運臣考元史食貨志論海運有云民無挽輸之勞國有儲蓄之富以為一代良法又云海運視河漕之費所得蓋多作元史者皆國初史臣其人皆生長勝國時習見海運之利所言非無徴者臣竊以謂自古漕運所從之道有三曰陸曰河曰海陸運以車水運以舟而皆資乎人力所運有多寡所費有繁省河漕視陸運之費省什三四海運視陸運之費省什七八蓋河漕雖免陸行而人挽如故海運雖有漂溺之患而省牽率之勞較其利害蓋亦相當今漕河通利嵗運充積固無資于海運也然善謀國者恆于未事之先而為意外之慮寧過慮而無不臨事而悔今國朝都燕蓋極北之地而財賦之入皆自東南而來會通一河譬則人身之咽喉也一日食不下咽立有死亡之禍況自古皆是轉般而以鹽為傭直今則専役軍夫長運而加以兑支之費嵗嵗常運儲積之糧雖多而征戍之卒日少食固足矣如兵之不足何迂儒過為逺慮請于無事之秋尋元人海運之故道别通海運一路與河漕並行江西湖廣江東之粟照舊河運而以浙西東瀕海一帶浙江布政司及常州蘇州松江三府由海通運使人習知海道一旦漕渠少有滯塞此不來而彼來是亦思患豫防之先計也臣家居海隅頗知海舟之便舟行海洋不畏深而畏淺不慮風而慮噍故製海舟者必為尖底首尾必俱置柁卒遇暴風轉帆為難亟以尾為首縱其所如且暴風之作多在盛夏今後率以正月以後開船置長篙以料角定盤針以取向一如蕃舶之制夫海運之利以其放洋而其險也亦以其放洋今欲免放洋之害宜豫遣習知海道者起自蘇州劉家港訪問傍海居民捕魚漁户煎鹽竈丁逐一次第踏視海涯有無行舟潢道泊舟港汊沙石多寡洲渚逺近親行試驗委曲為之設法可通則通可塞則塞可回避則回避畫圖具本以為傍海通運之法萬一可行是亦良便若夫占視風候之説見于沈氏筆談每日五鼓初起視星月明潔四際至地皆無雲氣便可行舟至于巳時即止則不與暴風遇矣中道忽見雲起則便易柁回舟仍泊舊處如此可保萬全永無沉溺之患萬一臣言可采乞先行下閩廣二藩訪尋舊會通蕃航海之人許其自首免其本罪及行廣東鹽課提舉司歸德等場起取貫駕海舟竈丁令有司優給津遣既至訪詢其中知海道曲折者以海道事宜許以事成加以官賞俾其監工照依海舶式樣造為運舟及一應合用器物就行委官督領其人起自蘇州歷揚淮青登等府直抵直沽濵海去處踏看可行與否先成運舟十數艘付與駕使給以月糧俾其沿海按視經行停泊去處所至以山島港汊為標識詢看是何州縣地方一一紀録造成圖册縱其往來十數次既已通習保其決然可行無疑然後于崑山太倉起蓋船厰將工部原𣲖船料差官于此收貯照依見式造為海運尖底船隻每船量定軍夫若干裝載若干大抵海舟與河舟不同河舟畏淺故宜輕海舟畏飄故宜重假如每艘載八百石則為造一千石舟許其以二百石載私貨三年之後軍夫自載者三十稅一客商附載者照依稅課常例就于直沽立一宣課司收貯以為歲造船料之費其糧既從海運腳費比漕河為省其兌支之加耗宜量為減殺大約海舟一載千石則可當河舟所載之三河舟用卒十人海舟加五或倍之則漕卒亦比舊省矣此非獨可以足國用自此京城百貨駢集而公私俱足矣考宋朱子文集其奏劄言廣東海路至浙東為近宜于福建廣東沿海去處招邀米客元史載順帝末年山東河南之路不通國用不繼至正十九年議遣户部尚書貢師泰往福建以閩鹽易糧給京師得數十萬石京師賴焉其後陳友定亦自閩中海運進奉不絶然則此道若通閩廣之綱運亦可以來不但兩浙也况今京師公私所用多資南方貨物而貨物之來若于運河窄淺舳艫擠塞腳費倍于物直貨物所以益貴而用度為艱此䇿既行則南貨日集于北空船南回者必須物實而北貨亦日流于南矣今日富國足用之策莫大于此説者若謂海道險逺恐其損人廢財請以元史質之其海運自至元二十年始至天厯二年止備載逐年所至之數以見其所失不無意也嵗運所至之數備具于后竊恐今日河運之糧每年所失不止此數況海運無剝淺之費無挨次之守而其支兑之加耗每石須有所減恐亦浮于所失之數矣此䇿既行果利多而害少又量將江淮荆河之漕折半入海運除減軍卒以還隊伍則兵食兩足而國家亦有水戰之備可以制伏朝鮮安南邊海之夷此誠萬世之利也臣章句末儒偶有臆見非敢以為決然可行萬無弊也念此乃國家千萬年深逺之慮姑述此嘗試之䇿請試用之試之而可則行不可則止至元二十年四萬六千五十石至者四萬二千一百七十二石所失者三千八百七十八石細分之每石欠八升四合餘二十一年二十九萬五百石至者二十七萬五千六百一十石所失者一萬四千八百九十石細分之每石欠五升一合餘所二十二年一十萬石至者九萬七百七十一石失者九千二百二十九石細分之每石欠九升二合餘十二十三年五十七萬八千五百二十石至者四三萬三千九百五十石所失者一十四萬四千五百七十石細分之每石欠二斗四升九合餘二十四年三十萬石至者二十九萬七千五百四十六石所失者二千四百五十四石細分之每石欠八合餘二十五年四十萬石至者三十九萬七千六百五十五石所失者二千三百四十五石細分之每石欠九合餘二十六年九十三萬五千石至者九十一萬九千九百四十三石所失者一萬五千五十七石細分之每石欠一升六合餘十二十七年一百五十九萬五千石至者一百五一萬三千八百五十六石所失者八萬三千一百四十四石細分之每石欠五升餘二十八年一百五十二萬七千二百五十石至者一百二十八萬一千六百一十五石所失者二十四萬五千六百三十五石細分之每石欠一斗六升餘三二十九年一百四十萬七千四百石至者一百十六萬一千五百一十三石所失者四萬五千八百八石七斗細分之每石欠三升二合餘三十年九十萬八千石至者八十八萬七千五百九十一石所失者二萬四百九石細分之每石欠二升二合餘三十一年五十一萬四千五百三十三石至者五十萬三千五百三十四石所失者一萬九百九十九石細分之每石欠二升一合餘五元貞元年三十四萬五百石十二年三十四萬百石至者三十三萬七千二六石所失者三千四百七十四石細分之每石欠一升餘萬大德元年六十五萬八千三百石至者六十四八千一百三十六石所失者一萬一百六十四石細分之每石欠一升五合餘二年七十四萬二千七百五十一石至者七十萬五千九百五十四石所失者三萬六千七百九十七石細分之每石欠四升九合餘五三年七十九萬四千五百石千四年七十九萬千五百石至者七十八萬八九百一十八石所失者六千五百八十二石細分之每石欠八合餘五年七十九萬六千五百二十八石至者七十六萬九千六百五十石所失者二萬六千八百七十八石細分之每石欠三升三合餘一六年一百三十八萬三千八百八十三石至者百二十二萬九千一百四十八石所失者五萬四千七百三十五石細分之每石欠三升九合餘七年一百六十五萬九千四百九十一石至者一百六十二萬八千五百八石所失者三萬九百八十三石細分之每石欠一升八合餘八年一百六十七萬二千九百九石至者一百六十六萬三千三百一十三石所失者九千五百九十六石細分之每石欠五合餘九九年一百八十四萬三千三石至者一百七十萬五千三百四十七石所失者四萬七千六百五十六石細分之每石欠二升五合餘十年一百八十萬八千一百九十九石至者一百七十九萬七千七十八石所失者九萬四百九十一石細分之每石欠五升餘者十一年一百六十六萬五千四百二十二石至一百六十四萬四千六百七十九石所失者二萬七百四十三石細分之每石欠一升二合餘一至大元年一百二十四萬一百四十八石至者百二十萬二千五百三石所失者三萬七千六百四十五石細分之每石欠三升餘二年二百四十六萬四千二百四石至者二百三十八萬六千三百石所失者七萬七千九百四石細分之每石欠三升一合餘二三年二百九十二萬六千五百三十二石至者百七十一萬六千九百十三石所失者二十萬九千六百一十九石細分之每石欠七升一合餘四年二百八十七萬三千二百一十二石至者二百七十七萬三千二百六十六石所失者九萬九千九百四十六石細分之每石欠三升四合餘六皇慶元年二百八萬三千三百五石至者二百萬七千六百七十二石所失者一萬五千八百八十三石細分之每石欠七合餘二年二百三十一萬七千二百二十八石至者二百一十五萬八千六百八十五石所失者一十五萬八百三十三石細分之每石欠六升八合餘者延祐元年二百四十萬三千二百六十四石至二百三十五萬六千六百六石所失者四萬六千六百五十八石細分之每石欠一升九合餘二二年二百四十三萬五千六百八十五石至者百四十二萬二千五百五石所失者一萬三千一百八十石細分之每石欠五合餘三年二百四十五萬八千五百一十四石至者二百四十三萬七千七百四十一石所失者二萬七百七十三石細分之每石欠八合餘二四年二百三十七萬五千三百四十五石至者百三十六萬八千一百一十九石所失者七千二百二十六石細分之每石欠三勺餘五年二百五十五萬三千七百一十四石至者二百五十四萬三千六百一十一石所失者一萬一百三石細分之每石欠三合餘六年三百二萬一千五百八十五石至者二百九十八萬六千一十七石所失者三萬五千五百六十八石細分之每石欠一升一合餘四七年三百二十六萬四千六石至者二百二十萬七千九百二十八石所失者一萬六千七十八石細分之每石欠四合餘至治元年三百二十六萬八千七百六十五石至者三百二十三萬八千七百六十五石所失者三萬六百八十六石細分之每石欠九合餘百二年三百二十五萬一千一百四十石至者三二十四萬六千四百八十三石所失者四千六百五十七石細分之每石欠一合餘二三年二百八十一萬一千七百八十六石至者百七十九萬八千六百一十三石所失者一萬二千一百七十三石細分之每石欠四合餘泰定元年二百八萬七千二百三十一石至者二百七萬七千二百七十八石所失者九千九百五十三石細分之每石欠四合餘二二年二百六十七萬一千一百八十四石至者百六十三萬七千五十一石所失者三萬四千一百三十三石細分之每石欠一升二合餘三年三百三十七萬五千七百八十四石至者三百二十五萬一千三百六十二石所失者一十二萬四千四百三十二石細分之每石欠三升六合餘百四年二百一十五萬二千八百二十石至者三一十二萬七千五百三十二石所失者一萬五千二百八十八石細分之每石欠四合餘天厯元年三百二十五萬五千二百二十石至者三百二十一萬五千一百二十四石所失者三萬九千七百九十六石細分之每石欠一升二合餘三二年三百五十二萬二千一百六十三石至者百三十四萬三百六石所失者一十八萬一千八百五十七石細分之每石欠五升一合餘以上元史所載歲運所至及所失之數史又云風濤不測糧船漂溺無歲無之間亦有船壞而棄其米者至元二十三年始責償于運官人船俱溺者乃免然視河漕之數所得益多矣順帝至正十九年先是汝潁盜起方國珍張士誠據浙東西之地海運之舟不至至是遣巴延特穆爾徴海運于江浙詔士誠輸粟國珍具舟二賊互相猜疑巴延特穆爾與行省丞相多方開諭之始從命得粟十有一萬石二十三年遣官往徴拒命不與臣按元朝承平之時嵗運幾至四百萬石至其末年也哀丐于叛臣僅得十有餘萬石最後升斗皆無焉是時也斗米至銀六兩一時勳戚權貴衣錦繡抱珠玉而枵腹忍飢以為餓殍者何限嗚呼可歎也哉是以為國逺圖者覩未形之患為先事之謀恆思于心曰吾之家國今雖富盛異日吾之子孫安知其不馴致于此乎矧今建國于燕而又承其後雖天祚國家祖宗基業隆厚非元可比然意外之事亦不可不深長思也詩不云乎殷鑒不逺在夏后之世元初糧道自浙西涉江入淮由黃河逆水至中灤旱站在封丘縣西南舊黃河北岸陸運至淇門在濬縣西南即古枋頭一百八十餘里入御河以達于京後又自任城今濟寧州分汶水西北流至須城今東平州之安民山入清濟故瀆通江淮漕經東阿至利津河入海由海道至直沽後因海口沙壅又從東阿陸轉二百里扺臨清下漳御至京至元二十六年以壽張縣尹韓仲暉等言自安民山開河北至臨清凡二百五十里引汶絶濟直屬漳御建閘三十有一度高低分逺近以節蓄泄賜名會通河臣按會通河之名始見于此然當時河道初開岸狹水淺不能負重每嵗之運不過數十萬石非若海運之多也是故終元之世海運不罷國初會通河故道猶在今濟寧在城閘洪武三年曉諭往來船隻不許擠塞碑石故在北岸可考也二十四年河決原武漫過安山湖而會通河遂淤而往來者悉由陸以至德州下河我太宗皇帝肇造北京永樂初糧道由江入淮由淮入黃河運至陽武發山西河南二處丁夫由陸運至衛輝下御河水運至北京厥後濟寧州同知潘叔正因州夫遞運之難請開會通舊河朝命工部尚書宋禮發丁夫十餘萬疏鑿以復故道又命刑部侍郎金純自汴城北金龍口開黃河故道分水下達魚臺縣塌場口以益漕河十年宋尚書請從會通河通運十三年始罷海運而專事河運矣明年平江伯陳瑄又請浚淮安安莊閘一帶沙河自淮以北沿河立淺鋪築牽路樹栁木穿井泉自是漕法通便將百年于兹矣臣惟運東南粟以實京師在漢唐宋皆然然漢唐都關中宋都汴梁所漕之河皆因天地自然之藝中間雖或少假人力然多因其藝而微用人為以濟之非若會通一河前代所未有而元人始創為之非有所因也元人為之而未至于大成用之而未得其大利是故開創之功雖在勝國而所以修理而拓大之者則有待于聖朝焉前元所運嵗僅數十萬而今日極盛之數則踰四百萬焉蓋十倍之矣宋人論汴水謂大禹疏鑿隋煬開甽終為宋人之用以為上天之意嗚呼夏至隋隋至宋中經朝代非一而謂天意顓在于宋臣不敢以為然若夫元之為此河河成而不盡以通漕蓋天假元人之力以為我朝之用其意彰彰然明矣近年運道秋後春初往往乾澀舟行艱阻有妨歲計九月以後宜于清口入淮處暫築小壩髙二三尺許截水以過舟又于直沽河流轉下海處橫作木閘以遏水其有淺處兩際宜各去七八里許橫立木柵以限舟柵中開門當中浚深河潢可容兩舟許分道上下行舟差官于此分籌授舟次第放行俟有水各罷之如此則河流有所限制舳艫不至擠塞而運道四時通利矣至元二十八年都水監郭守敬言疏鑿通州至大都河道導昌平縣白浮村神山泉過雙塔榆河引一畝玉泉至西門入都城南滙為積水潭出文明門今崇文門至通州髙麗莊入白河長一百六十四里塞清水口十二處置壩閘二十座節水通漕為便明年河成賜名通惠先時通州至大都五十里陸挽官糧民不勝其悴至是皆罷之臣按通州陸挽至都城僅五十里耳而元人所開之河總長一百六十四里其間置閘壩凡二十處所費蓋亦不資況今廢墜已久慶豐以東諸閘雖存然河流淤淺通運頗難且今積水潭即今海子在都城中禁城之北漕舟既集無停泊之所而又分流入大內然後南出其啓閉蓄泄非外人所得専者言者往往建請欲復元人舊規似亦便利然以臣愚見陸挽與河運利害略亦相當必欲復舊須于城東鑿為大潭如積水比以為停泊之處引水自城西入壕由北轉東瀦于此潭又于分水入城處築閘以司啓閉仍于御河南出城壕之道建為巨閘蓄禁中水非滿溢不啓自慶豐閘之東每閘之旁皆為月河以容挨閘之舟如此庶幾良便若恐勞民動衆又不若依舊陸挽之為便但道路之間每遇霖雨泥淖車輪陷沒牛騾踣斃腳價踊貴漕卒舟行數月始得扺陸而久留多費艱苦不勝此建議者憫之所以咸欲復舊河道然自永樂乙未開運以來經今六十餘年率由此路况其腳費支兑之初已有加耗晴乾之時所費良亦不多為今之計請于都城之東官路之旁擇便利處再闢新路一道或二道每道約廣十丈以上其舊道專以為官民往來之路止行小車其新開者一道專以通行輦運大車下而往者從左道上而來者從右不許互行其道旁民居不許夾道相向有欲居者皆許于道旁百步之外靣東西以居近道賣酒食者惟許作浮鋪如此則民居既逺軌轍散行水易涸而泥易乾運道自然不至深陷又于中道設一提舉司視衛河例置官一二員每年委工部官一員提調將慶豐等閘原設閘夫編為甲乙專一修理道途大車入門免其納鈔就俾于提舉司出修路錢若干收貯在官以為買甎石傭工作之費又俾有司拘集車户及牙行人等從公量定腳價分為三等晴乾每石若干隂雨若干泥濘若干必使兩不相虧具數奏聞永為定例如此則輸挽通利所費者不過民田數十頃可將官地償之或給以價或為之開豁糧租其視開河之費減數十倍況河道狹而運舟多一遇水少伺候啓閉動經旬日有妨嗣歲之計且又每閘設官聚夫官俸民糧日有所費嵗嵗遣官吏起民丁開挑上源疏滌壅塞修築坍塌禁民引水灌田妨民及時耕穫文移工作嵗無寧月愚言萬一有可採者乞下有司計議其于國計未必無補至正十六年董摶霄建議海寧一境不通舟楫惟可陸運陸運之方每人行十步三十六人可行一里三千六百人可行百里每人負米四斗以夾布袋盛之用印封識人不息負米不著地排列成行日行五百回計路二十八里日可運米二百石人米一升可給二萬人此百里一日運糧之術也胡粹中曰此法可施之近路而兵少敵小而期促者耳大敵在前擁兵數十萬千里饋糧曠日持久未易行也臣按董摶霄人運之法誠有如胡粹中所評者用兵逺道決不可行惟施于救荒就用飢民接運因以哺之借其力以達粟於無食之地蓋亦兩得其濟與夫漕黃河者其于三門底柱之險其間一帶似可用此法然亦可暫而不可常以上論漕挽之宜臣按歷代建都于西北者皆仰給東南之漕都長安者阻關陜之險漕運極難所資者江淮河渭都洛陽汴梁者兼資汴洛汝蔡而已惟我朝建都幽燕東至于海西暨于河南盡于江北至大漠水涓滴皆為我國家用其用最大其功最巨者其運河由江而入𨝍溝由𨝍溝亂淮而渡上清口經徐吕二洪泝沁泗水至濟寧濟寧居運道之中所謂天井閘者即元史所謂會源閘也泗出泗水縣沂出曲阜縣洸出陽寧縣汶源有三二出萊蕪縣一出泰山南諸水畢會于此而分流于南北北至安民山入于新河地降九十尺為閘十有七而達于漳御南至沽頭地降百十有六尺為閘二十有一而達于河淮此蓋居兩京之間南北分中之處自是而南至于河淮順流也河淮東流至清口而入于海亂流而渡由𨝍溝渡江而達于南京自是而北至于漳御順流也御河北流至直沽而入于海泝流而上由白河抵潞而達于北京迤南接濟之水有自武陟來之沁有自琅邪來之沂迤北接濟之水有自金龍口之河有分滹沱河之水通論諸閘天井居其中臨清總其會居中者如人身之有腰脊總會者如人身之有咽喉腰脊損則四肢莫運咽喉閉則五臟不通國家都北而仰給于南恃此運河以為命脈濟寧居腹裏之地州縣櫛比居民鱗次而又多有旁出之途惟臨清乃會通河之極處諸閘于此乎盡衆流于此乎會且居高臨下水藝泄易而涸速是凡三千七百里之漕路此其要害也東控青齊北臨燕趙且去邊關不逺疾馳之騎不浹旬可到為國家深長之思者寧有而棄毋無而悔書生過慮請跨河為城兩際各為水門以通舟楫而包圍巨閘在于其中設官以司啓閉屯兵以為防守是亦思患豫防之一事也臣愚以杞人之智過為天慮惟聖朝矜其愚而察其心不勝大願大學衍義補卷三十四
