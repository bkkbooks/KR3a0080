body:
  text: 大學衍義補卷二十六明丘濬撰治國平天下之要制國用銅楮之幣上管子曰湯七年旱禹五年水人之無􅕷糜也有賣子者湯以莊山之金鑄幣而贖人之無􅕷賣子者禹以歴山之金鑄幣以救人之困臣按此後世鑄金為幣之始然皆因縁水旱以救濟饑困非專以阜通財貨也又曰以珠玉為上幣以黄金為中幣以刀布為下幣三幣握之則非有補於煖也食之則非有補於飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一高一下不得有調也臣按三代以前已有幣而其幣有三等珠玉黄金刀布是也刀布則是泉布之制後世公私通行以錢而亦兼用金銀珠玉其原葢起於此是三幣也人君守之以府庫通之以財賄而以平天下之食貨調適其輕重高下使之咸得其平此所以有衡之名歟後世所謂平凖其義葢出乎此太公立九府周官有太府玉府内府外府泉府天府職内職幣職金圜法圜謂均而通也黄金方寸而重一斤錢圜函方外圜而内孔方輕重以銖金以斤為名錢以銖為重也布帛廣二尺二寸為幅長四丈為疋故貨寳於金利於刀流於泉布於布束於帛束聚也鄭樵曰謂之泉者言其形如泉文古錢其形即篆泉文也後人代以錢字王昭禹曰古者寳龜而貨貝所以交易者唯貝而已至太公立九府圜法始用錢代貝或曰泉或曰布布取宣布之意泉取流行之意其實則一而已臣按後世之錢其形質外圓内方始此但未有文耳九府即周禮所載太府玊府内府外府泉府天府職内職幣職金九官是也九官皆掌財幣之官而所掌者黄金布帛錢幣三者黄金以斤名布帛以疋計錢幣以銖重故凡貨物之出入其輕重以圜法均而通之如黄金一斤該錢若干帛一疋該錢若干之類是以國家有所用度也一切財貨寳之以金利之以刀流行之以泉施布之以布収聚之以帛所謂金即方寸重一斤者所謂刀即管子所謂刀為下幣者所謂泉即圜法也所謂布帛即長四丈為疋者鄭氏謂言其器言其用等語於本文若不相類臣不敢以為然司市以商通物曰商賈賣物曰賈阜盛也貨而行布布謂泉也國凶荒謂五榖不熟札謂疫病喪謂死喪則市無征而作布鄭𤣥曰金銅無荒年因物貴大鑄泉以饒民葉時曰按太公立九府圜法流於泉布於布泉取其流布取其布司市曰以商賈阜貨而行布布者欲其流布使行也豈非太公立此九府法而君民通用歟又按周景王時單穆公曰古者天降災厲於是乎量齎幣權輕重以救民司市曰凶荒札喪市無征而作布豈非民之物貴乃鑄錢以饒民歟臣按布即泉也泉即錢也錢以權百物而所以流通之者商賈也故商賈阜盛貨賄而後泉布得行當夫凶荒札喪之際商賈畢聚而食貨阜盛亦得以濟其乏甦其困矣故於是時市無征税所以來商賈來商賈所以阜食貨然又慮其無貿易之具也故為之鑄金作錢焉葢以米榖有豐歉非人力所能致金銅則無豐歉可以人力為之故為之鑄錢使之博食以濟饑也周官此法其亦湯禹因水旱鑄金幣之遺意歟外府主泉貨藏在外者掌邦布泉也之入出以共百物而待邦之用凡祭祀賔客喪紀㑹同軍旅共其財用之幣齎賜予之財用齎行道之財用也凡邦之小用皆受焉泉府司泉布之府掌以市之征布斂市之不售貨之滯於民用者葉時曰外府掌布雖曰以共百物以待邦用而實小用則給之是以賈疏亦云外府所納泉布所積既少有小用則給之若大用則取於餘府後世凡百所用一出於錢曾不知周人外府之布特以供小用爾臣按周禮掌財之官非一職而專掌錢布者外府泉府二官外府掌齎載之出入泉府掌賣買之出入葢天下百貨皆資於錢以流通重者不可舉非錢不能以致逺滯者不能通非錢不得以兼濟大者不可分非錢不得以小用貨則重而錢輕物則滯而錢無不通故也周景王時患錢輕將更鑄大錢單穆公曰古者天降災戾戾惡氣也於是乎量資幣權輕重以賑救民民患輕則為之作重幣以行之幣輕物貴也於是乎有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之今王廢輕而作重民失其資能無匱乎若匱王用將有所乏乏則將厚取於民民不給將有逺志謂去其本居是離民也王弗聽卒鑄大錢文曰寳貸國語注作大泉五十肉好皆有周郭内郭為好外郭為肉以勸農贍不足百姓䝉利焉臣按錢有文其製始此單穆公此言乃後世論錢貨子母相權之説所自出也重者母也輕者子也重者行其貴輕者行其賤貴賤相權而並行焉葢民之所患有輕重上則持操縱之權相權而行之要之患輕則作重患重雖作輕而亦不廢重焉子可廢而母不可廢故也秦兼天下幣為二等黄金為上幣銅錢質如周錢文曰半兩重如其文為下幣而珠玉龜貝銀錫之屬為器飾寳藏不為幣臣按虞夏商之幣金為三品或黄金或白銀或赤銅或錢或布或刀或龜貝至周圜法金惟用其黄者然猶有刀布之屬秦一天下之幣為二止用黄金并以赤金為錢耳其他皆不用漢文帝除盗鑄錢令使民放鑄賈誼曰法使天下公得鑄銅錫為錢敢雜以鉛鐵為他巧者其罪黥刺字也然鑄錢之情非殽雜為巧則不可得贏夫事有召禍而法有起姦今令細民人操造幣之埶各隱屏而鑄作因欲禁其厚利微姦雖黥罪日報其埶不止臣按後世弛私錢禁始此夫天生物以養人如茶鹽之類弛其禁可也錢幣乃利權所在除其禁則民得以專其利矣利者爭之端也是時呉王濞即山鑄錢富埒天子後卒叛逆賈山曰錢者亾用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也臣按錢之為利賤可使貴貧可使富蚩蚩之民孰不厭貧賤而貪富貴哉顧無由致之耳所以致之者錢也操錢之權在上而下無由得之是以甘守其分耳茍放其權而使下人得以操之則凡厭賤而欲貴厭貧而欲富者皆趨之矣非獨起刦奪之端而實致禍亂之淵叢也古人山海之利不以封良有以夫武帝時有司言三銖錢輕輕錢易作姦詐乃更請郡國鑄五銖錢周郭其質令不可得摩取鎔臣按秦世八銖失之太重漢初榆莢失之太輕武帝罷三銖錢鑄五銖錢最得輕重之宜元帝時貢禹請罷采珠玉金銀鑄錢之官毋復以為幣租稅禄賜皆以布帛及榖使百姓壹意農桑議者以為交易待錢布帛不可以寸尺分裂臣按布帛以為衣米榖以為食乃人生急用之物不可一日亾焉者也顧欲以之代錢則布帛不免於寸裂米榖不免於粒棄織女積縷以成丈疋農夫積粒以滿升斗豈易致哉况榖帛有用者也錢幣無用者也孔琳所謂聖王制無用之貨以通有用之財既無毁敗之費又省運致之苦今分榖帛以為貨則致損甚多勞毁於商販之手耗棄於割截之用由是觀之貢禹此䇿决不可用茍或偏方下邑有裂布帛捐米榖以代錢用者官府尚當為之禁制况立為之法乎桓帝時上書者言人以貨輕財薄故致貧困宜改鑄大錢劉陶曰當今之憂不在於貨在於民饑葢民可百年無貨不可一日有饑故食為至急也議者不逹農殖之本多言冶鑄之便夫欲民殷財阜在止役禁奪則百姓不勞而足徒欲鑄錢齊貨以救其弊猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必致焦爛臣按劉陶所謂民可百年無貨不可一日有饑此至言也民之所以有饑者以無榖也臣願國家定市價恒以米榖為本下令有司在内俾坊市逐月報米價於朝廷在外則閭里以日上于邑邑以月上于府府以季上于藩服藩服上于戸部使上之人知錢榖之數用是而驗民食之足否以為通融轉移之法務必使錢常不至於多餘榖常不至於不給其價常平則民無苦饑者矣其餘貨賄民之可以有無者不必計焉不特此爾亦可因是以定科差制賦斂計工役呉孫權始鑄當千錢既太貴但有空名人間患之臣按後世鑄大錢始此夫上天立君以為生民之主葢以之掌天下之利非以其專天下之利也日中為市使民交易以通有無以物易物物不皆有故有錢幣之造焉必物與幣兩相當值而無輕重懸絶之偏然後可以久行而無弊時君世臣徒以用度不足之故設為罔利之計以欺天下之人以収天下之財而專其利於己是豈上天立君之意哉宜其卒不可行也南齊高帝時奉朝請孔顗上書曰鑄錢之弊在輕重屢更重錢之患在於難用而難用為無累輕錢之弊在於盗鑄而盗鑄為禍深人所以盗鑄而嚴法不能禁者由上鑄錢惜銅愛工也所以惜銅愛工者謂錢無用之器以通交易務欲令輕而數多使省工而易成不詳慮其患也自漢鑄五銖錢至宋文帝四百餘年制度有廢興而不變五銖者其輕重可得貨之宜也以為開置錢府大興鎔鑄錢重五銖一依漢法則府庫以實國用有儲臣按天立君以子民付之利權使其通融以濟天下非專以為一家一人用也所以通百物以流行於四方者幣也金銀之屬細分之則耗布帛之屬片析之則廢惟鑄銅以為錢物多則予之以多物少則予之以少惟所用而皆得焉且金銀出於天幣帛成於人錢也者合天人以成其器銅天生者也銅而成錢則人為之矣自古論錢法者多矣惟南齊孔顗所謂不惜銅不愛工此二語者萬世鑄錢不易之良法也銅出於天吾無所惜工成於人吾無所愛則其錢之為錢體質厚而肉好適均製作工而輪郭周正造一錢費一錢本多而工費雖驅之使鑄彼亦不為矣况冒禁犯法而盗為之哉然自太府圜法以來以銅為泉或為半兩或為榆莢或為八銖或為四銖不知幾變矣惟漢之五銖為得其中五銖之後或為赤仄或為當千或為鵝眼綖繯或為荇葉又不知其幾變矣惟唐之開元為得其中二者之外或以一當三或以一當十或以一當百然皆行之不久而遽變惟其質製如開元者則至今通行焉惜乎世道降而巧偽滋古錢之存於世者無幾凡市肆流行而通使者皆盗鑄之偽物耳其文雖舊其器則新律非無明禁也彼視之若無作之者無忌用之者無疑銷古以為今廢真而售贗滔滔皆然卒莫如之何也已矣為今之計莫若拘盗鑄之徒以為工収新造之錢以為銅本孔顗此説别為一種新錢以新天下之耳目通天下之物貨革天下之宿弊利天下之人民請先敇所司遣人分行天下訪緝盗鑄所在親臨其地拘集其人免其罪罰就於其私鑄之所立塲開鑪就用其徒以為工作見丁着役著籍定期給廪以食之置官以督之如此則鑄作之工不徴於民而得之矣次敇内帑精選唐宋以來真錢如開元太平之類得數百萬發下户部分散天下於闤闠市集所在用繩聯貫古錢百文隨處懸掛以為式様使小民知如此様者是為舊錢非此様者皆俾其具數赴官首告官為収之每偽錢十斤量賞以新錢六七斤則民不失利官得其用如此則鼓鑄之銅不求之民而得之矣雖然貧民之家僅有千百之錢恃此以為生計一日無之則失所恃矣官府改造動經歳月彼安能待哉請於未出令之先預令内外帑藏拘刷無用之銅器沒入之偽錢盡行送赴開鑪去處照様鑄造一年之後新錢既成方行倒換之令倒換既多次第改造不出十年偽錢盡矣夫然則天下所用者皆前代之真劑今日之新規行之既乆雖不能保其無弊然亦可以持循百年有利而無害焉所以為新製者當如何曰每錢以十分為重中間錢文必以古篆或用年號或别製佳名其漫加識以楷書二字上書皇下書明輪郭之旁周廻鑿以花紋每文計用銅十五分剉磨之餘去五而存十新錢既成之後又令天下輸舊錢于官以易新者將所得舊錢周以細紋如新錢製其漫亦剗以二字或兩旁或上下然後散之仍詔告天下非此二様錢不許用而又申明廢銅赴官中賣之律鉟銷為器者有禁漏出外國者有刑如此則錢法流通而公私俱便矣或曰凡興作必約工計本今耗銅而費工其多如此國家何利之有臣故曰天立君以子民付之利權使之通融以濟天下非專以為一家一人用也唐髙祖武德四年廢五銖錢鑄開通元寳錢每十錢重一兩計一千重六斤四兩得輕重大小之中臣按太公圜法凡泉輕重以銖今之一兩即古之二十四銖計一錢則重二銖半以下古秤比今秤三之一則今一錢為古之七銖以上凡造一錢用銅一錢此開通元寳所以最得輕重大小之中也此後之錢如宋元太平淳化之類皆倣此製至今行之後有作者皆當凖此以為常法以上銅楮之幣上大學衍義補卷二十六
