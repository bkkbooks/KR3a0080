body:
  text: 大學衍義補卷一百二十一明丘濬撰治國平天下之要嚴武備器械之利上易繫辭弦木為弧剡木為矢弧矢之利以威天下葢取諸睽朱熹曰睽乖然後威以服之吳澂曰弧木弓也兵器不一弓矢所及者逺為長兵威天下者示有儆備而使之畏也臣按人君為治所以威天下者武也而武之為用以器為威而其所以為器不一也易之制器尚象而獨以威天下之器而歸之弧矢之利何哉葢男子生而有懸弧之義射者男子之所有事也防㣲威逺之具莫先焉且兵戎之器所及者不過丈尺之間惟弓矢則有百步之威鋒不待交而威已先至折其勢於未至挫其鋭於尚逺兵戎之利誠莫有先之者也竊惟今日隊伍之制以長短兵相夾持以為威葢我朝戰勝中國而得天下其法利於守而不利於戰可以戰中國而不可戰夷狄是何也短兵無長用長兵無短用故也臣愚以為凡今日隊伍之法宜如科舉取士式毎軍各執一器如士之専一經而各經皆兼習四書其鎗刀之類乃其本經弓矢則其四書也孟子曰其至爾力也其中非爾力也中非力而能乃由巧所致巧者得於心而應之于手是葢可學而能也學斯巧巧斯中一人學射敎成十人十人敎百人百人敎千人千人敎萬人則是全隊之中無非善射之士敵在逺則用弓矢之利敵在近則用刀鎗之鋒國家有十萬善射之兵内可以制盜賊外可以制夷狄禍亂不作而國勢尊矣説卦離為火為甲胄為戈兵張栻曰甲胄外堅所以象離之畫戈兵上鋭所以象離之性臣按天下之物無一而不本於隂陽者甲胄戈兵雖曰戰陳之用然皆有所本焉戰陳之用甲胄服於身惟恐人之傷己戈兵施於人惟恐己之不傷人其用雖有仁暴之殊而皆取象於離明之火也先儒謂離有甲胄戈兵之象而周官司馬之職列於夏官夏者離之時也書禹貢荆州厥貢杶榦栝柏礪砥砮丹惟箘簵楛蔡沈曰杶木似樗而可為弓榦砮者中矢鏃之用箘簵竹名楛木名皆可以為矢臣按魯語肅慎貢楛矢石砮註砮鏃也葢肅慎氏之矢以楛木為笴以石為鏃也由是以觀則木亦可以為笴不但竹也石亦可以為鏃不但鐡也説命曰惟甲胄起戎朱熹曰甲胄本所以禦戎而出謀不當則反足以起戎蔡沈曰甲胄所以衛身也輕動則有起戎之憂臣按五兵皆傷人之器也惟甲胄乃衛人之服焉孟子曰函人惟恐傷人則是甲胄之用在人為仁歟費誓曰善糓縫完也乃甲胄敿繋之也乃干盾也無敢不弔音的精至也備具也乃弓矢鍛淬也乃戈矛礪磨也乃鋒刃無敢不善孔頴達曰少康子杼作甲兠鍪首鎧也經典皆言甲胄秦漢以來始有鎧兠鍪之文古作甲用皮秦漢以來用鐡鎧鍪字皆從金葢用鐡為之也糓謂穿徹之甲繩有斷絶當使糓理穿治之楯紛如綬而小繫紛於楯以為飾毎弓百矢弓十矢千使其數備足五十矢為束臨戰則用五十矢為束凡金為兵器皆須鍛礪有刃之兵非但戈矛其文互相通也蔡沈曰甲胄所以衛身弓矢戈矛所以克敵先自衛而後攻人亦其序也周禮天官玉府掌王之兵器凡王之獻兵器受而藏之朱申曰兵則兑之戈和之弓之類内府掌受良兵良器以待邦之大用凡四方之幣謂諸侯所贄獻謂諸侯貢物之兵器入焉臣按此天官玉府既掌王之兵器内府又受良兵兵器入焉則是兵器之府備於天官矣而秋官又曰入其金錫于為兵器之府葢玉府内府所藏兵器之府也職金入金錫于槀人為兵器之府也謂之為者製作之謂也夏官司甲下大夫二人中士八人府四人史八人胥八人徒八十人鄭𤣥曰甲金之鎧也臣按先儒謂書之費誓言糓乃甲胄敿乃干無敢不弔而後言備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善蓋甲胄與干所以自保弓矢與矛所以討敵先自保而後討敵故周官之序先司甲而後言兵也司兵掌五兵五盾各辨其物與其等以待軍事及授兵從司馬之法以頒之及其受兵輸亦如之及其用兵亦如之祭祀授舞者兵大喪廞五兵軍事建車之五兵㑹同亦如之吳澂曰五兵者戈殳㦸酋矛夷矛也五盾者干櫓之屬有五等辨其物則其用各有所宜辨其等則其制有長短大小也兵輸謂師旋而納兵器也用兵謂出給衛守也祭祀授兵授以朱干玉戚也廞五兵謂陳明器之五兵車之五兵即前之五兵也若步卒之五兵則無夷矛而有弓矢吕祖謙曰古者藏兵於廟大夫家不藏甲凡用兵必取之廟歸而飲至以見不敢輕舉之意如用命賞于祖不用命戮于社亦此意如鄭莊公將伐許授兵於大宫魯公治兵椘武王授師孑之類此見春秋之初其制尚存臣按辨其物者常利其器以待用也與其等者常類其聚以待授也司戈盾官名掌戈盾之物而頒之鄭𤣥曰戈今之句孑㦸也王昭禹曰掌戈盾之物而頒之謂祭祀軍旅㑹同之時頒之以給用也臣按古者甸出革車一乘凡甲戈盾弓矢與夫旗物鼓鐸之屬悉備焉鄉遂之官以時簡其兵器及有調發則各具之而行官府不與知也司兵司戈盾司弓矢所掌授兵器非授之民也授之卿大夫從軍旅㑹同者也故司兵曰及其兵亦如之是卿大夫畢事則歸之也若民兵則自藏之民間耳秦人銷鋒鏑元人禁漢人持弓矢其與周人藏兵於農意大不侔矣司弓矢掌六弓四弩八矢之法辨其名物而掌其守藏與其出入中春獻弓弩中秋獻矢箙朱申曰六弓謂王弓弧弓夾弓庾弓唐弓大弓也四弩謂夾庾唐大也八矢謂枉矢絜矢殺矢鍭矢矰矢茀矢恒矢庳矢也法謂曲直長短之數也名以命之物以色之守之則有人藏之則有府出則頒之入則授之箙盛矢器也以獸皮為之弓弩成之於陽氣方和之時故仲春獻之矢與箙成之於隂氣將堅之時故仲秋獻之臣按先儒謂中春陽氣方和之時故獻弓弩中秋隂氣方堅之時故獻矢箙蓋四時有明法萬物有成理先王以道制器不違乎時之序物之理與造化同其功矣是以器之成也既完且美而天下之利用於是乎出矣藁人掌受財于職金以齎其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之春獻素秋獻成書其等以饗工乘其事試其弓弩以下上其食而誅賞乃入功于司弓矢及繕人鄭𤣥曰箭幹謂之藁此官主弓弩箭矢故謂之藁人吳澂曰齎其工者給市財用之直也弓六物其斗力强約分為上下中三等人各有所宜弩四物矢八物皆分三等盛矢之箙亦如之弓弩矢箙春作而秋成故春獻其胎素及秋方獻其成書其工拙之等降以制其享食之厚薄也乘其事謂計其事之成功也考其弓弩以上下其食謂考之而善則上其食尤善則又賞之其否反此臣按秋官職金入其金錫于為兵器之府可見周之弓弩矢箙皆造於官其費用之工本皆受于職金不取於民也及其獻成則書其工拙等第為酒食以勞之不徒勞之而又試之試之而良則上其禄甚則賞之不良則下其禄甚則誅之既考其功乃入之于司弓矢以待頒賜入之于繕人以供王用也秋官職金入其金錫于為兵器之府掌受士之金罰貨罰入于司兵鄭𤣥曰為兵器者攻金之工六也入于司兵給治兵及工直也賈公彦曰入兵器之府言為者攻金之工須造作也臣按藁人掌受財于職金以齎其工此入其金錫于為兵器之府則入藁人也若夫受士之金罰貨罰於司兵者所謂金罰者贖罪之金也貨罰者司闗所謂凡貨不出於闗者舉其貨是也夫兵器之作當屬於兵工而此屬於刑官者盖明犯法之人所當罰之金貨以為製造兵器之用故也司厲掌盜賊之任器貨賄辨其物皆有數量賈而掲之入于司兵鄭𤣥曰任器貨賄謂盜賊所用傷人兵器及所盜財物也入于司兵若今時傷殺人所用兵器盜賊賍加責没入官也賈公彦曰入于司兵者其任器多是金刀所盜財貨雖非金刃亦入司兵給治兵刃之用臣按此可見古者造兵器不取於民而取之於盜賊之任器賍物後世舉而行之是亦寛民力足兵用之一助也考工記曰函包容人為甲犀甲七屬謂上旅下旅相屬之數兕甲兕皮為之六屬合甲五屬犀犀皮為之甲夀百年兕甲夀二百年合削革裏肉取其表合之甲夀三百年凡為甲必先為容請服者之形容然後制裁制革皮也權知其輕重其上腰以上旅札葉也一葉為一札與其下腰以下旅而重若一以其長為之圍謂圍之一匝凡甲鍛鍛革也不摯謂至熟則不堅已敝謂革太熟則撓曲也凡察革之道眡其鑽空欲其惌小孔兒也眡其裏欲其易無敗蔑也眡其朕謂革至欲其直也櫜衣藏甲之欲其約也舉而眡之欲其豐也衣之欲其無齘謂如齒齗也眡其鑽空而惌則革堅也眡其裏而易則材更也眡其朕而直則制善也櫜之而約則周也舉之而豐則明光耀也也衣之無齘則變隨人身之變利也臣按戎事以甲胄為主古之言兵者多以甲胃為先葢甲所以衛身身必得其衛然後可以制人茍無甲焉則一身且無所包容矣故制甲者古謂之函人焉屬為上旅下旅之中皆有札續之數一葉為一札上古以革為甲堅者札長故其屬少革之次者其札短故其屬多此其所以有七屬六屬五屬之異也革堅者歴久而後敝物之久而敝如人久而死故甲亦以夀言先為容者欲製為甲必因人之形長短小大而為之容使其服之而相稱不過之而有餘不不及而不足也既因人之身而為容然後以之制革則無贅虧之患上旅腰以上為衣也下旅腰以下為裳也權以知其輕重使上下等而若一則無偏重之患以其長為之圍從横欲周其身而已摯之言至也凡甲必鍛革為之不摯則鍛之不熟不熟則革不堅不堅則易壊鍛之太熟則革過耎而易曲也若夫察眡之際其鑽孔以受線縫小而不寛緩則其革堅實而難壊可知矣其革之裏和易而不敗薉則其材歴久而難敝可知矣其革之制條直而不撓曲則其制作之善不於是而可知乎櫜而藏則約束而易收舉而視之豐厚而寛大衣之於身則方正周全而無參錯不齊之患周旋而無不齊舉動而無不便則是甲也雖極天下之銛鋒利鏑皆莫能傷之矣孟子稱函人為仁術臣亦竊以謂甲胄為仁器也葢五兵皆主於殺傷而甲胄獨専於蔽衛謂之為仁不亦宜乎古人於一甲之製而詳悉周全如此其慎重於戰陳之際可知矣後世之甲多用銅鐡而少用革札蓋日趨簡便也金質重而易於澁繡若用革為甲而制之眡之誠如函人之詳且周焉則其輕而堅視銅鐡之重而易於綻裂豈不優哉弓人為弓取六材必以其時六材既聚巧者和之幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也得此六材之全然後可以為良凡為弓冬折幹而春液角夏治筋秋合三材膠絲漆也寒奠讀為定體氷析灂漆灂也冬折幹則易春液角則合讀為合夏治筋則不煩亂也秋合三材則合堅宻也寒奠體則張不流猶移也氷析灂則審猶定也環春被弦則一年之事謂朞年乃可用鄭𤣥曰取幹以冬取角以秋絲漆以夏王昭禹曰弓所以及逺者其力在幹弓所以疾發者其勢在角角幹資筋以為堅靱以射則中深三者得膠然後相合以為和結而固之在絲飾而堅之在漆六材雖取以其時茍其質不美則不足相資以為用故得此六材之全然後可以為良也夫材美工巧不得天時則不可以為良故弓有六材而治之各以其時也是故幹欲堅而正固故冬折之於幹堅之時而折之則其勢和易也角欲和而温柔故春液之於角和之時而漬液之則其氣浹洽也筋欲散而解緩故夏治之於筋散之時而治之則其理不煩亂也膠漆絲三者欲其成就而充實故秋合之於成材之時而合之則其質不相離而相合也至冬寒時膠堅納之檠中檠弓㭱也以定其徃來之體故體已完張之不復有流移也又於大寒氷堅時下於檠中析其漆灂後復納之則漆灂欲其不動故也其漆之灂已環則審定後不復鼔動也被弦於春俟一朞之久而後可用臣按考工記於弓人一事取材既各以其時而凡折幹液角合膠與筋用漆與絲又莫不各有其法焉嗚呼古者於一器之小而委曲詳盡也如此此其器所以無不良而用無不效功無不成也歟况五兵之用用之以威天下者惟弧矢之利為大上而天文戈㦸殳矛皆無其星而弧矢之象特懸於穹蒼之上易之制器尚象五兵之中獨言弧矢是兵莫大於弓矢也臣於前既言凡軍伍人欲各執夫一器而皆兼夫弓矢蓋以人之始生必懸弧矢此男子生而所有事也有事之大者莫大於軍旅敵王之愾以衛國家委質之義盡忠之節誠莫大焉必有所事於此然後盡其為男子之事也雖然工欲善其事必先利其器凡事皆然况戰陳乃國家安危人命生死所係者乎尤不可不利其器也今制弓矢造自州縣然地勢燥濕異氣人力巧拙異能官吏勤怠異心徃徃備物以塞責取之不以其時造之不得其法造完而進於内帑茍具其數不求其良積以歲月質損而體變一旦有事出以為用多有不堪因而誤事也多矣臣請自今以後凡造弓州縣計其歳所當造之數俾其具物料工費解官朝委有巧計臣僚専督製造仍行下出産弓材之處俾其取材必以時擇材必以良而司工者又必依傍古法順天之時隨物之性用人之能如此則弓無不良矣雖然人力有不齊弓矢亦不可一例而造必以斗石為量用漆書其上自二石以下至於六斗凡數等仍行敎閱將官於凡軍士皆較量其力之所勝著為石斗之數散弓之日按名如其數給之如此則不徒費民財而所造之弓皆有實用器良而與人力相稱所向無有不成功者矣矢人為矢鍭矢參分謂三分之茀矢茀當作殺參分一在前二在後兵矢田矢五分謂分之為五二在前三在後殺當作茀矢七分分之為七三在前四在後參分其長而殺其一五分其長而羽其一以其笴矢幹厚為之羽深水之以辨猶正也其隂陽浮之於水以浮沈辨之也夾其隂陽以設其比箭括抵弦處夾夾之使輕重均其比以設其羽參分其羽以設其刃刃若羽三分之一則雖有疾風亦弗之能憚矣刃長寸圍寸鋌謂箭之足入槖中者十之重三垸量名前弱則俛低也後弱則翔回顧中弱則紆曲也中强則揚飛也羽豐則遲羽殺則趮旁掉也是故夾以指夾矢而搖動也之以眡其豐殺之節也撓搦其幹也之以眡其鴻鴻即强也殺之稱也凡相擇也笴欲生謂無瑕蠧而摶謂圓也同摶欲重同摶欲其材之重同重節欲疏同重欲其節之疏同疏欲㮚同疏欲其縝栗而堅吳澂曰鍭矢三分言參訂之而平者前有鐡重也茀矢茀當為殺一在前謂箭藁中鐡莖居參分殺一之前也兵矢謂枉矢絜矢也此二矢亦可以田田矢謂矰矢二在前三在後鐡差短小也殺矢殺當為茀三在前四在後鐡又差短小也殺其一者謂矢藁長三尺殺其前一尺令趣鏃也羽其一者羽者六寸也笴讀為藁謂矢幹也隂沈而陽浮夾其隂陽者弓矢比在藁兩旁弩矢比在上下設羽於四角也參分其羽以設其刃謂刃二寸也前弱則俛以下言幹羽之病使矢行不正也臣按古人之為矢其慎重周密如此此所以射無不中也五兵之用弓矢為長弓良而矢不合度雖其人巧力俱全而亦不能以命中矣觀考工記於矢人為矢則可見古人之學無所不該而小物之不遺也如此此三代盛時文事武備後世皆所不能及也大抵矢之為矢不出乎幹羽二者而已幹之强弱則欲適其中羽之豐殺則欲適其節前弱則矢行而低後弱則矢行而旋中弱則矢行而曲中强則矢行而起此强弱之失中也羽太多則矢重其行必失於緩羽太少則矢輕其行必失於急此豐殺之失節也欲眡其豐殺之節宜以指夾矢而搖之以約其輕重欲眡其鴻强也殺之稱宜以指撓其幹而曲之以審其强弱其製矢既有其量其眡矢又有其法此其器所以無不良而用之所以無不宜也桃氏為劍臘謂兩刃廣二寸有半寸兩從半之以其臘廣為之莖圍長倍之賈公彦曰臘謂兩刃兩面各有刃也劍脊中髙兩面趨鍔鍔即鋒也莖納於夾中者在夾人所握處為夾中者圍二寸半長五寸臣按釋名劍者撿也所以防檢非常是葢防身之器項羽學之以為一人之敵者也司劍之官而謂之桃氏劍所以禦暴除惡以桃之為桃能辟除不祥故也廬人為廬器戈二刃柲柄也六尺有六寸殳如杖無刃長尋八尺有四尺車㦸三刃常倍尋曰常酋酋之為言就也矛句兵常有四尺夷夷之為言傷也矛三尋凡兵無過三其身過三其身弗能用也而無已又以害人故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲饑且涉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不涉山林之阻是故兵欲長吳澂曰兵無過三其身者人長八尺與尋齊進退之度三尋用兵力之極也而無已猶曰不徒止言其大長也夫兵莫短於戈殳故攻國者用之莫長於矛㦸故守國者用之大要欲便於人也臣按戈㦸皆刺兵也戈二刃㦸三刃殳擊兵也如杖而無刃矛句兵也上鋭而旁句酋矛夷矛特因長短而取名爾矛用以句則宜長於㦸然後有及故酋矛長二丈夷矛長二丈四尺酋言就也近而就之也夷矛以長為主而就之故曰酋矛夷言傷也以夷矛極長句則有及而傷物為易故曰夷矛此矛之辨也考古之兵器見於周禮者司兵註五兵戈殳㦸酋矛夷矛也説者謂此車之五兵而卒之五兵則無夷矛而有弓矢焉五兵之外有劍有刃有盾有弩戈㦸主於刺而殳用以擊矛用以句其矛之謂夷者意即詩小戎之厹矛也其形三隅如今之虎义然則又不専以句而亦用以刺也方車戰之時敵逺則用弓矢稍近則以矛句之句之至則施擊以刺焉短兵相接始用刀劍此三代以前之兵用也後世無車戰惟用騎與步其制兵之法亦惟以步為主今制五十軍為一隊有鎗有刀有弓矢有盾而無古之所謂戈㦸殳矛與弩者弩僅見用於廣右之徭徸湖南苗人所用之句刀即古人之矛遺製也臣惟我聖祖之得天下其經營惟在於中國故其制兵亦惟以中國為法然而承平之後中國無事故為民害者徃徃在於外患邉陲之地多險阻﨑嶇而吾之隊伍不可以盡施且吾器械長短相制卒然遇敵長兵無短用短兵無長用故士卒雖多而得用僅半請命臣僚之兼通文武者講求其故加用弩與矛二器以為兵用而仍下湖廣二藩選其精於二技者津遣赴官俾其敎習若夫殳之為殳略如今俗所謂木棍者然宜依古制更備此一器以擊虜馬之足葢亦不减宋人用麻札刀也考古之殳長丈二而無刃禮書作八觚形葢八稜也古人用於車上故宜長今用於步軍手執以擊馬足宜與人相稱古作八稜今宜於人手所執處為圓形而於其半至末為四稜或加鐡於稜中云輈人弧旌枉矢以象弧也賈公彦曰弧旌者弧弓也旌旗上有弓所以張縿幅枉矢者就旌旗張縿弓上亦畫枉焉以象弧星也臣按天文志云觜觽下一星曰天矢天狼下有四星曰天弧鄭氏所謂枉矢取名變星飛行有光今之飛矛是也或謂之兵矢絜矢象焉二者皆可結火以射敵考史陳球守零陵製為飛矛者其形之大如矛歟今火藥有火箭若倣漢人飛矛之法而傳以今之火藥使之射逺而流行是亦驚敵之一具也以上器械之利上大學衍義補卷一百二十一
