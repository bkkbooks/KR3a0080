body:
  text: 大學衍義補卷一百五明丘濬撰治國平天下之要慎刑憲明流贖之意舜曲曰流宥五刑孔頴逹曰流謂徙之逺方放使生活以流放之法寛縦五刑也據状合刑情差可恕全赦則太輕致刑則太重不忍依例刑殺故完全其體宥之逺方應刑不用是寛縱之也臣按流宥而謂之五刑者言流而宥之者五刑皆有也流共工于幽州北裔之地放驩兠于崇山南裔之山竄三苗國名恃險爲亂于三危西裔之地殛鯀于羽山東裔之山四罪而天下咸服朱熹曰流遣之逺去如水之流也放置之於此不得他適也竄則驅逐禁錮之殛則拘囚困苦之隨其罪之輕重而異法也服者天下皆服其用刑之當罪也春秋傳所記四凶之名與此不同者以窮竒為共工渾敦為驩兠饕餮為三苖檮杌為鯀程頥曰舜之誅四凶怒在四凶舜何與焉葢因是人有可怒之事而怒之聖人之心本無怒也聖人以天下之怒為怒故天下咸服之臣按舜之流放竄殛四凶者即所謂流宥五刑也四人者皆堯時之臣其人在堯時雖有惡念然感聖徳也深䝉聖化也久茍舉厥職成其事堯亦不得逆探其未然之惡而豫加之刑也舜以匹夫禪堯之位彼或者因有輕視之心而恣其為惡之迹如左傳所言者也然惡雖極而未沐帝舜之化不可以不教而殺也此其所以流之逺方寘於絶域驅逐而禁錮之拘囚而困苦之使之念咎而伏辜或能改過以遷善歟帝曰臯陶汝作士五流有宅五宅三居孔安國曰謂不忍加刑則流放之若四凶者五刑之流各有所居五居之差有三等之居大罪四裔次九州之外次千里之外臣按後世之律犯流罪者或三千里或二千里或千里有逺近之差者原葢出於此周禮大司冦以嘉石文石也平成也罷民凡萬民之有罪過而未麗附也於法而害於州里者桎木在足梏木在手而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任保也之則宥而舍之吳澂曰嘉石樹之外朝門左平成也成之使善也民有罪而未麗於法謂罪輕未入於法也役諸司空謂坐嘉石之日訖使給百工之役也役之月訖又使州里之人保任其不可再犯然後寛而釋之也王安石曰州里任之則宥而舍之則無任者終不舍焉是廼使州里相安也先王善是法以為其刑人也不虧體其罰人也不虧財非特如此而已司空之役不可廢也與其徭平民而苦之孰若役此以安州里之為利也臣按此後世役罪人以工庸而里正相保任者其原出於此司圜官名掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土獄城者殺雖出三年不齒凡圜土之刑人也不虧體其罰人也不虧財王昭禹曰其刑人也不虧體則加之以明刑而已異於五刑之刑也其罰人也不虧財則罰之以職事之勞而已異於五罰之出鍰者也此謂收教歟臣按弗使冠飾後世犯罪者去冠衣其原始此先王之於惡人不徒威之以刑而又愧之以禮去衣冠以恥之加明刑以警之任事役以勞之凡此欲其省已愆以興善念也上罪三年而舍中罪二年而舍下罪一年而舍以罪之輕重而為之逺近之期能改即止不能改然後加之以刑後世徒罪有年限本此然惟限其年而已限滿即出以為平人而無復古人冀其改惡之意亦無復古人雖出不齒之教矣掌戮官名墨者使守門劓者使守闗宫者使守内刖者使守囿髠者使守積吳澂曰黥者無妨於禁禦故可守門截鼻者不以貎惡逺之故可守闗宫刑則人道絶矣故使守内斷足者驅禽獸無急行故可守囿貨財藏於隐處故使髠者守之臣按先儒謂先王之於刑人其輕者則流之流之則有居其重者則刑之刑之則有使以其有使也故掌戮所掌者如此葢刑餘之人形體不全雖有犯罪之重然亦王之民也聖人恥一物之不遂其生雖以刑人亦使之有所養以全其生刑之所以為義全之所以為仁漢文帝肉刑除定律曰諸當髠者完為城旦旦起行治城四嵗刑也舂婦人舂作米當黥者髠鉗為城旦舂罪人獄已决完為城旦舂滿三嵗為鬼薪取薪以給宗廟白粲擇米使正白三嵗刑鬼薪白粲一嵗為𨽻臣妾𨽻臣妾一嵗免為庶人臣按虞廷五刑之下有流而無徒漢世除肉刑完為城旦舂鬼薪白粲之類皆徒刑也而無流所謂𨽻臣妾後世罰囚徒為皂𨽻膳夫亦此意光武建武二十九年詔罪囚各減本罪一等其餘贖輸作有差臣按漢世輸作有司㓂左挍右挍若盧所謂輸作者罰其工作于此諸司也後世有罪罰工亦此意明帝永平八年詔三公募郡國中都官死罪繋囚減罪一等勿笞屯朔方五原之邉縣後乂詔詣邉者妻子自随臣按此後世謫囚徒戍邉始此晉武帝時劉頌上疏曰今為徒者類性元惡不軌之族也去家縣逺作役山谷饑寒切身志不聊生况其本性姦凶徒亡日屬賊盗日繁其有亡者得輒加刑日益一嵗終身為徒自顧反善無期而菑困逼身其志亡思盗勢不得息事使之然也臣按後世之亂多出自盗賊盗賊多起自囚徒劉頌之言先事防患不可不為之慮也請自今凡罪囚之坐徒者不許羣聚各散處於一處則其為患亦不甚矣隋定新律曰流刑三有千里千五百里二千里應配者千里居作二年千五百里居作二年半二千里居作三年曰徒刑五有一年一年半二年二年半三年其流徒之罪皆減従輕流役六年改為五年徒刑五年改為三年臣按古者流罪無定刑惟入扵五刑者有情可矜法可疑與夫親貴勲勞而不可加以刑者臨時權其輕重差其逺近所以従寛而宥也後世制為成法則惟論其罪而不復究其情矣唐髙祖更撰律令流罪三皆加千里居作三嵗至二嵗半者悉為一嵗臣按舜典惟有流而無徒隋唐之制既流而又居作則是兼徒矣宋流刑四加役流脊杖二十配役二年流三千里脊杖二十二千五百里脊杖十八二千里脊杖十七並配役一年凡徒刑五徒三年脊杖二十徒二年半脊杖十八二年脊杖十七一年半脊杖十五一年脊杖十三臣按舜典入扵五刑者情輕法重故為流以宥之則是流者不復刑也唐之流刑既定里數又於此外有所謂加役流者於衆流之上宋因唐制每流各加以杖而又配役則是五刑之中兼用徒流杖三者矣本朝流罪惟有杖而不配役比宋為輕矣流配舊制止於逺徙晉天福中始創刺面之法遂為戢姦重典宋因其法臣按自漢除肉刑古刑不用久矣而五代中晉復創刺面之刑是肉刑皆廢而黥刑復用於數百年之後彼衰世庸君固無足責宋太祖以仁厚立國廼因之而不革其後廼至以刺無罪之士卒其為仁政累大矣太宗太平興國四年詔配役者分𨽻鹽亭役使臣按後世發囚徒煎鹽本此神宗熈寜中曾布言律令大辟之次處以流刑代墨劓剕宫之法不惟非先王流宥之意而又失輕重之差古者鄉田同井人皆安土重遷流之逺方無所資給徒𨽻困辱以至終身近世之民輕去鄉土轉徙四方因而為患而居作一年即聴附籍比於古亦輕矣况折杖之法於古為鞭朴之刑刑輕不能止惡故犯法日衆其終必至殺戮是欲輕反重也臣按近制有誣告人十人以上者發口外為民葢欲以止嚚訟之風也然此法行而天下之頑民皆知所儆獨江右之民略不以為患乃有如布所言者葢其地狭民貧逰食四方廼其素業乞下法官集議别為法以處之今日健訟之風江右為甚此風不息良善不安異日將有意外之變孝宗淳熈中羅㸃言本朝刺配之法視前代用刑為重竊謂欲戢盗賊不可不銷逃亡之卒欲銷逃亡之卒不可不減刺配之法望詔有司將見行刺配情輕者従寛減降別定居役或編管之令臣按舜典象以典刑五刑也於五刑之外有流有鞭有扑有贖是為九刑宋人承五代為刺配之法既杖其脊又配其人而且刺其面是一人之身一事之犯而兼受三刑也宋人以忠厚立國其後子孫受禍最惨意者以其刑法太過杖人以脊刺人之面皆漢唐所無者歟故其末世子孫生者有繫累之苦死者遭暴露之禍後世用刑者宜以為戒淳熙十四年臣僚言刺配之法考之祥符止四十六條至慶厯已一百七十六條今淳熈配法五百七十條犯者日衆黥刺之人所至充斥前後創立配條不為無説若止令居役不離鄉井則㡬於恵姦不足以懲惡若盡用配法不恤黥刺則面目一壊誰復顧藉適長威力有過無由自新洪邁曰秦之末造赭衣半道而姦不息宋制減死一等及胥吏兵卒徒配者湼其面而刺之本以示辱且使人望而識之耳久而益多毎郡牢城管其額常溢殆至十餘萬兇盗處之恬然葢習熟而無所恥也羅隐䜛書云九人冠而一人髽則髽者慕而冠者勝九人髽而一人冠則冠者慕而髽者勝正謂是歟老子曰民常不畏死奈何以死懼之若使民常畏死則為惡者吾得執而殺之孰敢可謂至言臣按自廢肉刑之後惟宫一刑尚存然多取反叛餘孽為之亦或有生而隐宫及自宫以求進者官府不以為刑也唐初雖斷右趾太宗以為肉刑久除不忍復而房𤣥齡亦謂今肉刑既廢以笞杖徒流死為五刑又刖人足是六刑也於是除之宋人於今五刑之外又為刺配之法豈非所謂六刑乎聚罪廢無聊之人於牢城之中使之合羣以構怨其憤憤不平之心無所於洩心中之意雖欲自新而面上之文已不可去其亡去為盗梃起為亂又何怪哉宋江以三十六人横行河朔迄不能制之是皆刺配之徒在在而有以為之耳目也以上徒流舜典曰金作贖刑朱熹曰金作贖刑者使之入金而免其罪所以贖夫犯鞭扑之刑而情又輕者也或問朱熹曰贖刑非古法歟曰古之所謂贖刑者贖鞭扑耳夫既已殺人傷人矣又使之得以金贖則有財者皆可以殺人傷人而無辜被害者何其大不幸也且殺人者安然居乎鄉里彼孝子順孫之欲報其親者豈肯安於此乎所以屏之四裔流之逺方彼此兩全之也吕刑曰墨辟疑赦其罰百鍰六兩曰鍰閱視也實其罪劓辟疑赦其罰惟倍二百鍰也閱實其罪剕辟疑赦其罰倍差倍而又差五百鍰也閱實其罪宫辟疑赦其罰六百鍰閱實其罪大辟疑赦其罰千鍰閱實其罪蔡沈曰臯陶謂罪疑惟輕者降一等而罪之耳今五刑疑赦直罰之以金是大辟宫剕劓墨皆不復降等用矣舜之贖刑官府學校鞭扑之刑耳夫刑莫輕於鞭扑入於鞭扑之刑而又情法猶有可議者則是無法以治之故使之贖特不欲遽釋之也而穆王之所謂贖雖大辟亦贖也舜豈有是制夏僎曰毎條必言閱實其罪恐聴者或不詳其意止閱實其一而忽其他故不嫌其費辭也董鼎曰舜既以五流而宥五刑矣鞭扑之輕者乃許以金贖所以養其愧恥之心而開以自新之路曰眚災肆赦則直赦之而已穆王廼以刑為致罪以罰為贖金既謂五刑之疑有赦而又曰其罰若干鍰則雖在疑赦皆不免於刑贖五刑盡贖非鬻獄乎自是有金者雖殺人皆可以無死而刑者相半於道必皆無金者也中正安在㢤臣按吕刑之贖法蔡氏本朱子意謂舜典所謂贖者官府學校之刑耳若五刑則固未嘗贖也五刑之寛惟處以流鞭扑之寛方許其贖今穆王贖法雖大辟亦與其贖免曾謂唐虞之世而有是法以為穆王廵逰無度財匱民勞至其末年無以為計乃為此一切權宜之術以斂民財夫子録之葢以示戒而馬端臨乃謂熟讀此書哀矜惻怛之意千載之下猶使人為之感動且拳拳乎訖富惟貧之戒其不為聚斂征求設也審矣且所謂贖者意自有在其意墨辟疑赦其罰百鍰葢謂墨法之中疑其可赦者不遽赦之而姑取其百鍰以示罰耳繼之曰閱實其罪葢言罪之無疑則刑可疑則贖皆當閱其實也又曰財者人之所甚欲故奪其欲以病之使其不為惡耳豈利其貨乎此書大槩所言哀民之罹於法懼有司不能審克而輕用之此意葢期於無刑而非作刑也臣竊以謂馬氏之言謂穆王之贖法非利其貨入葢因後世禁網深宻犯罪者多閱其實有可疑者則罰其所甚欲之金以貸其罪也夫罪入五刑而可疑者使富而有金者出金以贖其罪可矣若夫無立錐之民而犯大辟之罪何従而得金千鍰乎如是則罪之疑者富者得生貧者坐死是豈聖人之刑㢤然則罪之有疑者如之何則可書固自謂上下比罪上刑適輕下服是即虞書罪疑惟輕也奚用贖為哉周禮職金掌受士之金罰貨罰入于司兵鄭𤣥曰貨泉布也罰贖罰也入于司兵給治兵及工直也故曰金作贖刑賈公彦曰掌受士之金罰者謂斷獄訟者有疑即使出贖既言金罰又言貨罰者出罰之家時或無金即出貨以當金也臣按周禮職金受士之金罰貨罰入于司兵葢因人之有罪犯于師士者當罰金與貨以贖罪則入其金于司兵以為治兵之工直後世有罪者往往歸之内藏以為泛用或以為繕修營造之費非古制也漢恵帝元年令民有罪得買爵三十級以免死罪顔師古曰令出買爵之錢以贖罪臣按舜典金作贖刑非利之也而後世則利之矣恵帝令民有罪得買爵以免死罪則是富者有罪非徒有財而得免死又因而得爵焉嗚呼是何等賞罰耶孝文時納鼂錯之說募民納粟塞下得以除罪臣按錯之說欲以此使人重榖也榖則重矣刑毋乃輕乎是知務農足以使民財之富而不知輕刑適足以致民俗之嚚此偏見曲說識治體者所不取也必不得已而救一時之急非甚不得已不可也事已則已可矣武帝天漢四年令死罪人入贖錢五十萬減死罪一等臣按辟以止辟此二帝三王立法之本意也若死者而可以利贖則犯法死者皆貧民而富者不復死矣其他雜犯贖之可也若夫殺人者而亦得贖焉則死者何辜而其寡妻孤子何以洩其憤㢤死者抱千載不報之寃生者含沒齒不平之氣以此感傷天地之和致災異之變或馴致禍亂者亦或有之為天地生民主者不可不以武帝為戒宣帝時西羌反張敞以兵食不足請令各諸有罪非盗受財殺人及犯法不得赦者皆得以差入榖以贖罪事下有司蕭望之等言令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而刑不一也恐開利路以傷既成之化蔡沈曰敞之議初未嘗及夫殺人及盗之罪而望之等猶以為恐開利路以傷既成之化曾謂唐虞之世而有是贖法㢤宋制凡用官䕃得減贖太祖乾徳四年大理正髙繼申言刑統名例律三品五品七品以上官親屬犯罪各有等第減贖恐久恃先䕃不畏刑章今犯罪身無官者須祖父曾任本朝官據品級等乃得減贖如仕于前代須有功徳及民為時所推乃得請従之太祖又定流内品官任流外職凖律文徒罪以上依當贖法仁宗至和初詔前代帝王後嘗任本朝官不及七品者祖父母父母妻子罪流以下聴贖臣按宋朝贖法惟以待輕刑非獨以優見仕之臣凡其親屬亦䝉其澤非獨以待當世之臣雖前代之臣其子孫亦得霑其恵太宗淳化四年詔諸州犯罪或入金贖長吏得以任情而輕用之自今不得以贖論臣按贖刑乃帝王之法孔子修書載在聖經葢惟用之學校以寛鞭扑之刑所以飬士大夫之亷恥也後世乃一槩用之以為常法遇有邉防之警則俾之納粟於邉遇有帑藏之乏則俾之納金於官此猶不得已而為之是以職金納金貨於司兵之意也若當夫無事之時而定以為常制則是幸民之犯以為國之利可乎然此猶為國也今之藩臬州邑往往假以繕造公宇修理學校為名随意輕重而取之名雖為公實則為己朝廷雖有明禁公然為之恬無所畏乞敕法司申明舊比再有犯者坐以枉法終身不齒庶㡬姦弊少息乎以上贖罪以上明流贖之意臣按虞書五刑之下有流所以宥夫疑獄及不可加刑之人鞭扑之下有贖所以宥夫輕罪及以飬士大夫亷恥之節然未有徒刑也而徒之刑始見於周官然亦未明言其為徒也而有徒之意焉所以為此刑者葢亦流宥之意而其罪視流為輕矣本朝因隋唐舊制以笞杖徒流死為五刑所謂流者率従寛減以為徒真用以流者葢無㡬也至於贖刑國初雖因唐制而贖以錢五刑一十九等自六百文以至四十二貫第立制以為備而不盡用也其後或隨時以應用而有罰米贖罪之比然皆以貸輕刑爾而真犯死罪者則否是以一世之人得以安其室家之樂而無流徙之苦役作於外者曾不㡬時限滿而歸者即復如舊富者不以財而幸免貧者不以匱而獨死其制刑視前代為輕其用刑視前代為省民心之親戴國祚之綿長豈無所自哉大學衍義補卷一百五
