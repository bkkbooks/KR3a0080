body:
  text: 大學衍義補卷八十七明丘濬撰治國平天下之要備規制城池之守易坎之彖曰天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉程頤曰高不可升者天之險也山川丘陵地之險也王公君人者觀坎之象知險之不可陵也故設為城郭溝池之險以守其國保其民人是有用險之時其用甚大故贊其大矣哉山河城池設險之大端吳澂曰不可升者無形之險山川丘陵者有形之險王公因有形之險為無形之險設此以固守其國是謂人險臣按自古帝王必依險以立國所謂險者有三焉天險也地險也人險也天險者本天之理地險者因地之勢人險者用人之力是故為國者必明禮義立紀綱修法度有階級而人不得以陵犯有等威而人不敢以踰越是所謂天險也必因形勝增髙深扼要害使出入也有所限截來往也有所拘繫是所謂地險也是二險者一本於天一成於地所以設而為之者則又在乎人焉王公因天之道順地之勢為之城郭為之溝池為之關隘為之亭障皆所以守其國也夫險者易之反也有其險也則隨其險而補其所不足疏其所不通無其險也則於其平夷之地修為險固之備内焉而為之垣墉外焉而為之城池又遠焉而為之藩籬有門以謹其出入有關以議其往來是則所謂人險也夫既有自然之地險以為之關塞又有當然之人險以為之捍蔽則重關鉅鎮之中而有金城湯池之固貔貅萬旅虎豹九關京師地大而人衆宫闕䆳宻而深嚴望之真如在天上而不可升矣詩烝民之六章曰王命仲山甫城彼東方朱熹曰宣王命樊侯仲山甫築城於齊而尹吉甫作詩以送之東方齊也傳曰古者諸侯之居逼隘則王者遷其邑而定其居蓋去薄姑而遷於臨菑也孔氏曰史記齊獻公元年徙薄姑都治臨菑計獻公當夷王之時與此傳不合豈徙於夷王之時至是而始備其城郭之守歟韓奕之末章曰溥大也彼韓城燕召公之國師衆也所完以先祖受命因時百蠻王錫韓侯其追其貊追貊皆蠻夷國奄受北國因以其伯實墉城也實壑池也實畝實籍税也獻其貔皮赤豹黃羆朱熹曰韓國名侯爵武王之後也韓初封時召公為司空王命以其衆為築此城如召伯營謝山甫城齊春秋諸侯城邢城楚丘之類也王以韓侯之先因是百蠻而長之故錫之追貊使為之伯以修其城池治其田畝正其稅法而貢其所有於王也吕祖謙曰春秋之時城邢城楚丘城縁陵城杞之類皆合諸侯為之霸令尚如此則周之盛時命燕城韓固常政也臣按築城大役也本國之民不足以自成之必須朝廷命鄰邦合力為之非但以其工程浩大蓋以城郭之守不可以稽久恐其或有意外之變非徒一國之事亦以其事體關係朝廷也周禮掌固掌修城郭溝池樹渠之固頒其士庶子及其衆庶之守設其飾器兵甲之屬分其財用均其稍食任其萬民用其材器凡守者受法焉劉彜曰易曰城復於隍則是浚溝之土所以為城也鑿池之土所以為郭也溝池深於外則城郭固於内用其深以增其高也司險掌九州之圖以周知其山林川澤之阻鄭𤣥曰固國所依阻者也在國曰固在野曰險掌固掌修城郭溝池樹渠之固竝據國而言司險周知山林川澤之阻竝據野而言張栻曰孟子謂域民不以封疆固國不以山谿威天下不以兵革而先王封疆之制甚詳於周官設險守國與弧矢之利竝著於易經何耶蓋先王吉凶與民同患其為治也體用兼備本末具舉道得於己固有以一天下之心而法制詳宻又有以周天下之慮此其治所以長久而安固若孟子之言則推其本而言之耳臣按掌固之職掌修城郭溝池樹渠之固蓋盡人力以固王畿於内者也易所謂王公設險者此也司險之職掌九州之圖以周知其山林川澤之阻蓋因地勢以為險阻於外者也易所謂地險者此也夫人君為治固當本乎内治之修而亦不可不為外患之禦内焉者既本城郭溝池以為固外焉者乂因丘陵川澤以為險因其自然之勢則易為力豫為未然之防則無外患此周官所以有掌固司險之設也雖然古人所以守其國者則又不專在是是故遠而有關塞則守在四夷近而有甸服則守在九畿有六官為守國之人有六典為守國之法而其險之所以不可升固之所以不可攻者則又在乎德禮仁義焉不然雖有高城深池委而去之矣禮運曰今大道既隱天下為家各親其親各子其子貨力為去聲己大人世父傳子為世及兄傳弟為及以為禮城内城郭外郭溝池塹也以為固孔頴達曰私力獨財不免争奪故設險以自衞固臣按人生有欲必有分辨界限之者然後不争所以界限之者城郭溝池是也四者皆出於人力之所為王公設險以守其國此其切近而最要者也春秋隱公七年夏城中丘胡安國曰程氏謂為民立君所以養之也養民之道在愛其力民力足則生養遂教化行風俗美故為政以民力為重也春秋凡用民必書其所興作不時害義固為罪矣雖時且義亦書見勞民為重事也人君而知此義則知慎重於用民力矣凡書城者完舊也書築者創始也城中丘使民不以時非人君之心也吳澂曰君之資於民者資其力也民之報其君者報以力也故無事則資其力以用之於農以足食生財有事則資其力而用之於兵以敵愾禦侮非禮非兵而勞民之力必以其時以其禮而不敢妄興不得已而役之亦必節其力而不盡也春秋凡力役必書重民力也或問穀梁云凡城之志皆譏啖子曰凡城國之急務但問時與不時不應一切是譏易曰設險以守其國禮曰城池以為固則春秋書城果何意也九年夏城郎胡安國曰城者禦暴保民之所而城有制役有時大都不過三國之一邑無百雉之城制也凡土功龍見而戒事火見而致用水昏正而栽音再日至而畢時也隱公城中丘城郎而皆以夏則妨農務而非時矣城不踰制役不違時又當分財用平板榦稱畚築程土物議遠邇略基址揣厚薄仞溝洫具餱糧度有司量功命日不愆於素然後為之可也況失其時制妄興大作無愛養斯民之意者其罪之輕重見矣臣按有國者城池之設固不可無然非為民生則不可輕用民力非甚不得已不為也況可非其時乎是以善為國者恒於無事之時而為先事之備籌之必於其早為之必以其漸成之必緩其期不至急遽倉卒茍且為之此所以務不妨農民不知勞而役不再舉也莊公九年冬浚洙胡安國曰固國以保民為本輕用民力妄興大作邦本一搖雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足慿而況洙乎書浚洙見勞民於守國之末務而不知本為後戒也臣按因地險之川浚而深之以限外侮有國者不可廢也但事勢有緩急農務有殷隙方事勢稍緩農務方殷得已且已可也若非事勢逼切而不得已不可廢農時也二十八年冬築􅔛胡安國曰􅔛邑也凡用功大曰城小曰築故館則書築臺則書築囿則書築􅔛邑而書築者創作邑也其志不視嵗之豐凶而輕用民力於其所不必為也則非人君之心矣臣按先儒謂春秋凡工役之多者書之以城工役之小者書之以築聖人於一邑之小者必謹書之以見民力雖小不可輕用也以示後世之為民上者使其用民力非必不可已非必不可無雖一夫一役決不可非時而輕費民力於無用不急之地也僖公二年城楚丘胡安國曰楚丘衞邑齊桓公帥諸侯城之而封衞也不書桓公不與諸侯專封也桓公封衞而衞國忘亡其有功於中華甚大為利於衞人甚博宜有美辭發揚其事今乃㣲之若此者正其義不謀其利明其道不計其功略小惠存大節春秋之法也臣按諸侯不得專封封國者天子之事也人臣奉命於外凡事必請於天子況遷國築城乎若非奉專制之命及甚大不得已而存亡安危之幾決於此緩則不及事決不可也成公九年城中城胡安國曰經世安民視道之得失不倚城郭溝池以為固也穀梁子謂凡城之誌皆譏其說是矣莒雖恃陋不設備至使楚人入鄆茍有令政使民效死而不潰寇亦豈能入也城非春秋所貴而書城中城其為儆守益微矣王公設險以守其國非歟曰百雉之城七里之郭設險之大端也謹於禮以為國辨尊卑分貴賤明等威異物采凡所以杜絶陵􅆫限隔上下者乃體險之大用也獨城郭溝池之足恃乎臣按易曰王公設險以守其國謂之設也人為之也自古所以為天下國家禍患者盜賊也敵國也人君設險以為國家之屛蔽城於外所以禦敵國城於中所以禦盜賊皆不可無者也故胡氏所謂不倚城郭溝池以為固蓋譏列國諸侯不務德政而徒恃築城以勞民者爾非通論天下之勢也盍觀人家之備盜乎藩籬垣牆所以防外寇之攘奪者固在所急而緘縢扃鐍所以防家人之竊剽者亦不可少也國家之備寇盜曷異是哉襄公二年城虎牢胡安國曰虎牢鄭地故稱制邑至漢為成臯今為氾水縣巖險聞於天下猶虞之下陽趙之上黨魏之安邑燕之榆關吳之西陵今夷陵蜀之漢樂今成固地有所必據城有所必守而不可以棄焉者也有是險而不能守故不繫於鄭然則據地設險亦所貴乎天險不可升也地險山川丘陵也王公設險以守其國大易之訓也城郭溝池以為固亦君子之所謹也鑿斯池築斯城與民固守孟子之所以語滕君也夫狡焉思啓封疆而爭地以戰殺人盈野爭城以戰殺人盈城以戰殺人盈城者固非春秋之所貴守天子之土繼先君之世不能設險守國將至於遷潰滅亡亦非聖人之所與臣按古者列國其山川丘陵各有險阻之處往往據之以為守今天下一家守在四夷當以邊塞為守固無俟於内地之險也然天造地設分疆畫境各有界限凡其界限之處必有天然之險其不足者人力因而城之此自然之勢也亦理之當然也我國家分天下為兩畿十三藩於凡交界之處祖宗各設衞以城守焉如潼關乃河南陜西交界也則設潼關衞以守焉然衞城介華陜之間去京畿且遠顧不以屬河陜二都司而直𨽻京師聖祖之意深矣七年城費胡安國曰費季氏邑也書城費乃履霜堅氷之戒强私家弱公室之萌用人不惟其賢惟其世豈不殆哉臣按城城天下之大事也守藩服者非奉天子之命而與其下私營之可乎此王法之所必不宥者也履霜堅氷至所宜深戒十九年城西郛左氏曰懼齊也哀公四年城西郛杜預曰魯西郛備晉也臣按先儒謂郛乃外城此云西郛實國都外城之西郛也夫郛之在西同一地也前城左氏以為懼齊後城杜氏以為備晉不知果一地歟而或異地也無所於考然以今地勢觀之則齊境在魯之東晉境在魯之西杜氏之説似為是焉説者多咎魯安於不競疲民以為城避難而城其國之郛則郛之外若郊若野皆不可保矣雖然此以一事而論也若夫守國之要必先從近始而後及於遠近者耳目所及且爾況於郊野之外封疆之遠乎信如説者之論則守家者專用力於藩垣而門扃四壁皆可以廢矣左傳宣公十一年楚令尹蒍艾獵孫叔敖也城沂楚邑使封人主築城者慮事謀慮計功以授司徒掌役者量功命日命作日數分財用築用之具平板在兩旁障土者榦兩頭立木稱量輕重畚盛土器築實土器程土物取土用物為作程限議遠邇議遠察邇均其勞也略行也基址城足具餱乾食糧度有司事三旬三十日也而成不愆於素杜預曰不愆於素不過素所慮之期也傳言叔敖之能使民孔頴達曰慮事者謀慮城築之事謂揆度前事也臣按古人凡有興作修築必先謀慮於其前其所謀慮之事分財用平板榦以下數事是也既謀慮矣即量其功而􅓪日以啓功至於某日當訖也凡其所成之功計度其程限皆不踰其所素定者凡今日之所就皆前日之所期者也是以先王之世事無過舉而治有成功漢高祖六年冬十月令天下縣邑城吕祖謙曰始皇并諸侯而隳壞城郭高祖定天下而令縣邑城心量之廣狹世祚之長短於是可卜矣臣按郡邑有大小民庶有衆寡皆不可無保障一也所以保障而捍蔽之者非城郭乎始皇以天下吏民為敵國惟恐其有所捍蔽而得以拒我高祖則以天下吏民為一家惟恐其無所捍蔽而或以喪生此其心公私之異而存亡所以分也歟孝惠元年始作長安城西北方三年發諸侯王列侯徒𨽻二萬人城長安五年復發里中民城長安三十日而罷吕祖謙曰蕭何建都長安兵革未息未及城也至是叛亂既平始板築焉始於西北方先所急也是後間一嵗乃興役凡三調發而城始成所以休民力也以三年五年考之發長安五百里内男女十四萬六千人城長安三十日罷地近則齎送弗後人衆則大事易集罷速則農事不違雖當曹參為相實何之規模臣按國家凡有大役皆如漢人此法為之用近地之民不勞以久役不急於近效則事成而民不知勞矣凡事皆然非但築城一事也而於築城尤為切要五代周世宗顯宗二年世宗詔展外城先立標幟俟今冬農隙興板築東作動則罷之更俟次年以漸成之且令自今葬埋皆出所標七里之外其標内俟縣官分畫街衢倉塲營􅅟之外聽民隨便築室臣按世宗此舉可為後世開展城池之法蓋為之以漸立之以準使民不疲於用力而豫知所以避就凡有營繕皆可準此以為法不但展城一事也宋仁宗慶厯二年建大名府為北京景祐中范仲淹建議城洛陽以備急難及契丹渝盟言事者請從仲淹之議吕夷簡謂敵畏壯侮怯遽城洛陽無以示威必長其勢景德之役非乘輿濟河則恐未易服也宜建都大名示將親征以伐其謀詔既下仲淹又言此可張虛聲爾未足恃也城洛陽既弗及請速修京城議者多附仲淹議夷簡曰此囊瓦城郢計也使敵得渡河而固守京師天下殆矣故設備宜在河北卒建北京臣按仲淹欲修京城恐敵之長驅也夷簡之欲城大名為敵之鎮遏也二議皆是也當敵勢方張之時而修京城似若示怯然修外城而不足以扼其衝則亦虛聲而已無益實事也仲淹之議當於無事之時以漸而為之隨時而增補之譬則人家之完其垣墉非但備寇盜也亦以為障蔽焉耳夫然則己既得以為固亦不示人以怯矣慶厯四年樞宻副使韓琦參知政事范仲淹竝對於崇政殿上和戰守攻四䇿請朝廷力行七事以防大患六曰修京城諫官余靖言大臣建議修京城昔魏文侯恃險吳越以為失詞願陛下舍此䇿别議遠圖之術臣按范仲淹建議修京城所謂遠圖無過此也余靖言於仁宗願舍此䇿别議遠圖之術其意蓋與吕夷簡同也其後靖康之禍金人長驅越過河北城鎮而不之顧直抵京師宋遂不支所謂遠圖者果安在哉以上城池之守大學衍義補卷八十七
