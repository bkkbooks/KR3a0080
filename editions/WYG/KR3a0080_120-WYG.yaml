body:
  text: 大學衍義補卷一百二十明丘濬撰治國平天下之要嚴武備本兵之柄帝典曰臯陶蠻夷猾夏寇賊姦宄汝作士董琮曰或言帝者之世詳於化而畧於政王者之世詳於政而畧於化虞時兵刑之官合為一而禮樂分為二成周禮樂之官合為一而兵刑分為二故此蠻夷猾夏亦以命臯陶臣按帝舜命臯陶作士刑官也而以蠻夷猾夏為言是則後世兵官所掌之事也豈不以兵乃刑罰之大者乎班固作漢書志刑罰而不志兵乃雜兵於刑罰之中言之所謂聖人因天秩而制五禮因天討而作五刑大刑用甲兵中刑用刀鋸其次用鑽鑿薄刑用鞭扑大者陳諸原野小者致之市朝其所由來者尚矣自黄帝有涿鹿之戰顓頊有共工之陳唐虞之際至治之極猶流共工放驩兠竄三苗殛鯀然後天下服夏有甘扈之誓殷周以兵定天下矣天下既定戢藏干戈敎以文徳而猶立司馬之官設六軍之衆因井田而制軍賦固有以見于此也由是觀之有虞九官之命惟言刑而不言兵而兵在其中矣𦙍征曰惟仲康太康之弟肇位四海𦙍侯𦙍國之侯命掌六師蔡沈曰命掌六師命為大司馬也仲康始即位即命𦙍侯以掌六師次年始有征羲和之命必本始而言者蓋史臣善仲康肇位之時已能收其兵權故羲和之征猶能自天子出也林之竒曰仲康即位之始即能命𦙍侯掌六師以收其兵權如漢文帝入自代邸即皇帝位夜拜宋昌為衛將軍鎮撫南北軍之類臣按唐虞之世兵政兼於刑官未有専司兵政者至是仲康始命𦙍侯掌六師然則兵司之設其在有夏之世歟前代掌兵之官無定制五代以來雖設樞密院然皆以文臣充惟我聖祖開國之初首建大都督府與中書省並其後廢中書省分六部亦分大都督府為五軍設左右都督都督同知僉事各二員其有以公侯伯任府事者官與爵並入銜其後止書其銜曰掌某府事某侯若伯非舊制也周官曰司馬掌邦政綂六師平邦國吕祖謙曰自夏命𦙍侯掌六師舉政典以誓則邦政掌於司馬舊矣國之大事何莫非政獨戎政謂之政何也天下無事寓兵於農然後賦役百為始有所施是固政之所從出也天下有事舉兵討亂邦之存亡安危係焉其為政之大固不待論矣此戎政所以獨謂之政也綂六師而謂之平邦國則王者用師之本旨特欲平邦國之不平者耳臣按此條已載正百官下然此復載之者威武之道必本於兵兵政之大者實掌於此官竊惟唐虞之世設為九官而獨無所謂兵官者葢是時風氣初開人心純樸雖有蠻夷猾夏盜賊姦宄特小小為害而已然猶未至如後世之昌熾毒害故止命刑官掌之遇有征討隨時命官故三苗逆命則以命掌邦土之司空未嘗特設官以掌兵政専征伐也及得三苗不過分比之而其首惡亦止於竄逐之而已非若後世犂庭掃穴而誅絶之也夏之時始有掌六師舉政典之官周分六典而司馬居其一為治之事無非政者而獨以綂六師平邦國為政典則時之所尚者在兵而政之為政莫急於兵可見矣噫於此可以觀世變矣然在周之世兵猶出於農秦漢以來兵農遂分不可復合世變愈趨而愈下為治者當隨時以制宜則今日本兵柄之大臣尤不可不得其人自非兼資文武通達古今有思患豫防之心有隨機應變之智不足以當司馬之任毋徒循資取以充位以貽誤國之禍也周禮惟王建國乃立夏官司馬使帥其屬而掌邦政以佐王平邦國鄭𤣥曰象夏所立之官馬者武也言為武者也夏整齊萬物天子立司馬共掌邦政政可以平諸侯正天下吕祖謙曰綂六師而謂之平邦國則王者用師之本旨特欲平邦國之不平者耳非有他求也非濟貪忿而夸武功也所謂天討也臣按周禮六官之設皆所以佐王以治邦國也於天官曰均地官曰擾春官曰和秋官曰刑而於夏官則曰平焉大學之道其大用歸於平天下謂之平者上下四旁均齊方正也夫平天下固欲其均齊方正使無一人之不得其所然有不皆然者必有以參錯乖戾侵犯之者也有以參錯乖戾侵犯之則不平矣故凡設官分職所以均之擾之和之刑之者皆所以平之也其間有均之擾之和之刑之而猶有不平焉者然後屬之於司馬焉先儒謂馬者武也五官所掌者皆文事文事有所不及於是乎治之以武焉司馬所掌者邦政政之為言正也所以正人之不正也外服之諸侯邉方之夷狄有所不正而有以悖吾之治敎干吾之刑憲則聲其罪以正之正其不正所以平其不平也大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人鄭𤣥曰輿衆也行謂軍行列也晉作六軍而有三行取名於此賈公彦曰此夏官史十六人胥三十二人徒三百二十人與諸官異者以大司馬總六軍故獨多也臣按周禮五官之卿所謂大司徒小司徒大司寇小司寇之外而其官聨未有以徒寇為名者而夏官大司馬小司馬外又有軍司馬輿司馬行司馬與夫都司馬家司馬焉意者大司馬與其貳掌邦政以平邦國在天子之左右總其大綱以佐天子所謂國司馬公司馬者也若其用以主軍賦者則謂之軍主車馬者則謂之輿主征行者則謂之行曰兩曰都曰家則各司其兩及都家者其職任有大小而其所掌之軍賦皆同非若他官所掌者各異其事此其所以不嫌於同名也歟大司馬以九伐之法正邦國馮乘陵也弱犯寡則眚削其四旁之賊賢害民則伐聲其罪以討之之暴内内暴其國陵外外陵諸侯則壇置之空地之野荒民散則削削其地之負固恃其險阻不服則侵兵加其地之賊殺其親則正之放逐也弑其君則殘之犯令違棄上命陵政陵蔑王政則杜之外内亂鳥獸行則滅之臣按先儒謂先王之時其所封建以為諸侯者莫非賢也邦國之君又安有罪惡如九伐之法所正者乎蓋先王制治於未亂保邦於未危思患而豫防之故制為九伐之法其法雖具豈嘗試之哉設之使知懼而已是以當時之列爵分土者咸知九伐之法其嚴如此世禄承襲者保其富厚而無茍且之意脩職述守者務善其禮不為進取之計故信義著而道化成名器固而風俗淳推之百世可久之道也大司馬及師大合軍以行禁令以救無辜伐有罪若大師謂王自出征伐則掌其戒令涖臨也大卜卜出軍吉凶帥執事涖釁殺牲以血塗之主謂遷廟之主及軍器及致建太常太常之旗比校也軍衆誅後至者及戰巡陳眡事而賞罰若師有功則左執律聴軍聲者右秉鉞致殺伐者以先愷兵樂曰愷樂獻于社若師不功無功則厭厭冠喪服也而奉主車鄭𤣥曰師所謂王巡守若㑹同司馬起師合軍以從所以威天下行其政也賈公彦曰大師王親御六軍故司馬用王之太常致衆若王不親則司馬自用大旗致之司馬當戰對陳之時巡軍陳眡其戰功之事知其有功無功而行賞罰也臣按王者之師非救無辜伐有罪不輕出蓋仁者愛人故惡人之害人義者循理故惡人之悖理天下之大兆民之衆奉一人以為君所以安我也必欲人人止其所事事合乎理然後君人之道盡是以人之無罪而為人所害人之有罪而逆理以行為人上者必命將以救之伐之若或人之衆勢之大而臣下力有不及然後親出師以救之伐之焉小司馬之職掌凡小祭祀㑹同饗射師田喪紀掌其事如大司馬之灋鄭𤣥曰此下脱滅漢興求之不得軍司馬輿司馬行司馬王次㸃曰三代國容不入軍軍容不入國儀禮吉凶軍賔嘉達於天下而軍禮獨藏於司馬號司馬法若國有師田之事縣師始受法於司馬以作其衆庻小司馬之職掌不悉書而軍司馬輿司馬行司馬皆不備官有事斯置其不欲觀兵葢如此臣按先儒謂周禮六官之中惟小司馬一官職掌不悉備而軍輿行三司馬又徒有其官名而闕其職掌其令貢賦則為之丘甸縣鄙之名而以四起其數其㑹卒伍則為之伍兩軍師之名而以五起其數其調車徒則立通成終同之名而以十起其數同此民而易其名異其數何其不憚煩也夫軍旅一事也習戰謂之田軍政謂之禮大閲謂之敎設其財於九式離其書於儀禮特闕其兵馬之職屢易其軍伍之名變化出入使民不知葢先王以為明民以凶器危事適以成其乖争之習所以為是藏吾用而不示民者為慮㣲也我祖宗不使天下知兵馬之數亦此意也近世乃有團營之設何居詩六月之三章曰有嚴威也有翼敬也共與供同武之服事也共武之服以定王國朱熹曰言將帥皆嚴敬以共武事也臣按先儒謂兵事莫尚於嚴莫先於敬為將必嚴不嚴則軍心不齊為帥必敬不敬則軍事不整嚴敬二字乃用師之要夫惟將帥皆嚴皆敬以共武事此王國之所以定也其五章曰文武吉甫萬邦為憲法也朱熹曰吉甫尹吉甫此時大將也非文無以附衆非武無以威敵能文能武則萬邦以之為法矣謝枋得曰漢唐而下縉紳介胄分為兩途愚儒武夫各持一説不知三代將帥必文武全才可以為萬邦之法則者也臣按所謂文者附衆安民之謂非辭章藻繪也武者戡定禍亂之謂非膂力技能也有撫御之才足以附衆有制勝之術足以威敵國家得如是之人以為將帥尚何國威之不振而外侮之敢肆哉夫然非但可以為一時之用凡其所以建立設施端可以示法於四方而貽範於來世矣昭公五年春王正月舍中軍胡安國曰按左氏舍中軍卑公室也初作三軍三分公室而各有其一及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公三軍作舍皆自三家公不與焉公室益卑而魯公之兵權悉歸于季氏矣兵權有國之司命三綱兵政之本原書其作舍而公孫于齊薨于乾侯定公無正必至之理也臣按三軍之制國家兵權所繫承之天子傳之祖宗者也今魯國之軍其作其舍皆由臣下而為其君者無與焉國非其國矣後之有天下國家者其尚防㣲杜漸毋使兵權為人所持哉魏置五兵尚書五兵謂中兵外兵騎兵别兵都兵臣按後世設尚書掌兵政始此唐制兵部尚書一人侍郎二人掌武選地圖車馬甲械之政其屬有四一曰兵部二曰職方三曰駕部四曰庫部凡將出征告廟授斧鉞軍不從令大將専决還日具上其罪凡發兵降勅書於尚書尚書下文符放十人發十馬軍器出入皆不待勅衛士畨直發一人以上必覆奏諸蕃首領至則威儀郊導臣按唐人始分六部而兵部専掌兵戎之政其屬有四宋以來因之然皆為宰相之屬至我朝罷中書省及樞密院而兵部始得以専達於上葢専前代樞府之權而尚書兵部之政仍如故宋志樞密院佐天子執兵政凡邉防軍旅之常務與三省分班禀奏事干國體則宰相執政官合奏林駉曰樞府之官自唐始名肇於開元官設於永泰權重於五代而其制至宋而始詳以東府掌文事西府掌武事其官有使有副使有僉書有同僉書有知院有同知院事臣按程頥言樞密乃虛設一大事既三省同議其他乃有司之事兵部尚書之職説者謂密院與中書對立止如參知政事與宰相分班知印未害也有使有副使有知院有同知有僉書又有所謂直學士都承旨檢詳編修其屬皆與宰屬等兵民本一而强分為二必置一司如是之浩繁所謂虚設一大事也我朝革去樞府而専以兵政歸兵部官簡而職専事權歸一而體綂不紊百年以來戎政舉而武備修有以也夫仁宗至和中年知諫院范鎮言中書主民樞密主兵三司主財各不相知故財已匱而樞密益兵不已民已困而三司取財不已中書視民之困而不知使樞密減兵三司寛財以救民困欲乞使中書樞密院通知兵民財利大計與三司量其出入制為國用臣按今制與宋異宋以三司主財樞密主兵今制兵部主兵而財賦錢糧則户部所掌也兵以禦寇制亂固不可一日無者而兵之所以為兵者士必食粟馬必食芻亦豈可一日無哉是故户兵二部必相通融以為政掌兵者遇有調發軍馬必先行文户部㑹計邉儲之有無儲蓄既備然後師旅出焉如是則足食足兵而軍威無有不振武備無有不修者矣神宗熈寧中監察御史裏行蔡承禧言近命趙卨為安南招討使李憲為之副外議皆云不自二府又曰憲所陳請多不經由二府徑批聖語下招討使夫王言之出尤在謹㣲其初少不留神其後遂為故事樂便疾於一時忘幾㣲於後日一啟其漸寢難改更况於邉庭休戚至重且命大臣者所以同安危而繋休戚者也至煩莫如邉鎮至重莫若將臣而二府有不預焉則大臣之能知其任者必皆自疑莫敢安其處矣既不敢安其處則同心同徳之義虧矣大臣之罷軟者必曰勢位已極矣上已為之而又以力争則獲専權之咎也大臣之不勝其任者必曰此出於聖旨我何預哉是與其能者為自疑之端不才者為容身之地積此以徃豈國家之利耶臣欲事無鉅細非經二府者不得施行如二府之論或有異同陛下總攬其成斷其可否而後行庶盡帝王容下之美大臣無諉上之咎臣按命將國家之大事必責成於本兵柄之大臣使之廣詢博訪必得其人果可當大事者然後用之人君於凡百司衆職猶不可任其己意用其私人矧出師命將人之生死所係國之安危所闗而可以輕用其人乎夫用其人且不可而又惟其言之是信而使之得假上語以行之尤不可也范祖禹言於哲宗曰祖宗制兵之法天下之兵本於樞密有發兵之權而無握兵之重京師之兵總於將帥有握兵之重而無發兵之權上下相維不可専制此所以無兵變也臣按我朝革去樞密院設五軍都督府分掌軍旅則兵權散主而無自専之患而凡宋元以來樞密之任一歸於兵部焉所謂上下相維文武相制處置之善行之萬世而無弊者也以上本兵之柄大學衍義補卷一百二十
