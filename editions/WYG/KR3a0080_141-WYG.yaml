body:
  text: 大學衍義卷一百四十一明丘濬撰治國平天下之要嚴武備經武之要上易師出以律否臧凶師卦書滿招損謙受益時乃天道大禹謨殱厥渠魁脅從罔治𦙍征臣按以上三條解見前威克厥愛允濟愛克厥威允罔功𦙍征李靖曰愛設於先威設於後不可反是也若威加於前愛救於後則無益於事矣尚書所以慎戒其終非謀於始也臣按靖言雖非經意然亦有理佑賢輔徳顯忠遂良兼弱攻昧取亂侮傷也亡推亡固存邦乃其昌仲虺之誥蔡沈曰諸侯之賢徳者佑之輔之忠良者顯之遂之所以善善也諸侯之弱者兼之昧者攻之亂者取之亡者傷之所以惡惡也推亡者兼攻取侮也固存者佑輔顯遂也推彼之所以亡固我之所以存邦國乃其昌矣林之竒曰天之生物必因其材而篤焉故栽者培之傾者覆之天道之自然也佑輔顯遂為善者必為人所助也兼攻取侮為不善者必為人所侵也聖人因其常理以應世有亡之道則推而亡之有存之道則輔而固之臣按昧者亂者攻之取之可也若有不幸而衰弱而或馴致於䘮亡乃兼之侮之豈天道哉豈聖人之心哉意所謂弱者亡者乃不為不善所致而非為善而不幸也故下文曰殖有禮覆昏暴葢所以至於弱而亡者昏而暴者也故因而覆亡之是則上天之道也故曰欽崇天道永保天命同力度徳同徳度義㤗誓蔡沈曰度量度也徳得也行道有得於身也義宜也制事達時之宜也同力度徳同徳度義意古者兵志之詞武王舉以明伐商之克林之竒曰凡勝負之理力同則有徳者勝徳同則廢義者勝度徳校善惡也度義校勝負也民之所欲天必從之同上孔安國曰言天除惡樹善與民同臣按民之所欲天必從之嗚呼為人上者慎母咈民之所欲哉吾咈民之欲則民不欲吾為之主矣民不欲吾為之主則必將以欲吾者欲他人矣民心既有所欲天意惟民之從為人上者奈何弗畏且敬哉古人有言曰撫我則后虐我則讐牧誓蔡沈曰武王因古人之言謂撫我則我之君也虐我則我之讐也臣按人君常誦此二言出入起居恒存諸心口誦而心惟之則必兢兢焉在民之上恒如朽索之馭六馬矣樹徳務滋除惡務本同上蔡沈曰務專力也植徳則務其滋長去惡則務絶根本兩句意亦古語也禮記軍旅思險隠情以虞少儀程頥曰軍行舍止行繇之處必思為險阻之防又當隠密已情以虞度人之情計也輔廣曰行軍之道以臨事而懼好謀而成為上思險謂臨事而懼慮敗不慮勝也隠情以虞謂好謀而成且兵事露則不神也武車不式介者不拜鄭𤣥曰兵車不以容禮下人也軍中之拜肅拜子曰以之田獵有禮故戎事閑也仲尼閒居胡安國曰三綱軍政之本古者春蒐夏苗秋獮冬狩皆於農隙以講事而所主者明貴賤辨等列順少長習威儀則皆納民於軌物而非馳射擊刺之末矣春秋公羊傳出竟有可以安社稷利國家者則專之可也莊十九年臣按此言雖主於聘然亦可推之以用於出師弱者吾威之彊者吾辟之是以使寡人無以立乎天下宣二十年臣按此語左傳亦引之糓梁傳知者慮義者行仁者守隱三年及桓十八年臣按此三言糓梁傳凡兩見雖為會而言然亦可以用之於師旅伐不踰時戰不逐奔誅不填音田服隱五年陸徳明曰不填服者來服者不復填厭之倍則攻敵則戰少則守僖二十二年古者雖有文事必有武備襄二十五年懐惡而討雖死不服昭四年君不為匹夫興師定四年左傳衆仲曰以徳和民不聞以亂以亂猶治絲而棼之也阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也竝隱四年君子曰不備不虞不可以師隱五年戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞隱九年以王命討不庭不貪其土以勞王爵正之體也隱十年無刑而伐之服而舍之度徳而處之量力而行之相時而動無累後人不度徳不量力不親親不徴辭明徴其辭以審曲直不察有罪犯五不韙是也而以伐人其喪師也不亦宜乎竝隱十一年凡公行告于宗廟反回也行飲至到也舍置也爵酒器策勲書勲勞於策禮也桓二年師克在和不在衆桓十一年疆塲之事慎守其一而備其不虞桓十七年凡師一宿為舍再宿為信過信為次莊三年戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之視其轍亂望其旗靡故逐之竝莊十年得一夫而失一國與惡而弃好非謀也莊十二年夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也荘二十七年輔車輔頰牙車相依唇亡齒寒僖公五年臣按公羊糓梁二子皆載唇亡齒寒之語而左傳加輔車相依一句諺有之曰心則不競何憚於病既不能彊又不能弱所以病也招携以禮懐逺以徳徳禮不易無人不懐竝僖七年弊重而言甘誘我也僖十年古者大事必乗其産謂馬生其水土而知其人心安其教訓而服習其道唯所納之無不如志重怒難任背天不祥史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥竝僖十五年盍姑内省徳乎無闕而後動僖十九年量力而動其過鮮矣善敗由已而由人乎哉僖二十年國無小不可易也無備雖衆不可恃也無謂邾小蠭蠆有毒竝僖二十二年君命無貳古之制也除君之惡惟力是視僖二十四年竊人之財猶謂之盜況貪天之功以為己力乎信國之寶也民之所庇也得原失信何以庇之所亡滋多竝僖二十五年軍志曰允當則歸又曰知難而退又曰有徳不可敵臣按凡左傳所引軍志之說必古有是書今亡矣夫幸其言猶有一二之存用兵者可以為法師直為莊曲為老竝僖二十八年又宣十二年因人之力而敝之不仁失其所與不知以亂易整不武僖三十年勤而無所必有悖心且行千里其誰不知僖三十二年輕則寡謀無禮則脱易也入險而脱又不能謀能無敗乎敵不可縱縱敵患生又曰一日縱敵數世之患也竝僖三十三年諸侯敵王所愾恨怒而獻其功文四年敵惠敵怨不在後嗣文六年先人有奪人之心軍之善謀也兵作於内而亂於外為冦冦猶及人亂自及也竝文七年使者目動而言肆懼我也將遁矣死傷未收而棄之不惠也不待期而薄人於險無勇也竝文十二年禮以順天天之道也已則反天而又以討人難以免矣又曰君子之不虐㓜賤畏乎天也文十五年我能徃冦亦能徃文十六年平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮宣四年杜預曰責公不先以禮治之而行伐牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪人之牛罰已重矣宣十一年觀釁而動徳刑政事典禮不易不可敵也不為是征叛則伐之服而舍之徳刑成矣伐叛刑也柔服徳也見可而進知難而退軍之善政也兼弱攻昧武之善經也成師以出聞敵彊而退非夫非文夫也寧我薄人無人薄我軍志曰先人有奪人之心薄之也夫武禁暴戢兵保大定功安民和衆豐財者也臣按此武之七徳拊而勉之三軍之士皆如挾纊綿也竝宣十二年雖鞭之長不及馬腹宣十五年史佚之志有之曰非我族類其心必異成四年聖人與衆同欲是以濟事又曰善鈞從衆成六年唯聖人能内外無患自非聖人外寧必有内憂盍釋楚以為外懼乎怨之所聚亂之本也多怨而階亂何以在位竝成十六年信不叛君知不害民勇不作亂亂在外為姦在内為軌御姦以徳御軌以刑竝成十七年師衆以順為武軍事有死無犯為敬襄三年謀之多族家也民之多違事滋無成襄八年居安思危思則有備有備無患襄十一年譬如捕鹿晉人角之諸戎掎之掎其足也與晉踣僵也之襄十四年臣按掎角之言出諸此兵不戢必取其族襄二十四年杜預曰族類也取其族還自害也久將墊隘慮雨水隘乃禽也不如速戰襄二十五年兵民之殘也財用之蠧小國之大災也天生五材金木水火土也民竝用之廢一不可誰能去兵兵之設乆矣所以威不軌而昭文徳也聖人以興亂人以廢竝襄二十七年或多難以固其國啓其疆土或無難以喪其國失其守字昭四年五大謂五官不在邊五細謂五官之屬不在庭杜預曰言五官之長專盛過節則不居邊細弱不勝任亦不可居朝廷末大必折尾大必掉竝昭十一年軍志有之先人有奪人之心後人有待其衰昭二十一年威克其愛雖小必濟昭二十三年乗亂不祥昭二十七年彼出則歸彼歸則出亟肄勞也以罷與疲同之多方以誤之昭二十年唐太宗曰朕觀千章萬句不出乎多方以誤之一句而已不讓則不和不和則不可以逺征定五年裔不謀夏夷不亂華俘不干盟兵不偪好定十年樹徳莫如滋去疾莫如盡哀元年背大國不信伐小國不仁民保於城城保於徳哀七年臣按左傳中論戰伐之語頗多其間多是引其所聞及古志往往切於用兵之實前代名將若闗羽岳飛輩皆喜觀左傳有繇然也臣故掇其要語載之以為經武之要使後世知三代以前兵法猶有存者如此非但後世顓顓然用權謀變詐也國語兵戢聚也而時動動則威觀則玩黷也玩則無震懼也伐木不自其本必復生塞水不自其源必復流滅禍不自其塞必復亂夫國非忠不立非信不固既不忠信而留外寇外寇知其釁而歸圖焉已自抜其本矣擇福莫若重擇禍莫若輕委質為臣無有二心委質而策死古之法也為人臣者君憂臣勞君辱臣死論語子曰必也臨事而懼好謀而成者也臣按萬世經武之要不出乎聖人此二語子曰不以教民戰是謂棄之孟子曰天時不如地利地利不如人和尉繚子曰天時不如地利地利不如人和謹人事而已矣荀子曰知莫大乎棄疑行莫大乎無過事莫大乎無悔至無悔而止矣不可必也不必其成功聖人有誅而無戰城守不攻兵革不擊不屠城不濳軍不留衆師不越時兵者所以禁暴除害也非爭奪也仁義之兵行於天下近者親其善逺方慕其徳兵不血刃逺邇來服戰如所行如戰有功如幸老子曰國之利噐不可以示人禍莫大於輕敵兵者不祥之器非君子之器不得已而用之樂殺人者不可以得志於天下矣管子曰攻堅者瑕攻瑕則瑕者堅莊子曰聖人以必不必故多功衆以不必必故無功揚子曰御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵淮南子曰良將之用卒也同其心一其力勇者不得獨進怯者不得獨退止如丘山動如一體五指之更彈不若拳手之一恎萬人之更進不如一人之獨至臣按經傳諸子言及武事者僅此以後採兵書司馬灋曰古者逐奔不過百歩縱緩不過三舍此以明禮不窮不能而哀憐傷病此以明仁成列而鼓此以明信爭義不爭利此以明義又能舍服此以明勇知終知始此以明智臣按此所謂禮仁信義勇智之六徳也葢五常之中而加以勇五常者教也而合之以勇故曰六徳以時合教以為民紀之道也自古之政也古者國容不入軍軍容不入國從命為上上賞犯命為上上戮介者不拜兵車不式城上不趨危事不齒賞不踰時欲民速得為善之利也罰不遷列欲民速覩為不善之害也用其所欲行其所能廢其不欲不能於敵反是凡陳行惟疏戰惟密兵惟雜物既章目乃明慮既定心乃强凡戰之道既作其氣因發其政假之以色道之以辭凡戰之道位欲嚴政欲栗力欲窕氣欲閒心欲一凡車以密固徒以坐固甲以重固兵以輕勝凡戰以輕行輕則危以重行重則無功以輕行重則敗以重行輕則戰故戰相為輕重舍謹兵甲行謹行列戰謹進止凡戰非陳之難使人可陳難非使可陳難使人可用難非知之難行之難凡民以仁救以義戰以智決以勇鬭以信專以利勸以功勝以上司馬灋臣按此皆司馬灋中之要語也宋人集兵書為七以教習武者此其一也七書之中惟此得古盛時之遺意何者以其不專尚權謀也此書乃齊威王時使其大夫追論古者司馬兵灋而附穰苴之說於其中然今傳記所載司馬灋之文今書皆無意者今世所傳上中下三卷仁本天子之義定爵嚴位用衆五篇者乃穰苴所說而所謂古者司馬之灋則亡焉矣今其存者特其附說耳太史公謂其閎闊深逺雖三代征伐不能竟其義意其謂全書也今其全書不可復見而三篇之中其要語者僅僅若此故摘而出之著于篇三略曰與衆同好靡不成與衆同惡靡不傾治國安家得人也亡國破家失人也柔能制强柔有所設剛有所施弱有所用强有所加㢘此四者而制其宜變動無常因敵轉化不為事先動而輒隨臣按漢光武引此語曰柔能制剛弱能制疆而此止作一句曰柔能制疆葢有闕文也況此下文繼之以柔彊弱四者與漢詔同其間闕剛弱能制四字無疑也宜如漢詔補之曰柔能制剛弱能制彊斯二語也非但以之自況亦當用此以備敵也莫不貪彊鮮能守微若能守微乃保其生能柔能剛其國彌光能弱能彊其國彌彰純柔純弱純剛純彊其國必亡得而勿有居而勿守拔而勿久立而勿取用兵之要在崇禮而重禄禮崇則智士至禄重則義士輕死臣按尊禮重禄則士之報禮重蓋用人而重之以禄非欲以是致其死也食人之禄者死人之事事君之義當然也用人之道尊以爵贍以財則士自來接以禮勸以義則士死之夫將帥者必與士卒同滋味而共安危軍井未達將不言渴軍幕未辦將不言倦軍竈未炊將不言饑冬不服裘夏不操扇雨不張葢是謂將禮將之所以為威者號令也戰之所以全勝者軍政也士之所以輕戰者用命也將無還令賞罰必信如天如地乃可使人士卒用命乃可越境亂將不可使保軍乖衆不可使伐人將無威則士卒輕刑士卒輕刑則軍失伍良將之統軍也恕己而治人推惠施恩士力日新戰如風發攻如河決故其衆可望而不可當可下而不可勝賞罰明則將威行官人得則士卒服所任賢則敵國畏將能清能靜能平能整能受諌能聽訟能納人能採言能知國俗能圖山川能表險難能制軍權將拒諫則英雄散策不從則謀士叛善惡同則功臣倦專已則下歸咎自伐則下少功信讒則衆離心貪財則姦不禁内顧則士卒淫將謀欲密士衆欲一攻敵欲疾將謀密則姦心閑士衆一則軍心結攻敵疾則備不及設將謀泄則軍無勢外闚内則禍不制財入營則衆姦㑹將無慮則謀士去將無勇則吏士恐將妄動則軍不重將遷怒則一軍懼軍無財士不來軍無賞士不往香餌之下必有死魚重賞之下必有勇夫興師之國務先隆恩攻取之國務先養民良將之養士不易於身故能使三軍如一心用兵之要必先察敵情千里饋糧士有饑色樵蘇後㸑師不宿飽羣吏朋黨各進所親招舉姦枉抑挫仁賢背公立私同仙相訕是謂亂源以上上略使智使勇使貪使愚智者樂立其功勇者好行其志貪者邀趨其利愚者不顧其死無使士談說敵羙為其惑衆無使仁者主財為其多施而附於下以上中略臣按此所謂仁者葢慈順而無執守之謂非孔孟之所謂仁也夫能扶天下之危者則據天下之安能除天下之憂者則享天下之樂能救天下之禍者則獲天下之福有徳之君以樂樂人無徳之君以樂樂身樂人者久而長樂身者不乆而亡釋近謀逺者勞而無功釋逺謀近者佚而有終佚政多忠臣勞政多怨民務廣地者荒務廣徳者彊能有其有者安貪人之有者殘臣按此等言語皆非戰國以後人所能道漢光武嘗引此語為詔以報臧宫繼之曰今國無善政灾變不息百姓驚惶人不自保而復欲逺事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚彊而屯田警備傳聞之事恒多失實誠能舉天下之半以滅大冦豈非至願茍非其時不如息人若光武者可謂善讀書矣讀書而能用之斯為善讀不然徒資口耳而無實用所謂雖多亦奚以為者也廢一善則一善衰賞一惡則衆惡歸善者得其祐惡者受其誅則國安而衆善至一令逆則百令失一惡施則百惡結故善施於順民惡加於凶民聖人之用兵非樂之也將以誅暴討亂也恬淡而不進者重傷人物也夫兵者不祥之器天道惡之不得已而用之是天道也以上下略臣按三略後漢書註謂此即張良於下邳圯所見老人出一編書者也今雖不可知其然否然光武時已引其言以為詔即以黄石公記為言其非魏晉以後人假託可知也其言皆本道義而不用隂謀秘計上略所引古語皆曰軍中略皆曰軍勢下略無所引葢上中二略惟演古人之語意而下略則已自為言也歟且其言曰三略為衰世作意謂盛世用徳不用兵兵者衰世之所用也時世衰而戰爭起誠能擇其言之粹美者而用之非獨可以用之於兵推而廣之則兵亦可以繇是而不用而歸於徳化之世矣大學衍義卷一百四十一
