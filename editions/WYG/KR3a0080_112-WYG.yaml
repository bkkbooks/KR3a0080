body:
  text: 大學衍義補卷一百十二明丘濬撰治國平天下之要慎刑憲存欽恤之心舜典欽哉欽哉惟刑之恤哉孔穎達曰此經二句舜之言也舜既制此典刑又陳典刑之義以勑天下百官使敬之哉敬之哉惟此刑罰之事最須憂念之哉憂念此刑恐有濫失欲使得中也朱熹曰多有人解恤字作寛恤之義某之意不然若作寛恤如被殺者不令償命死者何辜大率是說刑者民之司命不可不謹如斷者不可續乃矜恤之恤耳又曰今之法家多惑于報應禍福之說故多出人罪以求福報夫使無罪者不得直而有罪者反得釋是乃所以為惡耳何福報之有書所謂欽恤云者正以詳審曲直令有罪者不得幸免而無罪者不得濫刑也今之法官惑于欽恤之說以為當出人之罪而出其法故凡罪之當殺者莫不多為可出之塗以俟奏裁既云奏裁則大率減等當斬者配當配者徒當徒者杖當杖者笞是乃賣弄條貫侮法而受賕者耳何欽恤之有臣按帝舜之心無所不用其敬而於刑尤加敬焉故不徒曰欽而又曰哉者贊歎之不已也不止一言而再言之所以明敬之不可不敬以致其丁寧反覆之意也是敬也蓋自帝堯欽明中來帝舜居堯之位體堯之心於凡天下之事天下之民無有不敬謹者矣若夫刑者帝堯所付之民不幸而入其中肢體將於是乎殘性命將於是乎殞於此尤在所當敬謹者焉是以敬而又敬惓惓不已惟刑之憂念耳謂之惟者顓顓乎此而不及乎他切切乎此而無或間也恤字蔡傳無解朱子謂恤不是寛恤然朱子之前孔氏正義已解為憂念可謂得帝舜之心於千載之下也夫漢孝文帝禁網疏濶選釋之為廷尉罪疑者予民是以刑罰太省至於斷獄四百有刑錯措同之風焉臣按文帝用張釋之為廷尉罪疑者予民是以刑罰太省幾至刑措噫文帝用一張釋之而幾致於刑措三代以下稱仁厚之君必歸焉中庸曰為政在人取人以身盖必有禁網疏濶之君然後其臣敢以其罪之疑者而予民故曰有是君則有是臣宣帝地節四年詔曰令甲死者不可生刑者不可息此先帝之所重而吏未稱今繫者或以掠辜若饑寒瘐死獄中何用心逆人道也朕甚痛之其令郡國歲上繫囚以掠笞若瘐死者所坐名縣爵里丞相御史課殿最以聞臣按漢世人君宣帝最為苛急然猶下此詔且謂繫者或以掠辜若饑寒瘐死獄中令郡國歲上繫囚以掠笞者瘐死者所坐名縣爵里以為殿最噫居宫殿之中而思囹圄之苦處清閒之地而念困阨之人人君宅心如是上天豈不祐之哉漢去古不逺所行多仁政然當是時趙葢韓楊之不得其死人皆歸咎于帝之苛急及觀是年及元康四年念耆老之詔則帝之心可知矣有君如此而于定國不能擴充其善心而引之當道豈不可惜哉明帝時楚王英以謀逆死窮治楚獄累年坐徙者甚衆寒朗言其寃帝自幸洛陽獄録囚徒理出千餘人時天旱即大雨馬后亦以為言帝惻然感悟夜起彷徨由是多降宥臣按史言明帝善刑理法令分明日晏坐朝幽枉必達斷獄得情號居前代十二夫人君為治貴于用得其人臣之能即君之能也政不必自已出也明帝善刑理不足貴也然能幽枉必達及聞楚獄之寃夜起彷徨則先王不忍人之仁也是則可貴耳人君茍存明帝夜起彷徨之心以恤刑獄雖不必自善刑理而能委任得人而不為左右之所蒙蔽則幽枉無不達矣章帝元和三年詔曰父不慈子不孝兄不友弟不恭不相及也往者妖言大獄所及廣逺一人犯罪禁至三屬莫得垂纓仕宦王朝如有賢才而没齒無用朕甚憐之非所謂與之更始也請以前妖惡禁錮者一皆蠲除之以明棄咎之路但不得在宿衞而已臣按一人犯罪禁至三屬不得仕宦王朝固非聖世罪人不孥之意宋徽宗時有黨人子孫不許内仕之禁其視章帝此詔有愧矣唐制凡囚已刑無親屬者將作給棺瘞于京城七里外壙有磚銘上掲以榜家人得取以葬臣按此亦唐人仁恕之政太宗親録囚徒縱死罪三百九十人歸家期以明年秋即刑如期皆來乃赦之歐陽修曰信義加於君子而刑戮施于小人刑入于死者乃罪大惡極此又小人之尤者也寧以義死不茍幸生而視死如歸此又君子之尤難者也太宗録大辟囚三百餘人縱使還家約其自歸以就死是以君子之難能責其小人之尤者以必能也其囚及期而自歸者是君子之所難而小人之所易也此豈近于人情哉然則何為而可曰縱而來歸殺之無赦而又縱之而又來則可以知為恩德之致爾此必無之事也若夫縱其來歸而赦之事偶一為之耳若屢為之則殺人皆不死是可為天下之常法乎不可為常者其聖人之法乎是以堯舜三王之治必本於人情不立異以為高不逆情以干譽胡寅曰罪既至死無可赦者此三百九十人者其間寧無殺人償死者乎而赦之何被殺者之不幸而蒙赦者之幸也况既得一年之期必嘗相約以如期而集則可免死太宗恱其信服而忘其刑赦之頗也然不敢違逸而皆至情則可矜矣要之始者縱之過也臣按刑者天討有罪之具人君承天以行刑無罪者固不可刑有罪者亦不敢縱也人君不循天理而以已意操縱乎人亦猶人臣不奉國法而以已意操縱乎囚也可乎哉人臣如此君必誅之無赦臣畏國法必不敢如此人君以已意縱罪人而又以已意舍之獨不畏天乎太宗嘗覽明堂鍼灸圖見人之五臟皆近背失所則其害致死歎曰夫箠者五刑之輕死者人之所重安得犯至輕之刑而或至死乃詔罪人毋得鞭背臣按太宗詔罪人毋鞭背其心仁矣非獨見其有寛刑之仁而實可驗其有愛民之心隨所觸而即感然不徒感之而又能推廣之以致之民也其致刑措而庶幾於三代也宜哉後世稱宋人以仁厚立國然唐既去鞭背刑矣而宋人猶有杖脊之法何也豈太祖太宗不聞唐太宗此言而當時輔弼諫諍之臣亦無以此言進者歟我朝定令凡笞杖人於臀腿受刑之處非此則為酷刑仁恩之及於人人也博矣太宗以大理丞張蘊古奏罪不以實斬之既而大悔詔死罪雖令即決皆三覆奏久之謂羣臣曰死者不可復生近有府史取賕不多朕殺之是思之不審也決囚雖三覆奏而頃刻之間何暇思慮自今宜二日五覆奏決日尚食勿進酒肉諸州死罪三覆奏其日亦蔬食務合禮撤樂減膳之意臣按張蘊古奏請不以實其情有故誤設使其故猶當權其輕重而加以刑况蘊古曾上大寳箴其言切至有益於君身治道斯人而能為斯言猶將十世宥之乃以輕罪而坐重刑太宗雖悔之無益也雖然人君不貴無過而貴能改過太宗能因此以生悔心不徒悔之於已往而又戒之於將來充而廣之以徧於天下後世孟子曰古之人所以大過人者無他善推其所為而已矣太宗有焉太宗時有失入者不加罪太宗問大理卿劉德威曰近日刑網稍密何也對曰此在主上不在羣臣人主好寛則寛好急則急律文失入減三等失出減五等今失入無辜失出更獲大罪是以吏各自免競就深文非有教使之然畏罪故耳儻一斷以律則此風立止矣太宗恱從之自是斷獄平允臣按人主好寛則寛好急則急此就人君言之耳為刑官者執一定之成法因所犯而定其罪豈容視上人寛急而為之輕重哉然中人之性畏罪而求全不能人人執德不囘守法不撓是以為人上者常存寛恤之仁而守祖宗之法毋露其好惡之幾以示人而使之得以觀望也𤣥宗開元十八年刑部奏天下死罪止二十四人胡寅曰以文觀之四海九州之大一歲死罪止二十有四人幾於刑措矣以實論之𤣥宗以奢汰逸樂教有邦則獄訟安得一一伸理曲直安得一一辨白無乃慕刑措之名飾太平之盛有當死而蒙宥者乎官吏之慘舒一視上之好惡君好之則臣為之上行之則下從之故詩云牖民孔易茍欲刑措不用雖囹圄常空可也然訟獄曲直不得其分姦猾逋誅蠧害脫死而平人寃抑者衆矣故善為治者必去華而務實則不為人所罔也開元二十五年大理少卿奏今歲天下斷死刑五十八人大理獄院由來相傳殺氣太盛鳥雀不栖今有雀巢其樹百官以為幾致刑措上表稱賀馬端臨曰是時李林甫方用事崇奬奸邪屏斥忠直御史周子諒以彈牛西客杖死殿廬太子瑛鄂王瑶光王琚以失寵被䜛無罪同日賜死皆是年事也其為濫刑也大矣而方以理院鵲巢為刑措之祥何耶臣按人君之為治貴乎有其實耳名不患其無也名實如形與影有形則影隨之無形而强欲為之影萬無此理也𤣥宗之世刑部為此奏承𤣥宗好名之意欲以欺天下後世耳然而數百年之後馬氏尚為此論則當世之臣民目覩其實者其能欺之乎是盖慕刑措不用之名而為此舉其後李林甫為相又奏野無遺賢皆無其實而欲强為之名者也卒之名不可得而貽譏于天下後世胡氏華實之論萬世人主所當服膺者也憲宗時李吉甫李絳為相吉甫言治天下必任賞罰陛下頻降赦令蠲逋賑饑恩德至矣然典刑未舉中外有懈怠心絳曰今天下雖未大治亦不甚亂乃古平國用中典之時自古欲治之君必先德化至暴亂中國乃專任刑法吉甫之言過矣帝以為然司空于頔亦諷帝用刑嘗謂宰相曰頔懷奸謀欲朕失人心也臣按刑者所以輔政弼教聖人不得已而用之用以輔政之所不行弼教之所不及耳非專恃此以為治也憲宗然李絳之言非于頔之請其知帝王治道之要者歟宋太祖開寶六年有司言自三年至今所貸死罪凡四千一百八人上注意刑辟哀矜無辜嘗讀虞書嘆曰堯舜之時四凶之罪止從投竄何近代憲網之密耶盖有意于刑措也故自開寶以來犯大辟非情理深害者多貸其死云臣按宋太祖讀虞書而知近世憲網之密亦猶唐太宗讀明堂圖而除杖背之刑也人主讀書每每得之於心而見于施行如此則帝王之盛德可以企及唐虞之德化亦可以卒復矣此二君者皆可以為萬世帝王讀書之法太宗在御嘗躬聽斷在京獄有疑者多臨決之每能燭隱㣲嘗親録繫囚至日旰近臣或諫勞苦過甚帝曰儻惠及無告使獄訟平允不致枉撓朕意深以為適何勞之有因謂宰相曰中外臣僚若皆留心政務天下安有不治者古人宰一邑守一郡使飛蝗避境猛虎渡河況能惠養黎庶申理寃滯豈不感召和氣乎朕每自勤不怠此志必無改易或云有司細故帝王不當親決朕意則異乎是若以尊極自居則下情不能自達矣自是祁寒盛暑或雨雪稍愆輒親録繫囚多所原減諸道則遣官按決率以為常後世遵行不廢臣按太宗謂若以尊極自居下情不能自達非但刑獄一事為然也高宗紹興四年詔特㫖處死情法不當者許大理寺奏審臣按人君立法司以斷庶獄人之有罪一斷以祖宗成法無自處死之理王言一出臣下奉承之不暇明知其非而不敢言者多矣髙宗此詔可為世法以上存欽恤之心大學衍義補卷一百十二
