body:
  text: 大學衍義補卷五十六明丘濬撰治國平天下之要秩祭祀郊祀天地之禮上虞書肆類于上帝朱熹曰類是祭天之名與旅上帝同其義不可曉胡宏曰夫聖人名必當物祀上帝而謂之類者本乎天者咸在其中也臣按祀典之載於禮者莫先於舜典也上帝之祭前此未有其名雖易有殷薦上帝之象然象乃孔子所筆也書之所謂類者蓋虞廷史臣之辭在周前千有餘年臣竊意其所謂類者史臣紀舜受命之初其祭告於神也皆類合於上帝不言后土者言天則地在其中猶中庸所謂郊社之禮所以祀上帝而不及后土註謂其省文耳分祀天地之說始見於周禮雖曰必順隂陽因髙下而各從其類以求之庶得其神之来享然天與地對皇天與后土對六經言天必與地俱孔子言郊多與社並天與地並祭猶父與母同牢也豈得為瀆乎况一年之間夏在冬前並祭天地則以為瀆亂龎雜地先天祭豈非越次先食乎虞夏祀帝之禮與其時俱不經見惟周禮祭天則用冬之日至蓋成周以建子之月為正歳也嵗正之首未遑他事首舉上天之祭至於建午之月乃祀地耳是蓋一代之制後世因之可也别以義起亦可也夫類于上帝經有明言舍周而從虞又何不可哉烏可以合祭之禮起於王莽而以為不經夫事茍合義固不當以人廢矧在周之前明有虞書之文所謂類者安知其非當時所稱之祭名哉漢儒解周禮類造之言非解書也夫周有冬至之祭故凡非時之祭謂之依類常祭可也有虞之世所謂常祭者何名其行禮者何時此所謂類者何所謂乎我聖祖初得天下即築壇為南北郊冬至祀天於圜丘夏至祀地於方丘一如周禮之制行之數年風雨不時天多變異乃斷自宸衷復為合祭之禮而以正月行禮凡所謂六宗山川羣神皆各為壇以從祀蓋復有虞之典於四千餘載之後每正嵗之吉天子躬祀天地而以祖宗配享分命羣臣各獻二十四壇行之百年神祗饗答休徴屢應其克享天地之心而徧致明靈之格者非一日矣萬世所當遵守詩序昊天有成命郊祀天地也朱熹曰小序以此詩篇首有昊天二字遂定以為郊祀天地之詩諸儒往往亦襲其誤臣按自古論合祀天地者率以是序為據朱熹深辨其非夫用此一言以解此詩似乎固矣若夫所謂郊祀天地之語則在漢以前已有此說非但始於元始亦可見也周禮大宗伯以禋祀祀昊天上帝鄭𤣥曰國語云精意以享之謂禋程頥曰天與帝一也天言其體帝言其主胡宏曰禮之所貴貴其義也是故主者祭天以柴燎牲使氣上達語其精神則謂之禋語其感格則謂之類指其方兆則謂之郊指事異名其實一也臣按大宗伯掌建邦之天神人鬼地祗三禮吉禮之别十有二所謂禋祀實柴槱燎三者祭天神也血祭貍沈疈辜三者祭地祗也肆獻祼饋食祠禴甞烝六者祭人鬼也然天神之祀有昊天上帝而地祗之祭無有后土是亦猶虞書之類上帝而無后土也歟大司樂凡樂圜鍾為宫黄鍾為角太簇為徴姑洗為羽靁鼔靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫太簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地􅅘祗同皆出可得而禮矣胡宏曰樂六變而天神降樂八變而地􅅘出此豈君子知禮之言類如巫祝造怪之辭也則又以為神降􅅘出然後可得而禮曽不知樂所以導和禮所以為節作樂乃所以行禮禮神也豈待神降􅅘出然後行禮哉吴澂曰此文不惟不經仍自相背戾既曰以六律六同五聲八音六舞大合樂以致鬼神􅅘是祭祀合樂之際六律六同五聲八音六舞並用矣而其下則止用黄鍾大吕雲門祀天止用太簇應鍾咸池祭地如是則六律六同五聲八音六舞各自為用不得謂之大合樂矣凡作樂必律吕聲音一時並舉克諧而不相奪倫然後成樂今既各自為用何自而成樂乎况周家祭祀已行之迹莫詳於詩之頌今攷昊天有成命之詩郊祀天地是天地無分祭之文攷般之詩望祀四嶽河海是四望與山川無異祭之文攷之詩禘祖而其末則曰既右烈考亦右文母是妣與祖亦無各祭之文攷周頌之詩盡是祭祀之詞其言作樂未聞有分樂而序之之說亦未聞用歴代之樂以分祀之禮此甚不足信又曰既言六樂者文之以五聲播之以六音是六樂之作五聲八音並用之矣而其下則禮天神地􅅘人鬼於五聲皆止用其四於八音止用其三使其果如此則聲音不備樂何自而作况攷之於詩有瞽作樂而合乎祖其間用鞉磬柷敔簫管等樂於祭宗廟之際固亦兼用竹革木石之音矣孰謂去此而不用乎既曰凡六樂者一變至六變合六樂而言之至於七變八變九變則餘三變又不與焉况樂所以象徳而六樂之致鬼神􅅘不知何分而象徳耶攷舜之作樂感格之效自近以及逺今乃自逺以及近夫舜樂所以感物者未甞以某樂感某物以某樂感某神帝王作樂之意大概相似何獨成周之樂而不然哉故曰此文不惟不經仍自相背戾不足信也臣按分祭天地之說始見於周禮大司樂他經典所不載也非獨他經典所不載雖周禮亦無之惟大宗伯以玉作六器以蒼璧禮天黄琮禮地及典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望兩處分言天地然不言其地與時其言冬至祀天夏至祀地祀天於圜丘祀地於方丘惟於大司樂見之夫大宗伯之職在掌邦禮禮之大者吉禮也禮莫重於祭祀莫大於天地然於大宗伯所掌之三大禮吉禮十有二之中止言昊天上帝而不及后土地祗乃至於作器之時始言之可見其所行之禮則一而所用以禮神者其器則有兩也况於司服掌王之吉服止有祀昊天上帝則服大裘而冕之文無有所謂后土地祗之服由是觀之合祭天地其神有兩而主祭惟以一人可見矣惟其神之兩故兩其器或以蒼璧或以黄琮或四圭有邸或兩圭有邸惟其祭之一故主祭之人所服之服則一而已然則大司樂之言非歟曰先儒固謂周禮非盡出周公况其所論樂律自相背戾吴澂謂其不經不足信非無徴之言也夫其所論之樂既不足信則所論之禮又烏可深信哉禮記郊特牲郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也於郊故謂之郊牲用騂尚赤也用犢貴誠也陳澔曰冬至日短極而漸舒故云迎長日之至郊祭者報天之大事天之尊無為可祀之以其道不可主之以其事故以日為之主焉天秉陽日者衆陽之宗故就陽位而立郊兆臣按祭義大報天而主日配以月蓋天之為徳至廣至大不可得而見也其所可見者日與月焉故以日為主而又以月配之尊之以次於天以為三辰之主而設王宫夜明二壇於郊壇之側猶王燕飲而主之以大夫王嫁女而主之以諸侯祭社而配以句龍祭稷而配以棄也卜郊受命于祖廟作龜于禰宫尊祖親考之義也卜之日王立于澤親聽誓命受教諌之義也獻命庫門之内戒百官也大廟之命戒百姓也祭之日王皮弁以聽祭報示民嚴上也陳澔曰告於祖廟而行事則如受命于祖此尊祖之義用龜以卜而于禰宫此親考之義其日卜竟有司即以祭事誓戒命令衆執事者而君亦聽受之是受敎諌之義也有司獻王所以命百官之事王乃於庫門之内集百官而戒之又於太廟之内戒其族姓之臣也祭報報白日時蚤晩及牲事之備具也臣按曲禮云大饗不問卜周人郊用冬至則有定日矣而此又云卜郊何歟考古註疏引易說云三王之郊一用夏正夏正建寅之月也鄭氏又謂迎長日之至為迎春分之日漢人去古未逺其言亦或有所據不然則此所謂卜郊者果何卜歟或者以下文有帝牛不吉之言而以為卜牲然此明言卜郊不言牲也况冬日至祭天是日日既至矣無所俟於迎迎者未至而逆之之謂也鄭氏所引易說謂為迎春分之日豈其然哉本朝之制於未祀之前一月欽天監先擇日以聞蓋古卜法不存而擇干支之吉以代卜也既擇有定日歳前十二月朔上躬詣犧牲所視牲此後每日遣大臣一員往視次日早朝復命將祭之前先告太廟遣禮部官檄京都城隍神徧請天下當祀神祗致齊之日上皮弁服登正殿誓戒百官齋之日遣御史㸃視各官於齋次仍行南京一體齋戒蓋與古人卜郊獻命之禮若合符節祭之日喪者不哭不敢凶服汜泛埽反道鄉為田燭弗命而民聽上陳澔曰汜埽洒水而後埽也反道剗道路上之土反之令新者在上也鄉民各於田首設燭照路恐王行事之早也喪者不哭以下諸事皆不待上令而民自聽從蓋嵗以為常也臣按今行大禮有司修理道路沿途明燎火是即古人之制但所謂喪者不哭不敢凶服尚未舉行請如古制祭之日王被袞以象天戴冕璪十有二旒則天數也乗素車貴其質也旂十有二旒龍章而設日月以象天也天垂象聖人則之郊所以明天道也陳祥道曰合周官禮記而考之王之祀天内服大裘外服龍袞龍袞所以襲大裘也又曰夫先王祀天有文以示外心之勤有質以示内心之敬故因丘埽地陶匏槀秸疏布素車之類此因其自然以示内心之敬者也執鎮圭繅藉五采五就旂龍章而設日月四圭有邸八變之音黄鍾大吕之鈞此致其文飾以示外心之勤者也然則内服大裘以因其自然外被龍袞戴冕璪以致其文飾不以内心廢外心不以自然廢文飾然後事天之禮盡矣臣按郊以祀天祀天而必法則其所垂之象使凡吾身之所被服吾身之所乗駕吾禮之所施設文飾莫非天之象焉萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也周諝曰孝經郊祀后稷以配天宗祀文王於明堂以配上帝是祖之所配於圜丘者昊天而考之所配於明堂者上帝此言萬物本乎天人本乎祖而反言配上帝何也天言其體帝言其用故對而言則天與帝異合而言之則帝即天也天即帝也易之象曰先王以作樂崇徳殷薦之上帝以配祖考其言上帝與此同意臣按祭祀之禮皆所以報本反始而郊祀上帝而以祖配此又報本反始之大者祭義郊之祭大報天而主日配以月鄭𤣥曰主日者以其光明天之神可見者莫著焉孔頴達曰自日以下皆祭特言月者以對日耳蓋天獨為一壇天神等共為一壇楊復曰垂象著明莫大乎日月日月之明即天之明也故祭天而主日配以月非必百神悉從祀也月令仲夏大雩帝大雩之後乃命百縣雩祀百辟卿士季秋大饗之後乃使有司甞羣神告備於天子先後輕重固有節文矣以此類推之祀天之後乃祭百神蓋可知也臣按周禮春官註以禋祀實柴槱燎為祀天神之三禮郊之祭大報天即是以禋祀祀昊天上帝而主日配以月則星辰司中司命風伯雨師皆從祀可知矣但其行禮之際則天子躬獻於上帝而所謂日月星辰之類則分官以行獻耳說者謂莫尊於天莫重於郊祀精一以饗猶恐誠意之不至豈容混以百神祀之乎夫混以祀之不可也初獻之後遣官而各祀於其壇則非混矣禮行於郊而天神皆降譬則天子行幸而百官扈從所至之國諸侯躬享天子而命其大夫士以分享其扈從之臣因其爵位之髙下循其序而秩其禮如日則主之而月則以配準此以為則而下之未必非禮意也月令孟春之月天子乃以元日祈穀于上帝春秋左𫝊孟獻子曰夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕公羊𫝊曰郊則曷為必祭稷王者以其祖配楊復曰考之月令之書周頌之詩孟獻子之言則曰祈榖于上帝夫上帝即昊天上帝未聞有感生之說也自鄭註有感生帝之說更漢魏歴晉宋至於齊梁陳數百年之久其說未行至北齊始取其說而行之於是昊天上帝分為兩祀隋唐承用其說至於今而不廢推原所自是誰之過歟然正理在人心萬世不磨邪說終不能熾也臣按古者郊祀凡再行正月之郊為祈榖月令及孟獻子所言是也十一月之郊為報本郊特牲所言是也我朝合為一祀而併於歲首行之禮不煩而可以常行以上通論郊祀之禮周禮以蒼璧禮天以黄琮禮地牲幣放其器之色吴澂曰禮神者始告神時薦於神坐也蒼璧禮天蒼象天之色圜象天之形黄琮禮地黄象地之色其牲幣各倣象其玉之色此言郊祀玉幣牧人凡陽祀用騂牲毛之鄭𤣥曰騂牲赤色毛之取純毛也陽祀謂祭天於南郊及宗廟禮器祭天特牲鄭𤣥曰郊所以用特牲者天神至尊無物可稱故用特牲郊王制祭天地之牛角繭栗如繭如栗犢也陳祥道曰大禮必簡簡則内心而貴誠故祭天地之牛角繭栗郊特牲帝牛不吉以為猶用也稷牛帝牛必在滌三月稷牛惟具陳澔曰郊祀社稷以配天故祭上帝者謂之帝牛祭后稷者謂之稷牛滌者牢中清除之所也二牛皆在滌中若至期卜牲不吉或有死傷即用稷牛為帝牛而别選稷牛也非在滌三月者不可為帝牛稷乃人鬼其牛但得具用足矣以上祀天之牲周禮鬯人掌共秬鬯而飾謂設巾之吴澂曰鬯者釀秬為酒而芬芳條暢也秬如黒黍一桴二米乃天地至和之氣故名之曰鬯而因以名官共秬鬯者直共秬鬯之酒無爵也飾之以布為巾幂而畫黼文也臣按大宗伯云涖玉鬯表記曰秬鬯以事上帝則是祀天地亦有秬鬯特不用鬱酒正凡祭祀以法共五齊三酒以實八尊五齊三酒共八尊也大祭三貳用酒一尊又副以兩尊陳祥道曰凡祭祀天地諸神皆有五齊三酒臣按五齊一曰泛齊成而滓浮泛泛然也二曰醴齊醴體也成而上下一體滓汁相將也三曰盎齊盎翁也成而翁翁然葱白色也四曰醍齊成而紅赤也五曰沈齊成而滓沈也是五齊用之祭祀不致其味致其祭而已三酒一曰事酒酌有事之酒也二曰昔酒久釀而熟也三曰清酒酒之生者也三酒以飲非若齊之致其義也禮記大羮不和犧尊疏布鼏樿杓陳澔曰大羮者太古之羮也肉汁無鹽梅之和後王存古禮故設之亦尚𤣥酒之意犧尊刻為犧牛之形此尊以麤疎之布為覆鼏樿白木之有文理者杓沃盥之具也表記天子親耕粢盛秬鬯以事上帝馬睎孟曰天子之尊非不足於耕也蓋身致其誠信而示其嚴上之禮也以上祀天醴齊粢盛易曰鼎象也以木巽火亨飪也聖人亨以享上帝程頥曰鼎之為器生人所賴至切者也極其用之大聖人亨以享上帝詩大雅曰卬我也盛于豆木器以薦菹醢于豆于豋瓦器以薦大羮其香始升上帝居歆朱熹曰此章言其尊祖配天之祭其香始升而上帝已安而饗之言應之疾也臣按謝枋得謂天地間惟理與氣有此理則有此氣有此氣則有此理鬼神無形與聲惟有理與氣在溟漠之間耳凡祭皆以心感神以氣合神者也黍稷必馨香酒殽必芬芳用椒用桂用蕭用鬱金草皆以香氣求神神以歆饗此氣耳由此言之後世􅅡嶺海之香木以代鬱鬯亦此意其氣之芬馥清逺有非蕭桂鬱金所及者用之以祀神禮所謂以義起此亦其類歟郊特牲器用陶匏瓦器以象天地之性也陳澔曰陶匏物之質者質乃物性之本然也筦簟之安而蒲越音活藁鞂之尚明之也鄭𤣥曰凡常居下筦上簟祭天席蒲越藁鞂之尚也二者皆藉神席也明之者神明之也以上祀天之器以上郊祀天地之禮上大學衍義補卷五十六
