body:
  text: 大學衍義補卷十四明丘濬撰治國平天下之要固邦本制民之産通典曰黄帝時八家為井井開四道而分八宅鑿井於中則井田之原其來逺矣臣按此井田之始堯遭洪水天下分絶使禹平水土别九州冀州土白壤無塊曰壤田中中第五兖州土黑墳色黑而墳起田中下第六青州土白墳土脉墳起也田上下第三徐州土赤埴土黏曰埴墳田上中第二揚州土惟塗泥水泉溼也田下下第九荆州土惟塗泥田下中第八豫州土惟壤下土墳壚疏也田中上第四梁州土青黎黒也田下上第七雍州土黄壤田上上第一九州之地定墾者九百一十萬八千二十頃蔡沈曰夏氏謂周官大司徒辨十有二壤之物而知其種以教稼穡樹藝以土均之法辨五物五地所宜之物九等上中下三等也制天下之地征則夫教民樹藝與因地制貢固不可不先於辨土也臣按人君之治莫先於養民而民之所以得其養者在稼穡樹藝而已稼穡樹藝地土各有所宜故禹平水土别九州必辨其土之質與色以定其田之等第因其宜以興地利制其等以定賦法不責有於無不取多於少無非以為民而已舜典帝曰棄稷之名黎民阻飢汝后稷主穀之官播佈也時百穀穀一作種臣按史記言稷少好耕農民皆法則之堯舉為農師使教民稼穡則棄之為稷堯時已然舜盖以舊官申命之也當是時水土有未平者堯既平之有可耕者矣故命棄播時百穀使民耕墾以為食使不至於阻飢焉先儒謂唐虞之時豈有阻飢之事然尚憂之此所以為唐虞也周禮大宰以九職任萬民一曰三農山澤平地三等之農生種也九穀黍稷稻梁秫菰麻麥豆也二曰園圃樹果蓏曰圃園其樊也毓草木三曰虞衡掌山澤之官作山澤之材作而用之四曰藪無水之地牧有畜之地養畜也蕃盛也鳥獸五曰百工興事造業之工飭化八材勤力以化八者之材珠曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剥羽曰折六曰商行貨賈坐貨阜盛也通貨金玉曰貨賄布帛曰賄七曰嬪有夫者婦有姑者化治絲繭之已繰者枲麻之未緝者八曰臣男之賤者妾女之賤者聚斂謂蓄積之䟽材百草根實可食也九曰閒民無常職八職有常此獨無常轉移執事若今傭雇為工作者程顥曰古者四民各有常職而農者居十八九故衣食易足而民無所困苦後世浮民多矣遊手不可貲度觀其窮促辛苦孤貧疾病變作詐巧以自求生而常不足以生日益嵗滋久将何若事已窮極非聖人能變而通之則何以免患豈可謂無可奈何而已哉此宜酌古變今均多恤寡漸為之業以救之耳葉時曰農者天下之本食者民生之命則不可無三農以生九穀園圃民之所樹藝則不可無園圃以毓草木山澤民之所取材用則不可無虞衡以作山澤之材藪以富得民則不可無藪牧以阜蕃鳥獸工以足材用則不可無百工以飭化八材懋遷有無化居則不可無商賈以阜通貨賄布帛女工之事則不可無嬪婦以化治絲枲䟽材婢僕之職則不可無臣妾以聚斂䟽材自農圃而下民力有所不給則又不可無閒民以轉移執事盖民有常産者有常心先王制民之産授民之職使之有相生相養之具此人心所以不離渙也臣按民生天地間有身則必衣有口則必食有父母妻子則必養既有此身則必有所職之事然後可以具衣食之資而相生相養以為人也是故一人有一人之職一人失其職則一事缺其用非特其人無以為生而他人亦無以相資以為生上之人亦将何所藉以為生民之主哉先王知其然故分其民為九等九等各有所職之事而命大臣因其能而任之是以一世之民不為三農則為園圃不為虞衡則為藪牧否則為百工為商賈為嬪婦為臣妾皆有常職以為之生是故生九穀毓草木三農園圃之職也作山澤之材養鳥獸虞衡藪牧之職也與夫飭化八材阜通貨賄化治絲枲聚斂䟽材豈非百工商賈嬪婦臣妾之職乎是八者皆有一定職任之常惟夫閒民則無常職而於八者之間轉移執事以食其力焉雖若無常職而實亦未嘗無其職也是則凡有生於天地之間者若男若女若大若小若貴若賤若貧若富若内若外無一人而失其職無一物而缺其用無一家而無其産如此則人人有以為生物物足以資生家家互以相生老有養㓜有教存有以為養沒有以為𦵏天下之民莫不愛其生而重其死人不遊手以務外不左道以惑衆不羣聚以刼掠民安則國安矣有天下國家者奉天以勤民其毋使斯民之失其職哉大司徒頒職事于邦國都鄙使以登萬民一曰稼穡二曰樹藝小司徒之職乃經土地而井牧其田野臣按可耕之地為井可畜之地為牧遂人辨其野之土上地中地下地以頒田里上地夫一廛人各受二畝半為宅田百畮各受田百畝以為世業萊五十畮謂田之休不耕者餘夫亦如之正夫之外别給餘夫中地夫一廛田百畮萊百畮餘夫亦如之下地夫一廛田百畮萊二百畮餘夫亦如之臣按民之所以為生産者田宅而已有田有宅斯有生生之具所謂生生之具稼穡樹藝牧畜三者而已三者既具則有衣食之資用度之費仰事俯育之不缺禮節患難之有備由是而給公家之征求應公家之徭役皆有其恒矣禮義於是乎生教化於是乎行風俗於是乎美是以三代盛時皆設官以頒其職事經其土地辨其田里無非為是三者而已後世聽民自為而官未嘗一問及焉能不擾之足矣况為之經制如此其詳哉明主有志於三代之隆者不必泥古以求復井田但能留意於斯民而稍為之制凡有徴求營造不至妨害於斯三者則雖不復古制而已得古人之意矣前漢食貨志聖王量能授事四民陳力受職民受田上田夫百畝中田夫二百畝下田夫三百畝嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自爰其處爰於也更謂三嵗即改與别家佃以均厚薄農民户人已受田其家衆男為餘夫亦以口受田如比比同也每夫孟子言二十五畝士工商家受田五口乃當農夫一人口二十畝此謂平土可以為法者也若山林藪澤原陵淳盡也鹵醎鹵也之地各以肥磽多少為差民年二十受田六十歸田七十以上上所養也十嵗以下上所長也十一以上上所强也臣按此言受田之法大略與周禮大司徒遂人所言相同周禮所載周家一代分田受民之法皆出乎此也孟子告梁惠王曰五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜養也無失其時七十者可以食肉矣百畝之田勿奪其時數口之家可以無飢矣告齊王數口作八口朱熹曰五畝之宅一夫所受二畝半在田二畝半在邑田中不得有木恐妨五穀故於墻下植桑以供蠶事五十始衰非帛不暖未五十者不得衣也時謂孕字之時如孟春犧牲毋用牝之類也七十非肉不飽未七十者不得食也百畝之田亦一夫所受至此則經界正井地均無不受田之家矣此言盡法制品節之詳極財成輔相之道以左右民是王道之成也金履祥曰古者六尺為歩歩百為畝一夫一婦受田百畝又受田廬之地二畝半邑居二畝半田以九百畝為一井八面皆百畝為私田八家受之内一百畝為公田八家同養公田又於公田之内除二十畝為廬舎八家則每家得二畝半也邑居所受亦如之古所謂畝即今田疄其廣六尺其長六百尺是為一畝若以今尺歩計之則古之百畝當今四十一畝古者二畝半當今一畝十歩古以百歩為畝今以二百四十歩為畝臣按此章朱熹謂此制民之産之法而盡法制品節之詳所謂五畝宅百畝田法制也五十衣帛七十食肉品節也有法制而無品節則民為用不足有品節而無法制則民取用無所抑斯言也孟子兩言之一以告梁惠王一以告齊宣王趙岐所謂王政之本常生之道是也盖天立君以為民民有常生之道君能使之不失其常則王政之本於是乎立矣後世人主不知出此而其所施之政往往急於事功詳於法制而於制民之産反略焉是不知其本也後世之治所以往往不古若者豈不以是歟孟子告齊宣王曰無恒産恒産可常生之業也而有恒心者惟士為能若民則無恒産因無恒心茍無恒心放辟邪侈無不為己及陷於罪然後從而刑之是罔民也焉有仁人在位罔民而可為也是故明君制民之産必使仰足以事父母俯足以畜妻子樂嵗終身飽凶年免於死亡然後驅而之善故民之從之也輕此言民有常産而有常心也今也制民之産仰不足以事父母俯不足以畜妻子樂嵗終身苦凶年不免於死亡此惟救死而恐不贍奚暇治禮義哉此言無常産而無常心朱熹曰恒産可常生之業也恒心人所常有之善心也士嘗學問知禮義故雖無常産而有常心民則不能然矣㒺猶羅網欺其不見而取之也臣按三代盛時明君制民之産必有宅以居之所謂五畝之宅是也有田以養之所謂百畝之田是也其田其宅皆上之人制為一定之制授之以為恒久之業使之稼穡樹藝牧畜其中以為仰事俯育之資樂嵗得遂其飽煖之願凶嵗免至於流亡之苦是則先王所以制産之意也自秦漢以來田不井授民之産業上不復制聽其自為而已久已成俗一旦欲驟而革之難矣夫先王之制雖不可復而先王之意則未嘗不可師也誠能惜民之力愛民之財恤民之患體民之心常使其仰事俯育之有餘豐年凶嵗之皆足所謂發政施仁之本夫豈外此而他求哉滕文公使畢戰問井地孟子曰夫仁政必自經界始經界不正井地不均穀禄不平是故暴君汙吏必慢其經界經界既正分田制禄可坐而定也朱熹曰井地即井田也經界謂治地分田經畫其溝塗封植之界也此法不脩則田無定分而豪強得以兼并故井地有不均賦無定法而貪暴得以多取故穀禄有不平此欲行仁政者之所以必從此始而暴君汙吏則必欲慢而廢之也有以正之則分田制禄可不勞而定矣此其大略也若夫潤澤之則在君與子矣朱熹曰井地之法諸侯皆去其籍此特其大略而已潤澤謂因時制宜使合於人情宜於土俗而不失乎先王之意也臣按朱熹所謂因時制宜使合於人情宜於土俗而不失先王之意此數語者非但可以處置井地則凡天下之政施於民者皆當視此為凖秦用商鞅廢井田開阡陌朱熹曰東西為阡南北為陌古者因田之疆畔制其廣狹辨其縱横以通人物之往來即周禮所謂遂上之徑溝上之畛洫上之涂澮上之道也田間為此所以正疆界止侵争時蓄洩備水旱為永久之計商君行茍且之政盡開阡陌悉除禁限所謂開者乃破壊剗削之意而非創置建立之名所謂阡陌乃三代井田之舊而非秦之所置也臣按秦廢井田開阡陌説者皆謂開為開建之開惟朱熹則以為開除之開焉夫自秦用商鞅廢井田開阡陌之後民田不復授之於官隨其所在皆為庶人所擅有貲者可以買有勢者可以占有力者可以墾有田者未必耕而耕者未必有田官取其什一私取其大半世之儒者每嘆世主不能復三代之法以制其民而使豪強坐擅兼并之利其言曰仁政必自經界始貧富不均教養無法雖欲言治皆苟而已世之病難行者未始不以亟奪富人之田為辭然茲法之行説之者衆茍處之有術期以數年不刑一人而可復所病者特上之未行耳嗚呼為此説者可謂正矣其於古今事宜容有未盡焉者臣考井田之制始於九夫之井而井方一里終於四縣之都而都廣一同其地萬井而方百里百里之間為澮者一為洫者百為溝者萬積而至於萬夫其間又有為路者一為道者九為涂者八為畛者千為徑者萬蘇洵謂欲復井田非塞溪壑平澗谷夷丘陵破墳墓壊廬舎徙城郭易疆隴不可為也縱使盡得平原曠野而遂規畫於其中亦當驅天下之人竭天下之糧窮數百年專力於此不治他事而後可葉適亦謂今天下為一國雖有郡縣吏皆總於上率數嵗一代是将使誰為之乎就使為之非少假十數嵗不能定也此十嵗數之内天下将不暇耕乎由是觀之則井田已廢千餘年矣决無可復之理説者雖謂國初人寡之時可以為之然承平日久生齒日繁之後亦終歸於隳廢不若隨時制宜使合於人情宜於土俗而不失先王之意如朱熹所云者斯可矣政不必拘拘於古之遺制也然則張載之言非歟曰載固言處之有術所謂術者必有一種要妙之法其言隠而未發惜哉臣不敢臆為之説也漢武帝時董仲舒説上曰秦改帝王之制除井田民得賣買富者田連阡陌貧者亡立錐之地漢興循而未改古井田法雖難猝行宜少近古限民名田名田占田也各為立限不使富者過制以贍不足塞兼并之路然後可善治也漢孝哀時師丹請建限田下其議孔光何武請吏民名田無過三十頃北魏孝文時李安世上言田業多為豪右所占奪雖桑井難復宜更均量使力業相稱又所争之田宜限年斷事久難明悉歸今主上善其議下詔均天下人田男夫十五以上受露田四十畝不栽樹者謂之露田婦人二十畝奴婢受田三十畝唐授田之制成丁者人一頃其分十畝為口分二十畝為永業二百四十歩為畝田多可以足其人者為寛鄉少者為狹鄉狹鄉授田減寛鄉之半凡徙鄉及貧無以𦵏者得賣世業自狹鄉徙寛鄉者得賣口分已賣者不復受臣按井田既廢之後田不在官而在民是以貧富不均一時識治體者咸慨古法之善而卒無可復之理於是有限田之議均田之制口分世業之法然皆議之而不果行行之而不能乆何也其為法雖各有可取然不免拂人情而不宜於土俗可以暫而不可以常也終莫若聽民自便之為得也必不得已創為之制必也因其已然之俗而立為未然之限不追咎其既往而惟限制其将來庶幾可乎臣請斷以一年為限如自今年正月以前其民家所有之田雖多至百頃官府亦不之問惟自今年正月以後一丁惟許占田一頃餘數不許過五十畆於是以丁配田因而定為差役之法丁多田少者許買足其數丁田相當則不許再買買者沒入之其丁少田多者在吾未立限之前不復追咎自立限以後惟許其鬻賣有増買者併削其所有民家生子将成丁者即許豫買以俟其成以田一頃配人一丁當一夫差役其田多丁少之家以田配丁足數之外以田二頃視人一丁當一夫差役量出雇役之錢富者出財田少丁多之家以丁配田足數之外以人二丁視田一頃當一夫差役量應力役之征貧者出力若乃田多人少之處每丁或餘三五十畝或至一二頃人多田少之處每丁或止四五十畝七八十畝隨其多寡盡其數以分配之此外又因而為仕宦優免之法因官品崇卑量為優免惟不配丁納糧如故其人已死優及子孫以寓世禄之意如京官三品以上免四頃五品以上三頃七品以上二頃九品以上一頃外官則逓減之無田者凖田免丁惟不配丁納糧如故立為一定之限以為一代之制名曰配丁田法既不奪民之所有則有田者惟恐子孫不多而無匿丁不報者矣不惟民有常産而無甚貧甚富之不均而官之差役亦有驗丁驗糧之可據矣行之數十年官有限制富者不復買田興廢無常而富室不無鬻産田直日賤而民産日均雖井田之制不可猝復而兼并之患日以漸銷矣臣愚偶有所見不知可否敢以為獻惟聖明下其議於有司俾究竟以聞漢孝宣地節三年詔曰池籞未御幸者假與貧民郡國公館勿復脩治流民還歸者假公田貸種食孝元初元元年以公田及苑振業貧民江海陂湖園池屬少府者以假貧民勿租賦臣按古者人君多克己以厚民生雖以漢世中主如孝宣孝元者其宫館園池及郡國公田咸假之以振業貧民俾其種食勿收租賦况本民田而肯奪以為己有而又以之賜親暱權倖之臣者哉宋太宗時言者謂江北之民雜植諸穀江南專種秔稻雖土風各有所宜至於參植以防水旱亦古之制於是詔江南兩浙荆湖嶺南福建諸州長吏勸民益種諸穀民乏粟麥黍豆種者於淮北州郡給之江北諸州亦令就水廣種秔稻並免其租真宗以江淮兩浙稍旱即水田不登遣使就福建取占城稻三萬斛分給三路為種擇田髙仰者蒔之盖旱稻也内出種法命轉運使揭榜示民臣按地土髙下燥溼不同而同於生物生物之性雖同而所生之物則有宜不宜焉土性雖有宜不宜人力亦有至不至人力之至亦或可以勝天况地乎宋太宗詔江南之民種諸穀江北之民種秔稻真宗取占城稻種散諸民間是亦大易裁成輔相以左右民之一事今世江南之民皆雜蒔諸穀江北民亦兼種秔稻昔之秔稻惟秋一收今又有早禾焉二帝之功利及民逺矣後之有志於勤民者宜倣宋主此意通行南北俾民兼種諸穀有司考課書其勸相之數其地昔無而今有有成效者加以官賞林勲上政本書曰宜假古井田之制使民一夫占田五十畝其有羡田之家毋得市田其無田與遊惰末作者皆驅之使𨽻農以耕田之羡者而雜紐錢穀以為十一之税陳亮曰勲為此書考古驗今思慮周宻可謂勤矣世之為井田之學者孰有加於勲者乎要必有英雄特起之君用於一變之後成順致利則民不駭而可以善其後臣按勲此書朱熹吕祖謙皆稱許之今考其書百里之縣嵗率米五萬一千斛錢萬二千緡絹四千餘匹綿三千四百觔取民過重恐非後世所宜用者以上田産虞書曰予决九川距至也四海濬深也畎澮距川蔡沈曰九川九州之川也周禮一畆之間廣尺深尺曰畎一同之間廣二尋深二􅌇曰澮畎澮之間有遂有溝有洫皆通田間水道以小注大言畎澮而不及遂溝洫者舉大小以包其餘也先决九川之水使各通于海次濬畎澮之水使各通于川也周禮遂人掌邦之野凡治野夫間有遂一夫所受之田百畆間必有遂十夫有溝十夫千畆之田百夫有洫百夫萬畆之田千夫有澮千夫十萬畆之田萬夫有川萬夫百萬畆之田川所以受遂溝洫澮之水稻人掌稼下地下地水澤之地也以瀦畜水瀦積也積水為陂塘也以防止水増之隄防以溝蕩水引水播蕩以遂均水均布溝水以列舎水列者勝其町畦水可止舎以澮寫水水有餘則㵼之於澮匠人為溝洫廣尺深尺謂之􅎌廣二尺深二尺謂之遂井間廣四尺深四尺謂之溝廣八尺深八尺謂之洫廣二㝷深二􅌇謂之澮尋與􅌇皆八尺專達於川各載其名識所從出也凡天下之地埶兩山之間必有川焉大川之上必有涂焉凡溝必因水勢防必因地勢陳傅良曰遂人言五溝之制而始於遂匠人言五溝之制而始於􅎌􅎌非溝也乃播種之地而已一畝三􅎌一夫三百􅎌􅎌從則遂横遂横則溝從由溝而達洫由洫以達澮其從横亦如之説者又以溝澮為通水而設然溝洫之於田也可决而决則無水溢之患可塞而塞則無旱乾之憂以時决塞則溝洫豈特通水而已哉王昭禹曰溝所以導水不因水勢則其流易壅防所以止水不因地勢則其土易壊故為溝者必因水勢之曲直則其流斯無壅矣為防者必因地勢之髙下則其土斯無壊矣善為溝者水必漱齧之而無所壅以其因水勢故也善為防者水必滛液之而無所决以其因地勢故也臣按古今言水利者周官所謂溝必因水勢防必因地勢二言盡之矣孔子曰卑宫室而盡力乎溝洫朱熹曰溝洫田間水道以正疆界備旱潦者也又曰溝洫之制見於周禮遂人匠人之職詳矣盖禹既平水患又治田間之水使無水旱之災所謂濬畎澮距川是也臣按井田之制雖不可行而溝洫之制則不可廢但不可泥其陳迹必欲一一如古人之制爾今京畿之地地勢平衍率多洿下一有數日之雨即便淹沒不必霖潦之久輙有害稼之苦農夫終嵗勤苦盻盻然而望此麥禾以為一年衣食之計賦役之需垂成而不得者多矣良可憫也北方地經霜雪不甚懼旱惟水潦之是懼十嵗之間旱者什一二而潦恒至六七也為今之計莫若少倣遂人之制每郡以境中河水為主如保定之白溝真定之滹沱之類又隨地勢各為大溝廣一丈以上者以逹于大河又各隨地勢各開小溝廣四五尺以上者以達于大溝大溝地官用錢償其直小溝地所近田主償其直又各隨地勢開細溝廣二三尺以上者委曲以達于小溝其大溝則官府為之小溝則合有田者共為之細溝則人各自為於其田每嵗二月以後官府遣人督其開挑而又時常廵視不使淤塞如此則旬月以上之雨下流盈溢或未必得其消涸若夫旬日之間縱有霖雨亦不能為害矣朝廷於此又遣治水之官䟽通大河使無壅滯又於夾河兩岸築為長隄髙一二丈許如河身二丈兩旁各留二丈許空地以容許則衆溝之水皆有所歸不至溢出而田禾無淹沒之苦生民享收成之利矣是亦王政之一端也惟聖明留意下有司議可否而推行其法於天下魏史起為鄴令引漳水溉鄴民歌之曰鄴有賢令兮為史公决漳水兮灌鄴旁終古舄鹵兮生稻梁秦鄭國開涇水自中山抵瓠口為渠用溉注填閼之水溉舄鹵之地四萬餘頃收皆畝一鍾於是闗中為沃野無凶年名曰鄭國渠李冰為蜀守壅河水作堋穿二江以通舟船因以灌溉諸郡於是蜀沃野千里號為陸海漢召信臣為南陽太守於穰縣南造鉗盧陂用廣灌溉嵗嵗増多至二萬頃人得其利及後漢杜詩為守復脩其業時歌之曰前有召父後有杜母臣按成周以前井田與溝洫之制並行旱乾則有蓄水之所霪潦則有泄水之地當是之時民無水旱之憂而常獲豐登之利非遇大災變不至於捐瘠也自秦以後井田廢而溝洫隨之尚賴有民社之責者因川澤之勢而興灌溉之利非惟農民賴之而為國家之益也亦不小矣世之守令能有興脩水利以為一方無窮之惠者上之人其尚旌異而顯擢之哉宋神宗熈寧元年遣使察農田水利中書又言諸州縣古蹟陂塘異時皆畜水溉田民利數倍近嵗多所湮廢詔諸路監司訪尋州縣可興復水利蘇軾曰今欲鑿空尋訪水利所謂即鹿無虞豈惟徒勞必大煩擾且古陂廢堰多為側近冒耕嵗月既深已同永業茍欲興復必盡追收又有好訟之黨多怨之人妄言某處可作陂渠規壊所怨田産或指人舊物以為官陂冒佃之訟必倍今日臣不知朝廷本無事而何苦欲行此哉臣按水性就下遏之則利於旱嵗遇有霖潦則又或至於淹沒焉是其利害亦略相當也是以善言利者必因其勢順其宜行其所無事使其旱則得有所灌潦則得有所泄兩無害焉斯之為利茍利少而害多或兩無所利害焉甚而委鄰為壑利己損人决不可鑿空生事以煩擾乎民興起訟端以召不靖之怨也以上水利以上論制民之産大學衍義補卷十四
