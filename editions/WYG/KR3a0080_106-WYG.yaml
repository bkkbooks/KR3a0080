body:
  text: 大學衍義補卷一百六明丘濬撰治國平天下之要慎刑憲詳聴斷之法易訟之彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也程頥曰訟之為卦上剛下險險而又健也又為險健相接内險外健皆所以謂訟也若健而不險不生訟也險而不健不能訟也險而又健是以訟也處訟之時雖有孚信亦必難阻窒塞而有惕懼則得中而吉訟非善事不得已也安可終極其事成謂窮盡其事也訟者求辯其是非也辯之當乃中正也故利見大人以所尚者中正也聴者非其人則或不得其中正也中正大人九五是也九五訟元吉象曰訟元吉以中正也程頥曰以中正居尊位治訟者也治訟得其中正所以元吉也元吉大吉而盡善也朱熹曰中則聴不偏正則斷合理楊萬里曰虞芮争田之訟必欲見文王故其訟之理决鼠牙雀角之誠偽必欲見召伯故其訟之理明為聴訟之大人不尚中正可乎毛璞曰使小民無争安用有司使諸侯無争委裘可也然則天下不能無争者勢也所以利見大人者利其主之也又曰九五乃聴訟之主刑獄之官皆足以當之不必專謂人君然人君於訟之大者如刑獄亦豈得不聴攷之王制周官葢可見矣所謂罔攸兼扵庶獄獄事之小不必聴者也臣按刑獄之原皆起扵争訟民生有欲不能無争争則必有訟茍非聴訟者中而聴不偏正而斷合理則以是為非以曲作直者有矣民心是以不平初則相争次則相鬬終則至於相殺而禍亂之作由此始也是以為治者必擇牧民之官典獄之吏非獨以清刑獄之具亦所以遏争鬬之源而防禍亂之生也噬嗑九四噬乾胏肉之帶骨者與胾同得金矢利艱貞吉朱熹曰周禮獄訟入鈞金束矢而後聴之九四以剛居柔得用刑之道故有此象言所噬愈堅而得聴訟之宜也然必利於艱難正固則吉臣按金取其堅矢取其直言訟者必堅必直然後聴之彼其辭理不直而執意不堅者不聴也乾胏亦取其堅言聴訟者亦必剛直而堅固於事之有梗者能决斷而無難然後得聴訟之宜也要必訟者難於訟非不得已不訟也而所訟者必據理直而執辭堅聴者難於聴非得其情不但己也而所聴者皆存心正而守理固如是則得聴訟之宜而用刑之道亦扵是乎得矣康誥曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔茲不於我政人得罪天惟與我民彛大泯亂曰乃其速由文王作罰刑茲無赦不率大戞蔡沈曰大憝即上文之罔弗憝言㓂壤姦宄固為大惡而大可惡矣况不孝不友之人而尤為可惡者當商之季禮義不明人紀廢壊子不敬事其父大傷父心父不能愛子乃疾惡其子是父子相夷也天顯猶孝經所謂天明尊卑顯然之序也弟不念尊卑之序而不能敬其兄兄亦不念父母鞠養之勞而大不友其弟是兄弟相賊也父子兄弟至於如此苟不於我為政之人而得罪焉則天之與我民彛必大冺滅而紊亂矣曰者言如此則汝其速由文王作罰刑此無赦而懲戒之不可緩也戞法也言民之不率教者固可大寘之法矣蘇軾曰商人父子兄弟以相殘虐為俗周公之意葢曰孝友民之天性也不孝不友必有以使之子弟固有罪矣而父兄獨無過乎故曰凡民有自棄於姦宄者此固為元惡大憝矣刑政之所治也至於父子兄弟相與為逆亂則治之當有道不可與㓂攘同法我將誨其子曰汝不服父事豈不大傷父心又誨其父曰此非汝子乎何疾之深也又誨其弟曰長㓜天命也其可不順又誨其兄曰此汝弟也獨不念父母鞠養劬勞之哀乎人非木石禽犢稍假以日月須其善心油然而生未有不為君子也我獨弔閔此人不幸而得罪於三監之世不得罪我政人之手天與我民五常之性而吏不知訓以大冺亂乃迫而蹙之曰乃其速由文王作罰刑茲無赦則民將避罪不暇而父子兄弟益相忿疾至於賊殺而後已雖大戞擊痛傷之民不率也臣按蘇氏此說與蔡傳微異先儒謂其真有補於世教者昔魯有父子訟者孔子寘之狴犴三月俟其悔而出之其意正與此合葢聴父子兄弟之訟不與凡民同當有教化以感動之使自悔悟知其出於天性可也後之聴訟者遇有闗乎倫理之事一以蘇氏斯言為法方其搆訟也則痛以曉譬之於其初及其不従也則緩以感化之於其後則人之善心油然以生世之風俗淳然以厚矣吕刑曰簡核也孚有衆惟貎有稽無簡不聴具俱也嚴天威蔡沈曰簡核情實可信者衆亦惟考察其容貎周禮所謂色聴是也然獄訟以簡核為本茍無情實在所不聴上帝臨汝不敢有毫髪之不盡也夏僎曰簡孚有衆即前師聴五辭五辭簡孚之意而此簡孚之法又當惟貎有稽辭或可偽而貌不可掩不正則眊有媿則泚於此稽之不得遁矣茍無可簡核則疑獄明矣此所以不必聴竟捨之可也詩序行露召伯聴訟也其二章曰誰謂雀無角何以穿我屋誰謂女無家何以速召致也我獄雖速我獄室家不足其三章曰誰謂鼠無牙牡齒何以穿我墉墻誰謂女無家何以速我訟雖速我訟亦不女従朱熹曰南國之人遵召伯之教服文王之化有以革其前日淫亂之俗故女子有能以禮自守而不為彊暴所汚者自述己志作此詩言貞女之自守然猶或見訟而召致於獄因自訴而言人皆謂雀有角故能穿我屋以興人皆謂汝於我嘗有求為室家之禮故能致我於獄然不知汝雖能致我於獄而求為室家之禮初未嘗備如雀雖能穿屋而實未嘗有角也又言汝雖能致我於訟然其求為室家之禮有所不足則我亦終不汝従矣臣按民有血氣之争有利欲之嗜所以不能無訟雖以文王之化召公之教當時之民猶有不曾禮聘而詐為聘女之訟况後世民偽日滋之後乎然當是時也上有文王之聖以為之君下有召公之賢以為之方伯民欲為詐而詐卒不行此易之訟所以尚乎九五中正之大人也後世詞訟之興多起於戸婚田土然成周盛時田有井授故無争者而所争者婚姻耳此葢訟之最小者然天下事何嘗不起於細㣲聖人刪詩所以存之以為世戒周禮小司徒凡民訟以地比正之地訟以圗正之賈公彦曰六鄉之民有争訟之事是非難辨故以地之比隣知其是非者共正斷其訟若民於疆界之上横相侵殺者則以邦國本圗正之葢凡量地以制邑初封量之時即有地圗在於官府於後民有訟者則以本圗正之臣按民生有欲不能無争有争不能無訟人各執已見官或狥己私非有所質證稽考未易以平斷之也是以周官於民之訟則正之以比鄰於地之訟則正之以本圗焉葢民之訟争是非者也地之訟争疆界者也是非必有證佐之人疆界必有圗本之舊以此正之則訟平而民心服矣竊惟今日承平日久生齒日繁地力不足以給人食民間起争興訟非止一端而惟地訟為多葢有一訟累數十年歴十數世而不能决絶者所用之費校其所争之直殆至數倍往往廢業破産甚至聚徒刦奪因而拒捕遂至搆亂者亦或有之此非小故也推原其故皆由疆界不明質約不真之故臣請遇大造之年乞敕户部定為版籍式様其進呈及布政司府縣文冊凡四等各有等第縣冊必須詳悉府次之布政司又次之其進呈者略舉大綱如舊可也所謂縣册除户口外其田地必須明白開具地名畆段四界價直租稅畫於圗本備細填注不許踈略如此則異日争競有所稽考矣又請如國初户部給散民間户由之制毎户給與户由一紙略倣前元砧基遺製將户口人丁田産一一備細開具無遺縣為校勘申府府申布政司用印鈐葢發下民間執照此事雖若煩瑣然十年一度各作於縣使民自為亦不為擾噫官府稽其圗册民庶執其憑由地訟庶其息乎大司冦以兩造禁民訟入束矢於朝然後聴之以兩劑禁民獄入鈞三十斤金三日乃致于朝然後聴之鄭𤣥曰訟謂以財貨相告者造至也使訟者兩至既兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢者取其直也詩曰其直如矢古者一弓百矢束矢其百箇歟獄謂相告以罪名者劑今劵書也使獄者各齎劵書既兩劵書使入鈞金又三日乃治之重刑也不劵書不入金則是亦自服不直者也必入金者取其堅也或問朱熹曰如此則不問曲直例出金矢則實有寃枉者亦懼而不敢訴矣曰此須是大切要事如平常事又别有所在如嘉石之類臣按方言於公者訟也因而守之者獄也葢争而不己必至於訟訟而不己必至於獄方其争訟之初彼此有辨而皆至於公以兩造聴之而無所偏受則不直者自反而民訟自禁矣及其成獄之際彼此各具劵書而質於公以兩劑聴之而無所偏信則不直者自反而民獄自禁矣入束矢然後聴之矢以自明其直而矢之為利直行者也入鈞金然後聴之金以自明其不可變而金之為物則堅剛而不變者也既受三十斤之金又延三日之久取其所甚愛使民因惜物以致思不即聴而待三日使民因遲滯而自省古昔先王不輕受民之訟致民於刑也非特以全民之生亦所以厚民之俗歟小司㓂以五聲聴獄訟求民情一曰辭聴二曰色聴三曰氣聴四曰耳聴五曰目聴鄭𤣥曰辭聴謂觀其出言不直則煩色聴謂觀其顔色不直則赧然氣聴謂觀其氣息不直則喘耳聴謂觀其聴聆不直則惑目聴謂觀其眸子不直則眊然王安石曰聴獄訟求民情以訊鞫作其言因察其視聴氣色以知其情偽故皆謂之聲焉言而色動氣喪視聴失則則其偽可知也然皆以辭為主辭窮而盡得矣故五聲以辭為先色氣耳目次之臣按王氏之言深得聴獄訟求民情偽之要士師之職凡以財獄訟者正之以傅别約劑朱申曰聴稱責以傅别聴買賣以約劑二者皆劵書之名所以正實偽者也臣按凡民之争多起於財財之彼此取予分數多少其初也必有書契期約以相質正故有以財致訟起獄者一以是正之苟無質正及有所欺偽則惟正之以公理㒺有偏私焉民知上之以正實偽者在此則其有所授受取與不敢苟簡於其始則獄訟由之而省矣易曰天與水違行訟君子以作事謀始始之不謀訟所以興也子曰聴訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本朱熹曰猶人不異於人也情實也引夫子之言而言聖人能使無實之人不敢盡其虚誕之辭葢我之明徳既明自然有以畏服民之心志故訟不待聴而自無也金履祥曰聴訟固新民之一事使無訟則新民之至善曾子為世之為政者其於新民但知以聴訟為事而不知其本故引夫子之言葢已徳既明民志自新故又以此謂知本結之言有本者固如是也臣按大易有云理財正辭禁民為非曰義所謂理財則分别各人之所當有者正辭則明正各人之所當言者禁民為非則禁革各人之所不當為者此三者守寳位之義也而治争之大柄在焉夫守位固在乎仁而所以行仁而使之各得其宜者則在乎義反乎義則不仁而刑法之所以必加也刑生於獄獄起於訟訟之所以起者由乎財之不均言之不順為之不當乎理也吾能仁以存心義以制事非所有者不敢取非所言者不敢道非所為者不敢作則感其徳者心孚聞其風者意銷自然有以畏服其心志攝伏其意氣矣訟不待聴而自無也大學此章舊本誤在誠意章下朱子移之於第四章以釋本末臣攷大學經文言物有本末章句謂明徳為本新民為末於第一第二章既釋明明徳新民矣明徳新民即本末也三章釋止至善乃明徳新民之造其極亦即本末也且物有本末與事有終始對乃獨釋本末不釋終始何也臣竊以謂聴訟此章乃治國平天下之要務當以入第十章所見如此未敢以為是姑記于此以俟正焉以上聴獄訟康誥曰要囚服念五六日至于旬時丕蔽斷也要囚蔡沈曰要囚獄辭之要者也服念服膺而念之旬十日時三月為囚求生道也蘇軾曰服念為囚求生道也求之旬時而終無生道乃可殺臣按此即易所謂緩獄也唐太宗謂死者不可復生决囚須三覆奏頃刻之間何暇思慮自今宜五覆奏正得要囚至于旬時之意吕刑王曰兩造具備師衆也聴五辭五辭簡核其實也孚無可疑也正于五刑五刑不簡正質也于五罰贖也五罰不服正于五過誤也五過之疵病也惟官惟反惟内惟貨惟來其罪惟均其審克之五刑之疑有赦五罰之疑有赦其審克之蔡沈曰兩造者兩争者皆至也具備者詞證皆在也五辭麗于五刑之辭也五辭簡核而可信乃質于五刑也不簡者辭與刑參差不應刑之疑者也疑於刑則質於罰也不服者辭與罰又不應也罰之疑者也疑於罰則質於過而宥免之也官威勢也反報徳怨也内女謁也貨賄賂也來干請也惟此五者之病以出入人罪則以人之所犯坐之也審克者察之詳而盡其能也刑疑有赦正于五罰也罰疑有赦正于五過也吕祖謙曰獄辭所及固欲審度而兩造辭證復欲具備葢不當逮者不可擾一人當逮者不可闕一人又曰刑降而為罰罰降而為過然以私而故縦則又非天討也故縦之疵病有此五者臣按先儒謂古者因情而求法故有不可入之刑後世移情而合法故無不可加之罪所謂因情以求法者必備兩造之辭必合衆人之聴必核其實必審其疑刑有疑則正於罰罰有疑則正於過必其有疑者無疑也然後赦之其審克之者如此則人之于入刑者必當其罪而罪不可入者則必得其情矣謂之審者察之盡其心克者治之盡其力此一言者吕刑凡四見焉其丁寜諄復忠厚之意詳慎之心所以警戒於刑官者至矣一時典獄之臣又豈有移情以就法者哉罰懲非死人極于病非佞口才也折獄惟良折獄罔非在中察辭於差非従惟従哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之蔡沈曰罰以懲過雖非致人於死然民重出贖亦甚病矣非口才辯給之人可以折獄惟温良長者視民如傷者能折獄而無不在中也此言聴獄者當擇其人也察辭于差者辭非情實終必有差聴獄之要必於其差而察之非従惟従者察辭不可偏主猶曰不然而然所以審輕重而取中也哀敬折獄者惻怛敬畏以求其情也明啓刑書胥占者言詳明法律而與衆占度也咸庶中正者皆庶㡬其無過忒也於是刑之罰之又當審克之也此言聴獄者當盡其心也臣按先儒謂哀矜勿喜即此哀敬也哀則不忍敬則不忽人君存哀敬以折獄則典獄之官不敢不盡其心人臣存哀敬以典獄則受刑之人不敢不服其罪明清于單辭民之亂罔不中聴獄之兩辭無或私家于獄之兩辭蔡沈曰明清以下敬刑之事也獄辭有單有兩單辭者無證之辭也聴之為尤難明者無一毫之蔽清者無一㸃之汚曰明曰清誠敬䔍至表裏洞徹無少私曲然後能察其情也吕祖謙曰不可用私意而家于獄之兩辭家云者出沒變化於兩辭之中以為嚢槖窟穴者也臣按私家之家如君子不家于喪之家穆王以此訓刑葢欲其於獄訟之單辭者則明清以聴之於獄訟之兩辭者則以中而聴之葢獄辭之初造者必單單者一人之情也一人之情各偏其見各執其是各掩其非俗所謂一面之辭也及夫兩造具備則獄有兩辭矣即其兩者之辭而折之以中道用吾前日清明之心行吾今日中正之道不於獄辭之間有所偏徇而假之以為私家之嚢槖窟穴焉則民之情偽得而國之憲典正矣大司㓂凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之凡庶民之獄訟以邦成弊之鄭𤣥曰邦典六典也以六典待邦國之治邦法八法也以八法待官府之治邦成八成也以八成待萬民之治弊之斷其獄訟也臣按六典八法八成皆太宰所掌者也而定之斷之弊之則在司冦焉葢治邦國以六典諸侯所當守者也有戾於其典者則司冦以刑法定之定之者定其罪也治官府以八法卿大夫所當遵者也有違於其法者則司㓂以刑法斷之斷之者斷其罪也經邦治以八成庶民所當行者也有犯於其成者則司㓂以刑法弊之弊之者弊其罪也訟興於下獄成於上斷罪雖在掌邦禁之司㓂而憲度則本於掌邦治之冢宰焉可見王道備於同民心出治道之禮樂政刑而刑又所以輔禮樂政之所不及斷獄者一以輔治為先則刑行而治道立矣小司冦以五刑聴萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法鄭𤣥曰附猶著也以情理訊之冀其有可以出之者十日乃斷之賈公彦曰以囚所犯罪附于五刑恐有枉濫故用情實問之使得真實臣按此聖人斷獄欽慎之意即大易所謂緩獄康誥所謂服念也既得其罪附於刑矣恐其非心服也又従而用情以訊之又恐迫急而不盡其明也必至旬時之久乃敢斷之既斷之矣又以其所犯之刑書讀之于囚審之而弗變乃用法焉其謹之又謹如此此先王之世天下所以無寃民也歟士師掌官中之政令察獄訟之辭以詔司冦斷獄弊訟致邦令賈公彦曰致邦令者以法報之也丘葵曰官中之政令秋官之屬所行政令也察獄訟之辭者則刑官之屬若鄉士遂士縣士方士各上其獄訟之不决者而致于士師士師因其辭而察之以詔司寇斷其獄弊其訟獄訟既審合于邦令則又以其邦令而致之于鄉士遂士縣士方士上下聫事精察如此此獄之所以得其中也臣按後世州郡獄訟有不能决者申達于憲司憲司審察其情犯稽考質正于律令而定其罪名然後報之于下使處斷焉是即周官此意也朝士凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期内之治聴期外不聴吳澂曰治獄之日皆有限期鄉士旬而職聴于朝遂士二旬縣士三旬方士九旬諸侯之國以一年為期也在期内者皆聴其訟出期之外則不聼之亦息訟之道也臣按凡士者謂鄉士縣士遂士方士訝士也凡士之治獄者皆有其期以地之逺近為之差在期内者則聴而治之出于期之外則不聴也葢民有急遽之患速達則受患不深而證佐易見連逮不多茍迂延嵗月則必有為之委曲掩蔽而負累及人多矣世有不逞之徒往往攟拾人家數十年前之事以興詞訟而司政典獄者不以為非而反因之而入人之罪自喜以為能昧於周官期外不聴之㫖也凡有責音債者有判書以治則聴凡民同貨財者令以國法行之犯令者刑罰之凡屬責者以其地傅而聴其辭鄭𤣥曰判半分而合者謂别劵也同貨財者富人蓄積多時收斂之乏時以國服之法出之雖有騰踊其嬴不得過此以利出者與取者過此則罰之若漢世加貴取息坐贓賈公彦曰財主出責與生利還主則同有貨財者也今以國服之法為之息利犯令者違國法也故刑罰之吳澂曰屬責謂轉責使人而歸之而本主死亡若其親屬貸還貨財則多寡之數或相抵冒必以其地之人相比近而能為證者乃受其辭而治之否則不聴也臣按借債取息三代已前已有之但必有劵書而不可多取息耳雖有死亡茍有證佐亦必追償先王體悉民情為之通有無以相資助使不至扵匱乏固不以為非也近世乃有惡富人冒利者一切禁革民間私債其意本欲抑富强不知貧民無所假貸坐致死亡多矣司刑若司冦斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重鄭𤣥曰詔刑罰者處其所應否如今律家所署法矣賈公彦曰司冦斷律之時司刑則以五刑之法詔刑罰刑罰並言者刑疑則入于罰故也臣按後世於刑部問擬罪囚而以大理寺平允亦此意王制司㓂正刑明辟以聴獄訟必三刺有㫖無簡不聴陸佃曰聴訟若無簡書可書之實狀可據則不聴也陳澔曰有發露之㫖意無簡覈之實迹則難於聴斷矣臣按周禮三刺註謂刺殺也考之韻書刺又訓訊司刺掌三刺之法刺之為義當如刺舉之刺葢與訊同義也若如註言則是周人設官専以殺戮為事方其聴獄之初已懐殺戮之意而豫為此官以待之三代已前恐無此制况所謂三刺之法一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民上以刺言下即言訊尤為可見漢人設官以察舉郡國而謂之刺史葢亦以訊察為言若如註言則謂之殺史可乎成獄辭掌文書者史以獄成告於正士師之屬正聴之正以獄成告于大司冦大司冦聴之棘木外朝之卿位之下大司冦以獄之成告于王王命三公參聴之三公以獄之成告于王王三又當作宥然後制刑陳澔曰成獄辭者謂治獄者責取犯者之言辭已成定也又當作宥周禮一宥曰不識再宥曰過失三宥曰遺亡謂行刑之時天子猶必以此三者免其罪也自上而下咸無異辭而天子猶必以三宥而後有司行刑者在君有愛下之仁在臣有守法之義也方慤曰獄正特刑官之屬而已大司冦特刑官之長而已専以一官之聴猶慮不能無私焉故王又命三公參聴之以合乎公議也三公參聴之而獄之辭又成矣於是以獄成告於王若是以五刑治之可也然以三宥之法原之或在所赦焉故三宥然後制刑也臣按本朝之制凡有刑獄皆掌于法司而平允于理寺理寺具成獄上諸朝及秋後處决乃集文武大臣㑹審于外廷即此制也孟氏使陽膚曾子弟子為士師問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜朱熹曰民散謂情義乖離不相維繫謝良佐曰民之散也以使之無道教之無義故其犯法也非迫於不得已則陷於不知也故得其情則哀矜而勿喜輔廣曰民之犯罪有二迫於不得已則使之無其道故也陷於不自知則教之無其素故也後世治獄之官毎患不得其情苟得其情則喜矣豈知哀矜而勿喜之味哉且人喜則其意逸逸則心放放則哀矜之意不萌其於斷獄剖訟之際必至於過中失正有不自知者惟能反思夫民情之所以然則哀矜之意生而喜心亡矣詳味曾子之言至誠惻怛而體恤周盡如此嗚呼仁哉臣按曾子教陽膚以斷獄理刑之道不言刑罰而以民散為言朱熹釋之曰民散謂情義乖離不相維繫噫為國而使民至於情義乖離而不相維繫則其國之亡也無日矣葢君之於民相須而成所以維繫之以相安者以情相孚而義相結也所以使之至乖違離解而不相維繫者夫豈一日之故㢤葢民之所以聚而尊君親上者以上之人養之教之治之既有其道又有其素故也是以先王之於民既分田授井以養之立學讀法以教之又制為禁令刑罰以治之焉生業既厚禮義復明内有尊君親上之心外遂仰事俯育之願有比閭以聚其族有井邑以聚其人有室家以聚其父子兄弟夫婦親戚歡然有恩以相愛秩然有序以相聚驅之使散不肯也况肯自散㢤後世民之所以易於散者以上無聚之之道故也饑寒迫身則散繇役煩擾則散賦斂重多則散散則無情無情則無義無情無義則健訟之風起而争奪之禍作矣此治獄者得獄之情必加之哀矜而不可喜也哀者悲民之不幸矜者憐民之無知勿喜者勿喜已之有能也嗚呼聖門教人不以聴訟為能而必以使民無訟為至故曾子之於陽膚不以得其情為喜而以失道民散為憂後之有天下國家者其豫思所以保養斯民使其恒有聚處之樂而無至於一旦情義乖離而不相維繫也㢤唐徳宗時李巽以私怨奏竇參交結藩鎮上大怒欲殺參陸贄以為參罪不至死上言參朝廷大臣誅之不可無名昔劉晏之死罪不明白至使衆議為之憤悒叛臣得以為辭參貪縦之罪天下共知至於潜懐異圗事為曖昧若不推鞫遽加重辟駭動不細臣按王者之刑刑一人而千萬人懼刑之可也唐殺劉晏不以其罪天下為之憤悒叛臣藉以稱兵然則人主於刑戮其可輕㢤陸贄言於徳宗曰夫聴訟辨䜛貴於明恕明者在辨之以跡恕者在求之以情跡可責而情可矜聖主懼疑似之陷非辜不之責也情可責而跡可宥聖主懼逆詐之濫無罪不之責也惟情見跡具詞服理窮者然後加刑罰焉是以下無寃人上無繆聴苛惡不作教化以興臣按陸贄此言可以為聴訟斷獄之法而辨䜛謗之法亦具焉人君之聞䜛謗人臣之斷獄訟皆當以是書于座右宋仁宗嘉祐五年判刑部李綖言一嵗之中死刑無慮三千餘夫風俗之薄無甚于骨肉相殘衣食之窮莫急於盗賊今犯法者衆豈刑罰不足以止姦而教化未能導其所善歟願詔刑部類天下所斷大辟嵗上朝廷以助觀省従之臣按天下之治亂驗於風俗之厚薄衣食之有無骨肉相殘者多其風俗之偷也可見盗賊之刦掠者衆其人之窮也可知李綖欲刑部類天下所斷大辟上朝廷以助觀省人主於此誠留心觀省於斯二者之間風俗之偷則明禮義以化之衣食之闕則省徵輸以寛之如此則上和下睦家給人足非特刑罰以之而清而民風亦因之而厚矣孝宗時臣僚上言在律言鞫獄者皆須依所告狀鞫若於本狀之外别求他罪者以故入人罪論比年中外之獄聞於狀外求罪推尋愆咎鞫勘平生旁及他人干連禁繫乞申明法令自今獄事無得於狀外求罪如有違戾重寘於法臣按古人制律不許于狀外求罪唐宋以來皆然以上斷獄以上詳聴斷之法大學衍義補卷一百六
