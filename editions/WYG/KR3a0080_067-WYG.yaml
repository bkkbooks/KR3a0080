body:
  text: 大學衍義補卷六十七明丘濬撰治國平天下之要崇敎化總論敎化之道易臨之大象曰澤上有地臨君子以敎思無窮容保民无疆廣大無疆限也程頤曰物之相臨與含容无若水之在地故澤上有地為臨也君子觀親臨之象則敎思無窮親臨於民則有敎導之意思也无窮至誠无斁也臣按臨之為卦有上臨下之象上之臨下果何所事哉曰保之將欲保之以何為先曰敎之敎之之道驅迫之不可也操切之不可也徒事乎法不可也必刻以期不可也必也匡之直之輔之翼之優而游之使自休之厭而飫之使自趨之如江河之潤如湖海之浸是之謂敎思焉舉一世而甄陶之合萬邦而協和之由无息而至於悠逺由動變而至于能化无一人而不化无一地而不到无一日而或間豈有窮盡也哉如是則凡形氣有生之類皆在吾度量包容之中有相生相長之樂无此疆彼界之殊矣彼徒臨之以威齊之以政者其意思淺且促矣既淺且促則寔不能容之矣豈能保民而至於無疆哉觀之象曰觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設敎而天下服矣程頤曰為觀之道嚴敬如始盥之時則下民至誠瞻仰而從化也不薦謂不使誠意少散也天道至神故曰神道觀天之運行四時無有差忒則見其神妙聖人見天道之神體神道以設敎故天下莫不服也夫天道至神故運行四時化育萬物無有差忒至神之道莫可名言惟聖人黙契體其妙用設為政敎故天下之人涵泳其徳而不知其功鼓舞其化而莫測其用自然仰觀而戴服故曰以神道設敎而天下服矣朱熹曰觀天之神道只是自然運行道理四時自然不忒聖人神道亦是說有敎人自然觀感處臣按聖人觀天之神道以設敎謂如天之春而夏而秋而冬當煖而煖當寒而寒無一時之差忒不見其有所作為自然而然所謂神也聖人體之以設為政敎故下人觀之如見春而知其必煖見冬而知其必寒其煖其寒皆其所自然下民觀視而感之於心不待有所設施措注自然化服所謂以神道設敎也如此非謂别有一種𤣥妙幻化之術也後世俗儒不知此義乃以河圖洛書為神道設敎謂聖人畫卦演疇皆以人力為之而假託神明以為幻化之術遂啓時君矯誣妄誕之端吁經㫖一言之差流禍至於如此可不戒哉可不戒哉象曰風行地上觀先王以省方觀民設敎程頤曰風行地上周及萬物為由歴周覽之象故先王體之為省方之禮以觀民俗而設政敎也天子巡省四方觀視民俗設為政敎如奢則約之以儉儉則示之以禮是也朱熹曰省方以觀民設敎以為觀臣按劉彞謂觀民設敎如齊之末業而敎以農桑衛之淫風而敎以禮别奢如曹則示之以儉儉如魏則示之以禮之類是也蓋四方之俗不同而各有所偏尚因其所偏約而歸之于正則四方之俗皆得其中而無過不及矣此三代盛王所以必省方而觀民觀民而設敎也歟後世巡守之禮不行采詩之官不設朝廷施之以一切之政不復因其民而觀之吁物之不齊物之情也俗之不一俗之習也約其所太過勉其所不及使之一歸於禮而不偏聖人所以觀民之俗而設敎也如此後世則一聴民俗之所為而不復觀之矣賁之彖曰觀乎天文以察時變觀乎人文以化成天下程頤曰天文天之理也人文人之道也天文謂日月星辰之錯列寒暑隂陽之代變觀其運行以察四時之遷改也人文人理之倫序觀人文以敎化天下天下成其禮俗乃聖人用賁之道也吳澂曰文明者文采著明在人五典之叙五禮之秩粲然有文而各安其所止故曰人文也時變謂四時寒暑代謝之變化謂舊者化新成謂久而成俗臣按天有天之文人有人之文人君上察天文以審察天時之變下觀人文以化成天下之俗是故天有日月也有星辰也有四時也有六氣也其形象之昭然其氣運之錯然皆有文而可觀也日月有朔朢星辰有次舍四時有運行六氣有流布吾於是乎審察之體其不息者以自彊因其失次者以自儆隨其時而授之以耕作之候順其氣而敎之以豫備之方此無他察於天而省於己也人有三綱也有六紀也有禮節也有法度也其彞倫之秩然其典則之粲然皆有文而可觀也三綱在所當正六紀在所當脩禮節不可失法度不可斁吾於是乎化導之因其自然者加之品節順其當然者為之導達引其性而納之道義之中矯其偏而歸之中正之域此無他化其人而成其俗也噫大易人文化成天下一語誠自古帝王繼天立極之大綱大本也化之以人文而使天下成其俗唐虞雍熙泰和之治不外是矣離之彖曰重明以麗乎正乃化成天下程頤曰上下皆離重明也五二皆處中正麗乎正也君臣上下皆有明徳而處中正可以化天下成文明之俗也丘富國曰上下皆離故曰重明君臣上下重明而其麗乎正則可以成天下文明之化矣臣按賁之觀乎人文以化成天下人君觀之以一己之獨也離之重明麗正以化成天下人君資之以臣下之同也是故人君欲以人文而成天下之化又在乎君臣相得皆存虚靈不昧之天而處乎中正不偏之地同心同徳相附離以相成也吁有是君而無是臣有是臣而君不能用用之而其臣不足以負荷而欲成天下文明之化難矣哉書舜典帝曰契百姓不親相親睦也五品不遜順也汝作司徒掌敎之官敬敷布也五敎在寛朱熹曰五品父子君臣夫婦長㓜朋友五者之名位等級也五敎父子有親君臣有義夫婦有别長㓜有序朋友有信以五者當然之理而為敎令也敬敬其事也聖賢之於事雖無所不敬而此又事之大者故特以敬言之寛裕以待之也蓋五者之理出于人心之本然非有强而後能者自其拘于氣質之偏溺于物欲之蔽始有昩于其理而不相親愛不相遜順者於是申命契仍為司徒使之敬以敷敎而又寛裕以待之使之優游浸漬以漸而入則其天性之真自然呈露不能自已而無無恥之患矣臣按此萬世帝王為敎之始然所以為敎者不過人倫而已人倫之道人莫不有而不能皆有以盡之所以立其敎者君也敷其敎者臣也是五倫之道非獨民有之而君與臣亦皆有焉必在上者無一之不備然後敷而敎之使天下之人無一之不全然其所以立敎之本則在乎敬以寛焉敬以持乎巳則整齊嚴肅而不失於怠忽寛以施於人則從容漸次而不失於迫切先儒謂此二字千萬世掌敎者不能易也後世人君惟急于財賦兵刑之事其于敎也特慕其名而應故事耳所謂寛者往往流於縱弛求其能留心於此事者固已鮮矣况敬乎敬者聖學所以成始而成終者也未有不能敬以處已而能敬以敎人者是則立敎之君敷敎之臣皆當以敬為主武成曰重民五敎惟食喪祭蔡沈曰五敎君臣父子夫婦兄弟朋友五典之敎也食以養生喪以送死祭以追遠五敎三事所以立人紀而厚風俗聖人之所以甚重焉者陳櫟曰所重敎食喪祭四者證以堯曰可見重五敎而次以食則斯民日用飲食徧為爾徳否則君不君臣不臣雖有粟吾得而食諸食足矣即繼以慎終之喪報本之祭皆所以感發斯民之良心而維持天下之敎化也臣按舜命契之敎其民曰敬敷五敎武王之功成治定亦惟重民之五敎焉可見聖帝明王之治必本于敎而敎之所以為敎皆不外乎五倫而已洛誥曰聴朕敎汝于棐民彞汝乃是不蘉乃時惟不永哉篤叙乃正父罔不若予不敢廢乃命汝往敬哉朱熹曰周公戒成王使聴我敎汝以輔民常性之道若汝不勉則不能永保天命也然則所以輔民常性者惟在乎勉而已篤叙汝武王之所行無不如予之所以厚叙者蔡沈曰此敎養萬民之道也聴我敎汝所以輔民常性之道汝於是而不勉焉則民彞泯亂非所以長乆之道矣正父武王也猶今稱先正云者篤者篤厚而不忘叙者先後之不紊言篤叙武王之道無不如我則人不敢廢命矣臣按武成曰重民五敎則武王輔民常性之道在此也武王得天下既以是為自勉使彞倫攸叙而益厚所以為子孫祈天永命之本成王誠能聴周公之敎勉乎乃考重民五敎之道以輔翼乎民篤之而不忘叙之而不紊亦如我之所以篤叙武王者然則人不敢廢乃命矣大抵人君為治敎道之廢興係天命之去留敎道興則天理明而民彞叙民知尊君親上而不生背畔之心不然則智者欲欺愚强者欲陵弱令之而不從治之而不服而至于用刑罰動干戈而國祚不能以久長矣創業之君惟知其然故拳拳以敎化為先而繼體者誠能勉焉以篤叙前人之道而敬行之非獨以厚民彞蓋將以永天命也是則敬之之言在昔帝舜以是而勉契是君勉臣也今周公以是而勉成王是臣勉君也大哉敬乎其萬世君臣立敎之本乎周官曰司徒掌邦敎敷五典擾兆民蔡沈曰地官卿主國敎化敷君臣父子夫婦長㓜朋友五者之敎以馴擾兆民之不順者而使之順也唐虞司徒之官固已職掌如此吕祖謙曰擾者馴習而熟之拊摩而入之畜養而寛之之謂臣按五典乃人人所有家家所備者人君因而申明其義也虞周命掌敎之官皆以敷五典為言敷之為言布也要必因其本然之理而著為當然之則敷而布之天下使之是效是行以調攝其不平之氣馴伏其不順之心不責效于旦暮之間不從事乎督責之令成周之擾即有虞之寛可見敎道之施千古如一日百聖同一心也君牙曰𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中蔡沈曰𢎞敷者大而布之也式和者敬而和之也則有物有則之則君臣之義父子之仁夫婦之别長㓜之序朋友之信是也典以設敎言故曰𢎞敷則以民彞言故曰式和此司徒之敎也然敎之本則在君牙之身正也中也民則之體而人之所同然也正以身言欲其所處無邪行也中以心言欲其所存無邪思也臣按為敎之道不過即人身心之所有者而訓誨引導之云耳然是道也非獨人有之而我亦有之有之未必皆中正也然必在我者無不正無不中然後推吾所以中所以正者以倡率乎人人使人人皆中皆正焉不然源濁而欲流之清形枉而欲影之直豈有是理哉周禮乃立地官司徒使帥其屬而掌邦敎以佐王安擾邦國吳澂曰舜命契以五品不遜汝作司徒敬敷五敎在寛敬敷以寛則優游巽順而其敎易成也夫是之謂民極六官皆言為民極而司徒之敎實主安擾萬國無非和順於道徳則五品遜者宜哉臣按周官立天官掌邦治地官掌邦敎蓋以上天下地而人處乎中人之所以為人者理與氣而已氣以成形無以治之則不能安其生理以成性無以敎之則不能明其道是以設官分職以為民極而以治民之職歸之天敎民之職歸之地以見人君治敎皆出于天地所以設為之官者雖曰為民立極而實所以代天化地施也大司徒因此五物者民之常而施十有二敎焉一曰以祀禮敎敬則民不茍二曰以陽禮敎讓則民不争三曰以隂禮敎親則民不怨四曰以樂禮敎和則民不乖五曰以儀辨等則民不越六曰以俗敎安則民不偷七曰以刑敎中則民不虣暴八曰以誓敎恤則民不怠九曰以度敎節則民知足十曰以世事敎能則民不失職十有一曰以賢制爵則民慎徳十有二曰以庸制祿則民興功吳澂曰唐虞司徒所敷者五敎而周司徒施十二敎五敎舉其綱十二敎則詳其目五敎在於端其本十二敎則兼舉其末其敎敬讓親和辨等是徳禮之屬也敎安中恤節能與制爵制祿是政刑之屬也祀禮者祭祀之禮追養致孝示民以敬所以不茍且陽禮者飲射之禮敬老齒讓導民以順所以不鬬争隂禮者婚姻之禮男女合好至親所在所以不怨曠樂禮者燕饗作樂之禮尊卑齒位至和所在所以不乖離以儀辨等者有君臣上下之儀有父子長㓜之儀隆殺有等而民志自定所以不踰越以俗敎安者有宫室墳墓衣服之俗有兄弟師儒朋友之俗安於本俗人倫自厚所以不偷薄以刑敎中者如鄉之八刑以弼敎而歸於中所以不暴亂以誓敎恤者如軍旅之誓使之憂患相救而恤其事所以不怠惰以度敎節者冠婚喪祭之度各有等殺以節其欲所以自知止足以世事敎能者士農工賈世傳厥習以精其能所以不失職十者皆謂之敎敎之常也而聖人不徒敎也以賢制爵則不賢者莫不謹於徳以庸制祿則無功者莫不興於功是二者聖人奔走天下之權而人心之激勸所係故不言敎而列於後臣按聖人之所謂敎者不但敷五典而已而凡禮樂刑政之施儀則等威之制爵祿誓戒之事世業士俗之常莫不有敎存焉一事之行而有一敎之寓此三代盛時邦國都鄙比閭族黨之間禁令之所施行耳目之所漸染日用之所見聞何者而非軌民之法則囿民之敎條哉後世之所謂敎者止有敎之名無復敎之實况又有非所敎而敎者哉以五禮吉凶軍賔嘉防萬民之偽而敎之中以六樂雲門咸池大韶犬夏大濩大武防萬民之情而敎之和臣按天子建中和之極以為禮樂所以防民之情偽而敎之中和使行皆中正而心無乖戾也正月之吉始和布敎于邦國都鄙乃縣平聲敎象之法于象魏雉門兩觀使萬民觀敎象浹日一旬為浹而斂之乃施敎法于邦國都鄙使之各以敎其所治民朱申曰建子之月朔日始調和十二敎以下之事而頒布此敎職文書于邦國都鄙以地官之敎法畫之為象而懸于兩觀使萬民觀敎法而儀則之浹一旬乃收斂使遠近皆知之乃施敎民之法于外之邦國内之都鄙使邦國諸侯敎邦國之民都鄙大夫敎都鄙之民嵗終則令敎官正治而致事正嵗令于敎官曰各共爾職修乃事以聴王命其有不正則國有常刑賈公彦曰周禮凡言正嵗者夏建寅之月也直言正月者周建子之月也吳澂曰正治脩其文書致事上其計簿小司徒之職掌建邦之敎法凡用衆庶則掌其政敎與其戒禁朱申曰政以正之敎以導之戒以飭其怠忽禁以使之勿為臣按先王布敎于民非一日也然猶必每嵗之首調和之恐其所行者或有所乖戾也頒布之恐其所施者或有所沮格也既頒之以文書復懸之於象魏則凡有目者所共覩有耳者所共聞不至於消沮閉藏矣至於嵗終又俾脩其文書上其計簿使有所稽考焉噫聖人之治以敎為先而所以頒布其敎者一嵗之間凡三致意委曲詳細丁寧諄切如此此其敎化所以大行日新而無窮也歟禮記王制曰司徒脩六禮以節民性明七敎以興民徳齊八政以防淫一道徳以同俗養耆老以致孝恤孤獨以逮及也不足上賢以崇徳簡差擇不肖以絀惡吳澂曰此言司徒之所以敎即舜之命契者也人之性稟或殊使民由於禮則過者不得過不及者不得不及所謂節之也人倫之徳民所同得使之能知其敎則莫不感發奮起而興於善所謂興之也為人欲所溺之謂淫八政有所禁戒如防之隄水所謂防之也道徳一則俗之習尚不各道其所道以為道不各徳其所徳以為徳所謂同之也耆老所當孝養上之人養其老則民皆知致其孝矣孤獨有所不足者上之人恤孤獨則民皆知逮其不足矣六禮冠婚喪祭鄉相見七敎父子兄弟夫婦君臣長㓜朋友賔客八政飲食衣服事為異别度量數制方慤曰冠婚嘉禮也喪凶禮也祭吉禮也鄉飲酒士相見賔禮也陳澔曰六禮七敎八政皆司徒所掌禮節民性敎興民徳脩則不壊明則不渝然非齊八政以防淫則亦禮敎之害也事為者百工之技藝有正有邪異别者五方之器械有同有異度量則不使有長短小大之殊數制則不使有多寡廣狹之異若夫飲食衣服尤民生日用之不可闕者所以居八政之首齊之則不使有僭儗詭異之端矣臣按舜典與周官皆云五敎而此又云七敎其敎之目比書所載加二焉所謂五敎者父子君臣夫婦長㓜朋友而此加之以兄弟賔客為七所謂長㓜者即兄弟之謂也今分而為二則是兄弟者天合而有先後者也長㓜者人合而有先後者也朋友親相與者也賔客泛相遇者也然五敎之在書則謂之敷敷布之也七敎之在禮則謂之明明昭之也而皆在司徒之所掌敷者頒之於天下明者講之於學校也廣谷大川異制民生其間者異俗剛柔輕重遲速異齊去聲五味異和器械異制衣服異宜脩其敎不易其俗齊其政不易其宜吳澂曰敎即七敎是也脩謂其敎皆明無所廢闕政即八政是也齊謂其政並舉無所參差以廣谷大川而言則地産有異而其習尚之所安各異其俗故雖導之以敎然亦不改易其所安之俗使之各得以安其所安也以剛柔輕重遲速而言則天稟有異而其身口之所便各異其宜故雖正之以政然亦不改易其所便之宜使之各得以宜其所宜也臣按民稟天地之性以生無不同也然其所居之地水陸川谷之土俗各異所稟之氣剛柔遲速之劑量各殊先王脩其敎齊其政固欲復其天地本然之性而歸之同也然土俗處處别氣稟人人殊則有未易變易然者茍不至於反常而逆理則亦不强之使同焉大學曰所謂治國必先齊其家者其家不可敎而能敎人者無之故君子不出家而成敎於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不遠矣未有學養子而后嫁者也一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨覆敗也事一人定國堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸己而后求諸人無諸己而后非諸人所藏乎身不恕而能喻曉也諸人者未之有也朱熹曰身脩則家可敎矣孝弟慈所以脩身而敎於家者也然而國之所以事君事長使衆之道不外乎此此所以家齊於上而敎成於下也康誥周書引書而釋之又明立敎之本不假强為在識其端而推廣之耳一人謂君也機發動所由也此言敎成於國之效又承上文一人定國而言有善於己然後可以責人之善無惡於己然後可以正人之惡皆推己以及人所謂恕也不如是則所令反其所好而民不從矣臣按大學脩身以上皆是學之事齊家治國方是敎之事一家之中有父母有兄長有子孫僕𨽻我於其間為子則孝為弟則弟為家長則慈曰孝曰弟曰慈既有諸己則是能脩身而敎於家矣由是一家之中人人皆孝皆弟皆慈而無一人不可敎者由是即所以立於身行於家者而敎於人孝以為忠弟以為順慈以為愛人之仁夫如是則仁讓之善積於一家而仁讓之化形於一國所謂不出家而敎成於國也茍或貪而不讓戾而不仁惡念生於一人則一國便有作亂之事所謂其家不可敎而能敎人者無之也雖然為善則難為惡則易而其善惡難易之機由於君之一身而機者何弩之牙也矢之發動由乎弩機一發動焉則勢有不可遏者以身示敎者可不謹其機乎所謂機者在於君身則其心之意也心之發動是之為意人君欲廣其敎於天下不假强為在識其善念端倪之初處動其機以發之從此推廣去耳嗟乎一念之善與惡乃堯舜桀紂之所以分堯舜之君而有唐虞治世之民其身既脩其家可敎有諸己而求諸人其所令之善即其所好者也桀紂之君而有夏商末世之民其身不脩其家不可敎而無諸己而求諸人其所令非不善而非所好者也子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰敎之朱熹曰庶而不富則民生不遂故制田里薄賦斂以富之富而不敎則近於禽獸故必立學校明禮義以敎之胡寅曰天生斯民立之司牧而寄以三事然自三代之後能舉此職者百無一二漢之文明唐之太宗亦云庶且富矣西京之敎無聞焉明帝尊師重傅臨雍拜老宗戚子弟莫不受學唐太宗大召名儒増廣生員敎亦至矣然而未知所以敎也三代之敎天子公卿躬行於上言行政事皆可師法彼二君者其能然乎臣按曰庶曰富曰敎三者自堯舜以來為治之大節目大綱領也蓋天生斯民而立一人以為之司牧付之以庶富敎之三事人君承上天之付托為萬民之父母必當盡治敎養之三事養之以至於繁庶治之以至於富足敎之以至於仁厚則盡乎父母斯民之責而無負乎上天付托之重矣茍為不然而惟知以天下而奉巳適乎己而不恤乎人生齒日至於衰耗田里日至於貧窘民俗日至於靡蕩如是非但民不安其生而君亦不能安其位矣就三者之中論之庶富者君之事也敎者師之事也三代以來盡君道者間或有之兼盡師之道者蓋亦鮮矣孟子曰人之有道也飽食煖衣逸居而無敎則近於禽獸聖人有憂之使契為司徒敎以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信放勲曰勞之來之匡之直之輔之翼之使自得之又從而振徳之朱熹曰人之有道言其皆有秉彞之性也然無敎則亦放逸怠惰而失之故聖人設官而敎以人倫亦因其固有者而道之耳書曰天叙五典勅我五典五惇哉此之謂也放勲本史臣贊堯之辭孟子因以為堯號也徳猶惠也堯言勞者勞之來者來之邪者正之枉者直之輔以立之翼以行之使自得其性矣又從而提撕警覺以加惠焉不使其放逸怠惰而或失之蓋命契之辭也臣按人之所以異於禽獸者以其有秉彞之性也有其性而或以氣稟之偏或為物欲之蔽遂去禽獸也幾希聖人先得秉彞之全者也視吾人有秉彞之性而不能全乃至去禽獸也不遠誰之責歟吾為人之君而不能盡君人之責使人不遠於禽獸則凡吾所治者皆獝狘之物也吾何以為治哉非徒負斯人之仰戴而實負上天之付托也寧能不憂於心乎憂之而脩為之敎命臣以掌其事立法以為之制必使蚩蚩蠢蠢之民皆率其秉彞之性然後吾之責塞而吾之憂釋矣後世人主知憂此者蓋鮮矣憂之一言唐虞聖帝所以戰兢惕厲而致雍熙泰和之治其本在此歟漢書食貨志曰五家為隣五隣為里四里為族五族為黨五黨為州五州為鄉鄉萬二千五百户也隣長位下士自此以上稍登一級至鄉而為卿也於里有序而鄉有庠序以明敎庠則行禮而視讀為示化焉春令民畢出在壄冬則畢入於邑所以順隂陽備冦賊習禮文也春將出民里胥平旦坐於右塾隣長坐於左塾畢出然後歸夕亦如之入者必持薪樵輕重相分斑白不提挈冬民既入婦人同巷相從夜績女工一月得四十五日必相從者所以省費燎火同巧拙而合習俗也男女有不得其所者因相與歌詠各言其傷怨刺之詩是月餘者亦在于序室八嵗入小學十五入大學此先王制土處民富而敎之之大略也臣按成周盛時其富而敎之其規條之詳如此當是之時男有敎女有業而無外慕出位之思非禮犯分之為此乖争陵犯之風所以不作也漢賈誼言于文帝曰凡人之智能見已然不能見將然夫禮者禁於將然之前而法者禁於己然之後是敌法之所用易見而禮之所為至難知也禮云禮云者貴絶惡於未萌而起敎於微𦕈使民日遷善遠辠而不自知也臣按為治大要二禮與法也禮也者敎化之所從出者也誼所謂絶惡於未萌起敎於微𦕈使民日遷善遠罪而不自知者是則禮之所以禁於將然者也法之為法禁於已然者則反是禁於將然則不肅而成不嚴而治而天下咸囿於孝弟忠信禮義亷恥之中矣董仲舒曰夫萬民之從利也如水之走下不以敎化隄防之不能止也是故敎化立而姦邪皆止者其隄防完也敎化廢而姦邪並出刑罰不能勝者其隄防壊也古之王者明於此是故南面而治天下莫不以敎化為大務立大學以敎於國設庠序以化於邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者敎化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復脩敎化而崇起之敎化已明習俗已成子孫循之行五六百嵗尚未敗也臣按董子所謂漸民以仁摩民以誼節民以禮是三言者是誠自古帝王脩敎立化之本也所謂治天下之大務生民習之以為風俗子孫循之以為治道雖百世可也豈但行之五六百嵗而不敗哉以上總論敎化之道大學衍義補卷六十七
