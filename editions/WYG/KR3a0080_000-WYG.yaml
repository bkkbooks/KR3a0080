body:
  text: 大學衍義補儒家類提要臣等謹案大學衍義補一百六十卷明邱濬撰濬有家禮儀節已著録濬以宋真徳秀大學衍義止於格致誠正修齊而闕治國平天下之事焉雖所著讀書一記採録史事稱為此書之下編然多録名臣事迹無與政典又草創未完乃採經傳子史輯成是書附以己見分為十有二目于孝宗初奏上之有詔嘉奬命録副本付書坊刋行濬又自言衍義補所載皆可見之行事請摘其要者下内閣議行帝亦報可至神宗復合梓行親為製序葢皆甚重其書也然濬聞見雖富議論乃不能甚醇故王鏊震澤紀聞稱其學該洽尤熟于國家掌故議論髙竒務于矯俗能以辨博濟其說如譏范仲淹多事秦檜有再造功評隲皆乖正理又力主舉行海運平時屢以為言此書更力申其說所列從前海運抵京之數謂省内河挽運之資即可抵洋面漂亡之粟似乎言之成理然一舟覆沒舟人不下百餘糧可抵以轉輸之費人命以何為抵乎其後萬恭著議謂為有大害而無微利至以好事斥之非苛論也又明之中葉正閹竪恣肆之時濬既欲陳誨納忠則此條尤屬書中要㫖乃獨無一語及宦寺張志淳南園漫録詆其有所避而不書殆亦深窺其隠以視真氏原書殊未免瑕瑜互見然治平之道其理雖具於修齊其事則各有制置此猶土可生禾禾可生榖榖可為米米可為飯本屬相因然土不耕則禾不長禾不穫則榖不登榖不舂則米不成米不炊則飯不熟不能遞溯其本謂土可為飯也真氏原本實屬闕遺濬博綜旁搜以補所未備兼資體用實足以羽翼而行且濬學本淹通又習知舊典故所條列原原本本貫串古今亦復具有根柢其人雖不足重其書要不為無用也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀大學衍義補原序朕惟帝王之學有體有用自仲尼作大學一經曾子分釋其義以為十𫝊其綱明徳新民止至善其目格致誠正修齊治平闡堯舜禹湯文武之正𫝊立萬世帝王天徳王道之標凖宋儒真徳秀因為大學衍義掇取經傳子史之言以實之顧所衍者止於格致誠正修齊而治平猶闕逮我孝宗敬皇帝時大學士丘濬乃繼續引伸廣取未備為大學衍義補揭治國平天下新民之要以收明徳之功采古今嘉言善行之遺以發經𫝊之指而後體用具備成真氏之完書為孔曾之羽異有功於大學不淺是以孝廟嘉其考據精詳論述該博有補政治特命刋而播之朕踐祚㠯來稽古正學經史諸書博涉殆徧因念真氏衍義我聖祖大書于廡壁累朝列聖置之經筵肅宗聴講之餘賦翊學詩以紀之朕爰命儒臣日以進講更數寒暑至于終篇然欲因體究用而此書尤補衍義之闕朕將紬繹玩味見諸施行上遡祖宗聖學之淵源且欲俾天下家喻户曉用臻治平昭示朕明徳新民圖治之意爰命重梓以廣其𫝊而為之叙如此云萬厯三十三年十二月二十一日御製臣惟大學一書儒者全體大用之學也原於一人之心該夫萬事之理而關係乎億兆人民之生其本在乎身也其則在乎家也其功用極於天下之大也聖人立之以為教人君本之以為治士子業之以為學而用以輔君是葢六經之總要萬世之大典二帝三王以來𫝊心經世之遺法也孔子承帝王之𫝊以開百世儒教之宗其所以立教垂世之道為文二百有五言凡夫上下古今百千萬年所以為學為教為治之道皆不外乎是曾子親受其教既總述其言又分釋其義以為大學一篇漢儒襍之禮記中至宋河南程顥兄弟始表章之新安朱熹為之章句或問建安真徳秀又剟取經傳子史之言以填實之各因其言以推廣其義名曰大學衍義獻之時君以端出治之本以立為治之則將以垂之後世以為君天下者之律令格式也然其所衍者止於格物致知誠意正心脩身齊家葢即人君所切近者而言欲其舉此而措之於國天下耳臣竊以謂儒者之學有體有用體雖本乎一理用則散於萬事要必析之極其精而不亂然後合之盡其大而無餘是以大學之教既舉其綱領之大復列其條目之詳而其條目之中又各有條理節目者焉其序不可亂其功不可闕闕其一功則少其一事欠其一節而不足以成其用之大而體之為體亦有所不全矣然用之所以為大者非合衆小又豈能以成之哉是知大也者小之積也譬則網焉網固不止乎一目然一目或解則網有不張譬則室焉室固不止乎一榱然一榱或虧則室有不具此臣所以不揆愚陋竊倣真氏所衍之義而於齊家之下又補以治國平天下之要也其為目凡十有二曰正朝廷其目六曰正百官其目十有一曰固邦本其目十有一曰制國用其目十有一曰明禮樂其目六曰秩祭祀其目七曰崇教化其目十有一曰備規制其目十有六曰慎刑憲其目十有四曰嚴武備其目十有六曰馭夷狄其目九曰成功化其目一先其本而後末繇乎内以及外而終歸於聖神功化之極所以兼本末合内外以成夫全體大用之極功也真氏前書本之身家以達之天下臣為此編則又將以致夫治平之效以收夫格致誠正修齊之功因其所餘而推廣之補其畧以成其全故題其書曰大學衍義補云非敢並駕先賢以犯不韙之罪也臣嘗讀真氏之序有曰為人君者不可以不知大學為人臣者不可以不知大學而繼之以為人君而不知大學無以盡正君之法是葢就其本體而言爾若即其功用而究竟之君臣所當知者則固有在也粤自古昔聖賢為學之道帝王為治之序皆必先知而後行知之必明其義行之必舉其要是以欲行其要者必先知其義茍不知其義之所在安能得其要而行之哉故臣之此編始而學之則為格物致知之方終而行之則為治國平天下之要宫闕高深不出殿廷而得以知夫邑里邊鄙之情狀艸澤幽遐不履城闉而得以知夫朝廷官府之政務非獨舉其要資出治者以御世撫民之具亦所以明其義廣正君者以輔世澤民之術譬之毉書其前編則黄帝之素問越人之難經後編則張仲景金匱之論孫思邈千金之方一方可以療一證隨其方以己其疾惟所用之何如也前書主於理而此則主乎事真氏所述者雖皆前言徃事而實專主於啟發當代之君亦猶孔孟告魯衛齊梁之君而因以垂後世之訓臣之此編較之前書文雖不類意則貫通第文兼雅俗事雜儒吏其意葢主於衆人易曉而今日可行所引之事類多重復所修之辭不能雅馴弗暇計也臣遠方下士叨官禁近當先皇帝在御之日開經筵即綴班行之末親覩儒臣以真氏之書進講陛下毓徳青宫又見宫臣之執經者日以是書進焉臣於是時葢已有志於是既而出教大學暇日因採六經諸史百氏之闕也繕寫適完而陛下嗣登大寶葢若有待言者臣學不足以適用文不足以達意偶因所見而妄有所陳區區一得之愚固無足取而惓惓一念之忠儻為聖明所不棄焉未必無少補於初政之萬一臣濬謹序進大學衍義補表國子監掌監事禮部右侍郎臣丘濬誠惶誠懼稽首頓首上言伏以持世立教在六經而撮其要於大學明徳新民有八目而收其功於治平舉徳義而措之於事為酌古道而施之於今政衍先儒之餘義補聖治之極功惟知罄獻芹之誠罔暇顧續貂之誚原夫一經十傳乃聖人全體大用之書分為三綱八條實學者修己治人之要章句既有以大明聖藴衍義又所以上格君心書雖成於前朝道則行於今代惟太祖之建極嘗大書於殿壁之間暨列聖之紹基屢聽講於經筵之上既已致夫雍熈太和之治一皆本乎躬行心得之餘善推所為者固無俟乎盡言欲全其功者亦須補其闕畧竊觀衍義之四要尚遺治平之二條雖曰舉而措之為無難不若成而全之為盡善況有其體則有其用既成乎已當成乎人理固無一之可遺功豈有一之可闕善法不能以徒舉本末則貴乎兼該毎當繙閱之時輒起編劘之念顧一人之見聞有限而天下之事體多端居一室而料度乎四方據己私而折衷乎衆務亦固知其不可猶強為其所難是葢一念區區報國之忠抑亦平生孜孜為學之志是以頓忘下賤僣效前脩豈不知妄儗非倫竊亦欲薄陳所見念惟天下之大其本在於一身人心之微其用散於萬事一物有一物之用一方之宜所以化之者固本於身所以處之者各有其道事皆有理必事事皆得其宜人各有心須人人不拂所欲伊欲處之適當其可必先講之務盡其詳攷古以證今隨時而應用積小以成其大補偏以足其全鉅細精粗而曲折周詳前後左右而均齊方正於以衍治國平均天下之義用以収格致誠正脩齊之功舉本末而有始有終合内外而無餘無欠期必底於聖神功化之極庶以見夫大學體用之全體例悉凖於前書楷範用垂於後學稽聖經訂賢傳剟取無遺紀善行述嘉言蒐求罔棄附以管中之所見覬於日下之可行俯竭涓塵之微仰禆海嶽之大兹葢伏遇皇帝陛下睿智有臨剛明不惑學古訓而獲大道慎儉徳以懐永圖蚤毓徳於青宫服膺大訓時潜心於黄卷玩味聖經開導盡忠益之言體騐極擴充之力每躬行而實踐恒日就以月將仁孝之徳孚於宫闈元良之聲播於函夏一旦承天而踐阼萬邦仰徳以歸心大志夙成適符漢宣登極之歳小毖求助肇周成訪落之心首深究於大猷亟恢𢎞於至治凡新政之大有建置皆舊學之素所講明廣充格致誠正之功用臻脩齊治平之效太平之治端可計日而待也臣濬下愚陋質荒陬孤生生世無寸長頗留心於扶世讀書有一得輙妄意以著書固非虞卿之窮愁亦匪真氏之去位猥以官居三品慚厚禄以何裨年近七旬惜餘齡之無幾一年仕宦不出國門六轉官階皆司文墨莫試涖政臨民之技徒懐愛君憂國之心竭平生之精力始克成編恐無用之陳言終將覆瓿幸際朝廷更化中外肅清總攬權綱一新政務儻得徹九重之聽取以備乙夜之觀采於十百之中用其二三之策未必無補於當世亦或有取於後人民物於是乎一新世道兹焉乎復古好所好惡所惡一人永子育乎兆民賢其賢親其親四海咸尊戴於萬世臣干冒天威無任激切屏營之至臣所撰到大學衍義補一百六十卷補前書一卷并目録三卷共成四十帙謹奉表隨進以聞成化二十三年十一月十八日國子監掌監事禮部右侍郎臣丘濬謹上表欽定四庫全書太學衍義補卷首明丘濬撰誠意正心之要審幾㣲補臣按宋儒真徳秀大學衍義於誠意正心之要立為二目曰崇敬畏曰戒逸欲其於誠意正心之事蓋云備矣然臣讀朱熹誠意章解竊有見於審幾之一言葢天下之理二善與惡而已矣善者天理之本然惡者人欲之邪穢所謂崇敬畏者存天理之謂也戒逸欲者遏人欲之謂也然用功於事為之著不若審察於幾㣲之初尤易為力焉臣不揆愚陋竊原朱氏之意補審幾㣲一節於二目之後極知僭踰無所逃罪然一得之愚或有可取謹剟諸書之言有及於幾微者于左謹理欲之初分大學曰所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也謙讀為慊朱熹曰誠其意者自修之首也毋者禁止之辭自欺云者知為善以去惡而心之所發有未實也謙快也足也獨者人所不知而已所獨知之地也言欲自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務决去而求必得之以自快足於己不可徒茍且以徇外而為人也然其實與不實葢有他人所不及知而已獨知之者故必謹之於此以審其幾焉臣按誠意一章乃大學一書自修之首而慎獨一言又誠意一章用功之始章句謂謹之於此以審其幾所謂此者指獨而言也獨者人所不知而己所獨知之地也葢以學者用功於致知之際則固己知其心之所發有善有惡矣亦固己知其善之當為而惡之當去矣然其一念始發於心須臾之頃端緒之初有實焉有不實焉葢有他人所不及知而己所獨知者是則所謂獨也是乃人心念慮初萌動之端善惡誠偽所由分之始甚細微而幽隠也學者必審察於斯以實為善而去惡譬如人之行路於其分岐之處舉足不差自此而行必由乎正道否則差毫釐而繆千里矣大學釋誠意指出慎獨一言示萬世學者以誠意之方章句論慎獨指出幾之一言示萬世學者以慎獨之要人能於此幾微之初致審察之力體認真的發端不差則大學一書所謂八條目者皆將為己有矣不然頭緒茫茫竟無下手之處各隨所至而用功待其既著而致力則亦泛而不切勞而少效矣臣謹補入審幾㣲一節以為九重獻伏惟宫闈深邃之中心氣清明之際澄神定慮反已静觀察天理人欲之分致擴充遏絶之力則敬畏於是乎崇逸欲於是乎戒由是以制事由是以用人由是以臨民堯舜之君復見於今泰和之治不在於古矣臣不勝惓惓中庸曰莫見乎隠莫顯乎㣲故君子慎其獨也朱熹曰幽暗之中細㣲之事跡雖未形而幾則已動人雖不知而己獨知之則是天下之事無有著見明顯而過於此者是以君子既常戒懼而於此尤加謹焉所以遏人欲於將萌而不使其潛滋暗長於隠㣲之中以至離道之逺也臣按大學中庸二書皆以慎獨為言朱氏章句於大學慎獨曰審其幾中庸慎獨曰幾則已動先儒謂一幾字是喫𦂳為人處也夫所謂獨者豈出於隠微之外哉隠微是人之所不睹不聞而我所獨睹獨聞之處也向也戒懼乎己之所不睹不聞是時猶未有其幾也雖有其幾未動也今則人雖不睹不聞而己則有所睹有所聞矣己所獨睹獨聞者豈非其幾乎幾己動矣而人猶未之知人雖未知而我已知之則固己甚見而甚顯矣此正善惡之幾也於其幾動之處而致其謹焉戒慎乎其所初睹恐懼乎其所初聞方其欲動不動之間已萌始萌之際審而别之去其惡而存其善慎而守之必使吾方寸之間念慮之際絶無一毫人欲之萌而純乎義理之發則道不須臾離於我矣易曰幾者動之㣲吉之先見者也漢書吉之之間有凶字今從之程頥曰所謂幾者始動之㣲也吉凶之端可先見而未著者也臣按大易幾者動之㣲一言乃萬世訓幾字之始葢事理之在人心有動有静静則未形也動則已形也幾則是動而未形在乎有無之間最㣲細而難見故曰動之㣲雖動而未離於静㣲而未至於著者也此是人心理欲初分之處吉凶先見之兆先儒所謂萬事根源日用第一親切工夫者此也大舜精以察之顔子有不善未嘗不知皆於此著力焉方其一念初萌之始即豫有以知其善惡之幾知其為善也善者吉之兆斷乎可為則為之必果知其為惡也惡者凶之兆斷乎不可為則去之不疑則其所存所行皆善而無惡而推之天下國家成事務而立治功罔有所失矣孟子曰惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也凡有四端於我者知皆擴而充之矣若火之始然泉之始達茍能充之足以保四海朱熹曰惻隠羞惡辭讓是非情也仁義禮智性也端緒也因其情之發而性之本然可得而見猶有物在中而緒見於外也四端在我隨處發見即此推廣而充滿其本然之量則其日新又新將有不能自已者矣又曰四端是始發處端訓始字尤切如發端履端開端之類皆始也凡有四端若火始然泉始達始然便是火之端始達便是水之端臣按人心初動處便有善惡之分然人心本善終是善念先生少涉於情然後方有惡念耳是以見孺子入井者即有怵惕之心見人䝉不潔者即有憎惡之心二者皆是情也而實由乎其中有仁義之性故其始初端緒發見於外自然如此也四端在人者隨處發見人能因其發念之始幾㣲纔見端緒畧露即加研審體察以知此念是仁此念是義此念是禮或是智於是擴而充之由惻隠之端而充之以為不忍人之仁由羞惡之端而充之以為不勝用之義與夫辭讓是非皆然則凡所為者溥博淵泉而時出之矣孟子所謂端與大易所謂幾皆是念慮初生之處但易兼言善惡孟子就性善處言爾是故幾在乎審端在乎知既知矣又在乎能擴而充之知而不充則是徒知而已然非知之於先又曷以知其為善端而充之哉此君子所以貴乎窮理也通書曰幾善惡又曰動而未形有無之間者幾也又曰不思則不能通㣲不睿則不能無不通是則無不通生於通㣲通㣲生於思故思者聖功之本而吉凶之機也朱熹曰幾者動之㣲善惡之所由分也葢動於人心之㣲則天理固當發見而人欲亦已萌乎其間矣或問幾如何是動静之間曰似有而未有之時在人識之爾又曰一念起處萬事根源尤更𦂳切又曰幾有善惡之分於此之時宜常窮察識得是非其初乃毫忽之㣲至其窮察之久漸見充越之大天然有箇道理開裂在這裏此幾㣲之决善惡之分也若於此分明則物格而知至知至而意誠意誠而心正身修家齊國治天下平自己不得止不住又曰幾是動之㣲是欲動未動之間便有善惡須就這處理㑹若至於發著之甚則亦不濟事矣所以聖賢説戒慎乎其所不睹恐懼乎其所不聞又説慎其獨都是要就這幾㣲處理㑹幾㣲之際大是切要又曰㣲動之初是非善惡於此可見一念之生不是善便是惡又曰幾㣲之間善者便是天理惡者便是人欲纔覺如此存其善去其惡可也又曰周子極力説箇幾字儘有警發人處近則公私邪正逺則廢興存亡只於此處看破便斡轉了此是日用第一親切工夫精粗隠顯一時穿透堯舜所謂惟精惟一孔子所謂克己復禮便是此事食芹而美甚欲獻之吾君又曰天理人欲之分只争這些子故周子只管說幾字然辨之不可不早故横渠每説豫字臣按宋儒周惇頤因易幾者動之㣲一言而著之通書者為詳朱熹因周氏之言而發明之者尤為透徹即此數説觀之則幾之義無餘藴矣至其用功之要則惇頤所謂思張載所謂豫熹於大學章句所謂審者尤為著力處也誠能於其獨知之地察其端緒之㣲而分别之擴充其善而遏絶其惡則治平之本於是乎立作聖之功於是乎在矣以上謹理欲之初分審幾㣲察事幾之萌動易曰夫易聖人之所以極深而研研猶審也幾也惟深也故能通天下之志惟幾也故能成天下之務臣按周易此言雖為易書而發然於人君圖治之道實切要焉葢事幾之在天下無處無之而在人君者一日二日之間其多乃盈於萬是所以研審其幾㣲之兆以成天下之務者豈他可比哉先儒朱熹謂深就心上説幾就事上説深在心甚𤣥奥幾在事半㣲半顯請即君身言之人君一心淵奥静深誠有不可測者然其中事事皆備焉事之具也各有其理事之發也必有其端人君誠能於其方動未形之初察於有無之間審於隠顯之際端倪始露豫致其研究之功萌芽始生即加夫審察之力由是以釐天下之務御天下之人應天下之變審察於其先圖謀於其易天下之務豈有難成也哉知幾其神乎君子上交不諂下交不瀆其知幾乎程頤曰見事之幾㣲者其神妙矣乎君子上交不至於諂下交不至於瀆者葢知幾也不知幾則至於過而不已交於上以恭巽故過則為諂交於下以和易故過則為瀆君子見於幾㣲故不至於過也所謂幾者始動之㣲也吉凶之端可先見而未著者也臣按先儒朱熹謂事未至而空言其理也易見事已至而理之顯然者亦易見惟事之方萌而動之㣲處此最難見噫此知幾者所以惟神明不測者能之也歟君子交於上則不諂所以不諂者知諂之流弊必至於屈辱也交於下則不瀆所以不瀆者知瀆之末流必至於欺侮也故於其初動未形之時而審之則知上交者不可諂下交者不可瀆也在人君者雖無上交然人臣有諂諛之態則於其初見之始即抑絶之不待其著見也至於交接臣下之際尤當嚴重稍有一毫狎瀆之意則己毅然戒絶之是亦知幾者矣君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知㣲知彰知柔知剛萬夫之望程頤曰君子明哲見事之幾㣲故能其介如石其守既堅則不惑而明見幾而動豈俟終日也斷别也其判别可見矣㣲與彰柔與剛相對者也君子見㣲則知彰矣見柔則知剛矣知幾如是衆所仰也故曰萬夫之望胡寅曰隂陽之運天地之化物理人事之始終皆自茫忽毫釐至於不可禦故修德者矜細行圖治者憂未然堯舜君臣反覆警省未嘗不以幾為戒故折句萌則百尋之木不能成矣忽蟻穴則千丈之隄不能固矣君子所以貴於見幾而作也臣按天下之事莫不有幾惟其知之豫也然後能戒之於早而不至於暴著而不可遏茍在己者見道有未明立志有不堅臨事而不暇致思雖思而不能審處故幾未至也則暗昧而不知幾既見也則遲疑而不决是以君子貴乎明哲而定静明哲則中心無所惑而灼有所見於善惡未分之初定静則外物不能動而確有所守於是非初分之際見㣲而知其彰不待其昭著也見柔而知其剛不待其堅凝也所以然者亦惟在乎格物以致其知知止而后有定定而静静而安安而慮慮而至於能得如此則無不知之幾不俟終日而判斷矣然此非特可為萬夫之望則雖如神之聖殆亦可幾也乎象曰天與水違行訟君子以作事謀始程頤曰天上水下相違而行二體違戾訟之由也若上下相順訟何由興君子觀象知人情有爭訟之道故凡所作事必謀其始朱熹曰作事謀始訟端絶矣項安世曰乾陽生於坎水坎水生於天一乾坎本同氣而生者也一動之後相背而行遂有天淵之隔由是觀之天下之事不可以細㣲而不謹也不可以親暱而不敬也禍亂之端夫豈在大曹劉共飯地分於七箸之間蘇史滅宗忿起於笑談之頃謀始之誨豈不深切著明乎都潔曰天為三才之始水為五行之始君子法之作事謀始臣按先儒謂天左旋而水東注違行也作事至於違行而後謀之則無及矣是故君子體易之象凡有興作必謀其始焉何則理在天地間大中至正無有偏枉從之而行則上下相順違之而行則彼此交逆是以君子一言之將發也一行之將動也一事功之將施行也則反之於己體之於人揆之於心繹之於理順乎逆乎順則徐為之逆則亟止之不待發於聲徴於色見於施為以作過取愆啓争搆訟而貽異時之悔是則所謂謀始也謀之又謀必事於理不相悖人與我不相妨前與後不相衡决上與下不相齟齬然後作之則所行者無違背之事矣事無違行則凡所云為舉錯者皆合於天理順於人心又安有紛紛之口語狺狺之訟言乎或曰興訟搆獄官府之事也朝廷之於民直驅之而已彼將誰訟乎吁上之於下勢不同而理同下之於上不敢言而敢怒民之訟於心也甚於其訟於口也民之訟於天也甚於其訟於官也仁智之君誠畏天譴畏民怒凡有興作惡可不謀於始乎虞書兢兢業業一日二日萬幾蔡沈曰幾㣲也易曰惟幾也故能成天下之務葢禍亂之幾藏於細㣲而非常人之所豫見及其著也則雖智者不能善其後故聖人於幾則兢業以圖之所謂圖難於其易為大於其細者此也一日二日者言其日之至淺萬幾者言其幾事之至多也葢一日二日之間事幾之來且至萬焉是可一日而縱欲乎臣按天下之事必有所始其始也則甚細㣲而難見焉是之謂幾非但禍亂有其幾也而凡天下萬事萬物莫不有焉人君於其幾而審之事之未來而豫有以知其所將然事之將來而豫有以知其所必然於其幾㣲之始致其審察之功果善歟則推而大之果惡歟則遏而絶之則善端於是而擴充惡念於是乎消殄逸欲無自而生禍亂無由而起夫如是吾身之不修國家之不治理未之有也茍不先審其㣲待其暴著而後致力焉則亦無及矣此古之帝王所以兢兢業業致審於萬事幾㣲之初也歟禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康蔡沈曰天位惟艱一念不謹或以貽四海之憂一日不謹或以致千百年之患帝深然之而禹又推其所以謹在位之意曰安汝止也止者心之所止也安之云者順適乎道心之正而不陷於人欲之危也惟幾所以審其事之發惟康所以省其事之安臣按幾者動之㣲動者幾之著方其静而未動也未有幾也幾既動而後事始萌由是漸見於形象而事成焉茍於幾㣲之初不知所審而欲其事為之著得其安妥難矣臣愚以為惟幾者又惟康之本也人君慎其在位而必欲得其庶事之康非審於事幾發動之初曷由得哉帝庸作歌曰勑天之命惟時惟幾蔡沈曰勑戒勑也幾事之㣲也惟時者無時而不戒勑也惟幾者無事而不戒勑也葢天命無常理亂安危相為倚伏今雖治定功成禮備樂和然頃刻謹畏之不存則怠荒之所自起毫髪幾㣲之不察則禍患之所自生不可不戒也臣按此章帝舜將欲作歌而先述其所以歌之意也歌之序意在乎戒天命而謹時幾時以天時言幾以人事言無一時而不戒勑以無一時而非天命之所寓也無一事而不戒勑以無一事而非天命之所存也然謂之事可也而謂之幾者何哉先儒謂幾者事之㣲也方其事之始萌欲動未動之際方是之時善惡之形未分也而豫察其联兆是非之情未著也而豫審其幾㣲毫末方起已存戒謹之心萌芽始茁己致防範之意不待其滋長顯露而後圖之也古之帝王所以戒勑天命也如此其至所以禍亂不興而永保天命也歟後世人主不知戒勑天命故雖事幾暴著猶不知省及至禍機激發始思所以圖之亦末如之何矣噫幾之一言虞廷君臣累累言之是誠萬世人君勑天命保至治之樞要也惟明主留意周書嗣若功王乃初服嗚呼若生子㒺不在厥初生自貽哲命今天其命哲命吉凶命厯年知今我初服宅新邑肆惟王其疾敬德朱熹曰王之初服不可不謹其習猶子之初生不可不慎其初所敎葢習于上則智習于下則愚矣故今天命正在初服之時敬德則哲則吉則厯年不敬則愚則凶則短折也蔡沈曰嗣其有功者謂繼其能敬德而厯年者也况王乃新邑初政服行敎化之始乎又歎息言王之初服若生子無不在於初生習為善則善矣自貽其哲命為政之道亦猶是也陳櫟曰明哲之性與生俱生初生之時習於善則明可作哲習於惡則靡哲不愚哲則為天所命愚則天不命焉是自貽哲命如所謂自求多福此所謂無不在其初生時自貽哲命者王之初服亦猶是也王乃初服之時天命之或吉或凶判於此王德之或敬或否判於此敬則能祈天永命不敬則不能祈天永命召公欲王乘此一初之機而疾敬德疾之云者欲其乘此機而速勉之有今㒺後之謂也臣按天下之事莫不有其初家之立敎在子生之初國之端本在君立之初葢事必有所從起之處於所從起之處而豫為之區處則本原正而支𣲖順矣所從起之處即所謂初也有一事即有一初是以周公告成王以宅新邑為服行敎化之初也雖然豈但宅邑一事哉周公偶因所遭以告其君耳是故人君知事之皆必有其初也於其所服行之始而審其所發動之幾當其端緒肇啓之時豫為終竟據守之地即其始以占其終即其㣲而究其著即其近以慮其逺即其易以圖其難兢兢焉惟德之是敬汲汲焉惟日之不足是則所以自貽厥命者於德為明哲於事為吉祥在身有夀考之徴在國有過厯之祚孰謂人君為治不本於一初而其所以謹於其初者又豈外於一敬哉詩鶴鳴首章曰鶴鳴于九皋聲聞于野又曰鶴鳴于九皋聲聞于天朱熹曰鶴之鳴髙亮聞八九里皋澤中水溢出所為坎從外數至九喻深逺也鶴鳴于九皋而聲聞于野言誠之不可揜也臣按本朝學士朱善曰知誠之不可揜則知念慮方萌而鬼神已知形迹欲掩而肺肝已見所以不可無誠身之功也臣以是知天下萬事萬物之理不出乎一誠誠者何實理也實有是形則實有是影實有是器則實有是聲如此詩言鶴之鳴也在乎九折之澤至深至逺之處而其聲也乃聞於郊野虚空至髙至大之間如人之有為也在乎幽深隠僻之地宜若人不知矣然其發揚昭著於外者乃無逺而不至焉是何也有是實事於中則有是實聲於外誠之不可揜也世之人主每於深宫之中有所施為亦自知其理之非也不勝其私欲之蔽乃至冒昧為之遮藏引避惟恐事情之彰聞戒左右之漏泄忌言者之諷諫申之以切戒禁之以嚴刑卒不能使之不昭灼者此葢實理之自然不得不然如鶴鳴而聲自聞也嗟乎天下之事有可為者有不可為者可為者必可言也不可言者必不可為也可為而不可言則非可為者矣人君於此凡其一念之興幾㣲方動則必反思於心曰吾之為此事可以對人言否乎可以與人言則為之不可與人言則不為則所為者無非可言之事若然則吾所為者惟恐人傳播之不逺矣尚何事於箝人口而罪人之議已也哉禮記曰禮之敎化也㣲其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也易曰君子慎始差若毫釐繆以千里此之謂也引易今經文無之葉夢得曰㣲者形而未大也敎以使人傚化以使人遷故從善而不自知未形者有形之兆也止邪於將兆則人知舍彼以就此故逺罪而不自知吳澂曰禮之導人為善每在善幾方動之初其禁人為惡亦在惡幾未見之時非若其他法令刑罰之屬待其顯見而後勸率懲遏之也又引易以證之始謂其初未顯未見之時慎謂宜及此時以禮導其善防其惡不可失此幾也儻或不然不於其始而敎之止之其差雖若毫髮之近至於既顯既見而後敎之止之則難為力其繆乃有千里之逺言其繆甚大也臣按先王為治而必隆重於禮者葢以禮為敎化之本所以遏民惡念而啓其善端約之於仁義道德之中而使其不蕩於規制法度之外以至於犯戒令罹刑憲焉自有不知其所以然而然者矣則其為敎化也不亦㣲乎㣲者幾之初動未大者也君子於其幾㣲方動未形之始而慎之慎之何如亦隆禮而已矣是故知男女之有欲也則制婚禮以止其淫辟之行於情竇未開之先知飲食之易爭也則制鄉飲以止其爭鬭之獄於朶頤未動之始制喪祭之禮以止其倍死忘生之念於哭臨奠獻之際制聘覲之禮以止其倍畔侵陵之患於玊帛俎豆之間是皆不待欲動情勝之時而自有潛銷速化之妙縱有過差不逺而復尚何差繆而至於千里之遼絶乎子曰不曰如之何如之何者吾末如之何也已矣朱熹曰如之何如之何者熟思而審處之辭也不如是而妄行雖聖人亦無如之何矣臣按先儒有言善為天下國家者謹於㣲而已矣謹㣲之道在於能思是以欲興一念作一事取一物用一人必於未行之先欲作之始反之於心反覆紬繹至再至三慮其有意外之變恐其有必至之憂如何而處之則可以盡善如何而處之則可以無弊如何而處之則可以善後而久逺皆於念慮初萌之先事幾未著之始思之必極其熟處之必極其審然後行之如此則不至於倒行逆施而收萬全之功矣茍為不然率意妄行徒取一時之快而不為異日之圖一旦馴致於覆敗禍亂無可奈何之地雖聖人亦將奈之何哉是故君子之行事也欲防㣲而杜漸必熟思而審處司馬光曰書曰一日二日萬幾何謂萬幾幾之為言㣲也言戒懼萬事之㣲也夫水之㣲也捧土可塞及其盛也漂木石沒丘陵火之㣲也勺水可滅及其盛也焦都邑燔山林故治之於㣲則用力寡而功多治之於盛則用力多而功寡是故聖帝明王皆銷患於未萌弭禍於未形天下隂被其德而莫知其所以然也又曰未然之言常見棄忽及其已然又無所及夫宴安怠惰肇荒淫之基竒巧珍玩發奢泰之端甘言悲詞啓僥倖之塗附耳屏語開讒賊之門不名器導僭逼之源假借威福授陵奪之柄凡此六者其初甚㣲朝夕狎玩未覩其害日滋月益遂至深固比知而革之則用力百倍矣臣按宋仁宗時司馬光上五規其四曰重㣲其中引孔子告魯君之語謂昧爽夙興正其衣冠平旦視朝慮其危難一物失理亂亡之端以此思憂則憂可知矣葢人君惟不知憂也故不知所慮當夫安逸之時知有亂亡之禍則必憂之矣憂之則慮之慮之於無事之時而尋其端緒之所自起究其流弊之所必至如光所言之六事者觸類而長之隨機而應之逆料其未然之害逺探其將至之患千里之外如在目前百年之逺如在旦夕事事而思之惟恐一物之失理汲汲而已之惟恐須㬰之尚在不玩狎而因循不茍且而姑息惕然而常警於心毅然而必致其決凛然而深懼其危如此則修之於廟堂而德冒四海治之於今日而福流萬世誠有如光之所以期其君者尚何危難之有哉以上察事幾之萌動審幾㣲防姦萌之漸長坤初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅冰也文言曰積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辯之不早辯也易曰履霜堅冰至葢言順也順當作慎程頤曰隂之始凝而為霜履霜則當知隂漸盛而至堅冰矣猶小人始雖甚㣲不可使長長則至於盛也义曰天下之事未有不由積而成家之所積者善則福慶及於子孫所積不善則災殃流於後世其大至於弑逆之禍皆因積累而至非朝夕所能成也明者則知漸不可長小積成大辯之於早不使順長故天下之惡無由而成乃知堅冰之戒也臣按辯之於早即所謂審㣲也坤卦此爻隂始生於下其端甚㣲而其勢必至於盛其象如人之初履霜也則知其為隂氣之凝夫隂氣之始凝也但結為㣲薄之霜耳馴而至於極盛且將為堅厚之冰焉大凡國家禍亂之變弑逆之故其原皆起於小人誠能辯之於早慎之於㣲㣲見其萌芽之生端緒之露即有以抑遏壅絶之不使其有滋長積累之漸以馴致夫深固堅牢之勢則用力少而禍亂不作矣聖人作易以此垂戒示人以扶陽抑隂之意葢陽為君子隂為小人小人之初用也未必見其有害然其質本隂柔用之之久馴致之禍有不能免者人君知其為小人也則於初進之際窺見其㣲即抑之黜之不使其日見親用則未萌之禍消矣夫然又安有權姦竊柄之禍佞倖蠱心之害哉大畜六四童牛之牿元吉童者未角之稱牿施横木於牛角以防其觸者也六五豶豕之牙吉攻其特而去之曰豶所以去其勢也程頤曰初居最下陽之㣲者㣲而畜之則易制猶童牛而加牿大善而吉也葢人之惡止於初則易既盛而後禁則扞格而難勝莫若止之於初也又曰豕剛躁之物而牙為猛利若强制其牙則用力勞而不能止其躁猛若豶去其勢則牙雖存而剛躁自止其用如此所以吉也君子法豶豕之義知天下之惡不可以力制也則察其機持其要塞絶其本原故不假刑罰嚴峻而惡自止也臣按易之大畜此二爻誠人君制惡之要術也人君之於小人誠能察之於其㣲知其不可用制之於早使其不敢肆操之有要使彼自戢止則天下國家又安得有莽懿之禍覽節之患哉君子所以貴乎炳幾先也不然則無以知其為小人將馴致於權不可收勢不可遏之地矣可不戒哉姤初六繫于金柅柅止車之物止之以堅强之金柅貞吉静正則吉有攸徃見凶徃而進見之則凶羸豕孚蹢躅羸弱之豕中心之誠在乎蹢躅跳躑也程頤曰姤隂始生而將長之卦一隂生則長而漸盛隂長則陽消小人道長也制之當於其㣲而未盛之時君子小人異道小人雖㣲弱之時未嘗無害君子之心防於㣲則無能為矣又曰如李德裕處置近倖徒知其帖息畏伏而忽於志不忘逞照察少不至則失其幾也臣按先儒有言豕方羸時力未能動然至誠在于蹢躅得伸則伸矣如唐武宗時李德裕為相君臣契合莫能間之近倖帖息畏伏誠若無能為者而不知其志在求逞也其後繼嗣重事卒定於其手而德裕逐矣幾㣲之間所當深察雖然易之言又不持為君子小人設也吾心天理人欲之幾亦若是焉人欲之萌葢有甚於羸豕之可畏者能於此而止之而不使其滋長則善矣臣愚以為吾心私欲竊伏之幾尤甚於小人帖息求逞之幾必先有以防乎已然後可以防乎人也此又卦爻言外之意詩小弁莫髙匪山莫浚匪泉君子無易由言耳屬于垣朱熹曰山極髙矣而或陟其巔泉極深矣而或入其底故君子不可易於其言恐耳屬于垣者有所觀望左右而生讒譖也吕祖謙曰唐德宗將廢太子而立舒王李泌諫之且曰願陛下還宫勿露此意左右聞之將樹功於舒王太子危矣此正君子無易由言耳屬于垣之謂也臣按李泌諌德宗曰勿露此意所謂此意之露即是幾㣲初動之處也意在言前又不但若詩所謂無易由言而已也小人非惟聽吾言之所發有所觀望而生讒譖亦且伺吾意之所向有所予奪而竊權柄是以人君於凡施為舉動如命官討罪之類皆當謹之於幾㣲之先不可輕露其意使小人得以窺測之茍或一露其幾則將有貪天功以為己私假上權以張己威樹功於人收恩於已者矣不獨如李泌所謂建儲一事也通鑑初命晉大夫魏斯趙籍韓䖍為諸侯司馬光曰事未有不始於㣲而成於著聖人之慮逺故能謹其㣲而治之衆人之識近故必待其著而後救之治其㣲則用力寡而功多救其著則竭力而不能及也胡寅曰善為天下國家者謹於㣲而已矣卑宫惡服慮侈汰也不遑暇食防逸豫也慄慄危懼戒驕溢也動守憲度虞禍亂也不為嗜欲則娛樂之言無自進不好功利則興作之計無自生嚬笑不茍誰敢矯假八柄在己誰擅威福誠如是雖使六卿復起三家輩作操曹操懿司馬懿莽王莽温朱温接踵於朝方且效忠宣力之不暇而何有於他志是故韓趙魏之為諸侯孔子所謂吾末如之何者人君監此亦謹於微而已矣臣按三晉欲剖分宗國非一日矣至是魏斯趙籍韓䖍始自裂土而南面焉周雖不命其能禁其自候哉原其所起之由先儒謂始自悼公委盟會於大夫平公受貨賂於崔杼荀躒出會三臣内叛隂凝冰堅垂及百年矣是以君子臨事貴於見幾作事貴於謀始為大於其細圖難於其易勿謂無害其禍將大勿謂無傷其禍將長以上防姦萌之漸長審幾微炳治亂之幾先五子之歌曰怨豈在明不見是圖臣按蔡沈謂民心怨背豈待其彰著而後知之當於事幾未形之時而圖之也嗟乎使世之居人上者皆能圖無形之怨則天下豈有亂亡之禍哉惟其不能圖也耳目蔽於左右心志隔於上下見者尚不能圖况不見乎明者尚不能知况未明乎圖之之道奈何曰民之所好者逸樂也吾役而勞之民雖未懟也吾則思曰力窮則懟民之情也豫於事役將興之初度其緩急而張弛焉不待其形於言也民之所急者衣食也吾征而取之民雖未怨也吾則思曰財窮則怨民之心也豫於税斂於民之始量其有無而取舍焉不待其徴於色也凡有興作莫不皆然則民無怨背之心而愛戴其上如父母矣噫察民怨也於㝠㝠之中弭民怨也於涓涓之始古之帝王所以得民心而保天下者如此後世人君則不然視民如暗見如不見此其所以上下相戕而禍亂相仍也歟周官王若曰若昔大猷制治於未亂保邦於未危臣按大猷謂大道之世也若昔大道之世制治保邦於未亂未危之前所以常治而常安也若待其既亂既危而後制之保之則已無及矣然則其道何由亦曰審幾而已矣葢天下國家有治則有亂有安則有危然亂不生於亂而常生於治之時危不起於危而常起於安之日惟人君恃其久安而狃於常治也不思所以制之保之於是亂生而危至矣人君誠能於國家無事之時審其幾先兢兢然業業然恒以治亂安危為念謀之必周慮之必逺未亂也而豫圖制亂之術未危也而豫求扶危之人則國家常治而不亂君位常安而不危矣蔡沈解此謂所以制治保邦者即下文明王立政是也而臣以審幾為言者竊以謂人君能於未亂未危之前審其事幾之所始以防其末流之所終則永無危亂之禍矣其於制治保邦之道似為切要惟聖明留意易象曰水在火上既濟君子以思思之於後患而豫為之於前防之唐書𤣥宗天寳末安禄山反入關帝獨與貴妃姊妹皇子妃主皇孫及親近宦官宫人出延秋門妃主皇孫之在外者皆委之而去至咸陽望賢宫日向中帝猶未食民獻糲飯雜以麥豆皇孫輩争以手掬食之須臾而盡有老父郭從謹進言曰在廷之臣以言為諱闕門之外陛下皆不得知草野之臣必知有今日久矣但九重嚴􅃉區區之心無路上達事不至此臣何由得覩陛下之面而訴之乎帝曰朕之不明悔無所及慰諭而遣之命軍士散詣邨落求食夜將半乃至金城縣縣民皆走驛中無燈火人相枕藉而寢貴賤無以復辨宋儒范祖禹曰上下之等以勢相扶而已矣天子以一身而寄天下之上合而從之則為君離而去之則為匹夫明皇享國幾五十年一旦失國出奔不四十里而已無食天子之貴四海之富其可恃乎德宗建中四年涇原兵過京師作亂帝召禁兵禦賊無一人至者乃與太子諸王公主自苑北門出宦官左右從者僅百人後宫諸王公主不及從者什七八遂幸奉天賊登含元殿争入府庫運金帛時朱泚閒居賊迎入宫僭號稱大秦皇帝帝時在奉天經月城中資糧俱盡嘗遣健步出城覘賊其人懇以苦寒乞一襦袴帝為求之不獲竟憫黙而遣之時供御纔有糲米二斛每伺賊間夜縋人於城外采蕪菁根而進之宋史徽宗末年金人分道南侵將逼京師乃傳位欽宗靖康元年金人自真定趨汴屯于城下京師遂陷金人欲邀徽宗出郊欽宗乃代其徃遂如青城金人索金一千萬錠銀二千萬錠帛一千萬匹於是大括金銀金人逼欽宗易服既而又欲徽宗至青城面議且以内侍所具諸王皇孫妃主名盡取之徽宗即與其后同如青城鄆王楷及諸妃公主駙馬及六宫有位號者皆從凡法駕鹵簿皇后以下車輅冠服禮器法物八寳九鼎等物及官吏内人内侍技藝工匠倡優府庫蓄積為之一空臣按程頤有言時當既濟惟慮患害之生故思而豫防使不至於患也自古天下既濟而致禍亂者葢不能思患而豫防也何也葢物極則反勢至則危理極則變有必然之理也人君於此思其未萌之患慮其末流之禍展轉於心胸之間圖謀於思慮之際審之於未然遏之於將長曲盡其防閑之術旁求夫消弭之方毋使一旦底於不可救藥無可奈何之地則禍患不作而常保安榮矣先儒有言成湯之危懼成王之閟毖皆思患豫防之謂也後世人主若唐𤣥宗德宗宋之徽宗皆恃其富盛而不謹於幾㣲遂馴致於禍亂而不可支持之地謹剟于篇以垂世戒若夫叔季之君未致於既濟之時而罹禍亂者則不載云臣嘗因是而通論之自古禍亂之興未有不由㣲而至著者也人君惟不謹於細㣲之初所以馴致於大亂極弊之地彼其積弊之後衰季之世固其宜也若夫當承平熈洽之餘享豐亨豫大之奉肆其胸臆信任匪人窮奢極欲無所不至一旦失其富貴尊榮之勢而為流離困厄之歸是豈無故而然哉其所由來必有其漸良由不能慎之於始審之於微思其所必至之患而豫先有以防之也此三君者皆有過人之才當既濟之時不能防微謹始思患而豫防之以馴致夫困苦流離之極有不忍言者吁可不戒哉可不戒哉臣故因大易思患豫防之象而引三君之事以實之而著於審幾微之末以垂萬世之戒後世人主尚鑒于兹兢兢業業謹之於微毋使一旦不幸而蹈其覆轍焉豈彼一時一人之幸其實千萬世億兆之人之幸也以上炳治亂之幾先大學衍義補卷首
