body:
  text: 大學衍義補卷五十五明丘濬撰治國平天下之要秩祭祀總論祭祀之禮下禮運故先王患禮之不達於下也故祭帝於郊所以定天位也天下知尊君之禮故君位定祀社於國所以列地利也表列地利祖廟所以本仁也山川所以儐鬼神也五祀所以本事也禮行於郊而百神受職焉謂風雨節寒暑時禮行於社而百貨可極焉謂地不愛寳物無遺利禮行於祖廟而孝慈服焉謂天下皆知服行孝慈之道禮行於五祀而正法則焉謂貴賤之禮各有制度臣按先儒有言禮之始也則自天子出禮之終也則與民由之與民由之然後禮達而分定故先王患禮之不達於下則必有以為之教者然教必以祭祀為主者以神道設之使民知畏敬故也由是觀之則聖人制為祭祀之禮者非但以致吾之誠報神之徳而已也而實因之以設民之教使咸安其分盡其職以報乎上焉禮器君子曰祭祀不祈不為祈私福不麾快也蚤不以先時為快不樂葆猶褒也大不以褒大為可樂不善嘉事牲不及肥大薦不美多品陳澔曰祭有常禮不為祈私福祭有常時不以先時為快器幣小大長短自有定制不以褒大為可樂也奠告有常儀不為善之而更設他祭牲不及肥大及猶至也如郊牛之角繭栗宗廟角握社稷角尺各有所宜用不必須並及肥大也薦祭之品味有定數不以多品為美也君子曰禮之近人情者非其至者也陳澔曰近者為䙝逺者為敬凡行禮之事與人情所欲者相近則非禮之極至者臣按先王制禮有一定之制有一定之時有一定之數有一定之物以神待神而不敢干以己以神事神而不敢䙝以人郊特牲祭有祈焉有報焉有由辟焉辟讀曰弭陳澔曰此泛言祭禮有此三者之例辟讀為弭如周禮所謂弭災兵逺罪疾之類由弭者用此以消弭之也方慤曰欲彼之有予也故有祈以求之若詩噫嘻祈榖於上帝載芟祈社稷之類是也因彼之有施也故有報以反之若詩豐年之秋冬報良耜之秋報社稷是也臣按禮器既言祭祀不祈而此又云有祈焉而周禮六祈又有祈福祥何也蓋祭祀之不祈謂孝子行歳事也若夫為民而有所禱祠因事而有所祈禳是亦人情之所不能免也禮緣人情而作聖人為之節文使其有所限而不敢過求有所法而不敢妄求後世此禮不明時君不知所守往往為邪僻之所惑而有非分之祈不求之於祭祀而求之於齋醮不求之於典禮而求之於鬼教卒之無所得而反致禍於身貽患於生靈者多矣祭法燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川澤丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亾其地則不祭張載曰日月星辰風雨寒暑無特祭皆從祀於郊所謂日於壇月於坎日於東月於西皆不出祀之兆言王宫夜明幽宗之類皆指其祭位耳寒暑無定位暑近日壇寒近月坎而已故曰相近於坎壇陳澔曰燔燎也積柴於壇上加牲玉於柴上乃燎之使氣達於天此祭天之禮也泰壇即圜丘泰者尊之之辭瘞埋牲幣祭地之禮也泰折即方丘如折旋之義喻方也泰昭壇名祭時祭四時也方慤曰天無二日土無二王則王有日之象而宫乃其居也故祭日之壇曰王宫日出於晝月出於夜則夜為月之時而明乃其用也故祭月之坎曰夜明幽以言其隠而小也故祭星之所謂之幽宗吁而求雨之謂雩主祭旱而言耳兼祭水者雨以時至則亦無水患也幽雩皆謂之宗者宗之為言尊也方有四而位則八故有坎有壇而各以四焉臣按先儒謂周禮大宗伯備列諸祀而不見祭四時寒暑水旱者宗伯所記謂歳時常祀而此所載謂四時乖序寒暑僭運水旱祈禱之禮及夫日月星辰民所瞻仰也山林川谷丘陵民所取材用也非此族也不在祀典陳澔曰族類也祀典祭祀之典籍臣按所謂祀典即所謂祭法也祭法一篇自燔柴於泰壇以至終篇即虞書肆類于上帝禋于六宗柴望秩于山川徧于羣神之義疏也自古經籍言祀典者莫先於虞書莫詳於祭法夏商之禮無可考周之禮文詳備然皆不外乎此而已祭義唯聖人為能饗帝孝子為能饗親饗者鄉去聲也鄉之然後能饗焉葉夢得曰聖人具天道其徳同乎帝故饗帝帝必有天也孝子具人道其仁篤於親故饗親親必有祖也志之所向然後能饗故聖人推其尊尊之義以向乎天孝子推其親親之仁以向乎祖臣按天道莫尊乎帝人道莫親乎親所以饗之者備其禮物也非難而致其来享也不易自非仁孝誠敬之至豈能得其降格歆饗於冥冥之中也哉必也心志之歸向念念不忘無一息而不存其誠無一事而不盡其誠無一物而不寓其誠夫然庶幾神之格思洋洋乎如在其上如在其左右乎祭統凡治人之道莫急於禮禮有五經莫重於祭夫祭者非物自外至者也自中出生於心者也心怵而奉之以禮是故唯賢者能盡祭之義鄭𤣥曰禮有五經謂吉禮凶禮軍禮賔禮嘉禮也莫重於祭謂以吉禮為首也方慤曰盡其心者祭之本盡其物者祭之末有本然後末從故祭非物自外至自中出生於心也心怵而奉之以禮者心有所感於内故以禮奉之於外而已蓋以其中出非外至者也臣按為治以禮為本行禮以祭為本本祭以立禮本禮以為治此三代之治所以盛也賢者之祭也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言内盡於己而外順於道也忠臣以事其君孝子以事其親其本一也臣按洪範五福曰夀曰富曰康寜曰攸好徳曰考終命而祭統之所謂福則異於是既訓之曰備而又曰百順之名蓋必備衆善於己由中及外無一之或闕無一之或逆也洪範之福出於天祭祀之福由乎己在己者既盡則在天者亦可因是而得也及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則於物無防也耆嗜同欲無止也及其將齊也防其邪物訖其耆欲耳不聽樂故記曰齊者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮是故君子之齊也専致其精明之徳也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也臣按自古論齊戒祭祀之意莫詳於此散齊七日以定之即祭義所謂散齊於外也致齊三日以齊之即祭義所謂致齊於内也防其邪物訖其嗜欲耳不聽樂是制其外所以養其中心不茍慮必依於道手足不茍動必依於禮是謹乎中以應乎外交致其内外之謹專致其精明之徳以是事神神無不格矣古人之致齊也其嚴如此後世齊戒者唯禁不飲酒茹葷御内而已而於聲樂之奏則未有禁焉當夫大宰告戒之時殿廷尚為奏樂而人臣受誓戒者往往鼔琴博奕以為無犯於齊殊非古人齊者不樂不敢散其志之意請行禁戒春秋左𫝊季梁對隨侯曰夫民神之主也是以聖王先成民而後致力於神故務其三時春夏秋時修其五教父義母慈兄友弟恭子孝親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有宫之竒告虞公曰鬼神非人實親惟徳是依故周書曰皇天無親惟徳是輔又曰黍稷非馨明徳惟馨又曰民不易物惟徳繄物如是則非徳民不和神不享矣神所馮依將在徳矣臣按季梁謂聖王必成民而後致力於神宫之竒謂鬼神非人實親惟徳是依二臣者可謂知事神之道矣後世人主不知正身修徳而儌福祉於窈寞不知勤民修教而希神貺於牲豆為之臣者非徒不能規正而反有以啟導之皆二臣之罪人也史嚚曰吾聞之國將興聽於民將亡聽於神神聰明正直而壹者也依人而行惟徳是與臣按神聰明正直而壹者也若其可以理求亦可以非理求則是二三而非壹矣豈所謂聰明正直之神哉是以人君為治必専心民事而絶地天通恐小人譸張為幻以惑世誣民而兆禍亂也衛遷於帝丘衛成公夢康叔曰相奪予享公命祀相甯武子不可曰鬼神非其族類不歆其祀杞鄫何事言杞鄫乃夏之後自當祀相相之不享於此久矣非衛之罪也不可以間成王周公之命祀初楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳四水在楚界楚之望也禍福之至不是過也不榖雖不徳河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉臣按鬼神各有族類國家各有命祀故人於鬼神非族類不可祀非命祀不敢祀孔子稱楚昭王知大道蓋以其明乎天地之性識乎幽明之故達乎秩祀之義也彼區區焉留心於禱祈禜祭之事不顧先王之命祀越境而祭其非所當祭之鬼者豈非小道也哉史趙曰盛徳必百世祀臣按有非常之功徳必享非常之祀典榖梁𫝊曰宫室謂齊宫不設不可以祭衣服不脩不可以祭車馬器械不備不可以祭有司一人不備其職不可以祭祭者薦其時也薦其敬也薦其美也非薦味也臣按祭祀當用之物當用之人當用之器一有所闕皆不可祭論語子曰非其鬼而祭之諂也朱熹曰非其鬼謂非其所當祭之鬼諂求媚也又曰如天子祭天地諸侯祭山川大夫祭五祀庶人祭其先上得以兼乎下下不得以兼乎上也庶人而祭五祀大夫而祭山川諸侯而祭天地此所謂非其鬼也或者問非其鬼而祭之如諸侯僭天子大夫僭諸侯之類又如士庶祭其旁親逺族亦是非其鬼否曰是又如今人祭甚麽廟神都是非其鬼問如用僧尼道士之屬都是非其鬼曰亦是臣按上自天子下而庶人皆有所當祭之鬼夫人之於鬼其所以當祭者以其精誠神氣之相屬也茍不相屬則人自人鬼自鬼豈有感通之理季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎朱熹曰旅祭名泰山山名在魯地禮諸侯祭封内山川季氏祭之僭也冉有時為季氏宰救謂救其陷於僭竊之罪嗚呼歎辭言神不享非禮欲季氏知其無益而自止又進林放以厲冉有也又曰天子祭天地諸侯祭山川只縁是他屬我故我祭得他若不屬我則氣便不與之相感如何祭得他陳淳曰古人祭祀須有此實理相闗然後七日戒三日齋以聚吾之精神吾之精神既聚則所祭者之精神亦聚自有来格道理臣按神人一理以非禮祀神而神不之享亦猶人以非禮待人而人不之受受非禮之食者必餔啜之小人享非禮之祀者亦必淫邪之小鬼也後世小人乃以卮酒豆肉而欲享先代之聖賢俗食䙝味而欲享太上之天帝所持者狹所求者廣一何無忌憚之甚邪此在聖明之世所當禁也祭如在祭神如神在子曰吾不與祭如不祭程頥曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬朱熹曰孔子言己當祭之時或有故不得與而使他人攝之則不得致其如在之誠故雖已祭而此心缺然如未甞祭也范祖禹曰君子之祭七日戒三日齊必見所祭者誠之至也是故郊則天神格廟則人鬼享皆由己以致之也有其誠則有其神無其誠則無其神可不謹乎吾不與祭如不祭誠為實禮為虚也臣按朱子謂此門人記孔子祭祀之誠意又記孔子之言以明之所謂吾不與祭如不祭蓋謂當祭而或有疾病不得已之事而使他人攝行其事非甚不得已決不可也然所攝之人必須氣類相通職掌所係然後使之代行可也不然恐無感格之理是故内祭當用親屬外祭當用禮官後世用其官爵之尊崇者非是竊考洪武禮制開國以来各布政司府州縣社稷山川等壇原定行禮獻官以守禦武臣為初獻文臣為亞獻終獻洪武十四年聖祖命今後祭祀以文職長官通行三獻禮武官不與祭禮部臣言官有職掌禮貴誠一古之刑官尚不使與祭而况兵又為刑之大者乎不令武官與祭所以嚴事神之道而達幽明之交也著在禮制頒行天下今百餘年矣臣請朝廷遇有遣官攝祭亦準此制而以禮官行事庶合周官大宗伯王不與則攝位之文樊遲問知子曰務民之義敬鬼神而遠之可謂知矣程頥曰人多信鬼神惑也而不信者又不能敬能敬能遠可謂知矣朱熹曰民亦人也専用力於人道之所宜而不惑於鬼神之不可知知者之事也或問熹曰所謂鬼神非祀典之正何以使人敬之以為祀典之正又何以使人逺之曰聖人所謂鬼神無不正也曰遠者以其處幽故嚴之而不瀆耳若其非正則聖人豈復謂之鬼神哉在上則明禮以正之在下則守義以絶之臣按明則有禮樂禮樂乃人道之所宜固所當務也幽則有鬼神鬼神之理微妙難名以為有耶則視無形而聽無聲以為無耶則洋洋乎如在其上如在其左右神之格思不可度思固不可不致其敬尤不可不致其嚴敬而嚴則能敬而逺之矣中庸曰郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘甞之義治國其如示諸掌乎朱熹曰郊祀天社祭地不言后土者省文也禘天子宗廟之大祭追祭太祖之所自出於太廟而以太祖配之也甞秋祭也四時皆祭舉其一耳禮必有義對舉之互文也示與視同視諸掌言易見也譚惟寅曰治道不在多端在夫致敬之間而已當其執圭幣以事上帝之時其心為何如當其奠斚以事祖宗之時其心為何如是心也舉皆天理無一毫人偽介乎其間鬼神之情狀天地萬物之理聚見於此推此心以治天下何所往而不當臣按祭祀之道曰仁曰孝曰誠曰敬而已四者皆出於心治天下之本端有在於是一祭祀之間而治天下之道具於此故曰明乎此者治國其如視諸掌乎朱熹曰天有顯道厥類惟彰作善者降之百祥作不善者降之百殃是以人之禍福皆其自取未有不為善而以諂禱得福者也未有不為惡而以守正得禍者也而况帝王之生實受天命以為郊廟社稷神人之主茍能修徳行政康濟兆民則災害之去何待於禳福祿之来何待於禱如其反此則獲罪於天人怨神怒雖欲辟惡鬼以来真人亦無所益又况先王制禮自天子以至於庶人報本享親皆有常典牲器時日皆有常度明有禮樂幽有鬼神一理貫通初無間隔茍禮之所不載即神之所不享是以祭非其鬼即為淫祀淫祀無福經有明文非固設此以禁之乃其理之自然不可得而易也其或恍惚之間如有影響乃是心無所主妄有憂疑遂為巫祝妖人乘間投隙以逞其姦欺誑惑之術其術既行則其為禍又將無所不至古今以此坐致亂亡者何可勝數其監非逺茍非致精學問以明性命之理使此心洞然無所疑惑當有即有當無即無則亦何据以秉禮執法而絶妖妄之源乎先王之政執左道以亂政假鬼神以疑衆者皆必誅而不以聽其慮深矣然𫝊有之明於天地之性者不可惑以神怪明於萬物之理者不可罔以非類則其為妄蓋亦不甚難察臣按朱熹上封事於其君此其所謂明義理以絶神姦者也蓋義理明則此心洞然無所疑惑故於所當祭者祭之而不疑於其所不當祭者絶之而不惑其間所謂致精學問一語真誠明義理之要也義理茍明則天地之性萬物之理昭晰於心目之間而神怪非類不能惑而㒺之矣以上總論祭祀之禮下大學衍義補卷五十五
