body:
  text: 大學衍義補卷九十四明丘濬撰治國平天下之要備規制圖籍之儲易上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬朱熹曰上古結繩而治後世聖人易之以書契天下事有古未之為而後人為之固不可無者此類是也徐幾曰上古民淳事簡事之小大惟結繩以識之亦足以為治至後世風俗媮薄欺詐日生而書契不容不作矣書文字也契合約也言有不能記者書識之事有不能信者契驗之程龍曰十三卦制器尚象凡所以為民生利用安身養生送死之道已無遺憾矣然百官以治萬民以察卒歸之夬之書契何也蓋器利用便則巧偽生憂患作聖人憂之故終之以書契之取象其視網罟等象雖非一時之利實萬世之大利也故結繩初易為網罟終易為書契聖人以定大業斷大疑悉於書契乎觀百官治萬民察誠非書契不可也十三卦終以夬卦之取象聖人之意深矣臣按此字書之祖萬世書契之所自出文學之所繇宗者也豈特一時治百官察萬民而已哉然萬世之下所以治百官察萬民者皆永賴焉夫百官以治萬民以察聖人作為書契以垂萬世之用為此而已後世乃至用之以駕虗誕之說紀浮夸之辭載怪僻之事寫淫蕩之情豈聖人始制文字之意哉周禮大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國以天下土地之圖周知九州之地域廣東西為廣輪南北為輪之數辨其山積石曰山林竹木曰林川注瀆曰川澤水鍾曰澤丘土高曰丘陵大阜曰陵墳水涯曰墳衍下平曰衍原高平曰原隰下溼曰隰之名物鄭𤣥曰土地之圖若今郡國輿地圖臣按此即後世地志圖經之所始也周禮大司徒之職首以建邦之土地之圖為任可見地官為職所以佐王安擾邦國者雖無所不綂而其最當切而先者萬民之數九州之域五土之名也後世圖經地志蓋原于此國朝洪武三年命儒士魏俊民等六人編類天下郡縣地理形勢降附始末為大明志永樂十六年又遣官分行天下採摭事實然未成書英宗皇帝乃命儒臣因其舊脩成一書命曰大明一綂志然所輯者皆沿前代之舊載古今事跡紀形勝備風俗考沿革廣見聞前古所未有也揆之於大司徒所掌之圖則倍之矣然所謂建邦之土地人民之數則未備焉臣請於地圖之外依周禮别為一籍凡天下兩畿十三藩及府州縣皆各為一圖縣合於州州合於郡郡合於藩總為天下圖掌於户部凡其疆域道理山川物産里數户口錢榖應所有者皆具其中一有取舍斂散按圖而考其實粲然如指諸掌也此成周盛時大司徒佐王安擾邦國之首務小史掌邦國之志奠繫世辨昭穆鄭𤣥曰志謂記也春秋所謂周志國語所謂鄭書之屬是也繫世則帝繫世本之屬也王昭禹曰父謂之昭子謂之穆父子相代謂之世世之所出謂之繫奠繫世以知其本所出辨昭穆以知其世序凡此皆有書小史則定而辨之臣按古者封建之制行分土列爵各有分地各有分民而在其邦國者亦各有其國之私書所謂志者是也志雖作於侯國而籍則掌於王官其事之大者在奠繫世辨昭穆焉後世封建之制廢仕者無世官無分地然魏晉以來官有簿狀家有譜系官之選舉必繇於簿狀家之婚姻必繇於譜系歴代竝有圖譜局置郎令史以掌之仍用博通古今之儒知撰譜事凡百官族姓之有家狀者則上之官為考定詳實藏於祕閣副在左戸若私書有濫則糾之以官籍官籍不及則稽之以私書所以人尚譜牒之學家藏譜系之書自五代以來其書散佚不傳非獨無官秘閣左戸之藏而士大夫能通譜牒之學者蓋亦鮮矣今制惟勲臣武胄有世官者襲替之際具其宗圖藏在所司而文臣之初應舉入官者亦一具家狀旣仕之後不復究矣此亦一缺典也外史掌書外令掌四方之志記也掌三皇五帝之書掌逹書名于四方若以書使于四方則書其令鄭𤣥曰外令王令下畿外也四方之志若晉之乗楚之檮杌魯之春秋三皇五帝之書所謂三墳五典也王昭禹曰掌四方之志則下以知風俗之所向三皇五帝之書則上以考古昔之所行臣按孔安國曰伏羲神農皇帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜者皆聚此書也今外史所掌者四方之志其九丘之類也三皇五帝之書即所謂三墳五典也逹其名于四方使天下之人皆知有此書也今世天下郡縣皆有圖經地志藏其副於學校而總収於禮部藏于内閣朝廷又頒五經四書於天下學校使校官掌之亦周官外史之遺意也職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害王昭禹曰大司徒掌建邦之土地之圖以天下之圖知九州之地域廣輪之數則其所掌者特圖而已職方氏掌天下之圖以掌天下之地則其所掌典非特圖也又掌其地焉邦國諸侯之國也都鄙邦國之采邑也自邦國都鄙至於蠻夷閩貉戎狄雖有内外之殊然先王之政一視而同仁其人民之所聚財用之所出九榖之所生六畜之所産其數要不可以不辨也其利害不可以不知也數則列而計之也要則總而計之也利則凡可以利人者也害則凡可以害人者也周知其利害則將以興其利而除其害也臣按先儒謂掌天下之地圖而𨽻於司馬謹之也戰國策士每言窺周室則可以按圖籍爭天下漢大將軍王鳯亦云太史公書有地形阨塞不宜在諸侯王然則古人圖志雖司徒營之即藏之司馬祕不得見所以弭盜而防患也蕭何入秦獨収圖籍自漢掌之司空浸以泄露當時如淮南諸王皆按輿地圖謀變以此知古人之慮逺矣觀此說則知古人重圖籍有如此者唐人設兵部屬有四一曰職方部我朝因之職方所掌者兵戎邊防之政而沿邊圖本實在焉但不若周人悉掌天下之地云爾左傳昭公十二年楚子狩于州來左史倚相趨過王曰是良史也是能讀三墳五典八索九丘孔安國曰伏羲始畫八卦造書契以代結繩之政繇是文籍生焉伏羲神農黄帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也至于夏商周之書雖設敎不倫雅誥奥義其歸一揆是故歴代寳之以為大訓八卦之說謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也程頤曰所謂大道若性與天道之說聖人豈得而去之哉若言隂陽四時七政五行之道亦必至要之理非如後世之繁衍末術也固亦常道聖人所不去也或者所謂羲農之書乃後人稱述當時之事失其義理如許行為神農之言及隂陽權變醫方稱黄帝之說耳此聖人所以去之也五典既皆常道又去其三蓋上古雖已有文字而制立法度為治有迹得以紀載有史官以識其事自堯始耳臣按三墳五典之說始見於此孔安國謂此即上世帝王遺書則是書之來也久矣周禮外史掌三皇五帝之書此書之掌於朝廷官職者也楚左史倚相能讀三墳五典八索九丘此書之傳於學士大夫者也今三皇五帝之書存於世者惟堯舜二典其他如九頭五龍攝提等十紀其說荒誕不經其後宋毛漸所得之三墳則又偽妄顯然斷非古昔聖神之舊典也孔子刪書始於堯舜所以為萬世法者皆日用常行之理萬世帝王為治之大經大法無出此者矣史記孔子之時周室微而禮樂廢詩書缺追迹三代之禮序書傳上紀唐虞之際下至秦繆古者詩三千餘篇孔子去其重取其可施於禮義上采契后稷中述殷周之盛至幽厲之缺三百五篇孔子皆弦歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六藝孔子晩而喜易序彖繫象說卦文言孔子以詩書禮樂教子弟蓋三千焉身通六藝者七十有二人魯哀公十四年春狩大野叔孫氏車子鉏商獲獸以為不祥仲尼視之曰麟也取之曰河不出圖雒不出書吾已矣夫乃因史記作春秋上至隱公下訖哀公十四年孔安國曰孔子生於周末覩史籍之繁文懼覽者之不一遂乃定禮樂明舊章刪詩為三百篇約史記而脩春秋贊易道以黜八索述職方以除九丘討論墳典斷自唐虞以下訖于周朱熹曰孔子刪詩書定禮樂脩春秋贊周易皆傳先王之舊臣按萬世儒道宗於孔子天下書籍本於六經六經者萬世經典之祖也為學而不本於六經非正學立言而不祖於六經非雅言施治而不本於六經非善治是以自古帝王欲繼天而建極闡道以為治莫不崇尚孔子焉所謂崇尚之者非謂加其封號優其祀典復其子孫也明六經之文使其義之不舛正六經之義使其道之不悖行六經之道使其言之不虗夫然斯謂崇尚孔子也已秦始皇三十四年燒詩書百家語臣按秦無道之罪十數如壊井田刑三族坑儒生罪妖言之類然皆一時之事也繼其後者茍一旦興改革起廢之心其弊端可撤而去其墜緒可尋而理也若夫詩書百家語皆自古聖帝明王賢人君子精神心術之微道德文章之懿行義事功之大建置議論之詳所以闡明已往而埀示將來者固非一人之事亦非一日可成累千百人之見積千萬年之久而後備具者也乃以一人之私快一時之意付之烈焰使之散為飛煙蕩為寒灰以貽千萬世無窮之恨嗚呼秦之罪上通於天矣始皇李斯所以為萬世之罪人歟漢書藝文志序曰昔仲尼没而微言絶七十子喪而大義乖戰國縱横真偽分爭諸子之言紛然殽雜也亂至秦患之乃燔滅文章以愚黔首漢興改秦之敗大收篇籍廣開獻書之路迄孝武世書缺簡脫禮壞樂崩聖上喟然而稱曰朕甚閔焉於是建藏書之筞置寫書之官下及諸子傳說皆充秘府至成帝時以書頗散亡使謁者陳農求遺書於天下詔光禄大夫劉向校諸經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技每一書已畢也向輙條其篇目撮其指意錄而奏之會向卒哀帝復使向子歆卒父業歆於是總羣書而奏其七略故有輯與集同略謂諸書之總要有六藝略六藝六經也有諸子略有詩賦略有兵書略有術數略有方技略臣按此前漢藏書之始末夫自唐虞三代之書至于孔子而備歴春秋戰國之世至于嬴秦而缺漢高祖時戰爭未息文景時謙讓未遑武帝者出始開獻書之路建藏書之筞置寫書之官至于成帝又遣求書之使命挍書之官哀帝又命官以輯其略焉夫獻書之路不開則民間有書無繇上逹藏書之筞不建則官府有書易至散失欲藏書而無寫之者則其傳不多既寫書而無挍之者則其文易訛既挍之矣茍不各以類聚而目分之則其於檢閱考究者無綂矣後世人主有志於道藝而畱心於載籍者尚當以漢世諸帝為法成帝河平三年上以中秘書頗散亡使謁者陳農求遺書於天下詔光禄大夫劉向挍之臣按漢以來遣使求書始此夫自秦人焚書之後書籍散亡多矣漢興始収之開獻書路置寫書官興藏書府稍稍復集至成帝世又頗散失乃遣謁者求遺書於天下嗚呼書之在天下乃自古聖帝明王精神心術之所寓天地古今生人物類義理政治之所存今世賴之以知古後世賴之以知今者也其述作日多卷帙浩繁難於聚而易於散失茍非在位者收藏之謹而購訪之勤安能免於䘮失哉不幸而有所䘮失明君良佐咸以斯文興䘮為念設法招求遣使蒐采懸賞以購之授官以酬之使其長畱天地間永為世鑒以毋貽後時之悔豈不韙歟光武中興篤好文雅明章繼軌尤重經術四方鴻生鉅儒負帙自逺至者不可勝筭石室蘭臺彌以充積又於東觀及仁壽閣集新書校書郎班固傅毅等典掌焉竝依七略而為書部明帝幸三雍禮畢帝正坐自講諸儒執經問難於前建初中大會諸儒於白虎觀考詳同異連月乃罷肅宗親臨稱制監决如石渠故事初光武遷還洛陽其經牒秘書載之二千餘兩自此以後參倍於前及董卓移都之際吏民擾亂自辟雍東觀蘭臺石室宣明鴻都諸藏典筞文章競共剖散其縑帛圖書大則連為帷蓋小乃制為縢囊及王允所収而西者裁七十餘乘道路艱遠復棄其半矣後長安之亂一時焚蕩莫不泯盡焉臣按此後漢書籍之始末書籍自經秦火之後固已無復先王盛時之舊漢興多方求之至哀帝時劉歆總羣書著七略大凡三萬三千九十卷有禁中外臺之别又有太常太史中祕之殊古書漸漸出也不幸遭王莽之亂焚燒無遺蓋秦火之燒有意而燒其禍繇於君也漢火之燒無意而燒其禍繇於民也嗚呼書籍之在世猶天之有日月也天無日月天之道廢矣世無書籍人之事泯矣何辜於天而徃徃遭焚燒之禍哉迨夫光武中興篤好文雅明章繼軌尤重經術古書次第復出藏之辟雍東觀蘭臺石室宣明鴻都非一所也不幸又有董卓之亂焚蕩泯盡魏氏代漢采掇遺亡分為甲乙丙丁四部合二萬九千九百四十五卷晉惠之世靡有孑遺東晉鳩聚其見存者但為三千一十四卷而已宋之書目凡萬五千七百四卷齊之書目凡萬八千一十卷梁之多至二萬三千一百六卷隋之多至三萬七千餘卷隋文帝開皇三年秘書監牛𢎞表請分遣使人搜討異本每書一卷賞絹一疋校寫既定本即歸主於是民間異書徃徃間出臣按牛𢎞上表請開獻書之路謂經籍自周衰孔子刪述之後凡有五厄秦人吞六國墳籍掃地一厄也王莽之末竝從焚燼二厄也獻帝移都西京燔蕩三厄也晉世劉石憑陵從而失墜四厄也侯景破梁悉送荆州周師入郢焚之外城五厄也自仲尼迄今數遭五厄興集之期屬膺隋代今秘藏見書亦足披覽但一時載籍須令大備不可王府所無私家乃有若猥發明詔兼開購賞則異典必至觀閣斯積文帝納之使人搜討於是民間異書徃徃間出臣竊以為自隋之後唐有祿山黄巢之亂極而至於五代之季宋有女真䝉古之禍極而至于至正之末其為厄也又不止五矣大凡天下萬事萬物禍亂之時雖或蕩廢然一旦治平皆可稍稍復舊惟所謂書籍者出於一人之心各為一家之言言人人殊其理雖同而其所以為言者則未必同其間闡義理著世變紀事蹟莫不各極其至皆有所取一有失焉則不可復雖復之亦非其真與全矣是以古先聖王莫不致謹於斯以為今之所以知昔後之所以知今者之具珍藏而愛䕶之惟恐其捐失也講究而校正之惟恐其訛舛也既有者恒恐其或失未有者惟恐其弗得雖以偏安尚武衰亂之世莫不知所愛重矧重熙累洽之世好文願治之君哉唐分書為四類曰經史子集而藏書之盛莫盛於開元其著錄者五萬三千九百一十五卷而唐之學者自為之書者又二萬八千四百六十九卷初隋嘉則殿書三十七萬卷至武德初有書八萬卷重復相揉貞觀中魏徵虞世南顔師古繼為祕書監請購天下書選五品以上子孫工書者為書手繕寫藏於内庫𤣥宗命馬懐素為脩圖書使與褚無量整比尋置脩書院其後大明宫光順門外東都明福門外皆創集賢書院學士通籍出入既而太府月給麻紙五千番季給墨三百三十六丸歲給兔千五百皮為筆材兩都各聚書四部以甲乙丙丁為次列經史子集四庫其本有正有副安禄山之亂尺簡不藏元載為相奏以千錢購書一卷又命拾遺苖發等使江淮括訪至文宗時鄭覃侍講進言經籍未備因詔祕閣搜採於是四庫之書復完分藏于十二庫黄巢之亂存者蓋尠歐陽脩曰自六經焚於秦而復出於漢其師傳之道中絶而簡編脫亂訛缺學者莫得其本真於是諸儒章句之學興焉其後傳註箋解義疏之流轉相講述而聖道粗明然其為說固已不勝其繁矣至於上古三皇五帝以來世次國家興滅終始僭竊偽亂史官備矣而傳記小說外暨方言地理職官氏族皆出於史官之流也自孔子在時方脩明聖經以絀繆異而老子著書論道德接乎同衰戰國遊談放蕩之士田駢慎到列莊之徒各極其辯而孟軻荀卿始專脩孔氏以折異端然諸子之論各成一家自前世皆存而不絶也夫王迹熄而詩亡離騷作而文辭之士興歴代盛衰文章與時高下然其變態百出不可窮極何其多也嗚呼六經之道簡嚴易直而天人備故其愈久而益明其餘作者衆矣質之聖人或離或合然其精深宏博各盡其術而怪竒偉麗徃徃震發於其間此所以使好竒博愛者不能忘也然凋零磨滅亦不可勝數豈其文華少實不足以行逺歟而俚言俗說猥有存者亦其有幸不幸者歟臣按此有唐一代藏書之本末臣甞謂天下之物雖空青水碧物外之竒寳既失之皆可復得也惟經籍在天地間為生人之元氣紀徃古而示來今不可一旦無焉者無之則生人貿貿然如在㝠途中行矣其所關係豈小小哉民庶之家遷徙不常好尚不一既不能有所収儲所賴石渠延閣之中儲積之多収藏之密扃鑰之固藏貯者有掌固之官闕畧者有繕寫之吏損壞者有脩補之工散失者有購訪之令然後不至於浥爛散落爾前代藏書之多有至三十七萬卷者今内閣所藏不能什一多歴年所在内者未聞有所稽考在外者未聞有所購求臣恐數十年之後日漸損耗其所關係非止一代一時之事而已也伏望聖明為千萬年之遠圖母使後世志藝文者以書籍散失之咎歸焉不勝干萬世斯文之幸五代後唐荘宗同光中募民獻書及三百卷授以試銜其選調之官每百卷減一選明宗長興三年初定國子監校定九經雕印賣之胡寅曰有天下國家必以經術示教不意五季干戈擾攘之時而知所先務可不謂賢乎然命國子監以木本行以一文義去舛訛使人不迷於所習善矣頒之可也鬻之非也或曰天下學者甚衆安得人人而頒之曰以監本為正俾郡邑皆傳刋焉何患於不給國家浮費不可勝計而獨靳於此哉葉夢得曰唐以前書籍皆寫本人以藏書為貴精於讐對故往往皆有善本學者以傳錄之艱故其讀誦亦精詳五代時馮道始奏請官鏤板印行宋淳化中復以史記前後漢付有司摹印自是書籍刋鏤者益多士大夫不復以藏書為意學者易於得書其誦讀亦因滅裂然板本多不是正不無訛誤世既一以板本為正而藏本日亡其訛謬者遂不可正臣按後世雕印書籍始于此夫自有板本以來學者易於得書不必假借購求鈔寫傳錄而得以誦習考閱誠莫大之利也然書肆刻本徃徃承訛襲舛有誤學者乞命翰林儒臣將九經十九史及諸儒先所著述有補於正道名教者嚴加校正字畫行款必須正當歸一命工鋟梓藏於國子監付典籍掌之遇天下板本有缺文疑義咸來取正是亦一道德以同文之一端也然臣於此又有一見今世學校所誦讀人家所収積者皆宋以後之五經唐以前之註疏講學者不復習好書者不復藏尚幸十三經註疏板本尚存於福州府學好學之士猶得以考見秦漢以來諸儒之說臣願特敕福建提學憲臣時加整葺使無損失亦存古之一事也餘如儀禮經傳通解等書刻板在南監者亦宜時為備補周世宗以史館書籍尚少銳意求訪凡獻書者悉加優賜以誘致之而民間之書傳寫舛誤乃選常參官三十人校讐刋正令於卷末署其名銜焉臣按周世宗當五代擾攘之際尚畱心文事如此況當承平之世而經籍圖書乃其祖宗所貽畱者手澤沾溉所存忍使之散軼不全乎館閣職清務簡不預他務宜委之校讐刋正俾於毎卷之末署其名銜有不究心者坐以曠官之罪宋初有書萬餘卷其後削平諸國収其圖籍及下詔遣使購求散亡三館之書稍復增益太宗始建崇文院而徙三館之書以實之又分三館書萬餘卷别為書庫名曰秘閣真宗時命三館寫四部書二本置龍圖閣及太清樓而玉宸殿四門殿亦各有書萬餘卷已而王宫火延及崇文秘閣書多煨燼其僅存者遷于右掖門外謂之崇文外院命重寫書籍選官詳覆校勘掌以參知政事一人領之仁宗既新作崇文院命學士張觀等編四庫書倣開元四部錄為崇文總目書凡三萬六百六十九卷神宗改崇文院為秘書省徽宗更崇文總目為秘書總目詔購求士民藏書其有所秘未見之書足備觀采者仍命以官且以三館書多逸遺命建局以補全校正為名設官總理募工繕寫自熙寜以來搜訪補葺至是為盛矣始太祖太宗真宗三朝次仁英兩朝至仁哲徽欽四朝最具當時之目為部六千七百有五為卷七萬三千八百七十有七焉迨夫靖康之難而宣和館閣之儲蕩然靡遺高宗駐蹕臨安乃建秘書省於國史院之右搜訪遺闕屢優獻書之賞於是四方之藏稍稍復出而館閣編輯日益富矣當時類次書目得四萬四千四百八十六卷至寜宗時又得一萬四千九百四十三卷視崇文總目又有加焉史臣曰易曰觀乎天文以察時變觀乎人文以化成天下文之有關於世運尚矣然書契以來文字多而世道日降秦火而後文字多而世教日興其故何哉蓋世道升降人心習俗之致然非徒文字之所為也然去古既逺茍無斯文以範防之則愈趨而愈下矣故繇秦而降毎以斯文之盛衰占斯世之治忽焉宋有天下先後三百餘年考其治化之汙隆風氣之離合雖不足以擬倫三代然其時君汲汲於道藝輔治之臣莫不以經術為先務學士縉紳先生談道德性命之學不絶於口豈不彬彬乎進於周之文哉宋之不競或以為文盛之弊遂歸咎焉此以功利為言未必知道者之論也自南渡之後迄於終祚國歩艱難軍旅之事日不暇給而君臣上下未甞頃刻不以文學為務大而朝廷微而草野其所製作講說紀述賦詠動成卷帙絫而數之有非前代之所及也雖其間鈲裂大道疣贅聖模幽怪恍惚𤨏碎支離有所不免然而瑕瑜相形雅鄭各趣譬之萬𣲖歸海四瀆可分繁星麗天五緯可識求約於博則有要存焉臣按此有宋一代藏書之始末太宗太平興國九年詔曰國家宣明憲度恢張政治敦崇儒術啓迪化源國典朝章咸從振舉遺編墜簡當務詢求眷言經濟無以加此宜令三館以開元四部書目閱館中所闕者具列其名詔中外購募有以亡書來上及三百卷者當議甄錄酬奬餘第卷帙之數等級優賜不願送官者借本寫畢還之仁宗嘉祐中詔曰國初承五代之後簡編散落三館聚書僅纔萬卷其後平定列國先収圖籍亦甞分遣使人屢下詔命訪募異本校定篇目聽政之暇無廢覽觀然比開元遺逸尚衆宜加購賞以廣獻書中外士庶竝許上館閣闕書卷支絹一匹五百卷與文資官臣按宋朝以文為治而於書籍一事尤切用心歴世相承率加崇尚屢下詔書搜訪遺書或給以賞或賜以官凡可以得書者無不畱意然猶慮其或有非常之變每卷皆有副本分貯各所是以真宗之時崇文秘閣之災而猶存太清樓之儲徽宗設官提舉募工繕寫一置宣和殿一置太清樓一置秘閣其寓意深矣我朝不專設館閣官凡前代所謂省監皆歸於翰林院翰林院專設官以司經籍圖書名曰典籍凡國家所有古今載籍皆在所掌又於國子監設典籍一員司凡大學所有經籍及板本之屬臣考唐人謂人之博學者曰行秘書而宋人之評詩者亦曰胸中無國子監不可讀杜詩而書史之有訛舛者必挍正之以監本則此二者乃自古藏貯經籍之所我朝館閣之職凡前代所謂集賢院崇文院秘書省秘閣皆不復置官惟於翰林太學置此官二員今翰林院秘藏皆在文淵閣其典籍固有所職掌惟兩京太學典籍幾於虛設臣聞永樂中太宗皇帝肇建北京敕翰林院凡南京文淵閣所貯古今一切書籍自一部至有百部以上各取一部送京餘悉封識収貯如故則是兩京皆有儲書也夫天下書籍盡歸内府其人家所有者蓋亦無多其間多有人家所無者今幸其猶存於此萬一有所疎失則永絶矣可不惜哉今幸國家無事政天子崇儒右文之時忍使古昔聖賢乖世立教之言載道為治之具傳之數千百年者一旦不幸或有意外之變乃至於今而泯盡豈不貽千古之永歎哉臣請敕内閣儒臣將南北兩京文淵閣所藏書籍凡有副本於南京内閣及兩監各分貯一本其無者將本書發下兩監敕祭酒司業行取監生鈔録給與人匠紙筆責令各堂教官挍對不限年月陸續付本監典籍掌管如此則一書而有數本藏貯又有異所永無疎失之虞矣神宗元豐三年改官制以崇文院為秘書省刋寫分貯集賢院史館昭文館秘閣經籍圖書以秘書郎主之編集挍定正其脫誤則挍書郎正字主之歲於仲夏曝書則給酒食費諫官御史侍制以上官畢赴臣按宋有館閣之職以司經籍圖書秘書郎職掌収貯葺理挍書郎正字職在編輯挍定今制不設館閤併其職於翰林院夫以專官則無專任臣請於典籍之外其脩撰編脩檢討皆以編輯挍定之任專委其人而責其成功每歲三伏㑹官曝書如宋制因閱其數如此則葺理有官而編簡不至於脫誤考挍有人而文義不至於訛舛考閱有時而載籍不至於散亡矣徽宗大觀四年秘書監何志同奏慶厯間甞命儒臣集四庫秘藏叙次為籍名之曰崇文總目其書之總凡三萬六百六十九卷今一館所藏善否相揉號為全本者不過二萬餘卷而脫簡斷編亡散闕逸之數亦如之宜及今有所搜採視慶厯舊録及總目之外别有異書竝許借傳從之臣按何志同言及今有所搜採視慶厯舊録及總目之外别有異書竝許傳借蓋欲將館閣中書目録出示中外凡目中所無有者借傳以廣其藏也此事關係甚大非惟一時事蓋萬世之事也以上圖籍之儲臣按人君為治之道非一端然皆一世一時之事惟夫所謂經籍圖書者乃萬年百世之事焉蓋以前人所以敷遺乎後者凡歴幾千百年而後至於我而我今日不有以脩輯而整比之使其至我今日而廢墜放失焉後之人推厥所繇豈不歸其咎於我之今日哉是以聖帝明王所以繼天而子民者任萬世世道之責於己莫不以是為先務焉我太祖高皇帝肇造之初庶務草創日不暇給而首先求遺書於至正丙午之秋是時猶未登寳位也嗚呼大聖人所見所為自與其他帝王不同其所以為聖子神孫之詒謀者至矣踐其阼而承其綂者可不思所以體其心而繼述其事者乎大學衍義補卷九十四
