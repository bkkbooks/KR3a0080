body:
  text: 大學衍義補卷七十八明丘濬撰治國平天下之要崇教化一道徳以同俗易象曰天與火同人君子以類族辨物程頥曰火與天同故為同人之義君子觀同人之象而以類族辨物各以其類族辨物之同異也若君子小人之黨善惡是非之理物情之離合事理之異同凡異同者君子能辨明之故處物不失其方也朱熹曰天在上而火炎上上聲其性同也類族辨物所以審異而致同也臣按天下之事理有同有異同則一異則二惟有以一其二然後有以合其異而同焉是故理出於天而具於人者為道為徳為事事在天下者有族有物族以類而聚物以羣而分其聚也各以其類而合其分也各以其形而殊茍非在上者一之以道徳安能使其合者不茍於同而殊者不終於異哉合者不茍於同殊者不終於異則咸為道徳之歸此人所以無異心家所以無殊俗國所以無異政也天無不覆而火上於天故明之所及者廣於凡天之所覆者無不照燭蕩蕩乎四海九州同一文明之化也詩序曰王道衰禮義廢政敎失國異政家殊俗朱熹曰天子不能綂諸侯故國國自為政諸侯不能綂大夫故家家自為俗也臣按國國自為政家家自為俗者由道徳之不一也道徳之所以不一者由乎王道衰而禮義廢政敎失也使文武之君常存而道徳之敎不息禮義興行政敎不失上焉而君有所依據以為治中焉而臣有所持循而輔治下焉而民莫不守其制而不敢易遵其化而不能違如此則億兆家如一家千百國如一國千萬世如一世矣王制天子無事與諸侯相見曰朝考禮正刑一徳以尊于天子陳祥道曰考禮所以杜其僭僻正刑所以防其滛暴一徳所以同其趣向如此則禮刑一而無異政之國道徳一而無異敎之民此尊天子之道也臣按禮刑出於上而行於下諸侯當無事之時而行來朝之禮則稽考其禮之行於侯國者恐其或有所違僭者乎違僭則亟改之質正其刑之用於侯國者恐其或有所偏枉者乎偏枉則亟正之若夫徳之為徳則上下之所同得者也上本是徳以為政敎而侯國之政敎亦必率而行之茍有異同焉則非一矣故必一之使上之所行下之所遵同一天理之公人道之正也如是則是能尊崇天子之命矣司徒一道徳以同俗鄭𤣥曰道徳一則俗之習尚不各道其所道以為道不各徳其所徳以為徳所謂同之也方慤曰道人所共由徳人所同得其可以二乎一道徳而使之無異習故曰同俗臣按天地之生人也雖同一其天而各異其地惟其地之異是以所習者不能無異焉此其所以有異俗也聖人居天子之位宅中以圖治必反其習之異以歸之同焉則國不異政家不殊俗矣何也盖蚩蚩之民所生於地者其氣雖異而所禀於天者其理則同彼以其氣之偏而異其趣向吾則本天地之正氣人心之正道抑其偏而返之正合其異而歸之同使天下之人同其趣向而無彼疆此界之殊是豈别為一種巧妙之法出於其性分之外哉無非因其固有之理使復其初而已是故天生人而與之以性人所共由者謂之道人所同得者謂之徳各由其所由自以為宜各得其所得自以為是而不知其所由者非所當由其所得者非所當得人人各是其所是而不知其為非此天下之俗所以紛紛不同也聖人在上則設為學校建立師儒本義理以為敎條著經書以為敎法必則古昔必稱先王必明聖人之道諄諄然而播告之脩切切然而申明其義使天下之人咸知道出於天而行於人徳本於道而得於己同一降衷之理同一秉彛之天敢有非吾之道而道其所道非吾之徳而徳其所徳則政令之所必禁刑罰之所必加也如此則營東邠西越南冀北地不同而皆同其天人雖異而不異其行風俗豈有異同者哉吾見人人同其所行家家同其所習處處同其所尚矣風俗豈有不同者哉然則風俗所以同者夫豈無其故哉上文有曰脩六禮以節民性明七敎以興民徳齊八政以防淫六禮冠婚喪祭鄉相見七敎父子兄弟夫婦君臣長幼朋友賔客八政飲食衣服事為異别度量數制吾脩吾之禮則凡吾人自幼而長自老而死皆有所據依以慎終追逺㑹合交接而彼禱禳追薦髠首絶類者自不為矣吾明吾之敎則凡吾人由親而疎由内而外皆有所聫比以尊尊親親長長幼幼而彼假合私昵反倫悖道者自不行矣禮脩而敎明則道徳一矣然其散見於人為者一有過焉則有以悖禮而傷敎而道徳不能保其久而不變矣故又有八政以齊之焉是故異服異言者有禁竒技滛巧者有誅百工技藝皆有常業而不敢習為異端日用器械皆有定制而不敢作為邪異尺度權量長短大小必同物數布幅多寡廣狹必定如是則若逺若近曰大曰小皆不敢立異改常均齊方正咸惟道徳之歸此天下風俗所以常同也歟子曰攻乎異端斯害也已范祖禹曰攻專治也故治木石金玉之工曰攻異端非聖人之道而别為一端如楊墨是也其率天下至於無父無君專治而欲精之為害甚矣程頥曰佛氏之言比之楊墨尤為近理所以其害尤甚學者當如滛聲美色以逺之不爾則駸駸然入於其中矣史伯璿曰專治而欲精之言精於其學便有此害非謂精之而更加工巧方有此害佛氏之學能棄君父滅綱常立敎之初便有此害也何基曰人之所以攻治異端之說者其錮蔽之􅀷者固無足論其間有髙明賢智之士而亦學之者不過謂彼有所短亦有所長吾但取其所長而去其所短而不知本領既非所謂善者非真善攻而治之䧟溺益深為害滋甚故夫子斷以一言曰斯害也已而程子又謂其近理者為害益甚尤當逺之是皆聖賢推救焚拯溺之心援學者於顛㝠之地其為人切矣臣按風俗之所以不同者以道徳之不一也道徳之所以不一者以異端道其所道徳其所徳故也戰國之時異端之大者在楊墨秦漢以來異端之大者在佛老必欲天下之風俗皆同而道徳無不一非絶去異端之敎不可也然在孟子則闢楊墨在韓歐程朱則闢佛老然而終莫如之何者非獨不能人其人火其書廬其居也非謂嘗去矣而復大集攻之暫破而愈堅撲之未滅而愈熾也盖彼之所以盛行者非彼立法之善也亦非為彼之人之能也彼窺吾之所有者而盜之吾失之而彼得之吾非獨不知彼竊吾之所有往往訐其所短而較以是非謂彼之所為者近是於吾而非噫抑孰知彼之所以為我害者即我之所固有者哉夫擥取人之物而竊用之宜其近是而非也彼之羣居而聚食竊吾學校養士之禮也彼之誦經而說法竊吾絃誦敎士之禮也彼之祈禳竊吾祭薦之禮也彼之追薦竊吾殯虞之禮也吾用其真者則彼贋者自不售矣昔晏子之於權臣僭竊曰惟禮可以己之臣於異端亦云夫禮之在天下不可一日無者禮行則道徳一矣道徳一則風俗同矣盖道徳其理也而禮則其禮之有節文而見於事而可行者也是故吾有學校以養士非學校不得以聚徒吾有經術以敎人非經術不得以駕說有禮以祭神非其鬼則不許祭有具以送終非得為則不許用如是則彼之敎吾之人非獨不敢為且不暇為而亦不屑為矣道徳其有不一風俗其有不同也哉漢董仲舒言於武帝曰春秋大一綂者天地之常經古今之大誼也今師異道人異論百家殊方指意不同是以上亡以持一綂法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪僻之說滅息然後綂紀可一而法度可明民知所從矣天子善其對以仲舒為江都相丞相衛綰因奏所舉賢良或治申韓蘇張之言亂國政者請皆罷奏可臣按為治之道二政與敎而已政有紀綱敎有樞要為政而振其紀綱為敎而撮其樞要治道張矣夫以四海之大兆民至衆人各一心心各一見人人有意欲行其私茍非上之人撮其樞要總攝而整齊之使一其歸人人必濟其所欲物物必遂其所私事事必行其所見天下何由而綂於一也聖人有見於此所以有一道徳之說焉然道徳之體一而已矣而其為用則不一焉人各其心心各其見自皆以為道徳也然皆似是而非是故以非為是者滔滔皆是也習申韓者以申韓為道徳習楊墨者以楊墨為道徳習蘇張者以蘇張為道徳習佛老者以佛老為道徳紛紛籍籍各以其所道徳者以為道徳其與學孔孟者之於孔孟之道徳若無以異也彼各是其是而非人之非非上之人示之以真是而明其所以為非彼安肯非己之所是而是人之所非哉武帝即位之初首舉賢良方正即得董仲舒之真儒者仲舒首以是為言而丞相衛綰又以為奏於是罷黜百家而世之學者因是而知尊孔氏之道自後建太學立博士明經術使儒者之道大明于天下一洗秦人之陋至今儒道盛行經術大明皆武帝振作之功衛綰奏請之績仲舒發揚之力也嗚呼其有功於世道亦豈細哉宣帝甘露三年詔諸儒論五經異同於石渠閣蕭望之等平奏上親稱制臨决立梁丘易夏侯尚書榖梁春秋博士唐太宗貞觀十四年命國子祭酒孔穎達等譔五經正義雖包貫異家為詳博其間不能無繆冗博士馬嘉運駁正其失有詔更令裁定呂祖謙曰傳註之學漢之諸儒專門名家以至魏晉梁隋全經固失然鄭𤣥王肅之徒其說猶存猶有可見之美自孔穎達集衆家之說為正義後之觀經者但知有正義而諸儒之說無復存矣臣按漢宣帝㑹諸儒於石渠講論五經同異然惟講議之而已未有成書也至唐太宗始命孔穎達㑹諸儒臣譔五經正義是亦一道徳之一端也盖道徳雖具於人心出於天命然不考之聖賢之經傳安知其不以是為非以非為是哉是以自古帝王有志於三代之治者莫不以同風俗為務同風俗者莫不以一道徳為先一道徳者茍不質正於聖賢之言何以知其所以然之故與其所當然之則而施行之哉雖欲道徳之一不可得也聖賢之言具載經傳不有以表章而發明之上之人何以為據下之人有不信者矣是以帝王欲一道徳以同風俗往往留意於經籍而命諸儒考正而㑹稡之用以頒布天下使家傳而人誦之則凡有是道徳者皆知如是則為道徳不如是則非咸為道徳之歸而風俗醇正而無彼疆此界之殊矣唐太宗有見於此而命孔穎達以考正六經而穎逹不足以承上意而所正者多有繆冗則亦何益之有哉穎達之學雖有可疵而太宗之見則超然出乎後世人君之表可尚也已我太祖開國之先首建學校未幾詔行科舉一以五經四書敎人取士士各專一經而兼治四書太宗又命諸儒輯五經四書性理大全書易主程朱書主蔡氏詩主朱氏春秋主胡氏禮記則用陳澔集說四書之訓則一本朱子集註章句焉夫五經自漢以來專門名家各自開户牖而殊軌轍或泥於訓詁或流於䜟緯至於有宋濂洛闗閩諸儒者出然後經㫖大明于世而我列聖又表章之遂為千古不刋之大典不易之定論是以道徳一而無岐轍之差風俗同而無疆界之别斯世斯民得以見天地之純全識聖賢之至理享帝王之盛治一何幸歟東晉范寗好儒學性質直嘗謂王弼何晏之罪深於桀紂或以為貶之太過寗曰王何滅棄典文幽沉仁義游辭浮說波蕩後生使縉紳之徒翻然改轍以至禮壊樂崩中原傾覆遺風餘俗至今為患桀紂縱暴一時適足以喪身覆國為後世戒豈能回百姓之視聽哉故吾以為一世之禍輕歴代之患重自喪之罪小迷衆之罪大也臣按老莊之說疾世俗之孳孳於利禄而不知所底止故肆為論說欲矯而正之而不自知其言之過也後之人祖其言以為說得其言而不得其所以言故申韓用之以為慘刻王何用之以為浮蕩申韓用而嬴秦亡王何恣而魏晉滅此無他道徳不明於天下立說者各自道徳其道徳而用其說者不知其所謂道徳之非道徳故爾向使明君在位而輔其政者有其人師表立於上義理明於下豈有是哉宋之時道學大明其末流之弊乃有假之說以濟其私一切不事事上之人從而信之遂至於議論多而成功少虚文勝而實效㣲一時士大夫其所崇尚者雖邪正與晉人不同而同歸於亂嗚呼人主之好尚可不慎擇而精察之哉韓愈曰老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂徳徳其所徳非吾所謂徳也凡吾所謂道徳云者合仁與義言之也天下之公言也老子之所謂道徳云者去仁與義言之也一人之私言也周道衰孔子没火于秦黄老于漢佛于晉魏梁隋之間其言道徳仁義者不入于楊則入于墨不入于老則入于佛入于彼必出于此又曰古之為民者四今之為民者六古之敎者處其一今之敎者處其三農之家一而食粟之家六工之家一而用器之家六商之家一而資焉之家六奈之何民不窮且盜也臣按古之民四而其敎一當是之時人無異習士無異學此風俗所以醇厚也盖民分於四各有恒業而衣食易給敎專於一士有定見而趣向不差風俗安得不同自佛老之敎興而民與敎皆增其二議論則此是而彼非風俗則日異而月不同此無他各道其道各徳其徳道徳不一之故也歐陽脩曰佛為夷狄去中國最逺而有佛固已久矣堯舜三代之際王政脩明禮義之敎充於天下於此之時雖有佛無由而入及三代衰王政闕禮義廢後二百餘年而佛至乎中國由是言之佛所以為吾患者乗其闕廢之時而來此其受患之本也補其闕脩其廢使王政明而禮義充雖有佛無所施於吾民矣此亦自然之勢也臣按歐陽脩此言推本之論也然謂之曰此自然之勢也臣則以為此自然之理也豈但勢哉彼佛者去吾中國數萬里其勢無由至中國然其所以導之入吾中國者中國之人也今其法行乎中國餘千年其勢已堅牢不可動搖其言入人心也已深而其像設屋宇在人耳目者已稔熟一旦欲去之其勢誠有不易然者歐陽氏欲吾脩補吾政敎之闕廢者誠反本之論然吾政敎之闕且廢非一日矣一旦復其千年之故非假之十百年不能也十百年之中其君其相豈能皆得卓然不惑者為之哉臣愚以為莫若定為家鄉之禮頒布天下使家家行古禮其勢自衰此則朝令而夕可行也積數十年人皆知吾禮之簡徑而覺彼法之勞攘有損於財無益於事自然廢置而不振英君誼辟有志於扶世敎闢邪說者出於其間舉韓子所謂人人火書廬居之說乗其衰而去之則中國三代道徳之敎禮義之俗頓然復矣脩又言于君曰士之所本在乎六經而自暴秦焚書聖道中絶漢興收拾亡逸所存無幾去聖既逺莫可考證偏學異說因自名家然而授受相傳尚有師法暨晉宋而下師道漸亡至唐為九經正義所載既博所擇不精多引䜟緯之書以相雜亂乞特詔儒臣删去䜟緯之文使學者不為怪異之言所惑亂然後經義純一無所駁雜臣愚以謂欲使士子學古勵行而不本六經欲學六經而不去其詭異欲望功化之成不可得也臣按秦漢以來之六經所以至于今日者實頼孔穎達之正義其刻板尚存於福州府學世之學經者因得以考見古人之訓詁義例而知其名物度數之詳雖其間多駁雜詭異之言如歐陽氏所言者然朱子謂漢魏諸儒正音讀通訓詁考制度辨名物學者茍不先涉其流則亦何以用功於此則其書亦世之不可無者也第欲中心有主而知所擇耳夫自有宋九儒講明經㫖一洗漢唐之陋六經之文如日中天六經之道如水行地三尺童子皆知性之本善而有荀况揚雄之所不及者然揆其所至出口入耳者不過傳習之言而因心考義者雖若有差終有的然之見此古之聖賢其敎人皆引而不發舉一隅不以三隅反則不復者有由然也今五經四書先儒訓釋明白無疑矣學者口誦而心解不復致疑於其間然所謂無疑者豈真無疑哉朱子謂今之學子能言真如鸚鵡盖鸚鵡之言效人聲耳其心未必有所解也宋元之間草澤之儒紛然雜出於所謂五經四書者又各加訓解大意主於立說而不盡以解經其間可取者不過數家其餘皆欲炫竒鬬勝耳解經而炫竒鬬勝其視漢人之專門名家則又益卑矣宜俾學經者專究心於聖經然後及於宋儒之傳一以是為主然後博考漢魏諸儒之訓詁制度名物焉有餘力則旁及於近世諸人之訓說可也乞勅儒學之臣精加考擇以示學者并示以讀經之法必先經而後傳而後及乎諸說則心有定見不為異說之所惑亂矣是乃一道徳之門徑也曾鞏曰古之治天下者一道徳同風俗盖九州之廣萬民之衆千嵗之逺其敎已明其習已成之後所守者一道所傳者一說而已故詩書之文歴世數十作者非一而言未嘗不相為終始化之如此其至也當是之時異行者有誅異言者有禁防之又如此其備也故二帝三王之際及其中間嘗更衰亂而餘澤未熄之時百家衆說未有能出於其間者也及周之末世先王之敎化法度既廢餘澤既熄世之治方術者各得其一偏故人奮其私智家尚其私學者蠭起於中國皆明其所長而昧其所短矜其所得而諱其所失天下之士各自為言而不能相通世之人不復知夫學之有綂道之有歸也臣按百家衆技如耳目口鼻各有所用而不能相通而聖人大學之道則如心君處靈臺之中為百骸之主宰各因其所用者明而通之使之互相為用而底于大成焉如此則學有綂道有歸所守者同一道所傳者同一說矣程顥言于神宗曰治天下以正風俗得賢才為本宋興百餘年而敎化未大醇人情未盡美士人㣲謙退之節鄉閭無㢘耻之行刑雖繁而姦不止官雖冗而材不足者此盖學校之不脩師儒之不尊無以風勸養勵之使然耳古者一道徳以同風俗茍師學不正則道徳何從而一方今人執私見家為異說支離經訓無復綂一道之不明不行乃在於此臣謂宜先禮命近侍賢儒各以類舉及凡執事方岳州縣之吏悉心推訪凡有明先王之道徳業充備足為師表者其次有篤志好學材良行脩者皆以名聞其髙蹈之士朝廷當厚禮延聘其餘命州縣敦遣萃於京師館之寛閒之宇豐其廩餼恤其家之有無以大臣之賢典領其事俾羣儒朝夕相與講明正學其道必本於人倫明乎物理其敎自小學灑掃應對以往脩其孝弟忠信周旋禮樂其所以誘掖激厲漸摩成就之道皆有節序其要在於擇善脩身至於化成天下自鄉人而可以至於聖人之道其學行皆中於是者為成徳又其次取材識明達可進於善者使日受其業稍久則舉其賢傑以備髙任擇其學業大明徳義可尊者為大學之師次以分敎天下之學始自藩府至于列郡擇士之願學民之俊秀者入學漸自大學及州郡之學擇其道業之成可為人師者使敎于縣之學如州郡之制如此則得士浸廣天下風俗將日入醇正王化之本也帝王之道莫尚於此願陛下特留宸意為萬世行之虞集曰明道欲聚賢能於大學而敎之使以分敎天下此誠一道徳以同風俗之成法也臣按程子謂治天下以正風俗得賢才為本臣竊以謂得賢才又正風俗之本必欲得賢才以正風俗而一道徳又其本也道徳不一則人執私見家為異說各道其所道徳其所徳不相綂一矣必欲道徳之一而咸惟中正之歸則又在師道之立焉立師道以脩學校之政俾其掌天下之風化敎天下之人材考正經典講明義理以一人心之趨嚮期於道徳之一風俗之同而後已所以然者非得夫程子所謂明先王之道徳業充備足為師表者曷足以當兹任哉惟我祖宗建學立師敎育人材一以五經四書為敎學之具凡今布列中外者孰非明先王之道之士哉今日班行之中縉紳之列未必無其人也盍加推訪其間有徳行文學聞望素著冠于一時為内外所推重者即僉舉以聞命以師儒之首秩俾之自擇其屬必得如程子所謂篤志好學材良行脩者以充其選而又於大臣中特命一人典領其事如程子所云者授以璽書責以提督作興之任俾其率領羣儒詳立規條一本程子所上劄子以為凖則根據學校所施行者必太祖皇帝所定之學規士子所誦習者必太宗皇帝所頒之書籍參諸古典酌以時制凡夫學校所以誘掖激厲漸摩成就之道節目次第門分條具以為一代敎養之法既行之太學又頒之天下如此則施敎者有成效受敎者有成徳而推其所得以為敎者皆有成法而用之無窮矣要必就其所敎多士之中差其果於行事者用以釐百司之務擇其深於道義者留以為太學之師散其明於經訓者分以掌州縣之敎而州縣受敎之士又以其所受於敎者之敎以卒業於太學以分任於有司以推敎於他人彼此承傳後先授受同此詩書之習同此道徳之歸朝廷之政敎此道此徳也官府之禁令此道此徳也百官之職業此道此徳也學校之功課此道此徳也道徳既一風俗自同立徳者不索隱以行怪行事者不謀利而計功為學者不駕虚而翼偽脩辭者不厭常而喜新居官者不黨同而伐異渾渾乎和平溫厚之天坦坦乎大中至正之域世道至此雖唐虞三代不是過也由是觀之治天下之道莫大於正風俗正風俗之要莫切於一道徳程顥一世大儒言於其君欲其特留宸意為萬世行之臣敢昧死援程顥之言以為九重告朱熹曰異端害正固君子所當闢然須是吾學既明洞見大本達道之全體然後據天理以開有我之私因彼非以察吾之正議論之間彼此交盡而内外之道一以貫之如孟子論養氣而及告子義外之非因夷子而發天理一本之大豈徒攻彼之失而已哉所以推明吾道之極致本原亦可謂無餘蘊矣臣按朱子之言反本之論所謂上䇿莫如自治者也吾惟明吾之道徳則彼所謂非道之道非徳之徳皆因吾之是而見彼之非政不必拘拘然而與之較負勝也吾道既明吾黨既衆則自然所至成俗不日而復三代之舊矣以上一道徳以同俗大學衍義補卷七十八
