body:
  text: 大學衍義補卷一百五十六明丘濬撰治國平天下之要馭外蕃刼誘窮黷之失易師六五田有禽利執言語辭无咎程頥曰師之興必以蠻夷猾夏冦賊姦宄為生民之害不可懐來然後奉辭以誅之若禽獸入于田中侵害稼穡於義宜獵取則獵取之如此而動乃得无咎若輕動以毒天下其咎大矣執言奉辭也明其罪而討之也若秦皇漢武皆窮山林以索禽獸者也非田有禽也朱熹曰六五用師之主柔順而中不為兵端者也敵加於己不得已而應之故為田有禽之象而其占利以摶執而无咎也臣按田有禽利執則禽之不在田者不利執可知也盗賊興於民間戎狄侵於境内此田有禽也若夫未嘗侵吾地而害吾民亦猶禽獸飛翔奔走於山林之中固其所也顧乃恣吾之貪欲恃吾之勢力以獮取之豈所利哉易曰田有禽利執言无咎則禽之不在田非唯不利執執之必有咎可知矣此非獨人事葢天道也復上六迷復㓙有灾眚用行師終有大敗以其國君㓙至于十年不克征象曰迷復之㓙反君道也程頥曰以隂柔居復之終終迷不復者也迷而不復其㓙可知災天災自外來眚已過由自作既迷不復善在己則動皆過失災過亦自外而至葢所招也迷道不復无施而可用以行師則終有大敗以之為國則君之㓙也十年者嵗之終至於十年不克征為終不能行既迷於道何時而可也以其國君㓙謂其反君道也人君居上而治衆當從天下之善乃迷於復反君之道也張栻曰易之爻辭鮮有如是之詳其㐫鮮有如是之極者而獨於復之上六言之葢自古亡家覆國反道敗德无所不在其源起於一念之微不能制遏之爾夫以隂柔之才去本之逺所謂人欲肆而天理滅者故有大敗終㓙之戒也臣按迷而能復則其迷也不終於迷而有遷善之機改過之勇而其蔽也不終於蔽矣若夫昏迷而不復必有天災必有人禍也凡事無不㓙而於行師尤甚故一敗至於塗地則禍延于國災及於民雖至於十年之久天道雖變而國勢猶不能振也智伯好戰而家以之亡隋煬伐遼而國以之覆其源之起葢智瑶好勝而楊廣貪功故也念之迷而不知復反君道之常逆天地之德使其一敗之後迷而能復如漢武帝末年有輪臺之悔其終亦不至於亡矣春秋昭公十有三年晉伐鮮虞故安國曰人之所以為人中國之所以為中國信義而已矣自春秋未世至于六國之秦變詐竝興傾危成俗河決魚爛不可壅而収之皆失信棄義之明騐也左傳隠公四年衆仲曰兵猶火也弗戢將自焚也夫州吁弑其君而虐用其民於是不務令徳而欲以亂成必不免矣臣按弗戢自焚之言用兵者所宜深戒老子曰以道佐人主不以兵強天下其事好還師之所處荆棘生焉大軍之後必有㐫年林希逸曰好戰求勝非國之福臣按老氏好還之戒即曾子所謂出乎爾者反乎爾者也魏文侯問李克曰吳之所以亡者何也李克曰數戰數勝文侯曰數戰數勝國之福也其所以亡何也李克曰數戰則民疲數勝則主驕以驕主御疲民此其所以亡也是故好戰窮兵未有不亡者也臣按戰而數勝用兵者莫强也然而往往至於亡如符堅楊廣者主驕民疲之故也李克之言厥有㫖哉漢文帝時將軍陳武等議曰南越朝鮮自全秦時内屬為臣子後且擁兵阻阨選蠕謂動也觀望髙祖時天下新定未可復興兵今陛下仁惠撫百姓恩澤加海内宜及士民樂用征討逆黨以一封疆孝文曰朕能任衣冠念不到此會吕氏之亂功臣宗室共不羞恥誤居正位常戰戰慄慄恐事之不終且兵㓙器雖克所願動亦耗病謂百姓逺方何又先帝知勞民不可煩故不以為意朕豈自謂能今匈奴内侵軍吏無功邉民父子荷兵日久朕常為動心傷痛無日忘之今未能銷距願且堅邉設候結和通使休寧北陲為功多矣且無議軍臣按文帝此言見於史記律書帝因陳武等請用兵而答之如此且謂其素無心於居位戰戰慄慄恐事之不終兵㐫器雖能如所願動亦耗病今匈奴内侵其心傷痛無日忘之但今未可如意願且堅邉設候結和通使以休寧北陲為功多矣且無議軍文帝此言所謂仁人之言也故帝世百姓無内外之繇得息肩於田畝天下殷富粟至十餘錢鳴鷄吠狗烟火萬里可謂和樂司馬氏載是語於律書之首以見帝天性粹美尚徳化而不務兵戎有制禮作樂之具也武帝元朔二年匈奴入㓂遣衛青擊之取河南地立朔方郡五年遣青率六將軍擊匈奴還以青為大將軍明年又率六將軍擊之元狩二年以霍去病為驃騎將軍擊匈奴敗之過焉耆至祁連山而還四年遣衛青霍去病擊匈奴元封元年帝出長城登單于臺勒兵而還三年遣趙破奴擊樓蘭大初元年遣李廣利擊匈奴胡寅曰武帝意廣欲多窮兵黷武以一馬之故戰師萬里民力殫盡海内嗟怨盗賊羣起富庶之俗至於蕭然釁自䜛人其後大禍延子孫接刄闕下流血盈溝其應慘矣向使遵文景儉約之規明春秋首惡之義自家刑國措世安寧豈有蕭墻之震驚望思之痛悔哉臣按漢武戾太子據以元朔元年生明年即命衛青擊匈奴自是窮兵黷武出塞窮追雖能制勝快意於一時然中國之人民死鋒鏑膏野草亦多矣鳴呼天徳好生而立君以養民四夷入吾境賊吾民不得已驅而出之使吾民不罹其害可也彼不犯吾邉乃無故興兵出塞求而擊之其曲直有在矣武帝好武功武功非殺人不能成帝所以立武功者意欲絶邉患以為子孫計爾殊不知武功既立殺人必多殺人者天必報之不在其身則在其子孫觀武帝卒有太子據之禍可鑒也矣元光二年鴈門馬邑豪聶壹因大行王恢言匈奴初和親親信邉可誘以利伏兵襲擊必破之道也上召問公卿恢曰臣聞前代之時北有強胡之敵内連中國之兵然匈奴不輕侵也今以陛下之威海内為一然匈奴侵盗不已者無它以不恐之故耳臣竊以為擊之便韓安國曰臣聞高皇帝常圍於平城七日不食及解圍反位而無忿怒之心夫聖人以天下為度者也不以己私怒傷天下之公故結和親至今為五世利臣竊以為勿擊便恢曰不然高帝所以不報平城之怨者非力不能所以休天下之心也今邊境數驚士卒傷死中國槥車相望此仁人之所隱也故曰擊之便安國曰不然臣聞人君謀事必就祖發政占古語重作事也用兵者以飽待飢正治以待其亂定舍以待其勞故接兵覆衆伐國墮城常坐而役敵國此聖人之兵也今將卷甲輕舉深入長驅難以為功從行則迫脅衡行則中絶疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也臣故曰勿擊便恢曰不然臣今言擊之者固非發而深入也將順因單于之欲誘而致之邉吾選梟騎隂伏而處以為之備審遮險阻以為其戒吾勢已定或營其左或營其右或當其前或絶其後單于可禽百全必取上從恢議以韓安國李廣王恢為將軍將車騎材官三十餘萬匿馬邑旁谷中隂使聶壹亡入匈奴謂單于曰吾能斬馬邑令丞以城降財物可盡得於是單于穿塞將十萬騎入武州塞未至百餘里見畜布野而無人牧者怪之乃攻亭得鴈門尉史知漢兵所居單于大驚曰吾固疑之乃引兵還漢兵追至塞弗及乃皆罷兵王恢主别從代出擊胡輜重亦不敢出上怒下恢廷尉當恢逗撓當斬恢行千金丞相蚡蚡言於太后曰王恢首為馬邑事今不成而誅恢是為匈奴報讐也大后以告上上曰首為馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部擊單于輜重猶頗可得以􅇺士大夫心今不誅恢無以謝天下於是恢聞乃自殺自是匈奴絶和親攻當路塞胡寅曰武帝雄畧不世出用兵尤其所喜然事未更練而昩於節要豈有匿形致敵覆十餘萬人而不露者乎其不為人所敗也幸矣覆者用兵之竒道也善覆者靡不勝遇覆者靡不敗臣按中國之所以取勝於外國者不獨以威也葢亦有道焉耳彼來犯我我不得已而禦之使彼不得侵我境土害我人民刼我畜産是則帝王之道也今乃設法以誘之誘之為言豈帝王之所務哉誘之以義固非待人之誠况誘之以利乎誘之以利又從而害之市井小人茍有知識者不為也况帝王乎韓安國所言多可取者若帝王以天下為度不以己私傷天下之公若人君謀事必就祖發政占古語重作事也若用兵者以飽待飢正治以待其亂定舎以待其勞此聖人之兵也漢去古未逺其言必有所自云宣帝時欲因匈奴衰弱出兵擊之使不得復擾西域魏相上書諫曰今邊郡困乏父子共犬羊之裘食草萊之實常恐不能自存難以動兵軍旅之後心有㐫年言民以其愁苦之氣傷隂陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選風俗尤薄水旱不時按今年子弟殺父兄妻殺夫者几二百二十二人臣愚以為此非小變也今左右不憂此乃欲發兵報纎介之忿於逺夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之内也胡寅曰魏相之疏止無名之兵弭連兵之禍恐傷隂陽之和以生蕭牆之憂真經國之逺猷宰相之能事也其尤可服者不隱風俗薄惡子弟殺父兄妻殺夫之變直以告君此則賢者或以為難也人之常情喜聞美事而惡聞災禍風俗薄惡而相不自欺其賢矣哉臣按魏相此疏首列義應忿貪驕五兵之名於前而繼之以此且謂不知此名何名殆所謂忿與驕者乎人君觀此其毋急于求勝于人而必先于求勝于己乎求勝于人雖勝猶有後憂求勝于己雖無一時之快亦無異日之憂也靈帝建寧二年詔遣謁者說降漢陽㪚羌段熲以羌雖暫降當復為盗賊不如乘虛放兵勢必殄滅乃分遣兵進擊追至窮山深谷之中處處破之斬其渠師以下萬九千級分置安定漢陽隴西三郡東羌悉平熲凡百八十戰斬三萬八千餘級費用四十四億司焉光曰書稱天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母夫蠻夷戎狄就利避害樂生惡死亦與人同御之得其道則附順服從夫其道則離畔侵擾固其宜也是以先王之政叛則討之服則懷之若乃視之如草木蟲蟻不分臧否不辨去來悉艾殺之豈作民父母之意哉且羌之所以叛者為郡縣所侵寃故也叛而不即誅者將帥非其人故也茍使良將驅而出之塞外擇良吏而牧之則疆場之臣也豈得專以多殺為快哉臣按元后作民父母所謂民者豈止中國之民哉凡天地所覆載具形體有知識者皆吾赤子也聖人一視以同仁兼愛夫内外逺近之民惟恐一人之或失其所茍限區域而為之愛惡於遐外之民必欲勦戮滅絶之豈父母之心哉建寧六年護烏桓校尉夏育上言鮮卑㓂邉請發兵出塞擊之先是䕶羌校尉田晏坐事論刑欲立功自效請中官王甫求得為將乃拜晏為破鮮卑中郎將大臣多不同者乃召百官議蔡邕議曰自匈奴遁逃鮮卑強盛據其故地才力勁健加以關塞不嚴禁網多漏精金良鐡皆為賊有漢人逋逃為之謀主利馬疾過於匈奴今育晏虛計二載自許有成若禍結兵連豈得中休當復徴發轉運無已是為耗竭諸夏并力蠻夷夫邉陲之患手足之疥搔中國之困胸背之瘭疽方今郡縣盗賊尚不能禁况此醜虜而可伏乎天設山河以别内外茍無蹙國内侮之患則可矣豈與蟲嵦之虜校往來之數哉今乃欲以齊民易醜虜皇威辱外夷就如其言猶已危矣况得失不可量邪帝不從遣育出高桞晏出雲中大敗䘮其節傳輜重各將數十騎犇還死者什七八隋煬帝大業六年帝幸突厥啓民可汗帳髙麗使者在啓民所啓民不敢隠與之見帝裴矩説帝曰髙麗漢晉皆為郡縣今乃不臣先帝欲征之久矣今其使者親見啓民舉國從化可因其恐懼脅使入朝帝從之敕牛𢎞宣㫖令使者還語高麗王入朝至是不至乃謀討之課天下富人買馬匹至十萬錢簡閲器仗或有濫惡使者立斬敕幽州總管往東萊海口造船官吏督役晝夜立水中不敢息自腰以下皆生蛆死者什三四又敕河南淮南江南造戎車五萬乘發河南北民夫以供軍需舳艫千里徃來常數十萬人晝夜不絶天下騷動士卒死亡過半畊稼失時穀價踴貴斗米直數百錢重以官吏侵漁百姓窮困於是相聚為盗至是所在蜂起不可勝數攻陷城邑楊𤣥感等乘之而起隋遂以亡胡寅曰煬帝前此下林邑克契丹太破吐谷渾朝赤土服伊吾致高昌降突厥來處羅無不如志此賢主所未必得者而煬帝能之所謂天助不善非祐之也厚其毒而將降之罰耳若使軍師説客於彼七國有摧敗齟齬則遼東之行未必至若是勇也以苻堅善於治國兵威之敵施之江南遂至亡滅又况煬帝乎故天以武功張於前以禍亂蹙於後然後逆賊之獄成而大罰加矣網恢恢而不失可不畏哉葉適曰髙麗本微賤不足論然隋唐之所以興亡節目關係却在此自秦漢以來中國所甚患者不過匈奴始皇時天下新統一秘記言滅秦者胡也於是空國以事胡又為奢侈竒刻以揺動之陳勝吳廣因以為亂漢武帝亦縁累世為匈奴所侵欲乘其富強併力除治天下困弊幾至大亂若高麗則東海一隅之小夷本未嘗為中國之難隋文帝新合天下為一其時突厥已自稽首承順煬帝廵逰親至突厥帳偶因高麗之使在啓民所縁裴矩一言遂成此禍裴矩見天下大勢已合亦欲高麗效朝貢以見其得意而不知大亂之端乃發於此自此天下騷動煬帝親屈萬乘至其國都大合天下兵力以較一城之勝負推理論之無有不敗雖以黄帝之兵無能為也既不能克遂至再伐而天下已亂葢陳勝吳廣所以亂秦者在匈奴而楊𤣥感所以亂隋者在高麗臣按胡葉二人之論胡氏責其君葉氏責其臣其言皆切要後人主欲興兵旅宜以煬帝為戒其臣有所建説者宜以裴矩為戒唐貞觀十七年新羅遣使言百濟與高麗連兵謀絶新羅入朝之路乞兵救援上遣使齎璽書諭之葢蘓文不奉詔使還上曰葢蘇文弑君不可以不討褚遂良曰今中原清晏四夷讋伏陛下之威望大矣乃欲渡海逺征小夷萬一蹉跌傷威損望更興忿兵則安危難測也李世勣曰間者薛延陀入㓂陛下欲發兵窮追用魏徵之言遂失機㑹不然薛延陀無遺類矣上曰然此誠徵之誤朕尋悔之而不欲言恐塞嘉言之路耳遂欲自征高麗遂良復諌曰天下譬猶一身兩京心腹也州縣四肢也四夷身外之物也高麗罪大誠當致討但命一二猛將將四五萬衆取之如反掌耳今太子新立㓜穉諸王陛下所知一旦棄金湯之全踰遼海之險以天下之君輕行逺舉皆臣之所甚憂也羣臣亦多諫者上皆不聴范祖禹曰高麗臣屬於唐而其主為賊臣所弑為大國者不可不討然何至於自征之乎太宗若從遂良之言雖伐而不克未大失也太宗征高麗房𤣥齡疾篤謂諸子曰吾受主上厚恩今天下無事惟東征未已羣臣莫敢諫吾知而不言死有餘責乃上表曰老子曰知足不辱知止不殆陛下威名功徳亦可足矣拓地開疆亦可止矣且陛下每決一重囚必令三覆五奏素膳止樂者重人命也今驅無罪之士卒委之鋒刄之下使之肝腦塗地獨不愍乎向使高麗違失臣節誅之可也侵擾百姓滅之可也它日能為中國患除之可也今無此三條而坐煩中國内為前代雪恥外為新羅報讐豈非所存者小所損者大乎願陛下許高麗自新焚凌波之船罷應募之衆自然華夷慶賴逺肅邇安臣按𤣥齡從太宗起兵間熟知兵戈之害且知道理識事體故其臨終之言懇欵精切如此所引決囚事以明人命至重可謂納約自牖矣𤣥宗天寳六載帝欲使王忠嗣攻吐蕃石堡城忠嗣上言石堡險固吐蕃舉國守之非殺數萬人不能克臣恐所得不如所亡不如厲兵秣馬俟其有釁然後取之帝意不快將軍董延光請行帝命忠嗣分兵助之忠嗣不得已奉詔而不盡如所欲李光弼曰大夫以多殺士卒之故不欲成延光之功雖廹於制書實奪其謀也何以知之今以數萬衆授之而不立重賞士卒安肯為之盡力乎然此天子之意也彼無功必歸罪於大夫大夫何愛數萬叚帛不以杜其䜛口乎忠嗣曰今以數萬之衆争一城得之未足以制敵不得亦無害於國故忠嗣不欲為之忠嗣今受責天子不過以一將軍歸宿衛其次不過黔中上佐忠嗣豈以數萬人之命易一官乎臣按帝王舉事以義理為主使其地本吾物也在吾有可取之義因其釁而取之可也茍非吾之故物而義有所不當取彼雖有釁吾亦不可幸災樂禍出其不意而掩有之况彼本無釁哉天寳十三載劍南李宓擊南詔閤羅鳯誘之深入至太和城閉壁不戰宓粮盡士卒瘴疫饑死什七八乃引還蠻追擊之全軍皆没楊國忠隠其敗更以㨗聞益發中國兵討之前後死者幾二十萬人無敢言者范祖禹曰壅蔽之為害深矣明皇信一楊國忠䘮師二十萬而不知其不亡豈不幸哉國忠欺蔽如此而舉朝亦無一人敢以實告其君者蓋在位皆小人也當是時明皇享國四十餘年自以為萬世之安而不知禍亂將發於朝暮由置相非其人也可不戒哉胡寅曰楊國忠鮮于仲通開南詔之隙喪師幾二十萬高仙芝擊大食喪師三萬安禄山討奚契丹喪師六萬前此楊忠最討反蠻所殺又十一萬夫為天養人者天子之職也將師殺之如此而明皇不知失職乆矣其能免乎臣按伊尹有言一夫不獲時予之辜則是大臣受天子之託而為之養民有一人之不得其所乃其罪也天子享萬民之奉而為之主假有一人死于非命固失其所以受天命為天養民之意而有負於斯民所以奉我者矣况數十萬人之命乎人君宜體天心恒自念曰一夫之生失其所固相君者之罪一人之死非其命豈非君民者之罪乎用是兢兢業業深思逺念非為民而不輕用人之命如此可以永保天命而仁聲洋溢於天下慶澤流衍於萬世矣徳宗時吐蕃尚結贊屢遣使求和上未之許乃卑辭厚禮求和於馬燧燧信其言為之請於朝李晟曰戎狄無信不如擊之張延賞與晟有隙數言和親便上亦素恨回紇欲與吐蕃擊之遂與燧延賞計延賞又言晟不宜乆典兵上乃謂晟曰朕以百姓之故與吐蕃和親决矣大臣既與吐蕃有怨宜留輔朕加晟太尉罷鎮時遣崔幹使吐蕃約和尚結贊請以渾瑊主盟盟于平涼瑊發長安晟深戒之以盟所為備不可不嚴延賞言於上曰晟不欲盟好之成故戒瑊以嚴備我有疑彼之形則彼亦疑我矣盟何由成上乃詔瑊切戒以推誠待虜勿為猜疑瑊奏吐蕃決以辛未盟延賞集百官稱詔示之曰李太尉謂和好必不成今盟日定矣晟聞之泣曰吾生長西陲備諳虜情所以論奏但恥朝廷為犬戎所侮耳上始命駱元光屯潘原韓遊環屯洛口以為瑊援元光謂瑊曰潘原距盟且七十里公有急何從知之請與公俱瑊以詔㫖固止之元光不從與瑊連營相次距盟三十餘里元光濠柵深固瑊濠柵皆可踰也元光伏兵於營西遊環亦遣五百騎伏于其側曰若有變則汝曹西趨柏泉以分其勢將盟尚結贊又請各遣遊騎數十更相覘索瑊許之吐蕃伏精騎數萬於壇西遊騎貫穿唐軍入無禁唐騎入虜軍悉為所擒瑊等皆不知入幕易禮服虜伐皷三聲大譟而至瑊自幕後出偶得他馬乘之伏鬣入其銜馳十里銜方及馬口虜縱兵追擊唐將卒死者數百人副使崔漢衡被擒瑊至其營元光發伏成陳以待之虜騎乃還是日上視朝謂諸相曰今日和戎息兵社稷之福柳渾曰戎狄豺狼也非盟誓可結今日之事臣竊憂之李晟曰誠如渾言上變色曰柳渾書生不知邉計大臣亦為此言邪皆頓首謝是夕韓遊環表言虜刼盟者兵臨近鎮上大驚謂渾曰卿書生乃能料敵如此其審耶上欲出幸大臣諫而止初吐蕃尚結贊惡李晟馬燧渾瑊曰去三人則唐可圖也於是離間李晟因馬遂以求和欲執渾瑊以賣燧使并獲罪因縱兵直犯長安會失渾瑊而止范祖禹曰人君於其所不當疑而疑之則於其所不可信而信之矣此必然之理也李晟之功社稷是頼徳宗猜忌使憂懼不保朝夕至於纔邪之詭計戎狄之甘言則推誠而信之不疑由其心術顛倒見善不明故也延賞以私憾敗國殄民刑孰大焉徳宗曽不致詰使之得保首領死牖下幸矣臣按自春秋以後世之盟者鮮矣徳宗乃聼小人之言而與吐蕃盟雖以百戰功臣如李晟者屢言之而不見聽卒墮外夷之計而為所笑幸而不盡如其計使其計果行則李晟既已為所離間矣而又失渾瑊馬燧而徳宗豈不至於又出幸耶鳴呼柳渾之言藥石也後世謀國者所當深念而以為戒陸䞇言於徳宗曰懐生畏死蠢動之大情慮危求安品物之恒性有天下而子百姓者以天下之欲為欲以百姓之心為心固當遂其所懷去其所畏給其所求使家家自寧人人自遂家茍寧矣國亦同焉人茍遂矣君亦同焉是則好生以及物者乃自生之方施安以及物者乃自安之術擠彼于死地而求此之乆生也從古及今未之有焉措彼于危地而求此之乆安也從古及今亦未之有焉是以昔之聖王知生者人之所樂而已亦樂之故與人同其生而上下之樂兼得矣知安者人之所利而已亦利之故與人同其安則公私之利兩全矣其有反易常理昏迷不恭則當外察其倔彊之由内省於撫馭之失修近以來遠檢身而率人故書曰惟干戈省厥躬又曰舞干羽于兩階七旬有苖格孔子曰逺人不服則修文徳以來之既來之則安之此其證也如或昧於懐柔務在攻取不徴敎化之未至不疵誠感之未孚惟峻威是臨惟忿心是肆視人如禽獸而暴之原野輕人如草芥而𠞰之銛鋒叛者不賔則命致討討者不克則將議刑是使負釁者懼必死之誅奉辭者慮無功之責編甿以困於杼軸而思變士卒以憚於死䘮而念歸萬情相攻亂豈有定一夫不率闔境罹殃一境不寧普天致擾兵拏禍結變起百端孔子曰逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫之憂不在顓臾而在蕭墻之内矣蓋必然之常理至當之格言足以為明鑑元龜貫百王而不易者也臣按贄言好生以及物者乃自生之方施安以及物者乃自安之術擠彼於死地而求此之乆生措彼於危地而求此之乆安從古及今未之有焉此即大學絜矩之道孔子所謂怒一言可以終身行之者也人君恒書此數言於坐右非為生人安衆必不肯勞民殺人而為窮兵黷武之舉矣宋司馬光上英宗曰聖王謀事於始而慮終於微是以用力不勞而収功甚大竊見國家所以禦四夷之道似未盡其宜當其安靖附順之時則好與之計較未節爭競細故及其桀傲暴横之後則又從而姑息不能深討近者西戎之禍生於高宣北狄之釁起於趙滋而朝廷至今終未有悟猶以二人所為為是而以循理守分者為非是以邉鄙武功皆銳意而生事或以開展荒棄之地十數里為功勞或以殺畧老弱之敵三五人為勇敢朝廷稱其才能驟加擢用既而彼心忿恨遂求報復屠翦熟户鈔刼邊民所䘮失者動以千計而朝廷但知驚駭增兵聚糧其致㓂之人既不追究而守邉之臣亦無譴責如此而望疆場無虞是猶添薪扇火而求湯之不沸也臣按聖王之治天下一視同仁彼處其域中而我興師出境出其不意無備而襲之欺其衰弱敗亡而殺之則曲在我矣臣請今後邊將有不禀朝命而擅出境襲殺者雖功如陳湯亦必在所追究若因而生事起釁者痛加誅責其一時蒙昩致有封爵雖經數世猶在所不宥如此則好功名希爵賞之徒知所懼而朝廷享安靖之福矣司馬光上神宗曰羽翼未成不可以高飛近者未說不可以來逺自堯舜禹湯文武之王下至齊桓晋文之霸未有不先治其内而能治於外者也今朝廷之政未盡修封域之中未盡治内郡無一年之蓄左帑無累月之財民間貧困十室九空小有水患即化為流殍承平日乆戎事不講將師乏人士卒驕隋上下姑息有同兒戲敎閲稍頻則愠懟怨戾賜予不時則揚言不遜被甲行數十里則喘汗不進遇鄉邑小盜則望塵奔潰此乃衆人所共知非臣敢為欺罔兵法曰知彼知己百戰不殆知彼不知己一勝一負不知彼不知己每戰必殆陛下視今天下如此而欲謀境外之事起兵革之端挑陸梁之虜冀難立之功此臣所為寒心者也為今日之計莫如収㧞賢俊隨才受任以舉百職有功必賞有罪必罸以修庶政謹擇監司澄清守令以安百姓屏絶浮費沙汰冗食以實倉庫詢訪智畧察驗武勇以選將師申明階級剪戮桀㸃以立軍法料簡驍銳罷去羸老以練士卒修整犀利變更苦窳以精器械俟百職既舉庻政既修百姓既安倉庫既實將師既選軍法既立士卒既練器械既精然後惟陛下之所欲為復靈夏取瓜沙平幽冀収燕朔無不可也今八者未有其一而欲納邉吏之狂謀信黠虜之詭辭臣恐不得其降者數百而虜騎大至覆軍殺將邉城晝閉朝廷乃為之宵衣旰食焦心勞思興兵運財以捄其急使天下愁困如康定慶厯之時已而卒無可奈何然後忍耻以招之卑辭以諭之尊其名以悅之增其賂以來之其為損也不亦多乎斯乃國之大事安危所係非特邊境之憂而已願陛下深留聖思勿為後悔乃天下之福也彼進謀者皆非實為國家斬將搴旗拓土開境建衛霍甘陳之功也但以利口長舌虛辭大言一時誑惑聖聰欲盜陛下之官職耳他日國家有患不預其憂是豈可哉凡邊境有事則將師遷官士卒受賞無事則上下寂寂無因徼倖此乃人臣之利非國之利陛下不可不察也臣按司馬光所言皆國家大計安危所係非特邊境事也所謂進謀者非實為國家斬將搴旗拓土開境建衛霍甘陳之功但以利口長舌虛辭大言誑惑聖聰欲盜陛下之官職他曰國家有患不預其憂若此等之事非但古有之明主不可不之察也蘓軾代滕甫草奏上神宗曰為人臣計與為人主計不同人臣非斥壤地效首虜無以為功為陛下計唯天下安社稷固耳陛下聖神冠古動容舉意皆是功徳但能拱㤗山之安與天地等壽則竹帛不可勝計而堯舜禹湯不是過也議者不知出此爭欲急於功名履危犯難以勞聖慮臣竊不取蘓轍言于哲宗曰善為國者貴義而不尚功貴信而不求利非不欲功利也以為棄義與信雖一快於目前而嵗月之後其害有不可勝言者矣昔晋文公圍原命三日之糧原不降命去之諜者曰原將降矣軍吏曰請待之公曰信國之寳也民之所庇也得原失信何以庇民所亡滋多退而原降晋荀吳圍皷皷人或請以城叛吳弗許左右曰師徒不勤而可以獲城何故弗為吳曰吾聞諸叔向好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉使皷人殺叛人而繕守備三月皷人請䧏使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君吳曰吾以事君也獲一邑而敎民怠將焉用邑皷人告食竭力盡而後取之克皷而反不戮一人以世俗言之此二人者可謂疎於事情而怠於功利矣然要其終文公以霸天下荀吳以彊晋國知信義之效見於乆逺如此臣按蘇軾謂人臣計與人主計不同人臣非斥壤地效首虜無以為功人主計唯天下安社稷固耳軾之弟轍又謂善為國者貴義而不尚功貴信而不求利非不欲功利也棄義與信雖一快於目前而嵗月之後其害有不可勝言者矣此皆有稽之言有國者所當體察而鑒戒者也元豐五年廣南西路轉運使馬黙言安化州民作過上曰黙意欲用兵耳兵大事極須謹重向者郭逵征安南與昨來西師兵夫死傷皆不下二十萬有司失入一死罪其責不輕今無罪置數十萬人於死地朝廷不得不任其咎天下大事蓋常起于至細楊時曰邉事之興多出於饕功幸利之人黷武玩㓂不以朝廷大計為念視生靈荼毒若非已事恬不以為戚夫蠻獠猖獗自古然也緩之則豺噬狶勇干紀不受命急之則鳥驚魚㪚依險以自匿蓋其常態也不務撫馴之使恩威兩行乃欲幸其有事草薙而獸獮之以求有功一有失律則敗衂不支上貽朝廷憂此邉吏之大弊也臣按神宗謂天下大事常起于至細凡事無不然而兵戎之事尤為甚焉楊時之言切中邉吏之病尤宜深察昔人有言有邉事邉臣之福無邉事朝廷之福至哉論乎其視時之言尤為簡要徽宗時蔡京開邉知桂州王祖道欲乘時徼富貴誘王江酉楊晟免等使納土夸大其辭言向慕者百三十峝五千九百家十餘萬口其傍通江洞之衆尚未論也王江在諸江合流之地山川形勢據諸峝要會愊員二千里宜開建城邑控制百蠻詔以為懐逺軍祖道在桂州四年厚以官爵金帛挑諸夷建城邑調兵鎮戍輦輸内地錢布鹽粟無復齊限地瘴癘戍者歳亡什五六實無尺地一民益於縣官蔡京既自以為功至謂混中原風氣之殊當天下輿圗之半祖道用是超取顯美臣按史臣謂諸蠻溪峝茅瘴非人域鴆虺與居况無敢闖吾圉蔡京乃使王祖道張莊之徒鑿空為功舉中國重貲棄諸不毛而文餙奸慝鋪張表賀徽宗亦偃然受其欺好大黷武之心一侈而燕朔之謀作矣詩曰池之竭矣不云自頻泉之竭矣不云自中徽宗之耗内貪外馴召禍敗迹所從來此其本也嗚呼可不戒哉宣和三年欲復燕雲蔡京童貫主之鄭居中力言不可謂京曰公為大臣國之元老不能守兩國盟約輒造事幾誠非廟算使百萬生靈肝腦塗地公實為之時睦㓂方臘也初平帝亦悔於用兵王黼獨言曰兼弱攻昩武之善經也今而不取燕雲女直即彊中原故地將不復為我有帝遂决意治兵黼於三省置經撫房專治邉事不關樞密括天下丁夫計口出算得錢二千二百萬緍以充用黼專領其事乃以童貫為宣撫使蔡攸副之勒兵十五萬廵北邉以應金時有朝散郎宋昭上書極言遼不可攻金不可鄰金必敗盟為中國患乞誅王黼童貫趙良嗣等且曰兩國之誓言敗盟者禍及九族陛下以孝理天下其忍忘列聖之靈乎陛下以仁覆天下其忍置河朔之民於塗炭之中而使其肝腦塗地乎除昭名編管海州先是燕雲之議起廣安軍草澤安堯臣上書曰臣觀自古國家之敗未嘗不因宦者專政此曹手執帝爵口銜天憲則臣下之死生禍福在焉劉蕡謂自古宦者預軍政未有不敗國䘮師者請以誤國之大者借童貫而論之貫起卑微陛下付以兵柄汲引羣小易置將吏以植私黨自兵權歸貫紛更殆盡賞罰不明兵氣委靡中外之人咸謂貫深結蔡京同納燕人李良嗣以為謀主共唱北伐之議經營之乆國乃困乏乃始方田以增常稅均糴以充軍儲茶鹽之法朝行暮改民不奠居茍能速革其弊則赤子膏血不為此曹涸也奏入不省其後轉糧以給燕山民力疲困鹽額科斂加之連歲凶荒饑民並起為盜女真乘之遂至失國臣按宋徽宗用蔡京王黼言任宦者童貫開邉遂至九廟丘墟社稷淪亡人君之舉事用人切不可不深長思慮毋徒快一時之欲徇一人之私以啟九族之禍戕億兆之命貽千古之羞元世祖至元十八年擊日本兵十餘萬死于海島還者僅三人臣按元世祖在位之日擊緬甸擊瓜哇擊占城擊日本殆無虛歲其所以窮兵黷武此之秦皇漢武何如哉夫以長城之築出塞之師所以為中國生靈計耳若緬甸接於百夷占城隔乎交阯瓜哇日本逺在炎天漲海之外地勢不相接也兵刄不相及也而必征之何哉利其所有耳蓋聞此諸國多珠貝寳石之類欲得之耳鳴呼求無用之物害有用之人為人民之主而殺人以逞所欲一之不巳巳至再至三嗚呼後世履二帝三王之位為人民之主者慎勿效尤大學衍義補卷一百五十六
