body:
  text: 大學衍義補卷六十六明丘濬撰治國平天下之要秩祭祀釋奠先師之禮下宋太祖建隆三年詔廟門立㦸十六真宗咸平中追諡孔子為𤣥聖文宣王費侯閔損以下皆為公郕伯曽參以下為侯魯史左丘明以下為伯尋以犯聖祖諱改𤣥聖為至聖臣按真宗先詔有司檢討漢唐褒崇先聖故事初欲追諡為帝或言宣父周之陪臣周止稱王不當加帝號故第増美名曰𤣥聖蓋以春秋演孔圖曰孔子母感黑帝而生故曰𤣥莊子曰恬澹𤣥聖素王之道遂取以為稱嗚呼孔子之道非一言一義所可盡者諡之有無固不為之輕重况加之非聖之言既加之矣而又以犯其誕妄之祖之諱而改之哉仁宗天禧中判國子監孫奭言舊禮以祭酒司業博士為三獻新禮以三公行事近年只差獻官二員通攝未副崇祀嚮學之意臣竊伏讀聖祖御製文集其國子祭酒誥略曰大學之設所以教君之嗣貴臣之子名曰大學既立之矣則爵官以司之以專文學乃曰師師乃泛稱官稱曰何祭酒斯官之首者不獨教生徒而已其職亦首在祀事也且仲尼歴代崇其徳王者親祭必寡故設官以代祭之名曰祭酒所以祭酒之職㓗牲牢精籩豆祭不失時則禮焉或云為飲之長而先奠之曰祭酒斯說未然今特授為國子祭酒爾尚竭乃恭而臨祭静乃神以對神庶不負委令之意噫自古制誥乃詞臣代草我聖祖則親洒宸翰所謂祭酒者雖與古人命名之意不同然聖君發言則為經自我作古可也本朝舊制主祭遣國子祭酒其後乃遣翰林院官然祭酒初上猶遣一次臣請如舊制或主祭遣内閣大臣其亞獻終獻如唐宋遣祭酒司業不然則春秋二祭迭遣焉庶幾合聖祖所製誥詞之盛意景祐元年詔釋奠用登歌陳𤾉曰禮記文王世子凡釋奠必有合也月令仲春上下命樂正習舞釋菜蓋學校禮樂之所自出小有釋菜而以食為主大有釋奠而以飲為主其習舞與聲而大合六代之樂一也北齊以太牢釋奠孔子設軒架之樂六佾之舞唐開元中釋奠用宮架之樂宋朝上丁釋奠設登歌之樂不用軒架而用判架不施于堂下而施于堂上於其庭又不設舞焉有歌而無舞非古人習舞合樂之意矣臣按本朝釋奠孔子用登歌堂上堂下之樂咸備初用六佾舞成化中以侍郎周洪謨言加八佾云神宗元豐七年以孟子同顔子配食宣聖荀况揚雄韓愈並從祀臣按此孟子配享孔子之始自唐以左丘明等二十二人從祀之後至是始以荀况三人者増入從祀徽宗崇寧四年從司業蔣静請文宣王用冕十二旒服九章臣按此宣聖用天子冕旒之始大觀二年詔躋子思從祀四年詔先聖廟用㦸二十四文宣王執鎮圭並用王者之制理宗淳祐元年加周敦頤張載程顥程頤封爵與朱熹並從祀孔子廟庭臣按此周程張朱從祀之始景定二年加張栻呂祖謙伯爵從祀孔子度宗咸淳三年以顔回曽參孔伋孟軻並祀孔子升顓孫師於十哲列邵雍司馬光於從祀臣按此顔曽思孟配享之始元成宗大德十一年制加孔子號曰大成臣按自古諡號必加以實字未有用譬喻之語者成之言出於尚書大成之言出於孟子成者樂之一終也孟子以樂之始終兼聖智之全譬喻孔子之聖兼伯夷伊尹栁下惠之清之任之和而時出之蓋假設之辭非真實之徳也加此二字於至聖文宣王之上固於聖徳無所増益也仁宗皇慶二年以許衡從祀孔子文宗至順元年加封顔回為兖國復聖公曽參郕國宗聖公孔汲沂國述聖公孟軻鄒國亞聖公是年又加孔子父母封爵始以董仲舒從祀孔子洪邁曰自唐以来相傳以孔門高弟顔淵至子夏為十哲坐祀于廟堂之上其後升顔子配享則進曽子於堂居子夏之次以補其闕然顔子之父路曽子之父㸃乃在廡下從祀之列子處父上神靈有知何以自安所謂子雖齊聖不先父食正謂是也姚燧曰江之左進曽子子思並顔孟别躋子張於曽子之舊由孟子而視子思師也由子思而視曽子又師也子思孔子孫也弟子於師孫於祖坐而語道者有之非可竝南靣燧知四子已避讓於㝠㝠中不能一日自安其身一堂之上况又祀無繇㸃鯉于庭其失在於崇子而抑父夫為是學宮将以明人倫於天下而倒施錯置於數筵之地如此奚以為訓臣按熊禾謂宜别設一室以齊國公叔梁紇居中南面顔路曽晢孔鯉孟孫氏侑食西嚮春秋二祀當先聖酌獻之時以齒徳之尊者為分獻官行禮於齊國之前其配位亦如之如此則亦可以示有尊而敎民孝矣然臣以為今天下州縣皆有祭處處皆設恐至於煩瀆說者謂泗水侯孔林自有廟曲阜侯宜祀於其子顔子之廟而以顔子配萊蕪侯無後今嘉祥有曽子墓當有祠宜于此祀萊蕪侯而以曽子配否則特立一廟於曲阜特祀三子而以顔子曽子子思配熊禾謂有王者作禮當損益祀不可瀆也姑誌于此國朝洪武三年十一月禮部更定釋奠孔子祭器禮物正位犢一羊一豕一籩豆各十登一鉶一簠簋各二酒尊三爵三初孔子之祀像設高座而器物陳于座下弗稱其儀其來已久至是定擬各為高案其豆籩簠簋悉代以磁器臣按宋蘇軾謂古者坐於席故籩豆之長短適與人均今土木之像既已巍然於上而列器皿於地使鬼神不饗則不可知若其享之則是俯伏匍匐而就食也由是觀之則孔子廟自唐設塑像以來已如此歴宋至元未之有改至是聖祖始正之云臣嘗因是而論之古今異時制度不一用古者則當純於用古必欲從今之宜則當參酌古制而以義起必合於人情宜於時俗斯得古人制禮從宜之意矣古者席地而坐故俎豆置於豆間之地斯為宜矣今既塑為高像而坐于倚榻之間而所謂俎豆者仍置於地此蘇氏所以有匍匐就食之譏也然既為今人之座則當用今人之案既用今人之案則用今人之器亦何不可也且古者祭祀几筵在西神皆東向漢帝幸魯祠帝升廟西面再拜唐開元禮亦謂先聖東向先師南向三獻官皆西向猶有古意自尊孔子為王之後始改從南面而配位則西向獻官序立東廡之前而行禮執事者升降必由東階以神道尚右西乃迎送神之所避右不敢當尊故也宋人以顔孟配享俱列在聖像之東其後因王安石配享乃以坐對顔子西坐東向其後革去安石從祀増入曽子子思俱坐於東此姚燧所以有江左進曽子子思並顔孟之說然謂之並南面則不知何據也熊禾謂顔曽思孟所在學校皆東坐西向十哲兩廡從祀皆左右列則是宋末元初其制已如此矣今則四子者配享皆左右列不知始于何時意者宋金分治宋人之制如熊禾所云金人之制則以顔孟與孔子並列其後平宋又加以曽思因而不改歟燧之所見蓋北方廟像歟宋濓謂古者求神於隂陽既奠焫蕭合羶薌今用薰香代之為簡古者司烜共庭燎以共祭享之事今用秉炬當之為瀆臣竊以為祭所以寓吾誠不專在物理從宜而可以義起古祭必用牲牢蔬果而牲牢蔬果之用於今者其物雖同於昔而物之生則在於今也以今日之物而祀先代之神政不必泥但所謂木主之設乃聖祖之盛製而子先父食乃天倫之所繫則不可以憚於改作而因循耳先儒謂議禮也制度也考文也天子司之亦幸一旦遑於稽古之事學禮之臣必有能策其一二得所當議者臣於此亦云是年革去天下神號其詔略曰歴代忠臣烈士亦皆當時初封以為實號後世溢美之稱皆與革去其孔子善明先王之要道為天下師以濟後世非有功于一方一時者可比所有封爵宜仍其舊洪武十七年敕每月朔朢祭酒以下行釋菜禮郡縣長以下詣學行香臣按朔朢行香之禮古未有也北齊每月朔祭酒博士諸生展拜階下郡縣朔朝是時未爇今所謂香也然朔日行禮則始於此焉其後遂以朔朢行香朱熹曰謁宣聖焚香不是古禮捻香不當叩頭只直上捻香了却出笏叩首而降拜由是言之則在宋已有矣其行禮當以朱氏言為則正綂中以宋胡安國蔡沈真徳秀元吳澂從祀臣按有國家者以先儒從祀孔子廟庭非但以崇徳蓋以報功也夫太上固以立徳為貴然徳之在人者不可以一槩論使其仁如堯孝如舜文王以文治武王以武功固無得而可議矣然堯舜文武之祀止於朝廷一廟及其陵寢而已不天下徧祀也况於儒者之道佩仁服義尊徳樂道固其性命之所固有職分之所當為茍有徳者即祀之則亦不勝其祀矣是以在宋言者屢以歐陽脩蘇軾孫復胡瑗為請而近日亦往往有以楊時羅從彦李侗為言事下儒臣議議者皆不之從以其無功於經也其已列從祀者若荀况戴聖馬融王弼杜預之輩屢有建請革去其祀者至今猶列在祀典豈不以弼等雖於徳行有虧然弼有功於易預有功於春秋聖有功於禮有其舉之莫敢廢也臣考禮止釋奠于先聖先師而無從祀之說從祀之說始于唐太宗時以左丘明等二十二人配食先師也自是之後益以荀况揚雄韓愈宋南渡後始加以周程張朱邵馬及張栻吕祖謙元人又加以董仲舒許衡皇朝又加以此四人者蓋安國傳春秋沈註書徳秀著大學衍義澂著諸經纂言是皆有功於聖門者也已祀而黜者惟揚雄一人若孔孟以後之儒有功於聖經者無不祀矣惟楊時者從學於二程載道而南使無時焉則無朱熹矣何也在宋金分裂之時程學行於南蘇學行於北雖伊洛之間不復知有程氏之學則時載二程之道而南使堯舜禹湯文武周公孔子之道大明於斯世者其功不可泯也乃不得如言性惡之荀况宗㫖莊老之王弼附㑹䜟緯之賈逵並祀于孔子廟庭以從於二程之後朱吕之前豈非闕典歟歐陽脩曰釋奠釋菜禮之略者也古者士之見師以菜為摯故始立學者必釋菜以禮其先師其學官四時之祭乃皆釋奠釋奠有樂無尸而釋菜無樂則其又略也故其禮亡焉而今釋奠幸存然亦無樂又不徧舉於四時獨春秋行事而已自孔子没後之學者莫不宗焉故天子皆尊以為先聖而後世無以易荀卿子曰仲尼聖人之不得勢者也然使其得勢則為堯舜矣不幸無時而殁特以學者之故享弟子春秋之禮而後之人不推所謂釋奠者徒見官為立祠而州縣莫不祭之則以為夫子之尊由此為盛甚者乃謂生雖不位而没有所享以為夫子榮謂有徳之報雖堯舜莫若何其繆論者歟臣按脩之記作於宋盛時而謂釋菜禮亡又謂釋奠幸存而亦無樂今制則國子監每月朔先期太常寺送兎蔬等物至日行禮其春秋上丁二祭則先期皇帝傳制遣官行禮文武官朝服侍班牲用太牢禮行三獻樂備登歌舞用八佾其禮可謂備矣說者謂釋奠釋菜二者之重輕繫乎樂之有無今世之樂襲勝國用宋人魏漢律所製大晟之故耳非古樂也吁禮廢羊存雖曰不合於古豈不勝於無哉方今聖明在上必有當制作之任者行古之禮復古之樂政有望於今日熊禾曰道者天下通行之道其所以為敎者自天子至於庶人一也先王建學必祀先聖先師自古至今未有以異獨五學之說不同禮家謂詩書禮樂各有其師所以為祀亦異則疑出於漢儒專門之附㑹三代以上大道未分必不至此夫京師首善之地莫先於天子之太學天子太學祀典宜自伏羲神農黄帝堯舜禹湯文武其道徳功言載之六經傳在萬世若以伏羲為道之祖神農黄帝堯舜禹湯文武各以其次而列焉皋陶伊尹太公望皆見而知者周公不惟為法于天下而易詩書所載與夫周禮儀禮之書皆可傳于後世至若稷之立極陳常契之明倫敷敎夷之降典益之贊徳傳說之論學箕子之陳範是皆可以與享於先王者以此秩祀天子之學禮亦宜之若夫孔子兼祖述憲章之任其為天下萬世通祀則自天子下達矣宋濓曰昔周有天下立四代之學其所謂先聖者虞庠則以舜夏學則以禹殷學則以湯東膠則以文王復各取左右四聖成其徳業者為之先師以配享焉此固天子立學之法也茍如禾言則道綂益尊三王不汩于毉師太公不辱于武夫矣臣按本朝于京師有帝王廟而以當時功臣配享與禾此議合但不領於學官耳請於帝王廟設宫懸備佾舞一如文廟每嵗春秋傳制遣官致祭一如祀孔子而太學則祀宣聖如故禾又曰禮有祀先賢于東序及祭鄉先生于社之文以一國一鄉論之各有先賢鄉先生其節行足以師表後進軌範薄俗者固在鄉國之所當祀矣孔明之在南陽管㓜安之在東海張九齡之在曲江陽城之在晉鄙三代而下論天下人物亦當首稱正使列侍聖門夫亦何慊又如蜀之文翁閩之常衮首開一方文治雖去之千載猶思慕之凡若此類宜悉詔郡國按其舊志採其尤著者悉以來上列之羣祀咸秩無文臣按今世州郡縣學往往有鄉賢祠然多出私祭非朝廷祀典所秩者乞如禾議行之唐𤣥宗開元十九年置太公廟令兩京諸州各置太公廟以張良配享選古名將以備十哲以二八月上戊致祭如孔子禮司馬光曰經緯天地之謂文戡定禍亂之謂武自古不兼斯二者而稱聖人未之有也豈孔子專文而太公專武哉自生民以來未有如孔子者豈太公得與抗衡哉自古有發命大司徒敎以車甲臝股肱決射御受成獻馘莫不在學欲其先禮義而後勇力也自孫吳以降皆以勇力相勝狙詐相高豈足數于聖賢之門而謂之武哉使太公有神必羞與之同食矣臣按古者釋奠之禮所以報有功於是敎之人必其道徳著于當時軌範垂于後世其功不可忘者也孔子刪述六經垂憲萬世故後世學校通祀之與郊社並非徒以是尊崇之也報其垂敎之功也太公望起海濵以輔周室其以武功見於經者特以時維鷹揚之一語世之所傳六韜乃後人假託者耳其于武事外此畧不他見凡兵家所傳七書者多權謀狙詐之術不得與聖經比老子以佳兵為不祥之器兵之佳者尚為不祥况其作書敎人變詐以相殺害者哉其為不祥也大矣又何功而祀之哉觀光之言則武成不當有廟明矣太公之神則當祀於歴代帝王廟以配文武其餘名將有功於一時者各祀於其所生之地及立功之處可也以上釋奠先師之禮下大學衍義補卷六十六
