body:
  text: 大學衍義補卷一百六十明丘濬撰治國平天下之要成功化聖神功化之極下中庸致中和天地位焉萬物育焉朱熹曰致推而極之也位者安其所也育者遂其生也自戒懼而約之以至於至静之中無所偏倚而其守不失則極其中而天地位矣自謹獨而精之以至於應物之處無少差謬而無適不然則極其和而萬物育矣盖天地萬物本吾一體吾之心正則天地之心亦正矣吾之氣順則天地之氣亦順矣故其效騐至於如此此學問之極功聖人之能事初非有待於外而脩道之敎亦在其中矣是其一體一用雖有動静之殊然必其體立而後用有以行則其實亦非有兩事也又曰三辰失行山崩川竭則不必天翻地覆然後為不位矣兵亂凶荒胎殰卵殈則不必人消物盡然後為不育矣凡若此者豈非不中不和之所致而又安可誣哉臣按中庸此三言者章句以為學問之極功聖人之能事而又縂一言以結之曰聖神功化之極至於或問又曰萬化之本原一心之妙用聖人之能事學問之極功是則古今為學為治之道皆莫有大於此者矣吁上而天下而地萬物羣生於其中人為物之靈人君又為人之最靈而至貴者也以最靈至貴之人立乎天地之間出乎人物之表大而能化神妙莫測恭贊兩間而為三才之主首出萬物而居五位之尊具天地之氣以生而能定天地之位受萬物之養以成而能致萬物之育是豈無故而然哉亦惟本乎一心焉耳其心之體為性而有天然自有之中戒懼以致其中所以守其未發之大本而天命之性於是乎養矣心之用為情而有本然自有之和慎獨以致其和所以精其中節之達道而率性之道於是乎全矣先儒謂前後只是性道兩句功夫而敎在其中其用功處只在戒慎恐懼慎致六字而已孰謂聖神功化之極而有外於人之一心哉修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懐諸侯則天下畏之朱熹曰此言九經之效也道立謂道成於己而可為民表所謂皇建其有極是也不惑謂不疑於理不眩謂不迷於事敬大臣則信任専而小臣不得以間之故臨事而不眩也來百工則通功易事農末相資故財用足柔逺人則天下之旅皆悦而願出於其塗故四方歸懐諸侯則徳之所施者博而威之所制者廣矣臣按中庸此章言九經朱子於或問其言詳盡真氏既已具載於前編矣夫九經始於家中於國終於天下至於柔逺人懐諸侯極矣柔逺人而四方有歸服之誠懐諸侯而天下有畏威之效則是内而五服九州外而九夷八蠻徳澤之所及者化強梗而為柔順威聲之所震者變疑貳而為畏服矣推原所自何莫不本於齊明盛服非禮不動内外一於誠敬之所致哉唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地参矣朱熹曰天下至誠謂聖人之徳之實天下莫能加也盡其性者徳無不實故無人欲之私而天命之在我者察之由之巨細精粗無毫髪之不盡也人物之性亦我之性但以所賦形氣不同而有異耳能盡之者謂知之無不明而處之無不當也贊猶助也與天地参謂與天地並立而為三也此自誠而明者之事也臣按先儒謂此乃有徳有位聖人之事惟堯舜足以當之嗟乎孟子有言人皆可以為堯舜矧受上天之付託而為萬民之父母者乎既有其位何患無徳徳者天所賦予人人有之行道而有得於心斯有之矣然則若何而致其力耶下章曰其次致曲謂善端發見之一偏自其發見之厚處而推致之以造其極積而至於能化則其至誠之妙亦與天下至誠之聖人無以異矣故曰唯天下至誠為能化故至誠無息不息則乆乆則徴徴則悠逺悠逺則博厚博厚則髙明朱熹曰既無虚假自無間斷乆常於中也徴驗於外也此皆以其驗於外者而言之鄭氏所謂至誠之徳著於四方者是也存於中者既乆則驗於外者益悠逺而無窮矣悠逺故其積也廣博而深厚博厚故其發也髙大而光明臣按聖人乆於其道而天下化成夫惟至誠而又不息然後能乆乆故徴驗於外悠逺而無窮悠逺則自博厚博厚則自髙明非有至誠之徳而又有無息之功其安能致是哉蓋至誠之乆於中故其徴驗之發於外者氣勢自然如此從容不迫寛緩自在所以積而至於博厚如地髙明如天而其悠逺也又且至於乆而無疆焉彼夫虚偽妄誕作輟無常急迫而淺近汲汲焉殫日之力者其何以能底於博厚髙明之域哉觀夫三代盛時積功累仁功業盛大而有道之長如此秦隋之君駕虚作偽朝更夕改而日不暇給而功業如彼之卑運祚不延可驗也矣今天下車同軌書同文行同倫朱熹曰今子思自謂當時也軌轍迹之度倫次序之體三者皆同言天下一統也或問於朱熹曰周之車軌書文何以能若是其必同也曰古之有天下者必改正朔易服色殊徽號以新天下之耳目而一其心志若三代之異尚其見於書傳者詳矣軌者車之轍迹也周人尚輿而制作之法領於冬官其輿之廣六尺六寸故其轍迹之在地者相距之間廣狹如一無有逺近莫不齊同凡為車者不合乎此則不惟有司得以討之而其行於道路自將偏倚杌隉而跬歩不前亦不待禁而自不為矣古語所謂閉門造車出門合轍蓋言其法之同而春秋傳所謂同軌畢至者則以言其四海之内政令所及者無不來也文者書之㸃畫形象也周禮司徒敎民道藝而書其一又有外史掌達書名於四方大行人之法則又每九嵗而一諭焉則其制度之詳如此是以雖其末流海内分裂而猶不得變也必至於秦㓕六國而其號令法制有以同於天下然後車以六尺為度書以小篆𨽻書為法而周制始改爾孰謂子思之時而遽然哉臣按人君治天下車必同軌書必同文行必同倫蓋王者之治大一統而無外也有如此蓋有法制以維持之則世道雖䧏而不至於廢墜茍有興起者由是而循持之以復先王之舊不難矣故成周盛時之車軌書文至於春秋之時猶同也唯天下至聖為能聰明睿知足以有臨也寛裕温柔足以有容也發強剛毅足以有執也齊莊中正足以有敬也文理宻察足以有别也溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天朱熹曰聰明睿知生知之質臨謂居上而臨下也其下四者乃仁義禮智之徳文文章也理條理也宻詳細也察明辨也溥博周遍而廣濶也淵泉静深而有本也出發見也言五者之徳充積於中而以時發見於外其充積極其盛而發見當其可也舟車所至以下蓋極言之配天言其徳之所及廣大如天也唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天茍不固聰明聖知達天徳者其孰能知之朱熹曰經綸皆治絲之事經者理其緒而分之綸者比其類而合之也經常也大經者五品之人倫大本者所性之全體也惟聖人之徳極誠無妄故於人倫各盡其當然之實而皆可以為天下後世法所謂經綸之也其於所性之全體無一毫人欲之偽以雜之而天下之道千變萬化皆由此出所謂立之也其於天地之化育則亦其極誠無妄者有黙契焉非但見聞之知而已此皆至誠無妄自然之功用夫豈有所倚著於物而後能哉肫肫懇至貌以經綸而言也淵淵静深貌以立本而言也浩浩廣大貌以知化而言也其淵其天則非特如之而已固猶實也鄭氏曰唯聖人能知聖人也臣按朱熹謂前章言至聖之徳此章言至誠之道然至誠之道非至聖不能知至聖之德非至誠不能為則亦非二物矣夫理之在天者至於至誠之道極矣理之在人者至於至聖之徳盡矣聖人者出本至誠之道以立至聖之徳充積盛於外者則如天如淵功用妙於中者則其天其淵惟其有是徳是以知是道故曰茍不固聰明聖知達天徳者其孰能知之説者謂此言達而在上之大聖人其聖徳之全體大用如此可謂至極而無以加矣可以當此者其惟堯舜乎夫堯舜與人同耳有為者亦若是况承帝王之統居帝王之位者乎詩曰不顯惟徳百辟其刑之是故君子篤恭而天下平朱熹曰詩周頌烈文之篇不顯猶言豈不顯也此借引以為幽深𤣥逺之意承上文言天子有不顯之徳而諸侯法之則其徳愈深而效愈逺矣篤厚也篤恭言不顯其敬也篤恭而天下平乃聖人至徳淵微自然之應中庸之極功也胡仲虎曰篤恭而天下平即首章致中和而天地位萬物育也特首章是致其中而後致其和此之謂篤恭者已致其和而益致其中也為己之功愈宻則徳愈深而效愈逺如此臣按四書之中言天下平者凡四大學經文與中庸此章乃孔子之言也大學經文曾子之所述中庸此章子思之所傳然大學有八條目必自物格知至意誠心正身修家齊國治而後可以至於天下而中庸則惟一篤乎恭則可以致夫天下平焉是何難易懸絶如此哉盖大學聖人敎人為學之道中庸聖人教人守約之方先儒謂敬之一字聖學所以成始而成終者也誠能存乎一敬字之約而用以盡夫八條目之詳則夫所謂篤恭而天下平者即所謂意誠心正身修家齊國治而天下平者矣孟子曰道在邇而求諸逺事在易而求諸難人人親其親長其長而天下平朱熹曰親長在人為甚邇親之長之在人為甚易而道初不外是也舎此而他求則逺且難而反失之但人人各親其親各長其長則天下自平矣張栻曰親親仁也敬長義也仁義本之躬而達之天下天下所以平者全係乎此味此數語堯舜三王之治可得而推矣臣按天下者一國之積也一國者一家之積也一家者一人之積也人人有親有長一人有一人之親長各人有各人之親長各人親各人之親長各人之長則一家之中無有不親其親不長其長者矣各家之親之長皆有以親之長之則一國之中為人親者皆有以親之為人長者皆有以長之者矣推之天下天下統乎國國統乎家家統乎人人人皆親其親長其長天下之人不異乎國國之人不異乎家天下無一人不然無一家不然則天下豈有不平者哉雖然人君以一身中天下而立海宇如此其大也人民如此其衆也安得人人而敎之家家而曉之而使之皆然哉故既正身齊家以為之表率而又設官分職立敎設政以勸化之而不從者又有刑以弼之焉必期於天下之大無一人一家之為人親為人長者不得人親之長之亦無一人一家之為人子為人少者之不親其親長其長也有子謂孝弟為行仁之本先儒謂親親而仁民仁民而愛物莫不自此推而行之焉則天下平之之本端在此矣孟子曰大而化之謂聖聖而不可知之之謂神朱熹曰大而能化使其大者冺然無復可見之迹則不思不勉從容中道而非人力之所能為矣張載曰大可為也化不可為也在熟之而已矣程頥曰聖不可知謂聖之至妙人所不能測非聖人之上又有一等神人也臣按益之贊堯曰乃聖乃神則知帝王之徳莫盛於此者後世言治者必曰法堯舜非徒法其為治之迹必先法其為治之心欲得其心而效其迹者非有其徳不可也然聖人之徳生知安行豈易至哉一惟以之為標凖其積漸以至之而已積漸以至之其道何繇在乎有可欲之善而實有諸己焉由是充實而美而至於英華發外而大焉大而化之而至於不可測度則聖神之徳在我矣孟子曰君子之守修其身而天下平朱熹曰此所謂守約而施博也張栻曰修身則本立由是而家齊國治天下平皆其所推耳臣按人君一身居天下之中一身至小也天下至大也吾脩吾身於深宫之中何預於天下而天下平哉蓋天下之大藩服都邑非止一處百官庶尹非止一職士農工商非止一民蠻夷戎狄非止一類有身者賴我以生有家者賴我以養我發一念之仁則彼無不得其所者矣我興一念之不仁則彼有不得其所者矣人情不能無喜也喜而省刑罰薄税斂是以一人之喜發而為千萬人之喜也喜而興土木之功求珍異之物吾心則喜矣如民憂何人情不能無怒也怒而除盗賊去貪殘是以一人之怒形而為千萬人之怒也怒而用非法之刑興窮黷之兵吾心則快矣如民苦何此君子所以貴乎守也然事幾紛沓日至果將何所守乎亦曰脩吾身而已大學曰欲脩其身者先正其心心正而後身修是知脩身之本又在乎正心也正心以脩身則不好聲色之奉不崇土木之飾不事異端之敎不為田獵之舉不作無益之事不好珍異之物不興出境之師不用非法之刑凡非所當好者皆不之好凡非所當為者皆不之為如此則不盡民之力不盡民之財不盡民之情則無一人之不得其所無一物之不遂其性無一處之不得其安矣孰謂天下平不由乎人君之一身哉此人君之為治所以貴乎正心而大臣之事君所以必格君心之非也周惇頥曰天以陽生萬物以隂成萬物生仁也成義也故聖人在上以仁育萬物以義正萬民天道行而萬物順聖徳脩而萬民化大順大化不見其迹莫知其然之謂神故天下之衆本在一人道豈逺乎哉術豈多乎哉朱熹曰聖人以仁育萬物以義正萬民所謂定之以中正仁義也天地聖人其道一也天下之本在君君之本在心心之本在仁義臣按天有五行而總之者曰隂陽人有五徳而兼之者曰仁義是仁義者人君脩己治人之正道要術也人君體天之陽以育萬物使萬物皆遂其自然之仁體天之隂以正萬民使萬民皆由乎當然之義天下之大無一人之不仁無一事之非義天下於是乎平矣張載曰為天地立心為生民立命為往聖繼絶學為萬世開太平臣按大學之道其綱領在明徳新民止至善其條目在格物致知誠意正心脩身齊家治國平天下外有以極其規模之大内有以盡其節目之詳要必析之極其精而不亂然後合之盡其大而無餘所謂全體大用之學也所謂聖神功化之極也由物格知至而至於天下平則學問之極功於是乎偹聖人之能事於是乎畢矣是以大學一經十傳行其道於當時則有以為一世立太平傳其書於來世則有以為萬世開太平開之於萬世者即其所以平之於一時者也蓋天地有形而無心所以為天地立心者聖人也生民有命而不能自遂所以立夫生民之命而使之遂其生者則有待於聖人焉吁聖人闡眀斯道以立天地之心推行斯道以立生民之命自伏羲堯舜以來至於文武周公則然矣不幸中絶而孔子繼之作為大學經之一章曾子又述其意以為十傳惜其有徳無位不能立一時之太平而實垂之天下後世有以開萬世之太平焉不幸而再絶歴漢魏隋唐而不能振起至於有宋兩程兄弟始表章之於禮記之中朱熹又為之章句或問眞徳秀又彚經傳子史以塡實之以為衍義所以推而廣之擴而大之使天下後世知大學之書無一理不該無一事不在唐虞夏商有周之盛治居然可致矣臣㓜讀此書偶有所見晚輯成帙上塵聖聰儻見施行則臣雖死而生矣無任懇悃願效之至以上聖神功化之極下大學衍義補卷一百六十
