body:
  text: 大學衍義補卷三十八明丘濬撰治國平天下之要明禮樂禮儀之節上易象曰上天下澤履君子以辨上下定民志程頥曰履禮也禮人之所履也為卦天上澤下天而在上澤而處下上下之分尊卑之義理之當也禮之本也常履之道也朱熹曰履禮也上天下澤定分不易必謹乎此然後其徳有以為基而立也故曰履徳之基吕祖謙曰履為易中之禮臣按此六經言禮之始然經但言履而已而説者乃以之為禮何哉朱熹曰辨上下定民志也是禮的意思蓋莫髙扵天而地最卑之處為澤澤下而天上上下之分如此懸絶茍無辨焉則澤上扵天矣澤上扵天則是上下易位上下易位則反常而僭分而民志不知所向而無定守矣是以君子為治莫先扵定天下之志欲定其志莫先扵辨上下之分辨上下之分而不見扵踐履之間徒有其言不可也是以定為品級制為節文截然有威而不可犯秩然有儀而不可紊此履所以為禮歟雷在天上大壯君子以非禮弗履程頥曰雷震扵天上大而壯也君子觀大壯之象以行其壯君子之大壯者莫若克己復禮古人云自勝之謂强中庸扵和而不流中立而不倚皆曰强哉矯赴湯火蹈白刃武夫之勇可能也至扵克己復禮則非君子之大壯不能也故云君子以非禮弗履朱熹曰雷在天上則威嚴果決以去其惡而必為善須是如雷在天上方能克去非禮臣按易卦言禮始扵乾備扵履而所以履而為禮則在扵大壯蓋以嘉㑹所合者本扵乾道之亨乾天也天行以健震以動之壯莫大焉既壯而大是以發强剛毅足以有執齊莊中正足以有立非禮弗履而所履者動容周旋無不中禮嘉其所㑹而合扵乾道之亨矣帝曰咨四岳有能典主也朕三禮僉曰伯夷臣名帝曰俞咨伯汝作秩序也宗祖廟也夙早也夜惟寅敬畏也直心無私曲之謂哉惟清潔也朱熹曰三禮祀天神享人鬼祭地祗之禮也秩宗主叙次百神之官専以秩宗名之者蓋以宗廟為主也人能敬以直内不使少有私曲則其心潔清而無物欲之汚可以交扵神明矣臣按禮之大者莫大扵祭祀祭祀之禮凡有三焉所謂祀天神享人鬼祭地祗是也帝舜命九官惟扵百揆秩宗咨扵四岳蓋百揆後世宰相之職而秩宗則後世禮部尚書太常寺卿之職也禮官所以交神明非他官比不可輕授輕其官守則是輕神明矣是以帝舜扵他官皆直命之獨扵秩宗之職必咨訪扵四岳而後任焉其重之亞扵百揆意可見矣後世人主往往重治人之職而輕事神之官甚者乃以畀小人非類失古意矣臯陶曰天叙有典勑正也我五典五惇厚也哉天秩有禮自我五禮有庸常也哉同寅協恭和衷哉蔡沈曰叙者君臣父子兄弟夫婦朋友之倫序也秩者尊卑貴賤等級隆殺之品秩也衷降衷之衷即所謂典禮也典禮雖天所叙秩然正之使叙倫而益厚用之使品秩而有常則在我而已故君臣當同其寅畏協其恭敬誠一無間融㑹流通而民彝物則各得其正所謂和衷也臣按所謂五典即所謂慎徽五典之典也所謂五禮即巡守修五禮之禮也天之倫序有不易之典而正之在我者必使君臣父子兄弟夫婦朋友五者之倫而各有義有親與夫有序有别有信咸惇厚而不薄焉天之品秩有自然之理而出之自我者必使吉凶軍賓嘉五者之禮而各有尊卑貴賤等級隆殺咸有常而不變焉而是之典禮固自天子出而所以輔相而推行之者則不能無待扵其臣焉此所以必待扵君臣上下同寅協恭而後民彝物則各得其正而典禮出扵上天之所降者無過不及而罔有乖戾焉是則所謂和衷也周官宗尊也伯長也掌邦禮治神人和上下鄭𤣥曰宗伯主禮之官宗伯不言司者以其祭祀鬼神鬼神非人所主也吕祖謙曰治理也壇坎昭穆之等聘享射御之節貫本末而等文質所謂禮也神人所以治上下所以和者也一失其禮則僭亂諂妄而瀆乎神陵犯乖爭而悖乎人上下皆失其分安得而和乎蔡沈曰春官卿主邦禮治天神地祗人鬼之事和上下尊卑等列周禮大宰之職掌建邦之六典三曰禮典以和邦國以綂百官以諧萬民吕祖謙曰明則有禮樂幽則有鬼神禮有自然條目幽而神明而人秩然有序燦然有經便是和若無禮則乖爭陵犯上陵下替豈能一日和臣按周書宗伯掌邦禮固曰和上下而周禮禮典亦以和邦國為言蓋以禮之用和為貴成周合樂扵禮官謂之和者蓋以樂言也吁虞廷分禮樂為二周室合禮樂為一時世所尚輕重可見若夫後世所以為治者専意扵簿書期㑹之末所謂禮樂者皆非古之所謂禮樂間有一二僅存亦名同而已實則非焉可慨也夫大宗伯之職掌建邦之天神人鬼地示祗之禮以佐王建保安也邦國王昭禹曰謂之建邦之天神人鬼地示之禮則禮當自王出也以吉禮事邦國之鬼神示以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌伯雨師以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以烝冬享先王詳見秩祭祀臣按大宗伯所掌之禮有五曰吉凶軍賓嘉而周官春官首言大宗伯之職以佐王建保邦國者則専以建邦之天神人鬼地祗為言蓋禮莫重扵祭也以凶禮哀謂救患分烖邦國之憂以喪禮哀死亡以荒禮哀凶謂嵗歉札謂民病以弔禮哀禍烖以禬禮哀圍敗以恤禮哀冦亂吳澂曰哀謂救患分烖也喪禮謂親者為之服疎者有含襚荒者人物有害也凶以天災言札以民病言弔者慰弔之也禍烖如水火之類禬者㑹財貨以補其亡失也圍謂國被圍敗謂師敗績恤相為憂之也兵扵外為冦扵内為亂臣按凶禮凡六條曲禮曰嵗凶年不登君膳不祭肺馬不食穀馳道不除祭祀不縣大夫不食粱士飲酒不樂觀古人扵荒禮如此則其他可知矣可見成周盛時扵國有凶荒其君臣上下相與哀恤如此蓋其與民同患故雖遇凶而不凶也歟以賓禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷衆也見曰同時聘曰問殷覜曰視吳澂曰親謂使之親附也朝如日出扵寅之朝而朝扵天宗如萬物相見扵南方而其類皆有所宗覲謂物成之時各勤其實以報乎上遇謂閉藏之時其相見若邂逅之遇㑹謂非時㑹集以謀征伐之時同謂王不巡狩而衆見諸侯以命政問謂諸侯遣卿非時致問扵天子視謂諸侯遣卿以大禮而衆見扵天子臣按賓禮凡八條朝覲遇宗之名以别一時耳其禮一也書曰六年五服一朝以二者參之諸侯六年之内惟一朝耳来以春則曰朝以夏則曰宗秋冬亦然初無四方之别猶漢春曰朝秋曰請也以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也吳澂曰同謂威其不協及僭差者也大師謂天子六軍用衆者出師之法也大均謂因地以令賦因家以起役地有肥磽而賦有輕重家有上下而役有多少是所以優恤其衆也大田謂四時之田而因以習兵簡閱其衆之能與否也大役謂徒役若築作之類所以任用衆力也大封謂正封疆溝塗之固所以合聚其民也扵此見聖人公平廣大之心矣臣按王安石謂用衆者用其命恤衆者恤其事簡衆者簡其能任衆者任其力用其命而不知恤其事恤其事而不知簡其能簡其能而不知任其力任其力而不知合其志非所以謂軍禮軍禮以用其命為主以合其志為終嗟乎古人用兵而必為之禮如此後人惟知用法而已驅之如牛羊視之如艾蒿豈復有所謂禮也哉以嘉禮親萬民以飲食之禮親宗族兄弟以昏冠之禮親成男女以賓射之禮親故舊朋友以饗燕之禮親四方之賓客以脤膰之禮親兄弟之國以賀慶之禮親異姓之國吳澂曰嘉善也因人之心善而為之制也飲食謂族食族宴也昏兼姻言冠兼笄言賓射謂王與賓友射也饗以訓共儉燕以示慈惠凡朝聘之賓客皆一饗而燕則無數脤膰謂祭祀之肉兄弟之國同姓諸侯也贊其喜曰慶加物曰賀異姓之國王之昏姻甥舅也臣按先儒有言觀乎大雅小雅正變之所存則周之所以興莫不由扵五禮也周家之所以亡亦莫不由扵五禮也邦國之根本安危之所係其有大扵此乎臣觀周人設官大宗伯所以佐王建保邦國者首以五禮為事非徒有其典凡其所以詠扵詩與夫散見扵傳記者莫不備見其事吁此成周所以為有道之長而異扵後世也歟小宗伯掌五禮之禁令與其用等辨廟祧之昭穆吉凶之五服車旗宫室之禁掌三族之别以别親疎其正室皆謂之門子掌其政令吳澂曰五禮吉凶軍賓嘉也大宗伯掌其本數小宗伯又掌其末度禁者禁其所不得用令者令其所得用用等者器幣尊卑之差也廟祧之昭穆者天子七廟三昭三穆之外又有二祧祧者逺廟之主遷而藏之也吉凶之五服吉服五則九章也七章也五章也三章也一章也凶服五則斬衰也齊衰也錫衰也緦衰也疑衰也三族者父子孫人屬之正名也辨親疎者重服則親輕服則疎正室適子將代父當門者也疏曰據九族之内凡適子正體皆為正室皆謂之門子小宗伯掌其政令者治其昭穆明其嫡庶使不得以卑代尊孽代宗臣按禮之大者有五而五者之中其所用者各有等則焉大宗伯既總其綱而小宗伯又掌其禁令與其用等所謂等者尊卑貴賤親疎三者而已辨昭穆與其章服則尊卑之等嚴禁車旗與其宫室則貴賤之等别别三族與其衰服則親疎之等明然又扵等則之間特申明宗子之制而總結之曰掌其政令以見凡行禮者皆以是為重焉由是觀之古人重宗之意可見矣禮記曲禮曰毋不敬范祖禹曰經禮三百曲禮三千可一言以蔽之曰毋不敬臣按治國平天下之本在乎修身而修身必以禮禮者敬而已矣夫禮者所以定親疏決嫌疑别同異明是非也吕大臨曰為祖父母齊衰期為曽祖父母齊衰五月此所以定親疏也嫂叔不通問嫂叔無服燕不以公卿為賓以大夫為賓此所以決嫌疑也大夫為世父母叔父母衆子昆弟昆弟之子降服大功尊同則不降所以别同異也禮之所尊尊其義也其文是也其義非也君子不行也其義是也其文非也君子行也此所以明是非也臣按天下之事各有兩端混然而不可辨别者君子必以禮辨之親疏以禮而定嫌疑以禮而決同異以禮而别是非以禮而明道徳仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊是以君子恭敬撙節退讓以明禮吕大臨曰禮者敬而已矣君子恭敬所以明禮之實也禮節文乎仁義者也君子撙節所以明禮之文也辭遜之心禮之端也君子退讓所以明禮之用也臣按曲禮此言則天下之事無一而不本扵禮者而後世為治者顧以禮為虚文而一以法令從事豈知本者哉聖人作為禮以教人使人以有禮知自别扵禽獸吕大臨曰人之血氣嗜慾視聴食息與禽獸異者幾希特禽獸之言與人異耳然猩猩鸚鵡亦或能之是則所以貴扵物者蓋有理義存焉聖人因理義之同然而制為之禮然後父子有親君臣有義男女有别人道所以立而與天地參也縱慾怠敖滅天理而窮人欲将與馬牛犬彘之無辨是果扵自棄而不欲齒扵人類者乎臣按吕氏之言儆切可以為世之無禮者戒太上貴徳其次務施報禮尚往来往而不来非禮也来而不往亦非禮也劉彛曰太上者至極之稱猶言全徳也臣按禮者稱而已矣禮固以徳為貴而施與扵人與報人之賜乃人道之不能無者是以位雖有貴賤尊卑之殊而往来来往之禮所以相為施報者斷然不可闕也人有禮則安無禮則危故曰禮者不可不學也吕祖謙曰人生天地之間强足以陵弱衆足以暴寡然其羣而不亂或守死而不變者畏禮而不敢犯也人君居百姓之上惟所令而莫之違者恃有禮以為治也一人有禮衆思敬之有不安乎一人無禮衆思伐之有不危乎此所以繫人之安危而不可不學者臣按人道之所以立者以其有此禮也茍無禮焉則强将恃其力以陵弱衆将恃其勢以暴寡富将恃其財以吞貧智将恃其能以欺愚則是天下之人皆将惟其勢力財能之是恃而不復知有尊卑上下之分矣人何由而安哉聖人知其然故制為秩然之禮以立為當然之法頒之學宫之中設為師儒之教講明其理推行其道使其有所畏而不敢犯有所敬而不敢忽此君位所以髙而不危而民用亦以之而平康也然則天下其可以一日無禮而斯人其可以一日不學禮乎富貴而知好禮則不驕不淫貧賤而知好禮則志不懾戴溪曰禮以卑為主以恭為本故禮者所以柔伏伏其侈大之意而習為退遜謙下之道故有禮之人其容肅然以正其氣粹然以和望其顔色而知其人之可親也其容狠其氣暴望其顔色而生易慢之心者必其無禮之人也富貴之失禮以驕貧賤之失禮以諂驕者失扵亢諂者失扵卑其為失禮一也臣按禮之為禮大中至正之界限也富貴者不可過扵是貧賤者必求至扵是過扵是則氣盈氣盈則驕而淫不至扵是則氣歉氣歉則懼而屈是何也不知禮之為禮也誠以禮之為禮是乃吾心大中至正之界限人有禮則中有定見外有定守而不為外物所動矣貧者不以貨財為禮老者不以筋力為禮吕大臨曰君子之扵禮不責人之所不能備貧不以貨財為禮是也不責人之所不能行老者不以筋力為禮是也臣按無財不可以為禮非强有力不可以行禮是以操有餘之勢力者恒以是而恕諸不足之人不恃吾之富與强而强人之所不能備而求其如吾志焉檀弓子思曰先王之制禮也過之者俯而就之不至焉者跂而及之臣按子思此言雖為喪禮而言然凡為禮者莫不皆然子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也吳澂曰哀敬言其心禮之本也禮言其物禮之文也禮有本有文本固為重然謂之與其謂之不若此矯世救弊之辭爾蓋本與文兩相稱者為盡善也臣按此子路聞孔子之言亦寧儉寧戚之意以上禮儀之節上大學衍義補卷三十八
