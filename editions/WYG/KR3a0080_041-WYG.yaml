body:
  text: 大學衍義補卷四十一明丘濬撰治國平天下之要明禮樂樂律之制上之上易象曰雷出地奮豫先王以作樂崇徳殷盛也薦之上帝以配祖考程頥曰雷者陽氣奮發隂陽相薄而成聲也陽始濳閉地中及其動則出地奮震也始閉鬱及奮發則通暢和豫故為豫也坤順震發和順積中而發于聲樂之象也先王觀雷出地而奮和暢發于聲之象作聲樂以褒崇功徳其殷盛至于薦之上帝推配之以祖考朱熹曰雷出地奮和之至也先王作樂既象其聲又取其義殷盛也吕祖謙曰豫為易中之樂臣按此六經論樂之始夫樂本于人心而作於聖人人皆知之而不知聖人所以作樂實因天陽之雷出于地隂之中奮發迅動以成聲而有和暢豫悅之象故既法其聲又取其義作為一代之樂以褒崇其功徳之隆焉然樂之用不止于一或用于朝覲或用于燕享或用于羣祀而其最盛者則惟以用之薦上帝以配祖考焉帝曰䕫命汝典樂教胄子詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和朱熹曰胄長也自天子至卿大夫之適子也教胄子者其所以教之之具専在于樂如周禮大司樂掌成均之法以教國子弟而孔子亦曰興于詩成于樂蓋所以蕩滌邪穢斟酌飽滿動盪血脈流通精神養其中和之徳而救其氣質之偏者也心之所之謂之志心有所之必形于言故曰詩言志既形于言則必有長短之節故曰歌永言既有長短則必有高下清濁之殊故曰聲依永聲者宫商角徵音止羽也人聲既和乃以其聲被之八音而為樂則無不諧協而不相侵亂失其倫次可以奏之朝廷薦之郊廟而神人以和矣聖人作樂以養性情育人才事神祗和上下其體用功效廣大深切乃如此今皆不復見矣可勝嘆哉臣按樂之作必諧于金石絲竹匏土革木之八音使無相奪倫然後幽足以感神明足以感人而通暢協合焉然推原其本則出于人心發于人聲者也是則有虞盛時既以此為治本又専官以之為教使他日繼世出治者皆習熟于樂養之于心志之初陶之于節奏之際和之于聲音之間蓋以樂也者出治之本而人也者用樂之具而胄子也者又所以世世相承用而不絶者也禹曰九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壊朱熹曰九功者合六府水火金木土穀與三事正徳利用厚生也叙者言九者各順其理而不汩陳以亂其常也歌者以九功之叙而永之歌也言九者既已脩和各由其理民享其利莫不歌詠而樂其生也董督也其勤于是者則戒喻而休美之其怠于是者則督責而懲戒之然又以事之出于勉彊者不能久故復即其前日歌詠之言協之律吕播之聲音用之鄉人用之邦國以勸相之使其歡欣鼓舞趨事赴功不能自已而前日之成功得以久存而不壊此周禮所謂九徳之歌九韶之舞而太史公所謂佚能思初安能惟始沐浴膏澤而歌詠勤苦者也吳澂曰勸以九歌者民已樂之又因其情被之絃歌以助其樂事赴功周官有縣正趨其稼事里宰趨其耕耨籥章吹豳雅豳頌與夫為春酒殺羔羊及百日之蜡一日之澤古之遺制猶有存者臣按大禹此言可見樂之理無乎不在而古人作樂之意非但以用之朝廷郊廟學宫而凡閭閻之下田野之間而樂之化無不陶焉後世此意不存非但用樂者忘乎民之勤苦而作樂者亦不知樂之本原所在而失其勸相鼓舞之方治道所以不古若者有以也夫予欲聞六律五聲八音在察也治忽以出納五言汝聽蔡沈曰六律陽律也不言六吕者陽綂隂也有律而後有聲有聲而後八音得以依據故六律五聲八音言之叙如此也忽治之反也聲音之道與政通故審音以知樂審樂以知政而治之得失可知也五言者詩歌之協于五聲者也自上達下謂之出自下達上謂之納汝聽者言汝當審樂而察政治之得失者也臣按聲音之道與政相通所謂六律五聲八音者察政治之具也律吕調則政之得可知律吕不調則政之失可驗人君欲因律吕聲音以察夫政治之得失也必于詩言出納之際求之是故言之成詩者有五或協于宫或協于商或協于角徵羽是言也有作于外者焉有作于内者焉作于外者則采而納之于上作于内者則颺而出之于下在下之言或安以樂或怨以怒聴之者因其言而觀其風俗之所尚由是而達之于上焉在上之言或樂而淫或哀而傷聴之者因其言而知其嗜好之所在由是而達之于下焉因人言之邪正知樂音之乖和察樂音之乖和知政治之得失得則從而維持之失則從而改革之可見聖世君臣切切圖惟治道君于聲律則曰予聞契之以其心也臣于詩言則曰汝聴審之以其耳也吁君欲聞于上而俾臣聴于下臣聴而有得焉又以聞于君君以臣為耳臣以君為心此泰和之治所以獨在虞廷而後世不能及也歟䕫曰戛擊考擊也鳴球玉磬也搏至也拊循也琴瑟以詠祖考來格虞賓丹朱也在位羣后德讓下堂下之樂管鼗鼓如鼓而小有柄合止柷敔柷以合樂敔以止樂笙鏞大鐘以間鳥獸蹌蹌簫韶九成鳯凰來儀蔡沈曰樂之始作升歌于堂上則堂上之樂惟取其聲之輕清者與人聲相比故曰以詠蓋戛擊鳴球搏拊琴瑟以合詠歌之聲也丹朱在位與助祭羣后以徳相讓則人無不和可知矣上言以詠下言以間相對而言蓋與詠歌迭奏也簫古文作箾舞者所執之物簫韶者舜樂之總名也九成者樂之九成也功以九叙故樂以九成鳯凰羽族之靈者來儀者來舞而有容儀也又曰戛擊鳴球搏拊琴瑟以詠者堂上之樂也下管鼗鼓合止柷敔笙鏞以間者堂下之樂也林之奇曰堂上之樂以歌為主堂下之樂以管為主其實相合以成别而言之則有堂上堂下之異合而言之則總名為簫韶臣按自古帝王皆有樂黄帝曰咸池帝堯曰大章然徒有其名耳未聞其聲容節奏何如也惟帝舜之大韶其詳載于虞書解者謂韶紹也紹堯之道以致治也季札至魯觀樂見舞象箾者曰徳至矣盡矣如天之無不幬也如地之無不載也雖甚盛德蔑以加矣孔子在齊聞之三月不知肉味曰不圖為樂之至于斯自有虞以至季札孔子之時幾二千年矣而其聲容之盛猶足以感人如此宜其在當時羣后徳讓庶尹允諧則雖蠢如鳥獸靈如鳯凰莫不率舞而來儀自然之應也是其為樂盡善盡美如天如地後雖有作者不能加之矣是何也蓋舜之徳性之也又以揖遜而有天下樂以象成而又得后䕫為之掌典故其為樂盡善而盡美此孔子所以學之而忘肉味而又舉之教其徒以為邦後之有天下者作為一代之樂以象其成功尚宜彷彿其萬一立徳以為樂本擇人以為樂官求聲氣之元備聲容之盛其庶矣乎周禮大司樂樂官之長掌成均之法成均五帝學名以治建國之學政而合國之子弟焉公卿大夫之子弟凡有道者有徳者使教焉以樂徳教國子中不偏和中節袛敬也庸常也孝善父母友善兄弟以樂語教國子興託物興詞道直言其事諷微言以動之誦以聲節之言發端曰言語答述曰語以樂舞教國子舞雲門其出如雲大卷言能聚物二者皆黄帝樂大咸堯樂大㲈與韶同舞樂大夏禹樂大濩湯樂大武武王樂以六律黄鍾大蔟姑洗㽔賓夷則無射六同大吕夾鐘中吕林鐘南吕應鐘五聲宫商角徵羽八音金石絲竹匏土革木六舞六代樂舞大合樂律同聲音六舞所以大合樂也以致鬼神示奏之郊廟以和邦國頒之諸侯以諧萬民用之鄉射以安賓客用之燕享以說遠人四夷之君以作動物索萬物而享之臣按先王作樂以教國子自虞廷以來已然蓋樂以象成有國者既賴其先世以共成治功所以用其子若弟又將以繼續前人之功冀其異時以輔佑我後人故于其幼穉之日未用之先求道徳之士以為其師保聲容以養其耳目舞蹈以養其血脈和平其善心蕩滌其邪志教之徳則異時居位足以輔徳而長人教之語則異時莅任足以宣辭而專對教之舞則異時出入朝著臨莅大衆周旋動容足以著表儀而華國體朝廷之事莫大于禮樂禮主嚴而樂主和和之入人也尤易而深然其義理淵微而聲容節奏之間有非旦夕所能究竟者故使之朝斯夕斯以講習其所謂律吕聲音及歴代之舞節大㑹合以為樂或用之郊廟或頒之侯國或施之鄉射或用之燕享遠而行之于四夷之來朝者幽而索諸農民之蜡祭者焉國家政治之施合内外通幽明和上下皆必賴于樂今日所以用樂者即前日所教之人也今日又教之以為他日之用繼繼承承而不絶焉此二帝三王之世所以禮樂明備治教休明血脈闗節常相聨絡而享有道之長也歟太師樂工之賢者掌六律六同以合隂陽之聲六律陽聲六吕隂聲陽聲六律黄鍾大蔟姑洗㽔賓夷則無射隂聲六吕大吕應鍾南吕函鍾小吕夾鍾皆文之以五聲宫商角徵羽皆播之以八音金鐘石磬土塤革鼗鼓絲琴瑟木柷敔匏笙竹管簫教六詩曰風諸侯國風曰賦直陳其事曰比即物為比曰興託物興辭曰雅大小雅曰頌祭祀歌頌以六德為之本以六律為之音大祭祀帥瞽登歌帥瞽矇升堂而歌令奏擊拊拊形如鼓下管播樂器吹管者在下令奏鼓􅉧音𦙍小鼓也大饗亦如之饗諸侯亦如祭祀也大射帥瞽而歌射節用之大射大師大起軍旅執同律以聽軍聲而詔吉凶吳澂曰六律六同以合隂陽之聲天地自然之理也蓋日月所㑹在天為十二舎在地為十二辰而律同生焉所以言隂陽之合陽道常饒故其律順而左旋隂道常乏故其律逆而右轉無非應乎日月之所㑹而為天地自然之合所謂合隂陽之聲者本諸此乎六律屬陽六吕屬隂以隂之同乎陽故謂之同所以合隂陽之聲總而言之則有十二律也十二律各具五聲數多而濁者大少而清者細大不踰宫細不踰羽徵之聲清于角角之聲清于商惟五聲相比而成文故曰文之以五聲然五聲寓于八音金石土為隂隂逆推其所始是以先金石而後土匏竹木為陽陽順序其所生是以先匏竹而後木革絲居隂陽之正是以先革而後絲故曰皆播之以八音典同同即六同也言同以見律掌六律六同之和以辨天地四方隂陽之聲陽聲屬天隂聲屬地以為樂器以十有二律為之數度一二三四為數分寸丈尺為度以十有二聲為之齊量大小之劑廣狹之量凡和樂亦如之調和樂聲皆如是也王安石曰天地四方各有隂陽之聲是為十有二聲辨十有二聲雜比而和之取中聲焉以為樂器臣按太師主于和聲所合者隂陽之聲也典同主于制器所辨者不止于隂陽而又兼以天地四方也太師既合其聲而又付之典同使辨其隂陽以制器焉蓋樂非聲不成而所以寓其聲者器也律屬陽吕屬隂隂必同于陽而無所乖異則樂和矣故其合聲也必本乎隂陽而其制器也亦必合乎隂陽凡所以為之度數為之齊量皆不能外乎隂陽之律與聲焉隂陽既合文之以五聲播之以八音歌之以詩寓之以器以祭以燕以射無不和協者矣禮運曰五聲六律十二管還相為宫也陳澔曰五聲宫商角徵羽也六律陽聲黄鍾子太蔟寅姑洗辰㽔賓午夷則申無射戍也隂聲謂之六吕大吕丑應鍾亥南吕酉林鍾未仲吕已夾鍾卯也六律六吕皆是候氣管名還相為宫者宫為君主之義十二管更迭為主自黄鍾始當其為宫五聲皆備黄鍾第一宫下生林鍾為徵上生大蔟為商下生南吕為羽上生姑洗為角餘倣此林鍾第二宫大蔟三南吕四姑洗五應鍾六㽔賓七大吕八夷則九夾鍾十無射十一仲吕十二也臣按書曰聲依永律和聲蓋律以五聲而辨聲以十二律而和然五聲之中又各有變焉非變有所不能盡也是故一律之中各具五聲五聲之外又有所謂二變者焉黄鍾為宫則林鍾徵大蔟商南吕羽姑洗角而應鍾為變宫㽔賓為變徵矣其十一律為宫皆然旋之為十二宫折之為八十四聲類皆五位為五音第之至六為變宫又第之至七為變徵然後旋轉為宫次第無窮矣以上論樂律之制上之上大學衍義補卷四十一
