body:
  text: 大學衍義補卷一百三十明丘濬撰治國平天下之要嚴武備將帥之任中左傳㐮公三年晉侯悼也之弟揚干亂行亂行陳之次於曲梁晉地魏絳戮其僕公必殺魏絳魏絳至授僕人書公讀其書曰日君乏使使臣斯司馬使臣為此司馬之官臣聞師衆以順為武軍事有死無犯為敬君合㑹盟諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司㓂公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也臣按此見魏絳能執法以肅軍禮而晉悼能容臣之執法以佐邦治漢高祖嘗從容與韓信言諸將能將兵多少上問曰如我能將幾何信曰陛下不過能將十萬上曰於君何如曰臣多多而益善耳上笑曰多多益善何為為我禽信曰陛下不能將兵而善將將此乃信之所以為陛下禽也臣按將兵者一夫之能將將者萬乘之智君之於將猶將之於兵也人君必能將將然後將效其力將必能將兵然後兵盡其技將能將兵而君又能將其將則任用得人而所向無不成功矣茍為不然君之於將也惟因其職而用之而無駕馭之方是之為遣將而非所以將將也將之於兵也惟以其勢而驅之而無節制之法是之謂出兵而非所所以將兵也駕馭之道奈何杜甫詩曰君王自神武駕馭必英雄髙祖之馭韓信可謂駕馭英雄矣然非高祖之寛仁大度性明達而好謀能聼知人善任使則亦不能以駕馭之也較之易所謂神武不殺雖不及然亦庶幾乎光武征河北祭遵為軍市令舍中兒犯法遵格殺之光武怒命收遵主簿陳副諌曰遵奉法不避是敎令所行也光武乃貰之以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也賈復與五校戰於眞定大破之復創甚光武大驚曰我所以不命賈復别將者為其輕敵也果然失吾名將聞其婦有孕生女耶我子娶之生男邪我女嫁之不令其憂妻子也復病尋愈相見甚懽臣按昔人謂光武善將將闗輔之役不取諸將之健鬬而獨遣馮異荆州之事以呉漢之不習舟師而獨任岑彭皆素知其才略而明於授任而又能感之以恩假之以權結之以心觀賈復病傷而恤其妻子祭遵殺舍中兒而戒飭諸將及賈復之於㓂恂有部將誅戮之耻則又為之致禮極歡以消其怒曰天下未定兩虎安得私鬬今日朕分之遂戮力同心以濟天下之難其御將亦多術矣光武時馮異專制闗中後人有章言其威權至重帝以章示異異惶懼上書謝罪詔報曰將軍之於國家義為君臣恩猶父子何嫌何疑而有懼意臣按人君之於臣最不可用智數而於武將尤不可蓋君臣上下當以誠心相感茍有一毫疑貳之心而懷機蓄智以相待則君臣有不終者矣光武於馮異可以為萬世人君推誠待下之法唐徳宗時以朱泚亂幸奉天見其反迹漸露李懷光以千里赴難不得朝頗恚恨屯兵不出戰德宗遣李晟李建徽楊惠元三節度與之聨屯晟懼為所并乃移屯陸贄上狀言太上消慝於未萌其次救失於始兆况乎事情已露禍難埀成委而不謀何以寜亂今因李晟願行便遣合軍同往託言晟兵素少慮為賊泚所邀藉此兩軍迭為掎角仍先諭㫖密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心疾雷不及掩耳者也夫制軍御將所貴見情離合疾徐各有宜適當離者合之則召亂當合者離之則寡功當疾而徐則失機當徐而疾則漏策得其要􅆻其時然後舉無敗謀措無危勢臣按當是時李晟既徙屯東渭橋後數日李懷光果幷李建徽楊惠元兵惠元死之贄之料敵可謂明矣然贄所言非但可以施之於當時其所以制軍馭將之策離合疾徐之勢所謂得其要契其時者百世之下皆所當知者也陸贄言於德宗曰尅敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖才不為用兵不足恃與無兵同將不為用與無將同將不能使兵國不能馭將非止費財養寇之弊亦有不戢自焚之災自昔禍亂之興何嘗不由於此臣按自古立國者必文武並用將相兼任然言相臣者不言馭而馭之為言乃獨加之將兵之武臣蓋將之為將以武用為事以彊毅為任非人君有以駕馭之不能得其用也雖然此特霸主馭臣之術耳豈仁君待純臣之道哉夫古之所謂將臣者非求之於文臣之外用之以總庶政則謂之相用之以統軍旅則謂之將人君待之當如一誠心以信之直道以臨之任之云耳何名為馭哉䞇又曰遇敵而所守不固陳謀而其效靡成將帥則以資糧不足為詞有司復以供給無闕為解既相執證理合辯明朝廷毎為含糊未嘗躬究曲直措理者吞聲而靡所誣善者罔上而不慚馭將若斯可謂課責虧度矣課責虧度措置乖方將不得竭其才卒不得盡其力屯集雖衆戰陳莫前虜毎越境横行若渉無人之地遞相推倚無敢誰何虛張賊勢上聞則曰兵少不敵朝廷莫之省察惟務徵發益師無裨備禦之功重増供億之弊臣按朝廷舉事當如青天白日一事不可放過而於制馭將帥尤不可含糊隠忍是故萬人之中而一卒被虜若無損也千里之地而一障被刼若無傷也然漸不可長微所當防功過不可不明是非不可不審是非審而功過明如是則萬里之逺如在几席之前萬夫之多悉在洞察之下措理者得以伸其藴誣罔者不能行其私將見將無不竭其才卒無不盡其力矣宋太祖嘗命有司為洺州防禦使郭進治第凡㕔堂悉用􅝕瓦有司言惟親王公主始得用此上曰郭進控扼西山逾十年使我無北顧憂我視進豈減兒女邪上寵異將帥多類此故能得其死力云臣按宋祖視將帥不減其兒女大哉言乎帝王無間之仁也夫君以子道待其臣臣不以父道事其君君以家屬蓄其臣臣不以家事視其國非人也太祖時内臣有逮事後唐者上問曰莊宗以英武定中原享國不久何也對曰莊宗好畋獵務姑息將士毎出次近郊禁兵衛卒必控馬首告兒郎輩寒冷望與救接莊宗即隨其所欲給之蓋威令不行賞賚無節也上撫髀歎曰二十年夾河戰争取得天下不能用軍法約束此輩縱其無厭之求以兹臨馭誠為兒戱朕今撫飬士卒固不吝惜爵賞茍犯吾法惟有劒耳臣按人君之與將臣待之不可不誠馭之不可不嚴太祖蓋得之矣太祖以姚内斌為慶州刺史謂近臣曰安邊御衆須是得人若分邊寄者能禀朕意則必憂恤其家屬厚其爵禄多與公錢聼其召募驍勇以為爪牙茍財用豐盈必能集事朕雖減後宫之數極於儉約以備邊費亦無所惜也臣按後世人主得用將之術者首稱宋祖觀其謂財用豐盈必能集事雖減後宫之數極於儉約以備邊費亦無所惜眞知所輕重緩急可以為百世帝王用將之法矣太祖時郭進御軍嚴部下整肅上時遣戍卒必諭之曰汝輩當謹奉法我猶赦汝郭進殺汝矣嘗有軍校詣闕訴進不法事上謂近臣曰所訴事多非實蓋進御下嚴甚此人有過畏懼而誣妄之耳即命執以與進令自誅之進方奉表謝㑹北漢入㓂進謂其人曰汝敢論我信有膽氣今捨汝罪汝能掩殺此㓂則薦汝於朝廷軍校果立功而還臣按人君用將而能用之以法使其法之必行則號令行而事無不集矣後世人主往往許將臣以軍法從事及其下有來訴其用法過度者却又責之則為將者不知所守而為其下者無所畏矣然則奈何曰有來訴者執以還之他日别敕以戒之可也乾德二年王師征蜀十二月京師大雪帝設氊帷於講武殿衣紫貂裘帽以視事忽謂左右曰我被服如此體尚覺寒念西征將帥衝犯霜霰何以堪處即解裘帽遣中使馳驛齎賜王全斌且諭㫖諸將不得徧及全斌拜賜感泣臣按宋太祖因深宫之寒而思邊塞之苦臣下聞此安得不感歎而思盡其忠節哉後世人主耳目所及猶不知恤視此可以觸類而興思矣太祖聞西川行營有大校割民妻乳而殺之者亟召至闕斬於都市初近臣營救頗切上曰興師弔伐婦人何罪殘恐至此當速置法以償其寃臣按王者興師以至仁伐至不仁去其不仁所以廣吾仁也而為將領者不體上之仁而恣其暴虐豈仁者之師哉太祖命曹彬伐江南始行許彬以為使相及還語彬曰今方隅尚有未服者汝為使相品位極矣肯復力戰耶且徐徐更為我取太原因賜錢五十萬彬至家見布錢滿室乃歎曰好官亦不過多得錢耳何必使相也上愛惜爵位不妄與人類此吕中曰人言漢高祖善將將者以不吝爵賞故也然當天下未定而信越諸人爵已王矣一旦固陵之㑹不至則不免裂數千里地以封之此高祖有殺諸將之心矣宋初平江南之功至大然寜賜以數十萬錢而靳一使相蓋品位已極則他日有功何以處之此終太祖之世而無叛將也臣按人君之於爵賞雖有一定之規而不可無意外之慮蓋國之爵禄有限而人之功庸無窮吾於一事之功而遽爵之極品之位後又有功將何以加之哉此後世功臣所以往往積功至於無可賞之地而罹他患也乾德五年王全斌等平蜀還有罪責降全斌為崇義留後開寳末車駕幸洛陽郊祀召全斌侍祀以為武寜軍節度謂之曰朕以江左未平慮征南諸將不遵紀律故抑卿數年為朕立法今已克金陵還卿節鉞仍賜銀器萬兩帛萬匹錢千萬富弼曰王全斌有功可掩其罪也太祖以諸國未平恐將帥恃功為過故抑全斌以立國法及事寜之後追賞前功此眞得駕馭英雄之術也臣按說者謂宋太祖之於王全斌得帝王駕馭英雄之術然幸而全斌十年不死而宋祖江左即平設不幸而有不皆如人意者則全斌之罪終不白而太祖之心終不明矣大抵人君為事其處心也當如青天白日其處事也當如震雷時雨蘇洵作衡論其御將篇有曰人君御臣相易而將難將有二有賢將有才將御賢將之術以信御才將之術以智漢之衛霍趙充國唐之李靖李勣賢將也漢之韓信黥布彭越唐之薛萬徹侯君集盛彥師才將也賢將既不多有得才者而任之可也茍又曰是難御則是不肖者而後可也結以重恩示以赤心羙田宅豐飲食極其口腹耳目之欲而折之以威此先王所以御才將者也將之才有小大傑然於庸將之中者才小者也傑然於才將之中者才大者也才小志亦小才大志亦大人君當觀其才之小大而為制御之術以稱其志臣按蘇氏論將有賢才二者是已至於御賢將之術以信御才將之術以智所謂智者結以重恩示以赤心而極其口腹耳目之欲而折之以威嗚呼智與信皆五常之德也不逆詐不億不信是則所謂信也而能先覺豈非智乎恩之所施心之所示皆本乎當然之禮而出乎自然之情非故以是而結之示之也蓋所謂賢才之品雖異而信智之理不殊於信智之中而又有仁有義有禮焉仁以保愛之義以節制之禮以優待之是則所謂天之道君之德國之政也術云乎哉洵又曰御將者天子之事也御兵者將之職也或者以為兵久驕不治一旦繩以法恐因以生亂昔者郭子儀去河南李光弼實代之將至之日張用濟斬於轅門三軍股栗夫以臨淮之悍而代汾陽之長者三軍之士竦然如赤子之脫慈母之懷而立乎嚴師之側何亂之敢生且夫天子者天下之父母也將相者天下之師也師雖嚴赤子不敢以怨其父母將相雖厲天下不敢以咎其君其勢然也天子推深仁以結其心將相厲威武以振其墮彼其思天下之深仁則畏而不至於怨思將帥之威武則愛而不至於驕臣按洵謂天子推深仁以結其心將帥厲威武以振其墮得古人威懐天下之術以上言駕馭漢興六郡良家子給選羽林期門以材力為官名將多出焉軍功多用超等大者封侯卿大夫小者郎臣按六郡者隴西天水安定北地上郡西河也古人謂闗西出將即此地西方屬金金主肅殺人生其地者多壯勇耐寒苦自古以武勇奮者多在於斯雖然此論其常耳若夫天地生才無往而不有此又不可專以地氣拘也北魏孝明時任城王澄以北邊鎭將選舉彌輕恐賊虜闚邊山陵危迫奏請重將鎭之選脩警備之嚴詔公卿議之廷尉少卿袁翻議以為北緣邊州郡官不擇人惟論資級或値貪汙之人廣開戍邏多置帥領或用其左右姻親或受人貨財請嘱皆無防冦之心惟有聚斂之意其勇力之兵驅令抄掠如有執獲奪為己富其羸弱老小之輩微解金鐡之工少閑草木之作無不搜營窮壘苦役百端自餘或伐木深山或芸草平陸販貿往還相望道路此等禄既不多貲亦有限皆收其實絹給其虛粟窮其力薄其衣用其功節其食綿冬歴夏加之疾苦死於溝瀆者什常七八是以鄰敵伺間擾我疆場皆由邊任不得其人故也自今以後南北邊諸藩及所統郡縣府佐統軍至於戍主皆令朝臣王公以下各舉所知必選其材不拘階級若稱職及敗官并所舉之人隨時賞罰臣按袁翻所議濫舉將領之弊非但在當時然也其欲朝臣王公各舉所知必選其材不拘階級若稱職及敗官并賞罰舉主之人臣竊以為其人有功并賞其舉主即漢高祖因陳平而賞魏無知也此固可以激勸薦賢為國之人若夫兵家勝敗無常事固有出於意料之外者若其人果怯懦而謂之勇果昏愚而謂之智則坐以濫舉之罰彼固無辭矣若夫事有出於不得已有非人力所能與焉者宜加硏審核實不宜一槩以連坐坐之也不然則彼過為身謀者不復為國舉賢矣唐武舉起於武后之世長安二年始置武舉其制有長垜馬射歩射筒射又有馬鎗翹闗負重身材之選亦以鄉飲酒禮送兵部馬端臨曰唐選舉志言武舉選用法不足道故不復書然郭子儀大勲盛德身佩安危自武舉異等中出是豈可槩言不足道耶唐武選兵部主之課試之法如舉人之制取其軀幹雄偉應對詳明有驍勇材藝及可為統帥者若文吏求為武選取身長六尺以上籍年四十以下强勇可以統人者臣按唐人選武將不但於武臣而亦於文吏中求焉今宜立為定制凡文吏能應武選者優等擢用之比其原資超三級不如此則人不肯應何則文吏少而重武職多而輕故也宣宗大中六年党項復擾邊宣宗欲擇可為邠寜帥者而難其人從容與翰林學士畢諴論事諴援古據今具陳方略上悦曰吾方擇帥不意頗牧近在禁庭卿其為朕行乎諴欣然奉命臣按將才古稱難得然以臣觀之非其才之難得良以其人之不易知也非獨上之人難於知人而其人亦不易以自知也蓋世之求將者必求其智與勇如有所用必先有所試可也然試之以勇可以得其膂力而不能得其剛决試之以智可以得其謀論而不能得其精審是故匹夫之猛未必可以當大敵警敏之見未必可以洞先機此人君之求將所以貴乎先事而預求多方而廣蓄也宋太祖謂近臣曰今之武臣欲盡令讀書貴知為治之道李沆曰昔光武中興不責功臣以吏事及天下已定數引公卿郎將講論經義夜分乃罷蓋創業致治自有次第今太祖欲令武臣讀書可謂有志於治矣臣按太祖此言即吳大帝勸魯肅讀書之意為將而不明義理不通古今雖能成功不過麤材而已是故古之名將無不知書者但不循行數墨尋章摘句如儒生之為耳宋有武舉武選咸平時令兩制詳定入官資序故事而未行仁宗時始親試武舉先閲其騎射而後試之慶厯六年策武舉以策為去留弓馬為高下臣按武事與文藝異固不可以言語文事求也然於無事之時欲求戰陳軍旅之士不以言語文字求之又不可得也大抵求士以資世用貴乎得識義理知機變之人無間文武皆然也試之以武舉欲其知威武戰爭之意爾彼誠識義理知機變一旦臨事料敵出竒應變舉諸此而措之耳論文科者謂科目不足以得人豪傑之士由是而出爾臣於武舉亦云眞宗謂輔臣曰將帥才難今文武中固亦有人蓋不經戰陳無由知之雖天下無事然兵不可去戰不可忘古之道也馬知節曰將相之才非可坐而知之顧臨事機變如何耳臣按眞宗謂將帥才難文武中固亦有之不經戰陳無由知之然戰不可試蘇軾謂試之於治兵蓋得之矣范仲淹言於仁宗曰邊上將帥嘗患少人國家奄有四海未必乏才豈天地生人厚於古而薄於今哉蓋選之未精用之未至今諸軍諸班必有勇知之人多被管軍臣僚遞互彈壓不得進用坐至衰老伏乞專督管軍臣僚於諸班中摉羅智勇之人各舉一名不分將校長行試以武藝或觀其膽略出衆便可遷轉於邊上任使如將來頗立戰功則明賞舉主或屢敗軍事亦當連坐臣按就軍伍階級中求將㧞其優量其才循其序而用之則事半而功倍矣此可以為平世選將之法然遇有非常之變則又在乎變通焉歐陽脩言於仁宗曰古語曰將相無種故或出於奴僕或出於軍卒或出於盜賊惟能不次而用之乃為名將耳國家求將之意雖勞選將之路太狹今詔近臣舉將而限以資品則英雄之士在下位者不可得矣試將才者限以弓馬一夫之勇則智略萬人之敵皆遺之矣山林奇傑之士召而至者以其貧賤而薄之不過與一主簿借職使其怏怏而去則古之屠釣販牛之傑皆激怒而失之矣至於無人可用寜用龍鍾跛躄庸懦暗劣之徒皆委之要地授之兵柄天下三尺童子皆為朝廷危之議者不知取將之無術但云當今之無將臣願陛下革去舊弊奮然精求有賢勞之士不須限以下位有智略之人不必限以弓馬有山林之傑不可薄其貧賤惟陛下能以非常之禮待人人臣亦將有非常之效報國臣按脩謂有賢勞之士不須限以下位有智略之人不必試以弓馬有山林之傑不可薄其貧賤人君之選將才因人所舉薦及有功當陞賞者恒以此三言為權度則得之矣脩又言曰伏見唐及五代至於國朝征伐四方立功行陳其間名將多出軍卒只於軍中自可求將凡求將之法先取近下禁軍至廂軍中年少有力者不拘等級因其技同者毎百人團為一隊而教之較其技精而最勇者百人之中必有一人矣得之以為隊將合十隊將而又教之較其技精而最勇者十人之中必有一人矣得之以為裨將合十裨將而又教之又於其中擇有識見知變通者十人之中必有一人得之以為大將此一人之技勇乃萬人之選又於其中擇有智謀者以輔之臣所謂只於軍中自可求將者此也臣按脩之此策行之今日亦為良便蓋祖宗以來軍伍之制階級部分已定難遽更改誠能就隊伍中較其人之技精而能勇者以次比較等而上之試以軍職與原係管軍官員相兼任用待其智勇著見及有顯功者不次擢用如此亦足以得人而用之不必他求而有矣富弼言於仁宗曰應制科者必樂為賢良方正恥為將帥邊寄之名蓋令人重文雅而輕武節也又考試者欲使難其對必求艱奥𤨏碎之事為問故令所習不專為有用之學武舉者蹶張馳射儕於卒伍固不敢望得異士臣請近臣及藩鎮大臣於文武官中各舉明兵法有威果習練武略堪任將帥者一二人仍請不限品秩不責罪過限品秩則下位有才者遺矣責罪過則負譴有才者亦遺矣既而召置闕下量與遷擢隨其品位任於邊塞重難之地使共磨勵且以觀其能否焉或有警急則取之有處遣之不疑與夫臨事而命命而不果夐相逺也臣按富弼請舉將帥不限品秩不責罪過蓋限品秩則卑賤者不與而世多遺才矣責罪過則詿誤者永棄而世無全人矣凡求才以用世皆不可況求將才以即戎乎弼又言曰宜於太公廟建置武學許文武官與白身歳得入補聚自古兵書置於學中縱其討習勿復禁止夫習武者讀太公孫呉穣苴之術亦猶儒者治五經亦令雜讀史傳博知古今勝敗之勢以輔佐兵術兵術既精史傳既博然後中年一考校三年大比當雜用兵術史傳之策才者出試之不才者尚許在學臣按自古文武無二道有文事者必有武備未有文而不武武而不文非所以為武也然此三代之學也後世事事不如古生於世者皆今之人而所為之事必欲古之復是務虛名而無實效武學之設雖非古然聚武胄於一室之中專為一事之學子夏謂百工居肆以成其事韓愈謂事業有專攻亦未必無益也蘇洵言於宋仁宗曰寛則寵名譽之人急則用介胄之士今者所用非所飬所飬非所用國家用兵之時購方略設武舉使天下屠沽健武皆能徒手攫取陛下之官而兵休之日雖有超世之才而惜升斗之禄臣恐天下有以窺朝廷也今之任為將帥卒有急難而可使者誰也陛下之老將曩之所謂戰勝而善守者今亡矣臣愚以為可復武舉而為之新制以革其舊弊且昔之所謂武舉者蓋疎矣其以弓馬得者不過挽彊引重市井之麤材而以策試中者亦皆記録章句區區無用之學又其取人太多天下知兵者不宜如此之衆而待之又甚輕其第下者不免於𨽻役故其所得皆貪汙無行之徒豪傑之士恥不忍就宜因貢士之歳使兩制各舉其所聞有司試其可者而陛下親策之權略之外便於弓馬可以出入險阻勇而有謀者不過取一二人待以不次之位試以守邊之任文有制科武有武舉陛下欲得將相於此乎取之十人之中豈無一二斯亦足以濟矣臣按天下安注意相天下危注意將然安不常安也一事有齟齬一人有杌􅑾安即轉而危矣人君當國家無事之時賢才彚進之際恆思於心曰今日幸無事人才足給使令用之理政務涖黎庶固有人矣卒有急難今之將帥可以折衝千里固疆圉息禍亂者誰歟汲汲以求之切切以思之孜孜以訪之試以繁難寛其約束養其威望儲之以備一旦倉卒之用此最今日之急務也神宗熈寜五年始建武學於武成王廟選文武官知兵者為教授入學給食習諸家兵法敎授纂次歷代用兵成敗前世忠義之節足以訓者講釋之願試陳隊者量給兵伍在學三年具藝業考試等第推恩未及格者逾年再試以兵部郎中韓縝判武學賜食本錢萬緍生員以百人為額臣按富弼於仁宗時已講立武學至是神宗始立學後世於儒學之外别立武學始此張舜明言於哲宗曰自古守邊選將未必專以攻戰為事要在精神折衝而已如必欲戰而取勝則是兵家之下策故有中朝而興歎側席而為憂在趙則强秦不敢加兵在漢則鮮卑不敢南牧者此豈皆戰之功其聞望精神有以服人者也其聞望精神有以服人豈一朝一夕之事哉必有素養乃可至此今敵人未殄疆場屢騷天怒未加而爪牙先缺此何理也傳云内無良將外有敵國此秦之君臣猶以為憂況以天下之大者乎竊惟天之降才地之生物其杶榦栝栢何時而乏然自毫末以至凌雲培之植之以充梁柱又非一朝一夕之事也惟其先幾有備之實故能免倉卒不及之患臣按舜民言將之為用不必專以攻戰為事要在精神折衝而已斯人也豈易得哉自非平日有以培植之澆灌之壅其根而條其枝去其翳而除其蔽期之以大而不計其小安能成就之使至於斯哉國家得如是者三二人焉則姦雄之心自折夷冦之謀自銷矣高宗時校書郎汪澈因轉對言立國惟文武二道而人才尤不可偏要當求於無事之時陛下親政以來除召四出滯者奮屈者伸然武臣中未聞有薦者望詔帥臣監司於本路大小使臣舉智謀可充將帥勇鷙可率士卒者其侍從臺諌官如有所知亦許論薦臣按國家之儲才如人家之蓄器物閒時求而收之急時出而用之則無缺絶之患矣人才有文武二途文才隨取而隨用取即有之惟武才不常用然亦不常有也須多方以求之諸路以來之積之於無用之地以俟夫一時之需然後儆急不至於乏人用也孝宗隆興元年御試得正奏名三十七人侍御史胡沂言臣觀唐之郭子儀以武舉異等初補右衛長史歷振逺横塞天德軍使祖宗時試中武藝人並赴陜西任使或除京東捉賊或三路沿邊試其效用今率授以𣙜酤之事是所取非所用所用非所學也請宜量其才品之高下考任之淺深授以軍職使之習練邊事諳曉軍旅實選用之初意也乾道三年廷試始依文舉給黄牒同正奏名三十三人榜首賜武舉及第餘並賜武舉出身臣按開武舉以試將才亦猶設文科以取儒士也科目以試士得其文而未必得其行然因言以求其心究其學識亦可彷彿其一二焉武科之於將才何莫不然宋太祖謂科目進士不敢望㧞十得五得一二人足矣臣於武舉謂亦然朱熹言於孝宗曰諸將之求進也必先掊克士卒以殖私財然後以此自結於陛下之私人而祈以姓名達於陛下之貴將貴將得其姓名即以付之軍中使自什伍以上節次保明稱其材武堪任將帥然後具奏為牘而言之陛下之前陛下但見其等級推先案牘具備則誠以為公薦而可以得人矣而豈知其諧價輸錢已若晚唐之債帥哉夫將者三軍之司命而其選置之方乖刺如此則彼智勇材略之人孰肯抑心下氣於宦官宮妾之門而陛下所得以為將帥者皆庸夫走卒而猶望其脩明軍政激勸士卒以强國勢豈不誤哉臣按債帥之說起於晚唐至宋南渡後亦有之方國家隆盛人主公明之時無此等事也熹之此疏說出當時營求以為將帥之弊委曲親切如躬臨其事親見其人然人君用將當加審察曰吾今日之用將帥得無亦有此弊乎幸勿以其案牘具備等級推先而即信以為實然也以上言選用以上論將帥之任中大學衍義補卷一百三十
