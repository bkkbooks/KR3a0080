body:
  text: 大學衍義補卷一明丘濬撰治國平天下之要正朝廷總論朝廷之政臣按宋儒真徳秀大學衍義格物致知之要既有所謂審治體者矣而此治國平天下之要又有正朝廷而總論朝廷之政何也葢前之所審者治平之體言其理也此之所論者治平之政言其事也一主於知一主於行葢必知於前而後能行於後後之行者即所以實其前之知者也理與事知與行其實互相資焉易曰天地之大徳曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民爲非曰義朱熹曰天地以生物爲心葢天地之間品物萬形各有所事唯天則確然於上地則隤然於下一無所爲只以生物為事故易曰天地之大徳曰生郭雍曰天地以生物爲徳故人以大徳歸之聖人得崇髙之位然後成位乎中而贊化育故以位爲大寶也大寶者亦非聖人自以為寶也天下有生幸聖人之得位以䝉其澤故天下以爲寶也蘇轍曰人之所同好者生也所同貴者位也所同欲者財也天下之大情盡於此矣此三者常相爲用生者人之本也無財則無以生無位則無以養生而理財作易者葢知此矣既言三者而參之以仁義其㫖葢有在矣吳澂曰生生不已者天地之大徳然天地生物生人又生與天地合徳之聖人命之居君師之位爲人物之主而後能使天地之所生得以各遂其生也茍或但有其徳而無其位則亦不能相天地而遂人物之生故位爲聖人之大寶大寶謂大可貴重守謂保有之臣按人君所居之位極崇髙而至貴重天下臣民莫不尊戴譬則至大之寶也人君居聖人大寶之位當體天地生生之大徳以育天地所生之人民使之得所生聚然後有以保守其莫大之位焉然人之所以生必有所以養而後可以聚之又在乎生天下之財使百物足以給其用有以爲聚居衣食之資而無離􅄆失所之患則吾大寶之位可以長保而有之矣然有財而不能理則民亦不得而有之所謂理財者制其田里教之樹畜各有其有而不相侵奪各用其用而無有虧欠則財得其理而聚矣所謂正辭者辨其名實明其等級是是非非而有所分别上上下下而無有混殽則辭得其順而正矣既理財正辭而民有趨於利而背於義者又必憲法令致刑罰以禁之使其于財也彼此有無之間不得以非義相侵奪其於辭也名號稱謂之際不得以非義相紊亂與凡貴賤長幼多寡取予之類莫不各得其宜焉是則所謂義也吁聖人體天地生生之仁盡教養斯民之義孰有加於此哉先儒謂易之事業盡於此三言者臣愚以為人君受天地之命居君師之位所以體天地而施仁立義以守其位者誠不外乎此三者而已謹載大易此言於總論朝廷之政之首以爲大寶之獻書舜典詢謀也于四岳四岳官名一人而總四方諸矦之事闢開也四門明四目達四聰朱熹曰書傳雖蔡沈作然二典禹謨皆其師朱熹是正今倣真氏讀書記摽其師名舜既告廟即位乃謀治於四岳之官開四方之門以來天下之賢俊廣四方之視聽以決天下之壅蔽臣按人君以一人之身居四方之中東西南北咸於此焉取正者也一身之精神有限耳目之見聞不周人不能盡識也事不能盡知也故必擇大臣而信任之俾其蒐訪人才疏通壅蔽時加詢謀以求治焉夫朝廷之政其弊端之最大者莫大乎壅蔽所謂壅蔽者賢才無路以自達下情不能以上通是也賢才無路以自達則國家政事無與共理天下人民無與共治下情不能以上通則民間利病無由而知官吏臧否無由而聞天下日趨於亂矣昔唐𤣥宗用李林甫爲相天下舉人至京師者林甫恐其攻己短請試之一無所取乃以野無遺賢爲賀楊國忠爲相南詔用兵敗死者數萬人更以㨗聞此後世人主用非其人不能闢四門明四目達四聰之明效也遂致天寶之亂唐室自此不振以至於亡臣愚竊以謂治亂之原固在乎壅蔽而所以致壅蔽者尤以委任之非其人也諺有之曰一指在前泰山不見姦臣在天子之左右其所以蒙蔽之者豈但一指若哉有一於此則凡布列之在近見聞之可及者且不能以自通矣况夫疏逺之側㣲遐僻之幽隠而欲自通於九重之上難矣噫帝舜此四言真萬世帝王治天下之藥石也循之則治違之則亂惟明主留神省察舜曰咨四岳有能奮起也庸事功也熈廣也帝堯也之載事也使宅居也百揆如宰相之職亮明也采庶事恵順成疇庶類僉衆也曰伯禹作司空僉言伯禹作司空可宅百揆帝曰俞然也咨禹汝平水土行司空之事惟時懋勉也哉勉以宅百揆之事帝曰棄姓姬氏黎民阻厄也飢汝后稷田正官播布也時百榖帝曰契姓子氏百姓不親不相親睦五品父子君臣夫婦長㓜朋友五者之名位等級不遜順也汝作司徒敬敬其事也敷五教謂父子有親君臣有義夫婦有别長㓜有序朋友有信以五者當然之理而為教令也在寛謂寛裕以待之帝曰臯陶亦臣名蠻夷猾亂也夏華夏寇刼人曰寇賊殺人曰賊姦在外曰姦宄在内曰宄汝作士理官也帝曰疇誰也若順也予工僉曰垂臣名有巧思哉帝曰俞咨垂汝共工帝曰疇若予上下上下山林澤藪也艸木鳥獸僉曰益亦臣名哉帝曰俞咨益汝作朕虞虞掌山澤之官帝曰咨四岳有能典朕三禮祀天神享人鬼祭地祗僉曰伯夷姜姓帝曰俞咨伯汝作秩宗主叙次百神之官帝曰䕫臣名命汝典樂敎胄長子子帝曰龍臣名命汝作納言夙夜出納朕命惟允帝曰咨汝二十有二人四岳九官十二牧共二十二人欽哉惟時亮天功曽鞏曰舜命九官新命者六人命伯禹命伯夷咨四岳而命者也命垂命益泛咨而命者也命䕫命龍因人之讓不咨而命者也夫知道而後可宅百揆知禮而後可典三禮知道知禮非人人所能也故必咨於四岳若予工若上下草木鳥獸則非此之比故泛咨而已禮樂命令其體雖不若百揆之大若其事理精㣲亦非百工庻物之可比伯夷既以四岳之舉而當秩宗之任則其所讓之人必其中於典樂納言之選可知故不咨而命之也若稷契臯陶之不咨者申命其舊職而已陳雅言曰二十有二人之職皆天之職也典天叙禮天秩服天命刑天討無一事之不本於天天有是事則人有是官天不自為而人代之帝舜於此語以欽哉亮天功者欲使知所敬也臣按朝廷之上有百揆以統内之庻官有四岳以統外之州牧既分命之又總命之人必稱其官官必盡其職此帝世之治所以後世不能及也誠以帝世之用人也或帝心之簡在或公庭之僉舉或詢之大臣或得之推讓非若後世有由旁蹊奥援阿私而倖進者也不問其人之能與否不論其職之稱與否是以用各違其才人不稱其官官既不稱則朝廷之政何由而舉政既不舉則天下之民何由得安此後世所以不古若也臣嘗因是而論之帝舜初咨四岳以求宅百揆也不曰熈舜之載而曰熈堯之載葢以我今日所治之事非我之事堯之事也總咨二十二人以各敬其職也不曰亮舜之功而曰亮天之功葢以我今日所治之功非我之功天之功也爲人君者誠知人臣所熈之事皆祖宗之事所亮之功皆上天之功則決不肯狥私意以用人用匪人以廢事則朝廷之政得人修舉天下之民由是乂安矣噫彼其以祖宗之官爵為己之私物以上天之事功行人之私意豈不有以負祖宗之付託上天之建立哉識治體者尚鍳於兹大禹謨虞書嘉善也言㒺攸所也伏野無遺賢萬邦咸寧朱熹曰舜然禹之言以為信能如此則必有以廣延衆論悉致羣賢而天下之民咸被其澤無不得其所矣臣按朝廷為治之道固非一端而其要在取人之善用人之能而己夫人莫不各有所知亦莫不各有所能心有所知也發以爲言已有所能也用以爲才言有善否人君則惟其善而取之不使有所伏藏於下才有大小人君則隨其才而用之不使有所遺漏於外則凡朝廷之上見於施行者無非嘉善之言列於庻位者無非賢俊之士天下其有不安也哉茍或不然所聞者皆卑冗順㫖之言言之善者以為不善不善者反以為善所用者皆庸下諂諛之人人之賢者以為不賢不賢者反以為賢如是則善言不聞賢才逺遁欲事之理民之安難矣是以古之聖帝明王必廣開言路包容以納之大闢賢門多方以來之雖以帝舜之為君大禹之爲臣猶必以此爲君臣克艱之效後世君臣可不以之爲法則乎徳惟善政政在養民朱熹曰徳非徒善而已惟當有以善其政政非徒法而已在乎有以養其民下文六府水火金木土榖三事正徳利用厚生即養民之政也臣按朝廷之上人君脩徳以善其政不過為養民而己誠以民之爲民也有血氣之軀不可以無所養有心知之性不可以無所養有血屬之親不可以無所養有衣食之資不可以無所養有用度之費不可以無所養一失其養則無以為生矣是以自古聖帝明王知天爲民以立君也必奉天以養民凡其所以修徳以為政立政以為治孜孜焉一以養民為務誠以一物不脩則民失一物之用一物失其用則民所以養生之具缺其一矣是故脩水之政以疏鑿脩火之政以鑽灼脩金木之政以鍛鑄刻削脩土穀之政以耕墾播種使民於日用之間得以爲生養之具然猶未也又必設學校明倫理以正其徳作什器通貨財以利其用足衣食備葢藏以厚其生何者而非養民之政乎吁自古帝王莫不以養民為先務秦漢以來世主但知厲民以養己而不知立政以養民此其所以治不古若也歟洪範箕子所陳以告武王者次三此洪範九疇之次三疇曰農用八政三八政一曰食務農重穀之政二曰貨阜通貨財之政三曰祀報本反始之政四曰司空掌度土居民之政五曰司徒掌敬敷五教之政六曰司寇掌立法懲姦之政七曰賓懷柔賓客之政八曰師除殘禁暴之政蔡沈曰八政曰農所以厚生也史漸曰政莫大於是舜總之九官周分之六卿箕子裂而爲八名雖異實無殊也臣按洪範九疇次三曰農用八政其目凡八所謂食所謂貨謂之農可也而祀以行禮賓以待客師以用兵與夫三官所掌之事皆謂之農何哉葢天之立君凡以為民而已而民之中農以業稼穡乃人所以生生之本尤爲重焉故凡朝廷之上政之所行建官以涖事行禮以報本懷柔以通逺人興師以禁暴亂何者而非為民使之得以安其居盡其力足其食而厚其所以生哉是則上天所以立君而俾之立政之本意而為治者不可不知者也後世朝廷之所施行宫闈之事則有之國都之事則有之官府之事則有之邊鄙之事則有之而顓顓及於農民之事者葢鮮矣間雖有之而不知其本意之出於爲農泛然而施之漫然而處之往往反因之以戕民生廢農業是皆昧於洪範農用八政之本㫖也周禮惟王建國周王建立國都辨方辨别四方正位正祖社朝市之位體國營國家如身有體經野盡郊野如織有緯設官如冡宰司徒之類分職如掌治掌教之類以爲民極以爲斯民至極之標凖葉時曰聖人以中道立標凖於天下而使天下之人取中焉武王訪洪範於箕子以叙彛倫而五以皇極居中古今未有舎皇極而能立國者今以周禮考之土圭測景以求地中建國也靣朝後市左祖右社辨方也朝分内外位别東西正位也公五百里至男百里體國也九夫為井至四縣爲都經野也一曰天官至六曰冬官設官也一曰治職至六曰事職分職也而周公則總之以為民極焉極也者不識不知順帝之則如堯之立民是也是彛是訓于帝其訓如周之敷言是也今周公所以為民立極者惟在王畿方位國野官職之中葢王畿立而後根本定方位設而後等級明國野分而後疆理正官職舉而後綱目張民極之立孰有大於此者故周公不惟於天官言之而五官各引之以冠其篇首丁寧訓告若是諄複則是三百六十餘官事事物物皆有極何往而非斯民之標凖歟葢極之所在所以習民於尊卑等級之中而導民於禮樂敎化之内銷其亡等冒上之念而斂其安分知足之心斯民入則㑹其有極出則歸其有極經制烏乎而不定風俗烏乎而不淳太宰之職掌建邦之六典以佐王治邦國一曰治典以經邦國以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以和邦國以統百官以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以紏萬民六曰事典以富邦國以任百官以生萬民吳澂曰治典者理之使不易其常然治必先官府而推以紀萬民則錯綜不遺于經爲詳教典者導之使不拂其常然教必先官府而推以擾萬民則馴習不違於安為詳禮典者交好常有以相親統百官而推以諧萬民則相信不乖而和政典者分守常有以相制正百官而推以均萬民則至公無私而平刑典者辭命常有以相戒儆百官而推以糾萬民則纖悉不差而詰矣事典者財利常有以相資任百官而推以生萬民則恵養不窮而富矣臣按上天立君使之統邦國建官府以安民庻所以綱維于上而頒布於下者有六典焉治也敎也禮也政也刑也事也分之雖有六名合之則歸一治故曰太宰掌建六典以佐王治邦國吁散之有統操之有要朝廷之政無不舉矣乃立天官冢宰使帥其屬而掌邦治以佐王均邦國乃立地官司徒使帥其屬而掌邦敎以佐王擾邦國乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國乃立夏官司馬使帥其屬而掌邦政以佐王平邦國乃立秋官司寇使帥其屬而掌邦禁以佐王刑邦國乃立冬官司空使帥其屬而掌邦事以佐王富邦國冬官亡以元吳澂説補之鄭𤣥曰六官司徒司馬司空皆云司以其各能一官不兼羣職太宰不言司者以其總御衆官不主一官之事宗伯亦不言司者以其祭祀鬼神鬼神非人所主故也臣按此即周官六卿所分之職也唐虞之世有九官至周始分職爲六卿周公作周禮以此為太宰建邦之六典至成王訓迪百官又復申明焉葢天下之事統於朝廷朝廷之政統於六典所謂治所謂教與夫禮政刑工天下事盡於此矣洪惟我太祖髙皇帝革前代中書省而設六部罷丞相而設尚書侍郎以分掌朝廷之政葢得周公之心於千載之上舉明王之典於三代之前可謂卓冠百王而足以垂法於萬世矣臣故舉此以為總論朝廷之政葢以遵聖祖之制以見今日朝廷爲政之大要其綱領在此也伏願皇上重六部之職簡卿佐之任以為朝廷出政之本其未用也慎於選擇不勝任也亟罷之其既任也專於委注能舉職也久任之則治古之治不難復矣臣不勝惓惓禮記是故先王慎所以感之者故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也所以同民心而出治道也又曰禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣臣按禮樂者刑政之本刑政者禮樂之輔古之帝王所以同民心出治道使天下如一家中國如一人者不過舉此四者措之而已是則所謂脩道之教王者之道治天下之大經大法者也夫有大中之制以節民之心志有至和之節以和民之聲音行此禮樂之道則有法制禁令防此禮樂之失則有刑罰憲度始也治道由此而出終也王道因此而備禮也樂也政與刑也其用在天下其本在朝廷後之有天下國家者其尚端出治之本備王道之制而又為維持防範之具使之四達於當時通行於天下其為治也孰加焉論語子曰道猶引導謂先之也之以政謂法制禁令齊所以一之也之以刑民免而無恥謂茍免刑罰無所羞愧道之以徳齊之以禮謂制度品節有耻且格格致也謂民耻於不善而又有以至於善朱熹曰政者為治之具刑者輔治之法徳禮則所以出治之本而徳又禮之本也此其相為終始雖不可以偏廢然政刑能使民逺罪而已徳禮之效則有以使民日遷善而不自知故治民者不可徒恃其末謂政刑又當深探其本謂徳禮也臣按徳禮政刑四者凡經書所論為治之道皆不外乎此孔子分政刑徳禮以為二而言其效有淺深朱熹則合徳禮政刑為一而言其事相為終始要之聖賢之言互相發也夫人君為治固在脩徳以為化民之本然人非一人地非一地人所禀有偏全地所至有逺近既化以徳而有不一者須必有禮以一之然後吾之徳化可行焉茍導之而不從化之而不齊非有法制禁令又不可也法制以示之於前禁令以約之於後彼猶悖禮而梗化則刑罰之加烏可少哉孟子曰徒善不足以為政徒法不能以自行有政刑而無徳禮是謂徒法有徳禮而無政刑是謂徒善為政之道於斯四者誠不可以缺一者也孔子論治之言散見於經籍者多矣總論為治之要皆莫出於斯宋朱熹告其君曰四海之利病繫斯民之休戚斯民之休戚繫守令今之知府知州知縣之賢否然而監司者今之布政按察司官守令之綱也朝廷者監司之本也欲斯民之皆得其所本原之地亦在乎朝廷而己人君欲監司之皆得其人事之利病所以為民之休戚者皆得上聞惟以正朝廷為先務而正朝廷之具豈有大於用賢才也然其才之所長者不同則任之所宜者亦異願陛下於其大者使之贊元經體以亮天工於其細者使之居官任職以熈庻績能外事者使任典戎幹方之責明治體者使備拾遺補過之官又使之各舉所知布之列位以共圖天下之事使疎而賢者雖逺不遺親而否者雖邇必棄毋主先入以致偏聽獨任之譏毋篤私恩以犯示人不廣之戒進􅅲取舍惟公論之所在是稽則朝廷正而内外逺近莫敢不一於正矣監司得其人而後列郡之得失可得而知郡守得其人而後屬縣之治否可得而察重其任以責其成舉其善而懲其惡夫如是則事之所謂利民之所謂休將無所不舉事之所謂病民之所謂戚將無所不除臣按朱熹此言雖為當時時君而發然其所謂欲斯民之得所本原之地在乎朝廷而以用賢才為正朝廷之具必使内外大小之職進􅅲取舎惟公論之所在是稽則朝廷正而内外逺近莫敢不一於正其言詳悉周備其間所謂稽公論一語尤為切要伏願聖明留意以上總論朝廷之政臣聞宋儒朱熹有言天子至尊無上其居處則内有六寢六宫外有三朝五門其嬪御侍衛飲食衣服貨賄之官皆領於冢宰其冕弁車旗宗祝巫史卜筮瞽侑之官皆領於宗伯有師以道之教訓有傅以傅其徳義有保以保其身體有師氏以􅍇詔之有保氏以諫其惡前有疑後有丞左有輔右有弼其侍御僕從㒺非正人以旦夕承弼厥辟出入起居㒺有不欽發號施令㒺有不臧在輿有旅賁之規旅賁勇士掌執戈盾夾車而趨位宁有官師之典門屏之間謂之宁倚几有訓誦之諫工師所誦之詞書之於几也居寢有暬御之規暬近也臨事有瞽史之道宴居有工師之誦史為書太史君舉則書瞽為詩工誦箴諫大夫規誨士傳言庻人謗商旅於市旅陳也百工獻藝獻其技藝以喻政事動則左史書之言則右史書之御瞽㡬聲之上下㡬察也謂察樂聲不幸而至於有過則又有爭臣七人靣折廷爭以正救之葢所以養之之備至於如此是以恭己南靣中心無為以守至正而貌之恭足以作肅言之從足以作乂視之明足以作哲聽之聰足以作謀思之睿足以作聖然後能以八柄馭羣臣一曰爵二曰禄三曰予四曰置五曰生六曰奪七曰廢八曰誅以八統馭萬民一曰親親二曰敬故三曰進賢四曰使能五曰保庸六曰尊貴七曰達吏八曰禮賓而賞無不慶刑無不威逺無不至邇無不服傅説所謂奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民武王所謂亶聰明作元后元后作民父母所謂天降下民作之君作之師惟其克相上帝寵綏四方箕子所謂皇建其有極斂時五福用敷錫厥庻民惟時厥庶民于汝極錫汝保極董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方者正謂此也熹之兹言所以論人君爲治之道無復餘藴凡夫愚臣所輯正朝廷六條之事皆備其中謹備載於篇以獻伏惟聖明留神觀省先正朝廷以為治平之根本然後推類以盡其餘臣不勝大願大學衍義補卷一
