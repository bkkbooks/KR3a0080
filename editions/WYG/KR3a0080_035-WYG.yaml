body:
  text: 大學衍義補卷三十五明丘濬撰治國平天下之要制國用屯營之田漢文帝從鼂錯音措言募民徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸將送也之費益寡甚大恵也臣按此後世言屯耕邊塞之始葢中國所以不得其安者以外有邊防之擾而邊防所以無擾者以守禦得人有其人而食不給與無人同然邊防之食未易給也道路之逺輸將之難率數十倍而致其一錯謂守邊備塞勸農力本為當世之急務者此也武帝時自敦煌至鹽澤往往起亭而輪臺渠犁皆有田卒數百人置使者校尉領䕶以給使外國者昭帝始元二年發習戰射士調故吏將屯田張掖郡宣帝神爵元年後將軍趙充國將兵擊先零羌充國言擊虜以殄滅為期願罷騎兵屯田計度羌虜故田及公田民所未墾者可二千頃以上田事出謂春人出耕也賦人二十畝至四月草生發騎就草為田者遊兵以充入金城郡益積蓄省大費且條上留田便宜十二事臣按充國為屯田内有亡費之利外有守禦之備古今守邊備塞之良法莫有過焉者也葢地以生物為功凡有土地斯有人民有人之處天皆生物以食之但地有宜不宜耳因其地之所宜而種人之所食隨在而有有所不足而補助之取給於他所可也是故善為國計者必因天時盡地力不以其邊塞之地沍寒之天而輟其人為之功此鼂錯趙充國輩所以有塞下屯田之議也雖然守邊之議固當盡屯田之利亦不可不知擾田之害宣帝問充國曰將軍獨不計虜聞兵罷丁壯相聚攻擾田者及道上屯兵復殺掠人民將何以止之充國復奏北邊自敦煌至遼東乘塞列隧有吏卒數千人虜數大衆攻之不能害今留步士萬人屯田地勢平易多髙山逺望之便部曲相保壍壘木樵與譙同樓也挍聫不絶用木相聫實便兵努飭鬬具烽火幸通埶及并力以逸待勞兵之利者也臣愚以為必先無擾田之害然後收耕田之利今邊塞可耕之地近城堡者固易為力若夫逺外之地地逺而勢孤必如充國所謂乘塞列隧虜大攻不能為害而又有山阜可以望逺有溝塹可以限隔有營壘可以休息架木以為譙望聨木以為棑棚時出遊兵以防冦鈔如是則屯耕之卒身有所蔽而無外虞心有所恃而無内怨得以盡力於􅅵畝之中而享收獲之利矣請當邊境無事之時遣官循行邊境相視土宜一如充國所言者處置防䕶分兵屯種且耕且守則充國之言不徒利於當時而且利於今日矣充國上議時有云惟明詔慱詳公卿議臣採擇臣於是亦云漢末天下亂離民棄農業諸軍並起率乏糧榖無終嵗之計餓則冦掠飽則棄餘民多相食州里蕭條曹操從棗祗請建置屯田以祗為屯田都尉任峻為典農中郎將募民屯田許下得榖百萬斛於是州郡例置田官所在積榖倉廪皆滿故操征伐四方無運糧之勞臣按曹操從棗祗言募民屯田許下當亂離之餘尚能致倉廩皆滿茍於太平無事之時遣官徧踏州縣以求閒田添置官田募民耕種於各方最要害處積榖以助國計少寛民租是亦足國用之一端也諸葛亮由斜谷伐魏以前者數出皆以運糧不繼使已志不伸乃分兵屯田為久駐之計耕者雜於渭濵居民之間而百姓按堵軍無私焉臣按兵無食則不成兵善謀國者用兵以耕其所食者即其所耕者也自食其力而不仰給於人因糧於敵是以所至成功趙充國諸葛亮二人者所處之地雖異而所見之智則同魏正始四年司馬懿督軍伐吳欲廣田蓄穀為滅賊資乃使鄧艾行陳項以東至壽春艾以為昔破黄巾為屯田積榖於許都以制四方今三隅已定事在淮南令淮北屯二萬人淮南三萬人且佃且守嵗完五百萬斛以為軍資六七年間可得十萬之衆五年之食以此乘吳無往不克懿從艾計遂北臨淮水自鍾離西南横石以西盡泚音脂水四百餘里置一營六十人且佃且守兼修廣淮陽百尺二渠上引河流下通淮潁大理諸陂於潁南北穿渠三百餘里溉田二萬頃淮南淮北皆相連接農官兵田阡陌相屬每東南有事大軍興衆泛舟而下資食有儲而無水害陳堯叟曰陸田命懸於天人力雖修茍水旱不時則一年之功棄矣水田之制由人力人力茍修則地利可盡也且蟲菑之害又少於陸水田既修其利兼倍與陸田不侔矣臣按今承平日乆生齒日繁天下田價比諸國初加數十倍水田惟揚州最賤陸田惟潁壽為輕且地在兩京之間相距畧等今天下一家雖無魏人南征之役然用其法以行於今日亦可頼以少寛民力省嵗漕其於國用不為無助臣請於淮南一帶湖蕩之間沮洳之地蘆葦之場盡數以為屯田遣官循行其地度地勢髙下測泥塗淺深召江南無田之民先度地勢因宜制便先開為大河闊二三丈者以通於海又各開中河八九尺者以達於大河又隨處各開小河四五尺者以達於中河使水有所洩然後於其低窪不可耕作之處浚深以為湖蕩及於原近舊湖之處疏通其水使有所瀦或為隄以限水或為堰以蓄水或為斗門以放水俱如江南之制民之無力者給以食田成之後依官田以起科民之有力者計其庸田成之後依民田以出税六七年間其所得者恐不减於魏人也夫魏人以偏安之國有外敵之患猶能兼淮潁而盡田之其後果頼其用而有以成其功矧今盡四海以為疆而此地介兩京間而又為運道經行之路有魚鹽之利有莞蒲之用古人所謂揚一之地者也且去大江僅百里許大江之南民多而田少居者佃富家之田為之奴𨽻出者逐什一之利輕去田里夫若此者豈其所欲哉無可以為仰事俯育之資不得已也然民性愚而安故常心多而無定見儻朝廷頒方尺之詔遣一介之臣鼓舞而招徠之無不成者既成之後又於潁壽之間召民開墾陸田亦隨地勢以分田因民力而定税其功又易於水田者考之唐史上元中於楚州今淮安古射陽湖置洪澤屯於壽州置芍陂屯厥田沃壤大獲其利俱在此地遺跡可考也晉羊祜鎮襄陽墾田八百餘頃祜之始至也軍無百日之儲及其季年有十年之積平呉之後杜預修召信臣遺跡激用滍淯諸水以浸原田萬餘頃分疆刋石使有定分公私同利衆庶賴之臣按羊杜二人所墾之田其遺迹在今湖廣之荆襄河南之唐鄧古稱洛陽為天下之中臣以今日疆域觀之則此三郡實為我朝天下之中也天下之田南方多水北方多陸今此三郡葢兼水陸而有之也南人利於水耕北人利於陸種而南北流民僑寓於此者比他郡為多臣請於兩藩交界之中立一官司遴擇廷臣知稼穡者循行其地可水耕之地則引水立堰募南人耕之可陸種之地則分疆定界募北人種之成熟之後按畆分租隨地儲積遇有急用由漢入江由江而達於金陵稍省嵗漕之數多留郡縣之儲或遇河洛闗陜荒歉亦可用以救濟又於暇日講求武闗入秦之路商於陸輓之故萬一三邊有缺亦或賴以濟焉唐開軍府以扞要衝因隙地置營田天下屯總九百九十二司農寺每屯三頃州鎮諸軍每屯五十頃水陸腴瘠播植地宜與其功庸煩省收率之多少皆決於尚書省臣按自古屯營之田或用兵或用民皆是於軍伍之外各分兵置司惟我朝之制就於衛所所在有閒曠之土分軍以立屯堡俾其且耕且守葢以十分為率七分守城三分屯耕遇有儆急朝發夕至是於守禦之中而收耕獲之利其法視古為良近世又於各道専設風憲官一員以提督之其牛具農器則總於屯曹細糧子粒則司於户部有衛所之處則有屯營之田非若唐人専設農寺以領之也每軍受田二十畆納租六石而餘丁所受所納比之正軍則又降殺焉臣竊以為民田則例最輕者須收三石其田率多膏腴軍所屯種者多其所棄不耕之田而所收之租乃十倍焉請如唐人較其水陸腴瘠播植地宜與其功庸煩省收率多少各因其地利土宜定為徴收則例使凡屯種之軍樂於趨赴既得以足軍國之儲而無欠負又得以遂室家之樂而有葢藏公私兩便上下俱足矣元和中振武軍饑宰相李絳請開營田可省度支漕運乃命韓重華為營田使起代北墾田三百頃出贓罪吏九百餘人給以耒耜耕牛假種糧使償所負粟一嵗大熟因募人為十五屯每屯百三十人人耕百畆就高為堡東起振武西逾雲州極於中受降城凡六百餘里列柵二十墾田三千八百餘里嵗收粟二十萬石省度支錢二千餘萬緡臣按韓重華於代北開營田三千八百餘里得粟二十萬石省度支錢二千餘萬緡自有屯田以來未有得利如此者也彼時沿邊之地皆為藩鎮所專而行之猶得其利若此今國家煙火萬里衛所列峙又值邊圉安靖之時雖時或有侵軼未嘗舉大衆入深地誠於無事之時尋古人之故迹按前人之行事東起遼東西盡甘涼於凡邊塞無鹻鹵而宜裁種之地因其地勢相其土宜立為營堡開墾田疇分軍耕種當夫耕耘收獲之時除老幼守城外凡有丁壯盡室而行仍於所耕百十里之外設立亭障開鑿溝塹為烽堠以瞭望之出遊騎以巡哨之遇有冦盜入境未至之先豫知儆備勢可敵則拒之不可敵則避之如此則處處皆有屯種之所年年皆有收獲之入邊儲自然給足可以省内輓之勞可以嚴外侮之備宋太宗端拱中以陳恕為河北東路招置營田使大興河北營田先是雄州東際于海多積水戎人患之不敢由此路入冦順安軍至北平二百里地平廣無隔閡每嵗邊騎多由此而入議者謂宜度地形髙下因水陸之便建阡陌浚溝洫益樹五穀所以實邊廩而限戎馬故遣恕等經營之恕宻奏戍卒皆惰游仰食縣官一旦使冬被甲兵春執耒耜則恐變生不測乃止臣按天下之事非興作之難而處置得宜之為難也自漢趙充國於邊地建屯田之議魏晉至唐皆行之未嘗不用兵也且其所行皆在窮邊絶塞之所沍寒磽鹵之地未聞慮其有不測之變而不為也今宋之所謂邊者乃在中國非邊徼也而陳恕乃恐其變生不測而宻奏止之嗚呼使為天下者凡有興作不顧事體之可否一惟狥人情之從違何以立國哉古不云乎以佚道使民雖勞不怨臣請於凡邊塞置立屯田分軍耕種不必征其租入士卒能於本田之外多耕者立為賞賚則例但使人人奮耕家家有積邊城自然充足於是令内地該運邊糧州郡俾其齎價來糴家積有餘市價自平不獨邊用不虧邊軍皆贍而内郡之民亦省矣宋淳化中臨津令黄懋上書請於河北諸州作水利田自言閩人閩地種水田縁小導泉倍費功力今河北州軍陂塘甚多引水溉田省功易就乃以何承矩為屯田使懋充判官於凡河北諸州水所積處大墾田發諸州兵萬八千人給其役於雄莫覇等州興堰六百里置斗門引定水灌溉初年種稻值霜早不成次年方熟初承矩建議沮之者衆武臣耻於營葺羣議益甚幾於罷役至是議者乃息莞蒲蜃蛤之饒民頼其利馬端臨曰兵與農共此民也故無事則驅之為農而力稼穡有事則調之為兵而任征戰雖唐府兵之法猶然至於屯田則驅游民闢曠土且耕且戍以省饋饟尤為良法自府兵之法既壊然後兵農判而為二不獨農疲於養兵而兵且耻於為農觀陳恕所奏及沮何承矩屯田之議者可見然則國力如之何而不弊於餉軍也哉臣按宋都汴梁去雄覇等州幾三千里而又與契丹為界今此地乃在畿甸近地當四方無事之時人民繁庶之際按承矩之故迹而舉其廢墜誠無難者萬一此言見取於九重是亦足國用省漕卒之一助也神宗熈寧元年詔以坊監牧馬餘地立田官令專稼政以資牧養之用臣按今京畿之地在國初設行太僕寺轄六監二十四苑以牧馬今其寺雖廢而其監苑之地固在多為親倖陳乞以為私莊伏乞英斷一切勒歸亦如宋人設田官專稼政非但可以資牧馬之用亦因之補助軍糧以省饋餉孝宗隆興元年張闡言荆襄屯田之害非田之不可耕也無耕田之民也官司慮其功之不就不免課之游民游民不足不免抑勒百姓捨己熟田耕官生田私田既荒賦税猶在占百姓之田以為官田奪民種之榖以為官榖老稚無養一方騷然有司知其不便申言於朝罷之臣以為與其棄之孰若使兩淮歸正之民就耕非惟可免流離異日墾闢既廣田疇既成然後取其餘者而輸之官實為兩便臣按凡前所陳屯營之策非田不可耕實恐耕田無其人專用乎軍則軍伍有限専用乎民則民各有田其弊誠有如張闡所云云者臣竊以為宋朝偏安一隅以荆襄為邊境嵗有軍旅之興防禦之備戎馬蹂踐地多荒田非若我今日承平日久生齒日繁地力不足以給其人之食是以南北之民隨處游食而江右尤衆國家誠擇任有風力大臣付以招徠之任借以官帑銀數萬兩以為糴本俾自擇其屬徧行天下有閒田處相地度勢立屯堡以聚游食闢汙萊以為􅅵畆開渠堰以資灌溉異時成效補助非少雖然闢土之功固為不易而料事之智尤人所難方其舉事之初量度或未必當及其施為之際弊病或不能無自覺失宜許其陳首飾非要功者然後加以責罰如是則無宋人抑勒百姓捨熟耕生之弊矣然此非獨屯田一事為然凡天下事無不然者元泰定中虞集為翰林直學士進言曰京師之東瀕海數千里北極遼東南濵青齊萑葦之場也海潮日至淤為沃壤用浙人之法築隄捍水為田聴富民欲得官者合其衆分受以地官定其畔以為限能以萬夫耕者授以萬夫之田為萬夫之長千夫百夫亦如之察其惰者而易之三年後視其成以地之高下定額以次漸征之五年有積蓄命以官就所儲給以禄十年不廢得以世襲如軍官之法臣按虞集此䇿在當時不曾行及其末世也海運不至而國用不給謀國者思集之言於是乎有海口萬户之設大畧宗之每年亦得數十萬石以助國用吁亦已晩矣今國家都于燕京師之東皆瀕大海烟火數千里而居民稠密當此全安極盛之時正是居安思危之日乞將虞集此䇿敕下廷臣計議特委有心計大臣循行沿海一帶專任其事仍令先行閩浙濵海州郡築隄捍海去處起取士民之知田事者前來從行相視可否講求利害處置既定然後召募丁夫隨宜相勢分疆定畔因其多少授以官職一如虞集之䇿雖然天下之事建議者思之非不周而執事者行之未必力方集議之時説者固已謂一有此制則執事者必以賄成而不可為其事遂寢及至於不得已之際方用其䇿然幾㑹已失事勢已去不可為矣嗚呼豈非後世永鑒哉臣嘗聞閩浙人言大凡瀕海之地多鹹鹵必得河水以蕩滌之然後可以成田故為海田者必築隄岸以䦨鹹水之入疏溝渠以導淡水之來然後田可耕也臣於東京一帶海涯雖未及行而嘗泛漳御而下由白河以至潞渚觀其入海之水最大之處無如直沽然其直瀉入海灌溉不多請於將盡之地依禹貢逆河法截斷河流横開長河一帶收其流而分其水然後於沮洳盡處築為長隄隨處各為水門以司啓閉外以截鹹水俾其不得入内以洩淡水俾其不至漫如此則田可成矣於凡有淡水入海所在皆依此法行之則沿海數千里無非良田非獨民資其食而官亦賴其用如此則國家坐享富盛逺近皆有所資譬則冨民之家東南之運其别業所出也濵海之收其負郭所獲也其為國家利益夫豈細哉由是而可以寛東南之民由是而可以壯西北之勢虞集之言不見用於當時而得行於今日集雖死不死矣至正十二年丞相托克托言京畿近水地召募江南人耕種嵗可收粟麥百萬餘石不煩海運京師足食從之於是西自西山南至保定河間北抵檀今宻雲縣順今順義縣東至遷民鎮凡係官地及原管各處屯田悉從分司農司立法佃種合用工價牛具農器榖種給鈔五百萬錠命烏蘭哈達烏克遜良禎並為大司農卿又於江南召募能種水田及修築圍堰之人各一千名為農師降空名添設職事敕牒十二道募農民一百名者授正九品二百名正八品三百名從七品就令管領所募之人所募農夫每名給鈔十錠由是嵗乃大稔臣按今京畿之地可為稻田者甚多官民之家固有耕獲之者矣誠能因其所耕而推及其所未耕使其皆盡人力廣地利而又因而為之召募勸相斟酌元人之制而畧倣以行之其於國計不無少助以上屯營之田臣按自三代以來未有建都于幽燕者遼金以來始相承為都㑹逮於我朝宅中圖大承上天之新命立嚮明之洪基體宸極之尊居受四方之環拱始于此建極圖治焉六宫百六軍萬姓畢聚于斯所費有不貲焉者嵗計何啻億萬矧又幅員之廣有漢唐所無者沿邉建閫屯兵列戍率資逺以給近取外以足内調乎中以實之邉聚積固難而輸將亦有不易焉者民之租賦有限國之用度無窮茍非於嵗計常賦之外别有所經營而欲其優裕豐瞻難矣是以自古善計國者恒取足於有餘之地力而不敢傷易失之民心此屯營之田所由起也今天下無田不税而吾求無税之地而耕之無農不耕而吾借不耕之人而役之無兵不戰而吾乘不戰之時而用之内以實京師於常數之外外以實邊儲於常用之餘臣故於治國平天下之要制國用之下首舉貢賦之常而以屯營之田終焉以見國用所出雖非一途而田為之本用人之力盡地之利因天之時治國平天下之要道不出此矣或人問於朱熹曰大學論治國平天下而言財利何也熹答曰天下所以不平者皆因此伏惟九重清燕之時留心於天下之大本義以制天下之利則天下不足平矣臣不勝惓惓大學衍義補卷三十五
