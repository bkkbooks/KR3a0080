body:
  text: 大學衍義補卷一百三十六明丘濬撰治國平天下之要嚴武備遏盜之機上周禮士師之職掌鄉合州黨族閭比之聨與其民人之什伍使之相安相受以比追追㓂胥摶盜賊之事以施刑罰慶賞鄭𤣥曰鄉合者鄉所合也賈公彦曰合其人民之什伍者此即因内政寄軍令之類五家為比比即一伍也二伍為什以此什伍比追胥焉臣按先儒謂聨比其居什伍其人鄉官之事也而士師掌之比追逐偦伺盜賊之事可見成周盛時雖稱極治而聖人為民防患之心無所不及故鄉各有所司而士師又合而治之以比合比以閭合閭以聨其居以伍合伍以什合什以聨其人所以然者使之相安有不安者必其人非聨比閭者矣使其相受有不受者必其人非比什伍者矣於是即其相安相受之同什伍者比而合之以摶盜賊晝則追逐之夜則偦伺之廢事者則士師施之以刑罰有功者則士師施之以慶賞後世於里巷設為火鋪更夫使之互相覺察以防盜賊其原葢兆於此士師掌士之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰撟邦令六曰為邦盜七曰為邦朋八曰為邦誣鄭𤣥曰邦汋者斟酌盜取國家宻事邦賊為逆亂邦諜為異國反間者犯邦令干冒王敎令者撟邦令稱詐以有為者為邦盜竊取國之寳藏者王昭禹曰為邦朋為私黨以亂民也為邦誣造訛言以惑衆也臣按八者而謂之成成者國法之成事品式也朝廷為此八者之成事品式以禁制夫臣民其事皆謂之邦者以見此乃國家之大事所以係安危治亂者非但鄉黨州閭之事也八者之中邦汋邦諜是交通外國之事犯令撟令是干犯王法之事邦盜不過竊取國貨而已其間最是為邦朋者聚黨以亂民為邦誣者訛言以惑衆為邦賊者搆逆以稱亂三者乃國家之大惡生靈之禍本有天下國家者所當預懲宿戒者也先王立八成之法使士師掌之而制治於未亂保邦於未危所以杜其幾微遏其萌蘖者豈不豫哉司厲掌盜賊之任器貨賄辨其物皆有數量賈而揭之入于司兵鄭𤣥曰任器貨賄謂盜賊所用傷人兵器及所盜財物也入于司兵若今時殺傷人所用兵器盜賊贓加責没入也吳澂曰賈而揭之定其所直之價而識之也臣按司厲一官専主追徴賊贓野廬氏掌達國道路至于四畿比猶校也國郊及野之道路宿息廬之属井樹若有賔客則令守涂地之人聚􅈀與柝同之有相翔者誅之鄭𤣥曰廬客行道所舍達謂廵行通之使不陷絶也宿息廬之属賔客所宿及晝止者也井共飲食樹為蕃蔽相翔猶昌翔觀伺者也聚􅈀之聚擊􅈀以宿衛之也有姦人相翔於賔客之側則誅之不得令冦盜賓客臣按周禮遺人凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有候館候館有積所以待賓客師役使命之往來既已掌於地官矣而秋官之野廬氏又職往來按比而肅其守衛焉由是觀之可見古昔盛時所以防盜者無所不至非但以安行旅之往來實所以示國威之嚴肅也昔周定王使單襄公聘于宋假道于陳以聘楚道茀不可行而知陳之不能守其國矧惟堂堂乎大朝威名逺讋於萬里之外九夷八蠻無不歸仰顧於畿甸之間國門之外盜賊時時竊發公行以刼掠行旅斯聲也豈可聞於遐外乎當道者以此為小事故不以聞葢不知周官設野廬氏之意單襄公譏陳人之語也臣請嚴勅捕盜之官都城之外五百里内有盜賊刼掠者其應捕及統督者不獲盜皆革其冠服俾以必獲為期三月之外除其名然京師地大而人衆俗雜五方難於辨識與其督責於其後孰若豫備於其先請於都城之外分為數路每路約量逺近立一望樓毎樓於常操軍撥馬軍十名歩軍十五名五日一番輪守樓上置鼓一白旗一烽火一遇有盜賊樓上軍即擂鼔舉煙以白旗指其所往之方樓下軍具器械逐之必抵其所至如此不必嚴刑督責而盜自無矣若夫冬月河氷之後於都城外設東西二營委軍官一員督領馬軍各一二百名有大車運載者許其豫投辭告知會集衆軍必五車然後偕行每車差馬軍三名䕶送其軍人芻料之具就俾僦車者給之仍先行合經由軍衛如自良鄉至涿州涿州至河間河間至徳州臨清濟寜以至於徐州此數處該班官軍十月以後暫免赴操俾委官督領馬軍以次􅉍送至交換處遇有回車仍令順䕶以回如此則道途無壅塞之患商宦無畏途之憂四方之人經歴艱險至於近郊舉首仰望九重宫殿於紅雲紫霧之中即有登仙之樂矣司寤氏掌夜時以星分夜以詔夜士夜禁禦晨行者禁宵行者夜遊者鄭𤣥曰夜士主行夜徼候者王安石曰禦晨行者禦使須明而行禁宵行者禁之使止也臣按此所謂夜禁也今制一更三㸃禁人行五更三㸃放人行即此意脩閭氏掌比國中城内宿謂宿衛互􅈀者與其國粥養也謂羡卒而比其追逐冦胥讀為偦者而賞罰之禁徑踰者與以兵革趨行者與馳騁於國中者邦有故則令守其閭互唯執節者不幾察也鄭𤣥曰禁徑踰者兵革趨行者馳騁於國中者皆為其惑衆也賈公彦曰邦有故謂有冦戎大喪札皆恐有姦非則令各守閭巷門有執節公使者不幾察也劉彞曰掌比國中宿互􅈀者謂檢國中夜士之守宿也互謂行馬以斷夜行者也􅈀謂擊柝以守門閭而傳更者也國之羡卒使之什伍以追偦擒捕冦賊獲多者賞之否則罰之臣按成周之世所以防姦盜者畿内則有野廬氏城内則有脩閭氏是以都城内外姦無所容閭里之問斬然以齊門巷之列肅然以寜雖有不逞之姦無由而起猝遇非常之變有以制服之而不至於猖肆也脩閭氏掌比國中宿互􅈀者國中王城之中也比合什伍宿衛於王城之中以為追逐偦伺之備各於閭巷之間設為互以斷行即今鹿角之類設為􅈀以傳更即今木柝之属夜行有禁則入息者不趨於晦㝠之時更漏分明則向晦者皆知夫早晩之候葢冦盜之興皆於夜静人息之時而官府特於閭巷之間存此數輩俾其不寐以為姦盜之防此古昔盛時非獨海宇之内無有大姦大冦而於閭里門巷之中雖胠篋穴墉之小盜亦無有也嗚呼天下之事何者而不起於微小哉惟其絶之於微小所以不使其延蔓滋長而至於大且著也國初於南京設為四十八衛每衛各有營營兩際各為門本衛官軍就居其中遇有警急起集為易又於五城各設兵馬司設立弓手専以廵徼京城内外即周官脩閭氏之職也又於各坊里巷立為火鋪支更守夜其與脩閭氏所謂互􅈀追偦者無以異焉葢衛有所定居則呼召之軍易集廵徼有攸司則追偦之責有歸祖宗思患豫防之意深矣惟今京師葢襲勝國之舊街坊里巷叅錯不齊而衛所散處而士卒之名𨽻尺籍者聚散無常甚者野處在數十里之外幸而承平無事一旦不幸而有意外之變出於倉猝之間急欲有所召集豈不難哉臣愚欲於無事之先而豫為有事之備請復祖宗南京舊制雖然時異勢殊當守成之後而為創始之謀誠未易也無已請用祖宗之意以為今日之備可乎夫南京之衛四十八今京衛七十有餘其衛署随處散置中亦有未置署者且其軍士雖係籍衛中食糧至其操練以待調發則分在各營必欲使每衛各為一處聨比其居決有不能者今名籍在衛所隊伍在將領而其所居之地方則各属兵馬司也今京城地大人衆聚四海之人雜五方之俗承平日久人煙衆盛姦宄實繁一城之大僅設五司官僚十數員兵卒百十輩而京城内外不下百十萬人家力有所不周勢有所不及臣請毎城量地廣狹逺近添設行兵馬司數處每處添設副指揮一員居守其司署相去以鼔相聞為限司前用四木建鼔樓一所添兵置鼔以支更每更擊鼔而火鋪則擊析以相應由近及逺不許雜亂又於該轄地方除官民及匠外凡係見操官軍在地方住者不分賃寄及上班者皆俾報名附冊就於本坊見居軍官中推舉其管操者一員官最高者或侯伯或都督都指揮無則把總指揮為衆信服者奏聞以為地方總領每季一造冊冊成各為三一留本司一送兵部一送總領官每季行兵馬司率領本坊見居官軍起赴總領官私居叅見每年四見此外不許擅自起倩舊例每兵馬司嵗委御史一員督察今既多立分司宜随地方廣狹添差分管遇有儆急兵部下兵馬司行御史督該司起集該方官軍赴總領處聽用如此則倉卒事起有備無患雖非祖宗設立軍營初制然於其間處置得宜運用有方則亦其遺意之彷彿也又京城内外自來街坊因襲前代舊名俚俗不雅混亂無别宜令各該御史督同兵馬司官分界畫圖别立新名每處立一大鋪分統小鋪每小鋪設更夫六名每夜自二更一㸃起守至四更三㸃止其初更及五更不禁人行每更二人一守一廵其大鋪更夫倍之大鋪之立必在本巷内出大街口邊對立木橦二四尺以下懸鐵索三以截斷行路二更一㸃以後即横絙以絶往來至四更三㸃方開其他小巷口可通大街處俱為柵門一更三㸃即鎻斷五更一㸃方開各行司為印烙牌數十面遇有公事及人家水火昏喪𦂳急等事許先赴行司告領牌面遇夜照放無牌而闌出及擅開者坐以罪每大鋪置大銅鑼一面小鋪各置其小者一面遇有盜竊即聲鑼相應其城中大街及城下皆不必立鋪其大街中及城下居者俱分守各巷口大鋪大約京城直南北大街不過數處假如崇文門自門至四樓為一節又自此抵城下為一節每節夜撥馬軍十五名每夜止廵二更三更四更更輪五騎往來廵邏其餘倣此其九門城垣之下以城為限每城撥軍之數亦如之其廵邏之軍五軍大營每日於見操官軍内輪差如此則人家有盜賊之警而更鋪得以闌拒而賊不得以出入國家有倉猝之變而軍士易於召集而賊不得以縱横此雖𤨏末之事而所闗係實大為國逺慮者可不加之意乎臣因是而又有一見焉昔者周幽王舉火以戯諸侯則是三代之時不獨邊境置立烽火而宫禁之中亦有之也今國家運氣隆盛徳澤深厚所謂億萬年盤石之宗泰山而四維之者也萬無意外之事然杞人憂天天豈有墜理而杞人憂之憂之誠愚也然不失為愛天之深臣愚請於皇城中豫蓄二高竿猝有不測之事即於瓊島上立之懸紅燈為號其事緩急以燈多少為符預以遍告諸總戎大臣俾知其故又於九門上各立高竿以懸紅燈定多少之數以示緩急之别徧告諸軍以為進止分散之令如此則不煩三令五申而六軍萬姓可不言而諭不召而至矣此亦愚者之一慮論語季康子患盜問於孔子孔子對曰茍子之不欲雖賞之不竊朱熹曰言子不貪欲則雖賞民使之為盜民亦知恥而不竊季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之徳草朱熹曰為政者民所視效何以殺為欲善則民善矣尹焞曰殺之為言豈為人上之語哉以身敎者從以言敎者訟而况於殺乎臣按宋范祖禹上疏於其君首引魯論此二章孔子答季康子之問之語而繼之曰臣始讀此二章書葢嘗疑之以為聖人之言主於敎化而已行之未必有近效也及觀唐太宗初即位與羣臣論止盜或請重法以禁之太宗哂之曰民之所以為盜者由賦役繁去奢省費輕徭薄賦選用亷吏使民衣食有餘則自不為盜安用重法邪自是數年之後海内升平路不拾遺外户不閉商旅野宿焉觀太宗之政如此乃始知聖人之言不欺後世行之必有效也夫以區區之魯國季康子為相孔子猶勸之以不欲所以止盜况天子之為天下乎伏見熈寜臣僚有奏請别立盜賊重法者自行法以來二十餘年不聞盜賊衰止但聞其愈多耳古者開衣食之源立敎化之官先之以節儉示之以純朴有邪僻之民然後齊之以刑豈有不治其本専禁其末哉祖禹所謂本者開衣食之源立敎化之官先之以節儉示之以純朴是已然先以節儉示以純朴非無欲而欲善者不能也人君本節儉純朴以為治則民之衣食足矣而又得人以敎化之則民皆化於善而仰事俯育之皆足放僻邪侈自不為矣子曰君子有勇而無義為亂小人有勇而無義為盜蘇轍曰古之聖人止亂以義止盜以義使天下之人皆知父子君臣之義而誰與為亂哉昔者唐室之衰燕趙之人八十年之間百戰以奉賊臣竭力致死不顧敗亡以抗天子之兵而以為忠臣義士之所當然當此之時燕趙士唯無義也故舉其忠誠専一之心而用之天下之至逆以拒天下之至順而不知其非也孟子曰無恒産而有恒心者惟士為能若民則無恒産因無恒心放僻邪侈無不為己故夫燕趙之地常苦夫士大夫之寡也臣按蘇轍謂止亂以義止盜以義使天下之人皆知父子君臣之義誰與為亂哉臣竊以為亂與盜皆起於血氣之勇心志之欲也夫盜之起始於里閭積而至於為大盜則亂天下矣是以古之聖王必制民恒産使其仰事俯育之有餘敎以禮義使其知尊君親上之當務則其心志有所養而不敢肆其欲血氣有所制而不敢逆乎理則里社之間偷竊之盜且不作矣雖欲為亂何所資而起乎秦二世時發閭左戍漁陽者九百人屯大澤鄉陽城人陳勝陽夏人吳廣為屯長㑹天大雨道不通度已失期法皆斬勝廣因天下愁怨乃殺將尉令徒属曰公等皆失期當斬假令母斬而戍死者固什六七且壯士不死則已死則舉大名耳王侯將相寜有種乎衆皆從之乃為壇而盟稱大楚攻大澤鄉㧞之比至陳卒數萬人入據之遂自立為王郡縣苦秦法爭殺長吏以應之使從東方來以反者聞二世怒下之吏後至者曰羣盜鼠竊狗偷郡守尉方逐捕今盡得不足憂也乃悦臣按盜賊之起葢有所因也秦自始皇以來所以勞民力苦民心費民財戕民命者非一日矣民無以為生舉手動足何者非殺身之地使有一隙生路民亦不尋死矣不得已而死中求生此廣勝之徒所以造亂也二世承始皇酷虐之後天下愁怨之時雖施之以仁恩惠政猶恐不能補救況又自蔽其耳目哉盜已衆矣而猶稱無盜臣下有言盜者反怒之不當怒而怒當憂而不憂天下安得不亂哉漢武帝天漢中東方盜賊滋起攻城邑取庫兵釋死罪殺二千石掠鹵鄉里道路不通上始使御史中丞丞相長史督之弗能禁乃使光禄大夫范琨等衣繡衣持節虎符發兵以興擊所至得擅斬二千石以下誅殺甚衆一郡多至萬餘人數嵗乃頗得其渠率散卒失亡復聚黨阻山川者往往而羣居無可奈何於是作沈命法曰盜起不發覺發覺而捕弗滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盜不敢發府亦使其不言故盜賊寖多上下相為匿以文辭避法焉臣按立法以除盜賊不可以不嚴亦不可以過於嚴不嚴則有司不肯用心除賊遂至養成大禍過於嚴則有司恐罪及己上下相䝉蔽以避文法因而馴致大亂二者皆非中道也盜賊之起必推求其致盜之由既得其由必研窮所以至於此者何故也既得其故必反其所為以民待民而不以盜待民如是而民為盜猶自若也然後以盜待之大抵民之所以為盜之故不在朝廷則在官吏又不然則是姦民之乗間生事也國家不幸而有盜賊之起則必反而思其所以致之者其禍起於朝廷則反已自責去其弊政起於官吏則根究所自而誅逐其人若但出於姦民則必急𠞰絶之痛懲以警衆使毋至於滋蔓也如此處之庶㡬得中道乎宣帝時渤海嵗飢盜賊並起上選能治者丞相御史舉龔遂拜渤海太守召見問何以治盜賊對曰海瀕遐逺不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳今欲使臣勝之邪將安之也上曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也惟緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黄金贈遣乗傳至渤海界郡發兵以迎遂皆遣還移書勅属縣罷逐捕吏諸持田器者皆為良民吏毋得問持兵者乃為賊遂單車至府盜賊聞遂敎令即時解散棄其兵弩而持鉤䥥也鉏於是悉平民安土樂業遂乃開倉廪假貧民選用良吏慰安牧養焉齊俗奢侈好末技不田作遂躬率以儉約勸民務農桑各以口率種樹蓄養民有帶持刀劒者使賣劒買牛賣刀買犢曰何為帶牛佩犢勞來循行郡中皆有畜積獄訟止息至是入為水衡都尉臣按宣帝以渤海盜起選能治者丞相以龔遂應詔可謂得人矣以今觀之雖曰遂之才能然非相臣之舉則帝無由得以用之宣帝召至殿庭親行詰問假之以文法寵之以厚賜此遂所以盡心效力使郡之盜賊悉平而皆為良民也於此一事可見宣帝留心民瘼雖以一遐逺之郡二千石之吏猶拳拳如此葢欲無負乎上天之付托祖宗之傳序而亦不虚受臣民之供奉愛戴也甘露元年免京兆尹張敞官數月京師吏民懈弛枹鼓數起而冀州部中有大賊天子使使者即家召敞拜冀州刺史到部盜賊屏息臣按朝廷不可無名望之臣名望之臣一足以當才能之臣十夫才能有無固在乎其人而其名望則係人君優假以養成之也朝廷有此名望之臣天下之人聞之有素一旦有繁劇難處之事委以任之則事半而功倍矣盜賊雖曰小人然非有智術者亦不能以聚衆也所以敢於犯天誅而為滅族之舉者非不知王法之嚴也自恃其能而謂人皆不已若也而一聞有智術出其右者其氣自餒而從之者亦泮然解散矣宣帝起張敞而用之葢此意也以上論遏盜之機上大學衍義補卷一百三十六
