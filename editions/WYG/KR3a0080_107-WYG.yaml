body:
  text: 大學衍義補卷一百七明丘濬撰治國平天下之要慎刑憲議當原之辟周禮小司冦以五刑聴萬民之獄訟凡命夫命婦不躬坐獄訟凡王之同族有罪不即市鄭𤣥曰凡命夫命婦不躬坐獄訟者為治獄吏䙝尊者也不躬坐者必使其屬若子弟也王安石曰命夫命婦不躬坐獄訟者貴貴也王之同族有罪不即市者親親也貴貴親親如此而已豈以故撓法哉以八辟法也麗附也邦法附刑罰一曰議親之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議貴之辟七曰議勤之辟八曰議賔之辟鄭𤣥曰親若今時宗室有罪先請是也故謂舊知也賢謂有徳行者若今亷吏有罪先請是也能謂有道藝者功謂有大勲力立功者貴若今吏墨綬有罪先請是也勤謂憔悴以事國賔謂所不臣者三恪二代之後臣按王之親故不可與衆人同例有罪議之所以教天下之人愛其親族厚其故舊國之賢能不可與庸常同科有罪議之所以教天下之人尚乎徳行崇乎道藝有功者則可以折過失有罪議之則天下知上厚於報功而皆知所懋有位者不可以輕摧辱有罪議之則天下知上之重於貴爵而皆知所敬有勤勞者不可以沮抑有罪則議之使天下知上之人不忘人之勞為國賔者宜在所優異於有罪則議之使天下知上之人有敬客之禮先儒謂八者天下之大教非天子私親故而撓其法也人倫之美莫斯為大司厲凡有爵者與七十者與未齔者皆不為奴鄭𤣥曰有爵謂命士以上也齔毁齒也男八嵗女七嵗而毁齒又曰今之奴婢古之罪人也故書曰予則孥戮汝臣按先王之制刑其貴貴老老㓜㓜有如此者非獨不忍加之以刑辟而亦不忍致之於卑辱仁義兼盡矣掌囚凡囚者王之同族拲木其手有爵者桎木其足以待弊罪及刑殺告刑于王拲而適朝士加明梏以適市而刑殺之凡有爵者與王之同族拲而適甸師氏以待刑殺臣按刑以弼教先王之刑無不寓教之意焉夫有罪之人制為獄具以拘囚之宜若無所恤矣而於王之同族及命士以上雖有罪或拲或梏而已告刑于王告王以今日當行刑及所刑者姓名也其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟拲而適朝者重刑為王欲有所赦且當以付士加明梏者謂書其姓名及其罪於梏而著之也後世刑人書其罪以為招狀掲之於其首葢本諸此掌戮凡殺人者踣諸市肆之三日刑盗于市凡罪之麗于法者亦如之唯王之同族與有爵者殺之于甸師氏李覯曰先王之時雖同族雖有爵其犯法當刑與庶民無以異也法者天子與天下共也如使同族犯之而不刑殺是為君者私其親也有爵者犯之而不刑殺是為臣者私其身也君私其親臣私其身君臣皆自私則五刑之屬三千止為民也慶賞則貴者先得刑罰則賤者獨當上不愧於下下不平於上豈適治之道耶故王者不辨親踈不異貴賤一致於法其所以不肆諸市朝而適甸師氏者為其人恥毋使人見之也臣按王之同族者與有爵者殺之甸師氏既言於掌囚此復言之者葢以刑人必於市惟同族親者也有爵貴者也親親而貴貴故有犯者乃國家徳化之不孚禮教之不行不幸犯者出於親貴之中其人雖可惡而其惡則不可揚故就隐處以施刑焉聖人之處刑其仁義之兼盡也如此夫禮記曲禮曰刑不上大夫陳澔曰大夫或有罪以八議定之議所不赦則受刑周官掌囚凡有爵者與王之同族拲而適甸師氏而此云不上大夫者言不制大夫之刑猶不制庶人之禮也胡寅曰庶人貧賤不能備禮故不責以行禮大夫尊貴不可加刑故不使之受刑非故欲然因其勢也賈誼得聖人之意故引投鼠忌器之論以警文帝自是漢不加刑於大臣大臣有罪皆自殺而王安石反此義為之説曰禮不可以庶人為下而不用刑不可以大夫為上而不施其意非為化民成俗而興禮教也直欲殺戮故老以制異已耳豈非邪說害義之大乎文王世子公族其有死罪則磬懸縊殺之也于甸人其刑罪則纎音箴纎刺也剸割也亦告讀為鞠于甸人公族無宫刑獄成有司讞議獄也于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥寛也之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之鄭𤣥曰甸人掌郊野之官不於市朝者隐之也陳澔曰獄成謂所犯之事訊問已得情實也殺牲盛饌曰舉素服不舉為之變其常禮示憫惻也如其親疎之倫而不為弔服者以不親往故也親哭之者為位於異姓之廟而素服以哭之也臣按先王之於公族有罪者有司在辟曰三公宥之曰三臣盡執法之義君存睦族之仁大戴禮曰刑不上大夫者古之大夫有坐不亷汚穢者則曰簠簋不飭婬亂男女無别者則曰帷薄不修㒺上不忠者則曰臣節未著罷軟不勝任者則曰下官不職干國之紀則曰行事不請此五者大夫定罪名矣不忍斥然以正呼是故大夫之罪其在五刑之域者聞有譴發則白冠釐纓盤水加劍造乎􅇅而自請罪君不使有司執縛牽而加之也其有罪者聞命則北面跪而自裁君不使人捽引而刑殺之也曰子大夫自取之耳吾遇子有禮矣是曰刑不上大夫臣按大戴禮此段與賈誼疏同葢古有此制誼疏之以告文帝戴徳集禮記以為此篇其弟聖又删去之止存其首句耳人君觀此可以得待臣之禮而人臣觀此其有罪者亦知所以自取也春秋左氏傳曰夫謀而鮮過恵訓不倦叔向有焉猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑歟臣按此即周禮八辟之議能也由是觀之凡有益於世有功於國者其人之子若孫以及於曾𤣥皆將十世宥之不止免其一身而已也漢孝恵即位制爵五大夫吏六百石以上及宦皇帝而知名者謂仕宦而皇帝知其名有罪當盗逃也械者皆頌音鬆繫民年七十以上若不滿十嵗有罪當刑者皆免之馬廷鸞曰古者刑不上大夫漢之待公卿大夫與士庶無等級皆習秦氣象蕭曹秦吏習見不知改而何亦身自當之恵帝雖差立條式然特以為恩恵不著法令文帝時絳侯下獄賈生極言以諫然終不能變也文帝時賈誼上疏曰亷恥節禮以治君子故有賜死而無戮辱是以黥劓之罪不及大夫以其離主上不逺也今自王侯三公之貴皆天子改容而禮之也而命與衆庶同黥劓髠刖笞傌棄市之法被僇辱者不泰迫乎夫嘗已在貴寵之位今而有過廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司冦編之徒官司冦小吏詈傌而篣笞之殆非所以令衆庶見也臣按是時丞相勃免就獄人有告謀反者逮係長安獄恐不知置辭吏稍辱侵之勃以千金與獄吏吏書牘背示曰以公主為證勃子尚公主故吏教以為證卒無事故誼以此譏上文帝深納其言飬臣下有節是後大臣有罪皆自殺不受刑至武帝時稍復入獄自寗成始宣帝地節四年詔曰父子之親夫婦之道天性也雖有禍亂䝉死而存之誠愛結於心仁厚之至也自今子有匿父母妻匿夫孫匿大父母皆勿坐其父母匿子夫匿婦大父母匿孫罪殊死上以請廷尉以聞臣按律文親屬得相為容隐始此然宣帝詔所匿者止許父子夫婦祖孫而於兄弟及従子之於世父季父闕焉必若今律文凡有親屬除謀反大􅊇外雖奴婢雇工人為家長亦在勿論之限深得先王以刑弼教之意元康四年詔曰朕念夫耆老之人髪齒堕落血氣既衰亦無逆亂之心今或罹于文法執于囹圄朕甚憐之自今諸年八十非誣告殺傷人他皆勿坐臣按周禮八議所議者皆國家之勲戚貴任也而老者不與焉臣竊以為年之貴於天下久矣虞夏商周未有遺年齒者也禮以貴貴尊賢敬老三者並言周官有議貴議賢之辟而無議老所謂老耄之赦僅見於三刺而與㓜弱惷愚並稱葢憐之耳非尊之也宣帝此詔可以補周官之闕武帝時二千石有罪先請宣帝時又詔六百石位大夫有罪先請臣按後世人臣有罪先請然後逮治始此成帝時梁王立相禹奏立怨望有司案驗因發其與姑姦事谷永上書曰臣聞禮天子外屏不欲見外也是以帝王之意不窺人閨門之私聴聞中冓之言春秋為親者諱今梁王年少病狂始以惡言案驗既無事實而發閨門之私非本章所指王辭又不服猥强劾立傅致難明之事獨以偏辭成辠斷獄無益於治道汙衊宗室以内亂之惡披布宣揚于天下非所以為公族隐諱增朝廷之榮華昭聖徳之風化也萌芽之時加恩勿治上也既已案驗舉憲宜及王辭不服詔廷尉選上徳通理之吏更審考清問著不然之效定失誤之法而反命於下吏以廣公族附疏之徳為宗室刷汚亂之恥甚得治親之誼天子由是寢不治臣按昔三代盛時其於公族皆教之有法養之有道而又擇人以夹輔之使之不至於違理傷化不幸而有敗倫悖徳之事於其萌芽之初豫遏絶之俾不至於彰布以為宗室之羞非甚不得已真得罪於宗廟社稷不輕致于理也哀帝時丞相王嘉下獄少府猛等十人以為聖王斷獄必先原心定罪探意立情故死者不抱恨而入地生者不銜怨而受罪明主躬聖徳重大臣刑辟廣延有司議欲使四海咸服嘉罪名雖應法聖王之於大臣在輿為下御坐為起疾病視之無數死則臨弔之廢宗廟之祭進之以禮退之以義誅之以行按嘉等罪惡雖著大臣括髪闗械裸躬就笞非所以重國褒宗廟也臣按王嘉之罪徒以薦廷尉梁祖及封還益董賢户事拂哀帝意故召詣尚書責問而猛等上此言所謂嘉罪名應法葢巽與之言欲救之而姑為是辭耳非謂嘉實有罪也其言聖王重大臣之禮可見古者之於大臣其敬重之如此後世有愧於古多矣非獨上之人不之重而下之人亦不知所以自重也唐制五品以上罪論死乗車就刑大理正莅之或賜死於家疾病職事散官三品以上婦女子孫入侍臣按唐為此制猶有古意唐太宗詔三品以上犯公罪流私罪徒皆不追身時引囚至岐州刺史鄭善果上曰善果雖有罪官品不卑豈可與諸囚為伍乃詔自今三品以上犯罪不須引過聴於朝堂俟進止胡寅曰三品以上貴近之臣也太宗不使與諸囚同引得待臣以恥之道矣然諸囚䝉引而貴近之臣反不見引設有誣陷寃抑欲面訴於君而止於朝堂無由自進其所失又多矣隋史萬嵗實在朝堂而楊素以往謁東宫䜛之朝堂雖近天子之居至是逺於萬里太宗不欲使三品以上與諸囚同引别引可也𤣥宗開元十年廣州都督裴伷先下獄中書令張嘉貞奏請决杖張說進言曰刑不上大夫以其近於君者也故曰士可殺不可辱且律有八議勲貴在焉今伷先亦不可輕不宜决罰上然其言洪邁曰唐太宗自臨治兵以部陳不整命大將軍張士貴杖中郎將等怒其杖輕下士貴吏魏徵諫曰將軍之職為國爪牙使之執杖已非治法况以杖輕下吏乎上亟釋之明皇開元三年御史大夫宋璟坐監朝堂杖人輕貶睦州刺史姚崇為宰相弗能止盧懐慎表言璟明時重器所坐者小望垂矜録上深納之太宗明皇有唐賢君也而以杖人輕故加罪大將軍御史大夫可謂失政刑矣臣按武臣至大將軍文臣至御史大夫皆朝廷文武大臣也而使之任胥𨽻之役豈但失政刑而已哉葢虧國體輕名爵也以上議當原之辟慎刑憲順天時之令周禮大司冦正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日而斂之臣按象魏即雉門兩觀也以秋官刑法畫之為象而縣於象魏即後世於國門張掛榜文之制也古昔先王原情以定罪因事以制刑既有定制而又於正月之吉調和而布行之於邦國都鄙焉葢因嵗月之更新起民心之觀視以儆省之也然其藏於府史者衆庶不能悉知於是平縣象扵兩觀之間以縦萬民之視葢先王之法若江河然貴乎易避而難犯茍匿其制晦其言愚民不知而陷入焉又従而刑之則是罔民也象法示民所以啓其心志竦其觀視使知刑之慘毒法之謹嚴有所避而不至於誤入有所懲而不至於故犯小司冦之職正嵗帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士乃宣布于四方憲刑禁乃命其屬入㑹乃致事臣按周官大司冦於正月既縣法於象魏小司冦於正嵗復申令以木鐸說者謂正月用周之正建子之月也正嵗仍夏之正建寅之月也布之象魏使有目者所共覩欲其接於目而謹於身令之木鐸使有耳者所共聞欲其入於耳而警於心然象魏之布繼以使民觀刑象則専以示民也木鐸之令繼以宣布於四方憲刑禁乃命其屬入㑹乃致事則又以警夫典刑者而使之用法也不用法則有常刑焉葢宣布於邦國掲而示之使知所避而又使之入㑹以計其多少之數焉且布於正月者則挟日而斂之所以示夫京畿之人於正嵗者則宣布於四方所以通於天下之衆則是先王之制刑定罪惟恐愚民不知而誤入之而為之宣布者如此後世律令藏於官及民有犯者然後撿之以定其罪而民罹於刑辟不知其所以致罪之由者多矣此古之刑所以難犯而後世之刑所以易犯也歟布憲憲表也主表刑禁者掌憲邦之刑禁國之五禁正月之吉執旌節以宣布于四方而憲邦之刑禁以結謹也四方邦國及其都鄙達于四海凡邦之大事合衆庶則以刑禁號令劉彝曰必書其刑禁之憲于民者以達于州伯州伯以達于卒正卒正以達于連帥連帥以達于屬長屬長以達于諸侯諸侯則以達于都鄙而要服以達于四海布憲則執旌節以廵行四方詰其違於禁令者庶乎其無所不及也臣按布憲中士二人下士四人史四人胥四人徒四十人毎嵗正月之吉則執旌節廵行以宣布其憲令于四方葢邦之刑禁正月既布於象魏縣於門閭都鄙邦國然恐其奉行之者不必謹或有廢格而懈弛者於是設布憲之官毎嵗自正月始徧廵天下自内而至於外由近而至於逺内而方國外而海隅無不至焉既布之以書復表之以人所以諄諄於國家之刑禁朝廷之號令使民知所遵守而不至有所違犯焉孔子曰不教而殺謂之虐成周盛時所以先事防民者其嚴且宻如此上無不教之殺下無誤犯之罪此所以刑措不用也歟禮記月令仲春之月命有司省囹牢也圄止也去桎在足梏在手毋肆陳尸也掠極治也止獄訟陳澔曰周曰圜土殷曰羑里夏曰鈞臺囹圄秦獄名也方慤曰囹圄不可去故曰省所以察之也桎梏可去故曰去所以除之也肆掠之行主乎吏故曰毋所以禁之也獄訟之作自乎下故曰止所以息之也凡此皆所以消隂事而已臣按仲春之月乃陽氣發生之候故於上之安萌芽養㓜少存諸孤是雖草木之㣲亦加安養之仁孤㓜之子咸致存飬之恵若夫人之不幸而入於囹圄雖其自取之罪然皆吾之赤子也當此陽和之時而存惻怛之心天地之徳父母之心也孟夏之月斷薄刑决小罪出輕繫陳澔曰刑者上之所施罪者下之所犯斷者定其輕重而施刑也人以小罪相告者即决遣之不收繫也其有輕罪而在繫者則直縦之出也臣按孟夏之月天氣始炎將馴至於大暑也恐罪人之繫於囹圄者氣相欝蒸或致疾疫故於是時也於刑之薄者即結斷之不使久繫罪之小者即决遣之不使收繫繫之輕者即縦出之不使復繫先王恤獄之仁也或者謂正陽之月於隂事未宜大有施設失先王之意也仲夏之月挺重囚益其食陳澔曰挺者㧞出之義重囚禁繫嚴宻故特加寛假馬睎孟曰益重囚之食不以其罪廢不忍人之政也臣按時至仲夏天氣之炎燠極矣囚雖有罪然其刑之也亦必肆諸市朝以為世儆恐其或因炎蒸而遽殞故於是時挺而㧞出於清凉之地而加以飲食之味以待秋後處决焉先王之用刑其仁義之兼盡也如此夫孟秋之月命有司修法制繕治也囹圄具桎梏禁止姦慎罪邪務事也搏戮也執拘也命理治獄之官瞻傷損皮膚察創與瘡同視折損筋􅇧審斷􅇧肉皆絶决獄訟必端正也平戮有罪嚴斷刑天地始肅不可以贏鄭𤣥曰順秋氣當嚴也理治獄官也虞曰士夏曰大理周曰司冦吳澂曰姦未發露而藏於内者止之止之而曰禁則非慢令也邪已發露而顯於外者罪之罪之而曰慎則非濫刑也命有司至務搏執順天之義也命理至端平愛人之仁也又總結之曰戮有罪嚴斷刑葢雖命有司以搏執然所戮者有罪之人未嘗及無辜也則義之中有仁焉雖命理官以端平然苟或當刑斷之必嚴未嘗故失出也則仁之中有義焉大槩此時所尚以順天之義為主特以愛人之仁行乎其間爾所以然者天地之氣始嚴急故順天者亦當嚴急而不可以寛緩也贏有寛緩之意臣按刑者隂事也隂道屬義人君奉天出治當順天道肅殺之威而施刑害殺戮之事所以法天時行義道也然秋之為秋所以成乎春義之為義所以全乎仁有春而無秋則生物不成有仁而無義則生民不安方天地始肅之時則不可以贏亦猶天地始和之時不可以縮也是則聖人之用刑雖若不得已而實不容己也於不容己之中而存不得已之心不容已者上天討罪之義不得已者聖人愛物之仁仲秋之月乃命有司申嚴百刑斬殺必當毋或枉撓枉撓不當反受其殃方慤曰孟秋既命嚴斷刑矣至此又命之故曰申嚴焉且西為隂中物既告成先王奉天故其所命止於是月也刑有五而曰百刑者據成數言之與百禮百事同義斬者則必殺殺者不必斬斬殺必當慮及於無辜也然刑之所加不止於斬殺所命止及於此者以大辟尤人所重故也枉則在上者不直撓則在下者不伸使斬殺不當則以或枉撓故也先王奉天如此而有司或枉撓焉是逆天也逆天則天災適當之也孟子言出乎爾者反乎爾者同義臣按月令雖作於吕不韋然皆述先王之舊典也凡事為無不順適天時而於刑尤加意焉不韋當秦人惨刻之世而述先王仁義之典宜其不見用也幸而是篇見於吕覽而漢戴氏始編於禮記之中以與五經並行以為禮典後世人主誠能按時而布之以為常憲是亦施仁政之一助其毋以人而廢其書季秋之月乃趣促獄刑毋留有罪孟冬之月是察阿黨則罪無所掩蔽陳澔曰獄吏治獄寜無阿私必是正而省察之庶㡬犯罪者不至掩蔽其曲直也臣按自古斷决死刑皆以孟冬之月凡有罪人於死刑者必先訊問詳讞之至於是純隂之月乃施刑焉茍獄吏阿私黨比其人而掩蔽其罪狀故為之延及使不施刑未幾則陽生而刑不可施行矣且使囚者又將有期月之禁焉此先王於季秋之月既有毋留之令而於孟冬之月人申明是察之令也歟漢章帝元和二年旱賈宗上疏以為斷獄不盡三冬故隂氣㣲弱陽氣發泄招致旱災下其言公卿議陳寵奏冬至之節陽氣始萌故冬十一月有蘭射于芸荔之應時令曰諸生蕩安形體天以為正周以為春十三月陽氣上通雉鳴雞乳地以為正殷以為春十三月陽氣已至天地以交萬物皆出蟄蟲始振人以為正夏以為春三㣲成著以通三統周以天元殷以地元夏以人元若以此時行刑則殷周嵗首皆當流血不合人心不稽天意月令曰孟冬之月趣獄刑無留罪明大刑畢在立冬也禮記在季秋之月臣按寵之此言以殷周非徒改月􅃋且改其時漢去古未逺必有所據斷决死囚必以十月以其純隂之月也因寵此言後世遂以為定制和帝時魯恭上疏曰舊制至立秋乃行薄刑自後改用孟夏而刺史太守不深惟憂民息事之原進良退殘之化因以盛夏追召農人拘對考驗連滯無已司𨽻典司京師四方是則而近於春月分行諸部託言勞來貧人而無惻隐之實煩擾郡縣亷考非急捕一人之罪根連十數上逆時氣下傷農業臣愚以為今决獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣臣按先王制刑雖曰防民姦實所以順承天道以安民生也茍逆天之時妨民之業則天道有不順民生有不安矣隋文帝乗怒欲六月殺人大理少卿趙綽固争曰季夏之月天地成長庶類不可以此時誅殺帝曰六月豈無雷霆我則天而行何不可之有胡寅曰則天而行人君之道堯舜禹湯文武之盛由此而已文帝所言王言也而其事則非也憲天者以慶賞法春夏以刑威法秋冬雨露猶人君之恵澤雷霆猶人君之號令生成萬物之時固有雷霆而雷霆未嘗殺物隋文取則雷霆而乗怒殺人其違天多矣臣按隋文帝以隂謀得天下而性尤猜忌往往欲殺人以立威殺御史以元正日不劾武官衣劍之不齊者諌臣諫并殺之至長史考校不平將作寺丞以課麥􅋗遅晚武庫令以署庭荒蕪察而知之並親臨斬决嗚呼天立君以主生人欲其則天道以為治使天所生得全其生今為天之子不能奉天道以飬天民反假天之威以害之使天無知則已天道有知其肯容之耶卒之不得其死而其子若孫自相魚肉至於殞宗絶祀孰謂天道無知耶唐制京師之囚刑部月一奏御史廵行之毎嵗立春至秋分及大祭祀致齊􅃋望上下弦二十四氣雨及夜未明假日斷屠月皆停死刑京師决死涖以御史金吾在外則上佐餘皆判官涖之諸獄之長官五日一慮囚夏置漿飲月一沐之疾病給醫藥重者釋械其家一人入侍刑部嵗以正月遣使廵覆所至閱獄囚杻校糧餉治不如法者臣按此唐人恤獄之仁其享國之久未必不由乎此宋太祖開寳二年五月上以暑氣方盛深念縲係之苦下詔西京諸州令長史督掌獄掾五日一撿視灑掃獄户洗滌杻械貧不能自存者給飲食病者給醫藥輕繫小罪即時决遣無得淹滯自是毎嵗仲夏必申明是詔以誡官吏嵗以為常臣按宋朝以忠厚立國此亦其仁政之一端太宗雍熈元年令諸州十日一具囚帳及所犯罪名禁繫日數以聞刑部専意紀察臣按史太宗閱諸州所奏囚簿有禁係至三百人者乃下詔申嚴淹獄之戒令今後門留寄禁取保在外并邸店飬疾人等並凖禁囚例件析以聞其鞫獄違限及可斷不斷事小而禁繫者有司奏駁之噫太宗以萬乗之君處崇髙富貴之位於凡諸州所奏囚簿亦閱及之不惟寓諸目且動於心既動於心即形於言而有申嚴淹獄之戒且命所司件析其事目以聞嗚呼太宗之盡心獄事如此當世之民豈有無罪而就死地者哉以上順天時之令大學衍義補卷一百七
