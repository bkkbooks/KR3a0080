body:
  text: 大學衍義補卷一百五十八明丘濬撰治國平天下之要成功化聖神功化之極上之下堯典曰若發語辭稽考也古帝堯曰放至也勲功也欽恭敬眀通明文文章思意思安安無所勉強允信也恭克能也讓光顯也被及也四表外也格至也于上下上天下地朱熹曰放勲言堯之功大而無所不至也常人有強為恭而不實欲為讓而不能惟堯性之是以信恭而能讓也上天下地也堯徳之盛如此故其所及之逺如此也書叙帝王之徳莫盛於堯而其贊堯之徳莫偹於此且又首以欽之一字為言此書中開卷第一義也金履祥曰放勲二字本史官稱堯之語後世因以為堯稱焉克明明之也俊大也徳以親九族髙祖至𤣥孫九族既睦平均也章明也百姓畿内民庶百姓昭明皆能自明其徳恊和萬邦天下諸侯之國黎黒也民於嘆美辭變變惡為善時是也雍和也朱熹曰堯之大徳上文所稱是也言堯推其徳自身而家而國而天下所謂放勲者也金履祥曰上文紀聖徳之盛此章紀治化之序聖人治天下其機有二一則盛徳發越自然成化一則布徳施化推而廣之也臣按真氏謂堯典為大學之宗祖既載此於衍義之首篇矣而臣於此又載之於治國平天下之末者蓋載之於前以見帝王為治之序載之於後以見帝王治化之成蓋盛徳發越而至於光四表格上下聖徳推行而至於黎民於變時雍治化至此可謂成矣吁堯之為帝萬世帝王之宗虞之為書萬世經典之首論君徳而至於堯之欽明文思安安論治道而至於唐之黎民於變時雍所謂聖神功化之極兹其標凖與大禹謨益曰都帝徳廣運乃聖乃神乃武乃文皇天眷顧也命奄盡也有四海為天下君朱熹曰廣者大而無外運者行而不息大而能運則變化不測故自其大而化之而言則謂之聖自其聖而不可知而言則謂之神自其威之可畏而言則謂之武自其英華發外而言則謂之文臣按自古稱帝王者必曰五帝而孔子删書特始堯典者蓋帝堯五帝之盛帝也其所以為皇天眷命奄有四海以為天下之君者以其有廣運之徳焉推原其所自蓋自欽明中來也蓋欽則敬主乎中而萬變莫能踰明則光燭乎外而萬物莫能蔽是故修己以安百姓繼照以臨四方四表之大無處而不通萬世之逺無時而或息此其徳之所以廣運而上足以膺天命下足以統人羣而為萬代之盛帝也與伊訓曰嗚呼古有夏先后方懋厥徳㒺有天災山川鬼神亦莫不寧暨鳥獸魚鼈咸若蔡沈曰殷監不逺在夏后之世商之所宜監者莫近於夏故首以夏事告之也陳雅言曰人君者天地鬼神萬物之主也古有夏先后懋敬其徳謂之方者日新不已之意所謂致中和也於是天道順山川寧而鬼神安所謂天地位也微而羽毛鱗甲之生亦莫不各遂其性所謂萬物育也臣按此伊尹言烈祖之成徳以訓於太甲者也太甲湯之孫也伊尹欲以其祖成湯之成徳以告太甲而必先言夏后之世詩所謂殷監不逺是也蓋人君為治不難於得民而難於得天茍不得天則天災時至百物不成山川鬼神無以供其粢盛而不得其寧鳥獸魚鼈不得遂其生育而有所不順此人君之為治所以必貴乎懋其徳也徳而懋焉則勉勉而不怠懋徳而方焉則進進而不已允若是則隂陽順序災害不生物無疵厲流峙之山川幽明之鬼神陸産之鳥獸水産之魚鼈無一而不各止其所焉治效而至於此豈非功化之成也哉洪範初一曰五行水火木金土次二曰敬用五事貌言視聼思次三曰農用八政食貨祀司空司徒司冦賓師次四曰協用五紀嵗月日星辰厯數次五曰建用皇極次六曰乂用三徳正直剛克柔克次七曰明用稽疑雨霽蒙驛克貞悔次八曰念用庶徴雨暘燠寒風時次九曰嚮用五福夀富康寕攸好徳考終命威用六極凶短折疾憂貧惡弱蔡沈曰此九疇之綱也在天惟五行在人惟五事以五事叅五行天人合矣八政者人之所以因乎天五紀者天之所以示乎人皇極者君之所以建極也三徳者治之所以應變也稽疑者以人而聽於天也庶徴者推天而徴之人也福極者人感而天應也五事曰敬所以誠身也八政曰農所以厚生也五紀曰協所以合天也皇極曰建所以立極也三徳曰乂所以治民也稽疑曰明所以辨惑也庶徴曰念所以省騐也五福曰嚮所以勸也六極曰威所以懲也五行不言用無適而非用也皇極不言數非可以數明也本之以五行敬之以五事厚之以八政協之以五紀皇極之所以建也乂之以三徳眀之以稽疑騐之以庶徴勸懲之以福極皇極之所以行也人君治天下之法是孰有加於此哉臣按眞氏謂洪範九疇六十有五字耳而天道人事無不該焉原其本皆自人君一身始此武王之問箕子之言所以為萬世蓍龜也臣竊以為非獨可以為萬世蓍龜其實萬世之法令格式焉治世之大經大法不出此矣為學而究乎此則能通貫天人之理為治而原乎此則能和同天人之際洪範者天人之學也學而至於貫通天人在學者則為學問之極功治而至於和同天人在人君則為聖神之能事五皇極皇建其有極斂時五福用敷錫厥庶民蔡沈曰皇君建立也極猶北極之極至極之義標凖之名中立而四方之所取正焉者也言人君當盡人倫之至以至一事一物之接一言一動之發無不極其義理之當然而無一毫過不及之差則極建矣極者福之本福者極之效極之所建福之所集也人君集福於上非厚其身而已用敷其福以與庶民使人人觀感而化所謂敷錫也金履祥曰其有極指人君所有之標凖也臣按皇建一疇洪範九疇之樞紐也人君盡五倫之道而立為天下之標凖使四方萬姓皆於此而取則焉所謂極也然其所以建立之於上者豈人君之所獨有哉盖天下人人所有者也人人有之而不能自立必待帝王者出下布五行上恊五紀端五事於上而威儀言辭皆可以為民之標表脩八政於下而法度政事皆可以為民之凖的則民所有之極於是乎建矣且人君居五位之尊而盡五倫之至而為斯民之極則在君者夀富康寧攸好徳考終命矣人君不徒有是福於己而又敷布之以錫於天下之衆民使之皆富皆夀皆康寧皆考終命皆攸好徳焉夫然則在民所有之極莫不於是而皆有以建立在君所集之福莫不於是而皆得以享受嗚呼為治而至於萬方億兆皆享太平之福何莫而非自人君一身建極始哉聖祖條成大誥有曰為民造福盖有得於洪範斂福錫民之意於數千載之下宜其一世民物夀考康寧惇徳好義家家有葢藏之積人人遂首丘之願有以也夫聖子神孫所當承家學衍世澤以福天下之人民使之百世如一日焉則斯世斯民其受福也無窮盡矣無偏不中也無陂不平也遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨不公也王道蕩蕩廣逺也無黨無偏王道平平平易也無反倍常也無側不正也王道正直不偏邪也㑹其有極歸其有極蔡沈曰偏陂好惡己私之生於心也偏黨反側己私之見於事也王之義王之道王之路皇極之所由行也蕩蕩平平正直皇極正大之體也遵義遵道遵路㑹其極也蕩蕩平平正直歸其極也㑹者合而來也歸者來而至也朱熹曰無有作好無有作惡謂好所當好惡所當惡不可作為也臣按先儒謂二有極字與章首皇建其有極之有極相應蓋是福君臣同有君之所建者即民之所有而民之所以㑹而歸之者雖君所建亦己之所有者也可見天理人倫原於帝䧏之衷具於秉彜之性人人所有也而不能以皆中正必待人君之立為標凖俾天下之人皆於是乎取則然君於此豈求之於外哉亦即吾身之所有者而建立之耳君有是極民亦有是極君之所建者民之所有也民之所以㑹而歸者君之所有也君臣上下各盡其人倫之常無太過焉無不及焉孟子所謂人人親其親長其長而天下平者此也居五位之尊當建極之任者要必正身脩徳惇典庸禮即其所有者而建立之以為之標凖使夫四方萬國咸㑹而歸之如衆星之拱北極焉春秋隠公元年公羊傳曰何言乎王正月大一統也何休曰統始也總繫之辭夫王者始受命改制布政施教於天下自公侯至於庶人自山川至於草木昆蟲莫不一一繫於正月故云政敎之始臣按統者所以統天下之不一也天下咸統於一王而奉其正朔朝覲㑹同之畢赴謳歌訟獄之皆歸國不敢異政家不敢異俗車必同軌書必同文是則所謂大一統之治也春秋每年必書春王正月公羊氏曰大一統也何氏謂自公侯以至於庶人自山川以至於草木昆蟲莫不一一繫於正月故云政教之始夫事必謹始然後有終春秋所書所以謹始而此載公羊氏之説於成功化之末者欲其有終也禮運大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用㓜有所長矜與鰥同寡孤獨廢疾者皆有所養男有分女有歸貨惡其棄於地也不必藏於己力惡其不出於身也不必為己是故謀閉而不興盗竊亂賊而不作故外户而不閉是謂大同孔頴達曰此先明五帝時也陳澔曰天下為公言不以天下之大自私也當時之人所講習者誠信所修為者和睦是以親其親以及人之親子其子以及人之子使老者壮者㓜者各得其所困窮之民無不有以養之男則各有士農工商之職分女則得歸於良奥之家財貨民生所資以為用者若棄捐於地而不以時收貯則廢壊而無用所以惡其棄於地也今但得有能收貯以資世用足矣不必其擅利而私藏於己也世間之事未有不勞力而能成者但人情多詐共事則欲逸已以勞人不肯盡力此所以惡其不出於身也今但得各竭其力以共成天下之事足矣不必其用力而獨營已事也風俗如此是以姦邪之謀閉塞而不興盗竊亂賊之事絶滅而不起暮夜無虞外户可以不閉豈非公道大同之世乎臣按此禮運載孔子之言説者不以為然然其所謂講信修睦故人不獨親其親不獨子其子老有所終壯有所用㓜有所長鰥寡孤獨廢疾者皆有所養男有分女有歸凡若此者非但五帝時為然凡夫為治皆不可不然也夫然則普天之下億兆之衆人人各止其所而無一人之或失其所矣為治而至於使天下之人無一人之不得其所由一人積而至於億兆人人人皆然而在在無不然豈非大同之世乎昔孔子生春秋之世而不得位尚且有志於上古大道之行而期於大同之世矧夫居天位有可為之勢輔明君有可為之時而不思所以復古乎四體四肢也既正膚革外薄皮革膚内厚皮充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣㢘官職相序君臣相正國之肥也天子以徳為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順吳澂曰上文以身之肥譬兩間之順故先言此以足上文取譬之説然後廣言家國天下之順以實所譬也然不曰家之順國之順天下之順而曰家之肥國之肥天下之肥者因上文以肥譬順而言也父慈子孝而其情厚兄友弟恭而其情親夫義婦聼而其情不暌乖此一家之順大臣有持循小臣有分辨設官以治職分職以居官不相紊亂君以禮使臣臣以忠事君非相為賜此一國之順天子有徳以安民之居如車之承載有樂以和民之心如御之調適諸侯邦交互相施報大夫言行俱有律度庶士忠順各無欺偽百姓出入相友守望相助疾病相扶持此天下之順臣按先儒謂此乃是聖學之極功成已成物合内外之道大學身修家齊國治天下平之事也故謂之大順人君為治使夫内而一家外而一國又逺而天下皆如一人之身四體順正膚革充盈九竅百骸肢節筋骨氣充於中體全於外睟然有温潤之澤胖然有舒泰之容治天下而至於此豈非大順之世乎世而至於大順則生有所養而不至於凍餒死有所送而不至於暴露非但生人得其所幽而神眀亦皆得以享祀於冥冥之中矣故天不愛其道地不愛其寳人不愛其情故天降膏露露之澤濃如膏地出醴泉泉之味甘如醴山出器車山木自成車材河出馬圖鳯凰麒麟皆在郊棷當作藪龜龍在宫沼其餘鳥獸之卵胎皆可俯而闚也則是無故先王能修禮以達義體信以達順故此順之實也程頥曰君子修己以敬篤恭而天下平惟上下一於恭敬則天地自位萬物自育而四靈畢至矣此體信達順之道朱熹曰信是實理順是和氣體信是致中達順是致和實體此道於身則自然發而中節推之天下而無所不通也吳澂曰大順之應如此亦無他故而使之然葢由先王能修治其禮而達之於禮之義以教天下之人體實理於心而達之於一家之順充而為國家天下之順之故也遂至天地人物同一大順焉夫順理淵㣲初無形像今兩間嘉瑞昭然顯著此順之實迹可見者故曰此順之實也臣按天人之際微矣人君修徳所以盡乎人道也而天道往往應之葢天以是理賦之人人受是理於天天人之分殊而其理一是故在人之理即在天之理人盡人之道則天道即此而在人道盡而天道亦盡矣理盡於下則氣應於上隨其所感而證應隨之所謂上下一於恭敬則天地自位萬物自育氣無不和而四靈畢至矣此體信達順之道者也是以人君為治所以貴乎能修禮以達義禮者敬而已矣主敬以修禮達之於天下使其皆知其所當為者而為之則義達矣人人皆主敬以行禮則虚偽之氣不作而惟信實之道是體而是行由是協氣嘉生熏為太和而至順之氣充塞於兩間矣動物者得氣之最先故古人以四靈物至為善治之應夫人君致治而得四靈之畢至豈非體信達順之極功而何哉樂記禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道偹矣劉彜曰節其心使之行而無過不及和其聲使之言而無乖戾為之政以率其怠倦而使禮樂之教行為之刑以防其恣肆而使禮樂無敢廢然後禮樂刑政四者通行於天下而民無悖違之者則王天下者之治道偹矣臣按禮樂政刑四者王道之治具也謂之四達者東西南北無往而不通也王者之為治能使禮修而樂和而又有政以行之政有不及而又有刑以輔之則凡普天之下率土之濱莫敢有越禮棄樂干政犯刑者矣王者之道豈非完具大偹乎人君以此四者以為治於天下不徒有出治之本而又有為治之具不徒有為治之具而又有為治之法本末兼該始終相成此所以為王者之道行之天下萬世而無弊也與子曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章朱熹曰唯猶獨也則猶凖也蕩蕩廣逺之稱也言物之髙大莫有過於天者而獨堯之徳能與之凖故其徳之廣逺亦如天之不可以言語形容也成功事業也煥光明之貌文章禮樂法度也堯之徳不可名其可見者此爾尹焞曰天道之大無為而成唯堯則之以治天下故民無得而名焉所可名者其功業文章巍然煥然而已臣按自開闢以來之君以堯為稱首其功業文章巍然其髙大煥然其光明萬世帝王所當法則者也葢帝堯繼天之統故凖天以為治帝王承堯之後當凖堯以為法子曰如有王者必世而後仁朱熹曰王者謂聖人受命而興也三十年為一世仁謂教化浹也程子曰周自文武至於成王而後禮樂興即其效也或問三年必世遲速不同何也程頥曰三年有成謂法度紀綱有成而化行也漸民以仁摩民以義使之浹於肌膚淪於骨髓而禮樂可興所謂仁也此非積乆何以能致張栻曰使民皆由於仁非仁心涵養之深仁政熏陶之乆莫能然也此則非善人所能矣臣按仁者人心之徳人人有也人人有此仁而莫不皆有惻隠慈愛之心然為利欲所昏蔽而喪不忍之心者多矣是以相爭相奪相棄相殺而為不仁之事不自知也惟聖人者出以仁心煦嫗之以仁政率誘之而不仁者又為之禁戒是以一世之人莫不相親愛相賙恤而興夫仁慈忠恕之風以至於淪肌膚入骨髓若大若小若逺若近若親若疎生者相衛䕶死者相憐惜無一地之無仁無一人之不仁無一事之非仁若是者豈一朝一夕之故哉非積乆而至於數十百年不可也夫有作者於前斯有述者於後無作者以興之則其本不立無述者以續之則其事不延要必作者有恒心述者有孝念然後有以成必世之仁是故有堯而無舜不能也有文武而無成康不能也故欲成必世仁厚之俗必須有繼世仁厚之君此自古人君廟號皆必以孝為稱而以善繼述為孝道之達者此也子路問君子子曰修己以敬曰如斯而已乎曰修己以安人曰如斯而已乎曰修己以安百姓修己以安百姓堯舜其猶病諸朱熹曰脩己以敬夫子之言至矣盡矣而子路少之故再以其充積之盛自然及物者告之無他道也人者對己之稱百姓則盡乎人矣堯舜猶病言不可以有加於此以抑子路使反求諸近也蓋聖人之心無窮世雖極治然豈能必知四海之内果無一物不得其所哉故堯舜猶以安百姓為病若曰吾治己足則非所以為聖人矣臣按已者我之一身也人者對己之稱則與我為二矣至於百姓則人非一人凡盈天地間具人形骸者皆是也君子所修者一己耳以一己而雜乎百姓之中㣲乎㣲者也以我一己之修而致天下百姓皆安我何苦欲肆一己之欲而為百姓之害而不求所以安之哉是以古之帝王為百姓故孜孜然以修身而其所以修身者兢兢然以持敬也堯舜之治至於黎民時雍萬邦咸寧而其心猶以為病後世人主宫闈之中且有怨女輦轂之下率多丐夫房闥之外已有呻吟之聲左右之間每形怨恨之語方且受諛詞以為太平盛治哆然以張大欣然以慶幸自以為唐虞三代不是過也是何人品髙下之懸絶而所見之不同如此哉蓋聖不自聖愚者不自知其愚也是故人君為治必須至於天下之大萬民之衆百世之逺無一人一物一處之不得其安然後可以為功化之極子曰無為而治者其舜也與夫何為哉恭己正南面而已矣朱熹曰無為而治者聖人徳盛而民化不待其有所作為也獨稱舜者紹堯之後而又得人以任衆職故尤不見其有為之迹也恭己者聖人敬徳之容既無所為則人之所見如此而已或問恭己為聖人敬徳之容以書傳考之舜之為治朝覲廵狩封山濬川舉元凱誅四凶非無事也此其曰無為而治者何也朱熹曰即書而考之舜之所以為治之迹皆在攝政二十八載之間及踐天子之位則書之所載不過命九官十二牧而已其後無他事也因其時之無事而又恭己以臨之是以其治益乆長而不替若後世之君當無事之時而不知恭己之道則必怠惰肆放宴安酖毒其所謂無事者乃所以為禍亂多事之媒矣又如老氏有所謂無為者亦是簡忽聖人無為却是付之當然之理如恭己正南面這是甚麽様本領豈可與老氏同日而語哉臣按自古稱帝王之盛者必曰堯舜堯之徳不可名所可見者成功文章而已舜之治無所為所可見者恭己南面而已堯授舜以天下非徒傳之以位而實傳之以心何心哉敬而已敬而著於容是之謂恭舜之恭己即堯之允恭也舜受堯之傳以此恭己之容而正夫南面之位堯之成功已巍然矣堯之文章已煥然矣尚何事作為哉於是而更有所為則是作聰眀也舜豈為是哉後世人主不務恭已而但欲無為則是怠惰恣肆而已矣豈其無事可為哉事有可為而不肯為以致廢弛敗壞而不可救藥隳祖宗之成功壊國家之善治貽生民之隠禍是狥虚名而自詔伊戚也嗚呼可不戒哉以上聖神功化之極上之下大學衍義補卷一百五十八
