body:
  text: 大學衍義補卷五十一明丘濬撰治國平天下之要明禮樂家鄉之禮上之下喪大記曰疾病外内皆埽廢床徹䙝衣加新衣男女改服屬纊新綿以俟絶氣男子不死於婦人之手婦人不死於男子之手馬睎孟曰君子於其生也欲内外之有别於其死也欲始終之不䙝則男女之分明夫婦之化興小斂於户内大斂於阼小斂布絞縮直也者一横者三一衾大斂布絞縮者三横者五布衿二衾陳澔曰此明小斂文衣衾絞既斂所用以束尸使堅實者從者在横者之上從者一幅横者三幅每幅之末析為三片以便結束大斂縮者三謂一幅直用裂其兩頭為三方也横者五謂以布二幅分裂作六片而用五片去一不用横於直者之下也臣按古人之死必為之大小斂所以束其屍而使之堅實後世不知此禮往往有謂不忍將死者束縛而不肯斂者此愚下之見也上大夫大棺八寸屬在大棺之内六寸下大夫棺六寸屬四寸士棺四寸臣按死者人所不免故王制六十嵗制謂制棺也人至六十死期將近故必豫為制棺恐一旦不測倉卒之際急難措置也古之孝子慎於送終之禮三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而𦵏凡附於棺者必誠必信勿之有悔焉耳矣必誠則於死者無所欺必信則於生者無所疑勿之有悔則於生者死者皆無憾矣必如是庶幾孟子所謂盡於人心者乎檀弓曰子游問喪具夫子曰稱家之有亡子游曰有無惡乎齊夫子曰有毋過禮茍亡矣斂首足形還與旋同𦵏縣平聲棺而封人豈有非之者哉封當作窆朱熹曰喪具稱家之有無貧而厚𦵏不循禮也臣按喪𦵏之具固有禮亦有分分雖得為而禮不可為固不可為禮雖可為而分不得為亦不可為反而求之吾家禮可以為而分又得為而吾財力足以稱之而不為是儉其親也禮可以為而分亦得為而吾之財力不足以為之而必假借於人勉彊以徇俗好甚至有所待而久不舉以暴露其親則是徇外以忘親也亦豈得為孝哉喪大記曰喪有無後無無主臣按家禮立喪主註凡主人謂長子無則長孫承重主饋奠其與賔客為禮則同居之親且尊者主之蓋親者主饋奠尊者主賔客凡禮皆然周禮肆師凡卿大夫之喪相其禮臣按成周之世卿大夫家有喪事尚設官以相其禮後世徒有其文而無其人此家所以自為俗而禮教不能達於天下也檀弓曰杜橋之母之喪宫中無相以為沽麤略也也鄭𤣥曰孝子喪親悲迷不復自知禮節事儀皆須人相導而橋母死宫中不立相侍故時人謂其於禮為麤略也家語孔子在衛司徒敬子之卒蘧伯玉曰衛鄙俗不習喪禮煩吾子相焉孔子許之臣按禮廢之後人家一切用佛道二教鄉里中求其知禮者蓋鮮必欲古禮之行必須朝廷為之主行下有司令每鄉選子弟之謹敏者一人遣赴學校依禮演習散歸鄉社俾其自擇社學子弟以為禮生凡遇人家有喪祭事使掌其禮如此則聖朝禮教行於天下而異端自息矣王制曰大夫士庶人三日而殯三月而𦵏春秋𫝊曰大夫三月同位至士踰月外姻至陳澔曰天子七月而葬諸侯五月而𦵏大夫降於諸侯而三月士庶人又降於大夫故踰月也今總云大夫士庶人三日而殯此固所同然皆三月而葬則非也當從左氏說為正臣按古者置棺於坎而塗之謂之殯後世無所謂塗之者三日大斂之後入棺即以為殯也王制通謂大夫士庶人三月而𦵏而左𫝊則又分大夫三月士踰月而不言庶人蓋先王制禮不下庶人人家貧富不同事辦即𦵏不拘日也王制通以三月言而左𫝊謂士踰月蓋士踰月即可𦵏不得已而至於三月亦不為過庶人事具即𦵏然有故焉亦許至三月然踰三月則不可也所謂不得已或有故者蓋以其間有貧窘或逺行未回及適有疾病者皆許延至三月但不可出三月之外近世江浙閩廣民間多有溺於風水之說及欲備禮以徇俗尚者親喪多有留至三五七年甚至累數喪而不舉者前喪未己後喪又繼終無已時使死者不得歸土生者不得樂生積隂氣於城郭之中留伏屍於室家之内十年之中其家豈無昏姻吉慶之事親死未葬恬然忘哀作樂流俗之弊莫此為甚乞明為禁限留喪過三月不葬者責以暴露之罪若有遠行商宦及期不至者明白告官方許踰限仍行禮官申明舊制凡民間殯𦵏之具皆為品節禮不可為如散帛設席之類分不得為如憧幡綵亭之類者一切禁絶之違者問以違制之罪司馬光曰世俗信浮屠誑誘於始死及七七百日朞年再期除喪飯僧設道塲或作水陸大㑹寫經造像修建塔廟云為死者滅彌天罪惡必生天堂受種種快樂不為者必入地獄剉燒舂磨受無邊波吒之苦殊不知人生含血氣知痛癢或剪爪剃髮從而燒斫之己不知苦况於死者形神相離形則入於黄壤朽腐消滅與木石等神則飄若風火不知何之借使剉燒舂磨豈復知之且浮屠所謂天堂地獄者亦以勸善而懲惡也茍不以至公行之雖鬼可得而治乎臣按追薦之說惟浮屠氏有之而近世黄冠師亦有所謂煉度者彼見浮屠得財亦效而尤之也在宋時猶未盛故温公書儀止言浮屠而家禮亦止云不作佛事非謂道教可用也雖然世俗之所以為此者蓋以禮教不明於天下士庶之家一有喪事無所根據因襲而為之以為當然之禮耳其間固有為因果而作者然亦其徒云耳若夫市井小人其親之存飢寒患難尚有所不䘏况其既死又肯捐其財超其出地獄而升天堂哉無亦畏世俗之譏笑而為之耳若夫所謂士大夫及仕宦之家其心亦有知其非而不欲為者然念其祖父以来世襲為此而凡其親族姻戚鄉鄰之家無不如此者而我何人一旦乃敢不為既恐他人議己之不孝其親又恐其譏己之吝財費也中有特見之士毅然欲為然當親死之時五内分裂其禮散見於經𫝊之中無有定說平時失於講究一旦臨事欲行從何措手欲資之人一時無有所謂稽古知禮者茍直情而徑行則又反不如二教之有據依是以不得已而用之也彼佛之言止說天堂地獄歸向之者可以免苦而即樂未有所謂科儀也而科儀之作蓋我中國之人竊我儒之土苴乗其隙而用之以攫民財吾儒不之覺也方且作為言語文字以攻擊其非而不知吾禮之柄為彼竊弄是以攻之非不力而卒莫如之何也已昔宋儒朱熹所著家禮㑹粹諸家禮以為一書而於喪禮尤備我太宗皇帝命儒臣載入性理大全書頒行天下臣甞以淺近之言節出其要以為儀注刻板已行在臣家鄉多有用而行者遂以成俗蓋行古禮比用浮屠省費數倍伏望聖明為禮教主復行古禮非獨可以正民俗闢異端而亦可以省民財厚民生也又曰世俗信𦵏師之說既擇年月日時又擇山水形勢以為子孫貧富貴賤賢愚夀夭盡繫於此而其為術又多不同争論紛紜無時可決至有終身不葬累世不𦵏或子孫衰替忘失處所棄捐不葬者正使殯𦵏實能致禍福為子孫者亦豈忍使其親臭腐暴露而自求其利耶悖禮傷義莫甚於此然孝子之心慮患深逺恐淺則為人所掘深則溼潤速朽故必求土厚水深之地而𦵏之所以不可不擇也臣按古者舉事必決之卜筮雖以周公定洛亦必假之於龜夫建都邑天下之大事也以周公元聖據其形勢以定其規制無不可者尚必決以卜焉後世卜筮之法無𫝊俗所用者非古法不足為據其於時月塋兆幸世有選擇之法存焉不能不用之以代卜筮也但其所謂希福祿富貴者不足信爾其趣吉避凶之說亦不可無宜行有司明為之禁非有故不許其踰三月之限及為各房利病之說以誘惑愚俗犯者禁斷不許行術以上死葬父母之禮檀弓曰衰與其不當物也寜無衰鄭𤣥曰不當物謂精粗廣狭不應法制也吴澂曰喪禮制為斬齊功緦之服者其文也不飲酒食肉處内者其實也中有其實而外飾之以文是為情文之稱徒服其服而無其實則與不服等爾雖不服其服而有其實者謂之心喪心喪之實有隆而無殺服制之文有殺而無隆古之道也臣按周禮肆師禁外内命男女之衰不中法者蓋以五服之冠絰衰裳皆有所取義非徒異其製而已也我太祖皇帝以服制圖載於大明律之首蓋以違於禮則入於律既以法戒天下又製為孝慈録一書援乎古以證乎今復以禮諭臣民禮法兼行萬世之下所當遵守者也然而官府雖守其法而街市之間閭閻之下鄉俗相𫝊多失其制度乞敕有司畫為圖式降下有司凡五服之制務必依式製造不如式者罪之喪服小記曰親親尊尊長長男女之有别人道之大者也鄭𤣥曰此論服之降殺親親謂父母也尊尊謂祖及曽祖高祖也長長謂兄及旁親也不言卑㓜舉尊長則卑㓜可知也男女之有别者若為父斬為母齊衰姑姊妹在室期出嫁大功為夫斬為妻期之屬是也此四者於人之道為最大臣按人道之大者在彝倫彝倫之大者在於親親尊尊長長男女之别焉是以方其生也親者親之尊者尊之長者長之當别者别之一皆出於天性本於人心凡其所以恭敬愛慕而嚴憚之者是乃人道之當然自然而然者也及其不幸死亡而至於終天永訣雖欲親之尊之長之别之不可得已是以聖人制為服制以寓其親親尊尊長長别别之義於冠絰衰裳之間服制精粗必合法制歲月乆近必遵聖經非但以寄其悲哀之情痛疾之意而已也其親踈之殺尊卑之等長幼之序内外之辨一毫不敢有所違悖僣差於其間是豈無故而然哉蓋人道當如此也彼昧於禮者或加隆於私親或借吉於凶喪知有母而不知有父知有慾而不知有理蓋不知人道者也人而不知人道尚可謂之人哉檀弓曰事師無犯無隠左右就養無方服勤至死心喪三年孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服程頤曰師不立服不可立也當以情之厚薄事之大小處之如顔閔之於孔子其成已之功與君父並雖衰三年可也其次各有淺深稱其情而已張載曰古不制師服師無定體也見彼之善而已傚之亦師也故有得其一言一義而如朋友者有親炙如兄弟者有成就己身而恩如天地父母者此豈可以一槩服之故聖人不製其服心喪之可也臣按五者之倫有天合者有人合者皆有天然之分本然之則其理一定故聖人立為服制各稱情以立文以為不易之道獨於師不為定制焉孔門諸子朝夕從游凡天地間義理古今制度事為變故無不講明辨問而於喪祭吉凶之禮尤加詳焉獨於喪師之服畧無一言及之意者恐有豫凶事之嫌歟逮孔子既沒之後始疑所服子貢乃舉夫子所以喪淵路者以起其義曰夫子生時以子之喪處吾徒既視吾徒以子矣今夫子沒吾徒烏可不以父視夫子乎乃處之曰請喪夫子若喪父而無服若喪父無服所謂心喪者也心喪者身無衰麻之服而心有哀戚之情三年之間不飲酒不食肉不御内時至而哀哀至而哭充充瞿瞿慨然廓然無以異於倚廬之間几筵之下兆域之側也夫是之謂心喪古人謂弟子於師有君臣父子朋友之道生則尊敬之死則哀痛之恩深義重故為之隆服焉夫恩深義重者固當為之隆其服矣然恩有淺深義有輕重又當因其淺深輕重而處之是亦所以稱情立文也孔門之徒三千速肖七十當乎夢奠之初固必人人奔赴也三年之後入别子貢相嚮而哭者蓋必有數焉而子貢一人築室於塲又居三年受恩尤深故也噫世衰道微禮教不明於世執親之喪者尚或不能以如禮况師乎甚至師存而闗弓反射更名他師師沒而不肯一弔臨者亦或有也况望其服心喪以報之乎雖然秉彞之心人皆有之不可盡誣天下以無人也然則弟子於師之喪固服心喪矣若夫弔奠之時從葬之際服何服歟儀禮曰朋友麻註云弔服加麻其師與朋友同既𦵏除之禮記曰孔子之喪二三子皆絰而出羣居則絰出則否張載解云羣居則絰出則否喪常師之禮也絰而出特厚於孔子也宋儒黄幹喪其師朱熹服加麻制如深衣用冠絰王柏喪其師何基服深衣加帶絰冠加絲武柏卒其弟子金履祥喪之則加絰於白巾絰如緦服而小帶用細苧黄王金三子者皆朱門之嫡𫝊其所製之師服非無稽也後世欲報其師之恩義者宜準之以為法云五服之制載於禮圖於律世所通知者兹不載而特舉師友之服者補所略也以上服制之義詩谷風曰凡民有喪匍匐救之曲禮曰知生者弔知死者傷又曰助𦵏必執紼引棺之索檀弓曰弔於人是日不樂行弔之日不飲酒食肉焉弔於葬者必執引引柩之索若從柩及壙皆執紼公羊𫝊曰車馬曰賵貨財曰賻衣被曰襚榖梁𫝊曰乘馬曰賵衣衾曰襚貝玉曰含錢財曰賻吕大臨曰詩曰凡民有喪匍匐救之不謂死者可救而復生謂生者或不救而死也夫孝子之喪親不能食者三日其哭不絶聲既病矣杖而後起問而後言其惻怛之心痛疾之意不欲生則思慮所及雖其大事有不能周之者而况於他哉故親戚僚友鄉黨聞之而往者不徒弔哭而已莫不為之致力焉始則致含襚以周其急三日則共糜粥以扶其羸每奠則執其禮將𦵏則助其事其從柩也少者執紼長者専進止其掩壙也壯者盈坎老者從反哭祖而賵焉不足則贈焉不足則賻焉凡有事則相焉斯可謂能救之矣故適有喪者之辭不曰願見而曰比雖國君之臨亦曰寡君承事他國之使者曰寡君使某母敢視賔客主人見賔不以尊卑貴賤莫不拜之明所以謝之且自别於常主也賔見主人無有答其拜者明所以助之且自别於常賔也自先王之禮壊後世雖𫝊其名數而行之者多失其義喪主之待賔也如常主喪賔之見主人也如常賔如常賔故主於弔哭而莫敢與其事如常主故舍其哀而為衣服飲食以奉之其甚者至於損奉終之禮以謝賔客之勤廢弔哀之儀以寛主之費用則是先王之禮意其可以下而已乎今欲行之者雖未能盡得如禮至於始喪則哭之有事則奠之又能以力之所及為營喪具之未具者以應其求輟子弟僕𨽻之能幹者以助其役易紙幣壺酒之奠以為襚除供帳饋食之具以為賵與賻凡喪家之待己者悉以他辭受焉庶幾其可也臣按今世俗於親賔来弔奠往往設席以待之裂帛以散之是故吕氏所謂待以常賔舍其哀而為衣服飲食以奉之者也又世俗之人送往之日親友醵錢為主人設宴於墓所醉飽歌唱甚者孝子亦預飲餟此何禮也今此俗京師尤甚夫京邑首善之地其所為如此何以示天下四方乎乞敕有司痛加禁革自京邑始然後推行於天下曲禮曰鄰有喪舂不相里有殯不巷歌陳澔曰五家為鄰相者以音聲相勸相蓋舂人歌以助舂也二十五家為里巷歌歌於巷也臣按古者鄰里有喪而居民相與同其戚也如此後世無此風矣臣故録之以為世訓以上弔慰之禮以上家鄉之禮上之下大學衍義補卷五十一
