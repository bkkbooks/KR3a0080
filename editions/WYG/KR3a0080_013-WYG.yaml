body:
  text: 大學衍義補卷十三明丘濬撰治國平天下之要固邦本總論固本之道易泰之象曰天地交泰后君也以財成天地之道輔相天地之宜以左右民程頥曰天地交而隂陽和則萬物茂遂所以泰也人君當體天地通泰之象而以財成天地之道輔相天地之宜以左右生民也財成謂體天地交泰之道而財制成其施為之方也輔相天地之宜天地通泰則萬物茂遂人君體之而為法制使民用天時因地利輔助化育之功成其豐美之利也如春氣發生萬物則為播植之法秋氣成實萬物則為收斂之法乃輔相天地之宜以左右輔助於民也民之生必賴君上為之法制以教率輔翼之乃得遂其生養是左右之也朱熹曰泰通也財成以制其過輔相以補其不及臣按天地交而隂陽和萬物遂其茂育者天地所以為泰也上下交而心志通萬民遂其生育者世道所以為泰也世道之所以泰者何也盖由上之人於凡下之人心志之所欲身命之所闗日用飲食之資養生送死之具所恃以為生生者無一而不得以通於上上之人一一皆有以知其所以然如此則順如此則逆如此則利如此則害於是量其可否折為中道立為法制定為品則大過者則裁截成就之不及者則輔翼相助之所以然者無非左右乎生民而己上之人左右乎民如此民之心志無有不通達於上者矣下之情通乎上亦猶地之氣通乎天此世道所以為泰歟剝落也之象曰山附於地剝上謂人君以厚下安宅程頥曰下者上之本未有基本固而能剥者也故上之剥必自下下剥則上危矣為人上者知理之如是則安養人民以厚其本乃所以安其居也朱熹曰厚下者乃所以安宅如山附於地惟其地厚所以山安其居而不揺人君厚下以得民則其位亦安而不揺猶所謂本固邦寧也臣按山髙出於地而反附著於地猶君居民之上而反依附於民何也盖君之所以為君者以其有民也君而無民則君何所依以為君哉為人上者誠知其所以為君而得以安其位者由乎有民也可不思所以厚民之生而使之得其安乎民生安則君得所依附而其位安矣益之彖曰益卦名損上益下民説音恱无疆謂無窮極朱熹曰損上益下曰益損下益上曰損所以然者盖邦本厚則邦寧而君安乃所以為益也否則反是臣按益之為言有所増加之謂也今而無所増加而有損焉乃謂之益何哉有若對魯哀公之問曰百姓足君孰與不足百姓不足君孰與足盖深有得於益卦之義也大禹謨曰可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬脩其可願四海困窮天禄永終朱熹曰可愛非君乎可畏非民乎衆非君則何所奉戴君非民則誰與守邦欽哉言不可不敬也可願猶孟子所謂可欲凡可願欲者皆善也人君當謹其所居之位敬脩其所可願欲者茍有一毫之不善生於心害於政則民不得其所者多矣四海之民至於困窮則君之天禄一絶而不復續豈不深可畏哉此極言安危存亡之戒以深警之臣按人君至尊也小民至卑也人君至強也小民至弱也君之於民欲生則生之欲死則死之是可畏者莫如君也今舜之告禹乃曰可畏非民何哉吁人君誠知民之真可畏則必思所以養之安之而不敢虐之苦之而使之至於困窮矣夫然則天禄之奉在人君者豈不長可保哉五子之歌其一曰皇大也祖謂禹有訓民可近不可下民惟邦本本固邦寧蔡沈曰此禹之訓也君之與民以勢而言則尊卑之分如霄壤之不侔以情而言則相須以安猶身體之相資以生也故勢踈則離情親則合以其親故謂之近以其踈故謂之下言其可親而不可踈之也且民者國之本本固而后國安本既不固則雖彊如秦富如隋終亦滅亡而已矣臣按民惟邦本本固邦寧之言萬世人君所當書于座隅以銘心刻骨者也又曰予五子自稱視天下愚夫愚婦一能勝予一人三失怨豈在明不見是圗予臨兆民凛乎若朽索之馭六馬為人上者奈何不敬蔡沈曰君失人心則為獨夫獨夫則愚夫愚婦一能勝我矣三失者言所失衆也民心怨背豈待其彰著而後知之當於事幾未形之時而圖之也朽腐也朽索易絶六馬易驚朽索固非可以馭馬也以喻其危懼可畏之甚為人上者奈何而不敬乎前既引禹之訓言此則以己之不足恃民之可畏者申結其義也臣按此章言國以民為本君之固結民心以敬為本人君誠能以敬存心兢兢業業以臨兆民如以朽敗欲斷之索以馭夫並駕易驚之馬惟恐其索之斷絶而馬之驚軼以致吾身之墜惕然恒存此心以臨乎民必不肯非法以虐之非禮以困之而使之得以安其身保其命以遂其仰事俯育之願則有以固結其心而宗社奠安矣左傳襄公十四年師曠侍於晉侯論衛人出其君曰良君将賞善而刑淫明良之君賞加於善人刑加於淫人養民如子盖之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主民之望也若困民之主匱神空匱其神乏祀百姓絶望社稷無主将安用之又曰天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性必不然矣臣按書曰惟天惠民惟辟奉天君承天之命以治天之民知天之心甚惠愛乎民也則必養之如子盖之如天容之如地則民之奉其君亦将愛之如父母仰之如日月敬之如神明畏之如雷霆矣茍以一人肆於民上以縱其淫虐而棄天地之性豈天意哉哀公元年陳逢滑對懐公曰臣聞國之興也以福其亡也以禍國之興也視民如傷是其福也其亡也以民為土芥是其禍也臣按國之所以為國者民而已無民則無以為國矣明聖之君知興國之福在愛民則必省刑罰薄税斂寛力役以為民造福民之享福則是國之享福也彼昏暴之君視民如土芥凡所以禍之者無所不至民既受禍矣國亦從之無國則無君矣國而無君君而無身與家人世之禍孰有大於是哉推原所自起於一念之不恤民也孟子曰桀紂之失天下也失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也朱熹曰民之所欲皆為致之如聚斂然民之所惡則勿施於民鼂錯所謂人情莫不欲夀三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不危人情莫不欲逸三王節其力而不盡此類之謂也張栻曰所欲與聚非惟夀富安逸之遂其志用舎從違無不合其公願而後為得也又曰民之歸仁也猶水之就下獸之走壙廣野也也故為淵深水也敺魚者獺食魚獸也為叢茂林也敺爵與雀同者鸇食雀鳥也為湯武􅇌民者桀與紂也朱熹曰民之所以歸乎此以其所欲之在乎此也民之所以去此以其所欲在彼而所畏在此也張栻曰秦為漢􅇌隋為唐敺季世之君肆於民上施施然自以為安而不知其為人敺哀哉臣按民心莫不有所欲亦莫不有所惡於所欲者則趨之於所惡者則避之人君知民之所欲者在仁則施仁之政以來之所惡者在不仁則凡不仁之政一切不施焉去其不仁而所施者無非仁則有以得民之心而民之歸之不啻如水就下獸走壙矣茍為不然反其好惡之常民心所欲者則不之施而所施者皆其所不欲者也如此則失民之心矣既失民心民是以視其欲之所在而趨就之則是吾為之敺之也嗚呼有天下國家者尚鑒諸此其無為人􅇌民哉孟子曰得乎丘民而為天子得乎天子為諸侯朱熹曰丘民田野之民至微賤也然得其心則天下歸之天子至尊貴也而得其心者不過為諸侯耳張栻曰人君惟恃崇髙之勢而忽下民之微故肆其私欲輕失人心以危其社稷使其知民之貴社稷次之而已不與焉則必兢兢業業不敢自恃惟懼其失之也則民心得而社稷可保矣是以明王畏其民而闇主使民畏己畏其民者昌使民畏己者亡驕亢自居民雖迫於勢而憚之然其心日離民心離之是天命去之矣臣按天生民而立君以牧之是君為民而立也君無民則無以為國而君又安能以一人之身而自為哉此人君所以貴乎得民也所謂得民者非謂得其土地生齒也得其心也得其土地生齒而不得其心猶不得也鼂錯言於漢文帝曰夫寒之於衣不待輕煖飢之於食不待甘㫖飢寒至身不顧亷恥人情一日不再食則飢終嵗不製衣則寒夫腹飢不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦斂廣儲蓄以實倉廩備水旱故民可得而有也臣按君之所以為君也以有民也無民則無君矣君有民不知所以恤之使其寒不得衣飢不得食凶年飢嵗無以養其父母育其妻子而又從而厚征重斂不時以苦之非道以虐之則民怨懟而生背畔之心不為君有矣民不為君有君何所憑藉以為君哉古之明主所以孜孜焉務民於農桑薄税斂廣儲蓄以實倉廪備水旱使天下之民無間豐凶皆得飽食煖衣以仰事俯育則常有其民而君位安國祚長矣和帝時魯恭上疏曰萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛民者必有天報臣按魯恭謂愛民者必有天報則害民者必有天殃可知矣唐太宗時馬周上疏曰三代及漢歴年多者八百少者不減四百良以恩結人心人不能忘故也自是以䧏多者六十年少者纔二十餘年皆無恩於人本根不固故也臣觀自古百姓愁怨國未有不亡者人主當脩之於可脩之時不可悔之於既失之後臣按唐三百年天下太宗貞觀之世極盛之時也馬周猶欲其脩於可脩之時而無悔於既失之後况君非太宗而時不及貞觀乃坐視百姓愁怨而略不一動心可乎陳子昻曰天下有危機禍福因之而生百姓是也百姓安則樂其生不安則輕其死輕其死則天下亂矣臣按子昻此言警切痛至人主之於百姓要必使之皆樂其生而重其死則禍亂無從作矣然則所以使之樂生重死者其道何由曰圎顱方趾之民莫不愛其身體氣力也莫不愛其父母妻子也莫不愛其田廬貲産也上之人不以興作疲其筋力不以刑法殘其體膚不以征役散其父母妻子不以誅求耗其田廬貲産則凡民之所愛皆為其所有民不幸而死猶不忍舎去况舎去而死哉為人上者誠能省刑罰薄税斂不窮兵以黷武不營作以勞人則民咸有樂生之願而無輕死之心禍亂不作而君位永安國祚無窮矣以上總論固本之道固邦本蕃民之生周禮大司徒之職掌建邦之土地之圗與其人民之數以佐王安擾邦國以天下土地之圗周遍也知九州揚荆豫青兖雍幽冀并也之地域廣横也東西為廣輪縱也南北為輪之數辨其山積石曰山林竹林曰林川注瀆曰川澤水鍾曰澤丘土髙曰丘陵大阜曰陵墳水涯曰墳衍下平曰衍原髙平曰原隰下溼曰隰之名物十等之名與所生之物又曰以土宜之法辨十有二土之名物謂十二分野之土各有所宜辨其名謂白壤黒墳之類物謂所生之物以相占祝也民宅而知其利害以阜猶盛也人民以蕃蕃息也鳥獸以毓育生也草木以任就地所生因民所能土事辨十有二壤亦土也之物而知其種以教稼穡樹藝臣按天地生人止於此數天之所覆者雖無所不至而地之所容者則有限焉惟氣數之不齊而政治之異施於是乎生民有盛有衰生齒有多有寡焉是以為人上者必知其民之數以驗吾之政又必有以知其地域之廣狹長短以驗其民居之所容辨其土地之寒煖燥溼以識其民性之所宜察其民物之詳審其利害之故蕃鳥獸以為其衣食之資毓草木以為其室器之用别其土壤教其稼穡凡若此者無非以蕃民之生也民生既蕃户口必増則國家之根本以固元氣以壯天下治而君位安矣大司徒以保息謂安其民而使之蕃息六養萬民一曰慈㓜謂愛㓜小二曰養老七十養於鄉三曰振窮閔其無告四曰恤貧助其不給五曰寛疾畧其事任保其正命六曰安富平其繇役保其常産李覯曰大司徒以保息六養萬民六曰安富謂平其繇役不專取也孔子謂既庶矣富之既富矣教之管子言倉廪實知禮節衣食足知榮辱然則民不富倉廪不實衣食不足而欲教以禮節使民趨榮而避辱難也田皆可耕桑皆可蠶材皆可飭貨皆可通彼獨以是而致富者心有所知力有所勤夙興夜寐攻苦食淡以趣天時聽上令也如此之民反疾惡之何哉疾惡之則任之重求之多勞必於是費必於是富者幾何其不轉而貧也使天下皆貧則為之君者利不利乎故先王平其繇役不專取以安之世俗不辨是非不别淑慝區區以擊彊為事噫富者乃彊耶彼推理而誅者果何人也吕祖謙曰犬司徒以保息六養萬民三曰振窮四曰恤貧六曰安富後世之政自謂抑彊扶弱者果得先王之意歟臣按大司徒以保息養萬民謂之保息者保養而使其蕃息也成周盛時以此養其萬民所以致其蕃息其天地生生不息之仁乎盖以民之生也始於㓜而終於老其間彊壯之年固皆有以自養而無賴乎人也惟其㓜也不能自立必待有以慈愛之迨其老也不能自存必待有以安養之不幸而窮匱焉貧乏焉疾病焉皆必待上之振之恤之寛之而後得以自遂也凡此五者皆因其所不足而養之惟富而有財者則又因其所有餘而養之焉誠以富家巨室小民之所依賴國家所以藏富於民者也小人無知或以之為怨府先王以保息六養萬民而於其五者皆不以安言獨言安富者其意盖可見也是則富者非獨小民賴之而國家亦将有賴焉彼偏隘者往往以抑富為能豈知周官之深意哉小司冦及大比三年比較民之衆寡登民數自生齒以上登載也于天府内史司㑹冢宰貳之以制國用臣按人生齒而體備男子八月生齒八嵗而齔女子七月生齒七嵗而齔皆書于版其正本登于天府其内史司㑹冢宰三官所掌者乃其副貳耳民數既登之後乃計其數以制國用焉始之内史以書其名繼之司會以計其數終之冢宰以統其成盖因其户口之多少年齒之長㓜以㑹計其用度之盈縮以見先王之舉事無非所以為民民用既足然後以制國用不厲民以自適也司民主民數者掌登萬民之數自生齒以上皆書於版籍也辨其國中王國之内與其都鄙及其郊野異其男女嵗登上也下除也其死生每嵗有生者登而載之死者下而除之及三年大比以萬民之數詔司冦司冦及孟冬祀司民之日祀司民之星獻其數于王王拜受之登于天府内史司㑹冢宰貳之以贊王治臣按孟子有言得乎丘民而為天子天子之所以為天之子而享有天下之奉者以其有民也天生民而命天子一人以君之凡君之所以尊所以貴而為四海九州之人愛戴之無已者非民孰致之故雖匹夫匹婦之賤且貧而天子必敬而愛之不敢以其勢位權力加之况千萬億人之名數聚於一書之間而敢輕忽之哉古昔帝王所以受人之獻民數而必拜之者此也雖然徒拜其民數之版而忽其蠢動之人則亦虚禮而已此人君所以貴乎有愛民之實也漢惠帝六年令民女子年十五以上至三十不嫁五筭漢律人出一筭令人出五筭罪之也章帝元和二年春正月詔賜民胎養穀著為令詔曰諸懐姙者賜胎養穀人三斛復其夫勿筭一嵗三年春正月詔嬰兒無親屬者及有子不能養者廩給之臣按漢之時去古未逺所以著之詔令以惠愛元元以蕃其生者猶有古意女子過時不嫁者有罪婦人懐姙者有養嬰兒失養者有給三代以下漢祚所以獨長既失而復得者豈不以此歟孝景元年詔曰間者嵗比不登民多乏食夭絶天年朕甚痛之郡國或磽陿無所農桑繫畜或地饒廣薦草莽水泉利而不得徙其議民欲徙寛大地者聽之崔寔曰昔聖人分口耕耦地各相逼今青徐兖冀人稠土狹不足相供而三輔左右及涼幽州内附近郡皆土曠人稀厥田宜稼悉不墾發今宜遵故事徙貧民不能自業者於寛地此亦開草闢土振人之術也北齊天保八年議徙冀定瀛無田之人遷於幽州寛鄉以處之始立九等之法富者税其錢貧者役其力臣按普天之下莫非王土率土之濵莫非王臣自荆湖之人觀之則荆湖之民異於江右自江右之人觀之則江右之民殊於荆湖自朝廷觀無分於荆湖江右皆王民也夫自天地開闢以來山川限隔時世變遷地勢有廣狹風氣有厚薄時運有盛衰故人之生也不無多寡之異焉以今日言之荆湖之地田多而人少江右之地田少而人多江右之人大半僑寓於荆湖盖江右之地力所出不足以給其人必資荆湖之粟以為養也江右之人羣於荆湖既不供江右公家之役而荆湖之官府亦不得以役之焉是併失之也臣請立為通融之法凡江右之民寓於荆湖多歴年所置成産業者則名以税户之目其為人耕佃者則曰承佃户專於販易傭作者則曰營生户隨其所在拘之於官詢其所由彼情願不歸其故鄉也不願者勿強則俾其供詞具其邑里定為版册見有某人主户本貫無人者不許見當某處軍匠遇闕依次句解明白詳悉必實毋隠然後遣官齎册親詣所居供報既同即與開豁所在郡邑收為見户俾與主户錯居共役有産者出財無産者出力如此通融兩得其用江右無怨女荆湖無曠夫則户口日以増矣江右有贏田荆湖無曠野而田野日以闢矣是亦蕃民生寛力役一視同仁之道也漢自髙祖訖於孝平民户千二百二十三萬三千餘口五千九百五十九萬四千餘漢極盛矣臣按此西漢户口極盛之數桓帝永夀二年户千六百七萬九百口五千六萬六千臣按此東漢户口極盛之數隋承周得户三百六十萬平陳又收户五十萬洎于大業二年干戈不用唯十八載乃至八百九十萬杜佑曰隋承西魏喪亂周齊分據暴君慢吏賦重役勤人不堪命多依豪室禁綱隳廢姦偽尤滋髙熲覩流冗之病建輸籍之法定其名輕其數使人知為浮客被彊宗收大半之賦為編甿奉公上䝉輕減之征先敷其信後行其令烝庶懐惠姦無所容隋氏資儲逾於天下人俗康阜熲之力焉胡寅曰方隋之盛也郡縣民户上版圗者八百九十餘萬自經亂離之後十存不能一二皆獨孤后無闗雎之法廢長立少而其禍至此也唐天寳十三載户九百六萬九千杜佑曰唐自武徳初至天寳末凡百三十八年可以比崇漢室而人户纔比於隋氏盖有司不以經國馭逺為意法令不行所在隠漏之甚也胡寅曰明皇享國雖乆户口雖多不待易世而身自毁之比禍亂稍平幾去其半徒以内有一楊太真外有一李林甫而致之嗚呼可不監哉憲宗元和時户二百四十七萬三千胡寅曰天寳初户幾一千萬元和户僅二百四十七萬是十失其八也憲宗急於用兵則養民之政不得厚重以用异鎛聚斂受諸道貢獻百姓難乎其阜蕃矣臣按天下盛衰在庶民庶民多則國勢盛庶民寡則國勢衰盖國之有民猶倉廩之有粟府藏之有財也是故為國者莫急於養民養民之政在乎去其害民者爾所以使民受害而户口不得阜蕃者必有其根故胡寅論隋氏之耗不咎楊𤣥感李宻也而咎獨孤后天寳之耗不罪安禄山史思明而罪楊太真李林甫元和之耗則又歸其獄於程异皇甫鎛之聚斂焉嗚呼私意行於宫禁而災禍延於閭閻小人用於廟堂而毒害及於黎庶人君之欲蕃民生者其尚去䜛逺色賤貨而一於貴徳也哉徐幹曰夫治平在庶功興庶功興在事役均事役均在民數周民數周為國之本故民數者庶事之所自出也莫不取正焉以分田里以合貢賦以造器用以制禄食以起田役以作軍旅國以建典家以立度五禮用脩九刑用措其惟審民數乎臣按今制每十年一次大造黄籍民年十五為成丁十四以下為不成丁盖得此意杜佑曰古之為理也在於周知人數乃均其事役則庶功以興國富家足教從化被風齊俗一夫然故災沴不生悖亂不起所以周官有比閭族黨州鄉縣鄙之制維持其政綱紀其人獻民數於王王拜受之其敬之守之如此其重也及理道乖方版圗脱漏人如鳥獸飛走莫制家以之乏國以之貧姦冗漸興傾覆不悟斯政之大者逺者将求理平之道非無其本歟臣按古人有言觀民之多寡可以知其國之彊弱臣竊以為非獨可以知其彊弱則雖盛衰之故治亂安危之兆皆於此乎見之是以人君常於拜受民數之後閱其版籍稽其户口以知其多寡之數今日之民較之前世多歟吾則求所以致其多之之由兢兢焉益思所以保養之寡歟必求所以致其寡之之故汲汲焉益求所以改革之如此則危者可安亂者可治而衰者可由是而盛矣以上論蕃民之生大學衍義補卷十三
