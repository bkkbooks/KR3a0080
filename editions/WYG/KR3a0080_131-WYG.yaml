body:
  text: 大學衍義補卷一百三十一明丘濬撰治國平天下之要嚴武備將帥之任下六韜曰凡國有難君避正殿召將而詔之曰社稷安危一在將軍今某國不臣願將軍帥師應之將既受命乃命太史卜齋三日之太廟鑽靈龜卜吉日以受斧鉞君入廟門西面而立君親操鉞持首授將其柄曰從此上至天者將軍制之復操斧持柄授其將其刃曰從此下至淵者將軍制之見其虛則進見其實則止勿以三軍為衆而輕敵勿以受命為重而必死勿以身貴而賤人勿以獨而違衆勿以辯說而必然士未坐勿坐士未食勿食寒暑必同如此士衆必盡死力將已受命拜而報君曰臣聞國不可從外治軍不可從中御二心不可以事君疑志不可以應敵臣既受命專斧鉞之威臣不敢生還願君亦埀一言之命於臣君不許臣臣不敢將君許之乃辭而行軍中之事不聞君命皆由將出臨敵決戰無有二心若此則無天於上無地於下無敵於前無君於後是故智者為之謀勇者為之鬬氣厲青雲疾若馳騖兵不接刃而敵降服戰勝於外功立於内吏遷上賞百姓歡悦將無咎殃唐太宗謂李靖曰古者出師命將齋三日授之以鉞曰從此至天將軍制之又授之以斧曰從此至地將軍制之又推其轂曰進退惟時既行軍中但聞將軍令不聞君命朕謂此禮久廢今欲與卿叅定遣將之儀如何靖曰臣竊謂聖人制作致齋於廟者所以假威於神也授斧鉞又推其轂者所以委寄以權也臣按六韜之書所謂避正殿乃秦漢以後事決非武王與太公問答之言但其中所引遣將之儀又非後人杜撰得出者蓋古有此禮也後世此禮不行久矣雖以唐太宗欲行叅定而李靖猶以為出師而行告廟任將而許便宜無以異於致齋推轂不須叅定況其他乎夫出師命將所以戡定禍亂安定國家付人以斬殺之權俾其司三軍之命夫豈細事而輕易茍簡略無禮儀何以激勸士心増重將權而使之出死力以成武功哉古今異宜不能盡制請命禮官斟酌古制叅之時宜定為一代出師遣將之禮漢文帝謂馮唐曰吾君代時聞趙將李齊之賢戰于鉅鹿下今吾每飯意未嘗不在鉅鹿也對曰尚不如亷頗李牧之為將也上拊髀曰嗟乎吾獨不得頗牧為將吾豈憂匈奴哉唐曰陛下雖得之不能用也上曰公何以知之對曰上古王者之遣將也跪而推轂曰閫以内者寡人制之閫以外者將軍制之軍功爵賞皆決於外歸而奏之此非虛言也李牧為趙將居邊軍市之租皆自用饗士賞賜決於外不從中覆也委任而責成功故得盡其智能今臣竊聞魏尚為雲中守其軍市租盡以饗士卒出私養錢三日一椎牛自饗賔客軍吏舍人是以匈奴逺避不近雲中之塞虜曾一入尚擊之所殺甚衆夫士卒起田中從軍安知尺籍伍符終日力戰斬首捕虜上功幕府一言不相應文吏以法繩之其賞不行吏奉法必用且尚坐上功首虜差六級陛下之吏削其爵罰遣之由此言之陛下雖有頗牧不能用也上說是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉臣按文帝歎不得頗牧之為將而馮唐對以帝得之而不能用且舉古人遣將之禮及李牧守邉之事以為言末以魏尚事實之此非但當時之弊而後世拘文法以繩邊將其弊至今猶然明主之任將帥專其委任責其成功惟以兵政脩舉寇盜息滅為效不必區區於薄書文法之拘可也唐陸贄言於德宗曰凡欲選任將帥必先考察行能然後指以所授之方語以所委之事令其自揣可否自陳規模須某色甲兵藉某人叅佐要若干士馬用若干資糧某處置營某時成績始終要領悉俾經綸於是觀其計謀校其聲實若謂材無足取言不可行則當退之於初不宜貽慮於其後也若謂志氣足任方略可施則當要之於終不宜掣肘於其間也夫如是則疑者不使使者不疑勞神於選材端拱於委任既委其事既足其求必然可以覈其否臧行其賞罰受其賞者不以為濫當其罰者無得而辭付受之柄既專茍且之心自息是以古之遣將帥者君親推轂而命之曰自閫以外將軍裁之乂賜鈇鉞示令專㫁故軍容不入國國容不入軍將在軍君命有所不受誠為機宜不可以逺決號令不可以兩從未有委任不專而望其克敵成功者也臣按古今選任將帥之方贄此疏盡之矣後之人主所當遵行者也贄又曰自頃邊軍去就裁㫁多出宸𠂻選置戎臣先求易制多其部以分其力輕其任以弱其心雖有所懲亦有所失遂令分閫責成之義廢死綏任咎之志衰一則聽命二亦聽命爽於軍情亦聽命乖於事宜亦聽命若所置將帥必取於承順無違則如斯可矣若有意乎平兇靖難則不可也夫兩彊相接兩軍相持事機之來間不容息蓄謀而俟猶恐失之臨時始謀固已疎矣況乎千里之逺九重之深陳述之難明聼覽之不一欲其事無遺策雖聖者亦有所不能焉設使謀慮能周其如權變無及戎虜馳突迅如風飇驛書上聞旬月方報守土者以兵寡不敢抗敵分鎭者以無詔不敢出師逗遛之間冦已奔逼托於救援未至各且閉壘自全牧馬屯牛鞠為椎剽嗇夫樵婦罄作俘囚雖詔諸鎭發兵惟以虛聲應援互相瞻顧莫敢遮邀賊既縱掠退歸此乃陳功告㨗其喪敗則減百而為一其捃獲則張百而成干將帥既幸於總制在朝不憂其罪累陛下又以為大權由己不究事情用師若斯可謂機失於遙制矣臣按贄之此奏備述用師遙制之失古今一律也其中所謂雖有所懲亦有所失將帥既幸於總制在朝不憂其罪累陛下又以大權由己不究事情切中古今事情至若所謂惟以虛聲應援互相瞻顧莫敢遮邀賊既縱掠退歸此乃陳功告捷其喪敗則減百而為一其捃獲則張百以成千此又邊防陳功告㨗之通弊也憲宗元和四年以左神策中尉吐突承璀為招討處置等使翰林學士白居易上奏以為國家征伐當責成將帥近歳始以中使為監軍自古及今未有徵天下之兵專令中使統領者也臣恐四方聞之必輕朝廷四夷聞之必笑中國陛下忍令後代相傳云以中官為制將都綂自陛下始乎臣按晉文公欲得人守原而謀於寺人勃鞮以畀趙衰說者謂守原所以承天子樹覇功致命諸侯不宜謀及媟近以忝王命失政之端由是滋矣齊桓任管仲以興進豎貂以敗其後景監得以相衛鞅𢎞石得以殺望之誤之者晉文公也嗚呼晉文公謀守原之人於勃鞮知治體者猶以為羞當時陷後代況親用其人以統軍旅任閫寄乎有志於帝王之治者宜觸類以自省元和十一年高霞寓大敗於鐡城僅以身免時諸將討淮西者勝則虛張殺獲敗則匿之至是大敗不可掩始上聞中外駭愕宰相入見將勸上罷兵上曰勝負兵家之常今但當論用兵方略察將帥之不勝任者易之兵食不足者助之耳豈得以一將失利遽議罷兵邪於是獨用裴度之言他人言罷兵者稍息矣臣按韓愈曰凡此蔡功惟㫁乃成斷之一言誠人君制事之本也茍其事合於天理之正恊於人謀之公而又剛斷以主之於中則天下無難為之事人主無不成之功矣史言討淮西者勝則虛張殺獲敗則匿之此衰世將帥蒙蔽之常態非獨唐之征淮西也有國家者不可不知穆宗時招義監軍劉承偕恃恩陵轢節度使劉悟隂與磁州刺史張汶謀縳悟送闕下以汶代之悟知之諷軍士作亂殺汶圍承偕欲殺之幕僚賈直言入責悟免承偕囚之府舍穆宗召悟送承偕詣京師悟不時奉詔穆宗問裴度宜如何處置度對曰承偕在昭義驕縱不法臣盡知之陛下必欲收天下心止應下半紙詔書具陳承偕驕縱之罪令悟集將士斬之則藩鎭之臣孰不思為陛下效死穆宗俛首良久曰朕不惜承偕然太后以為飬子卿更思其次度請流之臣按劉承偕以驕縱激變劉悟為彼所囚裴度請罪之是也而乃令劉悟集衆斬之欲以此收藩鎭心如此固可以得藩鎮之心無乃失朝廷之威乎臣竊以謂承偕果有罪朝廷當下詔數其罪惡俾劉悟遣人送詣京師明正其罪如此則得之矣雖然承偕太后之養子也誅之則傷母后意奈何曰帝舉承偕罪惡反覆為太后言之曰不誅之恐激成禍亂為宗社憂言之至再至三必從之而後已武宗㑹昌四年初李德裕以韓全義以來將帥出征屢敗其弊有三一者詔令下軍前日有三四宰相多不預聞二者監軍各以意見指揮軍事將帥不得專進退三者毎軍各有宦者為監使悉選軍中驍勇數百為牙隊其在陳戰鬬者皆怯弱之士每戰監使自有信旗乘高立馬以牙隊自衛視軍勢小却輙引旗先走陳從而潰德裕乃與樞密使楊欽義劉行深議約策監軍不得預軍政毎兵千人聽監使取十人自衛有功隨例霑賞二樞密皆以為然白武宗行之自禦囘鶻至澤潞罷兵皆守此制自非中書進詔意更無他詔自中出者號令既簡將帥得以施其謀略故所向有功臣按德裕謂將帥出征屢敗其弊有三豈但當時之弊哉德裕此舉善矣然非二樞密與之同心不能去此蔽而成此功二樞密使亦宦臣也乃能狥理而不狥乎私為國而不為其黨吁賢矣哉大中九年浙東軍亂逐觀察使李訥貶訥為朗州刺史監軍王宗景杖四十配恭陵仍詔自今戎臣失律并坐監軍唐末時諸節度既有監軍其領偏師者亦置中使監陳主將不得專號令戰小勝則飛驛奏㨗自以為功不勝則迫脅諸將以罪歸之悉擇軍中驍勇以自衛遣羸弱者就戰故毎戰多敗臣按既用為將帥而又以中使監之者疑之也中使將帥同為臣子何用分疑信於其間哉夫疑人不用用人不疑監軍以中使適使之撓將權壞軍政而懈士卒之心未必有益也宋太祖欲伐江南曹彬與諸將入辭上謂彬曰南方之事一以委卿切勿暴掠生民務廣威信使自歸順不須急擊也且以匣劔授彬曰副將而下不用命者斬之臣按王者之師代天以行道也所以代王者以行天之道者誰歟將帥也將帥不能肅其下則有仁而不能施有義而不能振號令不行而事功不立矣宋祖命曹彬之辭及其授劒之意可見其仁義之兼盡矣太祖埀意將帥分命李漢超等控禦西北其家族在京師者撫之甚厚所部州縣筦𣙜之利悉與之恣其囘圖貿易免所過征稅許令召募驍勇以為爪牙凡軍中事悉聽便宜處置毎來朝必召對命坐賜以飲食賜賚殊異遣還由是邊臣皆富於財得以養士用間洞見蕃夷情狀時有冦鈔亦能先知預備設伏掩擊多致克㨗故終太祖之世無西北之憂諸叛以次削平武功蓋世斯乃得壯士以守四方推赤心置人腹中之所致也臣按昔人謂太祖之置將也隆之以恩厚之以誠富之以財小其名而崇其勢略其細而求其大久其官而責其成夫寵之以非常之恩則其感深待之以赤心則其志固富之以非常之惠則其養士足以得死力用間足以得敵情以至小其名而不撓權則位卑者有赴功之心而勇智者得以騁略其過則才能奮久其任則事體熟自古用將之方不易於是而宋祖能用之此其所以飬士少而蓄材多操術簡而收功博也歟太宗太平興國中以楊業為雲州觀察使知代州事叢自雁門之役契丹畏之毎望見業旗即引去主將屯邊者多疾之或潜上謗書斥言其短上皆不問封其書付業富弼曰昔魏將樂羊征中山平之及還見其君所收謗書三篋方知將帥立功不難但人君信任為難爾將帥專閫外權擅行威福人豈無嫉之者嫉之則謗自生既有謗言聞之於君君惑之則疑其將將被疑未有能立功者此樂羊所以感歎其事自後帝王非聰明睿智之主少有不惑謗言者其明不及魏國之君也楊業本河東降將太宗得之信任不疑毎納謗書一一付業使邊將安心以立事其過魏國之君矣臣按太宗之於楊業可謂合古人用將之道矣雖然將得其人如此可矣茍非其人豈不益長惡哉是以君子貴明理而先覺太宗與㓂凖言及將帥上曰將帥材略固不求其備但量其能而用之上自節麾下至二千石第其功效而授之微勞盡甄下情必達下情必達則無猜貳之嫌㣲勞盡甄則無觖望之釁所以各務忠孝而固禄位悖亂不得而萌也臣按太宗謂微勞盡甄下情必達此二言者用將之要道也然二者之中又以下情必達為主下情不能上達雖大功鉅庸亦或為人所蔽況微勞乎孫何言於眞宗曰謹按史記漢高祖將定三秦擇良日齋戒設壇場拜韓信為大將軍部管諸將魏故事遣將出征符節郎授節鉞跪推轂北齊命將出征則太卜詣廟灼龜授鼓旗於廟皇帝陳法駕服袞冕拜於太廟徧告訖降就中階引上將操鉞授柄將軍既執斧鉞對曰國不可從外治軍不可從中制臣即授令有旗鼓斧鉞之命而無一言之命於臣皇帝曰茍利社稷將軍以之將軍就載斧鉞而出皇帝推轂度門曰從此以外將軍制之也臣伏見近邊將授任赴鎭之際但授尺一之詔前所謂築壇告廟之禮皆闕而未建良可惜也臣按後世命將之禮久廢我文皇帝遣成國公朱能征安南黎季犛聖駕幸龍江禡祭而親諭能等其儀注之祥具載於有司可考也可為聖子神孫萬世之法仁宗時狄青自請擊儂智高韓絳言武人不可獨任上以問龎籍籍曰青起行伍若用文臣副之必為所制號令不專不如不遣乃詔廣南將佐皆禀青節制若孫沔余靖分路邀擊亦各聽沔等指揮臣按古者命將付以閫外之寄固無俟乎文臣以為之副貳然後世人心不古為將者多用不知書之人義多而仁少勇有餘而智或不足用武人而叅之以文行義而本之以仁用智略以資其武藝似不為過張方平言於仁宗曰將帥之任仍宜久於其職祖宗任李漢超郭進賀惟宗等遠或二十年近猶八九年假之事權略其細故不為間言輕有移易又不與高官常令志有所未滿不怠於為善也今則不然武臣指邊郡謂之邊任借之為發身之地厯邊任者曾無寸勞薄效不數年徑至横行而又移換改易地形山川未及知軍員士伍未及識吏民士俗末及諳已復去矣願陛下鑒祖宗故事重爵賞以待功勞責久任以觀能效臣按方平言太祖久任將帥最可為後世法夫漢唐以來人主稱善用將者首稱宋太祖雖漢高祖有所不及蓋漢祖能御將而宋太祖則善任將也田況言於仁宗曰古之良將以宴犒士卒為先所以然者鋒刃之下死生俄頃固宜推盡恩義以慰其心李牧備匈奴市租皆入幕府為士卒費趙充國禦羌戎亦日饗軍士太祖用姚全斌董遵誨抗西戎何繼筠李漢超當北敵人各得環慶齊棣一州征租農賦市牛酒犒軍中不問其出入故得戎㓂屏息不敢窺也又聞曹彬征江南日和州逐次起餉猪羊肉數千斤以給戰士臣按將士禦敵將以其性命為國家衛民守土茍當出戰之時而為將帥者徒以法令驅之而無犒勞之禮何以感激其心而使之竭力盡命乎昔之人固有以一炙啖之而致其報而亦有以一蹯不及而致其怨者飲食之物雖微而人之感激甚速非徒區區餔啜之故也田況之言豈無徵之空言哉劉敞言於仁宗曰王者之遣使命將也必為之設介貳叅佐非獨司紀綱廣謀策而已亦所以謹大事備不然也今擁數萬人之衆連四路之廣節制萬里吉凶所繫而單車臨之孤拱獨立猝有疾病不意之虞無所仗託莫相維持非計之全也朝廷以狄青宣撫荆湖經制盗賊而議不制副臣以為不便臣按人君之任將固不可以不專而亦不可以獨專也蓋人資性不同才智有限一人之見不如二人之周此命將所以必為之設叅佐也然此非獨以輔其所不及亦所以遏其所不敢焉人之所以敢於為非者無人以制之也有同心之人則潜消其非心有異議之人則遏絶其惡念神宗元豐中内臣李憲奏置保障以為駐兵討賊之地朝廷用李舜舉言罷深入攻取之策舜舉退詣執政執政王珪迎勞之曰朝廷以邊事屬押班及李留後無西顧之憂矣舜舉曰四郊多壘此卿大夫之辱也相公當國而以邊事屬二内臣可乎二臣止宜供禁庭洒掃之職耳豈可當將帥之任耶臣按李舜舉之言蓋有所激而云未必其本心也但所謂内臣止宜供禁庭洒掃之職豈可當將帥之任則天下之名言也内臣而能為此言豈但賢於其類而已哉王巖叟言於哲宗曰朝廷進退大帥固當重謹不可輕用一人之言而行之或其言出於愛憎喜怒之私意而欺罔公議豈不損主上之明誤國家之事果若可疑自當令本路監司公共體量信如其言行之未晚今言者往往蔽其所長而不以告摘其所不足而暴之則其愛憎之情自已可見夫有顯效則不録而隂言則亟行四方聞之乂誰為陛下盡心者既以人之一言易元帥元帥將人人畏憚此曹有不自保之憂此曹將人人侵侮其帥有驕横之勢此風寖長非朝廷美事臣按漢文帝時季布為河東守嘗召至京師留邸一月而罷布曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毁臣者矣陛下以一人譽召臣以一人毁罷臣臣恐天下聞之有以窺陛下淺深也夫文帝之於季布君臣之情通有言猶可以達後世上下懸絶殿陛之間如在萬里況邊將眞在萬里者哉人君進退將臣當以巖叟此言為鑒胡寅言於高宗曰將帥之才智必能謀勇必能戰仁必能守忠必不欺得是人而任之然後待以恩御以威結以誠信有功必賞有罪必刑者乃任將之實也庸駑不材本無智勇見敵輒潰與之親厚等威不立賜予過度官職踰涯將以收其心適足致其慢聼其妄誕張大之語望其朴實用命之功者此任將之虛文也臣按寅進此疏凡七策其三曰務實效去虛文其目亦有七此其七目之一也夫事有實有虛務其實則有其功騖乎虛則無其效非但用將一事然也以上言委任以上論將帥之任下大學衍義補卷一百三十一
