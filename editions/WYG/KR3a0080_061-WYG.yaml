body:
  text: 大學衍義補卷六十一明丘濬撰治國平天下之要秩祭祀國家常祀之禮下舜典望于山川朱熹曰山川名山大川五嶽四瀆之屬望而祭之故曰望周禮大宗伯以血祭祭五嶽以貍沈祭山林川澤鄭𤣥曰五嶽東曰岱山南曰衡山西曰華山北曰常山中曰嵩髙山山林曰貍川澤曰沈小宗伯之職兆五帝于四郊四望亦如之兆山川丘陵墳衍各因其方鄭𤣥曰兆為壇之營域四望五嶽四鎮四瀆賈公彦曰山川稱望言四向望為壇遥祭之也司服王祀四望山川則毳冕陳祥道曰毳冕五章說文毳獸細毛也宗彛有虎蜼之飾而毳又有宗彛之章故書謂之宗彛王祀四望山川之服也大司樂乃奏姑洗歌南吕舞大㲈以祀四望乃奏蕤賓歌函鍾舞大夏以祭山川賈公彦曰以大宗伯五嶽在社稷下山川上此文四望亦在社稷下山川上故知四望是五嶽四鎮四瀆也臣按所謂四望者盖以五嶽四鎮四瀆乃天下山川之大者天子兼有天下之大不能親臨其地故遙望而祭之也若夫所謂山川者隨所在而有則各隨其地而祭之焉本朝郊壇之外既各為壇以分祭五嶽四鎮四瀆四海又於郊壇之右以專祀之初春大祀則從享於天地仲秋報祀天子乃躬獻於其壇焉是則所謂四望之祭也又列南京鍾山之神北京天壽山之神與之同壇而祭所謂山川之祭也又於凡天下藩府郡縣既立山川壇總祭其一方之山川又表其山林川澤之有名者以專祀之使有司躬涖其所在祀焉禮記王制天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭名山大川之在其地者陳澔曰視者視其饔餼牢禮之多寡以為牲器之數也馬睎孟曰名山大川有功於民而民之取材用者也天子君天下而其所報者衆故祭天下之名山大川諸侯君一國而所報者寡故祭名山大川之在其地者月令孟春之月乃脩祭典命祀山林川澤馬睎孟曰命祀山林川澤百物之所自生也仲冬之月天子命有司祈祀四海大川名源淵澤井泉吳澂曰四海者衆水之所聚大川者江淮河濟之類名源者江源出於岷山河源出於崑崙淮源自桐栢濟源自沇水之類淵澤者水之所鍾而息者也井泉者汲取之無窮者也季冬之月乃畢山川之祀孔頴達曰以一歲之祀事畢於此故言乃畢也禮器晉人將有事於河必先有事于惡池齊人將有事於泰山必先有事於配林陳澔曰惡池并州川之大者河之從祀也配林林名泰山之從祀也學記三王之祭川也皆先河而後海臣按鄭司農解周禮四望以為日月星海鄭𤣥謂禮無祭海之文考周頌般序及觀學記謂三王祭川先河後海則是海之祭三代已有矣烏可謂無祭海之禮乎中國之地在三代不出九州之外惟揚徐青冀四州濱海而已四海惟東海濱中國而南海北海則越在荒服之外自漢以後南越始入中國而有南海然西海竟不知所在故今祀東海於登州祀南海於廣州二祀皆臨海而祭西海則望祀於蒲州北海則望祀於懐慶夫宋都汴梁而懐慶在其北是時失幽燕而以白溝河為界無緣至遼薊之域出國門而北望以祭之可也國初都金陵因之以祭亦不為過若夫今日建都于燕往南而祭北海豈天子宅中以臨四海之義哉且古謂青州為北海郡青去登不逺猶以是名今京師東北乃古碣石淪海之處於此立祠就海而祭於勢為順於理為宜况今北鎮醫無閭山在於遼海山既可以為北鎮川獨不可以為北海乎若夫中國之正西在於秦隴西南則蜀稍南則滇也滇之極西百夷之外聞有大海通西南島夷此地在前代未入中國今既為覊縻之地則王化之所及也宜於雲南望祀之如此則四海之祀皆在吾域中矣議禮之事非臣下所敢專者謹録愚見以俟采擇春秋僖公三十有一年夏四月猶三望公羊傳曰天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其封内者則不祭也三望者何望祭也然則曷祭祭泰山河海曷為祭泰山河海山川有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而徧雨乎天下者惟泰山耳河海潤于千里左氏傳昭公元年鄭子産曰山川之神凡水旱癘疫之灾於是乎禜之衰公六年楚王曰三代命祀祭不越望諸侯望祭境内山川江漢睢漳楚之望也朱熹曰諸侯祭山只祭得境内者如楚王病卜云河為祟時諸大夫欲去祭河昭王自言楚之分地不及於河河非所以為崇孔子所以美之云楚昭王知大道矣其不失國也宜哉這便見得非境内山川與我不相關自不當祭之臣按朱熹謂非境内山川與我不相關自不當祭之今東嶽行祠徧天下除京師及齊魯之境外有其祠者皆當革去盖鬼神不享非禮孔子所謂曾謂泰山不如林放正此意也劉向曰五嶽者何謂也泰山東嶽也霍山南嶽也武帝以衡山逺以霍山代之華山西嶽也常山北嶽也嵩髙山中嶽也五嶽何以視三公能大布雲雨焉能大斂雲雨焉施德愽大故視三公四瀆者何謂也江河淮濟也四瀆何以視諸侯能蕩滌垢濁焉能通百川於海焉能出雲雨千里焉為施甚大故視諸侯也山川何以視子男也能出物焉能潤澤物焉能生雲雨為恩多然品類以百數故視子男也臣按自古所以祀五嶽四瀆山川者皆以其能出斂雲雨也出雲雨則使不至於旱暵斂雲雨則使不至於滛潦無非欲其生五穀五穀熟而人民育則君位安矣漢宣帝神爵元年詔太常曰夫江海百川之大者也今闕焉無祠其令祠官以禮為歲事以四時祠江海雒水祈為天下豐年焉臣按後世祀海始於此隋制祀四鎮東鎮沂山西鎮呉山南鎮㑹稽山北鎮醫無閭山兾州鎮霍山臣按鄭𤣥註周禮四望有五嶽四鎮四瀆後世祀典止有五嶽四瀆而無四鎮至是始祀之而又以兾州霍山為中鎮是為五鎮唐武后萬歲通天元年封華嶽為金天王𤣥宗開元十三年封東嶽為天齊王天寳九載封中嶽為中天王南嶽司天王北嶽安天王十六載封四瀆俱為公十八載封四海俱為王五鎮俱為公張栻曰古者祭山川山川所以為靈者以其氣之所蒸能出雲雨潤澤萬物故為之壇壝立之祝史設之牲幣所以致禱祠之實而交孚乎隱顯之際誠之不可掩如此後世固亦有山川之祠而人其形宇其地則其失也久矣宋真宗大中祥符五年加五嶽以帝號東嶽曰齊天仁聖帝南嶽曰司天昭聖西嶽曰金天順聖北嶽曰安天元聖中嶽曰中天崇聖陳淳曰泰山在唐封為天齊王宋朝以東方主生加仁聖二字封帝帝只一帝而已安有山而謂之帝今立廟儼然人形貌垂旒端冕衣裳而坐又立后殿於其後不知又是何山可以當其配而為夫婦耶泰山魯封内惟魯公可以祀今隔一江一淮與南方地脉絶不相干渉而在在州縣皆立東嶽行祠亦失於講明之故臣按有此天地即有此山川有此山川則有所以主之者是則所謂神也世俗乃以三月二十八日為嶽神初度之辰嗚呼自天一生水凝而為山其所以凝而成形也亦有時日耶此無稽之甚也甚者惑於釋氏地獄之說謂人死其魂皆必經嶽祠拷掠而有二十四案之像其說尤為不經乞下有司屏除毋俾得以惑世欺民國朝洪武三年太祖皇帝詔畧曰永惟為治之道必本於禮考諸祀典如五嶽五鎮四海四瀆之封起自唐世崇名美號歴代有加朕思之則有不然夫嶽鎮海瀆皆髙山廣水自天地開闢以至于今英靈之㑹皆受命上帝幽微莫測豈國家封號之所可加瀆禮不經莫此為甚夫禮所以明神人正名分不可以僣差今命依古定制凡嶽鎮海瀆並去其前代所封之號止以山水本名稱其神臣按我聖祖此詔可謂考諸三王而不繆質諸鬼神而無疑百世以俟聖人而不惑一滌千古之繆臣知上帝在天之靈必有以簡在於冥冥之中而山川鬼神亦莫不各受其職矣百年以來雨𤾉時若物阜民安國祚萬年之靈長端有在於茲矣以上山川之祀太祖皇帝敕封鑒察司民城隍制詞曰帝王受天明命行政教於天下必有生聖之瑞受命之符此天示不言之妙而人見聞所及者也神司淑慝為天降祥亦必受天之命所謂明有禮樂幽有鬼神天理人心其致一也朕君四方雖明智弗類代天理物之道實罄於衷思應天命此神所鑒而簡在帝心者君道之大惟典神天有其舉之承事惟謹某州城隍聰明正直聖不可知固有超於髙城深池之表者世之崇於神者則然神受於天者蓋不知也兹於臨御之初與天下更始凡城隍之神皆新其命臣按城隍之名不經見而史亦不書惟唐李陽氷有當塗縣城隍廟記陽氷唐開元以後人則在唐已有矣因其名而求其義伏讀聖制所謂超於髙城深池之表則是神之司乃城隍之主者夫天地間有一物則有一神山林有山林之神川谷有川谷之神聚一方之民而為髙城深池以衛之必有所以主之者此城隍之神所以神歟國初承前代之舊洪武元年皆加以封爵府曰公州曰侯縣曰伯三年詔革去封號止稱某府某州某縣城隍之神是年六月二十一日又降㫖各處城隍廟屏去閒雜神道越二日又降命各府州縣城隍廟宇俱如其公廨設公座筆硯如其守令造為木主毁其塑像舁置水中取其泥塗壁繪以雲山其在兩廡如之京師既以其神祔享于山川壇又設為廟宇命京尹主其祭府州縣者守令主之新官到任則俾其與神誓按周禮有司民之祭今國初詔封其神為鑒察司民意或有取於此歟制詞有云明有禮樂幽有鬼神葢置守令以治民生於昭昭之際設城隍以司民命於冥冥之中而加之以鑒察之名而又俾有司到任之初特與神誓葢又付之鑒視糾察之任使有民社者不敢以非禮厲吾民也我聖祖主典神人兼用禮樂鬼神以為治幽明之間各受其職其所以克相上帝寵綏萬方者至矣哉城隍與山川皆土地之屬也國家祭祀以之附山川故此以附之山川之祀之後云以上城隍詩大雅皇矣詩曰是類是禡朱熹曰類將出師祭上帝也禡是所征之地而祭始造軍法者謂黄帝及蚩尤也章如愚曰漢書稱高祖祠黄帝蚩尤於沛庭管仲稱蚩尤作劒㦸史記稱黄帝與蚩尤戰於阪泉豈軍法之興始於此故後世祭之歟春秋莊公八年春王正月甲午祠兵公羊赤曰祠兵者何出曰祠兵入曰振旅其禮一也皆習戰也何休曰祠兵祭也左氏作治兵葢禮兵不徒使故將出兵必祠於近郊陳兵習戰殺牲饗士卒臣按此經傳言祠兵之始先儒謂何氏解祠兵有二義一則祠其兵器後世祭旗節始此一則殺牲享士卒後世犒賞士始此禮記王制天子將出征禡於所征之地鄭𤣥曰禡師祭也為兵禱臣按禡者師祭之名朱熹解詩謂至所征之地而祭始造軍法者夫至所征之地而既有其祭則夫無事之時必有其祠可知矣况鄭𤣥止謂為師祭則又不但出而祭之也唐百官志節度使辭日賜雙旌雙節行則建節立六纛入境築節樓迎以鼓角宋朝有六纛旌節門旗受賜藏之公宇私室號節堂朔望次日祭之號衙日葢有旌節則有神祀臣按後世六纛之名與祀始見於此我朝於山川壇側設為旗纛神祠每歲春秋遣旗手衛官致祭又命凡天下軍衛皆為立祠其牲牢品物一與社稷同霜降日將臣祭享所有旗幟收貯其中遇有征行則取旗以祭班師則仍以歸藏焉京師所祭之神旗頭大將六纛六神五方旗神主宰戰船金鼓角硫砲弓弩飛鎗飛石之神及陳前陳後神祇五猖等衆外衛所祭則總曰軍牙六纛之神夫行軍以旗幟為主而六纛者旗之大故以是名祭云此言旗纛之祭周禮大宗伯以血祭祭五祀司服祭社稷五祀則希冕曲禮天子諸侯大夫祭五祀歲徧月令春其祀户祭先脾夏其祀竈祭先肺中央土季夏其祀中霤祭先心秋其祀門祭先肝冬其祀行祭先腎孟冬臘五祀陳祥道曰五祀見於周禮禮記儀禮雜出於史傳月令以為門行戸竈中霤白虎通則以為門井戸竈中霤夫周官天子亦止於五祀儀禮雖士亦用五祀則五祀無尊卑隆殺之數矣門户人所資以出入者也中霤人所資以居者也竈井人所資以養者也先王之於五者不特所資如此而又事有所本制度有所興此所以祀而報之也中霤土之所用事故祀於中央竈火之所用事故祀於夏井水之所用事故祀於冬户在内而竒陽也故祀於春門在外而偶隂也故祀於秋兩漢晉魏之立五祀井皆與焉特隋唐叅用月令之說五祀祭行唐天寳以後亦祀井不祀行然則行神亦特軷於始行而已非先王冬日之常祀也臣按周禮儀禮雖有五祀之名而無其目月令所謂門行户竈中霤白虎通則無行而有井漢及魏晉以來皆祭井不祭行自鄭𤣥有凡祭五祀於廟之文隋唐以來皆以時享祖宗時并祭之本朝於四孟享太廟各祭其一於春祭户夏祭竈秋祭門冬祭井季夏土旺日祭中霤又於歲暮享廟命官兼祭五祀盖本月令臘享五祀也又每遇親王來朝之國皆設祭於承天門外雖曰門祭然即古人軷行之祀也是則本朝五祀盖兼用月令白虎通之文歟以上五祀之祭祭法王為羣姓立七祀五曰泰厲諸侯為國立五祀五曰公厲大夫立三祀一曰族厲鄭𤣥曰泰厲者謂古帝王無後者也此鬼無所依歸好為民作禍故祀之也公厲者謂古諸侯無後者諸侯稱公故曰公厲族厲者謂古大夫無後者鬼也族衆也大夫衆多其鬼無後者衆故曰族厲春秋左氏曰鬼有所歸乃不為厲臣按厲祭自三代以來有之本朝洪武三年命天下京都王國府州縣於城北郊各立厲壇頒祭厲及告城隍文與壇式於天下每歲三祭春清明秋七月望冬十月朔也在内命京尹主祭在外則守令主之先期牒城隍神至日祀以為主其祭文略曰普天之下后土之上無不有人無不有鬼神人鬼之道幽明雖殊其理則一故天下之廣兆民之衆必立君以主之君總其大又設官分職於府州縣以各長之各府州縣又於一百户内設一里長以統領之上下之職綱紀不紊此治人之法如此天子祭天地神祇及天下山川王國各府州縣祭境内山川及祀典神祇庻民祭其祖先及里社土穀之神上下之禮各有等第此事神之道如此尚念冥冥之中無祀神鬼昔為生民未知何故而殁其間有遭兵刀而横傷者有死於水火盜賊者有被人取財而逼死者有被人强奪妻妾而殺死者有遭刑禍而負屈死者有天災流行而疫死者有為猛獸毒蟲所害者有為饑餓凍死者有因戰鬬而殞身者有因危急而自縊死者有因牆屋傾頽而壓死者有死後無子孫者此等鬼䰟或終於前代或殁於近世或兵戈擾攘流移於他鄉或人烟斷絶久闕其祭祀姓名泯没於一時祀典無聞而不載此等孤魂死無所依精魄未散結為隂靈或倚草附木或作為妖恠悲號於星月之下呻吟於風雨之時凡遇人間節令心思陽世魂杳杳以無歸身墮沈淪意懸懸而望祭興言及此憐其惨悽故勑天下有司依時享祭在京都有泰厲之祭在王國有國厲之祭在各府州有郡厲之祭在各縣有邑厲之祭在一里又各有鄉厲之祭期於神依人而血食人敬神而知禮仍令本處城隍以主此祭兹葢我聖祖之宸翰也天命聖祖為人神主其於生民之休戚固已周盡而於鬼神之情狀亦無或遺此幽明之間所以各得其所而致天下於隆平之域也以上厲祭禮記郊特牲天子大蜡八伊耆氏始為蜡蜡也者索也歲十二月合聚萬物而索饗之也蜡之祭也主先嗇而祭司嗇也祭百種司百穀之種之神以報嗇報其敎民稼穡之功也饗農古之田畯有功於民者及郵郵亭舍表畷標表田畔相連畷處造為郵舍田畯居以督耕者禽獸謂猫虎仁之至義之盡也古之君子使之必報之迎貓為其食田鼠也迎虎為其食田豕也迎而祭之為貓虎尸而迎之也祭坊與水庸防隄也蓄水亦以障水庸溝也受水亦以洩水事為農事之備也曰祝辭土反其宅土安則無崩圯水歸其壑水歸則無泛溢昆蟲謂螟蝗之屬毋作起也草木歸其澤不得生耕稼之土也鄭𤣥曰八蜡先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八伊耆氏古天子號也或云即帝堯張載曰八蜡先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七百種八百種百穀之種也舊說以昆蟲為八昆蟲是為害者不當祭陳祥道曰蜡之為祭所以報本反始息老送終也其服王𤣥冕而有司皮弁素服葛帶榛杖其牲體疈辜其樂六樂而奏六變吹豳頌擊土鼓舞兵舞帗舞其所致者川澤山林以至土祇天神莫不與焉則合聚萬物而饗之者非特八神也而所重者八以其尤有功於田故也其神之尊者非特先嗇也而主先嗇以其始有事於田故也鄭氏謂先嗇若神農司嗇后稷是也農田畯也郵表畷田畯所以督約百姓於井間之處也爾雅曰畯農夫也然則蜡之八神則先嗇也司嗇也百種也農也郵表畷也禽獸也坊也水庸也古者蜡則飲于學黨正屬民飲酒于序是也既蜡則臘先祖五祀于廟仲尼與於蜡賓事畢出游于觀之上是也然則臘亦謂之蜡矣臣按八蜡之名鄭𤣥所叙者有昆蟲而無百種張載謂昆蟲不當祀而以百種足其數陳祥道則以貓虎為禽獸竊觀下文所謂主先嗇祭司嗇祭百種祭坊與水庸饗農及郵表畷禽獸曰主曰祭曰饗其文各不同葢主者以之為主司嗇與司穀種及坊與水庸之神則所致祭者焉然所以主其祭者則先嗇也若夫所謂古者田畯之官及郵表畷督耕之處與夫食鼠食豕之禽獸則有功於稼穡者故從而索饗之也所謂迎貓為其食田鼠迎虎為其食田豕所以釋其饗禽獸之故則陳氏以迎貓虎為禽獸者良是也然禽獸不止貓虎凡食為除所以害稼穡者皆在其中矣所謂昆蟲者特見祝辭中語昆蟲祝其毋作者恐其起而害稼也其不當祭明矣八蜡之名當以陳氏為正八蜡以記四方四方年不順成八蜡不通以謹民財也順成之方其蜡乃通以移民也既蜡而收民息已故既蜡君子不興功陳澔曰記四方者因蜡祭而記其豐凶也蜡祭之禮列國皆行之若其國歲凶則八蜡之神不得與諸方通祭所以使民知謹於用財不妄費也移者寛縱之意葢歲豐則民財稍可寛舒用之也既蜡之後收斂積聚民皆休息不興起事功也雜記子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蜡一日之澤非爾所知也蘇軾曰迎貓則為貓之尸迎虎則為虎之尸近於優所為是以子貢言一國之人皆若狂也陳澔曰黨正屬民飲酒始雖用禮及其飲食醉飽則亦縱其酣暢孔子言百日勞苦而有此蜡農民終歲勤動今僅使之為一日飲酒之歡是乃人君之恩澤非爾所知言其義大也臣按大蜡之祭三代已有之在周之前夏曰嘉平殷曰清祀而在周則曰大蜡焉秦始謂之臘尋更曰嘉平漢復曰臘季冬之月星回歲終隂陽以交農大享臘臘者接也新故相接畋獵禽獸以享百神報終成之功也魏晉以後皆有其禮古者所祭者八神而已皆有功於農事者也後世所祀之神乃至於八十有五座一百九十有二位何也本朝於古祀典所當舉者未嘗或廢惟於蜡祭闕焉葢此祭也與籍田相為始終當夫東作方興之始既舉籍田之禮以祀先農於春而以帥先農民以興其務本之心則夫百穀告成之後載舉大蜡之禮以報先嗇於冬而以勞來農民以報其勤動之苦是故舉先王莫大之禮是亦廣聖君莫大之恩也儻不棄愚言復行盛禮則幽明人鬼皆蒙其休以上言蜡祭以上國家常祀之禮下大學衍義補卷六十一
