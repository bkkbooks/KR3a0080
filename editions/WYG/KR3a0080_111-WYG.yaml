body:
  text: 大學衍義補卷一百十一明丘濬撰治國平天下之要慎刑憲簡典獄之官舜典帝曰臯陶蠻夷猾夏寇賊姦宄汝作士鄭𤣥曰猾亂也羣行攻刦曰寇殺人曰賊在外曰姦在内曰宄士理官也臣按此萬世命官掌刑之始盖帝世兵刑合而為一所謂蠻夷猾夏三代以後則屬之兵官而刑官所掌者寇賊姦宄而已而後世羣行攻刦之寇則亦以屬兵焉周官司寇掌邦禁詰姦慝刑暴亂吕祖謙曰姦慝隱而難知故謂之詰推鞫窮詰而求其情也暴亂顯而易見直刑之而已蔡沈曰秋官卿主寇賊法禁詰姦慝刑彊暴作亂者掌刑不曰刑而曰禁者禁於未然也臣按司寇六卿之一在虞廷謂之士師在周謂之司寇在漢謂之廷尉唐宋以來刑部尚書侍郎是也立政周公若曰太史司寇蘇國名公式敬爾由獄以長我王國茲式有慎以列用中罰蔡沈曰此周公因言慎罰而以蘇公敬獄之事告之太史使其并書以為後世司獄之式也左傳蘇忿生以溫為司寇周公吿太史以蘇忿生為司寇用能敬其所由之獄培植基本以長我王國令於此取法而有謹焉則能以輕重條列用其中罰而無過差之患矣陳櫟曰蘇公所以為司寇在乎敬後人之法蘇公在乎慎能慎則能敬矣固為後之司獄者慮尤為後之君用人以司獄者慮能如蘇公者則用否則斥臣按蘇公一獄官也敬其所由之獄謂其能使天下無寃獄可矣而周公乃謂之能長我王國且使太史書之以為後世司獄之法然則治天下豈無他道而必以刑獄培植國家之基本乎孟子曰三代之得天下也以仁其失天下也以不仁仁之效及於天下非百年而不洽不仁之效一日行之則有一日之害一年行之則有一年之害盖不終朝而已遍於寰區矣所以為此者固出於其君之心而所以廣君之虐於天下者則其臣為之也觀諸秦隋以來可見已人君不仁之政固非一事然皆假刑以行之假刑以立威尤不仁之政之大者也周公吿成王以立政用人之事而末舉蘇公敬獄為言且欲以為式於天下後世然不謂之治獄而謂之敬獄而又欲後人取法而有慎焉所謂敬所謂慎敬則存於心者不敢忽慎則見於事者不敢肆雖則以告太史而實以之而告於王也使為獄官者能用敬慎以治獄而用獄官者又能擇敬慎之人而用之則凡所以治獄者無非仁而不仁之事則有所不行矣所行無非仁是能重民命矣能重民命則足以延國命矣民命之有永乃天命之所由永也君陳王曰殷民在辟予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中蔡沈曰言殷民之在刑辟者不可徇君以為生殺惟當審其輕重之中也陳經曰君之喜怒無常情法之輕重有常理不徇君而徇理之中可也君言茍是從君可也非從君乃從理也君言茍未是則從理可也從理乃所以從君也臣按成王以是告君陳即周公吿成王以文王罔兼庶獄及不誤于庶獄之意也後世人主惟恐其臣之不徇已有不徇已者或怒或斥其視成王之告君陳惟恐其臣之或徇乎已其人之賢不肖何如也是固其得於家庭之傳輔弼之訓然其天質之美亦於是乎見之後世人主所當取法者也吕刑王曰典獄非訖盡也于威權勢也惟訖于富賄賂也敬忌罔有擇言在身惟克天德自作元命配享在下蔡沈曰當時典獄之官非惟得盡法於權勢之家亦惟得盡法於賄賂之人言不為威屈不為利誘也敬忌之至無有擇言在身大公至正純乎天德無毫髪不可舉以示人者天德在我則大命自我作而配享在下矣在下者對天之辭盖推典獄用刑之極功而至於與天為一者如此吕祖謙曰典獄不得行其公者非為威脅則為利誘欲威不能屈富不得淫惟在敬忌無擇言在身而已又曰典獄之官民之死生係焉須是無一毫私意所言無非公理方可分付以民之死生天德所謂至公無私之德到自作元命地位命是命令所制刑之命皆是元善不可復加之命方可後世多以典獄為法家賤士民之死生寄於不學無知之人和氣不召乖氣常有所以不能措天下之治蓋掌刑之官代天行罰天討有罪天所以整齊天下之民元不是自家事惟敬五刑以成三德敬五刑是專敬天理三德是或當用正直或當用剛克或當用柔克各得其當若不敬天命為害所逼為利所誘用刑必差須是置禍福於度外專敬天命刑無不得其當則民有所措手足此所以培養根本故三代得天下以仁臣按刑獄之事實闗於天典刑者惟一循天理之公而不徇乎人欲之私權勢不能移財利不能動如此用刑者無愧於心受刑者允當其罪吾之心合天之心矣然非在我者一於敬而不敢忽一於忌而不敢肆行之于身皆可言之於口無一事而不可對人言者不能也允若茲則吾之所存者合乎天心而吾之所得者純乎天德矣彼其生死夀夭之命乃天所以制斯人者今我德與天一則制生人之命在我矣夫天髙高而在上所以制人之命者也典獄者雖在於下而其所典之職亦以制人之命焉豈非配享在下乎典獄之職所係之重如此膺天命而制生靈之命者可不擇其人以用之乎要之獄所以不公者外為權勢之囑託内為財利之賄賂故也然典獄之官所以不訖於威富者其根本則又在於上之人焉上之人誠嚴申明祖宗之法使有罪者不以賄免戒飭左右之人使掌法者得以執奏而所用以居是官者又必得夫存心敬畏秉性剛直之人用之則法不至於私濫人不死於非命人心允合於天心逆氣不傷於和氣乎吁臣之所為乃承君之所命臣之所以作民之命由君作臣之命也臣德克享於天則君德可知也或曰典獄用刑人臣事也蔡氏謂推其極至於與天為一何哉天者公而已矣天以至公之道付之君君以天討之公付之臣臣能奉公與天無間是即君之所以無間於天也王曰嗟四方司政典獄非爾唯作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察於獄之麗附也罔擇吉人觀于五刑之中惟時庶威奪貨蔡沈曰司政典獄諸侯也為諸侯主刑獄而言非爾諸侯為天牧養斯民乎為天牧民則今爾何所監懲所當監者非伯夷乎所當懲者非有苗乎伯夷布刑以啓迪斯民捨臯陶而言伯夷者探本之論也苗民不察於獄辭之所麗又不擇吉人俾觀于五刑之中惟是貴者以威亂政富者以貨奪法臣按刑者天所以討有罪討有罪所以安無罪之民也司政典獄並言者以諸侯受天子之命以為一方之主既司夫民政復典夫刑獄也政所以安民生獄所以治民罪皆奉天子之命以牧養其民然天子之命即天命也天子之民即天民也安民生固所以全其天命治民罪亦所以全其天命也有罪者治之則不敢復為惡而無罪之民皆得遂其生而全其天矣王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格至也命今爾罔不由慰日勤爾罔或戒不勤蔡沈曰此吿同姓諸侯也參錯訊鞫極天下之勞者莫若獄茍有毫髪怠心則民有不得其死者矣罔不由慰日勤者爾所用以自慰者無不以日勤故職舉而刑當也爾罔或戒不勤者刑罰之用一成而不可變者也茍頃刻之不勤則刑罸失中雖深戒之而已施者亦無及矣戒固善心也而用刑豈可以或戒也哉臣按三代之世封建之法行故穆王所戒者伯父伯兄仲叔季弟幼子童孫皆其同姓諸侯也盖天下有天下之刑一國有一國之刑天下之刑則天下之有罪者係累於其獄一國之刑則一國之有罪者禁錮於其獄人非一人也五木具其身百憂嬰其心度一日有如三秋者矣而為邦國之君典刑獄之政置其身於安逸之地忘其人在困阨之中則有不得其死者矣吾何惜夫頃刻之勞而不盡吾心焉而使斯人無罪而就死地哉一息或怠而致數人之死命後雖悔之亦無及矣吾心何由而安哉此所以用之慰者必以日勤然後職舉而刑當也非佞折獄惟良折獄蔡沈曰佞口才也非口才辯給之人可以折獄惟溫良長者視民如傷者能折獄而無不在中也林之竒曰佞人禦人以口給如周亞夫詣廷尉責問曰君侯欲反何也答曰臣所買器乃葬器也何謂反乎吏曰君縱不反地上即反地下矣所謂佞折獄也臣按折獄之官人命所係是以自古典獄之官必用易直仁厚之長者以任之盖以箠楚之下何求不得和顔恱色以詢之猶恐畏威懼刑而不敢盡其情况禦之以口給乎王曰嗚呼敬之哉官典獄之官伯諸侯族同族姓異姓朕言多懼朕敬于刑有德惟刑今天相民作配在下蔡沈曰此總告之也朕之於刑言且多懼况用之乎朕敬于刑者畏之至也有德惟刑厚之至也今天以刑相治斯民汝實任責作配在下可也臣按先儒謂官伯官之長前曰自作元命配享在下今曰今天相民作配在下則獄官乃配天者也人君知獄官可以配天則於命是官也必不敢輕人臣知獄官可以配天則於居是官也必能自重穆王於前既曰念之哉念之云者即帝舜恤之之意也又曰敬之哉敬之云者即帝舜欽之之意也穆王之作此書雖曰耄荒然帝王心法之傳千載猶可想見此吕刑之書所以見取於孔子也歟周禮刑官屬大司寇卿一人小司寇中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人鄭𤣥曰鄉士主六鄉之獄賈公彦曰刑官有虞氏曰士夏曰大理周曰大司寇臣按大司寇一人即今刑部尚書小司寇二人即今左右侍郎鄉士以下鄭註謂主六鄉之獄即今十三司分掌各道刑獄是也自唐以來分為六部而刑部分四屬曰憲部曰比部曰司門部曰都官部國初因之至洪武二十三年始改為十三部後又加以貴州交阯為十四其後棄交阯惟存十三部焉盖有合於周官刑官之屬鄉士掌六鄉之獄之制可見前聖後聖之心其揆一也小司寇之職歲終則令羣士計獄弊訟登中于天府鄭𤣥曰登中上其所斷獄訟之數賈公彦曰羣士謂鄉士遂士以下臣按登中于天府說者謂獄訟之中言事實之書也必登于天府者以刑所以致天討故登于天府而藏之且示重其書而有謹於用之意臣竊以為所謂中者意者取其所計弊獄訟之得其中者上于天府使藏之以為法比後有罪犯有合于是者則援引以為質也如此庶於文法為順鄉士掌國中遂士掌四郊縣士掌野各掌其鄉之民數遂士掌其遂之民數縣士掌其縣之民數而糾戒之遂士縣士亦各糾其戒令聽其獄訟察其辭辯其獄訟異其死刑之罪而要之旬而職聽于朝遂士縣士皆同惟旬遂士二旬縣士三旬司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗附也其法以議獄訟獄訟成士師受中協日刑殺肆陳尸之三日遂士則協日就郊而刑殺縣士則協刑殺各就其縣餘並同若欲免之則王㑹其期遂士則王命三公㑹其期縣士則王命六卿㑹其期吳澂曰掌國中謂國中至百里郊也凡六鄉之獄皆在國中要之者謂為其罪法之要辭受中謂受獄訟之成也協日刑殺謂可刑殺之日也肆之謂陳尸期謂王欲赦之人則鄉士職聽於朝司寇聽之之日則王以時親往議之也臣按刑官而以士名則自虞廷已然其在朝者謂之士師布列於外者在六鄉謂之鄉士在六遂謂之遂士在各縣謂之縣士各掌其民之數其所以糾戒令聽獄訟察虚實辯曲直異死刑而為其要辭以職事而聽於朝而司寇聽之三士皆同也而其日數則不同焉鄉士則旬日也遂士則二旬也縣士則三旬也及夫斷其獄弊其訟於朝羣士與司刑之官皆在焉各以其所犯罪附之於法合衆所麗之法而參議之士師乃受其成獄協之於可殺之日始加以刑殺而陳其尸者三日三士皆同也惟所肆之處則不同焉鄉則市朝也遂則於其遂也縣則於其縣也若其人之罪有可矜而可疑王欲免之六鄉則王自㑹於司寇而自為之期六遂則王命三公㑹其期各縣則王命六鄉㑹其期三士之地不同而皆掌民數其糾戒令聽獄訟則同也而皆謂之士焉夫謂之士者理官也士居四民之先而列五爵之一列官分職不皆謂之士而理官獨謂之士者盖以此官民命所繫天討所寓國家所以得失民心皆在於此故非明義理備道德通經學者不可以居之自虞廷以臯陶為士而周人自秋官卿以下内外掌刑之官皆以士名盖以示後世使知刑官之重而不可雜以他流也本朝定制風憲官不以吏員為之深得虞周之意漢文帝時張釋之為廷尉上行出中渭橋有一人從橋下走乗輿馬驚捕屬廷尉釋之奏犯蹕當罸金上怒釋之曰法者天子所與天下公共之也今法如是重之是不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所錯其手足惟陛下察之上良久曰廷尉當是也其後人有盗高廟坐前王環得下廷尉治釋之奏當棄市上大怒曰人無道乃盗先帝器吾屬廷尉者欲致之族而君以法奏之謂依律而斷也非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也且罪等然以逆順為差今盗宗廟器而族之有如萬分一假令愚民取長陵一抔土陛下且何以加其罪乎帝乃白太后許之楊氏曰釋之論犯蹕其意善矣然曰方其時上使人誅之則已是則開人主妄殺人之端也既曰法者天子所與天下公共則犯法者天子必付之有司以法論之安得越法而擅誅乎臣按張釋之為廷尉文帝欲當犯蹕者以罪而釋之罰金文帝欲當盗高廟玉環者以族釋之當以棄市可謂能守職執法而以道事君者矣其視張湯視上意所欲罪釋而為之出入者不啻鸞鳯之與鷹鸇矣雖然釋之敢言固難而文帝之能從尤難後世為法官者固當以釋之為法而文帝之從諫如流而不飾非拒諫以私怒刑人尤人主之盛德也萬世人主所當師焉宣帝本始四年詔曰間者吏用法巧文寖深是朕之不德也夫決獄不當使有罪興起也邪當重而輕使有罪者起邪心不辜䝉戮父子悲恨朕甚傷之今遣廷史與郡鞫獄仕輕禄薄其為置廷平秩六百石員四人其務平之以稱朕意於是選于定國為廷尉求明察寛恕黄覇等以為廷平季秋後請讞時上常幸宣室齋居而決事獄刑號為平矣臣按漢既有廷尉而又立廷平後世以大理寺平允法司刑獄其原盖出於此本朝設大理寺卿一人少卿寺丞各二人又分其屬為左右二寺設正副評事凡刑部都察院所問罪獄必俟平允然後法司定罪若罪名不當駁囘再問魏明帝時衞覬奏曰刑法者國家之所貴重而私議之所輕賤獄吏者百姓之所懸命而選用者所卑下王政之弊未必不由此也請置博士轉相教授事遂施行胡寅曰懷天下者當以仁理天下者當以義律令者聊以記刑名之數耳豈所恃以為治也惟明於經訓者乃能用法徒貴習法之熟而無保國化民之本是李斯所以亡秦者也夫業儒之侮經者尚多有之况習法而不知仁義之道其侮法將十人而二五茍如是曷若付百官有司於胥吏哉自後世觀魏之所以存豈係于有律博士而其所以亡者豈係於律令之煩省乎衞覬之言非經邦之令猷也臣按衞覬欲立律博士是欲以國家弼教輔治之大典付之不通經之吏胥也胡氏非之誠是矣夫吏胥之不通經固不可以掌律令然於律之名例條貫猶其所習也而後世乃至以獄事付之武夫嬖倖則併法比之不知焉則是設為刑獄以立威制人非以弼教輔治也固非聖人制刑之意亦豈天討有罪之公哉唐太宗初即位盛開選舉或有詐為資䕃者上令自首不首者死俄有詐偽事洩大理少卿戴胄斷流上曰朕下敇不首者死今斷流是示天下以不信卿欲賣獄乎胄曰陛下當即殺之非臣所及既付所司臣不敢虧法上曰卿自守法而令我失信邪胄曰法者國之所以布大信於天下言者當時喜怒之所發耳陛下發一朝之忿而欲殺之既而不可而寘之於流此乃忍小忿而存大信也若順忿違信臣竊為陛下惜之上曰法有所失公能正之朕何憂也臣按胄謂陛下當即殺之非臣所及其失正與張釋之同其所謂法者所以布大信於天下而言者一時喜怒之所發陛下發一朝之忿而欲殺之既而不可而寘之於流此乃忍小忿而存大信則名言也太宗不徒不怒之而且奬之真好治納諫之主也後主宜法焉臣嘗因是而論之國家之法固不可以不守而人君之言亦不可以失信言一失信後雖有言人莫之信矣然而欲存人君之信而於祖宗之法則有妨焉如之何則可曰為人上者當熟思審處而後發於言前有所違後難於繼斷然不出諸口也為人臣者則當遏絶之於發言之初不待其形見於事為之著如此則是能致其君於無過之地矣貞觀初詔殿中侍御史崔仁師覆按青州謀反獄仁師止坐其魁首十餘人餘皆釋之大理少卿孫伏伽謂仁師曰足下平反者衆人情誰不貪生恐見徒侣得免未肯甘心仁師曰凡治獄當以仁恕為本豈可自規免罪而不為伸邪萬一闇短誤有所中以一身易十囚之死亦所願也臣按崔仁師謂治獄以仁恕為本豈可自規免罪而不為伸後世治獄者往往自規免已之罪不復顧人之死生皆仁師之罪人也太宗時大理少卿胡演進每月囚帳上覽焉問曰其間罪亦有情可矜容者皆以律斷對曰原情定罪非臣下所敢上謂侍臣曰古人云鬻棺者欲歲之疫匪欲害人利欲售棺故爾今法司覆理一獄必求深劾欲成其考今作何法得使平允王珪奏曰但選良善平恕斷獄允當者賞之即姦偽自息上善之臣按欲得獄平允王珪欲選良善平恕斷獄允當者賞之臣竊以為斷獄之吏固欲選良善平恕者然其本則在人君焉人君茍存好生之心欽哉欽哉惟刑之恤雖不賞之彼亦不敢深刻矣太宗嘗與侍臣論獄魏徵曰煬帝時嘗有盜發稍渉疑似悉令斬之凡二十餘人大理丞張元濟怪其多試尋其狀内五人嘗為盗餘皆平民竟不敢執奏盡殺之太宗曰此豈惟煬帝無道其臣亦不盡忠君臣如此何得不亡公等戒之臣按太宗無事時與羣臣論獄魏徵論及隋煬之無道殺人而太宗責臣之不忠且曰君臣如此何得不亡噫隋之君臣如此所以亡唐之君臣如此所以興後世人主不可不知也武后時萬年主簿徐堅上疏以為書有五聽之道令著三覆之奏比有敇推按反者得實即行斬決人命至重死不再生萬一懷枉吞聲赤族豈不痛哉此不足肅姦逆而明典刑適所以長威福而生疑懼臣望絶此處分依法覆奏又法官之任宜加簡擇有用法寛平為百姓所稱者願親而任之有處事深酷不允人望者願疎而退之臣按徐堅謂推按反者即行斬決不足肅姦逆而明典刑而適所以長威福而生疑懼非獨於反獄一事為然凡人君用人糾察人過咎委任之專而信任之不疑皆有此弊武后時刺史李行裒為酷吏所陷秋官郎中徐有功固爭不能得侍郎周興奏有功故出反囚當斬太后雖不許亦免其官然太后雅重有功久之復起為侍御史有功伏地流涕固辭曰臣聞鹿走山林而命縣庖厨勢使之然也陛下以臣為法官臣不敢枉陛下法必死是官矣太后固授之逺近聞者相賀臣按有功當酷吏告密羅織之秋獨能以平恕為心可謂特立不倚者矣武后雖女主然亦知雅重其人當死而生之既廢而起之固辭而受之可見天理之在人心者未嘗泯特人臣立志不堅見理不明過於狥人而切於為已耳後世人主一廢其人即不復用不復問往事之如何顧反出一女主下哉武后時法官競為深酷惟司刑丞徐有功杜景儉獨存平恕被告者皆曰遇來侯必死遇徐杜必生臣按當武后酷吏淫虐之時而徐有功杜景儉獨存仁恕是知人心之天理雖以暴虐之君無不有之但掌刑之臣不能執正守法耳宋太宗太平興國三年始用儒士為司理判官臣按州郡設官理刑亦猶周官鄉士縣士之比然謂之士者以刑獄人命所係不可專委之吏胥士讀書知義理不徒能守法而又能於法外推情察理而不忍致人無罪而就死地名重於利吏胥雖曰深於法比然後能知法也而不知有法外意茍獄文具而罪責不及已足矣而人之寃否不恤也宋太宗始用士人為司理判官其有合成周之制歟淳化元年令刑部定置詳覆官六員專閲天下所上案牘勿復公遣鞫獄吏置御史臺推勘官二十人並以京朝官充若諸州有大獄則乗傳就鞫獄辭日上必臨遣諭㫖曰無滋蔓無留滯或賜以裝錢還必召見問以所推事狀著為定令臣按宋於法司常員之外專置官以閲天下所上案牘及推勘大獄臨遣必諭㫖優賜竣事又召見請問人君留心獄事如此奉命以推治者其有不盡心者乎二年置諸路提㸃刑獄司命常參官主之凡官内州府十日一具囚帳供報有疑獄未決者即馳傳往視之州郡敢積稽留大獄久而不解及以偏辭按讞情不得實并官吏用情者悉以聞臣按後世於藩方設官司刑本此在宋為提㸃刑獄司在元為肅政亷訪司本朝於藩方各置提刑按察司凡十有三處是年始制審刑院於禁中兼置詳議官六員凡獄具上奏先由審刑院印訖以付大理寺刑部斷覆以聞乃下審刑詳議申覆裁決訖以付中書省當即下之其未允者宰相覆以聞如命論決臣按宋制即有刑部大理寺而又立審刑院於禁中事雖詳審然不無重複本朝有獄事先由刑部都察院鞫問然後送大理寺有不允者駁囘再問既允然後問聞奏取㫖事體歸一可為萬世彛典真宗景德四年復置諸路提㸃刑獄官先是帝出筆記六事其一曰勤恤民隱所慮四方刑獄官吏未盡得人一夫受寃即召災沴先帝嘗選朝臣為諸路提㸃刑獄今可復置仍以使臣副之引對於長春殿遣之臣按宋太宗始置諸路提㸃刑獄既而罷之至是復置本朝置提刑按察司其職雖糾察一道官吏不專於刑然以提刑入銜則固重在此也神宗熙寧七年置律學設教授公試習律令生員義三道先是置刑法科其考試闗防如諸科法司馬光曰律令格式皆當官者所須何必置明法一科使為士者豫習之夫禮之所去刑之所取為士者果能知道又自與法律㝠合若其不知但日誦徒流絞斬之書習鍛鍊文致之事為士已成刻薄從政豈有循良非所以長育人才厚風俗也臣按自隋人作律以八字為義例遂致文深而義晦甚失古人使人易曉難犯之意今後律文宜詳備其事淺易其文凡其罪名輕重決杖多寡皆須明白詳載不厭簡帙之繁不惜文辭之複使檢閲之間粲然於目灼然在心不必深於文墨者然後曉之凡有目者粗知文義無不曉然也如此何用說官教訓立法考試設科取用為哉惟用士人之通經術知道誼者為之遇有刑獄按律處罪律所不載及有可疑者引經斷獄取裁於上可也以上簡典獄之官大學衍義補卷一百十一
