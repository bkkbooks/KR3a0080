body:
  text: 大學衍義補卷一百二十九明丘濬撰治國平天下之要嚴武備將帥之任上之下莊子曰君子遠使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徵至不肖人得矣臣按此九徵者莊周以為孔子之言引之以為泛觀人之法而六韜之論選將亦以八徵為太公之言所謂八徵者問之以言以觀其詳窮之以辭以觀其變與之間諜以觀其誠明白顯問以觀其德使之以財以觀其亷試之以色以觀其貞告之以難以觀其勇醉之以酒以觀其態其言與周蓋相出入雖非太公孔子之言然人君選將叅以二家之說而驗之則其人之賢不肖亦可得而彷彿矣尉繚子曰凡將理官也萬物之主也不私於一人夫能無私於一人故萬物至而制之萬物至而命之臣按理官者掌刑獄之官也夫掌刑獄之官必無一毫之私以制人之死命然後可以為理官為將之道亦猶是也又曰夫能刑上究賞下流此將之武也故人主重將夫將提鼓揮枹音桴臨難決戰接兵角刃鼓之而當則賞功立名鼓之而不當則身死國亡是存亡安危在於枹端奈何無重將也夫將者上不制於天下不制於地中不制於人故兵者凶器也爭者逆德也將者死官也故不得已而用之無天於上無地於下無主於後無敵於前臣按天下之道二吉與凶反順與逆反生與死反所謂吉順生人之所欲也凶逆死人之所惡也於人所惡之事非不得已烏可以用之哉是故國不得已而後至於用兵士不得已而後至於將兵可一而不可再可暫而不可常所謂無天於上無地於下無主於後豈眞無哉甚言國之用將不可有制於中而士之為將亦不可有所制於外耳將受命之日忘其家張軍宿野忘其親援枹而鼓忘其身吳起臨戰左右進劍起曰將專主旗鼓爾臨難決疑揮兵指刃此將事也一劍之任非將事也臣按將者三軍之司命國家之輔佐也豈一劍之任哉以一劍為任史所謂劍客也六韜曰故兵者國之大事存亡之道命在於將將者國之輔先王之所重也故置將不可不察也將不仁則三軍不親將下勇則三軍不鋭將不智則三軍大疑將不明則三軍大傾將不精㣲則三軍失其機將不常戒則三軍失其備將不强力則三軍失其職故將者人之司命三軍與之俱治與之俱亂得賢將者兵彊國昌不得賢將者兵弱國亡臣按古今論治者皆知相為國之輔而不知將亦國之輔也蓋國之有將相如人之有兩手鳥之有兩翼闕一不可相得其人則國體正而安將得其人則國勢彊而固是故治忽在乎文文之所以備相之輔也彊弱由乎武武之所以周將之輔也三略曰出軍行師將在自專進退内御則功難成臣按將能而君不御者勝人君擇將當以無用之先詳審徵驗然後用之既用之後付以便宜之權俾其隨機制勝可也茍進退皆從内制非獨將之功不成而君之心亦勞矣孫子曰夫將者國之輔也輔周則國彊輔隙則國弱臣按輔之為言夾車之木也車非輔則無蔽國非將則無威然為將者必才智全而無欠闕謀猷密而無罅隙然後其國彊焉不然中有空而不全外有間而可入則威不立威不立則勢不振勢不振則日流於衰弱矣漢高祖為漢王時初得韓信欲以為大將呼信拜之蕭何曰王素嫚無禮今拜大將如呼小兒此乃信所以去也王必欲拜之擇日齋戒設壇場具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜乃韓信也一軍皆驚臣按古者豪傑之士上之人必待之以殊禮然後肯盡忠竭力以為我用茍待之以常調則彼亦以常人自居雖有竒才異能曷以自見哉漢王使酈食其往説魏王豹且召之豹不聼漢王問食其魏大將誰也對曰栢直王曰是口尚乳臭安能當韓信騎將誰也曰馮敬曰是秦將馮無擇子也雖賢不能當灌嬰歩卒將誰也曰項它曰不能當曹參吾無患矣臣按古人之遣將必問敵之將何人先料彼之將與已之將相當否然後遣之因其所任則可以逆計其勝負不待臨戰陳而後決也文帝前十一年匈奴冦狄道時匈奴數為邊患太子家令鼂錯上言兵事曰兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也臣按錯言有必勝之將無必勝之民林林者皆民也民之稟賦有彊有弱有智有愚有勇有怯編集為兵精而擇之敎而練之作而起之則皆良兵而可以取勝矣然非求於林林之衆而用其糾糾之良雖有其人而不能以自奮雖多亦奚以為哉是故必得一二之良然後可以成千萬之勝然千萬人之中羣居而混處未易以識之也然欲識而㧞之其不以逺而遺不以賤而棄不以讎而疎不以罪而廢是故管仲射鉤齊桓任之以伯孟明三敗秦穆赦之以勝穣苴㧞於寒㣲吳起用於羈旅樂毅之疎賤孫武之瓦合韓信之怯懦黥布之徒𨽻衛青人奴去病假子孔明不親戎服杜預不便鞍馬鄧艾以叅軍平蜀李靖用於罪累李勣收於降附是豈以形貌閥閲計其間哉錯又言曰器械不利以其卒予敵也卒不可用以其將予敵也將不知兵以其主予敵也君不擇將以其國予敵也四者兵之至要也臣按錯謂器械利卒可用將知名君擇將四者為兵之至要臣愚以為四要之中而君擇將一者尤為四要中之至要者焉蓋將得其人則士卒用命而器械無有不精利者矣夫以有能之將統用命之卒用精利之器則兵威振國勢彊而四夷服矣光武敇馮異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴今之征伐非必略地屠城要在平定安集之耳諸將非不健鬬然好虜掠卿本能御吏士念自脩敇無為郡縣所若臣按光武所謂征伐非必掠地屠城要在平定安集之耳斯言也天地父母之心也夫人君興師旅以征伐所以除盗而安民也然盗豈自外至哉即民之為也平定安集則民去盜而復為民矣為將者必掠而屠之以張威立功盜則除矣而民亦從而損焉光武之為此言眞知帝王用兵之㫖也哉獻帝時夏侯淵戰雖數勝魏王操常戒之曰為將當有怯弱時不可但恃勇也將當以勇為本行之以智計若但任勇一匹夫敵耳臣按為將之道不過乎智勇二者而已勇以決其行智以運其用蓋當夫受命決戰之時無敵於前無君於後奮發而剛彊固是勇也然而必有怯弱之時焉則是智而已矣諸葛亮曰有制之兵無能之將不可敗也無制之兵有能之將不可勝也李靖曰兵卒有制雖庸將未敗若兵卒自亂雖賢將危之戴溪曰所謂制者何紀律是也兵有紀律則主帥威立而令行士卒心一而力齊勇者不能獨進怯者不能獨退左右前後如手足背腹之相為用以守則固以攻則取以戰則克舍此雖太公莫之能行矣臣按兵貴有制將貴有能兵之制否在乎將之能否是以君之擇將必求其能不能者决不可用焉武侯之言甚言兵之不可無制耳非謂將之可以無能也將既無能又焉用彼哉由是觀之選將之道在乎用其能而已蓋人各有能因其能而用之彼能擴其所能以充其所不能使皆能焉而又盡合衆人之能以為一己之能用此有能之將而統夫有制之兵進退分合左右以之無敵於天下矣宋文帝與徐湛之等議伐魏沈慶之曰治國譬如治家耕當問奴織當問婢陛下今欲伐國而與白面書生輩謀之事何由濟戴溪曰兵家之用情狀萬變自非素所更嘗雖使良平處之亦未能灼見其利害而逆㫁其成敗古者創業中興之君天下雖已平定必有老成宿將相與圖回廟堂彼於用兵皆身所渉歷不但耳聞目見而已故謀必中機㑹而動必收成功迨至後世承平武事廢弛而天子左右前後率多不出都城坐取卿相之人往往耳未嘗聞金鼔目未嘗見旌旗兵之利害成敗何從知之邊陲卒有警急而資其發縱指示是猶訪織於奴問耕於婢豈不顛倒錯亂而失其所措哉臣按國家不可無老臣而於將臣尤不可無不可以其老而忽之也古語有之智如禹湯不如更嘗又曰百聞不如一見老將更嘗軍士多矣雖其辯論計慮未必竦動衆人而出其表然其所言論皆其所更嘗非無徵者故趙充國既罷就第朝廷每有四夷大議嘗與叅兵謀問籌策其後段㑹宗為烏孫所圍亦召陳湯問之得此意也元魏明帝孝昌中右民郎路思令上疏以為師出有功在於將帥得其人竊以比年將帥多寵貴子孫銜杯躍馬志逸氣浮軒眉攘腕以攻戰自許及臨大敵憂怖交懷雄圖鋭氣一朝頓盡乃令羸弱在前以當寇彊壯居後以衛身兼復器械不精進止無節以當負險之衆敵數戰之虜欲其不敗豈可得哉夫德可以感義夫恩可以勸死士今若黜陟幽明賞罰善惡先遣辯士曉以禍福如其不悛以順討逆如此則何異厲蕭斧以伐朝菌鼓洪爐而燎毛髮哉臣按思令此疏雖言當世之弊然後世世將之弊惟取其官與世不復問其人果可以將否僥倖無事徒以備員彼騃魯不自知茍快目前不顧後患固不足責矣而有國家者承祖宗百戰之餘所得之境土而付之騃童庸豎一旦有事彼豈能支之哉唐太宗時并州大都督長史李世勣在州十六年令行禁止民夷懷服太宗曰隋煬帝勞百姓築長城以備突厥卒無所益朕惟置李世勣於晉陽而邊塵不驚其為長城豈不壯哉臣按秦築長城以備虜延長數萬里役死百萬人太宗以一人而當千萬里之衝而衛千萬人之命其過於長城遠矣唐太宗謂李靖曰當今將帥惟李勣道宗薛萬徹孰堪大用靖對曰陛下常言勣道宗用兵不大勝亦不大敗萬徹若不大勝即須大敗臣思聖言不求大勝亦不大敗者節制之兵也或大勝或大敗者幸而成功者也故孫武曰善戰者立於不敗之地而不失敵之敗也節制在我云耳臣按王者用兵貴乎有節制彼幸而勝亦幸而不敗皆非有成算者也是故有節制以不敗有成算以取勝是謂萬全之師陸贄言於德宗曰將貴專謀兵以竒勝軍機遙制則失變戎帥禀命則不威是以古之賢君選將而任分之於閫誓莫干也授之以鉞俾專㫁也夫然故軍敗則死衆戰勝則策勲不用刑而師律貞不勞慮而武功立其於委任之體豈不博大責成之利豈不精覈哉自昔帝王之所以夷大艱成大業者由此道也其或疑於委任以制斷由己為大權昩於責成以指麾順㫖為良將鋒鏑交於原野而決策於九重之中機㑹變於斯須而定計於千里之外違令則失順從令則失宜失順則挫君之嚴失宜則敗君之衆用舍相礙否臧皆凶上有掣肘之譏下無死綏之志其於分畫之道豈不兩傷經綸之術豈不都謬哉自昔帝王之所以長亂繁刑喪師蹙國者由此道也兹道得失兵家大樞當今事宜所繫尤切陛下宜俯徇斯意因而委之敦以付授之義固以親信之恩假以便宜之權待以殊常之賞其餘細故悉勿開言所賜詔書務從簡要慎其言以取重深其託以示誠言見重則君道尊託以誠則人心感尊則不嚴而衆服感則不令而事成其勢當令智者騁謀勇者奮力小大咸極其分賢愚各適其懷將自效忠兵自樂戰與夫迫於驅制不得已而從之者志氣何啻百倍哉臣按贄所謂敦以付授之義固以親信之恩假以便宜之權待以殊常之賞其餘細故悉勿開言此可以為人主委任將臣之法至謂所賜詔書務從簡要愼其言以取重深其託以示誠此可以為人主賜詔將臣之法凡代王言者不可不知也末言君上之權特異臣下惟不自用乃能用人其要在於順物情其契在於通時變此數語者非但用以制軍馭將凡處天下事皆所當然贄又言曰自昔能建竒功或拯危厄未必皆是絜矩之士温良之徒驅駕擾馴惟在所馭朝稱凶悖夕謂忠純始為冦讎終作卿相知陳平無行而不棄忿韓信自王而遂封蒯通以析理獲全雍齒以積恨先賞四者皆漢髙祖所用此漢祖所以恢帝業也置射鉤之賊而任其才齊桓用管仲釋斬袪之怨以免於難晉文公用寺人披此桓文所以𢎞覇功也然則當事之要雖罪惡不得不容適時之宜雖仇讎不得不用陛下必欲精求素行追抉宿疵則是改過不足以補愆自新不足以贖罪凡今將吏豈能盡無疵瑕人皆省思孰免疑畏又况阻命之輩脅從之流自知負恩安敢歸化孔子曰人而不仁疾之已甚亂也君陳曰無忿疾於頑臣按自古聖賢有改過之說而用人者亦曰使功不如使過况乎用兵戎之士而又當有事之秋尤不當責以全而求其疵也宋蘇洵曰議者常曰將與相均將特一大有司耳非相侔也國有征伐而後將權重有征伐無征伐相皆不可一日輕相賢邪則羣有司皆賢而將亦賢矣將賢邪相雖不賢將不可易也故曰將特一大有司耳非相侔也臣按將相二者皆國家之大臣天下安危治亂所繫者也洵謂有征伐而後將權重此攻戰之將也戰必勝攻必取如此之將必待臨事而後見其能此誠不得與相侔若夫折衝精神之將侍夫環衛而姦盜自清處夫朝廷而邊鄙自靖雖無攻戰之事自有廓清之功將而如此其功豈下於相哉蘇軾曰今之論者以為武舉方畧之類適足以開僥倖之門而天下之實才然不可以求得此二者皆過也夫既已用天下之虚名而不較之以實至其弊也又舉而廢其名使天下之士不復以兵術進亦已過矣天下之實才不可以求之於言語又不可以較之於武力獨見之於戰耳戰不可得而試也是故見之於治兵子玉治兵於蒍終日而畢鞭七人貫三人耳蒍賈觀之以為剛而無禮知其必敗孫武始見試以婦人而猶足以取信於闔閭使知其可用故凡欲觀將帥之才否莫如治兵之不可欺也今夫新募之兵驕而難令勇悍而不知戰此眞足以觀天下之才也武舉方略之類以來之新兵以試之觀其顔色和易則足以見其氣約束堅明則足以見其威坐作進退各得其所則足以見其能凡此者皆不可强也故曰先之以無益之虛名而較之以可見之實庶乎可得而用也臣按軾謂欲觀將帥之才否莫如治兵之不可欺眞有見之言也夫試之以空言角之以一技誠未見其必然也惟試之以一官使之臨衆而涖事則才否見矣才則用之否則否蘇轍曰天下之事有此利也則必有此害天下之無全利是聖人之所不能如之何也而聖人之所能要在不究其利利未究而變其方使其害未至而事已遷故能享天下之利而不受其害昔唐季五代之法豈不大利於世惟其利己盡而不知變是以其害隨之而生故我宋太祖太宗以為不可以長久而改易其政以便一時之安為將者去其兵權為兵者使不知將凡此皆所以杜天下之私恩而破其私計其意以為足以變五代豪將之風而非以為後世之可長用也故臣以為當今之勢不變其法無以求成功今夫欲人之成功必先捐兵以與人欲先捐兵以與人則先事於擇將擇將而得之茍誠知其忠雖捐天下以與之而無憂而况數萬之兵哉臣按天下事無全利亦無全害擇其利多而無害者為之斯可矣然所謂利者非便於己私之謂也使天下之人皆受其利宜而無禍害是也是以君子貴乎講學以明理公心以處事轍又曰太祖用李漢超馬仁瑀韓令坤賀惟忠何繼筠等五人使備契丹用郭進武守琪李謙溥李繼勲等四人使備河東用趙贊姚内斌董遵誨王彦昇馮繼業等五人使備西羌皆厚之以闗市之征饒之以金帛之賜其家屬之在京師者仰給於縣官貿易之在道路者不問其商稅故此十四人者皆富厚有餘其視棄財如棄糞土賙人之急如恐不及是以死力之士貪其金錢捐軀命冒患難深入敵國刺其隂計而效之至於飲食動静無不畢見毎有入冦輙先知之故其所備者寡而兵力不分敵之至者舉皆無得而有喪是以當此之時備邉之兵多者不過萬人少者五六千人以天下之大而三十萬兵足為之用今則不然一錢以上皆籍於三司有敢擅用謂之自盜而所謂公使錢多者不過數千緡百須在焉而監司又伺其出入而繩之以法至於用間則曰官給茶綵夫百餅之茶數束之綵其不足以易人之死也明矣是以今之為間者皆不足恃聽傳聞之言採疑似之事其行不過於出境而所問不􅂈於熟户茍有藉口以欺其將帥則止矣非有能知敵之至情者也敵之至情既不可得而知故嘗多屯兵以備不意之患以百萬之衆而嘗患於不足由此故也昔太祖起於布衣百戰以定天下軍旅之事其思之也詳其計之也熟矣故臣願陛下復脩其成法擇任將帥而厚之以財使多飬間諜之士以為耳目耳目既明雖有彊敵而不敢輙近臣按轍此言曲盡用將之道朝廷用將而能假之以權豐之以財而不繩之以文法小故則將得以盡其用矣宋太祖起自戎行蓋躬自為將者也故知為將之道一旦居人上用所以將兵者以將將此所以將盡其才而國賴其用也歟以上總論將帥以上論将帥之任上之下大學衍義補卷一百二十九
