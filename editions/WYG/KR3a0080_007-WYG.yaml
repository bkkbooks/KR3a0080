body:
  text: 大學衍義補卷七明丘濬撰治國平天下之要正百官簡侍從之臣書冏命王穆王若曰昔在文武聰明齊聖小大之臣咸懐忠良其侍給侍左右者御車御之官僕從太僕羣僕凡從王者罔匪正人以旦夕承承順弼正救厥辟出入起居㒺有不欽發號施令罔有不臧下民祗若萬邦咸休惟予一人無良實賴左右前後有位之士匡其不及繩直也愆糾正也謬格其非心俾克紹先烈謂文武蔡沈曰文武之君聰明齊聖小大之臣咸懷忠良固無待於侍御僕從之承弼者然其左右奔走皆得正人則承順正救亦豈小補哉林之竒曰左右近習非人則朝夕漸染入於邪辟而不自知大臣雖賢君心已蠧矣故須小大忠良必羣僕皆正人而後可臣按穆王命伯冏爲太僕正作此誥命之首述文王武王有至聖之德其一時小臣大臣各懷其忠直良善之行雖其侍奉進御僕役從官之微無非正直之人相與奉承輔弼之是以其出入起居之間無有不敬者發號施令之際無有不善者由是下而民庶之敬順遠而萬國之休美文武猶然况我一人素無良善之德者乎實必賴爾前後左右有位之士輔助我之所不及直其愆過正其舛謬格其非僻之心庶幾能紹述我先烈之文武乎穆王此言非但以求助於伯冏而實欲求助於一時前後左右侍從之臣有位者也國語近臣進規臣按侍從之職所謂近臣也侍從之職雖各有所司而皆以進規諫爲要焉宋司馬光言於其君英宗曰竊見祖宗之時閒居無事常召侍從近臣與之從容講論萬事委曲詳悉無所不至所以然者一則欲使下情上通無所壅蔽二則欲知其人能否才噐所任是以黜陟取舍皆得其宜太平之業由此而致陛下龍飛奄有四海雖聖賢英睿得於天縱然與當世士大夫未甚相接民間情偽未甚盡知臣謂宜詔侍從近臣每日輪一員直資善堂夜則宿於崇文院以備非時宣召伏望聖慈少解嚴重細加訪問以廣聰明裨益大政又曰臣屢曾上言乞詔侍從近臣每日輪直宿以備非時宣召已䝉開納將謂即時施行自後遷延日久竊意内外之臣必有欺惑天聽而沮難之者其意蓋欲陛下常居禁中不與羣下相接以壅蔽聰明而固其權寵此豈忠臣之所爲而陛下之福邪臣願陛下斷自聖意使之更直聽政餘暇特賜召對與之從容講論古今治體民間情偽使各竭其胸臆所有而陛下更加采擇是者取之非者舍之忠者進之邪者黜之如此則下情盡達而聖德日新矣臣按侍從之臣固當朝夕人主左右無間晝夜者也若惟進見有時第於視朝行禮之時暫爾侍立則又與羣臣無異烏在其爲侍從哉是以晝則更直夜則入宿非但以備不時宣召萬一宫禁有不測之變亦必得人以籌度處置屬筆命辭不然倉卒之間何以應變哉范純仁言於其君神宗曰本朝設侍從之官自待制諫議已上學士舍人皆是古來九卿之職朝廷待之恩禮既異士民瞻仰位望亦崇是宜朝夕論思同共休戚今乃忘本徇末擇易舍難只將主判司局便爲己之職事人情既務因循朝廷不加考核其間乃有優游緘黙養望待遷無愛君憂國之言乏盡忠補過之義或有時政得失唯能退有後言處之不慚僅同胡越未必人人茍禄蓋因習以成風伏望明䧏詔㫖督責近侍凡是朝廷闕失並須論列奏陳所上封章其盡心論奏而言多中理者稍加褒進其持禄不言或言而無取者量行黜責如此則庶職修舉朝廷獲多士之助近臣免尸素之譏臣按侍從之臣非止一類凡在代言講讀之屬與夫給事左右之臣皆是也雖其執事各有主判司局然於供職之外皆當蓄見聞以備顧問進言說以盡規益不可但緘黙而已也以上總論侍從之臣周禮内史掌王之八枋與柄同之法以詔王治凡命諸侯及孤卿大夫則策䇿􅂤也命之吳澂曰内史猶今之内制翰林之職也臣按八柄詔於冢宰内史復掌以詔王蓋史官公論之所出爵禄廢置殺生予奪之柄有所不公史氏直筆以書之吳澂謂内史爲翰林之職蓋以其命諸侯公卿大夫則策命之猶今學士院之草制詔也然謂之史乃掌文書贊治之名今制併史館於翰林其亦此意歟我太祖皇帝於吳元年已置翰林院以陶安爲翰林學士於是設承㫖學士侍講侍讀學士直學士及待制應奉等官洪武九年詔定百官品級承㫖與六部尚書俱正三品學士從三品侍講學士從四品十八年三月始定翰林官制而革承㫖直學士待制應奉之名設學士二員秩五品講讀學士各一員從五品其屬則有侍講侍讀五經博士典籍侍書待詔外此又設修撰編修檢討以爲史官皆屬之翰林院焉夫學士代言之官講讀經筵之職五經博士典籍則前代秘書之屬侍書待詔則前代供奉之名而所謂史官者則前代著作起居之任也今則併屬於翰林則是今代翰林一司實兼前代諸職其職任尤非他司比也永樂初太宗皇帝又柬七人者入内閣專知制誥備顧問參預機務然其秩猶止五品也至仁宗皇帝又於本官上加以卿佐師保其任用尤爲重焉歴任既久又易本官以文淵閣大學士華蓋殿謹身殿武英殿大學士云唐書學士之職本以文學言語備顧問出入侍從因得參謀議納諌諍其禮尤寵而翰林院者待詔之所也唐制乘輿所在必有文詞經學之士自太宗時名儒學士時時召以草制然猶未有名號乾封以後始召文士元萬頃等草諸文詞常於北門候進止時人謂之北門學士𤣥宗初制翰林待詔以張說張九齡等爲之掌四方表疏批答應和文章既而又以中書務劇文書多壅滯迺選文學之士號翰林供奉與集賢院學士分掌制誥書勅後又改供奉爲學士别置學士院專掌内命凡拜免將相號令征伐皆用白麻其後選用益重而禮遇益親至號爲内相天子私人内宴則居宰相之下一品之上唐之學士𢎞文集賢分𨽻中書門下省而翰林學士獨無所屬臣按此設立翰林院之始夫翰林之設三代以前無有也然湯誥微子之命之類其體製言辭類非人君所自言者安知當時無代言之臣哉但其名制不見於經典無可考耳漢制尚書郎主作文書起草五日一美食下天子一等雖無代言之名其端己見於此矣至唐以後始設官以掌王言居禁林深嚴之地爲天子親信之臣人主之心欲有所言欲有所爲欲有所謀猷於廟堂欲有所施設於朝廷欲有所播告於天下喜其人欲有以奬之怒其人欲有以責之皆假諸其手俾代王言以宣其心傳其意必得夫穎敏開通之士諳練該博之才授㫖即得其心聽言即知其意而言又足以成文文又能以成章舉理而不遺其事通今而不悖乎古必得如是之人然後足以當是任茍爲不然徒以其才藻之豔麗言辭之㨗給而於治道民情罔有所知君德治體畧無所補又焉用彼爲哉宋翰林學士掌内制制誥赦敇國書及宫禁所用之文辭凡后妃親王公主宰相除拜則草詞赦降德音則先進草乘輿行幸則侍從以備顧問有所獻納則請對或奏對臣按學士之職不止於代王言而又以備顧問資獻納焉夫然則所用者不獨以其能文辭而已非道足以貫天人學足以通古今才足以適世用者不足以膺此選也太祖謂宰相曰北門深嚴當擇審重士處之范質曰竇儀清介謹厚然在前朝己自翰林遷端明今又遷兵部尚書難於復召上曰禁中非此人不可卿當諭朕意勉再赴職太宗時張洎欲遷翰林上曰學士之職清切貴重非他官可比臣按宋歐陽修嘗舉錢惟演言朝廷之官雖宰相亦可雜以他才爲之惟翰林學士非文章之士不可夫學士之職非有文章之士固不可冐此名也然孔子所謂有德者必有言韓愈亦謂仁義之人其言藹如也夫所謂文學之士必得有道德仁義之人以處清切貴重之地庶幾可以華國爾茍非其人而輕授之豈不汙是選哉以上言翰林學士唐𤣥宗開元三年始召馬懐素褚無量更日侍讀宋真宗咸平二年以楊徽之夏侯嶠並爲翰林侍讀學士班次翰林學士臣按此翰林置侍讀及侍讀學士之始漢明帝時張酺數侍講於御前靈帝時楊賜劉寛俱侍講於華光殿雖有侍講之號而未以名官唐𤣥宗開元十三年始置侍講宋眞宗咸平二年國子祭酒邢昺爲侍講學士臣按此翰林置侍講及侍講學士之始唐𤣥宗謂宰相曰朕每讀書有所疑滯無從質問可選儒學之士使入内侍讀宋太宗命吕文仲爲翰林侍讀寓直禁中以備顧問真宗視朝之暇即令講說嘗曰朕聽政之餘惟文史是樂講論經義寧有倦耶臣按設官以講讀名將資之以講明經義質正疑滯非備其員以美觀聽也官而謂之讀謂之講必執經以侍左右講道以明義理然後足以稱其名焉以上講讀學士唐制史館修譔掌修國史臣按修譔之名始見於此然考之史書又有所謂北門修譔集賢修譔右文殿修譔者皆所謂史官者也宋置㑹要所以修纂國史置修國史同修國史修譔同修譔編修官檢討官臣按編修檢討專以修史始見於此前此固有所謂編修官者蓋專以修經武要畧爲職屬之樞宻院名雖同而實則異也然編修檢討在前代者皆名以官我朝止稱編修檢討云臣嘗因是而通論古今之史官矣夫天下不可一日而無史亦不可一日無史官也百官所任者一時之事史官所任者萬世之事周禮宰夫八職有史以贊治漢法太史公位丞相上天下計書先上太史公副上丞相唐及宋宰相皆兼史官其重有如此者自成周有左右史漢有起居注唐宋之起居舍人著作郎之屬皆所謂史官也我朝開國之初猶設起居注其後革之而惟以修譔編修檢討當國史焉遇有纂修則以大臣爲之監修學士爲之總裁其法制可謂簡而要矣然是職也是非之權衡公議之所繫也禹不能褒鯀管蔡不能貶周公趙盾不能改董狐之書崔氏不能奪南史之簡公是公非紀善惡以志鑒戒自非得人如劉知幾所謂兼才學識三者之長曾鞏所謂明足以周萬事之理道足以適天下之用智足以知難知之意文足以發難顯之情不足以稱是任也雖然此猶非其本也若推其本必得如元揭徯斯所謂有學問文章知史事而心術正者然後用之則文質相稱本末兼該而足以爲一代之良史矣朝廷誠得斯人付以纂述之任儲之館閣之中以爲異日大用之階其所闗係夫豈小哉以上史官漢武帝建元五年初置五經博士臣按此五經博士之始夫五經之在漢有專門之學故當時各設博士以掌之然不徒用以訓詁名義而已於凡朝廷政事之有更張事體之有疑義議論之際博士皆得與焉輒問以經義何當漢之政尚經術猶爲近古也如此後世雖設此官姑備其名焉爾誠能復漢之故事遇國家政事之有可疑者俾文學經術之士皆得以議論其間考古引經以爲可否之决其於明廷議政未必無所補周禮太史掌建邦之六典又有外史掌四方之志三皇五帝之書漢氏圖籍所在有石渠石室延閤廣内貯之於外府又有御史居殿中掌蘭臺秘書及麒麟天禄二閣藏之於内禁後漢圖書在東觀桓帝延禧二年始置秘書監一人掌典圖書考合同異唐制秘書省掌經籍圖書之事秘書郎掌四部圖籍校書郎掌讐典籍刋正文章宋有秘書監掌古今經籍圖書國史實録天文厯數之事官有監少監丞屬有著作郎秘書郎校書正字各以其職𨽻於長貳宋太宗因唐制建昭文史館集賢院於禁中昭文集賢置大學士直學士史館置監修國史修譔直館昭文亦置直館集賢又有修譔校理之職名數雖異而職務畧同謝絳曰太宗肇造三館立秘閣真宗景德中圖書寖廣大延天下英俊之士數臨幸親加勞問遞宿廣内有不時之召人人力道術究藝文知天子尊禮甚勤而名臣高位繇此其選也歐陽修曰用人非止一端故取士不以一路夫知錢榖曉刑獄熟民事精吏幹以辦集爲功者謂之材能之士明仁義禮樂通古今治亂文章議論可以决疑定䇿論道經邦者謂之儒學之臣善用人者必以材能之士布列中外分治百職使各辦其事以儒學之臣置之左右與之日夕謀議講求其要而行之而又於儒學之中擇其尤者置之廊廟而付以大政此用人之大畧也由是言之儒學之臣豈在材臣之後哉前世英主明君未有不以崇儒嚮學爲先而名臣賢輔出於儒學者十常八九蓋館閣之職號爲儲材之地兩府闕人則取於兩制兩制闕人則取於館閣館閣者儲輔相之地也材既難得而又難知故嘗博采廣求而多蓄之時冀一得於其間則傑然而出爲名臣矣其餘中人優游養育以成之亦不失爲佳士也祖宗用人凡有文章有材有行或精一藝長一事者莫不蓄之館閣而長養之其傑然而出者皆爲賢輔相其餘不至輔相而爲一時之名臣者亦不可勝數也吕公著曰館閤之職乃朝廷之華選前世將相名臣多出其間得人之盛難以遽數比來雖有簡㧞其數不多其中又多外補朝廷平日艱於收採緩急必乏使令古人有言士不素養無以重國臣按前代藏書之府非止一處而掌書之官非止一職名數雖異而職務畧同今代圖籍皆藏内閤所設之官止一典籍焉蓋本朝翰林之官雖有異名實無異職其所儲書非獨以存前代之舊蓋將以資儒臣之考閱講究以開發其聰明以爲異時大用之具也仰惟太祖開基既設翰林院置學士等官又慮人才非儲養作興不能有成乃洪武癸丑命編修張唯等十人入禁中文華堂肄業詔宋濂爲之師上聽政之暇輒幸堂中取其文親評優劣命光禄給酒饌每食皇太子親王迭爲之主給冬夏衣時賜白金鞍馬太宗永樂甲申命學士解縉選新進士中材質英敏者得修譔曾棨編修周述周孟簡庶吉士楊相王英王直等二十八人又増周忱爲二十九人俾就文淵閤進其學且諭之曰文淵閤古今載籍所萃爾各食其禄日就閤下恣爾玩索務實得於己庶國家皆得爾用命司禮監給筆札光禄寺供飲饌分鈔以市膏燭賜第以爲居止列聖相承按爲故事每遇開科間於進士中選其俊異者如甲申制讀書中秘以儲養之前後得人比諸他進士爲多用之當時有得賢之效書之史册爲儒者之榮是誠一代盛舉也臣伏讀文皇帝諭棨等有曰人須立志志立則功就未有無志而建功成事者汝等皆今之英俊當立志遠大不可安於小成爲學必造道德之微必具體用之全爲文必驅班馬韓歐之間古之文學之士豈皆天成亦積功所致也一時諸賢服膺聖訓莫不奮發立志勉進學業皆大有所成就留者擅文學之名出者播政事之譽大哉皇言其所以主張文教作興人才爲世道慮也一何遠哉三代以下所僅見也嗟乎賢才不易得亦不易知必隨時而取之不限一時必多方以試之不拘一藝然後賢才畢用而無遺茍惟取之於此時而他時則否試之以一藝而他藝則否而欲所用皆得其人難矣臣請著爲定制一次開科一次選用簡擇之餘乃分諸司觀政待新進士詣大學行釋菜禮畢即敕禮部諭俾各録平日所作文字投獻所作如詩賦序記銘頌書論擬古評史之類封送翰林考訂其中有辭采文理其學可進者别出題試之其所試之文與所投之卷相稱即取以預選不問年之長㓜質之強弱茍有器識才思者即如故事命官教育以俟其成若其辭鉤棘而意詭異者不在所取三年之後隨其材器而任使之每科不必多選所選不過二十人每選不必多留所留不過三五輩如此則國家儲材以待用者無非通經學古明體適用之儒布諸庶位列於内外者又皆得夫文學博雅之士以錯雜於政事法理之間以潤飾之臣見天下彬彬然多文雅之士儒皆真儒吏非俗吏凡其製作以華國施爲以輔世者咸有可稱述者矣爲治要務用人要術莫先於此以上館閤唐武德二年改内史舍人爲中書舍人臣按此中書舍人設官之始然是官也故𨽻於中書省故以中書舍人爲名我朝罷中書省尚仍其舊名名雖同而實則異也蓋前代之中書與翰林學士分掌内外制誥以爲兩制蓋屬文之官也我朝之中書舍人則專以書寫爲職耳書者六藝之一漢人謂之小學以試學童爲吏者也夫人能之無庸設官設之始自今日蓋以王言所係之重前代乃屬筆於吏胥殊無慎重之意祖宗以此設官蓋有深意必得夫素通經術深明六書之義心正筆正如栁公權所云者居之庶不汙王言耳茍粗識偏旁而學術無素者尚不足以當此况又粗率側媚而流品非清者哉以上中書舍人以上簡侍從之臣臣按翰林之職以備顧問參議論侍講讀謂之侍從可也而博士典籍舍人等官亦係之侍從者蓋以今制皆屬於翰林故也中書舍人之職雖有專科然所書者學士所草之制况今内閣亦有舍人别書詔敇云大學衍義補卷七
