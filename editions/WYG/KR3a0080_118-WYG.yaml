body:
  text: 大學衍義補卷一百十八明丘濬撰治國平天下之要嚴武備宫禁之衛周書立政周公戒于王曰王左右常伯牧民之長常任任事公卿凖人守法有司綴衣虎賁周公曰嗚呼休兹知恤鮮哉蔡沈曰掌服器者曰綴衣執射御者曰虎賁皆任用之所當謹者周公於是歎息言曰美矣此官然知憂恤者鮮矣言五等官職之美而知憂其得人者少也臣按蔡氏謂掌服器者曰綴衣執射御者曰虎賁葢侍御僕從中近臣之長也周公戒成王乃以之與王左右常伯常任準人並稱為官職之美而嘆失知憂其得人為鮮何也先儒謂職重者有安危之寄職親者有習染之移其係天下之本一也由是觀之人君之左右非但輔弼侍從之臣不可不得其人則雖扈從侍衛之人亦皆不可不得其人也一不得人則知治體贊王化者必深以為憂焉周禮天官宫正掌王宫之戒令紏禁以時四時也比校也宫中之官府謂官府之在宫者次次所以待直宿舍舍所以待休沐之衆寡為之版以待夕擊柝以兩木為機以警夜而比之國有故則令宿其比亦如之辨外内而時禁稽其功緒紏其徳行幾察也其出入均其稍食去其淫怠與其竒衺之民㑹其什伍而教之道藝春秋以木鐸修火禁凡邦之事祭祀之事蹕宫中廟中則執燭吳澂曰宫正宫中長也戒令紏禁者戒其怠忽紏其緩散令之使有為禁之使勿為也宫正時比之法者為之版以待則籍其名之多少夕擊柝而比則計其人之在否國有祭祀兵戎喪紀之故則其比亦然王宫有内外内外嚴密不可不辨啟閉之際以時而禁然後為之稽其功之見於緒者紏其徳之見於行者幾其人之出入均其人之稍食或有竒衺淫怠之人則斥而去之然後㑹其人使之什伍相聨則勉於道藝而敎成矣又曰季春季秋火星出入之時以木鐸警衆使脩夫火政蹕止人清道之具出稱警入言蹕蹕止行者宫正則執燭以為明又曰宫庭内事固非執政大臣所當與而屬之天官何耶自古國家危亡之患多生於房闥否則生於閹寺夏商之亡漢唐之衰其禍以此夫婦人女子與夫刑餘之人敢肆其姦以敗人之國者以其無所制而得以逞其不軌之心一旦禍變孰得而翦除之哉如漢之竇武何進唐之李訓鄭注元載之徒是也果麗於冢宰則小大受制於執政大臣常有所忌憚而不敢肆其惡誠可以銷患於未萌也臣按澂又言周自文王以來王政先内治當時侍衛僕從罔匪正人雖綴衣虎賁趣馬之㣲亦惟吉士之求惟大宰以大臣臨之宫壼朝廷均為一體非若後世之疎外廷而親内豎也夫宫正則屬於冢宰所以兼制内廷之私人而又以小宰宰夫之戒令紏禁行乎其間養成君徳如此王業豈有不盛也哉宫伯亦長也掌王宫之士衛士也庶子國子之倅凡在版名籍者掌其政令行其秩廩禄敘才等作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之鄭𤣥曰王宫之士卿大夫之適子庶子其支庶也八次八舍衛王宫者必居四角四中於徼候便也王安石曰士庶子非王族則功臣之世則賢者之類王以自近而衛焉故君臣國家安危一體休戚一心上下親而内外察也吕祖謙曰古者執戈㦸以宿衛王宫皆士大夫之職無事而奉燕私則從容養徳有膏澤之潤有事而司禦侮則堅明守義無腹心之虞下至秦漢陛楯執㦸尚餘一二此制既廢人主接士大夫者僅有視朝數刻而周廬陛枑或環以椎埋嚚悍之徒有志於復古者當深繹也臣按周制宫伯掌王宫之士庶子凡在版者則是王朝宿衛之人皆公卿大夫士之子弟也祖宗以來用功臣子弟以為勲衛蓋亦此意臣竊以為今日宜廣此意凡公侯駙馬伯及凡有功徳於國家者之子若孫皆授此職使之畨上宿衛如此則不徒宿直宫禁得肺腑之臣而勲戚子孫亦得俸禄之養葢一舉而兩得焉閽人主晨昏之啟閉者掌守王宫之中門雉門之禁喪服凶器不入宫潜服賊器不入宫竒服怪民不入宫凡内人王内之臣公器公家之器賔客諸侯之臣為賔客者無帥導其出入者則㡬察也其出入以時啟閉凡外内命夫命婦出入則為之闢闢開左右行者掌埽門庭大祭祀喪紀之事設門燎蹕宫門廟門凡賔客亦如之賈公彦曰内命夫卿大夫士之在宫中者外命夫卿士大夫在朝者外命婦總卿大夫之妻也内命婦三夫人以下也王安石曰潛服則衷甲之類賊器器之可以賊人者竒服非法服也怪民怪行者也臣按成周以宦者掌門禁其嚴也如此我朝禁僧道非朝見由前門不許入皇城門及無牌面并凶服異服有持寸鐡者皆不許入禁門亦周人意也夏官虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人掌先後王而趨以卒伍軍旅㑹同亦如之舍王出所止宿處則守王閑陛楯也王在國則守王宫為周衛也國有大故則守王門大喪亦如之及塟從遣車喪車而哭適四方使則從士大夫若道路不通有徴事徴役之事則奉書以使於四方鄭𤣥曰不言徒而曰虎士者徒之選勇力者王出將虎賁士居前後臣按此虎賁之名見於周書立政蓋天子之親兵也今制錦衣以下十二衛親軍指揮使司不屬五軍都督府所𨽻専以扈從宿衛為職即此也旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪凡祭祀㑹同賔客則服而趨喪紀則衰葛執戈盾軍旅則介甲胄之屬而趨王安石曰王吉服則亦吉服王凶服則亦凶服王戎服則亦戎服吳澂曰旅者主膂力而衛王者夾王車者下士十六人分居左右而中士為之帥服而趨亦謂夾王車也臣按勇而疾走曰虎賁又憤怒也周官既有虎賁又有旅賁旅賁者主膂力而言亦猶今制錦衣之卒既有校尉又有將軍力士也春秋左傳僖公二十八年襄王賜晉文公虎賁三百人臣按先儒謂虎賁八百人乃天子親兵也六軍之外禁衛惟此而已王不出則虎賁不出及其弊也以之從軍旅賜諸侯非舊法也由是觀之則虎賁士非天子不得用受者固非賜之者尤非也漢京師有南北軍南軍衛尉主之易祓曰郎衛兵衛均為宿衛之職而郎中令衛尉所掌皆宫門内外之事武帝更秦郎中令為光禄勲前表光禄勲掌宫門户衛尉掌宫殿門又殿外門舍屬衛尉殿内門舍屬光禄勲其職實有相闗者特有内外之别耳此正周官所謂宫正宫伯之職當時以二千石以上子弟及明經孝亷射䇿甲科博士弟子髙第及尚書奏賦軍功良家子充之其後又以期門羽林皆屬焉是皆親近天子之宫臣按古者環衛有二等漢有衛郎衛兵是郎周官宫正宫伯之職宫伯則領貴游子弟而宫正則領宫徒役事者也武帝時置期門羽林臣按史言武帝㣲行與侍中等期諸殿門故有期門之號先儒謂漢期門千人秩比郎亦周人虎賁之遺意蓋王出與王出也後漢光禄勲掌宿衛宫殿門户典謁署郎更直執㦸宿衛門户五官中郎將五官中郎五官侍郎五官郎中凡郎官皆主更直執㦸宿衛諸殿門户出充車騎左右僕射主虎賁郎習射左右陛長主直虎賁朝㑹在殿中虎賁中郎侍郎郎中節從皆羽林中郎將羽林郎皆掌宿衛侍從常選漢陽隴西安定北地上郡西河凡六郡良家子弟補林駉曰東漢以來舉五官郎將羽林虎賁以職屬大夫議郎謁者僕射以文屬分屬之後政令不行於其間而又光禄大夫不在宿直議郎不與執㦸惟不在宿直執㦸之列則凡為禁衛者皆非士人之流而郎官三省盡為諸黄門之廬耳故宦官内典門户外與政事及何進誅宦者太后不聴曰中官統領禁省自古及今漢家故事我奈何禁之與士人共對事乎則知士人不為郎中久矣後盡除宦者選三署郎入守宦官之廬即此可見推原其故皆光武不任三公多置黄門其禍流至是也臣按漢初宿直皆以士人為之其後不用士人而所用皆宦官遂至内外大權悉歸之以為一代之禍説者歸咎於光武之不任三公誠是也夫自古國家危亡之禍皆出於房闥宦寺之中何也婦人女子與夫刑餘之人所以敢肆其姦者以其處夫人君肘腋之間幽隠深邃而人不得以制之也誠能如周人以内宰小臣閽人寺人女御女史之職皆屬之大宰以受其節制焉則彼雖欲逞其不軌之心亦且有所忌憚而不敢為矣矧夫後世宿直執㦸之臣實有兵權以寓其間茍無有以制之者而使之得以自肆豈不貽國家之禍哉唐有南北衙兵南衙諸衛兵是也北衙禁軍是也髙祖初起兵有元從禁軍太宗時置百騎武后時改為千騎睿宗時増至萬騎肅宗時有供奉射生官代宗以後有左右神策軍十六衛曰左右衛曰左右驍衛曰左右武衛曰左右威衛曰左右金吾曰左右領軍曰左右監門曰左右千牛毎衛有上將軍有大將軍有將軍自左右至領軍並掌宫禁宿衛金吾掌宫中京城廵警監門掌諸門禁衛千牛掌侍衛林駉曰唐之十六衛已備漢人南北軍之制漢以衛尉䕶南軍以金吾廵北軍今十六衛已有金吾將軍掌京城廵警是北軍已寓其間觀白樂天羽林將軍之制所謂國家設十六衛猶漢之有南北軍其知之矣又曰自六軍禁衛皆用市人其選始輕禄山吐蕃之變神策禁軍外入赴難國家遂以倚重悉命中人主之其勢益横北衙既横之後外庭諸臣莫之誰何蕭復言之而不見聴髙元裕諫之而不及用推原其故皆外臣不預禁軍専歸宦者為患至是也臣按本朝十二衛即唐人十六衛之遺制凡諸衛之親軍皆以番直宿衛執戈㦸嚴廵儆監門禁而錦衣所掌者乃鹵簿儀仗之事旗手所司者乃旗纛金鼓之物諸衛皆統軍卒而錦衣獨領校尉力士即周之虎賁旅賁也諸軍皆世卒而府軍獨簽㓜軍即漢之六郡良家子也始之設親軍也僅十有二後又稍有加焉諸衛正倅一惟其世獨錦衣之任則不以世而以能葢天子御座則夾陛而立天子御輦則扶轅以行出警而入蹕承旨而傳宣皆在所司也矧又詔獄所寄人之死生係焉是尤不可不慎擇其人也太宗時詔右衛大將軍李大亮兼右衛率又兼工部尚書身兩職宿衛兩宫毎畨直常假寐帝勞曰公直宿我得酣卧臣按本朝宿衛雖有武臣然皆爪牙之任耳而無有所謂腹心股肱之臣請如唐人以大臣畨直如太宗之用李大亮者如此則既有虎賁鋭士宿衛王宫又有勲徳世臣總司禁旅九重之上六宫之中得以安寢無虞矣肅宗乾元元年李輔國用事請選羽林騎士五百人徼廵李揆曰漢以南北軍相制故周勃以北軍安劉氏朝廷置南北衙文武區别以相察伺今用羽林代金吾警忽有非常何以制之臣按設䕶衛之兵本以制外兵也非但不用其他將帥以廵徼凡其人之子弟亦不可用也徳宗時段秀實見禁兵寡弱不足備非常上疏曰天子萬乘諸侯千大夫百蓋以大制小古制也尊君卑臣强幹弱枝之道今外有不庭之虜内有梗命之臣而禁兵不精其數削少後有猝故何以待之猛虎所以百獸畏之者以其有爪牙也爪牙廢則孤豚特犬悉能為敵願少留意臣按秀實此疏百獸畏虎之譬最切人主所當玩繹焉宋志禁兵者天子之衛兵也殿前侍衛二司總之其最親近扈從者號諸班直其次總於御前忠佐軍頭司皇城司騏驥院皆以守京師備征伐其在外者非屯駐屯泊則就糧也太祖鑒前代之失萃精鋭於京師雖曰増損舊制其規模宏逺矣太祖乾徳三年令天下長吏擇本道驍勇者籍其名送都下以補禁旅之闕林駉曰宋朝有皇城司殿前司皇城始於梁之乾化宋因其名置親從官數千人入内内侍省都知與副同主判之殿前始於周之顯徳宋循其舊有馬軍步軍獨殿前得綂之是故皇城一司於内庭宿衛無不預者而獨宿直諸班禁衛無所綂攝至親從之官復命武臣同主其事又非専出於宦者之手殿前一司雖綂攝諸班禁衛而皇城一司亦判然不相闗亦漢南北軍相綂之意也臣按宋人禁軍不獨内衛京師而往往使之屯泊於外失其所以命名之義矣葢太祖懲唐末以來援鎮兵彊之患故聚精鋭於京師時出之以守國葢欲以内而制外也其謀雖深而其埶則不順史臣謂其規模宏逺臣不敢以為然也夫立國規模在篤近而舉逺居重以馭輕使天下之大四面環繞以為吾屏蔽也既為禁兵豈可逺出而衛郡縣使之就糧于外禁士獨徃乎抑亦挈家以行也嗚呼宋人制軍如此宜其武事之不振也説者謂其聲容盛而武備弱也觀於此尤信仁宗嘉祐五年公主以夜入宫左正言王陶言周禮閽人掌宫門之禁時其啟閉寺人掌女宫之令紏其出入以謹嚴周衛杜絶非常故漢光武出獵夜還上東門候郅惲拒闗不納光武從中東門入明日賞郅惲而貶中東門候魏武之子臨淄侯植開司馬門晝出魏武怒公車令坐死然則公主夜歸未辨真偽輒便通奏開門納之直徹禁中略無譏防其所歴皇城宫殿内外監門使臣請並送勘劾詔公主宅都監入内供奉官等九人並逺小處監當六年同知諫院司馬光言式律夜開宫殿門及城門者皆須有墨勑魚符其受勅人具録所開門并出入人帳于中書門下自監門衛大將軍以下俱詣閤覆奏御注聴郎請合符門鑰監門官司先嚴門仗所開之門内外竝立隊燃炬火對勘符合然後開之符雖合不勘而開若勘符不合而為開及不承勅而擅開閉出入者其刑名輕者徒流重者處絞伏望陛下深慮安危防㣲杜漸自今宫殿門城門並須依時開閉非急切大事勿復夜開必不得已須至夜開者即必親降手勅加以御寳受勅之人仍冩出入人帳委宿衛當上之官衆共驗勅文真的然後覆奏候再見御批方請門鑰與監門官親自監開依帳㸃閲人數放令出入即時下鎻進納門鑰臣按宋王陶司馬光所言二事可見古人嚴謹宫門之禁我聖祖于此一事尤加嚴切所以防㣲社漸之意無所不至毎夜將軍上宿遇有一瓦石之隊一蟲鳥之落詰旦早朝即令給事中引赴御前奏知矧可夜開城門以出入哉伏望申明祖宗之法嚴謹門禁一切外人不許闌入以敦聖朝之家敎以立禮義之大防非但以備姦宄杜禍亂而已也至和元年有襆被入直内藏劍者御史馬遵言律干御用舟船飲食之類有不如法皆不稱誤所以許世子止躬不嘗藥春秋加以大惡之名唐長孫無忌入朝不解刀挍尉被誅死之議所責者重所慮者深法令于皇城門禁尤為謹嚴今麥昭吉襆被入直中有劍器歴諸門抵便殿㑹無撿察略不覺悟若奸盜包藏而為之何由而露哉今昭吉雖已具獄而諸門監官守卒乞于常法之外重行用謹大防庻弭來患徽宗時左正言任伯雨言風聞内苑作工匠盜所結真珠事敗有旨更不得治監官醫官院人力懐刄為盜捕獲有旨不復推經由門户中外聞之莫不撫髀而嘆頓足寒心皆謂陛下誤以此為小事竊以監官之設本為監臨主守司門之設本為譏察出入今珠璣至貴之物失之數萬匹夫挾刄入數重門如涉無人之境皆非小事乃一切赦之後來更有犯者不赦之則罪同罰異人人皆怨又赦之則事事廢法紀網遂壊雖有監官司閽將何用也且宫禁之門法最嚴宻葢聖人防慮幾㣲謹備不測以嚴衛一人若左右恃恩廢弛積日累月事體陵遲忽有不測之虞誰復知所職守陛下豈不為宗廟社稷自重乎臣按祖宗於門禁出入其法最嚴毎四孟享太廟夜間出鑰於門隙早朝亦于御前奏知各門監守門官及各衛官軍遇有出入者必須有牌面方許其入迨其出也必搜檢之其入也不許擕寸鐡其出也不許帶一物也况敢有襆被藏劍盜出真珠之事哉祖宗所以防㣲杜漸為聖子神孫計者其嚴其密如此繼體守成者勿狥一時之欲勿聴小人之言奬將卒之守法受臺諫之進言如此則永無意外之變而宗社奠安矣臣不勝惓惓胡安國言于髙宗曰自古盛王雖用文徳必有親兵専掌宿衛成王即政周公指虎賁與常伯同戒于王欲知其恤虎賁者猶今侍衛諸軍也康王新立太保俾齊侯吕伋以虎賁百人逆于南門吕伋者太公望之子自諸侯入典親兵猶今殿前馬步軍都帥也勲徳世臣總司禁旅虎賁鋭士宿衛王宫其為國家慮深逺矣今謀國者不思復古親兵寡弱宿衛卑少豈尊君强本消患豫防之計也臣按禁旅之帥必用勲舊之胄三代之制也以上宫禁之衛大學衍義補卷一百十八
