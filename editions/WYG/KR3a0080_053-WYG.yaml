body:
  text: 大學衍義補卷五十三明丘濬撰治國平天下之要明禮樂家鄉之禮下周禮小史掌邦國之志記也奠繫世辨昭穆臣按父謂之昭子謂之穆父子相代謂之世世之所出謂之繫奠繫世以知其所出辨昭穆以知其世序程頤曰管攝天下人心收宗族厚風俗使人不忘本須是明譜系收世俗立宗子法宗子法壊則人不知来處以至流轉四方往往親未絶不相識又曰人無宗子故朝廷無世臣若立宗子法則人知尊祖重本人既重本則朝廷之世自尊臣按古者設官以奠繫世唐以前皆屬於官宋以後則人家自為之當時有廬陵歐陽氏眉山蘇氏二家譜今世士夫家亦往往倣而為之然朝廷無一定之制人家興廢不常合散不一或有作者於前而無繼者於後請為之制除貧下之家外凡有仕宦及世稱為士大夫者不分同居異籍但係原是同宗皆俾其推族屬最尊者一人為宗子明立譜諜付之掌管不許攀援名宗遺落貧賤違者俱治以罪以上宗譜爾雅曰父為考母為妣生曰父母死曰考妣父之考為王父父之妣為王母今稱祖父祖母王父之考為曽祖王父王父之妣為曽祖王母曽猶重也今稱曽祖父曽祖母曽祖王父之考為高祖王父曽祖王父之妣為髙祖王母髙者言最在上今稱髙祖父髙祖母父之世父叔父為從祖祖父父之世母叔母為從祖祖母與祖同行輩者今稱祖伯父祖伯母父之晜與昆同弟先生為世父後生為叔父與父同輩行者黄幹曰叔伯云者猶今人謂三月為孟仲季也呼春者必須曰孟春仲春季春未有舍春字而但言孟仲季也古人以為父之兄弟皆吾父也而有少長之分故呼父之兄則曰伯父呼父之弟則曰叔父猶曰大父小父也今人呼叔伯而去父字則全無義理矣臣按世俗稱伯父與叔父為伯叔非是蓋伯叔同輩行之稱也今如爾雅加以父稱然爾雅謂伯父為世父蓋以為嫡者嗣世統也宗子居長者稱世若非嫡通以伯稱男子先生為兄後生為弟男子謂女子先生為姊後生為妹四者皆與己同一父生也父之姊妹為姑女子與父同輩行者稱姑與祖同輩行者稱祖姑與曽祖同輩行者稱曽祖姑兄之子弟之子相謂為從父晜弟今稱從兄從弟俗云堂兄堂弟蓋從父而别也從祖父父之從晜弟為從祖父之子相謂為從祖晜弟今稱再從兄再從弟蓋従祖而别也族父父之從祖晜弟為族父之子相謂為族晜弟今稱為三従兄弟從曽祖而别者族晜弟之子相謂為親同姓謂従髙祖而别者五世之外雖無服比諸同姓猶親子之子為孫孫之子為曽孫今稱重孫曽孫之子為𤣥孫親屬微昩也𤣥孫之子為来孫有往来之親来孫之子為晜孫晜後也晜孫之子為仍孫仍亦重也仍孫之子為雲孫言輕逺如雲臣按以上人家宗族之親屬相稱呼者母之考為外王父今稱外祖父母之妣為外王母今稱外祖母母之晜弟為舅其妻為舅母俗稱妗妗其伯叔兄弟為從舅母之姊妹為從母今稱為姨母從母之男子女子為從母晜弟姊妹臣按以上母黨之相稱呼者然止有從母之子之稱呼而無舅子之稱呼何也又世俗謂母之姊妹為姨殊不知姨者妻之姊妹同出也降尊以就卑非禮也妻之父為外舅妻之母為外姑今稱外父外母妻之姊妹同出為姨今稱同女子謂姊妹之夫為私今稱姨夫男子謂姊妹之子為出俗謂之甥女子謂晜弟之子為姪女子子之子為外孫今人通謂外甥非是女子謂兄之妻為嫂弟之妻為婦長婦謂稚婦為娣婦娣婦謂長婦為姒婦世謂之妯娌臣按以上妻黨之相稱呼者又有所謂姑之子舅之子妻之晜弟姊妹之夫皆謂之甥者註謂四人皆敵體故更相為甥在當時習俗已成則可後世所謂甥者止以稱姊妹之子而臨文者或以呼人之壻而謂姑舅之子為中表兄弟朱子語類云舅子謂之内兄弟姑子謂之外兄弟爾雅雖古書然且當從俗不然駭人之見聞也婦稱夫之父曰舅稱夫之母曰姑謂夫之庶母為少姑夫之兄為兄公俗謂之大伯夫之弟為叔俗加以小夫之姊為女公俗謂之大姑夫之女弟為女妹自唐以来稱為小姑故詩有先遣小姑嘗之句子之妻為婦女子子之夫為壻壻之父為姻婦之父為婚父之黨為宗族母與妻之黨為兄弟婦之父母壻之父母相謂為婚姻俗謂之親家唐以来則然又以婚姻之婚姻為四門親家宋人戲作賔於四門賦亦有此語兩壻相謂為亞前代謂之僚壻俗謂之連襟臣按以上婚姻之相稱呼者子夏𫝊曰謂吾姑者吾謂之姪黄幹曰按此則姪者姑呼其兄弟之女子子名也古人謂兄弟之子猶子也故以子呼之今乃謂之姪則失之矣自兄弟之子不呼叔伯為父則不知敬其叔伯矣自叔伯父不呼兄弟之子為子則不知愛兄弟之子矣臣按古人姊妹於兄弟之子且有稱呼顧兄弟於兄弟之子獨無稱焉而一概以姪稱則是男女無别矣然則曷以為稱曰古謂同祖兄弟為從兄弟謂母之姊妹為從母則當稱從子為是蓋甞因是而通論之考爾雅有釋親一篇専叙親族稱呼之别然古之稱呼與後世亦有不同者故録於此以為人家相稱呼之則臣於是竊有疑焉夫自黄帝正名百物以来有一物必有一名凡物皆然而况人為萬物之靈者乎竊怪古之人造字立名之始何獨詳於物而略於人哉如舅之一名或以呼夫之父或以呼妻之父甥之一名或以呼姑舅之子妻之晜弟姊妹之夫女子之壻乃至晜弟之子惟女子稱姪而無男子之稱其中類多假借混同者顧乃於草木蟲魚之品條分而類别之釋名者於一馬之賤因其毛色而有數十種之稱造字者於一玉之微隨其形色而有數百品之别人家親屬稱呼乃人倫之大綱名正然後言順言順然後上下相安而可以致肅雝之化非細故也臣謹因時俗之稱而質以古人之制略為之分别庶幾通古今之宜合禮俗之變其於風化亦或有補以上親屬稱呼之禮儀禮士相見禮曰贄冬用雉夏用腒乾雉也左頭奉之曰某也願見無由達某子以命命某見主人對曰某子命某見吾子有辱請吾子之就家也某將走見賔對曰某不足以辱命請終賜見主人對曰某不敢為儀固請吾子之就家也某將走見賔對曰某不敢為儀固以請主人對曰某也固辭不得命將走見聞吾子稱贄敢辭贄賔對曰某不以贄不敢見主人對曰某不足以習禮敢固辭賔對曰某也不依於贄不敢見固以請主人對曰某也固辭不得命敢不敬從出迎於門外再拜賔答再拜主人揖入門右賔奉贄入門左主人再拜受賔再拜送贄出主人請見賔反見退主人送於門外再拜劉敞曰士相見之禮必依於介紹以言其不茍合者也必依於贄以言其道可親也茍而合唯小人無恥者能之君子可見也不可屈也可親也不可狎也可逺也不可疎也賔至門主人三辭見賔稱贄主人三辭贄所以致尊嚴也大夫以禮相接士以禮相諭庶人以禮相同然而争奪興於末者未之有也人茍為悅而相親若者末必争茍為簡而相親若者末必怨是故士相見禮者人道之大也所以使人重其身而毋邇於辱也所以使人慎其交而毋邇於禍也臣按古者相見必有禮方其未相見也則以介紹通之通之而主人辭以當就賔家往見之不敢屈尊也辭之至三而後容其見聞其有贄也又辭之至三而後敢受古之人不輕相接一見之頃而且委曲詳悉如此一贄之微而且力辭固拒如此當世之士夫相與者豈復有狎暱放蕩之失交通賄賂之私哉曲禮曰凡與客入者毎門讓於客客至於寢門則主人請入為席然後出迎客客固辭主人肅客俯手以揖之而入主人入門而右客入門而左主人就東階客就西階客若降等則就主人之階主人固辭不敢當客禮然後客復就西階主人與客讓登欲客先升主人先登客從之拾音涉級階之等級聚足後足與前足相合連步步相繼進以上上於東階則先右足上於西階則先左足戴溪曰盛哉先王之禮其端則起於辭遜之心而已送迎之際登降之節一先一後一左一右為主人者極其恭敬不敢慢之心為客者不勝其愧縮不敢當之意交相辭遜退避不遑於此乎可以觀禮矣玉藻曰士於大夫不敢拜迎恐大夫答拜而拜送士於尊者先拜進面答之拜則走陳澔曰士於大夫尊卑有間若大夫詣士士不敢拜而迎之恐其答拜也去則拜送者禮賔出則主人再拜送之賔不答拜禮有終止故也士若見於大夫則先拜於門外然後進而見面若大夫出迎而答其拜則走避之以上接見送迎之禮曲禮曰凡進食之禮客若降等執食興辭主人興辭於客然後客坐侍食於長者主人親饋進饌也則拜而食主人不親饋則不拜而食共食不飽共飯不澤手不摩手而出汗陳澔曰降等謂爵齒卑於主人也不敢當主賔之禮故食至則執之以起而致辭於主人主人見客起辭故亦起而致辭於客客乃復就其坐也侍飲於長者酒進則起拜受於尊所置尊之所長者辭少者反席而飲長者舉未釂飲盡釂也少者不敢飲王子墨曰禮莫嚴於少長之分至於飲食之際尤人情之所易縱故記禮者必致其委曲焉一飲之頃少之所以事長者如此其至凡所以習人敬順之心於平居無事之時彼其瀆尊犯分之心何自而有哉子曰鄉人飲酒杖者出斯出矣朱熹曰杖者老人也六十杖於鄉未出不敢先既出不敢後祭義曰壹命齒于鄉里再命齒于族三命不齒族有七十者弗敢先李覯曰一命者天子之下士公侯伯之上士子男之上大夫也而與鄉里齒焉再命者天子之中士公侯伯之大夫子男之卿也而與父族齒焉三命者天子之上士公侯伯之卿也雖云不齒亦異席而已非敢居其上也方慤曰一命齒於鄉里非其鄉里則以爵而不以齒可知再命齒於族非其族則以爵而不以齒亦可知三命不齒雖於其族亦不得齒之矣然此特貴貴之義耳至若老老之仁人不可得而廢焉故族有七十者弗敢先也臣按一命若今八九品官再命若今六七品官三命若今京官五品以上者鄉禮之㑹有官秩者一命猶與鄉里論齒再命惟與宗族論齒三命雖宗族亦不論齒所謂不齒者李氏所謂異席是已蓋有官者與鄉里宗族序㑹之時亦隨其齒以序列但别設席以異之非謂越席而居於其上也以上鄉人飲酒㑹列之禮吕氏鄉約曰凡同約者徳業相勸過失相規禮俗相交患難相恤有善則書於籍有過若違約者亦書之三犯而行罰不悛者絶之臣按吕氏鄉約四條其三條必須立約置籍然後可行惟禮俗相交一節鄉里間常行之禮也今詳具於下一曰尊㓜輩行凡五等曰尊者謂長於己三十歳以上及凡在父行者曰長者謂長於己十嵗以上凡在兄行者曰敵者謂年相上下不滿十歳者長者謂稍長少者謂稍少曰少者謂少於己十嵗以下者曰㓜者謂少於己二十歳以下者二曰造請拜揖凡三條曰凡少者㓜者於尊者長者嵗首冬至四孟月朔辭見賀謝皆為禮見此外候問起居質疑白事及赴請召皆為燕見尊者受謁不報長者嵗首冬至具牓子報之餘令子弟以己名牓子代行凡敵者嵗首冬至辭見賀謝相往還曰凡見尊者長者門外下馬俟於外次必問主人食否有他客否有他幹否俱無妨乃通名主人使將命者先出迎客客趨入至廡間主人出降階客趨進主人揖以手作揖遜狀之升堂禮見行四拜禮衆人旅見則同拜少者拜則答其半㓜者拜則受之主人命之坐則揖謝而坐如主人語終不更端則告退主人送不出門出大門乃上馬若時常燕見則不拜凡敵者門外下馬使人通名以俟禮見則再拜退則主人送出門請上馬俟行乃退凡尊長往少者㓜者家則先遣人通名主人具衣冠以俟客入門下馬則趨出迎揖升堂若是来報禮則再拜致謝退則就階上馬主人目送而退曰凡遇尊長於道皆徒行則趨進揖尊長與之言則對否則立於道側以俟尊長已過乃揖而行或皆乘馬於尊長則迴避之避不及則下馬於長者則立馬道側拱揖俟過乃行若已徒行而尊者乗馬則立俟其過長者則回避之若已乗馬而尊長徒行望見則下馬前揖已避亦然過已逺乃上馬遇敵者皆乗馬則分道相拱揖而過彼徒行而不及避則下馬揖之遇少者徒行不及避則下之㓜者不必下舉鞭謝之三曰請召迎送凡四條曰凡請尊長飲食親往授書禮薄則不用書既来赴明日親往謝之召敵者以書簡明日各遣人互相謝召少者用客目明日客親往謝曰凡聚㑹皆鄉人則坐以齒非士類則否若有親則别叙若有他客有爵者則坐以爵不相妨者猶以齒若有異爵者雖鄉人亦不以齒註異爵如今陞朝官若特請召或迎勞出餞皆以専召者為上客如婚禮則姻家為上客皆不以齒爵為序曰凡燕集初坐别設卓子於兩楹間置大盃於其上主人降集立於卓東西向上客亦降席立於卓西東向今世俗以東為上宜隨俗主人立西客立東主人取盃親洗置盃卓子上親執酒斟之以器授執事者遂執盃以獻上客上客受之復置卓子上向主人對拜興客取酒面外跪祭少許於地興飲之以盃授贊者又與主人對拜若非大禮以揖代拜客亦置盃卓子上親執酒斟之以器授執事者遂執盃以酢主人主人受之亦置卓子上向賔對拜興主人取酒面外跪祭少許於地興飲之又與賔對拜主人乃獻衆賔如前儀但揖不拜不祭若昏㑹姻家為上客雖少亦拜曰凡有遠出逺歸者期迎送之少者㓜者不過五里敵者不過三里各期㑹於一處拜揖如禮有飲食則就飲食之少者以下俟其既歸至其家省之四曰慶弔贈遺凡四條曰凡同約有吉事如冠子生子領薦昏姻之類則賀之有凶事如喪葬水火盜賊之類則弔之曰凡慶禮如常儀有贈物用幣帛酒食果實之屬或其家力有不足則為之借助器用及為營幹凡弔禮聞其初喪未易服則便服往哭弔之且助其凡百經營之事主人既成服則相率素服具酒果食物往奠之及葬則相率致賻俟發引則素服而送之曰凡喪家不可具酒食衣服以待弔客弔客亦不可受曰凡聞所知之喪或逺不能往則遣人致奠以上鄉里相交之禮周禮大司徒以本俗六安萬民一曰媺宫室二曰族墳墓三曰聯兄弟四曰聮師儒五曰聮朋友六曰同衣服吴澂曰本俗猶言舊俗也媺宫室者野廬邑室各得其所使之安居而不忍棄族墳墓者祖先考妣相聚以𦵏使之依慕而不忍舍此民徳之本也由是而聮兄弟則受田同井手足相助其情意有所不能忘由是而聯師儒則黨庠遂序同其模範其道藝有所不可間由是而聮朋友則同門合志交相琢磨其信義有所不可去又同其衣服以一其習而使其徳之歸一焉張紞曰周禮本俗之道族墳墓聮兄弟無所不用其極然經言百世而没其共爨之文聖人非不欲之蓋亦難為之制爾假令以一生二為法自二而下倍而斁之究於十世為子孫者千二十有四人繼禰之宗將居其半唯大宗當祭於廟餘皆室祭室祭無所君子之所隱也且子事父母問安視膳各欲盡其私情若千人聚居一有不惬勢必有向隅而泣者於斯二者處之特難蓋無私恩則不足以親親無公義則不足以尊祖私勝則義為恩揜公勝則恩為義屈節其親疏量其恩義執兩端而用其中上不忘一本之澤下不失羣從之懿自非權度精切何以與此竊甞因父子異宫之說而思之大略倣古者諸侯廟制五世一宅宅各有祠而總為墻宇以郭其外庶幾事親奉祭各得其所臣按周禮以本俗六安萬民註謂本俗為舊俗竊以謂本者人生本然之道也本然之道淳古所行者今則變而澆漓矣於是申而明之復而還之使萬民各循其本仍其舊以遂其安焉雖然萬民之積起於一民萬家之所以同者由乎一家之積也是以古昔先王經理天下以安萬民必自本俗始正本俗必自民家始是故因民之族一民之俗居必同室也而規制不得以自異𦵏必同壤也而兆域不得以自别聮兄弟使之叙輩行以相稱謂聯師儒使之合席硯以相肄習所交逰者必同一其道而不得以友非類所衣被者必同一其製而不得以為異服如此則家不殊俗矣由一家而合之一方由一方而合之四方莫不皆然則天下之平其基在此矣淳古之本俗豈不於是而復哉夫以先王之世於凡民之宫室墳墓兄弟師儒朋友衣服皆為之處置乃獨於其日用之飲食略焉張紞謂聖人非不欲之難為之制爾嗚呼信乎其難也何則古者一夫受田百畆一夫上父母下妻子以五口八口為率孟子告齊梁之君所謂八口數口之家是也民年六十以所受田𫝊其長子其次子是為餘夫年十六别受田二十五畆俟其壯有室然後更受百畆之田百畆之外又受田廬之地五畆二畆半在田二畆半在邑由是觀之三代以前蓋無累世同居共爨之制可知已然則漢唐以来往往於累世同居者旌其門復其役夫豈無其故而然歟蓋以世道日降民俗日偷乃有一家焉獨於道隠民散之餘而為合宗立族之舉則夫操長民之柄者將以致其濳銷宻移之化安得不為之率徳勵行使民知所勸而强於為善哉然此特人君之微權耳非生民久處之常道也蓋天下之土地有限人民之生息無窮考史自唐以来民之同居者久不過十世踰十世而不散者蓋無幾焉是雖勢之不得不然而亦理之窮而變也張紞論欲倣古諸侯廟制五世一宅各有祠而總為墻宇以郭其外庶幾事親奉祭各得其所臣竊以為一姓之家一族之産十世之後非併諸其鄰安得地以容之哉然則為之計也奈何曰其己然者朝廷當為之維持輔其所不及助其所不足蠲其所不能子孫之茂異者擢用之其不率教者懲治之如此則其家範久行而族居不散矣若夫人家之所以自為計者盍思曰合族以居共爨而食豈非美事哉然吾之恒産有數而子姓之生息無已一日不再食則飢一歳不製衣則寒一人不得所則戚創立之初三四世間固若易為矣至於六七世之後食指日多費用日廣何所居以安其身何所出以給其用可不豫為之慮詳為之計哉且三代聖王經世之典所以詒厥孫謀者數世之後尚不能無變更况人家乎蓋人人須有所居止日日須有所食用勢至不能容力至不能給必思所以變通之道宜一準周官本俗而不失其意是故居固欲􅍇宫室若地不能容不得已而别遷必合衆力為之營搆而不失舊媺之規𦵏固欲族墳墓若地有所礙不得已而别厝必隨支𣲖為之布列而不失族葬之舊兄弟之聮稱呼必合其輩行命名則同其偏旁師友之聮肄業則一其道徳交游必同其臭味以至衣服必為寛博之製不尚詭異之飾使人望而知其為一家之羣從子姓也家必同一俗人各習一業少者為之生計壯者為之身計衰者為之老計老者為之死計無子者為之後計而又時脩譜牒詳明世系祭有祭田墓有墓田供力役有田延師教有田不惟有合族之公田而又有各室之私田而私田之中又各有公田焉大宗則行時祭小宗則行節祠使之既共協力以事其大宗而奉其祖廟又各竭力以事其私親而祭其祖禰親未盡不得别居異財服雖盡不許析户别籍私家既為之則範而率族屬以必遵其祖訓官府又為之禁令而限民人以各守其家法如此雖不必同居共爨而本然之道常存淳古之俗可復矣臣輯為家鄉之禮凡人家所當行者既已類叙如前而又引周官本俗安民之法以總結之者期天下之人家行古禮鄉復本俗必如周禮大司徒以致萬民之安者以立治平之基以上累世同居之禮以上家鄉之禮臣按孟子曰人人親其親長其長而天下平夫天下之所以平者雖由人君修身以齊其家舉而措之於國天下然天子有天子之家諸侯有諸侯之家卿大夫有卿大夫之家士庶人有士庶人之家家必齊而后國可治國必治而后天下可平天子親其親長其長固足以示則於人人而致天下之平矣然天子一家耳諸侯之家以百計卿大夫之家以千計士之家以萬計庶人之家以億兆計人人皆有親皆有長而必欲一一親之長之無一家之不然方是天下之平茍億兆之中而有一人之或悖焉則亦非所以為平矣嗚呼自非居人上者化之有道處之有方又曷以致其然哉大學釋治國平天下曰一家仁一國興仁一家讓一國興讓又曰上老老而民興孝上長長而民興弟此化之之道爾茍有化之之道而無有所以處之之方天下之大教之容有所不及萬民之衆化之容有所不周此為治者所以不可無處之之方也化之之道孔子所謂道之以徳也處之之方孔子所謂齊之以禮也人君為治既正身修徳以示其化之之則又必本其彛倫之理因其性情之宜制為節文立為儀則必使無一人無一家不率吾之教不遵吾之禮而又有政以輔其所不及有刑以限其所必從是則孔子所謂道之以政齊之以刑也夫然則天下之大萬里之逺億兆之衆無一人而不親其親長其長合億兆之家皆如一家人父子兄弟然倫理以明風俗以美乖争陵犯之不作而均齊方正如一矣噫天下之平至於如此豈非比屋可封之俗雍熙太和之世也哉大學衍義補卷五十三
