body:
  text: 大學衍義補卷一百四十二明丘濬撰治國平天下之要嚴武備經武之要六韜曰天下非一人之天下乃天下之天下也同天下之利者則得天下擅天下之利者則失天下日中必彗操刀必割執斧必伐凡用賞者貴信用罰者貴必賞信罰必於耳目之所聞見則所不聞見者莫不隂化矣鷙鳥將擊卑飛斂翼猛獸將搏弭耳俯伏用兵之害猶豫最大三軍之災莫過狐疑見利不失遇時不疑失利後時反受其殃智者從之而不釋巧者一決而不猶豫是以疾雷不及掩耳迅電不及瞑目將不宿戒則三軍失其備臣按將不宿戒則三軍失其備此一語凡為將者尤所當知者也得賢將者兵强國昌不得賢將者兵弱國亡臣按六韜者設為武王與太公問荅其辭多鄙俚中引避正殿乃戰國後事决非太公語也晁説之謂其為兵家權謀之書陳埴謂為後世依託得之矣惟葉適謂自龍韜以後四十三篇條畫變故豫設方禦皆為兵者所當講習孫子之論至深而不可測此四十三篇繁悉備舉似為孫子義疏也然其中所言九徴莊子亦有之其作此書者取莊言而附益之耳適謂豈莊子不知其非偽豈其然哉孫子曰兵者國之大事死生之地存亡之道不可不察也故經之以五事校之以計而索探也其情一曰道二曰天三曰地四曰將五曰法道者令民與上同意可與之死可與之生而不畏危也天者隂陽寒暑時制也謂順天時而制征討地者逺近險易廣狹死生也將者智信仁勇嚴也法者曲部曲隊伍曲折制金鼓旌旗莭制官偏一校列官司道所必經由道路主主管之人用合用之事也凡此五者將莫不聞知之者勝不知者不勝故校之以計而索其情岳飛曰用兵之術仁智信勇嚴闕一不可戴溪曰孫子之書十三篇其說備矣其操術有餘於權謀而不足於仁義能克敵制勝為進取之圖而不能利國便民為長乆之計可以為春秋諸侯之將而不可以為三代王者之佐然後世之人茍達孫子權謀之用而以仁義存心庶其賢乎臣按後世專以權謀用兵始於孫子凡其所以舍正而鑿竒背義而依詐者固無足取也篇首此數言者雖不盡純然用兵之法亦有國家及本兵柄司人命者所當知者也擇其法制之善者而用之其言與意之不善者則略焉是亦為將之一助也夫未戰而廟算勝者得算多也未戰而廟算不勝者得算少也多算勝少算不勝而况於無算乎臣按古者興師命將必致齋於廟授以成算然後遣之謂之廟算千里饋糧日費千金然後十萬之師舉矣其用戰也勝乆則鈍兵挫銳攻城則力屈乆暴師則國用不足夫鈍兵挫銳屈力殫貨則諸侯乗其弊而起雖有智者不能善其後矣故兵聞拙速未睹巧之乆也臣按孫武生戰國時所著書主於列國相爭故欲速戰恐諸侯之乗其弊而起若夫天下一家四海一國中國與外夷戰朝廷與盗賊戰當主趙充國之言為當故不盡知用兵之害者則不能盡知用兵之利也善用兵者役不再籍糧不三載取用於國因糧於敵故知兵之將生民之司命國家安危之主也百戰百勝非善之善者也不戰而屈人之兵善之善者也故上兵伐謀其次伐交其次伐兵其下攻城攻城之法為不得已故用兵之法十則圍之五則攻之倍則分之敵則能戰之少則能逃之不若則能避之故小敵之堅大敵之擒也知勝一五知可以與戰不可以與戰者勝識衆寡之用者勝上下同欲者勝以虞待不虞者勝將能而君不御者勝知彼知己者百戰不殆不知彼而知己者一勝一負不知彼不知己每戰必敗善戰者先為不可勝以待敵之可勝不可勝在己可勝在敵守則不足攻則有餘故善戰者之勝也無智名無勇功用戰者以正合以竒勝故善出竒者無窮如天地不竭如江海又曰竒正相生如循環之無端熟能窮之蘇轍曰古之善戰必以兩擊之既為之正又為之竒故我之受敵者一而敵之受我者二我一而敵二則我佚而敵勞以佚擊勞故曰三軍之衆可以使之必受敵而無敗自唐季以來古之戰法遺散而不講今世用兵之將置陳而不知奇正夫置陳而不知奇正猶作樂而不用五聲飪食而不用五味宫竭而商不繼甘窮而酸不輔一變而盡矣不可復用也凡先處戰地而待敵者佚後處戰地而趨戰者勞故善戰者致人而不致於人善攻者敵不知其所守善守者敵不知其所攻䇿之而知得失之計作之而知動静之理形之而知死生之地角之而知有餘不足之處夫兵形象水水之形避高而趨下兵之形避實而擊虚水因地而制流兵因敵而制勝故兵無常勢水無常形不知山川險阻沮澤之形者不能行軍不用鄉導者不能得地利言不相聞故為之金鼓視不相見故為之旌旗夫金鼔旌旗者所以一人耳目也人既專一則勇者不得獨進怯者不得獨退此用衆之法也故夜戰多火鼓晝戰多旌旗所以變人之耳目也朝氣銳晝氣惰暮氣歸故善用兵者避其鋭擊其惰歸此治氣者也以治待亂以静待譁此治心者也以近待逺以逸待勞以飽待饑此治力者也無邀正正之旗勿擊堂堂之陳此治變者也用兵之法高陵勿向背丘勿逆徉北勿從鋭卒勿攻餌兵勿食歸師勿遏圍師必闕窮冦勿迫凡用兵之法將受命於君合軍聚衆圯地無舍衢地合交絶地無留圍地則謀死地則戰途有所不由軍有所不擊城有所不攻地有所不爭君命有所不受故用兵之法無恃其不來恃吾有以待之無恃其不攻恃吾有所不可攻也臣按此二語者非但用兵禦敵所當然則雖承平無事之時所以防微備患於事幾未形之先皆所當然也視卒如嬰兒故可與之赴深溪視卒如愛子故可與之俱死愛而不能令厚而不能使亂而不能治譬如驕子不可用也故善用兵者譬如率然率然者常山之蛇也擊其首則尾至擊其尾則首至擊其中則首尾俱至投之亡地然後存陷之死地然後生始如處女敵人開户後如脱兎敵不及拒非利不動非得不用非危不戰主不可以怒而興師將不可以愠而致戰合於利而動不合於利而止怒可以復喜愠可以復悦亡國不可以復存死者不可以復生故明君慎之良將警之此安國全軍之道也凡興師十萬出征千里百姓之費公家之奉日費千金内外騷動怠於道路不得操事者七十萬家相守數年以爭一日之勝而愛爵禄百金不知敵之情者不仁之至也臣按武經之書以孫子為首葢以行兵之法惟孫子為最精諸家皆莫及也考西漢藝文志乃謂孫武子兵法八十一篇杜牧亦謂武書數十萬言魏武削其繁剰筆其精粹以成此書然考之史記司馬氏兩稱孫子十三篇且其文辭完全而貫穿非筆削者也其為孫武全書無疑杜牧註其書大略謂其用仁義使機權嗚呼機權與仁義豈相為用哉夫自先王法制廢壊之後世之趨時好者爭著為書如司馬法三略六韜之類猶知篤禮信尚訓齊雖不純於理道然猶不盡悖之也武書一切以變詐竒詭為說世爭趨之說者乃有盤之走丸丸不出盤之喻若然則用兵者必主於變詐竒詭而所為桓文之節制湯武之仁義皆非耶雖然君子不以人廢言擇其善者而從之陽貨至不仁而孟子取其為富不仁之語此學孔孟者擇善之法也臣故就其中擇其可以為師律之助者綴之於篇呉子曰不和於國不可以出軍不和於軍不可以出陳不和於陳不可以進戰不和於戰不可以決勝戰勝易守勝難用兵必須審敵虚實而趨其危敵人逺來新至行列未定可擊既食未設備可擊奔走可擊勤勞可擊未得地利可擊失時不從可擊渉長道後行未息可擊渉水半渡可擊險道狹路可擊旌旗亂動可擊陳數移動可擊將離士卒可擊心怖可擊臣按吳起所謂可擊者雖主於擊敵然凡禦敵者亦須因之以自反恐我亦有可擊之形敵人因此而擊我而豫為之備也法令不明賞罰不信金之不止鼓之不進雖有百萬何益於用居則有禮動則有威進不可當退不可進前却有節左右應麾雖絶成陳雖散成行與之安與之危其衆可合而不可離可用而不可疲臣按此即所謂父子之兵桓文莭制不過如此信乎投之所在而天下莫當矣行軍之道無犯進止之節無失飲食之適無絶人馬之力用兵之法教戒為先一人學戰教成十人十人學戰教成百人百人學戰教成千人千人學戰教成萬人必死則生幸生則死善將者如坐漏船之中伏燒屋之下使智者不及謀勇者不及怒將之所慎者五一曰理二曰備三曰果四曰戒五曰約理者治衆如治寡備者出門如見敵果者臨敵不懐生戒者雖克如始戰約者法令省不煩將之所麾莫不從移將之所指無不前死發號施令而人樂聞興師動衆而人樂戰交兵接刀而人樂死此三者人主之所恃也一人投命足懼千夫臣按世之論兵法者曰孫吳高氏謂二子共説蓋截然不相侔也起之書幾乎正武之書一於奇起之書尚禮義明教訓或有得於司馬灋者武則一切戰國馳騁戰爭奪謀逞詐之術耳雖然據其書言雖若有可取者及以史考其行事則猜忌暴刻寡恩鮮徳之人何人與言相戾如此哉二子譬則二妓然所歌之辭雖有雅鄭其為妓則一也聼者取其音可也其為人姑勿論尉繚子曰兵勝於朝廷不暴甲而勝者主勝也陳而勝者將勝也臣按人臣奉君命以出師將勝即主勝也而為此言者懲君之好勝者欲其息兵耳兵起非可以忿也見勝則興不見勝則止將者上不制於天下不制於地中不制於人寛不可擊而怒清不可事以財臣按所謂不制者甚言將在軍當有執守不可受制耳夫將之所以戰者民也民之所以戰者氣也氣實則鬬氣奪則走令者一衆心也衆不審則數變數變則令雖出衆不信矣上無疑令則衆不二聽動無疑事則衆不二志未有不信其心而能得其力者也未有不得其力而能致其死戰者也國必有禮信親愛之義則可以饑易飽國必有孝慈亷恥之俗則可以死易生戰者必本乎率身以勵衆士如心之使四肢也志不勵則士不死節士不死節則衆不勸勵使什伍如親戚卒伯如朋友止如堵墻動如風雨車不結轍士不旋踵此本戰之道也地所以養民也城所以守地也戰所以守城也故務耕者民不饑務守者地不危務戰者城不圍勤勞之師將必先已暑不張葢寒不重衣險必下歩軍井成而後飲軍食熟而後飯軍壘成而後舍勞佚必以身同之如此師雖乆而不老不弊將帥者心也羣下者支節也其心動以誠則支節必力其心動以疑則支節必背夫民無兩畏也畏我侮敵畏敵侮我見侮者敗立威者勝凡將能其道者吏畏其將也吏畏其將者民畏其吏也民畏其吏者敵畏其民也是故知勝敗之道者必先知畏侮之權愛在下順威在上立愛故不二威故不犯故善將者愛與威而已戰不必勝不可以言戰攻不必㧞不可以言攻不然雖刑賞不足信也凡挾義而戰者貴從我起爭私結怨應不得已怨結雖起待之貴後故爭必當待之息必當備之臣按漢志尉繚子二十九篇今逸五篇首章稱梁惠王問及第二篇引吴起言葢戰國時魏人云其卒章有曰古之善用兵者能殺卒之半則威加四海其言如此其術可知今擇其言之善者録出於此李衛公問對李靖曰謝𤣥之破苻堅非謝𤣥之善也蓋苻堅之不善也凡將正而無奇則守將也奇而無正則鬬將也奇正皆得則國之輔也敵實則我必以正敵虚則我必為奇茍行不知奇正則雖知敵虚實安能致之千章萬句不出乎致人而不致於人而已以誘待來以静待躁以重待輕以嚴待懈以治待亂以守待攻反是則力有弗逮兵散則以合為竒合則以散為竒分不分為縻軍聚不聚為孤旅攻是守之機守是攻之䇿同歸乎勝而已兵有不戰有必戰夫不戰者在我必戰者在敵臣按唐太宗李衛公問對説者多謂其為宋人阮逸假託雖蘇軾朱熹皆以為然馬氏通考則據宋國史謂宋神宗熈寧中明詔樞密院與王震等校正分類解釋令可行以為非逸之作然神宗詔止云李靖兵法雜見通典不言其為問對或又别有一書歟臣嘗考宋元豐中以孫子吳子司馬灋李衛公問對尉繚子三略六韜頒之武學令習之號七書至今襲而用焉武臣之胄世守之如儒家之於六經然臣抑嘗因是而通論之漢藝文志兵家者流葢出古司馬之職王官之武備也洪範八政八曰師孔子曰為國者足食足兵以不教民戰是謂棄之明兵之重也湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬灋是其遺事也自春秋至於戰國出竒設伏變詐之兵竝作漢興張良韓信序次兵法凡百八十二家删取要用定著三十五家諸吕用事而盗取之武帝時軍政楊僕攟摭遺逸紀奏兵錄猶未能備至於孝成命任䆖論次兵書為四種曰權謀曰形勢曰陰陽曰技巧是則兵之為書在古者亦云多矣後世皆不復存今所傳者僅七書焉耳説者謂其類多假託之書真贋相半然以今觀之非但真贗相半而其得失亦相半也去其非而存其是有之終勝於無能取其長皆可用也嗚呼孔子謂以不教民戰是謂棄其民而臣亦謂將不學而與敵戰是謂棄其身將棄其身一人耳君不知兵而使將統兵豈獨棄其臣與民葢棄其國也然則保國之要在文與武有天下國家者其於文經武藝烏可偏廢乎哉孫臏曰解雜亂紛糾者不控拳捄鬬者不搏撠批亢擣虚形格勢禁則自為解耳善戰者因其勢而利導之趙屠曰道逺險狹譬之兩鼠鬬於穴中將勇者勝婁敬曰夫與人鬬不搤其吭拊其背不能全勝李左車曰善用兵者不以短擊長而以長擊短鼂錯曰有必勝之將無必勝之民帝王之道出於萬全韓安國曰用兵者以飽待飢正治以待其亂定舍以待其勞田禄伯曰歩兵利險車騎利平地王朔曰禍莫大於殺已降趙充國曰百聞不如一見兵難隃遙同度擊虜以殄滅為期小利不足貪窮冦不可迫緩之則走不顧急之則還致死兵所以明徳除害也故舉得於外福生於内不可不謹帝王之師以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝兵以計為本故多算勝少算不勝戰不必勝不茍接刄攻不必取不茍勞衆兵勢國之大事當為後法光武曰常勝之家難以慮敵光武詔徴鄧禹還曰毋與窮冦爭鋒班超曰不入虎穴安得虎子虞詡曰志不求易事不避難臣之節也不遇盤根錯節何以别利器乎皇甫嵩曰兵有竒變不在衆寡諸葛亮曰有制之兵無能之將不可勝也無制之兵有能之將不可勝也馬謖曰用兵之道攻心為上攻城為下心戰為上兵戰為下鄧艾曰國之所急惟農與戰國冨則兵彊兵彊則戰勝農者勝之本也陸抗曰徳均則衆者勝寡力侔則安者制危蔣濟曰虎狼當路不治狐狸先除大害小害自己譙周曰射幸數跌差也不如審發時可而後動數合而後舉廖化曰智不出敵力小於冦用之無厭將何以存羊祜曰兵勢好合惡離疆場之間一彼一此慎守而已彼專為徳我專為暴是不戰而自服也一邑一鄉不可以無信義况大國乎裴詵曰蝮蛇螫手壯士斷腕蛇已螫頭頭可斷乎韋叡曰將軍死綏有前無却韋孝寛曰不因際㑹難以成功邢巒曰先為萬全之計然後圖功得之則大利不得則自全李靖曰王者之兵弔人而取有罪彼其驅脅以來藉以拒敵本非所情不容以叛逆比之張巡曰使兵識將意將識士情投之而往如手之使指兵將相識人自為戰不亦可乎陳而後戰兵法之常運用之妙在乎一心臣按自古名將不用古兵法者三人漢霍去病唐張巡宋岳飛而已皆能立功當時垂名後世然則兵法果不可用耶曰兵法譬則奕者之譜也譜設為之法爾用之以應變制勝則在乎人兵法亦猶是焉嗚呼世之藝術豈但兵哉儒者之於六藝亦莫不然孟子曰梓匠輪輿能與人規矩不能使人巧法度可以言傳妙法必由心悟杜甫曰射人先射馬擒賊先擒王臣按此杜甫出塞詩語也射人先射馬一言雖詩人吟咏之語然制勝之要法也禦邊者不可不知陸䞇曰兵貴拙速不尚巧遲速則乗機遲則生變急者宜備之以嚴緩者冝圖之以計當離者合之則召亂當合者離之則寡功當疾而徐則失機當徐而疾則漏䇿有功見知人必悅勸將貴專謀兵以竒勝病同者雖胡越而相愍憂同者不邀結而自親知其事而不度其時則敗附其事而不失其稱則成立大而敵脆則先其所難力寡而敵堅則先其所易非萬全不謀非百克不鬬冦小至則張聲勢以遏其入冦大至則謀其大以邀其歸據險以乗之多方以誤之武欲勝其敵必先練其兵事有便宜而不拘常制謀有竒詭而不徇衆情進退死生惟將所命撫之以惠則感而不驕臨之以威則肅而不怨統帥專一則人心不分人心不分則號令不貳軍法無貴賤之差實無多少之異所以同其志志而盡其力將欲定邊先冝積榖陳貫曰爭地之利先居則佚後起則勞范仲淹曰將不擇人以官為先後取敗之道也又曰將不知古今匹夫勇耳宋祁曰馬少則騎精歩多則鬬健蘇軾曰善兵者先服其心次屈其力鄒浩曰兵家之事未戰則以決勝為難既勝則以持勝為難岳飛曰勇不足恃用兵在先定謀欒枝曵柴以敗荆莫敖採樵以致絞皆謀定也胡寅曰善覆者靡不勝遇覆者靡不敗吳璘曰弱者出戰强者繼之余端禮曰敵弱者先聲後實以襲其氣敵强者先實後聲以俟其機程頥曰兵法逺交近攻須是審行此道行兵須不失家計游兵夾持兵陳須先立定家計然後以游騎旋旋量力分外靣與敵人合此便是合内外之道韓信多多益辦只是分數明兩軍相向必擇地可攻處攻之右實則攻左左實則攻右朱熹曰厮殺别無法只是能使人捨死向前而已臣按諺云一夫捨死萬夫莫當若為将者以節制行兵而在行列者人人皆捨死向前天下無堅敵矣又曰厮殺無巧妙兩軍相拄一邊立得脚住不退者便贏立不住退者便輸須是死中求生方勝也兵之勝負全在勇怯用兵之要敵勢急則自家當委曲以纒繞之敵勢緩則自家當勁直以衝突之解雜亂紛糾者不控拳拳音絭攘臂繩今之罥袖手圏也言解鬬者當善觧之不可牽引絭繩也批亢擣虚亢音剛喉嚨也言與人鬬者不扼其喉拊其背未見其能勝也臣按程朱道學大儒其於兵事亦皆通曉而常言之可見儒道無所不該而文武無二道也大學衍義補卷一百四十二
