body:
  text: 大學衍義補卷九十三明丘濬撰治國平天下之要備規制厯象之法下揚子或問渾天曰落下閎營之鮮于妄人度之耿中丞象之幾幾近也乎莫之能違也請問蓋天曰蓋哉蓋哉應難未幾也李軌曰幾近也落下閎為武帝經營之鮮于妄人為武帝筭度之耿壽昌為宣帝考象之言乎近其理矣談天者無能違也再言蓋哉者應難以事未有近其理也朱熹曰渾天儀古必有其法遭秦而滅至漢武帝時落下閎始經營之鮮于妄人又量度之至宣帝時耿壽昌始鑄銅而為之象宋錢樂又鑄銅作渾天儀衡長八尺孔徑一寸璣徑八尺圓周二丈五尺強轉而望之以知日月星辰之所在即璿璣玉衡之遺法也歴代以來其法漸密宋朝因之為儀三重其在外曰六合儀平置黒單環上刻十二辰八干四隅在地之位以凖地靣而定四方側立黒雙環背刻去極度數以中分天脊直跨地上使其半入地下而結於其子午以為天經斜倚赤單環背刻赤道度數以平分天腹横繞天經亦使半出地上半入地下而結於其卯酉以為天緯三環表裏相結不動其天經之環則南北二極皆為圓軸虗中而内向以挈三辰四游之環以其上下四方於是可考故曰六合次其内曰三辰儀側立黒雙環亦刻去極度數外貫天經之軸内挈黄赤二道其赤道則為赤單環外依天緯亦刻宿度而結於黒雙環之卯酉其黄道則為黄單環亦刻宿度而又斜倚於赤道之腹以交結於卯酉而半入其内以為春分後之日軌半出其外以為秋分後之日軌又為白單環以承其交使不傾墊下設機輪以水激之使其日夜隨天東西運轉以象天行以其日月星辰於是可考故曰三辰其最在内者曰四游儀亦為黒雙環如三辰儀之制以貫天經之軸其環之内則兩靣當中各施直距外指兩軸而當其要平聲中之内靣又為小窽以受玉衡要中之小軸使衡既得隨環東西運轉又可隨處南北低昻以待占候者之仰窺焉以其東西南北無不周徧故曰四游此其法之大略也沈括曰舊法規環一靣刻周天度一靣加銀釘蓋以夜候天晦不可目察則以手切之也古人有璿飾璣疑亦為此今太史局秘書省銅儀制極精緻亦以銅釘為之臣按自落下閎造渾天之後魏晉以來率因之以為儀至宋朝熈寜沈括之儀宣和璣衡之制始詳密精緻有出於淳風令瓚之表者靖康之亂儀象之器盡歸於金元人襲用金舊而規環不協難復施用於是郭守敬乃創為簡儀仰儀及諸儀表其說以謂昔人以管窺天宿度餘分約為大半少未得其的乃用二綫推測於餘分纎微皆有可考而又當時四海測賔之所凡二十有七東極高麗西極滇池南踰朱崖北盡鐵勒皆古人所未及為者其法俱載元史而其儀表至今遵用之夫自堯厯象之後而有舜之璣衡所謂璣衡蓋堯之象也舜璣衡之後而有漢之渾天儀象所謂儀象蓋舜之璣衡也後世加以六合三辰四游愈精愈宻然厯代相因千載相承未嘗有改也而改之始自於此盖天欲啟中國文明之治必豫生知巧之人於數千載之前而創為一代觀天之器以待聖人之生夫豈偶然之故哉史記太史公曰神農以前尚矣蓋黄帝考定星厯建立五行起消息正閏餘於是有天地神祇物類之官是謂五官各司其序不相亂也民是以能有信神是以能有明德民神異業敬而不凟故神降之嘉生嘉榖也民以物享災禍不生所求不匱少皥氏之衰也九黎亂德民神雜擾不可放依也物祸災荐至莫盡其氣顓頊受之乃命南正重司天以屬神命火正黎司地以屬民使復舊常無相侵瀆其後三苖復九黎之德故二官咸廢所職而閏餘乖次孟陬殄滅攝提無紀厯數失序堯復遂重黎之後不忘舊者使復典之而立羲和之官明時正度則隂陽調風雨節茂氣至居無夭疫年耆禪舜申戒文祖云天之厯數在爾躬舜亦以命禹繇是觀之王者所重也夏正以正月殷正以十二月周正以十一月蓋三王之正若循環窮則反本天下有道則不失紀序無道則正朔不行於諸侯幽厲之後周室微陪臣執政史不記時君不告朔故疇世世相傳為疇人子弟分散或在諸夏或在夷狄是以其禨祥廢而不統周襄王二十六年閏三月而春秋非之先王之正時也履端於始舉正於中歸邪音余於終履端於始序則不愆舉正於中民則不感歸邪於終事則不悖其後戰國竝争在於彊國禽敵救急解紛而已豈遑念斯哉是時獨有鄒衍明於五德之傳而散消息之分以顯諸侯而亦因秦滅六國亦頗推五勝而自以為獲水徳之瑞而正以十月色上黒然厯度閠餘未能睹其真也漢興髙祖曰北畤待我而起亦自以為獲水德之瑞雖明習厯及張蒼等咸以為然孝文時魯人公孫臣言漢土徳宜更元改正朔易服色當有瑞黄龍見事下丞相張蒼蒼亦學律厯以為非是罷之今上謂武帝即位招致方士唐都分其天部而巴落下閎運算轉厯然後日辰之度與夏正同乃改元更官號因詔御史曰乃者有司言星度之未定也廣延宣問以理星度未能詹當作校讐之讐也蓋聞昔者黄帝合而不死名察度驗定清濁起五部五行也建氣物分數然蓋尚矣書缺樂弛朕甚閔焉朕惟未能循明也紬續日分率應水德之勝今日順夏至夏當作冬黄鐘為宫林鐘為徴太蔟為商南吕為羽姑洗為角自是以後氣復正羽聲復清名復正變以至子日當冬至則隂陽離合之道行焉十一月甲子朔旦冬至已詹其更以七年為太初元年年名焉逢歲在甲攝提格在寅月名畢聚音陬日得甲子夜半朔旦冬至臣按太史公推原作厯之始謂神農以前尚矣黄帝始考定星厯蓋是時始有厯也且引堯禪舜之言曰天之厯數在爾躬蓋見人君繼天而為之子則必推明上天所懸之象所行之度其責任在乎君之身不可忽也人君知其任之在已既以中道自待又必齊七政建五行立四時以示天下之臣民使之知氣候之早晩時序之先後順時以興作寢息焉下之人奉君之令而不敢違天之時故天降之嘉生民以物享災禍不生而天禄有永矣自堯舜以後以至於三代厯數相傳莫不明時正度以承天意而不敢失其紀序是則有道之世也惟夫昏君庸主不畏天命而失其紀序史不紀時君不告朔臣不共其命諸侯不遵其軌是以其君不克終而禍亂作矣繇是觀之則知治厯明時其有闗於治亂之大如此承上天之厯數而受其任於躬者其可忽諸其可忽諸漢志云漢興張蒼首律厯事孝武帝時樂官考正至元始中徴天下通知鐘律者百餘人使羲和劉歆典領條奏之參伍以變錯綜其數稽之於古今效之於氣物和之於心耳考之於經傳咸得其實靡不恊同數者一十百千萬也所以筭數事物順性命之理也夫推厯生律制器規圜矩方權重衡平凖䋲嘉量探賾索隱鉤深致逺莫不用焉隂陽之施化萬物之終始既類族於律吕又經歴於日辰而變化之情可見矣玉衡杓建天之綱也日月初躔星之紀也綱紀之交以元始造設合樂用焉臣按漢晉隋書志皆兼律厯律者作樂之法厯者測候之書其事若無關渉者自太史公言律必兼厯而後世宗之何以見其然哉朱子曰今治厯家用律吕候氣其法最精氣之至也分寸不差蓋此氣都在地中透上來如十一月冬至黄鐘管距地九寸以葭灰實其中至之日氣至灰去晷刻不差繇是推之可見古人作樂必推厯以生律而其測候也亦必恊律以定厯二者相資以為用可相有而不可相無也又云漢興方綱紀大基庻事草創襲秦正朔以張蒼言用顓頊厯比於六厯疏闊中最為微近然正朔服色未覩其真而朔晦月見弦望滿虧多非是至武帝元封七年漢興百二歲矣大中大夫公孫卿壺遂太史令司馬遷等言厯紀壞廢宜改正朔是時御史大夫兒寛明經術上廼詔寛曰與博士共議今宜何以為正朔服色何上寛與博士賜等議皆曰帝王必改正朔易服色所以明受命於天也創業變改制不相復推傳序文則今夏時也臣愚以為三綂之制後聖復前聖者二代在前也今二代之綂絶而不序矣唯陛下發聖德宣考天地四時之極則順隂陽以定大明之制為萬世則遂下詔以七年為元年遂詔卿遂遷與侍郎尊人名大典星官名射姓人姓名等議造漢厯迺定東西立晷儀下漏刻以追二十八宿相距於四方舉終以定晦朔分至躔離弦望迺以前代上元太初四千六百一十七歲至於元封七年復得閼逢攝提格之歲中冬十一月甲子朔旦冬至日月在建星太歲在子已得太初本星度新正姓等奏不能為筭願募治厯者更造密度各自增減以造漢太初厯廼選治厯鄧平及長樂司馬可酒泉候宜君侍郎尊及與民間治厯者凡二十餘人方士唐都巴郡落下閎與焉都分天部而閎運筭轉厯其法以律起厯曰律容一龠積八十一寸則一日之分也與長相終律長九寸百七十一分而終復三復而得甲子夫律隂陽九六爻象所從出也故黄鐘紀元氣之謂律律法也莫不取法焉與鄧平所治同於是皆觀新星度日月行更以推筭如閎平法法一月之日二十九日八十一分日之四十三先藉半日名曰陽厯不藉名曰隂厯所謂陽厯者先朔月生隂厯者朔而後月迺生平曰陽厯朔皆先旦月生以朝諸侯王羣臣便迺詔遷用鄧平所造八十一分律厯罷廢尤疏逺者十七家復使挍厯律昏明宦者淳于陵渠復覆太初厯晦朔弦望皆最密日月如合璧五星如連珠陵渠奏狀遂用鄧平厯以平為太史丞臣按先儒謂深於律厯之術而作為律厯之書志自漢而下太史公一人而已蓋司馬氏世為太史故其於厯法也非徒能言之蓋有所授受也說者謂司馬氏律厯書即太初厯法也司馬氏甞言六律為萬事根本故太初厯法皆本於律先儒謂落下閎筭法其法以律起厯曰律容一龠積八十一寸則一日之分也是知黄鐘之律容一龠長九寸九九八十一則為八十一分漢厯綂母日法則本諸此也唐志亦曰漢造厯始以八十一分為綂母其數起於黄鐘之龠其法一本於律所謂本於律者蓋謂以律之數起厯司馬氏分律厯為二書劉歆合而為一而班固因之以為志豈無意哉今觀班固述司馬氏之言以為志其間有曰史官䘮紀疇人子弟分散解者謂家業世世相傳為疇則知星厯之學必須世業明矣又曰是時御史大夫兒寛明經術上乃詔寛與博士共議則知治厯明時必須儒者不宜專任技術明矣又曰姓等奏不能為筭願募治厯者更造密度則知明厯之官必須通筭術者又明矣此三事者可以為後世治厯者之節度後漢志曰天之動也一晝一夜而運過周星從天而西日違天而東日之所行與運周在天成度在厯成日居以列宿終於四七受以甲乙終于六旬日月相推日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦晦朔合離斗建移辰謂之日月之術則有冬有夏冬夏之間則有春有秋是故日行北陸謂之冬西陸謂之春南陸謂之夏東陸謂之秋日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道斂北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋分焉日周于天一寒一暑四時備成萬物畢改攝提遷次青龍移辰謂之歲歲首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀歲朔又復謂之元是故日以實之月以閏之時以分之歲以周之章以明之蔀以部之紀以記之元以原之然後雖有變化萬殊贏朒無方莫不結系於此而禀正焉臣按自古造厯者必先立元自黄帝調厯起辛卯顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子秦用乙卯漢太初用丁丑三綂用庚戌四分用庚辰史謂四分厯元上得庚申有近於緯同於緯則或不得於天厯之廢興以疏密課固不主於元也夫孟子謂天之高也星辰之逺也茍求其故千歲之日至可坐而致也朱子謂必言日至者造厯者以上古十一月甲子朔夜半冬至為厯元也歐陽氏亦謂厯家之說雖世多不同而未始不本於此史謂厯之廢興以疏密課蓋以厯之終言也若推原其始不本於元何所造端乎是以黄帝以來立元雖若不同而皆凖度於甲子也然則厯烏可無元乎但其假託以同於纖緯則不可耳先儒有言厯元止據目前考驗無證其術失之淺上推開闢㝠測鴻濛其術近乎迂必也用太史公三紀大備之法范史紀元之目推上元甲子四千五百餘年則其時不逺不近矣蔡邕天文志曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師說周髀數術具在考驗天象多所違失故史官不用惟渾天者近得其情今史官所用候臺銅儀則其法也立八尺圓體之度而具天地之形以正黄道以察發斂以行日月以歩五緯精微深妙萬世不易之道也虞喜曰宣明也夜幽也幽明之數其術兼之故曰宣夜但絶無師說不知其狀如何周髀之術以為天似覆盆蓋以斗極為中中高而四邊下日月旁行繞之日近而見之為晝日逺而不見為夜渾天者以為地在其中天周其外日月初登於天後入於地晝則日在地上夜則日入地下王蕃曰天之形狀似鳥卵天包地外地猶卵之裹黄圓如彈丸故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見者一百八十二度半强地下亦然北極出地上三十六度南極入地下亦三十六度而嵩高正當天之中極南五十五度當嵩高之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也其南北極持其兩端其天與日月星宿斜而回轉臣按璣衡之象或謂起於宓羲或為作於帝嚳或者又云乃羲和舊器非舜創為也馬融謂上天之體不可測知天之事者惟有璣衡一事璣衡即今之渾天儀也王蕃之論亦謂渾儀之制置天梁地平以定天體為四游以綴赤道者此謂璣也置望䇶横簫於儀中以窺七曜之行而知其躔離之次者此謂衡也若六合儀三辰儀四游儀竝列為三重者李淳風所作而黄道儀者一行所増也始張衡祖落下閎耿壽昌之法别為渾象寘輪密室以漏水轉之以合璿璣所加星度則渾象本别為一器唐李淳風梁令瓚祖之始與渾儀竝用宋沈括所上渾天之儀載在宋史者其為論精密有志於衍古儀象者可考也唐志曰厯法尚矣自堯命羲和厯象日月星辰以閏月定四時成歲其事略見于書而夏商周以三綂改正朔為厯固已不同而其法不傳至漢造厯始以八十一分為綂母其數起於黄鐘之龠蓋其法一本於律矣其後劉歆又以春秋易象推合其數蓋傅會之說也至唐一行始專用大衍之䇿則厯述又本於易矣蓋厯起於數數者自然之用也其用無窮而無所不通以之於律於易皆可以合也然其要在於候天地之氣以知四時寒暑而仰察天日月星之行運以相參合而已然四時寒暑無形而運於下天日月星有象而見於上二者常動而不息一有一無出入升降或遲或疾不相為謀其乆而不能無差忒者勢使之然也故為厯者其始未甞不精密而其後多疎而不合亦理之自然也不合則屢變其法以求之自堯舜三代以來厯未甞同也唐自太初至麟德厯二十三家與天雖近而未密也至一行密矣其倚數立法固無以易也後世雖有改作者亦依倣而已朱熹曰古人厯法疎闊而差少今厯法愈密而愈差界限愈密則差數愈逺何故以界限愈密而踰越多也其差則一而古今厯法疎密不同故爾看來都只是不曾推得定只是移來輳合天之運行所以當年合得不差明後年便差元不會推得天運定只是旋將厯去合那天之行不及則添些過則減些以合之所以一二年又差如唐一行大衍厯當時最謂精密只一二年後便差臣按熹又謂古之厯書必有一定之法而今亡矣三代而下造厯者紛紛莫有定議愈精愈密而愈多差繇不得古人一定之法也嗟乎古人一定之法不可得而見矣得見推移增減以合天運如一行者亦可以隨時救失而不至於界限密而踰越多矣五代史司天掌日月星辰之象周天一歲四時二十四氣七十二候行十日十二辰以為厯而謹察其變者以為占占者非常之兆也以驗吉凶以求天意以覺人事其術藏於有司厯者有常之數也以推寒暑以先天道以勉人事其法信於天下術有時而用法不可一日而差差之毫釐則亂天人之序乖百事之時蓋有國之所重也後世其學一出於隂陽之家其事則重其學則末夫天人之際逺哉微矣而使一藝之士布筭積分上求數千萬歲之前必得甲子朔旦夜半冬至而日月五星皆會於子謂之上元以為厯始蓋自漢而後其說始詳見於世其源流所自止於如此是果堯舜三代之法歟皆不可得而考矣然自是以來厯家之術雖世多不同而未始不本於此臣按歐陽脩謂差之毫釐則亂天人之序乖百事之時有國者所重在乎厯是以堯舜之治莫不以是為先務命官治厯恒先事而為之備惟恐其或至於差也宋志宋興百餘年司天數改厯其說曰厯者歲之積歲者月之積月者日之積日者分之積又推餘分置閏以定四時非博學妙思弗能考也夫天體之運星辰之動未始有窮而度以一法是以乆則差差則敝而不可用厯之所以數改造也物銖銖而較之至石必差況於無形之數哉臣按自古帝王必先正厯象將以前民用授人時也夫聖人之治其於天地之理隂陽五行之運日月星辰之紀考驗推測無有不盡立法倚數固宜歴萬世而無忒徃徃傳之稍乆其應輙差何哉蓋天地之數其妙有不可測者常在於秒忽毫釐之際而其象與氣推移贏縮亦有時而不齊故雖聖智不能盡窮焉積之歲月則厯之不能無差理固然也聖人不能使厯之無差然甞因其差而正之謹按先儒程氏有言厯象之法大抵主於日日一事正則其他皆可推落下閎之作厯言數百年後當差一日何承天以其差遂立歲差法其差後亦不定獨邵堯夫立差法冠絶古今却於日月交感之際以隂陽虧盈求之遂不差朱子亦曰厯不能無差今之學厯者但知厯法不知厯理能不筭者落下閎也能推歩者甘公石公也落下閎等但知厯法揚雄知厯法又知厯理國家承用勝國之厯乃許衡郭守敬等所訂定者也今歴年踰二百矣不能以不差方今以經術取士豈無能通厯學如衡與守敬者乎請於厯官疇人之外别加詢訪委注必有能明厯理之揚子雲善立差法之邵堯夫者出焉以為聖朝了此一大事元志曰明時治厯自黄帝堯舜與三代之盛王莫不重之去古既逺其法不詳然原其要不過隨時考騐以合於天而已漢劉歆作三綂厯始立積年日法以為推歩之凖後世因之歴唐而宋其更元改法者凡數十家豈故相為乖異哉蓋天有不齊之運而厯為一定之法所以既乆而不能不差既差則不可不改也元至元十三年平宋詔許衡王恂郭守敬改治新厯乃與南北日官參考纍代厯法復測候日月星辰消息運行之變參别同異酌取中數以為厯本十七年厯成賜名曰授時厯尋詔李謙為厯議發明新厯順天求合之微考證前代人為附會之失誠可以貽之永乆自古及今其推驗之精蓋未有出於此者也臣按古今厯法至於元郭守敬可謂度越千古矣參以古制創立新法所謂類其同而知其中辨其異而知其變其授時厯雖漢太初唐大衍皆莫有過焉者也其所以度越前人者非虗言也蓋以今厯與古厯相較比而其疎密自見也其說曰上能合於數百載之前則下可以行之永乆此前人定說古稱善治厯者若宋何承天隋劉焯唐傅仁均僧一行之流最為傑出今以其厯與至元庚辰冬至氣應相較未有不舛戾者而以新厯上推徃古無不脗合又曰自春秋獻公以來凡二千一百六十餘年用大衍宣明紀元綂天大明授時六厯推筭冬至凡四十九事大衍厯合者三十二不合者十七宣明厯合者二十六不合者二十三紀元厯合者三十五不合者十四綂天厯合者三十八不合者十一大明厯合者三十四不合者十五授時厯合者三十九不合者十事以前代諸厯校之授時為密嗟乎數徃所以知來攷古所以驗今今授時厯上而求之千載之前既無不合則下而推之千載之下其必不忒可知矣雖然天時不齊不齊則不能以皆同不同而更元立法以同之隨時考驗以合於天不能無望於今日之許平仲郭守敬焉然則更元立法隨時考騐果何從而致力耶杜預曰治厯者當順天以求合非為合以驗天蔡邕曰以籌算為本以天文為驗算之既積驗之皆合則在人之天審而在天之天定矣以上厯象之法臣按洪武中刻漏博士元綂言一代之興必有一代之厯隨時修改以合天道我朝承運以来厯雖以大統為名而積分猶授時之數授時厯法以元至元辛巳為厯元至今洪武甲子積一百四年以厯法推之得三億七千六百一十九萬九千七百七十五分經云大約七十年而差一度每嵗差一分五十秒辛巳至今年逺數盈漸差天度擬合修改今以洪武甲子嵗前冬至為大統厯元推演得授時厯辛巳閏准分二十萬二千五十分洪武甲子閏准分一十八萬二千七十分一十八秒授時厯氣准分五十五萬六百分洪武甲子氣准分五十五萬三百七十五分授時厯辛巳轉准分一十三萬二百五分洪武甲子轉准分二十萬九千六百九十分授時厯辛巳交准分二十六萬三百八十八分洪武甲子交准分一十一萬五千一百五分八秒當元統上言時嵗在甲子也巳云年逺數盈漸差天度矧今又歴一甲子而過其半其年愈逺其數愈多其所差者當益甚也臣愚以為厯者國家之大事所以膺在躬之數承上天之託以敬天道以授人時者端有在于此臣請詔求天下通星厯之學如郭守敬者以任考驗之責明天人之理如許衡者以任講究之方失今不為後愈差舛伏惟聖明留神聽察臣於厯數之學素無師傳謹述經史所載言及厯象之理者以為明時獻若夫推步占驗之法具見諸書兹不復贅以上厯象之法下大學衍義補卷九十三
