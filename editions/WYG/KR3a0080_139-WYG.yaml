body:
  text: 大學衍義補卷一百三十九明丘濬撰治國平天下之要嚴武備賞功之格上易師上六大君有命開國承受家小人勿用象曰大君有命以正功也小人勿用必亂邦也程頤曰上師之終也功之成也大君以爵命賞有功也開國封之為諸侯也承家以為卿大夫也小人者雖有功不可用也故戒使勿用師旅之興成功非一道不必皆君子也故戒以小人有功不可用也賞之以金帛禄位可也不可使有國家而為政也小人平時易致驕盈況挾其功乎漢之英英布彭彭越所以亡也聖人之深慮逺戒也夫大君持恩賞之柄以正軍旅之功師之終也雖賞其功小人則不可以有功而任用之用之必亂邦小人恃功而亂邦者古有之矣朱熹曰師之終順之極論功行賞之時也坤為土故有開國承家之象然小人則雖有功亦不可使之得有爵土但優以金帛可也象所謂必亂邦聖人之戒深矣又曰開國承家一句是公共所得底未分别君子小人小人勿用則是勿更用他與之謀議經畫耳漢光武能用此義自定天下之後一例論功行封其所以用之在左右者則鄧禹耿弇賈復數人他不與焉丘富國曰初言師之出上言師之還至此則功成凱奏之時也大君必有賞功之命開國功之大者也承家功之小者也象曰以正功者言爵賞之命乃所以正諸將武功之等差也然兵行詭道而販繒屠狗之人孰不願出竒以立功而立功不必皆君子也此又曰小人勿用何邪葢以小人有功固當例以賞之若使之參預國家之謀議則挾功以逞必生僭竊亂邦之禍故於小人戒以勿用而象曰必亂邦也其意嚴矣臣按人臣有功於國家功之大者則分土以封之次者則列爵以授之與之以土田錫之以爵位因其功而予之賞固不可分别之也然於其中有徳學才識者則付之以官守職任使得以展其才而盡其用若夫資禀庸下局量褊淺與夫心術偏邪者則使之奉朝請居閒散有土地以世食其禄有職名以世延其賞非但不使之得以害吾之政亦所以保全之使不失其禄也程傳謂賞之以金帛禄位而本義則謂不使之得有爵土而但優以金帛臣竊以為小人難養而不令人知所以自反彼見同功一體之人皆有爵土而已獨無焉安能使其無怏怏之心哉當如程氏言與之禄位如朱氏言優以金帛但俾食邑而不臨民給禄而不涖職如此則得正功之典而亦無亂邦之禍矣離上九王用出征有嘉折首獲匪其醜无咎程頤曰九以陽居上在離之終剛明之極者也明則能照剛則能斷王者宜用如是剛明以辨天下之邪惡而行其征伐則有嘉美之功也又曰去天下之惡若盡究其漸染詿誤則何可勝誅所傷殘亦甚矣故但當折取其魁首所執獲者非其醜類則无殘暴之咎也臣按程傳以有嘉属上句朱子以有嘉折首為句考漢書劉向上疏引此爻辭以明成湯之功曰有嘉折首獲匪其醜亦以有嘉折首為句葢嘉善也美也人臣奉君命以出征有殲厥渠魁之功故有以嘉美之也葢戰功莫大於獲其渠魁其於首惡之渠魁既折而馘之非徒取其脅從之醜類以備數塞責而已其為功大矣豈不可嘉尚之乎葢所折者所當折者也何咎之有彼不能折其首而徒取其類則有非所殲而殲者矣豈得無過咎哉王用將以出征而將能用王命以折冦之首以正邦既有可嘉之功必有嘉功之實此王者於出征有功者所以有爵賞之報也歟詩序彤弓天子錫有功諸侯也其首章曰彤弓朱弓弨弛貎兮受言藏之我有嘉賓中心貺與也之鐘鼓既設一朝饗大飲賓曰饗之朱熹曰此天子燕有功諸侯而錫以弓矢之樂歌也吕祖謙曰受言藏之言其重也弓人所獻藏之王府以待有功不敢輕與人也中心貺之言其誠也中心實欲貺之非繇外也一朝饗之言其速也以王府寳藏之弓一朝舉以畀人未嘗有遲留顧惜意也後之視府藏為己私分至有以武庫兵賜弄臣者漢哀帝發武庫兵送董賢則與受言藏之者異矣賞賜非出於利誘則迫於事勢至有朝賜鐡劵而暮屠戮者則與中心貺之者異矣屯膏吝賞功臣解體至有印刓而不忍予者則與一朝饗之者異矣臣按古者諸侯有四夷之功王賜之弓矢又為歌彤弓之詩以明報功宴樂先儒謂始而藏器以待有功之人則不敢輕及其推誠以錫有功之人則不敢惜王者於賞功之物始而不知重其物則必有輕視之心而人亦褻之矣終而不出於誠心又吝而不果則人雖得之亦不以為恩矣故未有功之時則藏之也不敢輕既有功之時則誠心與之而無所惜王者賞功之大權當如是矣噫一弓之微古人猶重之如此況先王之爵禄天所以命有徳者哉其不可輕予無功之人也可知矣周禮司勲掌功賞之官掌六卿賞地之灋以等差也其功王功曰勲輔成王業國功曰功保全國家民功曰庸常也事功曰勞勤勞治功曰力强有力者戰功曰多多筭凡有功者銘書於王之太常日月為常祭於太烝冬祭曰烝司勲詔之大功司勲藏其貳副本掌賞地之政令凡賞無常功之大小不可預知輕重眂視同功功大者重其賞功小者輕其賞凡頒授也賞地參之一食三分計税王食其一功臣食其二唯加田無國正既賞以田又加賜之免其征税王昭禹曰先王於有功之臣銘書於王之太常使與日月同其光識之於不忘也祭於太烝使與先王同其榮報之而致厚也臣按司勲所掌之六功不止於戰也乃以属於司馬何也葢軍賞不踰時與之速則人心勸報之緩則人心疑属之他官則司存散隔文告回復徒有壅蔽之害增減之弊不足以激昻人心也然其戰功所行者其事有難有易所遇者其敵有堅有脆故其行賞也又必審察考驗以視其勤勞功力與夫謀筭之大小多少難易以為之輕重高下焉春秋左傳桓公二年凡公行告于宗廟反行飲至舍爵筞勲焉禮也杜預曰爵飲酒器也既飲置爵則書勲勞於筞言速紀有功也臣按軍賞不踰月欲民速覩為善之利故飲至之禮方置其爵即書其勲勞於筞書之上所以激勸有功臣子興起趨事赴功之心也僖公二十三年楚成得臣帥師伐陳遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾臣按易謂開國承家小人勿用恐其狥私而不靖也然既用之以效其力而成夫功矣而又棄絶之焉自非明理守道之君子不能不觖望也是以君子作事用人必謹其始茍失之於初則必善為之處置委曲以成全之以厭其素望遏其非心如此則功臣保全而國家安靖矣晉文公與荊人戰于城濮公問于咎犯咎犯對曰服義之君不足於信服戰之君不足於詐詐之而已矣又問雍季雍季對曰焚林而田得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也詐猶可以偷利而後無報遂與荆軍戰大敗之及賞先雍季而後咎犯侍者曰城濮之戰咎犯之謀也君曰雍季之言百世之謀也咎犯之言百世之權也寡人既行之矣臣按晉文公為五伯之盛伯者雖曰尚功利然文公之施賞不徒賞其功利之人而必先賞其道義之士蓋去古未逺聖人之澤猶存至秦以後則不復有此論矣戰國韓昭侯有敝袴命藏之侍者曰君亦不仁矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬有為而嚬笑有為而笑今袴豈特嚬笑哉臣按人君之爵賞所以為臣下所重者以人君能自重之也得之以重而人亦以重視之得之以輕而人亦以輕視之昭侯一國之君以一敝袴之㣲猶不輕以予人況爵禄乎有天下之大者烏可輕以先王之爵禄而濫予乎人哉司馬灋曰凡戰定爵位著功罪臣按司馬灋雖作於戰國然多成周之遺制也葢於定功行賞之時具其功狀有功者以罪減功有罪者以功折罪又曰賞不踰時欲民速得為善之利也臣按賞貴乎速速則人心悦慕而興起況乎軍功之賞尤不可遲遲則事已而人心怠矣葢賞之為賞非徒以報其人已然之功實用之以起後人奮發之志後世遇有當賞文移覈實動經嵗月甚至有其人已死而後得賞者嗚呼其弊也久矣夫賞有兩端曰官曰財而已功之小者賞之以財功之大者賞之以官賞以財随事而給可也賞以官官非人臣所得専者然古有承制封拜之比遇有出師命將許以便宜行事者宜給以官劵如古告身之類中空其名遇有功者随其大小填注以授之俾執以照葢許之以名而未予之以實也必待奏聞命下而後實授焉如此則立功之人既有所懐感而未立功者亦知所興發矣三畧曰軍無財士不來軍無賞士不往又曰香餌之下必有死魚重賞之下必有勇夫故禮者士之所歸賞者士之所死臣按將領士卒皆國家之臣子平日食君之食衣君之衣凡仰事俯育者皆君之賜也一旦有事少效㣲勞而又欲希其賞賜可乎雖然此就臣子之義而言爾若夫人君之用人則不可無賞賚之仁秦衛鞅説孝公變法斬一首賜爵一級臣按後世計首級以定軍功始於此嗚呼生天地間而靈於物者人也人與人同類相生以相愛相死以相衛人之理也天之道也世降而偽滋人與人乃相戕相害均是人也而又殺人以為功是豈人道當然哉夫自五帝三王之時已有戰爭之事然其人化服即止不至殺戮之甚如後世也至秦用商鞅始上首級後世襲用之以為當然而不可易百世如一日也後世忍心貪功之人乃至誣平民截死屍以為功次皆秦作俑之遺禍也臣嘗謂天下之事惟武功一事最難得其盡善而無餘弊何也葢興師動衆人至多也臨陳對敵機無窮也不殺則不足以退敵而功不成是武之成必在於殺人也是故論功者恒以殺敵之多少以為功庸之差等古昔盛時固已獻馘于學宫載之詩禮者可考也非但秦也葢至秦乃益盛焉耳今若不用秦之法而於武功告成之日一例陞賞然而勇者怯者同賞孰肯效死而爭先若依舊以首級為功方其戰酣乗勝之際其勢有進而無退既斬敵首何暇轉而持之非獨為人所有而敵亦或得以制其命矣二者皆非萬全無弊之法然則果何如而可臣竊以為自古國家所以賞功者爵與財而已矣爵以名而致貴財以利而致富是名與利富與貴乃人之所甚欲而甚慕者也以人所甚欲者以為功賞之具葢以性命者人之所甚惜身體者人之所甚愛人能舍其所甚愛甚惜之性命身體以為我操兵戈以禦敵衛生靈以安社稷厥功莫大焉於是乎即其所甚欲甚慕之貨財官爵以報之焉報其已往之功所以作其將來之志非但為其人葢為乎國也然其所立之功有大有小有多有寡有緩有急有易有難不可以一例觀也不可以一例觀亦不可以一例報然而戰陳之時急迫之際紛亂之中安能一一得其輕重多寡之實而權度之不差哉將使人臨陳而監之歟則目力所及有限而不能周將使人随衆而紀之歟則人心所存不同而不能以皆公不然則將待其功成而通第之歟則是非真贗又將何所據而分辨臣竊以為古人有言惟公生明公則己不為私明則人不能欺在己者既不為私自然有以畏服人之心志而人不敢欺己矣國家當有事命將之時必於廷臣中擇平日理明而心公智周而性執者以為紀功之官使其随時制宜權其緩急難易以定其功次使上下通知彼此保證一有疑似難明紛争不一者即與移文考覈結正必須詳實歸一然後明白開具榜於通衢如科試揭曉然者有不公者許其指名開告其作私及䝉蔽之人有贓者計贓論無贓者削去其功次如此雖未盡善亦庶幾乎大凡天下萬事莫外於一實惟實則人心無不悦服更乞朝廷下文武大臣將出軍賞功資次立為定式俾其遵守原在軍伍長行及出榜召募者則一例造冊其有内外臣僚子弟臨時方行自投報效者則具名開奏取㫖葢此等之徒皆非真有智勇欲為國出力葢藉父兄勢力乗機欲得進用耳所以懈怠人心激怒士卒者皆此等者為之不可不知也又有將帥遇有征差輙將子弟親識奏請從行及左右使令吏胥之輩其實不曽臨陳往往叙作軍功不次陞賞夫以出師取勝非一人智力所能獨成其臨陳奮勇者固為有功然左右將領為之叅謀運智以助其所不及協力幹濟以輔其所不能彼此皆不可相無者烏可全謂其無功哉但不可以斬馘論耳為今之計宜多立名件如斬將搴旗奮勇當先之類各於本類下次其名姓并著其所效之實績若是随從之人明書曰某人随從某官叅謀運智或協力幹濟有功合凖作首級幾功不許混報斬首功次如此則事得其實而士卒效力者不起爭憤之心矣又有陳亡士卒以其既死無人開報遂至泯滅今後但有臨陳戰亡者必須同伍開報不報者有罪死者一功當生者二功其有不曽臨陳而亡者雖無禦敵之功亦為王事而死亦須同伍開報量加優賚其子孫漢高帝六年始剖符封諸功臣為徹侯蕭何封鄼侯所食邑獨多功臣皆曰臣等身被堅執鋭多者百餘戰少者數十合今蕭何未嘗有汗馬之勞徒持文墨議論顧反居臣等上何也高祖曰諸君知獵乎夫獵追殺獸兔者狗也而發縱指示獸處者人也今諸君徒能得走獸耳功狗也至如蕭何發縱指示功人也羣臣皆莫敢言列侯畢已受封詔定元功十八人位次皆曰平陽侯曹參身被七十創攻城畧地功最多宜第一謁者闗内侯鄂千秋進曰羣臣議皆誤夫曹參雖有野戰畧地之功此特一時之事耳上與楚相距五嵗失軍亡衆跳身遁者數矣然蕭何常從闗中遣軍補其處又軍無見糧蕭何轉漕闗中給食不乏陛下雖數亡山東蕭何常全闗中以待陛下此萬世之功也今雖無曹參等數百何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬世之功哉蕭何第一曹參次之上曰善於是乃賜蕭何帶劒履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖多得鄂君乃益明於是因千秋所食邑封為安平侯臣按以高祖初得天下論功行賞以定功臣位次而以蕭何為首羣臣不服故帝以獵為譬斯言也非但可以定創業之功臣凡後世有出師取勝而還其功次亦當以是為法昭帝始元元年金日磾二子賞建俱侍中與上畧同年共卧起賞為奉車建駙馬都尉及賞嗣侯佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬邪對曰賞自嗣父為侯耳上笑曰侯不在我與將軍乎對曰先帝之約有功乃得封侯遂止臣按朝廷設為武爵専以報功非有軍功不可得也如此則天下之人有欲得之者皆爭先奮勇以求之矣茍可以他途而得則人皆起其速化之心以趨易進之路孰肯捐軀捨命以求其所難者哉元帝時西域副校尉陳湯矯制發兵與都䕶甘廷夀襲撃匈奴郅支單于於康居斬之傳首至京懸于藁街既至論功石顯匡衡以為湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乗危儌倖生事於蠻夷為國招難帝内嘉延夀湯功而重違衡顯之議久之不決劉向上疏辨其功於是詔公卿議封焉議者以為宜如軍法捕斬單于令衡顯以為郅支本亡逃失國竊號絶域非真單于帝取鄭吉故事封千户衡顯復爭封延夀為義成侯賜湯爵闗内侯於是杜欽上疏追訟馮奉世前破莎車功帝以先帝時事不復録荀悦曰誠其功義足封追録前事可也春秋之義毁泉臺則惡之舍中軍則善之各繇其宜也夫矯制之事先王之所慎也不得已而行之若矯大而功小者罪之可也矯小而功大者賞之可也功過相敵如斯而已可也權其輕重而為之制宜焉胡寅曰甘延夀陳湯奉世矯制以成功一也蕭望之匡衡以為不可封者春秋譏遂事之法也劉向以為可封是未免以功利言耳如荀悦之論功則有大小矣矯有大小乎哉如甘陳之材氣别加任使而厚報之未晩也張耒曰夫所惡夫賞矯制而開後患者謂其功可以相踵而比肩者也隂山之北凡幾單于自漢撃匈奴獨一陳湯得單于耳若裂地封湯而著之令曰有能矯制斬單于如湯者無罪而封湯侯吾意漢雖欲再賞一人焉雖數十年未有繼也何遽有邀功生事之憂哉陳瓘曰莎車之事望之據所見而言若衡於郅支則不能無阿石顯之嫌臣按春秋書遂事公羊以為生事之詞而胡氏以為繼事之辭又曰専事之辭葢人臣行事無不禀命於君出境而遇事之係國家安危者専之可也夷狄處化外古之帝王固以術覊縻之而不與之較茍乗其敗亡而取之雖奉天子命亦非是也葢王者體天以行事彼未嘗犯吾境狀吾民而吾以私怨小憤因其敗亂而乗之非天立君之意矣君之行事必承天意臣之行事必奉君命君命不出於天臣固不可行也况臣不奉君命而所行不合於天也哉陳湯郅支之事説者不一揆之天理協之時事彼誠於吾之國體有損於吾之生民有害反之於心吾理無一之不是而彼皆非質之於事吾辭無一之不直而彼皆曲湯等殺之雖有矯制之罪亦有安邊之功則如胡氏所云别加任使而厚報如此不啓後來之邊釁而亦得以收其才智之用於他日焉張耒之議豈可聞於外夷獨不慮彼亦將悖而入乎陳瓘謂衡阿石顯固中其病然國家處事人臣建議顧理之是非何如耳固不因匪人而易其正議烏用避嫌為哉但朝廷之上議功封爵而使房闥之人與焉其時可知也其士夫可恥也成帝時詔有司訪求漢初功臣之後久未省録杜鄴説上曰唐虞三代皆封建諸侯以成太平之美是以燕齊之祀與周並傳子繼弟及歴載不墮豈無刑辟繇祖之竭力故支庶頼馬近漢功臣亦皆剖符世爵受山河之誓而百餘年間而襲封者盡非所以示後勸化也雖難盡繼宜從尤功上納其言封蕭何六世孫喜為酇侯臣按我聖祖開國之初功臣封公者六人封侯者十有五人其後列侯又有進封為公者今其子孫存者葢寡其在前朝以罪廢者固難復其爵位惟今從享太廟及列祀功臣廟者宜如成帝訪求漢初功臣之後舉其尤功録用後人俾不絶其祀亦所以示後勸功也光武建武十三年吳漢平蜀還於是大饗將士功臣増邑更封者凡三百六十五人定封鄧禹為密侯食四縣李通為固始侯賈復為膠東侯食六縣餘各有差已沒者益封其子孫或更封支庶帝在兵間久厭武事且知天下疲耗思樂息肩自隴蜀平後非警急未嘗復言軍旅皇太子問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及鄧禹賈復知帝偃干戈脩文徳不欲功臣擁衆京師乃去甲兵敦儒學帝思念欲全功臣爵土不令以吏職為過遂罷左右將軍官耿弇等亦上大將軍印綬皆以列侯就第加特進奉朝請帝雖制御功臣而每能回容宥其小失逺方貢珍甘必先徧賜諸侯而大官無餘故皆保其福禄無誅譴者李靖對太宗曰光武雖藉前搆易於成功然莽勢不下於項羽冦鄧未越於蕭張獨能推赤心用柔治保功臣賢於高祖逺矣以此論將將之道臣謂光武得之張栻曰光武天資雖不逮高祖而自其少時從諸生講儒學謹行義故天下既定則知兵之不可不戢閉玊關以謝西域安定南北以為單于久逺之計處置功臣全其始終此皆思慮縝密要自儒學中來臣按自秦漢以來得待功臣之體者莫如光武建安十七年曹操之西征也河間民田銀蘇伯反扇動幽冀五官將曹丕遣將軍賈信討之應時克滅故事破賊文書以一為十國淵上首級皆如其實數操問其故淵曰夫征討外冦多其斬獲之數者欲以大武功聳民聽也河間在封域之内銀等叛逆雖克捷有功淵竊恥之操大悦臣按天下所最難清者報軍功之數也史謂故事破賊文書以一為十葢自漢以來則然矣豈但今日之弊哉然今日之弊則下所為而上不知也魏人之弊則假其虚數以威敵耳葢是時天下分裂各相為敵故也今則天下一家矣非列國相矜伐之比尤宜痛革其弊以上賞功之格上大學衍義補卷一百三十九
