body:
  text: 大學衍義補卷四十明丘濬撰治國平天下之要明禮樂禮儀之節下春秋傳周内史過曰禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世僖公十一年孟獻子曰禮身之幹也敬身之基也孔穎達曰幹以樹本為喻基以牆屋為喻劉子曰君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤竝成公十三年君子曰讓禮之主也又曰世之治也君子尚能而讓其下小人農力以耕農為勤力以事其上是以上下有禮而䜛慝黜逺由不爭也謂之懿徳襄公十三年叔向曰㑹朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也二十一年杜預曰政須禮而行政存則身安臣按政之行以禮為輿而禮之行又以敬為輿不敬則怠于禮怠禮則政不立而馴至于亂也子貢曰夫禮死生存亡之體也將左右周旋俯仰于是乎取之朝祀喪戎于是乎觀之定公十五年臣按春秋之時去先王之世不遠一時論治者率本于禮論禮者率本于敬讓敬也者禮之本也讓也者禮之實也存乎心者以敬形于貌者以讓以此立義以此為政本乎恭敬之節形為遜讓之風此其所以安上治民而能長世也歟晉叔向晉大夫曰忠信禮之器也卑讓禮之宗也昭公二年臣按魯昭公二年叔弓如晉因晉侯使郊勞而善于説辭故叔向謂其知禮且舉其所聞者如此兹二言者蓋古語而叔向稱之也晉女叔齊即司馬侯曰禮所以守其國行其政令無失其民者也昭公五年臣按魯昭公如晉自郊勞至于贈賄無失禮晉侯謂女叔齊曰魯侯不亦善于禮乎女叔齊對以魯侯焉知禮且曰是儀也不可謂禮蓋謂昭公自郊勞至于贈賄無有所失乃揖遜進退之儀文耳非禮也禮之為禮以能保守其國家為本以能推行其政令為節所以然者用以固結其民心使之無失于我耳今魯君政在臣下有賢人而不能用禍難且将及于身而不知憂恤其所底止之地顧惟屑屑于儀文之末豈所謂禮乎由是觀之則禮之為禮不在儀文之末可見矣孟僖子魯大夫曰禮人之幹也無禮無以立昭公七年臣按魯昭公至自楚孟僖子病不能相禮乃講學之茍能禮者從之及其将死召其大夫曰孔丘聖人之後也我若獲沒必屬二子于夫子使事之而學禮焉所謂無禮無以立即孔子所以教其子伯魚者也古之聖賢教子必以禮也如此蓋以人之有禮如木之有幹也木而無幹則不能生人而無禮其何以立哉子太叔鄭大夫游吉引子産之言以答趙簡子曰夫禮天之經經者道之常也地之義義者利之宜也民之行行者人所利也天地之經而民實則之則天之明日月星辰天之明也民實法之因地之性髙下剛柔地之性也民實因之生其六氣隂陽風雨晦明用其五行水火木金土氣為五味酸醎辛苦甘發為五色青黄赤白黑章為五聲宫商角徵羽淫則昏亂滋味聲色用之過度令人昏迷而惑亂民失其性是故為禮以奉之簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎昭公二十五年朱熹曰夫禮天之經地之義民之行也天地之經而民實則之則天之明因地之性其下陳天明地性之目與其所以則之因之之實然後簡子贊之曰甚哉禮之大也首尾通貫節目詳備真徳秀曰上天用此五行以養人五行之氣入人口為五味發見于目為五色章徹于耳為五聲味以養口色以養目聲以養耳此三者雖復用以養人人用不得過度過度則為昏亂使人失其常性故須為禮以節之臣按左傳此章子太叔引子産論禮之言也而孔子于孝經亦以之言孝蓋孝者禮之本也事親孝然後可移于君居家理然後可移于國疑必古有是言子産因其舊文而孔子又為推本之論歟晏子名嬰齊大夫曰禮之可以為國也久矣與天地竝君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聴禮也君令而不違臣共而不貳父慈而教子孝而箴諫也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聴而婉禮之善物猶事也也昭公二十六年臣按此章晏平仲與齊景公言唯禮可以已亂之故且言在禮家施不及國民不遷農不移工商不變士不濫官不滔慢也大夫不收公利蓋以是時陳氏厚施于國将有篡國之漸故平仲既告景公以所以已亂之法而又推其本如此惜乎景公知善其言而不能行其後齊之國祚卒移之陳氏噫後世人主其尚敦厚人倫以立禮之本而嚴立法制以行禮之用庶乎少禍亂矣乎論語子張問十世可知也子曰殷因于夏禮所損益可知也周因于殷禮所損益可知也其或繼周者雖百世可知也馬融曰所因謂三綱五常所損益謂文質三綂朱熹曰王者易姓受命為一世子張問自此以後十世之事可前知乎三綱謂君為臣綱父為子綱夫為妻綱五常謂仁義禮智信文質謂夏尚忠商尚質周尚文三綂謂夏正建寅為人綂商正建丑為地綂周正建子為天綂三綱五常禮之大體三代相繼皆因之而不能變其所損益不過文章制度小過不及之間而其已然之迹今皆可見則自今以往或有繼周而王者雖百世之逺所因所革亦不過此豈但十世而已乎聖人所以知来者蓋如此非若後世䜟緯術數之學也胡寅曰子張之問蓋欲知来而聖人言其既往者以明之也夫自修身以至于為天下不可一日而無禮天叙天秩人所共由禮之本也商不能改乎夏周不能改乎商所謂天地之常經也若乃制度文為或太過則當損或不足則當益益之損之與時宜之而所因者不壊是古今之通義也因往推来雖百世之逺不過如此而已矣臣按子張問十世之事可前知乎聖人舉已往之禮以明之蓋以見上天下地往古来今人之所以為生君之所以為治聖人之所以持世立教事之大者孰有大于禮哉所謂禮者其大者在綱常其小者在制度綱常本于天亙萬世而不易制度在乎人隨時世而變易三代之已往者如此百世之方来者亦不過如此而已林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚范祖禹曰夫祭與其敬不足而禮有餘也不若禮不足而敬有餘也喪與其哀不足而禮有餘也不若禮不足而哀有餘也禮失之奢喪失之易皆不能反本而隨其末故也禮奢而備不若儉而不備之愈也喪易而文不若戚而不文之愈也儉者物之質戚者心之誠故為禮之本楊時曰禮始諸飲食故汙樽而抔飲為之簠簋籩豆罍爵之飾所以文之也則其本儉而已喪不可以徑情而直行為之衰麻哭踊之數所以節之也則其本戚而已周衰世方以文滅質而林放獨能問禮之本故夫子大之而告之以此朱熹曰林放魯人見世之為禮者専事繁文而疑其本之不在是也故以為問孔子以時方逐末而放獨有志于本故大其問蓋得其本則禮之全體無不在其中矣又曰易治也孟子曰易其田疇在喪禮則節文習熟而無哀痛慘怛之實者也戚則一于哀而文不足耳禮貴得中奢易則過于文儉戚則不及而質二者皆未合禮然凡物之理必先有質而後有文則質乃禮之本也臣按林放止問禮而孔子并以喪告之者蓋以禮之大者在吉凶二者而已然其辭先曰與其而又繼之曰寧則非以儉戚為可尚特以與其流于文弊則寧如此耳先儒謂其言之抑揚得其中正如此所以為無弊也子曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徵之矣朱熹曰杞夏之後宋殷之後徵證也文典籍也獻賢也言二代之禮我能言之而二國不足取以為證以其文獻不足故也文獻若足則我能取之以證吾言矣臣按聖人之言禮亦必取證前代之典籍當代之賢人茍無證焉亦不敢以作也後之欲制禮者烏可無證而妄作哉子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮楊時曰告朔諸侯所以稟命于君親禮之大者魯不視朔矣然羊存則告朔之名未泯而其實因可舉此夫子所以惜之也朱熹曰告朔之禮古者天子常以季冬頒来嵗十二月之朔于諸侯諸侯受而藏之祖廟月朔則以特羊告廟請而行之愛猶惜也子貢蓋惜其無實而妄費然禮雖廢羊存猶得以識之而可復焉若併去其羊則此禮遂亡矣孔子所以惜之臣按愛禮存羊可見聖人意思之大而常人無逺見屑屑惟小費之惜殊不知禮雖廢而羊存庶幾後人因羊以求禮而禮之廢者猶可因是而復舉也雖然豈特告朔一事為然哉凡夫古人之禮今雖不盡行者皆必微存其迹以為復興之緒切不可惜一時之費而滅千古之迹也子曰能以禮讓為國乎何有不能以禮讓為國如禮何朱熹曰讓者禮之實也何有言不難也言有禮之實以為國則何難之有不然則其禮文雖具亦且無如之何矣而况于為國乎臣按此章言為國以禮為本而禮又貴乎有其實讓者禮之實也子曰君子博學于文約要也之以禮亦可以弗畔背也矣夫程頥曰博學于文而不約之以禮必至于汗漫博學矣又能守禮而由于規矩則亦可以不畔道矣朱熹曰君子學欲其博故于文無不考守欲其要故其動必以禮如此則可以不背于道矣臣按博文約禮孔門傳授之要道孔子既以是為教顔子受以為學亦曰夫子博我以文約我以禮古之聖賢未用則以是禮而為學既用則以是禮而為治大哉禮乎所以為天地立心者在是為生民立命者在是後世舎禮以為學故其學流于異端舎禮以為治故其治雜于伯道子曰恭而無禮則勞慎而無禮則葸畏懼貌勇而無禮則亂直而無禮則絞急切也朱熹曰無禮則無節文故有四者之弊張栻曰恭慎勇直皆善道也然無禮以主之則過其節而有弊反害之也蓋禮者存乎人心有節而不可過者也夫恭而無禮則自為罷音疲勞慎而無禮則徒為畏懼勇而無禮則流于陵犯直而無禮則傷于訐切其弊如此豈所貴于恭慎勇直哉蓋有禮以節之則莫非天理之本然無禮以節之則亦人為之私而已是故君子以約諸己為貴也臣按此章之㫖張栻之言盡之矣子曰麻冕緇布冠禮也今也純絲也儉謂省約吾從衆拜下禮也今拜乎上泰也雖違衆吾從下朱熹曰緇布冠以三十升布為之升八十縷則其經二千四百縷矣細宻難成不如用絲之省約臣與君行禮當拜于堂下君辭之乃升成拜泰驕慢也臣按此章之㫖程氏所謂君子處世事之無害于義者從俗可也害于義則不可從也其言可謂約而盡矣大抵義之一言處事之權衡也凡百天下之事有可以増損從違者一皆凖以此例而推其餘孟子任人任名國有問屋廬子孟子弟子曰禮與食孰重曰禮重色與禮孰重任人復問曰禮重曰以禮食則飢而死不以禮食則得食必以禮乎親迎則不得妻不親迎則得妻必親迎乎屋廬子不能對明日之鄒以告孟子孟子曰于答是也何有不難也不揣其本謂下而齊其末謂上方寸之木至卑喻食色可使高于岑樓樓之高鋭似山岑者喻禮金重於羽者豈謂一鉤帶鉤金與一輿羽之謂哉取食之重者與禮之輕者而比之奚翅食重取色之重者與禮之輕者而比之奚翅色重往應之曰紾戾也兄之臂而奪之食則得食不紾則不得食則將紾之乎踰東家牆而摟牽也其處子則得妻不摟則不得妻則將摟之乎朱熹曰方寸之木至卑喻食色岑樓至高喻禮若不取其下之平而升寸木于岑樓之上則寸木反高岑樓反卑矣金本重而帶鉤小故輕喻禮有輕于食色者羽本輕而一輿多故重喻食色有重于禮者禮食親迎禮之輕者也飢而死以滅其性不得妻而廢人倫食色之重者也奚翅猶言何但言其相去懸絶不但有輕重之差而已紾兄之臂而奪之食摟處子而得妻此二者禮與食色皆其重者而以之相較則禮為尤重也此章言義理事物其輕重固有大分然于其中又各自有輕重之别聖賢于此錯綜斟酌毫髪不差固不肯枉尺而直尋亦未嘗膠柱而調瑟所以斷之一視于理之當然而已矣臣按此章先儒有言飲食男女人之大欲存焉禮則天理所以防閑人欲者也禮本重食色本輕固自有大分也然亦不可拘拘于禮文之微者又當隨時隨事而酌其中焉荀子曰人生而有欲欲而不得則不能無求求而無度量分界則不能不爭爭則亂亂則窮先王惡其亂也故制禮義以分之以養人之欲給人之求使欲必不窮于物物必不屈于欲兩者相待而長也禮者人道之極也凡禮事生飾歡也送死飾哀也師旅飾威也是百王之所同古今之所一也真徳秀曰荀子書有禮論其論禮之本末甚備至其論性則以禮為聖人之偽豈不繆哉臣按荀况禮論其最純者止此數言其餘固若亦有可取者但其意既以禮為偽則莊周謂所言之韙而亦不免于非荀卿之論禮是也臣恐後世人主或有取于其言而小人之無忌憚者或因之以進説故于論禮之末剟其可取者以獻使知其所謂偽者乃人之偽非禮之偽也禮者敬而已矣敬豈可以偽為哉程頤曰學禮者考文必求先王之意得意乃可以沿革禮之本出于民之情聖人因而道之耳禮之器出于民之俗聖人因而節文之耳聖人復出必因今之衣服器用而為之節文其所謂貴本而親用者亦在時王斟酌損益之耳又曰行禮不可全泥古須當視時之風氣自不同故所處不得不與古異張載曰禮者理也知理則能制禮禮文殘闕須是先求得禮之意然後觀禮合此理者即是聖人之制不合者即是諸儒添入可以去取今學者所以宜先觀禮者類聚一處他日得理以意參校又曰禮但去其不可者其他取力能為之者大凡禮不可大段駭俗不知者以為怪且難之甚者至于怒之疾之故禮亦當有漸朱熹曰禮時為大古禮如此零碎繁冗今豈可行亦且得隨時裁損耳孔子從先進恐亦有此意或以禮之所以亡正以其太繁而難行爾曰然聖人有作古禮未必盡用須别有箇措置視許多瑣細制度皆若具文且是要理㑹大本大原古禮繁縟後人于禮日益疎略然居今而欲行古禮而恐情文不相稱不若只就今人所行禮中刪修令有節文制數等威足矣臣按古禮之不能行于今世亦猶今禮之不可行于古也雖然萬古此天地萬古此人心禮出于人心聖人緣人情而制為禮何有古今之異哉蓋同而不異者程氏所謂義也張氏所謂理也朱氏所謂大本大原也若夫衣服器用之類則有不能以盡同而不得以不異焉者臣故歴采自古以來凡為禮之説類聚以為一處如張氏所云者使後世有志于禮學者于此推原人心固有之理考求先王制作之意因其風氣順其時埶稱其情文斟酌損益以漸行之立為一代之制云以上論禮儀之節臣按成周盛時以禮持世凡其所以建國而辨方正位體國經野設官分職以為民極者皆謂之禮焉不徒以祭祀燕享冠昏賓射以為禮也太宰掌建邦之六典以治典為先而禮典僅居其一然其書不謂之治而謂之禮其意可見矣秦漢以來則不然凡其所以治者皆謂之政特以其所以施于郊廟朝廷學校而有節文儀則者則謂之禮焉蓋三代以前以禮為治天下之大綱三代以後以禮為治天下之一事古今治效所以有隆汙之異者以此我太祖皇帝初得天下于洪武元年即命中書省暨翰林院太常寺定擬三禮明年再命集議又明年徧徵草澤道徳文章之士相與考訂之以為一代之制今書之存者有大明集禮洪武定制禮儀定式稽古定制及諸司職掌所載者乞命掌禮大臣著為一書以頒賜中外使天下後世咸知我朝一代之制永永遵守亦俾後世作史者有所根據云大學衍義補卷四十
