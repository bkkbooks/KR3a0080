body:
  text: 大學衍義補卷二十明丘濬撰治國平天下之要制國用總論理財之道上書禹曰予決九川距四海濬畎澮距川暨稷播布穀種奏庶艱難也食鮮食血食曰鮮懋勉也遷有無化居烝衆也民乃粒米食曰粒萬邦作乂治也蔡沈曰水平播種之初民尚艱食懋勉其民徙有於無交易變化其所居積之貨也盖水患悉平民得播種之利而山林川澤之貨又有無相通以濟匱乏然後庶民粒食萬邦興起治功也臣按易曰何以聚人曰財財出於地而用於人人之所以為人資財以生不可一日無焉者也所謂財者穀與貨而已穀所以資民食貨所以資民用有食有用則民有以為生養之具而聚居托處以相安矣洪範八政以食與貨為首者此也大禹所謂懋遷有無化居此六言者萬世理財之法皆出於此然其所以徙有於無變化其所居積者乃為烝民粒食之故耳是其所以理財者乃為民而理理民之財爾豈後世斂民之食用者以貯於官而為君用度者哉古者藏富於民民財既理則人君之用度無不足者是故善於富國者必先理民之財而為國理財者次之禹貢六府孔大也修庶土交正底致也慎財賦咸則品節之也三壤成賦中邦中國也蔡沈曰六府孔修者謂水火金木土榖皆大修治也庶土則非特穀土也庶土有等當以肥瘠髙下名物交相正焉以任土事底慎財賦謂因庶土所出之財而致謹其財賦之入咸則三壤謂九州穀土又皆品節之以上中下三等成賦中邦謂土賦或及於四夷而田賦則止於中國而已臣按土者財之所自生然必修金水木火四者以相制相助然後土順其性而穀生焉然是土也則非一等有所謂山林川澤丘陵墳衍原隰五者之不同其質有肥者焉有瘠者焉其形有髙者焉有下者焉其色又有黄白者焉有青赤者焉庶土所生之物各各不同以此交相質正於是因其土所出之財而致謹其財賦之入兢兢焉罔或怠忽不敢責無於有取少於多也然土雖有五而壤則有三所謂三者上中下也壤之上者則出上賦壤之中者則出中賦壤之下者則出下賦咸有一定之凖則用是之法以成賦於九州之内若荒服之外則不敢例之以此也有夏盛時其取民之制有所品節凖則如此後世征斂無藝惟循簿書之舊無復考核之實田之等則無别賦之多寡不倫既無底慎之心復無咸則之法此民財所以恒不足而國用亦因之以不充也歟王制冢宰制國用必於嵗之杪未也五穀皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也應鏞曰必於歳之杪者天時既周而來歳之事方始也五穀之熟有先後皆入則先後無遺而豐歉盡見矣臣按先王制國用必命冢宰者冢宰為六卿之長周時無宰相冢宰即宰相也毎嵗於年終之時五穀皆入之後俾其視今嵗之所入以制來年之所出而定國家一嵗多少之用焉用地小大視年之豐耗者謂地之小者入亦小地之大者入亦大地小而入大則年之豐可知地大而入小則年之耗可知毎嵗以地所入而定其年之豐耗年豐則國用隨之而隆年耗則國用亦隨之而嗇以三十年之通制國用者毎嵗所入析為四分用度其三而儲積其一毎年餘一三年餘三積三十年則餘十年矣以三十年通融之法常留九年儲蓄之貲然後計其見在所有之數以為經常用度之節量其所入而出之因府庫之虛實為用度之贏縮則國家無不足之憂而興事建功無有不成者矣竊惟王制此章説者謂為商制以臣觀之古今制用之法誠莫有加焉者也夫國家之所最急者財用也財生於地而成於天所以致其用者人也天地嵗嵗有所生人生嵗嵗有所用歳用之數不可少而嵗生之物或不給茍非歳歳為之制先期而計其數先事而為之備至於臨事而後為之措置則有弗及者矣臣愚以為今日制國用亦宜倣此法毎嵗戸部先移文内外諸司及邊方所在預先㑹計嗣嵗一年用度之數某處合用錢穀若干某事合費錢穀若干用度之外又當存積預備若干其錢穀見在倉庫者若干該運未到者若干造為帳籍一一開報又預行各處布政司并直𨽻府分毎歳於冬十月百穀收成之後總計一嵗夏秋二税之數其間有無災傷逋欠蠲免借貸各具以知至十二月終旬本部通具内外新舊儲積之數約㑹執政大臣通行計筭嗣嵗一年之間所用幾何所存幾何用之之餘尚有幾年之蓄具其總數以達上知不足則取之何所以補數有餘則儲之何所以待用歳或不足何事可從減省某事可以暫已如此則國家用度有所稽考得以預為之備而亦俾上之人知嵗用之多寡國計之贏縮蓄積之有無云伏惟萬幾之餘留神省察必使國家倉廪恒有九年之餘而不至於六年之急萬有一焉而或不及餘三年則必惕然儆懼凡事皆從減節痛革用度之無益者使毋至於國非其國焉實惟宗社無疆之休周禮春官天府祭天之司民司録而獻民數穀數則受而藏之林之奇曰嵗獻民數穀數最為致太平之要務管子曰制國以為二十一工商之鄉六士鄉十五三分其制而言之即所謂七民而五農夫二工商也先王所以為此者非他為欲等其民數穀數使之本末相當用為平嵗之經制故爾至於水旱不虞之至則必有儲蓄以待之三年耕必有一年之蓄三十年之通必有十年之儲國有十年之儲則謂之太平故曰歳獻民數穀數最為致太平之要務者也自古在昔先民有作其所以經綸圖維以富邦國以生萬民者其要實在乎此孰謂其可忽而不思以坐視夫民之窮哉臣按民生於天而嵗嵗有生死穀產於地而歳嵗有豐凶茍非有司嵗嵗各具其數以聞之於上則朝廷之崇髙海宇之廣逺閭閻之幽隠曷由以知之哉是以成周盛時毎嵗必祭司民司禄而獻民數穀數焉獻民數俾其知登耗也獻穀數俾其知多寡也料其民數計其穀數郡邑版圖其戸口凡若干内外倉塲其蓄積凡若干就一邑而計之農圃食力者若干人工商末作者若干人吏兵廪食者若干人枚而舉之總而㑹之一人之食日費幾何一月之食幾何一嵗之食幾何某所有倉廪幾何一歳支發幾何存餘幾何散之足以食幾何人積之足以給幾何年因其一嵗之所入通其累年之所積以穀之數而較之於民其果相當否邪三年而有一年積否邪十年而有三年積否邪三十年而有十年積否邪彼此通融有無相濟以羡補不足多而有餘也則蠲民之逋負除民之租賦不盡利以遺民少而不足也則省上之常費除人之冗食不侈用以傷財如是則民穀兩足矣民有餘食國有餘積則凶荒有備禍亂不作風俗淳厚治教休明矣太平要務豈外是哉大學君子先慎乎徳有徳此有人有人此有土有土此有財有財此有用朱熹曰徳即所謂明徳有人謂得衆有土謂得國有國則不患無財用矣或問熹曰所謂先慎乎徳何也曰上言有國者不可不慎此言其所慎而當先者尤在於徳也徳即所謂明徳所以慎之亦曰格物致知誠意正心以修其身而已矣外本内末爭民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出朱熹曰人君以徳為外以財為内則是争鬬其民而施之以刼奪之教也盖財者人之所同欲不能絜矩而欲專之則民亦起而爭奪矣外本内末故財聚爭民施奪故民散反是則有徳而有人矣悖逆也此以言之出入明貨之出入也熹又曰有徳而有人有土則因天分地不患乎無財用矣然不知本末而無絜矩之心則未有不争鬬其民而施之以刼奪之教者也易大傳曰何以聚人曰財春秋外傳曰王人者將以導利而布之上下者也故財聚於上則民散於下矣財散於下則民歸於上矣言悖而出者亦悖而入貨悖而入者亦悖而出鄭氏以為君有逆命則民有逆辭上貪於利則下人侵畔得其㫖矣臣按財者人之所同欲也土地所生止於此數不在上則在下非但上之人好而欲取之而下之人亦惡人之取之而不欲與也人心好利無有紀極茍非在上者先謹其徳知義之可重而財利之輕其不至專民之利而刼奪之也幾希今焉惟徳之是謹兢兢焉以自守業業焉以自持知財利吾所好也而民亦好之吾之欲取之心是即民之不欲與之心不得已而取之所取者皆合乎天理之公而不咈乎人情之欲如是而取之則入之既以其義而出之也亦必以其道矣如是則是能與民同好惡而以民心為己心所謂絜矩之道而治平之要不外是矣生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣吕大臨曰國無遊民則生者衆矣朝無幸位則食者寡矣不奪農時則為之疾矣量入為出則用之舒矣朱熹曰此因有土有財而言以明足國之道在乎務本而節用又曰洪範八政食貨為先子貢問政而夫子告之亦以足食為首盖生民之道不可一日而無者聖人豈輕之哉特以為國者以利為利則必至於剝民以自奉而有悖出之禍故深言其害以為戒耳至於崇本節用有國之常政所以厚下而足民者則固未嘗廢也吕氏之説得其㫖矣有子曰百姓足君孰與不足孟子曰無政事則財用不足正此意也然孟子所謂政事則所以告齊梁之君使之制民之產者是已豈若後世頭㑹箕斂厲民自養之云哉臣按金履祥謂大學通章以貨財為戒而此以生財為言何也盖財用國之常經不可一日無者茍徒禁其為聚財之政而不示之以生財之端則異時國用不給終不免横取諸民則是以理財為諱者乃所以為聚財之張本也所謂生財者必有因天分地之源所謂有道者必非管商功利之術而究其所以為生財之道者則生者衆食者寡為者疾用者舒而已天地間自有無窮之利有國家者亦本有無窮之財但勤者得之怠者失之儉者裕之奢者耗之履祥謂大學此四語萬世理財之大法臣竊以為履祥所謂勤儉怠奢之四言是又萬世理財之節度也仁者以財發猶起也身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也朱熹曰仁者散財以得民不仁者亡身以殖貨上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也又曰仁者不私其有故財散民聚而身尊不仁者惟利是圖故捐身賈禍以崇貨也然亦即財貨而以其效言之爾非謂仁者真有以財發身之意也夫上好仁則下好義矣下好義則事有終矣事有終則為君者安富尊榮而府庫之財可長保矣此以財發身之效也上不好仁則下不好義下不好義則其事不終是將為天下僇之不暇而况府庫之財又豈得為吾之財乎若商紂以自焚而起鉅橋鹿臺之財徳宗以出走而豐瓊林大盈之積皆以身發財之效也孟獻子曰與其有聚斂之臣寧有盗臣此謂國不以利為利以義為利也長國家而務財用者必自小人矣言由小人導之也彼為善善字上疑有不字之小人之使為國家菑害竝至雖有善者亦無如之何矣此謂國不以利為利以義為利也朱熹曰聚斂之臣剝民之膏血以奉上而民被其殃盗臣竊君之府庫以自私而禍不及下仁者之心至誠惻怛寧亡己之財而不忍傷民之力所以與其有聚斂之臣寧有盗臣亦絜矩之義也又曰此言菑害竝至無如之何何也曰怨己結於民心則非一朝一夕之可解矣聖賢深探其實而極言之欲人有以審於未然而不為無及於事之悔也以此為防人猶有用桑𢎞羊孔僅宇文融楊慎矜陳京裴延齡之徒以敗其國者故陸宣公之言曰民者邦之本財者民之心其心傷則其本傷其本傷則枝􅆬凋瘁而根柢蹷拔矣吕正獻公之言曰小人聚斂以佐人主之欲人主不悟以為有利於國而不知其終為害也賞其納忠而不知其大不忠也嘉其任怨而不知其怨歸於上也若二公之言可謂深得此章之指者矣有國家者可不監哉真徳秀曰近世所謂善理財者何其懵此也元元已病而科斂日興不知皮將盡而毛無所傅也出新巧以籠愚民茍邀倍稱之入不知朝四暮三之無益也孟子曰我能為君充府庫今之所謂良臣古之所謂民賊也金履祥曰國天下之國家天下之家也君之者長之而已固非其所得私也况可專其利以自私哉夫為國家之長而惟財用之務其原必起於小人小人雖悖亦豈能自肆其毒哉惟有國家者以其言利為善於體國以其任怨為善於忠君以其掊克為善於理財是以使為國家小人之得為於國家所以悖取者無所不至而國家之菑禍患害亦將無所不至矣盖民窮衆怨兵連盗起百姓畔於下天變怒於上國家至此不可復為也已雖有善者以承其後亦將如之何哉盖財之聚者有必聚之怨怨之聚者有必至之禍而禍之已至者無可回之埶甚矣哉小人之禍國家若是其烈也不謹之於其始而何以救於其終哉臣按大學釋治國平天下之義諄諄以理財為言豈聖賢教人以興利哉盖平之為言彼此之間各得分願之謂也何也天下之大由乎一人之積人人各得其分人人各遂其願而天下平矣是故天子有天下則有天下之用度匹夫有一家則有一家之用度天子之用度則取之民民之用度將取之誰哉居人之上者將欲取於民也恒以其心度民之心曰彼民之家上有父母下有妻子一日不食則饑一嵗無衣則寒彼之家計不可一日無亦猶吾之不可一日無國計也體民之心反之於己使彼此之間各止其所處之分各遂其所欲之願無一人之不遂其生無一人之或失其所則天下無不平者矣是則大學所謂絜矩之道推極其理即聖門所謂仁所謂恕也雖然有其心無其政是謂徒善是以願治之主不獨有理財之法又必有理財之人理財之法即所謂生財之大道是也理財之人所謂聚斂之臣決不用焉不用聚斂之臣而行崇本節用之道推吾所以以心度心者以為取民之節度僅足吾用而已不分外以多求不極欲以侈用如是則上之人既得其分願而下之人亦遂其分願矣天下豈有不平也哉抑考理財之説昉之易大傳而大學不言理而言生何哉噫理之為言有人為分疏之意生之為言有生生不窮之意有以生之而財之源生生不窮有以理之而財之流陳陳相因如是則存於民也無不足而用於君也恒有餘矣治平之道端在於此朱熹所引陸贄吕公著告其君之言尤為切要伏惟聖明留神玩味以上總論理財之道上大學衍義補卷二十
