body:
  text: 大學衍義補卷一百九明丘濬撰治國平天下之要慎刑憲伸寃抑之情周禮大司寇以肺石赤石達窮民凡逺近惸無兄弟獨無子孫老㓜之欲有復猶報也於上而其長弗達者立於肺石三日士聽其辭以告於上而罪其長鄭𤣥曰窮民天民之窮而無告者王安石曰立三日然後聽之則又惡民之瀆其上則上瞶眊而不渫雖誠無告反不暇治矣臣按先儒謂肺者氣之府而外達乎皮毛惸獨老㓜天民之窮無告者其㣲弱也猶國之皮毛焉心之氣靡不通之也不通則疾病生焉故用之達窮民其有取於是乎立於肺石三日者審究考核得其情實然後以其辭告於上罪其長焉先王之時民之窮困無告者皆得達於上牧長不敢遏左右不能蔽盡天下之惸獨老㓜無一人不得自言其情又豈有無罪而罹於深文密網者哉朝士掌外朝之法左嘉石文石平罷民焉右肺石赤石達窮民焉朱申曰嘉石設於左平罷急之民使之自强於善肺石設於右達窮困之民使之申其情大僕建路鼔於大寢之門外而掌其政以待達窮者與遽令聞鼔聲則速逆御僕與御庶子鄭𤣥曰大寢路寢也其門外則内朝之中窮謂窮寃失職以達於王遽傳也王安石曰路鼓四靣示欲四方無所不達大寢之門外自外至者莫近焉則欲其聞之速也臣按吏治不能以皆善民情未易以上達是以成周盛時思所以通幽隱之情防壅隔之患於是有肺石路鼓之設焉民之窮困者則俾之立肺石之上使人人得而見焉見之斯知其為窮矣民之寃抑者則俾之擊路門之鼓使人人得而聞焉聞之斯知其為寃矣肺石設於外朝大司寇掌之而聽之者朝士也朝士見有立肺石者則以達司寇司寇以復諸王路鼓在寢門之外大僕主之而守之者御僕也御僕聞有擊鼓聲者則以達大僕大僕以聞諸王然其人立於朝著之間無不見者朝士雖欲不達司寇司寇雖欲不達諸王不可也填然其聲鳴諸路寢之中無不聞者僕御雖欲不聞大僕大僕雖欲不聞天子不能也是以閭閻之幽悉達於殿陛之上甿庶之賤咸通乎冕旒之前民無窮而不達士無寃而不伸此和氣所以暢達而天地以之而交治道以之而泰也歟漢明帝時窮治楚王英謀逆獄者累年繫獄者數千人其人多引列侯皆所未嘗相見者侍御史寒朗上書言其誣帝曰即如是何故引之對曰其人自知所犯不道故多有虚引冀以自明帝曰即如是何不早奏怒捶之左右方引去朗曰願一言而死曰臣考囚在事者咸共言妖惡大故臣子所同疾今出之不如入之可無後責是以考一連十考十連百及公卿相㑹陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊嘆莫不知其寃無敢為陛下言者臣今所言誠死無悔帝意解後二日車駕自幸洛陽獄録囚徒理出千餘人臣按寒朗所言囚人多引貴顯者冀以自明及出之不如入可無後責與夫公卿相㑹口不言而歸仰屋竊嘆非但漢時為然而後世典獄之吏執事之臣往往皆然明主所宜深鑑也唐髙宗時唐臨為大理卿帝常録繫囚前卿所處者多號呼稱寃臨所處者獨無言髙宗怪問其故囚曰唐卿所處本自無寃髙宗歎息良久曰治獄者不當如是耶臣按前代帝王皆躬自録囚盖以人命至重故也雖以髙宗之昏制於悍后猶不廢此制後世一惟法司是信而有寃者無由得見上而訴之此獄所以不清寃氣鬱而和氣為之感傷有由然也武后時告密者誘人奴告主以求功賞竇德妃父孝諶妻龎有奴妄為妖異恐之請夜祠禱解奴因發其事監察御史薛季昶誣奏以為德妃同祝詛龎氏當斬其子希瑊詣侍御史徐有功訟寃有功上奏論之以為無罪季昶奏有功阿黨惡逆付法司法司處有功罪當絞有功嘆曰豈我獨死諸人皆不死邪既食熟寢太后召有功迎謂曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大德由是龎氏得減死臣按武后雖稱好殺然獨容徐有功後世人主其臣一拂其意即不知其善矣有功謂失出人臣之小過好生聖人之大德可為人主斷刑之鑑又曰豈我獨死諸人皆不死可為人臣陷人之戒以上伸寃抑之情慎刑憲慎眚災之赦易解大象曰雷雨作解君子以赦過宥罪程頥曰天地解散而成雷雨故雷雨作而為解也赦釋之宥寛之過失則赦之可也罪惡而赦之則非義也故寛之而已君子觀雷雨作解之象體其發育則施恩仁體其解散則行寛釋也張子清曰雷雨交作則為解雷者天之威雨者天之澤威中有澤刑獄之有赦宥也有過者赦而不問有罪者宥而從輕此君子所以推廣天地之仁心也臣按雷雨作解君子以赦過宥罪盖言易卦之象如此爾人君於人之有過者而赦之有罪者而宥之亦猶易之有是象也然過有小大過失之小者固不必問若事雖過失而事體所闗則大如失火延燒陵廟射箭誤中親長之類其罪有不可釋者原其情則非故也故因時赦其罪以宥之宥如流宥五刑之宥也所謂罪者過失而入於罪者耳若夫大憝極惡之罪殺人不死則死者何辜攫財不罪則失者何苦雷雨作解豈為如是之人哉舜典曰眚災肆赦朱熹曰眚災肆赦言不幸而觸罪者則肆而赦之此法外意也臣按此萬世言赦罪者之始夫帝舜之世所謂赦者盖因其所犯之罪或出於過誤或出於不幸非其本心固欲為是事也而適有如是之罪焉非特不可以入常刑則雖流宥金贖亦不可也故直赦之蓋就一人一事而言耳非若後世槩為一札併凡天下之罪人不問其過誤故犯一切除之也吕刑五刑之疑有赦五罰之疑有赦其審克之孔穎達曰五刑之疑有赦赦從罰也五罰之疑有赦赦從過也過則赦之矣蔡沈曰疑於刑則質於罰也疑於罰則質于過而宥免之也臣按此所謂有赦者赦其有疑者耳非若後世不問有疑無疑一槩蠲除之也周禮司刺一宥曰不識再宥曰過失三宥曰遺忘一赦曰㓜弱再赦曰老旄三赦曰惷愚臣按赦有二者之義程子謂赦釋之宥惟寛之而已盖就其所犯之人品原其所犯之情實而赦之宥之也其與後世所頒之赦異矣春秋莊公二十二年春王正月肆大眚啖助曰肆者放也眚者過也胡安國曰肆眚者蕩滌瑕垢之稱也舜典曰眚災肆赦易於解卦曰君子以赦過宥罪吕刑曰五刑之疑有赦五罰之疑有赦周官司刺掌赦宥之法未聞肆大眚也大眚皆肆則廢天討虧國典縱有罪虐無辜惡人幸以免矣後世有姑息為政數行恩宥惠姦軌賊良民而其弊益滋蓋流於此故諸葛孔明曰治世以大德不以小惠其為政於蜀軍旅數興而赦不妄下斯得春秋之㫖矣肆眚而曰大眚譏失刑也臣按後世大赦天下其原蓋出於此夫魯所肆者一國之中而謂之眚則其所赦者過失焉耳眚而謂之大意者魯國向有所肆皆小眚也今則併其大者而肆之然於罪惡猶未赦也聖人書之以垂戒萬世以此為防後世赦文乃至徧赦天下已發覺未發覺已結正未結正罪無大小咸赦除之甚至十惡之罪常赦所不原者亦或赦焉惠姦宄賊良民怙終得志善良喑啞失天討之公縱人欲之私皆春秋之罪人也管仲曰文有三情武無一赦赦者先易而後難久而不勝其禍法者先難而後易久而不勝其福故惠者人之仇讎也法者人之父母也凡赦者小利而大害者也無赦者小害而大利者也夫盜賊不勝則良人危法禁不立則姦邪煩故赦者奔馬之委轡也馬端臨曰唐虞三代之所謂赦者或以其情可矜或以其事可疑以其在三赦三宥八議之列然後赦之蓋臨時隨事而為之斟酌所謂議事以制者也至後世乃有大赦之法不問情之淺深罪之輕重凡所犯在赦前則殺人者不死傷人者不刑盗賊及作姦犯科者不詰於是遂為偏枯之物長姦之門今觀管仲所言及史記所載陶朱公救子之事則知春秋戰國之時已有大赦之法矣秦二世初即位大赦天下臣按赦之為言始見於虞書然所肆赦者眚災而已未嘗泛及於有罪者焉管子之書雖云赦者小利而大害然僅行於其國中未徧及於天下赦而加之以大始見於史後世遂以為故事一遇國家有變革喜慶之事則形於王言頒之天下不問情之故誤罪之當否一切施以曠蕩之恩嗚呼是何三代之後君子常不幸而小人常多幸哉漢元帝在位十五年凡十赦匡𦙍上疏曰陛下躬聖德開太平之路閔愚民觸法抵禁比年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦明日犯法相隨入獄此殆導之未得其務也蓋保民者陳之以德義示之以好惡觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡亷恥之節薄淫僻之意縱綱紀失序疏者踰内親戚之恩薄昏姻之黨隆茍合儌倖以身設利不改其原雖歲赦之刑猶難使錯而不用也臣按西漢之世赦令最頻數髙帝在位十九年凡九赦蓋漢初得天下人之染秦俗者深事之襲秦弊者久不可不赦赦之所以與民更始也文帝在位者二十三年凡四赦文帝承吕后之後盖亦有不得已焉者若夫景帝十六年而五赦武帝五十五年而十八赦昭帝十三年而七赦宣帝二十五年而十赦成帝二十六年而九赦哀帝六年而四赦大約計之未有過三年而不赦者數赦如此何其為良民計也恒不足而為姦民地也恒有餘哉光武建武二十年吳漢病篤車駕親臨問所欲言對曰臣愚無所知識惟願陛下慎無赦而已臣按吳漢武將也猶欲其君以慎無赦赦不可以輕而數也明矣章帝元和二年以祀明堂大赦天下繫囚在赦前減罪一等勿笞詣金城而文不及亡命未發覺者郭躬奏曰聖恩所以減死使戍邉者重人命也今死罪亡命毋慮萬人又自赦以來捕得甚衆而詔令不及皆當重論伏惟恩宥死罪以下並䝉更生而亡命捕得獨不沾澤臣以為赦前犯罪死而繫在赦後者可皆勿笞詣金城以全人命有益於邉帝善之即下詔赦焉臣按赦固非國家之美事然死罪既赦而獨不及亡命不可也蓋自古所以起禍亂者多犯罪亡命之徒也朝廷一持以法而無所貸彼固無辭而甘心焉茍施曠蕩之恩而彼獨不與焉能無觖望乎郭躬之慮可謂逺矣王符曰賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣何以明之謹飭之人身不蹈非又有為吏正直不避疆禦而姦猾之黨横加誣言者皆知赦之不久故也善人君子被侵陷而能至闕庭自明萬無數人數人之中得省問者百不過一既對尚書而空遣去者復十六七矣其輕薄姦軌既犯罪法怨毒之家冀其辜戮以解蓄憤而反一槩悉䝉赦釋令惡人髙㑹而誇咤老盜服贓而過門孝子見讐而不得討遭盜者覩物而不可取痛莫甚焉夫養稂莠者傷禾稼惠姦軌者賊良民先王之制刑法也非好傷人肌膚斷人夀命也貴威姦懲惡除人害也古者惟始受命之君承大亂之極寇賊姦軌難為法禁故不得不有一赦與之更新頥育萬物以成大化非以養姦活罪放縱大賊也夫性惡之民民之􅉘狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄論者多曰久不赦則姦軌熾而吏不制宜數赦以解散之此不昭政亂之本源不察禍福之所生也臣按此王符述赦論也觀此則赦之無益於治可見矣荀恱曰夫赦者權時之宜非常典也漢興承秦兵革之後比屋可刑故設三章之法大赦之令蕩滌穢流與民更始時勢然也後世承業襲而不革失時宜矣惠文之世無所赦之若孝景之時七國皆亂異心並起姦詐非一及武帝末年賦役繁興羣盜並起加以巫蠱之禍天下紛然百姓無聊及光武之際撥亂之後如此之比宜為赦矣臣按當承平之世赦不可有有則姦宄得志而良民不安當危疑之時赦不可無無則反側不安而禍亂不解荀氏謂赦為權時之宜而後世乃以之為常典何哉漢帝禪延熙六年立后大赦孟光責費褘曰夫赦者偏枯之物非明世所宜有也衰敝窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職何有旦夕之急而數施非常之恩以惠姦軌之惡褘謝之初丞相亮為相十四年纔兩赦時有言公大惜赦者亮答曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言周旋陳元方鄭康成間每見啓告治亂之道悉矣曽不語赦也若劉景升父子歲歲赦宥何益於治陳夀曰諸葛亮軍旅數興而赦不妄下不亦卓乎胡寅曰赦之無益於治道也前賢言之多矣而終不能革至按以常典而行之於其間有吉慶克㨗祥瑞祈禱之事則又頒焉不信二帝三王之法而循後世之制是何也始受命則赦改年號則赦獲珍禽竒獸則赦河水清則赦刻章璽則赦立皇后則赦建太子則赦生皇孫則赦平叛亂則赦開境土則赦遇災異則赦有疾病則赦郊祀天地則赦行大典禮則赦或三年一赦或比歲一赦或一歲再赦三赦赦令之下也有罪者除之有負者蠲之有滯者通之或得以䕃補子孫或得以封爵祖考如是而已耳明哲之君則赦希而實昏亂之世則赦數而文希者尚按故事而不盡去也數者則意在邀福而歸諸已也實者有罪必除有負必蠲也文者雖有是言而人不被其澤也臣按赦之為言釋其罪之謂也後世之赦乃以蠲逋負舉隱逸䕃子孫封祖考甚至立法制行禁令皆於赦令行焉失古人眚災肆赦赦過宥罪之意矣臣愚以為赦令之頒宥罪之外蠲逋減稅省刑已責弛工罷役寛征招亡凡寛民惠下之道因赦而行可也非此屬也一切付之有司行焉凡夫赦文之初作條件之初擬也必須㑹集執政大臣各擬所司合行條貫從公計議必於律例無礙必於事體無違必於人情不拂斷然必可行的然必無弊如蠲逋也其物必可除後決不至於復追如寛征也其事必可已後決不至於再作其文意必不至解而兩通其前後必不至言而相戾既處置其事宜復講解其文理明白切當然後著於赦文行於天下則上之所頒者無虚文下之所沾者皆實惠矣南宋武帝永初二年祀南郊大赦裴子野曰郊祀天地修歲事也赦彼有罪夫何為哉唐太宗嘗謂侍臣曰古言赦者小人之幸君子之不幸一歲再赦善人喑啞昔文王作罰刑茲無赦小仁者大仁之賊故我有天下以來不甚放赦今四海安静禮義興行數赦即愚人常冀儌倖惟欲犯法不能改過當須慎赦臣按三代以下稱賢君者必曰唐太宗太宗之於赦也其慎也如此則赦無益於治道也明矣宣宗大中元年以旱故命同平章事盧商與御史中丞封敖疎理京城係囚大理卿馬植奏稱盧商等務行寛宥凡抵極法者一切免死彼官典犯賍及故殺平日大赦所不免今因疎理而原之使貪吏無所懲畏死者含寃無告恐非所以消旱災致和氣也昔周饑克殷而年豐衞旱討邢而雨降是則誅罪錄姦或合天意雪寃決滯乃副聖心也臣按五代晉天福中張允進駁赦論曰以水旱降德音宥過放囚冀感天心以救災非也假有二人訟遇赦則有罪者幸免無罪者銜寃寃氣升聞乃所以致災非弭災也天道福善禍淫若以赦為惡之人而變災為福是則天助惡人也觀於此言則赦無益於救災明矣五代時溫韜發唐諸陵唐莊宗時入朝賜姓名曰李紹冲韜多齎金帛賂劉夫人及權貴旬日遣還郭宗韜曰溫韜發唐山陵殆徧其罪與朱溫相埒耳何得復居方鎮天下義士謂我何莊宗曰入汴之初已赦其罪竟遣之胡寅曰罪人不可不誅赦令不可不守二者將何處必於未赦之前揆情法審輕重而區别之使預赦者無可誅之罪被刑者無可恕之人則一舉而兩得矣臣按事幾多端變故不一人之所為所犯赦文所條具者豈能一一該盡之哉然閭閻之幽郡邑之逺事出於一時或有反常殊異者上之人固無由周知而豫料之若夫干紀亂常之事闗於人倫入於大惡昭昭于天下耳目者豈應用事秉筆之人無一人知哉如溫韜發諸帝陵以竊取寶王雖婦人走卒亦或知之若是者宜於羣臣計議詔條之前明舉某人某事决不可赦豫有以處之使吾詔條頒布天下有司奉行之無有妨礙不至犯萬世之義失一時之信則得之矣宋自祖宗以來三歲遇郊則赦此常制也世謂三歲一赦於古無有景祐中言者以為三王歲祀圜丘未嘗輒赦自唐兵興以後事天之禮不常行因有大赦以蕩亂獄且有罪者宥之未必自新被害者抑之未必無怨不能自新將復為惡不能無怨將悔為善一赦而使民悔善長惡政教之大患也願罷三歲一赦使良民懷惠凶人知禁或謂未可盡廢即請命有司前郊三日理罪人有過誤者引而赦之州縣須詔到倣此臣按人君為天之子奉天之祀則當體天之心以惠天之民天之民不得已而誤入於罪赦之可也不幸而為人所害焉為天子者不能恭行天討使天之民寃苦莫伸豈天意所欲哉蓋赦之初設為眚災也後世相承既久不能復古然曠蕩之恩如雷雨之施不時而作使人莫可測知可也宋人為之常制而有定時則人可揣摩以需其期非獨刑法不足以致人懼而赦令亦不足以致人感也仁宗嘉祐中學士張方平言中外官多發人積年罪狀數按人赦前事及奏劾事輒請不以赦原減快一時之小忿失天下之大信自今有類此者以故違制書坐之御史吕誨亦以為言乃下詔曰比者中外多上章言人過失外眡公言内緣私忿詆欺瞹昧茍陷善良又赦令者所以與天下更始而有司多按赦前事殆非慎命令重刑罰使人洒然自新之意也自今有上章告人罪及言赦前事者訊之臣按無事而赦固非國家美事有事而赦而又不能守使失信於人尤非國家善治也蓋國寶於民民寶於信上之出令一有不信於民異時再有所言則民不信之矣是以善為治者必不輕於出令命既出矣而必守之以信非但欲其令之必行蓋欲其事之可繼也元西僧歲作佛事或恣意縱囚以售其姦宄俾善良者喑啞而飲恨臣按赦宥出於上識治體者猶以為非元人信胡僧之言每作佛事輒縱罪囚以希福報恩不出於上而出於下人不感帝之恩而感乎僧是以每遇將作佛事之先有罪在係者輒賂僧以求免遂使兇頑席僧勢以稔惡善良抱寃屈而莫訴異端所為無足責也中國之治烏可尤而效之哉以上慎眚災之赦大學衍義補卷一百九
