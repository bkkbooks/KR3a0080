body:
  text: 大學衍義補卷七十六明丘濬撰治國平天下之要崇教化本經術以為敎中程頥曰禮記雜出於漢儒然其間𫝊聖門緒餘及格言甚多如樂記學記之類無可議者檀弓表記坊記之類亦甚有至理惟知言者擇之如王制禮運禮器其書亦多𫝊古意又曰禮記除中庸大學惟樂記為最近道學者深思而自得之表記其亦近道矣乎其言正朱熹曰禮記要兼儀禮讀如冠禮䘮禮鄉飲酒禮之類皆載其事禮記只發明其理讀禮記而不讀儀禮則許多理俱無安著處又曰或謂禮記乃漢儒説恐不然漢儒最純者莫如董仲舒仲舒之文最純者莫如三策何曾有禮記中説話來如樂記所謂天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉仲舒安能到此必是古來流𫝊得此文字如此臣按禮記一書雜出於漢儒然非漢儒所能作乃其所傳記者也大學曾子作中庸子思作緇衣公孫尼子作月令呂不韋作王制文帝時慱士刺經作臣竊以為易書詩春秋四經之外帝王之良法聖賢之格言雜出於四十九篇之中詳矣是誠學者致知之要人君為治之法也易言隂陽書言政事詩言性情春秋言名分然皆主於一事惟禮之為書無所不載大而三才五典細而庶類萬事與夫治道之常禮節之變無不曲備而旁通焉臣於治國平天下之要採輯諸書而於是書所取為多又曰若欲觀禮須將禮記節出切於日用常行者看臣按禮記一書雖專以禮名而禮之為禮不止於一讀者當以禮為主而分四科以類考之先儒謂四科禮也儀也樂也制度也以吉㓙軍賔嘉節目之大者歸之禮以應對進退坐立趣行節目之大者歸之儀聲律歌舞音容節奏歸之樂封井宗學宮室器服歸之制度以此四科讀此四十七篇思過半矣周行已曰聖人制為冠昏喪祭朝聘鄉射之禮以行君臣父子兄弟夫婦朋友之義其形而下者見於飲食器服之用其形而上者極於無聲無臭之㣲衆人勉之賢人行之聖人由之故所以行其身與其家與其國與其天下者禮治則治禮亂則亂禮存則存禮亡則亡又曰秦氏焚滅典籍三代禮文大壊漢興購書禮記四十九篇雜出諸儒傳記不能悉得聖人之㫖考其文義時有牴牾然而其文繁其義博學者博而約之亦可以弗畔盖其說也粗在應對進退之間而精在道徳性命之要始於童幼之習而卒於聖人之歸臣按禮記之書天下之事無所不載而專以禮名者其大要在禮也雖然天下之事何者而非禮哉盖儒者之事無一而非禮學而非禮則為異端治而非禮則為伯道人有禮則安無禮則危國有禮則治無禮則亂事有禮則事為有紀否則散物有禮則物為成器否則廢人無一而可無禮無禮則非仁矣仁也者人也人而無仁則非人矣孔子曰克己復禮為仁張子曰禮儀三百威儀三千無一而非仁也由是觀之則知人之所以為人者以其有仁也為仁由禮為禮由敬則此聖人傳心之要治國平天下之基所由建立者也吳澂曰漢興得先儒所記禮書二百餘篇大戴氏刪為八十五小戴氏又損益為四十三曲禮檀弓雜記分為上下馬氏增以月令明堂位樂記鄭氏從而為註總四十九篇精粗雜記靡所不有秦火之餘區區掇拾所謂存十一於千百雖不能以皆醇然先王之遺制聖賢之格言往往頼之而存臣按禮記四十九篇宋儒表章大學中庸與論語孟子並為四書今其所存者四十七篇吳氏以其類相從以為纂言然非古經之舊也夫經文繁雜雖若不一而吾之心則一焉以吾純一之心而精擇夫不一之言一權衡之以吾聖人之道所謂大中至正焉者本之以正心脩身據之以循常應變用之以齊家治國平天下六經之道同歸矣以上禮記子所雅常也言詩書執守也禮皆雅言也朱熹曰詩以理性情書以道政事禮以謹節文皆切於日用之實故常言之禮獨言執者以人所執守而言非徒誦說而已也臣按先儒謂此章即聖人言語之節而見其立教之法詩書執禮是夫子所常言曰利曰命曰仁是夫子所罕言怪力亂神是夫子所不言夫子雅素之言止於如此若性與天道則有不可得而聞者要在黙而識之也噫生人之徳莫大乎仁天賦之理莫先乎性仁乃聖人所罕言性則大賢所不得聞者也今世三尺童子讀書未識偏旁開口便談性命聖門之教豈若是哉子曰興於詩立於禮成於樂朱熹曰興起也詩本性情有邪有正其為言既易知而吟咏之間抑揚反覆其感人又易入故學者之初所以興起其好善惡惡之心而不能自己者必於此而得之禮以恭敬辭遜為本而有節文度數之詳可以固人肌膚之㑹筋骸之束故學者之中所以能卓然自立而不為事物之所搖奪者必於此而得之樂有五聲十二律更唱迭和以為歌舞八音之節可以養人之性情而蕩滌其邪穢消融其查滓故學者之終所以至於義精仁熟而自和順於道徳者必於此而得之是學之成也又曰按内則十嵗學幼儀十三學樂誦詩二十而後學禮則此三者非小學傳授之次乃大學終身所得之難易先後淺深也程頥曰天下之英才不為少矣特以道學不明故不得有所成就夫古人之詩如今之歌曲雖閭里童稚皆習聞之而知其說故能興起今雖老師宿儒尚不能曉其義况學者乎是不得興於詩也古人自灑掃應對以至冠昏喪祭莫不有禮今皆廢壊是以人倫不明治家無法是不得立於禮也古人之樂聲音所以養其耳采色所以養其目歌詠所以養其性情舞蹈所以養其血脉今皆無之是不得成於樂也是以古之成材也易今之成材也難真徳秀曰自周衰禮樂崩壊然禮書猶有存者制度文為尚可考㝷樂書則盡缺不存後之為禮者既不合先王之制而樂尤甚今世所用大抵鄭衞之音雜以夷狄之聲而已適足以蕩人心壊風俗何能有補乎然禮樂之制雖亡而禮樂之理則在故禮記謂致禮以治身致樂以治心外貎斯須不莊不敬而慢易之心入之矣中心斯須不和不樂而鄙詐之心入之矣莊敬者禮之本也和樂者樂之本也學者誠能以莊敬治其身和樂養其心則於禮樂之本得矣亦足以立身而成徳也三百篇之詩雖云難曉今諸儒發明其義了然可知如能反覆涵泳其可以感發興起所謂興於詩者亦未嘗不存也臣按先儒謂無程氏之說後世不知所以成材之難無真氏之說後世遂果以成材為難矣然則人材之成果難乎易乎曰上之人立教以成之則易下之人奮志以為之則易上無其教下無其志而欲人材之成難矣如此則世乏良材國無善治後世所以不如古其在此歟陳亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮朱熹曰事理通逹而心氣和平故能言品節詳明而徳性堅定故能立臣按聖門之教以詩禮為先盖口之所諷詠者温柔敦厚之言身之所檢束者恭儉莊敬之體如此則可以造於成徳逹材之地矣聖人所以敎其子與其門人皆不外乎此也經解孔子曰入其國其敎可知也其為人也温柔敦厚詩敎也疏通知逺書敎也廣博易良樂敎也潔靜精㣲易敎也恭儉莊敬禮敎也屬辭比事春秋敎也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂真徳秀曰古者君臣上下共由六經之道上之所以為敎者此也下之所以為學者此也上因性以為教下亦因學以為俗故觀其國之俗即知其君之敎學詩則能感發其性情之正故其為人温和而柔順敦篤而厚重學書則通知古今治亂之理故其為人疏明不滯而所見者逺樂以道和故學之者開廣而博大平易而溫良易道簡潔精深禮主於恭儉莊敬故學之者各得之而成其徳春秋連屬其辭比次其義以寓是非褒貶之㫖故凡能如是者必有得於春秋者也古之學者學一經必得一經之用曰其為人則氣質俱化習與性成其視後世通經之士徒習章句訓義而無益於性情心術者何如哉然人各有所偏醇厚者於智或不足故其失愚疏逹者於言或易發故其失誣博大者易以奢廣峻潔者易以深刻恭敬者或煩勞而不安樂屬辭比事而不至者善惡或至繆亂故必矯其失而後有以全其得亦如古者敎胄子之意也曰詩之失書之失云者盖言學經者之失非謂經之有失也臣按真氏又言學此經者當思有以得於經者何如學詩矣吾之徳果溫柔敦厚矣乎學書矣吾之徳果疏通知逺矣乎必如是而深思焉如是而自勉焉庶乎為善於經者不然則章句而已耳訓義而已耳其何益哉其言警切讀經者當以自察敎經者當以示訓觀人者當以為徴荀子曰書者政事之紀也詩者中聲之所止也禮者法之大分類之綱紀也故學至乎禮而止矣夫是之謂道徳之極禮之敬文也樂之中和也詩書之博也春秋之㣲也在天地之間者畢矣又曰禮樂法而不說詩書故而不切春秋約而不速楊倞曰此說六經之意書所以紀政事詩謂樂章所以節音主乎中而止不使流滛禮所以為典法之大分綂類之綱紀類謂禮法所觸類而長者真徳秀曰法而不說謂陳列其法使人自悟而無待於論說故而不切謂但述己然之得失使人知以為監而不待於迫切莊子曰詩以道志書以道事樂以道和易以道隂陽春秋以道名分朱熹曰莊子此語後來人如何可及臣按荀况學聖人之道未至者其言五經似矣莊周則非聖人之道而自為一家言者而亦尊崇聖人之經如此且其言簡而理盡後之總論經者皆莫及焉然言六經而不及禮則彼學老耼者則固以禮為忠信之薄而放蕩於禮法之外者乎荀之言則重乎禮莊之言則遺乎禮可見儒學所以異於老莊者其辨在乎禮而已矣揚子曰說天者莫辨乎易說事者莫辨乎書說體者莫辨乎禮說志者莫辨乎詩說禮者莫辨乎春秋真徳秀曰戰國以來辯士之說勝而不根諸理流俗惑之至漢猶然故揚子發此論然於五經之㫖未能有大發明也班固曰六藝之文樂以和神仁之表也詩以正言義之用也禮以明體明者著見故無訓也書以廣聽知之術也春秋以斷事信之符也五者盡五常之道相須而備故易為之原真徳秀曰六經於五常之道無不包者今以五常分屬於六藝是樂有仁而無義詩有義而無仁也可乎哉大率漢儒論經鮮有得其指要者反不若莊生之當於理也程頥曰凡看書各有門庭詩易春秋不可逐句看尚書論語可以逐句看聖人用意深處全在繫辭詩書乃格言朱熹曰上古之書莫尊乎易中古後書莫大於春秋然此兩書皆未易看又曰子所雅言詩書執禮未始及易夫子嘗以教人只是如此今人便先為𤣥妙之說臣按古有六經易詩書春秋禮樂也易詩書春秋四者親經孔子所刪定者也而禮與樂無全書後世所謂禮經者儀禮周禮禮記也三書者皆出於漢世儀禮周禮有成書而禮記則雜出於漢儒之所記樂書無傳而樂記一篇雜於禮記中其文雅馴又多格言非漢儒所及盖亦古經之遺也自宋王安石棄儀禮不以取士世遂因之今所謂五經者易書詩春秋禮記也學者各專一經能於本經之外旁及他經方見天地之純全古人之大體然後得為全體大用之學茍拘拘於章句訓義之末以取一第以為進身之階即束之髙閣而所用者非所學是固非聖賢敎學之道亦豈祖宗所以造士之意哉以上六經何晏曰魯論語二十篇齊論語則有問王知道凡二十二篇其二十篇中章句頗多於魯論古論出孔氏壁中分堯曰下章子張問以為一篇有兩子張凡二十一篇篇次不與齊魯論同朱熹曰以何晏所叙篇數考之則今之論語信為魯論矣金履祥曰此段何晏進論語集解之疏文也朱子節入然魯論齊論至張禹始合至鄭康成則以魯論考之齊論古論為之註三論始合為今定本栁宗元曰諸儒皆以論語孔子弟子所記不然也孔子弟子曾參最少又老乃死而是書記其將死之言則其去孔子之時甚逺而當時弟子略無存者矣吾意孔子弟子嘗雜記其言而卒成其書者曾子弟子樂正子春子思之徒也故是書之記諸弟子必以字而曾子不然盖其弟子號之云耳而有子亦稱子者孔子之殁諸弟子嘗以似夫子而師之乃叱避而退則固嘗有師之號矣朱熹曰栁氏之言其論曾子者得之而有子叱避之說則史氏之鄙陋無稽而栁氏惑焉以孟子攷之當以曾子不可而寢其議有子易嘗據孔子之位而有其號哉程頥曰論語之書成於有子曾子之門人故其書獨二子以子稱朱熹曰程子因栁氏之說斷而裁之以為此說楊氏又謂此書首記孔子之言而以二子之言次之盖其尊之亞於夫子尤為明驗至於閔損冉求亦或稱子則因其門人所記而失之不革也歟又曰論語為書𫝊道立言深得聖人之學或問論語以何為要曰要在知仁孔子說仁處最宜玩味曰孔子說仁處甚多尤的當是何語曰皆的當但其門人所至有不同故其答之亦異臣按仁之一字先儒以心之徳愛之理為訓臣竊以為仁之為仁乃人心之全徳道理之總名仁義禮智之仁如元亨利貞之元也專以元言則元屬乎春綂以元言則亨利貞何者而非一元之氣乎仁之於義禮智亦猶是也是故顔子問仁子曰克己復禮為仁仲弓問仁子曰主敬行恕為仁樊遲問仁子曰居處恭執事敬與人忠為仁子張問仁子曰恭寛信敏惠為仁司馬牛問仁子曰仁者其言也訒凡若此者皆因一人之問而告之以一理也若夫樊遲一人則凡三問焉首告之以恭敬忠次告之以先難後獲終告之以愛人是仁之為仁無往而不在凡夫天下之理人心之徳無一事之非仁也夫其所謂出門如賔承事如祭己所不欲勿施於人與夫其言也訒先難後獲及愛人者皆就事而言也若夫所謂禮所謂忠所謂敬所謂恭所謂寛所謂信所謂敏與惠皆以為仁可見仁之為仁不止於一徳盖衆理之總名諸徳之要道若專以為一徳指為一事則仁之道小矣故曰仁也者人也以見人之所以為人以其全盡此人之理也但其發之最先者則以惻隱為之端耳先儒解之曰仁者天理之至公人心之全徳當以此言為中的又曰論語之書其辭近其指逺辭有盡指無窮有盡者索之訓詁無窮者要當㑹之以神李侗曰人之持身當以孔子為法孔子相去千餘載既不可得而親之所可見者獨論語耳論語盖當時門人所記孔子言行也每讀而味之玩而繹之推而行之雖未升堂入室亦不失為士君子也朱熹曰孔門答問曾子聞的話顔子未必與聞顔子聞的話子貢未必與聞今却合在論語一書後世學者豈不是幸事但患自家不去用心又曰夫子敎人零零星星說來說去合來合去合成一箇大事物臣按朱熹嘗言初入學即讀論語其後讀盡天下書不見有一書勝如論語者盖諸聖人一人是一聖人孔子則合衆聖人以為大聖人諸書一書是一書論語是合衆書以為一書孔子之言明白正大皆就人倫日用上說所謂大中至正之理中庸之道也孔子之說譬如人在平地上行從容自在後人之說如人厭行平地却上髙山泛大海雖是髙深然多﨑嶇險阻不若平地之可以常行無礙也所謂髙山大海謂之非地不可然非其平坦者致逺恐泥為學之道所當讀之書誠無有要於論語者讀書者以論語為主以權衡天下之書以折衷諸儒之說隨其資質之近似而因其一言之明處以逹聖人之全體然後推之以用於天下大學經之一章儒者全體大用之學也雖不記之論語書中然真孔子之言也學者所當世守之以為家傳之心法以上論語以上本經術以為敎中大學衍義補卷七十六
