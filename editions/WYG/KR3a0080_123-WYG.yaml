body:
  text: 大學衍義補卷一百二十三明丘濬撰治國平天下之要嚴武備牧馬之政上易說卦乾為天為良馬為老馬為瘠馬為駁馬胡一桂曰乾為天而貫四時純陽而健為馬在春為良夏為老秋為瘠冬為駁乾取象無所不包不可與諸卦例論呉澂曰馬加良老瘠駁四字以見純陽無隂異於震坎隂陽相雜之馬也良謂純陽健之最善者也老謂老陽健之最乆者也瘠謂多骨少肉健之最堅彊者也駁馬鋸牙食虎豹健之最威猛者也震為雷其於馬也為善鳴為馵足為作足為的顙蔡淵曰陽動於下故為雷氣始亨故於馬為善鳴陽在下故又為馵足為作足隂在上故為的顙的白也而顙在上也詩所謂白顛傳所謂的顱是也坎為水其於馬也為美脊為亟心為下首為薄蹄為曳徐幾曰三畫之卦上畫為馬顙下畫為馬足其中畫陽故為美脊為亟心上柔故又為下首下柔故又為薄蹄為曳臣按易之為書以明隂陽其取諸物也無所不有而於馬獨詳焉孔子於坤既以利牝馬之貞以取象而於大畜又取乾之象以稱馬蓋以天地間動物莫健如龍而馬次之龍非可畜之獸而世不常有就地用論之健而不息者皆莫如馬也故於大畜之馬則謂之良良者禀純陽之氣而有剛健之才者也其間坤之牝者雖曰其隂之質而其所以為性者則從一而不變亦有健徳存焉良以馬之健者屬乾而牝則屬坤坤者乾之對言馬於坤明其為乾之配也是以雜卦之中八卦所取之物惟一二見獨於馬凡三取之於物惟取其一體至於馬則其質之良齒之老形之瘠色之異性之偏無所不具以見馬之為物於畜類中最健而且大人世所不可無而有天下國家者必畜之以為治具者也周書司馬掌邦政蔡沈曰軍政莫急於馬故以司馬名官臣按周六官其五者之卿皆以人為名而獨於夏官卿以馬名焉者蓋以見國之大事雖在於戎而戎之大用則在於馬所謂五官者皆主於文事而此一官獨用於武備武備之說所以平諸侯正天下無馬則無以駕車輅而以為禮無馬則無以整戎行而以即戎邦政有所不行矣周人因井田而制軍賦四井為邑四邑為丘十六井也有馬一匹四丘為甸甸六十四井有戎馬四匹兵車一乘一同百里提封萬井定出賦六千四百井戎馬四百匹一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹林駉曰馬政之說古今凡幾變以官民通牧者周也成周以民牧者如丘甸嵗取馬四匹之類平時則官給芻牧有警則民供調發然而在天子之都諸侯之國士大夫之家未甞不自畜馬此蓋在官養之耳何以知之如周禮以天子十有二閑先儒論數謂不過三千餘匹衛文公承夷狄所滅新造之後末年亦至騋牝三千若以制度論之衛以諸侯之國又當殘亂之餘其他固不及論安得遽如成周全盛乘馬之數蓋所謂天子十有二閑是養之於官者衛之騋牝三千舉官民通數而言之也臣按今之中國即古之中國萬古此天地則萬古此山川萬古此山川則萬古此人物成周之世於天子畿内千里之地而可以得馬四萬匹諸侯國三百十六里之地可以得馬四千匹大夫家采地百里之地而可以得馬四百匹今而一郡之地視古者一國一邑之地視古者一家成周盛時不聞其乏馬之用而馬之在民者亦未聞其為害後世則不然豈今古土地生牧相遼絶哉雖然不特成周盛時為然也若夫古之衛地即今懷慶彰徳大名滑濮等郡之境魯地即今兗州寧海髙密等處之境衛乃有牝之騋者至於三千牡而小者不計焉魯乃有牡之純者至於十六色牝而駁者不與焉孔子曰其人存則其政舉又曰為政在人則是馬政之興舉實在乎人今無其人耳豈其地之牧畜宜於古而不宜於今也詩􅅠風定之方中序曰美衛文公也其卒章曰靈善也雨既零落也命彼倌人主駕者也星見星言夙駕說舎止于桑田匪直也人秉操也心塞實也淵深也騋牝三千朱熹曰馬七尺以上為騋言方春時雨既降而農桑之務作文公於是命主駕者晨起駕車亟往而勞勸之然非獨此人所以操其心者誠實而淵深也蓋其所畜之馬七尺而牝者亦已至於三千之衆矣蓋人操心誠實而淵深則無所為而不成其致此富盛宜矣記曰問國君之富數馬以對今言騋牝之衆如此則生息之蕃可見而衛國之富亦可知矣又曰文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘臣按蘇軾有言富彊之業必深厚者為之非輕揚淺露者之所能致也謝枋得亦言秉心也實故事事朴實不尚髙虚之談秉心也淵故事事深長不為淺近之計富國彊兵豈談髙虚務淺近者之所能辦哉是知為國者固欲其富彊然而富彊之業實繇乎人必得人以盡地力則富可致必得人以蕃畜産則彊可期然地生物雖各有所宜而無不生物之地惟畜産則地有宜有不宜焉是以古人問國之富數馬以對而設官以掌邦政者舎人而以馬名其官則富彊尤在於兹也可知已是故有文公誠實淵深之心乃能致牝馬三千之盛王安石創為保馬之法國家未必得馬之用而生民先受馬之害此無他其心不誠而慮不逺也與其得安石之徒而用之孰若得王毛仲張萬嵗而用之哉二人者髙談雖不足而猶忠實而近厚也吉日之首章曰吉日維戊既伯既禱孔穎達曰伯者長也馬之祖也夏官挍人春祭馬祖天駟龍為天馬故房四星謂之天駟常祭在春將用馬力則又備禮禱之朱熹曰戊剛日也伯馬祖也謂天駟房星之神也言田獵將用馬力故以吉日祭馬祖而禱之臣按晉天文志曰房四星亦曰天駟為天馬主車駕本朝每嵗春秋遣太僕寺官祭馬神而於州縣皆立馬神廟本諸此魯頌駉頌僖公也其首章曰駉駉腹榦肥張貌牡馬在坰林外曰坰之野薄言駉者有驈黑驪白跨有皇黄白曰皇有驪純黑有黄黄而微赤以車彭彭盛貌思無疆深廣無窮思馬斯臧善也其二章曰駉駉牡馬在坰之野薄言駉者有騅蒼白雜色有駓黄白雜色有騂赤黄有騏青黑以車伾伾有力也思無期思馬斯才材也其三章曰駉駉牡馬在坰之野薄言駉者有驒青驪驎曰驒驎今連錢驄有駱白馬黑鬛有駵赤身黒鬛有雒黒身白鬛以車繹繹不絶貌思無斁厭也思馬斯作奮起也其四章曰駉駉牡馬在坰之野薄言駉者有駰隂白雜毛有騢彤白雜毛有驔毫在骭而白有魚二目白似魚以車祛祛彊健也思無邪思馬斯徂行也朱熹曰此詩言僖公牧馬之盛繇其立心之逺故美之曰思無疆則思馬斯臧矣衛文公秉心塞淵而騋牝三千亦此意也吕大臨曰僖公修政以誠心行之故言思無彊思無期思無斁思無邪馬之所以臧才作徂者其效也與衛風秉心塞淵騋牝三千之意同古之賢君誠心以行善政其效皆若此非獨牧馬而已臣按先儒謂詩人美文公之馬則言其騋而牝者有三千匹之衆多美僖公之馬則言其駉而牡者有十六種之毛色蓋各極其盛而言皆以見其國之殷富也蓋馬有牝牡而形質有髙下腹榦有肥瘠馬之牝者取其形質必髙而大使所育者皆騏驥之種馬之牡者取其腹榦必肥而張使所駕者皆驃騎之良衛之馬詩人詠其牝之騋魯之馬詩人頌其牡之駉意者說于桑田者不分牝牡舉牝最髙者以見其餘之皆然牧於坰野者特取其牡而牝不與焉各隨其毛色而分别之以見其成羣如此也雖然牧馬者將以資軍馬之用固必以牡為貴然非其牝之良則亦不能以致其馬之彊而盛也衛詩之騋特言牝而不及牡豈無意哉周禮馬質質平也主買馬平其價直掌質馬馬量三物量其材質之髙下而知其價一曰戎馬供武事馬二曰田馬供田獵馬三曰駑馬下材而供冗事者皆有物賈材有美惡價有髙下綱惡馬駕不馴者以索維之禁其奔踶凡受馬於有司者謂校人之屬受馬謂國事當用馬者書其齒毛與其賈書其年齒毛色及價直馬死則旬之内更受馬在十日之内死者償之更償也旬之外入馬耳以其物更十日之外馬死者割其馬耳入官見其實死就以其皮肉筋骨來償不計價其外否十日之外則不償雖皮肉不取馬及行則以任齊其行若馬之行則以所任載之輕重道里之逺近别識之以齊其勞逸而後行若有馬訟則聽之有爭馬之訟則聽其曲直禁原蠶者原再也一年不許兩次養蠶鄭𤣥曰天文辰為馬蠶書蠶為龍精月值大火則浴其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬歟臣按周人之馬買於民間故立官以為馬質質之為言平也專以質平馬之價直蓋馬之材質有髙下氣力有彊弱年齒有老壯毛色有純駁故其價直不無多少之異焉而其用之大要有三上焉者以供戎事之用次焉者以供田獵之用下焉者以供冗雜之用馬生於民間而用之於公上不可以空取之也不可以槩取之也空取之則民不復私畜矣槩取之則民不加芻秣矣是以三代盛時其於馬也於民常賦之外有餘畜者則官以價直易之焉養之閑廏之中以備不時之用卒有國事民之無馬者則於是領給焉其給之也必書其馬之年齒毛色與原所買之價使民受之者有定色則不敢以駑易良有常齒則不敢以老易壯有原價則不敢以賤易貴所受馬在十日内死者則責其陪償受之未乆在十日外死者惟取其皮耳恐其詐偽也在十日之外死者則予之民而官不取矣後世兵民既分馬養之民而收之於官然後散之於軍官府無復有質買之政而馬之死者一切責軍之償在官者未必實得馬之用而軍民俱受其弊矣近時馬政亦有科錢買馬之令然所得者未必良而給之於軍遇有倒死陪償如故而西北之邊苦之尤甚至有鬻子女而不能償者吁可歎也已臣請自今以後朝廷酌為中制定為馬價馬之價公私交易皆不許過二十緡違者馬與價俱入官牙行之人坐以違制罪說者若謂物之不齊物之情大屨小屨同價孰肯為其大者臣竊謂天生之物與人為之物不同馬之良乃天所生人力不與焉官府既為定價則民間有馬者不過求多直而皆市之官矣惟其市之官所得有限他市則可多得以此官之所易者未必得良也若夫馬之倒死不責之償則彼蔑視其馬而死者愈多若責之償則士卒貧窘何由得錢臣愚以為待其死而責其償不若先其生而為之備凡有受馬者請如周制書其年齒毛色及其原價而又量其材質之髙下肥瘠併書之冊其馬有死者誠瘠且老則不責其償若其馬實壯肥而齒未老馴致瘦損而死者則責其同伍者合力償之同伍有先首及其督責之實狀則免其人而惟責償所受者與夫其馬因公事而死及其人本善調息而馬忽然不意暴死者皆不在償數此外又立為馬病及瘦損豫告醫治之法其馬實病而死非由人致醫證明白亦不償挍人馬官之長掌王馬之政謂差擇乘養之數辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物凡頒良馬而養乘之乘馬四匹曰乘一師四圉養馬曰圉三乘為皁馬十二匹皁一趣馬下士一人主之三皁為繫馬三十六匹繫一馭夫中士一人主之六繫為廏馬二百十六匹廏一僕夫上士一人主之六廏成挍六馬各一廏共成一挍馬千二百九十六匹挍有左右一挍分左右駑馬三良馬之數六馬其五皆良惟駑馬物獨三倍良馬之數也鄭𤣥曰挍人者馬官之長挍之為言挍也主馬者必仍挍視之呉澂曰良馬謂五路之馬皆良善者也六廏成挍六馬各一廏共成一挍挍有左右則良馬一種者四百三十二匹五種合二千一百六十匹然後王馬大備也臣按挍人之職鄭氏解挍為比挍之挍或者又謂用木相交為圏檻以制禽獸之出入謂之挍因謂主馬者為挍人觀挍人所掌者始於乘積而為皁為繫為廏而成於挍或者之解未必非也六馬之屬註謂玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役臣竊以為不然謹考馬質量馬三物一曰戎馬即此戎馬也二曰田馬即此田馬也三曰駑馬即此駑馬也其所謂齊馬者以駕齊車者也齊車云者先儒以為王自整齊之車所謂道馬者以駕道車者也道車云者先儒以為王行道徳之車意者馬之足力齊者則擇以為一類而謂之齊馬之範驅馳者則擇以為一類而謂之道歟且挍人掌王馬之政辨六馬之屬六者之馬皆謂之物先儒謂其毛其足其力皆所謂物也辨其物使之皆以類而相從可為育種者為一類可供戎事者為一類毛足齊一者為一類善於馳走者為一類可供田獵者為一類材下而供雜役者為一類挍人用其材質髙下毛色純駁辨之各為一類而共有六類焉况所掌者王馬之政謂之政則非但分類以駕車一事可知也六馬之用以種馬為先後世乘輿惟牡是用漢人乘牝者為世所擯况以駕天子之輅乎鄭氏解種馬謂馬之上善似母者賈公彥謂馬亦有似父者主母而言也臣竊以謂古人質樸所謂種馬者安知非謂牝哉呉澂謂馬之至良可為種者丘葵亦謂馬之善育者所謂為種善育非牝而何夫用以乘惟取其質之良色之純而力足以任者爾又何牝牡之拘哉蓋馬之性牡者多有不馴而牝則多馴焉故用之以駕天子之輅慮其或有奔踶而致傾軼耳後世馬惟用牡所以駕乘而征戰者未甞用牝而其所謂牡者又往往去其勢而絶其生道馬之所以不蕃碩者坐此故也盍觀衛詩所謂騋牝三千言牝不言牡可見矣臣請今日除戰馬外凡公私所乘之馬皆許以牝有牡者官以價售之以為内廏及官府營伍邊方之用如此則習以成風人皆倣傚非惟官得其用而私亦得其利而國家馬政修舉生息日多武備日盛而中原之民不受保馬之害矣天子十有二閑馬六種邦國六閑馬四種家四閑馬二種凡馬特牡馬居四之一鄭𤣥曰此降殺之差也凡馬每廏一閑諸侯有齊馬道馬田馬大夫有田馬各一閑其駑馬則皆分為三焉賈公彦曰天子十二閑分為左右每馬各分為兩廏諸侯與大夫每馬直一廏不分左右呉澂曰閑猶闌也以木距門防馬者也六廏成挍挍有左右故十二閑也特居四之一特牡馬也三牝一牡欲其生之衆也臣按成周之世其馬之牧於官者牝牡皆具而牡居四之一則是馬百匹而有七十五匹之牝矣後世在官之馬惟有牡而無牝而民間所畜者雖有牝然亦牡多而牝少孳牧所以不蕃而馬政所以不舉武備所以不修者坐此故也譬則人焉惟育男而不育女而欲户口蕃息難矣臣願朝廷復古昔王馬之政特敕有司修舉廢典凡馬之在官在民者皆必牝多於牡則芻豆不徒費而國馬日以蕃息矣春祭馬祖執拘也駒馬二嵗曰駒夏祭先牧始養馬者頒馬攻特秋祭馬社臧善也僕冬祭馬步神為馬災害者獻馬見成馬於王􅊰簡習馭夫馭車者鄭𤣥曰馬祖天駟也房為龍馬執駒無令近母春通淫之時駒弱血氣未定為其乘四恐傷之也先牧謂始養馬者夏通淫之後攻其特為其蹄齧不可乘用故騬之馬社始乘馬者臧僕謂簡練馭者令皆善也臣按周人於馬不惟養於人而又禱之於神蓋國之大事在戎而戎之大政在馬然馬之為物所以遂其性者雖係乎人之養而有人力之所不及者非神以相之安能得其孳育多而臕息壯哉此成周所以有四時之祭而其祭也又各因其祭而有所攻執簡習焉不徒責之人而又求之神不專恃乎神而又任乎人古之帝王合天人而一之非但以之治人雖畜類之賤亦無不然此治古之政後世所以不能及也今國家每嵗春秋太僕寺有馬神之祭而各州縣皆立馬神廟亦周人意也但所謂執駒攻特臧僕講馭夫之政尚缺焉誠隨其時舉其祭因其祭而行其政則馬得其養國賴其用矣或曰春之執駒秋之臧僕冬之講馭夫無非馬政也而獨於夏之攻特謂之頒何也蓋特之為言牡也攻之為言治也鄭司農所謂騬之是也韻書騬犗也俗謂之騸馬之駒者春則拘執之使其體全而不傷其血氣馬之特者夏則攻治之使其性馴而不至於蹄齧是以所牧之馬神全而力健性馴而質良然後簡擇其飼養之人練習其駕馭之卒此所以獨謂之頒也意者六馬之中惟種與駑有牝曰戎曰田曰道皆所攻之特歟不然所謂特居四之一者牝多而牡少其牝之多如此將置之何所也趣馬趣養馬者掌贊正良馬而齊其飲食簡其六節掌駕說音稅之頒辨四時之居治以聽馭夫呉澂曰簡其六節謂差擇良馬以為六等也駕以行說以止有勞逸之節故叙而頒之也居謂牧庌所處之宜治謂執駒攻特之屬臣按此可見古人養馬適飢渴之宜順勞逸之節辨寒温之時先儒謂辨四時之居者二月之後盛陽處外則在牧而有庌八月之後陽在地中則在廏而有閑也巫馬下士二人醫四人府一人史二人賈主買賣者二人徒二十人掌養疾馬而乗治之相助也醫而藥攻馬疾受財以資醫馬之費于挍人馬死則使其賈粥賣也之入其布泉也泉即錢也于挍人賈公彦曰巫知馬祟醫知馬病故連類在此呉澂曰巫馬知馬祖先牧馬社馬步之神者馬疾若有犯焉則知之是以使與醫同職乘治之者謂驅馬以知其疾之所在而治之也臣按先儒謂巫所以通鬼神醫所以寄生死非但於人為然而於畜類亦莫不然也周官設巫馬之官專掌疾馬而乘治之乘治云者蓋以馬之疾難知必驅步之以發其疾而後驗而療之也其職雖主於乘治然以其藥而攻馬之疾者則有醫四人焉巫馬不過禱之神以相助之而已非專主於巫禱也本朝設馬神廟太僕寺及州縣皆設獸醫蓋得周人意也近世有安驥集等書專主馬病乞下大醫院挍正刻板頒布有司俾專其業者講而用之則馬無有不得其死者矣牧師掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚萊鄭𤣥曰頒之者授圉者以牧地孟春焚牧地以除陳生新草也中春通淫以隂陽交合之時合馬之牝牡也賈公彦曰言厲禁者謂可牧馬之處亦使其地之民遮䕶禁止不得使人輒牧牛馬臣按古人養馬處處皆有牧田即今之草場也可耕則授之於農不可耕者則留以養馬蓋耕墾之地草萊不生留其地所以蓄草蓄草所以養馬養馬所以備武事備武事所以安邊方壯王室非小故也昔人謂農事弗擾則馬政自修故詩人稱馬政必歸之農魯頌美僖公亦曰務農重穀牧于坰野豈不以農政既修則馬政自舉乎我祖宗於畿甸之間民耕之外輒擇有水草處以為草場近日盡為權貴所有民間之馬無地可牧請一切復之立為厲禁政令異日欲行周人牧師之政舉而措之云耳以上論牧馬之政上大學衍義補卷一百二十三
