body:
  text: 大學衍義補卷二十一明丘濬撰治國平天下之要制國用總論理財之道下論語子曰節用而愛人楊時曰易曰節以制度不傷財不害民葢侈用則傷財傷財必至於害民故愛民必先於節用朱熹曰國家財用皆出於民如有不節而用度有闕則横賦暴斂必先有及於民者雖有愛人之心而民不被其澤矣是以將愛人者必先節用此不易之理也臣按帝王為治之道不出乎孔子此言愛之一言萬世治民之本節之一言萬世理財之要孟子曰無政事則財用不足朱熹曰生之無道取之無度用之無節故也臣按國家不患財用之不足惟患政事之不立所謂立政事者豈求財於常賦之外哉生之有道取之有度用之有節而已趙簡子使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉尹鐸損其戸數胡寅曰繭絲者取之不息至於盡而後止也尹鐸雖少而心智簡子雖貴而慮長其後無䘏為智氏所攻卒於晉陽托身而得免况為天下者乎而後世謀國者以愛民敦本為腐儒常談以聚斂積實為應時急務凡江海山林藪澤魚鹽金石茗荈之利皆王政所弛者設法著令無不𣙜取昔也民富可以多取既而國富則民貧而無可取矣昔也國富可以横費既而民盡則國貧而無可費矣以四海之大九貢之入文景守之則三十税一又且盡蠲不聞空匱之患明皇徳宗守之則為大盗所迫倉皇奔竄食糲麥飯啖蕪菁根而不能飽不聞掊克之益何輕用其國而慮不及趙簡子與尹鐸哉何急急於繭絲之近用而忽於保障之大計哉臣按繭絲主賦税而言保障指藩籬而言尹鐸之意不在賦税在乎藩籬簡子知其意而從之鐸守晉陽損其戸數其後簡子之子果賴其庇然求其所以為保障之實不過損民之戸數而已夫國家所以為保障之固者以其民戸之衆也今欲其保障而乃損其戸數何哉葢戸數一増則民間各自立門戸取之既多役之復衆力分而財聚民生所以日耗民心所以日離徃徃生其怨懟之心而背畔也今損其戸數則一夫應公家之征求餘夫營私家之衣食生理既厚感戴益深惟恐上之人一旦舍我去而他人來不我恤也一遇國家有難竭力以衛上捐軀以拒敵凡可以為國家保障者無所不用其極焉彼其以民為繭絲者則異乎是盡民之力而役之罄民之貲而取之既征其田畆又征其畜產與夫山澤之所出飲食之所需無一不有税焉譬則工女之繰絲縷縷而紬繹之非見蛹不止也胡氏所謂賊道者豈非斯人也哉上以賊道待下下亦以賊道應之睊睊然側目以視其上惟恐其去之不速也况望為之保障哉唐陸贄曰地力之生物有大數人力之成物有大限取之有度用之有節則常足取之無度用之無節則常不足生物之豐敗由天用物之多少由人是以先王立程量入為出雖遇菑難下無困窮理化既衰則乃反是桀用天下而不足湯用七十里而有餘是乃用之盈虛在於節與不節耳不節則雖盈必竭能節則雖虛必盈臣按陸贄進言於其君所謂節之一言誠萬世人君制用豐財之要道也節與不節是葢君徳修否之驗府庫盈虛之由生民休戚之本國家治亂之基贄既即此言告其君於前復即衛文公漢文帝唐太宗三君始由艱窘而終獲豐福以著其能節則雖虛必盈之效以為其君勸秦始皇漢武帝隋煬帝三君始由豐厚而終以蹙喪以著其不能節則雖盈必竭之效以為其君戒其末又曰秦隋不悟而遂滅漢武中悔而獲存乃知懲與不懲覺與不覺其於得失相逺復有存滅之殊安可不思安可不懼是又開其君以遷善改過之機也吁後世之英君誼主有志於保民生壽國脉者當以節之一言佩服於心而以贄所引之六君節與不節者以為勸戒而是思是懼則宗社之靈長生靈之安養實有賴焉蘇軾曰為國有三計有萬世之計有一時之計有不終月之計古者三年耕必有一年之蓄以三十年之通計則可以九年無飢也嵗之所入足用而有餘是以九年之蓄常閒而無用卒有水旱之變盗賊之憂則官可以自辦而民不知如此者天不能使之菑地不能使之貧盗賊不能使之困此萬世之計也而其不能者一嵗之入纔足以為一嵗之出天下之產僅足以供天下之用其平居雖不至於虐取其民而有急則不免於厚賦故其國可静而不可動可逸而不可勞此亦一時之計也至於最下而無謀者量出以為入用之不給則取之益多天下晏然無大患難而盡用衰世茍且之法不知有急則將何以加之此所謂不終月之計也臣按古今制國用之大略蘇軾此言盡之矣人君承祖宗之統為生靈之主有土地為之產財有黎庶為之生財有臣工為之理財當夫國家無事之時豫為國家先事之具以為萬世之計可也不幸所入纔足以為出所產僅足以為用吾則痛加抑損力為撙節可已則已非不得已必已可用則用非必當用不用不耗其財於無益之事不費其財於無用之地不施其財於無功之人如此則所以為國計者非但不為不終月之計而所謂一時之計者方且經之營之寸積銖累朝斯夕斯由小而致大積少而成多日計不足月計有餘嵗復一嵗積三年而有一年之儲由九年而致三年由三十年而致十年由是而致夫百千萬年以為子孫無窮之計所謂天不能菑地不能貧人不能困之者豈不信其必然哉蘇轍曰方今之計莫如豐財然所謂豐財者非求財而益之也去事之所以害財者而已使事之害財者未去雖求財而益之財愈不足使事之害財者盡去雖不求豐財然而求財之不豐亦不可得也事之害財者三一曰冗吏二曰冗兵三曰冗費三冗既去天下之財得以日生而無害百姓充足府庫盈溢人君所為無不成所欲無不如意矣臣按蘇轍論豐財之道去其害財者而已害財之事有三所謂吏之冗員兵之冗食其中節目雖多然大要有定名有常數除其繁冗而存其切要害斯去已惟所謂費之冗雜者則途轍孔多窠臼不一横恩濫賜之溢出修飾繕造之泛興禱祈遊玩之紛舉不當用而用不可予而予三害之中冗費之害尤大必不得已而去之吏兵無全去之理惟費之冗者則可權其緩􅇥輕重而去之焉凡所謂冗者有與無皆可之謂也事之至於可以有可以無吾寧無之而不有焉則不至害吾財矣曽鞏曰用財有節則天下雖貧其富易致也用財無節則天下雖富其貧亦易致也漢唐之始天下之用嘗屈矣文帝太宗能用財有節故公私有餘而致天下之富焉漢唐之盛時天下之用嘗裕矣武帝明皇不能節以制度故公私耗竭而致天下之貧焉且以宋景徳皇祐治平挍之景徳戸七百三十萬墾田一百七十萬頃皇祐戸一千九十萬墾田二百二十五萬頃治平戸一千二百九十萬墾田四百三十萬頃天下歳入皇祐治平皆一億萬以上嵗費亦一億萬以上景徳官一萬餘員皇祐二萬餘員治平二萬四千員皇祐官數一倍於景徳治平則三倍之矣其餘用財之端皆倍可知也誠詔有司按尋載籍而講求其故使凡入官之多門用財之多端皆可考而知之然後各議其可罷者罷之可損者損之使其所費皆如景徳之數則所省者盖半矣則又以類而推之天下之費有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必求其所以約之由而從之如是而力行以嵗入一億萬以上計之所省者十之三則嵗有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄矣臣按曽鞏此議以宋真宗仁宗英宗三朝挍之以見其財賦出入之數乞詔有司按尋載籍講求三朝所以費用其財者考知其數即今比舊罷其所可罷損其所當損從其約而杜其浮其議卓然可行顧人君肯用與否耳臣嘗因其言而疏以為今日當行之要務竊惟我朝疆宇比宋為廣而百年以來無甚鉅費凡宋所謂郊賚嵗幣祠禄皆無之其最費者宗祿養兵䕃子耳然䕃子止於武職文臣亦無幾焉臣考諸司職掌洪武中人民一千六十五萬二千八百七十戸墾田八百四十九萬六千五百二十三頃税糧二千九百四十四萬石戸口之數挍之宋雖略相當而今日墾田則過之逺矣所入既多而所費比之又少是宜國家儲積數倍於宋焉請自今為始乞命有心計臣僚稽考洪武永樂宣徳正統以來戸口墾田及錢糧金銀絹帛之數毎嵗出入比今孰多孰少然後即其見在據其嵗之所入以計其嵗之所出該用幾何餘積幾何以定今日出入之數庶幾曉然知祖宗之故實府庫之虛實而不敢輕費焉臣又觀鞏告其君有曰前世於凋弊之時猶能易貧而為富今吾以全盛之埶用財有節其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易不論可知也吁宋之時入少而出多其臣猶責其君以為非難况今日之全盛庶富非宋可比在聖君為之又何難哉鞏所謂其浮者必求所以浮之自而杜之其約者必求所以約之由而從之與夫蘇軾所謂去之甚易而無損存之甚難而無益是二人之言誠人君去冗費足國用之正論要法也伏惟聖心加察又何難而不易哉以上總論理財之道臣按人君為治莫要於制國用而國之所以為用者財也財生於天産於地成於人所以制其用者君也君制其用雖以為國實以為民是故君不足則取之民民不足則取之君上下通融交相為用時斂散通有無盖以一人而制其用非專用之以奉一人也是以古之仁君知其為天守財也為民聚財也凡有所用度非為天非為民決不敢輕有所費其有所費也必以為百神之享必以為萬民之安不敢毫釐以為己私也是何也天生五材民竝用之君特為民理之耳非君所得而私有也茍認以為己物而私用之不知天生之有限民力之孔艱積之百年而不足散之一日而無餘日消月耗一旦馴致於府庫空虛國計匱乏求之於官官無儲峙求之於民民無盖藏於是之時凡百謀為皆不遂矣君位何所恃以為安國家何所資以為治哉譬則人之處家焉凡百居處食用之物公私營為之事茍有錢皆可以致也惟無錢焉則一事不可成一物不可得當夫平寧之時尚可借貸以支吾一旦有水旱盗賊之變則為溝中瘠矣家國一理但有小大耳然民非一家吾家雖乏猶可求之於比隣若夫國之乏絶藏之官者既虛取之民者又竭其將求之何所邪人君當無事之日而興念及此其尚兢兢焉戒謹介介焉吝惜而不輕用天下之財如此則國計不虧邦本益固下之人有家給人足之樂上之人有安富尊榮之休凡百所為無不如意朝廷無不可為之事海宇無不得所之人矣大學以理財為平天下之要道臣觀於此而益信伏惟聖明萬幾之暇留神大學之書而玩味夫絜矩之一言臣不勝大願以上總論理財之道下大學衍義補卷二十一
