body:
  text: 大學衍義補卷六十四明丘濬撰治國平天下之要秩祭祀祭告祈禱之禮下詩商頌𤣥鳥篇曰天命𤣥鳥降而生商朱熹曰𤣥鳥鳦也春分𤣥鳥降高辛氏之妃有娀氏女簡狄祈于郊禖鳦遺卵簡狄吞之而生契其後遂為有商氏以有天下事見史記臣按高禖之祭商時已有之則無子而祈禱于天亦有降鑒之理詩傳曰簡狄從帝而祀郊禖則是帝嚳之時已有此矣大雅生民篇曰厥初生民人也時是也維姜嫄高辛世妃生民如何克禋精意以享之克祀祀郊禖也以弗弗之言祓也無子求有子也履踐也帝上帝武迹也敏拇也歆動也攸介大也攸止載震娠也載夙肅也載生載育養也時維后稷朱熹曰古者立郊禖蓋祭天於郊而以先媒配也變媒言禖者神之也其禮以𤣥鳥至之日用太牢祀之天子親往后率九嬪御乃禮天子所御帶以弓韣授以弓矢于郊禖前也臣按先儒謂祠以仲春正其候也祭以大牢尊其禮也祀以南郊重其事也禮記月令仲春之月𤣥鳥燕也至至之日以大牢祠于高禖先禖之神天子親往后妃帥九嬪御乃禮天子所御帶以弓韣弓衣也授以弓矢于高禖之前陳澔曰燕以施生時巢人堂宇而生乳故以其至為祠禖祈嗣之候古有禖氏祓除之祀位在南郊禋祀上帝則亦配祭之故謂之郊禖后妃帥九嬪御者從往而侍奉祀禮事也禮天子所御者祭畢而酌酒以飲其先所御幸而有娠者顯之以神賜也弓矢者男子之事也故以為祥史記殷本紀曰契母曰簡狄為帝嚳妃三人行浴見𤣥鳥卵取之因孕生契三代世表曰后稷母為姜嫄出見大人迹而履踐之知於身則生后稷褚少孫曰稷契之父皆黄帝之子也詩言契生於卵后稷人迹者欲見其有天命精誠之意耳奈何無父而生乎陳澔曰詩天命𤣥鳥降而生商但謂簡狄以𤣥鳥至之時祈于郊禖而生契故本其為天所命若自天而降下耳鄭註乃有墮卵吞孕之事與生民詩註所言姜嫄履巨跡而生棄之事皆怪妄不經臣按不孝有三無後為大蓋祖宗一氣相傳自開闢天地有人類以來至于今日生生禪續之不已一旦至我身而閼絶焉豈非大變事乎矧有天下之大宗社之重將以綿千百世之宗支而為億兆生民之主宰者尤不可不加之意焉然是事也雖若人為而實由乎天是以自古聖王制為郊禖之祀以為祈嗣之禮必順天時感物類精意以禋之備禮以祀之庶幾高高在上者或有所聞而冀有感格之祥後世不知出此乃信方士之惑而設素饌投青詞而求之窈㝠茫昧之外而不知吾聖人自有當行之禮也臣竊以為古者祀高禖於郊壇郊者祀天之常所而使后妃嬪御涉於其間不無䙝瀆况郊在國都之外而后妃嬪御之出入亦或有不便焉者臣請擇宫中潔静之地立為禖壇中設帝位而以高禖配庶于行禮為宜以上高禖之祀周禮大宗伯國有大故則旅上帝及四望謂五嶽四瀆四鎮鄭𤣥曰故謂凶災旅陳也陳其祭祀以祈焉賈公彦曰四望者不可往祭四向望而為壇祭之凶謂年糓不熟災謂水火陳祥道曰旅非常祭也國有大故然後旅於羣神而祭之陳樂而不懸廞樂而不鼓告以其凶烖或言旅或言大旅蓋故有大小而旅亦隨異也臣按旅者合衆神而祭之也舉天之上帝地之四望則衆神皆合祭之矣小宗伯大烖及執事禱祠于上下神􅅘祗同凡天地之大烖類社稷宗廟則為位賈公彦曰大烖者謂國遭水火及年榖不熟則禱祠于上下天地神祗天烖謂日月食星辰奔殞地烖謂震裂則類祭社稷及宗廟則亦以小宗伯為位祭之大祝掌六祈三曰禬四曰禜王昭禹曰祈以其陳信於鬼神祗而已禬若國之凶荒民之札喪之類禜若春秋祭禜之屬春秋左氏傳曰山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之孔穎達曰禜是祈禱之小祭耳若大旱而雩則徧祭天地鬼神梁山崩晉侯景公召伯宗大夫重人絳人乗重載之車者曰國主山川山崩川竭君為之不舉去盛饌降服損盛服乗縵車無文徹樂出次舍于郊祝幣陳玉帛史辭脩文辭以禮焉杜預曰以禮禮其山川也齊有彗星齊侯景公使禳之晏子曰無益也祗取誣焉天道不謟疑也不貳其命若之何禳之且天之有彗也以除穢也君無穢徳又何禳焉若徳之穢禳之何益臣按人君因災異脩徳正事以回天意可也若之何禳之嗚呼上天之怒而示之以懸象豈祝史之所能回哉朱熹言于其君曰今州郡封域不減古之諸侯而封内名山大川未有望祭之禮其有祠廟亦是民間所立淫誣鄙野非復古制乃舍其崇高深廣能出雲雨之實而傴僂拜伏於土木偶人之前以求其所謂滋養潤澤者於義既無所當又其牲牢器服一切循用流俗䙝味燕器於禮又無所稽至於有山川而無祠廟者其嵗時祈禱遂不復禜于山川而反求諸淫祀之鬼則尤無義理而習俗相承莫知其繆臣按天災流行國家代有固雖天數之或然然亦未必非人事之所致也是故國家有凶災之故其大者則有旅祭其小者則有禜祭焉然其將祭也則必去盛饌損盛服乗素車撤音樂舍于外郊陳其玉帛之幣致其自責之辭庶幾或有所感格於㝠㝠之中焉耳茍或不自脩省而徒事乎禱祈牲幣之間烏能有所感格哉後世此禮不明遇有凶災往往假異端之徒按其科範誦其經咒不求之懸象之天而求之土木之偶其為誣瀆甚矣以上禜祭周書金縢曰王有疾弗豫不悅豫也公為三壇同墠除也為壇於南方北面周公立焉植置也璧秉珪珪璧所以禮神乃告太王王季文王史太史乃冊祝曰惟爾元孫某武王也遘遇也厲惡也虐暴也疾若爾三王是有丕元也子之責于天以旦周公名代某之身蔡沈曰武王有疾周公以王室未安請命二王欲以身代武王之死史錄其冊祝之文并叙其事之始末合為一篇以藏於金縢之匱冊祝如今祝版之類元孫某武王也丕子元子也言武王遇惡暴之疾若爾三王是有元子之責于天蓋武王為天元子三王當任其保䕶之責于天不可令其死也如欲其死則請以旦代武王之身臣按或問程頤周公欲代武王死其知命乎頤曰只是要代兄豈更問命或又問朱熹亦有此理否熹曰聖人為之亦須有此理楊時謂聖人固知天理然只為情切猶於此僥倖萬一也故至誠為之吁誠之一言其感格上天之本乎世之匹夫匹婦固有一念之誠可以感動天地者况聖人乎是則君父有疾難臣子以誠切之心為禱籲之舉則固有感通之理也然必至誠真切然後可以禱之不然則流于王莽之偽矣儀禮疾病乃行禱五祀鄭𤣥曰盡孝子之情周禮女祝掌王后之内祭祀凡内禱祈福也祠報福也之事掌以時招梗禬禳之事以除疾殃鄭𤣥曰内祭祀六宫之中竈門户禱疾病求瘳也祠報福賈公彦曰招者招取善祥梗者禦捍惡之未至禬者除去見在之災禳者推却見在之變異此四者皆與人為疾殃故云以除疾殃也男巫春招招吉祥弭去禍祟以除疾病胡宏曰君天下欲仁其民者雖醫卜祝史之流亦必如先王之世然後禮教可行也臣按商書有巫風之說則巫在商已有之而周公於巽卦爻辭亦有史巫之占周禮以之設官司巫掌羣巫之政令有男巫有女巫天有旱暵則舞雩國有大烖則待命人有疾病則招弭則是巫之設凡國之祭望喪事禬禜祈禳無不與焉其大要在通鬼神而已故孔子論人之不可無恒以巫醫並言而先乎巫孟子論術之不可不擇以巫匠並言而不及乎醫蓋以禱于上下神祗其責尤重也後世巫不設官而禬禜禱祠之事則未嘗廢巫之事遂流於淫誣妖誕之末學老氏者遂隂竊巫覡之柄以為禳星告斗之法其後佛氏又倣老氏而為之世之儒者遂謂巫不誅醫不行殊不知三代之世醫與巫並行也茍如周人設官而禁其為幻誕矯誣僭越之事是亦絶地天通之一事也論語子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾于上下神祗朱熹曰禱謂禱於鬼神有諸問有此理否誄者哀死而述其行之辭也上下謂天地天曰神地曰祗禱者悔過遷善以祈神之祐也又士喪禮疾病行禱五祀蓋臣子迫切之至情有不能自已者初不請於病者而後禱也又曰疾病行禱者臣子之於君父各禱於其所當祭子路所欲禱必非淫祀但不當請耳祈禱卜筮之屬皆聖人之所作至於夫子而後敎人一決諸理而不屑於㝠漠不可知之間其所以建立人極之功於是為備臣按疾病而行禱乃臣子迫切之至情在周公且為之蓋有此理也後世行禱之禮不傳而佛老之徒遂假之以為齋醮之科臣子迫切之情籲告無所往往資之以殫吾情遂為人世常行之事今古禮不可考而巫氏所招弭者世不復知其何法請如金縢設為壇墠珪璧之植秉雖不能盡備然用牲幣以將吾誠假祝冊以達吾意于以告乎宗廟之親于以籲夫上帝之尊于以徧夫當祀之神庶幾古人疾病行禱之遺意以上疾病行禱方相氏掌蒙熊皮黄金四目𤣥衣朱裳執戈揚盾帥百𨽻而時難儺也以索搜也室敺疫鄭𤣥曰䝉冒也冒熊皮者以驚敺疫癘之鬼如今魌頭也時難四時作方相氏以難郤凶惡也月令季春之月命國難音那下同九門磔裂牲謂之磔攘除禍謂之攘以畢春氣仲秋之月天子乃難以達秋氣季冬之月命有司大難旁磔鄭𤣥曰季春之月日行歴昴昴有大陵積尸之氣氣佚則厲鬼隨而出行命方相氏帥百𨽻索室敺疫以逐之仲秋之月宿直昴畢昴畢亦得大陵積尸之氣季冬之月日歴虚危有墳墓四司之氣皆為厲鬼隨强隂將出害人也陳澔曰春者隂氣之終故磔禳以終畢癘氣也季春命國儺以畢春氣仲秋獨言天子難者此為除過時之陽暑陽者君象故諸侯以下不得難也季春惟國家之難仲秋惟天子之難季冬則下及庶人又以隂氣極盛故云大難也旁磔謂四方之門皆披磔其牲以禳除隂氣不但如季春之九門磔攘而已論語鄉人儺朝服而立於阼階朱熹曰儺雖古禮而近於戲亦必朝服而臨之者無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依已而安也漢志先臘一日大儺謂之逐疫其儀選中黄門子弟年十嵗以上十二以下百二十人為侲子皆赤幘皂製執大鼗方相氏黄金四目䝉熊皮𤣥衣朱裳執戈揚盾十二獸有衣毛角中黄門行之冗從僕射將之以逐惡鬼于禁中夜漏上水朝臣㑹侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衛乗輿御前黄門令奏曰侲子備請逐疫於是黄門倡侲子和嚾呼周遍前後省三過持炬火送疫出端門以次傳火棄雒水中臣按儺者索室以去其不祥其法始於周禮方相氏而其事見于月令之三時季春行于國中仲秋行於宫禁惟季冬謂之大儺則通上下行之也雖以孔子之聖亦從鄉人之所行蓋有此理也若無此理聖人豈茍於同俗者哉漢唐以來其法猶存漢以中黄門為之蓋以其出入禁掖為便今世此法不傳然宫中邃密隂氣偏盛不能無影響之疑於是乎假外道以驅除之元人至遣西番僧入宫持咒每嵗元正命所謂佛子者張白傘蓋徧遊都城此何理也臣請斟酌漢唐之制俾内臣依古制以為索室逐疫之法是亦闢異端嚴宫禁之一事也以上大儺文中子曰封禪非古也其秦漢之侈心乎馬端臨曰太史公作封禪書以為古受命帝王未嘗不封禪且引管仲答齊桓公之語以為古封禪七十二家自無懐氏至三代皆有之蓋出於齊魯陋儒之說詩書所不載非事實也當以文中子之言為正梁天監中有請封禪者著作佐郎許懋建議曰舜柴岱宗是為巡守而鄭𤣥引孝經鉤命決云封于泰山考績燔燎禪於梁父刻石記號此緯書之曲說七十二君燧人之前世質民淳安得泥金檢玉結繩而治安得鐫文告成妄亦甚矣若聖主不須封禪若凡主不應封禪秦始皇嘗封泰山孫皓嘗封國山皆由主好名於上而臣阿㫖於下非盛徳之事不可為法也胡寅曰封禪之事漢唐之君往往行之曽無一人建議明白如許懋者賢哉懋乎其學可謂正矣漢唐以來緯書行而經學弛重以鄭𤣥博聞寡要不知折衷于聖人而惟緯書之信世無稽古大儒稽古言以祛羣惑遂使有天下者於無事時肆其侈心千乗萬騎巡狩侈費登山琢石夸大功徳或有祕祝以祈不死取笑當代貽譏後來臣按封禪之說詩書禮典略不經見審有是事乃天下國家之盛舉堯舜禹湯文武成康皆身致太平安得闕而弗講所謂七十二君者果何代何人哉先儒有言養生至于長生不死為國至于祈天永命皆有是理然人未有能為之者縱為之然亦不出乎身心日用之間非必由乎服食藥物儌求鬼神而後致之也然自秦漢以來千餘年矣有國家者未見一人過百年而不死者亦未有一國踰千年而不亡者則是有此說而無此事明矣是故明君欲求壽年之永莫若寡欲欲得國祚之延莫若愛民寡欲而至于全其天愛民而至於過其厯真誠有是理亦真誠有是事嗚呼世主所以甘心于不貲之費而行封禪之禮者以有祕祝之求也誠知此理反之於心知其必無驗之於古知其無效則自不為矣以上封禪以上祭告祈禱之禮下大學衍義補卷六十四
