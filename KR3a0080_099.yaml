body:
  text: 大學衍義補卷九十九明丘濬撰治國平天下之要備規制郵傳之置周禮鄉大夫之職國有大故則令民各守其閭以待政令以旌節輔令則達之賈公彥曰國有大事故恐有姦寇故使民徵令出入往來皆須得旌節輔此徵令文書乃得通達無節則不得通臣按旌以彰之節以驗之有旌節文書乃得通達後世給符驗以傳文書始此遺人掌郊里之委積以待賔客野鄙之委積以待羇旅凡賔客會同師役掌其道路之委積凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積鄭𤣥曰委積者廪人倉人計九榖之數足國用以其餘共之少曰委多曰積廬若今野候徙有庌也宿可止宿若今亭有室也候館樓可以觀望者也一市之間有三廬一宿賈公彥曰郊野之委積以待賔客者其賔客至郊與主國使者交接因即與之廪餼也野鄙之委積以待羇旅者旅客也謂客有羇縶在此未得去者則於此惠之鄭注謂廬今野候徙有庌者此舉漢法以况義漢時野路候迎賔客之處皆有庌舍與廬相似注謂宿可止宿若今有亭有室者漢法十里有亭亭有三老人皆有宮室故引以為况也臣按委積以待賔客即後世驛傳給廪之意候館樓即所謂驛舍之郵亭也委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物以稍聚待賔客以甸聚待羇旅鄭𤣥曰野謂逺郊以外也所斂野之賦謂野之園圃山澤之賦也凡疏材草木有實者也凡畜聚之物瓜瓠葵芋禦冬之具也賈公彥曰以三百里稍地之聚二百里甸之聚以待羈旅過客之等臣按遺人所掌者餼廪之資而委人所斂者凡薪芻果菜之屬野廬氏掌達國道路至於四畿比校也國郊及野之道路宿賔客所宿之廬息所止之舍井樹井以供飲食樹以為蕃蔽王昭禹曰掌達道路至於四畿則遂人所謂千夫有澮澮上有道萬夫有川川上有路以達於畿是也謂之四畿則自王城五百里四面皆達之也臣按周定王使單襄公聘於宋遂假道於陳以聘楚道茀不可行司里不授館國無寄寓而知陳之不能守其國蓋是時周禮盡廢而野廬氏之職不修而所謂達國之道路至於四畿而比其宿息井樹者不復有矣行夫掌邦國傳遽之小事􅍇惡而無禮者凡其使也必以旌節鄭𤣥曰行夫邦國使之小禮者也傳遽若今時乘傳騎驛而使者也臣按後世乘傳騎驛其原蓋出於此環人取周圍保護之義掌送逆邦國之通賔客以路節達諸四方舍則授館令聚柝與拆同有任器則令環之凡門關無幾送逆及疆王昭禹曰國野之道五十里有候館則環人授之於賔客者也令聚柝令野廬氏也賔客有任用之器則亦令環衛之也凡門關無幾者謂賔客出入環人以路節達之故門關無幾也疆謂王畿四方之界也賔客來而逆之去而送之皆及疆臣按環之為言圍也主賔客往來為之守衛賔客有隨行之任器則周圍保護若環之無隙焉可見先王之於賔旅非徒餼廪以給之而又有兵仗以衛之此所以來通四方之情而懷柔之者至矣左傳襄公三十一年子産曰僑聞文公之為盟主也宮室卑庳無觀臺上髙曰臺榭有木曰榭以崇大諸侯之館館如公寢庫廄繕修司空以時平易道路圬人以時塓塗也館宫室諸侯賔至甸設庭燎僕人巡宫車馬有所賔從有代代客役巾車主車之官脂轄𨽻人牧圉各瞻視也其事百官之屬各展陳也其物公不留賔而亦無廢事憂樂同之事則巡之教其不知而恤其不足賔至如歸無寧寧也菑患不畏冦盜而亦不患燥溼臣按子産之言可見古人所以設館以舍賔客者其備預之完具情文之兼至有如此者是雖列國相待之禮而大之所以字小小之所以奉大皆不可不加之意可見矣國語單子曰周之秩官周常官篇名有之曰敵國賔至關尹以告行理吏也以節瑞節逆迎也之候人為導卿出郊勞門尹除掃也門宗祝執祀司里授館司徒具徒役也司空視塗視險易也司冦詰姦虞人入材甸人積薪火師監燎庭燎水師監濯膳夫致餐熟食廪人獻餼生曰餼司馬陳芻䬴馬工人展車展省客車補其傷敗百官官以物至賔入如歸臣按古人所以待賔之禮如此其至所以賔至如歸也國語所述者雖敵國之禮而大之於小亦可以類推矣孔子曰德之流行速於置郵而傳命朱熹曰置驛也郵馹也所以傳命也孟子引孔子之言如此許謙曰字書馬遞曰置步遞曰郵漢西域傳因騎置以聞師古曰即今驛馬也黃霸傳郵亭師古曰書舍謂傳送文書所止處如今驛館臣按置即漢時之騎置令之驛傳也郵即漢時之郵亭今之鋪舍也騎置以飛報機務郵亭以遞送文書漢髙祖五年田橫乘傳詣雒陽如淳曰律四馬髙足為置傳四馬中足為馳傳四馬下足為乘傳一馬二馬為軺傳急者乘一乘顔師古曰傳者若今之驛古者以車謂之傳車其後又單置馬謂之驛騎臣按今制驛設三等馬匹有上中下之别即漢所謂髙足中足下足也文帝十二年除關無用傳景帝四年復置關用傳出入傳信也若今過所也如淳曰兩行書繒帛分持其一出入關合之乃得過謂之傳今除去關出入無禁不用傳也臣按漢人所謂傳即今符驗文引之類平帝時徵天下通知逸經古記者所在為駕一封軺傳如淳曰律諸當乘傳及發駕置傳者皆持尺五寸木傳信封以御史大夫印章顔師古曰以一馬駕軺車而乘傳平帝時選有德義者以為宗師考察不從教令有冤失職者宗師得因郵亭書言宗伯請以聞顔師古曰郵亭書舍也言為書以付郵亭令送至宗伯也臣按郵亭即今之鋪舍因郵亭書言宗伯即今官文書入遞也漢舊儀曰璽書使者其驛騎也三騎行晝夜千里為程臣按此即後日詔書一日行三百里之制唐制傳信符者以給郵驛通制令唐有銀牌發驛遣使則門下省給之其制濶二尺半長五寸面𨽻五字曰敇走馬銀牌宋初令樞密院給券謂之頭子太平興國中因有詐乘驛者詔罷樞密院券乘驛者復置銀牌端拱中又罷之復給券臣按此唐宋牌券之制宋仁宗嘉祐中三司使張方平編驛券則例凡七十四條賜嘉祐驛令臣按此宋朝驛劵之制竊惟今制凡天下水馬驛遞運所遞送使客飛報軍情轉運軍需之類沿途設馬驢船車人夫必因地里要衝偏僻量宜設置其衝要處或設馬八十匹六十匹三十匹其次或二十匹十匹五匹大率上馬一匹該糧一百石中馬八十下馬六十其僉㸃人夫先儘驛所近民如不及數取於鄰郡民户糧不及數者衆户輳數當之民於常役之外而又加此役承平日久事務日多而民力亦或因之以罷弊乞如宋仁宗命張方平總驛券俾所司將事務之當給驛者定有等第編次為一書頒行天下藩方非此例也不許擅起發下天下驛遞非此例也不許應付以上郵傳之置治國平天下之要備規制道塗之備易刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙張栻曰川塗之險則有所不通惟夫舟楫之利既興則日月所照霜露所墜莫不拭目觀化天下如一家中國如一人矣是以刳其木而中虗剡其楫而末鋭舟所以載物而楫所以進舟致逺以利天下而取諸渙者蓋渙之成卦上巽下坎彖曰利涉大川乘木有功也臣按渙之卦有乘木濟川之象水在天地間為利最大為性最險故聖人於易屢以利涉與不為言而又制器以為利涉之具既有其具則地之勢盡矣而人行也不止地之形斷矣而人行也不絶由是極天所覆地所載處無不可至焉所以來逺人於無外廣王化於無窮也詩大明篇曰親迎於渭造舟為梁張載曰造舟為梁文王所制而周世遂以為天子之禮臣按造舟謂聯比其船而加板於其上以為橋杜預所謂河橋是也周禮司險掌九州之圖以周知其山林川澤之阻而達其道路設國之五溝五涂而樹之林以為阻固皆有守禁而達其道路國有故則藩塞阻路而止行者以其屬守之唯有節者達之鄭𤣥曰達道路者山川之阻則開鑿之川澤之阻則橋梁之也樹之林作藩落也國有故喪災及兵也閉絶要害之道備姦冦也王昭禹曰所謂九州之圖山林川澤之阻若職方氏所謂東南曰揚州其山鎮曰會稽其澤藪曰具區其川三江其浸五湖之類是也所謂國之五溝五涂則是遂人所謂遂溝洫澮川之謂五溝也行畛涂道路之謂五涂也合方氏掌達天下之道路鄭𤣥曰達天下之道路津橋相輳不得陷絶也臣按官而謂之合方者合同四方之事也野廬客行道所舍氏掌達國道路至於四畿比國郊及野之道路凡道路之舟車轚互者叙而行之鄭𤣥曰達謂巡行通之使不陷絶也賈公彥曰舟車轚互謂於迫隘處也水陸之道舟車往來狹隘之所使以次叙過之臣按成周之世其為治不但詳於朝廷之上國都之中則雖天下之道路舟車所至之處無一之或遺焉者可見聖人為治無間於大小邇遐也匠人營國經涂九軌環涂七軌野涂五軌王昭禹曰國中曰經涂繞城曰環涂郊外曰野涂軌廣八尺經涂所由者衆故九軌環涂所由者少故七軌野涂所由者又少故五軌此內外廣狹之制異也臣按太平之治非止政教流行於王朝國都之內則雖道涂往來之所無一而不合於轍迹之度然後為天下一統焉茍有一之或窒閡閉隔焉則有所不行者矣豈所謂車同軌哉史記禹開九州通九道陂九澤度九山孔頴達曰通九州之道路臣按左傳禹經啓九道即此春秋昭公元年秦公子針奔晉造舟于河臣按初學記公子針造舟處在蒲坂夏陽津今蒲津浮橋是也禮記季春之月命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路母有障塞鄭𤣥曰溝瀆與道路皆不得不通所以除水潦便民事也古者溝上有路方慤曰修利則修而利之使無害道逹則道而達之使無壅開通則開而通之使無窮皆欲其無有障塞而已障言蔽顯以為隱塞言窒虛以為實凡此皆豫備水災之術也臣按先王當季春之月恐自時厥後大雨時行水潦將至或至于淹沒道路而成淖濘有妨車馬行旅之往來故先時而為之備水患也如此爾雅路旅途也路場猷行道也博說道之異名一達謂之道路長道二達謂之岐旁岐道旁出也三達謂之劇旁數道交錯謂之劇四達謂之衢交道四出五達謂之康康莊之衢六達謂之莊七達謂之劇驂一道交復有一岐出者八達謂之崇期四道交出九達謂之逵四道交出復有旁通臣按此則術道之異名也天子造舟諸侯維舟大夫方舟士特舟庶人乘泭郭璞曰造舟比船為橋維者維連四船方者併兩船特單船也泭併木以渡臣按造舟維舟方舟即今所謂浮橋特舟即今渡船泭即今􅑉筏國語周定王使單襄公聘於宋遂假道于陳以聘于楚火心星也朝覿謂展見也矣道路也茀塞也不可行也候不在疆司空不視塗澤不陂川不梁單子曰夫辰角大辰蒼龍之角星名也見而雨畢天根亢氐之間見而水涸故先王之教曰雨畢而除道水涸而成梁故夏令曰九月除道十月成梁臣按夏令夏后氏之令周所因也除道所以便行旅成梁所以便民使不病涉也孟子曰嵗十一月徒杠方橋可通徒行者成十二月輿梁橋可通車輿者成民未病涉也朱熹曰周十一月夏九月也周十二月夏十月也夏令曰十月成梁蓋農工已畢可用民力又時將寒沍水有橋梁則民不患于徒涉亦王政之一事也又曰先王之政細大具舉而無事不合人心順天理故其公平正大之體紀綱法度之施雖纎悉之間亦無遺恨如此臣按先王之治非獨其大綱大法無有偏而不舉之處則雖一道徑之微一津河之小民之所以經行之處亦必委曲而為之處置焉惟恐其行步之齟齬足徑之瘒瘃也聖人仁民之政無往而不存其小者尚如此况其關係之大者哉漢薛宣子惠為彭城令宣至其縣橋梁郵亭不修宣心知惠不能臣按鄭子産以乘輿濟人於溱洧孟軻氏譏其不知為政陳國道茀不可行而川不梁單襄公知其必亡蓋道路橋梁雖于政治無大干繫然王道至大而全備一有所闕雖若無甚害者然而一人不遂其欲一事不當其理一物不得其濟亦足以為大段之纍全體之虧也故大人行政雖受一命居一邑亦無不盡其心焉者薛宣于見其子之為邑橋梁不修而知其無所能由是推而大之知夫覘人之國者因其涂不治川不梁則知其國之不振也豈不然哉是以君子欲成其大必盡力于其小欲成其全惟恐其一之或有虧也良以此夫晉杜預以孟津渡險有覆沒之患請建河橋于富平津議者謂殷周所都歷聖賢而不作者必不可立故也預曰造舟為梁則河橋之謂也及橋成武帝從百寮臨會舉觴屬預曰非君此橋不立也對曰非陛下之明臣亦不敢施其微巧臣按元和志云河陽浮橋架黃河為之以船為腳竹􅦜互之初預造橋時議者多謂殷周無有作橋于河者預引詩大明造舟為梁為證然詩不言其所造之處史記秦昭襄王五十年十二月初作河橋蓋橋作于河也然是時秦未有孟津之地而所作之橋不在此爾唐開元九年復作于蒲津唐開元九年新作蒲津橋鎔鐵為牛張說曰河有三橋蒲津居其一舊制橫緪百丈連船千艘辮修笮以維之繫圍木以距之開元十二載俾鐵代竹取堅易脆結為連鎖鎔以為伏牛偶立于兩岸禁連于河中灘鎖以特航牛以繫纜亦將厭水物奠浮梁臣按凡于水必用鐵非徒以其堅亦以其能厭水物也以上道涂之備大學衍義補卷九十九
